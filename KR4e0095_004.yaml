body:
  text: 抑菴文集巻四明王直撰序立春日分韻詩序國朝之制每嵗立春應天尹先戒其屬為土牛以其年支干所值推五行生克休旺而以五色彩施之又鏤木為小山飾以雜寳結珠翠為花葉以象春物之蕃盛是日皇帝服皮弁服御奉天殿備樂行禮文武之臣朝服在列應天尹以其物進謂之進春羣臣班賀五拜稽首而退上復御奉天門錫宴既醉而後罷葢舉歴代舊典而加厚之也永樂十二年車駕在北京是年十二月二十三日為明年之春應天尹于潜詣行在進春如故事宴畢翰林侍講曽君子棨等七人者退坐祕閣相與嘉歎以謂國家當太平無事之時而脩典禮彌文之盛豈特為一時美觀哉蓋天地以生為徳人君以好生為心春者生之始也故夫慎重於春如此者所以致其奉若天道對時育物之意也漢制立春日下寛大之書今皇上涵育萬物自夫念慮之微以至於政事之施無非所以惠養安利之者蓋不必於春而始見誠所謂其仁如天堯舜之主也而直與諸公幸以此時列官禁近從容兩京之中瞻道徳之光華被恩澤之優厚葢千載之良遇也昔宋之時翰林以是日進春帖于禁中寫時景而美徳意今雖不行因時紀事以歌咏盛美而垂之後世者本儒臣職也於是取唐杜甫立春日詩忽憶兩京梅發時之句書為丸投器中各探一言為韻賦詩一首而直僣為之序云嵗除日分韻詩序車駕巡幸北京之三年實永樂十又三年也吾邑之士居行在者翰林脩撰梁公輩凡八人時十二月壬辰為明年之春翌日癸巳式當嵗除梁公感時序之遷而重鄉邑之好也相與合宴于其私第之南齋叙親友之至情樂太平之無事更酬交酢劇談大笑不知旅寓之既乆而去鄉之益逺也葢是時法度脩明四夷賓貢天子一意儒術以熈鴻業所謂文明極盛之時也而吾邑之士又皆以文學奮身遭遇其時忝列華要亦可謂盛矣及嵗時之閒暇舉酒相屬而惓惓以徳業相勉將以上報國家而非獨為鄉邑之榮也梁公既喜之乃曰是不可無紀述因書為此春酒以介眉壽八字丸而投之各探一言為韻賦詩一首以寫其慇懃之意于時留南京者則有諭徳楊公而下以至監學之賢尚十數人顧其觴詠之娯有可想見而於夫㑹合之難則又不能無感於中也詩既成梁公命直序而録之以傳于八家且以寄楊公而諗其意何如焉送胡允實詩序洪熈元年五月仁宗皇帝在位慨然興念侍從舊臣悉加以恩禮於是前文淵閣大學士兼左春坊大學士贈禮部尚書謚文穆胡公加贈少師遣户部郎中逺志徃賜祭且致命焉仍賜其家白金百兩鈔五千貫文綺八疋皆有副而令其子翰林檢討穜偕使者以行既畢事公季子允實亦隨其兄及使者謝恩來京師復以公之墓碑未立請於少傅兵部尚書兼華蓋殿大學士楊先生得文歸刻焉直初取進士入翰林時公已為侍讀以清徳懿行受知於太宗皇帝制誥典冊多出其手及仁宗皇帝正位東宫公進為庶子職輔𨗳仁宗皇帝以其忠亮端確尤親任焉公雍容進退必盡其道凡二十年未嘗有變故既没之後二聖之所以哀惜褒贈者有加而不衰夫古之為君臣者其初非不懽然相得也然而上下無間至于二十年之乆如公者葢少矣雖二聖之大徳有以榮其始終而公之所以致此者亦豈非其徳之驗哉直之叔祖僉憲公實與公之顯考延平府君再為同寮公又與直先考瓊州公深相知是以公之教愛於直者加厚也則吾與允實豈一日之好哉惟吾二家之祖皆能卓然自立於前者以徳義相上也今吾與允實繼之求夫所以承藉光顯而無愧焉亦難矣夫世之為妄子弟者皆為人後者也然而無責焉而吾輩言行有一不當於理而君子以為辱先是豈為異哉葢責備於其子孫者所以重其祖考忠厚之至也直與允實其何以自免於君子之責哉師前人之善而勉於為學則庶乎其可也允實歸矣事親從兄之暇益孜孜問學謹其言行以趾美前人君子之責將免矣以直之愚而冒榮茍禄蓋有不勝其責者故於允實之行而為贈言若此允實其亦有以處我哉贈胡憲使之廣東序國家設布政司以統治於外而又設按察司以臨之其任蓋重矣夫布政司所統府若縣多者至百餘少者不下五六十其為地也廣矣吏之賢否士之得失近或有不察逺或有不逹者按察司得以刺舉輔其不足而匡救其非使綱紀整飭法令脩明賢才奮庸上下無壅而治道成矣其任之所系如此然位既髙則人仰之者愈衆任既重則人伺之者愈詳毫髮幾微有未至人皆以為病况乎小大之吏向風承意其為弊豈不多乎故君子之欲盡其職必先正其身存之以仁行之以恕明以燭隠微公以定曲直寛而不失之縱嚴而不至於殘則職斯盡矣然按察司有使有副有僉事而使者所以為之表也使失其為表之道則為之貳者且不慊况欲以儀其下乎此使之所以尤難也吾友胡槩字元節始舉進士為御史其名實蒸然聞於世朝廷知其才嘗使署刑部及都察院其名實益彰徹大顯未幾擢拜廣西按察使蓋能正身以盡職不失其為表之道而稱朝廷所以命官之意者也今年夏改之廣東廣之東西相接也其土風民俗無大相逺推其所以治廣西者而施焉無不可者宜於彼有不宜於此乎吾知廣東之治由是而益盛矣於其行也朝之士大夫素相厚者以其道途所經山川城郭命題賦詩以送之而以序屬予予素嘉重胡君者故不辭而為之序云贈余學奭赴常州教授詩序泰和余學奭為廣西平南教諭既九年以績最陞常州府學教授學奭乃予永樂十年所取士又其兄學䕫為翰林侍講昔予與同年生相交為最厚故學奭來京師特厚予故徃來無間也學奭通易經蓋受於其尊府斯延先生斯延先生受於安成劉先生雲章劉先生雲章則常逰臨川呉文正公之門其家學有源委故學奭亦能教諸生諸生皆樂從之其在平南夷獠之地盜賊攻刼奔走避匿無寜時而師生相與講學不廢故卒能有所成就如此予嘗竊怪世之職教者率以地之美惡為戚忻不復計其教之何如也夫人之才不才多係於地地之饒沃與否有以興墮其志氣古之婦人女子能辨之而聖人有取焉顧世之為士大夫者乃獨役志於此得美地則喜不然則大以為戚其智反在古之婦人下此無他葢以自養為累故也士大夫之學豈専於自養也哉若以地論之平南可為惡矣而學奭之教有成績然則人才果係於地沃與否邪抑亦在乎教之有道邪常州在天子畿内邇於教化故其地雖饒而其人則才學奭之得常州人多賀之而學奭不加喜葢將以其教平南者而施之予知常人皆有以成其才也必矣此可為常人賀也於其行也知學奭者皆賦詩送之而予書其說以為序運副蕭公挽詩序山東鹽運副使蕭公鵬舉既沒之八年其子孟㢘輯凡士大夫哀挽之詞為一巻求予序之予自幼時則聞鄉先生劉尚書子髙以清徳正學教蕭氏子弟名能傳其學肖其徳者則公也心知慕矣其後得所謂駢義五荆二傳讀之而知公之徳其相慕加焉時公為蘇州同知坐事免復起而官山東矣永樂二年予竊第入翰林又得聞公有豈弟之政於其屬之人而朝之逹官貴人徃來山東者多能誦公之徳予於是益信而相慕益加焉又後三年公以考績來京師乃得見于今翰林學士楊先生所夫以相慕於累年而相遇於一旦其為慰恱可知也然公亦雅知予而喜與予接葢不特鄉邑之故而有先人之好焉公色溫氣和亷静簡重聴其言無不當理考其行又無不合於言者蓋謂之君子無愧也孰知去一年而公死矣嗚呼若公者可多得哉此士大夫哀挽之詩所由作也然予聞之黄鳥之詩尸郷之歌所以哀其人之不幸若公之徳脩於身施於家而達於為政享其福禄榮名而終於夀考宜可無憾矣而士大夫於公猶不釋然者蓋君子之於人愛其徳則思見其人見其人則願與之乆處而不厭故違離契闊則必見於言以致殷勤篤厚之意而况於死生之際乎然則是詩之作蓋其好徳之心不能自己也况若予者又安能己於言哉故為序之使藏焉嗟夫不務徳而自肆者可以觀矣移居唱和詩序永樂二十一年三月予以内艱服闋至京師主於東城予姻家歐陽君允和而楊先生士竒則居西城之金城坊所與鄰者同邑余君學䕫劉君朝宗臨川王君時彦吉水錢君習禮張君宗璉周君恂如周君功叙皆予之舊也先生重鄉誼篤世好不欲棄予於逺思求近宅以處之使熏炙為善而先生之居乃與刑部員外郎汪麓對門時麓以考滿當陞而未受命也先生即令買所居宅恂如功叙與諸君皆力賛其成既而麓拜陜西㕘議以去予以六月二日徙居之先生及諸君皆為喜朝夕相過不厭也夫京師者百萬之衆之所萃也然車轍馬跡於東城為多故晴則冒塵埃雨則陷泥淖至不可徃來而西城實亢爽雖雨暘明晦之變不異然終不若彼之甚也及予之來適當淋淫之際頽垣敗屋徃徃而是予乃得安宅以居幽雅閒曠無車馬之擾塵泥之汚清泉佳樹近在庭下西山之勝可一覽而盡之何其幸哉而又得楊先生為之依諸君子相與周旋其言語行事之間皆所以示益也予之樂乎外恱乎内者如此則其去小人而為君子可兾矣古所謂蓬生麻中者予之謂也私竊自喜因呈詩四章楊先生首和之繼者凡十有八人皆一時之傑和平清麗可傳而誦也豈可以予之陋而廢哉明年二月二十一日予始復職為侍讀公事之暇序其所以作詩之意而次第録之使好事者得以考覽而予詩則謬居首云郊遊詩序宣徳二年正月庚子上有事於南郊明日大宴羣臣復以上元節勅賜假十日俾各飲酒為樂以彰太平之休宴罷曽君子棨諗于衆曰吾徒縻於職務不為閒曠之樂乆矣今幸有恩命盍乗閒遂一遊乎於是諾者八人期以乙巳至古城古城金蕭太后所築其廢乆矣而天王寺白雲觀在焉皆昔所嘗遊者及期李君時勉陳君徳遵以俗累不果王君時彦陳君光世錢君習禮遂先行俟於順承門外予與曽君暨周君崇述繼之時天色隂翳極目無所見不能不少沮然而皆曰天素從人欲豈於吾輩有靳邪將必不然既出城隂雲忽開天日朗霽諸山秀列如畫其髙下起伏虎蹲龍躍之勢連亘數百里皆可一二數之衆大喜按轡徐行曰此天相我也遂前數里至天王寺登殿後古臺四顧皆頽垣敗屋軍民雜處其中臺前一小殿殿前故址皆為耕稼之場浮屠七級亦頗為風雨所剥蝕蓋視舊加弊矣殿上有佛像三一僧侍側男女拜謁者足相踵皆施財以求福諸君厭之遂出西室繞其後數百步至白雲觀觀之西乃長春宫舊址觀則長春真人退居也道士魏道方起其廢殿堂門廡香華鐘鼔之設皆可觀而道方適入城為人禱禳道童冲霄迎𨗳甚恭然人之徃來者與天王無異予因嘆曰有元盛時佛老之宫莫過於此由王公以下争奔走焉自謂足相資以乆矣孰知未及百年而並廢虛無寂滅之教果無益於世而人猶信向如此甚矣其蔽也遂退入殿東法堂堂中事元武像乃坐其東室飲茶畢諸従者各置酒饌相與勸酬時春風始至草木尚未萌動諸君獨以其幽雅故觴酌甚懽追思昔遊人事之不能常固亦有感于中然後知朋友相從於無事而得燕遊以嬉為甚難彼汨汨於流俗不能少暇者為可惜也飲既酣皆謂不可無紀錢君乃析唐人詩福地隂陽合仙都日月開二句為韻各賦二詩詩百言俾予為序然日且暮不可留遂罷去而餘興未巳曽王二君望山北行由平則門入予與諸君循濠水踐故道以歸平沙漫流烟霞之照暎魚鳥之翔泳皆其心所樂者也明日詩成聨為大巻予因序所以遊冠其首家譜序永樂十四年直先考瓊州公以内艱起復因持家譜至京師將求序於翰林諸先生時已有疾不暇求直以其統系失詳也因間請焉則語直曰吾王氏其先居金陵葢太傅𨗳之後南唐時有崇文者為吉州刺史因挈家來吉其後遷䖍州節度使而姪牧遂居廬陵宣化坊孫䞇字至之又奉其父牧徙居泰和之臨澴坊宋慶歴中䞇為天章閣學士知諫院乞歸省其親仁宗書具慶二字以賜今具慶坊即臨澴之改也後有承節郎三班奉直諱先者始居城西髙􅀈巷而治園圃植花卉作亭榭於龍洲别墅以為樂子孫因徙居之號花園王氏今之所居則又自花園徙焉吾常侍爾祖竹亭公與爾叔祖御史公而聞之葢其初譜牒甚詳元季兵亂族祖晉夫攜之以避難不幸遇冦其子繼隆被虜譜牒亡失亂定而歸得故譜二片於煨燼之餘一自始祖以下至鏜六世一自奉直至欝林公五世而已餘皆殘缺不可知故奉直公以上遂失所系屬而具慶坊則亦無有存者是以無所㕘考而抱戚於無窮乃自欝林公以下所知者續之至于今而自奉直以上既無所考不能明其昭穆不敢強附故别舉奉直為宗而存諸派系於其前幸他日或有可考而聫屬之其他派不知者則缺焉此爾祖之志也嗚呼是豈其情之得已哉又曰吾宗自居泰和以來傳至于爾兄弟凡幾世雖不能大光顯於前人而幸世不失為士則吾祖宗之所以封植敷遺者可知矣叔孫穆子論所以不朽者在於立徳立功立言其可不思所以自立哉爾小子其勉之直謹識之不敢忘今先公雖不幸而其言存以直之無状其何能奉承而有所立哉因脩輯譜圖既完敬録其言以告後之人使知其本之所自而無忘先公之訓庶幾能昌大於乆逺也益菴詩序予友蕭進薦之未舉進士時嘗名其藏脩之所曰益菴故翰林侍讀梁先生為之記及薦之取進士官京師選為藤縣令又以詩序屬予夫君子之謙虚求道以自益者豈徒成已哉亦將以益人也薦之自益於已也多矣今而臨一縣凡一縣之人所以成其孝弟忠信之行厚其養生送死之具皆薦之職也推以益人此其時矣夫易著聖人之用而益之為卦所以明益下之道也其彖曰損上益下民說無疆夫推已之徳善以益下之人則人誰不欣戴之者然非中正之道人猶不說也故曰中正有慶卦之六爻惟二五居中得正故二曰吉而五曰元吉三四皆不足於此故皆以中正戒之然則中正之道固益下者之所當務哉偏私邪僻中正之反也作於其心害於其事則為損也大矣而何益之有夫五君也三四未盡其道也所宜法者惟二乎二以柔順中正而能虚中以受天下之益夫能受天下之益則資於已者厚而益於人者深其謂吉宜也雖然益之於人者有矣而脩於已者未盡猶為無益也故於大象有見善則遷有過則改之說焉夫見善不能遷有過不能改傲然自足拒人於千里之外其不戾乎中正者少矣何能有益於已而盡益下之善哉然則益下之道固貴乎中正而所以協乎中正者則貴乎有以受天下之益然非有遷善改過之實亦何以來天下之益哉嗚呼亦難矣薦之賢而有志其能盡是道以益下也審矣故為之序如此所以足梁先生之未備庶乎兼體用合内外之道也工乎詩者申以系之贈王行人出使江廣序古者男子之生則以桑弧蓬矢射上下四方葢示其所有事也故君子之行天下觀夫山嶽之崇髙河海之深廣都邑之巨麗古昔聖賢道徳之遺懿豪傑之士之所以經營得失成敗之際與夫物産之珍怪人事之盛衰風俗之美惡與其所以然之故而致其知廓其量達其才器而見於行事之間若此者葢非偶然予少則慕之然方困學未能也其後聞有為行人者使于四方得如前之所云兾或為之以償願焉及舉進士入翰林不得為所謂行人者方惴惴焉以寡陋為懼解之者曰兹雖不能觀乎天下然得觀天下之書古人所謂不出門而知者可兾矣予心終不能忘也渤海王翺九皋端重之士也始舉進士為大理寺副乆之遷行人予心喜其去詳刑之煩而遂逺大之觀而九皋之心亦與予同也故出入徃來勤勩而不厭於乎九皋其真有得也哉初行人之設也皆以他材處之蓋取便使令而己太祖髙皇帝知其繫國體之重也皆易以進士非重事不得遣焉及其秩滿也徃徃出臨大藩典大郡其重之如此葢以其學足為進士而其得於耳目又有若予之云者也然則士之仕也得奉職於此而盡天下之大觀以資益乎已而無愧於男子之所有事豈不快然可樂也哉抑予觀夫皇皇者華之詩而知古者遣使之義矣其首章曰駪駪征夫毎懐靡及其後則反覆於咨謀度詢之說焉葢君之使臣將以廣聰明也惟能有靡及之心然後能察下情而達之以輔君之治九皋其益務此也哉九皋今奉詔由江西而之廣東以予為江西人也來與予别予嘗願為使以觀乎四方而不得者因九皋之行相與道之如此而又幸江廣之人之情之見察而得以䝉其利也故又率能詩者作詩以送之而書其說以為序張氏文獻集序張氏文獻者何凡文章之為張氏作者皆録也不獨謂之文而又以獻名者何文因人而作觀其文則其人之實可知此其所以名也張氏始由滄徙青五代之末國子丞叔完者又自青徙汴宋之南渡太常少卿泰實從遂居上虞之東門以故郡望表其坊曰清河坊示不忘本也越五世有君璋者作祠堂以祀先一本朱子家禮且録先代所受誥詞諸作以傳示後世以表著前人宦達之盛至九澤重脩譜以見其孝九皋託興於鶴以表其清九容累官至山東㕘政九功亦累為學官而士倫甫則九皋之子今山西布政使居傑之父承先裕後以徳誼重當時皆張氏之偉然者也居傑初自教職擢給事中陞㕘議又陞㕘政以至為方伯政事文學有過人者其弟居彦亦選自學官為僉事兄弟皆方面重臣豈偶然之故哉自古有國有家者其先世所行必託諸典籍而又有賢者識之然後可徴於乆逺杞宋夏商之後也文獻無徴孔子歎之况下於此者乎張氏自五代至于今凡幾世其閥閱之華衣冠之美譽績之著觀於是可知於乎此其所以謂足徴者與宜其集録以傳也予交居傑乆不腆之辭見於紀述者亦有矣惜乎不足以行逺也抑嘗聞之大家世族所以有徴于後者固在此然至于今而不泯者則又有說焉晉范宣子自謂其祖歴唐虞夏商以來皆顯且大可謂不朽矣魯叔孫穆子則謂之世禄其所以不朽在於立徳立功立言今張氏之世可考者亦既顯且大矣若益勉於三者卓然垂世而長存則張氏之顯且大有已哉居傑以是集徴為序故為序而道之棠隂清晝圖詩序予友尹源本深為縉雲知縣以代還出棠隂清晝圖一巻示予曰源之為縉雲也未嘗敢以非道加諸民常欲有以惠利之然而未能也方師古之善為縣者而庶幾焉而遽以代歸縣人耆老寫此圖為贈源不能辭源豈敢自擬於召公哉接乎目動乎心庶幾可少進焉此源之意也先生幸有以教予謂人之所得於天者其道同故聖人可學而至豈特召公哉以召公之心行召公之政則亦召公而已矣方公之循行南國或聴訟於棠下慮民之従已者勞也従已者勞且不忍况殫其力竭其才乎宜後人之思其徳而愛其樹也世之為令治百里之邑人之所望者為利於已也苟如召公而毎加厚焉使寒有衣饑有食勞役有時征斂有節幼者遂其長老者遂其安誠如父母之於子則人當廟而祀之尸而祝之矣豈止思其徳愛其樹哉然而有志者葢寡也於是有嚴刑以立威侮法以矜智貪利以養禍長惡以濟姦含垢忍恥以自容媕婀姑息以自逸者由是而人皆失望人既失望則將有遐心而何懐思之有哉本深去縉雲而民以美召公者貽之則其政之得民可知矣本深謙譲弗居且將慕而勉焉誠可謂有志之士異乎世之傲然無恥者也予嘗與本深同遊鄉校知其心淳厚而和平將必能進於是矣故為序其端工乎詩者申以勗之贈呉君景春詩序呉君景春毘陵人永樂中以才舉擢泰和令辭其常禄一取給於家其為治以慈恕為本凡有教令必諄諄然親禮君子而愛恤細民事皆辦治當是時為郡守者尚嚴急入小人言不慊意於君㑹朝覲來京師以為不職言於吏部當解官衆謂君曰守嘗以事委君以亷能譽君矣今文符具在而反誣若此盍自言君曰我若自言彼得無咎邪吾無愧於心足矣何以辯為衆以君為長者予邑士大夫皆惜之而贈言以明其志君歸娯意於山水之間囂囂然自得也而泰和之人之念君與君之念泰和皆未嘗忘於心今年來北京既與予輩相懽如曩時邑之細民之在京者皆忻然趨拜曰安得公復臨我哉葢自君之歸向之郡守既以嚴急取禍敗而後之為縣者多貪殘苛刻無誠心愛民或懵劣不勝任姦弊日滋民苦之是以思君孔子曰君子學道則愛人愛人仁之施故為縣者患無誠心愛民茍誠心愛民民豈有不化事豈有不治彼懵劣不勝者固不足道矣貪殘苛刻乃仁之反而民之賊也則予鄉人之思君葢誠有激乎心者矣呉君家宜興衣冠文物為鄉邑之望田園足以給朝夕池沼足以供㳺釣逺近之賓客可以觴詠而徃來推其貲之贏又可以施惠於鄉黨其心葢無不樂也豈介意於用舍哉而予知君存心之厚葢君子人也故於其歸率諸公賦詩送之而為序如此且以示其鄉人使知其果可重也胡先生挽詩序太子賓客頥菴胡先生以正統九年某月某日卒于南昌里第訃至京師禮部以聞上為之惋惜遣使賜祭命有司治墳塋京師士大夫聞之莫不惻然傷悼致賻奠之禮於其𦵏也又為作哀挽之詞使執紼者歌以送之葢先生之學問文章施用於朝廷流播於海内而清徳懿行表然為儒林之望宜乆生於世使後進之士得有所取法而敏於為善乃今已矣則凡知先生者其安能已於情哉情動於中而形於言此哀挽之詩所以作也憶永樂之初直取進士入翰林先生與解胡諸公皆在内閣太宗皇帝親任之直先叔祖啓翁先生在洪武初為監察御史與先生之叔父虞部府君同朝為莫逆直是以辱愛於先生未幾先生去為國子祭酒師表天下及脩太祖髙皇帝實録直與執筆其間而先生為總裁所以教愛者尤至然先生已多病不能復談笑如曩時仁宗皇帝即位念先生病乆故不欲煩以政加太子賓客俾致其事還直持勅賜之士大夫以為榮先生既歸雖聲問不至於朝廷而在朝之論舊徳耆俊必歸於先生達官顯人與東南好文之士之徴言者足相躡於門先生應之不倦人得而玩之不啻若拱璧以直之愚而先生賜之言大篇短章渢渢乎其盛也嗚呼先生不可作矣而其言存直毎讀之不知涕泗之横流也則直之哀葢又有甚者焉漢之挽歌有薤露蒿里二曲薤露以送王公貴人蒿里以送士大夫庶人皆歎夫人命之不長今先生年躋八十不可謂少矣且官至三品徳望之隆國恩之厚天下之似者葢少可以無憾矣獨吾黨之士所以哀思先生葢有在於此之外者皆於詩見之故敬為序使後之人有考焉萬安横街劉氏族譜序仕者至於長子孫而人愛之不衰則其徳之在人可知矣然非其子孫脩身慎行足以繼前人而欲得此於人葢難也唐狄仁傑為魏州人感其徳而祠之及其子景暉為暴於魏魏人遂毁仁傑像嗚呼景暉不足道也魏人亦薄於義哉今予觀之萬安劉氏而知其前人之徳子孫之善與邑人之義矣劉氏本祥符人當宋之季有功甫者丞萬安奉父漢臣母蕭氏以來萬安之人恱而戴之既而功甫與父母相繼没其子七人世亂不能歸留居邑西之横街邑人敬而禮之曰此吾故丞之後也至于今十世二百餘年衣冠益盛而人之敬禮有加非其前人之徳子孫之善與邑人之義烏能如是哉徃年予聞其族有昭年者以齒徳重鄉邑其子俊英克肖之予心慕焉昭年以族屬多而散處繁不可以無紀乃作族譜以著其本而聨其支俊英又編為譜圖以便觀覽其意葢欲正倫理篤親誼以不愧於前人父子之心何其厚也歴三十年俊英之子刑部員外郎廣衡與族兄臨武教諭有臨又取其當書者而續書之將刻梓以傳其心亦其父祖之心也自古受姓命氏皆有爵者之子孫歴世逺者徳盛故也然前人之徳不可恃也貴乎有以繼之徒恃而不能繼而欲乆且盛焉亦難矣欒武子有徳于晉晉人思之如甘棠之於召公至其子黶汰虐日甚及武子之施没而黶之惡彰故盈受禍以僨其家由是推之狄景暉之不及禍葢亦幸矣是故本之以仁行之以義體之以誠持之以敬前以此始而後以此繼則其流澤之長傳世之逺孰禦哉劉氏之立於前者既美矣繼而不窮予猶有望於其後也廣衡端厚勤慎士大夫稱其賢他日所立當又有大於今者足以光前而裕後予重之故因其請而為譜序如此任處士挽詩序處士姓任氏字保沖世居泰和北門以醫聞州里至處士樂閒曠自便不肯役於物徙居城西之匡村田園池沼足以自養茂林宻樹足以嬉遊環縣之山足以適乎目恱乎心由是於聲利榮寵益不以屬意居嘗無事或一至城中遇故人親戚飲酒談笑及暮而歸其心葢囂囂然也篤意教其二子敬立敬敏遣從予大父竹亭先生及蕭先生尚仁敬立以伯父保宜命為後舉為醫學官為龍泉訓𨗳敬敏亦為里塾師遂與予同遊鄉校皆有賢名處士益自得曰惟天與祖宗所以厚我者至矣我何為不樂哉予嘗造處士處士知予與其子遊亦忻然相愛忘其年之長也其於他人亦皆有恩意見其為不善即勸之使為善人有負不平來告者處士以義裁之無不意滿而去蓋其色溫氣和而持心寛厚平易故為人敬服如此後予竊官京師處士以永樂某年某月某日卒于家凡知處士者無䟽戚愚良皆痛惜焉於其葬也士大夫多為詩挽之此可以知處士之徳矣予嘗觀夫世之豪傑士其貨利足以餌衆人勢力足以傾里閭言論可否以為人之輕重視夫安常守義之士真不足當其意然人之服以心者少也至於其死遂騰口說於後甚或至累其子孫其得相忘於人已幸矣求一言以哀惜之何可得哉若處士葢亦安常守義而已非有赫然動人者然生而人敬之死而傷悼焉是豈可以茍得哉予故為序其詩觀乎此者好善之心可以油然而生矣敬敏今為古藤知縣以文學政事稱於時詩葢其所輯也皋蘭黄氏宗譜序皋蘭黄氏宗譜者譜黄氏之居皋蘭者也黄氏之先葢出於陸終世逺代分譜牒亡失其家揚州之興化則自元治書侍御史大有始三傳至士源為髙郵軍照磨因家髙郵士源孫志道又徙平涼再遷于皋蘭故遂為皋蘭人至其子翰林編脩廷臣兄弟及其孫瑨琮輩纔八世廷臣欲脩譜以明其所自出而歎其先不可考慮不足以傳信後世乃㫁自治書始録其可知者為書其出處履歴生卒娶葬之詳皆謹書之欲以傳信也古者受姓命氏皆有爵者之子孫故國必有史家必有譜然燕自召公至惠侯九世已失其傳次名謚此史之弊也太史公作燕世家亦從而録之不敢加一辭焉懼不足信也故夫有家者作譜以明世系宜録其可知而闕其不可知牽合傅㑹以自誣豈尊祖敬宗之道哉黄氏自治書以來世有禄仕至編脩乃以文學致身為史官蔚然有聲於當時而黄氏益顯雖治書以前失其傳而其祖宗積善累慶以昌大其子孫可知矣自兹以徃徳善相襲累而積之雖傳至乎百世可也松柏生於髙原至於大百圍歴千嵗江河之流逾千萬里而必至於海者其本源盛故也子孫之視祖宗水木之本源也培其本以滋其末浚其源以達其流則愈乆而愈盛其有窮也哉廷臣以此譜求予言故不辭而為序之以告黄氏之為子孫者贈陳㕘政歸山東序予友陳公士啓之為山東右㕘政也乆矣今天子即位大正庶官以新天下之治謂布政司所以統治府若縣者也布政司官皆賢則能察屬吏之賢否而進退之民庶其受福矣於是擇遣御史分行天下考察羣吏而必自布政司始焉時山東之為右㕘政者凡數人御史㑹藩憲大臣議其所以去留者為之長者皆曰莫如陳公問諸寮屬亦曰惟陳公為賢又進諸吏而問之亦皆曰莫有宜於陳公者御史亦㢘得實言於朝獨留陳公而遣其餘之吏部别用焉未幾陳公考績來京師吏部以為稱言於上還之山東上又俾錫之誥命以寵賁之陳公可謂榮也已予嘗論之天之生賢所以為治也然置之羣庸之中而無以别異焉則相率為怠相觀而化者有矣雖或有傑然不變者然亦鮮也故治天下者惟進賢退不肖而天下治矣然昔之為治者簡賢棄智有焉賢不肖混淆有焉此不足道也郭公知善善而惡惡若可為治矣然善善而不能用惡惡而不能去郭亦以亡用是以知人君為治惟在於辨别賢否而用舍之辨别則致其明用舍則致其決斯於治天下也不難矣堯舜之治用此道而已聖天子躬堯舜之資以興天下之治故為是以勸勵在位者詔下之日逺方之民相扶攜而聴之皆喜且泣願少緩死兾見徳化之成而所以宣上徳以慰民心者非在於陳公輩乎陳公閎達周慎偉然君子也其不負所職也審矣予誠有望於天下之為布政司者而於陳公乎發之故書以為贈行詩序而諸公之作則係乎下方贈獨孤郎中省墓序予幼則從鄉先生曽仲章讀書因與獨孤君樂善遊相好也先生教人嚴而有法尤於樂善加意焉樂善亦感勵自奮早夜不懈有以稱其意其後樂善以推擇為邑庠生予則浮沈里中十餘年亦被舉入邑庠復與樂善同學夜則焚膏讀書相繼至於旦旦即探題為文章務以道義相鐫切又四五年遂同取進士入翰林為庶吉士乆之樂善去為禮部主事秩滿陞工部郎中改北京禮曹郎中所至皆能舉其職凡為其長與同列者皆曰樂善君子人也然人有未盡知者而予獨深知之葢自予交樂善於今殆四十年見其小心恭慎守禮而畏法未嘗以貧富貴賤易意如是者將終身焉信乎其為君子矣今年春天子加恩羣臣凡任職者皆封贈其親於是樂善之尊府文彬先生得贈北京行部禮曹郎中母廖氏贈宜人賜之誥命樂善既拜賜遂援例請告展謁于墓下又賜鈔二千貫以行嗚呼朝廷之恩厚矣然亦可見為善者之有後也予聞樂善之大父景芳先生與其尊府皆孜孜儒術非善不為而皆以隠約終其身其所積者未發也樂善早孤無厚業惟呻吟呫嗶之間思光顯其先人當時大夫君子皆有以信其必然者葢善惡之報天道固未嘗違也今樂善遭遇聖明居官食禄者二十餘年復蒙恩追爵其親第五品赫然為鄉邑之光此可謂無天道也哉今之歸也鄉人父老之知樂善者必皆嘆嗟羨慕為其親榮之而凡為善而未享其報者觀之亦可以無怠矣故序以贈其行送曽學士詩序洪熈元年四月上命皇太子恭祀孝陵於南京一時文武侍從之臣皆上所自定而春坊大學士兼翰林院侍讀學士曽君子棨在行吾黨之士榮君之去相率賦詩贈之而俾予序予謂贈者有所増益之謂也君在侍近二十餘年其雋偉之才該博之學雄肆奔放之文章傳誦於天下天下之人仰望其聲光也乆矣蓋所謂顒顒昻昻如圭如璋令聞令望之君子也其所以充乎内施乎外者豈有待於贈言也哉雖然昔者仲山甫之有行也尹吉甫作詩送之道其徳行之美職業之脩祝其速歸于王朝所以慰安其心而致其殷勤篤厚之意者朋友之誼當然也則今之所以贈君者其可少邪君宫臣之首上所擇而任者也朝夕左右輔養睿徳以隆國家萬年太平之本其任豈不重乎予聞之陳古道則感人也深言近事則動人也速况乎祖宗積累之故哉今之去其所歴也逺矣太祖皇帝平定天下經營規畫之跡可考見也當其龍興濠上取滁和渡采石定鼎金陵經畧吳越然後出師下梁豫迅掃齊魯燕趙之區而天下定矣然元之季世干戈饑饉民之存者無幾太祖皇帝既安定之承以太宗之聖深仁厚澤洽于天下五六十年之間人物生息所在繁滋以至于今葢太平極盛之時也夫其創業之艱難守成之不易與夫民生之急於衣食以養生送死其可言者葢多矣是皆所謂養徳之資也豈特詩書所載堯舜之道哉君於此其亦盡心焉耳矣崧髙之詩曰小心翼翼古訓是式又曰夙夜匪懈以事一人此君之所能而予亦為君誦之庶幾古人之誼也予與君同僚而去留各異故惓惓之情如此他日還朝樂其職業之脩尚當相與歌咏之而君其亦有以處予也哉西域行程記序西域之國哈里差盛强其次則賽瑪爾堪葢自肅州嘉峪關西行九千餘里至賽瑪爾堪又二千八百餘里乃至哈里所經城郭諸國凡十五六其人物生聚有可觀者葢無幾唯此二國物産之饒風俗之豪侈逺近賓客之所輻輳大畧相似然無舊志可考不知於漢唐為何國此地之所以陋也我太祖皇帝受命有天下四夷君長莫不奉貢唯西域逺國不能自達仰聲明文物之盛而興其謳歌朝覲之心乆矣太宗皇帝入正大統仁恩義澤靡不沾被其諸君長則皆稽首南向曰聖人之徳猶天也庶幾其撫我乎上知之擇廷臣之賢者徃焉而陳公子魯實當其選公忠厚樂易恭已愛人敬慎之心乆而彌篤徧歴諸國宣布明天子徳意未嘗鄙夷其人是以其人不間小大賤貴皆嚮風慕義尊事朝廷奔走送迎惟恐或後既而各遣使者來謝恩闕下貢水土物公則以其所歴山川之險易人民之多寡土壌之肥瘠貲畜之饒乏與其飲食衣服言語好尚之不同備録成書上之葢一舉目之間可以想見萬里之外公之用心亦至矣予讀皇皇者華之詩而知君之所以遣使與使之所以事君葢君在上不與逺人接也故遣使以宣已意達下情為使者欲副君之意而廣其聰明則咨謀度詢其可以緩哉公之上其書正此意也此孔子所謂不辱君命者也公所上書詔付之史官而藏其副於家後之君子欲徴西域之事而於此考覽焉其亦亮公之意哉贈訓𨗳梁叔荘序叔荘名栗予戚也以縣大夫之舉與予子䆅皆為縣學訓𨗳梁氏世儒家多以文學致通顯叔荘之為訓𨗳卑卑於呫嗶之間自常情視之有不慊於意者然予則甚重之蓋道在是也故於其歸試相與言焉夫内外百司之執事茍有才者皆足以任之惟訓𨗳之職甚重所以成賢才而為治天下之本其道則仁義禮智著於心著於經當朝夕進諸生講明而服行之本於身形於家而達於鄉黨州閭自人倫之近以至萬事之舉措皆盡其道則發於文詞者非虚言而施之政事者皆實行賢才成治道盛矣訓𨗳所繫之重葢如此然其所以教豈徒然哉身有之則下化之不然未有不相校與相夷者然則為訓𨗳者固當脩其身以為之本也予嘗觀之世之任此者多矣能盡其職十不一二見也棄背其親愛奔逐於權利疎君子而親小人出徼幸犯危難而不顧或沈酣於杯酒之娯或陷溺於市井之習甚則懵然不能措一詞若是者比比也則於言教且不可况脩身以為成賢才興治道之本乎此其人皆大夫君子所切齒能免於其身葢幸矣而斯文之不幸也叔荘好學而明道其言慎其行端其文暴著於外葢不忝於其職非予之所嘆者賢才之成可必也然君子之學葢終其身而後已未嘗有間也叔荘其尚加進也葢道益明身益脩其立教之本益厚而收其效益無窮則叔荘豈但為吾邑之望将天下之望也予言之煩如此葢相厚之至且使予子觀之亦有所警發也石潭八景詩序劉先生髦居永新禾川上川水自義山來百餘里至先生所居滙為潭泓渟静深洞見毛髮尤於良夜觀月為宜心甚樂之學者因號為石潭先生先生講授之暇即徃坐潭上縣之巽隅有兩峯巍然正在前衆山莫之敢抗雲浮兩峯間悠揚上下葢所謂無心於出者先生有契焉川上漁艇徃來欵乃之聲相應和旁有澗水水上為石橋俯視之亦清澈可愛先生意愜則循石橋行芳草間尋孚惠廟古碑而讀之蓋囂然自得也暮歸坐林屋掩重關青燈熒熒學者更請益先生應之不倦夜乆神祠鼓罷乃退休黎明道院鐘動即起盥櫛正衣冠坐堂上講授如常時時先生年幾七十矣間取其景物命為題曰巽嶺雲閒石潭月皎小橋流水芳草殘碑江船漁唱林屋書燈叢祠暮鼓道院晨鐘與士大夫歌咏之先生子定之為翰林編脩諸公聞先生之風者亦多為賦詩定之取而書之冊復請予序其端予謂山水之樂非仕宦者可得而兼也故雖不能忘於懐而亦有不得不忘者勢使之然也先生以子貴封翰林編脩有名爵之榮而又得山水之樂天之於先生何其偏厚如此哉然古之君子喜盡天下之大觀故予尚有望焉今之北京萬方㑹同之都也山河之雄深宫闕之鉅麗聲明文物之炳煥誠超越古昔而有所謂八景者賦詠之傳於天下乆矣先生倘遂一來得接於耳目而播之聲詩豈不快然樂哉予輩得從先生遊而訪石潭之所以樂是亦一快也故為序其詩以俟樂氏族譜序泰和禾溪之有樂氏自糾始葢由五代時來居之然舊譜亡不知其所以徙在宋時屢有佐郡縣舉進士入太學者葢衣冠之族也元至正間大成甫再以明經舉不偶於有司而科目亦隨廢國朝更化樂氏子孫唯大成甫在因不復求進而惟肆力於詩四明烏斯道與予祖竹亭徴君常為序其集此文獻之足徴者大成四子曰孟堅仲韞叔潤季美孟氏先卒予不及見之而惟識仲叔季皆忠厚樂易表然其鄉之望也其諸子孫皆讀書守禮義象明闓爽有才欲見用於世而弗果象乾今以賢舉當得官其在京師數過予因以族譜求予序葢其諸父之所脩也自象乾之子泝而上之凡二十世歴五百年其變故多矣而樂氏子孫猶有顯者其慶澤之長豈非世徳之盛之驗與然所謂徳者莫大於仁義仁義之實孝弟而已孝弟脩於身行於家而施於宗族倫理以正恩誼以篤斯足以亢其宗使人人而皆如是焉則光明碩大雖復乆於是未可知也且為人後者不可恃其先徳之盛而當脩徳以繼之然後能悠乆而不窮晉欒武子之徳非不盛也而黶以汰虐繼然賴武子之徳以保其身及武子之施已没而黶之惡實彰於是盈䝉其禍以仆其家由是而知世家大族實由祖宗立徳以啓之而尤貴乎有繼也樂氏既有立於前而又有繼之者是以能盛至于今後之人欲迓續而引長之其可不務徳哉予故為序其譜如此是亦相厚之意也段㕘政母夫人慶夀詩序山東左㕘政毗陵段君時舉之母夫人以元至正丙戌某月某日生至於今洪熈乙已年已八十矣段君樂其母之壽且康也以是日大具酒殽盛賓客以為慶翰林侍讀李君時勉侍講羅君汝敬等聞之謀曰吾與段君同舉進士入翰林受先皇帝命進學於中祕又同官京師十五年其相好最深夫人在堂嵗時拜慶豈特吾黨輩哉雖為婦者皆然矣而夫人之所以提攜誨𨗳者皆有徳之言則視夫人猶母也今安然獨存享其子之禄其為慶幸豈細哉顧相去逺不得厠賀者之末曷相與為詩致頌禱之意而遣之山東使歌以為夀焉衆皆以為宜詩既成而俾直序之嗟乎夫人可謂盛福也已古之論福者皆以為有徳之應葢曰玉瓉黄流之相宜也夫人之徳脩於身儀於人有足重者則福之降于天者孰能禦哉世之人徳足以致福者有矣而或不能乆也幸乆矣而或困於疾疢不能以自樂也可樂矣而為子者或不能賢且貴也則安得無慊然于中邪今夫人有其福而夀考康寜精神不衰段君以才行著稱致位三品而當聖明無事之時得以其禄敬養焉其得于天者豈不全備矣乎詩以頌之蓋宜也雖然福系於天若不可祝而有也而人於其所愛敬者則必以是祝之葢曰天之能従人欲也故詩曰夀考維祺以介景福又曰君子萬年介爾景福葢非是不足以致其愛敬之心則頌而禱之亦宜也此諸公作詩之意也抑聞之詩者歌詠其事而信於後世也蓋觀其言則可以知風俗之盛衰人事之得失是以百世之下讀行葦既醉之詩而周家太平之盛仁厚之澤可知矣今諸公之詩雖為夫人慶夀而作然所以従容而致此樂者葢以時也則後世有得此詩而誦之者不獨以知夫人之福而國家慶澤之隆豈不於是而可信哉故為序之詩凡若干首筠隂堂詩序郭公子齊拔俗之士也於他物無所好而獨好竹居吉水之富溪有隙地皆種之既成林矣乃就隂作堂以休凡賓客之有文者則相與講論其中他莫得至焉元進士河南艾元暉名曰筠隂堂而為之記一時名士皆賦詩今三四十年公年亦九十餘矣尚康强無恙士大夫之徃來斯堂者不異於昔時去年公之孫用楷由縣庠充貢來北京北京之能賦者聞公之所好如此又相與詠歌今用楷以選舉得長樂教諭將歸拜公於堂上舉酒歌詩以為夀而請予序之予謂天下之物非可一二計也而人之好之必以類張湛之於松陶淵明之於菊林逋之於梅周子之於蓮花葢以徳之似也若公之好竹非其清操直節不為流俗之所移與竹之清虚勁直凌風雨傲雪霜而不變者同歟昔人謂君子比徳於竹然則公其君子哉為公賦者其亦好之以類哉予嘗聞洛陽之牡丹維揚之芍藥天下所不能加也名公顯人之居此者莫不好玩而歌詠之雖其品類之殊特姿態之妍麗不過數日之賞而已豈足以供玩好於悠乆哉至於竹其容色皆不若彼之移人而君子好之不厭豈非此以其常而彼以其暫歟抑生植之類固各有所遇歟雖然昔之人有好竹者矣晉之七賢唐之六逸皆當時之望然而沈酣於杯酒之中放曠於名教之外好徳之君子不取也今公與賓客者遊其不為此可知矣宜乎吟咏以著其美也抑又聞之衛武公年九十五矣猶篤於自脩詩人賦淇澳以美之詩凡三章皆以緑竹起興其言有次第美武公之徳積而至於盛也今公之意其亦若此也乎夫徳者夀之本有其徳斯有其夀矣用楷歌詩以為夀乃所以歌公之徳也竹云乎哉予故為序之以發其意云送山東右布政使張公復職詩序予嘗讀召南之詩而嘆文王之徳之盛也葢其徳備於身形於家達於其國矣而召公則宣布於諸侯化之所及其人皆親上樂義而其女子皆有嚴敬貞静之徳而在位者亦皆節儉正直之人其仁民之餘恩又使庶物極其蕃育而後已焉此文王之所以為盛也然召公之循行南國也不肯煩勞其民或舍甘棠之下以布政焉後之人思其徳至不忍伐其所舍之棠則其殷勤篤厚煦養化誨之意入於人者葢深矣故其效至於如此千載之後因其詩而稱文王之徳與召公之功不衰於乎何其至哉我國家受命有天下今皇帝以文徳治之其智如神明其仁如天地真所謂堯舜之主矣其布徳施惠于外者則有布政之使葢古召公之任也而張公子深當山東焉張公始由兵部郎中㕘山東之政既而以簡擢陞為使其宣上之徳以及乎民者乆矣夫古今治道一也張公能以忠厚之心而奉行仁愛之政則治化之成亦何異於古人哉山東之地雖廣也其在位之君子宜有如羔羊之大夫者矣其人之親上樂義與其女子之徳宜有如采蘋草蟲諸詩之所賦者矣庶物之蕃育亦宜有若騶虞之所咏者矣其民之感慕張公而愛及其物者又宜有若南國之愛棠者矣惜乎其詩之未傳也張公今以考績來京師天子還之山東葢欲乆其任而兾其治效之大成也張公歸矣益廣上之仁以惠乎其下他日有采其歌謠而被之樂官萬世之下因是而仰聖明之徳而稱張公之功豈不盛哉張公將行其友翰林侍講陳光世率同列之賢取其道途所經山川景物分題賦詩以送之而屬予為序故予為言如此亦公之志也歟抑菴文集巻四
