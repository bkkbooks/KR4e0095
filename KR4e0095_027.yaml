body:
  text: 抑菴文後集巻十四明王直撰序癸丑年㑹試録後序國朝設科取士以興太平至於今乆矣四方萬國咸仰德化太平之業蓋古所未有也宣德八年春行在禮部㑹試天下所貢士尚書臣濙以考試官為請上以命少保臣淮而臣直亦忝與焉拔其尤者百人皆當時之極選也臣直嘗論之天以斯民付之君俾治而教之然其治教之成必用天下之賢才辟之飛龍在天雨下土澤萬物必風舉而雲從之也於是為之生賢於天下人君成其才而舉用之使得以效其績豐功盛烈巍巍煌煌唐虞三代皆如此也皇明聖聖相承德同堯舜而輿圖之廣則過之深仁厚澤洽被天下然猶孜孜養賢以為致理之本天心悦鑒而賢才之出為用者蓋濟濟然也由是而知上天眷愛聖君莫大於以賢才遺之此豈偶然之故哉自洪武庚戌詔下興賢今十八舉矣得人之盛化理之隆皆列聖大德格天之所致也諸生䝉朝廷教育之恩今復登名於此榮顯光大蓋自是始矣其可不知所自哉故臣為小録序而必推本於上之德與天之意使皆知所自重而懷忠敬以圖報則無負所學無負於君無負於天矣贈楊訓導序予泰和多儒家楊氏其一也自宋以來多顯者至今少傅兵部尚書兼華蓋殿大學士士竒先生而益盛其他以經術為人師者蓋累累焉叔猷名徽先生從子也通易經有名在鄉邑今年宣城缺訓導聞叔猷之賢上其名於吏部徴至京師試在優等遂授職而去将行詣予求一言嗟乎予何以告叔猷哉夫學校者王政之本也何言乎王政之本蓋賢才所自出賢才盛則治道隆不謂之王政之本可乎然所以為教者豈有他道哉孔子之教人文行忠信而已學文者致其知也脩行者履其道也學文脩行而本於忠信則所學非空言所履皆實行師以是為教弟子以是為學其不賢者鮮矣今學校皆宗孔子宗之者宗其道也宗其道則必從其教然而有不從者何也上有違者則下必甚焉師也者成賢之本也文行忠信必謹於聖人之教然後以訓則從以令則行賢才安有不盛哉師茍違之而汲汲於私則弟子必逺違之而沒溺於其私由是能學文者或有矣脩行者少也存忠信者又少也况於學文脩行而存忠信之全者乎又有甚者併其文棄之唯誦他人之陳言以徼幸一時然而上下相安自以為足矣使果徼幸得之奚補於治哉亦豈建學立教之夲意哉波頽風靡之餘為師者可不惕然念之乎宣之人士聰明才俊者不少叔猷之去必謹於聖人之教以導之使人人皆賢皆足以用於世有益於治道則叔猷無負於其職而亦無愧於先生予素愛叔猷而欲成其美故相與道之叔猷無以予言為迂也贈劉同知詩序嘉興於浙為劇郡其地大其人衆賦稅之所出詞訟之所逮科徴力役之所叢委他郡鮮及也故為之者必剛足以去私明足以燭理敏足以應機智足以察情偽然後能舉其職不然鮮有不致民怨速官謗隳業而敗名今之仕者得此率多以為憂惟其才行若予前之所云者則樂為之蓋非盤根錯節無以别利器也予性最迂才最下然獨喜聞人之竒節偉行嘗計天下之劇郡亦無㡬徃徃從人問其所以治茍有慊乎心則為之欣然若自已出者此予好善之心也山陽劉侯縉紳為嘉興同知予未之識也而其姻戚禮部郎中蔣廷暉與予厚數為予言其賢謂其才行蓋有若予前之所云者浙之藩憲大臣與凡朝廷之逹官貴人有事於嘉興者莫不賢之予聞而心慕焉然恨不得與之處而䆒其治之詳以自快也今年以考績来比京將復歸嘉興廷暉率諸能賦者作詩以送之而求予序予雖未之識然不得辭國家考課用有虞之法三載考績三考而加黜陟焉所以勸賢能而礪頑鈍也然賢者豈待勸而後進哉彼其所學者聖人之道固將以用於世也聖人之道測之益深窮之益逺故學之無已而後始終之或異則非所謂賢也劉侯之所立既足使予慕矣由是而益進則予之所慕將加焉劉侯勉哉他日相見而究其成也贈員外郎朱藎臣序藎臣名忠松江上海人初以明經取進士為行在禮部精膳主事以勤慎得名尚書毗陵胡公知藎臣之才言於上超授精膳員外郎於是郎中程瑩伯玉等皆喜藎臣受知於公而䝉恩於上也求予文贈之夫其欲贈之者蓋美其所已至而期其所未至也古之君子之處友也率以德義相輔以功業相先勉其大者逺者而不安於近者小者焉其慇勤篤厚之意蓋因心之自然而非矯飾偽為者政化淳風俗美此之由也後之君子馳騁於勢利之塗而任其智術之巧凡已之所有惟恐人或踰之而其所無者亦懼人之或勝也於是媢嫉之心萌刺毁之說興無怪乎其不古若也今諸公之於藎臣其惓惓如此不亦古之道哉予聞之君子之學非止於淑其身固將以用於世是以幼而學之壮而欲行之夫既遇其時而得以行矣則持其無倦之志加之以不已之誠雖有至焉而猶若未至充其器堅其所守則所受者大而所及者逺江河匯百川之流蓋已汪洋奔放至於海則天下之水皆歸之而不見其有消息焉者豈非大而有常故邪藎臣其務若此也哉子之父師固已命子矣名與字之謂也藎者進也進進而不已也忠愛之篤進進而不已夫然後謂之忠是故忠臣之義不以盡心於一事與勉强於一旦為足也必事事皆盡其心而終身不易焉藎臣尚顧名與字而益思勉哉則福禄榮名之歸於其身益大且逺矣此固諸公期望之意也故為序以贈之何彦澂挽詩序彦澂鎮江人其於醫無所不通非特擅一長而已其在太醫院二十年有名兩京仁宗皇帝最信任之凡用藥御批付彦澂彦澂進藥必収竒效由是寵遇日隆京師公卿貴人以至閭閻細民有疾多走其門求治彦澂不擇髙下皆徃治之凡其謂可者無不愈其不可者卒皆如其言蓋其心仁其術精故其所施如此予交彦澂乆居相隣者六七年受其惠也多矣今日益衰而病亦滋出方恃彦澂以為安而彦澂卒矣此予所以傷悼而不已也然豈獨予傷之凡公卿貴人以至閭閻細民嘗受惠者盖莫不傷也方其有病時予亟徃視之彦澂盖自謂不可為而予輩之愛之者則幸其速愈也孰知其言之信然邪嗚呼安得復有小心謙慎愛人如已若彦澂者哉予既衰且病而欲求安復何所恃哉雖欲不傷悼可得邪予嘗謂醫者仁術也必其心厚於仁然後能施惠以及人今之為醫者多矣而薄於仁者不少也視利之豐約以輕重其施而於病之可否則後焉或妄為抑揚以大肆貪利或知其不可而姑為好言以釣致其財若此者皆仁之賊彦澂不為也乃今已矣然豈有咎哉命也或者謂彦澂之善盖亦獲乎上矣而終未仕以卒彼不為彦澂者反光榮而乆焉惡在其為善哉嗚呼此亦命也君子安於命而已矣彦澂雖未仕而善足以不朽彼光榮而乆者惡知其不若彦澂也哉士大夫之傷悼不已者皆為哀挽之詩予故為序其説使觀者知其所擇云送林訓導序三山林雲瀚逹海故春坊諭德兼翰林侍讀尚黙子也尚黙以奥博之學雅贍之文蔚然為時所重而不幸已矣士君子皆深惜之雲瀚能服其教以明經有譽縉紳間於時錢塘縣學缺訓導浙江布政使黄君舉雲瀚任焉既至京師試在優等遂授職而去將行謁春坊庻子周君崇述告曰昔者先人之試禮部也今少詹事王先生以翰林脩撰與去取之任實重其文而進之其後先生為右春坊庻子先人又幸為同僚於契誼不薄也今生之去願受教而服膺焉敢介以請周君為道其意予心許之而未暇作也而周君數使来速文嗟乎予何以告雲瀚哉國家建學育才以為致治之本而師者又賢才之本也周子曰師道立則善人多善人多則朝廷正而天下治矣師之所係豈細哉夫自語黙動静之㣲至於人倫之大莫不有當然之理焉知之明行之篤然後道備於身彼弟子之所學者不惟於其教而亦觀諸其身身有之而言從之則其教入人也深賢才安有不盛哉且天下之理無窮君子之學亦貴於無已學之至則夫理之無窮者益有得於已而益足以資於人百川之流非不沛然逹也然汪洋渟蓄深廣莫測豈若海也哉鯨鵬之巨鰕蟹之細無不育焉雲瀚其顧爾字而思為海乎川者辟夫理之殊海者㑹夫理之一也如是而成已成物則今之為賢師者豈有加於雲瀚哉尚慎勉之予之所告者如此雲瀚見黄君尚以予言質焉送劉知縣序晉江知縣劉子珪予泰和人始以才舉厯事吏部以勤慎有名乆之擢知晉江晉江屬泉州濱大海去北京㡬萬里凡朝廷遣使徃諸蕃與諸蕃之来朝貢者多道泉送徃迎来與夫貢輸徭役視他縣為劇子珪治之無廢事其民亦皆安於其所而凡逹官顯人自泉来及福建藩憲大臣之有事於京師者亦未嘗或非之則子珪之稱其任可知矣今年考績来北京當復歸晉江郷邑仕者刑部郎中獨孤樂善等屬予文贈之予縻於職務不暇作然念與子珪居同邑又相知且乆不相見者已數年其来京師遂一邂逅相笑言即復散去終不得一餉之暇相與銜杯酒接慇懃今之徃也不知在何時復一見既見又不知能從容燕處否乎則予之贈文蓋不可已也自古治天下者率寄重於縣令蓋一縣之民之休戚係焉寒者欲衣饑者欲食少者欲其長老者欲其安勞役者欲得其平抑鬱而不舒者欲得其理一皆於令乎望也詩曰豈弟君子民之父母能推父母愛子之心以治民則民無不得其所而亦愛之如父母矣漢之為令稱魯恭卓茂是豈有他術哉能推此心而已矣今天子篤意養民尤重守令數詔天下舉堪其任者比又降勅凡知府知州皆令三品以上官薦舉縣令則令吏部慎選擇勿任匪人由是言也其所托重可見矣為守令者其可不思勉盡其職乎吾邑與子珪同為令者十餘人其政治皆彰彰然在人耳目予每聞人譽之則為之喜蓋喜予邑之有是人也子珪其益勉之卓茂魯恭亦人耳豈難及哉誠能之則予之喜滋甚矣故書以為贈行序贈楊訓導序楊弼之䕫為吳江縣儒學訓導將之官其從母兄監察御史任敬敏姻友龍叔粲輩以其嘗從學於予又交其兄之宜為莫逆屬予文贈之予謂之䕫非他人比也叔父少傅公以德行文學重於世士之有志於立者莫不願見而請教焉之䕫朝夕左右其受教多矣豈待他求哉抑予之言豈有加於少傅公哉而敬敏之意不可辭乃舉之䕫之先之近而可知者為之夔誦之逺者不暇及也有元盛時待制公與公之子清江主簿君平洲先生皆以文學有名於時入國朝來則有吏部主事子淵至今少傅公又昌大之之宜年雖不永而當時同學之士莫先焉此皆之夔近屬之親也是故廬陵論文獻者必先楊氏然豈獨廬陵哉今天下之士蓋莫不重也之夔承累世文獻之懿而去為教官吳江之人聞之安得不以得之為喜乎夫教官者以道淑諸人者也以道淑諸人而不本於其身而欲人之從而化焉不可得也道之在人自言動之常至於倫誼之大皆是也必真知而實踐焉然後以訓則行以令則從故曰師者人之模範模範既正則器安有不正然而能念此者蓋鮮矣役於物欲之途而昧於禮義之則上之所趨下必甚焉賢才之不成皆由於此也孔子謂子賤之賢而推本於父兄師友之䕫既有所承式矣則今之去人將於子乎觀也果能盡其道則當益喜曰是誠文獻之胄也誠少傅公之從子也豈不美哉不然其所訾病當益甚此固責備賢者之意也之䕫勉之贈布政使李公致仕序宣德八年春正月天下有司皆述職朝京師湖廣左布政使李公琦在焉上憫其老不欲煩以政俾致仕而去朝之仕者皆為公榮之公真定元氏人洪武中舉明經授監察御史陞大理司副其後復為御史改禮部主事陞郎中而為御史者最乆以稱職聞太宗皇帝時四夷諸國皆入貢上嘉其勤誠擇廷臣之能者徃撫其君長公以選在行其使安南占城者各再榜葛剌朝鮮者各一皆未嘗辱命今天子在位遂陞行在禮部左侍郎凡再徃交阯宣布恩德以綏靖其民人公逹於大體善談論言出而人信之既歸遂有湖廣之命蓋以旌其勞而公老矣然感上知遇終不自言至是乃得歸田里蒼顔白髪命服輝暎煜然為郡邑之光其榮幸豈細哉古者男子之生以桑弧蓬矢射上下四方蓋示其所有事也故幼而學之壮而欲行之然負其才而不沾一命不能以自逞者有矣其或沾一命足以見所長而不能善其後者亦有矣豈非盛時之難遇哉今公遇聖明之朝膺選擢之公持憲紀於内将使命於外凡其所學者皆得以行之歴仕三十餘年而以方伯之重歸老於其家仕之如公者蓋鮮矣天之於物既生長之而又斂藏之上之於公真所謂如天之仁也然予聞之古之君子雖老而歸其圖報之心終未嘗忘也必以其道教鄉人子弟使之孝弟忠信禮義廉恥處則為善士出則為良臣今公之歸而亦務乎此是亦報國之道也㑹昌伯孫公以戚里之貴與公相好尤篤屬予文以贈行予不得辭故為序如此送劉教諭序廬陵劉公鐸始教諭湘潭其後連丁内外艱居家今年春起復至京師調光州固始縣學教諭公鐸世儒家元廣東亷訪副使楚竒先生之孫前文淵閣大學士贈禮部尚書胡公廣之甥也公鐸既承家學之良而又受教於舅氏故其學有本源其在湘潭能以所得教諸生諸生傳其學而有得者甚衆永樂癸夘湖廣郷試第一人婁異者其髙第弟子也公鐸之固始其姻家翰林侍讀學士曽先生率諸能賦者賦詩以贈之而俾予序公鐸之來京師予數與相接觀其言論恂恂舉動不妄心固愛之則於其行何可愛一言古者大夫君子之有行也則其友作詩以送之舉其職任之重勉其功業之脩欲其速歸於王朝而無乆於外崧髙諸詩可見也蓋其道合志同殷勤篤厚之意如此則予之所以贈公鐸者豈外是哉夫教官以教為職其誦習者四書五經所講明者堯舜文武周公孔子之道而所與處者皆聰明俊偉之才也誦其言明其道脩於身行於家他日施於天下其為之有夲則效有必致矣今制教諭有成績者陞教授教授有績則陞為國子師其激勸也明矣然教之有道為之有績如吾公鐸者蓋少也豈非為教者又本於身故邪傳曰以身教者從公鐸之所以為教者豈待予言哉而予惓惓於此者誠欲公鐸益脩其職業而歸仕於朝蓋庻㡬詩人之義也故書以為贈行詩序贈馮經歴序國朝用有虞考課之法以勵百工熙庻績故凡在位滿三年或六年必考其稱與否然皆俾復舊職以觀其成而加黜陟焉由是賢才之授任使者莫不濟濟相慶以興起事功雖中庸之士亦各勉焉思奮以自效於當時是以法度脩明百揆時叙士君子之遭遇如此蓋可謂幸矣予嘗論天下之事必以人而興而人皆可與有為也患馭之無其道耳激揚懲勸之令行則茍且怠慢之意消矣茍且怠慢之意消則事安有不治功安有不立邪故雖虞舜之聖不能舍考課而為治也我國家致治所以比隆有虞者用此道而已於乎盛哉湖州馮遵道為都察院經歴既六年吏部考績以為稱俾復舊職以俟其成而加超擢焉用彛典也夫經歴之職誠可謂要矣蓋提其綱維而决事之當否者都御史也至於文書之徃來事之緩急皆經歴乎主之彌縫其闕而賛助其未至事若是其繁且難也夫既有都御史臨其上而相與處者又有監察御史之衆故非有公平之心勤勵之志敏給之才明逹之見者不能任也予嘗識遵道未暇與之從容然聞之衆御史矣蓋可謂有公平之心勤勵之志敏給之才明逹之見者也夫如是則俟其成而超擢之蓋善矣遵道既復職監察御史黄宗載彭百鍊等求予文贈之夫古之行者有贈言遵道非有行也而贈之言何哉豈非美其績之著而欲勉其至於盛歟是固相厚之道也易曰勞謙君子有終吉夫有功勞而能謙固善矣又終乆而不渝則善斯大也遵道在職可謂有勞而執謙矣在終勉之而已他日之福其可量哉予盖欲成人之美者也故因諸君之求遂書此以為贈送袁少卿歸省序尚寳少卿袁君忠徹予友也事太宗皇帝於潜邸以清謹直亮見知太宗皇帝既入正大統君亦歴職清華嘗侍左右備顧問凡廵狩征伐未嘗不在行今年車駕廵北邊君又以其職從太宗皇帝知其母在堂詔特封為宜人錫之誥命俾歸省焉㑹龍馭上升不果行既而以今上之命徃焉士大夫莫不榮之其同官朱君琇張君信鮑君麟葛君貞求予文贈焉予嘗讀四牡之詩而歎其君臣之為盛也蓋為臣者勤於職事而不敢顧其私為君者則探其情而歌咏之上下之間可謂各盡其道矣然將母之情則伸於卒事之日蓋未有當奔走之時而使之得遂其私者也嗟夫袁君有養親之心惟勤於職事而不敢自言蓋與成周之賢臣等矣太宗皇帝慨念而褒封之輟之扈從之中而俾遂顯榮之樂此誠過於三代之令主也夫人子之欲顯其親與親之以榮貴願其子者天下之同情也今袁君之歸拜恭人於堂上膺受錫命爛然雲漢昭囬之光母子之間蒼顔白髪而命服輝映煌煌如也則郷人之為子者孰不以恭人願其親而為親者孰不以袁君願其子皆勉為忠孝之行以自立於當世可知矣然則袁君是行也上有以彰聖朝恩徳之厚下有以起郷人孝愛之心則詩之傳於後世其所係豈細哉故不辭而為之序送陳訓導序吉水陳宏已以書經教於郷者有年矣今年舉至京師授新淦縣學訓導其友翰林編脩尹鳯岐合諸君子作詩以送之而告予曰鳯岐家居時與宏已相好蓋其為人敦厚亷静能以所學教諸生於周公孔子之道􅈤􅈤然相與講說其志蓋未欲遽進也而新淦缺訓導乃以幣走其門聘起之今既受命而歸惟離别之足惜而㑹合之不可常也於是有贈行之詩願以序請予謂凡小大之官皆命於吏部惟訓導有缺得自察舉是豈輕訓導哉蓋以為弟子者得審其師之經術行詣而知其所從學為訓導者亦得審其情性風俗而知其所以教夫既交相知則宜深相得而教學之有成可必也彼其意如此誠善矣宜察舉者之皆得人也然而有失焉者何哉蓋此之舉者不惟其經術行詣之可取而舉也茍焉而已矣彼之所應者不惟情性風俗之可以約而中也茍焉而已矣交相䝉互相賊而欲其教學之成可得邪故今有如吾宏已者宜為鳯岐之所重也夫新淦臨江屬邑也而於吉水為近宏已之居又近焉然則宏已經術行誼之正與其邑人性情風俗之良其相知之乆相得之深豈一日哉則其為是舉也皆宜也其教學之成必有加於昔者矣然則詩以送之亦宜也抑予觀之古者詩人送行之作如崧髙烝民之類道其德業之已至而勉其所未至故於朋友為直為諒為輔仁非以其為諛也今豈異於是哉而予為之序亦歎夫不如宏已者之失而深嘉宏已者之為得亦將有所警焉耳愚荘詩序愚荘詩若干首士大夫為潘君文奎作也潘君永嘉人其始由進士為行人乆之用薦舉為司直郎又陞漢陽府同知其五世祖希白仕宋為史舘檢閱因言事忤執政棄官歸隠郡城南以漁荘自號至潘君乃易漁為愚蓋曰無以光嗣其前人而自貶云耳此潘君所自道也今年以職事來京師知潘君者皆為賦詩通政使兼武英殿大學士黄先生潘君里人也俾予為之序予家居時已聞潘君取進士其所為文章盛傳於世予心慕之及竊第入翰林潘君亦來官春坊因得朝夕相周旋其色温其氣和舉止進退恂恂然君子也至其論辯是非别白善惡而為之取舍向背則有確乎其不可奪者予固知潘君智者也其相慕加焉今去十餘年而所以自號如此潘君豈誠然者哉夫暗於理道懵於事機言與義乖行與善違昧昧其所趍㝠㝠其所為顛倒迷亂莫之適歸是之為愚世俗之所詆嗤者也其所謂智者則又脂韋其行簧鼓其言變白以為黒斵方以為圓投間乘機與時化遷知利之是圖而不知道之云愆是之為不愚而君子之所哀憐者也於乎潘君其不如予前之所云者審矣後之所云者予知潘君亦不為是也其亦深惡乎此而欲韜其聰明斂其鑿枘循物理之自然而行其所無事不詭激不矯勵如禹之行水而為大智此則顔子之如愚而非若世俗之所謂者矣是足以光嗣其前人顯聞於後世而何自貶之若是哉故予為之序以發明其志使讀是詩者知潘君之非茍為異者也贈太僕卿仲君序仲君名昌沐陽人與予同登永樂甲申進士第連知安平泗水二縣皆以善治得名宣德初舉為刑部主事歴江西浙江二司又以詳讞得名遂陞郎中理山西刑獄益能勤於其職君周慎簡重不求人知京師要人多矣君不肯輒造其門以故識君者少而知君者甚衆每舉賢詔下未嘗不屬意於君然遲速固有命也及太僕卿缺衆謂莫如君者即列名薦之上即以為太僕卿凡南京之馬在牧者皆屬焉馬政國所重也論國之富者以之至於乘輿之駕征伐之舉蒐狩傳置之類蓋無不用其力故必得人以任之然後孳畜蕃給用足而國以富强古之致馬蕃息者衛文魯僖也詩人歌之曰秉心塞淵曰思無邪而孔子取之後之人乃不盡以為然此非知夲之論也夫牧馬在民馬益多則民益勞民疲而欲馬蕃可得邪惟有誠實之心能篤於愛民斯能盡牧馬之宜以收富强之效賢君之所存聖人之所取真萬世可行也前之任太僕者予不能盡知然能率是道則必能有成功其不能有成功者必不率是道者也不率是道豈獨無成功而已哉蓋猶有可嘅者仲君以經學入官經之言存諸心乆矣今列為九卿而以司牧為職予知江淮之間必將受其惠馬以之蕃國以之富其功大於古人可必矣若環滁山水之秀景物之美名公大賢之遺迹政事之暇足以資登覧之娛觴詠之樂此則予之所甚慕而不得者於仲君之行不能不有概于心其諸同列求贈言於予故為序如此而併書之贈劉司訓詩序安成劉清字源潔始以春秋領郷薦凡再㑹試禮部皆中教官選遂受舒城訓導以去舒城廬州屬邑也其地多良田昔之仕於此者率能興水利以利民故其田之所産視他邑加倍商旅賢遷通貨財者常相續而徃來是以其民皆足於衣食而無失所者夫既有所養而後可以教古之聖賢思復民性必始於厚民生論語所謂富而教洪範所謂既富方榖詩之所謂髦士而乃出於稼穡耒耜之中此可見矣彼其衣食不足而欲教之使興於禮義雖父母不能得之於子而况師乎夫既無不足矣而或怠於教或教之不以其道此則有司與為師者之過也國家安養斯民其恩德至矣而又篤於教誠千載之幸遇也况若舒城之人既有受教之資則源潔之去而欲教之成豈不易哉教之之道必始於讀書自倫誼之大至於日用事物之理必真知而實踐焉得於心之謂德著於威儀言辭之謂文二者備矣出而用之則足以興道致治然後為教之成此誠源潔所當務也然予聞之沃土之民既從容給足徃徃縱佚而失其良心長民者不豫為之防而師又不能以身為教且或從而䧟焉奚望教之有成哉今舒城之令人多稱為賢令也其能防民於善可知矣而教官又得源潔端表儀以率勵之舒城之士皆為才且良可必也予既重源潔而太學生康顒求予序其贈行之詩故為言如此蓋欲勉其教之成也贈馬運使赴任序正統五年六月行在吏部以福建鹽運使乆缺奏近臣二人請以一人任之上不許命别選以聞於是又以郎中馬駿等名進上即以命駿駿字之龍五臺人始自太學生擢為祠祭主事以小心勤慎得名滿九年陞郎中而名益著予出佐禮部察其為人心竊重之庻㡬得乆與處也今乃超擢以去雖不能不為之喜然顧少一助亦安能不惜其去哉之龍將行祠祭員外郎張鐓主事陳順篤僚友之誼其喜且惜之意蓋與予同也來請一言以贈行予既素重之其可已於言邪鹽之為物天地自然之利也管仲用於齊而國以富强後之有國者皆因之其為法浸詳而為利益大今之窮邊絶域富商巨賈盡瘁於供輸而兵食以饒民力以舒者鹽之利致然也興其利剔其蠧使所出不窮其所致者亦源源而來亹亹而忘倦則利於國大矣此鹽運使與其同列者之職也其任甚重故擇人甚嚴夫天下之事無不可為者惟以放誕怠忽處之斯不能有成功以之龍之小心勤慎而簡拔任此予知其優為之矣或謂之龍為郎禮部古所謂清選也今矻矻於財利將無少慊於心邪予謂君子近利而不濡於利乃為可貴以之龍為人果何慊於治利哉漢孔奮為姑臧長姑臧最富饒而奮獨以清儉自守衆皆謂其身處脂膏不能自潤光武知之擢拜武都郡丞以寵焉今天子明見萬里外不異於漢光之龍小心勤慎舉其職而又以清儉自守予知其寵禄日加而未巳也故為序以贈之贈陳學正序吾邑陳榖仲旦今年㑹試于有司以科額之拘也止得為教官吏部奏授晉寜州學正初仲旦與其兄仲仁同領郷薦而仲旦年最少吾邑之士誇羡以為難既而病不克㑹試遂偃蹇數科仲仁歴忠州學正九年又徃教松江而仲旦亦典教一州陳氏産此二人前後皆得為學正兩州之士賴之以成其才此陳氏之盛而亦儒者之榮也仲旦將行謁予告曰晉寜距京師萬里榖之去先生逺矣願得一言以自勗庻㡬其不辱也予曰國家之立學校所以成賢才而天下之治繫焉教之之方必始於讀書求道道莫大於仁義而孝弟其本也脩於身行於家推而至於忠君弟長仁民愛物仁義不可勝用矣如是而考其言觀其實列之庻僚之位天下豈有不治哉教官之職其重可知矣晉寜固逺然天之生才蓋無處無之子之徃也日進諸生而以是教焉動之以誠而持之以乆其才之成可必矣然試思之官以正為名學者之所取正也惟先正其身而後可以正人譬之規矩必極其方圓而後為方圓者得以法焉然則為師者固當以身為教子宜慎於其身哉晉寜雖逺無以逺自怠則無負國家建學育才之意矣仲旦喜曰先生之教是也榖敢不勉於是書以贈之贈段學正序吾邑段纉元述去年始自邑庠生充貢來北京翰林試在優等將升之太學適順天府開科取士遂以所學中其科今年㑹試禮部元述又在選中而局於額數故止得教官吏部奏其名以為雲南阿迷州學正阿迷去京師雖逺而朝廷視其民一切不異於中州既擇其土之豪典州事俾隨俗之宜而撫之必使之安生樂業而無失所者則又立學校命教官聚其人之秀者而教之使之愛親敬長忠君親上而興於禮義待之如此其厚也則元述之去宜待之以厚可知矣天之生人皆與之以仁義禮智之性不以逺近而有加損也彼之所以失其常者蓋氣習壊之而其本然固在也發其蔽而馴養焉未有不可至於善者然則所以美其俗成其才不在乎他在乎教官無疑矣元述學聖人之道豈徒成已而已固將以成物也則今之去豈非其州之人之幸哉或者曰元述有美才負竒氣使得沾一第而施之政宜必有可觀者顧使從事佔畢之間無乃非其志邪予曰第不第亦有命焉不足論也使幸登第而仕於有司執簡操筆伺候官長之顔色而為之進退或有未至則譴呵隨之其視朝夕㘴堂上進諸生講聖賢之道體於身見於行事而發為文章簿書期㑹不至乎前牒訴倥偬不撓乎中其樂之有無識者固能辨之况仕有司者未必皆顯庸而為教官亦自有榮遇元述宜思盡其道不當以目前之所得者為忻戚也元述喜曰先生之教是也纉得以服膺焉於其行遂書以贈之贈義民蕭德賛序予泰和多大家桃源蕭氏其一也蕭氏之賢曰凌雲翁予識之姿貌秀偉而襟度夷曠言必本乎仁義而充所施則亦不異於其言邑之東南所謂大家者莫過之德賛名襄翁之長子也其行蓋甚似翁而尤樂施貸民之䝉惠也多矣宣德甲寅歲旱甚明年大饑德賛大發廩賑之一郷之人無有失所者朝廷慮嵗之不易也詔有司預為備且勸富民發粟以佐官德賛聞之慨然曰吾幸有餘積既常與衆共矣曷若歸之官使自為出納乎即出榖千三百石以歸有司且别為倉貯之有司校其實而置守焉遂具以聞上嘉其意遣行人賫勅旌之為義民勞以羊酒復其家至是德賛謁謝來北京少師楊公與之素厚也名其堂曰旌義堂而為之記予謂人之生也雖有小大貴賤不同而受天地之氣以生則同也是以君子之心視人猶一體此有餘而彼不足彼饑而已獨飽焉豈能無慨於心哉故必推其有以及人此天理之所宜人道之當然也夫是之謂義然昔之人有視人之死而不肯費一錢亦有視其親戚之顛連而莫之恤者此獨何心哉教道之未至而偷薄之俗勝也今天子仁聖視民如傷治教休明恩澤滂霈上好仁則下好義是故有如德賛者宜其膺褒賞之隆而流聲譽之逺也嗟夫義非一人之德也邑之大家亦非一人也然以好義而蒙天子之寵命何獨於德賛見之孔子曰君子喻於義今德賛喻矣其他亦安有不喻哉故於德賛之歸為叙述其事原夫天理人心之自然以見其道之所宜如此有同然之心者心將感發而興起縣之細民尚亦永有利哉贈洪郎中序正統四年八月吏部言考功缺郎中而主事洪英滿九年考功事重非其人不可請以英任之上即用英為郎中命既下衆皆以得人為喜洪君字實夫閩之懐安人初領鄉薦㑹試禮部居第一及為主事屢更任使皆以能稱於時予嘗再考禮部所試士得實夫為同考遂無遺謬之歎其學優識明志正而行端非獨予重之士大夫莫不重也今為考功郎中人安得不為之喜邪夫有天下者必用天下之才以治之然才有不齊其於事功不能以皆奮也非核實勸勵之而欲使之亹亹以成天下之治難矣此帝舜所以有考績之法焉自是而後有天下者非不願治而考績之法非不立也然治鮮能如有虞者何哉蓋能以其法施於天下必托之得其人然後法行而功立茍不得人則是非失其真髙下失其平進退予奪不能當其可砥行勵業者或暗昧而不彰貪冐淫放舞文飾詐者或幸而遂焉如是則人何以勸治何由成哉夫為治在乎人而使競勸以興治則懸乎考功考功者治忽之所繫也學足以窮萬物之理明足以察萬事之實公足以服萬衆之心然後其任可得而舉矣彼人無所勸而功無所成者豈非不足於此故邪國家用有虞之法以課吏既有成功矣今而託之實夫蓋以實夫之學之明與其心之公足以任此庻績咸熙比隆有虞復於今見也考功員外郎李君茂宏輩喜得同寅以脩其職求予言為贈予素厚實夫故為言如此實夫以為然乎哉贈尹侍讀序予友尹鳯岐吉水人以明經取進士官翰林二十年有名於當世凡朝廷有所纂述考論鳯岐必預焉及脩先朝實録亦命執筆其間書成皆受賜增秩官自編脩脩撰至侍讀而人皆以為宜四方之士游學京師者多請益其門凡經指授徃徃中於有司然年至而病及之於是有思歸之嘆上察其實而許焉鳯岐世業儒初以經術教鄉人子弟未有志於進也江西僉憲黄君翰最喜士亷得鳯岐力致之郡庠未㡬遂顯於世而凡願學者倀倀無所受業未嘗不慨然慕之今之歸予深為其鄉人喜也古之君子進則道行於天下退則施於一鄉是故居禁密之地以講讀為職者必以堯舜之道開陳於上前其言行其道行矣及夫退而休也朝夕坐里門以孝弟忠信禮義亷恥教諸子弟教行則賢才成風俗美矣其進退所繫如此豈茍然者哉鳯岐之歸斂其所宜施者而施之於鄉鄉之多士得有所依歸落其華就其實賢才之成風俗之美將有盛於昔者矣予家泰和於吉水為近而予之茍得實先鳯岐十五年今老且病矣欲乞身而歸守先人之墳墓雖道不足以及人猶得時時詠歌聖化以繼康衢之謡使萬世之下有以考見皇明之盛倘他日遂焉當先過鳯岐以觀其教之成也番昜胡秉恒素相厚屬予言贈行故序以贈之贈布政吳君序吳君名揚字光訓新淦人國子博士致仕節性先生之子也先生以清德奥學為人師言行而身化之永樂初予竊第入翰林嘗拜先生於太學於時太學名為賢師者不少而最稱先生光訓内受教於家外交六舘之賢才故其學日進乆之遂取進士為刑部王事其德既克肖先生而又小心慎密凡所决獄必盡其情必當於理蓋人人自以為不寃秩滿陞郎中其所决事益多而譽日益有聞公卿大臣論當時之賢可當大任者必稱光訓㑹廣東缺布政使詔舉賢任之郎以光訓應詔於是光訓遂為廣東左布政使論者不獨賢光訓而必推夲於先生蓋以為有是父而後有是子也先生年八十餘優游里中尚康强無恙而光訓忽乘傳過家拜先生於堂上里中之人不獨榮光訓將又為先生榮之蓋以為有其德而宜有其榮也雖然豈止是而足哉猶有大者焉今之布政使乃古牧伯之任上之所使以安養斯民民之所頼以安養者也舜命十二牧曰食哉惟時柔逺能邇惇德允元而難任人蠻夷率服此其為之之道與廣東地連大海其郡縣固多然山谷之間黎獠雜居而海外蠻夷諸國之效臣順貢水土物多由於是任牧伯者而可不循其道哉光訓克脩其道親君子逺小人使民各得其養近者皆恱而逺者畢來則為賢布政無疑矣如是人將又推本於親其為先生榮豈不大哉此孔子所謂成親所謂立身行道以顯父母者也光訓將行主事劉清輩求贈言於予故為序以送之歸而質諸先生宜必有取於予言矣贈徐憲副序徃年予姻家歐陽允和為監察御史時予與同在北京相徃來其時與允和同為御史而最相厚者若徐君義仲制嚴君孟衡張君志文嚴君繼先輩予皆與之識間從允和問其為人允和皆推譲其賢以為在已上予由是益敬愛之諸君於予亦未嘗不相愛也既而諸君相繼滿皆陞按察副使卓然有譽於當時予憶允和之言而喜吏部用人之不妄仲制前任廣西以憂去服除改河南遂與志文為同官而允和之姪廣哲亦由吏部主事陞河南按察僉事予又喜三人者之能相得也今年孟衡自四川考績來既去仲制與廣哲偕來嚴君繼先又自山西相踵至皆念疇昔之故辱訪予而予乃不得相與叙契闊之情而致綢繆之意蓋有愧於諸君未㡬吏部課其績居最言於上俾復職予既謂不得叙契闊致綢繆而乃又遽去則安能無離别之感邪雖然君子以行道為事以行道為事者不以逺近去留為意也是故古之君子不惮其類之逺而惟欲其道之行道足以及人功足以名世雖逺猶邇也不然徒呴呴於朝夕何益哉河南介兩京之間列聖之德澤涵育至矣仲制提憲綱正百度以沮惡佑善其道之行亦已乆矣今之歸尚篤慎於其職譬之登髙山之巔茍不怠以止焉則身愈髙人愈仰之矣都察院經歴熊尚初與仲制有郷里之好求予文贈行予故序夫昔之所與處與今之所願望者如此以為贈贈劉叅政序廬陵劉君孟鐸與予同登永樂甲申進士第遂入館閣預纂脩既而以親老求歸養乆之起為北京行部主事行部廢又改禮部既滿陞郎中君端厚勤慎凡其言行必依於道理不肯茍止而妄隨於職之所當為者必早夜盡其心故事無不治而北京行部號最繁他人所領事有不能治者尚書李公則以委劉君徃即以治聞然未嘗厲聲色李公愛重君其所稱呼必曰孟鐸先生云其在禮部凡國家典禮皆其職君任之尤小心詳審恪守成憲事有緩急損益必考據精切白於堂上請斟酌行之尚書毘陵胡公德望重當時最慎許可亦雅愛君嘗謂人曰孟鐸君子也劉君之行既以孚於人得二公之譽而益顯時論郎官之賢可當大任者亦必曰劉君胡公屢言於上至是遂擢拜四川右叅政人皆為之喜而劉君不改其常予聞而嘆曰此劉君之所以為君子也君子之任務行道以及民位益進則其任益重茍有一民失所皆其責也劉君蓋慮乎此矣豈當以位為樂哉彼不得則戚戚以憂既得則悻悻然改其度而不以行道為慮者君子不貴也劉君不易其初心而必務道之行察有司之賢與之共治使民無不遂者然後可貴也誠如是劉君將不為古之君子矣乎胡公以予二人居同郡出同年而深相好俾作文為贈甚矣其意之厚也故為序以贈之贈陳編脩歸省詩序廬陵陳文安簡舉進士及第入為翰林編脩既三年以稱職聞朝廷推本於父母之教與妻之助也封其父為編脩母與妻皆孺人安簡既拜賜乃請告歸省躬奉勅為親榮中書舍人龍文翰林庻吉士劉鉞輩皆與安簡相厚作詩以送之而請叙於予予謂封贈之典所以勸忠與孝也何謂勸忠蓋能盡心夙夜而不愧於是官然後得以榮親由是人皆思盡其職焉此之謂勸忠何謂勸孝曽子曰事君不忠非孝也居官而忠不立則禍其身禍其身斯辱其親矣勉於為忠是即所以為孝也此之謂勸孝夫忠孝者人道之當然君子於是如火之必熱氷之必寒豈待勸而後盡哉蓋不勸而能者君子也勸之者朝廷之法也上下交盡則人道立治功成矣此固維持天下之深意歟然嘗觀之不勸而能者上也其次必待勸而後能且又有勸之而未盡然者於是用法以懲之故有榮未竟而辱遽及焉此無他或其身之不檢或以家為累也故夫仕者既能榮其親而道必有諸其身行於其家斯能保其親之榮而忠孝盡矣可不慎哉今之歸省者多矣茍求言於予予則以是告蓋以君子望之也豈欲為厲哉况安簡為吾郡之賢予之望也滋甚士之讀書學道與所以榮其親豈止是而已蓋猶有大者焉安簡不以去京之逺而茍於自便也孜孜然務檢其身與善其家予知其父母安樂之矣他日進於顯榮蓋未可量也故為序其詩以送之安簡亦亮予意否乎贈劉習之序廬陵劉習之寓居髙陽以學行稱於其人乆矣㑹朝廷詔下凡懐材抱德未試者皆舉用之於是有司以習之應詔既至京師歴試於禮部一年尚書胡公察其可用言於上以歸吏部授之官習之得廣東按察司照磨以去泰和進士劉孚素厚習之求予言贈行照磨九品官耳而以治案牘為職凡按察司所行事既畢矣則以成案俾閱焉其有闕漏違謬者具以聞於其長而補正之必使無毫髪之愆則職盡矣於其激揚清濁伸理寃滯鉏姦去暴之權皆不得與焉其官雖卑而所處則髙人槩以為風憲之司莫敢狎玩易視之者在常人之情未必不以為榮然予觀之孔子甞為乗田委吏牛羊倉廪其職也畜牧蕃㑹計當而已矣而其進學之功蓋未嘗已焉豈以其職之卑而怠哉今習之之職視牛羊倉廩有間矣論其舉則懐材抱德之科蓋甚重也裳裳者華之四章君子深有望於習之習之其可不自重乎照磨之任雖若未盡其用然幸有餘力因其已至而求所未至使體備用全由是而進無間於小大難易而皆宜其職誠如詩之所言者使人皆曰是科真足以得賢豈不美哉習之老成端厚蓋無愧於是科而予猶惓惓言者固以逺大期之也予與習之居隣邑嘗識其尊府嘉㑹先生有德君子也其子同與孚皆予主試禮部所取士庻㡬有世契者故為序如此以贈之習之其有取於予言也乎贈王叅政復職詩序言以贈行古也蓋君子相輔以道非言無以宣其情况復有離别之感於此而不言則何以致殷勤申諷諭而所謂相輔以道者無乃缺乎此詩之所以作也昔者申伯仲山甫韓侯之行也尹吉甫作詩送之崧髙烝民韓奕是已道其德業之隆職任之重上之所以寵待朋友之所以眷懐而諷諭勸勉之意寓焉古之君子之篤於義如此後世贈行之詩此其權輿也書曰詩言志孔子曰詩可以觀自周而來詩之變屢矣然即是而考之其心之所存志之所向與夫政治之盛衰人事之得失皆可見不必體製音節之皆如古也則今之作亦豈可少邪顧其陳義何如耳四明王君來字元之嘗為學官御史用大臣舉陞山西叅政三年考績而歸其友戸科給事中舒瞳合諸能言之士賦詩以送之而請予序元之今之賢者也其在山西懇懇於愛民務興其所利而去其所害孟子所謂以仁存心者其課最蓋宜也賦詩以送之美其舊績而勉其新功不亦古君子之道哉則今日作者之意固無異於古之作者矣然嘗以意逆之崧髙之柔惠且直烝民之柔嘉韓奕之䖍恭此申伯仲山甫韓侯之所以為賢而後之君子所當法也夫柔惠柔德也直剛德也柔嘉者柔而不過其則蓋有剛德存焉合是二者而持之以敬則其德業之盛何愧於古哉此衆所望於元之而詩或未備是宜於序發之元之賢者也宜有取於斯言矣詩凡若干首華林胡氏族譜序胡氏居南昌新吳之華林者實宋太子左衛率藩之後藩在當時有孝弟之行事宋髙祖以材武建大功具載國史有子六十餘人故其族為最盛歴二十四世有曰成高者官至侍御史生五子璫瑜瓊球璫與瓊仍居華林瑜徙陳留􅀈徙夀春球居武寜皆各為一宗璫仕南唐官至膳部郎中其後有仲堯者兄弟八人嘗合族以居建義學以延四方之士皆衣食之使學王兾公其一也宋太宗旌其門曰義門今其孫彦志有四子一清萬清叔清獨清猶以衣冠之望臨一鄉瓊之後則徙毘陵實生宋少師文恭公宿其學通天人之奥顯於慶歴皇祐間於今為尤盛禮部尚書源潔公則其裔也公以清德雅望重當時永樂中嘗以使命之四方至華林拜始祖墓大㑹其宗族念璫瓊二祖之親也故與彦志最相厚至是彦志令其子一清持譜來北京謁尚書公請叅訂而合一焉公篤於族誼既輯録之而屬予序胡氏之先以德行功業興其家而子孫又以奥學篤義繼之此其能乆而盛也辟若嘉植然據土地之饒得雨露之潤而屢有封培維持之者則大百圍長千仭枝葉之附愈滋而愈繁可以蔽丘原傲霜雪歴乆而常存理固然也其胡公之謂乎記曰人道親親也親親故尊祖尊祖故敬宗敬宗故收族此仁義之道也尚書公行之而彦志父子繼焉使凡為子孫者皆能篤於仁義始於親親又推以及人而必極其至則所以厚本益末者豈有窮哉雖至於百世未艾也故為序之以勸來者贈黄太守序河南置郡七州縣凡九十餘而開封統屬㡬半之信所謂大郡也况臨以藩憲二司朝廷之大臣要官及中貴人之有事於河南者常冠蓋相望守是郡盖難矣昔之為守者鷄鳴而起秉燭治文書迨旦即奔走徧謁計事或聴受約束或送徃迎來致殷勤稍有未至即以為慢加譴譲小則撓其勢大則拂亂其所為及歸日已晏而數十州縣之人以事趍府者如蝟毛當有所操縱緩急或逹於上或施於下一皆待守而决其於衣食之美惡有不暇計如是其勤且勞也豈非誠難哉予嘗思之天下之郡多矣其地皆千餘里其民皆不下數十萬為之守者豈獨治其常賦而已哉必使之安生樂業足其衣食以仰事俯育而無饑寒愁苦不自得之歎則善矣然惟寛厚亷慎之君子不以所遇為戚欣而篤於養民不以外物自溷而留意於庻務乃能舉其職而無愧然亦鮮矣果有其人則臨乎上者當維持調護略其不及而勉成其美此豈私厚於守哉大人君子為國家愛惜賢才軫念民庻固當以此為務也今開封太守黄侯璿嘗為户部郎中有賢譽以選出知開封予與之别乆矣今年考績來北京吏部最其課言於朝俾復任予故人户部郎中李通大用開封人與凡厚於黄侯者為予誦侯之德稱其寛厚亷慎有惠於下而見禮於上求予文贈其行予亦知侯之為人故為序以贈之且兾其效之大成也贈髙編脩序昔宣宗皇帝在位仁育萬邦無間逺邇以日夲僻在海外慮教化有未周詔擇賢臣徃撫之閩人潘賜昔為行人嘗一至其國至是復奉命以行求可為之副者衆謂國子學正髙遷可用上遂命以為副髙君字景升金壇人累任教官有成績其學識既優而尤善於辭令表然異衆人既至其國奉揚天子懐逺之仁而其風采有足動人者於是自君長以下皆感恩慕義懽忻鼓舞益堅事大之心即遣人隨入朝貢水土物上嘉之皆進其職且將復用俾為翰林編脩以俟命未㡬以憂去服除仍入翰林其進用之意未已也夫翰林之職自唐宋以來皆重之凡當時碩德宏才絶藝之士多延致其中惟上之所任使賛廟謨定國論制軍旅之宜使絶域之逺小大之用隨取而各足蓋國家儲養賢俊之地非止於翰墨之事而已也若所以資益之者有其具矣經史百氏之文與凡世所未見之書莫不有焉博覽而深求之廣其見聞充其器識而成其德業以待國家之需此固士君子之所欲也然嘗觀之唐至於今翰林之士不可一二計長育成就各適於用如前所云者固多其不能然者不可謂無也豈非因循茍且之習勝激昂興起之志惰故邪若是而謂之無負於時其可哉今髙君擢官翰林以俟上之寵命而不廢於書其能足於已以承天之休可知矣凡與君厚者皆為之喜而屬予致一言予故序述其說以贈之而期望之意寓焉贈太僕卿吳君序馬政國家之所重也故兩京皆設太僕寺以統之内外文武大小之吏茍渉其事而不能如令者皆得以法治焉細民不論也職任之重如此而事之繁且劇者惟北京太僕寺為然蓋畜牧既多則必為之立法制嚴禁防謹其調適之宜時其生養之道屢省而課其成功且軍國之須必先及之所以赴機應節不容少緩也故非才識之優志操之正者豈足以勝此任哉卿之缺乆矣吏部慎擇其人謂莫如文選吳郎中衆皆曰然遂具名薦之上即以為太僕卿吳君名敬字孟寅松江人永樂初以郷校諸生脩書入館閣書成遂為文選主事陞郎中其才行焯著於中外為郎中九年又當陞吏部不忍其去奏留之加食四品禄又二年義不可以乆淹也於是有太僕之拜夫三載考績三考黜陟幽明有虞之法也而今用之仕者滿九年孰不欲進於顯庸而吳君乃復低佪郎署者二年其安於所遇而無汲汲之心可知矣今陟三品位九卿豈非才行之美終不得而掩也哉昔唐宋之監牧蓋聚而畜之今悉散之於民民裕則馬蕃故善牧馬者必務養民而去其害馬者則善養民者將不在去其病邪考牧之為民病不可謂無也吳君才行誠優於其職去夫民之病是即去馬之害也馬之碩大且蕃將超越唐宋數等矣而吳君之進於福禄榮名可量哉兵科給事中蔣君性中輩喜吳君之陞求予文贈之予故歴道其職而期望之意寓焉抑菴文後集巻十四
