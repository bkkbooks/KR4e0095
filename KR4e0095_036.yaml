body:
  text: 抑菴文後集巻二十三明王直撰序會昌侯孫公挽詩序君子之善聞於天下天下之人慕之而欲其大顯於時則必揚其善褒其德而富貴其身俾久生於世而不厭不幸而不遂焉尤必有申錫之命加其位號而播其休聲天下能言之士極揄揚之美載之文字刻之金石雖踰百世而不朽皆其賢子孫克為之是以君子貴有後也以今觀之會昌侯孫公是所謂善聞於天下而褒顯富貴揄揚盛美雖百世而不朽者也公在永樂中以后族之賢居戚里之重宣宗皇帝嗣大寳位重念椒房之懿致位督府遂封會昌伯謹事朝廷敬恭朝夕篤亹亹之誠盡惓惓之忠言必循道行必由義在朝士大夫皆尊而禮焉而公之心久而不怠豈弟君子神明所相以耄耋之年致爵禄之顯如松如栢如岡如陵莫不以為宜也何天不憗遺而奄棄盛福當宁興嘆内外惋惜蓋君子無所取則衆人亦失其所依於是進爵通侯加以美諡命有司以禮葬焉當世縉紳能文者重公之德宜永存於世而不得久焉作為挽詩歌以送葬吾聞漢世有挽詩二章薤露以送王公貴人蒿里以送士大夫庶人皆哀其命之不長而其死可惜公之尊榮富貴極矣他無可哀也而人猶哀之者非為公也蓋為世之人惜也公之子若孫持以屬予序故為序之己未會試録序國朝受天明命奄有萬邦列聖相繼所以承天心而固邦本者莫先於養賢其出而用之則莫重於進士之科得人之盛致治之隆自唐虞三代以來莫有過焉者也正統四年行在禮部會試天下所貢士尚書臣濙侍郎臣士嘉以考試官為請上命臣直臣從善其同考官則臣寛臣一寧臣益臣復臣孟韜臣英臣寔臣潤生監試則監察御史臣聰臣慎其諸執事皆遴選也夙夜祇栗以求稱上意于時就試之士千餘人拔其尤者百人遵定制也臣嘗竊思天之生才固俾為世用然非養育而訓迪之亦不能以成其才譬猶大山長原材木所生也必資雨露之潤澤日月之照臨霜雪之嚴沍然後長盛而堅緻大可以充棟梁小者亦足以備榱桷惟所用之而已成周人才之美詩人歌之曰王國克生維周之楨又曰肆成人有德小子有造此可見也國家之於賢才既養之學校矣閭巷之士感上之德亦莫不興起勵志學問明夫所以修已治人者出而効於用皆竭其才以圖報今天下太平將百年雖本於列聖至仁皇上大德之所致然育才之效亦於是見矣諸生遭遇明時得在兹選進而奉清問被榮恩有日也尚思竭誠盡忠卓然有以立於世庶幾上不負天子下不負所學小録既成因書以為序冀相與共勉焉贈工部侍郎周公挽詩序贈嘉議大夫工部右侍郎周公秉昻之卒也諸子奉𦵏於其里仙獅石之南縉紳君子之知公者多為挽詩俾執紼者歌以送公而致其哀惜之意𦵏已然繼作者未巳也其子工部侍郎恂如類次成帙屬直序之直同郡人而與恂如同年取進士同入翰林凡仕而同朝者三十年蓋嘗見公而知公之德矣公孝於親信於朋友厚於姻戚而義動於其鄉賙人之急免人之難而拯人於危亡者數數也至論政事設施又有過於人者縣之大夫與鄉之俊彦皆敬而禮之初恂如為越府長史公已受封如其官及恂如拜侍郎公又得食其禄然家之貲蓄自有餘諸子諸孫皆表然能立足以致其樂年幾七十以卒朝廷遣官祭之未幾而贈侍郎之命下矣生則備其福死亦享其榮可以無憾也而諸公之詩猶哀惜不已者何哉非以公之德足以有為而不得効用於時公之德足以及人而不得久存於世者乎古之君子愛其人而惜其死也則有招而復之之意則今之哀惜公者亦豈人情之能已哉雖然昔之効用而久存者多矣其終得此於人者未必多也蓋亦以其實也則後之觀是詩者可以知公之實矣故為序之使傳焉送陳照磨致仕序陳氏與予王氏為世親蓋予之祖母則公培之從曽祖姑予妻則祖母之黨也今諸子通婚姻則又聯陳氏或陳氏之所自出謂非世親可乎氣類既同而職業又同故陳氏之長者及公培兄弟與予皆莫逆公培往來京師其相愛加厚也今致其事而歸意欲得予言予雖不暇安敢愛一言况事有概于心者是宜與公培言也夫儒之可貴非以其誦聖賢之書而服行其道也乎聖賢之道以孝弟為本推之以仁民愛物至於仁義不可勝用然後為至惟予二氏之祖宗既皆以是存諸心而見於行事是以能不戾乎天而天亦不厭歴世之久至四五百年雖若無以大過人者而衣冠未嘗廢此豈偶然之故哉後之為子孫者當何如其用心也祖宗有以啓之而子孫不能繼於後將不遂廢已乎此予之所以惓惓不忘也今與公培皆老矣而猶竊禄不去公培之歸盡儒者之職以示法後輩俾讀書行道以求不棄絶於天且不失前人之望非公培當務者乎聖賢之道天道也道之從違則天以禍福應之昩者以天為不足畏故行不由道而欲徼福於天可得邪公培之兄公餘以病棄台州教授而歸今又得公培陳氏子孫有賴矣予特憂予之子孫有不畏天不由道而天厭之於是而危身辱親玷累於祖考見棄於士大夫公培宜無吝於教也公培若黙視其非如秦越人相視而不加之意可乎君子之道不如是也此予之所以深概于心者故懇懇言之公培必有以亮予意矣贈徐少卿序國家置北京而漕運以實之吕梁其所由道也湍流迅激巨石阻阨頦頷張而齗齶露犀兕奮而虎豹爭舟上下一失勢輒敗溺不可收拾然非獨漕運為難也東南之人有事於北京及蠻夷海外諸國効職奉貢者亦必由此舟航雲集至或旬日不得度公私病之朝廷於是妙簡賢才委以經略旴江徐君儀字孟威由給事中往焉君才智有餘夙夜盡心往者來者皆稱便名譽大振遂陞大理丞既九年又陞少卿然念君久任漕事功效顯著猝無可代者因復以委君知君者皆曰詳刑雖非細事而漕運實重寄君任之久指揮號令人各當其才是以不勞而事治若驟易之誠難為力古之大賢君子惟其道之行不以内外為重輕君之往宜也君聞之亦曰吾幸䝉上恩備任使茍得効分寸以報知遇斯可矣豈以内外去留為心哉古之大賢君子惟其道之行則既聞命矣其敢不勉予為之喜曰賢哉徐君其能無愧於古之大賢君子哉然予聞之昔者韓侯入覲受命而歸詩人作詩送之其首章曰夙夜匪懈䖍共爾位蓋言人臣之道以敬為主能敬則所以修其身者自無不盡宦成而怠者鄙夫庸人之事也然則夙夜匪懈䖍共爾位其亦徐君之志也與徐君將行其鄉友禮部主事黄振宗請書予言為贈遂以贈之贈宋先生致仕序正統五年九月翰林檢討行國子助教事宋先生以老求致事蓋其年七十五矣行在吏部以聞上許焉先生名琮字萬鍾與直皆泰和人洪武丁丑禮部會試天下所貢士擢先生第一自是為名進士為御史出為教官又入為給事中刑部檢校遂分教國子既滿陞秩翰林猶分領教事前後四十餘年其文學才行表然暴著於中外受先生之教以有成者盖多矣及是將有請也士大夫咸惜其去曰漢伏生年過九十猶以經學授諸生今以先生之年校之其相去尚逺也而何忍遽去使學者倀倀無所依乎且天子方御經筵緝熙聖學左右大臣多知先生以為宜執經備講論今而求去獨無意於是哉先生曰古者四十始仕七十而致事為時用者三十年而已今吾又過其半豈可不知止足之分而失進退之義乎彼非任大責重既老而忘歸君子以為貪冒無恥不譏則笑之矣吾豈可似之吾計決矣及得請而歸邑之仕者相與具酒殽餞送於崇文門外皆有不忍别之色酒半直起而言曰古之學者必有師所以傳道授業解惑也今邑中前輩無存者英俊之士皆有志於學而患不得師先生歸矣宜無吝於教也且古之致事而歸者大夫為父師士為少師朝夕坐里門以孝弟忠信禮義廉恥教諸子弟是以賢才多風俗美則夫所以教者固先生職矣先生可不加之意乎先生曰子之言善矣吾敢不諾於是人皆知先生之樂於教泰和之士之學之成者將視昔加等矣故直書其説以送之且以告夫邑之學者使皆知勉焉而且日冀其成也送祥符知縣周士迪序祥符知縣周士迪初以事留北京既受恩得釋將復歸祥符予友劉順先嘗為開封府學訓導知士迪為詳謁予求文以送之其言曰士迪臨川人始為巴縣木洞驛丞以能著稱於巴中四川按察僉事梁觀薦之擢諸暨知縣再調而知祥符盖其讀書有守故所至有能聲可稱也先生不愛一言以華之則幸甚順先為人師務實行其稱士迪當不誣則予何可愛於言哉予聞世之論者云難為令非令之難為也惟其無愛民之心故難耳有愛民之心而不出於至誠則猶不愛也令無誠心以愛民則民亦肆其詭誕以欺令事日以隳而上之責日至此令之所以難也故予嘗論夫為令者得百里之地而治之其民以十萬計而事之交於民者有不可以一二數欲求其誠心以相應則莫若誠愛以感之之為易也然愛之之道豈止於刑罰之不加而已哉必求有以紓其勞省其費使得遂其生而後已故事有緩急不能免也我必擇其宜使便焉杜其所以害事者使雖勞而不盡其力雖費而不殫其財則民生遂矣如是而發於至誠持之以堅久則民豈有不化者哉又豈有肆其詭誕以相欺也哉民化而以誠應令矣事豈有日隳而責豈有日至也哉則令蓋不可為難矣昔魯恭為中牟令能誠心愛人以及乎物故野雉馴狎童子知仁而不掩焉其治效有可徵者夫人患無其才則雖有愛民之誠心而不足以行之若士迪既有才矣而祥符又中牟之隣邑也今之歸視前之所施者果皆愛民之政乎若皆愛民之政則將之以不已之誠其治效必有如恭者若猶有未至則加勉焉夫何患不如古人哉予庶幾以德愛人者故於士迪不以頌而以規送龍主事致仕序古者七十而致事其未七十而病不堪任亦得致事而去則今之所以待夫仕也其徳最厚矣夫士之仕者孰無終事之心哉然而風雨寒暑之接於外憂勞思慮之迫乎其中而欲身之不病難矣病而不得以修其職然猶居位不去豈其心之所能安哉上知其然於是而著為令使得遂其志盖所謂君行仁臣行義上下交盡其道者也予嘗讀周詩而知其所以盛衰未有不本於人事者四牡之使臣勞於王事而不暇顧父母則探其情以勞之故能感人心而成天下之治此所以盛也及其後世有盡瘁事國而上之人漠然不加之意者此北山之所以興刺也上下不交之謂否而欲其不衰可得邪聖朝之體羣臣使老者得以佚其躬病者亦得以安於醫藥而無失所者豈非天地生成萬物各遂其性之意邪天下歸仁同乎二帝三王之盛豈偶然致哉君子於此見之矣予邑龍氏為大家叔粲則其族之賢者也為禮部主事八年勤於其職也至矣去年會試天下士與予偕在院中朝夕不遑暇既罷忽得疾歸而治之及朞不能愈則嘅然曰吾受恩厚而病不得終事將柰何乃具以聞上察其實許致事而歸予與之有連也將舉酒餞焉而叔粲病不飲乃書朝廷待仕者之厚如此以送之用以慰其意叔粲歸矣善起居謹藥食疾庶幾稍瘳歛其所以施於官者而以教於家使子孫皆賢姻族鄉黨一皆勉於善相與樂乎太平之世則叔粲雖不與政是亦為政之效也於不得終事奚憾哉送朱教諭考滿詩序泰和素稱文獻之邦其士大夫服仁蹈義以修其身通今博古以見於行者自古有矣雖其風俗之美而亦學校之教然也國朝設科以來其自學校而升者蓋不乏其間褎然冠本經魁鄉舉及為禮部第一者皆常有焉然為教諭者乃多缺而不備久之得嘉興祝思誠先生始勤奬勵以成士志永樂癸未領鄉薦者八人明年八人者皆登進士第又皆在前列由是文風益盛有志之士尤日夜勉勵思度越前人而後已祝先生去繼其任者建寧陳士希先生益勉士於學士之中選者益多陳先生既滿官太學又得今朱先生仲言亦如前之所為為士者益勉永樂甲午而陳德遵遂為天下第一其成進士者又缺人嵗辛丑登進士者五人而曽鶴齡又魁天下鶴齡雖不自學校出要以學校為之倡也由是天下論士者皆以泰和當甲乙之數於乎盛哉夫學校之教天下皆有也而泰和乃當甲乙之推者豈有異哉為士者勤學而不懈為師者勸勉成就之至也朱先生今以考績上京師邑之耆儒楊仲基陳仲亨等相率賦詩以贈之而命予為序予謂朱先生之名有不待言而顯者蓋世之觀人者視其績而已人知泰和之士之盛如此則朱先生可知矣非朱先生學問有諸已其能致是乎雖然予又為先生慮也今制教諭成才之多則陞為郡博士或遂入太學為助教學正今之去其陞也審矣然人謂泰和之士之盛皆出於先生而皆以是望焉先生宜有以應之矣夫勤學尚志之士所在皆有之勸勉成就之至在先生而已雖予亦不能無望也先生永嘉人永嘉文獻之地在宋之時有君子出焉其英偉豪傑之才聰明特達之見雄放宏博之論少有能當其鋒者先生其鄉人蓋有所得者也其善教宜矣予為序其贈行之詩既述泰和之士之所由盛而必及此者使人知先生之學有以也曽氏讌集詩序曽先生存禮忠厚人也居泰和柳溪上囂然自足無所求於世而世之人皆敬之其子質中有文學行藝為鄉人弟子師孫良亦以明經舉進士為業其幼者皆聰慧向學於是先生益有以為樂客至輒置酒相懽而為賓客者亦皆為先生樂之嵗之辛丑九月戊寅先生有菊一本方盛開其姻友浙江按察僉事郭君公緒往觀焉而予亦適以事至其家先生大喜曰二公吾素所厚者然别去十餘年始一見昔之壯者强强者老今又將先後去矣而吾亦頽然益以老不知何時再見而樂也盍少止論舊乎固留予坐先生出酒與郭君飲之而飲予以茶約半如酒之數相與道昔時事雜以諧嬉恍然不知日之暮也而先生意不已焉父子祖孫更引滿勸郭君曰王公既不可强則捨此復何之乎郭君亦感其意之勤欣然為舉釂或一飲或再飲而後止蓋臭味之同意氣之合有不知其然者矣質中曰人生會合之不可常如此是宜有紀也因以捨此復何之五字書為丸亂器中各探一言為韻賦詩一首而先生醉矣各罷而去明日詩成皆謂予宜序予謂先生居太平之時而享壽考康寧之福且有賢子孫以世其家其得於天者厚矣而又篤於朋友之誼如此豈人之所能及哉然則是詩也非唯以見一時之樂蓋其三世之美在焉是可傳也故為序而不辭馮氏世德淵源序祈門縣令浮梁馮誠録其世系事實為一巻名曰世德淵源因兵科給事中戴君弁請予序其端戴君之言曰馮於浮梁為著姓其始居歙之黄墩在宋之時有諱宣者為潤州判官其子羽官至户部尚書羽之孫實為宣州推官蓋衣冠之族也實曽孫三人始自黄墩徙浮梁擇勝地以居長曰某居東鄉之髙嶺仲某居南鄉之湘湖季某居北鄉之禄角皆蕃盛誠則湘湖之後也其前之顯者多矣元季兵燹族譜殘缺誠之曽祖退安先生良輔嘗加考訂而於本宗特詳焉蓋誠五世祖諱光夫號月屋先生以明經為宋長薌書院山長四世祖講國綱號南忩先生仕元為蘭溪州都目曽祖退安隠居不仕以學行為人師祖大志洪武中聘召論治道以疾辭歸老於家父溪翁號漁樂閒居樂道以吟詠自適蓋超然於物之外者誠幸䝉家訓以科第入官恒慮世德之久而昩也乃録以示後人俾善繼之永勿墜願先生為序之予不得辭夫所謂碩大之宗者皆由世德之盛然後能維持於久盖仁義得於已斯足以獲乎天天固維善是佑也然昔之人有務德而不至於久者未有不德而能久者也務德而不至於久蓋莫之能繼也况於不務德者哉是以君子貴世德也晉之欒氏貴卿之家也武子之德晉人蓋比之召公子黶以汰虐繼之及武子之施没而黶之惡彰故盈䝉禍以僨其宗由是觀之前人之德不足恃以久而唯能繼其德斯可以傳於久然則為人後者奚可不務德哉易曰積善之家必有餘慶積之云者累而蓄之之謂也積之誠厚則其慶有餘矣馮氏子孫尚世世勉之哉是為序胡瓊彦璧字序胡生瓊者新寧教諭用亨子也冠而字之曰彦璧今年舉教官來北京其師邵陽教諭鍾尚清嘗從予遊亦考績在吏部因以彥璧見予而以名字之義為請曰願有朂也嗟夫彦璧子之父師所以命子者至矣奚待予言哉瓊玉之美者詩所謂瓊瑶瓊琚瓊玖是也而許氏以為赤玉前輩非之則瓊為玉色之美信然也夫玉之為用衆矣圭璋琬琰珩璜琚瑀皆玉為之今字子而以璧者蓋舉其大者言也璧之為用莫大於禮夫若子男所執則又以養人安人為義夫其用之通於上下如此豈瑕玼玷缺者所堪必其美者也然則子之名與字豈徒假借以稱道也哉古之君子蓋比德於玉禮之所記可見矣子當勉夫仁義禮智之德使和順積中英華發外則其晬然盎然者即玉之美之著見者也由是用之於上下無往而不宜矣雖然人非上知盖不能無過如玉之制器而或有玷累焉亦在治之而已人有過而改之則其為德也全玉有玷而治之則其為器也貴子誠有美質然予願子有過而改焉以至於德之全足以達於上而益於下然後無愧於命字之意昔趙人有璧其直十五城以予觀之果可以用於上下豈直十五城而已子能勉於自治而至於德之全則其為用大矣教官之得與否何所加損哉子其勉之送沈縣丞序姑蘇沈友發為丞於襄垣既三年以考績來京師援例復職去稽勲員外郎韓禋素與善也命畫者繪為送别圖而求能詩之士賦詩以送之復請予為序予謂朝廷以百里之縣付之令而以丞佐之所以厚民也故凡一邑之人寒者欲衣飢者欲食寃抑者欲得其理勞苦者欲得其安皆於縣令丞望焉而為令丞者當思朝廷委任之意下民屬望而皆盡其心使無飢寒愁嘆之聲則其職盡矣夫民無飢寒愁嘆則給足安樂可知也以素給足安樂之民而率之以趨事赴工豈有怠廢之患哉此為縣令丞者所以為重也然嘗思之丞所以佐令惟事之宜而已非欲茍為異同也是故令果賢其所施者皆宜丞將順以成之矯矯而為異不可也令果不賢其所施者有未宜丞當舉正而行之翕翕而為同不可也矯矯而異翕翕而同則事斯敗而職斯曠矣縣安能治民安可望哉然世之為令者或不識其非不惟丞之謀專而自私者有矣斯二者皆非也能久於其職者亦少矣友發丞襄垣經三年之久其能不茍為異同而善於其職者也今之去而益盡心焉使一邑之人給足安樂而興起於事功則九載考績循次而陞大邑佐大郡皆可冀也惟在勉之而已予不識友發且不暇為文然而為之序以告之如此盖重稽勲之請而亦欲成其美也詩凡若干首繫于下方云送王生序金谿王生禎奉其父泉坡公之命歸視墳墓于金谿以予為父執也求予一言以自勗予謂公之學行表然為望於中外生奉庭訓足矣而何取於予言哉念予與公交好四十年契誼之篤非他之為朋友者比則予之於生可愛一言邪雖然予所欲言者皆天理之常人道之當然非有異也試相與誦之子夏曰弟子入則孝出則弟孟子曰孩提之童無不知愛其親及其長也無不知敬其兄是孝弟者天理之常人道之當然不可不務也常人於是有未至君子固責讓之若仕者之子弟則責讓加焉責之甚者愛之深也夫孝弟之行豈止於事親敬兄由是推之忠於君弟於長信於朋友睦於宗族厚於鄉黨州閭又推而至於事物之細微皆當理而無私適宜而不謬然後已此所以為仁義之實堯舜之道亦不過是也今仕者之子弟務此者有矣其不務此者不可謂無也矜才怙勢以自逞於利欲之途於其父兄且不恤况推以他及乎蓋有責讓所不能加而徒為之長嘆者也生資禀質厚未汨於利欲其事父兄庶幾不悖是道若推行與否生蓋知之矣生勿以所能自足務推之以極其至始為孝弟之士終為仁義之君子則無愧於父兄而予亦有耀矣且仁義天爵也天爵修則人爵至彼汲汲於求而悖乎道者未見其必得也生勿以累其心予之告生如此生以為何如禎拜曰先生愛禎厚矣禎敢不勉一時贈行者皆以詩遂書予言授之俾弁諸其首龍氏襍畫巻序襍畫一巻予姻戚龍叔粲甫所藏也叔粲與子士郁皆貴顯於時然世俗之所好者皆弗好而獨愛畫與之厚者多以畫遺之叔粲取其襍碎者萃為一巻持以告予曰粲忝備官使敬恭朝夕不在公署在朝廷汲汲焉以修其職於夫山川草木之類昔之所以娛耳目悦心意者雖或此所未有縱有之亦不暇顧甚矣其卒卒也幸而少間惟取此閲焉凡向之所愛者一舉目見之不出户庭之間而若自適於湖山千里之外釋煩抱而暢雅懷蓋有得於此矣予視之畫十有二幅山水一梅二松梧蘭竹四蒲萄春草菊各一鶺鴒一最後松鼠終焉嗟夫叔粲子可謂善於取樂者也人之出處不能同其所以為樂亦異是故有爵位之榮者則必以行道致治為心居幽閑之地者然後留意於山水草木之娛勢不可得而兼也今子託意於畫以足其所好蓋兼貴賤之所樂者而盡得焉亦何其快哉然予聞之君子於畫非但以供玩好亦將取益乎已也古之豳風是已今畫中所載山之靜水之動石之磊砢人之或行或止與夫植物之清貞芳潔滋蔓而紛敷羽虫之安馴毛虫之睢盱窺伺皆極其摹寫之妙非所謂萬物各安其所各遂其性之謂乎子之於仕方進而未巳也觀山之凝重而以益吾仁觀水之流行而以廣吾知觀石之堅確不移以厲吾所守推而行之使天下之物無不安其所遂其性則子之樂將有大於此者畫云乎哉叔粲喜曰先生之言善矣粲不敏而願學焉請書于巻首庶毎覽之而不忘遂書之送楊孟碩還鄉序予泰和多故家然其德業有繼久而益盛者可數也以今觀之盛莫若楊氏凡其既逺與予所未知者皆不論舉其近而可知者吟忩先生盛德君子仕元為循吏以翰林待制終于家有傳在國史於今則少傅公也文章德行嘉言讜議彰信於朝廷而孚聞於天下其所以重楊氏者豈特漢之伯起哉故泰和之族以楊氏為甲由是而知凡祖宗樹立於前者茍無賢子孫繼之萎薾不振蓋宜也且均之為子孫而承髙明之世者為最難蓋祖宗之德一有不肖則非所以為繼而見咎於君子細人之媢嫉者即相與滕口呴小為大舉似為真使人將無以自白故盛德者之子孫必無間然庶可矣於乎豈非難哉雖然自常人之蔑理徇欲者視之則誠難矣若夫好德之士非道不言非禮不行人非善不交物非義不取從容於矩度之中則於光祖宗裕後嗣若未見誠難者是以君子貴世德也楊氏自唐虞部侍郎輅至今少傅公蓋五百年而益盛非偶然也世德以維持之也楊氏之昌大有窮哉少傅公之子孟碩去年來覲省於北京循循守禮法日侍公左右聴誨言既易寒暑矣今奉命歸理其家而猶拳拳於庭訓若不忍去朝夕蓋好德而思勉焉者賢矣哉孟碩也世之妄子弟樂去其親以適已自便豈不有愧於孟碩哉然予聞之人子之賢要在成其親之志不以奉朝夕為足也孟碩歸矣以所聞於公者拳拳服膺焉謹其言行而輔以益友德業之盛足以光前而裕後此則公之志而孟碩成之韓子所謂志養者也孟碩將行自少傅建安楊公以下皆作詩送之予最故序其説以弁諸首云送蕭余隆詩後序今年夏予至北京見余隆讀書於彭士揚先生所吾邑宦游之士與凢以事來京者皆與士揚相往來暇則合坐論道理語故實繼以詼諧笑嬉譁然不知日之夕也余隆處座隅展巻吟誦未嘗勦説讕語有疑則問問已則坐誦如初諸公見其專慤皆愛之未幾辭歸永清省其父去三月復來則告予曰生以父命歸鄉里不得留此卒業矣為之柰何予曰爾其歸哉父命不可緩也古之學者雖有師然未必皆成於師師者指引開導而已精意以索之勇往以求至焉則非師之所能必也昔者銅陵有豪宗嘗命儒訓子弟耗其千金之産卒無成至相詆訾以為諺莫肯命儒者眉山有大儒少不喜學人怪而問之不應既三十乃自閉户五六年盡通六經百家之説遂以文名動天下夫是二者豈皆由師哉勉與不勉而已爾歸而勉焉不患其無成也不然則雖使為師者日夜提耳而命之徒見其煩何益於學哉且夫學者學聖人之道也道莫盛於堯舜而孟子以為堯舜之道孝弟而已蓋孝者仁之實弟者義之實其在人非逺也其為事非難也由已而推之以達於國家天下則於平治也何有故云然爾來省父於永清今又歸以養母又能卑讓於長者而不敢先焉則於孝弟知所用力矣勉而修之至於仁義不可勝用然後為學之成夫自永清至泰和蓋六七千里如此其逺也茍力行而不止其至可以月日冀爾之於學亦由是而已歸而勉之毋自止焉則善矣何徒眷眷於此也余隆喜曰生歸請事斯語矣於是士揚率諸能賦者作詩送之予即書所以勉之者于後云送楊孟辯南還詩序吾邑楊孟辯其先在宋時有以科第入官者由是為著姓至孟辯兄弟遂以貲産雄一鄉永樂中析富民實北京孟辯與焉既而部符下有司擇民之優於産業而有才行者俾常掌其鄉糧賦孟辯又與焉然不勝二役之煩而慮有失也數往來經營之蓋盡心公家而安於其分者然人之恐喝朘削蓋比比有也則喟然歎曰吾邑富人如吾者何限然有未嘗受役者而吾乃二役焉今亦久矣年老財匱雖有薄田而灾沴荐臻其何以勝此即訴於通政司請援例免一役户部為下有司俾人為代掌糧賦而卒不得代孟辯無可奈何相見縷縷道所苦與其情之欝而不伸者曰天其或能矜我也予解之曰為民而受役於官宜也然役貴平此仁人君子為良有司者之任也此之二役而彼或無役焉謂之平可乎今之良有司以仁存心毅然不為勢力所囘者足以辨此子歸以其情告焉必當惻然動心役庶其減矣予聞之人衆則勝天天定必能勝人故為善者必福為惡者必禍天定故也吾邑文獻之邦詩書禮義之習比屋皆然昔之肆為民害者蓋亦有之迨乎天之定也卒皆冺滅而無聞故家大族能久而存者詩書禮義維持之而已子宜訓於家必為此勿為彼則天將佑之豈久困於役哉邑人之仕京師者皆作詩送之而屬予序故書以弁其首云慶陳梅芳七十序予妻之弟陳公梅芳以洪武癸亥嵗生至景泰壬申年七十其妻蕭氏生洪武壬戌閏二月初二日則七十一矣白髪蒼顔並受其福十一月十二日則梅芳生日也其弟用柔在京師與予子秬嘆美其壽考又思所以致禱焉予謂烹羊炰羔執豕于牢擊巨鮮釃美醪合親戚朋友而懽樂焉此其子與兄之子及女之夫能之足以娛其老矣不待予告也而用柔必欲予致一言予念陳氏故大家而與予王氏有世好予祖妣夫人實陳氏先考榮禄公則陳氏之甥與梅芳之考為兄弟予為彌甥於梅芳為外兄梅芳則予内弟而梅芳之女兄為予妻亦禮所謂兄弟也今梅芳當聖明之世天下太平耳不聞徵召之煩身不涉更繇之苦田園足以給衣食山水足以供遊釣有子有孫足以承顔色奉溫凊親屬故舊皆安於無事可以遨嬉而往還其優閒之福蓋備矣昔人論壽以七十為難得今梅芳既七十予年亦七十四予妻則七十六内外兄弟有若是三人天之所施亦可謂厚矣慶壽之日得以樽俎更勸酬豈不樂哉然予猶忝竊未能去不知懽忻醉飽之際其亦能念予否乎洪範五福以壽為首而必本於德梅芳之德予知之惇厚安靜而心氣和平非禮之言不正之行未嘗出於口形於身人或有忤於梅芳而梅芳則無忤也可謂篤實之君子其受福於天蓋宜矣予又聞之成周詩人之祝壽也必欲其德音是茂保艾爾後乃已焉梅芳之德有諸身又推而勉其後人使其子與兄之子以及諸孫皆讀書為善内睦於家庭外睦於鄉里惇本尚實謹言慎行至和之氣足以致福祥他無或撓之者則梅芳可以安享壽祺於百年子孫亦永有令譽陳氏前盛之時庶其可復矣此予愛厚之心也故因慶壽而道之楊處士挽詩序吾邑楊孟辯氏改葬其父世忠處士與其母配胡孺人同兆一時士大夫知處士者皆為作挽詞俾執紼者歌以送之蓋處士有德善形于家著于鄉邑其死也為可惜故於其葬不能已言也葬已孟辯之子廷選翬次成帙因來北京持以求予序昔者三良之死也秦人哀之為之賦黄鳥齊田横之卒也其賓從皆甚哀而不敢哭於是作歌以寄其哀漢武帝時李延年分為二曲薤露以送王公貴人蒿里以送士大夫庶人今其詞尚在皆所以哀其人之不幸而惜其命之不長夫死於不幸與其壽之不長固可哀也若處士者年既七十不可謂不壽矣而又以令終亦不可謂不幸也然而猶哀惜之者非特以其德善故邪夫人之生莫不有善故為善者人之所當然也能盡其所當然亦其分焉耳何以異為哉而於處士哀惜之者豈以處士之為善視他人為愈者邪以一邑論之其為人也多矣其於為善能如處士者亦不可謂無其人然鮮見知於士大夫見知於士大夫者有矣而哀惜於其死者幾何人哉今處士之葬而能致哀挽之多如此者豈非有孟辯者為之子而又有廷選輩為之孫故邪由是而知人不可不為善而亦不可無令子孫能為善矣而子孫不克自立則雖美而不傳况於不能為善者邪然則世之為善而無令子孫汲汲以表揚為事其泯然無聞也豈少哉予於是詩既多處士之善而又嘉孟辯父子之能顯其親乃為序之使凡觀者庶乎有所興起也詩凡若干首送梁學録序國子學録梁先生叔莊謁告歸泰和省墳墓同邑之士之在北京者多與叔莊連姻好俾予贈以言予謂叔莊之官太學三年矣太學仕者數十人論文行之美無愧於為人師必曰叔莊蓋能以聖賢之道修諸身而推以及人凡世俗之附聲勢急貨利叔莊皆不肯為是以譽望如此予邑之以儒名家者非一姓前五六十年先生君子有存者其道德之懿法度之嚴表然為望於鄉邑後生小子得有所視效而不敢為非或有未然凛凛乎其言之畏也故風俗猶有可稱者迨老者日化壯者亦日以去向之以儒名家者遂稍稍渝其舊或既顯而歸則又侈然而無所自防薫陶變化於是乎有不可勝嘆者去年少師楊公之歸鄉人得瞻其容儀而聽其誨論知善之當為不善之不可為始有沮怍而興起如見前之所云先生君子者今叔莊繼公往矣承休襲美叔莊所宜務也自言行之常以至論議之大益謹而不自放使凡接於見聞者益有所感發如復見公則鄉邑之美當復如前五六十年可必矣儒者之道固將以化民善俗然必先於家未有不先治家而能淑諸人者則夫以儒名家者當何如可知也而可以渝其舊哉渝其舊君子謂之辱先予與叔莊氣味頗相似而世有連則予諸子非有望於叔莊而誰望哉予嘗告以循理畏法矣叔莊幸深察之善教之使必為君子不為小人而無忝於先世無愧於儒名家則予之感刻有已哉袁氏族譜後序西昌袁氏為著姓蓋吉州刺史邯之後邯則唐司徒滋之少子也自邯以來衣冠蓋不絶宋之世以科目顯者相繼而仕於郡縣累累有焉至于今冨陽令仲愚之孫凢廿一世袁氏之慶澤逺矣哉初予與仲愚同遊邑庠未幾予竊第官京師久之仲愚亦充貢入太學遂有富陽之命而其從子和又以明經取進士名聲日藉甚人皆以逺大期之而不幸早卒今其後輩又有讀書而思奮者其盛未可量也往年予家居時識其前輩克恕克睿克謙克勤皆忠厚樂易仲愚則克恕之子和則克睿孫也而克謙之子仲偉亦嘗同在邑庠不果成名而去今亦老矣仲愚為富陽倦而歸持此譜屬予序其後予家與袁氏相邇而屢通婚姻且又有詩書之好則豈可愛於言予聞故家大族雖以仕宦為榮要當以德義為之本德義有諸已而爵禄加焉君子榮之不然而徒以貴勢陵鄉里君子不取也况為之子孫者固當守禮畏法以和睦其姻族鄉黨而欲驕肆以逞惡乎其可哉袁氏之先顯矣兹六七百年而猶不失前時之望非祖宗德義之積不至此然則子孫所以迓續而引長之者其可不以德義為務哉仲愚今六十五矣族之老長多無在者所以訓飭諸子弟以承先裕後仲愚實當任之茍如是則謂之故家大族誠無愧而傳之百世有已哉送錢鶚蜚序吉水圓塘錢鶚蜚翰林學士錢先生之姪也來侍先生且三年其言謹於禮其行謹於義朝夕左右未嘗有過差先生之所友者皆當世名人其往來無虛日鶚蜚應對酬酢皆能中儀節閒暇過從非鄉郡故舊之家則之縉紳先生之門若聲色之塲貨利之區飲博之肆慢戱佚遊之地不肯一涉其間恂恂然儃儃然君子謂其質之淳而亦受教於家者致然矣予嘗竊嘆京師者萬方會同之都也當太平全盛之日聲名文物之美固足以為榮觀然物盛人衆凢竒詭淫泆所以蕩人之耳目而移其心志者亦莫不有焉貴游子弟信道不固立志不篤惑於外而荒於中决禮義之防失孝弟之道幸或歸其鄉又以其所習者而施焉傲然自放於繩檢之外逞竒衺之心恣殘賊之行彼僇辱其身固宜矣而貽親之羞若是其可嘅也則予於鶚蜚安得不愛且重耶夫所謂故家大族者非獨以人爵之貴也蓋有天爵焉修天爵而人爵至又益篤於所修此所以亢其宗而為鄉邑之望也得人爵而棄天爵君子謂其必亡况彼妄庸之皆無者予不知其何如也往年予識先生之子鸞停鳯躍皆循循守禮法今又得鶚蜚錢氏之福其有窮乎哉予家距圓塘不百里而予與先生同在翰林三十年交好為最深其受益也多矣二家子弟宜交修以善庶幾古人之誼予蓋有望於錢氏兄弟也故於鶚蜚之歸為序以贈之凢賦詩者則繫於下云蕭氏流芳集序流芳集者吾邑清沂蕭公北之所輯録也蕭氏世以善聞公北曽祖以德孳孳為善事父母孝鄉邑稱之其子士信孫缺等亦克如其志皆勉於善行士信等又工於繪事以寫真得名嘗遊京師及通都大邑聞其名者争迎致輒為冩無不肖似且并其風神氣韻而得之而未嘗徼利人以此益重焉又推及其先祖之美而形於贊咏盛矣哉其言也公北益喜曰此吾祖考累世之善所致也諸公大人之言豈可多得哉將與其世系通類而傳之庶託以不朽余與蕭氏厚善自士信來五世矣而於公北尤深今致仕而歸既老且病學業盡廢人亦知余無能漸不能復記憶私竊自喜方焚棄筆硯以求快于一時而公北乃以此求余序余雖不能為然念舊不可辭夫名者實之表也有其實斯有其名然必託之文字以傳故曰言之無文行而不逺文豈可少哉蕭氏之善見於文字多矣顯者若尚書茹公侍郎張公劉公祭酒張公翰林劉公解公御史陳公及諸侍從近臣縉紳先生海桑陳公輩名德聞於四方者皆有著述稱其善行之美贊其圖繪之精大篇短章不可殫紀傳至于今數十年兄弟子姪之衆不忘祖宗之舊皆勉於德藝以立身揚名公北又思傳芳襲美於悠久使永永不替賢於人逺矣哉禮曰先祖有美而不知不明也知而不傳不仁也公北知而傳之可謂明而仁者矣蕭氏子孫尚益勉於其後則斯集之傳有已哉故為序之使傳焉胡氏族譜序胡氏先居長沙馬殷之亂有兄弟三人曰杲暹昊者始避地來吉伯居廬陵值夏宋資政殿學士忠簡公銓其後也仲居泰和之南岡朝奉大夫衍其後也其季始居泰和之禾溪再徙居黄漕南城丞箋其後也三族皆蕃茂亦皆以文學德義重當時而忠簡公之孤忠大節剛直之氣浩然塞乎天地之間嗚呼何其盛哉黄漕之族五世乃析居社溪至今而猶盛社溪去黄漕蓋甚邇其山水雄秀而風氣清淑胡氏承閥閲之華以禮義相上節行相髙表然不失前時之望非他族可比也吾聞故老言宋之季世有文可者懐竒負氣思乘時立功名文丞相辟置幕府與謀議丞相被執得間歸痛憤發病死其弟文静猶慷慨欲有為時北兵所至敢拒敵者屠其城而泰和已下何侯守之侯聞文靜事即躬詣社溪諭諸父老且招致文靜文靜抗諭不屈曰吾寧死不負趙氏侯恐其終為變以貽大患遂害之而邑里以寧文可子南叔亦能鋤溪峒叛逆以保鄉里全宗族其徇節秉義有此三人不亦偉烈竒男子哉夫所謂世家大族者其先必有德業以啓之後之人復勉於善以續聞趾美斯能光顯盛大而不窮若胡氏是矣今相傳十六七世而當天下和平之時老者以㳟厚廉讓訓於上子孫以孝弟忠信承於下内睦宗族外睦鄉里鬬争凌犯之風無有也則其慶澤之長可以世計哉此譜作於仙遊教諭縉而求予序其首予素知胡氏故為言如此以示其子若孫使善繼之而思所以無愧焉也贈邢士俊序醫者活人之術也惟其心之厚於仁者能之盖天生斯人必欲使之遂其生然六氣之淫七情之感有不能克者由是疾病加焉茍無以濟之而或䧟於死亡則天地之心有所不遂矣聖人者出為之醫藥以調其血氣制其過輔其不及祛其害之自外至者而人始得以自遂此聖人之仁天地之心也自是而後以醫為業者必以仁存心然後能盡其道人之養老慈幼而欲遂其安者得有所託矣兵科給事中李春景陽世家無為州有老母在堂道逺不得迎養來北京其心蓋惓惓然未嘗須㬰忘也今年春母忽得疾勢且殆他醫環視莫能愈乃走郡人邢士俊所求治士俊原其受病之由而思其制病之方旦夕候視與善藥未幾疾良已功成而退無矜容無德色景陽始而深憂之及聞得士俊而愈則大喜曰賢哉士俊吾母所恃以安者也其德可忘哉乃詣予誦其事而求文以美之且曰士俊翰林侍講寛之叔世以醫名治人多竒效德之者不特春而已予聞而心喜之夫醫者仁術也必仁以行之而不累於私然後人得以受其惠不負於聖人之意不愧於天地之心士俊如此所謂厚於仁也乎其賢誠逺於人也乎初侍講取進士第一予疑其先有積德焉後聞其世以醫活人予益信夫仁者之必有後也今士俊又以仁心行仁術而收活人之效安知其後不益昌大矣乎仁天之德也人而體天之德天安得不佑之士俊行之以不倦而果得於天後之人有所視效而興起是亦士俊之仁之所及也豈不美哉送彭知縣復任序翰林庶吉士歐陽允俊予同年友也為予道項城令彭君仲恭之賢曰仲恭本吾郡龍泉故家始以秀民舉於其鄉授廬州英山縣丞有能名在英山七年即拜項城令盡心所事不懈益勤前年河溢浸項城民田民無以供税仲恭以聞得盡蠲其租而民以不困於是皆樂上之賜而益稱仲恭之賢今以考績來京師將復歸項城予與仲恭有連也率交游之士賦詩送之子宜為之序於戱伸恭其可謂賢於人矣雖然亦一時之遇也夫君子之仕也得百里之地而治之固足以行其志矣然古之人有為之而無其效者何也盖不遇夫可為之時或不際夫可言之日故士有不盡用之嘆而人多無告之窮方今聖天子在位以至仁治天下天下之人既已安矣而上意猶慮有不得其所者臨朝親問每至日晏恐不畢得聞凢長民者有事而來必問其民之疾苦使條列以對為之去其所惡而施其所好聖天子仁民之意於是為至矣予嘗竊嘆以為今之仕者幸而遇夫聖明之朝而際夫得言之日誠能因上之仁而達之足以行其志矣天下之人豈復有遺利乎此誠萬世一時也然而長民者或有言而不盡有諱而不言往往以此得罪是上愛民之仁而長民者乃不能充而達之是得為仁人乎哉豈不大可慨夫仲恭為一邑既能達下情而侈上之賜其志得行矣今之歸其益思所以廣上之意哉能如是則仲恭為不負於其職其進於福禄榮名不可量也予未識仲恭因允俊之言為序以送之仲恭其勉之哉慶蕭公夫婦八十序萬安蕭公闕與其配嚴氏俱生於洪武乙卯至今景泰甲戌年八十矣正月念五日實蕭公始生之旦五月初十日則嚴氏始生之旦也子作楫與弟作舟作珪作瓚將於是時大陳酒席盛賔客以慶之其仲作瑄由大學生得無為州判以公務留京告予曰家君荷天之福以至於此幸矣而限以官守不得從諸兄弟奉觴稱壽於心有不釋然者敢求大人先生一言使子錡奉歸獻於堂上庶幾以慰悦其心幸毋辭予謂天下之物出於人為而可以充其口華其身適其性情安其寢處者皆足以致之至於壽則出於天雖聖賢有不能必者盖非智所能謀力所能任也是以君子之相愛也則必以壽祝之祝之者望其有得於天然亦豈可以幸致哉洪範五福其一曰壽推其所致而本於德焉茍務乎德斯足以獲乎天然則天未為不可必也彼其有不得者盖不可以常理論也公夫婦之獲乎天如此豈非德之所致哉考其初生正當皇明方興之際辟之貞之有元冬之有春也是以溫厚純固之氣實鍾焉繼以列聖在位覆載生成之恩厚矣故公夫婦並享夫壽考康寧之福為鄉邑之儀表為閨門之楷範是雖公夫婦之得於天豈非亦遇其時哉今天下之人多矣其壽如公夫婦者盖有焉然不能皆有作瑄兄弟為之子也公有子有孫既貴且富而又有文以為頌其福不既備矣乎况今制仕者之賢必推夲於父母而加恩焉故仕而稱職無過舉者則封贈其親作瑄既有譽於時皆庭訓使然也則公夫婦之受恩於君又可待矣德之盛則福之進將益逺而無窮他日尚當為言啓諸公之賦詠以為壽不但已也送道士曽允迪序泰和城西黄茆岡晉仙人王子瑶煉丹之地今延真觀在焉地既竒勝故學道於此者往往與他處異予幼時從鄉先生曽仲章讀書其中是時前輩諸老師多在皆表然有行藝而掌其教事則胡閑所也閑所居正一堂别為屋於堂之西竹樹茂美非塵迹所能到閑所與其徒講道及延接士大夫皆在是盖超然方外之樂也其後曽先生没予遂去入鄉校及官京師久而歸前輩諸老凋落已盡惟與予同遊者若今道㑹戴用拙及道士劉𢎞正蕭𢎞中黄仲真數人而已允迪實閑所之孫亦穎出儕輩能蕆其教事鄉人重之數人者以予嘗遊處於斯也暇即邀予至其舍相與論舊酌酒至終日予樂之今别去且三年心未嘗忘也今天子深仁大孝慨念太宗皇帝聖神在天思仗𤣥科以資𡨕福召天下道流俾依教蕆事焉而允迪亦來既畢事受賞而歸過予求一言為贈予謂人之為學必廣其見聞以充其氣廓其量然後能脫去凡近以遊髙明况方外之士乎允迪涉七千餘里以來京師凡山岳之崇髙江河之深廣都邑之雄壯人物之鉅麗皆見之天下之學老子者皆得與之處其必有以自廣而不膠於淺近者矣則今之歸吾知鄉人之待允迪者將加禮於昔矣所以繼前輩之餘風而為道家重者吾於允迪乎望也允迪自言其祖始居文溪為儒家則故吾里人也故為序以送之所以重允迪焉耳送尹執中歸省序上在位十八年朝廷清明四方無虞壹意稽古禮文之事既纂輯性理大全之書以嘉惠萬世幾務之暇又取古昔聖賢盛德至善以致休祥者類為一書名曰為善隂隲頒賜廷臣及内外學官弟子使知善之當為與天之佑善如此而皆勉焉此誠開淑人心之盛意也於是南京國子監司業吴先生德潤率六館師儒詣行在稱謝而吾友尹組執中以諸生實從行於是執中同學之士若翰林檢討余君學䕫進士任時敬敏尹源本深兵科給事中劉渙士拯太學生李湘允淮與予皆在得相與道舊故意懽甚甫三日即别去則皆不能無離合之思去住之感矣既又相與告予曰執中入太學已三年今將援例告省其親子宜無愛一言嗟乎予何言以告執中顧所欲言者豈有加於賜書哉夫所謂善者人性之本然也父子之仁君臣之義夫婦之别長幼之序朋友之信以至於飲食起居酬酢萬變細微曲折之間莫不有至當之理焉是所謂盛德至善也夫人皆有是而人不能皆善者怵於利欲狃於俗蔽故有流於惡而不自知者此今之書所以作也然豈獨以告諸生將由諸生而施之天下焉執中歸矣問安視膳之隙必往之學宫而此書在焉其與邑之君子奉揚天子之德意而以倡於鄉之人使皆務善而去惡自君臣父子夫婦長幼朋友之道以至萬事之理皆勉而循之以長享太平之福澤豈非美歟他日歸太學而膺爵禄之榮又推已所得者以淑諸人使他之為諸生者累千萬人皆推其所得以淑諸人則天下純乎道德之懿雖唐虞莫加矣予姑先於執中乎觀也贈鄭進士公實還京序予以天順元年請老而歸明年二月有悼亡之戚初予妻病嘗治葬具不果用至是乃亡縣令佐謂其嘗受夫人封也當以聞上命禮部賜祭遣郡太守張矦瑄行禮工部為治墳以葬則遣進士一員董之工部廉得進士鄭鼐公實以行公實毗陵故家以詩經登上第有聰明坦亮過人之才而於事無不達其臨吾郡也於前之治其事者悉究其底蘊而制其所宜然予今之所欲為視昔人之所得為其緩急取舍有不同盖予昔所為具而幸存者有可用宜足成之而已朝廷以安民省費為務宜無不可乃具言於張侯與公實請斟酌而處其中必上不負大恩下不失事宜然後為美張侯公實皆不咈予言而公實則數履其地當時之受事者皆歸美於二君計予昔所費十之三復得公實賞勤而戒惰由是人人競勸而功以成及其將復命京師張侯謂公實之成其事乃成朝廷之美使生者有所感而死者有所歸豈非德及於幽明者乎宜有言以張之揚公實之美乃所以美朝廷也予聞君子有美必其前人之善有可以憑藉然後子孫得以充大而引長之公實之尊府年踰七十樂善不厭公實之志亦不異其父故當聖明之時為名進士登顯途功業炳炳在人耳目進而至於賢卿大夫可待也夫言公實之美而本於其親以見賢才之生不偶然也豈虛語哉故書以贈其行送道士蕭淵黙序淵黙名如潛予泰和緑竹蕭氏子也幼出家學道延真觀師黄仲真以其俊慧特愛之教以正一道法淵黙亦善事其師學用有成今年來北京與醮事逢國有大慶凡僧道在會未度者皆得度淵黙大喜來拜予曰如潛䝉恩度為道士如所欲為幸大矣先生以鄉邑之故願假寵如潛賜之一言以教勉之則為幸加焉予學孔子者也孔子之道異於老氏老氏以清淨為宗以澹泊自養使神完氣充超然自得於物表此其至者也若誦經呪蕆科法為人禱禳則其次矣吾儒自修身齊家推以治國平天下使人皆安於仁義道德之歸而以其餘力馳騁於文章翰墨之間流傳於世者猶足有補於風化故人争重之此其所以異也然為老氏者果能超然於物表固善矣其止為人禱禳無所得於經呪科法之外亦未見其卓然有立於世也故有智識之士必自託於吾儒誦其書攻其藝往往能名世而不朽其前之為者予不暇悉姑舉近而可信者一人焉茆山張伯雨盖自託於吾儒者也當時為道士者貴富顯榮愈於伯雨亦多矣然皆泯沒而無聞獨伯雨之文行與其翰墨之妙至今人皆愛重之是伯雨固未嘗死也比之區區從事於經呪科法與徒僥倖於富貴顯榮者其輕重可知矣淵黙學老氏善於經呪科法而猶欲得予言予可以尋常道士視淵黙哉延真古名勝之地學於其中而能超然物表精於禱禳者皆有矣託於吾儒者亦有矣今之後輩如淵黙者固可勉而進也淵黙其將造乎其至者乎抑亦安於其次也乎茍將造乎其至不必用予言也若安於其次則經呪科法凡知書者皆能誦之未可以自足也盍亦博究乎儒書而攻乎其藝庶幾名世而不朽乎若其行又進焉尤君子之所與也淵黙聞予言益大喜且言其徒多清俊可教期必如予言然後已予於是知淵黙之可與進矣故為序以送之且俟他日考其成也歸而見同志皆以是言告之送張太守考績序吉安之為望郡舊矣貢賦之殷人民之衆不論也昔之君子善政善教維持愛䕶以致其美而人性之良學問之力足以循上之令以成其治功豈一日之故哉我朝列聖治天下以養民為務而猶致意於賢守非忠厚廉慎恭已愛人之君子不任也景泰中吉之守缺予承乏吏部詢于衆在廷大臣皆謂無過張郎中即以其名進而張君遂陞吉安知府君名瑄字闕江浦人以進士官刑部有盛名予既喜得張君而人之知張君皆為吉安喜之君循仁義謹禮法其言行有常事無大小造次不違於理人亦莫敢干以私凡諸訴訟尤必致其詳於是刑獄清而民服既久而不變江西藩憲及朝廷耳目禁近之賢嘗道吉而來者無間言焉予為喜亦甚盖前之為郡者不能是郡人老長相與究其迹而公其是非未嘗不竊嘆之今得君之賢以為民父母安得不深為喜哉予官京師五十年知聖天子求賢養民之心切矣賢者賞勸以勵其進必至於逺大而後已君之德著矣郡人仰而望之豈減龔黄召杜哉其進於顯榮盖未艾考績而歸尚有以副民望也予年八十得賜歸田里撫育其子孫以䝉善政善教之益於君功業之盛他日尚當有紀也姑書此以為考績贈行序送稹序景泰元年二月予子稹來北京事予已三載克盡敬愛予之心懽焉今其兄秬來代予遣之歸而有不忍别之色嗟乎古人事親養志為大此曽子之孝爾稹所宜務也予為爾言之爾為我敬聽之爾兄弟五人伯兄忝禄仕仲兄來此爾雖歸未能即達其治家者惟弟穆一人秱幼未解也墳墓之展省祠堂之祭祀當各以時行事爾母老且病矣諸子童孫尊卑貴賤之屬奚啻百人所以事上撫下制其過勉其不及與夫親舊之往來鄉里之交際又有吉㓙憂虞出於尋常智慮之所不及者此予心之所急而皆萃於穆一人速爾之歸欲爾之任此爾任之穆相之緩急相須可否相濟不惑於讒邪而篤於恩誼一德一心庶幾其有立乎予年過七十百病交攻氣餒血衰神昏意怠獨此心未忘奉祖宗保嗣續盖其最重者日侍左右以適予口體乃其輕者也爾兄弟任其重而皆如予志是亦曽子之孝也雖不在左右予懽樂加焉然予聞之君子事親以敬愛其身為本敬愛其身乃所以敬愛其親爾不能敬愛人則人亦莫有敬愛爾者愛人者人恒愛之敬人者人恒敬之則於其親有耀矣謙恭和厚乃所以為敬愛剛暴者其反也已以剛暴施之而人亦以剛暴應焉貽辱於親豈所謂能孝者哉爾兄弟其戒之易卦之謙艮下坤上以山之崇髙而屈於卑順盖有謙恭和厚之德焉故六爻皆吉以是自處則何往而不善吾告吾子止於此矣歸而揭於堂中爾兄弟無少長朝夕見之猶吾之見也其敬念之毋忽墨竹巻引永樂初予取進士入翰林與毘陵王孟端相好孟端善寫竹遇佳紙筆輒為予寫之不少吝然往往為親友取去予恃有孟端亦不甚惜也久之孟端捐館竹不可復得視予所存僅三四始大悔恨既而得仲昭為友其風流灑落不異孟端而寫竹與之並能遂予所欲然求於予者亦不異昔時予方懲往事恐失之乃連紙十餘幅以求於仲昭仲昭欣然為舉筆稚壯老嫩披折偃仰之態各臻其妙盖數尺之圖而有湘江千里之勢誠可謂竒矣及仲昭歸省而來復以墨竹一巻遺予曰此某所用意者置諸左右或可少娛目焉乃此巻也於乎仲昭之意盖厚矣古之君子託意於竹以勵德淇澳之詩是也仲昭豈以耳目細娛為足哉仲昭登進士第時姓朱後復姓夏其名從永從日以善書徵入翰林太宗皇帝取所書為當時第一顧見其名謂曰太陽麗天照臨萬國日宜書在上仲昭頓首受命士大夫皆以為榮一時與仲昭同名者皆祗奉聖訓改焉仲昭在朝三十年其聲名藉甚今以賢舉為瑞州知府云予既得所寫竹二巻欲求諸公題詠而難之乃書舊作於後而序所以得之故以為引因道仲昭遭遇之盛使人知仲昭非偶然者而其美亦非特竹也抑菴文後集巻二十三
