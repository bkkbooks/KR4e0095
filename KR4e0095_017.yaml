body:
  text: 抑菴文後集巻四明王直撰記泰寜縣儒學新作明倫堂記正統十二年四月乙卯泰寜縣儒學新作明倫堂成教諭李卓以書來京師請於予曰縣學之有明倫堂舊矣其始在禮殿之東洪武初為縣者以其敝也改作於禮殿之後因其地勢而為之充拓之不加計慮之不審殿堂相覆壓簷宇相蔽虧無閎逹之觀有鬱塞之嫌其中吟詠之舎肄習之所可以納日月之光者葢無幾非特學者不以為快逹官顯人至是亦未嘗不嘆其隘且逼也卓之始至甚病焉且以其宻邇殿庭詩書之誦夏楚之施賔客之徃來使令之人之走集喧囂之聲不絶於耳非嚴肅以妥聖靈之道也况歲乆復敝思一新之而未能邑之耆老來言曰昔者堂搆在東髙大明爽山川之勝當乎前皆若效竒獻秀於兹堂者葢一邑之偉觀也是以前代之士之學於此者相繼魁天下聰明茂美之才亦累累有焉載之縣志可考也改作以來七八十年名薦書者有矣取進士者僅一人是雖本於學問之至與未至抑山川雖勝而兹堂僻絶不足以當其美與若復從其舊則嘉恵敝邑厚矣卓遂以白於縣主簿黄瑺首許焉縣丞周仕良力賛之皆出貲為倡簮纓之家詩書之族好德尚義之人亦相率來助乃治其故基辨方正位聚財鳩工晨夜展力中為明倫堂右左為明德養正二齋知縣洪鏞後至恊心一意數課勵以相其成而捴其大都者則邵武府通判郭侯和也以正統丙寅十二月興工葢五閲月而畢規制宏敞有加於舊凡諸俊秀皆恱而願學於斯來㳺來觀者亦莫不稱其盛也是宜有記以傳於永乆今學校之設徧天下其祀先聖則有廟而講道辨德則在於斯堂之中葢所謂立教之地也君臣父子夫婦長㓜朋友乃人之大倫有親有義有别有序有信其道之當然也明之則叙不明則斁天下之治忽繋焉舜之命契三代之立學皆以明此而已明之者何盡其道而已而道之行則又本於五者之德焉體之以仁而益於厚制之於義而盡其宜禮以謹其分之嚴智以辨其理之正而信則以實其心之所發也如是則倫明矣孟子曰人倫明於上小民親於下治化之盛將不與唐虞三代等乎泰寜邵武屬邑也其地多崇山峻嶺舟車之所不通物産富饒風俗淳美故民生皆足以自養而無慕乎外其於人道之當然天理之本然雖或未能盡知而行之然具於人心者未嘗冺詩書之訓所以致其明之之功者亦未嘗廢也今兹堂既新復以明倫榜於上為治之賢典教之儒師皆可謂知本者矣來學之士誦其詩讀其書仰而瞻其名俯而思盡其道治於身行於家施於鄉黨州閭忠愛之誠積於念慮之微達於事為之著又擴而充之至於無所不用其極則教學之效成若其文章之著見亦皆道德之英華將可為後世法豈但一時魁多士而已哉此任治教者之所深望學者之所當勉也誠能乎是則無負今日興作之意矣卓予同邑人嘗從予逰蓋有志於道者故為之記俾刻諸石以告焉瑞芝堂記瑞芝堂者吉水宋士㑹所居之堂也堂在㶚水西挹山川之秀逺城市之擾田園可以資朝夕林壑可以供逰眺詩書之儲禮樂之習可以備講論而適性情兄弟閒暇相與燕休於此蓋雝雝然和怡怡然樂也正統丁卯夏五月芝生於其書室中凡三本秋七月又生一本於其居之右大者如盤小者如盂精彩絢爛醲郁芬敷蓋金玉之鏤錦繡之舒不足以喻其美且腴也郷之老長聞而觀之皆嘖嘖譽嘆曰此神竒之産宋氏之瑞也夫天地生物未有不資於人者播種之封殖之然後得遂其生此理之常也茍非人力則天地生物之性亦惡能遂哉今此芝也生於幽靜閒曠之處不種蒔而育不滋殖而榮其容質之美非世俗所常見他物所能比此殆不可以常理論矣不謂之神竒之産宋氏之瑞可乎宜名斯堂曰瑞芝堂其弟南京尚寳丞士髙以書道其事而請文為記傳曰和氣致祥凡物之為瑞者皆和氣發育芝之不資於人以生則宋氏和氣之應可知矣然此豈一日之積哉予與尚寳之尊府長史君為同年而知其兄弟相友愛嘗一造其家伯兄子琳甫延客坐長史君與諸弟侍左右雍容談笑禮意周浹伯氏有言皆敬聽尊爼之間進退拜跽藹然和氣可挹也予於是而知宋氏之福蓋未艾今芝為瑞豈非士㑹兄弟克紹先德而致然歟且生不於其他而於書室者非以孝弟之道具於書讀其書踐其實和之所由致也歟然則士㑹兄弟欲篤於是道其可不勉夫學哉果學進而德修則和氣之應豈特草木之瑞也有元之時㑹川有尹先生四兄弟伯仲同乳皆九十歲二季亦各八十餘敦行孝義友愛敬譲郷里化之士大夫歌詠焉邵菴虞先生為之序以人瑞稱之謂非草木之瑞可比也士㑹兄弟勉之學益進德益脩則其所至將不與尹氏兄弟等乎此予愛厚之意也是為記留耕軒記君子之善其身而裕乎後者豈有他哉治其心而已矣心者天理之所寓人事之所賴以酬酢者也治之者何去其所蔽使受於天者常存而應於人者常得則善身裕後將何所不至哉昔馮文懿公嘗取辟於地而賦詠之其詩曰但存方寸地留與子孫耕方寸地者心之謂也耕者治之使不為物欲所穢也文懿蓋能治其心善其身又以遺後之人而亦使之善治焉其所見之卓度越常情逺矣哉今都察院右副都御史江陵張公志忠自㓜知有此詩每誦於口而快於心及既能書但遇筆輒書之於几案墻壁可書者皆書不特楮素之間為然也此其心蓋與文懿有黙契焉者因遂以留耕名其軒而於自治益敬慎不懈凡利欲之私可以為心之病者不使汨於其中及登科第任風紀推其所存以施於仁民愛物其功效在人耳目而人莫不稱其賢然豈特善其身而已哉亦將以詒後之人而世篤不忘也予嘗觀之世之為人父祖者皆思有以遺子孫使足於自養徃徃竭智殫力以求之横肆於阡陌之間蕪穢於方寸之内於是人尤之天厭之腴田沃壤不能終其身而有焉或因之以累其後安望其能自養也由是而知君子之所以善身而裕後者非以治心為之本與志忠以聖人之道治其心而行諸其身辟之治田而長嘉榖苗而秀秀而實亦既食而飽矣其田固自若也使其子孫菑播是勤而去其薉遂其成則食其實有既哉志忠求予記故推衍其義俾掲於軒之壁而以告其後人焉凝翠樓記予泰和多大家灌溪其一也灌溪在縣東南四十里尹氏世居之而以貲富科第顯名彦偉蓋今之傑然者也灌溪多好山彦偉好之思舉目而盡其勝乃作新樓巋然出於羣屋之上閒暇則登以望焉見山之蒼然環列髙者下者特起者離立者窈而深迴而曲者如鵬鶱如鶚峙如蚓結蛇蟠虎豹踞而蛟螭走千態萬狀皆在乎履舄之下嵐光秀色飛碧流黛隨風飄泛凌冒逺邇披拂乎帷席衍溢乎軒忩雖昔人之居終南少室所以寓目適情者不是過也彦偉樂焉因名樓曰凝翠之樓今年其子資恱來北京因進士蕭孟勤羅崇本求予為記予昔家居時常接彦偉觀其容儀聽其議論而知其賢於衆人逺矣及今而聞其好尚如此則於記斯樓可已邪夫山水之美所在有之茍不遇人而愛焉則遺棄荒遐寂寞之野樵夫之所徃來牧子之所陟降故知物不自美因人而彰不偶然也地與人相遇矣而或不遇其時憂患勞役奔走於塵埃氛霧之中雖有殊勝不暇一顧􅚽玃敗乎外蟲虺穢乎内亦惡在其為美哉今灌溪諸山既與彦偉遇矣而又當聖朝治化之隆上下相安於無事故得以其餘力治此樓而窮夫觀覽之勝豈非幸哉抑予聞之孔子曰仁者樂山蓋君子之好尚必以類山之能生物者仁也君子以仁存心其德相似故樂焉彦偉居斯樓挹山色之蒼翠當必厚乎心之仁施其恵利以及於一鄉使窶夫細人皆欣然有和豫之色信如孔子之所云者則彦偉之令聞與斯樓之勝槩皆可以乆而不冺矣故記之思濟堂記番昜胡秉常以醫名京師嘗扁其堂曰思濟中書舍人解禎期與之相厚也求予為之記曰胡氏世家廬陵秉常曽大父仲和始避兵居番昜故今遂為番昜人大父中厚精於醫開衛生堂施藥以濟病者番人德之洪武中用薦舉為兩淮運使卒父以寜尤精其術至秉常三世矣其汲汲於濟人猶大父之心也名堂之意蓋如此嗟乎秉常其敏於仁者與斯人也同受天地之氣以生故凡與我同類者皆同氣之親也是以聖人一視而同仁伊尹相天下一夫不獲其所則耻之此豈有彼我之間哉醫之為道亦出於聖人所以成天地之仁而為人司命也君子學而行之視人之有疾痛者不異在已必使之遂其安不亦伊尹之心哉故昔之人欲達則為良相不達為良醫此無他思推其仁而已雖所濟者有逺近多寡之不同然隨其所可及而施之賢於壅而不行者君子之心固如是也秉常其同乎此心哉京師之以醫名者不可一二數其心如秉常蓋少矣予嘗聞於士大夫秉常赴人之急不以風雨寒暑為辭不以貧富貴賤易意予固賢之屬予有疾求秉常其殷勤篤厚誠有賢於人者秉常持其恒心至於乆而不變則人之䝉其濟者可勝計哉然因是而思之世之為州縣者受爵禄之榮固當思天子同仁之心以惠其民然而汲汲思濟其民者恒少汲汲思濟其欲者恒多使皆若是汲汲然思濟其民則民之病有弗瘳者乎故為記斯堂而併著之庶或有儆也竹鶴軒記吏部司務何君彦澤於私第作小軒植竹數竿竹下置鶴焉每時雨初霽清風徐來或明月正臨白露微滴竹之植者皆姢好净秀而斯鶴也或俛而啄奮而舞戞然而長鳴彦澤狎而玩之其心有甚適者因名軒曰竹鶴之軒或者曰彦澤非隠者也其顯仕乆矣彼洛陽之牡丹維揚之芍藥嶺南之孔翠其容色妖麗而文采絢爛足以恱乎目快乎心昔之顯者蓋常樂此矣若竹與鶴雖曰清雅絶塵然其聲色臭味豈足為恱哉是固畸人逸士之所好也彦澤不彼之樂而此之好其亦異乎且君子可以寓意於物而不可留意於物昔之人有好鶴而致敗好竹而取嘲者皆留意之過也彦澤於斯二者偶一寓意焉可矣而至以名其軒無乃留意於物乎此非所望於彦澤也解之者曰凡人之嗜好必以類知者樂水仁者樂山以其體之似也彦澤神清氣和而襟度恬曠超然不累於俗竹與鶴蓋似之是以好之非若衛赤之簡賢王猷之傲物也且好惡人情之所有也顧所發何如耳晉王右軍之清而好鵝陶淵明之達而好菊唐李白之雄放而好白鷴宋周子之賢而好蓮花彼皆仕者也然不屑於富貴之樂而獨好於此其意皆有所寓也彦澤蓋亦若是矣若劉伶之於酒祖約之於財阮孚之於蠟屐樂之終身不厭則其情之蔽識之偏視彦澤所好其清濁相逺矣此何足以為病予友李公時勉聞之曰是庶乎彦澤之意哉予曰然則然矣而予所欲於彦澤者不止是孔子曰知者樂水仁者樂山亦資之以成德也不然則徒好而已詩淇澳三章皆以緑竹起興美武公之德積而至於盛也鶴鳴二章皆以鶴鳴為比言誠之不可掩而人之不可不誠其身也皆大賢君子自修之實也彦澤宜加意於此哉夫天下之理無窮而學問之功亦貴於無已彦澤誠加之意焉則固大賢君子也於竹鶴之好非徒細娛而已矣李公曰子之言彦澤所樂聞也盍書以為記俾掲於軒之壁間而朝夕覽觀焉乃為書之凝翠樓記吉水陳襲祖居邑之住岐蓋南唐門下侍郎喬之後七世祖恵卿仕宋官至迪功郎入國朝來襲祖諸父孟桓孟躬皆舉進士孟桓為蘭陽令孟躬三為郡博士至其姪素亦登進士第而自請為教官此其已顯者蓋衣冠之族也今年襲祖來北京而素亦自沙縣教諭考績來過予言曰住岐當山水勝處襲祖之家又據其勝然為岡阜之所榮抱林薄之所蔽虧不得以盡覽焉於是作樓若干楹巋然出於羣屋之上凡山水之勝始可一覽而盡得之蓋鼇山在其南岐山在其東鬱盤深秀歴四時之變而不改其色江自章貢來北經玉峽然後引而東蔣沙綿亘乎其西嘉木茂樹挺入霄漢環而望之紆青繚碧浮藍飛黛皆聚於此樓誠所謂竒觀也惟江山之秀非樓無以盡其勝而兹樓之勝非文無以彰其美願請記於先生予謂山水之可觀者豈獨住岐哉然而有顯不顯繫乎其人之遇不遇焉昔栁子之居栁與永也二州佳山水州人多不知好於是剷荒穢開䝉蘢發清泠披莽蒼凡蓋藏掩覆於千百年之乆者一旦皆軒豁呈露至於後世人得以知其美而遂觀游之樂者以栁子故也豈非山水之幸哉兹樓得山川之秀而自襲祖作之其亦可謂幸也已雖然地以人而勝君子之善其地尤莫善於繼其先侍郎仕南唐忠義之心炳如日月庶所謂立德者此陳氏之望也為子孫者當思有立以繼之則山水之秀當益増非特一時之竒觀而已故為之記使陳氏之子孫登斯樓者覽之而思自勵云歸來堂記瓊山教諭萬載蕭希曽既歸老於家名所居堂曰歸來之堂因其鄉友刑科給事中郭君邦器屬予記曰希曽以永樂甲午鄉貢進士典教於閩中後復改瓊其學足以教人而才行亦足以治人當路者累欲薦之然以其有疾不果希曽安於此職一不以介意既得請而歸其心誠有以自樂也蓋嘗於其先廬之後構屋凡百楹而名堂曰榮恩今又别作堂以歸來名之榮恩志其進歸來喜其退也且地多佳山水鵝峯矗乎東雲嶺屹乎西夏山拱揖於前龍窩峻拔於後其岡巒之秀草木之茂煙雲之變態清泉白石之流峙羽毛之類飛走而上下遊人行侣樵童牧豎嘯歌而徃來其中良田可以稼深池可以漁閒原隙地可以供桑麻蔬果凡養生之具皆不必外求喧鬨塵雜之所不到希曽燕休於此堂固已囂囂然矣而外物之足乎心接乎耳目者又如此皆其所樂也予謂古之君子壯而仕以行其道及既老且倦矣則致其事而歸仕有常禄歸有常業是以進退自得也後之君子或以官為家故有溺而忘歸或素乏常業而無以為歸於是有貪位之譏竊禄之嫌我朝列聖以深仁厚澤涵育天下天下之人無無業之家仕者之老而倦也則不欲煩以政使歸休於田里而無留禄之人此太平極盛之世也希曽進而享其榮退而遂其樂豈非君子之幸哉然君子之樂不徒樂也樂則形於言希曽必有以歌詠聖化發為治世之音後之人得觀於此而聖朝之美著矣則歸來之堂豈不亦與有耀哉故為之記貞夀堂記貞夀堂者何安成蕭希進與弟希遷奉其祖母之堂也堂而名曰貞夀者何所以著其德而美其福也婦人之德非止於貞福亦非止於夀也而獨以貞夀名者何蓋舉其重者名之也希進之祖懋廣早世其父紹芳之生始數月祖母劉誓不改節撫育而教誨之紹芳年二十五與其配相繼沒希進兄弟皆幼又賴劉氏之德底於成蓋年二十而寡長育其子孫逾乆而不變今年七十二矣此貞夀之所以名也昔之論女德者必先於柔順柔順者剛徤之對隂陽之義也而孔子於坤之彖則曰柔順利貞貞者知正而固守之之謂予取以為則焉夫處閨門之奥有夫子之依柔順誠德之美也一遇事變履危難而必曰柔順焉將不至於委靡而茍從矣乎柔順以處其常貞以處其變而後為女德之全方劉之為婦非不足於柔順也及災罹禍變蕭之嗣續辟一髪而引千鈞卒能殫心盡力以再造厥家非其志之正守之固毅然自任而不囘安能如是哉今年踰七十貞者之所宜也松栢之貞冒寒暑歴霜雪而柯不改葉不易由是而大百圍閲千歲其理固應爾矣然則以貞夀名堂斯不亦稱情也哉希進兄弟奉養於斯堂豐其服食調其起居而娛恱其志意者所以報德也亦可謂能孝也矣嗚呼世之為婦不幸而早寡者何限然或去而之他至於覆人之宗絶人之嗣者有之未必非柔順之過而貞不足也恒之辭曰婦人貞吉從一而終然則從一而終婦人之貞得吉之道也若之何其可忽哉故予記斯堂而反覆著之聞者亦將有感也夫奉親堂記辛里謝氏於安成為故家復昌則謝氏之良也今年既七十矣其子貴祖等作堂以奉之朝夕侍左右順適其起居承候其顔色調其衣服飲食寒煖多寡之宜而其心懽焉族之賢者濵州學正利貞為名其堂曰奉親之堂既而貴祖來北京求予文為記夫親者子之所由有其身者也生成之德大矣譬如天地然不可得而名亦不可得而報也雖然豈敢忘哉天之生物不能有報者惟其無知也若人則異於物矣然求其報豈奉養所能盡哉而非奉養則無以致其情故奉養者乃所以報其萬一焉耳矣夫人必本於親而必奉養焉且猶不足以為報而有不能然者則謂之何哉蓋亦草木禽獸而已矣君子奚取焉若貴祖者宜為君子之所重也昔嘗聞之君子之事親莫善於養志尤莫善於成親養志者以其親之心為心也是故敬其所敬愛其所愛致其所可欲去其所可惡不使少拂逆焉此之謂養志至若言必循理而無過言行必由道而無過行使人皆曰此君子之子也是與其親為君子矣此之謂成親養志固善矣而成親其至也能如是則其奉雖薄而孝則大矣况又備物之稱情也哉庶乎其可以少報也貴祖讀書知道理且既能奉親矣予欲勉其進於大也故述其說以為記思敬堂記思敬堂者恵安伯張君琮所居之堂也君貴戚大家其祖姑為仁宗皇帝聖后實生宣宗章皇帝是謂太宗文皇帝嫡長孫文皇帝定儲副宣宗遂為皇太孫勵志詩書緝熈聖學其朝夕左右輔翼賛襄必擇天下之賢於是君之祖前恵安公以元舅之親實當其選章皇帝躬堯舜之資居元良之任仁義道德沛然洽於天下雖聖性髙明有以致之而輔導弼亮之益蓋公有矣上篤厚親親視戚里最重果賢且良則敬禮加焉夏之塗山殷之有娀周之任姒不能過章皇帝嗣大位推本母德之盛與舅氏毗輔之功遂進公為惠安伯而張氏之福禄榮名赫然無與比者公嘗言於衆曰吾幸以戚里之親受文皇帝顯命俾日侍皇太孫夙夜思所以報上者惟求之古人孟子謂非堯舜之道不敢以陳於王前此吾心之惓惓也衆皆以為誠然公既即世朝廷念公之深復以君襲伯爵益増戚里之榮君慨然曰昔吾祖恭敬事上天下莫不聞今餘慶遺澤復及於吾將何以為報哉吾聞之禮曰君子無不敬也敬身為大又曰敬德之聚也能敬必有德吾其益勉於敬乎乃以思敬名堂而屬予為記君子修已以敬推之以安人安百姓而已焉此聖人之教大賢君子之所以自勵也予豈有毫末加於是哉用是以為記俾書於堂之壁而日覽焉庶幾克紹先祖之志云清溪沈氏祠堂記監察御史沈珒奉其父兵部主事昪之言來告予曰沈氏先居湖州其後有文俊甫者徙居邑之南乍川則昪之曽大父也文俊甫生達之又自南乍徙清溪則昪之大父也大父好學聚書至萬巻實生昪之父榖寳以文行稱於鄉洪武中舉才能稱疾不就自曽大父文俊甫以來惇本力穡而詩書之業未嘗廢家日以裕然而有不能釋然者蓋昔居湖時嘗盛矣元季之亂兵燹相仍宗族離散豐堂廣宇皆化為丘墟壠畆矣賴曽大父之智改絃而更張之歴世相承八九十年廢者興衰者盛今幸不失前時之望然譜牒亡失故舊凋喪水木本源莫可究報本追逺之誠亦莫之能盡此其所深慨也古之君子致嚴乎其先者莫重於祭而祭必有廟廟必有主後世廟非賜不得立雖卿大夫之貴有官以榮其身而無廟以祀祖考子孫雖欲自盡亦同庶人之薦而已矣惟吾先世實有令德以啟佑後人故吾子琮珒遭遇聖明享禄位而昪䝉褒封之典今貴顯者三人慶澤之敷遺厚矣豈敢自同於衆庶而不思所以報哉乃於正寢之東拓地建堂以祀焉逺而不可考者末之何斷自其可知者為之次以文俊甫始遷乍川為第一世達之又徙清溪為第二世榖寳積善成德以蕃育子孫而沈氏復大為第三世吾二兄雖有後然吾同氣不忍違皆祔食若昪之妻之喪當祔亦舉以祔焉此祠堂享祀之意也願有記以示後夫廟之祀先尊祖睦族之大法也蓋當享之日則所享者之子孫皆至焉尊卑疏戚秩然不紊倫理正恩誼篤而無忝於其祖斯所謂孝也沈氏之先統系無所於考幸有賢子孫相繼出纉先德之傳念世祀之重作祠堂具器用而以歲時備物行禮誠可謂篤於孝者矣今祠堂之制非若古之廟也而逮及庶民皆得享四代制雖簡而祀則隆晦菴先生順天理本人情而以義起也事合於義而尊尊親親之道行則何古今之間哉聖朝之治旌孝以勸忠仕之賢者必褒及其親沈氏祖宗既立德於前子孫復善繼於後則宗祀之光榮盛大豈有窮哉故為之記以勉其為後者聚恩堂記聚恩堂者都察院右都御史李君之堂也堂之有名者何彰上之賜也何名為聚恩言澤之及其親者不可一二計也不可一二計而必以名堂者所以美其盛而思厚其報也李氏故江右人君之曽祖友政始徙居蜀之合陽世有隠德而不仕祖永恭質直好義謹禮而明法周窮恤匱甚於為已人有婚喪不能給者皆資之無吝色父祥字世昌尤淳厚恭儉惇本務實以興其家君生美容質而才足以有為祖父愛之嘗謂人曰吾家世積善此子必能亢吾宗日勉喻為學經史之外復使通律意曰刑所以輔治也學成取進士為禮科給事中會疆埸有事上皇北狩復進都給事中禮部右侍郎徃奉使責以大義有功而歸上嘉之拜右都御史而贈封其祖父亦如之妣與妻皆封夫人錫以誥命三世之親雖有尊卑存沒之殊而無不被其榮者及奉命巡撫湖湘乃治宅武昌迎祖母太夫人與父母來就禄公事之暇率諸婦子備物敬養焉太夫人思故鄉君用傳符乘鷁舟送至瞿塘乃歸荆益之人見君奉親徃來而光顯如此莫不稱嘆以為賢迨罷巡撫則奉父母居京師廣宇豐堂極海陸之珍以養朝夕天下之樂莫加焉孟子曰事孰為大事親為大君既得之矣况又有重慶之親皆以君顯而受褒寵之命乎則名堂曰聚恩豈不稱情也哉雖然恩者上所以厚下敬者下所以事上而所謂德之聚也李君益篤敬不忘則德萃於其身而聖朝恩澤之施將如川之方至渟涵浸灌汪洋衍迤而不可窮豈特今之聚而已李君求予記故為記之使掲於堂上觀乎此者其孰無欣慕之心哉重慶堂記重慶堂者舒城鄭氏奉親之堂也鄭氏於舒為大家代有顯人國朝以來德善之積而致夀考之隆者又一時之盛而重慶之堂所以作也監察御史時為予言其世祖父以文初以養親不仕而篤於孝敬今年九十樂善之志不衰以時伯父景陽貴封南京刑部右侍郎祖母王氏年八十亦封淑人時忝家教取進士官御史幸䝉天子之寵命父景顒得封為監察御史母王氏封太孺人賜勅命叔景髙則以舉義納粟賑饑亦賜冠帶榮其身今三世之親夀考光榮而聚於一堂歲時稱慶内外姻屬皆在焉懽忻和樂藹然充溢於其家因以重慶名堂其亦可謂稱情也矣願為記其事以垂乆逺予謂君子致福於其身不偶然也蓋德者人之所得於天得之於天而保之不失然後天佑之俾康寜夀考而子孫榮盛此天所以彰其德也成周詩人之於君子也既以無疆無期祝其夀矣又推言其所以得夀者而曰德音不已德音是茂其意猶未已也又極言之至於保艾爾後乃已焉豈非以有其德者固可以得夀猶必保養其子孫蕃衍盛大然後為福之全於乎何其善言君子也天之於人惟善則佑之身其康强子孫其逄吉觀時之祖與父則其為善之應可知矣孔子曰積善之家必有餘慶積之云者非偶一為之而止而善亦非一行之可名也人之於善累累而不已則天之錫慶亦源源而不窮鄭氏之祖父既積之於前而時又善繼於後則福禄之來名爵之加將愈乆而愈盛矣故為之記亦以勉夫後之來者萬安縣學重修大成殿記萬安文獻之邑也儒學在縣治東北而當山川之勝若金鵞芙蓉諸山章貢諸水重岡疊嶂恬波駭浪不間逺近巨細皆迴合拱挹效竒獻秀於此故昔之作者有取焉其所建立廟在前學次之人既鍾其清淑之氣而益以學問徃徃登髙科躋膴仕有盛名當世而萬安之學著稱於天下至於今乆矣繕治不繼日入於敝朝廷每下興學之詔有司以多務鮮克用其力景泰壬申都察院右僉都御史姑蘓韓公允熈奉命巡撫江西得便宜從事政令修舉威行恵施而尤以興學為急至萬安謁先聖周覽殿廷而嘆其敝陋召邑中耆儒秀士富家巨室欲集衆力而新之邑之義民曽時望言於衆曰公之興學以聖人之道教敝邑子弟甚盛心也為父兄者奚可不自勉而以煩公慮乎學之資用殿為大時望請獨任之一不以及人公大喜加奨勵焉時望務逺圖不惜費市杉木湖湘必取合抱大材其他磚瓦鐡石黝堊丹漆等物及諸工匠皆求其良者而以財致之是年九月興工而以明年四月成為大成殿五間髙四丈五尺有竒而深濶稱之脩梁鉅棟重檐刻桷土木采章極其輪奐聖賢像貌之居殿中者皆塑繪如制視昔之美有加焉既而韓公復以事臨萬安徘徊瞻視見其巍然煥然可以冠諸邑益大喜曰時望嘗出穀賑饑璽書褒賞為義民今又獨捐巨費以成朝廷興學之美豈非誠好義之士哉左副都御史劉公廣衡萬安之傑也與曽氏聨姻好謂其世澤在人故家有餘積而韓公秉德蹈義足以使人興起故時望為此不難也不可以不書乃屬予為記以示後人使知今日興作之所自而萬安令某則請具石以刻焉予謂學校教之地也然必有廟以祀先聖所以明道之有統也聖人之道非他因人之固有者而道之耳仁義禮智人之固有者也然或蔽而昩焉則於君臣父子夫婦長幼朋友之倫日用事物之酬應有不得其宜者是以聖人著於書建學立師聚其才俊而教之使讀其書以明理之本然與其用之當然皆有以善其身植其家而達於鄉黨州閭出則為循良豈弟之臣處則為孝友忠信之士而無不宜者然後為教之成於乎學校之教蓋治之本也修舉而程勸之奚可緩邪今大成殿既新矣學於是者當何如用心哉進而瞻夫道德之容退而循夫義理之實本末兼盡精粗不遺用舍行藏之間真足以興道致治儀世範俗斯不負聖天子教育之仁與夫造作勸勵之意若徒用心於其末而不究其本自謂無忝焉者非君子之學也予念韓公惓惓於學校而嘉劉公不忘人善且欲勉其學者篤志力行而皆為大賢君子之歸亦以永時望之譽於悠乆故為之記而使刻諸石忠孝堂記聖天子恭膺天命復正大位以安宗社於萬萬年薄海内外凡君國子民者不間逺邇鉅細皆鼓舞謳歌以為此天地眷命之隆非人力之所能為也上既大受羣臣朝布德恵於天下詔凡有勞者皆陞秩於是都察院左都御史楊公進封興濟伯仍掌鴻臚禮儀公名善字思敬早遇太宗皇帝於潜邸以文武之才承殊特之眷靖難之時已建勞績尤深明典禮遂陟正卿以任其事而朝廷上下朝覲㑹同軍兵蒐獵事雖非一無不當於禮者仁宗宣宗今上皇帝在位時皆以公為能親任之恭慎不怠謀行計施其所論事惟務大體必依於仁義忠信天下之人仰其令望而挹其餘光蓋五十餘年及天兵北伐公徃迎鸞輅還京師奉上天之明命以化諭其人宣布我朝列聖大德涵容保養俾得遂其安之意發剛大之氣吐正直之詞敵人恱服聖駕來歸公之才德益著而功用益顯既又進兼禮部尚書人莫不以為宜而公則曰吾聞古之君子之事上也必以忠孝為本忠以事君孝以事親忠孝臣子之大節也忠孝兼盡臣子之道立矣善固以此自勵而致爵禄之榮其敢須臾忘之哉因以忠孝名堂朝夕覽之而益勉焉予時以老病賜歸田里而公以堂記屬予予從公逰且乆不獲辭因次第其說以為記景仰亭記景仰亭者饒州太守王侯作也祠事前守而復建此亭憩息之所宜有也亭而名曰景仰者何也取詩髙山仰止景行行止之意也前守謂誰顔公真卿范公仲淹王公十朋也侯所以敬事之者何也蓋三公之德行著天下恵澤在生民譽望聞海内皆嘗出知饒州人之所不能忘也唐天寳之亂盗賊蜂起顔公獨秉大節遏宼鋒然以正直不容於姦邪連被貶斥及正廟祀舉朝儀言事益切召謗益深卒陷於希烈以死宋天聖中章獻臨朝范公居諌職首言天子無北面太后古無代立者及論時政闕失謂安危治亂在用人公私之間宰相惡之落職知饒州移延慶飭守備事上遇人一以誠信先憂後樂者公之素志也王公為宋著作時言人主之職有三任賢納諌賞罰而已又言大臣懐姦誤國八罪正左右史之職以論諌剴切出知饒州萑莆多盗一夕遁去歴典四郡雨暘時若人之眷懐有如父母其德善可知也古之君子有志於斯世者必以聖賢為師非道不言非法不行不以死生禍福介意唐宋以來治亂多已君子小人更迭用事得失之辨是非之公蓋有不可冺者魯叔孫穆子謂立德立功立言可以不朽三賢之所立如此王侯合而祠之宜也師其善政善教而想其容儀辭氣之盛形於拜跽薦奠之間焄蒿悽愴如或見焉豈非尚德之君子哉侯名忠錢唐人由進士入翰林擢兵部主事用簡拔陞今官廉公明慎吏畏民懐尤加意養士至親為授經天乆不雨躬禱而雨其精誠有足尚者侯既為此亭兵部尚書孫公原貞題其榜侯乃為書告予曰忠昔在翰林從遊今幸典名郡繼三賢之後其遺休餘澤風聲氣習表然在人者忠得倣而行之以惠此一邦亭之有名示志也願先生為之記而加勉焉侯蓋篤於自修者也孔子曰君子修已以敬推而至於安人安百姓則其效大矣予既為書三賢之美而併以是為言者蓋期侯之德業充而極於逺大也詩不云乎庶幾夙夜以永終譽侯果有取焉則掲於亭之壁以為記德安府重修廟學記德安禹貢荆州之域春秋鄖子國也秦屬南郡漢唐名安陸宋置安逺軍節度以世宗潜邸在焉又陞為德安府其風俗醇厚而人多秀傑喜儒術自昔以文章魁天下躋輔相者有焉國朝以來建學育才以興太平之治而德安之學校亦乆而敝矣有政教之責者病之前守天台范理雖嘗修治而其力不繼僅完大成殿可以容爼豆其他則日入隳壊景泰三年刑部郎中周侯鐸以賢舉為德安守侯萬安人字秉訓由進士官郎署公廉愛人聲譽藹蔚下車之初周覽學舍嘆曰賢才治天下之本學校賢才之所從出也敝陋如此何以作其氣成其才以稱上意哉亟欲有為以歲之不易不克如志越二年歲豐民和侯大喜曰是可有為矣乃與僚佐議各出資以為倡於是民有好義者皆奮而應之富者出貲貧者効勞各盡其誠不呼而集市材鳩工並手偕作廟之椽壁有腐壊者更易之兩廡舊各七間今以其隘各増為一十五間毎間為一壇塑先賢先儒像居其位作㦸門櫺星門櫺星門之南立牌樓榜曰文廟櫺星之西作神厨六間故明倫堂隘擇文廟東空地作明倫堂五間堂後剏講堂五間講堂東西作號房各七間其東北作饌堂五間明倫堂東西作誠意正心進德修業四齋各三間明倫堂前鑿石甃泮池周迴三十丈池内壘石為三橋以通徃來池東西作號房各六間池南作門屋三間榜曰儒學而周以垣儒學門首新作通衢大道半里許衢之東西各署牌樓掲扁焉東曰興賢西曰毓秀又於興賢之東作牌樓一扁曰儒林皆侯之經營署置土木采章極其輪奐氣象軒豁規模宏逺矣始作於景泰五年之秋而以天順三年之冬訖工郡教授黄琰訓導陳和趙誠陶鼎曽政相與言曰學校之成侯之用心至矣不為之記則何以示後人勸多士乃備書本末俾學之賢者王子昭持來請予文刻之石予聞古之治天下者必本於學校三代之教可見已然非獨治天下者然也雖諸侯亦有之德安名郡古諸侯之邦民性之厚率聖人之教非一日矣乃今又得周侯大興學校以教之學所以明聖人之道也聖人之道本於心而著於書讀書以明道自倫誼之大至於物理之微皆精察力行化於家儀於鄉推而施之天下而治道盛矣然有志者蓋鮮也故讀書而不明道者有矣悖道而趨利者有矣束書不觀而僥倖於一切者又有矣此流俗之通患也為士者䝉教育之厚而顧以流俗自處則奚貴於士哉此亦非周侯所望於學者也吾嘗聞之宋仁宗皇帝重選士嘗焚香祝天願求忠孝狀元是歲果郡士鄭獬魁天下當時以為得人今德安之學既新矣來學於此者皆當日新其德為忠臣孝子以圖報於朝廷而不陷於流俗則無負皇上教育之大德與諸守倅師儒勉學之盛心則善矣故為書此以賛其成亦思以勸來者予之相愛也厚矣觀者其毋忽諸瓊州府重修廟學記瓊州府在南海上瀕海州縣十六七而統以一府地既阻險海患間作人物皆被其害洪武初置廟學於郡治東南其為士者多喜學賔興之歲以經術自奮取進士登要途者相望也天順庚辰七月望赤雲勃興盲飈怪雨發作無節居人大恐曰此颶候也乆而愈暴頺垣古屋塌然摧仆翌日午稍息徐而視之禮殿僅存一二餘則盡廢有司不遑修治日徃月來實概於心今年春廣東憲副臨武鄺公廵省至是邦謁先聖廟憫其傾覆且盡無以掲䖍妥靈師無所施教弟子無所受業喟然以修復為已任謂太守章貢葉侯鼒推官五雲劉侯詔等曰天變雖無常而天職之在我者則有常也吾豈敢怠哉聞者皆為之喜協徳一心以奉其令貧者効力富者出財凡竹木瓦石飲食諸物之宜於用者無不畢備材良工善各逞其能不待勸程晨夜展力未數月禮殿成又踰月明倫堂成未幾兩廡四齋靈星㦸門次第皆成師生講論食息遊憩之處悉備乃飾聖賢像致美於容貌作鐘磬罍爵簠簋籩豆諸器皆以其物為之如制春秋有事於廟禮備樂和進退有節觀者莫不賛其美因相與謀而屬記焉學校教之地也古之聖人所以教者豈有他哉因人之所固有者而道之耳仁義禮智信人所固有也具於君臣父子夫婦長㓜朋友之間施於尊卑貴賤應事接物輕重疾徐之際而不失其宜道之常也若時氣失常風雨乖戾人物不遂其安草木鳥獸亦皆不得其所此災變之大者也因災變失常而謹人道之常者以修復焉豈非宜哉昔韓璧守是邦嘗新學矣晦庵先生為作記論天道人事之常以勉學者使踐其實而趨於善先生之文尚在也當復有知言君子質之而誠不悖焉則請續書以為瓊州府重修廟學記其始作則是年春二月之某日而以秋八月某日訖工臨乎上者厚於仁役乎下者勇於義是皆宜書不可以不書乃為之書鎮江府改建儒學記鎮江南京畿内郡䝉治化之日乆矣舊學在府廨東南朱方門裏今之忠祐坊是也自宋寳元來或修或否日入於敝至今景泰壬申郡守張侯廷瞻來歎其卑濕隘陋欲改作之士人多以貲來助即學宫之北買地庀工事具以聞詔可之適張侯以憂去後三年丙子而白侯希閔來任於是大成殿兩廡㦸門講堂四齋次第皆作其為屋崇卑廣狹悉中程度凡幾間既而白侯罷今林侯一薦繼之協德一心有猷有為又作尊經閣觀德亭靈星門興賢門泮宫門鑿泮池跨以石梁環以周道及諸祀享寢食庖湢之處教官之居諸生退習之舍無不備前後得三賢守區畫處置盡其方經始於壬申之六月而以己夘二月畢工蓋歴八年而廟學之制偉然完美矣左副都御史崔公廵撫畿甸至鎮江觀而恱焉曰是足以稱朝廷養賢圖治之心矣然為之難不可無記以示後使凡學者皆思學以稱其意於是郡教授蕭崇等以林侯之命遣其學前訓導梁憲來請予為記憲予親也不可辭學校教之地也然必有廟以祀先聖所以明道之有統也聖人之道豈有他哉因人之所固有者而道之耳仁義禮智人之所固有者也然而或昩焉故於人倫日用之常或有不得其宜者是以聖人著於書學校之教蓋使讀其書以明理之本然推其用之當然而已矣教之既成然後出而用之則百執事之臣無不宜於其職學校蓋為治之本也鎮江之學既新矣諸君子體上德而敦教事亦可謂至矣學於是者當何如用心哉湯盤之銘學者所當法也去其舊染之汚而日新是圖讀聖賢之書求聖賢之道修於身儀於家身體力行而推致其極舉而措之自新新民皆躬履而不渝如是斯可以無負矣故為之記以勉諸學者使毋怠新淦縣進士題名記昔我太祖皇帝既定天下即詔郡縣皆立學以經術造士而設科取用之萬世太平之業此所由建也新淦臨江之望其山水明秀而風氣清淑賢達之士生其間皆竒偉而好文建學設科以來出為世用者相繼而不絶其髙才碩學足以修政事樹勳業發而為文章义足以潤色鴻猷震耀後世皆由列聖大德光被天下是以萬邦黎獻咸願為之臣惟時舉而用之耳治效之盛比隆唐虞雖深仁厚澤所致而亦得人以為助也洪武庚戌至今貢於鄉試於禮部獻策於大廷凡在選者皆名顯而身榮上之待士誠厚矣乃天下之公也郡邑賢守令復有題其名以勵多士勸將來者亦人之至情也而新淦闕焉縣令李侯乃歴考盡刻之學宫而虚其左以俟繼者侯愛士之意蓋欲著其美於不朽使為士者皆歆動奮發得以䝉上恩而行其所學由新淦一邑而達之無逺邇儒者之效彰徹於天下無愧於科目之選然後快於心其志亦大矣昔者嘗聞之晉范宣子自謂其世乆而盛以為不朽矣而魯叔孫豹謂之世禄非所謂不朽所謂不朽在乎立德立功立言謂之立者表然示法於天下而不泯也李侯之志其亦在是歟果然則題名之石豈不百世有耀哉侯名周字廷亮揚州人初為御史求便養得新淦有仁愛及民而尤有志於學校觀於此可見矣相其志成其名者訓導陳旅為之記者泰和王直也廣州府學仰髙祠記仰髙祠者廣州府學禮賢之祠也禮賢而謂仰髙者何言賢者之髙風峻節非尋常可及也非尋常可及而蔽之以髙之一言何其善於形容而善言德行也按廣東憲使方公書及太守沈侯所述事畧云初宋以蔣之竒守廣州拳拳於礪名節嘅郡之前賢未有祀以晉吳隠之唐宋璟李尚隠盧奐李勉孔戣盧鈞蕭倣八人列而祠之子城上又益以晉之滕循唐之王綝作十賢賛因名曰十賢堂開寳以來茂勛清德有若潘美向敏中余靖魏瓘陳世卿邵曄陳從易張頡八人又合而祠焉名八賢堂在十賢堂之東歲乆頺廢而晉陶侃宋蘇軾楊長孺元張宏範俱以名宦著國朝僉都御史楊信民撫定叛亂有恵及民卒而祠之城隍廟東若唐張九齡宋崔與之温若春李昴英郭閶古成之皆鄉先生有祠名先賢在明倫堂之西射圃之北乆而寖敝元至元中宣撫梁雄飛又以蘓軾楊長孺並祀於廉吏吳隠之之祠淳祐甲辰廣帥方大琮立張文獻九齡崔清獻與之之祠名二獻祠今皆廢我朝飭臺憲勵廉節以風天下而廣東守臣注意於此亦乆矣天順改元都察院右僉都御史葉公盛奉命廵撫臨廣東謁諸祠廟歎先賢祠之敝陋十賢八賢廉吏二獻諸祠之廢也議所以作新之廵按監察御史莊公歙及按察使方公貟布政使宋公彰等議以克合擇學之巽隅為堂三間以祀之考諸賢之爵里名諡以十賢置中室八賢置東室名宦鄉先生則置於西室葉公思所以聳具瞻取詩髙山仰止之義更名祠曰仰髙祠歲以丁祭畢知府率僚屬諸生從事於其間祠成之明年庚辰平湖沈侯琮來知府事喜祠之成而崇德尚賢之美得以示勸於無窮既書其合祠之意復取諸賢事畧書之碑隂又致方公之書以仰髙祠屬予記予年踰八十老病才匱不足以與此然觀諸公所以好賢而作礪之者亦猶昔也既新其祠美其名而謹其禮矣好賢之志亦豈有已哉緇衣之改為豈但適館授粲將有大者焉勉之而極其至在乎已而已於乎表徃昔以儀來今此君子所望也故為之記以見祠之所以更作如此若諸賢事畧則有沈侯碑隂之記可考祠成之日乃某年某月某日也貞節堂記貞節堂者山西按察使王君允奉母之堂也堂以奉母而名之曰貞節者何彰母德也母濟南劉克讓之女年十九歸邑之士人王雲生二子曰允曰信而雲即世時劉才二十六允甫五歲信三歲㷀㷀孑立守二稚以奉老姑家無厚産以資其為業人不堪其憂而孺人忍貧如鐡石課蠶桑勤紡織祭奠以時必誠必敬辛苦以自足閨門之内肅然靜處未嘗以語笑聞於人早嘗讀孝經論語能記憶不忘允就外傅數舉以為教常令在左右隨事訓切之使知事上撫下之道允英偉喜學學日有成遣入郡庠益自奮遂取進士為名御史得封母為太孺人而食其子之禄士大夫榮之莫不稱母之貞節善教子之善成其教也禮部又請以貞節旌表其門閭母子之間象服煒煌制命赫奕煜然照映於其家太孺人年已逾八十矣而堂未有記王君思顯親之義亦欲播之於不朽今年朝京師語予江西憲使原君傑以堂記屬予原君則以屬予郡太守張侯瑄遣人來速記予老病不能文然嘉其意不得辭嘗聞之貞節人道之大閑也貞者知正而固守之之謂節者事有其制而不過之之謂也在易恒六五之象曰從一而終此婦人之貞守之堅確而不越乎理之常此節之六四所謂安節者也聖人扶世立教所以正人心厚天理於是而旌勸之典行焉太孺人之貞節顯於時流聞於逺邇百歲之下國史書之垂美於無窮豈不母子之俱榮哉故為之記使掲於堂上鎮江府重修運河記鎮江之通漕舊矣始於隋及唐宋自京口新港壩縁城西而南至常州奔牛壩一百六十餘里皆無阻蓋由兩浙運判曽孝藴郡守林希史彌堅修京口奔牛吕城三閘以閉泄江水通舟楫民便之歲乆淤塞大舟重載不得行皆從夏港孟瀆出楊子江渉風濤之險二百餘里始得達𤓰洲而多被其患國朝前浙江叅政胡清等復請修運河為便勅工部尚書周忱侍郎李敏等議之不果行皇上復登大寳尚寳少卿凌信復奏言夏港至𤓰洲江水廣濶軍民運輸商旅懋遷必由此而風波盗賊陷溺者衆乞將鎮江運河疏濬重修京口吕城等閘遇淺則増置視潮盈縮以時啟閉則人受其利而害可以減時左副都御史崔恭廵撫南服亦言凌信等請濬鎮江運河誠東南經乆之利上命浙江嘉湖蘓松常鎮六府起人夫給官錢設法勸助務在成功仍勅都御史崔恭督同巡按御史鄭佑郎中沈彬及諸郡守林鶚等勘議皆謂今修故道深濬從京口奔牛接引江潮修整舊閘四座増置城南滅渡橋新閘一每二月中旬後潮髙水漲則開閘放船九月初旬以後霜降水落閉閘車壩如此則工力減省事易成議定以聞詔可之命鎮江知府林鶚總督常州通判劉衢丹徒知縣劉震丹陽知縣霍芳等分理其事凡用人夫七萬餘名土石等工用舊曠役者三百餘名皆出蘓常鎮他弗與各府措置石灰樁木等料價銀九百八十八兩有竒天順三年正月興工至三月十八日竣事河隄隨地勢為深淺深者一丈淺者八尺壩閘橋岸必完固可以乆諸閘原無官夫者各添夫二十名隄岸河洪稍坍塌即修治勿有壊而都御史及諸郡守庶僚相與言曰運河之修賴聖天子明斷於上羣臣百工効忠於下故能有成功而恩恵及民宜有紀以示後使知為之之難而永保之夫大江之險與海相若自古病其難而鮮克善濟今聖主在位勤恤民隠聽言容衆興利逺害不憚歲月之勞以建悠逺之利東南之人饋運轉遷者皆安行利渉其受恵也博矣夫既受惠於今而復加勤於後朝覽夕視以防其敝必堅固嚴宻如始造時則恵利之施有窮哉故為之記俾刻之京口閘之石使凡與其事者日省而加勉焉無忽抑菴文後集巻四
