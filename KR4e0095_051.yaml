front:
  text: 抑菴文集續編後序抑菴文集前後五十卷太保王文端公所作也前集公之長子翰林檢討希稷所編集既鋟梓以傳矣四方之士病其訛舛者多蓋有掩卷而嘆息者公之次子存齊居士希誠深知其然亟取公遺藁精校而重刻焉篇目雖如故而訛舛則無矣是為前集十三卷者也然公平日於文章不經意存藁其散在四方而為士林所傳誦固有多於所存者此希誠所為尤惓惓也乃廣求博訪得公真迹輒録焉蓋積久益多遂續加編集以刻是為後集三十七卷也方其校也希誠窮日之力以至夜分其刻也督視左右惟恐有誤未嘗少以諉諸人蓋其精專而慎重如此其所費不資皆自已出雖親故好義者有所助遺一切謝絶士君子得於見聞者莫不嘆羡而稱其篤孝夫孝子之於親也手澤口澤雖微而敬愛不敢忽况於其精神心術之微者乎文章精神心術之微所在也天下後世欲知公精神心術之微者不有是集將奚賴焉希誠以六十之年而篤念不忘乎此孝子仁人之用心固如此也故序述其詳使天下後世知孝子仁人之於親無所不用其心而或興起其繼述之孝則於世道豈為無補邪若夫公之德為時望文為國華居清切而贊宥密位冢宰而為庶職得人凡所以亮天工而成大業功施社稷而澤被生民者國史自有列傳固已大書特書不一書矣此非後學所宜贅出也成化丁亥冬十一月望日蜀府教授里生張時啓拜手書
