body:
  text: 抑菴文後集巻三十七明王直撰贊宣聖贊天生斯民不能使之遂其生必有聖人者出以其道治而教之然後能安其身復其性而無失所者自堯舜禹湯文武周公既没而斯道不行綱淪法斁民生日入於亂至於周之末世極矣孔子生於其時纘承二帝三王之道而不得位以行之天盖使之明斯道以教萬世也於是刪詩定書贊周易修春秋明禮樂之本恢政化之源堯舜禹湯文武周公所以治教斯民者煥然大備後世帝王莫不取以為法今聖明在位篤信力行民生斯世復䝉至治之澤者以孔子之道也孔子之道堯舜禹湯文武周公之道也盖如天地之大日月之明四時之錯行有不可以言語形容者故曰自生民以來未有盛於孔子也謹述贊曰於穆宣聖道徳尊崇萬世之師萬方之宗以立天心以建民極佑我皇明永永無斁伊尹贊懿哉元聖起於三聘伐夏救民以定殷命咸有一徳格于皇天自任之重萬世稱焉傅說贊帝賚良弼傅岩惟肖交修是期朝夕左右舟楫霖雨既罔不宜學于古訓百世之師太公贊隠以待時顯以致用揚于商郊仁者有勇敬勝則吉義勝則從煌煌丹書百世所宗孔明贊豪傑之才英偉之姿魚水之合仁義之師漢業未成將星先墜二表猶存後世可嘅程夫子贊天佑斯文篤生先覺踐履之真識見之卓正大髙明精嚴奥博以述往聖以開來學朱文公贊析理之精秉徳之粹發揮羣言以極其至斯道復明如日之昇允矣君子展也大成魁星贊史記天官書曰北斗平旦建者魁魁枕參首第一星也又曰斗魁戴匡六星曰文昌宫盖主文章黼黻之事今儗其形容為此圖者盖以星之精氣為神而文章黼黻皆神主之宜有以聳具瞻也謹述贊曰繄魁星煥天文儗形容圖厥真文章輔拂國所珍孰主張是在爾神調元贊化資皇仁壽星贊南極之精有赫其靈帝命是承畀錫長生臣拜稽首天子萬壽四方攸寧與天同久騶虞贊騶虞聖世之瑞也盖聖人之仁浹洽於天下由親親而仁民以及於草木鳥獸莫不各遂其性然後騶虞之瑞應之此豈偶然哉圖記所載曰騶虞猊首虎軀白質黑章其尾之長實參於身不戕生物以自飽不踐生芻以自快仁愛之發本於天性故上能施仁而騶虞出焉此感彼應必以其類不偶然也永樂初騶虞見於鈞州宣徳中又出於滁州之來安皆籠而獻之闕下考其儀狀察其性情盖與圖記實相符契文祖宣考深仁厚澤由中以達外篤近而舉逺四方萬國洋溢周徧故天以是彰之也周之文王仁及庶物而開周家八百年之業當時見於詠歌騶虞之詩載之於經可考也然則今之形於贊詠而傳之萬世豈不宜哉贊曰古稱瑞獸惟騶虞狻猊之首身於菟皎皎白質氷霜腴黒花粲若𤣥雲敷有生諸物弗忍屠安行不踐原上芻至性迥比百獸殊天意生此為禎符皇朝聲教彌寰區列聖仁澤罔不孚小大逺邇皆歡娯感兹呈瑞來帝都麒麟鳯凰乃其徒祖宗丕闡萬世謨神聖相繼恢逺圖寶歴永與天地俱麒麟贊麒麟仁獸也故四靈之中以麟為首其謂之仁獸者何也盖有角而不以抵有足而不以觸雖飢而不食生物雖動而不踐生草此其所以為仁且不羣居不旅遊聲音之發適中黄鍾其為靈昭昭也必有聖人在位以至仁治天下深恩洋溢和氣充周然後麒麟出焉盖天以類應之所以著行仁之驗也是故黄帝之時麒麟育于囿周成康之世麒麟亦遊於郊藪載之往牒信然不誣我太宗皇帝治天下一以仁為本而宣宗皇帝復以仁繼之四方萬國熈然安於惠化之中故麒麟再出於海外而以獻於闕庭夫其自逺而至者以見聖仁無逺不達也猗歟盛哉睹兹休徴宜有贊詠謹作贊曰猗祥麟獸之珍維天賦性獨以仁有生諸物慈愛均不抵不觸安且馴竒文粲粲周滿身音聲和暢律吕勻我朝繼出明聖君鴻恩沛澤育下民四方萬國同陽春感格天地孚鬼神偉兹休徴聿來臻百獸不得相儗倫禎符瑞牒昭前聞皇圖萬世寶命新稽首贊詠播無垠獅子贊天地生物有剛柔强弱之不同者氣使之然也西方金氣剛勁故其所生率多沈鷙暴悍獅子得氣之最勁者也其性質之彊毅氣勢之豪壯才力之剽捷爪牙之堅利皆非他物所能及肆意横行一日千里雖象兕之大熊羆虎豹之猛猝然遇之皆震懾摧伏磔裂搏噬一聽其所為而莫之能遁信所謂雄勇不常者矣人安得而擾之哉惟聖人在位威徳足以服逺四方萬國莫不順從然後此物亦靡然自致我宣宗皇帝之御天下也蠻夷戎狄不間逺邇徳威所臨無思不服於是西域以獅子來獻拜舞起伏動合人意化其剛暴率為柔良此可見聖徳之大上格乎天下孚於物如此其至也昔唐太宗時康居獻獅子虞世南賦之至今傳焉是用作贊以揚盛美偉獅子兮百獸雄稟金氣兮生西戎天骨詭傑兮莫與同星閃閃兮耀雙瞳鋸牙鈎爪兮攢銛鋒毫勁兮䓗蘢毳柔兮䝉茸聲雷吼兮足生風日千里兮無停蹤拉食虎兕兮磔豹熊毛羣走匿兮避獰兇遭聖仁兮斯服從大明君兮御宸極萬邦寧兮修厥職隨貢篚兮來西域化强戾兮歸至徳衛天門兮威有赫麒麟騶虞兮與接迹敞靈囿兮足安適太平萬世兮綿寶厯述贊詞兮示無斁𤣥虎贊宣徳年海外諸番國以其水土物來獻庭實旅百而𤣥虎與焉望之其色正黒如凝碧如染黛又如𤣥雲之蔽覆而潤澤鮮好也在廷之臣皆謂前所未見上嘉其勤誠不之卻命置之苑中不以異物為貴也然世之言虎者皆知黄質黒章而已安知南海之外而有𤣥虎哉𤣥北方之色豈非皇化自北而南之所致與亦不可不以為異也乃為之贊曰南海之墟實為下國有虎生焉匪赤匪白其色維何𤣥㝠之精自北而南降氣流形如碧之凝如黛之積又若𤣥雲油然斯羃聖心廣大豈物之珍眷彼外夷是撫是馴置之苑中弭然馴服騶虞麒麟均眎同育嗟惟有衆未知其奇何以考之玩此贊辭馬贊古稱地用莫如馬而國君之富繫焉盖乘輿之駕征伐之舉以及於狩田傳置皆馬之力也其用豈不大哉故問國君之富則數馬以對而他物不與馬為國之所重可知矣是以有國家者雖受方國之貢未有不資畜牧以致其蕃者前代逺矣惟唐為最盛其始以三千匹牧於赤岸澤中終而至於七十萬有奇而國益富强自是以後鮮或能及也國朝有天下土宇之廣物産之富盖視唐猶盛馬散畜民間自畿甸以達於西北凡唐監牧之處悉充牣其中生息之蕃過於唐十倍而東西南朔以馬來獻又相繼不絶於是取其尤良者處之天廏以待上之所御龍顱鳯臆權奇倜儻之姿徳循而力强者不可勝計其次以充軍國之用備禮儀通制命壯武威盖優優乎有餘而飽芻粟伏皁櫪者猶雲合而霧散盖本於皇上之徳之誠有以致之此太平極盛之世也爰作贊曰馬之生稟乾剛資國家稱富强聖朝牧圉収俊良畿甸西北連邊疆房星下照開厥祥日滋月益紛低昻追風逐電淩雲翔鴻恩四達雨露滂羈金絡繹獻玉堂天閑十二龍騰驤郊籍巡省馳康莊儀文充備煜有光武威得此不可當逺逐蜂蠆驅犬羊西極若木東扶桑足跡所至俱伏降太平盛業起漢唐作詩贊詠傳萬方衛風魯頌同流芳鍾馗贊昔唐𤣥宗甞晝寢内殿夢小鬼竊玉笛戲殿中大怒欲召髙力士捕逐之俄有一大鬼衣緑袍皂帽腰笏趨而進執小鬼刳其目然後擘食焉問為誰對曰臣終南山士人也武徳中舉進士不中羞歸故鄉觸殿階而死當時賜緑袍以葬由是感恩誓除虚耗以報國小鬼者虚耗也𤣥宗召呉道子使圖其形道子髣髴若有見故所圖與夢中所見酷相似後之繪者皆祖之此畫馗以福禄夀來獻者盖虚耗既盡而祥慶大來之驗也為之贊曰終南之秀兮產此翁戰文場兮氣如虹時弗利兮道不通憤鬰以死兮髮上衝凜威稜兮為鬼雄食虛耗兮攘奸兇時既清兮思効忠獻福禄兮龎且洪壽綿綿兮等華嵩溥大慶兮周萬邦國家太平兮祚無窮千秋萬嵗兮神之功吕洞賓贊維洞中賓乃塵外人飛行太空孰測其真可死者身不死者神後百千年庶幾其存鐡拐贊其身雖偏而神則全所混者人所存者天短策自支翺翔淩厲宜爾優游千二百嵗鍾離贊早擅才雄克纘武功晚師清凈遂探𤣥宗棲息崆峒出入方蓬八極神遊莫知所終韓湘贊秀出儒門早證仙道頃刻開花巧奪司造藍關雪擁秦嶺雲横超然獨得翺翔玉京藍彩和贊睟乎其容充乎其氣淩摩九霄傲睨一世執板而歌以養天和風休雲行其樂如何張果老贊列仙之臞貌澤神愉乘此白􅐒周流太虚紫府丹臺玉簡金書於焉逍遙與天為徒曹國舅贊耽嗜𤣥虛脫略聲利採藥海隅煉丹雲際龍藏虎伏髓緑色赬南極東華允錫長生徐神翁贊東海之區神仙所居安期羨門與之為徒大藥刀圭足以不死三島十洲一日千里觀音贊玅相端嚴清凈絶塵具千手眼化百億身如金蓮花如寶月輪以其慈悲助我皇仁達摩贊殊相岩岩面壁孤坐豈惟忘世兼亦忘我不由文字得性之真隻履西歸允矣其神三大士贊維三大士體相自然出華嚴海升兠率天法性圓融願力宏大俯接有情同歸佛界㑹昌侯孫公像贊古之君子有盛徳懿行者則必銘之鼎彛圖其像貌而美其形容以傳之後世使有所瞻仰而起敬起慕此君子所以貴有後也㑹昌侯孫公盖所謂有盛徳懿行者宣徳中在戚里表然君子之望人莫不仰而敬之上甚重焉封推誠宣忠翊運武臣特進榮禄大夫柱國㑹昌伯公雖貴顯而謙厚恭慎始終不渝祇事六聖前後如一日景泰三年壽八十五而終追封㑹昌侯諡康靖公在位時子繼宗等甞命寫公像為待漏圖儼然冠服之華翼然威儀之盛而不忘乎敬盖徳容之著也畫既完而未有贊兹以屬予予言豈足以述公之美哉然不可辭也乃作贊曰猗㑹昌公啟慶自躬當太平之盛時繼古人之髙風睟於面而氣和形於身而貌恭肆羣僚美其謙而列聖悅其忠親居戚里之尊位登天爵之崇雖富貴不能移乃徳誼之在中悵仙遊之不還歴崐閬與方蓬維子孫之象賢受遐福於無窮少保户部尚書黄公像贊榮禄大夫少保户部尚書東萊黄公歴事五朝凡五十餘年自簿領之卑至孤卿之尊忠君愛民之心始終未甞間誠所謂國之元老其徳行之懿政事之善勲績之殊茂文章之淳雅見知於朝廷見重於士大夫至於逺方之人亦莫不尊且信者是宜為邦家之光壽考百年終享盛福而天不慭遺君子惜之其儀形風采之可見者猶足以使人起敬起慕况直忝知遇之舊哉乃作贊曰天佑聖君必遺之臣喬岳降神乃生偉人維公堂堂間世之傑有謀有為有勞有烈昔事太祖禆贊師干一言悟合遂佐冬官雍容在朝垂紳正笏敬恭將事罔有遺闕明明太宗實克用公公亦盡誠委致其躬南夷之平帝命公往撫循勞來皇徳用暢三聖相繼寵任不渝既踐列卿乃進三孤翼翼南京根本之地公職留務靜重以治寅亮天地弼于一人夙夜允懷亶其良臣國家盛隆賢俊是賴山頽木萎君子所嘅遺像儼然具瞻在兹不亡者存後世之思魏尚書行樂贊㑹稽魏仲房先生予友也有明正之學有端厚之徳有奥雅之文有清慎之操有忠君之心有惠民之政其出而仕荷列聖之眷知以名聞于中外者盖數十年倦而求去者屢矣輒不許年闕十復請焉乃䝉恩得致仕去囂然自適於山水之間其樂可勝言哉子命工繪為行樂圖使人持來泰和屬予贊予與公遊舊矣今雖亦退歸而聦明日耗筋力日微山川景物枯然憔悴無復可為樂矣若東山之遊蘭亭之集皆予之所羨慕而未能得者勉為作贊以託公之後他日倘得厠跡於其中庶幾不為生客也贊曰維天生才國之楨兮偉兹魏公天寔生兮其氣至和其神清兮禮樂詩書發粹精兮采采泮芹賢俊興兮逢時而升輔聖明兮敬恭神祇肅有恒兮騫于郎署貳厥卿兮教行政施百度貞兮不矯以亢中怦怦兮春官冢宰聲實𢎞兮贊襄周旋靡不勝兮簡任庶僚天與能兮日月不居鬂星星兮封章以聞感皇情兮越山青青越水澄兮公今歸也孰為朋兮前賢風致有足徴兮懷古嘯歌適性靈兮此邦之人仰儀型兮我亦祝公福禄增兮百二十齡揚令名兮刑部尚書楊君像贊此刑部尚書楊君彥謐像也君錢塘人器識之瓌竒才徳之俊茂功業之卓偉顯聞於當世久矣予文豈足以盡形容之美然朋友之誼不可以無言乃作贊曰天佑聖朝篤生俊才偉兹楊君乘時偕來既愽以文亦究厥武乃陞賢科乃陟郎署維皇致治式輔以刑徳威惟畏徳明惟明奉而行之罔敢不服如春之温如秋之肅詩書禮樂鞭弭櫜鞬有猷有為厥功茂焉帝曰休哉我疇爾績司冦之榮是謂殊錫顒顒卭卭錦衣繡裳大小具瞻邦家之光周之蘇公克敬由獄以長王國以受遐福維君復然翼翼令儀徳音不違神其相之神其相之君則有子慶澤所鍾維君是似工部尚書王公像贊此工部尚書兼大理卿王公原之也原之有文武才功名赫著於當世予與交好舊矣為作像贊且祝其壽云偉哉王公實名宗世有徳義秀所鍾詩書禮樂靡不通文章炳蔚聲渢渢歘然起乘御史驄蒼松翠栢生雄風薇垣佐政陟愈崇棠隂遺愛繼召公聖明天子駕飛龍眷乃文武恩遇隆蠻烟瘴霧開晦䝉九重詔下褒成功周家冬官虞司空髙爵厚禄誰可同為子克孝為臣忠夙夜匪懈甚嚴恭中堂懸像儼徳容神降之福龎且洪嵗周八百顔如童工部尚書王公像贊生聖明熈皥之朝鍾秦雍清淑之氣既謹禮而惇詩亦依仁而蹈義始沈潛於一經遂翺翔於半刺荐歴乎方伯之崇峻陟乎司空之位極人爵之尊榮沛天恩之沾被持敬慎以不渝抱忠信而無貳是以功業顯於當時譽望隆於此世兹懸車以佚老得怡情而遂志予知其受福於天綿百嵗而猶未巳也尚書胡公像贊禮部尚書毘陵胡公遭遇聖明致位通顯出入中外有勞有烈而上之寵眷日隆其清徳懿行不特士大夫尊禮之方外之士莫不皆然釋道嵿者僧籙司右善世兼大功徳寺住持雨菴和尚之大弟子自出家受具荷公之徳久而益深今薦為建寧副都綱兼南禪寺住持自謂去公逺矣而心不能忘乃命繪公像將奉寘堂中而以其法旦暮祝夀焉請予為之贊予嘉其意為作贊曰允篤胡公有美在躬温温其仁肅肅其恭永樂之初太宗即位公侍左右式克獻替巍巍仁皇宣廟繼之政教休明公荷倚毗維今天子維公是使綏懷萬邦柔逺能邇祇事列聖垂五十年令聞令望公實有焉天之於人惟徳是比一徳弗愆五福斯備豈弟君子求福不回如丘如陵如江如淮猗與休哉錢侍郎像贊禮部侍郎吉水錢公呉越武肅王之後以文學徳行重當時而佐天子議禮制度考文之事式克敬慎以介夀祺此其像也為作贊曰吴越世家服書詩兮慶澤所鍾毓此奇兮文行之華邁等夷兮仕于聖時禮樂司兮正其衣冠肅有儀兮雍容進趨步赤墀兮天威咫尺敢弗祇兮端笏澄心儼若思兮云誰之從古夔夷兮惟直惟清日孜孜兮白髮蒼顔福履綏兮自天申之百嵗以為期兮遺安先生贊遺安先生者吉水周公仲徳也先生生富貴家而不溺其習讀書勵行有古君子之風其行於家以及於人者皆表然可慕也元季冦亂餓死者塞途先生母夫人譚氏發金以賑施而米不可得先生順其志艱難轉糴為粥以濟之有不幸死者則具棺作塚以葬生死䝉賴焉方是時先生之父南康知事君棄官歸隠一旦冦迫其廬家人悉攜貲以竄而南康君病不能行先生曰鼠輩利財耳不得將為害乃獨留貲侍湯藥而設饌出金以待焉冦至相感動曰公真孝子也卒受饌辭金以去國朝洪武初覈民田先生髙祖吉安路総管豫章公甞買田萬三千石収利以助㓙年至是無所主有司悉以歸先生先生曰吾祖以濟貧人今吾乃利之不義悉書券以授佃者而不取直曰不可有愧吾先公南康君没葬永豐遷鶯鄉路逺不能禁樵採先生乃削木為書以告其地之人言詞切至人皆感其誠不忍犯鄉人有擅發其所寄穀以自給者而以妻之簪珥與其母所備棺償焉先生曰若是則害夫婦之意而傷孝子之心矣竟不問里有兄弟爭財訟久不決先生為至其家譬解其娣姒而開諭其弟昆舉家感泣爭遂定其事先盡孝事寡姊盡敬嫁族女孤甥使有歸與資給故人之孤女使既見逐而復為夫婦如是者六七人言温氣和未甞有疾詞厲色人無少長愚良訓接之皆有恩意然居家則甚嚴重内外之分秩如也性嗜書所藏千餘巻皆手自㸃勘尤謹於喪禮故其著述有慎終要録有葬書演義悉本先賢之說不惑於世俗常見甞慕龎徳公之為人名其堂曰遺安學者稱為遺安先生年七十九而卒其壙記盖其所自作者予從先生之孫忱聞先生徳行之槩如此而景慕焉乃序述而為贊曰維天生人維善用章匪章于人曰天之常於惟先生令徳壽豈篤于其親以及逺邇喪亂民饑慈惠賑施生哺死藏有順無違冦來紛紜侍疾弗去不忮不求維親之故原田畮畮以賙困窮一朝俾之惠于先公松楸在山稔此戕賊化為敬恭積誠斯格有孑嫠孤我則歸之有䦧于牆我復其迷孝以祀先仁以廣逮處家則嚴申秩外内著書修文取是捨非不矯以抗不詭而隨忠厚之言和平之氣布帛之温穀菽之味雍容里閭髙冠正裳君子所親小人所望或遊於山或臨於水既享其安以遺孫子孫子既賢食公之遺我懷不忘述此贊辭周侍郎像贊此吾友工部侍郎周公恂如也受四朝恩遇之隆躋三品職任之大文章足以宣皇猷訏謨足以熈帝載既優優其才行亦凜凜其風槩幸遭逢以展其中何從容而久於外求之古人盖李贊皇之輩而予朝夕有待也楊侍郎祖父像贊生纓冕之家逢太平之治既悅禮而敦詩亦依仁而游義其事先也孝而誠其待物也謙而惠表然者豐偉之姿温然者淳和之氣山水足以暢其懷子孫足以成其志荷九重錫命之榮膺三品亞卿之貴豈非所謂徳音是茂保艾爾後之君子歟楊侍郎祖母像贊温柔靜嘉女徳之華有儀有容宜室宜家象服煌煌三品之貴慶澤所鍾永利後嗣楊侍郎父像贊浩乎其氣之充也偉乎其貌之豐也温温乎其和肅肅乎其恭也聖賢以為師學者之所宗也義以制外仁存諸中也胡不百年未極顯榮也然天之佑之不必及其躬也有子克賢爵位崇也三品之封恩命式隆也遺像在堂望之顒顒也儀于後人百世曷有窮也余侍講像贊此吾友翰林侍講余先生正安也確乎其志之端綽乎其量之寛優優乎學之博表表乎行之完遭聖代之文明襲先世之衣冠馳英聲於玉堂接髙步於金鑾曾嵗月之幾何乃睠懷乎故山撫門前之松菊長階下之芝蘭忽乘雲以迅征鏘鳴珮其珊珊陪鼎湖之飛龍悵何時而來還人猶仰夫列宿之光芒常照耀於匡廬之上彭蠡之間盖可望而不可攀也陳宜人像贊曽學士配浙江按察使蒙簡母徳性之純徳容之温生于華閥歸于慶門仁厚以逮下孝敬以事尊步玉登金見相夫之效含香冠豸彰教子之勤宜榮享其天禄而顯受於君恩古所謂令妻賢母之載於文字者兹可以儀後來而紹前聞也前刑部主事伯時遺像贊以經術發身以材敏從政莅司馬既誦其能贊冬官亦美其稱偉成績之可觀何仙遊之不還儼遺像之在位凛松栢之傲寒彭御史像贊䝉世澤之長承家學之懿温然忠厚之心凜然剛毅之氣其立朝也正而不阿其按外也端而益厲故君子有所恃而小人有所畏其樹立如此宜福禄之兼備也彭御史百鍊遺像贊偉兹彭君生逢盛世為賢進士為名御史今雖已矣不忘者存猶幸有子以嗣其芬續詩禮之傳衍月池之緒勗爾後人以永終譽陳穟僉事贊惟兹陳公學博才良逢時而升與道翺翔金馬玉堂職親地禁禮樂文章天子所任帝欲養賢以隆太平政教付公以觀厥成多士彬彬聞風丕變人既樂從公亦忘倦湖山之區公來于于公往不來人用嘆吁我昔與公交好甚篤出入相從匪昏伊旭嗟今老矣再見何時有偉令儀悠悠我思王宗睿贊金谿之南明谷里中有靜學隠君子詩書承家濟厥美此心恬然若止水聖明霈澤敷逺邇肆乃優游樂於此深衣幅巾儼容止髙風灑落絶塵滓揮絃染翰據棐几興入蒼茫出奇偉隂陽變化有至理啟蔽導愚示儀軌徳之在人衆所喜賢嗣登朝侍黼扆宜壽百年介蕃祉神遊汗漫詎云死遺像在堂聳瞻視我為作贊垂無已善學兄像贊道徳洽聞者為之祖材藝疏達者為之父既諳通乎微理遂膺薦而髙舉長松流水之間長吟雅詠之所君子皆以為宜盖名昭而惠溥何仙遊之不返耿千秋兮萬古嗚呼此直之所以怛然而悽楚也歐陽觀瀾翁像贊其行也方而淳其言也確而文薫然可挹者氣之和睟然可即者色之温盖宗族稱其孝而邑里推其仁不茍取以傷義不詭隨以害真遭遇乎聖明之世熈洽之朝乃優游乎長林之下大江之濱示儀型於後輩紹典則於前聞宜子孫之多賢而福祉之畢臻我思其人豈非古之所謂天民者耶黄澄濟像贊黄君澄濟弋陽人有通敏之才有雄贍之文有剛毅之氣有明正之學遭遇盛時取進士為名御史陞長外臺赫然有聲于當時矣而又以文章師後輩士大夫重之與予皆江西人以此像屬予言而作贊曰黄氏世逺慶乃綿惟君力學其志堅既博而約尤精專仁義為本誠為先不徇俗以矜髙不枉已以效妍掇科目而身榮陟憲臺而譽傳斯無往而不可聽天道之自然世之君子觀其自號如此則可以信其賢矣龍仁安遺像贊承閥閱之華服詩禮之懿當太平之盛世樂恬退以肆志宗族既稱其仁鄉黨亦推其義惟濟美於前人故鍾慶於賢嗣雖未及三釜之榮終得䝉六品之貴降璽書於霄漢炯光輝於封隧瞻遺像之儼然足以觀其徳之所至也尹子源像贊此予友尹君子源也予甞為教其子璉因與君相好死生契濶逾四十年今孫直為翰林編修持以屬予贊為作贊曰其才則闓敏而有為其智則明達而能辯不汲汲於近名乃孜孜於為善遂翺翔於天衢承世澤之充衍共謁承明之廬同朝紫宸之殿盖善處而相歡亦交修而㒺倦是以君子稱其賢而衆人皆稱羨何仙遊之不返嗟寒暑之屢變維令孫之濟美實明時之俊彥登金門而步玉堂鍾餘慶而可見儼遺像之在堂念昔日之閒燕抒吾情於贊辭于以示故意之猶戀戀也郭公緒像贊表乎其儀之著於外也確乎其實之存諸中也忞忞其慎而勉勉其恭也是以䝉恩遇而致顯榮也持法平而譽績隆也我思古人司冦蘇公也惟企而同之則百福來崇也龍中書庭侍贊堂堂乎祠部之英楚楚乎鳯池之俊炯氷玉之明潔蔚橋梓之芳潤其居上也肅而和其侍側也恭而順藹龍門敦厚之風紹孔庭詩禮之訓由是沐聖仁際昌運儼充貢以先登勇掇科而繼進遂皆列於朝著亦同懷於忠藎已致夫位望之華聲譽之振尚不變其處心之端持已之慎宜神明之相之萃遐福於其躬流慶澤於其𦙍也子珩姊夫像贊楊氏之隆由漢五公君能不忘前人之風君之用心豈曰為已矻矻勤勞幹蠱而已翺翔諸藩來往二京有偉令才克駿厥聲夀不百年其福未艾憶與君别五十餘載遺像在堂君歸何時君往不來悠悠我思文貢姊像贊幽閒靜貞女徳之良孝順勤儉婦道之光生於瑯瑘之王歸于闗西之楊謹禮義而不愆聮姻戚而允臧雖子少而孫多喜源逺而流長瞻遺像之在兹儼儀範之未亡楊子珹兄弟行樂圖贊承清白之傳敦友悌之風盖同氣為至親故同徳而相從詩禮足以紹其家和裕足以亢其宗當太平之閒暇得朝夕以從容翫青山與緑水撫雪竹與霜松將三夀以作朋躡崑閬而升方蓬予安得厠跡於其間遊汗漫而無窮梅巖居士遺像贊此泰和吴汝霖先生也表其室曰梅巖稱其號曰居士生於文獻之邦長於太平之世所業者詩書所服者仁義夫既負絶俗之姿而亦諳和鼎之味當聖神之御極宜賢俊之得志何升進之遲而退休之易君子知其有為已之心達士知其有出塵之意從容於名教之樂歌咏乎雍熈之治兹一往而不復洒知己之涕泗吾聞天佑善人不在其身必在其後嗣則先生之福慶之及其子孫將綿綿延延愈久而不替也劉文復像贊文復予故人居縣東平易坊雖在㕓市而恬於勢利獨好從賢士大夫游其存心忠厚言行必謹於禮義聞人有善則取以自資人或有未善則婉詞微諷必欲使歸於善故舊親戚有憂患必赴救汲汲然恐弗及務得免乃已君子又謂其厚於仁少師楊公侍讀梁公與予輩家食時皆與文復善及官京師而文復長子選為邑庠生以能書徴入館閣與修永樂大典文復甞一來視之而平生交游亦多在因得復相與款洽其情好加焉及文復南歸予輩亦往來兩京間不能復相聚如前時每念文復未甞不悵然興歎也抑孰知文復遂為千古之别哉往年予以憂歸痛文復之亡而哭之顧視鄉閭求如文復者不可得心益為之哀欲託之文字以傳而未暇嗚呼文復其可使泯泯無聞於後邪今其季子達自南京來以此像求予贊乃為述其大槩而系以辭性淑兮情真言確兮行惇薰乎其氣之和粹乎其色之温盖於物也無競而於人也有恩履忠信而厭鄙薄安靜處而絶囂煩故君子謂為一鄉之善士每歎惜而弗諼觀遺像以述贊庶千載兮長存陳公復像贊此吾姻家陳公復先生也承簪纓之世惇孝弟之行居則循理之常行必由道之正不徇利與近名乃樂天而知命經史足以備講論山水足以供吟詠盖親戚之所篤愛鄉里之所深敬宜享福於百年而衍子孫之鴻慶也郭祖儀像贊此郭祖儀先生像也居文獻之邦逢堯舜之治詩書禮樂以繼乎前修孝友忠信以裕乎後嗣不矯矯以取名不汲汲以營利青山緑水足以肆髙蹤芳草閒雲足以諧逺志有澹臺之雅懷有靖節之幽趣是宜正衣冠尊瞻視以垂像於來世也李伯昻遺像贊其始也䝉富貴之資其後也得靜退之宜肆幽情於山水求至味於書詩既探古以為儀亦開塾而為師覽黄花之獨秀暢素懷以自怡爰抗志以髙蹈儵神化其何之非年夀之不延循天命其奚疑偉二子之並美宰百里而同時雖禄養之弗待諒顯揚之在兹敇書贊皇明有天下將百年其治道一以仁義為本盖必使斯民皆足於衣食而興於禮義是以天下熈然大安聖天子綂臨萬邦尤篤於是道民既安矣猶慮或有水旱之變詔有司預積穀以振民富室有願發廩佐官者皆勿拒江隂徐景南孝友于家厚於其鄉之人觀上之徳而興起焉出穀二千石以歸有司其弟景州亦如之郡太守以聞天子嘉其義遣使特敕旌之為義民勞以羊酒復其家景南既受敕珍襲而寶藏之俾後世子孫以為榮而思所以繼既而謝恩來京師因翰林修撰張益士謙詣直告曰景南為此盖推其餘以周人之乏豈敢自謂明於義哉而朝廷寵褒之如此誠非常之幸也惟古之人䝉上恩徳固有贊頌以傳諸逺者景南未之及也敢以為請直謂人之徳莫大於仁義惟有其實然後有其名名者實之表也今天子篤意養民惟恐一夫不得其所於是有豫備之令所謂如天之仁也景南祇順徳意出其所積以佐官此天下之義舉也上有行仁之君故下有好義之民旌褒之恩出於上贊詠之誠見於下不亦交盡其道哉為作贊曰惟聖天子惠養下民豫為之思肫肫其仁惟此令人克篤於義爰發其儲以充厥惠雲章煌煌寔降自天載馳載驅其來翩翩義問孔昭滂澤斯溥既有㫖酒亦有肥羜勾呉之鄉為龍為光山川增輝草木效祥仁覆於上義流於下休哉斯民靡不受嘏堯徳巍巍湯敬日躋惟皇兼之何有旱菑川祇山君各謹爾職䕶此璽書傳之無極敕書贊聖天子篤意養民慮水旱之不常也詔有司積穀以備賑貸富民有能發廩為助者具以聞江隂徐景州與兄景南各出穀二千石以佐官郡長貳言於朝上嘉之遣勅旌之為義民勞以羊酒而給復焉景州既拜賜喜曰是敕也豈特以見奎壁之文之美哉盖上之徳澤實寓焉其何敢䙝即珍襲而寶藏之將以遺後之人使不忘所以報及謝恩來北京而請直為之贊直聞隋開皇間闗中飢當時非無蓄積也而文帝不許賑貸躬率飢民就食於洛陽夫國之有廩庾所以為民也視其飢而不肯發使之流離道路甚矣哉不仁也至其末年積穀可支五十年煬帝恃其富强卒以賈禍此厚於已而薄於民之騐也今天下未有甚飢也而聖心惓惓為先事之慮必欲使斯民無一不得其所者至仁所感天下好義之士宜其作而應矣傳曰堯舜帥天下以仁而民從之書曰民㒺常懷懷于有仁我國家億萬年太平之福固在此也直為之贊以美上之仁而必述景州兄弟之義以見其感化於上如此非偶然也贊曰維皇聖神撫羣黎惠政敷洽㒺不宜詔令積穀防嵗飢上以仁感下應之偉兹兄弟亦已奇大發廩實佐有司窮民不復憂顛危封章入奏玉色怡恩澤滂沛雨露施璽書錫號超等夷龍章鳯彩光陸離義聲燀赫紛四馳大哉聖徳何巍巍乾坤覆載日月垂珍藏什襲敬奉持子孫思繼永弗隳國家太平民物滋倉庾充溢如京坁普天率上歌雍熈老臣稽首述贊辭傳之百世無窮期味菜軒畫蘆菔贊予家居時有園可十畆皆種菜茹而蘆菔居多冬寒之時日取給與薯蕷皆切方寸許襍葱菜而煑之和以鹽豉家人無少長食之皆欣然雖八珍之味不過也予甞自謂飲食無精粗惟適意為美蘆菔予所甚適也及來京師猶嗜之然又以為此特予貧者之所好耳若公卿大夫與其家之子弟皆飽於芻豢將塊視之無有能好者矣久之客有為予言味菜軒者以所蓄蘆菔圖示予盖少師吏部尚書蹇公之子芸之所好也予愛之芸生長富貴之中而志尚乃與予同如此又日以讀書為事盖公之徳有以化之也汪信民甞言人常咬得菜根則百事可做予信嗜之而才不適於用然亦將老矣唯當食此終其身若芸之英年美質誠能勉之飽於仁義而不願乎膏粱之味則他日措諸事業何可及哉故為蘆菔贊以致意云翠為葉玉為體甘露為漿脆而美宜吾腹利吾齒勤而食之可不死儉以養徳積諸已萬事紛紜皆可理何必鮮肥事豪侈於乎勉之乃君子梅雪贊吏部侍郎洪君宗器七世祖僉判府君性好梅環所居青溪上皆種之臘雪之際梅花盛開府君婆娑愛賞盖與之比徳焉因名其居曰梅雪今侍郎同其好襲其名清白之操芳潔之聞豈獨無愧於乃祖哉盖表然當世之望也故予取屈子頌橘之義而為之贊云懿兹嘉樹生南服兮偃蹇離奇貞且特兮嵗聿云暮霰雪積兮羣卉摧仆氣蕭索兮維此靈秀莫之能戹兮陽和内奮獨先得兮華彩交映粲開拆兮珠蕤玉英炯一色兮青溪泠泠環千百兮馨香穠郁衆所即兮君子之好自疇昔兮懷芳履潔亶同徳兮奕世嬋嫣喜承式兮違氛離垢皎清白兮壹志愛玩靡厭斁兮紛紜流俗終不可惑兮駢實纍纍和鼎食兮揚芬襲美何有極兮具慶圖贊具慶圖為像四上海縣教諭致仕尹先生與其配曾氏孺人其子南雄府學訓導復道澂江府同知自道也先生故泰和儒家有純質之徳有剛直之行有明正之學自為鄉先生以至為教官歴典兩縣學其善之及人多矣而曾氏亦泰和故家世積忠厚故孺人生有淑徳婦道母儀為九族師法故皆以八十之年而享康寧之福雖鬂髮皤然而視聽不衰復道兄弟又皆以經術奮身享有爵位其禄俸之餘足以養口體娯心志怡然至樂萃于一堂此豈人力也哉天相之也孟子謂君子有三樂而以父母俱存兄弟無故為首說者謂繫於天有不可必得盖世之為子者莫不以夀考祝其親而父母亦皆以賢願其子然不能兼備者多矣其幸有兼之者不能皆貴且富也今尹氏之福如此豈無自哉詩曰樂只君子遐不眉夀又曰樂只君子保艾爾後盖惟徳行之可嘉故能受福于天以安其身而昌其子孫故予以為尹氏之福天相之也自道之佐澂江歸拜其親鄉人榮之乃命畫史蕭于喬作此圖其容貌意態盖無不似者畫既完自道求予贊予名之曰具慶之圖而為贊曰維天惠民不私于人茍有令徳福集其身惟公醇質好是正直不激不阿歸于有極布帛之言松栢之姿仁義是行不顧其私以學殖身以文取寵訓成厥家亦勵于衆孰飢予哺孰危予安保有窮孽蔚為衣冠畮畮原田瀰瀰流水無有旱災繄公之惠爰及孺人嫓徳象賢並受其福實降自天有偉二子善述善繼或佐郡侯或領教事威儀孔時雍容燕休敬恭婉愉甘㫖具脩福善禍淫亶天之道白髮蒼顔使公夀考使公夀考純嘏不渝畫像在堂可敦薄夫夀星圖贊洪範之叙五福其一曰夀夀居乎福之先者盖有夀然後能享諸福也是以人子之敬愛其親則必以夀祝之夫既得其夀矣斯能遂其養以安其身樂其心此人子之至情而亦莫有加焉者也然夀系乎天不可以幸致也必善足以感天而後天應焉此感彼應若有黙司其事於冥冥之中不偶然也甞讀晉書天文志狼北地有大星曰南極老人見則天下太平主夀昌此所謂夀星也今天地清寧夀星恒見皇上受福彌億萬年用敷錫厥庶民而天下實䝉其澤於斯之時為人子者得奉其親於夀域之中豈非莫大之幸哉吾邑孫裕為湖廣河泊官以考績來京師謁予言曰裕之去鄉逺矣老母在堂不克以就養日夕思之不少忘今夀及七十明年正月初五日則其生之日也裕縻於職務不得躬奉觴上夀將遣吾妻率諸子歸而以是日稱慶焉夀星圖一幅所以致裕祝頌之意願先生贊一言使諸子歌以為夀則吾親當亦喜無量請勿辭予觀兹圖盖道家所謂神仙者流豈老人星降精流氣而為此以黙司其事者歟予聞裕之母徳善儀于一家而裕又惓惓致孝焉福夀之應其可量也哉為作贊曰明明南極老人星輝映六合呈祥禎聖皇萬嵗天下平人生皆得夀且寧慈母在堂亦有榮華筵慶誕羅甘馨拜舞祝頌親愛并但願福禄如川增神君來鑒赫厥靈錫以遐算超百齡年年齊進流霞觥壽星贊壽星者南極老人星也見則天下理安人多夀考秦漢之世因其以老人名於是狀其形容而祠祀之以祈福夀後之人於其所敬愛者往往圖其像貌而用之慶夀之日以祝其長生此不可以常情視也予内弟陳公梅芳今年既七十予子秬其甥也在京師得織成夀星一幅欲用以為夀而致其頌禱之意請予作贊贊曰南極之精赫赫厥靈帝命是承俾錫長生梅之為性凌寒乃盛宜夀百年以篤其慶夀星贊史紀天官書狼北地有大星曰南極老人此星見主夀昌天下治平不偶然也是以人子為親夀則取其名肖其像以致形容頌禱之意盖至情之不能已也吾邑歐陽氏故名家其前輩多君子長者今廣澗處士尤惇徳樂義為鄉邑之望其子熈為刑部主事有賢名處士既享其禄養而褒封之命又及焉皆積善之應也處士今五十嵗六月二日其生之日也熈求畫者繪南極老人像而求予題使人持歸以致頌禱焉予與歐陽氏世有連於處士誼不薄為作贊曰惟老人星南極之精濯濯厥靈俾錫長生於粲于天照臨下土帝徳滂流厥施斯溥芒芒九垓永歌康哉夀域宏開福慶大來爾惟懋修克謹于度百嵗其昌式安且固何愽士像贊心莊而體舒氣和而行方究經傳之精微循聖哲之典常當天朝之熈皥登雲路而頡頏遂典教於外郡荐進陟於上庠肅肅乎其儀型渢渢乎其文章盖誠多士之所起敬豈但六館之所仰望宜福禄之來同將百嵗而彌昌也劉先生像贊聖經賢傳窮深幽教人不倦功業優太學愽士非常流唐有韓愈漢施讐先生繼之踐厥猷羣儒仰徳心日休薦剡上達拔其尤御史守令足與儔聞言不語皆掉頭循舊資給乃可留衆人喜進已獨不此風須向古人求常聞靜者夀之由如松如栢如山丘千二百嵗吾與侔劉愽士先生既滿考來朝祭酒薦其有治才可任守令御史先生不樂曰吾老矣得循例用足矣且守儒業實不願他徙於是言於上循舊以為翰林檢討掌愽士事先生喜甚將行出畫像求贊辭予記數年前曾為作贊乃損益數語而題其上意亦足矣不在多也江西胡㕘政像贊紹詩禮之訓而克盡其宜行政教之典而益謹所施浩然絶俗者剛毅之氣表然馭下者正大之辭仰明聖之在上惟俊哲之是資古人甞言徳者福之基而升上必由卑徳之進而不止則福之來亦如川之方至而無已也呉祭酒贊此祭酒呉君與儉像也與儉以文學才行師表當世作此像以示後予同郡人託交好故為作贊有嚴辟雍儒教之宗以育俊才以興治功簡賢為師天子有命而君實來斯文之慶君之所學賢傳聖經愽究羣言隆隆其聲規圓矩方凖平繩直四方具瞻惟君是式顒顒昻昻儀觀在堂深衣幅巾與道翺翔徳以時升業以久大聿觀厥成以熈帝載張坦妻王氏贊此吾王氏之淑女為張氏之賢配以孝敬事乎上以勤儉治乎内遭黔婁之貧而無憂服孟光之勞而㒺憝期終老以諧合何早寡以悲嘅持皎日之節操比嚴寒之松檜其不二者禮之文其從一者易之誨肆閨閫有視效而子孫䝉保艾當聖明之隆教化表徳善以厲風槩吾將見旌褒之在門而沐天恩之滂沛也袁宗範像贊承故家詩禮之傳遇聖朝文明之世得六館之士以為友受百里之邑以為治盖君上付託之也深而生民仰賴之也至勞來安定足以展其才休養生息足以行其志貴懷芬而履潔必服仁而蹈義繼漢史之循良法周詩之豈弟則髙官厚禄令名遐夀之萃於其身將愈隆而無替也郭彥常像贊踐孝友之實而克盡其宜藴政事之才而不及乎施浩然絶俗者豪邁之氣確乎持正者𢎞達之辭藹一世而孤鶱掩餘子而過之然所立也人可得而見其未發也人莫得而窺盖含章以自居亦和光而用怡噫豈古之所謂依隠傲放而不可羈者邪吳仲經贊肅乎其儀温乎其氣禮樂以華其躬詩書以勵其志忘情簪紱之榮養髙泉石之美霽月光風豁襟懷於芳景貞松勁栢挺節操於寒嵗惠澤被于里閭謀猷貽于孫子惟其徳善之修老而彌篤則其福祉之綏益悠久而無已也戴文進像贊薰乎其氣之和淵乎其神之清渾然者外之同確然者内之貞悅詩書以求道灑翰墨以怡情始消搖於鄉園終遨遊於帝京登金門與玉除交名公與列卿皎素服其不緇郁𤣥鬂其未星既囂囂而有得亦坦坦而無營盖從容於物之外豈塵俗之能嬰斯人也殆將陟崆峒過蓬瀛招安期訪廣成服千嵗之靈藥而翺翔於太清也邪劉教諭畫像贊承詩禮之傳得山水之樂思有光於前人奮不悖於先覺窮遺經乎千載矯薦書之一鶚故健翼以迅征將乘風而上寥廓當聖治之文明遂典教於儒學盖以方壯之年而受作人之託肅青青之衿佩謹明明之矩矱乘餘暇以遊遨寓幽情於琴鶴意態澹而閒和容色澤以優渥惟君子於斯須皆不遺於禮樂以治心而修身則教立而功愽兹公卿之崇重多庠序之峻擢宜祇慎而不怠庶名位之超卓季顯予泰和故家為盧溪教諭以外艱起復來京師持此像求予言予不得辭乃為之贊而以逺大勉之曾用勵像贊生忠厚之家聞詩禮之懿其才足展乎謀猷其行亦敦乎孝弟于于然文獻之邦熈熈然太平之世既名位之莫加乃閒曠以自遂不翕翕以為同不矯矯以為異寛惠者及物之仁謙和者處人之智予甞與之從容今則逺而莫致尚冀其福夀之隆庶優游於百嵗也蕭氏三世小像贊吾鄉蕭公北以寫真遊京師持其曽祖祖父三世小像求贊乃為作歌吾鄉蕭氏工寫神此圖此貎皆逼真阿翁前行顧其子後有賢孫宛相似大江之南風景殊百年柱石仍安居眼前見者已三世逺近流傳稱絶藝太平文物盛兩京衣冠所萃皆豪英玉堂金馬麟鳯匹犀甲寶刀熊虎質江湖浩蕩鷗鳥鄰山林深杳麋鹿親援毫㸃染出真態能使千人萬人愛積善由來開慶源雲仍紹續久愈蕃只今公北又繼武能事不忘先父祖我為作歌揚世芬期爾精藝超其羣他年若畫淩烟閣要使聲名繼古人陳宜人像贊此吾妻陳宜人也服孟光之勞而不怨視買臣之貧而不怒既自處以儉勤亦不愆于禮度遭聖朝之盛明錫褒封之恩數儼象服其光華樂燕安於遲暮繄天道之不誣必始約而終裕願偕老於百年而享子孫之福祚也時吾年四十八宜人年五十矣陳夫人像贊此吾妻陳夫人也當退朝之時適燕居之際儼餘敬之不忘斯令儀之未替所習者柔恭所謹者禮義為伉儷六十四年閱春秋八十一嵗雖恩封極品之榮猶躬理至微之事孝順勤約老而尚然衣服飲食儉而有制故吾得以安其貧而君亦得以伸其志兹復遇生朝屇夀祺諸福來集㒺不宜更百二十我同之使女婦孫曽得有所觀法而世繼其美也稼軒像贊此吾兄行敏先生之像也質厚而氣充心曠而神融踐孝友之實著廉讓之風早遨遊於萬里之塗晩消搖於一畆之宫盖履正而養恬不茍異而妄同是以鄙夫憚其嚴而君子髙其蹤在上者賴揚光而益明在下者冀流祉而垂洪宜神明之相之而享福夀於無窮也自贊小像其才學則迂疎其志行亦狂簡幸逢時以効愚每揣揣於自反然僚友謂之强而主上謂之板愧變通之未能徒為達士之所莞也强者矯亢不阿之名板者愚執不通之謂盖氣質蔽錮之已深而學問變化之未至若謬比於憸邪則難合乎公議雖内省之無愧然豈敢忘敬畏也哉梁叔脩贊此南海教諭梁叔脩也郁乎其文充乎其儀仁義之道力於行詩書之訓篤於思當皇明太平之盛承祖宗慶澤之遺君子則樂與為友學者則喜於得師既講論以相資亦逍遙以自怡夫在物者盖無適而非快其於心也亦何往而不宜惟敬慎其有常將福禄兮日滋姚與成父子像贊此吾邑姚氏父子像也父為隠君子子為名進士當太平之盛時乃聲華之繼起一則顯於朝廷而寵眷之隆一則重於鄉邦而敬仰之至炯然氷玉之同清鬱然橋梓之並美嗚呼今皆不可作矣徒使人瞻其遺像而嘅慕無已也祭胡祭酒先生文公以奥愽之學雅贍之文在洪武中名已著聞歴任政教入官禁苑綸閤之嚴公預其選帝心簡在遂遷司成蔚為儒宗四方所稱永樂大典包括無外髙廟信史傳之萬代誰其總裁皇以命公從容紀述以成厥功巍巍仁皇念公盖久公以疾聞恩眷彌厚賓客之陞歸老于家賁以璽書韡曄其華公身雖退公譽益顯北斗以南似者盖鮮惟士奇輩託好實深道義之言有契于心山川邈悠悵此乖闕孰謂于今千古之别敭歴五朝夀八十年始終哀榮公奚憾焉白馬素車不克臨送致奠陳詞侑以一慟祭楊少保文惟公奥愽之學瑰偉之文徳性之良詞氣之温天之所生以為世用人則謂何祥麟威鳯永樂之初公已在朝翰苑春坊於焉逍遙𢎞文之升公居第一簡在帝心從容宥密巍巍宣皇今上繼之綸閤經筵亦公具宜以康帝載以熈聖學夙夜敬恭寵命優渥祇事列聖迨五十年元老大臣莫之敢先天弗慭遺遽以訃告九重嘆嗟士林傷悼顧惟我輩辱愛為深今不可見感切于心生榮死哀公則多祉我懷曷伸薦此牲醴祭外兄嚴敬仲文惟公之生自我姑氏肆我與公内外兄弟始於童丱爰及成人情好綢繆實惟懿親家難相仍其艱其棘劬力以營乃克滋殖禄岡之陽公所徜徉有田有廬倉廩牛羊何以濟人曰醫之道凡諸請求無不大效讀書名堂以教子孫賓客往來桂俎蘭樽遭遇聖時遂享其樂跂予望之山川遼邈猶冀暮年杖屨追隨傷哉蘭塘而公繼之訃音來聞痛弗臨櫬老涙無多為公而盡人生若寄視死如歸六十八年於古亦稀心之所悲不忘疇昔緘詞千里侑此飲食祭錢侍郎文於惟先生閥閱之胄遭遇宋興大振厥後子孫相承詩書授受徳業之華式克毖懋公於經史夙夜深究載筆而升在帝左右文章神竒海内之秀三四十年名塞宇宙天賦公夀八十有九聚哭親朋哀傷故舊我年視公四嵗差又念欲送葬疾妨撫柩令男致禮嗟我遺叟何時見公涙如懸溜祭陳氏舅母文惟我舅母生自名門歸我舅氏徳粹而温我自㓜時慈母早棄舅氏撫我纔十二嵗衣我食我無寒與飢舅母之恩實如母慈甫及三年遂去左右報徳未能豈敢忘舊惟祈夀考庶遂此心舅氏先亡負痛實深云胡至今舅母亦逝何辜于天楚毒相繼山川邈然不克臨喪感念疇昔怛然内傷謹遣兒子恭陳薄奠南望長號涙下如綫祭亡兄善學先生文惟兄有學有行多藝多材祖宗之慶豈偶然哉逢時而興遂佐一縣克展所藴功業茂建歸來故鄉優游以居野有田園家有詩書謂將百年享此遐福云何仙遊一往不復直之相去嵗華屢遷念兄至情痛隔山川今乃永棄心亦傷只逺陳薄奠涙下如水祭亡姊王孺人文嗚呼直之兄弟惟姊最長同氣三人實相親愛當無母時賴姊之徳扶持撫育不致失所姊歸楊氏克宜其家猶得往來瞻視顔面其後或出或處心親跡疎嵗月如流皆入老景前年仲兄先逝哀痛在心曽幾何時姊又繼往訃音逺來直亦危病方解聞之傷慟幾欲無生何辜于天罹此荼毒嗚呼哀哉痛惟兄弟兹止一身孑立㷀㷀誰復愛念而今而後雖欲聞姊音聲見姊容儀少效殷勤尊奉之意漠不可得嗚呼痛哉直限以官守山川邈悠歛不得視葬不得送中心摧裂如何可言惟有紀述令徳藏之𤣥堂傳示久逺哀痛之至言不能盡逺致薄奠用表下忱想慕尊靈涙下成血祭亡姪希節文爾為吾姪天資甚髙期爾成才以光祖考爾如奇駿不範馳驅徒勞爾形卒無所就爾之來此我遣爾歸爾不吾從必欲如志我徒悵怏莫如之何聞爾有疾為致名醫為病已深難以措手我之聞此心焉孔傷何辜于天竟致於死嗚呼哀哉人之夀夭有命存焉但恨去鄉幼弱為累天長路逺歸柩實難然人之生譬如浮萍乘流則行隨寓而止何必鄉土然後為安爾能達命勿深自咎我有公務不克臨喪遣奠一觴肝腸如割哀哉抑菴文後集巻三十七
