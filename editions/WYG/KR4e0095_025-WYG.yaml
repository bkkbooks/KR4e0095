body:
  text: 抑菴文後集巻十二明王直撰序贈雲南按察副使徐君序國家設提刑按察司所以察有司之在外者凡吏之賢否生民之休戚事之治不治皆得以職行之官有使有副使有僉事使雖尊而專然未得一臨郡縣惟副使僉事則分道而巡歴焉於夫吏之賢否民之休戚事之治不治可以精察而審行之為之使者相與同其好惡公其是非按舉明沮勸當則何患吏之不賢民之不安事之不治哉凡天下之任按察者其職皆然而地之逺者為尤切盖逺則人易縱法易弛如是而欲吏之皆賢民之盡安事之畢治難矣雲南去京師萬餘里盖最逺也則其弊豈不有如前之所云乎者而按察司之所係豈不尤切也乎居於是者宜何如其慎也今聖天子精理治道興太平慮夫吏之不賢而民有不安事有不治者故下澄汰之令而其所託重則在乎按察司夫官以按察為名茍無斯令猶當奉職以行之况重於斯令乎則其奉行也當益嚴且慎焉精其權衡謹其尺度則輕重長短莫之能違矣使仕於郡邑者無不賢則民將無不安事亦無不治此上之所倚下之所望也予嘗因是而思之以為致理之本在於此猶慮或有輕重長短之失其宜者無以慰夫倚望之意然此愚者之過也監察御史徐君廷謨以三考績最陞雲南按察副使廷謨持風裁識大體其出入中外振舉憲度激揚清濁有名久矣今之往也其於舉職盖不難因郷友尚寳少卿袁君忠徹徵予言贈焉故復為言如此廷謨亦有取於予言也乎贈李與紳詩序江西上流諸郡去北京七千餘里而賦稅之輸京庾者大半焉其浮江以達于淮皆深廣利舟楫自清河以北至臨清水皆淺澁而公私行者如蝟毛其泝洪與上下諸閘必單舸循次而進每曠旬日始得度而又常有衝激漂没之虞其險且難可謂甚矣近年河溢自宿遷循其支流涉睢水以歴于汴又折出張秋以入衛河可以徑進而無滯碍然地多荒僻南方之人未嘗涉此者多疑之則往往由故道犯險難而縻嵗月非篤意公家而見幾明決者不能易也新淦李與紳故家子好學而喜文有司以其富貲産也推為萬石長於是督運以來至宿遷病其道之險且難也則謀於衆曰賦出於民以給公上非吾私也若循故道則豈獨廢時後事哉一有不虞如民力何昔之君子之謀事也茍利上下則從之由此以往庶幾其有濟乎從者凡二百餘艘得常所往來一人而歸其傭使為郷道無毫髪爽失既至京師悉登公庾矣而聞後之來者尚不能踰濟天既寒水且凍其至盖無日也非與紳篤意公家而見幾明決豈能是哉於是與紳姻戚陳素徽貞由延平教授謁選在京師與其所常厚者皆酌酒賀與紳又求詩以華其歸而請予為序予泰和人也泰和之饋運皆循故道未有能至者則予安得不為與紳喜乎夫京師者百萬之衆之所萃也而粮餉為之本故每嵗必分遣大臣往督焉然以愆期獲罪者十常八九至於久而不能畢者盖多也雖其道之險且難抑安得人人皆如與紳等哉然予聞與紳所由道亦多淺澁秋雨時至始漫為洪流與紳之所以利涉者盖亦以其時也與紳歸告諸饋運者使皆以時勉焉上不負公家之賦下有以紓民力之勞豈非仁者之用心哉故為序之詩凡若干首送陳叔達歸毘陵序今皇帝在位厲精圖治詔天下舉賢才於是毘陵以陳浚叔達應詔既至京師將用之以母老懇辭得歸養刑科給事中張守信等與其姪常為同僚喜叔達之志遂也相率求予文送之憶昔太宗皇帝時脩永樂大典徵天下名儒叔達之伯兄濟孚伯載以布衣入館閣未幾授春坊賛善任總裁博學淳行為士大夫所推重而其兄洽孚叔缺為吏部侍郎交趾之役有勞績陞兵部尚書後竟卒於官予竊官翰林盖久故嘗接二君有文字之好今雖未交叔達其可愛一言乎君子之於道㓜而學之壯而欲行之然而有義焉義所以制其出處之宜也人道莫重於君親然兼盡其事盖難也既事君矣義不可顧其私若親老而侍養焉亦豈可貪榮而不去哉當仕而顧私則虧忠當養而貪榮則虧孝君子於此亦度於義而已矣孔子曰君子之於天下也無適也無莫也義之與比制事而度於義固聖人之所與也叔達之兄既盡忠於國矣則終養於親固叔達事也辭榮而歸豈非義哉然則叔達其亦聖人所與也與古之人有吳起者棄其親以求其任君子非之後之如起者不少也身居富貴而父母不足於口體彼其於親如此安望其忠於國哉此予所以重叔達也叔達歸矣他日移所以事親者以事國則忠孝不亦兼盡矣乎有慶堂詩序君子之世其家者不茍然也務善而已矣積善於躬豈為家計哉然而往往昌其家此天所以佑善也天之不可必舊矣然善者天佑之君子不求必於天而必於為善必於為善而獲佑於天天盖可必矣易曰積善之家必有餘慶誠知其果然也此豈無徵於天道哉浮梁戴氏所謂務善以世其家者也戴氏自晉中書侍郎䕫南渡家建業至唐再徙於新宋之南也錢塘令璋又徙家浮梁自䕫至今兵科給事中弁若干世以儒入官者不少矣給事之祖東山先生兄弟皆明經篤行不及仕而卒其父嗣安先生年幾七十以善行稱一郷而其母亦淑善有儀法給事兄弟七人喜其親之齊夀也作堂以奉之而請名焉嗣安先生以為今日得昌大者皆祖宗積善之餘也取易之語名之曰有慶之堂盖承先啓後之意寓焉京師士大夫皆為賦詩而以序屬予予謂善者天之道為善者人之道人道盡則天道應之善其本慶其效也然善謂之積者聚而有之之謂也自倫誼之大而至萬事之理皆躬踐而實得斯可謂積矣積之盛則貽慶也益逺江出岷山合蜀衆流出三峽為荆江又匯沅湘漢沔之流洞庭彭蠡之瀦汪洋衍迤東注于海萬古而不息者其本盛也戴氏先世以積善為務既流慶於今矣今之所積以遺後者盍亦觀於此乎哉給事兄弟皆謹於為善其於諸子尤拳拳以善為訓有慶之堂洒掃有繼矣故為序其詩亦使觀者有所興起焉送蕭縣丞思敬赴慈利序思敬予同邑人早孤克自樹立其事母能孝其於兄弟友愛尤篤其出而從事於時以才能著稱久矣留北京又十年名公大人多知思敬者而以予郷舊尤往來相好也思敬通法律而心甚和平不肯為深文巧詆其在刑部閱奏牘一年刑部之長及諸郎吏亦以思敬為無害皆愛之今年謁選吏部當聖天子厲精圖治以隆太平之業思俾百姓皆安於田廬以樂生送死而無轉移失所者於是大臣建白凡諸郡邑皆增一官往撫之思敬得慈利縣丞或謂以思敬之才不試於要劇使得舒展盡所長而使丞於下邑無乃非所宜也乎予意不然天生斯民必立君以統治之君不能以獨治於是設官以分治焉則治民者固天職之所重也國家聖聖相承德被天下民之安也久矣而尤欲使之安此天地生生不已之意也且人孰不願安然或有未安者非心之所欲有未遂也乎思敬受天職之重體聖德之隆往盡已之心以求民之所欲而皆推以與之則民之安生樂業盖如山而加維之也安有失所之患哉民邦之本本固則邦寧其視居要治劇以盡一日之長輕重可知矣思敬勉之哉且予聞之周詩曰豈弟君子豈以强教之弟以悦安之漢史稱循吏者上順公法下順人心之謂也此後世治民者所當法也思敬尚虚心潔已以師法古人毋若彼齪齪者之所為則有以副上意矣故為序以送之庸俟他日以考其成也贈鄭太守詩序宣德五年十一月刑部主事鄭君珞希玉出知寧波府知希玉者惜其去曰希玉端靜而有守沉厚而能斷凡獄之𨽻乎已者必公其是非不肯任情為輕重自卿佐以下皆賢之曰如希玉者固宜在刑部奈何出為郡哉予曰爾以為端靜有守沉厚能斷者獨宜於理刑邪抑為郡者有不必如此邪天下之郡其地皆環千餘里為之民者不下數十萬治之茍非其人則民有能得其所者乎聖天子篤於愛民慮夫臨民者不能得賢也勅藩憲大臣考察而澄汰之彼其所以見黜者非邪僻躁妄則輕浮暴刻喪其守而謬於斷者也故命諸大臣慎擇賢者而任之盖患不得夫端靜有守沉厚能斷者若希玉固宜使為郡則千餘里之内數十萬之民將無不自遂者奈何其不可也且獄所以繁皆臨民者不能端靜而守沉厚而斷之所為也夫民有欲則爭爭而不能平則訟臨其上者皆若而人宜其集於刑部紛紛也使希玉在刑部其所理有限今守一郡而盡心焉則一郡之獄訟平矣天下之為郡者皆若是則刑部之獄將不遂清省矣乎葢為郡邑者乃治化之本也則希玉之去可乎不可邪古之所謂循吏者謂其奉職循理不尚威嚴而治端靜沉厚有守而能斷希玉且將為循吏奚為其不可哉言者不能難適寧波之仕者監察御史徐君訓河南按察僉事鄭君雍言求予文以贈行予思可以告希玉者莫易乎此遂書以贈之贈梁同知赴徽州序永樂十年思南思州兩田氏以叛虐伏誅其人請置吏如内治使得漸被聖化沐浴膏澤於是開貴州布政司析其地為八府慎擇良吏往撫焉予友梁君仲楘得同知新化以寛惠為治郡人安之時他洞苗民弗靖主兵者將盡殄焉檄仲楘以民丁從仲楘謂蠻夷未習教化若以恩義往諭之當不煩兵而定既而三十六洞皆從化仲楘與約使一遵法令衆皆悅從兵遂罷於是皆以仲楘能愛人交譽之而貴州之論文學者亦推仲楘洪熈初脩太宗皇帝實録詔天下具事狀以聞貴州以仲楘領之其所論著事皆詳實士大夫以為難㑹有言諸郡事簡宜省員仲楘於例當改官郡人欲留之不可既待次吏部復以簡擇督賦於浙江不苛而事集於乎仲楘之才行如此其可多得也哉今受調之徽州徽州畿内之地朱子之闕里也其誦詩書習禮義而地多物産號為富饒民既足於衣食故風俗淳美仲楘有愛人之仁重以文學之懿宜於彼有不宜於此乎其治教葢有不勞而成者然今之著令凡仕者三載考績三考而黜陟焉仲楘在郡將九年於陞陟不逺矣予慮徽人欲留之將復有不可得之歎然甘棠之詩作於召公既去之後仲楘尚加惠徽人使有以歌詠不忘則善矣故於其行序以送之且以示徽之人使知仲楘非茍然者又因以致勉之之意仲楘名輈予同邑人嘗同遊郷校相知為最深云贈耿指揮致仕歸鎮江序鎮江衛指揮同知耿興自然之守鎮江久矣軍政閑和民用寧謐今年以有疾聞請俾其子禎代朝廷從之自然既致其事而歸凡相與愛厚者因予友何彦澂求文以贈行自然泗水人開國功臣耿公再成之孫也初太祖皇帝受天命起濠梁一時豪傑雲合景從公最以忠勇知名其間既從上定江南下浙東累以戰功授官至江南分樞密院判官守處州嵗壬寅與苗冦戰殁於陣洪武丁巳追論勲舊贈公開國輔運推誠宣力武臣護軍鎮國上將軍僉大都督府事追封泗國公廟食於京師後四年乃以公之子岷為蘇州衛指揮同知自然之尊府也守蘇州二十年乃卒而自然繼之歴三十餘年始致其事而子禎代焉於是耿氏之有爵禄四世矣自古豪傑之士奮不顧身以成功名取禄位皆欲及其子孫而延于久逺然至再傳而失之者多矣子孫之不肖不思前人樹立之難而隳忠與孝也泗國之遇太祖奮其智力以經營四方至於隕身行陣其功烈偉然也封為上公列之廟祀而榮其子若孫朝廷之德厚矣夫篤於事君而心無不盡者忠也篤念其親而思不辱者孝也維忠與孝然後能迓續於無窮自然致仕而訓迪其子俾有以光前而裕後其安可忘哉忠孝之道古之人行之而光逺有耀者不少耿氏能世篤忠孝則濟其美雖傳之無窮可也詩曰樂只君子保艾爾後自然以之又曰子子孫孫勿替引之則禎等所宜務也故書以贈焉贈王太守赴雲南詩序昔之論為治者率寄重於郡守盖郡守吏民之本也郡守賢則其所施者皆賢而民受其惠矣漢宣帝嘗曰民之所以安其田里者政平訟理也與我共此惟良二千石乎宣帝厲精為治其綜核甚精而課勵甚嚴當時吏稱其職民安其業則諸郡之為守者可知矣然天下後世多誦黄霸及考其德則曰温良有讓外寛内明而已至於行事則能宣上恩澤垂意鰥寡困窮及布教條勸民為善防姦務耕桑節財用勤畜養而已非有超世絶人之事其視嚴延年輩威尊望重令行禁止直若不侔然褒顯於當時播揚於後世如此則知守之當務果在此不在彼也後之為守者葢多其欲為延年者有矣墨以敗官謟以辱身媕婀以惠姦苛急以病民者亦有矣其如霸者葢少此君子之所歎也今天子仁聖鋭意養民詔書屢下蠲逋租減重税省徭役數遣大臣問民疾苦而振德之慎擇郡守璽書奬勸其所丁寧付畀者皆仁政之施誠能如霸宣布於下而孜孜其所為則民奚有不安治效奚有不盛此上之所欲衆之所望也安成王君貴莊為監察御史滿九年以績最超拜雲南太守貴莊寛厚端重其存諸心施諸事見稱於人已久其於為霸宜若無難者若為守之失如前所云則未必有也能副上之所欲與衆之所望審矣於其行也學士大夫皆賦詩送之而予則書夫守之所宜者如此以為序是亦期望之至也贈主客郎中李君赴南京序郎官漢置分掌尚書事其始稱守尚書郎中滿嵗稱尚書郎凡事皆取決尚書受成而已至於詔令典冊亦出其手其入直則官給裀褥帷帳青縑白綾被大官供食物侍史執香爐護衣服奏事殿中則含香以自近最為華要魏晉以後其員多寡不同然皆極當時清選號為大臣之副國朝因之其職任崇貴無大相逺仕者至於郎中葢可謂榮也矣予友李君子譚廬陵之秀也始領鄉薦入太學擢授行在刑部主事以詳慎著名滿九年陞刑部廣東清吏司郎中未幾改兵部武庫時朝廷命出師擇大臣之能者掌其幕府事適陽武侯薛禄出戍邊勅遣子譚與偕行既歸改工部虞衡今年代還改禮部主客以子譚之才更歴郎署凡四五為正郎者十年不知昔人久處華要如此者能幾人然則子譚之榮亦盛哉予聞西漢置郎時尚書有客曹專主外國夷狄光武分為南北主客魏為南主客晉分左右南北主客其後或分或否而官稱亦或異唐武德以來乃專置主客官復稱郎中其所職猶昔也今天子至仁如天覆被逺邇四夷貢獻無虚日為主客者得以所職周旋其間以觀太平一統之盛其視他署不亦尤榮矣哉子譚今之南京凡西南諸夷之來朝者皆主之然後覲于北京子譚雖達其尚加慎矣乎使聖德益充洽逺人益歸仰奔走慕義益加於昔則子譚之職盡矣進而佐大臣當大任可待也行在禮部與子譚為僚友者求予文以贈行故為序如此贈四川按察僉事茆維揚赴任序維揚慈谿人始登乙未進士第其郷前輩今國子司業陳先生在翰林與予處亟稱維揚之賢而予未及識之其後維揚擢授廣西道監察御史有名無幾調四川道其名益甚予自念久官京師有人如維揚者而不能一相接何其㑹合之難哉今年維揚以三考績最陞授四川按察僉事將行其同列之賢求予文為贈夫相知於十數年之前終未得一朝之遇今而以言相贈豈能亮予之意哉然不克辭也國家建官治民其制備矣而所倚重者惟風憲葢綱紀法度所繫也綱紀或不振法度或不脩而欲民之得所難矣夫貪暴在位姦狡豪横之得志綱紀法度所由紊也任風憲者廣聰明嚴刺舉而一斷以公使凡若此者皆不得以為病然後民之賦稅平徭役均枉直不失其宜富者得保其所有貧者亦得遂其安而治道成矣其所倚重葢如此彼不知者惟以決獄視風憲而昧所重者亦往往於此自足焉無乃舉其細而遺其大者乎維揚為御史久矣葢能知所重者也今之四川斂其所以大施者而專施焉四川之民之幸也然予聞之四川地大人衆仕者之皆賢與否不可知也姦豪之民舞文巧詆傲狠而嚚訟者亦比比有焉綱紀之振法度之脩維揚宜加意也耳目無所蔽舉措無所私去其所以為病者而俾民安焉則國家倚重之意得矣維揚久治四川道其威令素行而聲譽素著子知其無難為也姑書所見者如此以為贈行序贈年景和序國家任天下之才以興天下之治而用有虞考績之法課勵之茍能稱任則又推恩於其親葢課功以勸忠推恩以勸孝此有虞之世未盡行也然則聖仁之逮下其過於古昔逺矣士生斯世而䝉遇若此豈非非常之幸哉鳯陽年君景和今行在吏科給事中富之父也好善樂義篤於教子由是富以明經領鄉薦分教德平縣學滿九年蒙簡拔給事殿廷能以勤慎舉其職而天子以為六科最親近執事樞不可處非其人然必尤賢者總其事遂調富掌刑科益盡心不懈從容於禁密之地周旋於法度之中既考績上以為稱而推本於父母封景和為吏科給事中錫之勅命時景和就養在京師於是父子偕入謝命服相映進退煜然朝之士大夫莫不榮之景和既受命將復歸鳯陽凡與富同列者相率求子文贈之予謂國家推恩羣臣及其親之存者有矣然或以衰耄之年或違越山川之阻逺致其命已足為榮求如景和父子同拜於廷傾動人之耳目而起人之羡慕者葢千百而一二也豈不尤榮也哉雖然詩不云乎無言不酬無德不報此君子所當念也今推恩之典有虞未之行也景和父子既受之矣則所以圖報者詎可庸常自處乎父益以忠孝為訓子益以忠孝自勵父子之道君臣之義交盡而不愧於古人則年氏之榮豈特此而已哉故為序以贈之而加勉焉且以示其郷之人當亦有羡慕而興起者東軒詩序東軒詩若干首士大夫為羅履魁作也履魁廬陵人其先自印崗徙居大安代以詩書顯聞至履魁尢聰敏好學就其所居之東作小軒聚書數百巻襍植花卉於其前履魁讀書奉親與賔客談論皆於此軒以其在東而面陽也故名之曰東軒今年來京師求諸公賦之而請予序夫士之自處葢必有藏脩之所燕休之居以寧其身樂其志然後能肆力於先生之道而施之事親敬長之間若風雨之不除怫鬱之不釋雖勉而為之無不可者而亦豈能久而不厭哉此人之常情也昔之為士者衆矣或廣宇豐堂不足以資於學而陋巷窮廬乃得之此則視其志何如也雖然士之有志者亦多矣或奔走於世務之役而遂逺於道德之塲如筠州之東軒徒足以資啞然之一笑豈非又以其時哉予用是知士有為學之具尤欲有其志有其時也若履魁可謂兼有之矣履魁之來京師適當聖天子臨御之初深仁大德涵育天下有志之士莫不洗濯磨治思欲自效於一時履魁其亦有志者也夫地有四方東為先天有四德元為長地之東天之元時之春人之仁也履魁有志於學而居於此軒其尚充類而至於其極可也充之則為士之道得矣故予為之序而歴道其所以然者以相其志云送潘教授序潘先生畿字民止為翰林檢討二十餘年年已七十矣今天子即位嘉惠臣庶先生以老疾辭位上憫之不欲勞以事又不欲絶其禄也使歸為温州府學教授其鄉之士大夫皆為先生喜屬予作文以送之予謂君子之事上也盡其心焉耳然而力有不能遂者則亦達其誠而已矣上之於君子也盡其禮焉耳於其力有不能遂者則亦加以恩而已矣下以誠事上則不至於曠官而伐檀之譏無有也上以恩待下則不至於失所而權輿之歎無有也此所謂上下交而為泰也至於後世而君臣之義缺其事上也不以誠故竊禄終身而怠其事者有矣其遇下也不以恩故盡瘁以仕而莫之顧者亦有矣豈非上下不交而為否乎是以君臣貴乎相遇也先生遭遇聖明思欲效忠而力不能遂乃以誠聞於上上亦憫其志而加之以恩此千載之良遇誠所謂上下交而為泰之時也則其鄉之為士大夫者安得不為先生喜乎然予聞之古者七十致仕而歸則以其道教郷人子弟俟德成而升用之况先生受教授之任者乎則所以成一郡之人才而厚其風俗者實先生事也予葢又為其鄉之子弟喜矣故為文以送之使其人知先生受恩於上真難得而可樂如此又以俟其教之成也送龍公常大使之崇安序公常予泰和故家與予處者十餘年矣前年冬與之同上京師同舟而載者三閱月及至京朝往而暮來相與談道德論政事之宜間則飲酒相懽歌呼大謔怡然至樂也其言談舉止莫非予所愛者然非獨予愛之凡與公常識者盖莫不愛也嘗竊自謂公常以英妙之年負邁往之氣抱敏達之才其試之用宜無不可者今乃得崇安縣逓運大使以去凡相知者皆惜之而公常則休休自適無不滿之意問之則曰好髙而惡畢者人之情也然卒卑而不能以自髙者命也吾嘗受學於先生長者而知命之說矣順其勢之自然不以人為害之也吾今之所得者豈偶然哉葢所謂命也然詎知退之極而非進之地邪且吾之親老矣今得禄於南方可以遂朝夕之養而職事亦不廢則於私計得矣安可厭卑而戚戚邪予聞而善之夫位之崇卑信所謂命也而君子處之有義焉位尊則欲道之行位卑則惟職之盡位尊而道不行孰若處卑而盡職之為愈也孔子嘗為乘田委吏矣亦曰會計當牛羊遂也豈有厭卑而隳其職哉又况不如孔子之聖者哉不如孔子而厭卑以敗事斯非妄人也乎公常盖可謂安於義命者矣安於義命君子之道也且予聞之君子之仕也貴得禄以為養也故三釜而逮養則必樂千鍾而親不及則心悲公常之親老禄雖薄而得以致養焉則其樂可知也千鍾之厚奚以易此樂哉又安知其後之不至於此也哉士大夫聞予言而皆樂之相率賦詩以贈其行予輒書予言以冠其首云送方經歴序國家設兵衛以戒不虞率以有功之臣為指揮以統之教之以行陣坐作進退擊刺之法程其器能科其精壯以待用於一時至於機務之緩急錢谷之出納戎器之除治一切文書之往來則以經歴掌焉凡朝廷有事於諸衛而遣人往臨之必責成於經歴其所統轄之大臣與夫郎官御史以事而來者亦於經歴乎是問其職至重事至繁也夫以七品之官而其職任如此非才智傑然老成之士不能矣故今謁選於吏部當得七品官者類恐為衛經歴惟才智老成者則不以為難莆田方君定得建陽衛經歴予視之怡然自若也盖方君於是官凡三遷其所涉歴者多矣盖所謂才智傑然老成之士也職雖至重事雖至繁其何足以勞方君哉夫君子之仕也不以進位為難而以不舉其職為患誠能舉其職則先雖卑其後必進於顯榮猶歴階而升身愈尊人愈仰之矣今方君之秩雖未甚髙予知其且優為之也則他日之進於顯榮其又可量邪予同官翰林檢討黄君夀生與方君為同門皆予親戚歐陽允賢教授莆田時之髙弟弟子也是以方君來京師特與其弟監察御史允和相愛厚予因是識之而亦與予相愛也方君垣厚之情其可多得哉於其行遂為序以送之既以重方君又以慶其為統帥者之得賢助也贈陶僉事序初陶君得温之為吏科給事中也其友余君正安與予同在翰林為脩撰因正安始識之其言論恂恂進退必以禮予心重焉當時六科之為給事中者皆得人然皆謂得温敏於事而慎於已其執筆而侍上左右也亦未見其有尤焉子用是益重之其後予以憂家居得温秩滿陞福建按察僉事予聞之滋為喜盖謂得温之居朝廷其所樹立已如此宜於内有不宜於外者乎永樂壬寅太宗文皇帝慮有司之病民也遣大臣往省之而刑部侍郎楊君勉之福建楊君聰察强毅好善而惡惡一時方面大臣少所假貸而亟稱得温為能及今上即位大正庶官又遣御史考察焉則又稱得温以為宜於其職得温信可謂賢於人者矣夫矯飾以千名者可偶一得之而不可行於久今得温屢省而屢有名非誠賢於人者能之乎福建之為府八為縣凡五十其民豈止數十萬為之吏者果能皆賢矣乎不賢而居民上民其有不病事其有不廢矣乎如是而欲治道之成可得哉故按察司所以别白其人之賢否而進退之以成治道者也其職任誠重矣古之論治者盖曰在知人在安民知之明則用之得其宜然後能安天下之民而無失所者然人亦不易知也昌黎韓公以為知人之道在於精鑒博采之而已精鑒者明其心以燭之之謂也博采者咨於衆以審之之謂也明其心而不蔽於欲咨乎人而不惑於邪則賢否惡乎遁哉賢者顯而揚之不肖者黜而去之而治道成矣得温之治福建其道盖有加於此者予不能知也而予之所見有如此因翰林孔目杜謙與素厚者求贈言於予予遂書以送之且諗於得温以為何如也送楊縣丞詩序建安楊純字彦實今太子少傅工部尚書兼謹身殿大學士楊先生之從弟也初以材識從事於有司既九年得潮之掲陽縣丞以去中書舍人蘇鎰良金於彦實有郷曲之好求諸大夫士作詩送之而屬予序夫丞佐令者也以百里之地為之民者累千萬而衣食其寒飢均節其勞役安其羸老長其幼孤使相樂於田里而無辛苦愁怨之聲者縣令丞職也故朝廷之任官於此為尤慎則為丞令者可不思深體其意乎夫上之逮下者仁也惟不溺於私不狃於習推行而宣布之則民衣食有不給勞役有不均羸老有不得其安幼孤有不得其長者乎無也故為令丞者必守之以㢘㢘則公公則無私蔽而明生明則足以燭隠微别重輕而仁之施不爽焉則為令丞之職舉矣然豈獨為令丞哉雖進而上之其道亦猶是也若今之為令丞而為民之所仰賴者衆矣其於民之寒飢勞役果能有所濟羸老幼孤果能不失其所者乎未見其盡然也盖欲以撓㢘私以蔑公故昏然不知所施而民亦枵然病矣為令丞也若此則進而上之其為民病有不加甚也乎嗚呼此豈所以望於令丞者哉是以天子慨然思所以整齊之詔書屢下以訓勵在位者又遣使者考察焉於斯之時善者可益勸而不善者可以警矣彦實在京師皆親見而知之今去掲陽掲陽之前為丞者其行事皆善歟彦實繼之惟加勉焉可也若其未善彦實亟改以從善可也然令之與丞其職同其休戚又同毋徇也母激也惟其善而已矣予未識彦實而良金言其小心勤慎庶克舉其職故予亦本其職而反覆言之以為贈行詩序凝清軒詩序士之仕也既盡心於其職矣則必有燕休之居娛樂之具以解其劬適其意故能興亹亹之誠而續明明之功使沉迷於簿書勞瘁於應接終日矻矻而不得少休焉則意倦體疲神昏志亂雖欲自勉於事功而反有不能及者記曰張而不弛文武不能也則夫仕者於營職之暇而有以自適固聖賢之所與而王法之所不禁也渤海孫敬克恭為兵部武庫員外郎敏達而周慎其才盖足以有為者嘗於其居作小軒幽雅靚宻公退之時輒焚香瀹茗而與賔客從容其中甚適也取韋應物燕寢凝清香之句而名之曰凝清朝之士大夫知克恭者皆為賊詩而以屬予序予謂士之於學將以有為也故既得其位則必思行其學而圖所以顯名於當時垂裕於後世宜也然觀北山之詩有盡瘁於朝夕之間致勞於嵗月之久而鞅掌失容者矣有息偃於袵席之上棲遲於堂奥之中而耽樂自得者矣勞佚不均休戚各異此其時之盛衰其人之賢否可知也今天子在位以仁逮下小大之臣畢心一力進則有以效其勤退則有以適其私正大雅假樂卒章之所云者盖太平之盛觀也則後之欲知今者觀於是詩可徴矣予慮夫人有若墨氏之褊道細碎而以好逸廢事致疑於此者遂書以冠于首云贈林通判詩序林君彀字惟志通判杭州六年矣今考績來吏部吏部以為稱言於上俾復任焉惟志家莆田世業儒由是於儒者特厚其始遊太學即與今翰林侍讀學士錢君深相好錢君嘗為道其才行有賢於人者前年董役事在京師辱過予其容端其言謹至察其行亦不異於是乃益信錢君之言今之來也予適在告而惟志復來視予相慰藉豈亦以予為儒者而相厚哉夫儒者固喜談詩書論道理流俗之所謂迂也而惟志乃眷眷如此豈非誠賢於人矣乎推於為政其賢亦可知矣夫通判以佐守也要在恊恭以成其治太守賢其施於政也皆善通判則贊其成不茍立異也若有未至通判當相與論其可否必去其否而從其可盖休戚相闗榮辱相同也豈以立異為嫌邪今之太守昧於取善而自用者多矣為通判者果於立異而相戾者亦有矣而予知杭州不然也盖為守者馬公端厚之士也而又有賢於人如惟志者為之佐其能恊恭以成其治也審矣夫天下之為府者百數十而杭州莫先焉其事視他處為尤劇而皆資民力以成之必使事集而民不困則善矣宋熈寜中王安石用事而蘇子瞻判杭州子瞻善因事以利民盖出賦稅力役以供公上者民之事也豈能免哉惟事至而思之制其多寡之宜審其緩急之節委曲將就無過焉無不及焉然後民安而功立惟有子民之心斯足以行之故因事以利民非難也特患無是心焉耳以惟志所存之厚而又得良守以佐之何子瞻之不及哉使杭之治他郡亦莫能先焉儒者之效暴於人之耳目予於惟志乎望也子瞻再蒞杭杭人德之至為立祠今之人豈不如昔之人哉惟志勿以宦成而怠則幸矣將行凡相與厚者皆贈以詩而予為序如此不自知其為迂也送金先生序金先生原祺永嘉人自洪武中為教諭其後為教授為紀善凡三十餘年年已六十八矣今年以疾告乞歸田里吏部以聞詔許之先生喜曰盈吾志矣或謂先生曰朝廷著令仕者七十乃致事有章服之榮公何汲汲於退而以初服返乎先生曰吾故永嘉布衣也忝竊䘵位亦已久矣顧不能報萬一今既老病假令更一二年亦何能有立於世語曰知足不辱知止不殆吾今知之庶幾免於殆與辱也且吾觀之昔之仕者亦有名為知止足者矣然卒貪戀而不去至於疾病内攻殃咎外至乃併其身而失之奚章服之能得哉今吾遭遇聖明布寛大之恩於是乞身而去其所得多矣尚奚言予聞而嘆曰達哉金先生也君子之仕所以行君臣之義也是故壯而仕老病而去進無曠官之譏退無留禄之嫌皆義也先生可謂審於義矣或者之言其能免於患得患失之謂哉患得患失非君子之所宜也且君子之去固未嘗忘報也必以其道教鄉人子弟以成其徳達其才使處則為良士出則為良臣其為報亦可矣與夫昧止足之分卒無所立於世而及於殆且辱焉者豈不大相逺哉先生將行進士鮑輝秀才黄采求予文以贈行予與先生有斯文之契故為說如此以送之既以祛夫或者之蔽亦因以警夫昧者焉贈參議邢君序邢君旭字景暘與予同登永樂甲申進士第其初為縣已有賢名聞於人及為工部員外郎而其名益顯既九年陞河南參議河南之為布政使者李君昌祺蕭君省身皆同年進士而又皆賢也益相與為莫逆於職所當務益盡心不懈予嘗聞之邢君景暘敬慎而有為每出行部凡事之屬布政司者無不問事有當操縱緩急必制之盡其方故凡景暘所過鮮有滯事其他則亟於所治而已餘若無與也予聞而益信其賢今布政司統郡縣多者至百餘少者亦六七十其事不可一二計也使主乎内佐或涖乎外當以治家之勤治之小大精粗無不理也若止於已所治而置其他而又須一人焉則在位之賢豈能稱夫事之多哉景暘之臨事如此殆古人所謂孜孜為國知無不為者其賢於人盖逺矣抑嘗念之永樂之初同升者四百七十人今三十年其佐六卿當方面者盖無幾果能勤於其職而卓然有立於世則予輩之愚庶乎有耀矣若景暘者固予所深望也然予聞之孔子答仲弓之問政曰先有司赦小過舉賢才家臣之所宜施尚如此况方面之重哉郡縣之職事之所由理也其人賢否當别白而進退之果賢矣則勿以小而害大不賢則黜之而更用賢者焉今朝廷以考察黜陟之柄付之藩憲大臣矣藩憲大臣公以行之使在下者皆賢而上之人又有若景暘之賢以臨之則事雖多可以不勞而治矣媕婀姑息非此所宜也此愚者之得也景暘考績來京師當復歸河南予重同年之誼願相與誦焉而其友工部郎中樓文昌適求予言故書以贈之然景暘豈待於予言哉送劉教諭序萬安劉有臨為太學生以經術知名今年吏部言天下教官多缺不敢輕授之匪人請於太學拔其尤者而授焉於是兩京太學公選舉得五百人上命翰林嚴試之有臨文在優等得臨武教諭其從弟刑部主事廣衡請予文贈之曰此亦吾兄意也予謂有臨之學既足為人師矣而何待於予言然猶有請者其不自滿足之意哉世之仕者少能此茍得一命則肆于人上於身之所宜處事之所宜施皆悍然不之顧故能稱其任者少矣有臨之志如此其賢於人盖逺哉則予之言烏可以已邪予聞安定先生之於蘇湖也明聖人體用之學以教其人體者何仁義禮智之得於已者是也推而施之於人使有所持循以善其身者其用也是以學者皆有以自立而天下皆取法焉則今之為教者豈有加於此然周子曰師道立則善人多師之身乃為教之本凡其所以教之之道皆體諸其身然後學者有所觀法而化則善人安得不盛哉然則師道奚可以不立師道不立而欲責人之成才是猶棄規矩準繩而欲物之方圓平直惡可得邪今師之所教弟子之所學其能明體適用者盖甚少徒習其文者比比皆是也然文非已之自為也取諸人而已矣亦有詞義之不通操觚染翰而不能正其行列句讀者是於文事之末亦莫之知如此豈育材興治者之所樂哉學校之弊至於如此嗚呼甚矣今天子大新學政既去諸生之無良者又嚴擇師儒以教之其所望於學校也至矣以有臨之賢當何如其用心哉先立乎其本而明夫體用相與講說俾服行之而又兼美乎其文則善人之多將不復自茲始乎有臨勉之予深有望也陳氏宗譜序貴州按察僉事陳輝字伯煒脩輯其宗譜既成書矣持來京師求予為之序按陳氏居福州不知其所自徙至今盖十世矣其始祖諱僖嘗為軍從事靖康中軍亂殺守臣詔按籍誅之公歎曰一軍非盡為逆者而可盡誅邪火其籍諭其是非由是多得不死其有德於斯人甚厚二世諱衡以忠厚世其家三世諱孔碩嘗受學於晦庵先生知道德之要官至秘閣脩撰積之之久而大發於脩撰之子少師忠肅公韡當寧宗理宗之世以嘉謀讜論號為名臣朝廷加恩其三世皆追爵從一品忠肅公之後衣冠而仕者不絶至伯煒又大顯於今天之報陳氏何其盛哉夫君子之亢其宗必有大功德於時其本深厚則其發也必盛長昔王晉公以百口保符彦卿不反當時雖不至宰輔至其子魏國文正公相真宗皇帝勲業在朝廷利澤滿天下福祿之盛無與為比文正之子懿敏公又以直道事仁宗皇帝出入侍從將帥三十餘年懿敏之子鞏又好德而文以世其家故三槐王氏人到于今稱之非其積之厚故傳之者逺歟陳氏之先其所積累盖與王氏等則其傳世之逺可必矣夫譜之作所以明其本聨其支使後世知所自出與所由分而思承藉維持之者也則為陳氏子孫者當何如其用心哉詩曰無念爾祖聿脩厥德此承藉維持之道也欒武子為晉卿晉人思其德如甘棠之思召公不可謂不至也其子黶不能嗣而汰虐甚焉然賴武子之德終其身及武子之施已殁而黶之惡實彰故盈受其毒以僨其宗是以君子不恃其先人之有德而思嗣其德焉然後得於天者益盛傳世既逺而彌昌此為人後者之所當知也故予為序此譜而相與道之所以勸陳氏之為子孫者而亦伯煒之意也歟贈徐僉事謝病詩序山西按察僉事徐君崇威以内艱起復來京師有病乞去其位天子憐而從之徐君角巾杖屨擇日就道還故郷吾黨之士重交游之誼相與飲餞於文明門外盖徐君初自中書舎人出典一州以績最陞按察僉事明於道理老於世務達於人情故所至有聲今年未七十而以病去賢於貪冒無恥者逺矣時春氣既和天日明麗草木禽魚皆有自得之意徐君雖病察其心盖已快然樂也酒半右庶子王直執爵而言曰士之仕也蘄以行道義也以病而退不敢曠其職亦義也然而有不能自遂者盡瘁以仕寧莫我有此小雅之所刺也今君遇聖明之朝以仁逮下而得以遂其志如此其為幸大矣敢以是為君賀又酌而言曰昔之仕且病者患不能得歸或又無以為歸今君歸矣居室足以安山水足以娛田園之入足以供祭祀賔客往來足以遂燕游子孫之賢又足以娛養於朝夕之間而君之疾瘳矣請以是為君夀又酌而言曰古之君子既仕而歸則以其道教鄉人之子弟盖大夫為父師士為少師朝夕坐里門教之以孝弟忠信而各勤於所事故當時人人有士君子之行今君之歸鄉人之子弟所以成其才且良者皆於君是望矣敢以是為君祝君喜且拜曰子之言是也某敢不拜於是坐者益重徐君之賢賦詩以贈之而直書其說以為序送周教諭詩序吉水周源仁本與其叔功載同㑹試於有司皆得為教諭功載盖翰林編脩功叙之弟仁本其從子也皆循循守禮法予愛之既而功載之武陵士大夫以詩贈之屬予為序而監察御史羅君汝敬與仁本世有連又以諸公贈仁本之德清者求予序之予嘗歎周氏衣冠之盛盖二十年來所見者台州府同知仲方吉安府學訓導仲容長洲教諭公明大理少卿彦竒功叙之尊府今兵部員外郎岐鳯公明之子襄陽訓導迪及功載仁本凡九人皆表表可敬者而仁本乃長洲之孫襄陽之姪予所見者三世矣則於序其詩可已邪夫學校者育才之地教官者育才之本也其任盖重矣故朝廷每加意焉以為進士者庶官之任非成才所係也寧寡取之而多委其賢者於學校故今之為教諭者皆昔時進士之選也任之重選之精而期之大則為教諭者可不思所以自重乎夫汲汲於外誘而侈然自放者皆衆人之事非師道之所宜故為師者言必以禮行必以義從容於規矩法度之中而後為弟子者有所觀法而化當然之道盖如此今之為學官弟子皆縣人俊秀之選也然鮮能自約以禮義奔趍於流俗之末者比比皆然盖有示之以道而不化者矣况以非道示之邪德清浙右大邑其人多秀而有才然如予前之所云者亦不少也則仁本之去為教官其自重宜加焉傳曰師道立則善人多仁本慎其所以示之之道也周氏世以文行為人師仁本之得於家者深矣然予猶云爾者亦論其所當然者而已仁本勉之詩凡若干首贈陳員外省墓序陳君亢宗永嘉人其大父民初先生元末為福建行省左右司員外郎罷歸國朝洪武中起為丹徒教諭久之陞廣州府學教授亢宗隨父母皆在侍先生以其故業遭亂而廢也欲謀居姑蘇未獲如志以卒權厝廣州之城西其後自亢宗父母而下祔塟者又五喪亢宗因留居之而吾州前太守呉郡顧侯國初為廣東行省員外郎卒於官其子存信先生亦留居廣州遂以女妻亢宗亢宗負衣冠之舊又自力學遂以文名知於時昔予先公守瓊州家兄行敏數隨侍往來嶺海間因存信先生以識亢宗相交為莫逆予聞於父兄而慕之久矣其後詔求賢才有司舉亢宗至京授刑部主事即奉命董役于蘇州凡六七年既歸陞南京兵部員外郎與予叙殷勤申交好者未幾而亢宗往矣則其心豈能忘哉今年以職事來北京䝉恩賜誥命且贈其父為兵部員外郎母為宜人又得告歸省墳墓亢宗喜曰是足以畢吾事矣盖亢宗買地呉縣靈巖山下欲舉六喪往葬焉以成其祖之志而未能也至是乃得請其友工部主事樓文昌知予與亢宗善也徴予文贈之嗟夫亢宗予文何足以張其美哉孔子之論孝盖曰立身行道以顯父母至論周公則曰善繼人之志善述人之事予於亢宗有以見其然矣民初先生賫其志以没三十年乃成於亢宗非所謂善於繼述者邪恭慎不懈以脩其職致位其親第五品赫然為當時之光非所謂立身行道以顯父母者邪嗟夫亢宗子之所愛且重者豈獨文也哉雖然君子之孝盖終身焉非偶而為之也脩其身善其言行而忠於事君至於啓手足然後為孝之成茍一息之尚存而有一事之未至足以辱其親非孝之至也亢宗學道君子也盖不待於予言然予以謂莫加於此者故書以贈之歸而質於存信先生以為何如也贈曽訓導序用濟吾友也居泰和北門外與予家相距數里許故予少時數與其諸兄弟游有曰用楫者最聰敏好學未成名而卒曰用常讀書勵行領郷薦㑹試禮部皆髙等未廷對而卒曰泉字本清曰𢎞字士𢎞皆取進士入翰林為庶吉士士𢎞今為兵部主事有名稱於時用濟端重簡靜而勤於自脩亦以郷貢試禮部中教官選初為掖縣學訓導以憂去起服改富陽將行過予求一言予謂朝廷之於養士厚矣以為政教之本在是也然士之能無負者不多焉給之廪禄徒以充飲博之資復其身家徒以遂逸㳺之樂詩書之不習禮樂之不知絶意興賢之科而僥倖於嵗貢之得茍得矣即傲然自足而騁其所欲為以陷於罪戾者比比也其狡猾無耻者則多巧為之所以自脫於有司其又甚者甘受黜辱而不辭嗚呼此豈所望於為弟子者哉然非特為弟子者之罪也師亦有過焉盖人皆可教在隨其髙下而成就之使為師者朝夕坐堂上相與談詩書陳法戒開導其善心禁制其邪念鐫磨之久濡染之深其文行將必有可觀者而乃自溺於利欲晏樂之私視弟子之學與否漠然若不相預也其能以師道自任者甚鮮則學校之弊安得不至於此極哉故今朝廷訓厲百司而於學校為尤切則為師弟子者可不思自奮邪用濟前教掖縣諸生既賴以有成矣今去富陽富陽之學校盖未有其弊者用濟宜益盡其道也傳曰師道立則善人多善人邦家之本也予深有望於天下之學校而於用濟乎發之故歴序其相好之舊與其所以屬望之意以為贈云送羅教諭序今天子在位大正庶官以新天下之治知學校之怠廢也詔國子生歴事諸司者雖慎勤皆還讀書監中俾由科舉入仕復命禮部凡天下所貢士必嚴試之茍為有用雖百得一二可矣盖異時諸生歴事滿三月其髙等者類得五品官及為主事御史其次亦不失為縣而以進士出身者反不及由是諸生多不務學為進士惟於嵗貢僥倖焉禮部試之非不嚴也慮黜落者多故稍寛之懶學者得志而中庸之士亦怠矣典教者亦不復思舉其職相師成風其弛弊至有不可勝言者宜乎今日之嚴也夫待之嚴者重之至也則為師弟子者可不思革其弊乎且師之於教成物也弟子之所以學成已也有志之士而何待乎上之督責邪誠能相與致力於詩書六藝以明聖賢之道脩於身行於家信於郷黨然後升於有司進於天子而宜於職任則師弟子皆無負於聖朝作人之意豈不光逺有耀哉此凡為儒而欲昌其道者所以朝夕兾也予友羅汝寛廬陵故家其父養䝉先生敦厚有學行偉然君子也其兄汝敬為翰林侍講文行稱於當時汝寛承家學之懿始舉明經分教臨江邵武二郡學諸生受其指教多相繼舉進士既九年考績來京師陞常熟縣學教諭將行朝之士大夫相知者皆賦詩送之而屬予序汝寛盖能舉其職者也今往教常熟使其諸生皆力於學也汝寛惟加勉之而已若亦不免於怠廢也汝寛當有以大振起之可也毋狃也毋激也從容化導必有以稱上意則善矣予於汝寛誼不薄故為之序如此汝寛其以為然乎哉劉士哲輓詩序士哲撫之崇仁人始與予同舉進士雖相知而未熟也久之士哲得官為臨汾知縣以清慎持已以仁恕理民民德之既三年以憂去服除用薦舉擢拜浙江按察僉事其所以持已理民者不異在臨汾而於摧姦剔蠧加嚴焉士大夫皆譽之予耳熟而心識不忘未幾士哲坐累謫臨清予以憂去官往來過焉見士哲褒衣巍冠從容談論未嘗有遷謫不平之意予信其果賢而知其非終困者也數欲上章薦之不果其後釋免歸崇仁仁宗皇帝即位下詔求賢士哲首被薦授文選主事恭勤脩職時譽歸焉予因得以閒暇從之游其正直之行忠厚之言相長者多矣予私竊自喜而惜相好之晚也今年禮部㑹試天下士尚書胡公嚴擇在位之清慎者預其事得士哲士哲以病辭弗獲既入院猶力疾不懈撤棘而歸日飲藥不出予再往視之猶相與談笑如平時意謂其旦夕且起既月餘聞病亟又往視之頽然卧床上其體瘠甚而精明不衰令家人經理其後事予尤幸其不然不二日而士哲已矣嗚呼痛哉天之生人也既賦之以恒性又與之以良才其得之者能自脩飾以徇乎天如予士哲盖鮮矣天固當黙佑以存之而乃不得中夀以卒何邪謂天之未定邪則士哲之亨而屯屯而復亨者皆天也其定也久矣奚獨不假以年而異於士哲者乃得長久以欺世予不知其何說也果士哲之不幸邪則於其死士大夫皆惜之而形於言其善盖久存而不冺而彼人者生而人惡之况死邪則士哲之死盖命也不可謂不幸也愚獨悲夫知士哲者三十年而得其相好以相益者無幾今遂已矣予將何恃以自善哉則予之哀傷可知矣故書以為輓詩序送萬主簿序國家用有虞之法以熈庶績而天下之治道盛矣盖凡仕者必以三年上其績於吏部吏部按狀而考察之定其能稱與否然皆俾復職通九年而後黜陟焉其法至備也由是能者益勉於事功中才之士莫不奮激有為不肯碌碌在人後是以治道之盛煥然不可及矣抑嘗觀之舜咨命九官禹皋稷契之流皆聖賢之徒也若四岳十二牧雖不着其名亦必當時之賢俊能舉其職可知矣而何待於懲勸哉然考績黜陟之法不廢者法非為聖賢之徒者設也使人而皆聖賢之徒也則不必懲勸可矣茍或下乎此而有過不及焉則勸懲可廢哉知人安民雖帝堯亦難能之舜盖不能以自必也於是考核而黜陟焉此庶績所以咸熈也聖人之舉豈有過也哉後世命官自公卿至於州縣百司之執事視唐虞所建相什百也豈能皆得才而用之不能皆得才而用之則考績黜陟之法宜如何其嚴也故今之仕於縣者則先考于府若州然後定於布政司又定於按察司而以上於吏部吏部既課其績又設問以試之以觀其中之所存其嚴如是至於九載而黜陟不以貸故人用競勸治道安得不盛乎南昌萬瓛宗義為保定府唐縣主簿予未及識之往往傳其名今年考績來吏部以其未九年俾歸復職刑部主事鍾禄與其叔定州學正景綸為友以予嘗識景綸也介予友太常博士楊希章求一言為贈予故道考績興治如此瓛益勉於其職則他日之陞擢可必矣遂書以贈其行抑菴文後集巻十二
