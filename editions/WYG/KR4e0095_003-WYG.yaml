body:
  text: 抑菴文集巻三明王直撰記世直堂記翰林侍讀周君功叙名其故所居堂曰世直著先徳也周氏世家吉水之磻州以詩禮相承而多以直道自奮不媕婀取容異乎孔子所謂鄙夫者盖君之六世祖伯寛仕宋直寳謨閣厯詆賈似道姦邪且約左史徐麟仲極論之麟仲不應伯寛知事不可為棄官去元至正中脩三史君之曾祖以立由鄉貢進士被薦入館閣上書當以宋為正繞而附載遼金事議論剴切大臣格不用遂拂衣竟歸君之父岐鳳永樂中嘗為漢王府紀善王有奪嫡意作寳賢堂招致匪人與共事紀善作寳賢堂箴以獻思格其非心王怒誣以事必欲寘之重典頼朝廷之明止出為長洲教諭後二十年而王竟以逆亡嗚呼三君之所立者如此非世以直道自奮者歟夫爵䘵者人之所好也茍循其所好而必欲得之非黙以自存則柔屈以取濟安能開口論事無所顧慮哉惟學道之君子言必順理行必由義茍自反而縮則浩然直前以信道為事窮達禍福一不以介意其有功於世道人心豈小補哉若三君子盖是也世之有偶一奮勵困約而不悔者矣及其子孫廼或懲而不敢為若至于累世而猶奮勵不悔今於周氏見之非所謂世濟其羙者歟記曰先祖有羙而不知不明知而不傳不仁今功叙掲以名堂思表著於後世賢矣哉其用心也夫理義之在人心雖百世猶同也周氏子孫其善繼之使後之人有述焉則斯堂也豈不光逺有耀哉功叙求予記故記之怡夀堂記夀出于天人之所同欲也是以孝子之愛其親則必以夀祝之然既夀矣而無以悦焉則雖夀奚樂哉故得親之夀既難而悦親尤難桃源蕭承偉作堂以事親而名之曰怡夀盖能知乎此者也蕭氏居桃源為大家貲產之富豪傑之望吾邑之東南莫先焉予家食時嘗過之見承偉之尊甫徳貫端厚坦夷好禮而尚義有長者之風時承偉尚少最循循謹飭名能守家法服庭訓心甚重之相去二十餘年承偉来北京告予曰生之父母老矣而皆康强無恙生思所以悦之使享其夀於無窮此堂所以名也願先生為之記而因示教焉予曰子之志美矣凡子之所以悦其親使安於夀考者予能言之衣服之輕煖飲食之肥甘凉臺燠館之華使令之人之閑習翫好之物之豐美凡他人之所不能備者子皆能備之是可以為悦矣然非其至也曾子曰孝子之養老也樂其心不違其志孟子曰悦親有道反身不誠不悦於親矣此非子之所宜務哉子之親之志盖願子為君子也君子之孝莫大乎敬身子言必循理行必由義而不至殆且辱焉此之謂敬身反而求之凡言之循理行之由義而無不實焉此之謂誠身如是而奉之以前之所云者則豈徒悦其心將無所不樂矣悦乎内樂乎外心安而體舒氣和而祥應則子之親至于上夀無疑也世之人能養者有矣而忍為非義陷其身於刑辟且以羞辱貽其親賢者之所鄙也亦子之所宜戒也承偉喜曰敬聞命矣生敢不勉遂書以為記而使揭于堂之壁望親樓記歐陽允乾䘮其母王氏孺人𦵏于其居之南羊石渡于今盖廿年矣而其尊甫年九十餘尚康强無恙允乾盡事父之懽而悲母之不見又以其𦵏雖近而限于大江不得朝夕墓下以盡慕戀之私廼作樓于其居之西以望焉風雨霜露之時昏定晨省之隙登樓而望之盖有無窮之感也間過予道其事而求文以為記嗟夫允乾可謂能孝者矣夫君子之于其親生則敬養侍其起居顔色衣服飲食而不忍少違焉及其死而敬享也思其居處笑語志意樂嗜儼然如或見焉如此而可矣允乾猶未足于心而又望其墓墓也者體魄之所蔵者也情扵是為甚矣盖于其始死而復也固望其反諸幽雖未反也然形猶可見也及其殯也形不可見而柩猶可見也既𦵏則無復可見者矣而猶不忍决忘之尚慨焉以待其反也然則終不反矣所可見者墓而已矣孝子之心於是為至隠故予於望親之樓知允乾之心為甚悲者如此雖然孝非止于慕戀而已也孔子曰立身行道揚名于後世以顯父母孝之終也故予願有述焉夫君子之所重者言行而已一舉足而不敢忘父母則違道之行無有也一出言而不敢忘父母則非禮之言無有也言而當理矣行而中道矣則足以貴重其身而顯榮其親豈非孝之大者哉允乾勉之他日尚有紀焉使鄉人有所取則也愛竹堂記吏部主事楊君應春有堂曰愛竹述其所以名堂之意求予為記其言曰吾世家樂温樂温之最勝者曰大城大城之河東有山屹然臨于河者白崖山也山之下土地曠然以饒廼吾先人之居在焉惟先人實有令徳而未享榮名故退居于此其於物無所好而獨好竹故所居必種之今竹日長茂而先人不可見此吾所以愛之而不忍傷也又曰竹之多僅十畝而居在其中其髙下疏宻徑連畛接此吾先人之所經營布置也長夏烈日垂隂滿地綠雲布而蒼烟繞此吾先人之嘗偃息以休也良宵暇日囂塵不驚微風徐来清響互荅若蛟龍之吟鸞鳳之音此吾先人之嘗嘯歌以相和也則吾何能忘情於竹哉又曰堂之名非獨以明吾志將以貽後子孫使不忘前人庶㡬乆存而不壊也先生幸為記之嗟夫此君子之孝也可以書矣其慕于親也深則念于心也篤念于心也篤則施及其所好而不忘夫召伯之甘棠韓起之嘉樹彼偶一寓焉而人猶愛之况乎親之所好哉是以君子之于其親思其居處思其笑語與其志意樂嗜思之至則僾然而有見肅然而有聞今楊君之于斯堂也不徒竹之見盖有以見其親之往来徜徉于此矣宜其甚愛而難忘也雖然愛其所好則當思其所以好凡物以類合者也夫其所以好竹者非以其虛心勁節貫四時傲霜雪而不改故耶其徳盖有如此者矣楊君以才學自奮蔚然有聲于當時其尚以先人之徳加勉哉虚心以窮理端操以臨事則不惟能思親將顯其親于無窮矣故周詩曰紹庭上下陟降厥家楊君以之其曰夙夜敬止者則予所以進楊君之意也楊君勉焉後之人復以其心為心則竹之植于此將久而益盛斯堂之傳于後又豈有窮哉故為之記使寘于堂而以告其後之人焉虚菴記河南僉憲劉君士皆名其蔵脩之室曰虛菴曰吾欲虛吾中庶能有受也来求予為之記予未暇作士皆求之不厭則告之曰虛之能受子既知之矣其亦觀于物乎彭蠡江西之水㑹也春雨時至百川皆溢蔑洲渚冒原隰其勢浩然不可得而禦狂瀾駭浪衝屋發木漂沙決石洶湧泙湃越千百里以至乎其中泊然受之而無餘非以其虚故耶至于海則又有大此者矣盖淮與濟至焉江發岷山亦至焉河之出于崑崙者又至焉其他殊流以達于海者尚多然海固未嘗盈也豈非其虚者大故所受者廣耶若夫天地之間人與物不可數計也而人有聖有賢有善惡文武寛鄙細粗不同物有飛者有走者有仁厚者有搏噬者有猛而難制擾而馴者其類亦不一然並育于其間而不相害大矣哉天地之能容物也使於其中有所窒塞障碍則水失其歸物失其所安能㴠育如是哉人之心亦然天下萬事萬物之理無不具以其虚也是故平居休休然不以物累之事至則兼受廣納因其宜而順應焉及其已也則亦休休而已矣此聖人所以盡其性之全體大用而無愧于天地也下此則随其虛之廣狭而多少受焉若彭蠡之與海也使其心有所累則梏亡是懼安能受耶今子之欲虚以受也其直為彭蠡乎抑將為海乎抑效其大者乎去其所累而充之充之愈至則其受也愈無窮此固君子之志也惟在勉之而已士皆曰諾請書以為記庶朝夕覽之以自勉也廼為之書積菴記予友浙江按察司僉事郭公緒以文學政事稱于時名其蔵脩之所曰積菴盖有進而不已之意焉求予記之予與郭君相好三十年其志盖與予同也則予于積菴其可愛一言乎廼為之言曰君子之學致其廣博固難矣然造其精微之極尤難也盖天下之事自洒掃應對進退作止脩身正家居官臨民君臣父子之重隂陽鬼神之奥萬事萬物之紛糅莫不有理焉精研其義至于入神則知之至矣知既至則循而行之操之堅履之確達其當然之則而盡其所以然之故則行之至矣知之而無所遺行之而無不當則豈徒為士人而已此曾子之精察力行積之之久而悟聖人之一貫者也學之道既如此矣而進必以漸焉盖自近以及逺自流而徂源始于積累之勤而終于從容自得之妙孔子所謂志學以至從心所欲不踰矩者非此之謂乎是以君子貴乎學而積之以不已焉知之既至行之又力則此心之全體大用廓然盡之而無餘而可與天地參矣於乎此豈一日之積哉嘗即天地而觀之自撮土之多以及其廣厚足以載華嶽振河海而萬物無不載也自昭昭之多以及其廣大足以繋日月麗星辰萬物無不覆也故人病不學學焉而累其功亦安所不至哉郭君之學充矣而又進焉則道徳厚積于其身而大發于事業至于享福䘵榮名以光前而裕後亦其效之必至也予不敏誠有望于郭君故為之記以相其志云太平府脩學記國朝混一宇内于安養斯民既盡其方而所以教之尤篤是故學校之設徧天下雖遐陬僻壤莫不有之况於畿内之地哉太平南京畿内郡也洪武初詔天下立學為郡者因宋元之舊稍加脩葺以應詔厯嵗滋多繕治不繼正統五年隴西楊侯士敏由監察御史出為郡始至謁先聖周視學宫惟大成殿明倫堂頗完壯可以久餘皆凛乎欲壓也因歎曰學校教之地也而弊壊若此奚可不治然未暇及之踰年政務脩舉民心協和廼與僚佐議脩學出俸資為倡官屬皆悦從當塗令上虞張嵓請專任其事衣冠之族殷富之家各以輕重来助費用有度勸督有方工善材良並手偕作殿堂瓦甓有破缺者藻繪有漫漶者悉撤新之務堅宻華好更作殿前兩廡㦸門櫺星門講肄之齋㑹食之堂庫庾庖湢皆具焉屋總若干間聖賢塑像章服如制尊嚴粹羙式稱具瞻脩泮池池上為橋甃街道以属之又為外門掲泮宫貳字以表焉規模宏逺有加于昔經始于正統六年某月某日而以正統九年某月某日畢工是年夏經厯劉渙予邑人考績来京師為予道其事而求文為記曰是役也楊侯挈綱維于上張侯任規畫于下故能有成功而諸生得于此講學焉願為之記以示来者俾皆勉于學以毋忘侯之意予觀古昔聖人所以教養斯民者豈有異道哉易其田疇薄其税斂所以養之也父子有親君臣有義夫婦有别長幼有序朋友有信所以教之也我太祖皇帝定鼎金陵於畿内諸郡蠲租稅省力役以厚其生建學立教又首及之明天理厚人倫以正其徳列聖相承皆用此道恩澤之入人也深夫天下之郡不能皆蠲租省役也為長吏者又或不知以興學教人為務然有志之士力于學問以成其徳達其材者不少也今太平之徭税不異于昔而學校又新矣邦人子弟㳺於斯者亦何其幸哉父兄之所教詔師友之所講論當何如用心也仰聖賢之徳容而講其遺訓循五常之性施之五品之倫本于身行于家達于鄉黨州閭使皆興于善由是發為文章措之事業以致君而澤民則無負學校之教與賢守令興作之心若徒飽食佚居以自快而無適于用豈所望于學者哉而亦豈學者自重之道哉故為之記使刻諸石以告焉世徳堂記君子之所以植其家者盖必有本也本既立矣然後能光顯其前而昌大其後理之必然無毫髪爽者昔宋之時晉國王公以直道事太祖太宗寧使其身不進于顯庸而子若孫則為賢相良弼享其福䘵榮名于悠乆三槐之堂至于今稱之此豈偶然者哉盖以徳為之本也今予于工部尚書王公見之公名来字原之慈谿人世以徳義著聞我太祖皇帝即位之初求賢致治天下之士徳足以為用者皆舉而用之于是公之大父彦貞以明經起為國子學正拜盧氏令子尹發舉孝㢘任廣東叅議尹實由經明行脩出為中書舎人衡府長史尹和永樂中以賢舉任金谿知縣尹哲則以文學薦宰石城文行政事皆有譽于時其繼而興者則公也公金谿之子初為御史超拜山西叅政累至都察院右都御史今以平蠻功又陞工部尚書其英才令徳表然為當世名臣先是以舊居之隘也命長子鐸于驄馬橋南改創焉居既完諸子請名其堂公曰吾非先世之徳不及此宜名曰世徳之堂爾子孫其善繼毋怠邑之人則曰橋舊名驄馬以縣人宋桂錫孫為御史名也今王公為都御史祖考皆贈此官實有聖朝之錫命宜改名橋曰都憲橋衆皆謂然遂以名之于是公以書来北京屬予記予聞之蘇子曰國家之興必有世徳之臣共天下之福盖上有仁義之施而下有詩書之澤其所積者逺也王氏自學正至公將百年父子祖孫世濟其羙今公之弟鼎又自御史擢拜江西僉憲福慶之長盖源源未已皆世徳之應也以是名堂不亦宜哉晉范宣子謂其保姓受氏由虞夏商周以来顯榮光大自以為不朽而魯叔孫穆子則謂之世䘵惟立徳立功立言可乆而長存王氏之所立盛矣子孫相繼益篤念不忘則斯堂之名著于乆逺可以世計哉用是書于堂中以勉其為子孫者蘄水縣鄉貢進士題名記國家於郡縣皆立學擇其人之秀者使之學乎其中妙簡師儒以任教事而郡守縣令飭勵焉務有以成其徳達其材藩省每三嵗則興夫賢者能者而試之其得名薦書者謂之鄉貢而升之禮部禮部㑹試而取焉以奏之天子而對揚乎大廷然後謂之進士在其選者盖榮矣今之取士不止于一途而惟重學校尤莫重于進士之科豈非養之厚教之備擇之精故耶然天下之學多矣其人之登名薦書取進士効用扵當時垂裕於後世者已不少其或厯數十年而無一人與于是者豈獨其人之咎哉教之不篤飭勵之不至也蘄水黄州屬邑環其地皆有山惟蘭溪一水繞縣治以達于大江故其風氣完固民俗醇厚恱禮義而好詩書國朝興學以来士之名薦書取進士者未嘗乏然其間有隆有替則係乎師與令之賢與不賢耳正統已未番陽胡侯奎舉自教官来為令既施惠于民而尤加意學校盡其所以飭勵之道而士益知奮相繼以科目顯胡侯又思振起於將来考求前進之士得元劉復心以下至于今若干人盡刻其名于石而立之學宫曰後之覽者必當有所歆動而思繼述于無窮胡侯之心何其至哉夫立學以造士而以科目進之使得位行道士而遇此可謂非常之幸也當夙夜匪懈誦聖賢之微言求其所以善乎已而裕乎人者庶㡬不負朝廷教養之意與胡侯勸勉之心而刻名於此者將繼繼無已而亦永永有耀矣雖然予聞之屈子曰善不由外来名不可以虚作屈子楚之先賢也其言之可法當益信于楚勉盡其實豈非為士者之所當務哉胡侯求予記故為序以告之貴州宣慰使司重脩儒學記國朝受天明命混一海宇其所以教養斯民一用聖人之道故雖荒服之外裔夷之區莫不服詩書循禮義治化之盛盖自唐虞三代以来未之有也貴州去京師萬餘里古荒服之外裔夷之區也徳威所至無思不服太祖皇帝不鄙夷其民既設貴州宣慰使司撫治之又欲使皆復于善詔立學以教焉由是貴州始有學盖洪武二十六年也學在貴州城之東北隅有明倫之堂堂前闢四齋以為講藝之所而未有廟洪武三十五年貴州都指揮金鎮湯清始為大成殿翼以兩廡奉聖人像于其中羣賢陪位以次序列春秋嚴祀行禮有所繚以周垣前為櫺星門規模備矣然兩廡猶草創永樂十六年太宗皇帝綏靖諸夷郡縣其地置布政司于貴州以統之又設按察司以糾夫治教之不如令者布政使蔣廷瓉周視廟中歎兩廡弗稱廼取材新作焉厯二十餘年凡三繕治而後廟中始完羙如制今又二十六年矣其櫺星門日就頽仆廟中殿址亦有塌然圮壊者藩憲大臣皆有意脩治適監察御史溧陽楊君剛廵按来貴州謁廟之日慨然興歎屬按察副使濟寧李君睿為之圗扵是按察使莆田林君某副使束鹿朱君理僉事番陽屈君伸戴君誠布政使永春易君節參政錢塘嚴君恭叅議嘉禾汪君泳淮陽顧君理皆出俸金以舉事而都指揮張侯鋭洛侯宣侯君義張侯仁張侯景宣慰使宋侯斌各以資力来助乃伐木命工重造櫺星門地之圯壊悉以方石砌之凡盖瓦級磚有破缺者藻繪有漫漶黟黒者皆整飭華好又建尊經閣于明倫堂後以蔵朝廷所賜五經大全諸書作石塔二于堂前倣唐進士題名鴈塔之義有自科目進身者則題姓字于此示激勸也作二石柱于櫺星門内泮池上以為之表經始于某年某月某日而以某年某月某日訖工向之弊者皆易而為新昔所未有者皆有焉髙明壯偉他學莫之先也嗟夫學校教之地也其所以為教者因人固有之善而明之自夫倫誼之大以至日用事物之常使必循其道而皆有得焉由是發而為文辭推而為事業然後教學之功成貴州之入職方乆矣朝廷教養其民一切不異扵中州今諸君又大新廟學諸生之㳺于斯者仰聖賢之徳容而興其嚮慕之心誦經傳之微言而致其學問之力朝夕不懈以迄于成功則庶㡬不負乎此若徒飽食逸居而已斯不有愧于心哉屈君来京師求予記故為記之以告學者公勤堂記前年朝廷有事于麓川詔擇廷臣之賢者俾叅賛軍事予友楊寧彦謐以刑部主事往焉既還上嘉其公且勤特陞刑部郎中彦謐既拜命間来告予曰公勤臣職所當務也寧惴惴恐未至奚敢辱天子寵命而褒恤之如此寧將何以為報哉亦勉于是而已茲用掲于所居之堂上庶朝夕見之而致力焉願先生記之予謂公者私之對勤者怠之反也私欲勝則天理微怠心生則事功廢唐虞君臣猶以忘私為羙怠荒為戒則其當務可知矣自是以来君之賢者必以此望其臣而賢臣亦必以此事其君上下之志同而治道盛矣由是論之大公之道行而無怠惰荒寧之失以成天下之治者豈非明良相遇之效耶然而有上好之而下不之從下勉之而上不之知者此君子所以慨歎于難遇也今天子以無私無逸率羣臣而彦謐果以公勤荷優奬上好之而下從之下勉之而上知之誠可謂非常之遇矣夫有非常之遇則必有非常之報宜彦謐以之名堂而欲加勉也天下之事無窮而皆此心應之心或蔽於私則所處有不公於其當為者亦或怠緩而莫之行是故君子存天理以應萬事既有克治之功而加以不怠然後徳崇而業廣乍明而忽蔽勤始而怠終者常人之情君子不貴也彦謐之所立偉矣天子明見萬里外拔扵衆而進之予前所謂非常之遇不誣也今益勵夫公與勤以圖非常之報此君子之所為豈以常人自處哉故為之記以相其志云心逺亭記中書舎人許君鳴鶴世家吉水縣之南舊嘗有亭以覽山川之勝許君未仕時日與族人賔客處于斯而尋其先人之所樂凡百里之内清川秀嶺沃壤長林人物之繁茂風景之竒勝一舉目而盡得之盖囂然樂也及被薦入翰林官中書典天子之綸命承雨露之潤依日月之光許君朝入在公與同列者盡心于所事以圖報知遇及暮而歸接人事之紛擾厭塵俗之喧囂其心盖未嘗忘斯亭也右春坊右庶子鄒先生因名之曰心逺亭盖云許君仕于此而寓意于彼焉耳或者曰許君既仕於時而猶有鄉邑之思其亦異乎魏牟之心矣予曰不然君子之仕以脩職為貴許君以文翰之精居禁宻之地祗慎不懈誠無負於所任進而盡力于朝退而寓意于鄉亦奚足過哉彼受其職怠其事溺志于富貴而僕僕扵達者之門以效諛規利雖無遐心其視許君何如也且仕者固有進退之節壯而仕老而歸理之常也而可忘先人之舊哉許君任職㡬年有足疾不能朝更數醫未愈乃以聞天子憐之俾歸治於鄉或者又曰許君之仕也且以心逺名其亭今之歸其心誠逺矣抑將遂忘情于此乎許君聞之曰不然君臣之義吾固知之矣昔之所謂心逺者有所寓也豈溺于此而忘君哉且吾之所以榮其親寧其身而異于賤與貧者皆受賜于君今不幸有疾不得祗事焉此吾情之欝而不伸者而敢忘君臣之大倫哉所謂魏牟吾盖其人也嗚呼許君其可謂賢也乎夫君子之志豈一端而已夫固各有當也仕而志于鄉不忘乎親仁也歸而志于朝不忘乎君義也君子亦仁義而已然則許君其克盡君子之道矣許君既歸將復處于斯亭予懼夫人疑其所以名亭者故書其説以為記使掲諸亭上張氏半村居記距㑹稽城東北十五里曰余貴鄉張氏友讓世居焉友讓之先本合肥人有諱岳者為宋名將從髙宗南渡始家于此鄉本名永樂以其舊有張姓也故析名余貴以别之至友讓十世矣二族之子孫各食其土之半且雖處田野而實邇于城邑故友讓之居遂以半村名焉及用才舉至京師而予亦以内艱服闋同謁選吏部始與定交而徴記于予予謂古者制民之産一夫受田百畝其五畝之宅則半在田耕植居之其半在邑以休暇居焉其所務者飲食衣服之源孝弟忠信之道而已非有外事也故能全天性之良成風俗之厚自斯民之業分而力穡務本者始專居于鄉禮樂有未脩而惇朴加焉故其弊至于野冠盖縉紳之流則多處于城邑然而襍以浮薄之徒迂誕之士散淳古之風而華飾盛焉故其弊過于文士君子往往病之思欲制其中有不可得也夫城邑田野地非有異也而其弊如此非以其積累故耶然則君子欲存其質而兼羙其文者固自有所處哉故予於友讓之居而有以知其先人之志矣夫既安於田野稼穡之勤而又邇城邑𢎞達之觀使其子孫閉户而隠處則土地之腴足以自養而存其質厚之性開門而出㳺則衣冠之賢足以自益而成其文物之羙盖庶㡬古之道也其慮豈不逺且周乎則為之子孫者皆文質彬彬焉有君子之譽而無其弊斯可無愧于其先友讓荘而文介而不迂其所以名其居者盖欲存其質而不過于文者也盖張氏子孫之賢而無愧焉者也予故明其志以為之記如此若以其族之蕃恒産之富擅其半村者為羙則夸者之云而非君子之道也友讓之子孫尚勉哉永思堂記予舅氏拙存蕭先生既没有遺言訓其子使兄必友弟必恭處宗族鄉黨必以仁與人交必以禮教子弟必以孝弟忠信臨財必以義治家必儉以勤奉公事必敏以慎子成徳魯徳孚徳皆奉命唯謹既又相與泣曰吾父之所以教我者皆君子之道當終身念之不忘于是名其堂曰永思將朝夕覽之以自警也使来徴記于予予謂士之于親生則法其行沒則思其言言順而行從斯可為孝矣記曰思其笑語思其志意則肅然如見乎位慨然如聞其聲此猗那之所謂思成者也夫親之所告語者皆其志意之所存也思念之不忘精誠之不二則耳目之間盖凛乎親之在也豈敢須㬰悖其教哉不悖其言不堕其行士之為孝豈有過于此者宜成徳兄弟之惓惓也嗟乎人莫非父子也宜其情皆同也然有授簡而忽焉忘之者何遺訓之能思哉此其為孝可知矣則予於永思之堂安得不深嘉其意乎雖然思生于心也心或蔽於私則其孝思亦變而不能常於是有善於始而惡於終者故欲永其思而不變亦明其心而無蔽焉斯可矣且嘗聞之古之所謂一鄉之善士其行必有以貴于一鄉孝者百行之首也成徳兄弟思先人之訓以脩于身行于家而施于外期于乆而不變則其行庶可貴矣非所謂一鄉之善士者乎有同然之心而行或未然者必當有所感發興起善其鄉俗而羙其人才将在於此矣詩曰永言孝思孝思維則故予為之記以勉其成也榮夀堂記榮夀堂者廬陵劉公子政所居之堂也公之子孟鐸為北京行部吏曹主事以清慎篤厚見稱朝廷褒嘉任職之臣而推本于父母因以其子之官榮之于是公亦封為吏曺主事配戴氏封安人錫以勑命時公年七十五安人亦七十一矣縉紳士大夫喜公之夀考光榮如此遂名公之堂曰榮夀之堂既而孟鐸將請告歸省遂以記屬予予謂榮者得于君也夀者得于天也得于天者固不可必得于君者亦豈偶然之故哉凡為人子孰不以是願其親然能兼遂者盖鮮也是故老于山林者有耄期之夀矣而不與乎子之榮顯于朝列者有軒冕之榮矣而不迨乎親之夀雖所遇之時不同然人事之變更不幸而不能待亦有足嘅者今聖明之時以仁逮下誠所謂不世之遇矣然吾郡之仕于朝者數十人其親之夀考光榮如公者纔一二以劉氏論之其居金竹盖數百年讀書而仕者世不乏然及親之夀而榮者則惟公以一郡仕者之多一家傳世之乆而皆有不待之嘆其榮且夀僅于公見之則公之福豈不備且厚耶大夫君子以是名公之堂而為公喜幸盖宜矣雖然人之所以致此者有由然也孟子曰仁則榮孔子曰仁者夀謂之仁盖純乎天理而無私欲之謂也自人倫日用之大至於食息動作之微皆當理而無私所謂脩天爵者也是所謂居安宅者也脩天爵斯足以致人爵之貴夫安得不榮居安宅斯足以免人欲之危夫安得不夀由是論之若公者其殆以是歟嘗聞公篤於孝敬不忝其先人而教子必以道睦扵族婣恵于鄉黨里閭其行如此則今之夀考光榮寧不真以是哉登斯堂者可以知公之仁矣於戱仁非一人之所有也茍欲如公其亦勉於仁而已人事之不齊固不可逆論也予與孟鐸同年取進士又同官京師且乆㝡相知故不辭而為之記且以為世勸也蕭氏重脩讀書堂記讀書堂者永和蕭氏之堂也蕭氏自宋以儒醫著名迨今同志君而猶盛君之逺祖子信深于其道忠簡胡公敬禮之遺之金與田皆不受將奏請官之亦辭公問其所欲曰願吾之子孫皆能讀書守先業以恵利斯人足矣他無所欲也公乃為書讀書堂三字俾掲以示子孫堂乆而敝君之祖徳祥嘗新之及君又敝君又新之盖永樂甲申十一月也今年以書来北京求予為記予舅氏歐陽先生家永和予嘗從受學因得謁君于堂上而君之子原豫則予舅氏壻也予安得辭夫醫者仁術也天生斯民囿扵六氣之中不能使必遂其生聖人者出為之醫藥以濟其夭死所以成天地之仁也儒者之道莫大于為仁博施濟衆仁之發也茍一物不得其所則仁有未至此以天地之心為心也故為醫術不可以不讀儒書而通于儒道然後能深于醫所施者博所濟者衆矣如是斯無愧于其道而亦為無愧于天則夫以讀書名堂者其意盖深逺矣自宋南渡以来盖三百年其中富貴尊榮者何限豐堂廣宇或不能終其身或一再傳而遂失之者多矣蕭氏之堂乆而敝敝而更新至于十數世子孫猶得聚于此推明其道以恵利乎人衣冠之盛不改舊觀此讀書之功為仁之效也然則子信之志忠簡之署所以開蕭氏善慶之源而流衍于無窮也歟同志君忠厚清慎原豫亦端重坦亮其他子弟多能勉於學予知讀書之堂洒掃有繼矣故為之記梁氏雙玉圖記梁氏與予家世有連而用之先生以文學行誼有名當世其在翰林時予從之㳺㝡相愛永樂丁酉先生之子叔䝉􅅩車以明經領鄉薦今少傅楊公竒之遺以墨竹二竿題詩其上曰梁家雙玉碧參差盖以况二子也名曰雙玉圖其後二子乃因循不果出然世之知者終以逺大期之今􅅩䝉舉賢良方正叔車取進士在京師士大夫皆為之喜曰梁先生有子也中書舎人夏仲昭又為作雙玉之圖既而􅅩䝉得邵武經厯當之官乃属予記其事夫竹植物也而君子愛之非以其質清其性直其中虛其節勁故耶清虚勁直君子之皎然而自潔寛然而有容强毅不回是非不茍者似之其愛竹者乃所以勵徳也則雙玉之贈豈無其意哉叔䝉兄弟當入仕之初其于脩徳不可有間也謙虚以受善則日進堅確以持志則不渝不以汙濁害其清不以詭随廢其直則徳立矣徳立則為君子孰禦哉昔者衛武公篤于自脩衛人作詩羙之皆以竹起興淇澳三章自始生至極盛喻其脩飾以至于徳之全此非叔䝉兄弟之所當法歟武公年過九十猶亹亹不倦今去武公尚逺也則進徳之功當何如其自勵哉􅅩䝉兄弟勉脩其徳至如圭如璧則無愧于雙玉之名而亦無愧于武公矣世人謂畫為無聲之詩叔䝉朝夕觀之是亦淇澳之類也予素有望於叔䝉故為之記如此貞榮堂記貞榮堂者翰林編脩安成吴節與儉奉母之堂也堂而命之名者何所以著母徳也名之而謂貞榮者何貞者其徳榮者徳之效也盖與儉之父觀凱早卒而與儉尚幼母王誓不更嫁躬勤苦以教育之學成􅂑進士入翰林遂以才行名當世天子推本于父母之賢贈觀凱君為編脩封王為太孺人與儉傷父之不待而幸太孺人之存也迎来北京以其祿敬養焉士大夫榮之謂此貞節之應于是􅂑以名其堂夫貞者知正而固守之之謂也婦之從夫惟一而已此其正也要在固守而不易不易即所以為恒周公于恒之六五繋之曰恒其徳貞婦人吉孔子則曰婦人貞吉從一而終也其意可知矣教道不眀世之為婦者不幸而寡居往往興淇梁之思而忘髧髦之儀恣人欲滅天理斁人倫其去禽獸奚逺哉若太孺人之賢守節自誓終老不渝保其遺孤使卓然有以自立仰不愧于天而亦無愧于其夫是宜受褒封之榮而享祿養之厚也松栢生于髙原其始也或軋于土石困于牛羊或為雪霜風雨之所凌冒惟其有堅貞之性卒不為所移故能大百圍髙千尺厯乆而常存太孺人之所立如此則其受福當乆而益盛可知矣王氏廬陵故家世以詩書顯聞太孺人徳性之羙雖本于天而教于家者又足以成之彼其得于天而不能成于人固未有盡善者况兩失之者乎家人之彖曰利女貞女徳之貞非止一身之羙盖一家之福繋焉然則為人父母而欲成其女子之賢使之宜其家可不素教而豫養之哉與儉以堂記屬予故因太孺人之善而為衆人道之亦欲以示勸也奉先祠記祠堂之制非古也盖古者諸侯卿大夫皆有廟庶人無廟則祭于寢禮也後世廟非賜不得立而有祿者之子孫不得以伸其尊祖敬宗之心于是有祠堂之制焉然不能大于寢與廟也盖足以棲神而不足以奠物行禮故祭則遷主于寢祭畢而復返于祠堂祠堂之制雖非古而人猶得以盡心焉然能為之者亦鮮矣泰和南溪蕭鵬漢既治居室于武陵橋又作奉先之祠于其居之東南凡四楹其髙若干尺深若干尺廣若干尺中為四室以奉其祖考而四時行事焉盖其家嘗貴富矣故其為此不難也既成求予記㑹予將赴京師不果為而鵬漢求之不厭廼記曰君子之于其親生則敬養死則敬享又推及其祖之所自出此所謂追逺之道孔子曰祭之以禮盖祭不以禮則為不敬其親然古禮之廢乆矣近世子朱子斟酌其儀而士大夫家通行之此鵬漢之所以盡其心也雖然薦奠拜跪者其文也而誠其本也君子唯誠而已矣是故思其居處笑語志意樂嗜于將祭之時則若接其容貌音聲于致祭之頃此商詩所謂思成者也盖惟誠敬然後能攝其精神以交乎祖考不然則祠堂雖具又焉足為孝乎今鵬漢所以奉其先者誠矣使為之子孫者克篤其心則其祖宗所以敷遺之者豈有窮哉予于蕭氏􅆟故故為記如此祠成之日則以永樂戊戌某月某日也慈相寺記慈相寺在湖州徳清縣玉塵山之左晉初寺未建咸和間有梵僧過其地指山石曰其中有泉于是曇法師結菴居之鑿石罅如半月果得泉清凉甘香冬夏若一而其深不可窮乃名泉曰靈泉菴曰石壁厯隋稍廢至唐得居簡師而復興建閣泉上曰靈泉閣元和中易菴名曰石壁院宋康定中邑人沈當為尚書建佛殿以薦其母殿至今尚存治平二年始改賜額曰慈相寺因名寺前之山曰奉國跨澗橋曰野橋慶元五年靈泉閣燬于火嘉定間重建初寺之堂宇相比如魚鱗其方丈名觀心髙宗嘗題其榜他之有名署者以十數經乆多廢蘇文忠公守湖時常與陳師錫焦千之秦太虛輩往㳺焉南渡以来諸名公多居于此東莱吕成公亦嘗讀書其中舊皆有題詠今鮮存者亦以乆故也然其徒相繼各務樹立以大其宗門洪武丁夘僧㑹好古鑄鐘三千觔以警朝夕崇教事道寧師尤篤于其道精勤不懈修治浄域樹羙章由是境以人勝嵗辛未清理釋教慈相遂蔚為叢林明年建法堂己卯建鐘樓永樂已亥僧證中建月泉亭宣徳已酉僧㑹智中更作佛殿山門兩廡庫堂棲室煥然一新土木采章極其華羙寧師早從天竺印海實法師具得宗㫖嘗主其邑之仙壇慧通皆有所建立正統初歸慈相至是杭之集慶復禮師為之主師當往集慶念慈相之開創千餘年雖或中微然今猶不失舊觀其興復之勞不可不書以示乆逺乃具始末因南京國子助教朱瓚属予子博士䆅以書来請記予謂佛之法盛矣其意亦欲使人趨于善故寺宇徧天下而人多嚮往焉雖其説足以動人而為之徒者亦多有博達之才强忍奮勵之志故能昌其教而莫之禦夫安得不乆且盛哉寧師號謐菴嚴于事佛謹于齊衆而又讀儒書工吟咏予以是重之而為之記以示後之人俾善繼之永勿壊法海禪寺記西山自太行恒岳而来皆危巒叠嶂雄拔秀整盖天造地設以開北京㑹同之都由都城望之若負扆然山之中多平岡曲阜沃壤奥區真學佛者所宜處盖天下勝處也御用監太監李公童自以遭遇盛時致身榮顯聖徳之隆譬諸天地思崇建精藍歸誠諸佛以圖報萬一而未得竒勝心切念之一夕夢㳺山中岩壑深䆳林木茂羙有白衣老人指示曰此精藍地也他無以過此者覺而異之廼圖厥状俾善相者往求焉至玉河響水峪徘徊顧瞻適與圖似問之其人盖龍泉古刹舊址也歸而告于公公喜曰吾營佛寺用其法以報上恩而神人能輔吾志吉莫大焉廼闢士壤理榛棘考方位之正審面勢之宜盡捐已資市衆材聚諸良工並手偕作好善之士願以財力来助者亦不辭求可以任開創之事者得福夀師相與協心同力課役程功先作正殿藥師殿天王殿次之翼以鐘鼓二樓伽藍祖師二堂又次之方丈僧房廊廡厨庫諸屋次第皆成環以脩垣髙厚式稱前唘三門開廣途以通来者經始于正統四年閏二月二十日而以某年某月某日訖工刻雕藻繪像設有嚴香華器物凡寺之所宜有者靡不畢具事聞勑賜名法海禪寺公既以誠告諸佛而俾師日率其徒闡揚教典祝聖夀于萬年有生諸物咸享太平之福于悠乆師號南山僧錄司右善世雪峯淵公法嗣也守道勵行精勤不懈既克如公之志而四方學徒之来㳺者日益衆蔚然京師名刹也師既喜寺之成又欲其永逺而不壊廼具興作之由来求文為記予謂天下之物有成必有壊惟善足以隂佑斯人而人信向之然後不壊而以永長存佛氏之教然也李公之為此以祝釐于上而徼恵于下其志甚篤而其心甚誠是以一念之感而神靈為發其秘又得師之專確以相成之故為此不難也後之居此者體今日之心相繼出力以維持之其乆而不壊可必矣故為之記以示後之人而使刻之石棲真道院脩造記棲真道院在泰和縣五十一都上保山壦之東莱山其初無碑碣可考中有殿祀祖師浮丘王郭三真君像嵗乆漫漶勿治正統戊午道士陳用柔脩飾之于師腹内得書備述開創之由盖元泰定乙丑縣北門曾起濵别號雷淵以儒業来授徒又精通道法數為人禱禳嵗大旱逺近祈雨皆不應禾悉就槁曾公乃建壇致禱閉縱隂陽驅役鬼神雷奔電激飈駭雲合随所號召無不如意三日雨大澍境内陂池皆充滿是嵗大熟一鄉之人皆篤信而尊禮之曽公亦自念神靈于已若有深契然者遂捨家絶俗専攻道術往謁龍虎山請于三十九代天師張公得分授棲真化香火而歸于是方溪里人蕭熈舜請于父捨東岡嶺地基一所為道院又捨嚴家地背上水田一石凡十三丘以食之至順癸酉山壦橋菴彭道人請共作二教法堂曾公乃徙居橋菴其地以法堂中心為界東属道院乃池下蕭春池之土西属橋菴乃桐井蕭宅之業而于堂背嶺上築華盖斗壇専為民祈豐稔而曽公之道益大行曾公化去其徒劉道元復以其法顯而橋菴當永新安福道元季冦亂數被擾道元之徒劉開宗謀避之以社溪劉一中有地在嶺背幽雅閒曠誠學道者所宜處乃往請焉一中已卒妻蕭氏與子觀復割畀之又捨山壦社邉水田八斗以食焉開宗與徒陳克成遂徙居此洪武己未冬也書之所載如是厯七十餘年殿宇復壊永樂丙申用柔師祖陳紹先師父劉青霄化緣諸善信出資財撤前殿大門而新之又三十年紹先老青霄亦化去用柔適主院事其為人淳實不汲汲外騖惟以利濟為心人有以水旱疾疫禱祈諸事求之必至誠盡敬亦多獲竒驗故無不愛重之者由是棲真浸盛而後殿又壊予子稹嘗有事属用柔乃出貲市材為改作其兄秬弟秱姪仁亦助之用柔規畫布置命徒蕭真元胡和元協力治其事以正統丙寅十一月某日興作丁卯正月初六日成復以舊殿材為屋聮接乎殿東用柔與師弟謝用成别營居室附于其旁者亦次第皆成予陳氏壻嘉用柔之行而用柔亦特厚予前年省視来京師相與處者乆之因語予曰道院之建三易所今一百二十七年鄉之善信割地捨田崇殖之意厚矣先師雷淵及諸嗣師經營締構之力亦勤矣吾儕安處于此而闡其教事豈可忘所自哉兹殿宇一新若無文字備載其事實使後之人得以考見而思維持于永乆非缺典歟敢請于先生予嘉其能光大乎前而又欲振勵乎後不可以不書故為書之凡捐貲産為助者則具載名氏于碑隂寧夏豫備倉儲記寧夏西陲重鎮負山而阻河外制逺𦍑内固闗隴古所謂用武之地也國朝既設寧夏五衛及靈州千户所又發内地官軍數萬騎訓練以重威且命太監来公作鎮于此而都督史公某佩征西將軍印總是師都􅇂丁公某為叅將又命都察院右僉都御史金公濂賛理其軍事諸公負文武之才秉忠愛之心政令肅然小大和洽邉塵不驚烽火㡬息而安内攘外之功立矣皇上至仁如天逺邇一視謂四方雖無虞而捄災恤患不可以無備乃詔中外擇賢臣發府庫之財以益倉廪之粟俾或遇凶嵗貧者可以不飢而軍民中有能出粟以佐官者當旌其義復其家寧夏之儲則專以委金公金公既受命夙夜圖議以求稱上意而来公史公丁公又皆與之協同力一心慎選寧夏諸衛指揮而下㢘公有為者得王輔等㡬人分理其事以陕西都指揮同知張泰董之按察僉事許資涖焉伐材為倉屋二十六所出官府貨貲糴糧貯其中金公又申天子恤下之仁與旌義之令誕告于有衆于是諸衛所之士及王府之屬與其地之富民茅貴等皆感激奮起曰吾儕生于斯長于斯而遭遇聖明四夷賔貢無戰伐之勞暴徴横賦之擾得安居樂業而有餘積者皆上之賜也今聖心惓惓以養人為務慮有水旱之灾而豫為之防唐堯殷湯之徳不過也其可以負哉即發所有輸之官俾自為斂散共得粮六萬六千八百三十石有竒又督寧夏河渠提舉司脩治漢唐諸渠及諸􅄵口以溉田木以根計草以束計總之為數一百七十七萬六千四百六十九既成而右僉都御史盧公睿適来又為之規畫處置而功益大備盖始于正統五年十月至次年三月竣事于是寧夏之人有當仰給於官者皆大喜曰上之愛我至矣雖遇荒歉吾不以飢死必矣金公既還朝間與予道其事曰往年西陲有不足朝廷轉内郡之粟以給之道途險逺運者率費十而致一今茅貴等所輸以饋運計之其省費可知矣濂何能得此於人哉由上篤于仁有以唘其好義之心焉耳既䝉旌褒給復矣然非託之金石則何以示乆逺勸將来先生為我記之俾刻焉予謂上之仁諸公之恵與茅貴等之義皆不可不書若河渠之脩所以厚本而興利亦宜牽聮書之俾後之人知今之勞心殫力如此而思善繼永勿壊故不辭而為書之若其人之姓名與其所輸之數及倉之所在則具載于碑隂抑菴文集巻三
