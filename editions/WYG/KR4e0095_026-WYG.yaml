body:
  text: 抑菴文後集巻十三明王直撰序北京郷試小録序國朝設科取士以興文明之治至于今久矣其待士也厚士亦得以行其志遭遇之盛何其幸哉今宣德元年寔當賔興之嵗北京行部尚書臣友直侍郎臣昶恭循故事合太學及圻内之士試之而以考試官為請皇帝命臣直臣鈺其同考則山東按察僉事臣順漢陽府同知臣文奎建安縣學教諭臣夀夫漢陰縣學教諭臣萼其監試則監察御史臣鼎臣時暨諸執事皆遴選也時就試者九百餘人拔其尤者五十人而進之初科舉解額未定也仁宗皇帝在位時思盡得真才實學之士而用之以為所取者多則所擇或未審於是定解額俾慎擇焉今皇帝聖明恪遵先志其所以待士者加厚矣盖譬諸良金美玉求之愈嚴則所得益精所得益精則人視之益重視之益重則其用於世也益相惜於無窮其所遭遇豈非尤幸也哉然則登名於此者可不思所以稱上意乎古之為士者皆曰幼學壯行盖以聖人之道脩諸身必將見諸行事豈徒語言文字而已哉以語言文字為足以盡為士之道盖末矣亦非朝廷所以慎擇之意也由是而進㑹試于禮部奉對于大廷以發舒其素藴而施於用隨所遇而必盡其道焉使人皆曰科舉真足以得士則庶幾報稱萬一也尚慎勉哉小録鋟成故書此以為序贈曾侍讀歸省序國家著省親之令以待仕者前代之所無也夫委身於國而不顧其親為臣之義當然矣然子之於父母乃天理人情所宜厚者而豈可廢哉在乎上之人有以處之耳使為忠為孝得以兼全而無害則善之尤者也知出乎此豈非仁之至義之盡與四牡之五章勞使臣之詩也嘉其勤於王事而不暇顧私親反復詠歎至於卒章乃言將母來諗盖探其情而設言之非真有是事而猶足以感人心是詩乃武王以後所作成康之際治道可謂盛矣而所以待仕者如此及乎後世祈父北山之詩作而怨刺興則所謂仁義之道盖亦微矣此世之所以降也故予嘗論夫仕者皆欲為忠與孝而莫大於逢時其有得於此不得於彼或遂兩失之者皆時使之然矣則今之著令凡仕者得以次省其親盖可謂兩得之也聖明恩德逮乎下誠非前代之所能及所謂如天之仁也仕者之遭遇盖莫大之幸其所以感乎心者當不尤甚矣哉吾邑曾君鶴齡以明經取進士第一遂入翰林為脩譔滿九年陞侍讀其文行卓著久矣朝廷既封贈其親而母安人在堂年八十餘尚康彊無恙曾君日夜念之不置㑹有省親之令而縻於職務不得行今年稍間乃得告而歸邑之仕者刑部郎中獨孤樂善等謂予宜贈以言嗟夫曾君讀聖人之書逢極盛之時其所䝉恩乃前代之所未有則曾君之感激圖報當復以尋常之為臣者自處乎不以尋常之為臣者自處則孜孜矻矻盡心於職務當何如其至茍徇乎私而久淹於外忘其所當務者予未見其可也曾君明慎其不如是審矣而予尤厚於君而欲其無媿古人故歴道其然以為贈行序贈陳訓導序陳永德清予故人一敬子也一敬有文學議論達於為政仕止於縣丞不及大用以卒德清能自刻勵初受業於從兄翰林侍講學士德遵後從郷先生梁叔莊受詩經駸駸有造詣遂以名聞於人去年常州府學缺訓導以幣走其門請德清德清至京師諸大臣群試于禁中在優等既授職而去予邑之仕者刑部郎中獨孤樂善等屬予贈以言嗟夫予好古而迂者也其以言贈人屢矣而多不見用然考其人之所行盖鮮有不悖於古者因竊自歎豈古之道為不足用歟抑迂者之言固人所厭聞也予用是悔其言今德清之去復何取於迂者之言哉然德清為教官將以古道教人若予之言庶幾可無忤矣試復與言之夫所謂古之道者非他也孔子孟子所云之道也其目則仁義禮智而施之君臣父子夫婦長幼朋友之間三代之學皆以明此而已師之所教弟子之所學舍是無以為道矣昔者嘗聞之孟子曰大匠誨人以規矩學者亦必以規矩盖為方員之法在是也規矩極乎方員而後能成物師者所以成賢才之本也師不能體是道而行之而欲學者之中乎道譬之壞規折矩而欲物之方員自合乎程度其可得耶今之為師者多矣言行必以道者誠少也身不由道則為之弟子者將何所取法賢才之不成職此之由也嗚呼可勝歎哉德清恭讓和厚以禮法自持盖能謹於道者今之去益篤於是而已矣朝夕相與誦聖賢之言講明而佩服之言必由是行必由是則賢才之成足以為邦家之光而不負乎興學圖治之意矣德清勉之今常州教授余先生學奭德清外兄也試以予言質焉當必有相發者若復以為迂則予之悔於言也滋甚矣贈劉用寛序用寛廬陵曲塘故家其尊府士英號忠厚長者縣大夫推擇長其郷粮賦今年用寛以父命告足來北京予舅氏歐陽先生為文贈之取蠱之初六以明用寛為賢子及其畢事而歸復徴言於予予辭不獲試舉蠱之成卦為用寛誦焉夫蠱合艮巽二體風薄山下振蕩萬物故為壞而有事之象初六以柔在下為子能幹父之蠱子能幹父之蠱則為有子而考得無咎然必惕勵乃可終吉九二雖剛中而所應者柔當巽順行事故戒以不可貞九三過剛不中故必有悔六四過於陰柔乃優游以治蠱者蠱將日深而羞吝及之六五柔而得中且應九二剛明之才故治蠱而有譽至於上九則超然於事之外者也故曰髙尚其事以今觀之超然於事之外者其士英甫之謂乎用寛兄弟皆所謂治蠱者也世之人有子以治蠱者多矣然不知戒謹而終㓙者有焉堅强矯拂而害於事者有焉過於剛柔而取悔吝者又有焉其能致譽者盖少也用寛兄弟之治蠱果何所用心哉三過乎剛四過乎柔皆不足用也初六固善矣然保終吉為甚難合二五之德以剛柔相濟則事治而譽隆此用寛兄弟所宜用心也如是則誠可謂賢子而士英甫亦誠可以超然無累矣雖然不止此也大象有之曰山下有風蠱君子以振民育德謂當有事之際莫大於振濟斯民而養育已德然能惠民乃所以養德也今之豪傑往往幸民之有事以肆漁取不竭不饜昔賢所謂相時射利遑恤厥德者欲免於㓙難矣此尤用寛兄弟所宜用心也如是則豈獨為賢子人將謂子君子矣用寛兄用宏清雅而好學予知之久矣而用寛亦不異其兄盖可與言此者故相與言焉其果有取於斯也夫贈曾生歸泰和序曾生名庠予故人椿齡之子今翰林脩譔鶴齡之姪也椿齡舉進士為翰林庶吉士以卒鶴齡撫而教之去年來省侍於北京因留卒業焉今將歸請予一言為贈盖予自弱冠與椿齡相交其器質端重而學問深博與人處必相切以道其益予也多矣不幸而早失之今見生偉然不異其父而進學方未巳予既愛之則於其行可無一言相益耶曾氏世儒家自宋以來固多賢者予聞而知之若生之祖父則見而知之彼誠無愧於前人者也夫人之立身固難然為賢者之子孫則尤難何也閭巷之人卒然立於衆人之中茍有一言一行之幾於道君子取之曰彼固難能也若賢者之子孫則不如是觀也言可采矣則必考其行行可觀矣則又復其言有一不至則曰彼賢者之子孫而若是不亦忝且愧乎此其相愛也厚矣盖春秋責備之意也是以為賢者之子孫必孝於親友於兄弟仁於宗族信於朋友睦於郷䣊姻戚毋恃氣毋矜能毋沉湎于酒毋貪黷于貨言出而身踐之必不違於理焉使人皆曰此誠賢者之子孫則善矣此予之所望於生也且君子之仕皆將砥名礪行以不辱其先而仕者之家能體之者甚少也故每以為累生之父叔為時名人其所以砥名礪行以不辱其先者尤切切焉生慎體之他之為妄子弟者非生之所宜效也予告生者止於此矣生歸見予諸子亦以予言諗之作詩贈生者凡八首皆繫于下方云榮恩堂詩序榮恩堂詩若干首士大夫為大理評事上官民望作也民望家建昌始遊郷校業成陞太學遂擢官大理兄某領辛卯郷貢為興化教授而二親皆在堂康寧夀考食其子之禄朝廷以民望之稱任也推本於父母之教封其父評事母為孺人賜之勅命郷人榮之名其堂曰榮恩之堂今年民望得告歸省求士大夫歌詠之而請予序予謂詩者感於物而形於言者也周詩三百篇美刺俱見作於千載之上而形是非於千載之下至今讀其詩則知當時人事之得失王化之盛衰而是非之公不可冺後有作者亦如是矣故曰詩可以觀民望父母兄弟受恩者凡四人衣冠文物盖可謂盛矣世之人孰無父母兄弟哉其受恩之多若此者未必有也借曰有之其能懽然偕樂於一堂者誠不多也然則上官氏之榮可知矣故雖以名堂而歌咏之亦豈過哉後之人讀是詩豈徒有以見其家之福而朝廷之盛恩澤之隆亦於此而見將必有低佪歎羡於無窮者詩之所系豈細也哉抑聞之詩曰無言不酬無德不報言受施之必宜報也故古之義烈有感人一飯而委身以圖報者今上官氏之所受盖所謂如天之仁也報之宜何如其厚哉民望尚勉之故書以為詩序贈蔣瑛序蔣瑛錢塘人予故人禮部侍郎良夫之子也良夫在翰林與予處三十年相好如一日及陞禮部而相好加焉間過其家瑛在侍恂恂然可愛也予盖以逺大期之瑛嘗從翰林庶吉士林補講春秋駸駸有造詣既而歸錢塘其心固未忘學也今年卒業來京師而適當興賢之日乃以其學羣試於有司不偶衆皆為瑛惜之曰我學未至耳歸而求之學果至矣孰忍棄我哉將行其所厚者庶吉士逯端請予文為贈予既交其父而又喜瑛之志如此雖不有請猶將勉而進之况重以端之請乎姑就瑛之所學者而為瑛誦焉昔者聖人之立教也所以明道也道豈逺於人哉在人倫之間而已矣夫其謹之以禮者所以維持乎此也及周之衰維持之具廢而人道壞矣聖人於是而作春秋凡春秋之所貶必其違於禮者也由是言之使天叙之典天秩之禮皆篤厚而有常則春秋不作矣然則學春秋者其可不究聖人之意乎盖必以春秋之所貶者為戒而以禮所當務者自勉君君臣臣父父子子夫夫婦婦長幼序朋友信則聖人之意得矣由是而發為文辭則皆載道之文豈徒取快於科日而已哉世之學經者誦其文而履其道者固有矣誦其文悖其道者加多焉甚者併其文而棄之唯誦他人之陳言以徼幸於一時卒不能有立於世偷惰至此則亦奚貴於學哉此非予所望於瑛也瑛宜服予前之所言者而朝夕勉焉則無悖於聖人無愧於親無負於予輩之所望也送黄知縣序黄惠有孚杭之仁和人其始為太學生擢授工部主事以憂去官服除改刑部既而有疾欲得一縣以自便遂除知延平之順昌滿九年改惠安其友翰林編脩葉蓁仲容命畫者繪送别圖求諸能賦者題詩其上以贈之而請予序予謂臨别贈言古之道也烝民諸詩可見矣而未有繪為圖者至漢二疏歸其郷後之工畫者始圖之而非用於當時也然則贈言自足以見朋友篤厚之意不繫乎畫之有無也今詩與畫兼有之意已加厚矣而又求予序不亦諄複矣乎雖然序者序所以作詩之意也諸公之詩予未能道之姑以古人所賦者為有孚誦焉烝民之詩尹吉甫送仲山甫而作也論其德則曰小心翼翼古訓是式論其行則曰不侮矜寡不畏强禦夫既有敬慎之心而取法古人至其行事又公平正大此所以為賢也世之仕者有不當如是邪况於縣令受百里之地有以事乎上有以臨乎下尤宜以仲山甫為法有孚之仕久矣其加意於是乎今諸公之詩其亦此之意乎予未識有孚姑因仲容之請而為之序他日政成德立而興誦焉尚當為有孚賀也贈蔡太守序聖天子嗣大歴服撫綏萬邦慨然思與億兆之人相安於無事㑹吏部以缺守聞詔諸大臣慎簡擇自郎官御史而下凡在位者茍才行稱任不問其秩次即以命之得二十五人稽勲員外郎蔡君祥與焉既上名即拜延安府知府賜勅奬勵俾乘傳至官蔡君字彦嘉臨海人由諸生入太學擢授刑部司務改吏部用舉者陞行在刑部員外郎未幾復改吏部其才名聞於人久矣其出守延安知彦嘉者莫不以為宜而其僚友文選郎中吳君敬等咸惜其去求予文贈之夫今之為天子養民者令也縣令得百里之地而治之雖親於民其所施者狹也郡守古諸侯之任其地方千餘里民之多者至四五十萬者少亦不下十數萬自令丞而下仰望而奉令者亦以百十計仁如春温威如秋凜凡在下者孰敢悖且慢哉其尊榮可知矣然民之多也寒者欲衣飢者欲食勞者之欲得其安鬱不平者之欲得其理皆於郡守是望有以副其欲則不孤所望矣然則為守者豈不難哉世之論治者以為上之愛民至矣任其責者在守令茍一郡得賢守使察其屬吏之賢否令丞而下能㢘以持已仁以養民公以集事者則留之不然則鋤而去之如是民將無不得其所者則為守雖難亦未見其誠難也延安逺郡也其民之望於守者亦豈止十數萬彦嘉享其尊榮必當思其難而盡心焉有以慰民之所望斯不負聖天子簡畀之意彦嘉通書經書之所載為治之大者而何難於治郡哉彦嘉勉之他日政成將與漢之循吏等矣是為序贈武選龔郎中序武以衛國自古聖人用之未嘗廢也其初寓兵於農後世兵農既分於是其患亦滋出唐之府兵盖本古遺意論兵者以為善今天下置衛以百計衛置兵五千人量其地險易而制屯守之數既不失防禦又足於饋餉此古者寓兵於農之意萬世可行之良法也雖然法則美矣茍非其人猶為無法也故以用人為重夫一衛之長為指揮使其次為同知僉事其下則為千百户鎮撫凡職守者若干人將屯者若千人皆有定制因其定制而各盡心焉長久之術莫過於此今之任將領者予知之嫻於韜畧通於禮義者盖有矣然不能多也其他不習於藝者有之習於藝而不知書者有之習於藝者自以為足矣於書則以為不當務然武之七德禁暴其一也而戢兵保大定功安民和衆豐財乃居其六不求之書則安知其義哉以是而居將領之任無怪其苛暴以虐下朘剥以自肥者之多也今武臣選授皆自兵部尚書侍郎主於上若詳其可否白而行之則郎中與其僚之職非精白勤慎者不足以當之金華龔永吉為職方主事纔六年其名譽聞於上下尚書王公舉以為武選郎中知永吉者莫不以為宜予同年友職方龔郎中與諸僚宷喜永吉之進於位也屬予文為贈予聞兵家之利病如此故相與言之永吉於選授宜加之意也使所用皆得人脩其武德以利我國家則永吉之福禄榮名有窮哉贈按察副使嚴君序金華嚴君繼先為監察御史滿九年超拜山西按察副使初繼先為御史在雲南道與子姻家歐陽允和為同僚允和數稱其才行賢於衆後予友羅君汝敬自翰林侍講出掌雲南道又與繼先為同僚亦亟稱之如允和而北京文武吏士與畿内八府之有事於雲南道者亦莫不譽歎其賢夫既見譽於同僚又得譽於衆非有其實不能也而繼先又以其餘力發為文章以自見于世故當時論名御史如繼先者無幾人人固以逺大期之矣則今受命持憲於山西豈非宜也哉或者曰御史之與副使其品秩髙下可知矣然地有内外故其勢相懸也以繼先之賢使得陞秩於内而行其所欲為不亦可乎今乃為副使於外何邪予以為不然君子之仕也將以其道及民也凡為民者必治於郡縣之吏吏之賢否民之休戚繫焉雖統於布政司然㢘察而進退之勢不若按察司之易也朝廷嚴黜陟之典以課吏其所仰者監察御史按察司而已御史雖自内而出其勢隆赫矣然非久於外者按察之職臨之切别之精得與御史審度而去留之若屬吏皆賢則民將不皆得所乎其惠有不及於民也乎使繼先陞秩於内則去民也逺其惠之及於民也難則又不若副使之愈也繼先誠賢於人其心宜無不可者山西之民予知受其惠也必矣且今之由御史當方面又入為卿佐長憲府者常常有之繼先加勉焉則安得久於外哉將行其僚友包君德懷等求贈言於予故為序如此以送之贈李郎中使西域序太宗文皇帝在位時西域諸國皆入貢願臣屬請遣使鎮撫焉於是擇可為使者而長安李暹賔暘以户部主事往副之賔暘姿儀秀整志氣不凡所至宣布天子德意嘉賚其部長而安慰其人莫不忻悅愛戴奔走送迎復遣其酋從入謝凡三缺往返及録勞序遷賔暘遂進位郎中然未嘗矜衒其能今天子承大統西域復相率朝貢益勤詔復擇使往撫之衆皆以賔暘為宜於是賔暘復輔行或者曰西域諸國逺者去京師數萬里道途之險阻山川之限隔四時氣候之不同誠非易事也賔暘數往返其間盖備嘗之矣今復毅然上馬以往無幾微厭怠意何哉予曰古者男子之生以桑弧蓬矢射上下四方盖示其所有事也則天地之間茍人力可通皆志士所宜經營而致力者而何逺近之擇哉夏啇之世裂地而君之百里之外有不得而通者况荒服乎及周之衰獫狁内侵至於涇陽去鎬京甚邇也斯時也士欲有事於逺可得邪我朝聖聖相承恩德廣被凡天覆日臨之地皆稱臣奉貢不煩干戈服逺之效前古所無者賔暘之去西域雖有車馬之勞然從容往來比之内地皆聖德所及也天下之士盖有願行而不得者宜賔暘之不怠也彼有憚勞煩就卑近局促茍安若斥鷃之於藩籬烏足以語鵾鵬之髙舉哉然觀之四牡之詩而知使臣欲得以副君之意則其懷思常若有所不及然後能咨謀度詢以盡其職賔暘誠加意焉歸而以聞乎上聖仁如天益有以綏撫而化誨之使其人益安樂而仰戴焉則使職盡矣將行其友禮科給事中儀君銘等求予文以贈行故序其說如此以送之送廖知縣復職詩序長沙令廖謨字子謨予故人蒙城教諭潛仲子也初予與教諭君遊子謨雖少已岐嶷不凡其後明經取進士入翰林為庶吉士才思英發而氣節偉然士大夫莫不賢之子謨常言國家文運日隆縉紳先生所在林列若謨等使措置州縣為天子牧小民當不負任使何矻矻於筆硯哉當路者聞之驗其語實即奏為潁上令其治以抑豪猾撫善柔為務未幾以憂去官服除改長沙長沙當交廣要衝賦繁役重奸弊蚝興最號難治子謨治之如潁上而益思所以惠利其民凡逋租之不能償者奏請納其直事有不便於民與民之所欲者皆次第罷行之縣人悅服事無巨細緩急一以辦聞湖廣藩憲大臣及長沙士人仕於朝與朝之顯人過長沙者皆譽之今年吏部侍郎黄公須材湖湘歸為予言廖知縣治長沙湖廣之冠也於乎子謨其誠賢於人者矣令民之父母也然使民父母之豈有他道哉豈以强教之弟以悅安之於是民尊親之如父母求事之不治不可得也世之為令或有昧乎此者非厲威嚴任智術則媕婀循黙而莫之省憂父母之道亡矣求民事之如子而事無不治亦不可得也子謨其有父母之道哉然予聞之孔子曰事君慎始而敬終士之仕也有其始者多矣於其後鮮不變節易慮者故福禄榮名亦唯見其始而已非怠勝之驗歟子謨誠賢於人矣茍敬慎自持而不渝其始則其得於天者有已哉敬慎之吉此予所望於子謨也子謨今以考績歸長沙其表叔刑部郎中獨孤樂善等求學士大夫作詩送之予最故故為序如此云送羅儀範照磨詩序儀範家廬陵大安羅氏舊以貲富得名於今多業儒故儀範遂以儒進試事兵部少傅兵部尚書兼華盖殿大學士楊先生嘉其篤實俾為其子師儀範朝夕坐齋中循循善誘隨其所業開導而課勵之二子皆樂從京師之善教者皆不及儀範於是學者彌衆先生嘗曰儀範學博而志專慎於言行率是而不變其於仕也何有予亦嘗過之相與語問其子之業而怪其不一來儀範曰吾家素貧有子三人皆為童子師可以自足吾之來也以家事付之矣今幸安於此故不使其來且嘗見夫世之初仕者其子皆從之從之者豈人人誠愛其父哉盖為他日計也幸其父沾一命往往求償所欲焉由是鮮不敗者吾之無望於子亦兾其無望於我也庶幾能有立乎予聞而深善之夫士之仕也將以行其義也豈茍為妻子計哉人皆能知而言之然有敗者盖怙侈滅義之人以妻子為累故也今之達官要人以至為郡守縣令坐此而辱其身僨其家者非一人非盡愚也守之不固而為其所移者有矣戒之不改而馴至其極者亦有矣此仁人君子之所深悼也儀範而慮乎此其可謂智矣照磨官九品於郡僚為卑然一郡之文移必由之非止閲成案而已其勢可以軒輊於一時昔之任此而裕其妻子者多矣然卒享之與否予不能盡知也今儀範為是官茍持志不變而盡其心於義所當為則其所立必有過人者凡怙侈滅義之人皆有愧於儀範也儀範將行楊先生率諸學士大夫作詩送之而命予序予故序其所嘗言與所嘗見者以冠篇端誠兾儀範之終勉也予兄善學為髙要縣丞當日計事府庭下其為人雖不茍為非義儀範尚以斯言告之亦相厚之道也贈徐孟隆序國家之待士厚矣其學於府州縣者業成而貢之太學所以教之之法甚備既三年則歸省其親親亡則致祀焉盖謂教之以仁義將使措之天下以為化民成俗之本然而遺其親則惡在其為仁義也仁義君子之道也以仁義願天下之士矣意豈不厚哉夫自三代立學皆以人倫為本仁之於父子義之於君臣此其大者也士之未仕雖未能盡君臣之義而當盡其道於親事君之忠即事親之孝也今於其未仕而教之以此則所以期其效可知故曰待士厚矣豈虚也哉予嘗讀栁子與太學諸生書謂其嘗有志於太學以聞善植身既而以其習之陋也過太學而不敢跼顧未嘗不駭其言及讀韓子何蕃傳知太學之士所以不果於從賊者以蕃斥之也蕃純孝人也孝於親故能忠於君如此然後信韓子之言而知三代之所以教者雖百世可行也國家倣古立教待士以君子之道士亦當以此待其身然不為栁子之所鄙者亦未見其必無也於是有欲榮其身而反辱焉者盖奉法循理之意少而詭欺薄惡之習勝也夫能脩之於未達之時然後能有為於既達之日是故非道不言非理不行如是而可以事親斯亦可以事君矣夫能以此自脩則其為君子孰禦哉建安徐盛孟隆為太學生三年得告歸祀其親其友禮部主事蘇鎰良金求予言贈之予推其意豈特榮其歸而已哉盖以君子之道相勉也夫朋友之能相勉以道者少矣予故為之喜而樂道夫待士之意以贈之孟隆其益思所以無負哉李氏羣英墨妙序弋陽李文奎為保昌縣學教諭能以所學教諸生而恬澹自足凡世俗之所尚者皆無意於其間而獨好圖畫一時善畫者皆有以足其所好文奎取其襍碎者装類成巻名之曰羣英墨妙持來北京因予友郭公承求予序予謂物之有形者皆出於自然畫者乃以適然之興而欲臻其自然之妙非深於其理未易能也昔之善能畫者以為常理之不當則舉廢之盖謂是矣而人之好之者亦必深明乎此然後能審其是非得失之真不如是則亦徒好而已矣雖然此特論其常也若君子之心則異乎是盖君子以天下為樂者也天下之物皆適其宜則其樂也大矣然而山川之流峙人物之動植有得於此而遺於彼不能皆接於見聞茍不能皆接於見聞則君子之樂有未盡也故能見之圖畫因其似以想其真如身行乎山水之間而與夫萬物者皆有自得之趣則於其心豈不樂哉况乎因山以益吾仁因水以廣吾智因鳶飛魚躍而有以見夫理之著于上下物物而推之而皆有得焉又豈非樂之尤者哉君子之好畫意盖如此不然豈無他物之可好而必畫哉文奎學聖賢之道者也其存心必幾乎是故予相與道之其以為何如也贈朱副使詩序朱君與言之為湖廣按察僉事也以清慎直諒見稱久矣盖自朝之大臣有事於湖廣與其屬郡縣吏學校之諸生茍有是非之公者咸稱之吾黨之士知與言者皆為喜與言誠無負於所任者也今年考績來京師任風憲之長當考課之重者皆以為賢超拜四川按察副使吾黨之士益為之喜非特喜與言之進於位也盖大公之道行焉國家考績之法必參於風憲以定其黜陟示公也先是任憲長者好惡不以公率以情其屬多化之内外之職賢而受抑者有矣中才之士往往變移所守以徇其欲風俗靡然日入於弊聖天子大正憲度明黜陟擇賢以任之於是公道大行而賢者益勸則予於與言之進安得不益為之喜哉夫為天下者任人而已人之所以興於事功者黜陟之公而已然患不能盡其人故託於耳目之任任耳目者而反易其是非則亦惡用是耳目哉予嘗論夫為治之要内而都察院得賢以任之而俾察夫按察司按察司亦皆得賢則徧察内外百司執事之賢否而行夫是非黜陟之公則有志之士孰肯自棄於不肖之地而皆為才且良治道之盛雖唐虞不過是也今大公已行於内與言為按察副使而亦推行於外使屬吏之賢者皆樂於有為其餘亦皆勉於為善聲績之美有加於昔時則吾黨之於與言又當何如其喜也以與言之賢其能副朋友之望審矣故於其行皆作詩送之而予為序與言之同僚有劉君鼎貫亦吾黨之所喜也願以予言諗之送王教授詩序予友王經用常初典教大康大康之士賴以有成者盖多今年以績最得兖州教授將行徴贈言於予予謂兖州離曲阜三十餘里去聖人之居若此其甚邇也用常依聖人之宫牆而教其邦人之子弟其可有悖於道哉聖人之所教者四文行忠信是也夫學詩書六藝之文脩其孝弟之行而皆以忠信為本焉兖之子弟誠能乎此也則無愧於聖人之邦矣不然在用常有以教之也然用常之教豈直云云而已哉要必本之於身身有之則下化之其教可不勞而成矣夫不以聖人之道脩諸身是謂棄其身不以聖人之道教夫人是謂棄其人之二者無所可也而况於聖人之邦乎聖人天下萬世之師也然惟於其居之所近遺風餘韻切於見聞者易以感發而興起則兖之師弟子其所立當何如可知矣予安得不惓惓然也夫以聖人之道教人固宜慎於其職况施於聖人之邦其所慎宜加焉茍有錙銖悖於道則人將曰教聖人之邦而不以聖人之道是非聖人之徒矣可不慎哉然世之為教官者多自放於繩檢之外而忘其所教故學者卒無成此君子之所深歎也予知用常必加慎而能副予之所望矣故為序以贈之而諸公之詩則系於下云贈劉子欽詩序劉先生子欽與予同年取進士為翰林庶吉士同受太宗皇帝命讀書于中秘先生學博行脩其文𢎞肆而有法凡為士者傳誦之予不能及也其後先生去為刑部主事日有名久之罷去而士之好學者聞先生皆樂從惟恐不列於弟子於是新淦縣學缺訓導乃以幣走其門請焉而左春坊大學士兼翰林侍讀學士曾君子啓亦以先生文學行誼薦於朝徴至吏部先生請曰某老矣不能從政願止為訓導以教學者吏部以聞如其請將之新淦曾君又率其所厚者賦詩以送之而俾予序予謂治天下者必用天下之才學校才之所出而教官者乃所以成其才譬工之為器䂓矩準繩之制定而後物之方員平直足用也今天下之學多矣其所以教養之具無不備而小大之才皆於是取焉則為教官者其所系甚重可知矣然而方百里之縣相接或不能得賢教官則士之欲學文脩行以自顯於世者將何所法哉故今之論治者必以得賢教官為急於乎此非特今之論盖古之論皆然也然則有如劉先生者宜其見重於世矣今之新淦新淦之士之欲學文脩行以自顯於世者得先生為之師則他日之褎然而升者其視昔將不加盛矣乎詩以送之非徒示重先生且為新淦幸也賦者凡四人以魯頌思樂泮水薄采其芹二句為韻人賦二篇篇八韻四人者曾君子啓監察御史羅君汝敬左春坊左諭德兼翰林侍讀周君崇述右春坊大學士兼翰林侍讀學士王君時彦盖以齒為序皆同年友云贈周員外之任詩序予始為翰林庶吉士周先生岐鳯已為國子監學正其後選為王府紀善又出教長洲復為國子博士其文學卓然有聲於當時仁宗皇帝在東宫雅知之未及大用洪熈元年秋先生以内艱起復來京師㑹朝廷下詔求賢監察御史陳紹䕫首以先生薦在廷之臣亦多譽先生者遂陞授職方員外郎士大夫皆為喜於其行也皆賦詩送之先生之子功叙為翰林編脩嘗與予同居金城坊故先生之來也予得數見焉聽其言論設施非迂儒曲士之所能及予又以知先生非特文學可敬也古之為士者盖曰幼學壯行先生明聖賢之大道以教學者然皆托之空言今去為郎官將以所學見之於行事儒效之不白於天下久矣不知者以為不足用故於儒者率詆訾為迂闊夫儒者之道可以參天地宰萬物詩不云乎左之左之君子宜之右之右之君子有之使其無也則已若誠有之則施之小大劇易無不宜而謂不足用者豈非謬論哉先生之所積者久而人之俟於先生者亦逺大而無窮河出崑崙至于積石齟齬而不得肆一旦決而導之則浩然莫之能禦矣先生蓄極而通盖類此吾黨之士亦深俟先生之有以副人望也使人知儒者果有用不敢訾以為迂闊將不自先生見之乎先生年六十鬚髪郁然耳目聰明不衰而好學不倦推其所有而施於用則誰能禦之昔衛武公為周卿士年過九十而猶勤不懈故其後也謂之睿聖武公此非先生之所宜尚友者乎予郡人也慕先生盖久而先生亦辱交焉故以是進先生而以為贈行詩序送楊允謙詩序建安楊讓允謙今文淵閣大學士兼翰林學士楊先生之仲子也先生官京師去其郷殆萬里故允謙來省焉朝夕侍左右聽誨言退復展巻吟誦求古聖賢之訓而服行之其所從受益者國子祭酒胡公非理之言不正之行盖未嘗有也縉紳大夫皆賢之夫京師者四方萬國㑹同之所也其人之賢愚習之髙下技術聲色之邪正飲食衣服之典則侈麗者無不有也隨人好慕皆足以充其欲樂其心故君子欲知人者常於是而觀其所從則善惡不容掩矣而富貴之家子弟之秀美者多自放其從事於道德文章者盖少也故君子不獨以知人之善惡而其父兄之所以為教者亦可知矣先生以德行之懿文學之醇受知聖天子出入侍從二十餘年恩遇重於當時名聲顯於天下而允謙退然自持勤於學問凡諸人之所欲者皆無動於中雖其資質之良天性之美亦先生之教於家者有以致然矣古之人稱人之善而本於父兄師友豈虚也哉允謙留京且数年今以先生之命歸其郷吾黨之士知允謙者咸惜其去於是相率而贈之以言夫贈人者不於其所有而於其所無斯善矣允謙素受教於家而習聞於師友尚何待於贈言哉雖然學問之道無窮而言各有當也孔子嘗以詩禮教其子矣今先生之教亦猶是也而吾黨之所為言者豈外是哉其曰不學詩無以言不學禮無以立者允謙以之其曰思無邪曰無不敬則吾黨所以進允謙之意也此為學之要也允謙其懋勉哉故書以為贈行詩序贈參政李君序聖天子尊臨萬邦厲精為治勅大臣三品以上舉賢才之堪重任者諸大臣皆慎所舉久之未有以復命上又出所賦招隠歌猗蘭操以示羣臣復勅吏部督促之於是大臣曉然知上意所亟越數日乃具所舉者以聞詔皆授藩憲之任而行在工部虞衡郎中李君新克銘在其列既授陜西右參政然終惜其才而不聽其去乃留在京師脩倉庾受粮餉李君感上之恩厚也益盡心不懈其郷之仕者翰林脩譔黄裳等皆深為之喜思有以贈之而謂莫宜於文字乃謁予請焉君南陽内郷人其天性剛毅不阿而才氣俊逸足以有為初為建寧檢校用薦陞兵馬副指揮尋遷監察御史及營建北京亟於用才改工部主事董諸役仁宗皇帝雅知之及即位遂有虞衡之命凡所踐歴而名隨之予嘗聞少傳楊公云君初在建寧董脩學之役其經營布置皆有條理可以經久而不壞人至今道之其小試已如此宜其任愈顯而名愈著也北京天下㑹同之都其人盖百萬計故以粮餉為先務東南之餽運相繼而不窮其所出納前此皆尚書領之今以委李君其任之重可知矣且當時非無賢也而必留李君其任之之意又可知矣李君其益務所以稱上意哉惟其仁而已矣仁則公公則事得其平有益於國家有惠於下人則李君之名將不益大著矣乎爵禄之來將不益大顯矣乎此皆朋友願望之心也故為序以贈之送劉御史赴南京序叔用名準予泰和珠林人珠林之劉世儒家自唐以來累有以科第顯者國朝洪武初叔用之伯祖子髙先生累官至禮部侍郎權吏部尚書最後為國子司業以卒叔用之祖子彦先生為豐城教諭二先生學行政事表然赫著於當時人至于今稱之不衰予生也後不得從二先生而得與叔用之尊府士方君遊其剛毅正直非流俗所敢近而超然自得於山水之間興之所至發為文章皆清麗典則而於詩尤竒然終未仕以卒君子盖深惜之謂其世德之積後必有繼者至叔用遂以明經取進士今擢拜監察御史君子皆以為宜叔用當赴任南京邑之仕者刑部郎中獨孤樂善等俾予贈以言於乎予何敢愛於叔用哉竊嘗思之今之七品官惟御史為最難盖兼前代諌官察官之任其職甚重矣凡政令有當行綱紀有當脩民隠有當恤賢人在下者有當用憸人在位者有當去寃抑者有當理利之可以及乎民者有當施耳目所接皆得言而行之職任之重盖如此惟其心之公其行之正其量之寛裕其氣之和平然後能從容專靜以觀夫理之所宜而行之適其中此豈可易而為之哉孔子曰不患無位患所以立然則立乎其位而無愧焉者固聖人之所欲也由是觀之徇已私由非僻褊迫苛暴以加於人施於事而昧夫理之所宜者皆有愧於其位也嗟夫叔用尚思其難而圖其所立者哉夫士之仕也貴不忝其世而君子之觀人亦必論其世彼作於前者既已髙明碩大矣而乃以卑汙猥瑣繼之此之謂忝其世而君子之所貶也叔用惟無忝其世則其所立必無愧於其位矣叔用勉之贈范主事詩序德倫上虞人始自太學生擢禮部主事又改刑部皆有名朝廷以其稱任也推本於父母之賢於是以所居官贈其父而母亦贈安人錫之勅命德倫念二親之不及見也乃謁告歸焚黄于墓下翰林諸公多與之游謀所以贈其行者侍讀學士錢先生首為詩一章從而和者九人得詩十首而以屬予序自洪熈以來至于今仕者之蒙恩而謁告以歸也多矣予為詩若文以贈者亦不少皆本德音之深厚推君子之所宜盖謂以言贈人者固當有益於人也夫為士君子纓冠束袵而立於朝凡上之所施如此非茍為榮也所以勸忠與孝也勸孝云者使既有以顯其親而益思不辱焉也勸忠云者使推所以事親者事君而求無愧焉也斯二者固君子之所務而何待於勸哉然既勸之矣則其務乎此當何如其至也且封贈之典漢唐以上未之有也於宋則有之矣然著為令使皆得謁告歸省如今者有之乎無也謁告或有之矣賜之楮幣使歸得以享祀如今者又有之乎無也凡前代之所未有而今則備焉聖明之厚於待下誠所謂如天之仁也由是言之仕者之圖報其可以庸常自處乎德倫在諸公間進退容止恂恂然以禮義相上則能盡其道可知矣故予亦樂言之至於冠盖之華意氣之盛足以震耀乎郷里與夫肆然而自得俛然而自營淹留於外而忘其所當務此非君子之所貴無足為德倫道也是為序送布政使周君詩序國家定天下為十四布政司以統理其民盖古方伯之治也其官之長為左右布政使其次有參政有參議而使之職重矣凡上之所以治化斯民而施其政教以撫循之霈其恩澤以浸灌之者必使之溥博周徧而皆安於其所若賦税之出力役之供獄訟之是非與凡民事之紛紛襍出者亦使之正平均一而各適其分之所當得其設施措置之方雖或虞於衆然制其宜決其可則使實專之故上之所任與下之所望皆於使注意焉使之職豈不誠重矣哉然事有繁簡劇易則視其地之所當今之福建可謂繁且劇者也盖地連大海海外之國以百計嵗時貢水土物與朝廷之使臣往撫其君長者冠盖相望而他有事於其地者尤多送往迎來皆有司事也此可以易言哉均之為布政司而福建為難盖彼皆道其常者也然則為使者其尤重可知矣惟仁足以愛人明足以燭理剛足以去私智足以應事寛裕足以有容強忍足以有濟者然後能當其任周君克敬松江之傑然者也永樂中擢為廣西左布政使以内艱去服除改福建能盡心於其職盖其才行有若予前之所云者故能勝其重而不見其難今年以考績來北京既書最而歸士大夫皆作詩送之而屬予序昔者召公嘗為方伯矣循行南國以布文王之化而歌咏興焉詩之召南是也周君之任召公之任也古今人豈相逺哉以其心行其政而已周君推行天子之德以化下而以身率之使凡仕者皆節儉正直又推而及於閭閻使皆秉禮而遵法則治功盛矣歌咏之興將與召南並傳而甘棠之思亦豈有窮哉故為序之以致意云送文選員外郎蕭君序蕭君名寛字雅容予同郡人也永樂初與予同取進士入翰林為庶吉士又五六年蕭君與脩永樂大典成擢兵部武選主事兵部之屬四獨武選為最繁蕭君有温厚之德有清慎之操有通敏之才盖為之裕然無難者於是自尚書以下莫不賢之既滿陞吏部文選員外郎時車駕在北京凡所選授皆自行在吏部而南京吏部事浸簡蕭君斂其所長以恬澹自守退然其中若無所能者於是衆益賢之夫士之仕也雖皆欲行其所學以自見於世然亦循夫道之當然而已矣方其要且劇也則勤勞夙夜而勉於事功及既簡而靜矣則從容進退而安於其分斯二者皆道之當然也然士鮮不以功名為心往往樂於立朝奮其才力之所能以自託於天子若既逺於朝廷而才不見用亦罕不失其故喪其守者李唐之時分務東洛人皆以為戚而視升朝者如登仙此其情可知矣士之不能以道自重盖如此今之仕者多學道之士况又如吾蕭君宜夫衆之賢之也予念初擢第時同郡幾五十人今仕兩京者五六人而已然予輩多老且病矣蕭君年尚少而才行如此其為郷郡之光增科目之重者不能無望於君也况聖天子簡賢任能鋭意圖治其副六卿當方面者多自郎官焉取之蕭君雖欲久於靜退以恬澹自守予懼不能也亦循夫道之當然而已矣蕭君在文選六年以考績來北京既書最而歸行在吏部郎中吳敬孟寅等重僚友之誼求予文以贈之予故為序如此亦以致予之意也贈易員外郎序禮部之屬有四而祠祭所掌乃郊廟之事最為嚴重然祀饗之節禮樂之制皆已素定不必復有所為獨僧道禱祠陰陽醫卜之務或當有施設措置然亦鮮矣故祠祭之職尤為清選其從容間暇舉莫之及也均之為郎官在禮部已優矣而祠祭又如此豈非仕者之幸遇哉宜春易節時中始以明經取進士為行人其使於四方雖足以盡天下之竒觀然山川之險峻道路之紆阻車馬之馳逐風雨寒暑之侵加葢亦已勞矣秩滿得祠祭員外郎以今之優秩償其前勞天之於時中何其曲盡如此哉今三載考績吏部以為稱俾復任其郷邑仕者刑科給事中郭瑾等求予文贈之夫三載考績三考黜陟幽明者有虞之法國家之所行也時中之復任亦循其常而已而何必贈言哉然而欲有贈者非徒以為悅也君子相輔以德相正以義而相勉以成功名故美其已能而勉其未至風流習尚葢有足嘉者故予於其求雖不暇應而不得辭昔者嘗聞子路問政而請益也孔子告之曰無倦而孔子亦嘗曰我學不厭而教不倦解之者亦曰學不厭所以成已教不倦所以成物聖人之自為與教人若此則未至聖人者其可厭倦哉葢天下之理無窮而事之當為者非可以一二計故君子之窮理行道葢孜孜矻矻終其身而後已焉彼學安於小成官怠於宦成者皆君子之所不貴也時中其尚加之意哉今之郎官累累佐六卿時中何患其不至此法乎聖人所以充其本也此諸公求贈言之意也贈周太守序周侯名監字缺其守保定六年矣當再考績赴吏部定興令丞馮缺周缺相與謀曰保定之繁劇天下之共知也而吾輩為邑於斯所以承乎上撫乎下而皆適其宜者侯之德使然其惠及於吏民多矣今之去既不可餽以財若求世之能文辭者為贈言以彰之亦庶幾古之道也皆曰然予友郭誠適為定興縣儒學訓導乃使致書請於予其言曰侯有㢘靜寛厚之德疏通敏給之才而其所施則又均平正大而無私非特其屬之吏民愛之至於武弁之士亦莫不愛焉於乎侯之賢如此宜乎其欲彰之也國家有天下置為府百數十其地皆千餘里其民多至數十萬其事非可以一二計也為之守者固足以為榮然亦難矣若又當夫舟車之衝四通五達之地送往迎來趣辦於一時其臨之者不以仁則徒見其難而不見其榮也惟其德素著其才素具有以感乎人然後能如其志以治則有其榮而無其難若此者葢不多見也保定去北京三百里其賦税力役皆有常制而其地實當西南往來之途凡朝廷達官顯人有事於河南山西湖廣貴州黔蜀秦隴與西南諸夷西域諸國朝貢之使之陸出者必由之送迎無虚日其難可知矣而侯之得人心如此其才德之美豈不誠賢於人逺哉今天子篤意養民慎郡守之選詔大臣薦舉璽書奬勵而遣之此豈獨為郡守榮哉葢以為民也士茍有志於民可以行道也故視有得之者心特重之若侯久於其任而政績彌顯不尤可重乎昔漢黄霸守潁川得吏民心及入為京兆吏民日夜思之不能忘逮其臨也其化益易行郡中愈治至今稱為郡者以黄霸為首今保定之人之於侯不亦猶頴川之於霸乎侯益有以副其所望哉予既重周侯故探其吏民之意而為序以贈之贈謝郎中詩序肅敬名莊常州武進人以明經取永樂乙未進士為兵部主事秩滿陞刑部廣東清吏司郎中其為主事已藹然有時譽及陞正郎益以勤慎得名既三年吏部考績以為稱言於上進階奉政大夫以所居官贈其父而封母為太宜人妻亦封宜人皆錫之誥命君子咸以為宜時太宜人在堂尚康強無恙肅敬於是謁告歸省焉其同列之賢皆賦詩以送之而請予為序予嘗竊歎國朝之待仕者誠可謂厚矣葢前代之所未有也周家忠厚之澤至文武而極盛當時仕者莫不盡心於王事而不顧其親然四牡之詩探其情而勞之惟曰將母來諗葢設言以慰之而已若使之遂其情以伸一日之養則未見其必然也漢唐之世封贈之典歸省之令未之有考宋之盛時封贈則有之矣使之歸省而著為令則無也歸省或有之矣給之楮幣使得以將其意則無也夫既加之以封贈之美申之以歸省之榮而又與之以費而遣之皆前代之所未備則其待仕者豈不誠厚矣乎列聖之仁所以與天地並也仕者之遭遇若此豈非幸哉然則諸公於肅敬之歸而贈之詩以致其頌美之意葢宜矣抑予嘗聞之君子之仕也所以行君臣之義也雖相與道其常而所以事君者不可以不厚况施之厚者乎施之厚則其報也宜加厚矣國家之厚於仕者已超於前代仕者豈可以尋常圖報哉盡心於其道而每加厚焉至於終而後已猶恐不足以為報也則肅敬之歸其可以久於外乎君盡仁臣盡忠此予相勉之意也故因序其詩而道之贈太醫胡秉常序予濫官京師於他術無所好惟於醫特重以謂醫者人之司命有緩急可託也故當時之名能醫者皆樂與之遊而學士曾公又亟稱胡君秉常為人予心重之然未得見也間過中書舍人解君禎期而秉常適在焉因得識之而秉常之意亦若喜與予接者葢胡氏本廬陵人其徙居番昜纔四世秉常重水木本源之義而於廬陵之士特厚是故喜與予接也聽其言察其所行葢守禮而好仁者守禮而好仁斯其賢於人也矣未幾予有病不能朝葢身熱頭痛氣促而神昏而又加𠻳焉秉常聞之亟來視飲予以善藥踰六七日而疾解然尚不能飲食形頗羸憊秉常視予脈曰此脾胃弱耳今當理脾胃脾胃勝則食進而體充矣又數戒予宜平心易氣勿暴怒怒則肝氣旺而脾氣益弱予謹用其言又服藥半月而全安既而予婦有病亦求秉常秉常皆欣然切脉投劑無驕心無吝色其詞氣益温然謙慎若未嘗有所施者秉常其誠賢於人逺哉予嘗謂聖人制醫藥以濟人夭死其心之仁葢與天地之心同也為是道者亦當以仁存心而施之不怠然後無負於聖人無愧於天地古之君子既皆如是矣而後之君子則有未盡然者盖貪利務得之心勝慈愛惻怛之意微也於是而吝於所施茍有所施則意傲然不可近甚者致其浮誕之說抑揚髙下以求快於已卒亦少見其成功聖人仁同天地而斯人以是心行之則將謂之何哉秉常其庶乎古之君子也夫人有善於已而使之闇而不彰不可也予故序以贈之俾傳焉萬安鄧塘張氏族譜序鄧塘張氏於萬安為大家其初譜諜甚詳遭元季兵燹之餘雖僅有存者然皆殘缺失次洪武中有子常者歎舊譜之不全無以示後人乃質前聞參稽故牘録為譜圖斷以景達為始祖由景達而上不能詳不能詳者則缺焉録其可知而缺其不可知此作譜之法也今三十餘年復榮又增脩之凡十五世然尚未成書因來京師介予表弟彭仕清求予序予謂古者世族大家必有宗法支庶雖繁而皆統於宗嵗時有事於祖廟則凡為子孫者皆至焉尊卑有倫少長有禮孝弟之心生仁厚之俗成矣後世宗法廢而族無所統其流之弊至相視如途人於是士大夫家有譜諜著其本而聨其支猶足以正倫理篤恩誼為子孫者亦得以究其所自出則思善繼於無窮而不敢輕其身所係之重如此其可廢哉張氏之先多以科第顯由他岐進仕者亦有之其官自州縣以至典學校職戎行者相望於前後迨乎國朝禮部侍郎子平為最顯葢自其先積善儲祉而能學問以成之故若此其盛也豈偶然也哉於乎善者天之道也故為善者天佑之天佑之則其盛也固宜歴觀前代以來閥閱之家至久而益盛皆善以啓之善以繼之其中或有少衰者要之如貞松勁柏雖不免於雪霜然終不與小草同腐及其時至則復滋茂葢所稟者厚故也若或以善為不足為而甘為不善雖暫逞於一時鮮有不危其身而辱其先然則為故家大族之後者可不知所務哉勤於詩書之習篤於德義之脩相繼而不渝則雖百世猶盛也予嘉復榮能脩譜牒足以正倫理而篤恩誼又欲張氏子孫皆勉其大者逺者而不輕其身故為之序抑菴文後集巻十三
