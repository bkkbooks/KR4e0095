body:
  text: 抑菴文後集巻七明王直撰序贈沈君之大同序大同於今為重鎮盖其西北數百里為黄河河之外皆廢地餘孽遺種之所徃来是以朝廷常置重兵於此命武安侯鄭公為征西将軍以總之既而又擇文臣之有才行者徃助焉得山東叅政沈君仲載公既端厚持重沈君又通練詳雅凡所以安内攘外皆曲盡其宜於是邊境宴然烽火㡬熄論者皆以為得人交口稱譽之既而沈君以九年考績来京師上嘉其勞陞秩從二品仍徃叅征西幕府事君子皆以為宜将行其素所厚者禮部郎中孫原貞等求予文贈之予謂國朝之制仕者滿九年則更任所以旌勞而勸功也然有久而弗更者豈特難其人哉盖欲久其任而竟其施亦必才行之良有以獲乎上宜乎下者盖亦鮮矣然則沈君之去其為上下之所屬望可知也其賢於人盖逺哉大同在周屬并州宣王之世獫狁内侵詩曰薄伐獫狁至于太原皆并地也至漢為雲中郡時單于庭直雲中數為㓂患武帝數遣将出雲中斬首捕虜漢既勞費而敵亦靡敝議者謂漢得下䇿盖驅之盡境而止愈於罷内以事外然而驅之於已然孰若防之於未然所以非䇿之上也國家聖聖相承綏之以徳而震之以威於是稽顙服從奔走奉貢神謀睿筭超越前古而猶謹邊備肅軍政此虞廷君臣所謂儆戒無虞之意也沈君之去尚益思所以稱上意哉詩曰有嚴有翼共武之服則功名之盛爵禄之崇将愈進而未巳也遂書以為贈行序贈廣西叅議汪君序汪君景明為監察御史滿九年以績最陞廣西叅議君與予及兵部員外郎李君約主事龔君箎同年取進士及是行也其鄉友之同為御史者程君富偕李龔二君来謂予曰同年之士今同朝者無㡬人汪君之去子宜無愛於言也嗟夫予何敢有愛於汪君哉顧無以益於君凡昔同年進士之任職者皆表然有才行致時譽獨予濫官翰林無寸長以自見盖少已不如人况老邪幸諸君有立而予之愚因得以庇賴焉今汪君之去所以大庇頼予者盖日夜望之予何以益君哉雖然愚者志確而慮専庶或有一得也請試誦之而汪君擇焉世之言治民者必曰守令然令為最親故民之休戚繫乎令其能愛民者固多而為民病者亦不少也盖大要有二者有强幹之才而無慈良之心者肆其貪酷而或至戕民有偷惰之志而無作為之才者循私茍得而不恤民凡為之羽翼皆奸民猾胥不才無賴之徒也臨乎上者或有知而欲究之彼則曲為掩覆而妄加保任焉由是民無所訴鬱積之久盖有大發其不平者布政司之所統府若州縣則府若州所統也今之近民如此則為布政司者欲宣上徳以惠民而使之自遂其可得耶廣西地闊逺多猺獞號為難治所欲得者惟賢令汪君之去精鑒而博采之果皆賢矣汪君可無事也若有如予前所云者汪君之政宜無急於此明以察之剛以决之民之病庶其有瘳乎汪君之所立與庇賴予者将不益大矣乎今廣西藩憲大臣多賢者宜有以處此矣汪君又端重謹慎通於政體而熟於民事於為此不難有不待予言者而予乃言之覬或有益焉是亦愚者之過慮也汪君其亦亮予意哉贈工部主事蕭和鼎復職序萬安於吾泰和為隣邑其始置縣也盖析吾邑之地以屬焉故其風俗大抵多相似小人則力稼穡以厚其業君子則勤學問以植其身二邑之人多通婚姻託交好其出而仕於外也尤相與愛厚有輔翼之誼盖土壤相比而風氣相通宜其無間如此也學堂蕭氏於萬安為大家其地接吾邑之南鄉故蕭氏之賢與吾邑之士相愛為尤厚永樂初予獲交孟常其意氣相合也予竊官翰林而孟常為御史營職之暇輒傾倒相懽其性好直而急義盖孟常能益予而予未有以益孟常也今為浙江叅議罷去盖既老且病矣每論良友未嘗不惜之和鼎則孟常之從姪也為南京工部主事予知之久矣然未得一邂逅接殷勤今年考績来北京辱過予觀其容則温温而有禮聴其言則恂恂而有章察其中之所存盖質直敦厚而不溺於流俗及詢其為政又見其慎重勞瘁因事就功而無忝於厥官和鼎其又賢於人哉君子之仕當以質直為本而勤慎以成之盖務實而不華順理而不撓不慢戯佚遊以廢事不輕舉妄動以速愆君子之道固如是也由是論之凡飾乎外而蕩乎内樂侈肆而廢繩檢者則其去君子也逺矣欲享榮名而保終吉亦難矣和鼎之仕其善如此尚益勉乎其後哉和鼎當復赴南京其内弟刑部主事劉廣衡求予文為贈廣衡固予所重者而又念鄉邑之好故為序如此以贈之相輔以誼之意也諸源錢氏族譜序吉水諸源錢氏吳越國王之裔也盖忠懿之子惟濟仕宋為吉州防禦使其子昕遂家廬陵之衮源傳世至和又自其地徙諸源至今十三世歴四百年族屬之繁殆數千指衣冠文物之盛他族鮮能及之然再經亂離譜牒亡失今翰林侍讀學士習禮懼無以别尊卑明疏戚乃考訂而重修之既成書矣持以屬予序予謂古者世族大家必有宗法以正其本聨其支尊卑以序疏戚以明至於久不亂也自宗法廢而族無所統於是有服盡親盡而相視如途人者君子病之此譜牒之所以作也譜牒之作凡同本皆録焉明其所自出而謹其所由分尊卑疏戚燦然甚明厚之以仁正之以義族愈逺愈繁而親慕之意無間是宗法雖廢而倫誼不悖者賴譜以維持之其所繫豈不重乎宜習禮君之惓惓然也吳越自武肅興殺劉漢宏誅董昌破走黄巢保有其地受封爵於唐四傳至忠懿乃歸於宋凡五六十年吳越之人安於逸樂而不識干戈惟錢氏是賴其有徳於民有功於宋豈小哉宜子孫之久而盛也自諸源觀之其以學行名爵顯聞者多矣而後来之俊秀猶不可以一二數則居他邑者可知矣豈非慶澤之長之驗歟予聞之君子之立也貴乎有承於後辟之泉焉其源雖深又疏而達之則其流也益逺錢氏之立於前者偉矣而亦有承其後者矣茍繼繼而不窮則将源源而不已也繼之之道當何如仁義而已矣仁義修於身而施之於宗族又推而及於人則所以承藉而維持之者益厚以固子孫之盛自十三世而至百世可冀也予與錢君為同僚誼不可辭故為序之以告諸源之為子孫者贈徐太守致仕南歸序清江徐公仲敬之守太平二十三年矣其治績有過人者盖公之心篤於愛人故言出而人信之行發而人從之無少長貴賤愚良莫不悦公之徳而服公之化凡再歴九年當得陞郡人輒奏留之盖如子之於父母不能以一日離者於乎何其得民之深如此哉今年又以考績来京師年既七十二矣而母夫人在堂已一百一嵗乃懇請於吏部乞致仕以養母尚寳卿葛君貞太平人也數言於公曰公之欲去於私計便矣其如民何願少留以慰民志公曰吾年至於今宜去且母老矣豈復有百嵗之久哉今之去庶得少致養以畢吾志吾何暇他慮朝廷篤意養民賢才衆多當必有能父母之者吾豈可以不去哉吾志決矣吏部亦重違其意言於上許焉夫君子之學盖欲為忠與孝也入則事親出則事君而皆盡其道則君子之徳備矣然能兼盡者盖少也四牡之詩作於周之盛世其人違親以事君可謂能盡其道矣上之勞下亦可謂能知其情然而将母来諗者未有以見其實然也然則周之盛時人固有不能兼盡者况後世哉公之仕也有惠於生民有功於朝廷及其老也猶得以歸養其親公之能兼盡其道固可以觀公之徳而聖天子逮下之仁過於文武成康於此亦可見矣豈非非常之遇哉予聞古之君子致仕而歸則以其道教鄉人子弟公之歸鄉人子弟必将薫其徳而皆興於忠孝予雖為太平之人惜之而重為清江賀也葛君輩求予言以贈行予素厚於公故不辭而為之序送廖僉憲序國家建官以為民既設布政司府州縣其制備矣而又設按察司此非獨糾民糾夫治民之不如令者也盖天子以安養斯民為心而不得親接乎民故以付羣有司使皆足於衣食而安於田里然任職既多又其才性或不同其能奉順徳意以惠民者固有矣肆於民上而為民病者亦不少也非糾正之則無以示勸懲中才之士将波頽風靡而民有不勝其病者矣按察司之職盖以糾正是者也然則民之所以遂其安養之宜而無失所者夫固繫於按察司其職之重可知矣然當繩糾之任非言之所能也行焉而已矣傳曰無諸己而後非諸人是故已無所貪乃可以責其㢘已無所私乃可以責其公已能不苛不殘也然後可以仁恕望人凡求諸人皆如是不然欲其從而無訟盖難矣然則按察司之所以糾正庶官使民得其所者夫固繫於其身謹其身以率之人安有不從民安有不遂者哉斯言也人皆知之而所行或不能然者立志不堅信道不篤而以家為累故也誠以家為累則貪黷邪僻之意萌苛刻殘暴之行作父兄子弟之頑嚚無耻者又怙勢以逞於是不能善其身亦安能庇其家夫以上下倚望之身而暴棄之豈非繆哉昔者予友廖先生潜仲每與予言而深歎焉先生博學而才髙行端而志確足以當大用而止於教官君子惜之其子謨受先生之教卓然以才行稱於是刑部尚書魏公竒之自主事舉為福建按察僉事謨之道行即先生之道行也其當大用成大功名予尚於謨望之将行其姻家兵部郎中曽士𢎞屬予作文為贈予故書其尊府嘗為予言者贈之以致期勉之意云鄭侍郎夀詩序昔者詩人之作詩也於其所尊所親者則必以夀祝之盖夀者福之首有夀然後能享諸福故於燕樂之際而必祝以夀者所以申其敬愛之情也行葦宴父兄耆老之詩而曰酌以大斗以祈黄耇此施之所親者也父兄歌以答之則曰君子萬年介爾景福此施於其所尊者既醉之詩是也若南山有臺則燕享通用之樂歌於其賔客之賢者則美其徳而祝其夀既曰萬夀無期萬夀無疆矣而又曰徳音不已徳音是茂至於保艾爾後乃已焉盖徳者夀之本雖曰美之而願望之意實寓其間詩人之忠愛篤厚何其至哉後之君子於其所厚而有慶賀頌禱之詩盖本古人之遺意則烏可已邪南城鄭公守忠其邑之君子也惇厚而温恭務徳而勤禮仲子文實為吏部侍郎以賢見知於上有名於當世公之徳致然也由是䝉恩封吏部右侍郎公生於甲辰至今乙夘十二月十日年已七十矣其諸子孫将以是日大具酒殽盛賔客以慶之而親友之在京者刑部主事何自學軰惜不得與稱夀之列乃作詩遣人持歸致禱焉而請予為序嗟夫公之夀髙矣盖其徳之應也而又有賢子孫足以承其志福之萃於公者可謂備且厚矣然公之徳至老而不渝為子孫者亦表表愈偉皆足以世其家則公之福豈不益備且厚哉予觀行葦諸詩皆作於周之盛世徳澤厚而禮義修故人事如此今聖人在上時和嵗豐有生之類皆安於無事而公夀考康寧遂其燕享之娛以受夫祝頌之美而享福於無窮使傳之於後有以知今之太平懽樂一切不異於周之盛世則是詩也将為邦家之光非止一家之榮也故為之序而不辭贈楊太守序登州太守楊侯頤在任三年以考績来京師既書最而歸工部郎中韓翼等求予文以贈行盖楊侯嘗為刑部郎中改工部與翼等為同僚深相好相好之篤而相期之逺非言不足以發之宜其来請於予也昔者申伯出封於謝而尹吉甫作詩送之崧髙之篇是也周家頒爵之制地不過百里今之大郡盖十倍其地則今之太守視古諸侯有加矣其所以修徳而惠民者可自後於古諸侯哉然則贈之以言以致其殷勤願望之意其可少邪太守有地千餘里則千餘里之民皆有望於太守也太守不能以獨治而又屬之令則民之休戚又繫乎令然令之所以賢而能有惠於民者将不自太守表勵之邪是故寛以容衆仁以逮下剛以去欲明以察姦公以處事敏以立功守之修於己而表於人者也身有之而令化之則民安有不被其澤者不然則無以率乎令令無所承式而肆以病民是民之病雖由令而實自太守也太守所繫之重如此楊侯為郡三年而能有成績其有以表勵乎令而民之受其澤可知矣予嘗觀之崧髙卒章曰申伯之徳柔恵且直而知申伯之所以為治盖柔恵者柔徳之善直者剛徳之善也過剛則失之暴過柔則失之弱剛柔相濟而其徳全矣於為治也何有若予前所云守之修於己而表於人者亦庶㡬乎是矣故予願終為楊侯誦之楊侯歴任既久達於為政宜有取於予言九載而陞予将於他日見也贈柯知州歸吉水詩序池陽柯君暹字啓暉初領應天府鄉薦以善書入翰林院壬辰㑹試中校官選仍執筆在翰林明年予扈從留北京啓暉則在南京今少傅楊先生實長翰林院啓暉得受教焉其後予以外艱歸見啓暉於先生所然未暇從容欵洽也未㡬則聞啓暉拜給事中以言事得陞知州理永新久之改吉水永新吉水與予泰和皆吉安屬邑相距不二百里而不得徃来及予起復去之遂益逺然其善政則亦聞而知之矣今年秩滿来北京盖久而予未之見也迨考最而歸邑之仕者翰林修撰尹鳯岐等皆作詩贈行而請予序予謂啓暉懐竒負氣非直百里才也而施於百里盖恢恢乎有餘矣予性素迂言不適於用豪傑者之所棄也尚何説以贈哉又念與啓暉皆業儒雖才氣不同其心之好徳宜無不同乃試道所見焉夫為縣者一縣之民命所託也然其人大率有二有才髙意廣傲睨一世視諸事若不足為然卒無及民之實而或剛暴以戕民有小心下氣卑退自守於諸事若不敢為然亦無庇民之方而或柔縱以病民之二者皆過也為民父母當如是邪以篤實之心行平易之政與其所好去其所惡而已惟以仁存心而無所繫者然後能之仁固父母之道也然則民有所好而不能與惡而不能去皆不仁之人也民之所遇如此惡可為幸哉啓暉之政其皆本於仁予未能盡知也惟觀其邑之仕者所以崇重啓暉如此則可以信其然矣因為序其詩而道予之所見者啓暉之然與否予不能必也亦達予意而已送吳縣丞序英山縣丞吳爟子宣臨川吳文正公之曽孫也公之學上承朱子以泝二程先生其所著述皆足以發明聖人之道而又有發先儒之所未發者天下學者皆師尊之而况為子孫者乎子宣端厚㢘慎兢兢然守其家學之懿是以居官臨民所至有譽士大夫知子宣者莫不敬且愛焉憶永樂初朝廷有纂修之事子宣以長山縣丞被徵来館閣與予同事筆硯者盖久書成受賞賚而去自是不復相聞予意子宣且浸顯矣今年自英山以述職来北京乃辱過予家盖别去㡬三十年而猶在丞佐之列視昔同時之士其超取顯美者無㡬人而湮沒無聞者不少子宣官雖未進其鬚髪蒼然老矣聽其言觀其行而察其心盖囂然有自得之樂而無怨惡不平之氣子宣其安於義命之君子哉夫君子之仕不計位之崇卑而惟貴於盡其職孔子嘗為乘田委吏矣亦曰㑹計當牛羊遂也豈以卑而怠哉夫尊而忝其職不若卑而無愧之愈也子宣位不稱其才人皆惜之而予則深喜其無愧夫固文正之賢孫也子宣年未七十而視聽少不及於前慨然欲致事而歸予不能止也乃懇辭於吏部得放歸於田里其進退去就尤有足尚者夫當太平豐豫之時外之為有司者無徭役趨召之勞無科徵窘廹之擾於是皆有久居之意聰明既衰而疾病加切甚於子宣倍蓰者有之然猶不欲去彼非有志於為民自為而已矣其視子宣豈不有愧哉子宣歸矣讀先公之書而以其道教鄉人子弟使皆為才且良如古之所謂父師少師者其樂盖亦猶有甚焉知子宣者皆作詩送之而予書其説以為序贈太常少卿金君序宣徳十年七月詔以翰林修撰金問為太常少卿兼翰林侍讀學士京師士大夫聞者莫不稱羡以為宜金君字公素姑蘇人永樂中以善書被召至京師時仁宗皇帝在東宫雅好書令有司擇其尤者入侍得公素公素雖以書名而尤博學能文章上知而愛之以為司經局正字與文藝之事太宗皇帝廵幸北京仁宗皇帝監國一切機務當以聞者皆公素執筆其間寵愛尤篤及即位超授翰林修撰益親任之宣徳九年秩滿當陞吏部喜其稱且難為繼也俾食五品禄而復任焉論者皆不以為宜謂公素之賢不可以久屈也至是遂佐九卿而又當論思宻勿之地公道久而後明則大夫君子安得不稱且美哉夫人之修治在乎己而仕之進退遲速在乎天在己者可以勉而能在天者不可以力致盡乎已之所宜而徐聽命於天此公素之所以賢於人也公素既受命其姻家沈成章予同年友也求予言為賀予聞古所謂賀者禮物相慶之謂也不聞以言也然言所以将物也有物而又加以言賢者相厚之道盖如是矣昔者詩人於夫君子之顯也相與燕樂而慶之其詩曰樂只君子邦家之光美其令徳足以為國家之榮也既而欲其久享乎此故又以遐不眉夀為言然夀者徳之至也故又曰徳音是茂期其徳之愈盛也然豈獨身享之故又曰保艾爾後盖期其徳愈盛而慶及子孫也此詩人忠厚之情也亦今成章慶幸之意與予同僚愛願之義也故書以為贈送陳素行訓𨗳之藤縣詩序吾泰和論文獻之家栁溪陳氏其一也陳氏族最蕃自栁溪而析居者非一處然皆未嘗廢儒業為學者師歴仕中外者比比予家與陳氏親好者累世故得接其族之賢者於是又知素行之為才素行通今學古修孝弟之行鄉人子弟争師之其意盖未嘗欲遽進也而廣西藤縣缺訓𨗳㢘得素行以幣走其門强請之素行赴吏部就試翰林中其選乃授訓𨗳而還之藤縣以教其學之人素行将去其常與厚者皆賦詩送之而謂予宜序予謂素行之於教盖知之熟矣教於鄉教於縣學者豈有異哉夫其受學者皆一時之賢才所誦者聖賢之書所求者聖賢之道也聖賢之道仁義而已世之為教官其知此者皆是矣而能教諸生以此者未必皆是也優游於上則縱恣於下故俊敏者或失之輕而謹厚者或失之愚其勉焉自修而有成者盖鮮矣是豈獨學者之不善亦教者之過也夫事之不立必有激揚而懲戒之者於是考試之命下矣彼公其繩尺而校之則賢者有所勸而勉不賢者固将黜罰矣使其甘於黜罰邪則吾不知也不然則豈獨學者之羞亦教者之恥也夫以學校之教而至於此豈其所宜也哉素行始去為教官固無間言者而藤令蕭君乂賢必能如予前之所云者以施焉則藤之賢才将勉於成有以為邦家之光閭里之榮矣而予輒相與言之如此亦非過論也誠欲吾儒之道勝也同志之君子其亦亮予言也哉送林僉事之廣西序永樂十三年春三月天子親䇿試天下士予幸得與諸大臣者讀巻於殿廷上嘉陳循之筞擢為第一而莆田林坦遵道亦次第在優等登是榜者凡三百人盖表然極一時之選然以不得徧識其人詢其行而徒相知於文字之間為可惜也今年夏遵道以外艱服闋来京師授廣西按察僉事刑部員外郎劉伯塤予戚也来求文贈焉盖遵道始為進士觀政於刑部以故善伯塤後為陜西按察僉事以憂歸伯塤亦以公事至莆田復相與從容者盖久則因其去而求贈言於予亦其情之不能已也然予於遵道未嘗接殷勤道情素其将何辭以為贈哉而伯塤之意不可拒也姑以進士之榮與其所當勉者為遵道誦焉夫今之取才其目非一也然惟進士為重天下盖莫不榮之及命以官徃徃得佐九卿任藩臬専郡邑其職盖重矣夫既受榮名當重任則凡羡慕之不及者皆相責望而不貸者也是故其言必中乎道行必合乎理矣然後得免譏誚於一時若乃錙銖有缺毫髮失當則羣起而非議之洗垢而索瘢揚瀾而増波甚矣其可懼哉故君子慎之必求無負於上無愧於下斯可矣遵道以進士為僉事既榮且重也其亦知夫如此者乎而伯塤言其和厚周慎盖可謂能修己而奉職者今之去廣西其尚慎之哉昔者詩人之送仲山甫既曰柔嘉維則小心翼翼矣又曰古訓是式威儀是力焉又曰柔亦不茹剛亦不吐焉予願以是為遵道勉也則庶㡬無負無愧焉耳矣故書之以為贈行序送鍾先生赴南京國子監詩序鍾先生啓晦吾鄉先軰也居邑之南溪上早以文字知名時邑中諸老先生若尚書劉公子髙與其弟豐城教諭子彦予先祖竹亭先生與予叔祖御史公及杭州通判楊公子淵國子學録蕭公子所之五六先生者或隠而未仕或既仕而歸皆以文學行誼師表後進啓晦先生皆得從之遊由是其學大進遂為時軰所推重諸先生相繼謝世後生小子若予者倀倀無所取法啓晦先生則或為道其遺言緒論與其所以惓惓奨進學者之意予得承教焉先生既為贑縣及南雄府學訓𨗳秩滿選授趙王伴讀以其文學奉教令朝夕出入有榮焉先生質而不肆和而有禮士大夫皆愛重之今年秋由伴讀改授國子學録當之南京知先生者皆為先生樂之夫儒者之所學聖賢之道也學聖賢之道豈専於已而已将以施於人也豈必身行之而已固将以授於人而行之也今之大學所以萃天下之英才而教之先生以聖賢之道分教天下之英才率之以孝弟忠信之行勉之以禮義㢘恥之習擴其所未充増其所未髙他日仕於天下其道之行固先生之道行也與其専於己而欲身行之者其為功効巨細可知矣此知先生者所以樂之而亦先生之所自樂也或者謂先生去光榮而就澹泊為有所不可於意則非知先生者矣先生将行其凡知己者皆賦詩送之而使予為序予故序先生昔之所受學為可慕今之所施教焉為可樂如此以冠其端云贈鄭大使序朝廷設内外百司之職以待天下之才其法至備矣然豈茍榮其身哉盖欲任以事也而所謂才者既樂於享其榮則必思所以盡其職故位有崇卑事有繁簡大用之則大效小用之則小成然後可以樂其樂而無愧是以君子不以無位為患而以不稱其位為患也孔子嘗為乘田委吏矣然尤必盡其職曰㑹計當牛羊遂也豈敢隳其事哉故夫居其位必盡其職者臣道之當然也今之驛傳遞運之職皆牛羊倉廪之類其位雖卑養雖薄而其職則易稱何也葢備其車乘潔其廪食使行者有所資居者有所仰此其職也於此而盡心焉則職斯稱矣雖或少勞也然以其暇日可以極山水之觀窮花卉之玩而自放於尊爼文字之娯非若尊官重祿有夙夜之勤有政務之繁而又有得失之慮者故凡居是任者其志無不樂而職無不治也然位卑則不敢以抗貴養薄則不足以及人故其勢易撓而責易致葢乘傳徃來者皆有位之尊有力之强者也其能約以處己恕以待人者少矣茍供億之未至應對之失宜洗垢而索瘢則固有可言者矣故非有通變之才應機之智者則亦難為也已其有為之至於久而無失豈非能哉吾邑鄭廷彬洪武中以才舉歴官有年矣今為河南祥符遞運所大使蓋居其位盡其職有其樂無其難其才智有足稱者今再考績來京師有司以為稱使復任焉吾友龍公常康孟嘉者皆其戚也相與錢送於文明門外而謂予宜以言贈之予固喜其職之修而能樂也故為序以贈之如此送哀判官赴劍州序興宗哀氏為萬安故家始以行能稱於鄉洪武中舉秀民授浙之眉山廵檢既又調廣東之凌禄廵檢廵檢以禁盗為職興宗能勤其官不肯興事以病民又㢘潔不茍取故所至民愛之而盗亦衰息以此見譽於士大夫其罷凌禄而歸京師凌禄之人有常從興宗者慕興宗㢘平不忍棄送至嶺下欲有所獻遺然不敢白興宗告其家人曰異時有官於吾凌禄者常以盗賊事牽連病民以取貨民苦之今公在官三年民無擾又未嘗有取於民今之去恐於貲不足我有珠為獻盖誠愛公非有所干也幸以白之興宗召語之曰吾為吏愛人守已固其職誠嘉爾意不願受也固謝遣之興宗至京授太平門税課局大使能不變易所守而益勤今監察御史蕭孟常與興宗同鄉里嘗為予言如此相與嘉歎之今年春朝廷下詔求賢凡位不稱才者皆得薦舉於是湖廣按察僉事朱與言以興宗應詔徵至北京吏部試在優等超授劍州判官孟常與其同列御史鍾旭皆喜興宗之見甄㧞也求士大夫作詩送之而求予為序予謂古之人居其位必思盡其職故上而公卿大夫所謂輔主而庇民下而牛羊倉廪之執事亦必曰㑹計當牛羊遂而已非以為己利也後之人則不然居髙位而為民所望乃思所以盡其職其或在下僚則放然自棄無復顧藉其能確然自守者盖甚少如是民安有不病故有若興宗者宜為人之所重也興宗今佐一州其政之所施視昔為加大焉所以自持其身者亦惟昔而已㢘則公公則明以此居官治民民惡得而病乎朝廷明黜陟之典以課吏之賢否興宗勉之尚有以處興宗者故於其行為序其昔之所處者如此以贈之且以告其州之人使知興宗必能安己也興宗其有以副吾望哉送金武伯序新淦金武伯文淵閣大學士兼翰林學士金公㓜孜之仲子也去年省親来京師而公以扈蹕駐隂山未歸武伯與予輩相徃来視之盖抱英偉之才負邁徃之氣其言談舉止皆有非衆人之所可及者予愛之及公既歸武伯朝夕侍左右聽訓戒所以奉顔色娛悦心志調適起居者皆能盡其道公是之而士大夫亦莫不慶公之有令子也夫子弟之賢者豈盡其生質之美哉世澤之厚家教之立有以致然也予㓜時則聞之父師知有雪崖先生者以清徳正學教授金川玉笥之間其訓諸生必以堯舜文武周公孔子之道所謂仁義忠信孝慈友弟未嘗一日去於口而違於心學者翕然師尊之盖公之尊府也予恨不得拜焉及竊禄於朝從公遊者二十年其奥博之學温恭之徳雄深典雅之文章所以成於已及於人載於制書而施之中外凛然配古作者其澤之所鍾教之所立豈偶然哉宜乎武伯之為賢子孫也嗟夫士大夫之家孰不欲子孫之盡賢哉然而有不能然者非以所積所教有未至故邪故視其前人之善則其子孫之賢可知矣且予聞之武伯之兄昭伯既以明經舉於鄉駸駸又貴顯矣武伯其尚繼之哉此固士大夫之所望也武伯以公命歸其鄉中書舎人許鳴鶴等作詩以送之而屬序於予予故書其所以嘆美期待於武伯者以冠其端云送麻教諭考滿赴京序縉雲麻永平先生為萬安縣學教諭既滿将詣京師而吾邑教諭朱先生仲言與之有連也因予親丈陳公仲亨道其善且求予文以送之盖麻先生始為太學生以經行修明選授教官歴鉛山缺永豐萬安四縣所至人敬禮之而予未識也予前在翰林時永豐之賢登進士官京師者多辱顧予每論教事則稱麻先生因是而知其為有學行者也况重以今之言邪夫既有學行而教又有成績則其美著矣何待於予言而予言又豈足以張麻先生哉雖然予與麻先生皆業是也其道同則其言将無不同故予願有進焉夫世之用人與人之見於用者有二政與教而已矣政所以行道教所以明道也政之所施即其教之所成施於彼者有宜有不宜即教於此者有善有不善也教之盡善則其所施者皆宜凡天下之人得䝉至治之澤者皆教道有以成人之賢故也故教官雖卑禄雖薄而公卿大夫及士庶人莫敢不加禮以道在是也教官之職誠重矣今國朝之制凡縣學教諭滿九年有進士三人以上則陞之府學為教授教授滿九年有進士九人以上則陞之太學為博士助教所以奨教官成賢才以善天下可謂至矣然位益進則教之所及益廣而人之責望益衆君子於此可不加慎乎夫卓犖竒偉之士所在皆有也然所以成其徳而達其才者固在於此其人之賢否行事之是非教官之美刺繫焉教之可不慎哉教之之道以身率之而已麻先生為教諭九年其成賢才固多矣今之去其陞擢可必也使其所遇之人皆己孝弟忠信明達豈弟麻先生可以優游而樂矣茍有未然則其可自暇哉故予願其加慎也予為此言者誠欲其道之大顯於時以不負朝廷教學之意且以示重麻先生而非以為厲也使徒以言相夸詡而己則非君子愛人之道矣而亦豈所以命予之意哉姑以是贈麻先生他日相見尚當質其何如也髙坪郭氏族譜序髙坪郭氏族譜者譜郭氏之居髙坪者也郭氏系出唐汾陽王子儀始自萬安符竹徙焉居髙坪者十世歴三百年而猶以聞望臨一卿盖衣冠文物不絶也予前識泰禹而知其孝行與其母之㢘節既又知承烈承宣承勛承祚諸兄弟及其姪紹文紹賢紹沂紹偉皆表表可敬愛何郭氏子孫之多賢也豈非詩書仁義之澤逺哉譜之作始自泰禹至今而増修之厚矣其用心也夫譜所以明尊卑辨疏戚盖故家大族非特以貴富顯聞而已正倫其本也尊卑之不明疏戚之不辨使尊者反卑卑者抗尊疏可以踰戚戚者反視如路人則奚貴於故家大族哉此譜之所以不可不作也雖然故家大族而亂其倫者有矣自元以来兄子其弟祖子其孫徇一世之私情而亂萬世之大分以國俗而變華風其後世子孫知其非而反之者有矣因仍其舊以誇大争髙者亦有矣衛出公蔑其父而禰其祖此孔子所以急於正名也然則若此者奚可哉髙坪之始祖為子髙子髙之子長興宗興宗興三子叔鼎叔琦叔玉叔鼎子衡甫衡甫三子文可仁可功可而叔琦叔玉皆無後衡甫不忍二父之絶世也以仁可為叔琦孫功可為叔玉孫夫謂之孫以主其祀斯可矣直謂之子以繼其世進而儕之於父不可也今郭氏之譜所以傳載者甚明其不以一時之私情而亂萬世之大分也可知矣夫倫理正恩誼篤隆然愛敬之施熈然禮義之洽所謂故家大族而克篤其慶豈不在斯乎郭氏之子孫尚加厚焉則其福澤将無己也因其求予言故為之序如此云送簡知府之任序天下之郡以百數大者治三二十邑其次則十餘小者亦不減五六則土地之廣人民之衆可知矣以土地之廣人民之衆而所以安樂之者惟懸於太守則太守職任之重又可知矣故夫上之人必擇寛厚㢘敏者而任之然後能以安乎下受其任者亦必以寛厚㢘敏而為之然後能以副乎上上下交盡其道而民治矣不然則上雖有興治之政下雖有望治之情盖亦難矣可不慎歟我國家以仁厚之澤休養元元擇守令以付之而天下之治久矣今天子仁聖益精於治而於守令尤加慎焉故克當是任者士大夫以為榮都察院經歴簡彦真之出為衢州衢州姑蔑之墟也其所治五縣環其地千餘里其民固多其治固久矣而彦真又當時所謂寛厚㢘敏者今知衢州吾知上不失任民不失望上下之道盡而其治盛矣盖所謂有其榮而無其難者也雖然吾於彦真竊有説焉夫民之所欲無窮而吏之所行不能皆如其願故善柔者之所喜剛黠者之所不便也彦真毋徇也毋矯也惟其公而已矣此吾望於彦真者也茍剛而吐之柔而茹之或徇也或矯也非吾所望於彦真也彦真既行監察御史歐陽和合諸大夫賦詩以送之而予為之序如此云送劉僉憲歸四川序刑科給事中王君鐸為予言四川按察僉事劉君之賢曰劉君名敬字孟直初以明經取進士擢拜監察御史有能譽大臣薦之遂有僉憲之拜其為人平恕不苛不刻以此臨民民徳之松潘生番嘗弗靖君徃撫諭俾安分毋作過生番服其徳皆順從邊鄙無事其見信於蠻夷又如此誠可謂賢也今考績課最而歸鐸輩蜀人知其行不誣願求一言以為贈予嘗謂天生斯民不能以自治是以付之天子天子不能以獨治則付之郡縣之吏而統之布政司然吏不能皆賢而施之民者不能以皆善於是為設按察司以察吏之賢否必欲其有以惠民而不至於病民所繫盖重矣然或者謂按察司當以嚴馭吏操切檢制使之有所憚而不敢縱則民庶㡬受惠而可以不病是則然矣若或失之過則苛暴刻薄之令行焉苛暴刻薄之令行而詭欺誕􅓽之俗滋求免於吏議且不暇何暇誠心為民計哉是故君子以平恕為本平者坦然無私之謂恕者推已及人使之截然各得其分之謂也夫以坦然無私之心施之於政事使斯民皆得其平而無不安其分者此大學所謂絜矩平天下之道也而謂劉君能之劉君之賢誠逺於人矣則為僉憲也何有今之歸篤是而不變豈但有徳於蜀人取信於蠻夷進而上之其施又有大者矣劉君勉之送李太守序清河淮安屬邑其地西南皆距河河中之舟之達於兩京與之乎四方者首尾相接也予友李信圭治清河其心一以愛民為主小大之事未嘗有一厲民民知其心之愛已也亦未嘗有一違其意事皆辦治於是信圭之名與上下之舟並馳達於兩京旁及於四方而人莫不知其賢信圭為令九年朝臣薦之陞蘄州知州清河之人聞知皆大戚曰李公吾父也今去孰能子我哉争號籲乞留上重違民志命還清河以知州掌縣事清河人乃大喜若饑而得食寒而得衣也至是治縣又三年考績来北京予與之别久矣既相見而喜問之曰縣民素孚當不勞而治亦有樂乎信圭愀然曰去年飛蝗為災民食不足皆吾為守令者之咎也今尚慮有遺育為民患日夜憂之思所以弭之者民樂然後吾可樂也予於是而益信其賢守令民之父母當子視其民而欣戚同之世之能若此者盖少矣不魚肉之資則秦越之視惡在其為民父母也信圭之憂緣於愛愛之深則憂之切憂之切則謀之至民患庶其弭矣彼資之為魚肉而秦越人視之則何能有概於其心古之君子思民之溺猶已溺之民饑猶已饑之今信圭之憂樂在民不在已其亦猶是心哉信圭持是心不少變豈獨清河之民賴之若加擢而大行焉亦舉是而措之爾予尚有望於信圭也鄉邑仕者屬予言贈其歸遂書以為贈贈蒋郎中序國朝統理萬邦仁漸義洽無有逺邇悉庭悉臣而麓川思任發獨悖皇化侵畧諸夷驚我邊鄙上猶冀其悔罪命少出兵撫定之几再徃不服於是上赫然怒諭羣臣曰惟此蠻冦受我祖宗恩徳世修職貢今忽敢爾豈以朕為不忍誅之邪即發禁旅簡督府大臣命定西伯蒋公貴總率徃討之又詔兵部尚書王公驥徃總督軍務文武吏士用命不用命皆得誅賞之王公既受詔擇廷臣之賢者以自随而太僕少卿李君蕡郎中侯君璡楊君寧主事蒋君琳皆在行既至邊大将以下皆㑹王公為定計䇿決攻取之宜分命諸君徃督戰遂麾兵渡江入賊境殱其伏兵所過諸砦如破竹上江寨最堅賊恃以為唇齒力攻破之斬獲不可計遂引兵深入凡髙山宻林賊皆置兵拒守為不可㧞之計諸将乘勝士卒亦自奮賊不能支皆敗走遂抵賊巢圍之賊驅象出戰射以强弓勁弩象反自蹂踐又大敗㑹日暮風起命以火攻賊衆擾亂官軍乘以入盡鋭攻之兇渠逆黨被鋒刄投崖谷溺江水而死者盖㡬於盡矣遂覆其巢穴而歸是役也大将以智勇奮其諸将士皆協力一心以克有成功然㣲王公之見㡬明決信賞必罰足以得人死力諸君擐甲胄冐矢石督率奨勵之勤而欲有所立盖難矣或以裴度平蔡比王公當時僚佐如馬總李正封輩皆竒偉不常而諸君似之予謂平蔡易今平賊難天時地利人事既不可同日而語若其談笑賦詠之適與今之躬履行陣出入死生之際以效其尺寸其事之安危情之苦樂可想矣予是以知其難也師還論功封賞各有差而蒋君遂陞為郎中其鄉友潘進學深為喜求予文以華之予念昔與其尊府侍郎公交最厚故備為之書以見成功之難欲其永保之而益進於逺大也且使後世有考焉爾贈潘郎中致仕序兵部郎中潘忠士敬嚴州人始自大學生擢為工部主事以憂去服除改北京行部行部廢又改兵部滿九年遂陞郎中其在工部以能其官得名既而所歴皆有名及為郎中而名益顯朝廷寵嘉之初賜勅命又賜之誥命再以所居官封贈其父而又及其母榮亦至矣今為郎中又九年當陞秩正四品乃自謂老病求致仕吏部重其為人欲留之即復上章請於朝許焉夫君子之仕以行道也而道之行與否則繫於其身身果强也然後能修政立事以盡其道之當然不然雖欲勉焉以自效而力有不逮如是而謂無所茍者盖難矣是故君子之至於斯也則必乞身而退聖明在上亦從人之欲而不强其所不能此之謂臣行義君行仁太平之盛觀也今之老且病者盖有矣其能果於去如士敬者不多也然則士敬其誠賢於人也哉嚴州故桐廬郡漢嚴先生之釣臺在焉先生髙風清節卓然照映千古士之貪位慕禄茍得無恥者至是誠愧於先生若士敬之歸庶㡬可以無愧矣予聞浙東之水至桐廬為最清深沉洞澈俯見砂礫而地多大山磅礡秀整有良材出焉其田皆沃壤宜秔稻凡所以資民用者悉充足而有餘故其君子則忠信而好文小人則惇本尚實而無慕於其外風俗之美他郡莫加焉士敬有冠紱之榮為鄉邑之望既有以悦其耳目順適其志意而又有故人賔客觴酌而徃還其樂可勝言哉此皆朝廷之賜不可忘者也故予為贈行序而相與道之送蘇州府同知邵侯序初邵侯之通判蘇州也有善政及民民徳之惟恐其或去及秩滿朝京師衆皆號於太守某請留之太守亦深惜邵侯具以聞上嘉其能獲乎民陞為同知而還之蘇州蘇州之民既喜得賢守而又喜得侯服其教令郡不勞而治蘇為畿内大郡天下之郡莫加焉民事之殷十倍於他郡為長貳者非才賢而欲事無不集民無不懐盖難也蘇之治久矣侯之才賢與其佐理之功盖可以想見今又以考最而歸宜為之喜者益衆喜之者何嘉其舊績之成而望其新功之顯也予嘗謂治民者貴有孚於民民心既孚則何施而不可侯在郡十餘年其心之所存民知之民情之所好惡侯亦靡不聞者晁錯謂三王之治民與其所好去其所惡而已侯之所施宜無易此者辟之駕輕車就熟路不待問而知用已試之方而収必然之效亦不待賛而成也然古之君子之自愛其身與篤於愛人者必因所至而勉其所未至不但已也衛武公為周卿士其年九十五矣猶求箴儆於國韓侯受命於周以臨民矣仲山甫猶以夙夜䖍共為勉宜其徳業之久且大也後之人或不然謹於始者有矣而怠於終者亦不少君子盖深惜之以侯之才賢其所以自愛其身宜無愧於古之君子徳業之逺大可冀矣予為贈言而及此者亦篤於愛人之意侯名諶字信之四明人求予言為贈者儀制郎中余麟也送彭御史序學校治天下之本也何謂治天下之本盖治天下必本於賢才而賢才者學校之所由出也學校之政修然後有以成其徳達其才舉而用之則治具張治功盛矣故曰學校治天下之本也國家建學校将百年董其事者藩憲大臣郡縣守令之職也亦既得人以為用矣先皇帝加意學校諸道皆設風憲官一員俾專理焉勉其徳業之進示以聖賢之凖制其過引其不及使必底於成而足以興治然後已於乎今之學乃昔之學也昔既有其效矣今又若是焉豈所以期其成者尤欲有加於昔也歟然則今之風憲官以専理學校為務者又所以為成賢才之本也君子之於道固當以身任之而治天下之本又繫於其身豈不尤重也哉然君子所以勝重者無他亦務道而已聖人之道自倫誼之大至於日用事物之細莫不有焉體之於身而達之於用言其言也行其行也小大不違而表裏無間則風之所及自有不令而從不言而喻者盖君子之身又所以為教之本也如是則其成可㡬矣彼從事於法制之嚴拘檢之宻徳則未著而刑數加焉欲以興其亹亹之勤収其翼翼之功盖難矣予郡彭君朂為監察御史専理南京畿内諸學事彭君初為教官有成績盖能以身為教者及當是任莫不推君為善教其教之成亦有加於昔君子謂其無愧於是官今考績而歸翰林編修江寧倪謙輩嘗受教於君求予言贈之予故為言其所繫之重如此或者其尚可取也贈尚寳卿朱君序正統七年五月尚寳司丞朱君用和在位九年矣吏部以其績當陞然侍近之職不敢儗具以聞天子以為尚寳卿命既下在朝之臣皆為喜謂朱君之得於上者厚也盖尚寳置官有三其長為卿其次為少卿又其次為司丞昔之為司丞者滿九年然後得為少卿為少卿滿九年或止加禄俾復任於卿不易得也卿之品視諸曹郎中少卿視員外郎郎官之秩已貴矣然視此之卿與少卿奉寳璽典符瑞依日月之光託霄漢之上其親宻華要不言可知也故卿雖五品然不肯輕以畀人觀於昔可見矣今朱君自丞而峻陟為卿盖前數十年所未有豈非受恩之厚哉宜乎諸公皆為喜也朱君崇明人有秀偉之質有通敏之才有謙慎之行其始遊邑庠用能書徵入舘閣與修永樂大典書成升太學又被選入翰林未㡬擢户科給事中轉中書舎人遂為丞於尚寳歴事四朝未嘗一日去左右今之進位亦豈非能修其職有以取信於上而然歟予在翰林乆矣凡朱君之所敭歴予皆能知之而君亦辱與予遊則予今為君喜又豈在諸公下哉盖嘗聞之君子之與為友也貴乎有以輔益之輔益之者勉其徳業之成也尹吉甫之贈韓侯曰夙夜匪懈䖍共爾位䖍共者敬之謂也夙夜不忘乎敬而徳不進業不修未之有也徳進業修則豈止於尚寳卿而已哉中書舎人宋懐輩亦嘗從君遊盖亦喜幸之尤者也求予言以致其意故書以授懐俾以為君贈云送祠祭員外郎張聲伯致仕養親序聲伯名錞上海人自入太學官京師於今三十餘年母宜人在堂食其禄夀已踰八十聲伯亦既六十餘矣嘗自謂聰明日衰疾病浸加雖欲勉修其職而力有不逮况髙年之母之足念哉聖明在上俊乂麻列使錞免於曠官之譏而得以餘年奉其母豈獨錞之願遂哉皇上逮下之仁真與天地同其大矣遂具疏以聞上察其情許焉郎中王賔軰篤同僚之誼雖不快於其去而不可留也乃来請予文贈之予謂人道之大忠孝而已處則孝於家仕則忠於國此理之當然也君子豈不欲兼盡哉而卒有不得兼者盖欲兼盡者其心也不可得而兼者其勢也昔之人有勇於棄母而急於得君者其功業非不盛也然於母不得盡其道君子深有憾焉故嘗以為人之於是以義揆之而已矣忠以事國而不顧其親仕者所宜也國家之倚頼而其身又足以有為如郭令公裴晉公者則豈可一日去位哉雖不顧其親可也若非具瞻之位輕重休戚不繫焉以老病難强之身又有衰暮可懼之親然猶貪戀不去自謂於忠孝無少間然者予未之信也如是則於義何如哉今聲伯自顧其身之衰不能舉其職恐負上任使又念母之齒日加而不足於養切切求去此固義之所可也其於忠孝君子當有能辯之者尚益慎乎其終也哉義君子以為質也廓而充之至於不可勝用然後無愧於君子此尤於聲伯有望焉故書以贈之宜興吳氏所藏諸公翰墨序詩文書劄共一巻凡二十九通前元及國初諸名公之作宜興吳景春氏所集也吳氏於宜興為大家在元時以貲富名鄉里而尤以率禮蹈義有名諸公間諸公顯人過宜興者多能至其家其所以欵洽送迎必恭禮中儀節故譽望日起嵗改月化不復如曩時獨景春之好賢樂善猶有前人之遺風故於諸公翰墨裒取而珎襲之既類成巻遣其子某持来京師屬予序予生也後不得從諸公然聞而知之者盖半焉今復得觀其翰墨雖風韻各不同而殷勤篤厚之意施於親戚故舊詞氣藹然也倪雲林一書謹於義利辭讓之堅易所謂介於石者其清言室記及送施彦昭修太廟樂器序二首不知作者為誰而其中有稱啓者豈即後詩所謂青邱生者乎若然則髙侍郎季廸也獨字畫不類可疑耳記中以清談誤晉為戒送施彦昭以為政不行辟諸琴瑟不調欲更化以去積弊召和氣有味哉其言也其他可資於已者尚多凡觀前人文字當求其深意於筆墨之外庶㡬有益若以目前所見者為足而不知求之非所謂善學者也景春嘗為予泰和今有慈良豈弟之心民愛之而所好如是此豈齷齪卑汙者可比哉予為之序而掇其大要盖欲以示其後人覽者亦有取也乎贈石布政序山西古并州之域阻山而帶河内為郡縣者八九十其外則瞰沙漠列城堡宿重兵而守之旌旗相望亘千有餘里然供其糗糧給其芻豆使士馬精强守則固戰則勝者大抵皆山西之民也其人雖知分之所當為也而勉於從事州縣之吏亦知以邊餉為重不敢不盡心然非統以方面大臣則緩急先後有不能適其宜者故前此命右布政使統之乃今以病告上命大臣慎擇賢者徃代焉而予江西憲副石公璞適以考績在京師衆皆謂宜於其任具以聞上即命為山西布政使徃任其事石公以御史司憲臬在江西者十餘年其才髙其識明其心甚公而蒞事甚勤小大之獄一見而決無不當於人心江西之人皆敬而愛之惟恐其或去今不可留予深為江西惜之然邊事有所頼而民力得以紓則又喜山西之人之遭也予聞當七國時趙地臨邊以李牧守之習騎射謹烽火多間諜日殺牛享士士皆樂戰遂滅䄡襤破東胡降林胡置雲中鴈門代郡今大同諸處是也方是時趙與諸侯相攻戰資用不及牧牧之所以盛强者田畜而已今其地固在而人加多矣牧之遺法必有能講明之者石公當博而求之以獻於天子而行之軍中彼将帥大臣何讓於李牧而亦孰無體國之心使麾下之士皆田畜以時資用饒裕而軍威盛强足以安内攘外豈非國家之利哉山西民力庶其少紓乎夫兵以衛民而民為邦本其重一也有養兵之術而不行徒使民力殫焉謂之能體國家未見其然也詩曰逺猷辰告衆之所望於石公者如此予與公最故因監察御史歐陽洙等求贈言故書以為贈行序送江津劉教諭序江津於重慶為屬邑其山水明秀故自昔産賢才今讀書入仕者不乏有登翰林為侍從者凡川蜀諸郡縣之能如江津者不多見也予邑劉季真以明經為教官久矣今得江津教諭其叔父崇本為刑部主事有名喜其得江津而亦喜江津之士之遭也思見其教之成来請予文贈其去憶季真初領鄉薦時其伯祖孟慶甫為之喜予徃賀之見季真謹重好學其言行不妄予之喜加焉今其為教官果不愧於其職予尤為孟慶甫喜之惜孟慶甫不及見也予邑之士為教官者二三十人其年與季真皆不相上下而皆能振奮有立况季真之學素力效素著又有崇本勵其進則予於贈言可已邪夫賢才者治天下之本而自學校成之今之責望於學校不可謂不重也故慎選俊秀擇師儒使講學其中而又専置風憲官以督勵焉盖欲人人皆賢出而用之皆足以興道致治則為師弟子者将何以稱上意哉朝夕相與講聖人之道所以修已治人者自倫誼之大至於日用事物之常必身體力行本於身刑於家以及於鄉黨州閭而皆踐其實焉由是而見於文辭以進於有司而獻於天子列之於庶位推其所學施之天下之民使皆得其所而天下治矣究夫所以致是者實本於教官是教官者乃治天下之本所由成也其所繫誠重季真盖知之矣而崇本猶欲加勉焉其意豈但為江津之士哉所望於季真者盖逺且大季真勉之則進於福禄榮名當益盛此亦予所望於季真者故書以贈之抑菴文後集巻七
