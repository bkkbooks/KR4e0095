body:
  text: 抑菴文集巻十三明王直撰題跋題劉先生子髙所書冠朝郭氏世録後右劉先生子髙為冠朝郭存敬氏書其家録一巻載世系誥詞諸作且為正其誤而補其缺於今殆五十年郭氏之先固偉矣其子孫亦多克樹立然非先生文字表彰之則亦無以自别於衆人故今郭氏褎然増重於鄉邑者以此足徴也昔宋王荆公為髙陽許氏世譜其文傳於天下天下之人至今知有許氏者以荆公之文也宋之名臣行業如許氏者多矣然而亦多不傳者豈非不足於此歟郭氏子孫其世寳之巻中有直先祖竹亭先生跋語一篇而先考瓊州公實書之葢子髙先生未録之前繫於初本之後者而今移於此又知直先世嘗與郭氏有連惜直之生也後不及究明因覽是巻為之嘅然遂書于左方期相勉於逺大云題建昌趙氏官誥後昔宋初有天下其所與共治者皆取諸疏逺之賢至於神宗始出宗室之英而用之増置教養選舉之法於是文武之器彬彬焉出矣其有不由是者率皆爵之而無土官之而無職亦所以貴之也親親之道於此可見歴元至今其宗法既廢而子孫之寓於四方者猶有藏其先世告身足以考知其所出嗚呼盛哉此勅乃崇禧所受於今浙江按察僉事禮為七世祖禮登永樂十年進士第即為此官曄然有才名夫庶姓之貴者子孫尚思所以承藉而光顯之况王者之子孫乎詩曰無念爾祖聿修厥徳禮其勉之因觀此勅故題其後使藏焉百世之下文獻之足徴者將不在於此乎題廖氏勅命後予㓜時聞廖氏有自强伯先二先生皆以文學見重於時然伯先先生已捐館久矣自强先生為縣學教諭老于家而子㓜不能侍左右以聴教然未幾亦棄世此勅乃伯先先生所受國初官制大抵依前代之舊故所稱如此後乃去國史院而以編修為正七品𨽻翰林院則謂之史官而先生不及見矣此勅在廖氏今五十五年而其子孫寳藏如新後世文獻之徴將不在兹乎先生從曽孫長沙縣令子謨教諭先生之曽孫也持此示予故題其後使藏之題大理丞楊復所藏趙松雪畫像後予嘗聞諸公長者言趙松雪氷清玉潤有超然拔俗之姿心甚慕之及觀其詞氣之渾厚字畫之清潤固已彷彿得之然終以不及見為恨今觀此像神采偉然非詩所謂顒顒卬卬如圭如璋令聞令望之君子與然究公平生大節有過人者如議獄事謹灾變已苛政抉奸邪可以見之矣此豈小丈夫所能哉觀公者勿徒視乎其外也題曽如璋冠禮巻後右曽如璋冠禮字辭諸作共一巻皆前元諸名公所作時如璋尊府巽堂先生應奉翰林文字有名譽於時故所行所得如此經厯世變此巻遂流落吉水王氏如璋從孫子啓為詹事府少詹事聞之託春坊庶子周崇述為購求及王至京師而子啟君已捐館適如璋之孫子頴謁選在吏部弗之顧予輩未嘗不興歎也今子啟君之子積復捐重貲求得之使百餘年故物一旦復舊積可謂善繼其志矣夫所謂故家大族者以文獻足徴故也曽氏之子孫其永寳之雖然冠辭之所祝皆人道之大君子所當務者非為一人之私言也積既冠矣當服膺以繼世徳然後為曽氏之賢子孫豈特寳其文字之傳為美哉予與子啟君為同官故積求言於予乃題其後而歸之題李恪所藏淳化帖第一巻後昔米元章嘗謂此巻漢章晉元晉武齊髙梁武梁髙簡文七帖並一手偽書晉武當是孝武梁髙當是齊髙而黄長睿亦云千文非章帝書然亦前代人作集千字中語耳若晉武是受魏禪者非孝武梁髙帖尾云蕭衍疏正是梁髙祖書目誤以為髙帝其他辨别猶多二公皆以書名天下其精鍳髙識必有依據偶觀此帖遂題于後使知前人用心如此非茍為耳題梁先生詩後右七言近體詩一章前翰林侍讀兼右春坊右賛善西昌梁先生用之所賦以呈内閣三先生者胡公吉水人名廣字光大楊公建安人名榮字勉仁金公新淦人名善字㓜孜皆太宗皇帝所親任其文章徳行天下所推仰而與梁公最相好梁公清修玉立文字竒古而每出新意時輩爭傳誦之三先生居宥宻之地在東角門内故謂之内閣常人所不能到其外為文淵閣梁先生輩處之雖地位相懸而四公情好之宻文字之娱則無間也當時唱和葢不止於此此詩今為刑科給事中廖莊安止所藏安止與胡公同邑故愛慕不忍置詩末言太液廣寒葢廣寒殿乃前元所建在太液池上萬嵗山頂當時極為華麗太宗皇帝在潜邸時去其甚者而存之以為殷鑒未嘗増飾恭儉之徳比隆堯舜其初幸北京三先生實從嘗特奉詔縱覧焉胡公有五言近體詩十首諸公皆属和梁公此詩猶有羨慕之意安止若又得之以續於此使觀者得以考見其事豈不美哉梁公與胡金二公相繼即世計賦詩已二十年矣俯仰今昔為之慨然恭題少師楊公所藏宸翰後宸翰一紙少師廬陵楊公之所題識而寳藏者也太宗文皇帝聰明聖神循天理之正盡人道之宜誠非常情所可及而公之意乃有黙契焉君明臣良志同道合於此可見矣禮者人之大防也所以别尊卑辨上下本於天地之義而始於起居出入先後疾徐之間君過於遜則下替臣過於抗則上陵惟適中之為貴是故親王雖尊行一家之私也皇太子於宗属雖卑然天子之副天下之所共尊公也處之固當有道哉春秋首止之㑹伯父叔父咸在而皆不敢與世子抗所以明天下之常尊而分義定也孝陵之拜文皇帝之睿斷酌天理人事而制其中可以為後世法也堯舜之道中而已文皇帝之道堯舜之道也而公黙契焉者葢道之具於心初無或異惟存而不失是以出而有合也拜觀之餘謹書其說于後題東坡先生墨蹟後東坡先生以宋元豐三年謫黄州李定舒亶輩害之也初先生知湖州時以事有不便民者不敢直言因作詩以諷兾或有益於國定等擿其語奏之以為怨謗下獄鍜鍊欲寘之死太皇太后曹氏謂帝曰昔仁宗以制科得軾兄弟喜曰吾為子孫得二相今聞以詩繫獄豈仇人中傷之乎宜熟察之而吳充王安禮亦極力營救乃貶黄州團練副使本州安置築室於東坡自號東坡居士是詩乃天慶觀賞牡丹而作先生忠誠篤至憂國愛民而不虞小人之害故至於此然其胸次髙明洞逹不以禍福嬰心故無徃而不自得觀於詩可見矣今數百年其片詞隻字流落人間者人得而玩之想其髙風逸韻有不可及之嘆其視定輩真如蛆䖝糞穢唾罵之不已然則為小人者亦可以鑒矣此詩文選員外郎曹子宜所藏而求予題其後玩閱數四為之嘅然題潘主簿墓銘後安福主簿鄱陽潘君景岳墓銘一通前太史金華宋先生作潘君以洪武癸丑十一月廿一日卒子烜將以甲寅十二月奉柩歸𦵏鄱陽先塋之次而權厝於安福之城南先生之銘既納諸壙矣其後烜以多故不克歸安福之民深徳君亦不聴其去相與護視其墓唯謹烜遂家于安福以殁至是子多吉念父之志未酬而居安福已三世且七十年矣恐後世遂忘其所自乃以先生所作銘刻石寘祠堂中俾子孫知前人之徳而重本源之思雖非禮之正而其志則可悲矣予嘗跡君之事而知其所以没世不忘者葢元季大亂安福為劇盗李明所據甲辰冬王師臨之明走匿安福擇能綏定其民者得君以為安福州判官君愛民如子惟恐失之軍中掠民男女數千君白主帥鄧衛公曰公將天兵以弔民伐罪斯民天民也當釋之以慰民望公乃下令盡釋以歸君君悉以還其親戚及明復叛合衆二萬欲攻城君急請於大府得兵與賦戰嘉林渡賊大潰走而中山侯湯公統兵繼至君獻䇿軍門請保民公恱秋毫無犯或有欲抑民為兵者君泣告於公曰民始去亂亡未能即安若必抑為兵當復竄匿可奈何公憐其意遂罷議自是州境始定君召輯流亡賑恤饑饉鄉邑之人始得完其室廬理其故業而遂有生之樂葢親戴君如父母君又設學校聚其俊秀以教之朔望則親詣與之講論經史而勉其成才洪武戊申改州為縣以君為縣主簿前後在官九年治效最他邑朝廷嘉其能將進用之未及而卒於乎君於其民殫心劬力拯之危難之中措之安全之地而復其詩書禮樂之舊風徳之大小可知矣漢朱仲卿嘗為桐鄉嗇夫有恵於民且死命必𦵏桐鄉今其墓猶存而子孫無顯者君有徳於安福非仲卿比也安福之民篤念君不忘為護視其墳墓而敬禮其子孫則厚於桐鄉亦可知矣今多吉之子鑑讀書取進士為刑部主事以光顯於世而昌大其門葢君之位不稱徳故天以此報君也予讀其銘文而嘉嘆不已故為之言以告其子孫俾善繼於無窮而凡長民者觀之則亦可以自勵矣題柴侍郎所藏禊帖後禊帖世多有之獨定武刻為最勝而最難得今觀此本典刑具在而風神稍衰葢以年久故耳然終非他本可及善觀者若九方皋相馬乃庶幾真賞也題黄太史墨蹟後黄文節公翰墨妙當時後之得者亦寳愛如拱璧葢以其徳耳非特書也此紙評書足見精詣其謂右軍書法唯顔魯公楊少師特臻其妙魯公之書人謂於逸少得其筋然忠義之氣溢於翰墨真足以儀範後世少師乃楊凝式其書多在僧壁間傳於楮素者極少時人亦愛重之然黄長睿謂其祖述不逺㑹稽父子筆法似不如是而文節稱之乃爾葢必有所取非虛美也惜其書不傳不得以究其妙姑識於此以俟知者題李江州遺墨後李江州之精忠大節百世之士也其遺物之存者人固當寳而玩之况其詩乎此詩失所贈人名氏然觀其語意則其人之賢與江州之心術光明正大皆可見矣錢唐朱子徴得之愛若拱璧子徴真好徳之士哉予自其子禮部郎中暉所得而觀之敬慕其人故題其後如此題段侍郎燕集圖後永樂之初復設科取士太宗皇帝銳意文學之士詔擇進士讀書禁中學古為文章期至於古人而後已得二十八人今工部侍郎周君忱請與其列上許之凡二十九人直亦濫厠其間夙夜祗畏以求稱上意于時近臣有請立課程以速其成者上不許俾從容以學於是朔望稍休暇得娱意杯酒之間發於吟詩以頌聖徳此圖之所寫是已其中卓然有立者比比皆是獨直頑鈍疎拙日入於無聞不能少効分寸雖聖仁如天化育萬物而不責其報然直之慙悚幾無以自容獨賴諸公當方面佐六卿功業赫然在人耳目庶用以葢其愆耳段公出此圖見示為之赧然因題其後以志愧云題趙附馬所藏晦菴墨蹟晦菴先生師表百世聞其風者尚起敬起慕况得觀其翰墨哉因翰墨而想其詞氣因詞氣而想其徳行此好賢之至而善學之者也予於附馬趙公見之矣題方仲謀所受勅後右知鄆州平隂縣兼兵馬都監方仲謀勅一道宋熙寧六年十月右正言知制誥吕恵卿所行而王安國充崇文院校書亦列函在其後予記宋史恵卿以是年三月為翰林學士時王安石當國行新法士大夫皆以為不可恵卿獨左右之及鄭俠疏入安石不自安乃求去乞以韓絳代已恵卿佐之於是絳平章事恵卿為叅政守其法不變葢七年四月也此勅載恵卿以六年十月為右正言知制誥豈其親附安石故屢遷其官而史畧不書邪抑偶失之邪安國乃安石親弟分教西京國子秩滿入朝召對勸仁宗專以堯舜三代為法帝問卿兄秉政外論謂何對曰恨其知人不明聚斂大急意謂其用恵卿行新法以病民帝初欲進用之聞是言不恱止授崇文校書屢言新法之弊力諫安石且目恵卿為佞人恵卿衘之未幾遷秘閣校理卒罷遣歸其鄉當新法之行山隂令陳舜俞陳留令姜潛皆以為不便沮格之舜俞被謫潛引疾去不知仲謀平隂之政竟如何惜不見其家傳仲謀世孫衛府紀善永吉寳藏此勅而以求予題予觀恵卿安國而跡其進退此易所謂小人道長君子道消也宋欲不亂亡可得哉故題其後使觀者有考焉題項昻霄妻唐氏貞烈巻後元至正壬辰之嵗龍泉盗起項昻霄氏以其属避城中賊勢銳甚謀覆城城守者先遁昻霄亦盡室登舟以行甫及新林渡賊奄至麾衆欲薄舟昻霄妻唐見事亟與夫訣曰君宜速走避我良家子義不受汙辱即躍入江其母繼之皆死獨㓜子為左右所奪得存昻霄既走免得完骨肉念唐之死既久而猶悲陳公甫楊公平先生皆作文以哀之既而有議其傷勇者意謂事未可知不死或無恙葢貪生惡死不欲成人之美故謬為此言太史公曰人固有一死死有重於泰山或輕於鴻毛葢謂處死之難也夫以孱然柔弱之質而遭剽悍之冦不見㡬明决欲姑徐徐以圖之呼吸俄頃之間其禍有不可測者既失其身而悔焉雖即死何益哉唐項皆簮纓家其於節義素教而豫講之志操蓋先定矣一旦罹患故從容就死不難也彼逡巡畏卻兾茍全其身而卒不免者視唐氏盖霄壤不侔惡得以傷勇議之邪當時陳心吾先生反復辯論而折之於理唐氏為不亡矣巻中有予先祖竹亭公先叔祖御史公之作今六十餘年項氏之賢曰所勤者為都府經歴又持此求予言故題其後而歸之以明唐氏之賢使懦者聞之庶能有立也題柴員外所藏石鼓文後永樂之初予與餘姚柴君廣敬同被簡拔入翰林講學之暇因論及石鼔文廣敬為道其師趙撝謙先生得善本審定為周宣王時史籀所書無疑永樂十一年予從太宗皇帝來北京乃得見石鼓於太學門下亟摹搨成巻間一展玩惜其訛闕已多時廣敬去世七八年欲求趙先生所藏巻一觀庶稍補其缺文而不可得今稽勳員外郎柴蘭廣敬姪也忽持此巻示予閱之信為善本而趙先生之文援引切當辯論精覈真博雅君子哉廣敬純謹該洽不愧其師而蘭亦甚似之先生之所以教者可知矣巻留予閣中凡兩月得從容觀覽俯仰今昔為之慨然因題識于後而歸諸蘭俾藏之恭題四朝所授勅符誥命後右勅符誥命共二十四通皆洪武以來列聖所授恩徳之至光榮之極宜百世寳之獨先叔祖子啓公御史僉事誥勅二通以無嗣故失之而文幸存餘皆完善如故既謹藏於家又通録其副為五巻以授五子俾各藏焉閒暇則展而玩之感朝廷之大賜而圖補報於萬一念祖考之所以致此者而思紹續於無窮庶幾忠孝兩盡而可謂之賢子孫此直之所深望也少詹事誥止一通而不及封贈者盖有其說國朝之制五品已受封贈至三品乃許再請四品不與直為庶子學士時先考已受知府誥先妣贈恭人皆四品妻陳氏亦受五品封矣及陞少詹事四品仍兼侍讀學士在翰林預典詞命遂不敢請然當時有為郎中員外已受封贈及陞少卿而又得之者此則繫乎人也當代典故不可不知慮後有疑此者故及之題程楚公碑後予觀楚國程文憲公之事元有古大臣之道非世之為容恱者比也當至元中其所柄用及布列庶位者多國人與北方之傑而南士罕用公獨進言治天下者必用天下之才若有所偏主使人得以淺薄窺朝廷由是南方之賢如趙公孟頫輩稍稍䝉薦用而臺憲之職皆與焉得人致治於此為盛既請建國學以育才及議行貢舉則言經學當祖程朱又累累以敬天尊祖清心持體之說言於上皆經國之逺猷格心之忠計至於進賢才折權奸正憲度恤民隠皆公之素志與其所常行者孔子所謂大臣以道事君者公之謂也公有傳在國史有碑在神道載其徳業之盛足以垂久逺今五世孫太常少卿南雲以碑刻嵗久顛仆闕缺而史藏於官非常人所得視乃復取碑文刻石寘祠堂而首以公像使凡為子孫者便於瞻仰而興起孝敬之心禮曰先祖有美而不知不明也知而弗傳不仁也南雲可謂明而仁也哉予嘗讀公傳而慕之今得拜公像而讀其墓碑慨然有願從而不可及之歎因書于後以致景仰之私云題趙松雪墨蹟巻松雪公在元政事議論髙一時載於史傳足可考見或者乃獨以書法之妙掩之此豈深知公者其為詩雄渾典則允未易及巻中所書諸作徃徃有黍離之悲其志可嘅也直少時嘗慕公書而願學焉及見李北海書法華寺碑又知公之書法乃出於此葢北海法羲獻而公則從北海而得於其父子名葢當代而為天下後世所師法豈偶然哉此巻或疑非公書安成彭圻力辯其誣葢公於翰墨功深力到隨意揮洒各臻其妙當以九方皋相馬法視之勿徒泥其蹟也禮部郎中王士華得而寳焉持以示直為題其說如此題先叔祖所書春帖下方春帖一對其詞云詩書繼述千年逺繡斧巡行兩道清先叔祖子啟公所作而親書之以揭于堂上者也公於洪武三年以教官舉赴京與天下所舉者十有八人同入覲是日早太史奏文星見及十八人者見上上喜皆以為御史命徃視事且賜宴以寵之事載髙廟實録公任職以剛正得名上重之超拜廣西按察僉事遷崇慶守久之免歸洪武十五年詔徴天下賢人君子共論治道命有司以幣聘先考尚書公與焉見上於奉天門問太極奏對稱㫖拜廣東按察試僉事公喜故有是對葢紀實云公好顔栁書深得其法玩其詞觀其筆意剛毅正直氣象可想見也廿年前直理故篋得之而謹藏焉計其書至今六十五年矣昔蕭子雲嘗用飛白筆書一蕭字李約歎其精妙購歸東洛揭之齋中朝夕玩焉名齋曰蕭齋約徒慕其人喜其書而愛賞如此直於公為諸孫公之手澤固當保之因命工裝潢成軸以示子孫俾思繼述詩書之業幸而見用則思所謂清者而致力焉庶幾不負公之意豈獨師其書法之妙哉是用題于下方為子孫者當世世寳之永勿替題忠宣余公翰墨巻後右忠宣余公書六紙與淮東憲史李希顔者也初公受命守安慶即以其地為已死所忠義之節固已確乎不可奪是以屹然為江淮砥柱思殄冦以安民而食盡財殫無以作士氣宜其有求於淮東也希顔在淮東憲府故托以成事觀書詞之倚重可知希顔篤朋友之誼然力不能盡如公所欲及賀丞相董師淮上公又四上書以空乏為言蘄有以濟之且謂江淮不定則中原不能獨守中原不守則朝廷不能獨安朝廷不安則宰相不能獨富貴推此類具言之今其書載文集中可考也觀公之志豈止欲保障江淮而已哉丞相宜有以大副其求則善矣然跡公所為終不得大展其志卒與城俱亡而遂已則丞相之與公可知雖然公無慊於心無愧於天地而至於此者豈獨公之不幸哉公没已百年翰墨之傳士大夫珍襲之比之南金拱璧非但以書法之妙也昔之君子評顔魯公書謂公筆法兼衆美而忠義之氣葱葱鬱鬱散布翰墨間當百世寳之今於公書亦云希顔後官嘉興以卒子泰亨遂為嘉興人博學工醫卓行君子也然不娶無子同僚俞君積之少從讀醫經泰亨竒之因遺以此書初凡七紙而亡其一今存者唯六既装表成巻將以遺子孫俾時一展玩以致景行先哲之意属直識一言謹書其後而歸之題卻封禪頌槀後右卻封禪頌槀前翰林學士贈禮部尚書文穆胡公作也昔太宗文皇帝在位時太常臣有言曰古者聖人治天下功徳盛隆則必舉封禪之禮以告于神明垂美於萬世今陛下繼統天清地寧民物咸遂聖徳神功古無與讓而封禪未講何以繼前代帝王之盛請命禮部舉行之上曰封禪非古也帝王之有聞於後者在其徳不在封禪不許公聞之曰此盛徳事也而大臣有與之比者隂助之公慮為所惑乃本封禪非古之說與後世賢君良臣所以闢而不行之美皇上聖性髙明真知灼見足以破千古之謬為百王之明監時作詩以獻上覽之喜曰是朕心也於是言者沮而封禪卒不行君子之事君務引其君以當道若公是也彼秦皇漢武之輩肆其侈心以瀆擾上下天地厭之顧乃以是為說此為邦者所以逺佞人而公之所深慮也其學之醇懿心術之正大可見豈獨文章之雅贍可喜哉公捐館三十年其壻尚寳丞宋懐以此槀示直直嘗從公游知公為深故題其後如此懐其永寳之哉書劉昱義事劉昱山西人不詳其邑里初為縣吏既滿赴吏部俾從役翰林以勤事為人所喜永樂二十二年三月太宗皇帝征沙漠學士楊公金公實從以昱自隨昱弟亦從軍𨽻成山侯戱下昱念其勞堅請於二公俾執役帳中師過開平昱弟病昱朝暮供藥食甚勤不能愈至應昌卒焉昱不勝哀倉卒坎地埋而藏之秋七月師還過應昌昱尋得𦵏處發其屍屍以地寒故不腐乾若枯腊欲焚之取骨歸而薪不可得乃嚢盛負以行不敢入營内二公怪昱不見左右具以告凡六日至開平昱始得薪焚之藏其骨入見其衣上汚跡猶在也二公嘉其義為之惻然時昱亦有疾乃留之開平属守者善視之後一月始至北京請負骨歸𦵏𦵏畢復來遂以病告歸田里然二公稱道之不置曰方師之出也人不能自顧其身而昱乃如此則居家友弟可知矣嗟夫兄弟同氣之親若左右手平居無事則相親愛至於急難死喪之際為尤篤葢義所當然也然而世之謬為大夫君子者其於兄弟甚親愛矣一惑婦言臨小利害如毛髪輒反目不相識至於終身不復徃來甚或至於相賊害其平居如此况急難死喪之際乎其於兄弟如此况所謂朋友者乎當其閒暇褒衣巍冠髙論闊視若昱者誠不足齒然而其行反出昱下逺甚嗚呼其可哀也哉大凡貴賤人者好以類然而人之所以可貴以其有徳義也由是論之若昱非誠可貴而斯人者不甚可賤邪棠棣之詩周公所作其論兄弟之義至矣奈何人不知省也余未識昱其他行亦不可知獨嘉其篤於兄弟異夫世之謬為大夫君子者不欲使無傳也故著之跋文會録後右文會二㑹者前後合十有八人賦詩凡三十六首皆楊先生序之盛矣哉其言也士君子遭文明之世處清華之地當閒暇之日而成㑹合之娛宜也會而形於言以歌太平詠聖徳明意氣之諧暢發性情之淳和又宜也昔周之時詩人之形於言也多矣所謂風者里巷之詞頌者宗廟之樂其大小雅則燕享朝會之詩懽忻和樂以盡情齊莊恭敬以發徳非偶然也及春秋時諸侯卿大夫相見率賦詩以言志皆取是詩而歌之非必已作也然因是以知其政治之盛衰人事之得失豈虛語哉今諸公之詩皆可以繼二雅之盛後千百年有以知聖明徳化之隆洽賢才之衆多必於是詩見也予與諸公多同鄉郡且託僚友之好而以内艱去惜不與於此及來京師得受而讀之為之嘉歎不已因題其後而歸之顯仁使藏之跋趙松雪虞邵菴墨蹟後右趙松雪所書虛室記虞邵菴書虚室銘河南僉事劉士皆所得也嘗聞長老言松雪風儀秀偉神情洒落儼然神仙中人故其所書亦超逸不凡予在秘閣閱之累數百雖片紙隻字初不經意而精神溢出姿態横生使人愛玩之不已則其用意精書可知矣此與予所見他本差異而亦自有佳致可法邵菴書及銘端重典雅於此可想見前輩風致也賛陳公延賛公延姓陳諱賞泰和人世為儒家其先君子仲述先生登洪武乙丑進士第為監察御史以古文名天下其清徳重望表然為時所敬既没家無餘貲徒存先人之園廬而已公延雖孤貧然能自感勵日挾書奔走就學其梁氏姑最憐之寘於其家愛養如已子使從其二子學二子長曰用之既以明經出仕次曰本之初為瑞州府學訓導乃㩦公延至瑞州日夜相與講論磨礱浸灌久之公延通二經中永樂元年鄉舉至七年乃成進士去厯事刑部以勤謹亷介得名當時公卿大夫有與御史公同年者見公延如此皆喜曰是有子矣既而選為廣西按察僉事至廣西甫一月當出按梧州他官多不欲行公延曰食君禄而可擇便避事哉遂自行至梧州閲吏牘兩月早夜盡心遂以勞致病而卒永樂十三年某月某日也年闕十其妻劉氏自桂林至梧州奉其柩歸泰和𦵏焉公延貌古而心如之其言必正直與人交無隠情於親戚故人禮意尤厚遇事不問難易義所當為輒為之無一毫顧計仁民愛物盖其素心獨恨未大試以卒性尤孝友喪父母三十年哀慕如一日事梁氏姑如事母御史公有同産弟一人亦事之如父惟恐傷其意與羣從兄弟處怡怡如也平生不善治産業心亦澹然初授僉事過家或勸之理父祖業以遺子孫公延曰吾今幸榮顯至家而遽為此人其謂我何不聴孰知公延既没而妻子乃無所庇藉以為安是豈有天道哉嗚呼公延可謂厚有餘矣公延卒某年其子异以畫像來求賛予與陳氏世有連且自㓜相知又同領鄉薦又嘗同朝於誼不可黙乃序次其行事而系以賛使觀像者知其為人也曄曄世家生此令才仁義在中肆其允懐有學有文温恭慎篤綉衣焜煌徃按南服當義而行不顧其私蒼梧雲徃悠悠我思正直之言孝友之行豈曰鄉人君子所敬卑讓肫肫因心則然人則忍違不愧於天遺像在堂以妥以祀精神來孚以昌𦙍嗣黄母劉夫人賛昔者詩人之願人受福也則以釐爾女士祝之說者謂女而有士行者予頗疑焉以謂士君子之與女婦其徳有剛柔之異而施於外内者不同若桃夭樛木采蘋栢舟之所咏歌固美矣而亦豈類夫為士者之行哉及讀易之文言曰坤至柔而動也剛然後知夫女子之徳葢有兼全而不謬者而予偶未之見耳今見黄母劉夫人事而益信夫前之所云者葢萬世不可易也夫人之行既無愧於桃夭諸詩而亦女徳之常也至於育黄氏之孤已可見其知之明仁之至矣及其見害於小人則身衛白刃以保全之其剛毅之氣凜然也卒再造黄氏使克盛於今日誠所謂女而有士行者其為福不既大矣乎雖然此非後世之士之所能也蓋古之士也古之士而仕者當託孤受遺之際毅然自任以安利其國家不以死生禍福易意後世之士有愧於此者多矣然則夫人之賢於是為不可及已遭遇聖明恩澤廣被夫人以曽孫之貴得追榮第一品君子皆以為宜葢曰天之所以報有徳也予念其事足以儀於世故為之賛以附其家傳云賛曰顯顯黄宗艱阨于中誰其保之夫人之躬貞孝順慈女徳之懿惟兹夫人有大乎是孑孑遺孤孰主孰扶卵而翼之用展厥謨被兇肆强加以白刃以身衛之智勇俱奮緒之阽危一髪千鈞續聞成家夫人之仁維賢曽孫遭遇明聖錦誥象服追榮錫慶吁嗟小人託孤受遺匪屈則移實愧于斯豈如閨門有此偉烈我作賛詞以告來哲祭酒陳公畫像賛朝列大夫國子祭酒陳公有剛正之徳亷厚之行𢎞博之學竒偉之文祗事列聖揚厯幾四十年表然為中外之望此其畫像也宜有賛咏以垂永久公名敬宗字光世四明人賛曰有嚴辟雍天子所崇司成監之以奏膚公濟濟多士是效是則規員矩方凖平繩直以成其徳以逹其材出而用之邦家之基惟兹陳公當世之傑寵命自天乃躋朝列髙冠正裳如珪如璋從容進退與道翺翔肅肅其儀侃侃其色有程有經以引以翼惟教之行小大奮興百職用宜百度用貞巍巍具瞻展也君子神明相之永鍚蕃祉國家萬年羣賢賛襄斯公之休斯文之光東里先生真賛肅肅楊公盛徳在躬祇事三聖不易其忠文為國華鋪張揚厲克闡大猷以輔于治朝夕左右是曰藎臣雍容廟堂正笏垂紳其行有常其言有則衆人是瞻學者是式豈弟君子邦家之光天子萬年永篤其慶吳敏徳畫像賛海虞吴敏徳為都察院右僉都御史持敬慎之心秉亷直之節其議論舉措葢有前賢之遺風視世之隨俗變化方外而圓内者相去逺矣此其像也而予為之賛允毅吴公率徳自躬聖明御邦克躋顯融豸冠峩峩邦之司直必誠必恭不詭不激雍容進退端笏垂紳小人所憚君子所親維昔名臣始終一致神之相之福禄斯偹風霜肅物生意寔存願𢎞厥施以暢皇仁介翁彭公像賛浩乎其氣之剛也確乎其行之方也不矯矯為異而秩秩有常也窮四聖之書精六藝之章也學至於命而詩昌也紉蘭藉蕙摶若芳也施之政教令譽式彰也豈弟君子衆之所望也我儀圖之遺像在堂也鄉邦之思愈久而不忘也楚國程文憲公像賛楚國程文憲公之事元有古大臣之風此其像也公五世孫太常少卿南雲以示直為之起敬起慕乃述賛曰肅肅楚公道徳在躬奮於前元克盡其忠天為世皇篤生此傑有言有猷有勞有烈盛治之興本於用賢育賢之方教學為先俊乂以庸經術以正惟公之功國是斯定公之在朝從容賛襄剛毅不回摧姦擊强公之在外彌綸化理扶植善柔如保赤子奥博之學雄渾之文以啟後來以耀前聞景星慶雲祥麟威鳳夫豈偶然應時而動解綬歸來葛巾布裳泊焉以休天下之望遺像在堂瞻者起敬子孫之思以綿厥慶薛尚書像賛其氣也秀而充其貌也澤而豐服詩書以成名遭仁聖以効忠始則任御史之雄進而陟司冦之崇克明慎於憲章亦嫺練於禮容葢肅肅其敬而翼翼其恭鏘鏘乎玉之和楚楚乎服之衷監視於圓丘之上對越於清廟之中用無適而不宜信有感而必通惟神明之相之肆福禄以來降祭文祭監察御史彭百鍊文子有美才而負直氣為名進士為賢御史出入中外厥聞四馳中休于家孝養是宜誰生厲階陷此罪罟皇仁如天徳施斯溥再登顯榮受福則那一疾弗瘳命也奈何親朋之誼篤愛在昔今不可見愴焉心惻靈柩戒行祖奠一觴安以即路歸于故鄉祭太師楊公文嗚呼天之生賢將以用世惟公之生天豈無意賦以令徳既厚而充發為文章玉振金舂永樂之初公在宥密煌煌帝制多自公出迨事獻陵上下實親言無不從堯舜是陳宣徳以來至於今日明聖相繼眷倚如一公之納忠匪私其躬經幄綸闈夙夜敬恭山岳不移澤施萬物公亦如之謙退不伐四朝元老衆之所資天復何心而不憗遺九重悼嗟恩禮加厚哀榮始終况乃眉壽直之先世道義相惇及我小子凡四通婚從㳺翰林情好篤至我老益愚不克終事雖不終事舊愛未忘今則已矣能不痛傷靈車南還千古之别奠此茗飲欲語反咽公有治命凡祭皆辭薄物薦誠公其鑒之祭母舅歐陽先生文嗚呼維我母舅實有盛徳鄉邦所尊才識超卓文章典雅世亦罕倫儒林之英州里之秀學者如雲授業解惑開其善端博其見聞摶若襲荃紉蘭藉蕙郁烈其芬嗟我小子早失怙恃罹愍遘屯眇末童㓜如墜淵谷幾不能存提挈以徃衣之食之剖擊䝉昏誨我詩書勉我道義毋辱清門自是以來粗克有立維舅之仁我之見舅如見我母意苦情親謂當百年得遂瞻依鄙念獲伸今舅已矣呼天叩地欲見何因母恩莫報舅徳未酬感痛則均向風長號形留神徃淚下沄沄寫此哀悃望拜靈筵敬侑一罇祭姊夫楊行簡文嗚呼先公之壻惟君一人於我兄弟實為至親君家上園世號巨室克亢其宗善繼善述展其才能綽有令名千金之賦萬石之征官既無違民亦有頼逺邇懽忻小大稱闕姻族歸義鄉黨歸仁既公且平其言恂恂自我不見今三十載我姊先亡幸君猶在林泉之樂君得其真尚兾來歸與君為隣兹忽聞訃君亦先逝汗漫之遊誰測其至七十八齡不為不多水逺山遙傷哉柰何崇酒于觴載肉于俎陳此薄奠淚下如雨焚黄祭告文維正統十二年嵗次丁卯某月某日孫資政大夫吏部尚書直謹遣苐三子稹昭告子祖母贈淑人李氏尊靈仰惟聖明篤念臣下推恩之典必及其先肆我祖母既贈淑人兹復追封夫人秩正二品祗奉誥命不勝忻喜謹錄黄燎告墓下痛惟小子始生數歲慈母背棄嚴父遘屯家本貧空親戚無助獨賴祖母仁愛篤至辛勤撫養教使讀書當此之時侵侮者衆藐然㓜稚不至失所先業祖墳不至盗奪變賣得有慿恃以克成立本房之危而安墜而復振是我祖母再造之徳也今直忝備官使祿不逮養感念疇昔痛切于心幸䝉國恩累賜褒贈徳善之報昭然不誣伏惟尊靈服斯榮命尚隂佑子孫延于永世謹告男資政大夫吏部尚書直謹遣第三子稹昭告于先妣歐陽氏淑人尊靈恭惟聖朝篤念臣下推恩之典必及其親肆我尊母累有褒贈兹復追封夫人秩正二品祇奉誥命不勝忻悦謹錄黄燎告于墓下痛惟我母生我劬勞行年數歲遽見棄背仰賴積徳深厚庇及不肖以克成人今幸有俸祿而不得養朝夕備寒暑罔極之恩愧不能報每一念之中心如割天地有極此恨無窮明命賁臨益深哀感尚祈祗服永佑後人謹告男直謹昭告于顯考顯妣尊靈曰直才行鄙薄不克肖似幸承天寵進秩宫僚皆我考妣積徳所致肆蒙恩典更益寵褒顯考加贈榮禄大夫太子太保兼吏部尚書顯妣加贈為一品夫人榮命下臨已嘗昭告然於神位尚未改題稽慢之愆實不敢逭今者飾兹舊主署以新函伏惟尊靈即安於此以歆時祀以佑我子孫於永久謹告方外送道士王貞白序興國縣治平觀普覺𤣥成煉丹之地也𤣥成仙去後人尊其道者為立觀以祀焉地既竒勝故居者徃徃多俊拔之士王貞白其一也貞白常從今長春真人劉淵然學道造其閫奥縣之人凡有禱祈禳禬者必請貞白貞白亦盡誠為之由是人多嘉禮焉興國雖贑属邑而與吾泰和境相接故其邑之賢者劉君溪逸嘗請予大父竹亭先生以道義訓其子所尊事者甚至於是邑之名人秀士多以詩酒相徃來予大父與溪逸君相繼没後十四五年予亦偶游其地過治平觀識道士康自成王常清暨貞白訪予大父所與游者僅一二在焉葢已不能無盛衰之感矣去之二十餘年予備員近侍從幸北京過徳州見溪逸君之少子敬孚葢敬乎為百户管軍在徳州大有才望與予道舊故相得懽甚問其昔之一二在者今亦已矣獨貞白輩超然塵外故無恙相與嗟歎豈勞於物役者果易衰而離羣逸居真足以自養邪去年冬國家建黄籙大齋徴天下道流而貞白亦來既畢事受賞而歸留徳州徳州之人因敬孚而皆重貞白為出錢作三清像以金塗之又為刻諸神位皆髹漆而金飾其字貞白將奉歸觀中敬孚領軍營造來北京求予文以華之嗟夫予之去興國也久矣所謂治平觀者葢彷彿記其處而不能道其詳矣因敬孚之請而嘉貞白之為人能精修以昌其教也故為文以贈之而併道予之所感者焉送多寳寺僧古章南歸序多寳寺在廬陵曲塘里林木蓊然髙甍巨桷參差隱見於蒼煙翠靄之中溪水出其西繞寺門涓涓流横以石橋作亭覆之以為行人憩息之所予舅氏家永和故予嘗徃來過之愛其幽雅殊勝意必有清修絶俗者居其中然未暇徃遊也嚮嘗以内艱家居至永和適曲塘里劉君士英邀予外弟歐陽士則教其家子弟因陪舅氏徃過之遂一遊寺中殿堂門廡雖不甚髙大然規制深靚夐無塵迹寺僧四五人具茗飲迎客甚恭與之語皆恂恂切實必依乎理庶所謂清修絶俗者也其後起復官京師去之又五六年當人事紛擾塵土轇轕之際追思昔遊邈不可得然後知山林幽絶之處葢方外之人所樂非用世之士可得而兼也今年古章因省其師來北京遂以其學受知於𢎞慈嘗闕禪師時禪師方受命主天界寺乃署古章為主藏然以禪師未即南也且告歸多寳以俟焉將行謁予求一言為贈予不暇作而古章求之不厭嗟夫予學孔子者也孔子曰道不同不相為謀古章何求予言之深哉雖然有偶同者焉吾儒之為學者貴乎静盖不擾於外物故能専心一意以明道徳之奥究性命之源而為佛之徒者亦以靜為主故常居乎深山宻林持其心如鐵石漠然無求於世乃能究其說之所至道雖不同其所以求之之方則一也古章歸矣其尚靜以求道哉若夫佛之說予不能如古章就其師而問焉其所以求之之方當不易予言也故書以贈其行贈太虛師為安慶都綱序予仕翰林三十餘年其居北京亦二十年矣每勤於職務罕與外人接間以暇日出游思得方外之人可與晤語者兾一浣塵抱嘗過城西天王寺上翠微山造圓通精舎又過清涼僧院地雖殊勝然求其可與語者未之有也因竊自歎恵休文暢齊已亞西與近之來復輩皆人耳何卒無繼之者豈皆奔走於俗務邪去年冬十二月有恵然造門者予接之乃報恩寺住持逹上人也上人安慶人初出家天寧寺既悟佛法又通儒書喜為唐人詩其意氣偉然非其他俗師可比謂予曰昔先大夫寓居安慶時喜為塵外之遊無事則過院中相與論詩或竟日夜不厭其後徃知瓊州嘗有詩送之因為予誦說實造語不凡予既聞其所學又重其與予先公相好且予嚮嘗求之而不得者今乃得之心竊喜且敬焉覬一徃謝未能也未幾上人復過予曰吾法属祖璬號太虛實能嗣吾道今受命為安慶府都綱敢求一言為贈幸以先大夫之故無用辭嗟夫予非能知佛者上人既悟其法而又通於吾儒自為言贈之何不可而乃以属予豈以予言可用邪夫都綱之職一郡之學法者皆統焉其律已守道而不俟乎表勵者豈人人能然哉必有以整齊之然後其心一其業専而教興矣故都綱者一郡佛教之興替所繫也儒釋之道雖不同然正已以正人則一而已祖璬為上人所重能齊衆以興教無疑也予雖不能知佛姑用其所同者以為祖璬贈上人以為然乎送有中師歸上天竺序京師天下㑹同之都其人靡所不有文儒武將英偉豪傑之士竒能異術方技之流釋老二教所謂真人徳士持瓶躡屨風飡雲卧不逺數千里以訪道問業為事者舉集焉况乎山水之崇深城闕之𢎞壯四方萬國之貢獻禮樂文章制度典則之明備皆前世所未有是以髙人勝士必思一遊以盡天下之大觀而卑汚齷齪者不能也予官京師四十年所見多矣今又見有中師焉中師長洲人始出家於練溪白龍精舎事白圭和尚又事南洲洽公為入室弟子蘇之圓通永定勝感常虛席厯舉中住持既又主杭之上天竺實五山之首學者多歸徃焉中深於其道而又好儒喜文章見名公制作愛之如珠玉其心葢超然無滯礙非拘牽常見泥於物我者比也嘗得鴻臚卿楊思敬東闕草亭闕園燕遊詩葢少師廬陵楊公及予輩所作喜曰是不可不傳乃刻石以傳久逺思敬聞之大喜至是與中語益竒之久之中告思敬曰中之來京師既盡天下之大觀凡吾教之老師宿學亦徧禮焉其所得多矣吾將歸也於是思敬來告予曰昔韓歐諸公多與名僧遊今中亦可謂竒偉不常者先生宜贈一言以華之予聞錢唐多佳山水上天竺為最勝常欲徃遊而未得然終兾一遂焉中為人如此是可愛也或者其有遇乎昔蘇子由作棲賢堂記東坡先生為書之曰以此與廬山結縁庶幾他日入山不為生客也予於中亦云故為序以送之抑菴文集巻十三
