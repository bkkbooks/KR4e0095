body:
  text: 抑菴文集巻六明王直撰序贈吴知府赴任序仁宗皇帝即位之初詔擇國子生之有學行者六十人俾翰林嚴試之予沗與其事拔其尤者二十人以聞番禺吳信中孚在焉上素重賢才而首命及此於是衆皆以為榮明日有旨命試事六科察其可而任之未幾二十人者皆以勤慎有名遂皆授給事中中孚在刑科夙夜不懈以脩其職而其名益顯諸公貴人交譽之今天子嗣大寳位遂命總其科事甫一嵗福州缺知府大臣謂莫如中孚奏請命之中孚遂陞為福州知府同列之賢求予文以贈行嗟夫中孚子之在位久矣其練於政事非予所能及也予何以為贈哉雖然予不能習事而能知書書載治民之事甚多不可備舉姑舉子之字而申其義焉易卦之中孚其名義同也治民之道豈有加於此嘗即卦之全體而觀二柔在内為中虛中虚者誠之象也即二體而觀二剛居上下之中為中實中實者孚之象也虛其中則所感者易以入實其中則所施者無或欺以此臨民民有失所者乎世之臨民而失所者何也私意横於中又間以先入之言則民之情惡乎達舞文飾詐以欺世取名無實恵以逮下則民之病惡乎瘳予顧子之字而取義於易焉則今之賢守亦無有加於子然非特可為賢守而已也等而上之蓋無施不可今之賢守徃徃入佐六卿貳臺憲子其勉之予與諸公蓋深有望也贈李主事序予觀夫考課之法而知朝廷之待仕者蓋帝舜之心也夫士之仕也孰無建功立業之志哉在上之人有以御之耳寛則失之縱嚴則失之殘而欲其興起事功蓋難矣於是有䇿勵之術三載而觀其績之小成彼勤脩職而幸於見知則將亹亹忘倦以圖之百工熈庶事康矣至於九載則陟明者多而黜幽者少豈非䇿勵之術有以成就之哉有虞聖人與今天子之德何其待士之厚也仕而遇此可謂非常之幸矣南陽李賢原德以明經取進士擢授吏部驗封主事夙夜不懈以脩其職自冢宰而下皆愛之既三年以稱職聞上命之復任蓋俟其業之大成而陟之也郎中吳孟寅輩皆為喜來求文以華之予謂原德能於其官而受天子之寵命其光華至矣予言何足以為華哉然有一説焉君子之仕莫大於逢時有其志有其才而時不遇焉雖欲少自見可得耶今幸遇明時上有帝舜之聖而以帝舜之法待賢臣則為臣者其可不以有虞之臣自待邪臯陶伯禹有虞之臣也其言曰慎厥身脩曰予思日孜孜者予深有取焉蓋慎厥身脩所以為建事之本孜孜者所以收建事之效也由是言之身有不脩而不知勉焉則庶事隳臣職廢雖為具僚求以免責且不可况望虞廷君子邪抑又觀夫後之為臣者其初非不知勉也及宦業有成鮮不侈然自放者益之言曰滿招損謙受益徴諸天道且然况人乎原德世為顯官兹欲不愧其先不負於國必當以前之所云者為法則顯榮光大可必矣夫與人言而不以大賢君子待人者非相厚之道也故序其說如此以為贈原德其有取於予言也乎贈翰林檢討錢原溥序原溥名溥華亭人正統已未以鄉薦㑹試禮部而予實司去取得原溥所為文竒之遂上其名原溥由是取進士然尤攻古文詩法唐書法晉皆有造詣其德性温然言動不違於禮故在京師名最著㑹詔下吏部求文行卓然可用者吏部選於衆得原溥進之察其行試其言遂用為翰林檢討其鄉友兵科給事中蔣性中喜原溥之進用而欲勉以逺大也求予言贈之於乎性中可謂能盡朋友之義者矣古之君子之為友也務以德業相勸勉故有善則相師有過則相戒必至乎德之充業之成而後已焉今上有聖德之君下有好德之臣其所進而用者必以德為本若夫位之高下亦必以德為差則凡有志於用者奚可以不務德哉德之充則言立行端古之君子蓋如是然予聞之學所以為進德脩業之本也學不足以明理則德非其德業非其業矣故孔子之聖而猶學以脩其身况下此者乎原溥之進德脩業其尚不已於學哉况翰林處禁宻之地而檢討史官尤非他職可比者曽文定嘗言學足以窮天下之理才足以周天下之用智足以知難知之意文足以發難顯之情然後其職可得而稱由是言之學豈可已邪予自竊第入翰林即沗史職然於他事亦多與其間惴惴焉不敢少自怠今三十七年卒無寸長可取者學不力故也原溥當以予為戒而以古人為凖學益勤德業益盛則其位當益顯孰之能禦哉予以是贈原溥蓋自訟之意而亦相厚之道也送江西左布政使吳公序江西左布政使毗陵吳公報政来北京既奏最而歸凡知公之賢而念其民者皆喜且欲予言為贈於是都察院經歴南昌熊尚初以告予予亦江西人蓋尤為斯民喜者則於贈言奚可辭然謂吴公仕宦三十餘年始擢自主事為知府又為按察使再以賢舉任方伯其德行政事著聞於逺邇設施措置非予愚者所及也則今之贈行不幾於難為言也乎然惟君子不以人廢言吳公君子也愚者之言庶乎其有取矣昔帝舜之即位也明目達聰之外莫切於養民故其咨十二牧曰食哉惟時豈非謂食者民所賴以生而時者民之所由以得食也歟今之布政古牧伯之任而聖天子之心即帝舜之心也吳公與同列諸賢推而行之江西之人之受其恵久矣恵之厚則感之深感之深則今之歸也人惡乎其不喜哉雖然江西郡邑介湖山之間其土瘠其民貧嵗豐而艱於食者十猶四五則所以加恵之者蓋深有望於吳公抑嘗思之我太祖皇帝養民之厚有加於帝舜而無不及焉既發鏹積穀以振施而興起水利皆有其實以為非是則民不能以趨時今名存而實乖欲使之遂其養蓋難矣此郡縣之過吳公所冝加意者也舜之命牧亦曰惇德允元而難任人夫良法美意嘗行於君子而敗於小人吴公察於郡縣之吏果君子則信任之小人則逺棄之當必有以副上之心慰下之望而無愧虞廷之臣矣於乎此所謂養民之政也此所謂恵而不費也此所謂因民之所利而利之也誠如是則江西之人之美吳公豈止若南國之歌詠召公而已哉故書以為贈行序贈李檢討序李紹克述安成人宣德癸丑予主禮部㑹試克述以春秋薦予得其文而讀之喜其明暢他莫有及者擢為本房第一由是遂取高第入翰林被旨選擇俾盡讀中秘書學古為文辭而予繆當董率之任於是又知其資質之美學益進文益工蓋温然自重之士也及脩宣廟實録克述亦與其間予復濫厠總裁之列見克述早夜盡心於職務其所纂脩皆詳實有條理心獨重之謂其文學既如是而又能勤篤不懈他日逺到無疑也今年勅諸司有剩員者更其任上以文學侍從之臣皆妙選在左右不欲以他務委之令暫歸以需召命克述與焉則自喜曰吾有老母旣䝉恩命矣今得躬養以為榮吾何幸如之即束書擇日就道其鄉友翰林侍講劉球求樂編脩吳節亦為之喜求予文贈行予家去安成百餘里而與其士大夫相徃來克述之出而仕也蓋與予三遇而益親庶所謂有宿契者則於其行豈可愛一言邪君子之學盖欲充乎内而周乎外不以進退有間也是故進而䕫䕫退而孜孜惟德業是滋必使積於内者充然而有餘達於外者沛然而無不足然後為學之成克述在館閣嘉其勤篤者非予一人今之歸其可不勉事親之暇務其所當為而絶其所不可為是身暫退而德業益進此顯榮光大之基也可以副衆望矣克述豈久於外哉宋長史輓詩序宣德八年六月八日越府右長史宋君子環以疾卒于官年五十二京師士大夫聞知皆痛惜曰宋君温然君子也冝享福於悠久乃今已矣而謂天道佑善可信邪君吉水人以明經取進士入翰林為庶吉士擢吏部主事陞郎中以至今官其所敭歴久矣而未嘗有違言戾行凡與處者莫不敬且愛焉而予之知君也尤深君事親極孝敬兄弟七人尤相恭愛平居言動必以禮予嘗謂君孝友人少能及一時名公鉅人皆以為然其於姻族朋友必厚而和謙而信其事上也恪而勤其待下也寛而恵皆久而不渝蓋天性然也嗚呼其為人如此其於天道果戾邪果不戾邪而不及中壽以卒其可邪其不可邪孔子曰仁者壽冝也然而有不仁者反久生以賊於世豈所謂造物者莫之省邪抑有時而隂縱之邪此皆不可致詰也則士大夫之於宋君安得不痛惜之哉君少予三嵗而居同郡出同年仕同朝雖各縻於職務不得數相見然得一見即相與傾倒為懽或移時竟日而後去其意氣莫逆也君少時姿貌秀偉眉目如畫及今益豐碩鬚髪郁然無白者而予之衰薾已數年私謂君之福當未艾而今乃先予逝矣嗚呼安得復有相厚如宋君者哉則予之痛惜君其有已哉君之子進士懐奉柩歸葬凡痛惜君者皆為作挽詩俾執紼者歌以送君而予為之序既以著予情亦使讀是詩者皆知君之可惜也南溪曽氏族譜序古者世族大家必有宗法以端其本聨其支則倫理正恩誼篤而可以久且大矣自宗法廢族無所統於是有服盡親盡而相視如途人者君子病之此譜牒之所以作也譜牒之作凡同本者皆録焉明其所自出而謹其所由分尊卑疏戚粲然甚明是宗法雖廢而倫誼不悖者賴譜以維持之也是以君子重之予邑南溪曽氏於今為名家然自宋元以来屢經喪亂譜牒失亡不知其所以徙族之故老相傳宋淳祐中始祖和甫以儒業教授南溪羅氏羅氏貲富甲一鄉愛和甫才行異常人以女女焉於是遂居南溪生子一曰南山字鎮重鎮重生四子曰可翁祥翁仁翁元龍可翁祥翁元龍之後皆失傳獨仁翁四子以德以觀以敬以禮蓋自和甫至是四世矣其子孫日益衆然水木本源尚弗克究知洪武中以德子文昇與諸弟允昇逺昇始得和甫先考之墓於蕨原墓前之石則和甫所題署然後知自蕨原徙乃封表其墓而買田祀焉屬其塾師梁子瑗先生為作譜而終恨失其詳文昇三子某某嗣宗允昇子夣浙逺昇子季宗與諸兄弟遜宗沂宗輩皆注意求之閲陳年簿書得元龍分産契約其所載甚明乃知分自蕨原無疑於是彼之同姓伯瓊者知其不可掩也悉歸其舊業以作祠堂充祀享而自和甫以前不可知不可知則亦末之何也已既而文昇輩三君子相繼卒夢浙兄弟謀曰族不可無譜而譜將以傳信後世吾祖考用心於此久矣今水木本源幸已得其實可免郭崇韜之譏宜㫁以和甫公為始祖而次第書之不可知者則闕焉譜既成寧國府同知鐸持以求予序鐸字廣器文昇之孫嗣宗之子也徃年予家居時嘗識三君子而與夢浙季宗同逰縣庠今又識廣器皆以其才為時用而夢浙已矣廣器輩能脩其族譜以成祖考之志非所謂曽氏之賢子孫哉夫作譜之法不必詳亦不可畧要在實而已眉山蘇氏出於眉州刺史味道然皆失其世老泉先生作譜㫁自其所知者録之不敢加一辭焉懼不信也此作譜之法也今曽氏之譜録其所知而闕其不可知不妄引强附以自誣亦老泉先生之意其視世之誕妄子弟相去逺矣予聞之記曰人道親親也親親故尊祖尊祖故敬宗敬宗故收族此所謂仁義之道也仁義行而孝弟之風興惇睦之俗成尊卑疏戚各安其分而後之子孫又力行仁義以繼續不窮則南溪曽氏將愈久而彌昌雖傳之百世有耀矣予既嘉其譜之成故為序其首簡靜脩齋詩序静脩齋詩若干首士大夫為陳德遜作也德遜居泰和城中與四民雜處其室廬相附如魚鱗車馬之過門者朝夕不絶也然德遜退坐齋中澹薄自守喧囂之聲不相聞時取聖賢之書讀之以求其理以脩於身而見於行事予家居時嘗過德遜相與從容者終日聴其言必依於道察其意蓋知躁舉妄動之辱身而不肯為者也夫君子之脩身豈必靜而後致力哉蓋天下之理無窮惟靜乃能察之故有㝠觀而黙契焉者若物我之相形利害之相感憧憧徃來於得失成敗之途而不知止焉而欲身之脩道之立不可得也諸葛武侯所謂靜以脩身者蓋此之謂矣夫人之生不能無欲有欲則不能不動若其勢得行則於動加焉德遜之弟德遵以進士第一為翰林侍講名聞當時縣之大夫藩憲大臣與朝廷之達官顯人皆知敬且愛也自常情觀之蓋將奔走焉乃安處一室務讀書窮理以脩其身凡物之在外者皆不足以累之此誠非衆人可及也詩曰不忮不求何用不臧然則德遜之為君子也孰禦哉德遵裒諸公之詩而以求予言予蓋知德遜者故為序之使凡讀者有以知德遜之非茍然者也送余侍講詩序古者仕不出其國故親戚墳墓相邇也自封建廢而天下并於一於是仕者離親戚棄墳墓以從宦於千萬里之外至于久而不能歸則父母棄背墳墓失所而抱無窮之戚者徃徃有焉雖曰為國者不顧其私然於聖賢教人之道未盡也孔子曰事親孝故忠可移於君曽子曰慎終追逺民德歸厚矣蓋不能孝於親則不足以致君而善俗為國者亦何賴哉聖賢之言萬世之法也然能由之者蓋寡矣今天子在位以仁逮下詔羣臣之任職者皆用其爵以貴顯其親又詔凡久於其職各以次歸省親沒亦得以致享焉蓋曰吾以勸忠也於是大小之臣益感激自勵翰林侍講余君學䕫以行誼文學有名當時天子既追榮其親錫之勅命矣而余君在任久得歸祀墓下同列之士相與作詩送之而俾予序予與余君同出處者三十年其相知最深君之尊府先生以學行著稱搢紳間而無意於禄仕至君以家學遂大顯先生生得以享其禄沒又得以被其榮則君之孝於親忠於上者豈不兼盡矣乎視昔人之仕而不能歸徒抱戚於無窮者蓋逺矣此可見聖朝仁澤之厚也今君之歸鄉人子弟見之孰不感發興起皆思勉為忠孝以自効則君之所以表勵於當時者豈細哉予故為序其詩而歴道其說如此使誦詩者皆知昔人之失而今之得為可慕也詩凡若干首贈左庶子周君省墓歸文江詩序國家舉封贈之典著歸省之令以嘉恵仕者恩至厚也左春坊左庶子兼翰林院侍讀周君崇述以清文懿行受知於上既追贈其父母皆五品矣去年秋援例請歸焚黄于墓下上不欲其去俾復任事然君之去鄉久矣祖宗墳墓蓋有繫于心而不能已者至是再請乃許之夫君之所以盡其心於國者忠也然而不忘其先而必請以去者孝也上之所以留者仁之至然卒如所請而不違其志者義之盡也於兹一事而忠孝仁義之道著焉昔周盛時為臣者急於王事而不顧其親上之人能探其情而勞之亦可謂厚矣及其衰也有盡瘁於國而上不知父母不得其養而不知恤者觀之四牡北山其政之得失可知矣然則今日明良相逢之盛何以異於唐虞之世哉此士大夫所以歌詠於其行也君永樂初科進士第二人即拜翰林編脩久之以憂去及再登朝為侍講為諭德以至今官不歸者二十年及今之歸昔之㓜者壯壯者老俯仰之間寧無動於中乎以百嵗論之其為二十年也蓋無幾然則周君其可以久去朝廷哉情事既畢即當復来竭為臣之忠以報上之仁忠之盡斯為孝也益大矣予與君生同郡其出也同年其仕也同僚心之所存蓋無不同者故於贈行之詩而為之序如此同心之言庶乎或有取焉贈少傅建安楊公扈從巡邉詩序國家以神武定天下而以至仁撫之是故天地之所覆載日月之所照臨凡有土有民者皆奔走奉貢稽顙闕下今天子丕承列聖德威所臨無間逺邇益効臣節是以内安外順熈然同風蓋太和極盛之時也宣德九年八月上臨朝諭羣臣其意若曰武有七德保大安民其二也况天下既安不可㤀武邊塞者内外之限雖宿重兵以守之其能不以安而怠乎今穡事既成朝廷多暇朕將親率六師以行邉申飭武備庶幾永保無虞羣臣皆頓首稱善乃卜以九月甲申啓行少傅工部尚書兼謹身殿大學士楊公實從公秉德蹈道兼資文武昔事太宗皇帝從容於禁宻之地凡禮樂名物政令施設皆參與其間至於南征北伐指麾號令雖皆出宸𠂻然文告宣布多自公手而北伐之役公未嘗不從故於邉事詳練雖老校宿將無以過之宜其簡在上心而眷遇益至也直嘗觀之周自文武疆理天下繼以成王攘外安内可謂盛矣後世忘備於是遂有外侮宣王中興任疆埸之事者則有文武吉甫焉蓋有是君斯有是臣也國朝大一統之業聖聖相承重熈累洽而猶不㤀武備以保乂萬邦又得如公者左右焉蓋所謂明良之遇也賡歌相成與有虞等矣豈但比隆成周而已哉公將行詹事府少詹事兼翰林院侍講學士王君英時彦等皆喜公之有是行也析唐張說詩禮樂逢明主韜鈐用老臣二句為韻各賦五言詩二章以贈行而直則為之序云陳氏世德録序行在通政使司左通政江寧陳君恭字孟起與予交久矣嘗謂予曰陳氏世為曹人在宋有義甫者官至龍圖閣待制宣和中金人入汴佐李綱城守有功後從高宗南渡至建康家焉故今遂為江寧人其後皆以材武立功勲致禄位歴三世曰執中有文武才積官至都統制爵為開國男生子文德通判溧陽州有恵愛於民子辛之仕元為淮南鹽課提舉政脩名立生五子其第四則我中憲公中行通經博古號當世名儒嘗為江東明道書院山長太祖皇帝初渡江求得之待以殊禮俾㕘軍謀論治道補益𢎞多天下大定屢授以顯官皆不就上知其誠實不之强然所以親厚寵錫之者雖元勲貴戚不過也蓋無日不在上左右其所言者皆正道未嘗以私天下之人多隂受其賜始終尊榮莫與為比此恭之高曽祖禰也惟我先世皆位通顯以光裕後嗣而先公之荷隆眷太宗皇帝亦嘗以諭侍臣至今有能言者可考信不誣恭慮久而或泯自龍圖而下凡有述作以昭德垂光與朝廷制命所以寵終而褒徃者備録成書以示子孫名曰陳氏世德録子為我序之予嘗自謂通政君仕宦三十年才行表然為今世所重其進於福禄榮名盖未艾雖云能自脩當必有啓佑之者乃今得聞之何其盛哉易曰積善之家必有餘慶積之云者蓋累世之德之所加厚者也積之之厚斯慶澤有餘矣其陳氏之謂乎江河之流固有其本而又増益之然後奔放肆大愈久而愈無窮故家大族之所以盛者祖宗積德以啓之子孫務德以繼之也陳氏之子孫考於斯而知先世之德皆思善繼而不忘則所以増美於是書者將百世有耀矣是為序送少保楊公省墓歸南郡序正統六年二月少保禮部尚書兼武英殿大學士南郡楊公以去墳墓之久也請於上得歸省焉一時仕者皆以為公榮直聞而歎曰省墓云者君子追逺之道也古之人皆重去墳墓以為親之體魄所藏不可以無主故重之及列國廢天下歸于一有志事君而行道於天下者豈能終老墓下哉茍有為之主則去之雖聖人不以為異也然旣去之矣其心固未嘗㤀而縻於職務久不得一省焉者則亦未嘗不慊然于心國家著省墓之令盖前代所未有真所謂如天之仁也於是而歸省焉安得不謂之榮哉然直於公之歸有以見上之仁於公也厚而公之德之賢於人也逺矣蓋公事四聖踰四十年皆以文學謀謨居侍近今天子在位圖任老成而公與少師廬陵楊公眷注尤深軍國重事多訪問焉日侍經筵孜孜啓沃非堯舜之道不以陳誠不可一日去左右而公乃切切於是行世之職仕有不如公者反後之非公之德賢於人逺哉而聖天子輟公於倚任之中宥宻之地使得盡追逺之道其仁之厚可知矣於乎舉前所無之令典而於公特厚焉公之所以致此豈偶然哉直從公亦久矣見公之教人皆忠孝仁義之言而其所行不異是誠所謂邦家之光豈特歸為閭里榮哉禮部郎中潘勤輩亦嘗受公之教者於公之行皆有戀慕之意而欲見於文屬直為序之使觀者知公之德而有所興起云女教續編序女德之隆汙家之興廢繫焉教之不可不豫也晦庵先生小學之書取古昔聖賢嘉言善行以為立教之本其訓女子亦備矣有元之時相臺許獻臣又蒐獵經史取其可以示法者作女教之書凡為女為婦為妻為母之道悉具吳文正公謂可與小學之書並傳其用心亦至矣然予聞之易曰君子多識前言徃行以畜其德夫謂之君子則必有師友之資問學之益而尤貴多識則孤陋寡聞不足以成德可知矣况乎閨門之奥内言不出外言不入而欲廣其見聞増益其智識使德立行脩非資於書不能也公務之暇稍覽載籍録前二書之所未録者得若干條㑹稡成篇客或誚予曰女子以柔順為德而以剛暴為戒彼庸奴其夫拂逆其舅姑鬬狠於其里閭此之謂悖人理速天誅而不可與居者也今子取坤文言以剛方訓之無乃過乎予曰坤乾之對萬物之母也女子之德不取法於坤而奚取柔順者體之正剛方者用之發安常處變之道在是矣剛則其守固而不可屈撓方則其志定而不可移易然後柔順之體全夫强戾不生於心乖忤不及於物羞畏隠忍未嘗厲色疾言可謂柔順矣然或巽懦委靡人得而制之依阿茍且之間蓋有失其身敗其家者則剛方之德非女子之所當務者乎彼之所為剛惡也予之所用為訓者剛善也向善背惡智者固能擇焉且人受天地之氣以生剛柔健順皆具矣以是為訓亦因其所固有者而導之耳予言奚過哉客不能難遂書以弁其首贈吏部左侍郎魏公赴南京序君子之仕旣老冝歸矣上之人惜而留之且為遷其官使不至甚勞而得安於其位此豈徒然哉非其行素修才素著有以取信於上下不能也今於吏部左侍郎魏公仲房見之矣公自為教官已用清慎得名遂入太常為博士遷考功副郎擢拜太常少卿其文學政事益見重於天下由是進為吏部左侍郎遷禮部皆宜於其職今年以年滿七十上章乞致仕上察其可用不許旣而南京吏部以缺官為言上念無可任者復命公為南京吏部左侍郎蓋南京根本重地而事則簡於北京特以命公者所以示優禮也於戲公之獲乎上者誠厚矣予嘗觀之周之盛王之待羣臣有勞於王事而不暇顧其親則探其情作歌以勞之是以得人之歡心而治道隆矣至其後世有盡瘁事國而上不之省者此小雅之所刺也上下不交則其為否也冝矣今公旣老且倦乞致仕而去上惜其賢而留之又使之去煩就簡以安佚其躬而享其禄位厚於老臣如此蓋所謂如天之仁周之盛王不過也天下仕者將由是而益勸鞠躬盡力而㤀其身之老焉治道之隆豈成周可儗哉抑聞之古之所以圖任老成者以其涉歴之多見聞之廣道德功業足以重朝廷表後進若今之意亦豈異於古公之所以自待與朋友之望於公者亦皆以古之君子為至也公將行大宗伯胡公輩屬直為文以贈行故為言如此戚畹恩榮録序戚畹恩榮録者府軍前衛指揮使孫繼宗兄弟所輯也孫氏世家鄒平積善累慶至今㑹昌伯孫公與其夫人而益盛篤生皇太后儷體先皇帝誕育聖明以嗣大統德化敷及于中外由是公與夫人皆受封爵繼宗兄弟亦官三品列朝行顯榮光大莫與為比初公自鴻臚屬陞中軍都督僉事先皇帝為易今名及乎疏封追爵三代皆賜以璽書萬幾之暇嘗賦七言長句二篇親洒翰以賜之雲章奎畫華彩煥然凡諸戚屬未有也繼宗兄弟仰惟皇上深仁厚澤所以寵賁者如此真孫氏百世之榮也乃請於公録其副鋟梓以傳且嘗榜其奉親之堂曰具慶又為孫氏族譜以著其本而聨其支士大夫皆為詩若文以美之繼宗又取諸作附益成書以彰上之德而垂耀無窮名曰戚畹恩榮録而俾予序予嘗觀之自古國家之興未有不資於内主其功化之隆既及於天下則殊恩異數必充溢於其家三代逺矣自漢以来外戚諸賢若隂識樊宏輩皆謙虚畏慎守禮遵法篤忠敬之心去驕侈之習循循有士君子之風前史書之惜其家乗不傳而凡上之施鏗鍧震耀於當時者不得以盡見之今公之在戚畹其年既尊而惇德不倦位高而心愈下寵極而氣愈温繼宗兄弟亦受公之教皆好善服義盖欲與隂樊輩匹休儷美而上之所施鏗鍧震耀於斯時者皆備録成書後之人得而讀之其榮盛可考也然予聞之孟子曰仁則榮仁者當理而無私之謂盖不役於已私而行合乎理此致榮之道也孫氏今日之榮其前人之厚於仁可知矣繼之者益勉於仁而加厚焉則榮盛有已哉故因序其書而道之美靖逺伯王公功成詩序予甞觀夫古之命將皆文武之才非特三代盛時為然也周宣中興有玁狁之難而用尹吉甫以其文武具備衆之所法也降至春秋晉侯命將猶以詩書禮樂為上及其論戰亦本於仁義禮信則所尚可知己自是而後文武異途斬伐擊刺獨武將任之而文學之臣不與焉豈能文者不皆習武事邪抑文不適於用邪有唐伐蔡久無功乃命裴丞相度為都統以賞罰用命不用命遂滅蔡當時環蔡皆鋭兵宿將然功必待度而後集則文學之臣豈盡出武將下哉撫師以仁用師以義勝雖在力而制勝在心可以無敵於天下矣儒者之道如此是果不適於用邪亦何其寥寥濶絶也於今乃得見之豈非君子之所樂道者哉靖逺伯王公尚德兼資文武有異才昔為兵部尚書時甞受命總督西陲軍務麾兵出塞千餘里襲殘冦殺之幾盡聲震西北邉自是累嵗無冦患文武之士莫不帖然服欣然喜而誦公之功不置及麓川叛逆久勞師旅而功未成上旣以定西侯蔣公統其軍而復命公總督之將士聞公来勇氣百倍皆樂戰公督衆深入盡破諸賊砦圍其巢穴以火攻兵勢鋭甚賊之脱而走者盖無幾遂定其地而歸人咸謂公無愧於古人凡能文者皆作詩美之盖渢渢乎其言也子與公同業而迂懦不振喜公之功有成而古之道復見也故樂為天下道之雖然是詩也豈獨著公之美哉昔者申伯仲山甫有行尹吉甫作詩送之崧高烝民是也而序者謂為美宣王盖任賢使能以致中興宣王之美見矣今聖明在上知公之賢用公之篤是以有成功則是詩也雖為公而作然謂之美朝廷可也故為序之百世之下欲知今日之盛者必於此有徴焉贈李先生十題巻序正統十二年國子祭酒李先生以老病乞致事上惜其去不許者數矣最後言益切乃許之公卿以下至于縫掖士皆歎曰先生文行為學者師法久矣今致事去使倀然無所依於先生則為榮於諸士子則為可惜閭巷火伍之中則曰是能深知我而有志於恤我者也今則去矣太學諸生服先生之教而䝉其德五六年敬愛如父母自初有疾皆奔走治醫藥及少間則動色相慶至是無可奈何猶相與言於上曰祭酒李某感皇上嘉恵學者之意小大之才多所造就盖前此未有今以老病乞致仕臣等尚願少留之不可退則取其事為十題命良工繪圖求諸名賢各識一言以為贈上亦眷愛之不衰詔兵部為具舟陛辭之日賜鈔一千貫命光禄具酒饌餞之及行達官顯人多先出崇文門外以序别大學師生用彩幣製旗帳各為文詞頌先生之德教坊諸樂工槌大鼓雜以金石絲竹之音喧然前導送者凡二千餘人逺近觀者塞路一時行旅至不得徃來商賈為之廢業莫不嘖嘖稱美以為榮至有為泣下者漢之疏廣唐之楊巨源不能過於今七八十年之間亦未見其比先生獲乎上下如此其美之鉅細可知矣雖然此豈特為先生榮哉他日良史書之後千百年有讀之者足以見今日尚賢之美是所以為邦家之光也於乎盛哉予與先生仕同年荷四聖之德大矣沗竊非分方資輔益以逭負乗之譏而遽舎之去予何恃以立哉欲不戚然以悲可得邪詩曰毋金玉爾音而有遐心予終有望於先生也諸生以十題屬予言故為序而道之送梁憲副序刑部員外郎梁楘叔車既受命為按察副使當之廣西予家與同里且世有連而又同事儒業氣味相似也而可無言於其去耶夫朝廷之置羣有司所以為民也因民之所有事而恵利之使賦斂平徭役均衣食足而生養遂乃其職也世之為有司而能此者有矣其不能者盖多按察司視夫能者而勸勵之其不能者加黜罰焉民庶乎受恵矣然則民之休戚皆繫乎按察司其職任之重豈他司可比哉廣西古蠻夷之地州縣之民不與猺獞雜居者盖無幾彼其凶暴之性習於攻剽殘殺徃徃好出為民害民旣苦之矣朝廷命列侯將重兵以制其出入有肆為暴者則𠞰之亦所以為民也然財力必取諸民而又有惟正之供以奉給公上則廣西之民其生遂之難易可知矣按察司繫民生之休戚而欲使無戚焉在察視有司之能否而懲勸之其寛嚴緩急又可知也則吾於叔車之去安能無望哉叔車學䆳而識明仁厚㢘慎君子也常有志於為民其任重不難矣然君子所行而欲人之服必本於其身不治其身而能治人者未之有也昔廣西初置按察司上命殿中侍御史尋公适為之使先叔祖子啓公與吉水胡公子祺由監察御史陞僉事徃蒞之三公皆光明正大寛嚴有體廣西之人安於其治尋公常曰為風憲官者當先置其身於禮法之中然後能以禮法治人此天下之名言也叔車脩身慎行有素矣予猶為此言者君子之自治當不以久而怠也予之所望於叔車豈止是哉故書以為贈行序云贈侍郎錢公致仕詩序士君子當太平之時遇明聖之君以其奥愽之學英偉之才居翰墨之林任禮樂之司以成茂績收美名及既老且倦矣則致其事而去安止足之分適進退之冝此其人非超邁絶俗不為外物之所移奪者不能也今予於錢公見之矣公在永樂中取進士入翰林以文章為職業凡朝廷有大述作大典禮經筵之講論史館之譔次公皆在其間所以發道德之清光揚功烈之鉅美敷暢人文藻飾治具盖多矣祇事四聖三十餘年寵遇如一日天下之人承下風而望餘光者皆自以為莫及也今天子在位眷用舊人公自翰林學士超拜禮部侍郎其尚書則毗陵胡公而公與臨川王公實左右之三人者皆天下之選當稽古右文之世制度典章煥然大備三君子輔相之功盛矣哉未幾而公以老乞致事上惜其去不許既而疾作不能朝者且半年於是復上章上察其實乃許焉於乎上眷愛於公欲其久留以自輔公明於去就之義不欲以茍冒羞朝廷可謂兩盡其道矣而胡公王公皆惘然不忍别則相與賦詩以道意且俾其屬皆賦焉而屬予序予與公同在翰林久矣以道義相規文學相磨切不啻如兄弟雖相繼去翰林然猶相好如曩時則今之别也予心惆悵豈减二公哉念予之仕昔者與公同而今則甚異盖超邁絶俗不為外物所移奪者公是也沗竊非分而不能去此予所以羞於公而取譏當世者也故因序其詩而自訟焉送南京禮部尚書王公赴任序正統十三年八月廿八日上以禮部左侍郎臨川王公為南京禮部尚書在朝公卿大夫及諸縉紳之士莫不忻抃以為冝盖公之德行文章為望於當時人之俟其進也久矣故其喜若是而予之喜則又加甚焉然亦有不釋然者抑安能無言於其去哉永樂之初予與公同取進士入翰林又同選入内閣任事既同而授官又同及来北京同典制命同脩四聖實録凡朝廷有大述作及恩澤之施皆與公同之盖自翰林春坊累陞至禮部左侍郎其飲食居處於公無不同佳時暇日登山臨水窮景物之勝極觴詠之娱考其言究其心誠無不同於公者四五年来予待罪吏部出入雖不能盡同然經筵之進講政事之當議亦未有不同者嘗竊自謂天之賦畀於吾二人如此雖同氣兄弟不過也於今四十五年矣雖後之沗竊稍不同而有愧於予心今喜公之進庶可以終同而久與處也而乃當别去其何能釋然於懐邪公長予三嵗予甞以兄禮之其教益予者豈獨文藝之事哉裁其過補其不及俾歸於道之中而幸少有立焉今老而益愚有負乗之譏素飡之嫌而公乃舎去則自今以徃予行或違道誰能引而歸之中言而有失道誰能啓予之蔽哉予雖欲釋然安得而釋然邪抑聞之君子相輔以道不以逺而或間也教言時来使得服膺而行之亦庶乎可以寡過矣詩曰毋金玉爾音而有遐心此予所望於公也故書以為贈行序建安楊公文集序國朝既定海宇萬邦協和地平天成隂陽順序純厚清淑之氣鍾於人於是英偉豪傑之士相繼而出既以其學賛經綸興事功而致雍熈之治矣復發為文章敷闡洪猷藻飾治具以鳴太平之盛自洪武至永樂盖文明極盛之時也若建安楊公者其可多得哉直在鄉校時聞公領鄉薦第一名譽赫然思欲識公未能也太宗皇帝即位之明年直亦取進士選入翰林俾盡讀中秘書學古為文詞而公已在内閣典辭令職論思所與共事者六七人皆天下之望又後二年直再被選拔得從諸公後諸公不以直為愚而皆辱教焉聴其所言而觀其所存信一代之偉人也而公復以達政務善應變最為上所親任凡制馭逺方飭師旅撫順討逆慮邊將有不能辦者必命公徃圖之公决機發䇿皆適其冝上躬御六師清沙漠必命公從行所以賛㐮禆益為多其在朝廷朝夕侍左右圖議政事以安利兆民而人盖隂受其賜間為文章歌頌聖德施之詔誥典册以申命任事與凡官署民居所以施政教適性情而欲有所紀載孝子慈孫欲銘著其祖考之美以垂諸不朽者多請求於公公皆有以應其求其學博其理明其才贍其氣充是以其言汪洋𢎞肆變化開闔而自合乎矩度之正盖渢渢乎盛傳於天下得之者不啻若南金拱璧寳而藏之而今不可復得矣直在翰林三十七年辱與處者盖多惟公相好為最深盖自永樂以来親見上之所以教養拔擢而知其意欲有所用也故既處之要地使習知其故至於四朝實録與夫大典禮大述作直皆與其間及直之去翰林惟公深惜之而反為忌者所病夫士之進退出處有命焉非人力所能勝奚以為哉公之卒也直旣為作傳載其行事之大者以備他日太史之采擇至是子恭類次遺文若干篇將鋟梓以傳又屬直為之序於戲公之文豈待序而傳哉獨感公之知有不能已於言也故序諸其首簡公賜名榮字勉仁歴官至少師工部尚書謹身殿大學士贈太師謚文敏云贈蕭憲副之雲南序蕭憲副仰善名晅世為泰和儒家予生也後不及見其前代文物之盛猶幸及見仰善之祖尚仁先生道明德立學問淹貫一時賢俊師尊之隠然名動朝廷其尊府長史君亦以明經淑後輩仰善得家學之傳遂取進士官吏部再遷為刑部郎中其德性之淳政事之善非獨僚友推之凡知仰善者皆以為鮮及也㑹方面大臣有缺詔三品以上舉賢而任之刑部尚書金公言於衆曰今之賢才如吾蕭郎中者盖甚少吾固惜之而不敢蔽也衆皆曰然遂以聞上命為按察副使予聞之蘇子曰天之相人君則必以賢才遺之是固然矣然非有詩書之澤浸灌涵養之久則亦莫之能賢也豈偶然者哉今仰善去雲南雲南古蠻夷之域也雖服聖化久矣偏州下邑其猶有循夷習者乎以蠻夷之故而寛之則廢法一以中國之治治之則傷化仰善於此必有以處之者然予之情亦安能已於言乎昔者仲山甫之有行也尹吉甫作詩送之稱其德之美則曰柔嘉維則論其行之善則曰柔亦不茹剛亦不吐不侮鰥寡不畏强禦予以是贈仰善不亦可乎且其質固相近也夫謂之柔嘉則剛暴以殘民者無矣柔而不過其則則委靡而縦惡者亦無矣如是而又不㤀乎學問之懿進脩之力令善著於外恭敬主乎内將肅肅之命以成明明之功則於仲山甫豈逺哉世之君子過於用剛者多矣而予則有見乎此其無乃不知所務也乎仰善慎擇之而已梁先生文集序梁先生之沒既二十五年其子候官令叔䝉刑部員外郎叔車編次遺文為十六巻屬直為之序直與先生居同里且有連少從先生逰而辱教為多其何敢辭先生於泰和為儒家代以文學顯至先生尤俊邁不羣甞從先叔祖僉憲公子啓受詩經而其伯舅陳公仲述亦以古文有盛名先生皆獲承教凡經史百氏之書無不究而於左氏傳司馬史記班固漢書毎注意焉性命道德之奥文章著述之妙多其所自得而充之以竒氣發之以逸才沛然莫之能禦遂以文名縉紳間同㳺雖多獨與少師楊公士竒最相好有麗澤之益永樂初脩高廟實録先生徴自縣令與執筆其間據事直書精切詳雅書成授官翰林及脩永樂大典又命先生為總裁該貫古今細大畢録時太宗皇帝在位德化大行天下清寧民物咸遂華夏蠻貊罔不率俾和氣充溢嘉祥荐臻文學侍從之臣皆形諸歌頌及朝廷有所述作先生與二三閣老實冠絶一時四方求文字者必求之先生盖先生之文温厚和平而豪壯迭宕之勢寓焉如江河之流汪洋衍迤一與風遇則波瀾勃興魚龍百怪出沒隠見可喜可愕真當代之傑作仁宗皇帝在東宫監國雅知先生而親任焉甞賜詩以寵之先生孝友忠信平易正直而言行必由道其在侍近夙夜敬恭竭誠無隠凡所言於仁宗者皆本於仁義他非所及也竊甞論之天之生賢以文行名世如先生者實闗乎世道不偶然也當國家興運之初清明純厚之氣始復而先生得之以生加以世澤之隆師友之懿篤志力學遂為名儒鋪張肇造之洪休賛詠繼明之偉烈勒之金石傳之後世而其餘力又以足夫天下之人之所欲於乎是豈偶然者哉先生名潜字用之泊菴其號也初舉鄉貢進士為蒼溪訓導以言天下大計擢為令歴四㑹陽江陽春皆有治聲遂入翰林為脩撰陞侍讀兼春坊賛善而終孟子曰誦其詩讀其書不知其人可乎是以論其世也直故詳而書之以為文集序使讀者有考焉送周尚書致仕南歸序予友工部尚書周公恂如廵撫南京畿内及浙水諸郡久矣殫心竭力思所以利國利民不知其年之老而身之病也然猶憂勤不少懈天子聞而憫焉俾致其事以去公旣得榮歸故鄉士大夫素相厚者皆為喜徴予言以贈行予甞究公之心而迹其所為有以知其甚難者蓋廵撫之職以安民為本而亦以賦税為務此國之大計公之所履上之所簡任也天下諸道人民之衆賦税之重蘇為首松次之他郡又次之其難可知矣為細民者皆盡力以輸税而不盡以歸公上盖有為之蠧者自昔以来積逋至累百萬惟俟恩霈而免焉俗習既久以為當然至公則思所以除其弊糧税之入必稽其正耗而悉徴之雖大豪不少貸於是而通制其冝出納有法輸送以時幾二十年無龠合負者積其竒贏命主守者謹視之凡恤民隠供軍需脩公廨學校橋梁諸務應取給於民者皆不取惟於此取焉民知輸税而已他一無所及嬉然皆得以安其生議者謂蘇松諸郡之民能無失業亦無負租僅於公巡撫日見之則公之功豈少哉夫天下之事必用天下之才有才足以任事矣然顧計利害重愛惜其身而不肯深任焉卒使事功不立而上下或失望則為天下者何取焉公不為身謀而專意為國其所建立表然在人耳目君子論當世巡撫之賢莫踰於公而歎夫繼者之難也然予於公則有難為别者永樂之初同取進士入翰林今四十八年當時同列惟予二人在予尤老病乞身者屢矣然皆不許而公乃得先徃焉則予何能釋然於心哉雖然聖德如天曲成萬物予之朽質豈不在一物之數邪雙崖之下從公㳺有日矣故書此為贈使人知公之非茍然者而亦以致予意云泰和陳氏族譜序應天府丞陳公宜重脩其族譜旣成書矣因予子䆅来北京屬為序陳之苗裔盖本於有熊而蔓衍於天下其自金陵徙居泰和者繇唐大理評事暉始至于今二十缺世將六百餘年子孫散處邑中盖繩繩蟄蟄他族罕能及之自古大家世族必有宗法以屬其子孫使悠久而不紊迨宗法廢而族無所統於是有譜牒以正其本聮其支此尊祖睦族之大者也尊祖仁也睦族義也尊祖睦族而仁義之道行焉陳氏作譜屢矣而族屬之多生息之繁徃過来續有莫可勝旣者不詳究而備書則將有若塗人之歎此公冝之譜所以不可不作也陳氏之族盛矣自祖宗視之其初本一人之身正倫理篤恩義當何如其至也則凡同出於一源者雖有尊卑貴賤貧富之殊豈可畧而不書畧而不書非祖宗之心仁義之道也昔之作譜盖有畧者矣公冝其加意於是哉予甞觀之陳氏之前輩長者多以宦業著而自科目顯者尤多至於六七十人而未巳此詩書之澤仁義之效也予二族世有連其所以期望者盖逺且大晉范宣子自謂保姓受氏歴虞夏商周之世旣久而益顯自以為不朽矣而魯叔孫豹謂之世禄非所謂不朽所謂不朽者在乎立德立功立言立者卓然示法於天下後世而不可泯者也公宜為此譜其尊祖睦族之心厚矣尚亦勉其所立哉茍陳氏之子孫而皆勉之則此譜傳之百世有耀矣故為序諸其首湘江雨意圖詩序錢塘戴文進雅好竹甞於竹間作室以居自謂不可一日無也及来北京而土不冝竹居閒處獨盖未能忘于心其友夏仲昭輩欲娱適其意為作三圖長皆踰二尺而蒼然玉立隠見於烟雨空濛之中有瀟湘千里之勢焉名之曰湘江雨意文進甚喜曰凡吾之託好於竹者欲適意焉耳今得此意亦適矣何必眷眷於舊哉少保黄公為之記士大夫多為賦詩文進持以求予序予與文進同其好者也予家泰和城西溪上舊有竹萬竿先大父作亭處其中當時名公歌詠之嵗久蕪廢近稍脩復舊觀鬱然可樂也而予乃竊禄京師不得以嵗月處焉其徃来于懐盖亦與文進同也今年於私第作小軒名之曰水竹居求仲昭作巨幅置壁間公事之暇飲食起處必於是宛然故園風致也兹復於文進見之然則使予二人居京師而兼有林泉之適者非仲昭之力歟雖然古人之託意於物者兾有益於已也故君子於竹儗德焉以其清虚勁直可尚已能取諸物以求益雖似猶真也不然雖真奚適哉故予於仲昭之畫盖以為德之勵而不敢忽焉文進與予同其好亦必與予同此心者矣故為序其詩而相與道之送曽用礪序用礪予友也其家縣北門而予家西門相距僅五里許予年十六七數與其兄弟徃来及仕而暫歸其交好益篤淡而不厭居間無事相與論前言徃行或登高閣臨清流遐觀逺覽以自快興有所適則超然忘返其意氣莫逆也予来京師盖久用礪處鄉邑其跡雖踈而心未甞變今皆已老矣間甞自謂用礪之祖父皆惇厚樂義其田園池沼雖不若王濬仲石季倫然視中家之産或過之於養老慈㓜賓祭婚冠諸用可不求之外而足况又當太平之時聖天子在上以仁育萬方常賦之外科徴力役無一毫及民者用礪於此時有以足乎内而無憂乎外優㳺閭巷之間其樂可勝道邪然獨計之用礪今年已六十四屹然前輩長者也向之交㳺今多不在用礪所與為樂者無幾人然處善循理忠信之士盖無時無之用礪擇而與之㳺則庶幾能長有其樂矣予長用礪一嵗而衰病日加誤䝉大恩才不稱位夙夜憂懼不敢自寧思殫心竭力以圖報萬一然後乞身而歸復與用礪杖屨逍遥從田夫漁父醉醲飽鮮擊壌鼔腹咏歌聖化以傳之後世使知今之盛治足以繼唐虞盖天下之樂莫有加於此用礪之心當必與予同也予與之别又二十餘年今一見而遽去有不能已於言者故書予意如此以送之龍洲魚浦之間用礪其徯予来也抑菴文集巻六
