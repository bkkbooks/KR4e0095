body:
  text: 抑菴文後集巻五明王直撰記重建宋丞相李公祠堂記宋自紹聖以來君子日否小人相繼用事至宣和極矣上之人既無道揆一聽其所為天乃出災異以譴告之而猶不悟君臣上下肆然自以為得志於是交遠方開邊釁及疆塲既隳敵騎向闕而小人猶排忠直誤國家靖康之禍有不忍言者當是時燭事於未然奮力於已然志雖不就忠則有餘者丞相李公也公諱綱字伯紀邵武人宣和初為左史京師大水公謂有敵國兵戎之變即上章乞戒備㡿為縣迨敵人至上欲避而東且割地以求和公時復用言祖宗地尺寸不可棄力賛城守而以身任焉屢出兵敗敵小人間之遂罷衆相與爭得復畱敵既敗上下恬然不復理邊事公獨憂之數陳備邊禦戎之䇿不聽又為小人所沮出巡邊未幾罷不用建炎初起公為相即上十議誅僣逆以正人心務治内攘外經理兩河圖復京師還二帝事方就緒復為小人所䜛輒罷㡿自是益逺去而中原失守偏安之勢成矣公雖去朝廷然惟知納忠不以禍福易意事有益於國者無不言而言輒不用且卒於不返嗚呼公之用舍生民之利害國家之安危繫焉此宜為君者所倚任而乃使小人之間得行何其厚於小人而薄於君子也方其罷而復留太學諸生都城之細民皆知公之忠其後凡使至北北人必問公安否公之所存見信於下人與敵人而不見信於時君豈非其蔽之甚哉或以宋之不振歸諸天直則以為人謀之不臧於天何尤焉淳熈丙午教授永嘉徐元德立公祠於郡學講堂之左後燬於兵景定中郡守方澄孫剏樵溪書院以祠公元至正辛巳邵武路同知萬布哈移剏於郡治東南樵溪五曲之上洪武初以書院為府學祠堂遂廢正統已未郡人上官佑為弋陽令歸以公祠事請於郡守嚴陵徐侯述侯欣然從之乃復建於故址而與縣僚屬及諸士大夫修祀焉行在户部侍郎吳公璽亦郡人俾直記其事直謂公之忠誠載之國史傳之天下後世為君子者必當起敬起慕而取以為則焉鄉郡人士邇公之居而思公之迹其於感發宜尤易况拜公之祠瞻公之像為親炙之乎徐侯之為此上官令賛於初吳公欲有示於逺是三賢者皆尚德之至且有風勵之意焉詩曰髙山仰止景行行止邵武之士誠能如其意將不皆為君子矣乎故為之記俾刻之廡下以俟江西布政使司官署題名記昔我太祖皇帝既受天命有天下乃大正庶官緝熈鴻業洪武九年以外有司不可仍稱中書命改為布政司置使以長之使左右各一員皆從二品叅政二員從三品又置左右叅議二員從四品必擇賢任之不輕授匪人朝廷命下則布政司長貳相與審其宜宣其力夙夜匪懈而奉行焉為上為德為下為民有以獲乎上有以恊乎下官賞行治效著矣歴代以來因革不同而未有易此者江西昔建署於南昌蓋晉唐刺史節度舊治元改為行中書省國初仍其舊至是乃正名為江西等處承宣布政使司其地據荆揚之交湖江之表控帶閩廣嶺嶠聨亘風氣之完固人物之阜蕃禮樂文章之博習聰明才俊之奮興視他道莫先焉故官於此者文法之施操舍之緩急使民罔不宜焉者誠非易能也是以當時所用必求德足以服衆才足以應務者當其任迨今百年江西之為左右布政使者三十人左右叅政者四十二人左右叅議四十五人其間以剛毅著稱以寛大得名或深沈有容或廉介有守直諒通敏秉公持正者蓋多焉由是陞任六部陟臺憲位列卿比比有也上承天子下理庶民豈可茍得哉初布政司在子城内永樂元年改舊府治為之宣德十年布政使孟桓乃新作於章江門裏正統九年布政使吳潤又撤後堂而新之甃月臺䕶以石䦨拓其舊規整然盛觀至是孟公已去位吳公亦歸老矣而崔公恭宋公欽皆為布政使實來繼之以清明忠厚之懿念職任崇顯之極叶德一心以修諸己睹前人之遺蹟思後人之紹承徃者勞瘁以興事功而人每忽忘之則後之繼者孰肯為逺大之圖哉歲月如流人心易怠宜有所紀載以勸能者乃命厥屬歴考前人所履之實其嘉言善政遷改更代凡可備他日太史氏采録者則記之不然則闕焉將以鑱諸石垂乆逺示勸戒不亦君子之道哉予老且病歸卧田廬而屬為記乃為書之予聞帝舜之命牧也拳拳養民之務而及於親君子逺小人以成至治之美今之布政有虞之牧也聖天子簡任之心猶帝舜之心也羣賢彚進各率其職前之任者既恭承而勉行之因其才力之所至而著其效矣雖或淺深厚薄之殊然所以獻於上者豈無意哉得失之辨是非之公亦有不可冺者後之居是官登斯堂而覽斯記者尚思繼美於無窮哉髙空山遺詩記建昌城外有三山髙空其一也山勢雄拔秀整上出霄漢而下臨城中一郡之望在焉宋工部侍郎聶公子述世居之侍郎曽孫銖字積道隠居行義不求聞達自號髙空山翁郡人稱之無異詞蓋亦以為一郡之望也當時畫者羅稚川為作圖名公鉅人如虞文靖掲文安輩歌詠之於是翁與兹山皆名聞於天下世殊事異翁之子孫無復存者詩亦散失殆盡惟虞掲二公之作與稚川之圖賴翁之孫婿鄭伯章甫寳而藏之至今人猶知有髙空山翁者以詩在故也伯章甫之孫全翁之彌甥也慨念聶氏昔盛而今衰思承其大父之志而傳之於乆使翁之名託以永存而不墜乃命其子吏科給事中悠請予文為記予謂古之君子之有立於世豈必其子孫而後傳哉蓋好德之心人所同有也是以君子不患其無傳患其不能有立傳曰言之不文行而不逺太史公曰閭巷之人砥行立名者非附青雲之士惡能施於後世翁之髙潔不汚而以道義相尚所立既偉矣虞掲二公皆貴顯於朝廷其文又最髙而皆為翁賦之則既得所託矣雖無子孫其傳可必也况有伯章甫之賢哉伯章甫既賢其子孫又賢而能成厥志則其傳有已邪翁之名託二公之詩以傳鄭氏累世好德尚賢之心亦於是而見文之不可以已也如是後之人尚思善繼於無窮哉是為記琴意軒記廬陵劉孟陶居㕓市之中而不混於流俗凡世人之所好者皆不以動心而獨好琴嘗闢一軒置琴其中惟賢士大夫得相與樂於此興有所適援琴而鼓之蓋超超然自得也因以琴意二字掲於楣今年予内弟歐陽士則來北京為予道其事而屬予記予曰賢哉孟陶此其所以為君子也夫琴之制法六合象四時則九象應八風其用之妙至於動天地感鬼神鼓舞羣動極矣然琴者禁也所以禁淫去邪修身理性而反其天真者也名琴之意蓋如是致其用之妙惟盡其意者能之古之人未有不盡其意而能妙其用者也去古既逺新聲競奏師㳙司馬之徒至以此蕩人心而滅天理彼惡足與言其意哉迨乎後世又有耽嗜俗樂而斥琴聲以為穢者嗚呼好尚如此何怪乎人心之乖而政治之下也孟陶於他無所欲而惟琴是好足以見其情之正矣既善其聲而又取其意其欲禁淫去邪修身理性無疑也然則孟陶之為君子孰禦哉予之於琴蓋亦知好矣然未能善其身而徒言其意他日乞身南還當過孟陶請益焉髙山流水之音孟陶為予鼔之猗蘭之操予將為孟陶奏也孟陶可老於是軒而已哉西墅記西墅者蕪湖令王維用持之别業也王氏世居泰和南富為大家而用持有賢名其令蕪湖以寛厚平易為治民德之既而遇憂歸以族屬之繁而居址之隘也乃作屋於舊宅之西一里許前俯田疇後臨池沼而左右皆有山用持率諸子居其中治稼穡足以飽朝暮畜鱗介足以供漁釣倦則登髙以望凡川陸之紆迴景物之明麗逰人行侣之去來又足以當圖畫之玩既夕則焚膏火出家藏古書相與講求其義而服行之其心甚適也因名之曰西墅服除來北京改巴陵令謁予求記曰維之治此將欲傳於乆幸有以恵教之使知可乆之道予謂墅者田廬子以西名者因其地也若可乆之道當亦於西焉求之夫西於天之四時則為秋於人之四德則為義因田廬之在西而以西為名豈非望其有秋而欲勉於義也乎欲望其有秋則必隨地利順天時盡耕耨之宜而不失壅溉之節則秋之成充然而有餘於粟矣欲勉於義則既足於家而必推以及人使鄉黨州閭無凍餒失所者則德之立裕然而有餘於義矣粟既盈義既充則長有此墅可必也予嘗觀於世之人治田而鹵莽不能盡其力慕義而暴戾不能篤於行天之報之亦必稱其所施腴田沃壤髙門大宅有不能終其身者而何乆之云哉子雖為此而方有民社之寄不得常處於是所以善繼而長守之雖有子若孫要亦本於其身今之巴陵推其所立以立人使凡為民者皆安於治田樂於為義莫有不遂者則德立功成而長保其禄位豈特長有此墅而已哉充而大之將又有盛於此者焉用持喜曰先生之教是矣維敢不勉故書之以為西墅記上源塘記上源塘在泰和縣東北十五里楊孟辯之所居也永樂壬寅十二月孟辯修治此塘以磚石甃之而予適至其家則邀予周覽而相告曰此初吾家之别業也吾世居泰和城中五世祖應真登宋端平二年進士為理定縣簿既貴顯矣至吾祖與吾先人始樂山水之勝而於是居焉至於今五世矣登髙而逺望之其鬱然深秀者則吾先人所植之山也其附於山沃然而可稼者則吾先人常稔之田也其窪然以深而黛蓄於逺近者則吾先人所蓄之池也至吾兄弟又充廣而増益之然豈以是而臨一鄉哉吾又築室於故居之西亦將退然以自休矣兹所以修治此塘者蓋以其源之深靜有本也餘流溢去達於山下又益以衆泉清凉滑甘冬夏如一其上跨以石橋凡吾之出入與賔客之徃來吾家者皆由於此今將廣其址為大橋上覆以亭左右為欄檻置座焉使行者有所憩息惟吾楊氏之所見稱於鄉邑者人必以其地表之而稱之曰上源塘楊氏不修之亦何以稱名哉願先生為之記以示後人俾勿壊予謂古今山水得名者非可一二數也潭州之東池得戴簡而後彰真州之園池得許子春而後顯其他因人而著者蓋多而泯然無聞者亦不少也吾邑之名源塘有二而以上下别之此則著聞如是則彼之所以不聞者豈非無其人哉雖然孟辯於此不以修治而後重也其美有足稱者蓋孟辯有母年七十餘尚康强無恙孟辯特為一堂以居之衣服飲食寒暖疏數之節必親調侍不忍去左右而其親安焉其兄弟三人最相愛兄孟逺弟孟恒皆早卒孟辯撫其諸子如已子而其諸子事孟辯一如所生一門之内穆如也其孝友之道如此則上源塘安得不著聞也哉使楊氏益修孝友之道愈乆而不替則和氣之所感召將見魚鳥之翔泳於其中草木之生植於其左右者亦皆順適其自然之性而無喧競夭折之虞豈獨見重於人已哉故為記之以示來者亦因以俟其成焉御書樓記前年秋天子念民生之不易水旱之無常不豫為之備則將有受其饑者擇在廷之賢臣俾督諸有司發府庫之財以益倉庾之粟使雖有災而民不告病郡縣民有好義者能出粟佐官當旌表而給復焉監察御史薛希璉奉命至廬陵廬陵之民感天子之仁而競以義應於是周怡恂友與其姪仁俊各出穀二千石以歸有司置倉貯之官自出納恂友今工部左侍郎恂如之弟而仁俊其子也希璉大喜曰周公巡撫畿甸及浙江諸郡布上之德以恵養斯民斯民愛之如所生而弟與子又能施恵於鄉里仁義萃於一家如此其賢哉即具實以聞上嘉之遣勅旌為義民勞以羊酒復其家恂友既拜賜作樓於其居之西北而寳藏焉名之曰御書樓及來京師屬予為之記予謂仁義之理原於天具於人心必將發而應於外惟所以感之者何如耳今聖明在上篤意養民心之所發純乎仁愛之施蓋惟恐一夫之不得其所是以詔令之行人皆作而應之下之好義由上之仁感之也傳曰堯舜帥天下以仁而民從之此之謂也然世之以義動而力能如志者得一二於千百已多矣獨周氏有二人皆䝉朝廷之寵命而表然為郡邑之望非其得於天者有異蓋得於家者非衆之所及也周氏故大家其先祖豫章公嘗買田萬三千石収其利以佐常平遺安先生當元季兵荒之歲煑粥以食饑人生者有養死者有藏今侍郎公又有恵於東南之民甚厚恂友之義雖曰感上之仁其世德亦有以啟之也故予為之記此樓必推原其本而牽聨書之使恂友子孫觀之不忘褒嘉之美而思繼述於無窮若他人之觀乎此者亦將有所興起也克復堂記旌陽令宋常固既請老而歸介中書舎人金輔伯謁予告曰常固世家新淦之金灘元季之亂先廬皆燬焉大父梅溪稍復修治以居先考宏善嘗慨然欲有為㑹以賢良徵弗克遂常固昨為龍川令以憂歸念前人之志未就也乃治舊址作新堂崇卑廣狹式中度程少保金先生喜其能復舊觀名之曰克復堂且屬翰林編修朱孔昜為題其牓凡宗戚之㑹合鄉閭父老之過從四方賢士大夫之徃來皆得以樂於此而吾之子弟朝夕趨庭下亦得聞詩禮之訓習衣冠文物之華庶幾不失其舊然未有記何以示後人使善繼勿忘敢請於先生予觀昔者君子之營居室也皆以繼前人而傳後嗣雖百世未厭然事變之來有非智慮所能全者向之髙門大宅化為煨燼莽為丘墟者何限至或子孫不能守而他人有焉亦多矣惟前之作者德修於身及於人則天必佑之隳廢之未幾而興復及焉以有子孫之賢也若宋氏者豈非然哉予聞梅溪務德好施而宏善甫深於易雖應徵辭不仕以所業教授鄉里常固取進士為縣令昔在龍川能興學教諸生其德皆有以及人今之堂搆可以見其繼述之孝子孫世襲厥美則亦可以永保於無窮矣抑予聞顔淵問仁孔子以克己復禮告之蓋嘗有取克復名堂者而非常固之所以名也然此所謂克復者乃求仁之功誠從事於此則心德全而足以及物於傳世裕後何有哉此常固之所知也願相與勉焉齊夀堂記旴江程氏故大家在宋之時以宦學顯聞而楚國公鉅夫又大顯於元其德業聞望表然為當世重臣孟麟則楚國之五世孫也淳朴謹愿凡其言行鑿鑿乎必依於理鄉人皆歸其德而以善人長者稱之其生以洪武庚戌至是蓋七十矣其配夏氏亦與之同德而年既七十一皆康强無恙孫曽滿前備物而敬享焉今年七月缺日則孟麟始生之日也其子羽為吏部司務喜其親之偕老而得以食其禄名所居堂曰齊夀之堂因吏部主事黄振宗求予為之記振宗於程氏有姻好而致事歸其鄉羽意蓋託於文以致其祝頌之意焉夫夀者五福之首也惟有夀然後能享諸福古之君子於其所敬愛者則必以夀祝之况子之於父母極其所敬愛則所以祝其夀安得不極其情之所至乎然德者夀之本也洪範所謂五福而必本於攸好德故詩人於南山有臺之篇既祝其夀矣而必曰德音不已焉非以為有德者必得其夀與孟麟夫婦皆以七十之年而食其子之禄與諸子孫之奉養此蓋德之徵也而又致其祝頌之意焉則偕老於斯堂而受其福有已邪然予考之庚戌之歲我太祖皇帝即位之三年也海宇寜一德化大行至和之氣至仁之澤萃於民物也厚矣孟麟夫婦以積慶之家而生於盛時既鍾其美矣列聖相繼所以正其德而厚其生者又益盛焉宜其為太平之人而享悠乆之福也予故為之記而推本其說使人知其致此者非偶然也百歲之乆其尚有徵於斯言哉靜學齋記吾友樂象明作小齋於其居之西南深邃靜宻窮經史於其中象明以推擇為弟子員間歸省其親問安視膳之暇則退而學於斯喧囂塵襍有所不能及也因名之曰靜學中書舍人陳登嘗為予書此字因以遺之象明復求予記乃為之言曰君子之所以經緯天地彌綸萬化豈有異哉成於學而已矣蓋天地之所以覆載日月之所以照臨山所以峙川所以流雨露之所以沾濡風霆之所以鼔動鳥獸草木之所以榮悴消長鬼神之所以變化與夫人事之所以洒掃應對吉凶婚祭軍賔蒐獵居官治民事親敬長萬事之作止莫不有道焉通乎此則措之無不宜施之無不達是以君子貴乎學也然理無形而難知蓋其大無外其小無内故欲窮其廣逺而究其宻微則當潜心以求之專意以察之彼馳騖於膠擾利害之途縱肆於是非予奪之域求毫髪之幾乎道有不可得矣是以為學貴乎靜也此書所謂惟精惟一易所謂黙而成之者與象明禾溪故家其祖大成好學能詩與予大父竹亭先生逰其尊府貴美又讀書知道理表然為鄉之望而象明聰敏才俊又足以世其家誠能靜而學之則他日達而行之其功業之盛蓋有不可量者矣予既有世好故為之記象明其亦勉其大者哉忠孝堂記君子之行於已者蓋有其道矣道所以為君子者也行不由道而欲謂之君子其可哉然道之行必自近始近者何事親是也道既行於近矣則又推以及諸逺逺者何事君是也親者身之所由以生君者身之所賴以養故事之如一孝以事親忠以事君此為人子為人臣者之節也君子之道豈有加於此是故君子之於親奉其口體樂其志意立身行道揚名於後世以至於成其親而後為孝之大其於君也修其職敬其事為上為德為下為民以至於堯舜其君而後為忠之至故曰忠孝之道君子所當自盡也抑嘗聞之父子君臣皆天理民彛之大者不可以殊觀故為忠為孝非有異道也孔子曰事親孝故忠可移於君曽子亦曰事君不忠非孝也而世之欲求忠臣者則必於孝子之門蓋能孝於親未有不忠於君是故君子必兼盡其道乃可謂德之成而人之觀君子亦必於是取焉然則有能務乎此者其為君子孰禦哉予親戚梁叔䝉為福之侯官令詣予言其郡推官張斌氏之賢曰是欲竭忠於君致孝於親者也始為監察御史改今官敬以自持勤以修職惟恐或負乎君而忝乎親時人不特推其能且多歸德焉名所居堂曰忠孝示不忘也願求一言以相其志予嘗師嚴君平與人子言依於孝與人臣言依於忠若推官者固予之所與也兼盡其道而無愧於古君子又豈非予之所深望哉故為之言使掲於堂之壁以為記而日覽觀以自勵也長溪别墅記長溪在泰和縣西五六里其南為白石塘塘上山谷諸水皆匯於塘中溪則引塘水北出折而東注以溉田受其利者凡數千畆餘流復東注可十里許入於江故曰長溪梁林叔干别墅據溪流始發處溪旁多良田皆其故業叔干朝夕課僮奴致力焉粳秫菽麥黍稷諸種皆樹藝溪有茭蒲荇藻溪之外山麓多美薦馬驢牛羊魚鼈鵝鴨之類縱飼其間皆博碩肥腯生育而不窮凡祭祀賔客養老慈幼􅃣婚慶弔諸用不外求而足其弟叔修讀書為士人而亦以農為業叔干則諷之使篤意學問而以餘力兼理焉暇則相聚談笑講論修身齊家厚族姻和鄉里當何如于于然樂也今年叔干來京師以長溪别墅請予記曰此農舍也豈有髙明宏逺之觀哉世之所謂豪傑者有殊絶之智卓越之才其所經營皆非常可喜之業視兹事不屑也而林卑卑然為之惟恐有不給愚不知其孰髙孰下將務此以終其身願賜一言以示後之人俾善繼之永勿怠叔干予王氏之彌甥而叔修予婿也予何可愛於言夫農非鄙事也古之大賢君子多出此焉惇本尚實以養其良心而學以益之德由是進才由是充而治天下之本立矣舉而措之不難也叔干之為此誠善矣尚益勉盡其道哉勤稼穡之成力詩書之習父子兄弟以古人之所務者服而行之孝慈友弟之道成於身刑於家達於鄉黨州閭充而至於仁義不可勝用雖或不行於天下然謂之大賢君子奚愧哉人而謂之大賢君子亦足矣用是掲之屋壁以為記叔干勉焉予諸子皆志於農叔干皆以是諭之而相勉以至於成此予之所望也孝友堂記予邑楊氏為故家今居上源塘者宋理定簿之後也孟辯以貲雄一鄉於是長其鄉粮賦今年其子廷選督運來北京謁予告曰生不幸蚤失慈母今幸有父與繼母在堂生與兄廷暹弟廷遨廷遂廷述朝夕得奉養焉顧所居堂宜有名因名曰孝友之堂敢請記於先生予嘗識廷暹恂恂恭讓甚愛之今見廷選不異其兄又聞其名堂如此可謂楊氏之賢者哉乃為之記曰天之生人皆有五者之德而仁為首仁之道孝友為首是孝友者百行之本萬善之端也故成周以德行教人而孝友先焉凡君子之自修者亦莫重於此此之不務則人道之大缺矣其他雖善奚貴哉抑嘗觀夫先儒君子之釋孝友之義矣蓋曰善事父母為孝又曰善於兄弟為友為之善者自起居應對之微以至成其令名全其懿親一言一行無不曲當於理之謂也成周逺矣孔門之所以教者簡册具在子之兄弟嘗誦習之其亦勉盡其道哉夫養其口體和其顔色人之所易能也然必宜兄宜弟使父母之心安樂之立身行道使人稱為君子之子然後為德之成慎毋以其易者自足也周之君陳其功業盛矣而孝友之稱見於書尹吉甫之友其為公卿大夫亦賢且衆矣而孝友之張仲歌於詩由是觀之聖賢之重於此可知矣非功業爵位比也子之兄弟其加勉哉他日所立能無愧於古人則豈獨楊氏之光蓋將為鄉邑之重也予雖老尚庶幾見之草池記樂君季美泰和禾溪故家也其先蓋以詩禮聞於鄉乆矣君丰神秀發襟度夷曠翛然無塵俗之累乃作退庵於其居之西而佚老焉庵之中素無長物惟秦漢以來法書名帖山劖冡刻之文充積其内而尤好鍾王之書前有小池每閑暇之日輒臨池據案而坐和墨伸紙揮筆臨寫短長肥瘦惟意所適雖不必皆似而各有姿態可尚也池之中有草生焉左右請除之君不可曰此濂溪之所以自樂者其可除乎由是臨池之興愈盛或曰君其有所得者也因號之曰草池予與君之長子象明逰因求予為記嗟夫予何足以知君之意哉昔晉王羲之為臨川内史時常臨池學書池水盡黒及宋池猶在也好事者修治而表識之曽文定公謂人有一善且不廢而况行先王之道者今君之所以臨池而樂者非特書也其生意油然蓋亦有與物同者矣若然則惟以書名君者非矣惜乎予亦不足以知君之意也故為記其說如此安得迂轅載酒從君而問其所樂哉寜國府重修府治記自秦罷侯置守天下之郡地大者過於古之侯國為之守者奉上命以臨之吏民以事趨走庭下不可一二數必有髙明碩大之觀足以聳具瞻一衆志然後政教舉而法令行彼棟撓榱崩蕭條破壊雖君子安之無所不可然豈太平之盛觀哉上之所以尊其位重其禄而使為民望者固當如是邪故夫廨宇之修亦為政之不可緩者也寜國府在秦為鄣郡漢改丹陽郡後漢改宣城郡隋唐以來或因或否至元為寜國路國朝歸附之初改寜安府後改宣城府吳元年始改寜國府府治在城東隅子城内宋紹定中知府汪繹所建元為肅政廉訪司國初為樞宻院又為元帥府洪武己酉制令知府置廨署知府鞠騰霄理舊署居之未遑改作歴歲浸乆日入於敝至宣德中而益壊旁支之木視所立柱為多正統丙辰臨川袁旭廷輔來治郡大以覆壓為憂謀諸僚屬欲撤其舊而新之工部左侍郎廬陵周公巡歴涖兹郡亦以為宜廷輔乃請於朝許焉於是集羣材命衆工作正堂後堂經歴司照磨所東西六房及架閣庫儀門公署之後舊皆鑿垣為小門徃來者不禁至是築新垣四周以杜私謁又以外門臨街喧閧乃改闢於前作牌樓於外門前作榜房於牌樓内之左右鼓樓舊在府右偏亦既頺敝重建於外門之左建陰陽學於鼓樓南置日晷臺於陰陽學東堂後地稍窪積羡土為岡作樓其上以為燕休之所扁曰正心世傳城肖龜形作真武廟於儀門外之東以鎮之廨後東作疊嶂樓西作雙溪亭以復舊觀計度有方程勸有道經始於缺年缺月缺日而以缺年缺月缺日畢工木以根計竹以竿記瓦甓坯釘各以枚計稍以石計總之為缺萬缺千缺百有竒至於人力則用凡役於官者他不預為屋一百七十有七間深靚宏逺有加於昔而農不知勞於乎可謂能也已寜國土廣人衆古稱山水之郡舟車繁㑹之鄉其所産者多美材飲食諸物所以利用厚生者不他求而足故其秀民恱詩書而好禮義閭巷田野之氓悉有以自資而無慕於外中家以上皆務營居室豐堂廣宇翬飛鳥革之宏壯所在皆有也而郡之廨署獨茍且不治因其敝陋而居之欲使下人顒然仰觀而無慢易之心予未見其必然也上古穴居而野處後世聖人易之以宫室蓋取諸大壯此豈聖人意哉且廨署非一人之私將與後世為公也奈何不治而以敝陋遺之敝陋不治將不遂隤廢矣乎故予深嘉廷輔之為此而知其達於為政政者正也所以正人之不正也然心有不正未有能正人者廷輔作樓於堂後而以正心名之蓋出而施政於堂退而治心於此樓必使思無邪而所行悉由於正一郡之人出其財力以給公上者皆惟正之供而非道非法不行得以仰事俯育循天理之常而無竒衺之習者廷輔之政使然也世之為郡而能以正心為立政之本若廷輔者不多見之廷輔其誠賢哉故因其請記為記之而以告後之人焉凡諸僚屬恊謀同力而為此者則具載碑陰歲寒三友圖記歲寒三友圖一幅吏部左侍郎李公所藏也三友者松竹梅是已天下之物同受天地之氣以生然其所稟有厚薄是以其質亦有貞脆之不同於其質之相似者而與之比焉兹所謂友也天以陽生物以陰肅物而貞脆之質見矣當風飈震蕩之餘氷霜凝沍之際凡草木之麗乎土者悉枯槁憔悴索然若不可生惟松與竹皆蒼翠蓊鬱傲然一不改其常而梅於此時舒吐英華珠妍而玉瑩其氣之芬馥又非他物之所能及是三者皆天之所厚也故堅貞榮茂皆若不知寒暑之變者畫者比而同之而以友命焉且雪以益其潔月以益其清而三者之美備矣何其善於狀物如此哉予聞之人之於物相好必以類非茍為目前之娛而已是故有隠逸之操則好菊有君子之德則好蓮有富貴之資者則好芍藥與牡丹蓋情之所發有不可易者今李公之好是也予有以知之矣公涿鹿人而生於隆盛之世敦厖純固之氣蓋稟之厚矣故其器宏其才美遭遇聖明遂躋顯位清名雅望著稱於時乆矣而其德之在已者蓋乆而益修是以留意於此畫欲因其似想其真而與之儷焉公誠賢逺於人哉昔衛武公年過九十入為周輔相其進德之功雖老不倦詩人作詩美之而皆以竹起興今淇澳之詩是也公自方伯入佐吏部上知其賢而進之也而公猶託意於三物以自勵進而不已將不與武公等乎予於公有僚友之誼故公出此畫屬予言乃為之記使人知公之非徒好者也勅書閣記吾邑上源塘楊氏蓋宋進士理定主簿應真之裔傳十世至今孟辨而家益盛山林陂池腴田沃壤環其地相接也故利入最饒凡邑中數豐家孟辨必置在前列然不用以自豪徃徃推以賑人急鄉里細民衣食有不足者多賴焉不特歉歲為然也前年朝廷修養民之政遣使者督有司出庫財以益倉粟倘遇凶荒則發以賑贍蓋欲使斯民有所養而無饑餓流徙之患富民有能捐廩以佐官者當旌其義復其家孟辨聞之喜曰捄災恤患吾志也况重以天子之命乎即出穀二千餘石以歸有司俾自為斂散而孟辨之義遂著於逺邇使者以聞上命降勅旌之為義民勞以羊酒而蠲其徭役孟辨既拜賜乃作重屋三間斂勅書韜以錦囊盛以髹匣尊閣於其中將以貽後之子孫俾不忘朝廷之德而思善繼於無窮題其榜曰勅書閣鄉邑之人過兹地者仰華構之巋然瞻榮光之煥發山川草木皆有喜氣莫不感天子之仁而服孟辨之義期侈美於悠乆今年孟辨來京師求予記予謂賞罰者人君御世之大權也賞當則善者以勸罰當則惡者以止然豈專以爵禄刑威為賞罰哉絲綸之頒布其為榮辱也大矣孟辨輕財樂施一旦蒙璽書錫美號義聲赫著可以登郡乘載國史而傳之百世此豈千金之賞可擬哉寳而藏之以示後蓋宜也孟辨之子孫能益勸於義鄉人之瞻望乎此者亦有以發其同然之心則兹閣之建其永有利哉故為記之訥齋記予友任敬祥名所居曰訥齋蓋恐其言之易而慎焉者也因其子潞州學正衡來北京請予為之記予與敬祥同邑居自少與其諸兄弟游知敬祥為深敬祥平居簡重寡黙其言之不易蓋天性然也而復以訥名齋其金人三緘白圭三復之類與言者心之聲也志之所存與凡事之酬酢皆於言發之志有邪正故言有得失而吉凶生焉孔子曰言行君子之樞機樞機之發榮辱之主也夫榮與辱相懸切而自慎與不慎致之古之君子慎焉而榮者多矣小人反是而辱斯及之故又曰亂之所生則言語以為階是以不可不慎也敬祥之家世儒醫諸父皆好德樂善未嘗以言忤人至其兄弟益服詩書秉禮義有為教官御史者敬祥則優㳺里中恂恂似不能言而言之必當乎理人皆知其為君子也而猶好修不倦如此然則敬祥蓋有志於古之君子也與夫訥者難辭也其義與訒同蓋存其心而不放是以不敢易其言也孔子嘗曰剛毅木訥近仁及司馬牛問仁則告之曰仁者其言也訒誠能不易其言而加以充養之功使其心常存則於仁得矣然則喋喋巧言而不顧理之是非其為不仁可知也敬祥由是而充之以至於仁則亦古之君子而已矣因書以遺之俾掲於訥齋之壁以為記素屏記予居禮部之南㕔㕔直北北風時來弗便也乃作素屏禦之髙七尺下實以板而上為方格廣視髙加十之一為格十九行行十二空漫以白紙而青縁焉於其中三空鏤紙為蓮花以黄郎中養正所書謹言慎行四字張其上置於㕔内之北向予負屏南向坐以視事客有過予問曰子置屏於公署不加以髹而素是用無乃非所宜乎予曰凡物有質有文木之質本白而强加髹之是以文滅質予不為也曰子之尚白是矣寜不慮皦皦之易汙邪曰予不自汙何汙之能及若或有汙之者則當治而新之然予終不使受汙也人亦何忍汙之哉曰子既尚白以白漫可也而何用青縁邪曰青所以彰其白也且不見天乎天之色青而已今内白外青蓋曰内當潔白而外則任天亦聊以寓意焉耳曰其鏤三空者何也曰予欲以知外也茍安於内而屏之外不察焉非易所謂豐其蔀者乎曰不為他物而為蓮何也曰蓮花之君子者也惟君子能潔而不汙予取以為法焉曰子今老矣方致謹於言行豈欲以好學釣名邪曰予非敢爾也顧誠不能謹以獲罪於當世若猶不戒則其禍慘矣故以此自勵庶幾能寡過也客喜曰吾問素屏而得子之志君子之學誠不可老而倦履之初九曰素履徃旡咎至於上九則曰視履考祥其旋元吉子必勉之庶幾有慶也客既去遂録其言以為素屏記周文襄公祠堂記公周氏諱忱字恂如其先㑹稽人唐末黄巢亂有諱勍者為御史中丞率兵鎮九江子孫因家焉後又徙南昌之武寜由唐迄宋世有宦績為名家有元盛時天驥為吉州路總管贈江西行省左丞追封豫章郡公遂家廬陵郡城之北隅三傳至南康路知事鑑公曽祖也祖遺安先生仲德始徙今吉水之月岡父秉昂皆不仕而皆以德誼重一鄉公生而頴敏好學諸書經目輒不忘遺安先生喜曰是必能大吾門遣從名師受業永樂甲申取進士太宗皇帝命拔其尤者入翰林俾進學公願與其間上嘉重之許焉公日夜奮勵不少懈當天下太平四夷賔貢祥瑞迭至文學之士歌頌聖德者日新月盛公之文章最為人所稱道時方修永樂大典一時名儒皆集館閣亦多讓公為能書成授刑部主事寛厚明慎獄無遁情閩有林姓者年二十餘被誣為逆黨行財獄乆不决公一見問其年曰黨事發時方二歲豈能行財力釋之及修五經四書性理大全成上知公可用嚮意用之陞刑部貟外郎太倉成命公主饋運直𨽻粮賦不嚴而事集仁宗即位有薦公為郡守者不聽及封建親王擇輔導以公為越府右長史宣宗皇帝念畿内之地國家肇域於此蘇常諸郡賦稅當天下之半宜有以優養其民而用匱民困吏不稱任故也乃擢公為行在工部右侍郎徃撫之凡饑寒勞役利害有當興革者大小之事皆以付公公奉勅惟謹而以養民為先務蘇之賦重郡豪嘗巧取以自肥而官賦常不足田里細民困於暴斂至棄産以逃鬻子女以緩刑罰歲逋常積至百萬以待恩霈公知其然乃立法置場擇人總收而發運焉不入里胥之手計常年過取之贏而積以濟農又發庫財平糴以待凶歲武臣之禄當輸南京給之則請令受於蘇而收其運費亦以恵農民其逹北京而舟楫失利或官有科需及民間饑窘無措者皆以所積之贏通給之不責償於是細民惟知力田輸稅仰事俯育而已他一不知及官無負租私無横取鼓舞懽樂者二十年而上之委任亦篤雖遇父母䘮皆奪情俾任事而寵終之禮加焉事或嚴重雖非公所履亦以命之若審録南京繋囚考察郡縣吏督京衛屯田理松江煑海之利如此者非一也其寛緩嚴急必以公不以情人皆以為宜而無間然者松江嘉興地瀕海公受命防冦相土宜築城堡造戰船訓練士卒嘗若有警然者冦不敢近凡上所命無不稱㫖列聖在位多降璽書奬勵而加錫賚焉今上皇帝臨御嘉其勞勩陞户部尚書以舊制辭改工部未幾仍命徃撫南服以其民之安之也公益勤篤始終一心所以興利除害如曩時時邊鄙戒嚴需兵器以命公民間公令如子趨父事百萬鎧仗皆應期而辦景泰二年以風疾辭不許章再上乃命户部侍郎李敏代公還且戒敏凡其所行良法美意無輕改蓋仍有意用公也及見上命光禄宴勞之公退而疾作仆廷中幾不能起上察公實病命致仕歸景泰二年八月也公祗事五朝夙夜匪懈懿德善行輿人誦之至論巡撫之績亦首及於公蓋公於民事知無不為為之必盡其方郡邑水旱當賑給者多不待命下安其危殆而完其骨肉者不可勝計又推餘力以及其所當為而皆有成功修應天府學之尊經閣蘇之吳縣常之江陰鎮江之丹徒丹陽安慶金山太倉諸學作闕里之金絲堂若武進之孟瀆河閘江陰黄田閘蔡涇閘蘇之寳帶橋鎮江之鎮西橋所以通徃來資畜泄者皆公所重建而人不知勞先賢故跡如李太白范文正梅聖俞魏鶴山祠宇皆修葺之一不以煩民初公年六十即傍所居之雙崖營草屋若干楹各以其勝名之至是而歸老焉娛意於山水之間足跡未嘗至城府賔客過從輒傾倒相懽所為詩文若干巻出入唐宋諸大家蓋渢渢乎其言也四年十月三日卒年七十三上聞之悼歎命禮部致祭工部為治墳塋賜之謚曰文襄諸子仁俊仁迪仁儉仁廣孫琬瓉環璇琦璲奉葬於其里黄岡之原既備諸儀物如制又即墓之右作享堂五間以歲時行禮中祀公像左右二廂以貯祭器凡諸宜有者無不具繚以周垣扃以大門嚴嚴翼翼内外完好又買田五十畆以供歲費而來求予記其事以示乆逺予與公同取進士同朝者五十年知公為最深且周氏之先德厚矣而公又加厚焉子孫相繼足以垂不朽而何待於予言然不可辭也故為書其行之大者以為祠堂記其細可畧也月岡耕樂記月岡在泰和雲亭鄉去縣二十餘里其地多良田近則峯巒迴合草木蔽虧長溪深池涵浸乎左右逺則三顧之山屹然聳秀於其前靜者所宜處也曽君士敏舊家原缺縣城中厭塵囂之紛而喜兹地之勝乃徙居之有田數百畆朝夕率僮奴致力其中收其所入可以自給而有餘稍暇登髙丘坐危石蔭佳樹之清隂藉豐草之緑縟凡耕夫牧子之去來樵歌漁唱之應和朝霞夕霏野花幽鳥變化隠見於空濛杳靄之中其景蓋無窮也士敏快然樂乎心嘗自詫曰吾不耕於是則安能有此樂哉因自號曰月岡耕樂去年來北京求予為記其事嗟乎士敏爾知樂矣亦知所以樂者乎自有月岡以來耕於此者不知幾人矣亦豈能盡樂哉水旱之不時徭役之無節催科敲朴之迫乎外饑寒困苦之切乎中其景物蓋自若也而接於見聞者􅃴足以為慨歎之資而已今聖天子在上篤意養民常賦之外未嘗少勞其力費其財是以天下之民皆安於畎畆之中而仰事俯育而又得遂夫耳目之娯此康衢老人所謂耕田鑿井而不知帝力之加者也於乎上之德堯之德也士敏其可不知所自哉故為之記使凡同此樂者皆知歌頌而不忘亦使百世之下有以知聖朝治化之盛如此也是為記延真觀正一堂興造記泰和延真觀正一堂道士黄仲真修治其堂宇既完矣乃具書幣遣其孫黄蘭隠來北京告予曰仲真之初入道也獲從先生同授儒業於曽公仲章以年相若幸相好今先生用儒顯仲真於道亦粗有聞知嗣先師之教不敢墜惟其所居堂宇計其始作之時及仲真已四世歲乆而弊大懼不足以奉神祀蕆教法為國祝釐為民祈福以承師之志思盡撤而新之乃悉出私帑及齋醮禱祈所得於人者命弟子淵微淵潜徃湖廣經營市衆材而淵黙亦出所有以佐之經始於宣德丁未十月戊申正月甲申朔先作後堂五間重堂七間左右厨屋庫庾凡二十餘間辛亥十二月壬子作正㕔五間法堂一間及東西㕔前廊迴廡正統丙辰正月甲戌師弟曽永迪作西樓一間附屋一間十二月戊寅仲真又作東樓四間前㕔五間髙廣有度式稱具瞻垣牆四周次第皆備仲真既與永迪率衆徒妥神祇香花鐘鼓朝夕嚴祀攄誠盡敬以為國為民閑暇之際講道有位修煉有所宴息有舎賔客徃來亦有以自適蓋無不可於意者惟吾道以清浄為宗無厚産豐財可以如其志凡所興作蓋甚難今幸而成功豈仲真之能哉賴上下一心少長同力故如此是宜有記以示後人俾善繼之永勿壊敢以為請嗟夫仲真誠可尚也哉凡今學道之士自以為出世間遊方外非澹然而無為則弛然而自放前人之業不少概於心又其所以為父子兄弟皆非天屬之親鮮有不顧其私者惡能殫心以共謀悉力以相助哉今仲真汲汲於承其師而欲侈其業永迪淵黙輩皆與之恊而能有成功究而論之雖本於仲真要之衆人皆可謂難也世之為父子兄弟何莫非天屬之親也然或父兄欲有為而子弟不能順以成之甚者顧私自營以拂逆其意蓋逺矣觀於仲真輩其賢不肖可知也嗣仲真者尚當繼其志惇雍睦之義盡維持之力相與保之於無窮斯善矣予聞仲真尤孝於母所以致其養而申其敬愛者無不至此尤學道之士所難者抱朴子曰仙道以仁孝為本果然則丹臺紫府可至矣予與仲真有舊而喜其為人故為記其興作之成而并書之亦庶幾有勸也鳯翔山新建普寜禪寺記鳯翔山在江寜縣安德鄉距京城南二十里山勢雄拔秀整若鳥舉而翼張軒豁衍迤中為奥壤土厚而泉甘其外則牛首天馬諸山岡巒起伏聨絡映帶皆若效竒於兹者相傳舊有佛刹據其處而銷歇已乆碑碣圖誌無復存者興廢歲月不可考而知今雖有普應無相光嚴三寺在其東皆莫能當殊勝鄉民徐缺墾耕而食之巡撫侍郎周公嘗行縣過此愛其勝小憩無相而寓目焉無相住持寜諼今僧録司右善世雨菴淵公法嗣也言於周公曰昔者吾師欲建法幢於此不克遂公歎曰此故佛地於造寺最宜何謂不可徐缺聞之願復以施佛即因寜諼而歸之淵公公正以興佛道植教基為已任即發常所受賜金帛起其廢事聞勅賜名曰普寜禪寺而太師英國張公輩皆捐貲為助内外善信咸樂施予乃命其徒道清等董是役相方正位度材命工作正殿法堂毘盧寳殿及觀音勢至金剛天王伽藍祖師諸殿又作鐘鼓樓庫司齋堂僧舍廊廡像設法器凡諸宜有者無不畢具前作門三間繚以修垣規模靚深藻飾華麗山川為之改觀徃來於此莫不懽喜讃嘆以為自昔未有而今見之豈山川固有待邪夫天下之事遇可為之時而得有為之人然後可以收成功若兹地雖勝而閑棄乆矣時非不遇卒莫之能為豈非淵公之難遇哉淵公神資秀頴操行峻潔妙契真乗深悟道要遭遇聖明寵賚優渥俾掌其教事崇示儀軌天下學徒尊仰之及勅建大功德寺以薦福先聖又命兼領住持法筵盛開龍象咸集稽首座下者常千數百人丕闡宗風廣度來學者公之志是以為此不難也寺既完求法者日至仍命道清主之而求予記其事以垂示乆逺淵公於予厚不可辭乃為之記後之嗣者尚深體而維持之永勿壊彌陀寺記彌陀寺在都城之北五里許原田衍沃林木茂美居庸諸山當其前左接乎恒山右極於榆關碣石迤邐而不可窮遊目望之迴抱拱揖皆若效竒獻秀於兹寺者蓋可謂殊勝之境也元貞祐中嘗即其處建彌陀報恩禪寺歲乆寺廢惟碑誌具存正統改元之初都知監右監丞張公定安輩念朝廷之恩大無以報萬一欲就故址建寺以為祝釐之所求可為寺主者得廣衍師焉師號南宗淅之四明人初出家於武林淨慈寺禮照菴為師後又受學於前住持希古宣德九年來京師又從空寂長老參問道要深有悟入學行益進而聲譽日隆至是遂當其任正統三年二月疏其舉廢之故以聞且請名於上詔賜名彌陀寺而俾衍為住持衍殫心劬力程材課工殿堂門廡次第皆作殿未成而張公即世太監姚公鐸盡施其資財以助迺克㡳於成刻雕藻繪像設有嚴香花鐘鼔器用悉備蓋始於闕年闕月闕日以闕闕年闕月闕日畢工衍朝夕率其徒敷掦教典祝聖夀於億萬年凡厥有生皆䝉福利此衍之志亦諸中貴所以報上之意也予昔為禮部侍郎衍數以事來謁予喜其精勤佛乘而又能崇立教基如此真學佛之徒也於乎佛法之行乆矣今又有若衍者為之徒聰明才智相與出力而興起之宜乎信嚮者衆而其教益盛行寺所以為闡教之地也其創立亦難矣不為之記則後孰知其自衍始乎故因其請記為記之以示乎永乆永興講寺記永興講寺在都城之東昔之仰山寺也寺之四旁官署民居如鱗次如􅌨比獨寺最幽勝真學佛者所宜處初太子少師姚公廣孝以髙僧主是寺受知於太宗皇帝遂以其道佐興運致顯庸公既登朝後之主者弗善於其職教用不振至今乃得恩常師主焉常號照菴姑蘇人其父彦庸以多貲聞鄉里永樂宣德中屢以所蓄珍寳獻諸朝賞賚不貲常雖生處富饒而不樂華靡早從張繼孟攻儒書繼以疾困益厭塵俗喜出家父母許之遂入定慧寺禮覺初因師落髮受度於僧録司右善世心源瀞法師參道厲行精勤不懈由是深見器重又於南京大報恩寺右講經唯菴法師座下歴維那之職聲譽日隆宣德七年至北京覺義慶公察其能有立遂舉為仰山住持俾修壊舉廢常亦慨然以興起斯道為已任事佛齊衆嚴整有法度其徒信嚮來學者率百餘人殿堂門廡有故敝漫漶者皆治而新之蔚然京師名刹也常欲遂新其額以聳具瞻正統八年三月疏其事以聞勅賜名永興講寺常既拜賜卜以是年十一月十五日祇率徒衆香花鐘鼓備極威儀以告諸佛祝聖夀於億萬年然後掲扁於寺門達官貴人士庶男女徃來觀望懽喜讃歎已而來告予曰恩常所處寺雖故而名則新聖天子之大德也不為之記則後之人孰知其自今始乎願求文以刻諸石予謂佛之遺世乆矣惟其書存書者道之所寓也其要欲使斯人忍性絶慾一歸於善而已常秀質美才克闡明其道是以獲乎上如此為之徒者居於斯學於斯益相與講明之始以善其身終以覺乎人不昧夫佛之道則無負皇上錫名之意而兹寺之丕昭顯聞亦豈有已哉故為記之以告來者長春劉真人祠堂記南京棲真觀新修長春劉真人祠堂成蓋守元冲靖秉誠專確志道衍教妙悟靜虚宏濟真人邵公以正命其髙第弟子道録司元義李希祖為營建希祖則守元之法嗣而長春之孫也祖孫相承以報德垂逺為事其用心厚矣哉長春劉氏字淵然號體元子其先徐州蕭縣人祖伯成仕元為贑州路總管因家贑州次子元夀生真人將生之夕祖母謝夫人夢紫衣道者入元夀室既覺而真人生總管以夢祥祈祐於元妙觀因許道士陳方外俾為徒年十六遂入道受符法元陽趙真人見之喜曰此子形全神清真良器也吾法嗣無過此留之座下授以諸階元秘擕歸金精山復授以玉清宗教社令烈雷玉宸黄籙玉籙等書及金火返還大丹之訣棲神錬炁呼召風雷驅役鬼神濟拔幽顯動有靈驗嘗遊龍虎山過南昌值歲旱為禱雨立應聲聞益彰洪武癸酉徴赴闕上深嘉奬賜號髙道及劍一具命於朝天宫建西山道院居焉上嘗幸朝天宫幸道院加撫諭或入謁則賜坐論道要禮遇甚至且以其元悟宿契命為尋真之㳺冀益有所遇以致其神化賜襲衣楮幣俾乘傳以行於是上匡廬過鄂渚至武當山召還擢右正一永樂初遷左正一建金籙大齋有醴泉甘露鸞鶴之祥而寵賚備至未幾謫居龍虎山尋徙滇南居龍泉觀滇南之民有旱疫求禱無不應化大行仁宗即位遣内臣召還封冲虚至道元妙無為光範演教真人真人頓首辭不許尋賜誥加莊靖普濟四字有輟侍於九重徃化導於南服亦使息勞於閒寂實將遺朕於今兹之語賜以銀章領天下道教事以制詞觀之則真人之被命於南者意有在也宣德之初眷待益隆賜之劍問曰此劍當誰傳對曰臣法得之浚儀趙元陽繼者惟邵以正耳即遣中使召還使繼其後乃請立道紀司於雲南大理金齒以植道教凡有請無不從其所服用皆出上賜宣德七年二月懇以老辭乞歸西山道院以終餘年上洒翰作山水圖題詩其上送之遣中貴羅智䕶行既至道院僅半歲一日昩爽沐浴更衣結跏而坐語弟子曰吾將行矣弟子請遺言曰氣聚而生氣散而死固恒理也吾何言引手作一圏象太極曰呵呵遂化去夀八十二比歛舉體柔軟如生人以為尸解云上遣官賜祭工部為治塋域𦵏於江寜安德鄉之園子岡所居西山道院賜名棲真庵正統間改賜名棲真觀真人志行髙潔由儒入道凡其所行必依於忠孝惓惓為國祝釐以濟民利物凡可以布德施惠使人得樂其生如醫藥之類皆盛行於世初趙真人得天心帙於其師舉以授長春曰人心即天心欺心即欺天日之所為皆書之其不可書者勿為也長春復以授守元而舉以自代此其相傳之要道蓋與吾儒合非如世之所謂逰方外出人間騰九霄而隘六合者也守元感訓誨奬拔之勤念授受承傳之妙嘗建祠祀於滇南龍泉觀至是復以棲真觀乃先朝所賜長春始終所寓其精神流通焄蒿悽愴常若有見焉不可以無把也乃復出金幣命希祖建祠於觀之左香花鐘鼔朝夕嚴祀焉予觀元陽之授長春長春之授守元其所告語者惟曰心曰天與其所行必以忠孝仁慈為本不汲汲於其他是以德懋位髙受榮命於累朝而衍元化於無窮也後之學者推是心以事天而不違師真之訓則教基之崇將永乆而不壊矣守元求予記故為記之俾刻石以告來者臨江府清江縣儒學題名記臨江江西屬郡清江則邑之望也其山水明秀而風氣清淑人生其間皆尚禮教而謹憲度勤生而知分其為士者習詩書談仁義茍有才具則思效用於時而以不用為恥故當今盛世游學校齒縉紳而列於士君子之林者比比有也清江儒學之建自洪武之初已然矣士之來學者肩相摩踵相接也賔興之歲得以所學登仕籍者蓋多矣題名之記所以著其美而勸將來傳之於不朽也然有志之士亦豈待於勸哉今蒼梧唐侯昌來為清江令而上虞貝昫為教諭又得太平邢寛餘姚錢英為訓導以佐之故相與謀曰興學育才聖治之本也有志於學者雖不待於勸然亦有勸之而未見其成者此誠豈不用勸哉且由初科至於今題名之碑亦有未備者無乃缺於是與命工考其缺略刻之石而請予為記予謂臨江文獻之地宋天禧中王公損之判其軍子荆國文公實生於此詩書福澤積乆而彌昌文章之華道德之光莫有盛焉者而二劉三孔以博學宏材德業之偉儷美於當時足以繼古人而儀後進輯而傳之以垂不朽豈非郡邑之美觀哉抑嘗聞之魯叔孫穆子論人之所以不朽惟貴乎有立太上立德其次立功其次立言謂之立者卓然名世傳後雖乆而不廢也此之謂不朽者唐侯為令而得廣文貝昫等理學事政教之美足以成朝廷育才圖治之盛心又立石題名而期以逺大則凡學者可不益勸哉予與昫之尊府為同年故昫以記為請予老且病不能辭勉為之記亦因以示勸云耳藜閣記藜閣者何廬陵劉士英藏書之閣也藏書之閣而名之曰藜者何按劉氏之故實也世傳漢劉向校書天禄閣夜暗坐誦書有老人扶青藜杖叩閣而進嘘杖端燄燭之與之語達曙曰吾太乙之精天帝以子好學故遣下觀焉因盡出其書授向而去由是學益大進後世以為美談而為劉氏者尤尚之此閣之所以名也士英居曲溪去縣南三十里有山水之勝閣始建於居之北凡經史百氏之書皆在焉既而以其隘也改作於其居之南凡四楹其髙若干尺廣若干尺附閣之屋又若干楹經始於永樂甲辰二月至十月而成悉移書置其中課子孫以學賔客之賢而有文者得至焉嗟夫士英之用心亦勤矣蓋君子之善迪其後也必有徴乎其前前事之不忘後事之師也當漢元成之際外戚用事而宏恭石顯等尤擅權賢臣廢黜災異滋多天下日入於弊向以宗室老臣心切憤之數上書言事推天人之理明災咎之應冀上感悟而進君子退小人然終不用當是時孔光張禹之徒皆畏怯觀望詭言誤主獨分别白黒懇切至到雖屢遭擯斥而其行彌厲又嘗采古女善惡足以致興亡者為列女傳取舜禹以來至於周秦行事之得失作新序說苑欲以為法戒其志如此則其精忠峻節可知矣百世之下讀其書者猶起敬起慕况劉氏乎宜士英有取於是也自古大賢君子之能立也雖因性之自然未有不資於學者向之德行偉矣蓋亦學以成之先儒謂向博極群書信哉然則欲學向者何可以不讀書乎今士英之修此閣也髙明足以觀寛廣足以容學於是者誠以其心為心而孜孜不倦則何向之難及哉太乙之事其有無不可知然精神之至或者其亦有遇乎要在勉諸已而已士英端重而好仁其子用宏等皆謙謹向學能世其家因其求予記也故樂為之書饒州府重修鐘樓記饒州府鐘樓在府治東永福寺寺即梁鄱陽王蕭恢居址也元至元十五年饒州總管常福生以銅萬五千斤鑄鐘置寺之殿東以警朝夕而作樓居之即故鐘樓是也樓髙五十尺有竒鐘髙七尺其大倍髙之數世祖賜寺額曰乾元萬夀永福禪寺記其事者翰林國史院編修楊載士宏也樓建於至元十五年戊寅至今天順戊寅百八十一年矣歴歲既乆繕治不繼簷宇摧頺楹桷撓敗風雨震淩日入於敝官於是者雖有傾覆之虞而欲一治之然毎為事所制輒不果景泰壬申錢唐王侯以兵部主事擢為守侯名忠字廷賛聰明特達有美才遇事之當為者勇為之而必􅃴其宜且尤以興墜舉廢為事下車之初視斯樓之將壓也曰此而弗治後之費益盛然事有劇於此者姑少緩之迨今六年政通人和侯喜其力之可為也乃進郡中耆民而告之曰予後於鐘樓者急先務也今力既紓矣予將捐俸以舉事父老能勸諸義士以共成其美乎衆皆樂於從命爭出白金以助費然尤慮大材難得忽商人以楚材來售若有陰相之者因得如其志耆民胡秉彛等董諸役盡撤其舊而新之工善材良晨夜展力土木采章極其輪奐興作於二月初吉而以五月十六日落成其髙大之觀雖不減於昔而雄傑壯麗有加焉夫郡城之有鐘所以謹天時勉人事蓋晝夜之明晦小大之作息皆於是取則焉其為用大矣饒州在湖山之區民物之衆不可一二計茍無以警動其耳目啟發其志意使昧昩於旦夕之間則人道之所當務者將不遂廢矣乎周之諸侯興居無節號令不時詩人謂其不能晨夜不夙則莫作詩以刺之宋之君子以更鼔分明知仕者之賢而得進賢之賞然則鐘鼓刻漏之用乃為政之首務有土有民者之進退榮辱繫焉可不務哉王侯由名進士躋顯曹舉而陞今官專千里之地而治之蓋古諸侯之任也其政教達於逺邇人皆稱賢焉而功業之修又炳炳如此其進於逺大可量哉饒之人士王以順胡嘉禾等歌誦之不忘相率請予文刻之石庶永永不朽予嘉其意為記其事俾刻焉其出貲以成功若胡秉彛等則勒之碑陰廬陵縣重修縣治記廬陵吉安屬邑蓋附郭之大縣也其治在府治前少西官署民居櫛比鱗次人之有事於府縣者足相躡於途而凡以貨物求售者亦多聚於此景泰壬申居民不戒於火縣治燬焉凡發號施令修政事治文書嚴賞罰諸務皆失其常處上無以為觀而下或怠且敖焉癸酉夏隆慶楊侯英來為令有敏達之才行平易之政而以修縣治為首務請於朝從之侯先捐貲以為倡縣人皆曰吾廬陵文獻之邦以好禮急義聞天下縣治之燬也豈為治者之咎哉蓋所謂無妄之災也奈何使居上者無所庇覆以出治而捐貲以圖之非為民者之過與乃相與聚而謀其費縣之里長八百餘皆不約而集凡竹木金鐡瓦石丹碧之類各以大小多寡輕重緩急為差悉上送官無或後時於是智者効謀勇者効力徃來者課其勤勞勩者紀其績作前堂缺間髙若干深若干前堂之後舊為直舎侯以其卑且隘也充而廣之為樓以居修梁大棟髙甍巨桷翼然出於羣屋之表髙若干尺廣若干尺而後堂之宏壯亦稱之名正堂曰公正樓曰明逺幕㕔在正堂之東六房又居其次右為架閣前為重門而戒石居中以勵志也榜亭囹圄官所宜有者無不備經始於闕年六月闕日而以闕年九月闕日訖工總之為屋若干間侯與衆僚既落其成而出治於此縣之士民莫不懽喜讃嘆郡庠司訓王匡英偉有美才與侯善嘉其達於為政而成事之果也曰是宜有文以示後俾相與愛䕶於永乆乃來請記於予予聞君子之仕也必有廣宇豐堂盛其威儀尊其瞻視則言出而民信令行而民從事不勞而治矣豈因循茍且者之所可能哉宜侯之以縣治為首務也况廬陵之大衣冠文物之美先儒君子之風化猶在故侯之善教易孚善政易洽而速於成功作文以記其事蓋宜也然予觀之侯之所以名其署者其志可見已蓋人所存也公然後行無不正而人斯恱服矣其聽言也不於私然後得以致其詳而不為所罔斯可謂明且逺矣由是德立而行修聖人之訓載於魯論如此則公正之堂明逺之樓蓋侯進德之礪也予為記其縣治之成而併書之後之君子其亦有概於心哉其與侯同志恊謀以成其績者某官某某處人也是為記奉親堂記龍泉彭用威作堂以事其母而名之曰奉親之堂使來求予為之記彭氏為龍泉故家有詩書禮義之習用威之兄仲恭為陳州項城令有名而用威又以能孝聞鄉里蓋其兄弟三人已喪其長者而仲恭得禄於項城逺其鄉四千餘里而母且老矣用威固留事之不使如項城奉母堂上朝夕候起居承順顔色而躬調其衣食寒煖厚薄之宜彭氏故有山林之富陂池之饒園田之沃衍其所以奉養之物不他求而足嘉時令節大具酒醴肴羞百物之珍率婦子列拜稱夀鼓舞笑歌更侑迭勸以為禮務得其懽母年八十而精明不衰啟處如平時其心蓋有以樂也於是鄉人皆為其親榮而用威不以自足推其意蓋將無所不勉也用威其可謂賢於人哉夫欲孝者人之所同然昔有不能得者蓋勞役以苦其形而饑寒困乏以摧沮其志此陟岾鴇羽之詩所由作也於戯此豈不以時乎哉今天子以孝治天下仁恩之施下及草木無征輸調發之勞而有年穀順成之美使人人得以養其親於是有不逮者則君子痛之有若用威優游以為養上享其樂下盡其心豈非幸與抑亦母有以致此也故予於此既感夫上之仁又知其母之善豈獨以見用威之能孝哉雖然孔子以立身行道為孝之終而孟子以不失其身為能事其親用威其知此矣抑古所謂一鄉之善士其行必有以蓋於一鄉用威加勉焉使名實烝然於時而益播其美於後則豈非孝之大者乎後人登斯堂而亦興行焉則彭氏之福詎有已哉詩曰孝子不匱永鍚爾類予蓋有望也故記於其壁間以俟胡氏塾田記古者田以井授而人皆有田民以里居而里皆有塾教養之法既修故能成人才而厚風俗此三代之所以盛也後世井地廢而田不均里居散而塾不立貧富既殊教養亦異故人不能以皆善風俗不能以盡淳好古論治之君子未有不慨然於斯也漢唐宋之世嘗詔天下皆立學而里塾黨庠終不能以復古聖朝建國之初既命立學於府州縣矣而又有社學以教里中之子弟駸駸乎古之道也有司因循漸以弛廢故家大族有恒産之富而思善其子弟者乃能延師以教之貧者不暇也不有樂善好義之士其何能酌古今之制以嘉恵乎學者哉泰和素稱文獻之邦其人貴經術而尚德義絃歌之聲詩書之習自城邑以至都鄙相接也然有志於學而困於無資者亦多矣南逕胡如麒蓋所謂故家大族之一也徙居其里之南原既繕其室廬廣其田圃而以學問教其子矣則又慨曰吾族之子弟與吾戚姻之子弟蓋有願學而力不能以自遂者吾可不務乎乃開塾延名師招使來學而館穀之又割腴田六十畆歲取其租以當束脩之入於是為師者得盡心以教而子弟者得專意以學矣因其親戚監察御史尹君崇髙求予文為記將刻之石以貽永乆厚矣哉其用心也非所謂好善樂義之士與然則學於是者可不思自勉以稱其意乎夫仁義禮智信之德父子君臣夫婦長幼朋友之倫皆性之所有道之所當行聖人與常人一也聖人至而我未至於是學以求其至故學者所以明倫而修德也處之盡其仁制之盡其義過者節之不及者文焉知之明而守之固焉將之以誠踐之以實則德進而倫厚矣由是而推之以致君而澤民則塾之設豈不光逺有耀哉此如麒之志也其或察之不精行之不篤父子之道乖君臣之義缺凟夫婦亂長幼狎朋友徒馳騁於文詞習熟於容止巧於變詐深於忮害而曰塾之所教則豈如麒之意哉是蓋不可不勉也且予聞之古之塾師取諸致仕之老者大夫為父師士為少師非以其道德修明而教之有其實哉故師道立而善人多今或不得乎此則亦取夫宗族稱孝鄉黨稱弟有禮法於閨門無怨惡於上下者為之庶幾其教之成此又如麒之所當用心也嗟夫天下之事作之實難而繼者徃徃至於怠廢故前人之美不得以振耀於後胡氏之子孫尚世勉之而不怠且廢焉則可謂賢矣其及人之善豈有窮哉尹君能信者也故因其言而為之記如此若夫其田之處耕者之名主幹者之姓氏則載之碑隂甘露寺興造記正統三年鎮江甘露寺興造之功成寺之耆舊具本末以巡撫侍郎廬陵周公恂如書來求記按寺乃吳主皓所作時改元甘露因以為名寺在北固山下臨於大江自昔號竒勝地梁天監中武帝幸焉賜大鐡鑊二以貯水飲僧且書天下第一江山六字掲於樓上乆之字廢而二鑊存至今唐寳歴中李德裕觀察浙西為充拓其址増廣其室廬且造鐡浮屠七級乾符中燬於火鎮海節度使裴璩重建焉宋祥符間僧祖宣主是寺宣本國戚得賜田四千餘畆資用既饒乃遷寺於山上窮極侈麗建炎燬於兵嘉定中僧祖燈復修之元至元已丑又毁焉大德已亥僧智本重建土木采章不失舊觀自是而後莫有繕治之者故乆而益壊上雨旁風無所蔽障僧徒漸散諷唄幾絶宣德癸丑周公巡撫過焉嘆曰是江右名刹也而頺敝若此非有德望之人不足以任之乃命僧綱司為請於僧録司選於衆舉天界首座玹理主焉玹理字一中端重明敏深悟宗㫖而多讀儒書僧俗敬禮焉既正法席闡明其師之道以授學者退而周視敝宇慨然欲新之田利之入未嘗私一毫歲凶則凡佃其田者皆賑贍之人人為盡力故利入愈饒而得如其志歲甲寅作法堂於山半葺多景樓乙夘治山麓建大悲閣丙辰建千佛閣及凝虚雨花二樓丁已修犬雄殿戊午創僧堂補廊廡之缺敗者重建海嶽菴於西蘇子瞻諸賢舊遊處也搆垂青軒於東用唐人天垂四靣青詩意云總之為屋百餘間輪奐之美莊嚴之妙蓋極其力之所能至若庖湢庫庾及諸器物靡不畢備衆謂寺之全盛莫如今誠一中之力然非侍郎公啟迪而維持之弗能也是宜書以示後使知善繼而不忘予謂世之名刹多矣資力非不富締搆非不壯麗也其盛於前而衰於後者不可一一計至於衰而遂廢者亦徃徃有之豈其人皆不足為哉天下之事無不可為者茍存廉公之心持堅勇之志充之以誠而積之以乆豈有不底於成功彼樂因循喜貪黷詭欺之習勝鹵莽之意多如是則安能有為為之亦安能有成哉無怪乎其衰且廢也甘露之敝甚矣其資業固在也然猶歴乆而後興者豈非無其人而必待一中故耶然則一中蓋有廉公之心堅勇之志誠實而不欺恒乆而不渝者宜其成此不難也使凡任事者皆如一中天下豈有廢事哉予舊聞甘露之勝多景樓最殊絶群山西連磅礡秀整大江東去與海相接四時朝暮之間景物萬變嘗有意一遊焉然以其敝也故弗果乃今得一中興理於破壊之餘使千百年瓌傑之觀煥然復盛於今日其制作又有加於前者則予之興可已邪他日乞身南還倘得遂償所願焉覽一中之績尚當為賦之也一中廬陵人全庵其别號云楊先生祠堂記景泰二年缺月徽州府新修前教授楊先生祠堂成其徒右副都御史程君富等所為也先生諱昇字孟潜錢塘人其學於書無不讀而尤邃於春秋其所以教必本於聖賢而不惑於異說洪武丙子領鄉薦得星子教諭星子之士前此無與薦書者衆皆言學地不利謀徙焉先生適來力止之曰為士者不得與薦書此學未至耳非地之過也乃與諸生日夜講學求所以治已治人者俾身體力行之以其餘日肆力於文章諸生感先生之教已益自淬礪既三年薦二人又四年薦四人皆登上第自是相繼有顯者先生秩滿陞邵武教授無幾調徽州徽州人士聞先生善教皆樂從先生亦樂以聖經賢傳為之講說三綱五典日用事物常行之道剖析精微於義利之間曰如是而王如是而伯諸生曉然知天理人欲之辨而奮志於學十餘年門人弟子領薦而升者亦十數人時先生有親在堂居貧守約而篤於孝養當路者知先生有治理才將薦起之先生力辭曰奈何奪人父母之養而茍欲榮貴其身乎諸公乃止歲辛夘先生以内艱去諸生援范文正故事於學宫之傍别作一齋留先生居之而授學焉永樂甲午先生捐舘而老親妻子皆在徽遺言痛不得終養徽之士思先生不忘充廣舊宅以居之所以待之者亦如先生時先生之子寜宜亦以家學相繼登第徽人愛厚之如累世親戚之家今復廣舊齋故址以奉先生像凡諸弟子與先生子孫得以歲時脩祀焉非先生之德及於人者深惡能若是哉人之大倫有五君臣父子夫婦長幼朋友而師不與焉然道之所以明且行者師之教也不然則君臣之義父子之親夫婦之别長幼之序朋友之信有不悖焉者鮮矣是故師者道之所系也任道之重以厚人倫美教化奚可忘報哉古之所謂鄉先生沒而可祭於社者蓋此之謂矣新安子朱子之闕里也子朱子之道天下後世之所仰賴而師法者先生之教亦率是而已而居於斯㳺於斯門人在是子孫在是聲音笑貌志意樂嗜皆可以想見精神血氣之感通昭明焄蒿之發見當必概乎心者循先生之教以上泝子朱子而篤不忘修已治人之道皆馴至其極則可謂善學者矣此固先生之志而後人之所當務也寜累官至刑部侍郎尚書先生亦累贈至刑部右侍郎今加贈資善大夫禮部尚書君子謂先生之生雖力辭顯榮而卒享褒贈以為有德之應祠堂之作貲力多出程君其次則侍郎吳寜郎中金宗善按察副使莊觀僉事程志學參議方勉御史張昊許仕達通判江浩訓導康懐今徽州府學教授羅倫訓導鍾振皆仰慕先生亦相與助成之既完刑部君告予曰先君子之教授徽州一時英才皆願學因得以奨勵成就之今其心惓惓如此誠可謂厚矣不可以不書故敢以記為請將示寜之子孫俾知祠堂之所以作而思洒掃於無窮予嘉其意乃為書之而使鑱諸石抑菴文後集巻五
