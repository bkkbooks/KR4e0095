body:
  text: 抑菴文後集巻十八明王直撰序鄭氏四老圗詩序皇明混一區宇將百年仁恩義澤浹洽乎天下天下之人皆得享夫安静和平之福故耄期之老所在有之誠太平極盛之世也觀於鄭氏四老可見矣鄭氏家旴江為盛族而四老者皆同産且皆夀考康寧夀考康寧非徳不足以致之此其所謂盛也四老伯守中年八十二仲秉中七十七叔則中七十三其季敬中亦年七十矣伯氏之子誠字文實嘗為吏部侍郎有名朝廷推本於父母之賢即以其官封守中守中膺三品之貴有命服之華上下輝暎煌煌如也於是鄭氏光榮碩大鄉族無與比者佳時暇日兄弟聚於一堂披閱巻帙談論古今或命尊酒諧燕嬉則更起為夀迭相酬勸其諸子孫羅列左右各以序進捧觴稱慶懽忻鼓舞不知日之夕也天下之樂盖莫有加於此者旴江之士大夫歆羡之不已乃命畫者繪為圖而相與歌詠之今年季氏之子某来京師介司務程廷儀過予道其事且稱四老之精明不衰而祈其夀之永也求予致一言予昔與文實遊而重之然於四老則未獲一見今文實已矣而四老皆康强文實有知當亦喜無憾也然竊計之伯氏之生適我太祖皇帝受命之時天地交泰隂陽和暢清明純厚之氣已見於發育之中伯氏得之以生而諸弟繼之重以列聖㴠養之徳故能各遂其生成而皆至於悠乆是豈偶然之故哉有元之時㑹川有尹先生者伯仲同乳至泰定丁夘皆九十矣二季亦各八十餘當時見於賦詠者多舘閣之賢虞文靖公為序以人瑞稱之夫天下之夀者多矣然未必萃於一家萃於一家有矣未必出於同氣尹氏兄弟如此得不謂之人瑞乎今鄭氏兄弟四人同産而又同夀其年益加將不與尹氏兄弟等乎予聞之徳者夀之本南山有䑓之詩以無疆無期祝君子之夀矣而必曰徳音不已徳音是茂至於保艾爾後乃已焉使鄭氏四老年彌髙徳彌邵保養其子孫而至於耄期復有君子者賦詠之雖亦謂之人瑞可也今是詩也豈獨鄭氏之榮觀哉朝廷仁育天下鴻休鉅美亦於此見矣不可以不傳也故為序之使傳焉亦因以啓夫後之作者云耳送羅文振序羅氏本吉水右族文振之尊府始居山陽故今為山陽人永樂中予在翰林文振弟銓字文衡取進士為監察御史以㢘能有名於當時予甚重之因相與往来文衡亦以先世與予居同郡而篤於相好由是文振亦厚予雖跡不能相親其意甚洽也文振居山陽湖上當南北之衝人之過此者多能道其禮賢下士矜窮恤匱而文振之義聲亦藉藉予固嘉其兄弟皆賢而世能及者鮮矣未幾文衡陞湖廣按察使推惡佑善去弊興利威行惠施近悦遠懐憲使之賢莫有加焉者也文振則能出榖以佐有司賑飢民天子下璽書褒其義當謝恩闕下而文衡亦以考績来兄弟同載上京師人之素相慕者莫不喜而其心亦甚樂也及文振歸予作長詩以贈行今别十餘年乃復至而予不暇一相見若文衡則仙去亦乆矣俯仰今昔何能不慨於心哉文衡有一男二女文振皆長育之歸其次女於刑部尚書金公之次子弼而親送至北京金公嘗與文衡同筆硯朋友契誼雖甚厚今文振以婚姻之好不逺數千里而来其􅀹篤於義者也親戚朋友皆相惇以義不亦古之道也哉然予於是有感矣世之淺丈夫者其初於親戚兄弟非不懽然相得也至於死生契濶之際而計得失難易少有不變其初心者於是遺親棄故反天常逆人紀而甘心於不義此君子之所深歎也則予於文振安得不深嘉而重美之哉文振將歸凡逹官顯人與其兄弟素厚者屬予文為贈予固厚文振且欲勵夫世之未能然者故為序以贈之送彭教諭致仕序彭王世婚姻家直與士淳内外兄弟也自為童子時常得拜彭氏叔祖叔父其所以教愛直者猶同姓至親不以異姓視也次則士淳與兄士本誼最篤士本無宦情樂閒放從容自得於田里直與士淳則相繼出士淳為教官以其道淑後進世稱賢師儒者必歸之直濫官京師上無補於朝廷下無益於生民負素餐之譏者四十又七年其視士淳盖有愧多矣士淳年既六十四而舊患風濕疾加劇足不良於行至是丁外艱起復遂以疾聞於上得致事而去眷念疇昔欿然於懐慕回路之請贈與䖏也故有欲為士淳言者兩家世以儒為業其行修其名立乆矣今之後輩亦有怠廢前人之業而無以植身者乎感發其志意而誘掖其進課勵以要其成在士淳而已直之子孫盖誠有頼矣况彭氏子孫哉古之君子致仕而歸則為里塾師以孝順儉勤仁義忠信教鄉里子弟故畎畆之間髦士出焉賢才成風俗美而治道盛矣士淳可不加之意乎直年七十二少士本一歲而三人者皆有田在西郭士本既享其樂今士淳又歸矣直之老病旦夕當得請怡塘觀山杖屨往来覩歲物之豐成感皇恩之優厚烹肥擊鮮擷嘉蔬釃㫖酒相與勸酬引滿而酌之醉飽鼓腹詠歌聖化以繼康衢之謡而傳之萬世使知今日太平之盛此儒者之事亦士淳之所樂也故併書之以為贈行序士淳亦有以䖏我哉送王知縣序安吉縣令王某者薊人也坐累留京師且一年既得白將歸其縣學教諭郭先生考績當陞郡博士需次亦留京與其弟子之升太學者張升張初孫禮金朴来告予曰王侯初為監察御史有名既而拜靈璧令又移安吉皆以寛厚得人心且其来也非其所自致者今得白而歸則其人之幸也惟吾等思有以贈其行故願得一言焉郭先生有文學徳誼初為予邑庠師予所從受業非茍譽人者况所謂寛厚得民固吾之所重其安可黙邪古之君子之居民上以其仁也非徒任才而已矣夫寛厚者仁之徳也寛則能有所容而褊迫苛細之令不行然後物得其安厚則能有所載而刻薄殘忍之政不行然後物得其養而吾之志可行乎其間書曰御衆以寛易之象曰君子以厚徳載物此之謂也由是觀之寛不足以容厚不足以載操切􅃤覈一極其才之所至而止此鄙人薄夫之所以自快而君子不貴矣然則亦何樂而為之哉以予所見而得其人焉汲汲以為名倖倖以用智任情於鈎摭之末伸威於鞭朴之間赫然自以為神明然徒逞乎外而不檢乎内豪民黠胥因縁以為姦而隂售其䜛卒之戕民生而自辱焉嗚呼為民父母之道豈當如是耶其敗固宜矣然後益信聖人之所云者雖萬世可行也仇覽不罰陳元而使為孝子兒寛不忍苛暴督賦而反以最聞若此者不一也誠意既孚孰肯悖且慢哉而何以鄙薄為也若乃弛縱以為寛媕婀以為厚則非予之所知矣予既嘉侯之善而重郭先生之命故為贈言而不辭侯果有取於予言哉劉敏英甫夀詩序萬安劉敏英甫以元至正辛丑十月缺日生至今永樂庚子盖六十年矣其子友臨與其姪友震廣經廣衡将以是日㑹宗族鄉黨置酒作樂以為夀而吾邑之賢之厚於敏英甫者又作為歌詩以慶之鄉貢進士張僉時薦持以求予序夫君子之居其鄉有子孫之奉賔客之娛田園足以具衣食池沼足以供遊釣而又獲夫夀考康寧之福若敏英甫者何其幸哉此慶夀之詩之所宜作也昔先王之世忠厚之澤浹於遠邇上之所以安養其人者必使之夀考以享優游之樂而其人亦皆相與引翼以自樂於胡考之休歲時閒暇舉酒相懽其祝嘏之詞不曰夀考維祺則曰黄耉無疆於乎盛哉若夫鴇羽之怨陟岵之嗟盖又出於衰世之所為者此行葦諸詩之所以為盛也是以後之君子讀其詩而知王道之隆替人事之得失風俗之厚薄禮樂之廢興故曰詩可以觀然則諸賢慶夀之詩豈止為敏英甫一身一家之榮而已哉抑嘗究夫敏英甫始生之歲正上天新命之時我太祖皇帝龍興之日陽和發育之仁已回於霜雪凋瘁之中故夫人物生於其時禀風氣之純固㴠徳澤之深厚皆得以悠乆而無害譬諸松栢㩀土地之饒受雨露之潤至於大百圍歴千歲拂日月而干雲霓者其理固應爾也則予於敏英甫之夀安得不推所自而深美之哉况其子孫之多賢而賔客之有文也後之人讀是詩因敏英甫之夀而仰國家慶澤之長太平文物之盛必有低佪羡慕於無窮者故為序其詩使傳焉贈王約歲貢序國朝養士之制内設國子監其外府州縣皆立學每歲貢其賢者各有數而屬之禮部聞於天子則又以屬之翰林考其經義而定其中否其不中者禮部還之於其學而降罰焉其中者則又以聞而屬之國子監使敦篤其已能増益所未至祭酒司業端表儀於上博士助教勤誨於下士之䖏此有不成其徳逹其材者寡矣由是歴事於諸司則又加考察焉滿三月書其勤於事慎於守者以聞而屬之吏部擢用之其不由此者則以其學羣試於有司往往登巍科躋膴仕其塌然不振者盖頽然自放者也予在翰林十八年所見貢士多矣又數喜從人問其詳其曰某也長於材而逹於政則後之歴事而有顯名者必此人也其曰某也勤於學而敏於文則後之取進士而登顯位者亦必此人也盖未嘗不歎夫朝廷待士之厚而為士者之遭也而又益信夫士惟無實則已茍隆其實則屢試屢進有以為邦家之光閭里之榮也於乎何其幸哉廬陵王約為吉安府學生既有年今年春予始識之恂恂恭讓盖其學可知矣將充貢上京師其自禮部試翰林遊太學以其所實有者大振耀於時盖可必也而予舅氏歐陽先生數取予文贈其行予不敢辭然念不能有益於約也姑書朝廷所以待士之厚與士之當隆其實者如此以送之庶幾相勉於遠大也送劉進士赴京序廬陵劉禮讓既舉進士官京師未㡬以内艱歸終三年將復詣京師予内弟歐陽士則於禮讓有講學之益求予為言贈其行予謂禮讓明經取進士其於聖賢之道益講之精矣即予有言亦禮讓之所已知也所不必知者則予之所不必言也雖然予與禮讓皆以進士發身其有概於予心者試相與言焉可也夫進士之科始於隋唐宋皆重之而尤盛於今盖自貢於鄉㑹試於禮部賜對於大廷其光寵也至矣及授以官往往職禁近副九卿當藩臬之寄領郡邑之専其任用也重矣然天下之人所以責望於進士者亦不輕也其言合乎道其行中乎理矣則曰彼為進士宜如是其不然者則必相與誚讓之不貸也夫仕者豈止進士而已哉而人獨嚴於進士如此豈非享其名者人固求其實耶可不懼哉然自開科以来其他之為進士者予不能知若吾廬陵名實之相副者盖多有矣獨若予者誠所謂誚讓而不貸者也其安得不警且懼乎然嘗思之昔之君子文學之純正徳行之粹美政事之寛和名節之崇高者若歐陽文忠公胡忠簡公楊忠襄公周文忠公楊文節公與信國文忠公者盖鮮其所為道皆古聖賢之道天下後世之所仰望而師法者也况鄉郡之後進乎詩曰伐柯伐柯其則不遠近法諸公而遠跡聖賢其亦㡬乎其可哉禮讓必有同予懐者矣禮讓抱英偉之才負邁往之氣其實之稱名也審矣此予所願受益者也故慕回路二子之相贈與䖏也而有以贈禮讓禮讓其必有以䖏我也夫送尹同知序君子之仕也盡其道於君而不能及其親者盖有矣此忠孝之所以難也四牡之三章曰王事靡盬不遑將父其四章曰王事靡盬不遑将母盖勤於其職而於親有不暇顧則惟極其憂思而已矣然則有能兼之者豈非人之所大欲哉尹君自道之佐澂江在雲南萬里外其母盖八十餘不能就養以食其禄自道慊然於懐者二年矣今年以考績自京師過故鄉得拜其母於堂上盡其敬愛之心油油翼翼不忍去左右然當復之澂江而其心終有不釋然者於是吾黨之士相與㑹於城南濟渡菴之僧舎而慰勉焉酒半有作而言者曰君子之孝莫重於顯親今佐一郡為天子牧小民民懐其徳而皆推本於父母之賢則為孝至矣又曰子之尊府典教三十年而子兄弟又繼顯今之有家皆禄俸之餘也是可以榮養矣何必澂江哉又曰國朝之制居官有成績者天子皆推恩及其親子之官五品於親得封宜人子其務此其榮莫大矣自道矍然起謝曰君之言美矣敢不拜教而更勉於大者焉於是人皆知自道之能有為而忠孝之兼盡也乃取唐盧藏用詩國為休徴選名因仲舉題二句為韻各賦詩二首以送之予因次第其言以為序云贈沈侯赴任詩序吳興沈侯自上林苑典署改令吾泰和泰和士者訪其才行而喜於得侯然不知者乃誣縣為難治故予樂相與道之泰和居吉安上流其地濵大江農工商賈各勤其所事田利之入足以養其人非甚凶年盖無有凍餒者其俗喜讀書自城郭至山谷之間吟誦之聲相聞不間於貴賤貧富故多能知道理識是非賦税力役以供公上其分之所當然者無不盡其心縣官始至察其行果賢也即相戒勿犯凡有所令争勸趍之盖自昔如此予為童子時江隂徐侯来為令尊賢下士訪民之所欲惡而斟酌罷行之大姦巨蠧為民害者一切掃除民有訟皆立斷不以委吏無情者不敢至其前科徴調發必驗民力之所宜民大恱服故事無不治後竟以滿去又十五六年永嘉吳侯来主縣簿清慎樂易小大之事皆親之豪民猾胥不得肆其惡於時當餽運之徳州緩者以軍法從事衆多憚行侯獨任其責而民皆樂從無後者一縣之人惟侯令是聴不幸以疾終於位之二侯者民至於今頌之其他之為縣者好近小人以濟其私或剛暴以殘民而乖争陵犯之風興或柔靡以縱民而慢易玩䙝之俗成循習之乆於是縣始若難治然豈縣之難治哉其變化盖有由也縣之父老感念疇昔盻盻然歎曰安得復有仁人君子奉法循理適寛猛之宜行是非之公者以撫我乎其朝夕望之盖如農夫之望歳也乃今幸而得侯侯誠有以慰民望則民服侯之化如曩時而後信縣之易治嗚呼泰和文獻之地忠義之邦也於此而謂難治豈非厚誣也哉在侯所以化導之耳故為序以贈之而諸公之詩系焉盖望夫徳化之成也曽生哀挽詩序生名秬字光薦左春坊大學士兼翰林侍讀學士曽先生子也先生早有子二人皆夭及得生最鍾愛遣從錢侍讀尹編修學聦悟異常兒隨先生往来兩京間識益進志益勵年十五六歸永豐大肆力於學足跡未嘗至於城府凡經傳㣲言奥義皆通念曉析常屈其儕輩為文章必㩀於理而才足以發之頃刻成數百言自謂一第可俯拾先生期以遠到故未就試生既苦心為學至忘寢食因得羸疾命良醫治之疾愈復力學如初故疾止而復作至於三四竟以宣徳三年十二月十七日卒於家年二十一訃聞京師先生哭之慟予與諸公素竒生聞其死皆往吊先生出其平日所寄詩皆俊麗有思致諸公益悼惜而先生哭益哀初生侍先生自北還至臨清舟行遇􅍻而敗水湧入舟同載者皆走避先生病卧舟中命𨽻人抱生登岸生曰父病不能起兒忍棄父求活耶不肯往拊膺大哭㑹救至俱得免生時纔十歲其孝愛盖性然也嗚呼生之文學性行如此又承世徳之懿宜享其福而竟止於斯所謂天道佑善者非邪古稱仁者有後其信然邪豈所謂天之未定者邪抑生之命止於此而已邪予盖不能詰也世之貴游子弟藉其勢力不溺志於聲色貨利即撓法干政凌轢善柔以辱累其父兄生則異於是然彼乃不死而生死焉豈不深可悲也哉諸公憐生者皆作詩哀之予故著其可哀之實以冠於篇端使覽者得詳焉贈楊知縣歸省序仕莫善於為令而亦莫難於為令盖令長民者也凡朝廷所付安養斯民之政與已所學父母斯民之道皆親行之無不如志而民之被其惠者亦親戴之如父母故曰仕莫善於為令其或䖏京邑之繁與夫水陸之衝徴輸調發取辦於一時欲寛裕以利民則妨事欲嚴廹以趍事則病民故曰莫難於為令惟有至誠惻怛之心又有應機適用之智雖嚴廹趍事而寛裕利民之意行乎其中而後謂之才且良然亦鮮矣大興北京在焉事之䌓劇異他邑為令而能乆於其職者蒲城楊璉也璉始遊鄉校領薦書入舘閣與脩永樂大典書成試事都察院有能名於是擢為大興令予未獲與之接而嘗察其為人盖當膠轕叢脞之際人不勝其勞也獨䖏之恬然若豫定者而事亦無不治當時論者皆以為能予雖未盡知其所以及民者要其功效豈非予前之所云而可謂之才且良者乎天下之劇縣非一也使皆得若璉者為之豈有不理哉今天子加恩任職之臣進階為承徳郎錫之勑命而追贈其親皆六品赫然光顯矣此天下為令者之所無也其亦可謂無負哉予始讀漢書循吏傳而慨慕其人思欲自試於一縣庶幾或與之齒然顧有其心無其才倘或遇甚難者則志不行而禍咎隨之由是不復言為縣今於璉徒深為之歎羡而已矣璉以九年考績赴吏部在優等當得陞自以乆去墳墓乃請告歸省将行稽勲郎中趙君文選員外郎吳君嘗與某同在舘閣求予文贈之予故為序以示其鄉人使知其所立如此而足以為鄉里榮也送曽學正序曽暹明晉吉水人為沁州學正三年矣方其在鄉校時予以翰林侍讀丁内艱居家江西按察僉事黄汝申因廵歴過予予問學校之士可稱數者則以明晉對謂其經明行脩諸郡邑若此者無幾人予心識之其後明晉果領鄉薦在髙等及試禮部乃得典教沁州知明晉者多不滿於有司予獨為之喜盖謂果得進士為要官矻矻於政務之䌓有所未至則譴辱隨之豈若居師儒之位以所學教諸生使皆才且良己雖不為要官而要官乃自己成之之為愈乎而明晉亦安於其職㑹朝廷大新學政定學校弟子員務得聦明才俊之士而教育之命御史㑹諸有司簡去其無良者御史之山西以明晉偕行使詳定其文而去留之其無良者造誣以起事事連明晉逮至京師得白将復歸沁州其友中書舎人胡㵾海澄與諸士大夫作詩送之而請予序予念知明晉已乆又所以期之也厚則於其去可愛一言乎夫學校之士未有不資於師以成者惟予廬陵之士可不煩於師盖其得於家者多而又有朋友講習以進其學故師佚而功倍非予廬陵而欲佚以成功盖難矣然聦明才俊之士所在有之教之而不成此理之無者也為師者端其本於上所言皆聖賢之言所行皆聖賢之行導之以正持之以誠勵之以勤而待之以寛秉彛好徳之心彼獨無也哉如是而有不成者未之見也予嘗察夫學校之士之所以不能成其才者師之學有未至而茍欲自佚也明晉之學既足以為人師士而得明晉為之師幸矣而又遇夫天子作興學校之時當盡其所以為教之道使為弟子者皆才且良而可以為公卿大夫則無負於所學無負於所任矣今之逹官貴人亦有自教官進者明晉果能善於其職而有作人之效則進於顯榮将不自兹始乎明晉勉之故因序其詩而為言如此此予相厚之意也蕭先生挽詩序蕭先生子上没幾三十年門人翰林侍講余學䕫乃彚次其哀挽之詩俾直序之直先考瓊州公與先生有斯文之好直為童子時先公以事去家未之學也及弱冠稍知學而無所受業當是時獨先生與尚仁蕭先生在以經學教授鄉里尚仁先生性方嚴難事而先生色温氣和俯接後進循循有規矩一時從遊者非獨鄉邑之俊秀盖有數百里負笈而至者先生通五經尤䆳於書凡傳記百家之說靡不淹貫問之無不言言之無不盡其為文章頃刻千百言皆有法度學者争傳誦之直嘗以故人子謁舘下先生誘掖奨進為言所以為學之道甚悉直得服膺焉然終以家累不獲朝夕在左右故卒於無成先生雖不仕而以學行名天下洪武中嘗考校經書賔興取士聘幣交走其門號為良有司以永樂缺年卒年缺十嗚呼先生已矣安得復有如先生者直嘗聞之洪武之初邑中諸老先生如陳海桑劉尚書與弟東原公直先祖竹亭先生與先叔祖御史公皆以文學徳行為望於當時又皆以成就後學為務見故人子弟與鄉邑之俊秀未嘗不俯而教之惟恐其不為君子諸老先生相繼没而先生獨紹其遺風寛厚樂易為學者所親異乎屑屑於世俗之末者使其得伏生之年則所成就當益盛而竟止於斯豈先生之不幸乃學者之不幸宜乎諸君不能已於哀也師生之義薄乆矣學䕫獨拳拳於先生既為之傳又彚次是詩可不謂厚矣乎是亦教之至也直常感慕先生不能忘故於學䕫之命不辭而為之序亦因以寓其情焉耳梁氏族譜序蜀府紀善梁先生本之重脩梁氏族譜既成書其從子叔車持来京師求予序按梁氏之先居長沙歴十三世有勝用者仕南唐始徙居泰和至今叔車之子二十世而彌昌其間為太守别駕登侍從職文史者累累有之始居縣東門外宗族之蕃園池亭榭登臨遊覽之勝彌望皆梁氏他族莫得間焉故鄉人稱其處曰梁家巷䘮亂以来子孫散處而虛其地然故名號猶存則當時之盛可想見矣予嘗竊歎故家大族所以為望於鄉邑而能盛且乆者非以其貴富也仁義禮樂有以維持之矣江出岷山滔滔汨汨踰萬里以至於海適然而與風遇其演漾而成文洶湧而為浪可喜可愕雖不同然特一時之觀而已非其所恃以為長也其所以長者有本故也欒卻胥原狐續慶伯皆卿大夫之家然當晉之猶競也而已降在皂𨽻盖非素有本者猝然自奮以取富貴而仁義禮樂不足以維持之其子孫之降也固宜然則梁氏之所以乆而盛者其所事可知矣梁氏居今栁溪自心易先生始先生盖古君子而予不及見之而見畦樂先生清文懿行以古詩名當時又嘗從用之先生在翰林其文行尤為大夫君子所推重本之先生盖不異於其兄而叔車諸兄弟又皆篤學攻文循循守禮法論故家大族子孫之賢者莫先焉其續休趾美而維持梁氏者不既盛矣乎使其他之為子孫者亦篤修而不忘則其悠乆盛大雖至於百世可也夫譜以著本源明世系使後人知其所自而善繼之者也予與梁氏世有連則於為其後者亦安能已於言哉故為序如此以告之送鄭御史序御史之於衆職其要且重可知矣盖任天子耳目之寄凡民情之幽遠賢才之欝湮吏事之壅底姦邪之隠伏御史皆得奏言之使上之恩威周被綱紀肅張而治道舉矣故凡内外百司之執事與夫豪民黠胥行有戻於道者往往憚之獨安常守分之君子沉欝而不振民有戚憂而不能以自逹者則仰望焉是以豪傑之士欲有所建立者多樂為之謂得行其志而不撓於人也夫上之所倚任者曰御史衆之所愛而畏者亦曰御史及其所至民無壅情士無抑志老姦宿弊消縮摧敗而無餘若是者誠足以快意矣然民隠當察也才滯當逹也而或有壅蔽之者况乎姦弊之沉祕而誕謾之積乆哉惟明者能見於深㣲如淵澄如鏡空物之妍􅎀不能掩也然所以致其明者去其利欲之昏焉耳明足以見之矣而或狃於私或牽於愛則不足以行之不狃於私不牽於愛可以行之矣而觀望前郤媕婀容忍亦惡足以成事哉故惟明也惟公也惟剛以决也斯可以舉其職矣不然徒借為威重以震耀於人而曰吾受耳目之寄豈不戾哉予又見御史之難為也永嘉鄭道寧為國子生歴事刑部有能名其鄉之逹尊少保户部尚書兼武英殿大學士黄先生之所深愛者也今授官得廣東道監察御史當之南京道寧盖所謂豪傑之士而樂行其志者歟於其行也中書舎人胡宗藴等及吾縣之大夫鄭君璘皆與道寧篤鄉邑之好求予言贈之予才不足以適用而見御史之難為如此故相與言之亦欲勉其志以至於遠大也道寧其以為迂也乎送劉僉事復職序宣徳元年三月河南按察僉事劉君士皆再考績来京師吏部以為稱言於上俾復其職士皆予同邑人且予昔考禮部貢士時所進者也故於其去吾邑之士在京師者相率求予文贈之予謂士皆學足以明理才足以立事既能稱其任矣而何待於贈言哉夫贈者有所増益之謂言而無益非所以厚於士皆也君子之仕以行道也行道者之心惟恐善不及於人而人有不得其所者不以勸懲而有加損也然而必曰勸懲之者乃世之為治者之所為而君子不計焉盖曰盡吾道焉耳矣匹夫匹婦有不與被堯舜之澤者若已推而納之溝中此伊尹之志也君子亦猶是而已矣夫以養民為職者郡縣之吏也察吏之賢否與民之休戚者按察司之事也河南之民多矣而為之長者豈一二計哉因民之休戚而求吏之賢否可得矣士皆其亦深觀而宻察之也乎使夫郡縣而皆得一良吏焉以無私之心行無害之政蒞之以勤持之以誠雖甚䌓且劇也民必有受其澤者矣南陽中牟河南之属也今之人豈不如昔之人哉而其他之所産者又豈不如南陽中牟者哉惟無賢吏也則已矣决有之民豈有不得其所者哉然㢘察而勤奬之此吾士皆與其同列之君子所宜加意也士皆今以績最稱於有司所以勸賢也然士皆獨非以行道為心者乎以行道為心則民有不得其所者士皆得無欿然於中邪夫民之命懸乎吏而察吏之賢否系乎按察之官吏有不賢而肆於民上君子将咎其縱可不慎哉於乎士皆其尚加勉焉可也宦成而怠也非予所望於士皆也遂書以贈其行贈凌君詩序凌君賢字彦能始以文學為教官後用薦舉起知湖廣之武岡河南之鄭州遂入通判應天府皆有名既而坐累罷官居均州方其為通判時仁宗皇帝在東宫雅知之而其子晏如亦以才能見知遇仁宗即位晏如由吏科給事中陞都給事中日侍上左右於時方飭厲有位以興起事功命羣臣之任職者皆給誥勅得封贈其親上嘉晏如而念彦能特命冠帶以朝而以其子之爵位寵之今皇帝纉承大統於是錫之勅命俾歸老焉彦能父子感二聖恩徳之無窮也相與詣闕頓首謝既而将歸湖州一時士大夫既羡其榮而又喜其子之賢也皆賦詩送之而求予序予謂仁宗皇帝聖性天成好賢容衆故自即位以來凡嘗任使之人雖遠近顯晦不同咸見褒録聖仁如天盖所謂曲成萬物而不遺者而又承之以今上之聖善繼善述是故有若彦能者誠可謂榮幸也矣然誥勅之初頒也仁宗皇帝嘗語詞臣曰凡羣臣之賢者皆本於父母之教故推恩以及之非特勸忠且以勉夫為人子與為人父母者也於戱其所以風厲天下之意至矣然則被其榮者必當以報稱於萬一乎今彦能歸矣其爵位之崇衣冠之盛錫命之華煜然雲漢昭囬之光足以輝映乎鄉邑鄉邑之人必将起敬起慕皆以彦能願其親而以晏如願其子莫不勉為忠孝兾自立於當時而彦能父子所以優游怡愉詠歌聖徳以傳之萬世與夫夙興夜寐盡心竭力以脩其職者将無愧於古人矣故為序之如此送周教諭詩序吉水沂田周氏以宦學聞於世乆矣自予官京師二十年所見凡十餘人皆表然可敬者今年中教官選者又二人功載其一也功載兄功叙為翰林編修與予同居澄清坊相去甚邇故功載亦辱顧予予見功載循循雅飭守禮而不自放心特重之今往教武陵予知其将為賢師也盖縣學之設所以聚縣人子弟之俊者而教之俊者聦敏而有才之謂也聦敏有才而不加檢焉則流於輕佻而無實故宜得守禮者為之師朝夕相與講聖人之道使其視聼言動必由於禮循習之乆則有以成其仁而足以為世用矣予知功載之将為賢師者以此也然予見教官多矣昔有一人焉年甚富志甚銳類可以進於道者及至乎窮鄉下邑無先生長者以為之礪郡守縣令又每優容之於是猖狂自恣學不加脩而其行益悖夫以輕佻之子弟而薫炙於狂悖之師盖愈流而愈逺矣則於興學育才以為治天下之本者豈不失望邪故予又願功載之乆而不渝也武陵常徳属邑盖水陸之衝其民足於魚稻之利其風俗亦頗淳質近古然而有一不如古者婚嫁失時是也往年予友鄭宗顯典縣幕嘗㢘察而訓戒之俗稍為之變今去乆矣安知不猶狃於故習乎學校所以明人倫也夫婦人倫之首風化之原謂非教官事可乎故予舉以告功載凡有類此者皆所宜盡心也士大夫送功載者皆以詩予因書其說以為序贈鄭郎中序鄭君文實之為文選郎中也有闓敏之才有恭慎之行蔚然名著於當時盖鄭氏世家南城素以為善重鄉邑文實之所以賢於人盖得之家者然也故始自司務擢考功副郎已有名及其典選而名益顯今年考滿績居最既復任其僚友章尚文等求予作文以贈之盖美其成績而勉進之意寓焉予謂僚友之義缺乆矣平居無事嬉然若相愛而娟嫉之意盖不能無也其能褒勸劘切而志於遠大者甚少今諸君之篤於誼如此則予雖不敏其可自愛不腆之辭不以為文實贈哉况於文實素厚也乎夫治天下者必用天下之才知之明而任之當則天下治矣然自古為君者於知人官人皆不一一親也任人而已大禹嘗言知人則哲能官人能官人則有安民之惠雖驩兠輩皆不足以害政則知人官人誠治天下之本今之選司實此之任也文實受任於兹有年矣其名之蔚然者皆其才行之偉然者致之也文實其賢於人逺哉雖然予聞之君子之自脩也辟若登山然勉進而不已則身愈髙人愈仰之然宦成而怠者亦有矣以文實之才行因已然之效而進之不自怠且止焉将不猶登㤗山之髙而人之仰之愈不可及哉晉人謂郎官之選極清美號為大臣之副此則以名位言也才行既進則名位隨之矣文實勉之此僚友之所願也袁添禄挽詩序宣徳元年二月予友吏部考功主事袁君添禄有疾不能朝其素與善者皆往來問候治醫藥及其死也又相與奔走往哭之且經紀其䘮事俾其姪缺奉柩歸衡山𦵏焉既又作為詩詞以哀挽之考功郎中章君尚文為裒次成帙而俾予序憶予與諸君同取永樂二年進士入翰林為庶吉士太宗皇帝興道右文擇二十八人使讀中秘書以明道徳之要而致文章之盛且以風厲天下之人君與其間敦厚方直而勤學不厭其所為文章必法古昔不肯茍同於衆於是二十八人者其居處同其志意盖無不同及其後也或列官翰林或擢居郎署遂出佐藩憲輔王國又或以老病而歸向之磨礲鐫切殷勤欵宻怡然相樂之意已有不可復得之嘆况夙有淪落之可悲者乎其在京師者猶幸有左右春坊大學士曽君子啓王君時彦諭徳周君崇述王府長史周君孟簡周君恂如及尚文君與予八人者朝夕或相見於朝得從容道舊故然皆縻於職任不能相聚如曩時嗚呼孰知君又棄予往矣感念疇昔則予六七人者安得不深嗟而痛悼哉君於二十八人中最為後顯人皆擬君為大器庶㡬遠到遭遇仁宗下詔求賢君首被薦舉人皆以為駸駸且大用矣而竟止於斯豈非君之不幸哉而亦豈非其命也哉雖然古之不大顯而没者何限然能有善而見惜於人者亦鮮若君之存人皆以為君子至其没而哀惜之不置比之沒世無稱與夫齷齪而乆生者其相去逺哉觀於是詩可見矣故為序之使傳焉送蕭郎中考績詩序初伯辰之知深州也太宗文皇帝廵幸北京予時以扈從在焉伯辰嘗以職来朝得相見於其姻家退庵金先生所雅重周慎稱所謂太守者也而深州之民又往往道伯辰為政平易有恤民之心予愛之故伯辰以其饒陽八景求予題予皆為賦詩以别其後伯辰為州之政成有司㝡其課遂陞為禮部精膳郎中而予乃以憂去不知也今年伯辰以考績赴行在復主於金先生去予家甚邇而予以營職之勤不暇一相接盖與伯辰别十年而復来其相去咫尺乃不得邂逅以相慰籍通殷勤而况於千萬里之遠哉人生㑹合之不可必如此可歎也方予與伯辰相見時伯辰髪雖頒白而意氣充然足以有為者也今去之乆計其髪加白矣而熟於民事老於世故是其心則壯也如此而為大夫於朝廷則措之功名事業其可量也哉古之人所以圖任老成者盖謂此也伯辰将歸金先生之子以其父命属予求贈言予謂伯辰之齒長於予其才識盖非予可及也予将何以増益伯辰也哉雖然君子之仕也以行道也茍一日未去其位則必思所以盡其職盡其職則必盡其道能盡其道則将進而至於公卿大臣之位不難也予於伯辰有願焉故書以為贈工乎詩者歌以繫之槐雲書舎詩序槐雲書舎詩若干首士大夫為新喻王立魁作也立魁之祖雲髙年七十餘隠徳弗耀鄉里皆稱為長者見立魁聡敏好學則曰是庶幾能立者乎故取王晉公之事以名其讀書之所而使力學焉泗水縣丞陳君仲器其邑人也於予有同年之好而與王氏相往来思勉立魁於善以成其祖之志今年来京師求諸公為賦詩而請予序夫士之為學盖必有蔵脩之所燕休之居以寧其身樂其志然後能肆力於學而不厭此書舎所宜有也聖人之道載於書自脩身正家以至於治國平天下小大精粗無不備也讀之而後能知知之而體於身見於行事而無不善焉則君子之道得矣此人之所以貴於學也晉公之事偉矣盖可謂仁也茍其心不違於仁而行合天下之公則身雖不至於顯榮而子孫享其福禄於後此天之所以報也雲髙名其書舎如此抑喜其事而特表之邪抑将使立魁勉而至於此邪若喜其事而特表之則固王氏之偉然者也若將使立魁勉而至於此也則有其說矣夫槐非徳也蘇子所謂徳之符者也盖惟其徳積於已及於人而施於其子孫故物之萃夫和氣者亦皆鬰然而長茂而君子於此觀徳矣若以為魏公之盛而特由槐焉則種樹於邰者皆可以為稷植檜於闕里者皆足以繼聖人奚可哉故予之所願於立魁者讀書以窮理脩徳以及人則今日之視槐雲書舎與昔之所謂三槐堂者等矣予未識立魁因陳君之請而為序其詩且道予之所願者焉興國劉氏族譜序興國劉氏族譜其裔敬夫之所脩也劉氏居興國東門為大家其先盖彭城人遭遇兵燹失其譜牒其所以徙之故弗詳焉敬夫懼其世之不明而子孫之不能知也乃自五世祖以下可知者録為譜圖欲以傳之逺圖成而請予序之予謂譜者所以著所自出而序其昭穆别其戚䟽使子孫知所本源正倫理而篤恩誼不至如秦越人之相視焉者也然知其所自出而畧之不可也不知其所自出而强附焉亦不可也宋眉山蘇氏實出於眉州刺史味道世乆而失其傳老泉先生斷自髙曽而下録之為譜不敢强附以亂宗盖尊祖敬宗之道當然也敬夫之譜其有合於是者矣予聞敬夫之尊府原福君當元季㓂亂倡義為城守卒能捍衛以完城有司以鄉民多外應者將寘之法君為力救全活者甚衆其後熊天瑞守贑州署君為総轄其時兵戈饑饉民顛連無所訴君活之危亡者又不可勝計盖君闓爽慈良恱詩書而力仁義故所為如此此所以克昌其後也歟敬夫以君故得官今為徳州衛管軍百户其闓爽慈良恱詩書而力仁義者盖一與君同也而事上之忠慕親之孝尤有足尚者故一時宿將顯人皆知重敬夫觀君父子之行如此則其後安得不昌也哉使為之子若孫又能以其父子為法而日篤不忘則此譜傳之百世有耀矣敬夫以嘗受教於予大父也感念之不置故亦愛厚予予因為序之以勸其後人云送戴教諭序吾邑戴彪文蔚自桃源訓導考績来京師得保昌教諭將行求贈言於予予謂保昌為南雄属邑其地在庾嶺之下盖南北之衝舟車之㑹也逹官貴人往来由此者冠盖相望自守令以下奔走送迎無虛日有所不至小則挫抑之甚者求其疵而加責罰焉其􅇵且勞如此而教官之所教與學者之所學必静以寧其身然後得肆力焉董仲舒下帷以學至三年不窺園故能通天人之奥而言立於天下後世此其故可知矣今子之為教官也将汨汨於車塵馬足之中以說乎人則廢其職将矻矻然於聖經賢傳之間以快乎已則為逆人斯二者予不知其所䖏也然嘗聞之孔子曰君子易事而難說也說之不以道不說也彼奔走送迎曲意承順以為說者皆非其道矣使其君子也将不以是為罪乎夫君子不說非道而吾必以其所不說者說之是不以君子之道待之也其可乎故予於文蔚有說焉凡職董教事者之臨吾邑也吾往謁之禮也其不然則否朝夕坐堂上以聖賢之道教諸生其所謂孝弟忠信禮義㢘耻必使脩於身而見於言行之實則吾之職脩而於朝廷教學之意可以無負矣彼君子者聞之方且樂吾之所為安得以非道之說為望哉不此之務而務以非道說人雖說之者衆而君子則愧之矣文蔚其慎擇哉故書以贈其行送李知縣序泰和李桓圭初為蒲縣典史有能名於汾晉間其縣令陳善住以其屈於末位也上章薦之吏部試其文累千百言人皆謂宜在優選㑹有擿其微疵者遂報罷歸蒲從政之暇益閉户讀書為文其志不逹不止也洪熈元年詔求賢才可為守令者於是善住復以桓圭應詔吏部亦雅知其人試在髙等陞授南陽知縣先是桓圭弟信圭由鄉縣察舉赴吏部試其為文得清河令一年之間兄弟二人皆為縣而皆以淳謹見稱邑之士大夫皆為喜李氏世居南岡里以貲産雄一鄉其曽祖英叔嘗為柏興路同知祖如春亦得南安推官自是而後六七十年而桓圭兄弟乃並仕於時其世澤盖有存而未冺者予與桓圭自弱冠時已相識桓圭方從謝子方先生學欲取進士後舉教官得典史而予已官京師故桓圭往來常過予今去南陽求言以為别則予安可已邪昔仁宗皇帝詔舉守令特以為民者國之本守令所以養民也故切切焉求之盖欲斯民皆安於畎畝衣食以樂生送死而無不遂者桓圭已試於縣其於安養斯民之道葢知之熟矣今專邑而治足以行其志慎無負所以求之之意也夫為令者以至誠惻怛為本故曰安静之吏悃愊無華日計不足歳計有餘彼輕獧㨗給馳騁以見能矯激以立名者皆非篤於為治者也桓圭勉之唐岑伯華為金壇令弟仲翔為長洲仲休為溧水皆有治績人稱之至今予又為南陽清河望也南陽太守陳侯正倫予同郡人清慎君子也桓圭為政之暇尚以予言質之休樂軒詩序休樂軒詩若干首士大夫為江勝克恭作也克恭為監察御史以端厚清慎著稱乆矣前年出按交阯去京師萬里外其所以自䖏者如平時㑹同事御史與彭進士有違言因論奏之強克恭聮署其牘事有失實遂連克恭皆罷官衆皆謂克恭宜具本末自明不宜含垢受抑克恭曰吾所遇如此盖命也尚何辭且安知吾之休不樂邪此軒之所以名而詩所由作也嗟夫世之奔走於禍福之途而迷溺於得失之間者非一人也方其得也悻悻然恣其所欲而惴惴恐失之及其失也則戚然若不可生者彼惡知所謂命邪夫命者非其所自致而至者也茍非其所自致而至焉則受之而已君子何用心哉克恭慎於言行不足以致禍然卒牽連至於此是所謂命也而克恭安之謂非君子其可邪君子之戚忻不系於物仰不愧俯不怍斯可已誠如是也則無往而非樂况閒退之適邪故予序其詩而道其所以然使人知克恭非其他齷齪者比也雖然克恭之行著矣士君子之所重為治者之所急也予懼其不能乆樂於此矣贈劉教諭詩序吉水劉昭子輝初為通城訓導既九年考績赴天官得清河教諭子輝留北京且半年以予為郡人因數往來相好也予始見其貎温氣清心已愛之迨聞其語道理及其所以施教之方作人之效皆井井有法予益喜而相與加厚焉夫治天下者以學校育才為本而凡游學校者未必皆不可教特患無賢者為之師耳有賢者為之師則其人有不成者乎今天下之學校多矣其人有顯者皆教誨之勤觀感之至也其不然者固皆寂然無有聞豈其人性然哉盖無啓發之者故其耳目至於如此也是以論治之君子未嘗不加意於學校而尤加意於得師清河淮安属邑南北之衝也士大夫往來兩京者皆由於此其人頗質厚無滛靡之習夫以質厚之人而常見大夫君子之風流習尚固有感於中而其教易入今子輝往臨之以其素所教者施焉盖其人之幸而亦豈非子輝之所樂乎予知其人之有成而顯者當相繼而起矣雖然有百里之邑行其政者令也而學校為之首故豐其屋治其廪食復其差役以禮而奬勸之此令之職也然惟賢者能知此不賢者固將怙其勢不侮則慢之矣學校之不興其人盖亦有罪焉清河令李侯予友也明經而有文盖能用心於學校非其他可比今於子輝既同郡又同道必賔主相得以大施其教其人之成盖尤易也雖予亦為之喜矣子輝將行中書舎人胡㵾海澄率素與善者作詩以送之而予為之序贈義民胡有初詩序前年甲寅江西旱乙夘大饑畿甸荆湘尤甚江西之民告糴無所中家以下凛凛不自保姦民至操兵為惡而吉水近之其人雖守禮義不附和而起然亦不勝其饑公庾匱竭長民者深憂之燕山胡有初世以篤義重鄉邑謂其子曰吾視人如此吾食豈能下咽即發所藏榖千五百石以賑濟不責償於是邑中有餘積者稍稍出以佐縣官細民始得免於死徙有司嘉其義以聞上善之降勑褒美賜號為義民復其家禮部下其事於四方使皆知有初之義與上之徳意於乎有初亦榮顯矣哉今年謁謝来京師将歸其親友之仕於朝者皆作詩送之而請予序予謂成周之世大司徒以六行教萬民其曰恤者振給貧匱之謂也而又有遺人掌縣都之委積以待凶荒其教之有道而養之有偹如此是以風淳俗美人人有士君子之行而未聞饑餓失所者降至於秦盡棄先王之法一切以功利導人功利之習勝而親戚之恩薄况於鄉黨州閭奚有相賙相恤之義哉自是以以来救灾恤民雖未嘗不加意然去成周亦遠矣我太祖皇帝聖徳如天其愛民如子惓惓教之以善道於諸縣邑皆積榖以待其饑良法美意成周聖人不過也歲乆弊生為有司者亦謾不加省向之積榖徒以資無頼隂欺顯奪蕩然無復存者盖所在皆然一遇凶灾細民無所仰給而至狼狽者多矣此鄉邑之大患也猶幸聖教足以淑人心故有初能以義振民有同然之心者又從而和之然後民免於難有初之善在人其巨細可知矣則旌褒之歌詠之豈不宜哉雖然水旱前世所有今則幸而濟矣因朝廷之所以教民養民者而致力焉使教之之道益篤而養之之備復完此則賢有司深長之計也故於序其詩而切言之觀者其亦亮予之心哉贈邢克敬序榮陽邢恭克敬之為中書舎人三年矣以稱職聞上賜之勑命贈其父為中書舎人母為孺人克敬念二親之不待也援例告歸焚黄於墓下上又賜之鈔而遣之其友翰林檢討陳紀輩求予文以贈行盖克敬乆在翰林端厚勤慎又以能孝見稱於諸公諸公皆愛重之閒居族坐論人之才行可以用於世者未嘗不注意克敬及為中書舎人果能舉其官諸公又謂克敬不但宜於此使他任之将無不可者其為人如此則今之求贈言予安得拒邪予嘗聞之仁宗皇帝賜羣臣誥勑而榮及其親者盖曰以勸孝也然豈特為其親而已哉忠者孝之推也孝於親則必能忠於君孔子以孝為徳之本曽子以蒞官不敬事君不忠為非孝然則勸孝亦所以勸忠也忠孝之徳具於人心而何待勸哉然必以是為勸者盖激厲人心維持世道致治之法當然也克敬能孝於親而又加勸焉則所以效忠者當何如其至哉今歸其鄉父兄子弟見克敬之能顯其親莫不加重焉克敬其可不加勉盖孝之推非止為忠也以之事長而順䖏姻族而厚待鄉黨而和撫㓜賤而愛凡一言一行必盡其道惟恐或貽辱焉然後為孝之徳成今之人有能脩其職而為父母榮者多矣而於是或缺焉君子盖不能不慊然也予欲克敬成其徳以副諸公愛重之意他日之顯其親将不止是也故為序以贈之贈尚寳卿張君序太宗皇帝在位之五年東莱張君信以刲肝愈母疾事聞上嘉其孝徴為尚寳司丞予時亦忝官翰林㑹朝廷有所制作日於奉天門用寳識之予與張君同事者二年張君䟽逹勤敏自朝至暮不少懈挾四書小學自隨有代則退坐門左陛上出書相講論必究其理之所以然不逹不厭稍間則坐公署學趙松雪書思必臻其妙乃已予嘗謂張君之兄以武畧得官而獨好文學他将家子弟不能及於是甚相敬愛迨事仁宗皇帝於東宫同出入者又二年謙和恭慎有加乎其初由是予敬愛君盖以心不以貎也其後予来北京而君留南京益勤於其職遂陞為少卿洪熈改元又陞為卿然予與君離合盖不常不能如曩昔之相親而心則未嘗相䟽也間嘗一遇即相與道舊故談笑如平時其於感上恩脩臣職則勉勉焉恐不及於他人之是非善惡若無所聞知張君可謂質厚君子矣今年張君為卿又九年當得陞上命加正四品禄俾復職夫豈無一官以處張君哉盖篤念舊人不忍其去左右也唐虞三載考績三考而黜陟焉此常法也然能於其職亦未見有改者漢則増秩賜金而乆任之至以官為姓氏此皆盛世美事也今張君䝉恩命豈非幸哉張君既復職其心盖甚樂之異乎他人戚戚於不得者大理少卿韓君翼與凡交好者求予文為贈予念與張君㳺處三十年相知為最深故為文如此使人知張君之非茍然者也抑菴文後集巻十八
