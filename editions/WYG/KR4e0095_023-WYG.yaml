body:
  text: 抑菴文後集巻十明王直撰序文溪曽氏族譜序予泰和多故家文溪曽氏其一也其先居金陵有延構者避五季之亂始徙焉世至彌髙又徙城西汝南坊衣冠文物之盛至於今累世矣在宋之時温甫先生博學篤行而極孝於親親没廬墓有慈烏隨集之異四子安辭安止安中安强皆以科第入官安止初得第即奏請回授其父時雖不許而士論高之安中以直言忤宰相置名黨籍安强孝行似其親而功業􅀹為當時所推重有元盛時懷可先生復以文行表鄕邑及其亂也傳道先生以紹興路照磨居家率鄉兵禦鄰㓂兵敗罵賊而死源友先生以身扞賊刃全其母於危亡之際其所立卓然有過人者此予㓜所聞者也其後乃得見九韶先生之子伯高源友先生之子東銘其從子性存之三君者皆所謂端厚君子也伯高君之子椿齡同余遊好學如饑渴之於飲食其文行有足尚者與予相繼登第入翰林不幸早卒而其弟鶴齡遂舉進士第一入為脩撰曾氏之賢前後相望如此何其盛哉予嘗觀之貞松産乎原野由一寸之萌以至於大百圍歴千歲拂日月而干雲霓其材可以充棟梁備榱桷其精液之淪為茯苓為琥珀可以濟於用何也必據夫土田之腴水泉之潤其所滋殖者厚故也故家大族祖宗之德立詩書之澤長故其子孫有所慿藉是宜賢才之多而傳緒之逺曾氏之盛其此之謂矣然則盛衰之致豈非係於人乎哉盖積於前者既厚而後之善繼者亦無窮則其盛也可以乆長而不敗若倫理之不明恩誼之不篤下陵而上替内肆而外侮其能悠乆盛大者少矣曾氏之祖宗修其孝弟忠信之行而詩書禮樂以文之故鶴齡之兄弟與其族人之子弟皆得食其餘矣自是而後其善繼之哉鶴齡有母年八十而孝敬之心日篤不忘撫其兄之子不異於已子其操行又如此誠足以愧鄙夫警流俗使其一族之人皆若是其厚焉則其後世子孫之盛可量哉鶴齡以家譜求余言故為之序如此既信其己然而又期其效於將然者也送王縣丞赴新會序予友王起霖以薦舉來京師得新㑹縣丞以去同邑之仕於朝者禮曹郎中獨孤君樂善刑部員外郎劉君伯塤謂予皆有鄉曲之好宜為文贈焉蓋起霖之族居泰和雍江距縣城四十里而多以儒為業故其賢者若今國子博士復原前象山教諭效先岳池教諭敬先徳慶州學訓導伯徽桂平知縣嗣先及起霖皆與予游而起霖􅀹爽朗䟽逹負才氣欲自見於時工於為詩援筆數百言可立就挾其所能遊諸公間諸公多譽之由是遂出佐一縣夫學於已者固將以施於用也古之君子既學矣而患不得時得其時而無以施於用君子恥之且位不必崇也而貴於有立能立矣則卑可尊賤可貴不然亦惡能免扵辱哉是以君子寧自卑而脩之非好卑也欲其稱之易也職既脩名既立矣則人将推而上之惟恐其不就焉雖欲辭尊可得哉行逺自邇登髙自卑君子之道也然丞之佐縣非可以卑秩視也盖百里之民所以飢食渇飲仰事俯育無困苦愁恨不平之歎者縣令丞撫之也令果賢而為之丞者又賢然後能恊扵職而成養民之功若不能皆賢則操縱緩急之間或立異以求逞焉民將不勝其害矣新㑹廣之望縣也其民之易治盖自古已然起霖徃矣視其令何如令果賢也其施扵民皆宜也起霖協比而成其功可也若猶有未也則當盡誠以動之順理以輔焉必使其政宜扵民而民無不得其所者則起霖為能扵其職矣毋自異也毋自卑也盡其道而已矣則他日之居髙位享厚禄也孰禦哉予慮夫人之卑視起霖與起霖之以卑而自怠也故為文如此以贈之贈叅議蕭君考績還浙江詩序蕭君字孟常吾郡萬安故家萬安與予泰和境相接二邑之士多以交好相徃来蕭君質直好義與人交篤於愛敬人亦無不愛敬蕭君者自取進士為監察御史表然有名於當時凡其言行必謹於禮法其存心尤忠厚未甞巧詆深文而亦未甞釋有罪以故人益賢之為御史滿九年以績最拜叅議浙江地大人衆事益劇君以祗愼佐其長凡所施必使功成而民不擾予甞聞其以事蒞諸邑尤懇懇以愛民為心民知其然皆相率從教而事無不治既三年績大著上其課於吏部益有名當還浙江吾黨之士素與善者皆賦詩送之予謂朝廷之設布政司以統諸郡縣盖欲宣上德以及民非徒使民給賦稅力役而己也果能誠心以愛民則民亦當誠心以應之而何事之不治哉予昔家居時甞見有臨吾邑者能誠心愛民不勞而事治者多矣其間或急於立事以求名則徃徃苛責以取辦事未必速成而民已受困由是益知民可以誠感而不可威廹矣今天下布政司十有四而浙江為首官於是者予知莆田黄君南昌熊君與予蕭君其他必皆一時之傑也其能宣上德以及民而誠心以得民事功之盛當亦莫之能先者此盖浙人之幸也古者内執政有缺則選於藩翰之賢者今之制猶古也諸君由是而益進焉豈非朋友之所望哉故書以為蕭君贈行詩序且諗於諸君以為何如也贈蕭知州之任序建昌蕭君雲舉自徐州同知以績最超拜和州知州其郷友文選郎中鄭君文實徴予言贈焉予性素迂且才下其言何足以為贈哉予聞蕭君初為合浦丞合浦守將最暴横凡仕者過其軍門必邀使下馬步趨鄕民入城又縱士卒為害莫敢誰何蕭君以禮法折之氣反出其上守將愧謝盡改其所為而民亦得免害及佐徐州有某指揮者先以事在徐虐民如豺虎彼盖有所挾也蕭君始至歎曰害有甚於此者乎即具以聞朝廷為罪某指揮後凡以事至者聞蕭君持法守正皆自戢而民得安業太宗皇帝征沙漠大發民轉粟以給軍蕭君率州民千餘以行撫之素有恩而民皆樂從又具藥物自隨有患者即予藥命車載之民親之如父母事不勞而治蕭君名益大著予聞如此常相與譽歎其賢以為世之仕州縣能除暴安民如蕭君者誠少則今之去和州将談笑而治之矣果何取於予言哉然予聞之古之君子得志則澤加於民使蕭君為他官雖無所不可然壓於其長未能如志則澤有不及於民豈若專一州使受惠者鼓舞而歌詠之哉故予為蕭君喜而亦為和人賀也大凡仕者身安功立可傳於後世則善矣他非所計也蕭君不渝其志使豈弟之政成足以繼龔遂黄覇而垂譽於乆豈不美哉此盖朋友願望之意也故書此以贈其行送周僉事赴湖廣詩序周君泰亨與予皆江西人其為御史乆矣予未之識也然徃徃聞其賢於人盖泰亨甞出按福建湖廣貴州其人未聞異論者去年天子大新庶政甄别淑慝以為御史之職所以肅羣僚貞百度尤不可不愼扵是更用其長使澄汰别白其不善者罷黜之一時是非善惡無隐情而扵泰亨又未聞有間然者夫乆扵其職出入中外且十年其蒞事既多而人之竢之者亦衆矣然卒無缺失非誠賢扵人能如是哉予雖未識之然以其皆江西也而心為喜今年以秩滿超拜湖廣按察僉事湖廣泰亨之所甞蒞也吏民固有熟其威名而記其行事者予知泰亨可不令而從不勞而治矣而其同列之賢乃以贈行之詩属予序予謂泰亨與其同列既皆賢扵人其言當非愚者所及則予為序其詩将何言哉然甞論之朝廷之飭厲風憲者固将使飭厲有司也而御史按察司之職等耳夫民之饑飽勞佚憂悲愉樂皆係扵有司當是任者固有心在愛民而柔和迂緩者矣有才足以應猝而苛刻剛暴者矣適然臨之任其意見以為治抑揚進退之間有弗暇察吏之不得其當民有不與其戚者乎昔者仲山甫之徂齊也尹吉甫作詩送之曰維仲山甫柔亦不茹剛亦不吐者是則前所云者其茹與吐將不戾耶夫難明而易惑者事也惟審理以燭之則亦烏能惑哉故仲山甫之所以賢者惟柔嘉維則而古訓是式也豈誣也哉今諸公賦詩以送泰亨蓋亦本於此故予引其詩而道之泰亨之去與凡同僚諸君子叶德一心以鉏姦植良摧惡佑善使斯民皆安樂於太平之世則其功既成將不與仲山甫等乎此予與諸公屬望之意也詩凡若干首送陸郎中序嘉興陸貞正叔之官主容二十餘年矣其始自主事為貟外郎暨陞郎中皆能勤於事愼於己其於四方之朝貢與夫朝廷所以待之之禮逺近䟽數輕重隆殺之宜不待稽諸典籍盖無所不知而處之無有不當其與人交平居雖若淡然而緩急之際則又有可尚者故自尚書以下皆愛重之予友獨孤樂善嘗為精膳主事與正叔處盖乆故能知其行之詳而數為道之如此㑹朝廷嘉恩羣臣凡任職者皆封贈其親而正叔之失怙恃乆矣於是追贈其父為奉政大夫禮部主客郎中母氏贈宜人錫之誥命爛然雲漢昭回之光賁飾乎幽壤其榮幸可知矣正叔既拜賜遂援例告歸修祀焉故樂善来求予言為贈予謂為人子者莫不欲顯榮其親故凡仕者敬恭朝夕以自效皆圖為親榮也我太祖高皇帝稽古為治知人情之若是也故為封贈之典以勸勵之然能得之者盖寡矣而著令具在盖以垂法於萬世仁矣哉其用心也太宗皇帝甞行之其先得者任事之大臣與左右侍近之臣十數人而己當時仕者莫不跂踵而望日月以冀方将徧舉而逮及之而鼎湖之駕徃矣此羣臣之不幸所以哀思於無窮也仁宗皇帝隆繼述之孝施漙博之仁特詔吏部舉而行之其在職乆者皆以次歸省其親親没亦歸省其墓而又皆有楮幣之賜焉今上聖明一遵成憲厚澤深恩覃被幽顯使為子者皆遂其顯親之心而為父母者皆得以食其子之報皇仁如天盖千載之良遇也雖然制不云乎吾以勸忠然則䝉是賜者其可不思所以報哉移孝為忠士君子之道也正叔練逹而明爽其知此也審矣故因樂善之言遂歴道夫恩典之難得而以為榮且勉為忠孝而盡所以報者如此以為正叔贈行序送鄭府丞歸省序浦江鄭氏以義聞天下乆矣朝廷毎出其才俊而用之亦以義也永樂二年予取進士入翰林識前監察御史叔恭端厚周慎温然君子也未㡬叔美亦被徴入館閣為典籍為檢討雍容謙退恂恂儒者之風予皆重之因竊自嘆以為故家大族祖宗之德立詩書之澤長宜其子孫之多賢也其後二君相繼致仕去而季用官京師洪熈元年遂自監察御史擢詹事府丞同事今皇帝於東宫朝夕相與周旋聽其言觀其行不見其非予愛也㑹朝廷加恩臣下而以季用所任官封其父又封其母為安人錫之勅命且賜鈔千緡俾歸省焉扵時其父母皆七十餘而皆康強無恙凡與季用好者皆歎羡以為榮相率賦詩送之方封贈之命下也朝之士大夫皆動色相慶而父母俱存者其歡慶加焉盖天下之為父母者莫不願其子之才而為子者亦莫不欲顯榮其親交相願而不能皆遂者盖多矣遭遇皇上聖仁如天使如吾季用者得致其樂扵一堂之間父母兄弟蒼顔白髪而命服輝暎煌煌如也豈非至榮幸也哉孟子曰父母俱存兄弟無故一樂也説者以為繋於天有不可必得然則季用之得扵天者厚矣予聞季用祖母黄早寡守節不二期不辱義門而季用之尊府所以事之者又極其孝敬天之所以加厚者以是也則季用之續休趾美可已耶今上之施仁至矣其所以報者義而已推其所服行扵家者而盡心扵國焉則扵其家益有耀矣豈惟有得扵天鄭氏之義顯扵天下其有既也哉故書此以為贈行詩序送梁知府赴任清化序交趾舊屬中國為郡縣自秦漢已然其後徃徃竊據遂為異域然貢獻不絶於中國至我朝其大酋悖亂弑其長民無所訴太宗文皇帝不忍棄出師徃撫定焉因其舊為郡縣擇守令以化誨之簡節䟽目剗弊建利使皆樂生興事而無失所者其仁愛斯民與民之被其澤也乆矣夫如是也而豈有羊狠豕突一旦之患哉此其無有宜矣然而大山長谷之間乃或乘間竊發以駭人民驚聚落此其故何哉朝廷撫之厚矣而為民者盖亦好生而惡死也喜逸而厭勞也欲安而畏危也奈何自棄其身於不善意者上之徳有未䆒下之情有未逹者乎夫宣上徳而達下情者守令之職也況地去京師萬餘里其倚望於守令為尤切使上之徳不壅而下逮下之情不壅而上聞有所未至守令論列而䟽導之民有不遂其欲不獲其利者乎無也夫既遂其欲獲其利矣而復有乘間竊發以駭人民驚聚落者乎無也令居其間而視徳有未䆒情有未通者漠然不一動其心以論列䟽導焉使上有深仁而不及下下有抑志而不得聞乎上是謂不遂其欲不獲其利矣則乘間竊發以駭人民驚聚落亦其勢之不能無也此予所以病夫守令焉廬陵梁逢吉始為監察御史當王師南征時君已在其間留交阯凡幾年其扵上下之情盖知之熟矣今以勞績擢清化知府清化之人盖有弗克自靖者也梁君之去視前之為守令者其職如何果能盡職則民亦安於其所矣今既弗克自靖其不能盡職可知也如是則梁君所以論列䟽導達下情而宣上德其可緩耶相交而成泰誠有望於梁君矣梁君清愼篤實有慈祥豈弟之心者也故相與言之如此其尚以為然乎哉送鍾知府赴肇慶序予友鍾君子勤為中書舍人秩滿授肇慶知府將之官則告予曰吾與子交好三十年今當逺去子能無言於吾行耶盖予始逰郷校時鍾君為前軰而實厚予相與同講論者三年而君去入太學又二年君與勞史事擢為中書舍人明年予取進士入翰林遂與君同居京師出入侍從二十餘年而君得陞擢以去當時同學而仕凡七八人今惟有君與禮曹郎中獨孤君暨予而君乃遽去朋友之誼固當有以贈君者況辱命邪君之為中書舍人也乆矣從容於清華嚴宻之地其所執筆而書者皆朝廷之謨訓所以布徳政勸勵有位大經大法在焉其熟扵耳目積扵心思者如此其施扵用宜若輕舟之遇順風輕車之馳峻坂浩乎其無難矣故今領一郡士大夫皆為喜盖幸其道之行也若予者其喜幸加焉夫有地千餘里為之民多矣所以致其戚忻節其勞逸察其饑寒而衣食之者太守也其任重矣忻戚之有宜勞逸之有節衣食之不失其時是之謂賢太守也然豈有他道哉仁而已矣夫民之所以戚且勞而窘於衣食者不行仁故也仁之所以不行者心有所蔽也茍無所蔽而發當扵理焉民其有困扵憂戚弊扵勞役飢寒顛踣之不勝者乎無也為治之道莫有加於此矣君闓敏詳練達於為政其於朝廷之徳意盖知之熟其能行仁以惠斯民而無所難如予前之云也審矣而予復以此言進者非以為厲也所以厚於君而欲勉其業至於逺且大焉者也君其亦有以處我哉壽周子勉序吉水周君子勉以前丙申嵗生至於今乙已年己七十矣十月二十九日則其生之日也其子若孫將以是日大具酒殽盛賔客以慶之從子崇述為春坊諭徳兼翰林侍讀告予曰吾先人兄弟五人惟吾叔在吾視之猶父也慶壽之日吾弟長史孟簡中書舍人崇厚皆適予告歸得執杯酒致祝頌之意而吾乃不得遂焉因求諸公賦詩使持歸歌以為壽子為我序之予謂人之壽考係於天然惟於君子也宜盖洪範五福壽富康寧而皆夲於攸好徳君子徳修於身儀於人故能致壽考康寧之福而享其子孫之養不衰此豈尋常之故哉然既有得於天而時乃不遇焉徵呼發召以苦其外饑寒憂疾以撓其中則盖有自厭其生者矣兔爰之詩是也我國家聖聖相承仁育天下天下之人安於無事者五六十年為君子者修其孝弟忠信以享其福於悠乆況如周君承世德之隆而為望於其族也哉其壽考而康寧也宜矣昔者詩人之頌君子也盖曰樂只君子遐不眉壽又曰樂只君子遐不黄耉則今諸公之詩所以祝願於君者亦豈茍然哉抑聞之古之君子之老於其鄉則族之子弟與鄕之子弟聽其言觀其行而皆篤於禮義厚於風俗盖其德之感人者深也今故家大族前軰老長之存者鮮矣聰明俊偉之才比比有也而謂篤於禮義厚於風俗君子不無慊然者矣而周氏有君在焉則必有以善其鄕族之人可知矣詩不云乎樂只君子保艾爾後願終為君誦之豈徒祝其黄耉眉壽而已哉故書以為慶壽詩序送黄指揮序永樂六年朝廷擇帥臣之老成而有才畧者俾分鎭重地於是前宻雲中衛指揮使黄公瑄實受命鎮淮安淮安南北之衝舟車之㑹也公瑄鎮之十餘年凡淮安居民與天下之人之徃来於其地者皆安之今皇帝即位以仁逮下閔公瑄年老不欲煩以政而公瑄亦以疾告於是令其子鍾襲職而公瑄得致仕乃請歸鎮江以老焉盖公瑄之尊府事太祖皇帝積功為千戸守鎮江有恩於其人及其後也太祖憐之俾食全俸養老於鎮江而公瑄之兄公瑾為密雲後衛指揮僉事亦歸老於其地今公瑄又繼之一門三世為官前後五人而三人者相繼致仕以老於鎮江何其榮哉予甞論之自古豪傑之士有卓立之志而抱過人之才者甞患不逢其時以建功業而傳之不朽及其得時以逞功成名立矣乃或不能謹其終而挂於吏議或遂轉遷流寓而無以為歸者皆有之矣今公瑄父子兄弟逢國家興隆之運得以才武自奮躬履行陣衝冐矢石以成功名享爵禄比其老也又得從容安逸以自樂於富貴之餘而閲太平之盛此其福豈常人能及哉於是可見朝廷保養功臣之大徳而公瑄父子兄弟之忠謹亦可知矣夫功成身退不辱其先者孝也奉法循理不失臣職者忠也公瑄歸矣尚益脩其忠孝之道以教其子孫忠孝相傳於無窮則黄氏福禄榮名之傳於後者豈有窮哉公瑄将行鎮江人士何彦徴等在京師相率求予文送之夫以諸人之惓惓如此益以見黄公之宜於其人而人愛之也故為序以贈其行懷忠堂詩序懷忠堂者鹽井中衛千戸毛鍾宗器所居之堂也宗器合肥人以材武入官其忠君愛國之心盖未甞忘也於是以名其堂士夫夫從而歌詠之今年来京師因余郡人戴闕持以求予序予未識宗器而嘉其志故不能愛於言夫忠者臣道之大端盡其職所當然而不顧其私之謂也自古為君者必以此望其臣而為臣者亦當以此事君然而賢否有異也賢者固能盡職而忘私矣彼溺於私而隳其職之所當然者皆不賢者也是以為史者書之以為法戒千百嵗而下使人起敬起慕必孜孜奉國不二其心者也其不然者小則譏切之大則貶絶之矣則夫為人臣者何可以忘忠也哉宗器所以名堂者如此盖期至於古之賢者而後已與漢宣帝時趙充國為將擊先零守便宜從事人或難之充國曰是何言之不忠也又曰諸君便文自營耳非為公家忠計也又曰明主可為忠言卒能定疆塲利國家盡忠不二以守其職是以功業顯於當時名聲垂於後世雖麟閣之廢乆矣然忠義氣節傳之百世而彌新若是者非宗器之所當取法也歟夫爵位功名之於人也譬若行路然自卑以及高自近以及逺今宗器既列官五品矣而懷忠不已焉則何充國之不可及哉而斯堂與詩將亦傳之無窮矣故為序而不辭送李同知歸安丘序聖天子即位以来其所以治天下者不用他道惟仁而已故下詔蠲租賦免征徭恤困窮禮耆艾察群吏之賢否訪政事之便不便者次苐罷行以利民而天下欣然以喜又詔内外之臣凡年老病困不能任職者皆許自陳於是昔之耄疾不得自便者稍稍遂引去恩至渥也長沙同知李侯以考績来京師既老且病矣乃以情聞於朝得賜歸安丘将行過予告曰吉為御史縣令擢佐一府可謂榮幸矣當勉力圖報而廹於老病不獲如志荷皇上矜憐賜歸田里聖仁如天以吉之衰終無以自效矣子宜贈一言使吉之子孫觀之知感荷於無窮也盖侯甞為令敝邑能勤扵為政寛而不縱嚴而不殘由是小民樂業而豪猾畏威自歛事以辦治一邑稱焉及陞佐長沙或徃来京師弊邑之人無賢愚貴賤聞侯所在必致禮焉侯亦視之如所親藹然有恩以相接皆不以乆而變其相慕悦如此豈聲音笑貌之所能為哉盖必有道矣則侯之去直何可愛於言乎夫君子之仕止進退雖以義為質然尤貴於得時合於義矣而時不得以自遂焉猶為不幸也周之中世士大夫之在位者盡心於其職至於劬瘁而上不見知故其詩曰盡瘁以仕寧莫我有又曰豈不懷歸畏此罪罟百世之下誦其詩者為之低徊嘆息以傷悼其不幸則當時之事可知矣今侯遇聖明之時其以老疾而求退者義也上憐而從之使得以自遂者仁也君行仁臣行義豈非唐虞三代之盛世者乎故直為序其説以贈之不特使侯之子孫感荷於無窮盖欲使百世之下誦此言者有以知今時之為盛也送劉御史詩序劉君字維芳四明人其為監察御史有年矣始予見其貌温而氣清心固竒之其後聞於彭君百鍊而得其為人盖能明於義利之辨嚴於善惡之分甞出按徽州徽州之人為善者皆敬而仰之為不善者則畏而歛焉其為人如此予於是敬之以心而非特以貌竒之也夫義利之不辨於人乆矣義之所可或矯而否焉義之所否或激而可焉使為善者無所恃而怠為不善者無所憚而縱此學道之君子之所深嗟而痛惜者也則有如維芳者予安得不敬且重哉予又聞維芳故儒家其尊府甞為令於杞有治績維芳之卓然自立者盖求不辱乎其親嗟夫維芳可謂能孝者矣夫能孝於其親則必思善其身思善其身則必思善其行以貽親之令名此所謂立身行道以顯父母者則予於維芳所以敬而重之者豈但已耶維芳既善於職㑹朝廷舉封贈之典以嘉惠群臣遂以監察御史贈其父而母亦贈孺人皆賜之勅命維芳傷其親之不見也思以獲於上者而致告焉於是請告而歸嗟夫上之所以逮下者仁也下之所以當自盡者義也未有義而後其君者君子惟篤於義而已矣維芳将行其同列之賢陳君憲求諸士大夫作詩送之請予言為序陳君維芳郡人也嘗廵按江西亦能明於義利佑善而摧惡予之所深敬者也於四眀而有若二人焉則予雖無言可得邪故書其為人之可敬者以為贈行詩序使人知是詩非徒作者也若夫為親戚之榮鄉邑之光則諸公之詩備矣此不著送劉中書序宣徳元年八月中書舍人劉君長謙援例得請於朝将歸其鄉有事扵家廟凡交㳺之賢鄉邑之舊皆賦詩送之而屬予序長謙在中書最乆而以清慎勤敏見稱朝廷舉封贈之典以嘉惠任職之臣而長謙之父母已不幸乆矣扵是以中書舍人贈其父而贈母為孺人錫之勅命長謙荷君恩之不遺傷其親之不待思以其獲扵上者而致告焉此其請歸之意也而予扵長謙盖不能無所感矣夫天下之為父母者莫不願其子之才而為子者亦莫不願顯貴其親交相願而不相逮者盖多也初封贈之命下也士大夫之幸及其親者皆動色相慶其不幸者則皆抱疾扵無窮予與長謙皆然也今長謙捧勅而歸脩其告祀之禮以榮其親扵既沒之後松楸桑梓皆被雲漢昭囬之光而予方預脩兩朝實録矻矻旦暮之間以自效而不敢顧其私夫同有戚扵其心而其迹乃爾異也則扵長謙之行雖欲無感可得邪然朝廷之恩不但已也予之欲盡其情扵吾親者将不可兾邪雖然竊有慮也盖慮夫人之或閉其途也夫朝廷之予告盖亦以逺近為期而凡徃者多懷自便之心脫有不然則所以閉其途者将不在斯人矣乎則人亦豈忘扵斯人也哉且上之所以推恩扵羣臣者仁也臣之所當盡者義也未有義而後其君者長謙守禮而尚義非有若予之所慮者也而予扵長謙誼不薄故為之序如此長謙其亦有取也夫送羅都事復職序延平羅輝為江西都指揮司都事既三年考績来京師吏部以為稱言扵上俾復其職扵是其鄉之前軰户部侍郎陳公伯髙屬予文贈之陳公之言曰輝為太學生得今職其質美而氣和識通而才敏其在江西也上官愛其能凡在下之人亦無有怨惡者而右春坊大學士兼翰林侍講學士王公時彦亦為予言曩以省親過江西識輝其從容閑雅周旋勤慎予雖未之識以二公之言觀之則可知其賢於人矣予欲已於言其可得乎夫都指揮者古連帥之職也一道之軍政皆屬焉其任重矣故國家必以勳舊大臣處之經歴都事乃其幕僚所以治文書而賛助行事者也亦云要且劇矣為之長者既勳舊大臣又多武人不熟文字惟主畫諾而已故事一委於幕僚凡操縱有失其宜緩急有爽其度善惡懲勸有不得其道者當事之臣與司紏之吏皆畧於其長而致察於幕僚故經歴都事非誠有才能者不能於其職盖可謂難也而其能者則其屬之衛所隊帥伍長皆奔走之無不如志是亦可謂榮矣以輝之賢於人如此則於都事之職盖必有其榮而無其難可知矣夫今之制皆唐虞之舊也三載考績三考黜陟幽明而天下之治功盛矣士也無其才則已茍有才而幸見用焉則何有乎沉鬱之患哉今輝始考績己見稱於士大夫由是而益謹於理益敏於事不以其所已能者自多而以其所未至者自勉則他日所就豈尋常可及哉故為序以贈其行送鄭知縣序鄭侯煥文永嘉人始自監察御史為予泰和令寛厚而不苛雍容而有禮予邑之人皆無怨惡之者既九年考績於吏部以最當陞然無缺可擬也俾為寧縣令食六品禄侯將行其鄕友監察御史等求予言為贈憶侯初去泰和時深以難治為憂予聞之述其風俗之美詩書禮樂之盛山川景物登臨覽觀之樂為文以贈之侯未能深信至於今乆矣而人未甞有違言事未甞有玷累於侯者然後信泰和之人之易治也江西自昔稱文獻之邦而泰和為盛人所以誣為難治者盖曰訟夫訟以公言為文事有不協於公者相與公言之而已使事皆當乎理之公也則訟惡乎興仕者不患其不公而以訟為患是豈善為政也哉且吾邑之俗最重仕者雖倉廩驛傳征稅之卑無不敬焉而况於府縣之為父母者乎況藩臬之尊御史之重者乎使其行而公也其敬禮加甚焉豈敢有一言非詆之者其風俗之美如此惟吾邑仕者之臨乎他邦也其所行公矣君子小人皆以為宜矣獨豪猾之徒以為不便於已思有以中傷之如犬之搏狼之噬肆其惡以求勝而不顧可否雖御史之重不免焉其視藩憲府縣可知矣倉廩驛傳征稅之卑又可知矣此其治之之難易豈不較然明甚矣哉故予益信吾邑之俗之為美而亦侯之所喜而思者也今去治寜寧為南昌属邑其地僻其産饒其民俗大抵與泰和同也則侯之成治功益易矣他日累其績而進扵膴仕其可量也哉侯當益信予言之不妄故序以贈之送蕭子敬序蕭君子敬吾邑之良也始自鴻臚序班授髙州府照磨既而以累見謫仁宗皇帝在東宫時知其故及即位特貰免焉而子敬以病退伏田里既二年始克謝恩来京師扵是仁宗皇帝賔天已一年矣今皇帝聖明在位圖用舊人有司以子敬病不任事俾歸老焉將行過予言曰吾居京師四十年束帶執笏而進於顯榮者亦二十年矣今以病歸得優游於閒曠之地而自放於山水之間誠可謂幸矣子其無言以贈行邪予與子敬既同邑且同朝乆誠不可以無言然亦将何言哉憶永樂之初朝廷清明四夷賔貢而脩典禮彌文之盛子敬在鴻臚習於儀節賛相執事雍容進退以近天子道徳之光其志氣盖偉然也今年始六十而以病去則於其志豈不尤快然也哉古者君子之仕也盖亦將以行其志也然而至扵盡瘁而上不知察者此其世可知矣今子敬之得以自遂也於上之恩澤其可忘哉子敬居縣南四十里良田沃壤繞其廬有種魚之池有藝蔬之圃異乎無以為歸者也賔客之徃来相與掇芳擊鮮釃酒而酌之醉飽之餘續康衢之謡咏天保之詩以歌太平之盛而祝天子福禄於萬年此亦子敬之志也予雖未老然亦衰且病矣况乎當寛大之朝垂惻隐之實而可以駑弱之質乆玷士大夫之末哉則予乞身而歸以從子敬游而申其祝頌之志亦可冀而待矣姑書以贈其行送王知縣赴萊蕪序吾邑王紱用儀以進士得萊蕪知縣當之官有愛之者皆曰用儀質清而氣和志端而材美宜為郎官御史朝夕在朝廷而乃僕僕走千餘里以自試於一縣何耶予應之曰君子之仕以為民也自公卿大夫至於藩臬之大臣所以佐天子行政於天下其職雖不同而利國利民之意則同也然其位尊而去民也逺雖能善其政而不能親致之民故民之被其澤也難矣惟令於民為最親得因上之所行以施其惠雖甚劇且勞也茍以至誠惻怛之心而委曲圖之民無不受其澤者此令所以為民父母也今之公卿大夫無臨下邑者惟郎官御史或以事至焉然其勢隆赫其好惡以道者盖鮮民徃徃望而畏之故事之操縱緩急必皆决於令而民一於令是聽是以為令者茍無至誠惻怛之心則已其有至誠惻怛之心以利民而民親之則雖公卿大夫藩臬之大臣孰敢不為禮郎官御史何加焉此君子有志扵民者所以樂得之也古之仕者不為縣令不得顯於朝故縣令之賢者多入為卿佐為大夫或至三公封侯者而今之由縣令顯者尤比比也用儀始仕即為縣盖發軔扵此矣先之以范史雲之清而以至誠惻怛之心施惠於其民他日政成安知其不入為卿佐為大夫或遂進而上之皆不可知也豈但郎官御史而已哉視用儀之勉與不勉耳用儀聞之曰此紱之志也其敢不勉扵是衆皆喜用儀之必有成也相率賦詩送之而予書其説以為序送劉主事歸省序仁宗皇帝之初即位也大正庶官以新天下之治詔群臣之任職者皆封其親又令以次歸省且各賜鈔而遣之於是龍泉劉斆仲文為刑部主事䝉以其官贈其父而封母為安人錫之勅命宣徳元年正月仲文援例請告歸省士大夫相知者皆賦詩贈之而請予序予謂仲文顯於親榮於鄕其志得矣予何以增益仲文哉姑相與道夫受恩之厚而期以盡心焉可也昔太宗皇帝在位時甞命頒誥勅矣在廷之臣莫不鼓舞讃嘆盖喜及其親而非止榮其身然方次第行之未徧也仁宗皇帝繼志述事霈然隆恩均及小大眞所謂其仁如天矣今皇帝嗣統一遵成憲慶澤之施愈益隆厚三聖一心嘉念羣臣者如此盖以勸忠與孝也夫君子之於是道當如火之必熱如氷之必寒有不待勸也而況有所勸者乎然則吾黨之士其何以報稱也哉是故持已必敬蒞事必勤持法必公臨財必亷待物必恕一言一行無不由於理焉則庶乎其可也夫忠者孝之推也孝於親者必忠於君然於忠有未盡則足以辱親可不愼哉仲文歸矣拜其親於堂上母子之間命服輝暎百里之邑盖無有能及之者仲文處之益思所以報上而盡其心則他日之所至將豈止為一家一邑之榮而已也予與仲文同郡其居京師又甞同里其情盖厚也故相與期之如此遂書以為贈行詩序瑞蓮詩序瑞蓮詩若干首士大夫為少保永嘉黄公作也公謝病歸就閑曠以自適處於椒岡壽徴菴盖其尊府静菴先生壽藏之前之室也公既完墻宇治封樹菴前有池則種蓮其中庚戌之夏花盛開有同茄並蔕者鄉人聚觀皆欣嘆曰此黄氏之祥也於是繪為圖而歌詠作矣公使直序其首直聞之祥者人感而天應之者也語曰作善降之百祥又曰和氣致祥盖和氣者善所感祥者和氣之發也公忠於朝廷而孝於親其感於天也乆矣永樂中公在京師堂前之菊有聯芳而並榮者静菴先生壽藏之初營也甘露零其上當是時人固知其為福之兆矣公由是歴三朝官一品而當弼亮之任徳業聞望天下敬而仰之静菴先生以公貴亦䝉恩封少保年九十餘尚康強無恙公歸而父子怡然俱享盛福是豈特愈於今之人雖古之人亦少有及者得於天也至矣及是而蓮又表瑞焉蓮花之君子也盖曰黄氏之福乃君子之德所致非偶然者天於黄氏何其篤厚明顯如此哉公今纔七十雖有微恙而精神不衰漢之胡廣年己八十猶在三公位史稱其心力克壮練逹治體公年少於廣而精練過之今國家圖任舊人豈能終老於外哉爵禄之盛尚當於他日見之矣瑞不徒作也因僣序其詩以俟送王司務歸省序省親之令仁政之大者也太祖皇帝時仕者有特命以行矣未著為令也著為令則始於仁宗皇帝今歴三聖而行之不變深恩厚澤隆洽於庶僚而及於天下於乎盛哉予甞求之古矣周之武王聖王也四牡之詩曰將母来諗盖探其情而勞之耳非誠有是事也及乎後世陟岵鴇羽北山諸詩作皆興念其親而不得養焉則其政可知矣漢唐暨宋省親著令未之有聞也而於今見之聖朝徳政之施盖三代以来之所無者誠所謂如天之仁也夫委質為臣而不顧其親者義也體念羣臣而使得及其親者仁也下以義事上上以仁逮下上下交而為泰此治道之所以隆也錢塘王庭孟揚始自郡庠領鄕薦遂入太學擢授兵部司務司務九品官耳而其任則不輕盖一部之政凡官書出入皆司務省之稽緩則程督之有違繆則紏正焉盖舘轄之任也其不輕而重也較然矣非精勤通敏而亷公愼宻者不能誠能舉其職則徃徃去為達官亦著令然也孟揚之在兵部予聞其名乆矣而未與處也然每五日則見諸為司務上其事於朝而多孟揚陳奏其詞氣清亮而容止詳雅盖己知其為人而凡以職役相蒞者亦多能道其善孟揚所謂精勤通敏亷公愼宻者歟其去而為逹官不逺矣孟揚父用敬甞為池州教授以卒而母夫人在堂至是請告歸省母而展教授君之墓其同僚李克荘請予文為贈予故為序天子之仁與孟揚之善以送之使人知聖朝有超軼前代之美且知孟揚之為人非茍然者亦使其母聞之而有以自樂也送成司訓赴淛江考試序國家設科目取士以興太平之治其来乆矣每三嵗則令諸布政司合郡縣之士試之取其中者而進之禮部任去取之責非通今博古至公且明者莫能也故為有司為最難盖士之致用以學問為夲必求通於經而鑒得失於史然後能充其才以逹之於用有司者有其具又明以擇之公以决之斯足以得人而無迷繆之譏其所繋重矣而惟自好之君子安乎内不惑乎外乃能知其重而加愼焉不然而云無失者盖鮮矣然是舉也主於布政司而臨以按察司與凡風憲之在其地者是皆欲得人而進之協徳一心以成其事固善矣茍或異乎是任其勢之所可為小則侵其官大則撓其權使不得自任焉則為有司者豈不尤難也哉予聞此多矣未甞不慨然嘆息而興慕於安乎内不惑乎外與夫協徳一心之君子也今年當取士淛江布政司求有司之賢者得順天府學訓導成先生規具書幣請焉先生欲辭不可乃促装就道同列余先生觀等皆喜其有此行也求予文為贈嗟夫成先生彼之所以請子者盖知子之通經博古而公且明也盖知子之自好安乎内不惑乎外而能重且慎也然則子之任此不難也而為布政司與按察司者予知其皆君子也協徳一心以成其事有得人之譽而無迷繆之譏可必也子其行哉予盖俟子矣是為序送商叅政序國家以土宇之廣生民之衆未易徧治也乃設各布政司置使以治之而以叅政叅議佐焉廣東號大藩地連山海之間所統郡若縣盖八九十其民衆可知矣而去朝廷為最逺有所欲惡不能自達呴育撫摩使得其所惟於布政司乎望也今之為使者予未能知若叅政商公則予知之乆矣呴育撫摩其民而使之得所者盖其素志也然以予計之布政司之於民亦逺矣雖有善政必下之郡若縣而後及於民郡縣吏皆賢則民庶幾受其澤不然布政司雖欲利民而民不受其澤矣故郡縣吏不可不察也布政司則察郡守與其僚為守者則察縣令佐察之者欲皆得賢而已矣然大賢之生不數數見也取其賢於衆人斯可矣此善於彼斯可矣若必得大賢而任之予見其難也漢之文翁黄覇魯恭卓茂人皆知其賢也求其比者盖無幾然天下之守令未嘗缺焉亦取其賢於衆人而已此善於彼而己茍為守者未能如古人而以古人望令佐所謂無諸已而求諸人未見其能恕也嗟夫喜圓而惡方好佞而忌剛任喜怒之私失是非之常為守如此者盖有矣未可謂無也今聖明在上務擇吏以養民而取舍之任則付之布政司商公欲知令佐之賢不賢則必詢諸守而行之以公予慮有如前之所云者致惑焉故欲為商公言之商公今考績而歸太學正陶先生永成求贈言於予予不能辭故書以為贈商公其有取乎哉商公名惠字元廸金華人贈李縣丞詩序吉水李徳固為分水縣丞三年考績来京師詣子告曰縣丞八品官耳而與民社之寄吾為之無過人者惟潔亷自持以公勤蒞事分水之人頗安之而為吾上者亦莫之惡焉予然後知居官臨民不在多術也惟亷潔公勤斯可矣吾將奉以終身焉始徳固在京師予知其侃侃自信善議論臧否人物不間䟽戚皆無所回隠未甞不嘆夫行之難也今德固徃佐縣而所為如此是不惟明於知人而又能愼於處己豈常情所可及哉夫公勤亷潔君子所宜務也位不計崇卑必用是而後舉其職不然皆茍道也是不欲為君子者也然而世之欲為君子者盖少故有始而務此者矣未及期月而卒渝焉始之務此者盗名也未及期月而渝焉者素志然也此小人之尤者也爵位之貴而小人之尤者處之不亦忝乎哉其於任之之意與民所以仰賴之心何如也徳固既能此又將奉以終身誠能之不謂之君子其可哉抑予既嘉徳固而又喜為其上者盖徳固能此而為其上者莫之惡焉莫之惡者愛之也非亦務此則安知其可愛哉此予所以喜也於乎人之好惡失其正者多矣舉其所知者為徳固誦焉有羅儀範者徳固邑人也為肇慶府照磨亦能務此而尤加謹焉所不能者軟媚而已奉其長之命有事於瘴鄕雖疽發於背亦不辭擕二𨽻負米以行相與共食二𨽻厭苦之然卒竟其事而歸若此者不一也京師大人君子皆知而愛之惟其長惡焉卒廹使謝病去所遇如此豈非命耶孔子曰不獲乎上民不可得而治矣徳固能獲乎上以惠利其民盖可謂幸也徳固慎終如始則獲乎上者豈止是而已哉因其歸也故序以勉之凡以詩贈者皆列於其下方云送劉經歴序吾邑多大家服詩書循禮義者所在皆然而縣之西鄙則稱劉氏當其盛時土田之富室屋之華池䑓園囿之勝賔客之多衣冠文物之美燕游吟詠笑談之樂表然有譽於當時然未甞矜持以自髙刻薄以自殖一鄉之人皆安之盖詩書禮義之習勝流風餘韻足以善其後故今之為子孫者皆知以詩書禮義為務而不愧於前人前四十年予與夲静逰郷校夲静質而文愿而恭簡而不肆和而不同孜孜矻矻以讀書窮理凡世俗之所好者未甞一動其心盖亦其族之良者也業成陞太學出而用之得海南衛經歴軍帥皆武人不知書其所行鮮不違於理違於理則入於法夲静維持賛相必使事得其宜而下䝉其惠於是所至有名皆曰劉經歴君子人也吾邑之仕者多也盖甞聞其所為茍有善則欣然喜以為與有耀也夲静譽望如此非獨無愧於前人而亦有光於鄉邑況又予同門友乎則予之喜可知矣今年以内艱服闋来京師其年纔六十一即以老病不能任事懇辭於吏部吏部以聞許之此又與貪位茍禄者異矣予滋為之喜然亦不能無愧且慕也盖予少夲静數歲而濫官三十年今亦老且病矣猶縻於職務不能去視夲静之超然自得安能不愧且慕哉甞愛夲静之里臨水而背山田既衍沃而風俗淳和夲静兄彦相於予為姻家而予姊夫楊公子行與其弟子誠子珮居處相望其他故家大族亦多與予善欲買田居之未遂也夲静幸與諸公謀所以處予者他日乞身而歸杖屨相從逍遥東阡西陌間飲酒賦詩以頌君徳之盛不亦美哉故於其行序以送之而併道予意以俟贈醫士李思訥序姑蘇李思訥以醫名京師乆矣徃年予友劉士拯得傷寒病勢甚危更數醫莫能愈人以思訥為言遂徃求之思訥投劑而病去士拯貲謝不受乃求予文贈之曰思訥不特醫可重也其謙恭詳慎尤有足多者予喜而贈以言其後予息病瘡疹亦致思訥而病已不可為然觀其言動誠如士拯所云者心亦重之徃徃為人道其善不見者三年矣今年少師吏部尚書蹇公有疾在中脘間一發輒痛楚不勝他醫投藥或暫己已而復作終不愈宗伯毘陵胡公言思訥於公即召致之思訥治藥服之病良愈公亦重之因酧以幣思訥亦固辭曰斯道也生受教於先人兹效用左右得無差失幸矣且公為國家大臣福禄未艾固有隂相黙佑之者生敢貪以為功哉於是公益重其為人屬予作文以彰之予不能以複出辭且念人之有善固不嫌於屢書也予甞論之古聖人之為醫所以濟人非以為利也其心之仁盖與天地同量故以醫為業者必當思聖人之心惡可以利賊之哉且仁義未甞不利也茍貪利之心熾則行仁之心冺於是有譸張捭闔自以為功能而釣利無厭者夷考其實卒亦未見焉是皆仁之賊君子之所惡也公今之元老朝夕天子左右以圖議政事其所繋重矣有疾而思訥愈之其為功也偉矣然而退然若無與者其賢於斯人遠矣哉思訥宜無變其志古之名醫載在史冊多矣其心之厚於仁者皆所宜法華陀雖髙而矜肆取咎非所願學也思訥勉之使他日有傳焉送劉教諭赴宜賔序吾邑劉通李顯以永樂丙午鄉貢進士為瀘溪縣學教諭遭外艱去今年起復來京師得典教宜賔宜賔漢􅈎道縣犍為郡治在焉梁初定夷獠改犍為戎州歴代因之宋政和中通判蘇時言於朝曰今文教大同遠近若一而此縣與州猶以戎􅈎為名則是鄙夷其人請改之於是改戎州為叙州􅈎道縣為宜賔縣國朝升州為府仍置治宜賔則宜賔固大邑也季顯將行或有病其逺者予曰君子之仕貴乎教之立道之行不以逺近為慮也宜賔介兩川之間其山水竒秀而風俗朴美是以其人多説詩書尚文藝盖自昔已然況於今日聖化之盛哉則其教易立其道易行可知矣若以宜賔為逺則今之州縣固有在宜賔之外越千百里者豈不尤逺乎使季顯之教不立而道不行則雖在鄕黨州閭奚貴哉予欲季顯務其道謹其所以教而無負於委任逺非所慮也且吾聞之在宋之時縣之人有廖翰者以孝義聞於世其子琮與眉山蘇氏同年取進士官於朝有亷退之節其後豫章黄太史謫居於此而與廖氏父子遊太史孝友忠信文學議論百世之士也其流風餘韻足以使人起敬起慕故宜賔之賢才至於今不絶也季顯以聖人之道體諸身日與諸生講誦而服行之而又舉廖黄諸公之近而可知者加勉焉使諸生之學行無愧於前賢斯無愧於聖人則季顯之教立道行亦無負於朝廷興學育才之意矣若以遠而自怠則非予之所望也季顯聞之拜曰先生之教是也通請服膺焉於是書以畀之贈陳從道詩序從道蘇州常熟人永樂中以醫薦入太醫院今年既七十援例乞歸其郷朝廷許之蘇之仕者夏㫤仲昭等喜其志之遂也析唐人詩聞説故鄉香稻熟片帆歸去就鱸魚二句為韻賦詩以贈之復來告予曰從道讀儒書而兼善醫術又以貲富聞一鄉好禮樂義鄕人重之其所居最幽勝有田園池沼之饒花卉竹樹之美作南墅草堂放鶴軒露香亭於其中賔客有過門者必相與傾倒為歡今從道雖老其風流勝概猶在也則於其歸豈不樂哉諸公贈行之詩宜有序敢請於先生予謂古之君子重去其鄉果不得已而去然豈終能忘之哉是故有幽而楚奏顯而越吟者則人之情可知矣禮曰大夫七十而致事又曰七十曰老而傳又曰五十不從力政六十不與服戎七十不與賔客之事盖使之安於鄉里而從容以樂也然昔之人有去其鄉而委身於國其用舍進退非已之所能必於是有盡瘁事國不已於行如小雅北山之所嘆者豈非以其時哉今天子在位聖仁如天知老者之欲安也詔仕者七十許致事凡在官使者皆如之於是山砠水涯幽雅閑曠之地始有冠帶而居杖履而遊逐雲月之去來玩魚鳥之翔泳者此太平之盛觀也從道何幸親遇聖明之世哉予甞聞之常熟濵大江連巨海陂池湖蕩聨亘乎四境其地皆膏腴常稔之田盖蘇州之優饒冠兩淛而常熟又為諸邑之冠其人既富而好文其燕娛遊賞之樂他處所不及而水陸所産鮮肥甘脆之物又足以資其美四方之士留連於此者不絶也以從道之曠懷雅度其為樂可既耶抑豈能忘所自耶酣暢之際必有咏歌以頌聖德足以繼康衢之謡者宜謹録之使他日有考也贈宋知縣赴泰和序代李學士作宋侯名懋字時勉江隂人素以才行稱於鄉監察御史陳耘舉以應求賢之詔既至京師諸大臣羣試之以為能授宛平縣丞宛平京邑也其事最為繁劇侯介然自重不可干以私凡其所行必度於理理之所可即行之其不可者雖强之弗從也予聞於縣人乆矣今年改泰和知縣泰和於安福為鄰邑其山水清秀原田衍沃民以戸計者凡三萬於養生送死之具不他求而有也其人習詩書尚文藝誦讀之聲相聞不獨城郭為然也雖深山窮谷亦徃徃有之其學問有成者多出為時用下士小民皆能知道理畏法度賦税力役以供公上者未甞後諸邑其或有所論訴賢令丞以理諭之酌其情之輕重而加懲勸焉多不終訟而罷其俗之美如此故自昔號為易治予甞聞之昔江隂徐侯來為縣親君子逺小人其愛民如子無酷刑無暴歛若姦豪有干法者則嚴治之不貸也是以小大之民各得其所至今五十年猶傳誦不衰後之繼者各以其才為治茍有善及人人皆思之然於思徐侯也為深則人之情可見矣太史公曰奉職循理亦足以為治何必威嚴哉今之為縣者多矣其循理以治民者未必勝於肆威以厲民者之衆也魯恭卓茂之不繼而屈突盖齊元振是效為之民者果幸也果不幸耶宋侯之治必度於理意不止於徐侯其將為漢之循良也與今之泰和泰和之幸也上有循理為治之賢下有明理思治之民泰和之治將不為中牟宻縣也乎侯將行縣之仕者求予言贈之盖以卓魯望侯也侯尚思副其所望哉而其土俗民情亦侯之所宜知故書以為贈行序楊𨗳叔簡字序少傅西昌楊公冠其中子𨗳而字之曰叔簡予忝為賔則既以命之矣叔簡又請其義於予乃告之曰𨗳者擇也簡者分别之謂學莫大於擇善顔子之所以為賢亦曰擇善而已謂之擇則固有所分别矣子之尊公以是命子豈欲假借以稱道也哉其望子至矣夫人之生莫不有是善然不能純是善者氣稟拘之也是故君子必當審其所以發善者由之不善者改焉天下之事莫不有其理然不能純乎理者物欲害之也是故君子必謹其所趨是者從之不是者違焉内擇諸心外擇諸事分别嚴而取舍正人倫日用之間必皆盡善斯可謂之君子而朋友者君子進善之資也盖擇之或未精行之或未當非朋友匡正之益而欲不悖於道難矣然而有損友焉逢迎阿附以陷於邪僻不可不擇也子讀書以明善擇善以飭身又求益友自輔而不怠以止焉則子之為君子也無愧矣傳曰顔何人哉希之則是子必勉之叔簡拜曰先生之教是也導敢不勉予嘉其志而願其成因書以為贈鄭氏族譜序鄭氏於泰和為大家其先夲滎陽人宋端明殿學士㲄之子新通判吉州遂家泰和羊馬巷新後四世有叔文者徙居雲亭鄕之五塘莊其居今雙溪則不詳所以徙自新之後雖無仕者然其子孫蕃衍盛大以貲産稱一鄕國朝洪武中宗顯始由邑庠生出為武陵典史再主濟陽新安二縣簿廷賔亦以才選今為祥符遞運大使而廷重亦遊太學駸駸且嚮用三人者盖今鄭氏之顯者也然鄭氏之所以見重於鄕邑者非自兹始予聞邑中父老言鄭氏之前軰長者多惇厚質直其所言所行必夲於為善詭欺薄惡之習無有也其世積如此則其子孫之盛固宜矣予家距鄭氏二十里昔居家時或有事於其鄕而一過焉見其垂白之老者一二人其言猶有惇厚質直之遺風於是竊嘆故家大族之所以維持封植者固自有夲也盖由世之豪爽雄傑者而觀之惇厚質直誠若有不慊於意者然所以涵養夲原而暢達其支流者盖在此而不在彼矣故予有慕於鄭氏也古者世家大族必有宗法以聯其支後世宗法廢其所以正倫理篤恩誼者以譜牒在也故宗顯修其譜牒為甚詳盖自始祖至於今秩然有序而不可紊其用心勤矣予交宗顯最乆其易直之行亷潔之操予所甚敬也故因其求而序其譜且推明其先世所以致夫子孫之盛有夲者如此盖欲以勉其後人庶幾引而不替也抑菴文後集巻十
