body:
  text: 抑菴文後集卷三十三明王直撰墓銘知府葉公墓志銘公葉氏諱砥字周道更字履道蓋楚名臣沈諸梁之後以所食采為氏居南陽至晉有諱儉者為括蒼太守因家焉其後又徙上虞髙祖萬曾祖明祖闕父良玉皆不仕公天性明粹喜讀書早喪母童氏又喪其父皆能以禮居喪不惑於流俗嘗受學於鄞陳文昭㩗李鮑仲孚二先生皆元故老博學有文章嘉公篤志為之傾竭底裏由是學行大進洪武庚戌公以明經取進士第得定襄縣丞兵荒之餘民未安業公勤於撫字流亡來歸乙卯坐纍謫涼州公處之泰然曰吾無愧於心足矣日杜門為學有詩寄子曰不須詢逺道窮達信乾坤更號坦齋又號尋樂作賦以見志士大夫謫居邊者皆宗之守將西寧侯宋晟亦延致家孰為子師已卯求賢陜西按察副使羅某臨江知府劉鵬上虞知縣李惟忠皆薦其學宜任史事遂起為翰林編修又有言其堪任風憲者復升廣西按察僉事用法平恕獄無寃滯吏畏而民愛之嘗兼綰三道印出按郡至遷江會洞獠數出沒為寇害吏民洶洶欲遁去且以無備諷公請少避公曰我去汝縣官必遁民何恃以安即命料丁壯立保伍寇來併力禦之彼豈不畏死耶頃之報益急公下令如故不為動寇亦卒不敢至永樂初以史事被逮籍其家惟薄田敝廬故書數篋而已事白還之仍命與史事書成改考功郎中公進退人才品第髙下大小各適其用尚書蹇公謂其年邁一以藻鑑任之他不溷以事會修永樂大典徴天下名儒命公為副總裁稽經考史無不愜當仁宗皇帝在東宫緝熙聖學擇儒臣侍講論公預焉其言於上者必堯舜周孔之道非是不以陳為郎中九年俾食四品祿職如故公重聽誤以為授他職上親灑翰授之至今寶焉久之公引年求去不許乃自言於吏部曰砥老矣過蒙優禮猶叨祿在朝人將謂何上若不棄願得一小郡牧小民庶效報萬一吏部以聞即拜饒州知府公先教化後刑罰興利去害摧姦植柔民無愚良皆愛之如子水旱為災憂若已出每齋沐致禱必獲有年人以為德之應郡故有磁窰銅冶而丁調不減他郡公為力言於布政司得減四之一時方營造工之受役者當給糧贍其家布政司下饒州於逺輸內留八萬石給之公謂非户部意不可衆譁然利其便請必從公終不許未幾部符下他已入倉者皆反之民使逺輸勞費彌甚衆乃服公明決皆拜謝布政司亦自愧其所行凡再述職京師皆以恤民隱革弊政去汙吏為急然謂饒之風俗厚其民易化有訟者必以理諭不付曹民知公之愛已也多悔悟而罷有婦代前夫子訟蓋欲資其後夫公揣知其故窮詰之以母子不忍為詞公曰爾不忍於子何忍悖其父而從人邪婦慙裂狀逸去由是無理者不敢至其庭訟簡刑清民歸德焉户口增至萬三千士之取科第者加數倍於昔公年益髙而燭理益明遇事亦若無足為者嘗賦詩以自適辛丑八月有疾作書戒子孫以睦宗族和戚姻重義輕利毋貽譏於後世尤以不能報國恩為慊是月草一日卒于郡廨之正寢距其生元至正壬午三月初六日享年八十郡人無賢愚貴賤皆哭之哀諸孫奉柩還以壬寅正月初六日禮葬上虞草一都駱家嶺薛氏墓山西麓配周氏賢而克家先公草一年卒今合葬焉子男二信可用可有士行皆早世孫男五綸早卒綬應州學正緯以子貴封南京刑部主事綺先卒續湖廣東湖馬驛驛丞曾孫男六罍充縣學生未仕冕取進士今為松江知府嗣生蕃佐佑曾孫女六皆嫁為士人妻公平生為文甚多號坦齋集今所存者南行稿退朝稿芝山稿經進稿及經筵講義弟魯道拙於治生無厚業婦家欲離婚公即以已産益之終身不復言其自處儉薄雖位望之重比封君而蕭然不異布衣時人有過失婉詞誨諭使知改而止未嘗疾言遽色然內貞外和雖詞氣寬平而所守有不可奪者博極羣書手不釋卷其所著述必根於義理之正而有益於世教蓋於漢魏唐宋諸大家無不學故其所立蔚然有盛名當世而可示法於後來於乎公有德行文學之美而又兼政事之長誠一代之巨人君子矣葬三十五年而墓未有銘至是冕來京師以綬所為狀求豫銘豫從祖思忠與公同取洪武初科進士第及公來翰林豫亦忝從公後蓋於公舊矣則今銘墓奚可辭銘曰葉氏之先實楚名臣源逺流長子孫振振暨公承之乃舉進士奮迹文章揚譽政事經幄詞林寵命自天堯舜是陳維公則賢公既老矣皇用殊錫加乃常祿仍乃顯秩公有誠言願守一州惠此羣黎庶幾寡尤湖山之間厥壤千里人之愛公不異其子公逝不留民心則悲豈弟之化百世之思峩峩新阡公安於此昭德有銘垂耀無已大理少卿張君墓志銘張系出曲江蓋唐相九齡之後有儀鳳者為筠州團練副使見新喻上汾山水之勝因家焉君其裔也曾祖德修祖允恭父懷立皆不仕而皆以行誼重一鄉君諱固字公正生而端厚頴敏過人喜讀書日誦千餘言經史傳記務究極其藴鄉先達李時芳見而竒之曰此廊廟器也舉為邑庠弟子員通春秋識聖人明道正誼尊王賤霸內諸夏而外夷狄之意學成取永樂癸丑進士第戊午拜刑科給事中凡其行事必揆諸所學是非可否務以公不以情亦不為苛細矯激之行君子謂得近臣體丙寅調吏科時有令舉賢為郡守而舉者不擇嘗為吏者得厠焉君上言郡守民之父母必誠心愛民者可任之今之為吏有子民之心而不急利者蓋甚少臣請命所司察其實行可任者任之不然則否庶幾民受其福上是其言著為令册立晉王妃命君持節行禮先是有往者王必厚禮遺之無不受至君獨無所受王以為知禮加敬重焉君侍上左右克舉其職益勤慎不懈已已升吏科都給事中賜之敕命亦以是官贈其父母與妻皆贈孺人是秋邊塵有警言者謂天下雖安不可忘武詔擇廷臣往任之君之河南督文武吏屬撫綏其軍民而料其丁壯加之訓練嚴立科條去害而興利境內肅然庚午升大理右少卿四川行都司臨徼外與諸畨雜處易動而難馴往臨之者既鄙其人而又憚瘴癘鮮留意於治理人之不得其安者有矣君獨勤於事而厚撫恤焉必使各得其分人德之而已無恙及代還衆皆願留君亦愛念之不置曰人無有不可化者壬申山東飢民或嘯聚為盜上知君可用敕遣安撫之賜鈔千貫以行君宣布天子德意開倉賑贍凡可以惠民者無不用民皆感恱於是盜息而民安癸酉山東大水多流移又敕君同薛尚書振濟盡其所以振濟之方民免於死亡而多得復業其懷壬申之惠者感君尤深君在大理篤慎於決獄凡情可矜罪可疑者必推致其極常曰侀者成也一成而不可變故君子盡心焉吾安敢不盡心事凡經君讞議者人皆自謂不寃上嘉之賜少卿誥命以寵之又追贈其父母妻室皆四品君益思所以報早夜孜孜忘其勞蓋不知其身之老也景泰丙子八月初得疾醫弗效而以十六日終距其生洪武乙亥十二月十六日享年六十二娶黃氏繼室孫氏子男六黼甲戌進士為監察御史君依仁蹈義事父母極孝敬於兄弟友愛尤篤居官清慎自持事有常言者必侃侃盡言不曲隨茍止人有善譽之不已有未善則諷使改焉故君子歸其厚而小人誦其平黼為御史君教之以廉勤仁恕勿矯矯近名衆皆謂君善教有司以訃聞上深悼念遣官賜祭命以舟歸其喪葬焉黼乃以君鄉友太僕丞金輔伯所述行狀來請銘豫素與君厚知之亦深奚可辭銘曰曲江之張顯于盛唐逮兹理卿愈煜其光逢時而升邦家之傑肅肅在公有勞有烈胡不百年命也則然未究厥施惜哉此賢髙墳峩峩卜者曰吉刻銘垂休以示無極曾處士用礪墓志銘處士曾氏諱金字用礪其先居南豐在宋有諱斝者判吉州子祕書省著作佐郎鋭遂家廬陵鋭次子新淦主簿中行又徙泰和南岡之長洲今居泰和北門者又自國英徙焉國英生珍玉珍玊生克仁克仁生子省則處士之髙曾大父大父父也子省俊爽不羣而謹厚好學縣大夫選為邑庠弟子員學成未用而卒處士與兄用楫弟用常篤紹其父志用楫尤頴敏思樹立求旁近空舍中屏諸俗務與同業者相切磋為師友一時有志之士欲奮起成功名者皆推讓其兄弟久之用楫為子長逰南行踰五嶺觀山川形勝將以發胸中之竒而嬰疾不返用常明經取進士會車駕北巡未奉大對而卒于京師處士皆歸其櫬殯葬之而撫育其孤弱嘗自泣曰吾父賫志以沒而兄弟繼之今老母在堂仰事俯育惟豫一人在敢尚有仕進意乎斂其遺書守故業得為馬少遊足矣處士母羅氏前進士臨髙主簿尚文先生之子有純德懿行處士事之極孝敬待宗族鄉黨盡其道於一切世務酬酢皆適其宜人有不平者多取正於處士鄉邑縉紳君子莫不推敬之者羣從兄弟以進士入官為郎官御史者相繼其勢崇顯矣皆惟處士之言為信好吟詠喜出逰遇適意處輒留題識曰聊以記吾曽而已其為人疏通坦亮無畛域與人處未嘗有過言非其人不妄交才足以致用澤足以及物而竟以隱終髙年令德君子惜之其生洪武庚申正月初五日沒於天順戊寅六月二十二日享年七十九娶陳氏有賢行子男三浩渙沛渙先卒女五人孫男十遵通曾孫男四人浩等卜以闕年闕月闕日奉葬于闕山之原以豫託交最久相知為最深屬豫銘其墓豫實故奚可辭銘曰天賦之才而又逢時云乎尼之乃不克施八十而終鄉邦所思垂耀後來視此銘詩李克禮墓志銘克禮姓李氏吾里人也曾祖瑞可祖宗賢父文佐皆不仕克禮幼失怙伯父昌隆無子以為子昌隆復坐事戍邊以卒克禮奉所生母陳與所後母曾能盡孝二母安之與兄克紹處友愛甚篤年十七八時卓然自樹立買田築室家日裕常推其餘財以賑閭里之貧者見人有急難則赴救之里中嘗大疫盡室弗能興者相接也克禮往來視與湯藥死則瘞之又告縣令丞為禱於神疫乃息其於學問雖不經意然能知道理以之處事多適宜性坦率遇人有曲直輒盡言雖逆人不顧人亦識其性反愛重之豫未仕時方汲汲於學於克禮未暇接後官京師往往聞其善如此及再以憂歸克禮甚厚於豫豫或託以事克禮能為之盡心豫亦重焉及服闋來朝遂相去逺且久矣而克禮於豫家尤厚不少變越十餘年忽聞其以疾卒豫深惜之以為自今而後鄉閭有緩急安得復有克禮可倚耶久之其子珙來謁銘以葬豫縻於職務不果作而珙求之不已今年豫升秩吏部珙復來以啓賀豫豫讀之喜其工既又以銘為請曰吾父辱見知於先生故敢以不朽為託葬而不得先生銘猶不葬也豫既惜克禮又嘉珙之孝而文且里人也安得辭克禮娶蕭氏又娶嚴氏生四子珙璞瑜球女三孫男五楘槩闕其生以洪武戊午十月十八日卒於宣德甲寅二月十一日享年五十七而以正統甲子年十二月闕日葬於雷洲觜之原銘曰生為衆所重死為衆所思嗟世人兮鮮若兹勒以豫銘兮將百世其永詒袁處士仲彬墓志銘泰和袁氏唐司徒滋之後其少子邯為吉州刺史子孫因家泰和汝南坊為望族在宋有士表者通判建寧又以宦業顯通判五世孫以寧生務敏務敏生克睿則處士之大父父也雖皆不仕然皆以行誼聞於時處士諱斌字仲彬自幼端重喜讀書嘗從學於蕭尚仁先生博覽廣記逈出儕輩上先生甚嘉奬之篤於事親先意承志必盡其道生致其樂死致其哀於兄弟極恭順內外之間無彼此言者宗族姻屬亦以禮相親愛交朋友重然諾其行於家及教鄉人子弟必以孝弟忠信禮義廉恥待臧獲下人尤有恩其是非好惡必以公不以情見人有為不善必面斥其非改之乃喜事有不平而質於處士一言折其中無不服每遇凶嵗周人之急不少吝雖居城市足迹未嘗至公門縣大夫雅敬之鄉飲以大賔禮焉其性淡然以儉薄自足時俗所好無一動其心不肯茍取妄求嘗作堂以待賔客凡堂中服食器用皆質素曰此吾性之所宜也因以質素自號且以名其堂賔客皆歡樂之其髙懷雅度有過人者景泰乙亥八月初七日卒距其坐洪武戊午十月十六日享年七十八娶羅氏繼劉氏皆有賢行子男三穆先卒次穟次稔女三孫男通達為順天府三河縣學訓導奉其父穟之命來告豫曰先人不幸棄諸孤將以今年闕月闕日奉葬於千秋鄉珠林先塋之次墓宜有銘惟公幸嘗見知且有姻親之誼鄉曲之好敢以請豫念之良然不可辭乃為序而銘之銘曰袁顯於唐繇宋至今衣冠相承式昭德音於惟處士厥聲世繼誦詩讀書依仁蹈義天祐善人夀考是宜胡不其延而有止期孝子令孫奉葬於此刻我銘詩垂耀無已龍母傅氏墓志銘廣西僉憲龍君澄喪其母太孺人傅氏已葬于居後翔鸞之原而自為志納于壙矣既又兄弟謀曰吾母有令德以興其家而子孫實賴焉葬雖有文若復得為銘以刻之石豈不益昭徹大顯衆皆曰然於是僉憲自奉所為狀詣豫請銘豫老且病不能文而僉憲請不置豫念其意篤乃勉為銘之傅氏金川梅溪名族祖吉珂父仲升母髙氏太孺人之生有美才父母愛之幼讀書知道理年二十歸為龍氏冡婦值兵燹匱乏而能孝敬勤儉事舅姑承上撫下寬裕有容永樂丁亥官有大役于武當山夫領千夫往焉久不解祖妣得疾劇太孺人憂瘁日夜侍側祖妣念其勤祝天錫之福俾得安而祖妣竟不起太孺人相夫治喪皆以禮舅姑沒亦如之嵗戊戌族人弗戒火延先廬殆盡衆求析居太孺人綜理益勤衣服飲食之事不以晝夜為勞盡鬻奩具為資費不十載家復振尤篤意教子遣從明師受學正統戊午澄領江西鄉薦太孺人慮其安於小成欲汲汲進取俾仍從師進學壬戌澄遂取進士拜大理評事而父母得食其祿景泰庚午遂封父為大理評事母為太孺人太孺人智識髙明天性安重事循其實不溷侈餘費有當施雖多不吝不然不輕豫也嘗言今富家巨室自謂能賙窮恤匱至列為墓文以欺世求其實無有也我死慎勿似之辛未評事升廣東僉憲便道過家省侍未幾太孺人諭之曰便道不妄也若或託疾則妄言以自欺矣女奚可僉憲聞戒即上道凡其平生率禮蹈義多此類宜其子孫之欲有聞於世也是可謂能顯其親矣其卒以景泰壬申正月草八日距其生洪武癸亥九月十一日享年六十九逺近弔哭者莫不哀子男三源澄瀾孫男五儀為郡庠生後復將有顯者太孺人之德未艾也銘曰閨門之秀德孔華兮遭遇盛時荷寵嘉兮既宜其良亦宜家兮紫誥之頒粲金葩兮福既多矣胡棄遐兮愛雖在人傷如何兮詒後有銘賁邱阿兮子孫之思永不磨兮副都御史羅公墓志銘公羅氏諱亨信字用實其先南雄人後徙東莞之英溪髙祖俊曾祖應辰祖德寬父祖昌俱不仕而以公貴祖考皆纍贈至右副都御史妣皆贈淑人公自幼知學喜讀書年十二喪其母即能以禮服喪選為學官弟子業成永樂癸未以詩經領鄉薦明年取進士授工科給事中命往嘉興視水災奏免嘉興海鹽崇德三縣糧稅以蘇民困丁內艱起復調吏科給事中升右給事中坐纍謫為吏交址公雖貶降而益勤於事分所當為者無不為久之用薦起拜山西道監察御史賜白金命往通州察倉庾之弊得老姦宿蠧若干人皆伏法巡按真定等府旌廉黜貪飭學校人知勸沮清軍山西凡閲五萬餘名無枉漏者丁繼母何夫人憂命馳驛奔喪即起復既至京大臣有言其堪任方面者詔復舊任食正五品祿宣德乙卯升右僉都御史賜楮幣命同武臣往平涼莊浪等八衛練兵以備邊公殫心盡力夙夜不懈上念邊境苦寒降敕勉勞各賜文綺二有副公益感激自勵正統丙辰仍與都督趙安率師巡邊賜紅紵絲衣以行正統戊午丁外艱有旨奪情視事明年殄寇功成公升俸一級賜紵絲四表裏白金四十兩始命馳驛歸葬父陛辭賜鈔千緡公葬畢還京敕賜鈔升右副都御史命往大同宣府督屯種務興利除害為久計公自是在邊者二十年朝廷任之以腹心用之為耳目而公之志亦始終無間於分屯之逺近道里之險夷土壤之肥瘠將校之設施士卒之勤惰地利之厚薄餉運之難易緩急與夫巡狩候望寒暖之宜靡不周知有言於上必思之精議之熟無不當於人心故所言無不聽而行之無不適其可若公者非忠誠體國之君子歟庚午公有疾上章乞骸骨不許進左副都御史而公在邊又以擒賊功受白金文綺之賜秋七月上察公實老病令僉都御史任寧代公還俾致仕凡有餽贐皆不受陛辭賜紅紵絲衣一襲公至鄉里始營居室作祠堂治先壠建義齋以訓子孫及姻戚子弟怡然自樂也蓋歸八年至天順丁丑十月二十五日以夀終距其生洪武丁巳十月草八日享年八十一配某氏某氏皆淑人而相繼先卒子男缺女缺孫缺訃聞上念公有勞績命禮部賜祭工部為治墳塋供葬事子某等以缺年缺月缺日葬公某山之原而以行狀來請銘豫與公同年取進士又同官京師且久而公乃先致其事以去蓋嘗惜公不得相與從容於暮年而今乃屬筆銘公墓奚可辭銘曰於惟南越産此竒山川清淑鍾令儀詩書禮樂當盛時巍科峻擢登赤墀黃門繡衣罔不宜奉命出入揚恩威經濟實籍文武資名聲赫奕紛四馳臣心報國無窮期臣身已老才力衰乞骸幸得副懇祈九重沛澤流華滋歸來林下介夀祺奈何仙去杳無追子孫孫子百世思髙墳峩峩葬有碑後欲考實徴吾詩教諭聶大年墓志銘大年聶氏世為撫州臨川人曾祖某祖伯善皆不仕父同文洪武中取進士為翰林侍書尋改中書舍人壬午六月太宗皇帝至京師時盛暑以迎鑾暍死大年於父卒後五月乃生母胡孺人撫育之天資明爽頴悟絶人比長喜讀書日記數千言通詩書二經於諸子史無不讀尤篤意古文及晉唐人詩書法歐陽趙松雪皆臻其妙由是名動縉紳間用薦起為仁和訓導藩憲大臣與一時達官顯人過杭者皆禮重之而大年之文章傳於逺邇迎其母來杭旦夕率婦子偹物以養必誠必孝母之心歡焉逾六年母卒奉柩歸葬哀感行路鄉邑耆老列言母賢行足以勵風俗而子又克孝如此詔旌表其門閭服闋分教常州府學滿九載升仁和教諭仁和之人得大年復大喜敬愛逾往時大年乃言於有司修學校嚴學規訓勵彌切諸生日加親慕教用有成登第者彌衆賔興之嵗諸藩省請典文衡者聘幣交走其門而多以後至不能得為憾大年所至能得士人服其公凡所經歷處遇佳山水及古人遺迹必見諸賦詠聨為大卷藏於家景泰六年秋朝廷有史事徴詣翰林將用之而大年以疾告退就醫藥凡與善者數往來問候冀速愈而勢日危殆大年知不能起呼子章取紙筆書曰吾上負朝廷之恩下負平生之志爾兄弟尚勉學為士人擲筆而逝蓋景泰丙子二月二日也觀其所書如此則其抱負可知矣豫初識大年於金溪王先生所又得其所作小瀛洲水竹居賊觀其詞翰而重其為人真可謂竒偉非常之士也常思振起之使效用當時以其學行必有以名世傳後及被召來京師心切為喜思與之久處不厭而大年病豫亦以老疾絶人事往還心雖相親而迹則疏矣大年病甚遣門生李昻持簡來言身後事蓋欲豫銘其墓豫聞而哀之不三日而大年卒矣於乎豫豈忍銘吾友哉大年生於洪武壬午十二月初三日及其卒也享年五十又五配陳氏前平樂太守用晟之女有賢行四子闕女四孫男四大年有詩文四十卷多可傳者斯足以不朽矣章奉柩歸臨川將以闕年闕月闕日葬闕山之原豫乃為述其行而系以銘銘曰學足以為人師才足以適事宜出既逢時亦將有為何天不憗遺而未究厥施嗚呼噫􅐵其誰不悲王希時墓志銘希時王氏名秈豫兄稼軒先生第四子也稼軒髙識有美才負直氣鄉邑之所敬讓而為子者多克肖永樂壬寅生秈豫時丁內艱家居為之喜是年起復不見者三十七年及聞秈漸長喜讀書好吟詠作唐人五七言詩皆有理趣而稼軒老矣諸子年長者相繼謝世家事獨秈任之理田園接親友小大諸務一以謙厚為本未嘗矜已傲物衆亦樂為之盡無不如志人謂稼軒有子矣天順元年豫以老病致仕歸秈喜謂幾四十年乃一見豫察其為人亦滋喜謂足以慰吾意不意秈有疾愈二年疾作蓋舊患所致遂止酒息勞延名醫求善藥禳禱百方無少效而疾日加如此者半載餘然猶自強不懈聞有欲為禱者則歎曰死生命也奚必是即遣子謝郤時方建祠堂廳事未畢工起而周視之歸曰吾不能待矣命具浴浣擳易衣坐呼子儲取紙筆作詩四首述其意以告宗族冀相與維持且訓子勤學務本善事親取友又勉進湯液就卧明旦醫問疾強應曰如舊頃之親故問所食倦於對舉三指示蓋三進湯液不能啜也須臾顧左右曰世言人之將死有鬼臨之此説誕妄不足信吾家慎勿為所惑今與公等永訣矣言訖而逝其明理不亂如此天順三年十月初二日也非所謂樂天知命者歟享年才三十八娶灌坑羅氏子一人儲也女二其葬以闕年闕月闕日其墓在闕山之原豫哀其不永年而賫志以沒為銘其墓以抒豫哀銘曰生既逢時才足有為而數則竒豫奚能不悲噫義民楊彥實墓志銘楊氏舊居泰和城西為大家世以詩書顯聞不特資富為然也元季兵亂穹堂廣宇皆化為邱墟公曾大父逺峯大父思魯相繼沒國朝受命海宇寧一公之父子友乃即雲亭髙隴之别業居焉其地有溪山之勝田園池沼逺近相望皆按舊籍而理之家復裕公又能承父志極其孝養而與從兄弟彥素彥威相友愛延名師以詩書教諸子表然不失前時之望鄉人有食不給者皆周給之於親戚故舊禮意尤厚其有孤遺無依者公長育婚嫁之無吝色利非其所當得者不妄取一毫人或忿爭不能平質於公公據理譬解之無不恱服見人以豪橫加諸人不可以理諭即斂戢退避或用勢力怵公使從已公益拒不顧人雖深以為忤而公自若也鄉邑皆稱為長者其襟度恬曠不以物自纍賔客過門輒相與欵洽連日居間無事杖屨逍遙依茂林藉芳草追雲月之去來逐魚鳥之翔泳超然甚樂也因名所居堂曰樂志正統五年朝廷修養民之政遣使督郡縣廣儲蓄公出榖二千石以佐有司備賑濟事聞上降敕旌之為義民勞以羊酒復其家公來謝恩闕下以暑行得疾舟過濟寧卒焉正統八年六月初四日也享年七十三公之子揆先以事在臨清知公來亟往迎之聞訃匍匐至濟寧慟幾絶將奉柩歸葬哭曰吾父篤於義而上寵褒之如此不得頓首謝以畢其志且其平生德行皆可書葬而不得銘以託不朽是猶不葬也遣人來京師告刑部員外郎梁楘叔車曰子實知吾父丐為行狀請之吏部王公宜無不可豫二人與公有世好聞公之來冀得一相見乃今卒矣有不能已於哀者况重以揆之孝其可辭公之母龍氏有令德克相成其家初娶黃氏生子一曰振先卒繼室以胡氏三子接揆撰女二孫男十人曽孫男十人銘曰惟義及仁克有諸身下以及乎人上以獲乎君而不百年遂返其真銘以昭之百世不泯故樂清令劉君時省墓志銘劉氏之先池州人宋潁上令凝之之裔凝之孫大郎嘗通判虔州愛信豐山水之勝遂居焉君八世祖也大郎生卓卓生將仕郎源道源道生國賔國賔生義方義方生夀文夀文生平川平川生子寧君之父也世以宦學顯聞載諸譜牒母葉氏亦宦族君自幼聰敏喜學性髙伉不肯隨人後永樂壬辰舉鄉校弟子員纍以書經進於有司未得志宣德甲寅充貢入太學太學諸生多讓其能擢湖廣黃陂令幾五載見學舍弊甚而舊址窄隘為士者恥之乃出俸資以為倡好事者競出財力以助買鄰生萬志基業恢拓其規模而增廣其制度作孔子廟明倫堂兩齋兩廡戟門櫺星門凡廟學之所宜有者無不悉備於是來遊來歌者皆以逺大自期而君之志益厲時邑有典史蔣某者無意於恤民君核奏去之君亦以內艱改樂清尤篤意仁愛事故御史范霖貧未葬捐俸葬之民有陳起等犯法夜餽金求免君卻之鄉里童幼歌詠焉景泰甲戌以外艱歸居喪盡禮君子以為難凡其行事之善者所蒞諸邑皆録之欲俾傳諸後天順戊寅服闋之京師以老乞休致許焉惟以家譜未備祠堂未修汲汲營之且將營夀藏以俟老志未畢而終庚辰六月二十七日也距所生洪武已卯十一月十五日享年六十二聞之者莫不哀君正直寬平外和而內剛忠厚篤義人人皆樂親之娶黃氏生三子三女又娶張氏生男一女一孫男五人聞政等將以闕年闕月闕日奉柩歸葬於供福之原咸謂先考功業卓卓在人耳目葬宜有銘否則無以掩諸幽奉前監察御史吳遵所述行狀請銘豫老且病不能文而孝子顯親之意不可卻乃為序而銘之銘曰其出也逢時其志也有為蔚然善政之施炳然令譽之馳蓋君子以為有惠於已衆人亦以為不失其宜嗟百嵗兮杳難期奄六十二遽全歸供福之原山更竒宜爾玄宅安于兹後欲考績徴吾詩侍講余公墓志銘公諱夔字一夔其由歙從韶宋廣南經略安撫使靖有文武才始大顯子仲荀為融守孫忠館于陳通判二室陳泰和人因遂家泰和世以宦學顯曽大父希武教授贑州大父存道不仕父斯延亦以經術為人師用公貴贈翰林侍講公自幼喜學篤於孝弟忠信讀書以窮理為務隆寒盛暑手不釋卷於修身齊家治國平天下之道必探極深微非聖賢所傳未嘗出於口存於心永樂甲申以書經取進士第太宗皇帝稽古右文詔選進士優等者得二十八人以為翰林庶吉士俾盡讀中祕書學古為文辭公與焉公天性開敏力於進修體上心之嚴充家學之懿聖經賢傳諸史百家莫不研究其為文章必本於性命之奧而發其詞氣之偉同列皆推讓焉及修永樂大典天下名儒集館閣以公為副總裁乙未書成升翰林檢討又命纂修五經四書性理大全一時執筆者亦以公為能蓋其燭理明存心公故議論正而取舍定是以功績著於朝廷名譽揚於海宇甲辰升翰林侍講兼經筵講官修國史其所講説必以堯舜之道非是不以陳有欲言抗詞髙論無所顧計人頗為公危之而公自若也上亦知公久賜之敕命而封贈其親於是公有焚黃之請還朝仍理舊職愈竭誠不懈冀有所補益心雖切而病及之常曰皇上恩德厚矣愚臣不能報萬一今年已五十六病勢日增而竊祿未已不去則罪將益大而無以自容即具疏乞致事人之知公者多勸止之謂公素貧囊無厚資將何以為歸奚去之果公曰吾平生不茍取惟儉以自足朝廷祿賜有餘先人之遺産尚在而受恩不能報其去宜也奚不可疏奏上憐其情許之既歸值嵗歉即發所藏糴榖以賑鄉里之貧不責償開孰以教宗族子弟與鄉人之子弟賔興之嵗廣東諸藩省請公典文衡有至公之譽而無遺才之歎正統甲子十一月初九日以疾終距其生洪武壬子十一月三十日享年七十三配安人吳氏先公一年卒繼室曽氏有婦道子男二達駿女闕皆嫁為士人妻豫與公同逰鄉校同取科第入翰林載筆隨公後其受益多矣方資公以忝竊而公乃遽去今幸退歸追思昔逰恍若夢寐未嘗不慨然興歎公之子以闕年闕月闕日葬公於某山之原而以公侄婺源教論廣所述行狀來屬銘嗚呼豫文何足以揚公之美哉然不可辭也銘曰學博才良德優行懿蔚然其文浩然其氣急流之中勇退為賢惠于戚疏亦罔或愆佳城盤盤公安于此山川儲秀利爾孫子我昔從公永逺是期勒銘墓中百世之詒贈主事章君墓志銘君諱徹姓章氏字知通先居建之浦城五季時有諱仔鈞者仕閩王審知至撿校太傅髙州刺史配練氏封越國夫人生子十五人其十曰仁肇纍官至檢校工部侍郎後周廣順間又徙桐廬之窊石仁肇生仲彛仲彛八子其一遷明州宋初為奉國軍節度升慶元府即今之寧波寧波之章惟仲彛之孫百十九甫居鄞邑者為最蕃一傳曰千十二承事生從五將仕傳元五將仕文二將仕至道一將仕則君之髙祖也曽祖仁祖義考禮皆韜晦弗耀禮一四子智逹智傑智和其四智通則君也自幼天資絶人書過目即成誦既長力學有大志自謂一第可俯拾永樂中取富民實北京章氏以業巨當往君兄智和自請行君曰吾豈可茍安獨以纍兄乎舍其學業與偕往凡京邑諸務身任之而其兄安焉遇內艱從兄歸治喪既畢則請兄留終喪而獨來京邑雖賦繁役重而從容辦治益若簡而有餘人皆讓其能踰年乃以疾卒鄉里哀惜之君孝於親事生送死無違禮緇黃之説不以動其心其於兄弟友愛尤篤搆和樂軒以示志惇宗族之義重姻戚之好輕財樂施賙窮恤匱好善惡惡處之各盡其宜慕唐張公藝宋范文正及浦江鄭氏之義采其規矩設施書於祠堂之東壁有事祠下則兄弟議行之協德一心必期於久與朋友交披豁心腹雖在遐逺片紙有言無不信又倜儻有才略慕前人竒節偉行而欲與之偕初君不幸時子繪方九嵗已凝重有立志家有古畫月桂一幅有元諸名公題其上君寶之君之配俞氏以付繪曰汝父之志以科第望汝等此古人植槐之意也當勉學以承父志及繪登進士第因畫以名軒曰傳桂人皆賢其能承父志而亦譽君之善教其篤恩誼厚倫理一出君之意今五世百口同爨無間者知君者惜其志未就而卒君生洪武癸酉闕月闕日而以永樂甲辰闕月闕日終于京師君初以子主事貴得以其官贈君配俞封太安人有賢行幽間貞靜以儀其家子一繪也孫男五鐸銑鎧鉞鍈女三俱在室豫昔主禮部會試繪來取進士得其文進之而名日顯由兵刑工主事升刑部郎中超遷山西按察副使調江西所至有盛名君之葬在邑西潘墺之原而墓未有銘至是以刑科給事中宋君儒所為狀來請豫謂銘以昭德垂逺况宋君之言信奚可辭乃按狀序而銘之銘曰天之生才欲有為丰姿明爽傑然竒云胡不使究厥施有子讀書當盛時功名事業罔不宜聖恩褒錫雨露滋髙墳峩峩前有碑子孫孫子百世思後欲考德徴吾詩謝汝涵墓志銘謝氏於龍泉為大家宋工部尚書諤居新喻之竹坡其孫桂芳始徙居龍泉之網埠桂芳孫清岩又徙居北溪之陽清岩生均貴均貴生國從國從生觀祥觀祥生子宜皆有隱德而以詩書行誼世其家子宜娶蕭氏生子七人而公為之長公諱海字汝涵自幼讀書習事卓然有立志應門幹蠱小大諸務皆身任焉不以煩其親養生送死各盡其道其視兄弟尤極雍睦未嘗有間言仲弟汝善逰太學所以資給者無不至凡有所為必從容中節不輕舉妄動其經營措置有他人不能及者謂北溪居址隘就其上流一里所築室以居其中有隙地則又相度其宜多為小屋凡民無所庇者使居之不取僦直貧無食者與之粟不責償於是人爭趨之而歸德焉心之嗜義如飢渴之於飲食惟恐或後吉安郡庠櫺星門壞捐白金百兩重新之龍泉縣學大成殿及兩廡頺敝率諸兄弟改作之朝廷行勸恤之典公與兄汝泉弟汝卓汝謨各出榖二千石助縣官賑貸詔旌其義皆錫之冠帶兄弟四人表然在人上鄉邑之中莫不敬且讓焉而公益循禮蹈義言行恂恂未嘗忤於物人以此益髙之若浮屠老子之宫公有暇數逰焉有求亦無不應而於周窮恤匱意尤篤天順戊寅春得脾胃疾醫弗效公自視加劇一日召族人飲時弟汝善待選吏部獨不與公慨然念之曰吾弟食祖考遺澤將顯矣而吾不及見也吾其以五月十五日往乎衆皆愕然既而汝善以四月十七日授保寧經歷公果以五月十五日去世兄弟至親疾雖甚而關於念慮如此公生洪武辛未二月十日享年六十八娶李氏潘氏皆有婦道先卒繼室以曽氏子男五棨業棋樌枋女五孫男四琛環瓌瑀棨等卜以是年十一月三十日奉葬於其里松山寺北七塘嶺之原而以縣學教諭方玭所為行狀來求銘豫嘉公篤於義雖兄弟同德而皆自公啓焉昔周有八士論語書之記善人之多也謝氏一家兄弟以義顯者凡四而皆受恩命謂非善人之多不可也於公之葬奚可以不銘銘曰於惟謝公以義著聲有蕡其實有華其名聖恩煒煌錫此寵榮刻銘玄堂百世之徴賴處士墓志銘處士賴氏諱晰字仲輝别號含章其先居贑之寧都唐季有諱某者為某官掌其都兵任守偹子某官料糧院徙居吉之萬安藍田里為大家歷世至某某及秉衡甫則處士之曽大父大父父也而秉衡甫家益大嘗學於縣庠有司以其資産甲一鄉用長其區糧賦生處士勵志於學究經史習文藝日有造就及膺是舉則歎曰幹蠱子職也可以此勞吾親乎乃躬任其事催科出入朝夕不懈而事每先集他與同役者多逋慢處士以區正捴督焉洗手奉公不茍毫髮官稱其賢民不知擾久之以勞瘁告代得免處士善優遊以事親作别業芙蓉山下田西之上據山水之勝日備物敬養焉未幾秉衡甫有疾以仲子某早世遺二孤及繼室子某庶子某皆未成立呼處士欲有言處士則先意承志拜曰大人宜善調攝勿懷後憂不肖兄弟析産當以義豈以嫡庶長幼存沒有間哉秉衡甫喜曰爾能此吾復何言及卒居喪盡禮痛其母早終不逮養語及輒悲哀事繼母尤謹撫弟姪篤於義至析産業必均一不異前所云故人子嘗議婚後以孤貧為所棄處士力為經紀卒歸之至於事先善後尤惓惓族中初建祠堂以奉祭祀既作而復廢處士相其有力者圖興復獨捐資作前廡髙祖旅殯泰和灌溪展省久曠處士即率羣從兄弟往拜墓下修祀事嵗以為常初徙田西名正堂曰終慕東作家廟西闢孰館又建啓進莊議積穀子孫有志於學者資給之其識度卓偉規模𢎞逺矣且自奉儉約供祭祀待賔客則豐潔旨美而周窮恤匱尤不惜費人有鬻産者既與善價尤憐其意稍增益之人皆歸其厚於是以田産求售者多集其門嘗戒子孫以勤儉勿奢傲又曰淫祀無福死生有命非鬼神所能移病革諸子問所欲言曰吾已著家訓立身之要盡在其中明日吾當永訣矣至期盥櫛更衣坐正寢與所親厚談笑賦詩訣别時天順戊寅闕月闕日也距其生永樂丁亥闕月闕日享年五十二娶世源陳氏有賢行子男四女二孫男闕卜以是年闕月闕日奉葬闕山之原而以邑人郭行可所述行狀來求銘豫居泰和於萬安為鄰邑聞處士之德善舊矣且行可之言足以信於後而其葬宜有銘奚可辭乃為銘曰德修於身施以及人既周戚姻亦惠困貧慶澤之長子孫繼美刻此銘詩垂耀無已故孺人黃氏墓志銘孺人黃氏諱興字孟仁莆之衙東人曽大父某大父某父德甫母曽氏孺人之生於兄弟為最長而尤聰慧精於女事不待教而能父母鍾愛異諸女為擇壻得盧某以歸焉時年方十九而舅姑在堂孺人事之克盡孝敬朝夕左右奉侍惟謹衣服飲食必親舅姑沒相夫治喪無違禮永樂壬辰某取進士奉命入蜀須宫殿大材竣事而歸拜海寧知縣未幾坐誣謫戍邊孺人任家政某不以家為纍而得盡心所事卒辨其誣起謫籍為韶州訓導孺人之助居多某家世業儒及以科第入官守廉節不茍取家事百需孺人紡績織絍以自足其心安焉初孺人盛年有子而不育常以繼嗣為憂乃脫簮珥勸夫納側室為後圖得林氏待之有恩而三子生孺人愛逾已出撫育之三子長亦感孺人之德逾所生人謂黃孺人厚於仁林氏謹於禮林氏卒孺人遣諸子祔葬於其父墓次然孺人食其子祿無恙天蓋以是報之也天順元年十二月十六日以天年終距其生洪武甲寅三月初八日享年八十四三子侗即林氏出泰和教諭傳懷安訓導偕亦讀書為士女五其四皆孺人所生一林出也孫男七孫女七孺人既不幸侗聞訃哀慟幾絶即解官歸服喪將以闕年闕月闕日奉柩合葬於先考之墓乃自述其行實詣豫曰侗兄弟荷孺人大德以克有今日而不知所以報其罪大矣今葬宜有銘若又不能昭著其德於久逺使泯泯無聞則不孝之罪益大矣敢請於先生豫嘉其意乃按狀序而銘之銘曰於惟孺人育秀令門孝敬勤儉益篤於仁子孫之興乃德之大宜室宜家罔間內外八十四年受祿于天期於百齡胡不其延髙墳峩峩瘞此雙玉銘以昭之綏爾後福康惟進墓志銘康氏之先自廬陵祈州徙泰和再遷為秀溪望族其曰一清曰靜觀曰用明者則處士之曾大父大父父也世有德義且以資富雄鄉里處士早失母而能知自立應門幹蠱不憚勞勤逺邇稱之永樂庚子父以事卒於洪都諸子惟處士在侍能以禮治喪晝夜號哭奉柩歸葬焉處士兄弟五人未幾諸兄相繼逝處士辛苦持門户思光大其家而存心益忠厚言行一不違乎理人或有非理相及者未嘗與校也若質是非辨利害處士一折以正無不服其處宗族和待子弟有恩子弟亦敬謹畏服至於公家之事尤盡心正統以來兩為其鄉萬石長凡十五年洗手奉公事無不集然以其區民寡糧多為難理力言於有司有司請於朝許併其一事乃克有濟舊有隱漏稅糧及布縷之征不計户而槩取於里甲貧者病焉處士為經理辨明革其弊鄉閭之間生齒多而作業繁廉讓之俗微爭競之風興處士則集諸老者議為鄉約以銷弭之人用競勸尤留意於興利除害鄉社有廟祠神以祈年廟圯而神弗祐處士復之而人受其惠廟外石橋久圮人病涉處士架巨木為橋以濟之癸酉大飢處士出榖一千二百石以賑濟朝廷賜敕旌之為義民修族譜以厚倫誼明道德以教子孫天順四年正月二十二日以疾卒距其生洪武癸酉十二月十六日享年六十八臨終教子孫以勤儉和順葬祭宜以禮不可事老佛以愧我語畢而終娶周氏有賢行先處士二年卒葬其里水寨之原子男七至是諸子以闕年闕月闕日奉處士之柩與周孺人合葬以翰林編修尹直所為狀請銘豫嘉其能孝乃為銘之銘曰康氏之先啓自廬陵源逺流長子孫乃興有開于先有繼于後孝弟順祥德音是茂處士承之其福則那七十之年又何少多水寨之原秀鍾于此刻我銘詩焜耀無已羅先生妻張孺人合葬墓志銘常州府學訓導羅升以福建按察司照磨陳直所述其先考晚翠先生妣孺人張氏行實詣豫言曰羅氏居泰和在宋以刲股愈親疾被旌得荏平主簿伯受者先生五世祖也曽祖見可祖榖禎父子理德安府同知有循良之行坐纍謫戍西安而卒先生兄賔廉往繼久之先生亦因事徙北京為良民先生乃德安繼室陳夫人所生實與太師楊文貞公為同母兄弟至是皆去其鄉文貞念母之墳墓缺祀也請於仁宗皇帝詔皆免之俾守墓時賔廉亦卒歸其孥先生事寡嫂盡禮而子育其諸孤使皆有成鄉里皆稱其篤義安貧守道擇然後言未嘗有過舉辛勤自營置産業作居室必先建祠堂奉祖考一依朱子家禮居鄉黨以謙和為本其於楊氏親屬尤勤厚謹禮義視他人有所恃賴以傲物取咎先生恥之無事不一至公門惟鄉飲則至焉士大夫嘉其晚節之堅以松竹擬之稱為晚翠先生諱京字賔畿生洪武壬子七月十日卒於景泰庚午正月二日享年八十配孺人張氏同邑張復亨之子孝敬端重而勤儉以興其家凡助祭祀給賔客接姻戚待妯娌撫幼孤皆盡其道門內之治秩如也至於臧獲下人不間幼賤皆有恩生於洪武癸丑十一月一日卒於天順已卯三月十八日享年八十七長子曼早卒次即升又次昻杲亦先卒女一嫁古田知縣尹古孫男八女三曽孫男一女二豫與晚翠交好數十年觀其事文貞與文貞之愛之內外無少間凡他之為天屬之親者不若是其厚也仁義之德何其至哉晚翠之卒十年既葬矣而墓銘尚未刻今升奉母孺人之柩將啓其封合葬焉念二親同德皆當有文以傳世俾永不朽而以請於豫豫不得辭其葬以闕年闕月闕日其墓在龍洲之原銘曰繄羅先生任性自然不詭不隨志確行堅其行謂何依仁蹈義坦坦施施奚怍奚愧亦有令人相于閨門孝順儉勤鄉邦所尊八十七終既多受祉孝子令孫迓續無已龍洲之原雙玉瘞焉刻我銘詩百世之傳任敬祥墓志銘先生任氏諱祥字敬祥泰和城北人其先世以儒醫顯有名在仕籍元季仍設科取士先生曽大父迪吉以書經試於有司不偶由是大父光德父保宜俱不仕保宜娶江氏生三子其季則先生也九嵗失怙而能居喪以禮哀痛如成人稍長從鄉先生蕭用道學日有造詣朋輩皆資賴焉先生端重寡言笑養慈母極孝敬婉容愈色能得其歡心事二兄尤恭順有禮一家之事惟兄命未嘗有違言奉祭祀待親族一以誠敬雍睦為主而尤攻黃帝岐伯之書深究其密微人有病求醫者先生必赴不間早夜寒暑風雨按其脈理而窮其旨歸未嘗有所茍嘗曰人以其死生禍福寄於我我豈可茍哉故凡病者必求先生而先生亦無負於人者皆曰先生仁人也其隂德之及人蓋多而未嘗責報人惟期天報之曰將必在賢子孫乎未幾先生次子衡領鄉薦明年中乙榜得潞州學正迎先生就養人皆為先生榮之而先生之教子尤盡道於是潞人益頌其善教及升應天府學教授又用薦舉知海陽復以其所以教人者飭吏事海陽縣人皆安於其政是皆先生教訓所致也先生生洪武庚申闕月闕日以天順已卯闕月闕日卒于家年八十娶陳氏有賢行子男二長修字能修次即衡字能鑑女一孫男八曽孫男一任氏在泰和為故家其前輩多君子與豫交逰者尚四五人今惟有先生在其懿德令望可敬而仰也而先生又即世則鄉閭之有緩急者復何所望哉此豫之所深悼也先生諸子孫將以是年闕月闕日奉葬於北郭楮原山之原而以翰林檢討梁仲載所述行狀來求銘豫安可辭銘曰任先生行甚純學軒岐德在人天有顯道報孔神夀終八十返厥真子孫繼美福愈臻我銘示後久彌新侯官縣令梁君墓志銘梁氏泰和故家以文章宦業名世久矣至君之大父畦樂先生尊府泊菴先生而益著永樂初君侍泊菴先生官翰林學士解胡二公深竒之曰此梁氏千里駒也皆勉之使學君從瑞州府學教授鮑禮夫受春秋夙夜不怠學以有成遂與弟叔車同領鄉薦而君以會試後期留京師時仁宗在東宫監國聞之喜命有司宴勞而勉焉未幾君以憂去服除被薦授邵武經歷邵武閩浙之衝頗號繁劇君才敏贍應之常若簡而有餘是嵗天下諸司朝京師有旨舉賢才閩藩憲舉君得侯官令而泊菴嘗三為令所至有聲君又得之喜曰為令養民吾有譜民不受惠者吏害之也命諸吏惟坐曹治文書毋坌進事有緩急惟吾言是用君事上以禮撫民有恩先之以仁而濟之以嚴上下皆安其所為事不勞而治邑之西南舊有隄扞江嵗頽圮屢築屢廢春夏雨集則洪水漫流沒民田數萬頃民失其養而官有負租君曰民患有大於此乎乃因農暇發民丁起浮淤盡下而止得龍舟一艘君曰此禍本也今去之亦盡下乃止實以土石甃築堅完自今水不為害而民食有賴矣福州府學有漢晉唐書板字久漫滅不可讀君謂漢唐以來事多失傳不足以為法戒者以此此好古敏求之君子所患也乃倡率諸文士俾相與補完之於今得以考察當時人物與其行之是非善惡者君之惠也又念父泊菴之文妙天下學者思以為法而病其難得每念之輒悲傷乃捐俸鋟梓以傳又足以見其顯親之孝君子謂君之為政能知本末緩急而有倫如此沙縣民鄧茂七反官軍討之藩憲大臣及總兵將師皆在知賊地險難用兵且善設伏以待來者而君才可有為分兵使先往君徑入賊地呼與語曰汝本良民何意為此然豈無脅從者今大軍來果能自新即轉禍為福衆拜稽首曰我等實良民不幸陷身至此萬一得生皆公之賜也君喜其能自新召里中老長俾收領為良民其負固不服者遇官軍多死焉君又得賊船斬賊首四十餘級而歸其所掠民物於是人思君之惠稍稍有來歸者雪峰山寺地大容衆賊初起時民之避賊者多往依焉久之食盡不得已亦強取於人僧走告變君為白總師曰此非欲從賊蓋飢火所迫耳請備榜往撫之民見君來喜且拜曰吾父來吾生矣皆帖然順服總師又命君率兵守洪塘君制禦有法及往來饋運皆有功賊平當得升君以老疾懇辭遂致仕歸鄉里與親戚故舊娛意山水間觴詠以為樂興之所至大篇短章頃刻立就曠懷雅度縉紳髙之平生著述學者多傳誦焉君兄弟四人君居長諱果字叔蒙别號蘭坡次叔車今為浙江左布政使文行尤髙次叔濟太平知縣次叔榮先卒妻羅氏有婦道子五人其長曰翰其三曰翹在餘皆有志功業未大用而卒孫男十二人曽孫男十人君生於洪武丙寅二月初五日以天順四年三月初五日卒享年七十五是年缺月缺日葬縣南龍洲之原豫與梁氏世有連而交君最善則於銘墓安可辭銘曰才之長氣之昌文章遒美道逾光施之武事肅有方安民和衆志則臧歸來林下樂未央云何一去超混茫我為銘詩刻此堂昭德垂逺逾千霜川水浩浩山蒼蒼子孫之思永弗忘郭祖儀偕配蕭孺人墓碣銘泰和南舍里郭氏姓先世自五雲符竹分東溪其後有曰仲誠以其地隘也徙南舍為邑之望族君仲誠之六世孫諱彥輝祖儀其字也曽大父儀可大父以道父斯和皆以學行重鄉里母袁氏有賢行生子五人君其長也質厚氣和寬宏坦亮循聖賢之道不立異以取名與人交一以至誠為本事父母盡孝父性嚴急君或有過舉輒加捶撻則愈色受之俟父改容然後退尤篤愛諸弟凡事皆身任之而不使有及焉惟督令務學故二弟學成皆能為人師君嘗出財創私居及兄弟析異則併以歸衆不校也産業既析歸諸弟而役則仍總於君弟卒其子皆賴君以免諸費久而猶然未嘗一責讓臨事簡曠不役役於物人或加以非禮不銜之其與宗族鄉黨以惇睦禮讓為先縣大夫聞其賢舉為耆老有所質問必公其是非不茍為異同凡在官者稱之無異詞孺人姓蕭氏鳯岡巨族也諱幼大父文學父同善皆有隱德孺人在室為賢女奉舅姑為賢婦事夫為賢妻處妯娌如同産遇宗族長幼及臧獲下人各盡其道共祭祀待賔客舉適其宜篤意相夫教子凡所以禮師者甚至其子之能受教者皆孺人內訓之力居多也景泰癸酉二月十七日卒距其生洪武乙丑六月十三日享年六十九君既喪孺人嘗語人曰吾生平所行惟直誠而已當必令終天順二年十一月初六日舉動微有異而飲啖如故初八日忽語其子孫曰吾弗起矣語畢而卒距其生洪武丙寅七月草七日享年七十三子男四武理璉琢理先君二年卒武琢皆業儒武尤邃於學問明葩經之旨女二孫男七女三曽孫二君沒後生女一君與孺人既合葬其里闕之原矣今武為吾孰賔以浙江杭州府臨安縣儒學訓導鄭錫所為事狀請銘於豫豫重君與孺人之行宜有銘不可辭銘曰符竹故家有傑其稱南舍再遷久而有徴君之飭躬仁義是蹈矧得孺人有相之道今其逝矣誰不惜賢雙璧同藏有光煜焉我作銘詩以著其美貽爾後人垂示無已宋氏考妣合葬墓志銘嗚呼是為率性道人宋公子升與其配徐氏孺人之墓刑科給事中儒之考妣也宋氏之先邢之南和人唐季有諱嗣宗者為四明奉化令因家奉化有元之時公之祖大霆為慶元路學録又徙于鄞父景溫好學厲行母汪氏公自幼喜讀書循循謹飭不肯戲慢佚遊甫冠失怙恃益奮志於學及坐纍謫寧夏日以書自隨未嘗廢其持已接物一由於禮義寧夏故重鎮將家子弟以才武自豪者多見化於公而願受學焉念二親早棄不克終養嵗時奉祭哀慕如初喪人之有善樂稱道不置賙人之急甚於為已有鄭閏者寒欲死公解衣衣之歐稔老無食則食之死則具棺葬焉薄於營利非義所當得者雖一毫不取家人嘗得遺失物令訪其主還之篤意教其子儒多市書以資學問未嘗惜費及儒領鄉薦則甚喜謂曰宋氏舊以宦學顯聞吾不幸以謫廢汝當勤勵以成吾志出入閭巷遇五經文字及古今人翰墨有破碎零落者皆收藏之素衣小冠徒步往來如世所畫道人居士者蓋超然無所纍於物衆或異之公曰吾率吾性之自然而已豈有異哉衆因號為率性道人公亦不辭嵗戊午忽得疾自謂素無疾今若此殆將不起乎戒儒他日仕當忠敬勤慎於吾之喪無以奢廢禮言訖而終四月二十一日也享年六十有八五月十六日權厝賀蘭山劉家渠北之原妻徐氏孺人錢唐徐彥名之子端慎慈惠勤於女事孝敬二親姻族稱焉年草二歸於公雖在謫居恬靜自處閨門之內肅如也凡公之奉祭祀待賔客周窮恤匱訓育其子以底於成蓋得內助為多儒既成進士為給事中迎養來京師嘗推公之教以申勵之故儒蔚然有賢名久之得疾儒醫禱百方終不愈以正統十四年三月三日卒于官舍年七十八子一人儒也女一孫男一儒奉櫬歸浙又走寧夏啓公之柩而舁以歸至錢唐遇故人指示葬地復以杭為孺人鄉郡遂卜景泰元年十一月二十一日合葬定香橋南山之原而以兵部侍郎徐公所述行狀來求銘蓋侍郎與公同居寧夏最相好書其德行之孚於內外者皆可以傳信後世故豫為序而銘之銘曰宋受姓始於殷傳百世有顯人公繼之謹儒業耀西陲彌煒煜美內治興厥家子克賢聞邇遐啓幽宫瘞此珏刻吾銘示悠邈故平江伯夫人馬氏墓志銘夫人馬氏其先合淝東鄉人世有德善父清以才武為鳯陽留守中衛百户娶劉氏生夫人柔慧嚴正間於女事父母愛之擇所宜歸以陳氏為邑大家遂歸焉是為平江伯贈平江侯諡恭襄之冡婦嗣封平江伯闕之夫人今平江侯豫之母也夫人來歸時年二十三舅姑在堂克盡孝敬奉事無違禮恭襄薨姑湯夫人老病不能行夫人躬侍起居親調藥食不少間湯夫人喜稱之六親其奉祭祀供賔客待內外屬及妾媵下人親疏隆殺無不適其宜人有飢寒者衣食之窘乏鬻幼女者贖以還其願留者長育之使有歸如是者八九人教子豫以忠孝務勉盡其道不愧於前人次子佑非夫人出然教養一如已子天性節儉雖貴富而自奉者未嘗侈亦未嘗有驕色惰容人以是益賢之初豫奉命討閩寇夫人病已甚聞之起戒豫曰朝廷以大事付汝汝當清慎以圖成功忠於國乃所以孝於親勿以我為慮也豫泣以奉教去踰月而夫人薨正統戊辰十二月八日也其生以洪武甲子八月十四日享年六十五上遣官致祭命有司治喪事所以榮終者甚備豫既成功進封平江侯感夫人之教而痛其不復見日夜號泣以景泰元年奉葬于應天府江寧縣大山之原祔於先考之兆而請豫為銘豫觀夫人之行孝於上慈於下克成其子之才以光大其家誠可謂賢矣葬奚可以不銘銘曰育秀名家嫓于慶門孝敬仁慈德隆位尊既相其夫亦成厥子榮始令終亦多受祉大山之原有崔者封刻銘墓中垂耀無窮太恭人徐氏墓志銘鄱陽徐氏蓋偃王之裔偃王好仁故傳世逺且蕃其後曰元佑曰偉曰仁顯三世皆不仕仁顯娶姚氏而生太恭人孝敬勤儉動應規矩凡諸女事不煩姆教父母最鍾愛為擇配年二十以歸戴氏為贈參議嗣安君之妻奉舅姑如父母姑嘗有疾躬侍湯藥浹旬不解帶姑卒居喪盡禮而哀戚加焉事姒氏如姑撫諸從子不異於已子相參議君延明師教之愛洽惠施小大歸一為子擇婦惟視其家法如何他亦無所問教諸婦如女亦以身不以言諸婦化之門內之治肅如也事先奉祭必躬必誠賔客之宴享內外親屬之饋遺必中禮節待下人必以恩推其餘財以周貧乏不少吝由是莫不稱賢焉以子辨貴再封至四品然自處如平時人不見其有矜色嘗以所製布衣分給諸子孫曰汝輩非無好衣此吾所自為者當愛惜之令後世師吾儉子孫遵教而謹藏焉又嘗戒之曰爾等賴祖宗餘慶與汝父之教故克有今日惟仕者皆忠勤廉慎處者皆孝弟忠信則足以盈吾志矣服食不論也其嘉言懿行多類此景泰元年十一月初八日卒距其生前丁未正月二十日享年八十四子男七長曰辨廣東右布政使曰貞蚤卒以子瑺貴贈南京吏部稽勳主事曰爵曰冔慈溪教諭曰甫曰冠曰委林陽訓導女一孫男二十瑺吏部驗封郎中珉兵部武庫主事琥領鄉薦女十七諸子孫以闕年闕月闕日奉柩合葬於本縣夀安鄉下長源都祿山參議君之墓而請豫為銘惟太恭人克有令德是以受福于天而子孫多賢且享髙夀而卒其葬宜有銘豫與辨冔素相好而瑺又為豫屬則奚可以辭乃為序而銘之銘曰仁哉徐君傳世則遐維太恭人令德之華婦道母儀式有諸已克宜其夫亦成其子四品之封命服煒煌貴富顯華不易其常嫓美匹休既偕受祉同藏於斯銘示無已雲溪楊處士墓志銘處士楊君字子珮泰和上園故家雲溪所居别墅也因以為號余嘗志君二親之墓而詳其世矣此不著古之君子學而未仕則謂之處士君嘗以所學進於有司而未見於用鄉邑之人皆稱處士無異辭而其濟物之心尤篤聖天子在位修養民之政詔天下富民有能出榖五百石佐官賑濟者有司立石題名以旌其義復其家君聞之曰孔子嘗謂君子義以為質則樂善好施固君子事也即如數出穀以為倡大夫君子亦謂君之子繼嘗仕矣今進者未已也何繇役之復而猶恭上命如此非誠篤於義者哉楊氏之先以三登仕著名至君之尊府從進翁恭儉勤厚以興其家遣君從陳士瞻先生學易學日有成銅莊康公彥恢為女擇壻得君翁亦喜子之儷美也悉以家事任焉凡公私巨細吉凶緩急諸務皆治之無不如其志翁益大喜曰吾子與婦如此吾豈以家為慮哉翁卒君事其兄如父戒其妻事其嫂如姑時母郭孺人夀考在堂頗憶雲溪别業之勝謂可以事耕稼長子孫君乃奉以居極甘旨之養而孺人樂焉年八十而終鄉人皆稱其盛福君遵遺訓充廣田宅與二兄相近時節相過觴詠為樂人有貧者賙之有為非義者則匡正之族人戍逺欲鬻其故址則資之去令無棄先業所假俟歸日償不計利也鄉人有貧而納聘其後欲背盟者君以為不義白之官而助其禮物俾以女歸焉其仗義多類此君好學手不釋卷而尤工吟咏延明師教諸子親族子弟願學者皆館榖之長子繼以易中選得溫縣教諭踰年卒君哭之慟人謂君意必少怠然猶教不倦故繼之子憲又中鄉舉入太學其接武而俟進者尚多皆君磨厲訓誨之效也晚年喜子孫有立撤所居第更作之祠堂廳事規制整然而氣象軒豁稱其為故家右族之居上園舊宅久而弊念祖宗之遺而不忘修葺之美君子韙之君資貌瓌梧胸次灑落而明於理道知故實語嘗傾一座縣大夫每行鄉飲必延致賔位而多以疾辭天順二年得足疾醫稍間又得痰疾數月勢愈劇語子孫曰吾疾殆矣吾平生好德無大咎可謂生順死安尚書王公知我我死必公銘吾墓吾無憾矣爾曹孝順勤儉思無忝前人言訖而逝是年十一月十八日也距其生洪武辛未十一月初一日享年六十八妻康氏讀書能詩有古幽間淑女之風君之大其家成其德多內助之益也子男四人長即繼先二十四年卒次纓緘純俱有士行女一孫男九人憲惠慤思念態憼愚息曽孫男闕楊氏之先德美矣其接於見聞者非一世也若君之行施於父子兄弟宗族鄉黨可謂無愧其先而有裕于後今之葬也誠宜銘使百世之下可以觀法焉乃不鄙而以屬豫嗚呼豫言何足以彰君之美哉然不可辭也乃為序次其事而繫以銘銘曰才足以有為而未遂厥施乃自斂其竒惟稼穡是宜歌臣工詠鳬鷖以樂於盛時云胡一往歸無期山川盤回鍾秀在兹刻銘垂輝子孫之思夫人陳氏墓志銘夫人陳氏泰和栁溪故家栁溪之陳貴於元其居竹山者則以德義相髙豫先大父竹亭徴君實保翁之壻先考瓊州公乃其甥而豫則彌甥也保翁從子以正公生良輔良輔君生夫人為長女於豫為內外兄弟二家篤母黨之義因重請婚公許焉逮二氏多難各喪其考妣以正公治家嚴而有恩夫人母蕭尤賢能謹禮教故夫人克間女事豫繼祖母李夫人既喪我先妣汲汲求自助而夫人遂歸於我入門而諸親皆喜既涖事而內外皆賀以為人莫能及也李夫人愛之如所生夫人事之亦如實生已幼聞孝經女戒能知其大義循循然守規矩未嘗妄言笑紉縫剪制紡績織絍不待勸而能至於刺繡工巧之事雖或為之然非其志曰不若布帛之切於用也豫少甚貧賴夫人同勤苦忍貧如鐵石夜窗熒熒一燈相對各勉其所業至夜分乃止及豫竊第入翰林太宗皇帝賜膏油費俾讀書攻文章為古人之學夫人從豫居其志彌厲相勸日益篤曰君尚憶敗幃瓦燈相對耶聖恩如此其可忘之豫之幸免於戾者夫人之助也在京師數被火衣食淡薄或不如平時夫人委之命無怨尤久之歸故鄉人亦不信其貧及有常見之者然後知其實貧也人復有言其食指衆當析異者夫人不與較曰吾可以衆口纍人耶耕以謀食吾嘗聞之祖考矣盡賣其服飾器用買田西郭中課僮婢及大男之勝耕者晨夕不懈而食粗足或以為天相之至今諸子皆力耕自足夫人啓發之效也及豫連丁內外艱起復不相見久矣夫人劬瘁理家政而心安焉迎來京師遇國家大慶受封賜親見典禮文物之盛夫人安靜整肅如素習者莫不以為宜其家然是時家事亦滋出顧無可任者遂歸綜理不懈祖宗忌日及墳墓皆暗記時節命子孫致禮無遺者人或萋菲有言一不以介意宗戚賔客往來宴餽必中節若諸幼稚有所當給者雖果栗微物必均鄰里之間嵗時以飲食欵洽皆從厚有所假貸不責其必償故人人歸德焉及聞豫病告歸上不許則歎曰病而曠官將何以報國日籲天以祈安而豫乞身之章亦屢上聖天子憐而許之天順元年四月才至家夫人得相見然後喜可知也鄉邑之人無不以為喜安知喜極哀生二年二月初九日以疾終距其生洪武丁巳九月初三日享年八十二夫人生六男子而存者四䆅翰林檢討以夫人喪援例請命於京師歸至揚州得疾卒是年六月初一日也秬稹穆皆為士秱則邱氏出今為邑庠生夫人撫之德厚而施均人莫知其異母也女三嫁梁相蕭禎袁榤相南海教諭禎早喪妻守節不變榤亦勵志科舉業孫男八仁中癸酉鄉貢佐休褒侒俅修效曽孫男五宜夀宜久宜大宜盛宜永其葬以天順二年十一月初六日其墓在橫乾之原豫既哀夫人之即世惜豫之老而鰥且念葬不可不銘乃書其先德之懿世姻之美辛勤樹立之難如此而系以銘俾刻石墓中銘曰猗豫夫人令德在躬孝敬勤儉一其初終聖恩煌煌封秩有偉紫誥金葩極品之貴胡不百年而遽已焉傷哉若人何辜於天我作銘詩刻此貞石維以告哀百世無斁袁孺人墓志銘孺人姓袁氏諱菊廬陵姑塘里人也大父文德始徙泰和之水南父子簡母劉氏孺人生而聰慧習女紅父母愛之選於三岡劉氏得叔魚以為賢遂妻之叔魚蓋陜州判仲啓之孫處士仕堅之子劉氏故簮纓家而叔魚最好學孺人既歸宜於其家移事父母者事舅姑而極其孝推事兄弟者處妯娌而極其和奉祭祀待賔客小大之事不違於禮家之長幼貴賤衣食厚薄必時而均閭里疏戚周貧恤匱未嘗有所吝人皆稱其賢叔魚中鄉舉得教寧逺縣學孺人偕之官盡內助之宜叔魚既善教而孺人孝順勤儉之德亦有聞而化者及叔魚丁內艱服闋改教長汀孺人居家綜理有常叔魚不以家為纍而盡施教之方孺人之相也未幾叔魚卒孺人哀慟幾絶迎其柩歸葬祭皆以禮居喪守節志撡益堅教諸子讀書以承其父志子世傑世殷學成皆為郡庠訓導鄉人咸嘉孺人之能教也景泰壬申闕月闕日以疾卒享年六十四子男三世興世傑世殷女一以明年闕月闕日葬於本里深山之原而墓未有銘至是乃請於豫銘曰處則為賢女既嫁則為賢婦有子則為賢母而終歸於兹土深山之原封樹在焉刻我銘詩以永其傳亡姊楊君妻王孺人墓志吾王氏居泰和為儒家曽祖則堂府君祖竹亭先生皆有懿德髙尚不仕先考肇慶府君功業焯著先妣歐陽氏恭人齊德並美以洪武庚戌之嵗生孺人是嵗朝廷初設科取士竹亭先生實校文廣東因名孺人曰文貢端重純淑聰慧儉勤幼讀論語孝經悉知其大義紡績織絍綰結縫製不待教督而能先恭人不幸即世孺人日夜哀毁幾欲無生事祖母李夫人極其孝敬善撫二弟視衣服飲食尤篤至既笄歸楊君子珩而舅姑皆在堂孺人移其所以事祖妣者事舅姑事楊君以正而順待君之姊有禮遇其弟妹惠而和治酒食以供祭祀饋賔客必精楊氏故邑中大族遭亂失其資楊君父子再造厥家孺人謹內事衣服皆有常制舅姑沒相楊君治喪無違禮楊君有側室孺人處之甚厚無間然內外親屬下至小夫賤人莫不稱其德既老方優遊自適二弟之家爭迎致事之如事母既而長弟行敏卒孺人哭之慟不三年而孺人亦卒於家正統三年六月初一日也年六十九一子曰綸六女嫁袁範歐陽演蕭釡羅鄂鄭宗祥其一嫁劉永吉者亦早卒孫男三人廣恕闕女三人嗚呼孺人於直為伯姊當無母時得不失所者孺人之德也後以貧故兄弟各謀其身不克盡事長之道至是幸有立可以盡其道矣而直乃竊祿京師相去又十七年不得侍左右常欲一歸省庶幾少伸其意而縻於職務輒不果孰知孺人竟棄弟往矣嗚呼哀哉直兄弟止三人前年哭仲兄自幸有伯姊庶幾不孤今天又奪之以直煢煢之身將何所倚而立邪嗚呼痛哉楊君篤夫婦之義而綸又克孝將以明年正月初五日奉葬於千秋鄉桐柱山之原直恨不得躬親孺人之柩之安於此土也謹序次其世出行實俾納于墓中百世之後有徴焉嗚呼言雖有盡而直之哀其有盡耶謹志自撰墓志王直字行儉其先琅琊人晉太傅導之後太傅從晉南渡家金陵唐有崇文者為吉州刺史因家吉州孫贄侍郎顯於宋又徙泰和故今為泰和王氏代有顯人國朝以直忝竊之故曽祖以道祖子與皆由處士顯父伯貞由肇慶知府皆纍贈少傅兼太子太師吏部尚書妣皆贈一品夫人直早喪母而父以事去家貧力薄獨賴繼祖母李夫人撫育教訓以底成立永樂初試於有司取進士時太宗皇帝篤意古學詔選與進士曽棨等二十八人為翰林庶吉士俾讀中祕書師古為文辭未幾選入內閣凡政務之密亦使執筆其間升翰林修撰車駕巡幸北京仁宗為皇太子監國留務之重選任尤嚴時翰林則留黃淮楊士竒而直亦與其末勤慎不懈幸免於過及再幸北京直亦從行遂與修太祖髙皇帝實録書未成以憂去服闋仍入翰林升侍讀太宗皇帝賔天仁宗皇帝即位升侍讀學士宣宗皇帝為皇太子選宫僚升右春坊右庶子兼翰林侍讀學士經筵講義及文武羣臣誥敕皆兼任之又兼記注凡聖政聖訓之當書者皆録之以備纂述仁宗皇帝上賔宣宗皇帝即位一時從官皆升進直仍領舊職修兩朝實録成賜白金綵幣襲衣等物升詹事府少詹事兼侍讀學士宣宗皇帝上升今皇帝登大寶位詔修先朝實録直叨與總裁書成賜白金綵弊襲衣鞍馬等物升禮部左侍郎仍兼學士久之升吏部尚書又升太子太保兼領吏部又升少傅兼太子太師仍兼吏部尚書蓋由進士為修撰在翰林春坊詹事府者三十七年實任禮部侍郎者三年升吏部尚書少傅兼東宫師保者十五年前後歷官凡十任竊祿五十四年散官自承務郎纍升至光祿大夫從一品以直之駑下學不足以窮理文不足以述事明不足以知人量不足以容衆才不足以成務言不足以決疑辨惑徒守朴忠懷謹畏叨侍近車駕謁陵寢飭邊務兩奉敕書命居守屢充殿廷讀卷官考禮部會試士簡賢授職收擇衆才小大之務罔不盡心然老病日加終無寸益其得罪多矣纍疏乞身未蒙矜許皇上復正大位其仁如天特憫而宥之使得以病退歸賜敕書一通白金三十兩織金綺衣一襲新鈔三千緡兵部給驛舟廪食以行天順元年二月初四日也夫人陳氏先以夀終年八十二事聞命禮部賜祭工部治墳以葬恩至渥也直今亦八十三身老而氣益衰思斂手足以歸于考妣而效結草之報於朝廷平生事為可見者當世君子自有公論其蕪詞蔓説不足以示人者則藏于家惟我子孫宜勤學問以忠孝友弟誠敬寬厚為本庶幾德立名揚無愧先哲豫不足法也豫生既無益於世死亦無可稱道朝廷諡法事出至公不可妄求以干憲典因倣白樂天自述壙志俾置之墓中録之家乘後世子孫由是而知有我足矣夫人栁溪令族豫先祖妣親也孝順勤儉以興其家生六男子存者四人長䆅為翰林檢討以母憂告歸服喪至揚州病卒次秬次稹次穆女二長適梁相次適蕭禎皆其所出次秱女一適袁榤邱出也孫男十仁佐休褒侒俅修效傲偕曽孫男七宜夀宜久宜大宜永宜盛宜髙宜堅子孫之慶後來書之者蓋未艾此不著劉先生墓志銘先生劉氏其先居泰和之珠林在宋有諱從周者始徙居縣西圳南五世至唐卿又徙萬安石洲遂為萬安人先生大父明德以資雄一鄉元季納粟得四川廉訪司知事父敬先不仕以行誼稱母歐陽氏先生其仲子也自少嗜學選為邑庠生通詩易二經尤篤意於子史其議論文章朋輩皆推讓之洪武已卯江西鄉試以易經魁多士明年會試得湘鄉教諭九載績最升淮安府學教授淮安南北之衝達官貴人往來無虗日諸生多以送迎廢業先生以簡重為務不矻矻趨走人以此髙之諸生亦得肆力於學由是賢才益盛滿九年吏部課在優等當得升主選者知先生賢延至家俾為子師先生歎曰此孫寶所以去也願不升竟受興化教諭而去丁內艱服除調文安教諭文安之俗不樂學先生循循化導學者有成至與先生子善慶相繼舉於鄉俗為丕變至今人稱為詩書之邑在文安九年以老疾得致仕去凡典教三十年其言行一致孝弟忠信禮義廉恥發於身施於家而以教當時之人無少長愚良皆諄諄然未嘗違乎是非其道不妄取豫是非榮辱一不以纍心可謂廉厚篤實之君子也先生致仕歸善慶取進士為行人升刑部員外郎得致其祿養者又十七年以景泰壬申闕月闕日卒於家距其生洪武庚戌闕月闕日享年八十三娶同邑龍邱曽氏有賢行子男二長餘慶次即善慶女三郭道長郭良遇羅有初其壻也孫男四曽孫男三先生之葬以景泰闕年闕月闕日其墓在同里下邑之原善慶聞訃哀毁踰禮以副都御史劉公廣衡所述行狀來求銘以納諸壙豫知先生之學行蓋久而善慶又賢朝廷褒贈之來有日矣語曰德無不報天之道也是宜銘銘曰充其德偉其文師表後進廓前聞含咀道腴厭世紛翩然髙興薄浮雲歸來樂此蘭桂薰年既耄耋歸穸窀下邑之原新起墳靈秀所萃宜後昆刻銘垂休永長存半隱賀公墓志銘安成賀溥功博為南海縣學訓導將歸其鄉葬其尊府半隱翁念與豫壻梁相為同僚乃因相奉書以荆州府同知致仕王公澄淵所述行狀來請銘王公嘗與翁同遊縣庠最相愛今與豫同休致而長豫數嵗其言信而有徴豫安得辭賀氏之先四明人蓋知章之後自越稽山徙禾川之良溪又徙安福書臺之北曰逢興生西岩西岩生靜觀則翁之大父父也皆以行誼聞鄉邑翁諱顯字士達自幼喜學不肯佚遊慢戲而聰眀英發所業日進智識日廣應事接物動循禮度父兄長者皆以逺大期之洪武中翁之尊府坐誣纍謫役京師翁盡心調護期免於難而竟以病終奉柩而歸祭葬盡禮君子以為能孝其奉母極敬愛而事兄士通尤恭順生盡其歡死盡其道里中嘗有橫逆事連坐某等七人皆就逮煆鍊成獄人莫有言其寃者七人意必死翁憫其無辜為具言寃之實使其妻子訴之當道審覆推驗得其情七人者皆得免人皆頌翁之德不置而翁未嘗言於人泯然若罔知者翁孝友忠信恭儉廉讓赴人之急不避寒暑恤人飢困無間疏戚敬禮師儒若周子冶吳孟勤吳理安楊嗣慶謝復古諸先生賦詩講學朝夕勤甚從容欵洽未嘗有惰容羣從子姪左右承順耳濡目染者皆克成其才所居近市晚年厭塵雜足迹不至縣庭閉門讀書種植花卉以為娛自謂得隱之半號半隱衆稱曰半隱翁御史胡啓先休致家居稱為物外人翁亦自題楹柱曰三徑猶存松菊寸田留與子孫則翁之心事可見矣翁生於前丙午闕月闕日卒於今宣德癸丑闕月闕日享年六十八娶南塘曽氏繼縣南曽氏皆有婦道子男七濟由成均弟子舉進士其授南海訓導則其仲子溥也女一孫男十又八女孫八曽孫十豫觀翁之子孫盛矣足以見其德之厚而功博又思表著於後世使繼續而引長之此賢子令孫顯親之孝也誠宜銘其葬以闕年闕月闕日其墓在其里艮山廟背之原銘曰世澤之長有偉其望教成於家善孚於鄉玄堂峩峩隱者所藏銘以昭之愈久彌光抑菴文後集卷三十三
