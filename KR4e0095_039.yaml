body:
  text: 抑菴文後集卷二十六明王直撰墓表贈承德郎刑部主事周君墓表君周氏世為萬安倉前故家曾大父景德大父同窗父尚信皆有德善而同窗當元季尤能倡義保鄉里君諱缺字存敏三歲而孤母陳孺人守節教育之幼喜讀書務深究其義不肯慢戲佚遊其家業素豐既孤被侵奪而家遂貧及長克自奮勵卓然思樹立於世勤儉自將經營規畫已失者復之有未就者充拓焉而家日以裕事母盡孝所以悅其口體而順適其意者無不備母之心安焉常恨早失父不能記其狀貌心切痛之家故有同窗像歲時享祀則張於中堂瞻望拜跽以興其孝思曰父祖克肖見吾祖之像猶見吾父也吾父其亦顧懷於此乎言之輒悲不自勝又念無親兄弟與從兄存與存忠最相好不啻如同産出入起居怡怡恭順無毫髮違忤君子以孝友稱之性猶急義義所不可不輕取於人亦不輕以畀人於所當為不計利害為趍舍族父尚益仕至道州同知以卒無後人有侵其遺址者衆依違其間君獨毅然語衆曰此址存因可想見道州不然則道州之迹泯矣卒不與君有女兄母孺人以妻學堂蕭孟魁館于家君待之以禮撫其子女如已出及析資産惟母命是從不與校甥女當嫁君為往郡城治具歸次泰和花石潭遇暴風溺焉永樂丁酉九月四日也明日得其尸以歸鄉之人士無貴賤少長莫不悲君好善樂義而死於不幸其命也耶亦豈天之未定者耶君純厚謹默如不能言及接師友應賓客論事析理犂然當於人心雍容有度犯而不校居鄰縣治非公事不一至姻親之家非吉凶慶吊不數數往來其簡重而有禮又如此生於洪武丙寅四月十九日卒之日年三十二初葬於邑之田牌里今改葬于某山之原則景泰某年某月某日也初娶寧塘溫氏卒繼以儒林劉氏皆有婦道凡君之事親奉祭承上撫下厚姻族鄉黨皆克相之二子長曰藻次曰鐸君卒後三月鐸始生七歲又喪其母賴以有成者陳孺人之德也鐸取進士為刑部主事升郎中有名當時朝廷推本於父母之賢贈君刑部浙江清吏司主事階承德郎溫氏劉氏皆贈安人鐸既拜賜則大慟曰鐸不幸不得識父又不幸不得養母今蒙天子莫大之恩誠足以為榮矣然情事未伸鐸之痛有已耶若又不能彰顯其德於後世鐸何名為人子乃來請豫文表諸墓上豫聞為善者天報之福然不以厚於其身為足也身未及享之而以貽其子孫顯榮光大以成其親之令名然後為福之至君孜孜為善雖不及永年而有令子以承天休天之所以報君者今既享之矣鐸修身慎行凡君之所為者繼續而引長之其進於福祿榮名當益盛則君之被褒榮於後豈不益顯且大哉此天之已定者也故書豫言而使鑱諸石以俟胡孺人墓表代時彥學士作泰和王君行儉與豫同官禮部又同列翰林最相好為豫道其外姊胡氏孺人之賢而求文表諸墓蓋孺人母蕭氏又為行儉之繼母以行儉貴贈淑人故行儉謂孺人為外姊而惓惓請於豫豫安得辭胡氏居泰和之永陽里蓋忠簡公之裔孺人祖曰闕父曰闕皆不仕然皆鄉里之傑也孺人諱善孝順慎勤精於女事父母愛之為擇壻得同里周以志之子俊祖遂歸之以志娶蕭氏與淑人同宗故孺人事舅姑益孝敬所以奉養其口體而娛適其志意者無不宜舅姑亦愛重之稱之六親俊祖卒於洪武辛未時子盤生始七月孺人年才二十三誓不更嫁事上撫下綜理家事一不異平時而持身益謹言動不妄舅姑沒孺人葬祭無違禮歲時祀先則抱盤拜且泣曰吾宗一脈幸存此惟祖考其隂佑之旦夕撫視未嘗去左右平生節儉不擇衣食既寡一絶去華美於諸妯娌及姑姊妹相待一以誠宗族鄉黨有不給賑贍之不責其必償見行乞於路者救其寒飢汲汲恐不及盤既長家事不以委之唯資使為學曰爾能讀書成名以光顯父母則吾志樂矣至老尤篤於濟衆築沙浛陂以灌田里之橋梁道路有傾圮不治皆出財治之人之受惠者頌孺人之德不置口於內外親屬問遺往來藹然殷勤篤厚之意以行儉之逺也撫其諸孫尤切至蓋自俊祖之亡孺人守節四十餘年氷清而玉堅既長育其遺孤又有德於人如此信乎其可表也鄉老里正數欲逹之有司而請於朝廷孺人亟止之曰吾自盡吾道焉耳豈欲求表哉不敢以煩父老正統丁巳某月某日以疾卒年六十九明年某月某日葬于六十五都相公坑之原豫聞之聖人繫易於恆之六五曰恆其德貞婦人吉吾夫子釋之曰婦人貞吉從一而終此萬世不易之道也世之婦人而能此者蓋鮮矣其或能此然不能不求聞於人此豈所謂自盡其道哉自盡其道而不願表著於世孺人之賢於是為不可及已於乎孺人雖不願表著於世而君子之欲垂教範俗者其可以已邪宜乎行儉之惓惓以請也故為書之使揭于墓上處士王公墓表公姓王氏諱泉字思允泰和南富里人南富之王徙自安成之連嶺連嶺則折於廬陵之何山蓋王長者之後曰思齊廷用功從者則公之曾大父大父父也雖皆不仕而皆以儒行聞鄉里公自幼穎敏好學遭元之亂奔走避匿無寧時亂定而歸居室既焚蕩諸老長又相繼沒公亦甫冠躬課僮僕理荒穢舉廢墜勤勵不懈家用復興然天資髙邁不少屈於人人亦無足當其意獨歐陽公觀民志同道合相與為莫逆洪武甲子朝廷布新令欲為天下去蠧弊恤小民諸為不法者許執送京師得厚賞老姦宿猾相煽而起始則嚇小人終亦誣罔君子以規利亦有危人以圖安者禍且及公公憤曰吾行無愧於天地所不足者不能俯仰諧俗耳鼠輩乃敢爾邪即往伏闕下盡發其姦上為之震怒凡為誣罔者皆謫戍逺方公獨受賞而歸姦人由是斂戢善者以安平居厚於宗族睦於鄉黨鄰里處親戚故人必謹於禮節凡有急必赴惟恐後其祀先盡敬訓諸子姪必本於仁義人有過失未嘗出諸口初避亂時公雖幼諸物不以加意獨携其宗譜以行其後族人欲修譜既請於學士解先生而舊譜亡失無足徵者衆病之公獨出其所有譜由是成解先生獨愛公以為能知所重其尊祖敬宗蓋本於天性如此永樂癸未十一月疾大漸呼諸子孫勉使讀書為善以不辱前人言訖而卒是月二十九日也享年六十葬其里水坑周家山之原娶歐陽氏有賢行子男三守誠守信守邦女一嫁曾汝茂孫男四綺紳綽編公之葬久矣而墓上之石未有文至是孫紳為曹縣知縣以前國子助教歐陽先生允賢所為公行狀來求豫文表諸墓按狀謂公長身玉立緩步徐趨懇懇乎其誠也碩碩乎其大也傲乎其自得而憂患得喪不足動其中雖坦夷自居而詭隨側媚者不能窺其情雖簡質不華而巧投曲中者不能測其意始終一節未嘗有變知公者以為信昔蘇文忠公為司馬文正公行狀而范文忠公取以銘其墓天下誦之後世傳焉豫既慕公為人且嘉紳之孝故序行事而取歐陽先生之言俾揭于墓上庶後來者有徴焉中允徐公墓表永樂二十二年宣宗皇帝正位東宮置官屬豫自翰林侍讀學士進拜右春坊右庶子睢陽徐君永達則自編修為中允又與豫同僚相好也會朝廷推恩羣臣徐君之先君子子昭贈為右春坊右中允階承直郎徐君念其德之大而痛其即世不得與享其榮思求文以表諸墓然縻於職務未暇也無幾升鴻臚卿又往使交址由是遂拜湖廣按察使改山西其任益重益不暇顧其親然其心蓋惓惓不忘也至是徐君遂以疾終于位臨終語其子倫曰爾祖墓石未有文吾死不瞑目吾嘗託好於泰和王公汝以吾意往請而刻諸庶幾以畢吾志徐君既卒葬倫來京師以翰林學士藺先生所述其祖行實因父之執友鴻臚楊君來請文豫悲徐君不可見而重哀其意奚可辭按狀公諱彰子昭其字也曾大父國祥大父仲明父景讓皆不仕而有隱德鄉人稱為長者公生六歲喪其母哀毁如成人善事繼母許氏許亦善撫之如所生及長喜學於諸書悉通其大義然無意進取而止用以善其身信義孚於鄉黨恩愛篤於親族家雖豐而自奉甚約至於賑施則未嘗吝也歲凶常出粟以貸貧者貸而不能償則焚其劵姻戚有孤女貧不能嫁助資裝嫁之死而不能葬者出棺衣葬焉如是各四五人其心之厚於仁多類此洪武己卯四月初十日卒距其生元至正庚子之歲享年四十四娶范氏有淑德封太安人子男二長即永逹次永清女一嫁士人林增孫男五倫佐侃佺佑倫即來請文者曾孫男闕人以卒之年五月葬其里闕祖塋之次夫有德者必有後天道然也觀公之德備於已而及於人如此宜乎有徐君為之子倫為之孫卒能著其德使永永不朽則公雖不至永年何憾哉故為書之使揭于墓上參政王公墓表正統丁巳五月十四日中闕大夫河南右參政王公卒于家年六十一初公自河南述職來京師浩然有退休之志凡與公厚者皆曰公年財六十而遽欲致仕不及七十一未宜去今天子在位圖任老成以興道致治公方面大臣宜有以副上意二未宜去公曰吾受國厚恩仕宦三十餘年豈敢遂忘朝廷哉顧精力衰而目眚甚忝竊愈久而補報未能人其謂我何今小子髙玷科第或可以效萬一吾其歸矣即具疏以聞上察其實許之歸安成故第與親戚歡洽甫兩旬一夕客去乘月坐堂中諸子列侍語笑如平時久之覺小異即趍進問起居公翛然逝矣凡諸親舊皆幸公之歸而惜其不能久處也奔走會哭者彌月而不絶是年十月二十七日葬于其邑闕清化鄉之賴嶺至是髙為兵部主事詣豫請曰先考之葬今國子祭酒李先生銘其墓矣惟墓道之石未有文懼無以昭德垂後敢請於執事豫素知公不可辭王氏系出太原唐未有諱該者避亂南來居廬陵何山再徙安成之連嶺子孫多至顯宦而瀘溪先生則以直道清節顯於宋其後曰某又徙居蒙岡至希旦所安思學則公之曾大父大父父也皆以德誼聞鄉里公天資簡重而闓敏喜學多讀書尤深於詩為文章必根於理典實而不浮洪武己卯領鄉薦明年升太學永樂初詔選諸生為縣令公獨請為教官得杭州教授日進諸生講聖賢之道而正已以率人於是賢者益勉而不肖者胥化於善學大有成秩滿選為儀制郎中時朝廷於禮樂制度多所參訂公盡心其間士大夫稱賢焉以父憂去奪情起任事歲庚子山東盜起民心擾動詔擇賢臣往撫之大臣薦公為山東參政公遍歷諸郡邑宣布天子德意釋其疑畏恤其寒飢綏集其流冗寬貸其過失民乃安於田里盜無與隨和尋即敗亡其他所以惠養斯民者尤多既三年丁內艱服除調河南而魏公源李公昌祺為方伯公協德一心以施諸政教而民受其賜凡有重事二公度他人不能任者則必以屬公郡縣吏民知公亷重不可以諛恱亦不可以賄求聞公來皆先期趍辦公之往不勞而事成蓋德孚於上下而人心敬畏之如此魏公召還復為刑部侍郎升尚書常譽公可大用諸公皆屬意焉而公乃力請而歸安止足之分識進退之宜公誠賢矣哉豫聞之禮七十而致事此仕者之大防也或身有不可不俟年而去亦君子之所與也若公是已後之仕者異乎是其未得也患不能得之既得矣惟恐失之遂至於無所不為然榮或未至而辱及焉其於道何如也嗚呼公誠知道之君子哉公天性孝友事二親撫諸弟皆盡其道夫人劉氏生五子竒偉俊髙聰皆讀書為善以自見於世今髙既仕郎署而聰復出為教官王氏之福詎有已邪此亦可以觀公之德矣故論次之使刻于墓上墨岡阡表君子之所以亢其宗而光啓夫後嗣者豈徒然哉令德充諸身故慶澤及其子孫至於盛大而不窮辟諸水木本深則末茂源逺則流長理固應爾也以子觀之處士蕭公其行有足稱者矣公諱用字以才世居吉水之田心為名族髙祖九峯先生諱層慱學宏才以經術為人師祖貴昌父思懋皆以德誼重鄉里公早孤季父思敬教育之公亦善事焉既長卓然自立田園居第有加於昔時內外戚疏食者常千餘人長幼秩然相敬愛小大之事指麾號令井井有條理當時皆推公為能元季盜起相攻剽賊殺公倡義保一鄉部分整齊聲振逺近羣盜聞之不敢涉其地一鄉之人皆賴焉國朝受命海宇寧一屢下詔求賢縣大夫屢欲薦之則屢以疾辭免間居無事閲經史自娛縉紳君子相往來則樂與欵洽非其人不接也延名師教子孫以學暇則躬課勵之以長孫寬端重警敏最鍾愛其課勵尤篤於諸子孫皆勉以孝弟忠信禮義廉恥見人有善則樂道而奬進之有過則規之不少恕既復歡然如初宗族有貧者賙給之孤女無依者備資裝嫁之姻戚或有急難赴之惟恐後有喪弗能舉則具棺衾葬焉里中訟者不之有司惟求決於公公據理折之無不悅服嘗曰寧人負我無我負人此吾自處之道也士大夫迹公所為無不如其言尤以公為長者公生於元闕丁丑十月八日終於今永樂乙酉三月十一日年六十有九是年冬十月葬於墨岡之原娶王氏有賢行婦道母儀為宗族楷法永樂甲辰十二月七日卒年八十六合葬於公之墓五子曰仁安以子寬貴封奉訓大夫吏部文選員外郎曰義安曰禮安曰智安曰子厚女一嫁劉自省孫男十三人長即寬甲申進士今為湖廣左布政使曾孫男十三人公葬已四十餘年而阡表未立至是寬考績來京師俾直為文歸而鑱諸石昔者詩人之祝嘏於君子也必本於其德德盛而福益盛至於保艾爾後乃已焉而君子之欲顯揚先祖者必論撰其德善列於天下明示後世所以崇孝而垂教也若公之德能使其子孫享名爵之榮而其孝孫之思論著其美以傳於永久俾後之來者得效其所為前有以啓之而後有以繼蕭氏之盛可量哉故為表於其阡百世之下有考焉淑人劉氏墓表淑人劉氏諱貞一歙古城關劉添之子嫁為同里程仲仁甫之妻二家皆歙之名族仲仁甫髙祖元潭在元為新安太守曾祖三益祖雷甫父順德皆不仕而皆以行誼聞鄉里淑人為程氏冢婦治家政時舅姑已先卒後姑在堂淑人事之朝夕謹慎能得其歡心家雖饒財未嘗妄費一錢益以勤儉治其家然奉祭祀必豐潔待賓客必充腴親戚往來相饋送必中於禮節仲仁甫有弟七人妹三人皆幼淑人善撫育之使各治所業而婚嫁必以時仲仁甫初娶江氏生男喜僅歲餘女一財三歲而江沒淑人愛養之如已出衣服飲食必均一男有室女有家恩意篤至人莫知其異母也淑人有子富雖甚愛然必使之就規矩從名師愛學早暮課勵之學遂有成以鄉貢進士入官職風紀三十年纍加至三品名績顯著朝廷推恩及其母遂纍贈至淑人世皆謂慈訓所致要以德善為之本也淑人生於前壬寅十一月十三日而卒於今永樂丁酉五月草九日享年六十六子一人即富今為都察院右副都御史女二嫁項汝器葉茂安皆名族以某年某月某日葬于古城關之原葬三十餘年乃來求豫文刻諸墓上以昭其德於永久夫世之所謂名卿士大夫者莫不皆本於其親然母之德鮮能自見於世者蓋其教令不出閨門嘉言善行人莫得而知惟有賢子孫載之文字刻諸金石而後顯揚於天下然而昧於此者蓋多矣若淑人之德視唐鄭氏崔氏宋歐陽氏吕氏之母蓋無愧豈可使無聞於後顧不腆之辭奚足以稱賢子之心哉姑序次其説俾刻焉余氏二親墓表余氏二親者贈承德郎禮部主事余公仲英與其配安人徐氏之墓今禮部郎中麟之考妣也公以宣德丙午正月十二日卒年六十六又四年麟為禮部主事有名朝廷推本於父母之賢而封贈及之安人克有盛福享祿養者二十年以正統丙寅十一月二十三日卒年八十四於時麟為正郎在儀制聞訃慟絶即解官歸服喪而謁豫泣曰先考之沒以丁未十一月十二日葬于吾鄉潘嶴之原今先妣復即世將奉柩以祔惟我考妣實有德善以庇佑後人宜刻文以昭示來世庶永永不朽然非先生誰宜為敢再拜以請豫嘗為二於禮部知郎中為人且聞其親之美矣乃按狀而序述成章余氏之先家嶺南韶州在宋有諱深者官至執政從髙宗南渡家錢塘其後有曰子善英偉不羣為鄞童氏甥遂家于鄞公之考也公諱仲英字文彬自幼端謹喜學言動必循理事親色養務得其歡心母嘗病亟醫弗愈每至夕率婦子躬禱北辰願減已年益母壽及卒執喪過哀杖而後能起鄉里皆稱其孝見人有疾不能療喪不能舉貧不能自給者皆樂以財濟之無一毫顧計心佳時令節與故人賓客消搖山水間意有所適輒觴詠忘返天性之真蓋超然於物之外一切世利舉不足纍其心有司嘗苦嚚訟以公鄉人所敬舉為耆老司其平公謝曰吾老矣自治且不暇焉能治人卒不就而優遊自得以終其身安人徐氏諱茂貞邑故家某之女柔慧淑善通孝經女戒諸書間於女事既歸余氏以孝敬事舅姑正順以相夫而勤儉以治其家凡主事公奉祭祀待內外屬接鄉黨賓客與凡賙窮恤匱義之所當為者皆能成其志麟初遊鄉校時資給勸課以成就之尤篤及仕於朝則惓惓以忠勤為勉既受封而食其祿人皆為善教所致而亦以為安人有德之報其教諸孫亦備至洵已領鄉貢嘗讀書過夜半則止之曰學雖在勤然過勞則有時而輟唯貴於有常可也聞者以為名言二子長即麟字天祥次曰義亦克成其家女二嫁士人范庸李奈孫男三孫女二曾孫男六女三豫聞君子之光大其家而保艾其子孫者惟有德而後能之然顯者易見而隱者難知至於女婦才美不外著尤非世之所得聞故蔽而弗彰泯沒而無傳者蓋多矣惟有賢子孫汲汲以顯揚為事託之文章刻之金石使其親之美足以垂世而範俗此記禮者之所謂明而仁者也余氏二親之德足以大其家而保艾其後褒封顯榮已有聖朝之錫命而郎中又欲表諸墓顧豫文之不美何足以稱孝子顯親之心哉然不可辭也乃序次其説俾刻焉主事顧叔謙墓表叔謙諱謙姓顧氏其先蘇之吳縣人曾大父某大父某皆有隱德而不仕父至善以閭右民實京師遂家上元叔謙自幼穎敏不凡七歲善屬對十歲能作詩賓客每命之賦其應如響選為應天府學生從豐城丁季恆受詩經嶷然端重如成人衆皆竒之洪熙初以善書徴未幾拜中書舍人凡外制多叔謙執筆既三年上以為能錫之敕命且加恩其親至善甫為中書舍人母與妻皆孺人秩滿升禮部精膳主事當是時朝廷清明德化大行四方貢獻無虛日凡廩餼燕犒之事皆精膳主之叔謙才智有餘勤慎不懈故事無不當而人用協和海外諸畨使者歸其國故事必擇廷臣知大體者送之閩廣宴餞而遣之每以命叔謙而人皆以為宜其姿貌豐偉襟度磊落然事上接下待賢納士無違禮事父母極孝敬處兄弟極友愛於故舊親戚恩意尤厚鄉閭里巷之人不間貴賤貧富遇之各盡其道由是人人敬愛之在官留意政事凡可禆益理道輒以聞蓋有志於功名者正統乙丑主事滿九年當路者多屬意薦之遭外艱歸上元丁卯三月十二日以疾卒年四十八娶施氏繼朱氏子男四曰俊偉傑僖女三長嫁陸縉餘在室叔謙臨終囑諸子曰我死必葬我於蘇州陽寶山先塋之次而求吏部尚書王公為文表諸墓則我為不朽矣既而其姪某奉遺命且以郎中王士華所為行狀來求文豫讀而悲之曩豫為二禮部日與叔謙接而深嘉其才謂使在牧守之位其功名豈少哉及待罪吏部而叔謙來考績豫意其必有合也孰知竟不能待而死矣豈非命邪君子蓋深惜之叔謙之美自足以垂諸後而乃以不朽託豫豈以豫文為足以信於逺哉故序次其事而使歸刻焉司副劉公墓表監察御史安成劉克彥以永樂壬寅正月草五日喪其考司副公年六十八葬于某鄉之原正統丙寅十二月某日母太孺人文氏亦卒年九十將歸奉柩合葬焉謁豫拜且泣曰惟吾二親實有德善以庇賴後人而先考未及仕克彥初備員行人司副蒙朝廷推恩以其官追贈而先妣亦封太孺人其榮幸大矣惟墓前之石當有文以昭德垂後庶久而不泯敢奉狀以請於先生豫哀其志故不辭按狀公諱恭字允恭本龍氏唐零陵守述之後曾大父貴甫早孤為劉氏贅壻婦之兄君壽資豪而力寡扳貴甫為援載之版籍從其姓故遂姓劉氏大父仁卿父賢可皆有隱德而不仕母蕭氏公生當元季不暇學於書能通大義作五言詩多新竒朋儕皆讓之天性篤厚始終不渝幼從大父避冦山中大父裹飯食之而自咀藤實大父殁公見藤實輒哀終身不忍見大父喜凍肉及嗜酒煮魚歲時祭祀必設此二物而對之悲哀若親見其食焉者嚴重自持鄉里諸俠少見之多自斂或以不平事求直者必據理析之不茍為異同見人有過惡必鐫諭使改然終為之掩覆嘗夜自外歸遇有竊其池魚者僕夫捕獲欲送官乃里舍子也公切責之曰爾父昔從我郡城歸夜行防虎嘗以身翼蔽我其仁如此爾不念汙而父乎亟改之遂縱使去終身不以語人公卒其人哀念不置斂殯皆躬執其勞至葬乃已又有盜公衣物者蹤迹之故親戚子也公不忍發踰數年盜以公酒器鬻於人怨家欲害之求得以獻公乃曰此非公家物邪公搖首曰吾素無此物怨家計窮事遂已其存心忠厚類此治身以禮而待物以仁周窮恤匱無吝色篤於教子每夜誦戒僮奴供茗飲而躬往伺察稍怠則警發之性不嗜飲惟其子之賢師友往來則傾倒盡歡然後罷晚年闢一軒暇則焚香靜坐以書史自娛嘗曰吾平生不能弄巧一於拙而已因以一拙自號且以名其軒及病革戒諸子以讀書勵行慎無玷前人不及其他太孺人邑之固塘人祖某父某蓋文信公之從孫太孺人歸劉氏孝敬順祥以勤儉治其內凡司副公之奉祭祀供賓客施惠於鄉黨訓飭其子而整齊其家皆克相承之婦道母儀為宗族楷法荷恩封之隆而食其子之祿顯榮光大而以髙壽終君子以為有德之應子二人長克竒早卒次即克彥初取進士為行人司副今為御史有賢名女一嫁田道正孫男四曾孫男闕豫觀昔之君子所以名傳於世者蓋必本於其德而又有內助之賢斯能興其家而成其子至於享其福之厚夫豈偶然哉今公夫婦之德善如此誠宜表著於後世况克彥之孝又汲汲以顯揚為事以豫文之不美何足以稱孝子之心哉姑次第其説使刻諸墓上侍郎于公墓表于氏之先河南人世有顯宦公之髙祖伯儀仕元官至嘉議大夫禮部尚書上輕車都尉追封河南郡侯居薊邱曾祖夔中奉大夫河南江北等處行中書省參知政事護軍追封河南郡公祖九思杭州路總管纍遷中奉大夫河南道宣慰使都元帥因家杭州之錢塘父文大國朝洪武初為工部主事以孫謙貴贈嘉議大夫兵部右侍郎母施氏贈淑人公諱仁字彥昭幼而岐嶷有大志弱冠工部公卒治喪能盡禮奉母施淑人極孝敬而以勤儉興其家沉毅方正言行侃侃不茍為容悅好義樂施於周窮恤匱雖多不吝至遇老佛之徒不輕與一錢嘗雪夜聞戶外兒啼使人問之曰父母遣鬻炭市米為夜食失其資米既不可得且迷故道是以泣公憐之與其直使一力送至家宣慰公有故侍婢苗氏公禮待之每宴會置諸上坐曰彼逮事吾祖吾敢慢哉及卒亦以禮葬之其行義多類此性好經史常用以自娛取古人之嘉言善行以為法長子謙英偉不凡公知其必紹世業遣受學邑庠而課勵尤篤遂取進士為監察御史升兵部右侍郎朝廷嘉其賢而推本於父母皆以其官寵之故公自監察御史進兵部右侍郎配劉氏亦自孺人進淑人君子以為善教致然也二子長即謙今為大理左少卿次泰女一嫁錢塘朱濟孫男一曰冕曾孫男一公生洪武戊申三月十有七日而以正統丁卯五月十日終于正寢年八十方疾革時語家人曰吾幸享榮名全壽考皆上之賜為吾語謙當勉力以報大恩勿以吾為念禮部以聞上命遣官致祭且敕工部營葬事命謙奔喪畢即起復視事時謙巡撫河南山西聞訃亦還朝乞終制既辭而歸卜以某年某月某日葬公某山之原而求豫言表墓上豫聞之孟子曰天下有達尊三爵一齒一德一夫爵齒者德之所致也德備於其身則必得其位必得其壽此天之所以報有德也然人能得者鮮矣而於公見之是足以表著於後世故序次其説而使刻諸石俾後之人有則焉丁氏二親墓表湖之歸安處士丁公諱亮字仲光以正統丁卯八月六日卒于家距其生洪武壬子十月十八日享年七十六子澄為監察御史在京師聞訃慟絶即解官歸治喪而以刑部侍郎薛公希璉所述行狀謁豫告曰先考之不幸棄諸孤其痛大矣而先妣實先十四年以卒卒之年是為宣德甲寅某月某日年五十九澄兄弟尤痛切於心兹卜以今年十二月某日奉先考葬于邑之士林新塋之原而舉先妣之柩合葬焉惟先考妣實有令德以啓佑我後人今之葬既得禮部尚書毗陵胡公銘于墓矣而墓前之石宜有文以揭德振華庶永永不朽敢請於先生澄今之名御史觀其子可以信其父又重以薛公之狀益可信不誣豫安得辭按狀公先世姓薑為烏程右族曾祖德輝祖孟衡父子新娶武康丁氏生四子公居第三丁之弟啓宗無嗣謀之子新乃以為之子因遂姓丁自幼喜學異常兒長益奮勵常出遊苕霅間與士大夫遊尤喜歸安菱湖風俗之美數往來其地菱湖之賢亦雅愛公皆樂與之處有應時中者行誼重當時惟一女擇壻喜得公館之故又為歸安人時中愛公如子公亦事時中如父謹於持身未嘗涉非道治生甚勤不肯茍營非義內姪應振早失怙公撫育之且為之娶使克有成立愛其子擇師教之遣從髙孟暘受業每未明即督使往學雖風雨寒暑不廢縣庠缺弟子員縣令丞聞公能教是必有賢子遣吏及鄉老求於公公念諸子溫潤質厚可以承家而澄穎敏勤學必能大吾門乃遣澄就學所以資給課勵之甚厚澄亦能如公志早夜不懈學遂有成舉鄉貢進士為壽開二州學正有作人之效升監察御史謹憲度務大體皆公善教致然也公性恬淡不樂浮靡非其人不交所與遊處論文賦詩奕棋觴酌如周紹邱恆輩皆一時名士或遇風日晴美輒相與徜徉山水間意氣飄然逈出塵表其足迹未嘗至公府郡縣守令髙其行每鄉飲必請為上賓藩憲大臣行縣者必躬造其廬而公承之以謙儀度肅然衆莫不加禮鄉人有不平者悉求正於公得一言無不悅服其為人如此卒之日無少長愚良哭之皆哀應孺人有賢行公之所以興其家而成其子之才凡有所惠利於人者皆克相佑之蓋與公同德云三子即溫潤澄皆應出女三孫男十一人曾孫男闕嗚呼若公其可多得哉生遇明時力於為善而賢配克相其志有子有孫能忠於國而世其家且又卒於髙壽其福盛矣雖推恩之典未遽及安知其不終享也故為表其墓以俟署正萬公墓表公萬氏諱英字靜善其先荆州人宋之時有諱勉懷者守吉州子孫因家泰和世以宦學顯康年為宋太學慱士以論秦檜罷官又徙居安成永嘉之雅澤里至公之髙祖邦行為大理評事曾祖叔彰祖宗大俱有隱德而未仕父豈吾仕元為白沙鎮巡檢母周氏有賢行公年十二而孤家之賦稅倍他族屬時多事科徴調發無寧歲幸有母在堂公與兄靜安奉令承教以應務卒保全其家後長正南區糧賦公惟兄命是從朱嘗辭艱險歷五載無廢事會詔下餽運給西北軍事嚴而道逺董役者皆危懼靜安曰吾為先人後當往遂行及竣事歸而兄果疾作公憂之醫禱百方終不起治喪盡禮而哀戚過焉公初與兄作樂壽之堂以事母士大夫嘉其孝多見於文字至是母周尚無恙公朝夕奉承極婉偷之樂退而念其兄未嘗不戚戚也時鄉人因事興告訐風動逺邇凡所連逮皆右族輒沒入其家辭亦及公捕甚急或勸避禍公曰天道佑善吾祖宗以來不為惡吾何懼哉遂就逮赴京師以其情白上果得釋而歸嘗念先世多顯者而已早孤不能嗣先業力教其子節與兄子霽相繼取進士節纍官至光祿寺大官署正得封公為署正階儒林郎霽亦為陽朔令公為之喜而嘆兄之不及見益悲之性不嗜酒賓客往來好與論古今事不厭足迹未嘗至城府鄉族燕會惟親厚禮義之家則一至至則歡動一座其能自重而見重於人如此丙戌歲飢大發廩賑貸會連歲凶公盡焚其劵不責償修祠堂刋家譜篤於尊祖敬宗平居教族之子弟鄉人之子弟俾勉於為善而不可為惡蓋其志之所存也正統辛酉十二月草八日卒距其生洪武戊申三月二十一日得年七十四臨終語子姪以力行孝弟不及其他配李氏封安人婦道母儀為里族楷法先公卒子男二長即節今為監察御史有名次孚早卒女五孫男六曾孫男七公卒之明年某月某日葬於邑山四十九都官山之原與安人連塜至是節自述行狀求豫文以表於墓上聖人之道必本於孝弟孝弟之至天與之人歸之公孝弟人也其修於身行於家而及於人者皆此道故有以得乎天而獲乎人爵祿之榮子孫之興豈偶然哉用是表諸其墓使後之人有則焉侍郎王公墓表公王氏諱誼字內敬越之山隂人宋尚書載之裔曾大父某大父某父復初皆有德誼而不仕公自少好學經史百氏之書靡不究於世俗紛華未嘗涉於意獨坐一室研精覃思手不釋卷至夜分而後寢茍有所得則復起然燈書之由是其學沛然矣先生長者皆折輩行與之交鄉邑學者多從遊公亦樂為之盡然初無仕進意惟肆力於詩山川草木之姿狀煙霞雲月之竒變身之所歷情之所感耳目之所見聞雖憂悲愈佚之不同一皆於詩發之大篇短章渢渢乎盛也其事親至孝始終不違於禮歲時祭祀必誠必敬親族鄉黨處之各盡其道皆歡然有恩人亦無不敬愛公者其有曲直不能平得公一言則意滿而去輕財重義急於振施賓客往來則相與觴詠為樂窮日夜不厭洪武中坐纍謫遼陽人皆疑公所以處憂患當如何而公不改其素公事之暇讀書作詩以自娛而已於是乃大服公與二弟內誠內悅相友愛甚篤在遼之詩憶弟者半焉及歸則謂二弟曰堂前紫荆吾手植也吾欲繼田氏之義二弟感公意復同㸑而居號荆樹曰義荆二弟能詩好天良夜必酌酒更倡極天倫之樂一時士大夫聞而慕之多見於賦詠正統十三年二月初四日以疾卒于家年八十有八娶邊氏有賢行子男一曰佑以明經取進士纍官至工部右侍郎有名於時朝廷推念其祖考之賢封公為通議大夫工部右侍郎邊氏贈淑人公之考復初府君配朱氏寵贈亦如之女一嫁同邑朱某孫男三曾孫男四公之卒也禮部以聞詔遣致祭工部為治墳塋佑歸以某年某月某日奉葬於闕之原而思顯公之德於悠久屬豫文以表諸墓憶昔在翰林時豫友彭修撰汝器得公之作而善之以為非近作可及及修文皇帝實録大召名儒有以公為薦者徴至京師俾待詔翰林豫始從公議論久之公以老疾辭歸髙風雅度益思之不置而猶嘗辱公之詩孰知公今不可復見矣然公之德足以表後進而儀來今是宜有述也故為序其事俾刻焉千户吕公合葬墓表永樂二十年太宗皇帝北征沙漠寬河衛副千户吕公以兵從八月二十一日歸次閔安卒焉享年六十後十年為宣德六年四月草九日其配宜人馮氏卒于家年六十六子一曰貴痛母之不克長享其祿又傷父之不克歸葬也哭之既久而猶哀則復嘆曰吾父之精爽其尚顧懷於我乎正統九年十一月九日具衣冠招來復而治棺藏焉舉宜人之柩合葬于通州安德鄉壬山丙向之原至是來謁豫曰惟吾考妣實有令德生既不能偕老於一堂死而得同歸於一土亦足以少慰矣惟發德振華宜有文表諸墓道敢請於先生豫嘉其孝故不辭公諱義字尚質世為山東文登人以忠厚稱父敬文元末用才武入官領千夫涖撫軍院數從征伐有功國朝受命靖四方乃遣散其徒歸鄉里會令下徴元故官詣京師卒於道公侍行隨例徙襄陽士籍未幾以故官後復徴詣錦衣衛為親軍己巳從宋國公馮勝等征伊都山辛未征朵顔山黑松林諸部落皆有勞績師還選𨽻營州中護衛公屢經戰鬬勇略過人而志氣彌厲己卯太宗皇帝舉兵靖內難公仗義來歸從克廣昌取蔚州攻大同戰白溝河破濟南復滄洲再戰夾河破藁城克西水諸寨遂擢為隊帥卒壬午從取東河小河橋齊眉山靈璧縣又從下泗洲渡淮盱眙揚州諸城皆下六月渡江攻金川門入京師論功升昭信校尉綏德衛百戶賜誥命許世襲實選留侍衛中而食祿於寬河衛永樂庚寅隨車駕北伐以俘獲多升寬河衛副千戶壬寅復從征師還而卒公天性至孝常哀痛以念父而誠敬以事母歲時享祀必精潔其朝夕奉養必旨豐每臨敵決勝智勇奮發曰吾忠於國乃所以為孝也宜人襄陽士人馮玉之子年草歸公善侍姑孫宜人飲食衣服必躬自調治姑有疾侍湯藥未嘗去左右姑甚愛之稱為孝婦公既盡心國事凡諸家政所以事上撫下和睦姻族小大之事皆不纍其心者以宜人為之助也嘗勸公置妾媵以廣繼嗣公曰汝治內而子貴能承吾家古人所謂一亦不少何以多為也而宜人教其子必使之讀書明理親賢樂善以趾前人而光大其家婦道母儀為宗屬楷法貴既襲職為副千戶亦屢從征伐建勛績受賞賚復選𨽻錦衣衛公亦改贈武略將軍錦衣衛副千戶貴有才有猷譽望日著遂選為鎮撫司鎮撫謙慎自持進修不倦君子蓋歸於公之德與宜人之教然也豫聞古之世臣大家所以能世享其祿者必本於世德之盛德者爵祿之本也吕氏之先公既有其位矣世代革易而公復振起之功名富貴顯於其身而傳於其子公之所以光前裕後如此其德善可知矣以是而表諸墓不亦永永有耀哉鍾處士墓表處士鍾氏諱復字彥初其先贑之平固人後乃徙泰和居邑西北之荷塘里歷十七世至景雲靜春舉善則處士之曾大父大父父也惇本尚實為鄉善人而舉善尤好讀書善吟詠興之所適必於詩發之時先祖尚書公子與北平憲副劉先生子髙國子學録蕭先生子所皆辭榮家居以雅道自任舉善皆得從之遊由是詩益昌年五十始生處士甫七歲而孤母陳氏教育之煢煢孑立艱苦備嘗稍長慨然有立志公私諸務一以身任其難勤生惜費銖積寸纍久之家用饒裕先業之亡者浸復之先廬之毁弊者稍徹而新焉作祠堂以祀先每旦必躬詣焚香致敬歲時祭祀備物行禮必盡誠以父殁時方幼稚殮葬弗克如禮每一念之輒涕泗滂然流事母盡孝生致其樂死致其哀始終無違禮姻族鄉黨有窮匱則賙之男女孤幼無歸者則撫存而婚嫁之死而不能葬者葬焉每歲暑月設茗飲以濟行者皆隨力所至而為之蓋其性然也間居端靜不外馳而達於人情物理揣摩事勢十常中八九人有以是非求直者必以理決之不曲隨茍止賓客過從必置酒相歡傾倒而後已愛其子擇師教之而其教於家者尤篤晚年諸子皆能立遂放情物表時事不以屬意每燕坐一室誦古人詩以自娛蓋囂囂樂也正統乙丑正月得疾醫弗效疾革戒諸子孫治喪必以禮不用浮屠老子法十二日午盥濯而坐神色不亂命取酒三酌之奄然而逝距其生洪武戊午四月二十五日享年六十八配楊氏有賢行凡處士之教諸子處內外屬酬酢事變舉適其宜克再造其家孺人為之助也子男八長泛次沔為邵陽教諭瑞安知縣俱有名次沂皆先卒又其次則湜汰潮淮澗汰潮俱以明經為訓導女一孫男二十六人曾孫男闕葬以是年十月初九日墓在其里栗岡石磔之原葬三年汰潮服闋來京師以其壻李卓所為行狀謁豫文表諸墓豫觀鍾氏之居荷塘蓋所謂積善之家也非有赫然勢力可以過人者而綿綿延延至于今靜春及處士皆以一人之身遘多難之時宗祀不絶如線然卒以盛大有譽望於世今處士孫曾已三十餘而猶未見其止此豈勢力可能哉德善所致也詩小雅南山有臺之篇言君子之保艾爾後而必本於德音是茂今鍾氏如此其亦可以觀德矣於乎德非一人所獨得也此然而彼不然豈非修於已邪有異哉是亦可以勉而致也故序次其説使刻于墓上觀乎此者好德之心可以油然而生矣都御史陳公墓表公陳氏諱智字孟機武昌咸寧人祖式銘父原貞皆不仕以公貴皆贈資政大夫都察院右都御史妣皆贈夫人公自幼岐嶷異常兒不肯佚遊慢戲嘗讀孝經至立身行道揚名於後世以顯父母師為釋其義即拱手曰智敢不勉衆大竒之父嘗謂人曰先公常言吾以醫道活人多矣子孫當有異者其在此子耶遣入縣庠受學晝夜不懈學成登永樂丙戌進士第戊子拜北京道監察御史明年以內艱去服除復為御史嘗出按諸郡邑績大著閩人有張生者以殺人當死公察其色有寃詢之生曰父在時鄰居婦人王某許以女妻我已納聘矣今父母死我貧無資而彼欲背盟女執義不從隂遣婢傳言期某日夜於某處歸我金幣俾成禮某以告同舍楊生楊生力止我不果赴是夕女與婢皆被殺王疑我執赴官不勝拷掠故誣服公曰生非殺女者殺之者楊生也即遣人執楊生至公曰殺王氏女者汝也楊生股栗色變即伏罪張由是得釋人以為神閩地號富饒中官要人及以職任涖民上者往往肆漁取雖百金重貨不一二酬皆抑取焉民苦之令鄉老俾箱記當具言於上衆懼事遂省蘇人健訟嘗告連數百人皆姦民猾胥主之公窮治黨與訟為之減松江民有棄田里居城市而衣食於府縣者號大小牢子假公事虐鄉民如餓豺狼然華亭蓋數百家上海尤甚公曰吾且戒飭之不從化則盡擒乃揭榜通衢俾各歸舊集茍終違戾國有常刑衆悉如公令無敢後獨上海有十八人者最暴橫約為兄弟同生死出入府縣持官吏短長而操縱之無不如志遇有賦斂輒招攬歸已而重取於民以一而徴至什百民畏其惡莫敢校公聞之曰害有大於此乎乃為方略悉捕之言於上誅其首惡餘悉遣戍邊松江士民歌之永樂戊戌升陜西按察使時諸僚屬皆為猾吏誣搆繫京師事廢不治公乃剪巨猾理滯囚不兩月囹圄為空甲辰鞏昌有王百戶聚羣盜五百餘人於黑松林剽掠行旅公私往來者幾絶官軍捕之反見傷公恐其滋蔓驚邊鄙親往發諸衛兵勦滅之於是道路無壅邊地以寧平涼旱飢華亭尤盛餓殍相枕籍公倡文武官屬及富人出米為粥以食之活五千餘人洪熙初入覲兵部言京師馬大蕃今天下官來朝請人給一馬與之乘而歲課其駒皆太僕領之公曰百官來朝仰天子維新之政而兵部令養馬與民同此豈上意哉且按察司所以肅庶官正百度而太僕得臨之歲徴駒與下民等憲綱掃地矣即上疏言之時大臣已有論其非者於是上善公言敕兵部罷給其已給者與之乘不問其孳息時謂公達大體西安前衛屯兵十一人赴衛聽役暮至城下門已閉假宿民家鄰有靳三者善陶於城隍祠領鈔千貫為陶瓦是夕賊剽掠其家三持刃斫之傷賊額衆賊大躁殺其子盡取其資以去靳訴之官官不得盜擒假宿屯兵為盜煆錬獄成衆稱枉訴于公公亦察其實枉乃移檄城隍神期半月得真盜果獲之傷額猶未愈其所掠鈔尚存皆俯首服辜十一卒得不死是年關中飢而岷州造寺平涼修王府所役軍夫七千復用三千人運慶陽倉粟以給之中官督促甚嚴公曰人今飢困何堪此役即具以聞事遂止漢隂石泉略陽山谷深阻諸亡命聚其中時出剽掠為民患公慮其浸盛難制言族上且遣人招撫朝廷亦降敕諭以利害衆即首服散遣之其詣公陳首者皆使占籍為良民壬子公為按察使滿九年當考績京師陜人德公之深皆願留不可至為泣下有相送百餘里者超拜江西右布政使修庶政去宿弊六房有稱主文者皆逐之織染局諸工畨上舊有籍其後不復省閲黠者就間而朴者長上以勞役死者甚多公督吏胥搜諸庫得故籍俾按季更代工既得畨休從客就事由是無勞役死者乙卯永豐賊曾子良作亂聚黨據太盤山官兵擒而戮之從賊嚴季茂等千餘人皆被執時歲凶民艱食公謂其有因飢而被誘脅者不可令瘦死倡義捐俸為粥賑之奏上得報決其首惡三十餘人脅從者皆宥免時有告富民與賊通者三百餘人公下令曰所告虛實未可知茍無實當自來衆悉詣公自白公諭之曰果若人言下諸吏鞠訊爾尚能保家乎今賊已滅爾曹自赴官若能出粟濟飢民當貸爾衆稽顙流涕乞如命得粟萬餘石所活不可勝計正統元年三月升左布政使六月召赴闕拜都察院右都御史上聞諸道多滯囚大辟所繫有一二十年未決者首以命公公盡心推究悉得其情可矜狀奏之免死者百三十餘人嘗曰刑獄重事也死者不可復生斷者不可復續皇上躬舜禹之仁司憲典者不可不慎每當慮囚公必深任其事得平反者蓋多焉公性素剛其好惡必以道見人有善禮之恐不至且惠及其子孫或縱肆為惡貪冒無恥則必事剪棄不復自顧藉姑蘇范文正公父子為宋名臣其祠宇頽廢為葺而新之子孫困於徭役以其所受誥質錢於富室則為贖而還之擇謹篤者二人掌焉時有為逹官在朝者其家多種果果熟則分餽名卿巨人亦有及公公謂其以好來餽且口腹微物不足辭後治廨宇復餽土墼數千家人受以補垣墉又嘗以寒甚餽炭三百斤於朝房朝房吏受之每旦然火凡來朝者皆用焉不以白公公聞之怒解之者曰彼不名以奉公宜吏之不敢白也且聞他朝房皆有餽不必深究事遂已至是其人坐贓汚公糾核其罪當罷官彼乃以所餽為言曰此獨非贓乎公即引咎曰誠有之吾初不慮其蓄禍心如此吾過也願得與俱罷遂罷官歸咸寧休休然自得未嘗有幾微不足之意見於色詞正統六年六月也公孝於親厚於宗族鄉黨而惠於下民凶年飢歲民有不給者必請于朝廷寬恤之上亦多從公言其行之大者類此其細可略也正統丙寅六月晦日以疾卒于家距其生洪武己未閏五月十四日享年六十八以是年十二月九日葬于咸寧之東李􅀈保薑卜林之原公初娶鄧氏先卒贈夫人繼室以嚴氏封夫人子男五淮淦渥沔浚女三長嫁兵部主事方果餘在室孫男七公葬已三年淮兄弟懼其德不顯於後世以書屬杲為狀請豫文以表諸墓豫與公同朝久矣觀公之為御史為按察使為方伯雖秉義執法而心則本於愛人是故罰無小大人皆服其公人事有緩急危困而卒皆賴其仁其為人如此非孔子所謂學道之君子歟是以可表著於後世乃樹於墓之原張主事墓表張氏陜之咸寧人其先有曰恭者生從讓從讓生德德生仲實四世皆不仕而皆有善行主事之髙曾祖父也主事諱恕字克已自幼聰慧異常兒母姚氏早卒繼母王撫肓之愛親敬長不教督而能入郡庠為弟子員勤於學問通易經藩憲大臣皆重之年草七就鄉舉魁多士不利于春官遂入太學友天下之賢其學益進永樂辛丑取進士入翰林為庶吉士久之授徴仕郎中書舍人以能其官得推恩父母及其妻丁外艱去居喪盡禮服除又拜中書舍人既滿升承直郎户部山西清吏司主事時南方糧運多蓄臨清倉又轉漕至北京納多宿弊以克已主之弊盡革人畏而愛焉代還益以勤慎舉其職正統八年夏得疾醫弗效妻子猶百方求治克已止之曰修短命也其如命何汝曹但能修身如吾在則吾無憾矣言畢而卒某月某日也享年六十先娶朱氏卒繼室白氏師氏有二子鐸朱出鉞師出也女二人長適宋璽次在室孫男一璽前歸德太守宋公之子靜重而好學豫愛之至是鐸兄弟奉柩歸其鄉將以某年某月某日奉葬某處之原乃與璽謀欲求文以表于墓璽請於其尊府而以文屬豫豫不得辭重念克已前在翰林相從已有年其居官亦以名績聞于世且能安於命雖臨終不亂惟戒其子以修身異夫世之貪生惡死號籲異端冀緩須臾之頃者是可表也故表諸其墓曾氏二親合葬墓表萬安曾時望既合葬其父處士君與母孺人陳氏於其鄉湯屋山之陽葬十三年時望以出穀賑飢朝廷旌之為義民來謝恩闕下事已復自念曰惟吾二親實有德善以啓佑後人而昌大其家今之義舉皆慶澤之餘也而墓前之石未有文京師多名公巨人其言足以傳逺失今不圖恐久遂沉泯為罪大矣乃託姻戚刑部員外郎劉廣衡為行狀因其族人刑部主事翬來求豫文以刻諸石豫嘉其意而諾之按狀曾氏初自泰和之上謨徙居萬安永和鄉凡三徙乃居今龍溪為望族處士曾祖敬叔以明經為教官祖雲英父履道皆不仕而皆以行誼表一鄉母徐氏處士諱允文字孟學自幼聰敏喜讀書於經史能通其大義年十四喪父即穎拔自樹立十六為萬石長主一鄉糧賦徴輸緩急舉不失其宜事以辦治而民不擾既數年輸布上京師舟人不戒布或有水迹坐是當徒歲餘謫戍銅鼓雖處憂患而安之不以外物動意又數年還益端厚謹敕不妄言動平生事親孝親沒葬祭盡禮與季弟魯學友愛尤篤伯姊嫁郭氏早寡諸生懦不立處士賑給之至再世一門親屬及臧獲百餘口待之各盡其道上下無間言曾氏族最蕃嘗修譜以明尊卑割田以供祭祀家雖富然不用以自豪逺近貧者悉賙恤之再長其鄉糧賦皆公且恕未嘗妄取一錢鄉人有不平及諸利害皆決於處士愛其子擇師教之賓客往來欵洽無虛日賢士大夫過其鄉必以禮招致去則加餽遺焉孺人諱某同邑甘田巡檢陳以常之女莊重寡言笑工於女事通小學女戒既歸處士以禮義檢身以勤儉治家處士坐事去而綜理益密內外斬斬及處士歸凡睦親惇族待人接物賙窮恤匱惟所欲為皆能相其志以永樂己丑六月十七日卒享年四十厝于里之某原後二十二年為宣德庚戌是年十月二十三日處士卒年五十五明年某月某日乃遷孺人之喪從處士合葬焉子男六夫君子之於親必思顯其德而永其令名不以養生送死為足也夫親有美而弗知謂之不明知而弗傳謂之不仁不明不仁其得為孝子矣乎時望惓惓然思表其親之德以彰示後世俾永永不朽而篤義又足以繼之可謂能孝矣故次第書之使揭于墓之原彭氏義阡表彭氏義阡者葬彭氏之死於義者也當元之季豪傑並起推埋剽竊之徒亦相扇為亂龍泉羅邦其一也彭氏居邑之雩溪世為仕族于時有文逺者英偉有才略卓然為一鄉之望歲辛卯賊勢浸盛官軍不能制乃散財發粟集義兵以保鄉里賊頗畏之壬辰江西行省參政全普安薩里開分省于贑命張萬户守龍泉許辟署從事張辟文逺為護民巡檢參其軍領民兵守北門賊引衆及城下張與文逺屢出戰不勝因閉城堅守以待救癸已春城中食盡且無援張夜率衆棄城去文逺殿舟至螺灘賊追及合戰衆飢困不能支勢且北文逺使從弟大逺馳騎請兵于吉以圖興復率敢死士大呼奮矟入賊中欲刺邦不得殺數人賊亦攢槊向之文逺創重遂被擒大逺走告吉安總管為移檄泰和同知楊某使以兵復龍泉兵至境大逺為前鋒踰章村河涉南洲河會風雨大作河水暴漲兵大半不得渡賊以衆蹴之遂擒文逺兄弟同日死於賊是年三月十一日也賊既得志憤彭氏倡義圖已其兄弟子姪有先在軍中或竄伏田里者皆捕而殺之自文逺而下凡十九人又婦女二人我太祖髙皇帝既受天命削除僣亂以興太平彭氏族屬之存者休養生息今七八十年日以繁盛蓋詩書禮義之澤未艾也然其老長間居族坐相與談向時事未嘗不慨嘆文逺兄弟之英風義烈且深念夫死於其難者之無辜而皆不能歸葬或無以嗣其後蓋䀌然傷之嶷文逺之再從曾孫項城令仲恭甫之賢子也聞諸老長而有慨於其心乃即雩溪大塘口之原開兆域營冢壙倣禮各為木主以宣德三年七月望日招其魂而葬焉又以項城命置近田九畝以供歲時祭祀曰死者有知庶幾能安於此而無所恨矣嗚呼喪亂以來姦宄縱恣善柔多隕於非命有能奮勵以討賊而舍生取義如文逺兄弟者誠少矣雖曰有之其宗族兄弟有能興哀於既久之後而為之歸使祭奠有所如嶷者亦少矣然則彭氏其誠能篤於義哉是皆可表也嶷來京師因其姊壻督府經歷項斐求豫言故為之書使歸而刻諸石凡葬者之名諱次第則備載于碑隂髙知縣墓表正統元年十二月二日前常山知縣髙君年七十六以疾卒于家明年其配尤氏亦卒年七十二其子瑤環壽以某年某月某日奉柩合葬於其里杜鄥先塋之次瑶嘗為貴溪縣學訓導至是服闋謁選來京師請於豫曰先人之卒既葬矣懼其德善將久而沉泯敢乞文以表于墓豫哀其志而諾之髙氏本光州固始人從王氏入閩遂為閩縣人其先有為郴永二郡守者自是衣冠不絶君之祖大用父禧皆不仕君名昊字汝大自幼喜學有大志由郡庠生升太學出為廣東長樂典史衆為君少之君曰官無卑顧所為何如耳往佐其長以平易近民一縣稱治永樂初仁宗皇帝正位東宫妙柬宫僚擢君為通事舍人日侍朝贊導不失禮節人以為能歷九年升清紀郎益善於其職未幾出知常山常山大猾有出入有司伺候間隙把持長短為姦利者前令莫敢誰何君曰此不去何以為治即按致其罪當死因被反噬扺京師得白而歸羣不逞之徒惡其不便日夜媒孽其短欲傾之君聞之歎曰曾參非殺人者然告者屢至雖其母亦惑焉吾今且病豈可數犯危難吾其歸哉即謝病而歸優遊閭里間與親戚故人往還為樂遂以天年終三子瑤今為泰和訓導璹吳川巡檢女二林燾羅紹其壻也孫男闕人憶豫官翰林時宫僚初建號一時之傑豫皆得從之遊因亦識君及太宗皇帝巡幸北京仁宗為皇太子監國豫幸執筆侍左右而益知君之為人誠可以表見於後世况瑤又以請其安得辭乃次第其説使刻諸墓上蕭參議墓表正統三年五月十一日朝列大夫浙江布政司左參議萬安蕭公以疾終于家其孤和哲兄弟以庚申年臘月念九日奉葬於其鄉鳳凰山之原葬已因其親戚刑部郎中劉廣衡以書請於豫曰先人不幸棄諸孤今既葬矣右副都御史朱公實銘于幽堂孤不孝懼無以彰其德欲樹表墓上使永永顯聞於人庶幾少逭其愆惟先人嘗託好於先生敢以文為請願先生不辭豫泰和於萬安為鄰邑二邑之士實以契誼相往來故豫與公交好三十年始終如一日今不幸已矣而有令子欲圖其不朽於豫豫奚可辭公諱常字孟常世居萬安學堂里為大家宋時有諱璝者為工部尚書致仕繇吉水虎溪徙居今所曾祖俊可祖宗道父永大皆有行誼為隱君子母劉氏以洪武甲寅十月十六日生公自幼聰悟喜學父母亦篤志教之遣入邑庠從唐先生棐受詩經學業日進同輩罕能及唐先生深器重之永樂戊子領鄉薦會試禮部在髙等太宗皇帝巡幸北京未及廷試俾學于太學以俟辛卯始成進士觀政于户部以勤慎得名尋授廣西道監察御史于時適多務御史有殫力不能辦者公處之裕如法立而職修嘗出按廣東同列御史先在者所為多不法公曰吾果可徇私情廢公法耶劾奏之竟以罪去及巡歷山西雲南皆有名久之丁母憂有旨奪情起復改山東道山東妖人作亂連逮者以千計皆屬公推問公務得其情分别黑白良善者多獲全既滿超拜浙江左參議浙江地大人衆而事殷參佐各分任焉公早夜不懈事皆先集所至必進諸生勉學勸課農桑戒飭庶僚宜守法恤下不察察細微人以為知大體公初勤學雖目疾不少廢由是損其明醫弗能愈至是勞於職務遂浸以失明因援例得免歸家居八年其教子孫必以正賓客過從樽酒相對歡如也卒之日年六十五娶凌氏子三人和哲和矩和衷女三人劉廣華張振黎􅟛其壻也孫男十人公質直好義遇人有急惻然思濟之與朋友交能傾竭見底裏無毫髮隱情若有過失則盡言相規而亦能受人盡言當官而行必循道理守法度矜已傲物矯情飾詐之行無有也故凡與之處者莫不讓其賢嗚呼今何可多得哉故表著其墓以示於永久曾處士墓表處士諱穀字忠良居泰和上模里世為名家曰性翁德榮存吾者處士之曾大父大父父也處士早孤豪橫侵奪其産業母吳孺人勤苦教育之稍長卓然思自立躬耕以養吳孺人心歡焉從伯友吾死無後處士嘗以父命為之子事所後母羅孺人亦如所生及卒祭葬皆以禮綜理家政以身任其勞不以纍兄弟永樂中有司發民於湖廣萬羊山採營繕大材兄忠立當往處士曰兄往役而弟弗代非義也即請行時盛暑疫癘大作營堡中死者相枕藉處士獨無恙而歸人以為天佑云叔思吾為浙江曹娥鹽場官弟忠靜偕行俱死處士恨無力歸葬囑子翬等俾必成其志明吾謫戍逺方子敏崇當往繼無資處士鬻已業資遣之無吝色鄉黨親戚有急難必赴救未嘗以事辭有不平致訟者必據理勸解之使無訟乃喜人見其慈良也以良心翁稱之而其所發乃有剛毅不可回者稠人廣會之中後生年少或有狂言悖理衆不敢出氣處士必厲聲色挫辱不肯少假借雖由是召謗不為變性不喜佛老其徒有曲事之以求合不樂也正統丁巳七月得暑疾子鼐習遍謁醫不效勢且劇無可奈何私請道士致禱焉處士聞之力疾起至中庭呵叱道士使速去毋汙我責二子曰吾死生有命奚用禱取紙筆大書正命二字懸之榻前而安寢其下以卒其心之正守之確不以死生禍福易意如此蓋其年八月二十八日也享年五十八娶劉氏有賢行先處士八年卒再娶郭氏子男三翬取進士纍官至刑部郎中鼐領鄉薦未第今為太學生習崑山縣學訓導皆劉出孫男七女二以正統戊午干一月十一日葬其里鴨塘山之原至是翬請告歸省墓謁豫言曰先考少貧其成立甚艱而教翬兄弟亦不易今幸有祿乃不得養焉心實痛之若又不能表彰其德於後世則不孝之罪大矣敢請文刻諸墓上豫既敘次其事如右然猶有足以勵世而範俗者不可以不書豫聞處士曾大父性翁樂善好賑貸鄉里德之元末盜起過翁之門相戒曰翁仁人也不可犯凡其家人皆衛而出之然後肆賊殺素為鄉里害者或盡室殱焉處士安貧樂道篤於教子有能延名師者或忌其進不欲使來學處士不校則遣從他師書籍筆劄不能致不逺數十里往求之躬負挈以歸與其子感發其志意卒皆成學業享祿位然家尚貧凡詒書教戒必以忠敬廉厚無一語及私豫為表其墓而必牽聨及此者以見天道佑善人力不能勝又以見其善慶有源而處士濬之益深其流將益逺且大也嗚呼觀乎此者其可以興起矣周是修墓表先生諱德字是修以洪武三十五年六月十六日卒於應天府學舍年四十九子轅奉骨以歸既葬矣又謂其地之不吉也以宣德元年十二月壬午改葬於所居舉岡之屋後初葬時翰林侍讀學士解公銘其墓久之今少師楊公為之傳先生之賢由是而信於後世今年轅以江都縣學訓導秩滿來北京謁豫告曰先人之卒得二公之文誠足以不朽矣今既改葬若揭表墓上豈不益彰徹顯聞此不肖孤之志也敢請於先生豫嘉其孝而諾之先生之先蓋居泰和爵譽里其後乃徙灉江曾大父月溪大父于德父邦賢皆不仕先生少孤貧喜學力於孝悌忠信其胸次坦夷明白事非義不為遇人無少長賤貴皆有恩意然於是非白黑無所混初受業於里儒胡渚樵渚樵愛之以孫女女焉又從國子學録蕭先生執授詩經學成舉教官授霍邱訓導太祖髙皇帝竒其貌問常所業對曰教鄉人子弟讀書為善遂停訓導擢為周王府奉祠正尋升紀善王聞其好著書使歸取以進豫時始識先生清修玉立溫然君子也髙皇帝上賓王以過失聞府中官屬皆得罪先生以能諫獲免改衡府紀善入翰林預纂修嘗侃侃論國事詆諸柄臣衆嫉而挫抑之先生不為動太宗文皇帝靖難至京師宮中自焚先生即為書以後事託其友暮入應天府學自經死文皇帝以臣民推戴既即位御史有言周是修不順天命請追戮之上曰彼自盡其心而已置不問上之心天地之心也嗚呼死者人之所難也先生雖預纂修在翰林而官則王官可以不死然而必死焉亦求其心之安而已先生於綱常之誼躬履之如此平生書無不讀經史百氏皆能言其意為文思若湧泉然必根於理而尤好吟詠其所著有詩小序詩集義詩譜論語類編廣衍太極圖觀感録綱常懿範邇言家訓芻蕘集進思集其於朋友能相輔以道所最厚者若學士解公胡公少師楊公而所舉者侍讀梁公濳辰州同知劉公叔毖皆以文學德義政事重當時觀其所與與其所舉者則先生之賢益可知矣今卒四十年而有令子汲汲然思著其德於久逺此又可見君子之澤也故為之書使刻于墓上抑菴文後集卷二十六
