body:
  text: 抑菴文集卷九明王直撰墓銘劉先生墓志銘先生諱鎬字武性系出漢楚孝王囂五季之末由金陵徙居泰和東門世為大家至先生又徙居龍泉五世祖天定宋理宗時取進士為著作郎出知寶慶府以卒髙祖崇甫嶽陽軍節度推官曽祖昌武以長子明叟貴贈同知吉安路總管事封彭城郡伯騎都尉祖堅叟廣州路學正考允中洪武壬子領鄉薦授安逺縣學教諭以母喪不赴洪武甲子又舉教官至京試詔書一道稱㫖授翰林檢閲辭以疾改廣西慿祥巡檢先生其次子也幼喪母哀慕如成人從尊府允中先生習舉子業迥然出儕輩允中先生既沒於慿祥慿祥在廣西窮處與交趾接境風氣既殊人跡罕及先生以不得歸骨為恨每一念之輒悲慟鄉先生晏彥文知而憐之欲成其志乃言於廣西藩憲大臣使聘為臨桂縣學訓𨗳先生以疾辭職而往授經焉因以其情告之郡博士陳廷器廷器為達於參議班公班公嘉其孝假以公事往焉先生至慿祥求之客冢纍纍荆棘中莫可辨識允中先生在任時所養家僮劉四者既轉入交趾而蠻夷殊俗莫有知其墓先生日夜環而哭幾欲無生既數日忽劉四從暮來若有慿之者因得知其處啓視故衣衾宛然又刺血驗之誠是遂負骨歸葬然猶恨昔者不得躬侍疾營醫藥故久而猶悲若先生庶幾能永慕者矣先生得家學之懿於經史子集皆研窮其理而樂以教人門人弟子官太學登憲府仕州縣者比比而先生亦頽然老矣永樂丁酉廣西聘與考試人服其公性豁達好施賑人匱乏惟恐不及至有託其妻孥者則護視賙給如骨肉與人交未嘗以盛衰易意其內行既充而施於外者類如此平生攻古文今有文集缺卷以永樂十六年二月草二日卒享年六十四娶郭氏龍泉秀州郭德宣之女有淑德婦道母儀為宗族楷法先以永樂十五年十二月草二日卒子一人曰滋讀書為士人女二人長未行幼適儒學生彭缺滋以某年某月某日奉葬其父母于某所而以狀來求銘直之髙祖母則滋之髙祖姑也且允中先生之葬直先考瓊州公實銘之則直何敢自愛其不腆之辭乎乃序次而為銘銘曰德足以植身而篤于其親學足以淑人而惠于困貧有蔚者聲有炳者文昭以豫銘愈久彌新先考中憲大夫肇慶府遷葬志嗚呼直先考中憲公有重厚之資有奧博之學有淳懿之德有宏偉之文有辨治之才有恢大之量其在鄉則為名儒其仕為廣東按察司僉事為工部主事為瓊州知府則為名宦其所樹立卓然在人耳目不可誣也蓋自先曾祖則堂府君先祖竹亭先生世積忠厚故自先考發之而表表愈偉也其自瓊州丁先祖母李氏夫人憂服闋赴北京改授肇慶知府有疾未行以永樂十四年七月初九日卒於萬寶坊直所居之官舍享年七十五時直為翰林修撰而兄信行敏行侍兄弟攀號五內分裂局天蹐地無所控訴乃奉柩南還以是年十一月草三日禮葬於千秋鄉新山大嶺之麓文淵士大學士胡公廣實銘于墓直兄弟不孝不謹不能擇土地之宜致有潤濕之害猶幸未及柩中乃以永樂十九年十二月十九日具棺衾衣物啓壙敬易之以是月缺日遷祔雲亭鄉聶家山七世祖妣胡孺人墓右嗚呼直兄弟不孝不謹致兹遷易其罪深重不可容逭尚望靈魄永安於此以福利我後嗣先考姓王諱泰字伯貞别號止庵學者稱為止庵先生敢明著之千萬世之後陵谷遷易或有可徴俾勿壞第二子直泣血志蓋時為翰林侍讀丁繼母蕭夫人憂居家云奉議大夫浙江提刑按察司僉事契家生郭公緒填諱彭學禮墓志銘宣德元年十二月初一日泰和桃源處士彭學禮以疾卒于家年五十四其子俊領廣東鄉薦㑹試于禮部訃聞驚慟幾絶即日治任將歸哭而告豫曰俊不幸以科舉自纍而逺去吾親然俊之來也吾親實康強無恙其所以教俊者備至孰知去不二旬而禍變如此俊既不能躬醫藥親殯斂若葬又不得銘以昭潜德之光則不孝之罪益大矣敢以為請豫與彭氏世有連不可辭處士諱缺學禮其字也自少能知孝弟大父直方父叔溫篤愛之及壯至老益謹厚自持不肯為非禮人或以非禮加之亦隱忍不校然亦卒莫能勝也治家勤儉井然有條法常業之外不茍求妄取嘗一遊嶺海青徐之間既歸不復出曰逺遊廣覽固丈夫之事然為一鄉善人亦足矣日教其子使讀書為學而與宗族鄉黨婆娑嬉游囂囂然自得也永樂癸卯俊游廣東因領薦而歸則告之曰汝始預薦書當益勤學不然不足以立身爾其慎之及俊赴春官教以事上取友之道尤切俊亦勉承其教未及成名而處士卒矣此俊之所以痛恨不能已也初娶同里任氏保沖之女甚有婦道生俊女一嫁曽迪先處士八年卒葬桃源所居之東今年缺月缺日啓封合窆焉再娶蕭氏生傑孫男一曰鎡憶豫為童子時嘗從先考瓊州府君以嵗時過桃源拜其大父父皆質厚端確有古君子之風退而從處士兄弟游亦藹然相親也今四十三年而見彭氏三易世矣嗚呼可勝悲哉銘曰彭氏之先以德植家處士承之質而弗華孝弟儉勤宜顯且遐今其已矣君子之嗟康紀善墓志銘宣德四年六月草二日梁王府紀善康君孔髙謝病歸卒于臨清年六十其子大理評事頮考績來北京聞訃將歸與其兄弟卜葬君而泣以請銘蓋君之來也主於豫既謝病欲歸豫謂君盍俟頮且及秋乃行君曰吾病宜去奚俟孰知去未一月而君已矣追念疇昔則君之墓豫何可不銘君諱嶽孔髙其字也自少秀偉喜學縣大夫擇為學官弟子與其朋友晝夜講習從蕭子尚先生受書經洪武丙子領鄉薦明年㑹試得祈陽教諭祈陽學政久廢君至則謹繩墨教諸生有志者多樂從其不才者憚之誣以事調雲南永樂初以母老陳情改零陵縣取便道過家省焉適母病留侍九閲月有司逺問將置之法太宗皇帝憐其孝宥之未幾以憂去服除改景陵縣所歷四學皆修舉廢弊而教有成考滿升南陽教授學舍久弊倡優戍卒稍侵其地諸生易冠衣與狎處無忌憚君一切驅除磨治學用以興嘗考試四川號稱得士又九載赴吏部仁宗皇帝封建諸子擇賢以輔之君被選為紀善數以經進講甚見禮重居無何以風疾辭有司謂君學問老成不聽乃援例謁告歸省墓比再來疾益篤始得免歸頮遇於長蘆不忍别君謂吾自視不即死爾速去毋後期嗚呼而君竟死矣此頮之所以不能已於哀也君孝於父母而敬愛其兄凡家事惟兄命贅同里劉氏劉氏多故喪其長者君撫其諸孤既長然後歸未嘗私一錢在祈陽時有商人為同侣所棄病且死而君活之及教授南陽鄉邑故人遇竒禍至覆宗幼子匿於所親懼不免再遣依君君匿而教之卒免禍宗祀以不絶新淦楊氏子博客南陽困不能自存亦依君君衣食之而授以經博遂領鄉薦得教職而君終無德色其存心之仁如此君世居泰和平易坊其先蓋有仕者至君祖仁安父德昭皆不仕德昭早孤母陳氏守節教育之德昭能自立而母亦被旌表君妻劉氏先君十八年卒生四男長曰頥次曰頮以進士入官次曰頊季曰顒亦舉鄉貢女五嫁郭公倫辰州府學訓𨗳陳禧孫男七人君達於政事其才足以有為而止於一教官至老又為所謂紀善者訖不得一施於用遂欲弛置自便因號遁菴竟以疾免而終其所為文必據於理有文集若干卷藏于家其葬以缺年缺月缺日其墓在缺原銘曰才足有為而又逢時訖不得施而止於斯維德在人有永其思我銘用昭千古弗隳國子博士王君墓志銘君王氏名復原字子福豫泰和灉江人也祖惠軒父志德皆不仕而皆為鄉善人君少孤能自力學脫其妻簮珥為贄從廬陵謝子方先生受易經造其閫奧洪武丙子領鄉薦後三年㑹試禮部得化州學正能以所學教諸生諸生多由科目進者以績最升北京國子監博士其所論著當時皆服其能太宗皇帝在位時和嵗豐禎祥畢至天下皆上表賀北京畿內文武諸司皆屬筆於君六館之士求為表文亦必於君君應之無難名益籍甚天子以為宜於其職給以七品祿俾仍為博士而君亦甚樂焉洪熙元年八月得風疾瘖不能言豫往問之君猶送迎嬉笑豫意君當即愈而竟以此終時九月缺日也其生以缺丙午缺月缺日得年六十娶缺氏子二人君質厚坦夷與人交不茍為異同任其真而已性尤儉約粗衣糲食不厭也初朝廷纂五經大全以嘉惠萬世君與其間號能事及修太宗皇帝實録精擇能者俾執筆焉豫論及君當事者以為宜未及用而君已矣嗚呼惜哉君之柩歸泰和二子將以某年某月某日葬君於某山之原而請豫銘其墓豫與君交久矣亦為知君遂不辭而為銘銘曰質厚而志莊學篤而才良胡嗇其年而施不長歸于斯邱百世之藏明威將軍海南衛指揮僉事柴公墓志銘明威將軍海南衛指揮僉事柴公以永樂戊戌四月十日終于位年五十九冬十二月九日其孤瑄奉葬于瓊州城西南之原而以公之故人王君仲迪所述事狀因兵部員外郎陳君亢宗請豫銘其墓蓋豫先公嘗為瓊州守實與公相好而豫嘗獲見焉則何敢辭公諱英字仲實兖之曹縣人大父諱清妣王氏父諱裕元季為安豐奕千户率衆歸太祖常從征伐積功至武節將軍正千户洪武初守番昜卒焉而公年且長矣入充參侍舍人以材武稱遂襲為瞿唐守禦正千户從征遼東功居多調浙之松門又調臨山乙亥秋詔天下武臣或其父祖與開拓之功者皆超擢於是公得海南衛指揮僉事寬厚愛人善於撫御剗弊興利人皆便焉黎冦王瓶擾澄邁公勦平之既三年授公明威將軍而以官贈其父封母薛為太恭人妻王氏封恭人永樂丙戌朝廷以安南黎氏父子為不道興師討之今英國張公時為新城侯實總戎事公以選拔在行諜報黎氏柵富良江以自固師次駝海張公令軍中造小船舁以行至富良江聨為浮梁且楫之以濟公及軍中驍勇者先登拔柵轉戰至東都覆其國安南次第平論功行賞有白金文綺寶鈔之賜公屢立竒績皆有文符當得升公退然不自言識者比之馮異廣東瀕大海海外諸國皆內屬然島夷雜種時出沒冦海上己丑春指揮李圭總兵備之聞公名徴以自助其所以鎮撫扞衛多公䇿久之圭召還廣東都指揮司奏公代領其衆詔從之公統兵萬餘巨艦五十艘諸將有位在公右者皆服屬聽指使晝夜巡邏閲習訓練如冦至冦亦聞公名不敢近海道幾萬里其民安生樂業者皆公之惠也師駐潮州海門千户所之前浦得風疾以卒將士莫不垂涕相與具棺斂使其帳下舁歸走五千餘里至海南海南軍民無少長愚良皆奔走弔哭嗚呼此可以觀公之德矣公忠厚謙慎色溫氣和持已甚嚴而待物甚恕征安南時部曲有得婦女者擇以獻公公閉之一室使治女事及歸皆以給無妻者不留一人嘗道過南昌府同行者欲置酒命妓為公歡公知之乘夜先發其以禮自持類如此王恭人鳯陽左衛千户贈明威將軍指揮僉事興之女甚有婦道子二人其嫡琳早喪瑄甫十嵗然甚似公庶幾能世其家者女一妻夀春徐榮銘曰額額柴公與時偕逢殿于海邦萬夫之雄師征安南撫順摧逆豈曰豫功天子之德海波洋洋百蠻來王公師臨之孰敢冦攘我民既安我師亦阜公則已矣德音維茂城隅之原有嶪其阡刻此銘詩百世之傳故紹興知府馮君墓志銘宣宗皇帝在位之九年厲精圖治最重郡守之選有缺則詔大臣三品以上舉賢而任之於是馮君自禮部員外郎出知紹興君儀觀偉然而才氣英邁其志亦欲自立於世到郡適大旱君曰民病豈有大於此者即躬走羣祀致禱焉敝精竭神兾有以慰民望踰月以疾卒初民知君之愛已也亦莫不愛戴君而竟未及有為此其可惜也馮氏家武昌蓋宋太子少師贈司徒文簡公京之裔廣西路同知良鄉威順王參謀升之贈禮部主事伯淳則君之曽祖祖父也元末升之避亂居永豐之秋田以卒伯淳幼孤鞠於劉氏因冒其姓君貴得封贈其親始復姓馮初伯淳以通星厯被徴來京師君在侍豫時濫官翰林以鄉郡故數過伯淳已竒君而君方從丁季恆受易永樂辛卯領鄉薦明年壬辰禮部㑹試豫專考易卷而君中教官選豫自恨失之然君亦不肯就請卒業太學乙未春太宗皇帝親䇿士豫備員讀卷殿廬得君所對䇿而次第焉君遂成進士奉命賑河南饑民措置有法人無莩死者擢行在兵部武選主事以親老求往南京理武臣勳籍以便養遂以父喪歸服闋來朝㑹大舉北伐擇能臣督軍資後期者斬君當往大名而給事中與期促君廷辨之詞理俱勝仁宗皇帝在東宫監國是其言命更之事如期而集改禮部儀制主事丁內艱起復職如故尚書毗陵胡公最愛君奏以為員外郎宣德癸丑少保黃公與豫奉命考禮部㑹試士君涖事其間朝夕勤甚然以舊故欲豫少撓以徇人庶幾逺怨豫雖不用然知其老於世故非豫所及也其在儀制久於禮文之事無不知時有建議欲武人子弟皆就學君曰是使知忠孝之道也力贊胡公請行之又欲輯今所制禮請頒中外未遂而有紹興之命以君之才使得永年亦將何所不至哉而止於四十六蓋以洪武丁巳六月二十三日生宣德甲寅七月十九日卒也妻安人喻氏生子皆不育以兄子栻為後女一尚幼君好學能詩篤兄弟之誼與人交克盡其心居官以清慎為本其名見稱於士大夫君初名智安仁宗以宣宗嫌名賜名敏少傅西昌楊公字之曰欽訓欲其祗念不忘也今宸翰尚存而欽訓不可作矣嗚呼惜哉栻將以缺年缺月缺日奉葬於缺之原託其姻家刑部貟外郎陳虬淵潛以禮部儀制主事劉缺所為狀請豫銘豫素重淵潛不能辭乃為序而銘之銘曰有隆馮宗自宋顯江夏泝源澤彌衍同知奮武襲纓冕曳裾參謀克舒卷七兵五禮相繼踐偉兹郎官實清選郡章煌煌佩鞙鞙穎川渤海諒非逺嗚呼懷竒竟莫展隂陽晝夜遞回轉刻銘貞石示悠緬楊先生墓志銘先生楊氏諱缺字子遐南唐虞部侍郎輅之後允素自吉水徙泰和縣為大家在宋元尤盛蓋以宦學顯聞不特其資之富也先生自少好學未嘗慢戲佚遊經史百氏靡不究攻為文章而尤長於儷語元季兵亂大家富室遭焚劫盡失其所有國朝更化雖幸安輯然向之豪侈傲放者悉無以為生先生獨以文行為鄉邑所尊禮縣大夫再舉以應求賢之詔皆不起奉母居長溪上以其學教鄉人子弟從者益衆所與遊皆一時名士而獨香山丞彭叔介先生與其弟和林先生及豫先考瓊州公為莫逆相與講學論道囂囂然樂也先生制行完潔與人言皆孝弟忠信人無少長愚良無不愛且敬者尤邃於醫卜有求者輒應然志在已人疾使趨吉避凶而已不以是徼利邑中嘗大旱縣令張源百方祈禱不雨謀於衆衆曰楊先生正人也致其精誠宜有感乃迎先生先生為壇懇懇為民請既而雨三日邑大穰逺近歡慶相與祝先生如祝束長生云先生內無城府外無崕岸其胸次悠然蓋榮辱得喪貧富貴賤無足動其意者至老神益充氣益暢容顔益丹渥平居酒數行其顙泚然汗下蓋如年三四十者此其中非有所養而然耶永樂庚子正月二十二日卒距其生元至正庚辰得年八十一曽祖缺祖逺承父允年皆不仕母蕭氏娶袁氏一子延仲女二嫁彭傳曽震孫男缺先生素不事生産不茍求非義既沒家無餘資平生親舊皆來弔哭賻贈延仲乃以洪熙元年六月缺日葬先生於缺原於乎楊氏素積善至先生而益修今家雖貧而延仲亦克繼又有孫六人此其中當必有興者天之報先生庶其在此耶先生門人太學生彭俊慮先生久而或泯屬豫銘其墓噫豫父友也且常受德焉則安敢不銘乃序而銘之曰充其德全其天藏于斯固千年宜子孫福綿綿歐陽允端墓志銘君諱正字允端十嵗而孤母孺人鞠而教之君雖幼已能檢束思自立不肯慢戲佚游常嘆曰我孤子也敢效他人有恃者邪稍長事滋出君無可奈何至鬻産以給費然極意事母不使知其勞瘁母恱而安之處內外族姻及鄉䣊鄰里各盡其道故無不愛重左右之者久之家復振然多歷艱難益恭慎自守不妄至城邑佳時令節從族父昆弟與鄉人之賢者燕遊以為樂遇事無大小必公其是非未嘗曲從茍止人皆服其平其奉先盡孝前母孺人葬不吉君改葬之哀敬如生已者尤尊禮賢士大夫擇師教子務不忝其世其為人之可重如此宣德庚戌十一月十八日以疾卒于家距其生洪武乙卯十一月十九日享年五十五娶王氏有賢行子四人洙由進士為監察御史次淘洛汴皆能承其家孫男五歐陽氏居泰和之蜀江里代有聞人而君之曽祖覺先祖以吾父子廉皆不仕然皆以隱德重一鄉至君而又篤行誼故洙遂貴顯於世君宜大享其榮而不至髙夀以卒豈非不幸哉洙兄弟以某年某月某日奉葬於某之原而以進士蕭鎡孟勤所為狀來請銘乃為銘之銘曰克奮於艱卒裕以安善積在躬厥慶用綿宜大宜久胡不眉夀我銘其藏庶幾不朽長史周君墓志銘太宗皇帝改元之初詔天下設科取士明年二月親䇿試于廷其第一人得永豐曽棨其次則吉水周述周孟簡從兄弟也上為之喜親批其䇿以示褒至以二蘇期之而周氏兄弟遂名動天下天下之士皆譽歎以為不可及時孟簡亦拜翰林編修又與二十八人同讀書禁中孟簡神清而氣和心淳而志正其學務求聖人之意而為文必本諸經博涉於諸史百氏朋輩皆推重之既而與修永樂大典屢承賜賚太宗皇帝幸北京仁宗在東宫監國雅知孟簡凡有纂述必使與焉皆稱㫖由是寵眷日隆遂擢為詹事府丞以自近益恭謹不懈及即位大封諸王以孟簡為襄府左長史克盡心輔𨗳每進講則惓惓於忠孝以及於仁民愛物上聞而嘉之王亦甚敬禮焉及侍王之國長沙尤篤慎於其職必欲毫髮無違禮宣德庚戌閏十二月二十八日得疾勢劇甚王亟督醫治之弗效翌日而終王深悼歎親撫其子景亮以慰之遣伴讀周原歸其喪嗚呼非學行之懿孚信于王其能致是哉豫初從孟簡取進士同學古為文辭又同官翰林交處幾三十年相好如一日其孝於親友於兄弟睦於姻族和順於鄉䣊至其為官善事上撫下而信於僚友豈獨豫知之夫人莫不知也其行之著內外如此非篤厚之君子歟周氏本吳太尉瑜之後由廬陵烏東徙吉水之櫪坑又徙今之桑園世為衣冠之族曽大父方瞻不仕大父仁德元檀州學正父子以君貴贈奉議大夫襄府左長史母孔氏繼母妻皆贈宜人四子長昶早卒次景亮景安昉女三長適劉士式其二尚幼孫男二女一孟簡平生謙慎不矜與人處言語煦煦未嘗有忤及教學者則懇切詳盡必欲底于成故亦有仕者其所著述有急就槀西垣槀兩京吟槀若干卷生於洪武戊午十二月二十四日得年五十三素淡泊不汲汲於利至死無以遺後人凡喪事皆王給其資景亮兄弟以缺年缺月缺日奉葬于其鄉缺之原而以狀來請銘嗚呼豫友也雖不忍銘亦奚可不銘銘曰周顯于吳實為元臣都鄉之裔久而益振維君克賢有學有行于朝于藩其道皆盡仕三十年敬慎弗愆有譽在人無愧于天終藏斯丘龜卜其食昭德有銘過者必式監察御史彭百鍊墓志銘百鍊彭氏諱某百鍊其字也世居泰和月池里為儒家自宋以來有仕者至其曽祖某祖某父與和皆不仕而皆有文學行誼百鍊少聰敏好學務卓然自立以光顯其前人甫弱冠已能為人師鄉人篤於教子者爭延致之永樂乙未以春秋取進士受命督逋賦于閩中能不擾而事集未幾擢授廣西道監察御史益恭慎自持蓋其天資闓通又明理知法凡有鞫治必究其情不苛不縱翕然有譽於時嘗巡歷廣東按鹽法之弊連逮者數百人盡法而人不怨凡三司有滯獄積年不斷者百鍊皆察實決遣之及出按濠泗廬夀揚楚舒和諸郡益謹禮法戎帥守臣皆斂戢不敢縱閭閻部曲皆安之至今人稱道以為賢於他御史然性素剛不肯茍在人下又其言訐直無顧忌以為人皆如已不校也由是人多憚之宣德某年秩滿當得升以母胡氏老乞歸侍營别墅於武山之隂躬課僮奴耕稼畜牧以為養雖不營𫝑利然訐直如平時時方造海舟府帖下縣伐巨木為桅心發民丁三百當用百夫長三人而用事者乃每里㸃一人幾三百人將大為姦利百鍊祖母黨溫彥琮與焉百鍊憤嫉發其姦乃止役三人而釋其餘然深銜之次骨一旦有釁隙凡此輩及平日語言相忤者皆媒蘖其短爭出力擠之以受溫彥琮白金得罪遣詣北京事叵測百鍊不能自明適㑹恩貸得納米贖罪既畢復其官待選於吏部先是百鍊得消中疾及坐事病益甚至是竟歸卧文明門外旅邸醫治百方不能愈以宣德八年九月初四日卒年四十八妻陳氏有子曰濬早卒一女嫁楊奐亦卒側室二子曰缺皆幼百鍊平生篤義喜赴人之急而疾惡如讐然於賢者未嘗不加禮且文章政事表然在人耳目及其卒也大夫君子莫不深惜之然貧甚無以治喪凡親友皆加賻贈為經營歸其喪遺言葬於某處嗚呼死生禍福皆命也非人所能為也方百鍊被困時孰知其能亨既亨矣孰知其遽焉以沒蓋莫非命也人奚為用心哉百鍊蓋知命者亦奚憾豫相與尤厚而愛之尤深乃為銘其墓銘曰吁百鍊止于斯刻此辭庶永垂刑部郎中梁君墓志銘君諱泂字挹之姓梁氏梁於泰和為大家其先在宋時有為鳯翔知府黃州同知者至君之髙祖昭伯知撫州撫州生才可才可生心易心易生廷敏則君之曽大父大父父也廷敏先生娶王氏生君後以君貴贈刑部主事母封太安人君永樂乙未進士擢北京行部户曹主事改刑部既滿升郎中宣德已酉十一月十五日卒於官年四十六君初為進士奉命賑徐州饑民時蕭碭二縣民亦多饑者君亦欲賑之有司以未有命沮君君曰民皆王民可坐視其死耶有罪吾自任之遂發粟賑濟多所全活事聞太宗皇帝嘉之而有司皆以坐視民患得罪其後君詣北京至徐州二縣民服役河上見君呼曰此吾父也嘗活我我無以報凡百十人環君拜且泣君慰諭遣之乃得行其在户曹時南方漕運北方賦稅皆主之及車駕駐北京一切供饋文移皆自户曹君日夜盡心事以辦治而未嘗有闕失及户曹罷改刑部交趾清吏司主事尚書趙公喜得君凡諸司讞獄當奏决者案牘皆屬君閲視既允然後奏當時刑部决獄號為平及升貴州清吏司郎中益修職不懈君軀幹豐厚而殫力勞心甫一年得風疾卒士大夫皆惜之娶楊氏封安人子四林相杉枌女四適彭曄劉贊劉湜陳奬孫男四琛珩環某君自少負氣不肯在人下然無同産兄弟廷敏先生素英邁不羣在其下者或忌之君既孤或稍稍侵君君不為動力於學問從從兄本之受詩經業成入邑庠遂取進士歷官皆有名人於是愧君君亦不以介意器宇軒豁喜飲酒賦詩遇故人知已輒郤小巵浮大白連數十詩亦隨口而就視在傍餘子若無人衣不問故新必鮮潔完好居官出入騶從亦整飭如儀法曰吾不能齷齪自汙以取名人以是疑君為何如及病卒餘財無幾田園亦不加於舊他之仕者外若循謹往往出髙資市良田深池構大厦無賴子弟恃此立聲威凌善柔鄉里怨苦之然後信君之行非衆人所能及也君以宣德辛亥十月十二日葬其鄉龍門之原而未有銘其子相慨歎曰吾父修身懋德傑然立於世今不幸棄諸孤而未有文字以傳諸逺則我何名為人即走北京請於豫君之母豫族姑相則豫壻也且自幼相從最相知則君之墓非豫誰宜銘銘曰豐其材偉其儀行之所施不見闕虧而胡止於斯噫工部屯田郎中余君墓志銘往年豫友工部侍郎羅公汝敬巡撫陜西還豫往造焉見其與客為禮甚恭曰此吾屯田郎中余汝弼也小心敬慎直道不阿而甘於淡泊遇事不擇難易皆能有成功吾敬之豫於是知其為良臣未幾有以能書舉入翰林曰余謙者亦恂恂恭讓臨事不懈問之汝弼子也豫又知其為賢父既而聞汝弼以剩貟家居超然自樂無不足之意則歎曰汝弼誠賢於人哉世之以才自奮者往往據形便識事機制人而不制於人人亦莫之敢議惟質厚君子安義命之正無機變之巧進不改乎其度退不戚乎其心其汝弼之謂與汝弼字廷輔而以名顯其先光州固始人曽祖秉彛以明經教授鄉校祖存仁有隱德父文寶元季避兵入蜀三遷始家荆州之宜都洪武丁卯舉賢良以老疾辭汝弼少篤學學成領永樂辛卯鄉薦遂入成均巳亥選為工部營繕主事滿九年升屯田郎中皆善於其職朝廷再推恩以所居官封其父母向氏加贈至宜人性孝友平居事親色養母病侍湯藥不去左右每籲天願減已夀益母年兄弟四人怡怡相恭愛無少忤又喜赴人急里中嘗大疫親戚不敢過門兄弟日煮粥遍食之死者為埋瘞之卒亦無恙其在國學時司業吳先生坐纍罰役而困於無資汝弼倒囊濟之吳公稱其有君子之風時數遣諸生監銀冶嗜利者爭趨赴或招汝弼終不動吳公亦器重之在京師草餘年鄉人以事來而貧乏者必周給之無倦意其教子弟及與人言必依於孝弟忠信其為人如此正統辛酉三月癸亥以疾卒年六十五配劉氏封宜人子男三長即謙中書舍人次譜次誠三女其二嫁艾旻楊旦季未行謙奉柩歸宜都以缺年缺月缺日葬于缺山之原而以行狀來請銘觀狀之所述證羅公之言而信不可以不銘銘曰仕能其官而又逢時退休于家亦足自怡行義炳然何有闕虧刻此銘詩百世之詒故武進縣丞劉公墓志銘正統四年九月十六日前武進縣丞廬陵劉公卒于家年八十二孤習之以其年十二月十六日奉葬于其里岡背先塋之次謁豫請銘納諸墓公諱亨字嘉㑹竹軒其號也自幼天資絶出喜讀書從族父稽古受業稍長又從泰和陳心吾劉允中經史百氏之書靡不讀洪武壬戌以賢人君子徴辭以親老得歸養久之復舉經明行修入對稱㫖命說書于華蓋殿以言事忤執政出為夀州訓導戊寅冬上書言文武並用長久之術而六卿秩卑於五軍當並為一品國子祭酒師表天下士位不可在太僕下諸武臣子弟他日當授之兵宜立學教之使知事上使下之道多見聽用升常之武進丞以潔亷自守以寬惠治民修舉學政勸課農桑恤孤窮表節義凡淫祠妖妄皆禁絶之於縣治傍作善教坊再思亭以風厲民庶訟為之省田野墾闢流亡來歸既三年上其績䝉賜敕褒寵壬午中縣民李德茂馬阿寶作亂公謀於守令以鄉兵掩其巢穴擒首惡十數人戮之而諭降其黨皆得保全太宗皇帝嘉之皆勞以金幣既而有言公昔上書改舊制上雖不之罪而公亦以事罷歸杜門不復出有薦入館閣修永樂大典固以疾辭湖廣廣東聘為考官亦不就宣德中監察御史尹崇髙復言公有學行雖老猶可為教官公造朝自言年將八十不足任教事上聞之曰伏生九十尚傳經八十為教官何不可公懇辭吏部尚書郭璡言於上曰孔子云老者安之朝廷豈少此一人聽還鄉自便既歸深衣幅巾從容以自樂取董子正誼明道二語書諸紳學者尊事之平生所行必謹於禮義凡冠婚喪祭悉用朱子所定族弟孟華纍三喪不能舉公皆為葬之又捐一山與貧者為葬地鄉里名之曰義山嵗旱公禱祀無不應郡侯每舉鄉飲必禮為大賓而質疑焉其德有諸中動諸外如此劉氏本安成密湖人宋豫州刺史諱斌者始徙廬陵之石塘其曽孫江寧司户又徙邑之銅溪髙祖哲甫汀州太守曽祖景春元海南鹽場司丞祖貴翁父樂山皆不仕而皆以文學名於世公初娶歐陽氏先卒有男一即習之舉懷才抱德為廣東按察司照磨女一嫁蕭尚瑜孫男六長即同已未進士次曰履諏經綸綱曽孫男四虬麟驥驤公所為文有竹軒集寫心集隨寓録凡若干卷藏于家銘曰惟公之身有行有文既善其教亦昌其言遂佐一邑克奮厥績金幣玉書纍有殊錫倦而歸休不忮不求老者安之聖德之優夀八十二既多受祉生順死寧展也君子岡背之阡公墓在焉昭德有銘百世之傳翰林侍講學士曽君墓志銘正統六年三月二十一日翰林侍講學士奉訓大夫曽君以疾終于位是日君晨興尚無恙退朝入館閣營職如平時惟覺嗌微痛至午稍甚亟歸第呼醫治之須臾痰壅塞不能言衆醫環視投藥皆不效及暮而終士君子皆驚喟奔走㑹哭明日公卿大夫與諸勳戚重臣聞之皆來哭弔曰惜哉曽君也禮部以聞上惻然命侍郎王直往祭之於是勳戚重臣公卿大夫及諸君子皆奠賻如禮既而長子序以使命歸自西南夷將奉柩返葬泰和持翰林侍講劉球求樂所述行狀謁豫曰先人實託好先生葬宜有銘敢以請豫念不腆之辭不足以副孝子顯揚其親之心屢辭不獲乃序而銘之君諱鶴齡字延年一字延之其先家金陵五代之亂光州團練使慶之孫延搆始徙家泰和六傳至宗彭澤令安止與其兄弟安中安強皆以科第入官其族遂大顯彭澤十世生瑞金教諭約約生黃蓬湖官九韶九韶生伯髙則君之曽大父大父父也伯髙先生以君貴贈翰林修撰配胡氏封太安人君少而喜學與兄椿齡同領永樂乙酉鄉薦明年㑹試君留養親不果出椿齡取進士為翰林庶吉士以卒而家事萃於君尋丁外艱居喪能盡禮稍出所學以教鄉人子弟逺近學者爭師之初曽氏居縣西元季避亂入南鄉至是君理故址治室廬復舊觀而諸子亦稍長足以事太安人嵗辛丑君㑹試禮部第二而廷對第一才名震天下遂入翰林為修撰宣德改元奉命祀南嶽及神農虞舜陵庚戌同考禮部㑹試修太宗仁宗實録成有白金文綺之賜升侍讀明年乞歸省遂丁太安人憂終喪復官與修宣宗實録成受賞賚升侍講學士戊午考順天府鄉試初試之夕場屋火其所試卷不能無缺失有司不敢以聞惟議修治廬舍以終事君曰必再試三場庶盡至公不然不免外議有司乃為二說以進命下如君言衆始服君卓識君優游翰林二十年文章之美中外稱之無異詞其與人言必依於道德仁義交朋友久而益親有求教於君而經口授指畫者多成名平生著述至千餘篇皆為人所愛重其事親既孝念其兄椿齡尤篤教孤姪庠學足以為人師而嫁二姪女如已女得賜金則買田以奉先祀而推其餘以周內外屬及鄉䣊鄰里君生於洪武癸亥四月十八日享年五十九娶陳氏封安人子男五序廉應庶庾序由進士官行人廉乙卯貢士女嫁胡仲璿嚴時孫男八女四豫嘗謂君以學行取盛名當必躋於顯用而享隆大悠久之福今乃止於斯豈非誠可惜哉銘以昭之宜也其葬在缺年缺月缺日其墓在缺之原銘曰曽氏之先來自金陵詩書相承彌逺彌興維君之升進士第一有鞾其華有蕡其實盛大悠久福祿具宜忽焉而逝云誰不悲髙墳峩峩既安且固利爾子孫以篤終祜處士嚴君墓志銘君嚴氏諱愚誠仲其字尚德元晏其祖與父也嚴氏在金陵最盛自五季時徙泰和之城西尤盛世為詩禮簮纓之族元季之亂髙門大第盡燬於兵田産為豪橫所據子孫散徙於鄉元晏先生徙西鄉之金臺里孝友忠信為一鄉之望娶社溪胡氏有賢行君生而穎特不凡稍長即好學時御史仲述陳公先父尚書公皆未仕與元晏先生相好知君異日必能卓立以與復嚴氏御史公一女先公力贊以妻之實能佐君以事父母凡公私之務君一切自任不以纍其父然無不如所志自是業日益增家稍饒裕父母皆安而樂焉嘗勉之曰汝弟幼汝母自謂我今獨勞苦而有怠意但盡力自為他日當分所有之一與之而以二與汝也及父沒君卒取其半然家道益盛而創置不減於昔弟文仲少從豫業儒長而兼究醫君喜其有濟人之志欲成就之遇勞事必親代其行視諸姪如子延賢師以教之內外稱其孝友無間嵗時薦祭必盡誠敬待賓客必豐厚雖纍日不厭鄉鄰親戚之有患難者扶持之曲直者分辨之貧乏者賙給之有無所歸而留養之以終其身者又嘗修橋路設義漿以濟往來至於臧獲賤人亦皆處之有道人無不感懷其恩惠年六十時斥斷家事而優游於鄉間一入城市與故人親戚聚㑹數日而歸意氣豁如也一日得微疾呼其子孫語之曰吾生無愧於天無負於人今年餘七十死可無憾汝曹能勉繼之則吾瞑目於地下言訖而逝時正統丁卯五月六日距其生洪武丁巳十二月十一日享年七十一知之者莫不痛惜焉子二人長曰清娶城西袁氏次曰源娶南徑胡氏女五人長適豫子國子博士䆅次適蕭季運蕭伯顒樂清廬陵趙愚克孫男七人杰栗槐樞楨榮檳孫女缺人清與源將以是年缺月缺日奉葬於缺之原先期以書屬䆅請銘於豫豫姑之夫蓋君之伯父自少已相好知君有素銘烏可辭銘曰忠信敷於人仁義裕於已雖未用於世而表式乎鄉里宜夀百年七十而止歸藏斯丘利爾孫子抑菴文集卷九
