body:
  text: 抑菴文後集卷十六明王直撰序送藺知府赴永平序永平北京畿內郡去京師五百里其所統州縣凡七壤地方千餘里為之民者亦數萬自其他大郡論之未為甚劇也然以近京師凡中貴人與夫達官顯宦常往來相接於其地又凡供輸力役有趣辦於一時者雖其民皆知趨事赴功無敢慢然得一賢守有亷公仁恕之德者為之經畫處置相其先後緩急之宜而為擇利於其間則民將益喜而競勸於從事郡可以不勞而治矣乃今而得藺太守焉太守東萊人始為御史滿九年升上林苑監正復為工部郎中又九年升河南知府以憂去服闋改今官其所揚歷也久矣其施於政事也多矣蓋所謂老成精練之士也夫以久試之才而用於未甚劇之郡當如健翼之翔順風輕車之馳峻坂有不足以喻其快且易也然豫嘗觀之前史所載循吏如公儀休子産以至黃霸龔遂之輩其事非有赫然駭人者而名至於今不衰此其故何也蓋曰奉法循理而已奉法循理非獨以治人要之自其身始茍自置其身於理法之外而欲其民之化服悅從理之所必無也子嘗與人論此事能然豫言者少其不然者蓋多而其不然者亦未見其有卓然可觀之績也然則古人已試之效豈真有不可行邪永平光祿卿郝公鄉郡求豫文以贈太守故復相與言之庶幾復見其效其亦以為然乎哉送黃知縣復任序金蘭黃氏永豐故家其從父彥清先生嘗為國子博士金蘭從學在京師學成試於有司不利永樂八年用薦舉得貴池典史貴池南京畿內縣最為近地又當大江往來之途事號繁劇達官要人過其縣者相接也金蘭達於為政而篤於愛民民戴之凡其所令皆恱從事不勞而治縣之長二皆謙已仰成於是過其縣者莫不譽歎以為賢監察御史孫曰良黃振皆謂位不稱其才交薦之今都御史熊君元節為廣西按察使時亦奏舉焉會金蘭考滿赴吏部縣人恐失之耆老百餘人詣闕乞留仁宗皇帝嘉歎升為知縣而還之其人其人益喜而從之聲譽益籍甚於戲金蘭可謂不負上之所任與下之所望矣夫令子民者也非止於供輸力役之事而已也然而供輸力役之事常有不治者何哉子民之道未至焉耳夫寒而使有衣飢而使有食均其勞佚節其冗費凡事有及之者皆為之擇便焉子民之道也行之以誠持之以久則民信而應之有不如子之奉父母者乎何患事之不治哉詩曰豈弟君子民之父母盡其道而民不從理之所必無者也金蘭在貴池所以得民如此豈非若豫之所云者乎若是則民既信之矣今考績而歸誠率是道而不變則民之樂從事之易治尤有甚於前日也翰林諸公皆作詩贈其行編修孫曰恭持以求豫序豫素重金蘭故為之序而書豫之所存者重以勉之贈周訓導序周轅字侯車前周府奉祠是修先生之子也先生博學有文氣和而行莊今沒二十餘年士大夫猶道之蓋溫然君子也侯車能傳其所學當路者薦之以為江都縣訓導吏部比其類以聞上命六部都察院及翰林近侍之臣羣試於禁中侯車文在優等遂授職以去同邑之仕於朝者謂豫宜贈以言嗟夫侯車去為人師以其道教人宜不假於云云也而猶責言於豫豈以豫言可取哉則豫之贈侯車可但以言相恱耶夫治天下本於人而人之所以成材由於師辟之規矩凖繩方圓平直之所由定也規矩凖繩不極其法之良而欲物之方圓平直可得乎故曰成已所以成物也聖人之道自人倫之大以至於日用事物之常莫不有則焉為師者不徒相與講明其說必躬行以率之使皆有得於心則其發為文辭者非虛言措之事業者皆實行矣然後為教之成則師之任不為已重乎任之重而可違道以自逸乎違道以自逸則為之弟子者將何所法而為才哉儒道之不振未必非此之由也今朝廷之待學校至矣去其弟子之無良者而嚴擇師以教之將一剗其舊習之弊而冀為大賢君子之歸於斯時也師之所以教弟子之所以學者當何如用心哉此侯車所宜務也侯車端重謙慎學聖人之道其在鄉里恂恂然未嘗有過舉今去為人師其能修職可知也其教之成將為之弟子者皆足以興道致治豫當於他日見矣是修先生昔者於豫有忘年之好故豫不以衆人待侯車而贈之言若此其亦以為迂乎哉泰和郭氏宗譜序豫幼時則聞北門郭氏以儒名家舊矣慶守先生與豫外大父歐陽府君同學於清節書院官至登州府學教授慶宜先生則與豫先考同以賢人君子應詔論治道官至湖州經歷二先生未之識也其後先考知瓊州湖州之子彥遷任推官為同僚推官之兄彥鉉先生則為縣學訓導豫所從遊者今以順德教授致仕歸其未仕者曰彥思彥常彥思簡靜而無害彥常豁達而有才皆所謂傑然者也彥常之子公緒嘗同逰鄉校今為貴州按察僉事其弟公承則自萬安訓導典教番禺皆與豫深相知豫父子之交郭氏三世矣其仕者皆能盡職而有譽於世處者亦能自立而無愧於其先何郭氏之多賢也豫泰和之名家不少然為子孫能不失其衣冠文物之盛後之來者又思繼續於無窮如郭氏者不多見也則其祖宗之所積可知矣郭氏系出宋兼山先生忠孝兼山之子冲晦處士雍居峽之長陽後徙嶽之臨湘四世孫匯字百川為袁州司戶宋季避亂乃徙泰和之北門至公緒之子珦六世矣兼山受易伊川先生之門冲晦傳其所學父子之德業著述表然見於後世其所以封殖郭氏者厚矣宜其振耀於今也是譜作於慶守先生而重修於公緒尊卑疏戚昭然甚明雖由此而百世可述也要在勉於善而已善者天之所與也郭本姬姓以國為氏其先蓋出於周所以失其國者知善而不用知不善而不去也夫既知之而不能决於取舍猶足以亡况於趨惡而忘善者乎然則郭氏子孫可不知所務哉聞善則必為知惡則必去自日用之微以至倫誼之大無不善焉則天之佑之有窮哉公緒以此譜求豫言豫既有世契而欲其久且盛也故為之序如此以勉其為後者贈賈給事中序賈君諒字子信其為刑科給事中也才美而行修績著而名顯既九年當得升其僚友之賢不忍其去相率言於上請留之於是擢拜刑科都給事中衆皆為之喜復求豫言贈焉豫謂古者君子之於别也慮夫契闊之久晤語之疏於是有贈言贈之云者有所增益之謂也今諸君出入偕而居處同所以進於德業措於政事者得旦暮言之而何取於豫言以為贈然而必屬豫者豈以其言為可以益子信哉夫君子之學必仕以行之然仕而遇其時固難也遇其時矣而當樞要之任又難也今天下清明法令修舉子信以此時而居要地朝夕在天子左右以近穆穆之光凡刑罰之事皆子信輩詳覆茍有違戾則矯正焉然後職憲者受而行之今之慎罰蓋帝舜欽恤之意也奉行有未至而能不失其中者少矣然詳覆皆子信輩則事之繫於其身可不謂已重乎子信居之久處之宜而侃侃以剛直得名誠仕之遇其時當其任而無愧焉者今進而總其事所謂駕輕車就熟路而王良造父御之不足以喻其快且易也然嘗聞之周書曰司寇蘇公式敬爾由獄以長我王國蓋能敬其事則協於有虞欽恤之意而好生之仁行乎其間仁固所以為永命之本也子信為都給事中刑罰之事靡不由焉敬以行之則人將莫不敬其有益於國家不少矣而子信之進於福祿榮名亦豈有涯哉子信初選自太學侍今天子說書常往來翰林而豫為翰林修撰固已竒其為人今二十餘年不可謂不舊矣故為贈言如此尚庶幾少益也子信果以豫言為然哉贈楊永寬詩序建安楊永寬今太子少傅工部尚書兼謹身殿大學士楊先生之子也先生官侍近最久永寬不見者十餘年今年省侍來京師修其為子之職甚勤先生所以教之者皆聖人之道也寬得服膺焉間出游諸公間其言語恂恂而進退周旋必以禮以故諸公交譽之謂楊氏世德之厚宜永寬之能賢也既數月將還建安知永寬者又皆惜其去而相與私計之曰先生以清德重望為天子所倚任日與二三大臣圖議政事有不暇顧其私永寬之來也宜遂留左右視其飲食之節而適其起居之宜使先生之心快然無所纍而得專意於朝廷豈不可也且當太平之時聲明文物之懿四方賢豪鱗萃而輻湊蠻夷戎狄之貢無虛日永寬之留也得以盡接於見聞豈非觀光之盛哉今暫來而遽去何也豫告之曰楊先生盡心於國而不暇顧其私此誠是也然於祖宗之故物與其墳墓蓋未嘗忘之君子不以家事辭王事楊先生之謂矣永寬之為長子也凡先生之所存非永寬之所當事者乎守祖宗之田廬而修治其墳墓歲時之間備物敬享焉有以格祖宗之靈而迓續於無窮則先生孜孜奉國之心不益快然矣乎視區區朝夕之奉其輕重可知則永寬之歸蓋先生之志也君子莫大於養志此其所當勉也若夫所謂觀光者又有其說矣蓋永寬之歸理其家將益觀夫身使德進業修他日當為邦家之光豈特觀於外而已哉衆皆曰然於是相率賦詩贈之而求豫序豫即書所以告語者於其端使人知先生父子之繫於國與家如此也送杜給事中序東陽杜瑄季璋為兵科給事中既三年吏部考課以為能於其職奏授之敕命且以所居官封其父母妻亦皆封孺人當時榮之季璋因援例請告歸覲將行凡與交好者皆賦詩贈焉而求豫序其端豫謂今之給事中最為要官日侍天子左右被寵顧凡下之所陳上之所令事無巨細緩急皆掌焉五府六部受而行之天下其所係輕重可知矣非端良有守恪勤不懈之士莫能任也昔仁宗皇帝在位擇賢以任職而尤加意於是官一日詔選太學生之才且良者六十人俾翰林考定其次第凡二十人在髙等而季璋與焉衆未知所用明日有㫖分蒞六科俾練習其事未幾皆授給事中當是時諸生歷事當得官者俱遣還卒業必俟科舉發身而用之忽有是命衆莫不驚喜以為榮季璋在兵科三年有能名凡昔之同進者多不在而季璋乃以考最得褒封及其親又得歸覲以致其樂雖朝廷恩德之隆而亦豈非天之所厚哉夫父母之於子莫不願其才且良而為子者莫不願顯榮其親交相願不能皆得者比比有之而季璋與其親得兼遂焉謂非天之所厚不可也今之仕者得躐等而升惟給事中御史為然故有志之士皆樂為之意豈獨榮其身哉亦欲有以大顯其親思有以大顯其親孝之至也豫嘗辟之登山焉舉足愈勤則身愈髙而所以快耳目適心意者愈無窮季璋已在其位當益務盡其道則譽益隆官益進而親益顯季璋勉之豫將於他日乎觀也季璋之歸樂其親及其親戚朋友而光耀其鄉黨州閭則於諸公之詩見之此特著豫屬望之大者如此皆春堂詩序京口何彥澄以醫名京師久矣自公卿大臣以至閭里細民有疾多走彥澄所求醫彥澄不間貧富貴賤風雨寒暑皆往視與善藥疾己未嘗責報至於士大夫尤惓惓相愛察其稍不豫輒餽藥使速已不至或困其心惟恐人有不得其安者少傅兵部尚書兼華蓋殿大學士楊先生名其堂曰皆春之堂旌其志也豫謂古者聖人之制醫藥蓋以濟天下後世之人使皆安其生而無夭昏札瘥之患聖人之心與天地無間也夫天地以生物為心春氣既至萬物萌動其質之剛柔大小雖不同然皆勃然莫之能禦時之春即天之元人之仁也人既與天地同其心而豈可不同其施乎是以古之君子得位以行道推其功用之極至於萬民咸和品物畢遂然後為無愧於天其或未得位而思有以及人則往往用心於醫醫之道行使人皆熙然相安於仁壽之中亦猶春之及物而無不遂者斯亦無愧於天矣今彥澄用心如此其亦志乎古之君子也乎豫年始五十而氣血日衰疾之攻乎已者日滋出家人少長不能自愛其厪彥澄多矣而彥澄應之不厭蓋知夫春之生仁之施周遍而不窮不可以有間也豫與同列諸公言之皆喜為賦詩詩既完乃為序以贈焉非徒以著其美且以廣其志亦使夫未能然者知所興起也送蕭立敬歸泰和序立敬泰和人居縣城西三十里曰嚴莊足跡罕至城市事母孝與弟思敬宗敬相友愛尤篤思敬早以才推擇從事府中既滿赴吏部㑹英國張公主兵事事最繁又擇思敬在幕府治官書去其家者蓋久立敬請於母來北京視之而思敬以滿考授官辦事刑部理各曹奏牘得以旦暮餘暇相聚於旅邸于于然甚樂也豫昔居家時嘗過嚴莊嚴莊與禾溪相接其地衍沃皆常稔之田竹樹茂美山水清秀立敬兄弟既欵曲連日又同過豫故人蔣氏樂氏二家前輩老長與其子弟之英俊皆喜客傾倒相歡又過羅氏觴飲竹林中題詩竹上談笑諧謔復數日乃去其後豫與思敬相繼來北京同居金城坊於促迫煩倦之際未嘗不思立敬諸公之從容自得也今立敬舍閒曠之適而共樂於此蓋惟篤於友愛之誼故於羇旅淡泊有以忘之矣其心豈不厚哉兄弟同氣之親也居則相愛離則相念患難則相恤其道當然也然而有汨於利者見利則相親利盡則相疏甚者鬭䦧於內擠排於外至不復往來以終其身此豈有人心者哉蓋視立敬跋涉五六千里以共升斗之祿而相樂於年歲之久者其人之美惡可知已昔者孔子誦華鄂之詩而贊之謂人能和於兄弟則父母安樂之矣立敬於兄弟如此其母之心當何如其樂也然則立敬其可謂孝友之人哉使立敬克篤其終而子孫皆化之亦篤於其道則蕭氏將不表其鄉而已乎立敬將行士大夫厚於其兄弟者皆作詩送之而豫為序使人知立敬之為可重也送劉君仲戩詩序廬陵劉君仲戬始為餘姚知縣已有名後坐纍閒居者十餘年嬉然自得於田里之間日與老農稚子擊壤鼓腹歌咏太平曰如是足矣士大夫相知者皆曰仲戬有才能使為郎官御史亦有以自立况縣令乎今乃閒退如此於仲戬固足矣茍有達賢之志者可但已耶今天子即位下詔求賢監察御史胡啓先即上章薦之仲戬亦幡然起曰士之於學將以行之也古之人有欲行而不得者不遇其時焉耳今聖明在上舉賢任能以隆至治而乃得名薦書辱徵命此誠竭忠盡節之時也既至京師授連江知縣以去未幾命下凡以賢舉者皆命六部都察院翰林近侍之臣嚴試而後官其已授官者需其來則試焉今年仲戬述職來北京吏部比其類羣試於禁中第在優等將復歸連江知仲戬者又皆曰君子之道固不欲自衒然而處於衆人之中而無别異焉亦豈人情之所樂哉仲戬今嚴試已見其賢矣復歸連江益推其所藴者而施之連江之民將不深䝉其澤矣乎於是以樂府舊題各賦一章送之而俾豫序豫謂大夫君子之贈行也賦詩則有之而何取於樂府哉於是而知諸公之意矣古者立樂府官采四方之詩以觀民風取其可用者而絃歌之此樂府之名所由始也近世有編類樂府者首之以康衢擊壤之謠而漢張堪郭喬卿皇甫嵩岑熙劉陶祝良殷褒之歌繼之百世之下有以見當時治效之盛而起敬起慕焉今諸公賦樂府以贈行豈非有望於仲戬也哉仲戬勉之政成頌興他日觀風者采之以獻於朝廷而被之絃歌則仲戬之美將不與前五六君子者比乎仲戬勉之贈陳太守詩序聖天子在位厲精為治思所與安養斯民以成治功者莫如郡守詔六部都察院大臣察郎官御史之堪其任者以聞羣臣祗慎務求所以稱上意得九人焉皆擢之大府俾乘傳之官又賜敕以寵勵之九人皆當時之極選也而吾吉安得陳侯本深焉方陳侯官刑部其清慎之操恭厚之德通敏之才人莫不敬之嘗理軍政於江西江西之民感而誦之如出一口其賢之著於人久矣乃今而臨吉安此吉安之人之幸也江西之郡十又三而吉安為易治其人多讀書知道理其出賦稅力役以供公上皆不後諸郡而或者以好訟病之此不善為理也夫生民有欲有欲則不能無爭爭則獄訟興焉顧吾所以理之者何如耳茍有公平正大之心是非必明操縱必當則無實者不敢至其前將自然無訟其所以紛紛皆為之長者不能是故也豈獨民之過哉夫民患不讀書昧於道理則告之而不知諭之而不從肆其嚚頑以抵牾其長如是則難治吉安豈其然哉昔之賢守豫不能詳也前三十年有朱侯仲智藺侯芳皆公平正大之人也當是之時郡無滯事訟至則善斷是非操縱不爽毫髮一郡之人誠服而心悅之而二侯者皆有暇日以讀書稽古其後皆知他郡遇事有不如志未嘗不思吉安之人而吉安之人亦誦二侯之德至於今不衰其閔閔焉望賢守蓋如嬰兒之望父母也今而得陳侯民庶幾有賴焉侯嘗至吉安知其俗其人亦知侯之賢上下相知於為治蓋尤易而深有以副天子養民之心必矣將行吉安之士之官於朝者皆喜相率作詩為贈豫慮人有惑侯聽者故書豫說以為序贈歐陽御史詩序御史之職為天下所甚重然所以重者非徒以威嚴也奉法循理而已矣蓋人無貴賤逺近茍不由於理皆得以法治之而無敢不服然欲治人者必嚴於自治不能自治則顛倒迷謬而理法隨以廢雖欲治人不可得也若是未有不危其身由是而知以理法自治然後治人雖任事者皆當然而御史為尤切不可不慎也國家設御史以當重任必擇賢者而用之以賢者能如此也然人不易知於是有輕蔑理法者出乎其中循私背公黨邪害正無所忌憚為之長者不能正已以率之風節靡然日入於弊賴天子明聖一决而去之於是公道大行天下曉然知理法之不可廢而賢者得以伸其志此君子之幸也則今之為御史者可不思自奮矣乎吾邑歐陽廣洙以明經取進士擢拜監察御史當之南京廣洙之從叔允和嘗為御史矣今其從兄廣哲為考功主事皆當時所謂賢者廣洙之去其益加勉也哉猗蘭生於蓬蒿之中雖為所蔽然香固自若也况今除治而封植之矣屈子所謂芳菲菲其彌章者人固俟之廣洙務以理法自治凡其言行必皆循於理而不入於法其所以治人者亦必視理法何如不茍為輕重如是則為良御史審矣抑豫聞之君子之善處其身者必置於正大光明之地不肯一涉疑似以惑人聞見今二京相去逺矣疑似之迹雖甚微人將惑之以為何如也古之大賢如曾子尤不免於埃墨之嫌况衆人乎勉哉廣洙務思善處其身無曰吾謹於理法而已也豫於歐陽氏誼不薄故為序以贈行不自知其言之煩也廣洙其亦亮豫心否乎送李通判復任序永樂二十一年豫自翰林侍讀丁內艱起復來北京卜居金城坊時左春坊大學士楊先生與刑部員外郎周恂如主事張宗璉李大用及豫翰林諸友王時彥余學䕫錢習禮桂宗儒周功叙劉朝宗同里閈以居室屋相接雞犬之聲相聞也之十數人者旦則各出營職逮暮而歸則從容相過焚香瀹茗談笑移時而後去率以為常大用長身秀偉詳雅而謙恭藹然有能名於時尤為諸公所愛未幾大用迎其尊府來就養豐美而端厚色溫而氣和相與言論必據於理諸公皆謂有是父故宜有是子也久之楊先生進拜少傅兵部尚書兼華蓋殿大學士徙居澄清坊恂如為越府長史大用為應天府通判朝宗去為九江教授宗儒以老病歸豫與時彥宗璉則遷職春坊學䕫習禮皆進用在翰林一時同處之士各東西散去最後功叙亦徙而東凡其所居皆已易主大用去南京相望二三千里間與諸公言及之未嘗不歎夫㑹合之難也及以事過故處徘徊周覽垣屋不修道路不治犬豕穢汙不可以投足大用之居最髙亢明爽諸公常所往來今皆失其舊觀又未嘗不嘆其遭遇之難也夫地以人而勝彼其所遇者固如此無足怪也今宗璉再遷得常州同知而豫輩與大用尚幸處兩京之中思與宗璉一相慰勞苦又有不可得之歎人事之不齊可勝道哉大用有逺志有美才今再考績赴吏部既書最需九年而進髙位享厚祿無疑矣顧豫菲才而衰病及之國恩未報欲去不可逮大用復來又未知夫聚散離合何如也大用將復任其友鴻臚卿楊君屬豫文贈其去故歷道所以為文以贈之以見豫於大用素相善如此也友于軒詩序友于詩若干首士大夫為吏部主事劉君兄弟作也劉君字士哲其兄士徵相與義最篤自少至長衣食厚薄必同之勞逸休戚無獨任者平居終日怡然未嘗有違言忤色鄉黨之人皆重之名其軒曰友于之軒初士哲為浙江按察僉事士徵往視焉士大夫既咏歌之及士哲官京師士徵又來視之於是兄弟皆將老矣而恭愛隆然有加於昔時京師士大夫又為賦詩以頌焉既成卷矣士哲求豫言辨其端豫謂兄弟之親蓋天之所序非若夫婦之以義合者也故古人以左右手喻焉蓋言其氣之相通而相須以為用也則兄弟之當親可知矣常棣之詩周公所作以􅈤篤之意發切至之言自夫禍變之酷推至日用之常反復乎天理之正使人究而圖之以深得其所以然者今其詩具在夫人能言之然能不以妻子之私而奪兄弟之義如吾劉君者幾希矣彼豈無良心者哉昔者嘗聞之桓山之鳥同哺而生者四及其將散而之四海則哀鳴徘徊至不忍别田氏之紫荆聞欲析而分之則一夕自枯死及其感而復合則復榮人固異於草木鳥獸也而其為行乃有忍而戾焉豈不深可悲哉則劉君兄弟所以見重於大夫君子蓋宜也夫詩之作必本乎性情而有關於風化然後可以傳當時垂後世今諸公之詩蓋幾於是矣彼同有是心而或戾焉者得而讀之將必有感發而興起者則是詩也豈獨為軒之美而已哉故為序之使傳焉贈按察副使傅君序雲南去京師萬餘里國家撫而有之於今蓋六七十年地既闊逺其物産富饒之處蓋亡幾率多山林深阻磽瘠不毛之地故人之貧者尤多然夷性獷悍四方之人雜然而居於此者性資既殊習俗亦異寬之則慢急之則怨故鎮之以元戎統之以布政司分治之以府州縣而又置按察司以糾正其撫之之不如法者故雖逺於京師而其人相安於無事富者得保其有貧者亦有所養而自存此誠朝廷恩德之厚元戎邦伯能恭承而宣布之而亦豈非按察司激揚勸勵之能盡其道哉吾嘗思之代天而理民者天子也然不能獨治故任之羣有司有司之是非不能親接於見聞故任之按察司按察司者天子耳目之寄有司是非之所由辨民之所由以寧者也是非有未盡辨民有未盡寧皆其德之纍也况乎雲南之逺如此哉使仕者不以逺而放民不以逺而病其所繫尤重也傅君克已之為監察御史也豫嘗與之從容聽其論人之賢否事之是非刑獄之得失皆有味其言也嘗考其行蓋未有違乎言者當時為之長及與為同列者皆稱道之秩滿升湖廣副使其言行不異為御史時今而之雲南舉其所嘗施之者而施之辟之輕車駿馬而王良造父為之御也雲南雖逺仕者益有所表勵而為賢民益有所資賴而能安如在天子輦轂之下可知矣於其行也其姻家右春坊大學士兼翰林侍講學士王君時彥屬豫文贈之豫亦厚於傅君而喜雲南之得人也於是乎言送朱縣丞還鄉序豫初入鄉校時朱君子通為前輩相好也後五年為永樂元年豫領鄉薦竊第入翰林又四年子通始充貢來太學同居京師其相好加焉未幾子通去丞蘭溪以謹慎見稱婺括間豫意子通由是當大顯而竟以憂去服除謁選吏部需次者久之乃請告歸省其先墓及再來遂以老疾辭得放歸田里將行過豫告曰吾與子相知舊矣今雖用舍異宜然可無言相贈邪豫謂今天子在位勵精圖治凡士之淪於卑冗側微者皆甄拔而用之故天下之士茍有所負莫不欣然以求用蓋所謂不世之遇也於此之時子通獨逺引而去雖曰老且病非知止足之分者能然哉夫內外崇卑之職以千百計其如子通之老且病蓋亦有之而貪冒無恥異乎子通者未必無也則子通亦可尚也哉然思念之昔之為同列者二十人今物故大半其存者仕於四方惟豫與翰林侍講余學䕫禮曹郎中獨孤樂善暨子通在京師而豫三人者亦迫於晚暮聰明日衰寒暑風濕之切中肌骨者日盛然皆縻於職務不敢請亦幾於貪冒無恥矣今子通獨去其能釋然於懷耶雖然子通之去豫知其不獨樂也順德教授郭先生者嘗為鄉校師豫輩所從游者久謝事還故鄉子通得相從以樂矣然可忘報哉古之君子有盡瘁以仕而上不之察者今天子聖仁如天故先生與子通得遂其志以樂醉飽之餘形於頌詩使與康衢之謠白雲之歌並傳萬世之下有以見太平之盛豈不偉歟他日倘乞身南還尚當相與和之也贈祝副使序國家於諸道皆置按察司所以肅憲度警官邪拯民病其任重矣官有使有副使僉事非老成端厚嚴於自治者莫能任也福建去京師雖逺而號為富麗蓋地控諸番番舶之往來海中者常相接而貨財之饒裕物産之珍竒他處罕能及之是以為吏與民凡有事於其地者亦少能自安於禮法之中按察司欲皆以法繩之不嚴於自治不可矣故豫見其尤難為也金華祝君戒始自刑部主事擢河南僉事久之調湖廣皆有名秩滿為副使於福建仕宦三十年而確勤不懈故能舉其職而不見其難非所謂老成端厚而嚴於自治者歟豫聞之久矣今年以考績來京師吏部最其課天子亦寵嘉之賜之誥命祝君既拜賜而歸其素所厚者監察御史包君德懷等求豫文贈焉憶豫少時從先生老長觀夫按察官之蒞吾邦者其未至也豪吏猾胥皆栗栗惴恐治故牘理弊事百方以自救聞有素藴不平欲論訴者即引慝返幣以求平故及其至也上下肅然卒無事以去此其故何也蓋能自治而人畏服之故不勞而理先生老長必舉以為訓曰此小子之所宜知也及是加久而所見益多凡名績之顯著而為人所稱道畏服者必能是者也其不然者卒用以取敗於是益以其言為信祝君既有成績而致譽矣天子賜之誥命所以勵有功而勉後效也其寵賁之華訓諭之切祝君其深體之則進於福祿榮名豈可量也哉此諸公願望之意也故為序以贈之送吳主事歸省序宣德三年三月刑部主事吳揚光訓得請於朝將歸新淦省其親凡素與厚善者作詩送之中書舍人干霈如霖請豫序永樂之初太宗皇帝篤意儒術躬視學謁先聖進師儒講說經義厚加賜奬勵之一時為國子師者多宿儒有名而光訓之尊府節性先生為助教其學問明正踐履端恪學者翕然尊之光訓隨父居京師承家教之嚴而友太學之賢者由是其文益進久之遂取進士為主事善於其職既三年䝉恩得以所居官封其親而先生亦老矣因棄官就封天子賜之敕命俾歸老焉朝之士大夫莫不榮之皆謂先生善教其子宜其子之善於其職兹特膺爵命之隆而享和平之福者乃天所以報先生也然先生雖老而聰明不衰鬚髮郁然既歸故鄉日與故人賔客杖屨逍遙於金川玉笥之間囂然有以自樂而光訓思之不置於是謁告而歸夫以父子之榮而相聚於一堂之上酌春酒以介眉壽吳氏之福何其盛哉自江右之仕者而論之父子相承而皆顯榮如吳氏者不少也然從容安樂如先生父子誠少矣朝廷仁德之大何吳氏遭逢特厚如此哉則光訓之所以圖報者可緩耶豫故為序其詩如此非徒誇美於其鄉之人且以為光訓勉也送尹如恢序吾邑尹氏世業儒自宋時已然矣數十年來以學行為教官者六七人為郡佐一人皆能修職可稱道而積學以待用者尚繼繼未己如恢蓋所謂傑然者也去年荆州府學缺訓𨗳以幣聘起之如恢至京師㑹朝廷嚴舉士之法凡用薦來者命諸尚書御史學士羣試於禁中親軍指揮二人給事中六人察視之非文學優贍者往往惴栗不能措一辭如恢文成在髙等遂授職而去以豫於其家有連也求一言為贈嗟夫如恢學成於家既足以為人師矣豫言何足以增益哉然朝廷興學圖治之意不可不知也初訓導之舉也命試於翰林已嚴矣今達官要人羣試之加嚴也此豈厲夫為士者哉蓋謂試之愈嚴則所得者愈精而人人皆賢師也舊制學官弟子廩食者有定員而增廣無常數歷時既久積弊日多進不以公居不知學詭欺薄惡之行成禮義亷恥之道喪是以為之限制而慎擇焉蓋欲人人皆可教之才也如恢當此時而居師儒之位可不有以大振起之乎夫人性皆善其流於惡者習使之然也聖賢之書所以明善也如恢朝夕坐堂上進諸生讀其書服行其道養其善心而制其邪心持之以誠待之以久隨其質而成就之譬之於材正之以繩墨而加礱斫焉棟梁榱桷各適其用治道之所由興也此如恢之任衆之望也若施施以相悅逐逐以相求茍且歲月之間而復入於弊則非今日所以嚴擇之意矣士君子所以成已而成物者不若是也况法令有所不可乎如恢其尚勉之贈張友讓謝病歸詩序永樂二十一年豫以翰林侍讀丁內艱起復來京師而與㑹稽張友讓同待選吏部友讓襟度夷曠而尤介直其言行無不可愛者日與談笑莫逆也明年二月豫領舊職入翰林友讓得福建按察司照磨以去豫往往從人問其所為皆言友讓達於政而不矜謹於法而不苛自其長二與朝廷達官要人有事於福建者皆重之豫聞之甚悅信友讓之能賢於人也今年以考績來豫自修撰王孟堅所遇之欣然喜握手相勞問復相與劇談大謔久之既而喟然告曰吾老且病矣不能復有為矣豫視之良然獨愛其意氣尤在也孟堅與友讓皆㑹稽人時孟堅以病告歸友讓亦繼請於朝亦得免豫縻於職務不暇相往來而豫友修撰苗秉彛言曰友讓䝉恩得返初服還故鄉諸公皆作詩送之先生宜為序豫謂唐賀知章之謝官而去也黃冠野服扁舟往來稽山鏡水之間囂然足樂也去之千餘年其流風餘韻尚有存而未泯者今友讓與孟堅繼之㑹稽之人何幸復見太平之盛觀哉然知章之去年八十餘既老而意易倦山水雖樂不能久有其樂矣豈若二君之精明未衰也豫知烟霞雲月竹樹魚鳥有不足以供其吟咏之適矣豫年始五十而衰病相尋若六七十者思自休於山巔水涯寂寞之濵而國恩未報欲去不可想友讓之髙蹤其何能已於懷哉友讓固善畫倘為樂之餘寫湖山之勝以寄豫於千里之外使得如陳季卿者乘一葉徑去以從友讓游則其心豈不快然也哉友讓其無忽忘之也送楊太守序永樂十七年十月東平太守楊公改知莒州凡臺憲侍從之臣於公有鄉郡之好交逰之誼者皆賦詩為贈而俾豫序之初公之知東平也豫猶未識公然已得其為人蓋東平南北之衝舟車之㑹也豫過之者數焉嘗登安山而望之則其土皆闢矣視於其人而不見有惰遊者桑麻禾粟之陰翳牛羊雞犬之蕃息充乎其境內至於橋梁道路郵驛之舍莫不修治完好賔旅之往來與其田野之耄稚皆無有非公之所為者豫以是知其賢及問之士大夫則又皆曰楊東平蓋所謂安靜之吏悃愊無華日計不足歲計有餘者也於是益以其賢為信從而思之凡為州縣者有不當如是耶夫今朝廷所以安養斯民者皆有其道至於一毫之征一力之役莫不有禁其用心至仁為法至備長民者奉此足以為治矣辟之耕焉順其播植之時謹其溉治之節而去其害苗者焉退而待之其成熟可冀也其或播種不以時溉治違其節長稂莠而縱蟊賊或方榮而揠之未熟而取之則苗枯然盡矣安望其有美實哉吏治之得失所以為民之休戚者何異於此而世之為吏如前所云者固多如後之所云者亦不乏焉此無他蓋貪功急利之心勝故茍且趨便之行成也於乎上之安養斯民而為之法禁者順其所好惡也吏何用是紛紛哉其亦順之而已矣若公之為治循其道之自然而以至誠行之不茍作而妄隨此其所以宜於民而有譽於世也今之莒州莒鄆相去非逺也其必有聞公之名熟公之化而幸公之來者宜有以大慰其心夫循吏之見重於世久矣豈必古人哉公慎其終庶後來者有述也豫與公同郡且與公之子監察御史民服逰敬公為最深故為其言如此亦公之志也歟贈刑部劉郎中序贈言古禮也而多施於離别之間蓋慮契濶之久故因言以寓意若夫處必與偕行必與俱德義之相兼功業之相上皆目擊而耳聞之雖不必贈言可也况三載考績之仍其舊者乎而世之君子於夫三載考績之仍其舊者率皆為文以贈之所以寫其殷勤篤厚之意美其舊績而勉其新功其所存如此則雖前所未有亦理之所可者也吾邑劉君伯塤為刑部郎中為豫言其同列劉君養正之賢曰養正家通州洪武中由國子生擢刑部主事即有名秩滿升郎中今三載考績於吏部以為能言於上俾復其職凡與相厚者皆贈以詩敢求序於豫豫謂朝廷用唐虞之法以課吏凡仕歷三載者必考其職之稱否須九年而大黜陟焉由是仕者競勸而皆樂於有為故庶績咸熙養正以通敏之才歷仕四朝於夫聲明文物之盛詳刑慎罰之意皆深知之故能舉其職今三載考績而仍其舊蓋俟其績之成而進用之諸公美其舊而勉其新豈不誠厚也哉豫聞之行逺自邇升高自卑然行百里之途為九仭之山者多勇於始而倦於終使不倦而益進焉則至於髙逺也必矣養正益勉之爵祿之加豈止是而已哉此諸公贈言之意也故為序之詩凡若干首蕭宗魯和三體詩序吾友蕭所耕以其父宗魯所和三體詩一集示豫曰此吾先人之所以自見其意也願為序而藏之豫少時則聞宗魯讀書有才藝善談論古今與客坐語輒終日亹亹忘倦而間亦發於歌詠然恨未及見也於今乃得受而讀之嗚呼蓋可謂篤於詩者矣夫言者心之聲而詩則聲之成文者也心所感有邪正則言之發者有是非非涵養之正學問之充才識之超卓有未易能也是以觀其言則可以知其人故曰詩可以觀若夫唱和之作乃所以各言其志虞廷賡歌是已自是以至盛唐皆如之初未嘗拘韻也依韻以逞詞蓋自元白始逮宋蘇黃諸公一唱而十和然猶未必多也東坡先生乃取淵明之詩盡和之其後陳晞顔又取簡齊之詩而盡和之於乎富矣哉其言也蓋依昔人之韻而發其意韻雖同而意未必同也豫嘗辟於物矣春氣既至草木暢茂一花一葉皆有可觀其生色雖不同而化機之妙則一也今觀是詩亦可知矣非用意至到曷能之哉然古今作者甚衆而存者無幾蓋無賢子孫而散亡流落者多矣今所耕惓惓於是詩而其子鄉貢進士珏又能如其父志兹非蕭氏之賢子孫哉是以君子貴乎有後也故為序之使藏焉贈張謙序廬陵張謙為吉安府學生業成充貢入太學而求贈言於豫豫時亦以內艱服闋將之京意謂與謙得從容於歲月之久以盡其所欲言而何事於求哉然謙求之不厭乃謂之言曰夫君子之所學者聖賢之道也學聖賢之道以修於身而施於國家天下開導其進為之方者師之功輔翼勸相以致於成者友之力也子之居郡庠既得師矣其所友者一郡之士也所以至於業之成而足以充貢者雖子之勤學力行亦豈非夫人之助哉今去入太學太學者天下之士在焉而為之師者又天下之名儒也子既得名儒而從之而為之友者益衆則所以資藉成就者將益大矣譬之舟焉既得舟師之良者而操之其所以楫之者又皆一時之能者也則浮江而下一日千里以至於海不難矣豫蓋為子慶也雖然師不待言也天下之士蓋多矣而有善不善焉在子慎擇而固交之韓子曰善雖不吾與吾將强而附不善雖不吾惡吾將强而拒此子之所宜法也然豫又聞之孟子曰一鄉之善士斯友一鄉之善士一國之善士斯友一國之善士天下之善士斯友天下之善士蓋取友之道必先善其身所友之廣狹視其善之髙下何如也此又在子所當勉也茍得天下之善士而友之則子亦天下之善士矣又進而取友於古人則子之所成立者豈特一世之士哉君子當務其逺者大者以是贈子可乎謙喜曰善請服膺而從事焉於是乎書以贈之沙溪劉氏族譜後序沙溪劉氏族譜其族人伯塤郁武之所重輯也沙溪在泰和縣南七十里而劉氏為鄉之望其先居金陵不知其所以徙居沙溪者十七世矣始其譜甚詳元季兵亂失之髙門巨宅亦皆煨燼而無餘按其遺址之宏敞而想其締構之瓌傑自縣南諸鄉無有也則向時之盛可見矣永樂八年伯塤因其舊規而重新之得石刻祝文焉知其故居乃十一世副尉兄弟作於宋慶元乙卯至德祐丙子而燬元大德癸卯其十二世祖德載兄弟再造焉及至正庚子幾六十年而再燬矣及今又六十年而又新之衰而復盛理之固然劉氏之福未艾也伯塤為刑部員外郎與豫同居京師十五年其明敏練達人皆稱之及歸而又識其姪朝東亦劉氏之賢者皆足以世其家夫所謂故家大族者以德不以力也德盛則其子孫雖久而猶昌恃力以相長雄者反是故有勃然而興忽焉而泯滅澌盡者矣其綿綿延延雖經變故不替而益盛者皆其祖宗積德之厚者也今劉氏子孫之盛如此可以知其先德矣繼自今而益務德焉則傳之百世豈有窮哉故書於末簡以告其後人送潘知府序潘君伯厚為監察御史既九年上以為賢也超拜青州府知府同列之賢皆惜其去而又喜其澤之及民也相與求豫文以送之豫與潘君有同年之好又同官京師且久於其去也安敢愛一言况重以諸賢之命乎夫朝廷之於郡守慎且重矣蓋方千里之郡為之民者數十萬所以厚其俗安其居豐其衣食之源而遂其生養之節者非他人在太守耳太守賢則一郡受其賜不然則其害滋甚所以慎重而不敢忽也夫以地大人衆如此而所以治平者懸於一人蓋亦難矣詩曰豈弟君子民之父母誠非有忠厚惻怛之心以行夫慈祥平易之政者莫能任也青州大府也界於海岱之間其所統一州十縣之民可謂衆矣其前之為守所以撫循惠養斯民者不可知其民果安俗果厚潘君可無事矣若猶有未也是有望於潘君也潘君學聖賢之道而志乎古人之業則能舉其職而有以順乎上有以悅乎下也必矣今制內自郎官御史以下賢者則擢為牧守而九卿大臣有缺則又擇夫牧守之賢者入而登用之故自守而升九卿大臣之位者比比是也潘君勉之則無久於外矣潘君其思所以慰夫朋友之望哉送余教諭序平南教諭余學奭以事來北京其兄學䕫時為翰林檢討有名當世兄弟相與盡友愛之情極恭順之意士大夫賢之既一年學奭將復歸平南與之厚者皆賦詩送之而以序屬豫蓋學奭世為儒家其先君子斯延先生嘗受業於安成劉雲章能傳其學既以授檢討君與豫同登進士入翰林而學奭又以所授取教官父子兄弟之間自相師友其於聖人之道蓋講之精矣而平南夷獠之地去北京蓋萬里自昔以為難化學奭典教四年其業成而領薦者已三人其道固亦行矣是蓋能舉其職者也則豫何能有益於其行哉嘗竊論之教官者仕之未入品流者也然其職固清其道固重與夫牛羊倉廩之列異矣其上有藩憲大臣與郡之長二臨之者固衆其能别異而敬禮之者亦多矣蓋其逰聖人之門學聖人之道其理固應爾也其或有異於是者則君子所以處之烏可無道邪使其勢之重小可以撓吾之所為其大或可以沮吾志君子之立身行道又烏可以沮撓於人邪或有所沮撓者抑豈獨其人之不善哉將已之不善也是以君子貴時中而惡夫執一也蓋以待君子者而施諸匪人而以其得於君子者望之兹所以為執一而不為所沮撓者鮮矣夫所謂時中者泛應曲當各適其宜而已非矯矯為異翕翕為同也孔子於衛靈公見其視蜚鴻而去之其於陽虎何禮之周而言之遜哉彼一孔子也而所處若是是所謂時中之道也然則君子之所以處已待人者有其道矣故豫以為君子之處匪人正其內和其外可也正其內則所以處已者不離道和其外則所以待人者有其宜若是則庶幾乎且內既正則無可乘之機外既和則無可畏之防又孰得而沮撓之哉然非獨教官宜然也蓋君子之所以自治也學奭之道行矣豫亦慮其或有不足於此故以告之或者其亦可取也夫贈曽御史詩序豫友曾泉本清自邑庠生舉進士入翰林為庶吉士與豫相從者將三十年豫愛之京師士大夫知本清者亦莫不愛也今年冬授監察御史當之南京與之厚者徵豫言贈焉豫謂本清智足以明理才足以立事其於御史之職蓋宜矣而何取於豫言哉憶昔與本清居家時所見御史衆矣其以事而臨吾邦也寬嚴得體操縱有度者蓋多焉昏墨以自敗者不論也其間飾乎外而侈乎內者有矣毛舉細事而忽大體者有矣媕婀容默而枉直失措者亦有矣肆威以馭下怙勢以侵官者又有矣吾邑前輩老長之有見於此者公其是非以教後進謂朝廷之置御史所以警官邪振綱紀摧惡而佑善者也夫人之難知事之易惑自古然矣而皆有理焉理之可者與之其所不可者則從而正之虛心以觀理而已矣而何為是紛紛哉彼其紛然於事而不能當於人心者理不足以勝私故也斯言也其殆所謂確論者乎豫聞而欲試之久矣而不豫試也本清今去為御史也其擇前之所善者而從之可也夫御史之職當世之所甚重故其秩滿則去佐大藩守大郡不細矣然常樂御史之勢者得之反不樂焉此無他素不能以理自處且處人也故亦慮乎人之加已而為是戚戚也本清其亦務循理而已矣豫言迂也豪傑之士之所厭聞者也以本清之相厚故竊言之蓋欲有警而自勵焉非敢白於衆也本清其果有取於豫言也哉送劉教諭詩序吉水劉肅敬伯舉進士得興化教諭能以其學教諸生諸生傳其道以有成者多矣今年考績來北京以最當升敬伯不願也請於吏部仍得祁陽教諭以去鄉之士大夫官於朝者咸重敬伯作詩以送之而屬豫為序蓋朝廷以科舉責賢於教官教官之升黜視其徒貢舉之多少教諭得三人以上則升為教授教授得九人以上則進為國子師其崇儒責實之意可知矣然教授之員不能多缺也故凡當升是職者必使從事於諸司以待焉往往彌歲月弊精神貶抑其所志以自混於庸衆之流奔走求效其尺寸吁亦窮矣惟有志之士不務乎外者乃能異於衆人之所為蓋凡沾一命皆足以為榮能舉其職皆足以為報豈計夫位之崇卑祿之厚薄哉若儒者之職則以道行為賢古之君子有道而處下者衆矣然能有以教當時而儀後世人固不以卑而少之其有居卿相之尊享千鍾之祿可謂盛矣茍道不行君子不貴也然則有志於行道者誠有待乎其外否邪雖然君子欲其道之行於人必先有以善其身身不違道然後人有所法蓋為之有本末而施之有次第聖賢之所以為教者如此敬伯為教官有成績其亦知善其身以淑諸人者也今之祁陽祁陽於永為屬邑元次山周濓溪胡安國鄒道鄉輩之所嘗涖也濓溪之道實接孔孟之傳其餘數君子亦皆聖賢之徒也盛德偉行高風直節百世之下猶使人起敬起慕况永之人親被其化哉父兄之所教詔子弟之所傳聞也習矣夫教人者莫切於耳目之所習則言易入教易從敬伯之所以為訓宜無舍是也則將有感發興起以進其道者其效當有盛於前者矣於乎此亦其人之欲也豫既重敬伯之恬於進而又欲其篤於教也故為序其詩而不辭盧道清挽詩序東陽盧道清既沒三十年其孫睿為進士在北京懼其德之不彰也求翰林修撰曾鶴齡為之傳士大夫因睿而知道清者咸賦詩哀惜之睿又因鶴齡而求豫序蓋道清孝友人也早失父而事其叔如父撫二弟極有恩二弟既長且娶求分財道清多推與之叔老有二女不能嫁道清出資裝嫁之暨叔父死喪葬尤盡禮其內外屬有迫於吏議無資以自脫者道清皆為出重資釋之而卒不責償如此者凡數人其為萬石長民貧有不能輸稅者道清皆為代輸嘗得遺珠一囊輒求其人還之至遇凶年每出榖以賑貧者其亷厚又如此所謂一鄉之善士其善行必有以蓋於一鄉若道清者豈非其人歟夫世之人多矣蓋有疾惡於其生而欣快於其死又將傳播於後而纍及其子孫者以其無善行故也安望其能哀惜哉今道清之死既易世矣士大夫猶哀惜之而形於言豈牽於私愛也哉蓋好善惡惡出於天性然也道清雖不仕而卒有孫居官食䘵蓋駸駸乎通顯矣安知他日不䝉國恩之褒寵也乎此又可見為善者之有後也豫故著其行以為詩序使讀之者有所考徵而知諸公之不徒作也蕭則善挽詩序豫泰和石岡蕭氏有隱君子曰則善先生以惇厚信讓重一鄉一鄉之人尊其德化其善皆稱之曰三溪先生方先生之沒十餘年豫年亦十七八矣鄉之鴻儒碩師凋謝已盡思得質厚之君子而親之庶幾有益乎已而不可得於是聞先生之風而興慕焉其後與先生之孫省身同學於邑庠又得先生所為石岡十景詩而讀之而知其學問之懿其興慕加焉嗚呼世之所以風淳俗厚者豈獨長民者之責哉蓋其鄉之善人君子有以化導之也彼其孝於親敬於長慈愛於其幼而忠信於鄉之人言之有實行之有常後生小子得於耳目聞見之深相薰而為善此風俗之所以淳厚也魯多君子故子賤得以成其才然則善人君子之有益於鄉之人豈細哉此豫所以重有慕於先生也孔子曰聖人吾不得而見之矣得見君子者斯可矣善人吾不得而見之矣得見有恆者斯可矣若先生者非吾鄉之善人君子歟思之而不可見則豫之形於言豈得已也哉省身與豫同舉進士今纍官至河南右布政使欲先生之德之傳之逺也故求左春坊大學士曾公子棨表其墓京師士大夫由是而慕先生者皆為詩以致其哀惜之意豫蓋素慕而不得見者今亦老矣而心尤不忘也故遂為之序云送歐陽進士序泰和歐陽氏與宋文忠公同出吉州刺史琮之後代有顯人入國朝以來為尤盛處者皆有忠厚樂善之稱仕者皆有文學才行之美蓋他族罕能及也豫少時常得拜三峯先生與俊民觀民信翁三長者皆衣冠偉然言動不妄其忠厚樂善蓋所謂一鄉之望者也而益都丞允堅淶水縣學教官允清國子助教允賢禮部主事允俊與今雲南按察副使允和益都之姪廣沄助教之子廣哲皆以科第發身文學才行表然著稱縉紳間歐陽氏之多賢如此君子蓋有以知其世澤之未艾也今年春廣洙又舉進士中甲科朝廷欲大其才而用之使歸其鄉加學焉於是士君子益為歐陽氏榮之而豫於廣洙則竊有願也蓋科第者君子之所由進而非其所以顯也君子豈以一第自足哉以一第自足者常人之情非君子之道也君子之道本於修身施之事親敬兄推而至於致君澤民而後已焉故由科第而進者所以行是道也而君子亦以行道期之其道行則貴顯於當時取重於後世而於科目有耀矣其可忽哉廣洙歸其鄉而益進於是道他日出而用焉無愧於科目無負於國家無忝於祖宗世德之隆斯善矣豫與歐陽氏有世好而豈可以常人待廣洙哉故為贈言如此亦廣洙之志也歟抑菴文後集卷十六
