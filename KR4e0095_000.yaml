body:
  text: 抑庵文集别集類五明提要臣等謹案抑庵文集十三巻後集三十七巻明王直撰直字行儉泰和人永樂甲申進士改庶吉士授修撰厯事仁宗宣宗至少詹事正統間拜吏部尚書天順初以老疾乞休卒諡文端事蹟具明史本傳直器識厚重有大臣之度在銓曹十六年奉職公允為一時之最當英宗被留漠北景帝憚於奉迎直首請遣使力持正議大節尤不可奪其詩文典雅純正有宋元之遺風自永樂時即承命入閣典司制誥凡朝廷著作多出其手當時與王英齊名有西王東王之目而直尤為老壽巋然負一代重望蕭鎡稱其文汗漫演迤若大河長川沿洄曲折輸冩萬狀葢由蓄之深故流之也逺其揚詡未免稍過然明自中葉以後北地信陽之説興古文日趨於偽直當宣徳正統之間去明初不逺淳朴之習未漓所作貌似平易而溫厚和平實非後来所及雖不能追古作者亦可謂尚有典型者矣集為其子檢討䆅所編成化初其次子稹復加校訂而以原集未録及致仕家居後所作别為續集附之於後云乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:53dbfc0a790c4a57908b4ad9d80b5f24ffe00f8f66bbca3a7376899730baa04f
