body:
  text: 抑菴文後集卷二十二明王直撰序贈陳知府序天下之郡百數十而杭最有名蓋湖山之秀民庶之繁室屋之華麗商賈之所輻輳四方物貨之所居積天下莫盛焉官於是者其居處之崇髙服食之豐美輕輿肥馬之往來騶奴從吏唱呼導擁於後先閭巷之人奔走辟易仰之如神明是非榮辱惟其言之聽夫有地千餘里其民無敢不服且又當天下勝處而所奉若是誠可謂宜矣蘇子嘗曰君子之仕也以其才易天下之養也茍有益於民雖厲民以自養不為泰斯言也仕者或取焉以豫觀之蘇子蓋有激而云非天下之至論也君子雖勞心以惠民乃其道之當然豈思為已哉蘇子凡再治杭實惓惓於民事使飢者得食渴者得飲病者有醫藥耕者有所灌溉然後以其餘間而樂其可樂豈肯厲民哉豫是以知蘇子之言非天下之至論蓋有激而云也士之志於道常少厚於自奉常多以為居其位者當如是而於民事不暇計也夫誠有益於民猶不可自養而厲民況未有益乎昔范文正公常日計其所為足以當是日之奉與否不然則愧怍不自安必求稱而後已行道之君子所當法也今朝廷重郡守必舉賢而任之是深有望於賢者也三山陳復本初為户部主事有名大臣薦之得杭州知府其相與厚者託豫姻友禮部主事龍叔粲求豫言為贈豫未識本初叔粲稱其端重恬靜敏於道而訒於言若然誠所謂賢者也其能有益於民而享其奉也宜矣然今所繼者蘇子之任也慮或不察其言與范文正之事故書以贈之亦庶幾乎愛人以德者本初其亦亮豫心否乎贈畢通政序錢唐畢君昌字文殷官于考功二十年以清慎得名京師士大夫皆重之既滿超拜通政司右通政當之南京其友潘勤進學輩皆喜其升也求豫文以贈行今之通政司蓋古納言之職所謂喉舌之司也上之政令敷於下與下之有事奏陳者皆由通政司審核其可否疏駁其違謬當聞於上者即以聞其餘則以付諸司行之文牘常堆案盈几欲頃刻自暇不能也其重且煩如此惟賢而後能舉其職不然則有壅滯寬縱之病是故必擇賢而任之非賢不與也而考功之設所以考課天下之人不間於已仕未仕者皆得以進退黜陟之進退黜陟而適其宜則治道興不然則賢者無以勸不肖者無所懲職廢而事隳矣其重且煩蓋與通政司無以異也畢公在考功既久而譽益著則宜其職可知今去為通政夫安有不宜者哉然豫求之古人舜嘗以命龍矣而龍之所以修其職者不能詳也成周之時仲山甫嘗居是任蒸民之三章曰出納王命王之喉舌其上章則曰仲山甫之德柔嘉維則小心翼翼古訓是式下章則曰既明且哲夙夜匪懈夫既有柔嘉之德而小心以進於學明於理察於事又致其勤如此此其所以賦政于外而四方爰發也此其所以為賢當時誦之後世慕焉者也豫知畢君蓋深有願焉夫以古之大賢君子待畢君厚之道也故序以贈其行贈屈僉憲序貴州古蠻夷之域其地多大山深洞草木叢茂其人皆依險阻為巢穴無禮義之習獨好剽掠賊殺前代惟羈縻之使無為民患則已不以中國之治治也入國朝來皆順服而所以處之者悉因其舊永樂中酋豪弗靖太宗皇帝撫定之於是如其請設貴州布政司及府若州以統之又置兵以衛之一如內地然亦簡節疏目要在使之安而已又慮其施有未善也復設按察司以臨之蓋使蒞乎上者所施無不善而其人無不安則按察司之職也非賢孰能任之番昜屈伸時行為按察僉事有年矣甚宜於其職蓋時行初以明經取進士為吏科給事中其在朝已久深知天子仁民之意是以任之而宜也非當時所謂賢者歟今年述職來京師上施恩而遣之其鄉友胡秉常與豫交最善屬豫贈以言今之按察司十有三而貴州號簡靜不知者以為易治豫獨不敢以易視之蓋知禮義之民可以禮義曉則治之不難彼既不能知禮義而習為非諭之以理則嚚加之以威則狠戾而生怨或有事焉而欲其帖然平弭然服豈不難哉必欲得其情惟誠信而已夫誠信可以孚禽魚貫金石彼固異於禽魚金石也古之人有行之者矣然非可一日能也積之之久而其效著矣時行佐其長率其屬推行天子之仁而加以誠信貴州之人將感化而歸於善一切不異於中州可必矣時行其有取於豫言哉贈右僉都御史丁君序正統三年十二月詔以監察御史丁璿為僉都御史丁君字仲衡上元人與豫同登永樂甲申進士第為工部主事以勤慎得名既而坐纍浮湛於外者久之而其志彌勵其善益不可掩洪熙初詔求賢才當路者薦君擢拜山西道監察御史以憂去服除改湖廣道君外和內剛出入中外凡有所按舉激揚屹然不動聲色而事無不宜人無不服於時論御史之賢者必稱君及是命下士大夫皆為喜以為不忝於其職而豫之喜加焉蓋自甲申以來厯三十五年聞君之名而未得一相接嘗自謂同年升者不為不多而躋於顯融者蓋甚少若君者其可久淹於是哉今而見其進且同朝謁接殷勤其喜蓋可知也通政司參議虞君祥與君同居京師且嘗同學知豫之厚於君也屬一言為贈豫謂贈者有所增益之謂也以君之行之才施於政事熟矣顧豫區區筆硯之間知乎此而不知乎彼通於古而不通於今其何能有所增益哉雖然書有之曰學于古訓乃有獲古之道今之師也昔者尹吉甫之贈仲山甫也道其德業之盛而勸勉之意寓焉其曰仲山甫之德柔嘉維則然其所以柔而嘉者乃在於柔亦不茹剛亦不吐焉其德既如是矣而又曰古訓是式則其學問之功蓋未嘗已也豫以仲山甫望君敢竊取尹吉甫之言以為贈君誠用之使人誇曰此甲申進士也則豫與有耀矣然亦豈非虞君輩之志哉贈徐少卿歸省序今上初正位東宫仁宗皇帝慎簡宫臣職輔導豫時以翰林侍讀學士備員右庶子徐君永達由編修進位右中允與豫為同僚蓋徐君始選自教官即從今上講學豫雖舊在翰林皆有職務不得從容相往來及是命也乃得獲定交焉徐君有文學恂恂信讓未嘗失色於人其事上也猶恭勤不懈每執經進講誠意懇至於夫古先聖王所以治心修身之道委曲詳盡上為之樂聞不厭至於職事當有所記注論駁他人或反覆為異同徐君獨問故實當何如不肯茍圖自便以故諸公特重之逮上登大寶位凡當時專任宫臣者皆以次升遷徐君遂去為鴻臚少卿豫二三人者乃以兼職翰林不與然徐君雖去猶相與敬愛如往時庶所謂篤於交誼與人有終始者當其在春坊時已蒙恩賜敕命封贈父母欲歸省以致其榮而獨不暇今始謁告往焉尚寶少卿袁君忠徹寺丞蔣君先等屬豫作文贈之嗟夫徐君以賢見用於時得推恩父母赫然光顯矣而何待於贈言哉然豫觀之昔者仲山甫之有行也尹吉甫作詩送之道其德性之美職業之修欲其速歸於王朝而無久於外蓋致其篤厚之意而勸勉焉者朋友之誼當然也則今之贈言可已耶徐君歸矣既有以顯榮其親而益思報稱於朝廷則當速來以修其職而致勤於夙夜之間毋徒淹久於外此朋友之望也故書以贈其行雙秀堂詩序雙秀堂詩若干首士大夫為劉仲倫甫作也仲倫甫居廬陵城西隆慶山之陽世積忠厚業儒醫其善之著也久矣於是芝生於其庭者凡再人皆以為祥既而仲倫甫之子英舉進士為大理寺副有名當時朝廷推恩任職之臣遂以其官封仲倫甫赫然有光於鄉邑人皆以為榮曰此芝生之應也天所以彰劉氏之善豈偶然哉由是士大夫皆歌詠之豫按傳記芝菌一物也又曰芝神草也又曰芝一嵗三華瑞草也蓋不種蒔而植不灌溉而榮乃至和之氣之所發而常生於為善者之家則劉氏之積其可誣也哉抑嘗聞之昔有蕭靜之者食芝遂不老則芝固引年之物也今生於劉氏非欲以資仲倫甫之夀以為為善者之驗歟是蓋或然也然善之積愈厚則其驗也愈盛昔之君子有以矯菌采芝自比於為善者屈原是已劉氏父子其益進於善則得於天者當不止是雖流芳百世未艾也其夀豈不益逺哉英字中美與豫最相知以其所得於士大夫者求豫序豫故為序之而推言其至如此此豫愛厚之意也送劉訓導序萬安與吾泰和境相接風俗大抵皆同其人多喜讀書以仕宦相上今年學校缺訓導縣大夫聞持藴名遣人以書幣走吉水訪其廬請之持藴至京師試翰林中其選遂受職以歸刑部主事郭循與持藴相善也求諸君子賦詩贈之而請豫序豫在翰林二十五年所見為教官者多矣為文以贈之亦不少也其所與言皆聖賢之道期之於逺而勉其成功然為之者不皆能用豫言蓋讀書明道彼其所能也而豫復以此聒之若以水濟水其不用豫言宜矣則豫於持藴可復以言相瀆耶而循求之不厭故以其嘗言者為持藴誦焉夫學校育才之地所以為致治之本也而師者又所以為之本也蓋聚於一堂之間以講聖賢之道使修於身行於家達於一鄉然後發之為文辭行之為事業其序蓋如此也然為師者必以身化之則其教可不勞而成持藴之去也尚謹其所為本之道哉然嘗思之遊於學校者皆俊秀之選也廩食以養者又選之尤也宜多翹然以出矣而今名薦書以進于有司者多出於增廣之員而廩食者反少焉何也豈廩食者在所教之外邪將天分之髙而待其自成邪抑以其逼而姑施施以相狎衎衎以自媚邪或為師者之教而獨厚於增廣者邪將所以為本之道未至而廩食有不慊邪何其成之異也萬安之學者豫不能詳而知矣若亦猶是也持藴當益謹其本以臨之其效必有異乎前之所云者若以為當然者則非豫之所知也故為序其詩而道之持藴其用吾言也夫其亦以為迂也夫送楊長史序宣德二年八月衛府左長史廬陵楊公季琛請老于朝天子重違其意俾歸老焉初公厯仕州縣以惠愛見稱為良有司仁宗皇帝大封諸子為王擇賢以輔之而公之子黻自監察御史擢為衛府左長史時公知莒州年已七十以子貴當封因請棄官就封兾得退休田里上知公之賢留公同在王府職輔導當時榮之以比漢二疏今復三年始得如其志以老焉大夫君子皆賦詩送之而俾豫序豫謂仕者所以行其義也至於老而衰遂請於朝而去之亦義也然惟有道之世以義制天下而後士君子亦得以義為進退我國家之制如此雖夏商周之盛不過也或者曰仁宗皇帝之留公也非茍為公榮蓋資其益焉耳今汲汲求去無乃非留之之意乎豫曰知其賢而留之上之義也知其老而且留焉所以副上之義也然精神筋力既不可強而能乃久處不去則於義果得為安矣乎公之汲汲求去亦揆於義之當然而已矣且公之去豈特便其私哉將亦有益焉使凡仕者皆知朝廷待人如此宣昭義問於天下而無盡瘁以仕寧莫我有之嘆一也在位之老而衰者皆知以義自處而無曠官之譏竊祿之嫌二也古之仕而歸者朝夕坐里門以教鄉人子弟使知君臣父子之道而篤於孝弟忠信今公之歸得以其道為教鄉人子弟將無不為才且良三也其為益如此則公之去豈特便其私也哉衆皆曰然豫於是書其説以為序贈龔君歸省序龔君名篪字孔宣蒼梧人也當太宗皇帝即位之初設科取天下士天下之士莫不奮然思有以自見於是中選者得四百七十二人豫與龔君在其間蒙朝廷寵待之厚既已布之列位矣今二十五年其出而膺方嶽之任當州郡之寄者不知其幾在內而副六卿居郎曹憲府者尚數十其才行皆顒然表著於當時議者謂初科得人之盛蓋不虛也龔君始為寧王府紀善改嘉定丞久之升北京行部主事尋改禮部又調户部皆以恭慎端厚見稱豫嘗觀其言論與其措置蓋所謂有志者也古之君子於人之有善若已有之况乎有同年之誼哉則豫之重龔君可知矣獨私計之今之進士一蹴而登方嶽之位者有矣自郎曹憲府九年而亦躋於是者有矣龔君升於有司登于仕版若是其久也而猶為所謂主事者其後之進者或過之自常情而言龔君宜若戚戚也而乃恬然安於其位切切焉思舉其職惟恐不及此其志豈尋常可及哉君子之仕以行道也茍有惠於民則君子樂之位之崇卑不校也龔君為主事掌徭賦其操縱緩急有以惠民與否豫未能悉知其恬然安於其位而思舉其職固君子之志也則豫之重龔君有已哉雖然升髙自下陟遐自邇茍志不移行不懈有不至於髙逺豫不信也龔君勉之而已龔君父秀榮得贈為主事母賴氏封安人錫以敕命援例得歸省其同官之賢求詩以贈之而屬豫序豫與龔君非一日之好故為序之送吳給事中詩序宣德二年十二月天子念軍政之不修敕選監察御史給事中之有才行者分行天下察治之於是兵科給事中吳叔霖與豫鄉友監察御史尹崇髙當之福建叔霖世居金華由進士為行人擢今官有名當時天子推恩追贈其父為給事母為孺人錫以敕命叔霖將請告焚黃墓下而適有是行同列之賢喜其過家之便而志之得也相率賦詩贈之而以求豫序豫謂古之君子使於四方雖急於王事而未嘗忘親蓋孝子忠臣之道所當然然而有不暇顧四牡之所以詠歎也由是言之公義私恩而獲兼盡焉者豈非君子之所願哉金華閩之所由道也凡往來者必至焉叔霖之去無曠日之久迂轡之勞而已即乎其地凡所欲致於親者可以伸其志而後行則公義私恩蓋兼盡矣宜乎諸公歌詠於其去也夫封贈之恩豫告之典皆仕者之幸也然如叔霖以使事之華而遂顯親之美者少矣况又天子之所選擇而使者其榮幸有加焉則叔霖之親雖不獲被於其身然沒而有知其慰恱可知矣鄉之父兄老長見叔霖之賢而膺朝命之重又有以為親榮如此其孰不歎且羡哉然忠臣孝子不如是而止也茍德業益隆則其榮為益盛君子又於其後觀之矣以是而冠贈言之端庶幾有益乎至於被服之鮮麗騎乘之安間騶呼儐從之雄冨鄉邑之觀如昔人所謂衣錦之遊而足以自快者非豫之所道也送趙僉事詩序宣德三年正月河南按察僉事趙君純朝正在京師與豫相見於闕下退又相與過從道舊故意豁如也蓋趙君番禺人宋宗室之裔往年豫先考知瓊州豫兄亦往來省侍因數過番禺趙君方家居遇豫父兄甚有禮由是而知趙君其後舉進士為御史而豫已竊官翰林因又與豫相好加厚焉趙君有美才循行議論侃侃於凡士大夫皆恂恂恭讓未嘗失色於人以故人皆重之不獨豫然也故今之還春坊犬學士曽公子啓王公時彥與凡素相厚者皆賦詩送之而謂豫宜序嗟夫趙君獲交於豫父子非一日矣豫言何敢愛也况有離別之感契闊之懷者乎然君子之於朋友以德誼相尚非以言為恱也則豫於趙君何可有異哉蒸民之詩尹吉甫送仲山甫而作其曰柔亦不茹剛亦不吐皆其柔嘉之德之發也謂之柔嘉者柔而不過其則蓋有剛德存焉惟如是也故不吐剛不茹柔今按察司之職所以佑善而摧惡惡者既治則善者斯立矣而惡之中又有強弱焉強者有恃而難去弱者無援而易摧然校其惡之淺深則強者所當急也由是而論柔則茹之剛則吐之其可哉且君子之居斯位也視吾法之所冝而已顧以強弱為取舍乎世之惡而強者蓋多矣善人之不立職此之由也故豫以仲山甫而望趙君焉然仲山甫之所以柔嘉者又有學問進修之功古訓是式威儀是力之謂也君子之學不以貴而畫不以老而倦故德業益盛趙君其尚勉之此豫相厚之意也故書以為贈行詩序送郭知縣序令之於縣非特行政也有教焉政以正民行而教以善民心民惟知孝弟忠信然後能尊君親上而易以興治教之不可以不急也古之治民所以能成其德業而有譽於後世者以此金華令郭侯瑛蓋有志乎古者也金華故文獻之邦郭侯始至即思有以嘉惠其人乃新廟學飾聖賢像貌以嚴立教之本暇即至學宫與師生講聖賢之道與夫所以修身治人者而次第行之邑之人士知侯之厚於已也相與率侯之教凡有所令皆勸趍之於是上無廢事而下有樂志治用以成居三年考績來京師吏部最其課將歸金華監察御史武義嚴君繼先過豫道侯之善而求文以贈之夫天下之為縣者多矣賦稅力役徴輸調發有司之所急也令之不才往往以是受譴幸而為才令得免於責足矣至於教則委之學官一不以屬意若是者皆茍而已惡知教民乃為政之本乎郭侯獨能加意於有司之所不急而以興學立教為本而卒收為政之效非所謂賢令者歟周詩曰豈弟君子民之父母豈以強教之弟以恱安之郭侯蓋知此矣是宜其得民也武義金華鄰邑嚴君武義之賢者也為縣而使鄰邑之人亦愛之已難矣况又致譽於賢者之口乎則豫於郭侯安得不深嘉之哉然豫觀之仕之有譽者亦多矣茍非有卓絶之識堅持之操則所以致譽者豫特見其初而已郭侯英才美質有恭慎之行而知效法乎古人茍持之以誠益之以無倦則將無所不至焉者矣豈但為賢令而已哉彼宦成而怠者庸人之情郭侯慎無以庸人自待也此豫與嚴君相厚之意也故書以贈其行送尹訓導序尹氏居泰和之南鄉宋進士絳之後自絳以來有顯者洪武中務厚先生為邑庠訓導質直好義有古長者之風凡從遊諸生與故人親戚子弟由先生之訓而有成者甚多其教於家尤篤故其後益盛先生去為上海教諭子復道亦領薦書今任荆州府學訓導自道為同知於澄江諸孫哲英皆典教縣學今克岐復被薦分教三河克岐復道子也一門衣冠之盛蓋他族罕比豫與自道昔同遊鄉校而復道於豫為姻家斯文之好姻戚之誼則豫於克岐之行可無一言相贈乎夫學校者育才之地而師又才之所由成也譬之器焉規圓則物從而圓矩方則物從而方未有舍規矩而能方圓者北方水土深厚風氣淳固故其所生多魁壘雄傑之士然所以成其德達其才者惟於師是賴必讀聖人之書而講明其道從容以揉之勤厲以朂之入之以漸而持之以久則其成可冀矣今制以科舉取士而教官之殿最必視貢士之多少具有定數其責成也至矣往年北京鄉試豫為考官其去取蓋甚嚴其視所得士或一縣二三人或連十數縣無一人問之其得之多者必其師之善教者也豫益信夫天下無不可成之才視其師之教何如耳克岐勉之教官子之世職也豫將又於子乎觀矣其毋以豫言為迂也送王參政詩序宣德三年二月丁丑詔以前山東右參政王芳蓀為河南右參政王公字瀘源安成人始由郡博士擢拜禮部郎中以學行見重當時及為參政於山東山東之人既受其惠矣今而之河南士大夫復喜其澤之及民也相率賦詩為贈而以序屬豫豫觀之昔者仲山甫之有行也尹吉甫作詩送之道其德性之美職業之修而殷勤願望之意寓焉今諸公之詩亦猶是矣豫也非子夏之倫而何敢序其首乎然不能辭也今之布政古方伯之任而參政實佐之所以布上德化下人然布政不常出不得親接乎下參政或以事數臨郡邑於夫德之孚人之化與否可以親接於聞見而制其所宜夫既預其事而勢又便如此則布德化人之效可獨望於布政矣乎故豫亦舉方伯之事之大者為王公誦焉周之初召公為方伯循行南國以布文王之政當時在位之君子皆有節儉正直之德其女子亦皆安於禮義之中推其仁民之餘恩又使庶類蕃育而王道以盛其化之成如此故後人思之至不忍伐其所舍之棠百世之下猶稱之不衰孔子曰見賢思齊則今之同其任者可以自貶乎王公為佐於河南其治效之美有一未至是焉皆君子之所望也且召公亦嘗􅊩乎洛矣今其書之存者惓惓於諴小民疾敬德之言雖所以告君如此然未有無諸已而徒語乎上者也則公之所存所施可知矣王公副方伯之任而履召公之所履必無愧於召公使後之人有所稱述於無窮則善矣此豫愛厚之意也故書以為序豫友蕭省身今為河南布政使其學行之懿為人所推重也久矣王公尚舉豫言質之以為何如也贈尚書魏公致仕序正統八年三月刑部尚書魏公以足疾求致仕上知其實許焉蓋公嘗奉命有事於蜀中乘傳至寶雞馬蹶傷其足骨皆離窽亟求醫弗得舁八日至西安始得醫治之然氣血已凝齟齬不相入雖若小愈實痛楚不自勝既歸任事嘗苦之乃具以聞乞放歸田里上特免其朝俾任事如故蓋察其賢而惜其去也今年疾加劇嘗告豫曰吾蒙天子之仁厚矣然坐而食祿不能一造朝或一造朝則命小吏掖以進此豈事君之義哉吾愧於心奚可以不去乎豫推上意勉留之公曰吾義當去何暇顧子言復以聞及命下人或為公喜公則愀然曰吾遇仁聖之君乃以疾去不得終事焉此吾之不幸也何敢以遂私為悅哉由是人知公之心非茍欲求便者蓋出於不得已也將行右都御史王公篤交友之誼乃與同僚盧公程公謀曰昔韓侯之歸其國也尹吉甫作詩送之則今之贈言可少邪於是屬豫言以為贈豫謂昔之仕者謝事而去有以聲問不至於朝廷者為髙有寤寐不忘而進言以禆治道者君子皆有取焉夫既曰致其仕矣則雖無言亦可也然嘗居大臣之位一旦以疾去君臣之義未盡也凡可以輔上德利下民者其可默邪愛君體國大臣固當如是矣公仕宦將四十年上之寵眷不薄也則今之去固當盡大臣之道若泯默以為髙則踈逺小臣限於形迹拘拘自守者之事非所望於公也請以是為贈顧彥章慶八十詩序姑蘇顧彥章義人也豫未及識之而能知其為人蓋嘗得之於今禮部侍郎魏公稱彥章嗜義如飢渴之於飲食其賙人匱乏振人於危急不可一二計范暹啓東居京師喪其母將奉柩歸葬姑蘇而患不得地魏公俾持書告彥章圖之彥章亦未識啓東得書慨然曰吾幸有餘地可使子之親無所託乎况重以侍郎之命邪即割地光福山麓以與啓東啓東治墳遷其父合葬焉既畢來京師而又有白金之贈啓東感其德延譽於諸公間不置口且謁豫告曰山之地既勝而松楸亦蕃茂望之鬱然暹之父母皆幸安於此其地又數産靈芝此豈暹所致哉顧公之德之應也吾無以報公明年公八十暹將求諸公之詩歌誦以祝公夀幸嘗辱知於大人敢請一言以辨其首庶幾以為公榮豫既嘉彥章之義思欲彰之以風夫未能者然不暇作也而啓東數來請豫文雖踰年不厭豫念心許之矣豈可辭世之人有千金之産而不肯施一錢視其親戚死亡而不恤况他人乎况未嘗一相接者乎彥章之於啓東如此蓋可謂古之君子也已宜啓東之惓惓不忘也豫嘗讀書見古人有德者則必以夀祝之蓋敬之至而欲其福之永也南山有臺之詩宴饗通用之樂歌也於夫樂只君子既以無疆祝其夀矣且謂夀本於德故又祝其德音不已又以為德之盛者福不止於身將必及其子孫故又曰樂只君子保艾爾後殷勤篤厚之意何其至哉啓東感彥章之德而致頌禱焉豈不亦猶小雅詩人之意歟彥章之德不已則其福亦烏有已哉詩凡若干首作者皆京師士大夫為之序者泰和王直行儉也觀者亦有所興起也夫魯庵詩序撫州太守王侯日初名其庵曰魯庵豫同官金溪王公時彥記之既盡發其義矣翰林學士李公時勉復屬豫一言以啓士大夫之歌詠王侯與豫三人皆同年進士李公屬言於豫豈以豫言為同心之言也與則豫其何可辭然念王侯揚厯中外久矣其文學政事著於人之耳目固已光明俊偉非衆之所及矣今被天子寵命以一郡生民付之其剛毅之操豈弟之化能使其善者恱而安不善者畏而改亦無愧於古之良吏矣顧乃慊然不足而以魯自名孔門弟子曾子號為魯然卒傳聖人之道王侯之志希曾子者也先儒謂曾子之才魯故其學也確確者其志堅其所得也固王侯之希曾子豈真魯也哉蓋亦以其確也聖人之道傳之曾子而於大學之書明德其本新民其末王侯素所服行也今老而猶篤其深造也固宜如是則凡前之見於事者皆其效也豫嘗觀夫世之為政者矣蓋有衒聰明矜巧智以自逞而無篤實之學質厚之意凡所為者茍求快於目前民之受其病也多矣使皆如王侯則安有是哉故豫推明其所以名庵者而深起敬焉且知其修已治人之效將有盛於今凡士大夫亦何可愛於言哉故書於卷首以為序贈王知府詩序王璜子玉代人也其在翰林久矣有豈弟之心有正直之操且闓疏坦亮遇事一制以義不茍為避就自師保而下皆重之嘗謂子玉可以當方面非久在文翰間者會知府有缺命大臣舉賢而任之副都御史賈公即以子玉薦時子玉以憂居家今年服除來北京吏部言於上以為安慶知府安慶於淮右為名郡其山水雄秀而田土沃衍魚蟹麥禾之富足以資民用而其人皆淳直徑果無竒邪之習故易於為治非其他僻陋碞險者可比也夫君子之學道必得位而後行茍得位矣而處非其地不行也蓋嚚頑之俗諭之而不知令之而不從豈能如志以治哉以子玉之賢得安慶而治之庶乎其相遭也然豫聞之郡守以養民為職非止治其常賦而已養民者衣食以養其體禮義以養其心衣食不足而欲循禮義不可也必去其所害而興其所利使得盡力於農桑然後衣食之用足衣食足而不知禮義不可也必謹庠序申教化使皆務孝弟之行勵亷恥之節然後治郡之功成此天子任賢之意而賢守之當務也昔之守安慶者在唐有胡珦獨孤及張知謇安慶之賢之出守者如文翁在蜀朱仲卿在東海其治行之美國史書之百世慕之以子玉之賢欲進而與之並豈難哉要在勉之而已勉而及之使人皆敬慕焉曰此翰林之所儲也則於豫輩有耀矣子玉將行其諸同列修撰許彬道中輩求豫序其贈行之詩豫亦素厚子玉故為序如此以送之贈魏尚書致仕序君子之仕也揆於義而已矣義之所可雖卑位薄祿而必安於其職不敢茍去也義之所不可雖髙爵厚祿必思辭而去之不敢茍留也孔子曰君子之於天下也無適也無莫也義之與比豈以爵祿為纍哉君子之道幼而學之壯而行之義也及其老且病矣雖欲勉強行道而力不能如其志於是有致事之禮休告之令惟上之所倚下之所賴不可一日去朝廷則上之人必勉而留之而為臣者非甚不可亦當鞠躬盡瘁而不敢顧其身皆義也然人誰不欲富貴而義不足以勝私於是既老且病當去而茍留者唐之詩人則形於諷詠至于有宋或付吏議以繩之下失之貪上失之薄君子蓋深惜也我國家之於羣臣進退必以道其在位者亦克謹於義而無留祿之人誠太平極盛之世也刑部尚書魏公以清德重望著於時其初以足疾求致事上既勉而留之至是疾加劇不可以茍止也則力請而去魏公蓋篤於義者而上之待之盡其道賢於昔之為君臣者逺矣魏公將行繼其任者鳯陽王公與侍郎郭公楊公謀所以為贈者乃相與徴言於豫豫言何足以贈公哉夫大臣者衆之所望也而義之在人蓋無不有者豫故書魏公之義與夫朝廷進退大臣之道如此其至使凡見公者知其然而思則之而後之人亦有以知今之為盛也贈楊知州序太學生郝璜因其師梁叔莊來請於豫曰璜光州人也光之守楊侯名升字繼明世家廬州之六安宣德中嘗守陳州以代還改光州侯以忠厚之心行公平之政其所好惡與民同故凡設施無不便於民者凶歲即發廩以賑貸不足則勸富出粟以濟之嵗豐民和則大新學校而與諸生講學於其中明孝弟之道以道民侯之德如是一郡之人皆敬而愛之今再考績當還敢請一言以為贈庶乎其有光也豫辭以未識繼明且不暇作而叔莊與璜再三來速文不厭曰揚善成美君子之志也願勿辭豫觀其意殆誠有感於中者乃為一言傳曰民之所好好之民之所惡惡之此之謂民之父母光之民多矣好逸而惡勞好生而惡死樂飽暖而厭寒飢喜孝弟而憎悖逆其情蓋同也為之守者能與其所好而去其所惡使無不遂無不得者父母愛子之道也楊侯能與民同好惡而教養之則固子視其民矣民有不敬愛之如父母者乎古之君子治民者功著於當時名流於後世豈有異於是哉後之君子乃有異乎是篤於為已昧於恤民於民之好惡有倒行而逆施者欲免於怨憎且不可而兾望其愛敬可得邪楊侯善治其民而民之德之如此豈非今之賢者乎兹考績而歸尚益篤其道而不渝乎初則前所謂古之君子功著當時名流後世者又於楊侯見矣楊侯其慎朂之哉贈張真人還山序宣德三年八月正一嗣教清虛沖素光祖演道崇德守靜洞玄大真人張君宇清既仙去遺命以符印副姪茂丞俾嗣事於是茂丞奉遺蛻藏之山中遂來朝天子如其志封茂丞為正一嗣教崇修至道保素演法真人仍領道教事茂丞既受命將歸龍虎山其素與厚者太常丞張以清吏部郎中程南雲中書舍人黃振宗章文昭求豫言贈之豫聞漢張天師修正一法于蜀青城山以不已之誠而致無為之化其所以能興福祥去疵癘者蓋非一今其書具存可考也後之嗣者多能推行其道而有惠澤及民故厯代禮之至於我朝聖聖相承篤意民事凡其所行蓋純乎仁義之懿然他茍有利於民者亦未嘗不重蓋無所不用其至也况云有道之士能為民捍患興利則爵命以榮之亦宜矣抑所謂有其舉之而不廢者也豫嘗識道合無為闡祖光範真人宇初及宇清君其所以修於身惠於人者人皆能知也今茂丞以清俊拔俗之姿而嗣其教蓋於漢天師為四十五世矣盛矣哉其傳之久也自漢以來千餘年雖陵谷有變遷而張氏之傳如此其久且盛固作於前者道德足以啓之亦豈非繼於後者能承藉而光闡之歟茂丞益修其道持之以誠守之以中正斯亦美矣豫又聞龍虎之秀甲東南雖天台鴈蕩匡廬羅浮不能過真神仙之所處也宜必有乘雲馭風騎麟翳鳯翩然而來者茂丞倘遇之其進於道而能施利於生民無愧於爵命之榮與祖宗之副授也審矣豫老且病思自放於山顛水涯寂寞之濵然國恩未報不可以遽去他日倘乞身南還尚當從茂丞問之有可以已疾而引年者亦庶幾得之也贈何縣丞詩序福建為縣凡五十其物産之饒固有足珍者而建陽又非他邑所及蓋其書籍行天下天下家傳而人誦之賴以知夫堯舜禹湯文武周孔之道修身齊家治國平天下之方與夫天文地理禮樂律厯制度名物之微騷人墨客之文章醫藥卜筮百家衆技之説凡人之所宜知者其書皆建陽出焉有益於世甚大視物産之竒不足言矣然既久而弊生君子有慨於心者蓋板不能以無蠧而字畫不能無缺且訛者補而完之斯可也因而去之使其文至不相續不可也其文至不相續而欲求其義不失其意其可得哉此學者之甚病而君子之所以慨于心也久而弊弊而復振不有嚮道之士其孰能之南康何侯景春之為丞於建陽也而旴江張侯光啓實為令蓋所謂嚮道之士也政事之暇而汲汲於書視其板之蠧者使新之字之缺而訛者使補而正焉於是建陽之書復整齊完好使天下之人皆得善本讀之快然於其心而無嚮時之病者二侯之力也書有益於世二侯有功於書則大夫君子安得不深嘉而樂道之哉今年景春考績來京師既復職而歸重景春者皆作詩送之而屬豫序豫謂景春之善其政固美矣而莫加於善其書蓋書者教之具也景春其知重夫教哉故特言之豫老且病於他物寡所好而最好書蓋儒生氣習猶在也二侯其有以饜豫所欲哉樂安謝氏宗譜序樂安龍頭岡謝氏宗譜譜謝氏之居龍頭岡者也初謝氏從晉南渡居金陵衣冠文物蓋與王氏等族屬既衆又散徙諸郡其居撫之赤欄門者蓋靈運之後也靈運則康樂公玄之孫祕書郎瑍之子為臨川內史子孫因家臨川世逺益蕃於是又分為六族有居廣信之弋陽建昌之錕唐崇仁之潭陂謝坊樂安之麻江洙唐者其仕與處雖不同而皆不失前時之望今居龍頭岡者則又自洙唐徙焉其先皆有譜牒足以正其本聨其支自元之季兵燹相仍故老舊文無復存者雖或有紀録得以考見水木本源之盛而不能致其詳昭穆尊卑亦或有慨於心者此龍頭岡之譜所以作也譜作於浙江參政輔斷自初遷之祖惠卿始惠卿子葵軒子均福仕元為提領均壽亦取進士官至耒陽知州因家耒陽提領之後幾傳為今參政及參政子紘與其孫璠等凡十一世皆具載新譜而舊譜亦不廢存之以備參考於前之分也不忘其所自而後之來者得繼續於無窮此參政承先裕後之意也夫作譜之法譜其所可知而闕其不可知欲以傳信也譜足以傳信而凡載是譜者皆能尊祖敬宗正倫理篤恩誼則後世之悠久盛大有已哉自晉以來變故多矣而謝氏子孫猶若此其盛非立乎其先者有以慿藉維持之與然嘗聞之昔范宣子謂其保姓受氏厯虞夏商周之逺可謂不朽矣而叔孫穆子乃謂之世祿非所謂不朽所謂不朽者在於立德立功立言今參政盛年美才行方大用於時視其所當立者而勉之為之子若孫者又勉焉而日進光於前人而賁賴其後嗣則此譜傳之百世有耀矣故為序而道之貴溪吳氏慶壽詩序天之於人與之以盛大悠久之福必其敦厚純固之德足以當之不偶然也洪範五福其一曰壽而必本於攸好德人能修德於身而受福於天如持左契交手相付者蓋有矣未有無其德而能獲焉者天蓋不如是之昧昧也兹豫觀於吳立之祖母而益信吳貴溪故家立取進士為刑部主事祖母江最賢其在家為賢女既歸為賢妻及有子孫為賢母蓋事上撫下奉祭祀待賔客接內外屬疏戚貴賤莫不盡其宜孝敬儉勤端重誠至九族用為楷法以前庚子嵗生至今甲戌厯年九十又五矣九月二十日則其生之日也子世賢年七十生於十月朔日孫大春亦五十後祖母六日生旬浹之間遇生辰者三焉大母紅顔白髮坐堂上子孫親屬奉酒肴羅樽俎各以次稱夀興拜鼓舞以為歡必霑醉而後罷及世賢大春之生亦如之嵗以為常親戚鄉閭以為天下之樂無過此而世之能得者鮮矣今立在京師而稱夀之日至惜去鄉逺不得隨子孫之列以祝長生其心蓋闕如也乃求在朝士大夫為賦慶夀之詩遣人持歸俾歌詠而頌禱焉謁豫言其詳而請豫為之序且曰立之家夀者蓋不止此伯母羅七十有五次叔世傑叔母李氏裴氏俱七十是亦人所難得皆大母盛福所及也亦宜牽聮得書以豫計之前庚子之嵗聖朝平定之勳甫集也而清淑淳和之氣已見於發育吳氏之祖母得之以生是以能若是久且盛也非其得於天與修身者足以為之本歟今將百年而享福未艾使為子孫者因其本之厚而加厚焉各勉於善以引長之德音不已則夀考無期矣豈止百年而已哉故為序之使後之人得而誦焉有以知夫太平之福澤之在人如此而吳氏之盛可考也詩凡若干首汝寧府志序郡邑有志尚矣若夏之禹貢周之職方秦漢唐宋之典籍載其山川風俗人才物産貢賦之詳為天下者得有所考據以施宜民之治而仁義之道行焉世逺事殊文獻不足損益措置或有爽其宜者此書不可無作也我太宗皇帝在位時稽古右文既修永樂大典以資盛治矣即詔禮部搜集舊文欲作志書以著一統之大而未及成書今皇帝尊臨萬邦繼志述事遂遣使者分行天下詔諸郡縣並加采輯悉上送官將以成當代之盛典而彰萬世之洪圖也汝寧府故豫州之域自虞夏來為中州善地國朝以隸河南布政司其建置沿革與其地之所有者載之於書久矣久則不能無弊也今太守項侯欲修輯而未暇詔命之來祇奉惟謹課諸人士采録無遺既以成書而進於上矣欲鋟其副於梓藏諸郡中以備他時考覽焉書來京師求豫為之序豫謂河南為郡七自昔以富庶稱而汝寧尤為人嚮慕大賢君子道德之懿名節之顯孝義之著詩禮淳厚之習至于今不替此豈一日能致哉其漸摩成就蓋逺矣項侯之守此也當天下太平聖天子嘉惠斯民休養生息而得施其撫循教誨之方使閭閻畎畝之間皆樂生興事而安於其所今又為書以達之上亦將以儀于下而傳於永久此賢太守之事皆可書也故豫樂為序之侯名棐字所勤與豫友蓋同郡人也六合陳氏宗譜序六合陳氏宗譜都指揮僉事陳侯逵所修也陳氏居六合久矣侯之大父晟以才武自奮從太祖皇帝定天下功多授指揮同知鎮袁州坐事免子啓方戍大寧從太宗皇帝靖難屢立戰功有名纍升至忠義左衛指揮同知嘗念祖宗積纍之厚故子孫能有立如此然當喪亂之際譜牒失傳鄉邑故老無在者水木本源之盛不克究知今太平無事為子孫者得以享其樂而忘其所自不可也思考索成書屬有疾不果乃書其所可知者以授侯俾為譜以傳後嗣其所不能知者則闕焉侯時年十一慨先志之不遂而以付諸已夙夜不忘思必有以成其志書既成豫友前國子祭酒李先生序之矣至是因以請於豫豫嘗聞先生言侯忠厚端潔惇孝弟之行心已重之則今之請其可辭夫譜所以明其所自出別尊卑辨疏戚倫理以正恩誼以篤而尊祖敬宗之道行焉著其所可知而闕其不可知所以傳信也眉山蘇氏出於唐眉州刺史味道而失其世次老泉為譜斷自其所知者録之不敢加一辭懼不信也陳侯為此譜本於蘇氏異乎人之牽合附會亂其所自出以取譏於君子者賢矣哉用心也譜所載六世其作乎前者不可知至晟以武功官三品雖未久於其任而啓方復以勳伐得之今侯作鎮近甸以統馭綏靖之能獲寵用有譽望於時豈非前有德善以啓之而後亦能修德務善以繼之是以若此其盛也陳氏既以武顯而侯讀書明理恂恂恭讓退然若儒生昔之謀帥者以恱禮樂惇詩書為上侯益篤於是則其進於福祿榮名當益盛子孫繼之復相與勉焉則此譜傳之百世有耀也贈都給事中李君序國朝稽古建官以隆太平之治其政令之施既設六部以分理之又置六科以司其出納凡宣布於下與下之有所奏陳者皆先自六科省審之必由於理而不違乎法然後行不然則駁正之使無或悖者而天下之治功成矣六科以都給事中為之長又有左右給事中佐之其給事中則因事之繁簡而增損其員必皆選天下之英才立心正大見事明敏行必依於仁義而不為外好所移易者從容於禁密之地日近天子道德之光於事無不可言言之無不見用足以行其志達其道士大夫官至於此亦榮矣山陽李君讃字公美早以明經取進士擢拜吏科給事中吏科以選賢命官為職蓋出治之本視他任有間也居無何上知其賢命掌吏科事尋升左給事中今年都給事中缺吏部以為莫宜公美上亦眷之久矣即拜吏科都給事中公美在任不五年其正大明敏率仁蹈義不為外物所移而名實蒸然於上下及是命也其同僚蕭君輩皆為喜屬豫作文贈之以致其慶快之意豫嘗讀蒸民之詩而嘆仲山甫之職重矣其詩有曰出納王命王之喉舌蓋虞之納言乃今公美之任也當樞機之地而政令之本繫焉其任豈不甚重矣乎然考其能勝此者蓋曰仲山甫之德柔嘉維則曰小心翼翼古訓是式夫柔而不過其則蓋有剛德存焉剛柔不偏而又主敬以為本法古以為用則何重任之不可能哉今之六科大臣之寓也居乎此者往往遂去為卿佐當藩臬蓋知之有素故用之不疑要在慎修而已矣公美之才行豫知之舊矣由是而進益以仲山甫自勵焉則福祿榮名之至於逺大可量哉故書此為贈贈侍郎俞公序景泰四年秋太子少傅兼吏部左侍郎俞公足疾不能朝上聞之亟命太醫院擇善醫往視與良藥俾速愈醫奉命謹甚治之盡其方上亦數遣中貴人臨問加賜賚以慰其意上在潛邸時篤意聖學擇儒臣以備顧問公心淳氣和學博行端凡其講説皆二帝三王之道而啓沃之功多上重之是以眷待若此其厚也久之公病未能愈上疏曰為臣之義當夙夜不懈以圖絲粟之效臣不幸久病不得奉朝請修職業而虛受俸賜雖聖德有容豈臣所能自安哉乞歸鄉里就醫藥倘得小愈即當復來庶幾圖報萬一也上不許命就祿京師而錫豫尤數且督醫治病益勤藥石針焫罔不施踰年疾如故復上疏曰臣受厚恩思竭力以報今病困如此猶勞聖慮勤太醫臣之感戴辟若天地豈能一日違乎覆載之內哉顧病有不得已耳乞歸治之冀或愈以申後效上重違其意許焉且命愈當即來毋淹久於外上之於公可謂仁之至而公亦可謂篤於義者矣將行太子太保河間王公重僚友之好俾豫作文以贈行公天子近臣文行顯於天下豫言何足為贈哉念豫以衰朽之質得相從出入於朝荷公之輔益多矣今老病日加屢乞身不可尤賴公以寡過而公乃先去豈能釋然於懷哉雖然公尚未老其得於天者當未艾而福祿榮名之進益無窮嘗聞之莊子大鵬之升摶扶搖而上者九萬里然至於六月亦一息焉息也者將以復升也氣完力餘則其奮愈逺矣公之歸何異乎是尚慎自愛思有以副上意與諸僚友之所望也贈顔知縣考績序君子之仕以為民也自公卿大夫至于藩臬大臣佐天子行政於天下其職雖不同而利國利民之意則同也然其位尊而去民也逺雖能善其政而不能親致之民之被其澤也難矣惟令於民為最親得因上之所行而施其惠雖甚劇且勞也茍以至誠惻怛之心而委曲圖之民無不受其澤者此令所以為民父母也一縣之事操縱緩急必皆主於令民一於令是聽是以為令者茍有至誠惻怛之心以利民而民親之則雖公卿大夫藩臬之大臣孰不與為禮郎官御史何加焉此君子有志於民者所以樂為令也今國家篤意養民以令為重選而論治者必嚴於守令多請以進士任之以其所服者聖賢之道所施者仁義之教而有以惠民也故百里之邑得一賢令而自進士為之則一邑之人喜不然則戚戚以憂進士之繫人望如此泰和吉安屬邑其人素尊德樂義朝廷亦以其易治也為擇賢令俾之各遂其安而顔侯以進士之賢者得任焉侯名夔字某長沙人其為政善善而惡惡嚚訟梗化則治之逋租匿稅則治之亦有撫之不從教之不改者則施治加嚴焉然善人君子自若也既三年當考績赴吏部邑中老長嘉侯之治績謂豫亦老而歸宜有言贈行豫聞古之仕者不為縣令不得顯於朝故縣令之賢者乃入為卿佐為大夫或至三公封侯者而今之由縣令顯者尤比比也顔侯始自進士來為縣以至誠惻怛之心施惠於其民始終一致而不變他日政成為卿佐為大夫或遂進而上之可計日待矣豫深有望於侯也故為贈言如此贈按察使原公詩序國朝設兩京以備巡幸古之道也聖天子尊臨北京凡南京方面諸司所行事皆有成法設官任之既如古方伯之制以統蒞上下又設風憲之職以激揚刺舉於其間然後事無不宜而治道盛矣江西之為府十有三為之民也多矣公私之緩急機務之操縱其接於念慮者豈一二計哉非髙才達識智足以周萬事者未易任也陽城原公以奧博之學遇明聖之主遂由御史升江西按察使明法度以振紀綱小大之人無不恱服至是厯三載餘矣將考績赴京師江西方伯言於衆曰三載考績唐虞之法也皇上以堯舜之資行堯舜之事將熙庶績以勵萬世然仁者贈行以言亦古之道也遂自作詩以為唱而凡以詩鳴者繼之聨為大卷而以屬豫序豫年八十三矣老病不足以與此然尚託治下奚可辭書曰三載考績三考黜陟幽明此待仕者之常法也然有特達之升非常之遇焉今之六部及內臺憲長有缺則必選諸外任之賢而用之人莫不以為宜也若吾江西藩憲之長其為人望久矣奚可以常情待哉故為序其詩以俟而期願之意寓焉送方伯黃公序國朝設考績之法以興太平之治凡任官三載者各以所任之績獻於朝考驗而進退之於是能者競勸而在任者益奮於有為而治道盛矣此圖治之意也江西布政司地大人衆而事殷所統十三郡莫加焉當其任者必才德超越過人然後足以稱其任而興起事功蓋亦難矣將樂黃公廷獻有美才賢行超越人逺甚以明經取正統已未進士纍官至江西參政聲望赫然江西之人敬愛之又升江西左布政使而譽望益顯今將考績赴京而惠則在人同列之賢右布政使某參政某某參議某遣人貽書于泰和王直曰黃公之賢名聞於時久矣今將考績為臣之義也然名實在人不可掩當天子用賢圖治之時豫慮其以績最而留用焉則江西之人無乃失所愛乎且命豫泰和令顔夔速豫致一言豫無以應則私念之曰諸公於同列則善矣然考績黜陟堯舜之法也未嘗忘人之賢然大賢進用必自三考始以堯舜之心行堯舜之政欲在位者皆為堯舜之臣在田野者皆為唐虞之民雍熙泰和之治均被乎天下豈止專惠江西哉公得專惠於江西江西之民之幸也今請俟公於三考之日必有髙爵重祿如漢之待黃霸者以待公直雖老憊亦當杖屨迎賀於郭門之外云西昌尹氏族譜序尹氏之族由絳以進士顯於宋通判衡州後有為河南節判及慶元同知諸郡縣學官者文學德誼表表有譽於縉紳間洪武缺年子厚先生以經行修明被薦為縣學訓𨗳豫與先生子自道亦被推擇入縣庠先生素與豫外大父臨淄知縣歐陽公最相好由是亦甚愛豫勉學甚至未幾豫竊第入翰林自道亦登太學相繼顯而先生長子復道遂與豫為婚姻家蓋其父子宗族藹然循理而蹈義孔子曰積善之家必有餘慶尹氏非所謂積善者歟豫從先生父子遊今六十餘年凡其言行之發惟有抑志而無侈心非積善者如是歟先生之志篤於善拳拳焉惇本睦族其意堅其行果既久而益信於人蓋無不推其為君子者先生修其族譜成少師楊文貞公序之今其孫克贊以潮陽教諭秩滿謁選赴京師又屬豫一言豫觀先生序其世德盛矣昔范文子謂其受姓命氏自虞夏商周以來益久且大可謂不朽者也而魯叔孫穆子謂之世祿非所以不朽其所以不朽乃在立德立功立言謂之立者卓然名世傳後而不廢也尹氏之仕十缺世而祿不絶亦可謂盛矣尚益思所以立者哉茍三者有立則尹氏之盛孰能禦之此其先世嘗舉以為教為子孫者其可忽諸故序於其首簡抑菴文後集卷二十二
