body:
  text: 抑菴文後集卷九明王直撰序送南海縣丞屈季恆序工部主事姑蘇張穆詣豫言其郡人屈昉季恆之賢曰季恆嘗在崇明軍中其言行必循於禮義凡應事接物設施措置有足過人者一軍之人以其儒雅敬禮之會詔下求賢凡軍民之中有才德兼備者皆令薦舉其帥長不敢隱進於朝吏部會大臣考其言又歷試以事皆謂可用於是授南海縣丞穆與之素厚於其去也敢請一言以華之豫謂朝廷廣求賢之路亦既得賢以為用矣猶慮或有遺也則又為此舉然以才德兼備為名其待士大夫之意豈輕也哉名乃實之本也有其實斯有其名則由是而進者豈可輕自待哉德者理之得於心才所以致於用唐虞之世九德咸事而元愷以才舉彼所謂才皆德之發也考之於經其行事可見矣後之君子德則皆知師古人至論其才則有未盡然者蓋隨其氣質之所能而不皆本乎德是故慈良豈弟之政未至而苛刻乖謬之令行焉欲其治行之能如古蓋難也今天子以堯舜之仁興唐虞之治故欲得賢如古人者用之而季恆由是進誠千載之良遇也其所自待者當何如用心哉蓋丞以佐令一縣之治忽繫之南海大縣藩憲治所在焉好以禮法檢乎下其閭巷之士亦好以禮法議乎上季恆之舉其職當不難然亦奚可以不慎哉政之及民必皆本乎德之施而非德之政不加焉使人皆曰此誠才德兼備無負於朝廷之舉以漸而進其治亦無愧於古人豈不誠賢矣哉豫未識季恆而穆乃豫所愛者知其言可信故為序以送之季恆其然豫言哉送蕭通判赴大理序豫往年以內艱居家豫友蕭所芳氏遣其子瓌從豫學瓌時年十二三聰明秀偉孜孜不倦豫愛之所芳亦甚鍾愛必欲其學之成甫二年豫來京師則聞瓌入縣庠學日益進為文章益竒豫深為喜而亦思見其成也久之瓌以春秋領鄉薦上春官豫適奉旨典文衡意謂必得壞而壞乃中教官選當為學正教諭蓋已得之以拘於額數不遂也豫深為惋惜壞怡然不以屑意言於禮部願卒業太學俟再舉會擇諸生有文學且精於書法者書武臣誥命瓌與焉遂往執筆中書勤於其職未嘗有過舉一時共事者莫先焉既滿吏部試其文在優等授大理通判將行過豫别豫觀其意若有不釋然者蓋以道逺不便於二親故也豫解之曰君子之仕也移事親之孝為事君之忠是故其志惟急於王事而不暇顧私恩此豈薄於父母哉蓋有不可得而兼盡者義當然也子之親所以惓惓教子非欲取快於目前欲子之立身行道以光顯於當世而行道者豈以近逺為限哉孔子且轍環天下惡在其拘於近也大理雖逺而雲南諸郡莫或過之蓋其風土之善物産之饒人民之安於教化久矣子之往也一以其道施諸人使其人益得以安生樂業雖在逺郡而皆不異乎中州則子之道行功立矣郡之人歸德於子而推本於父母之賢則子之親豈不快然足樂哉此古人所謂以志為養孝之大者豫願子以是為務若朝夕不出户限而不能顯其親以成其令名雖曰能養君子不貴也况大理之外郡縣猶不少則大理豈逺哉子姑務其大者逺非所計也瓌喜拜曰先生之教是也生敢不勉豫即書豫言以贈之使歸而質諸其親當亦以為然也贈王經歷序蘇州大郡也其民之衆賦稅之多獄訟之繁科徴徭役之殷凡為郡者莫之能過也豈獨郡然天下布政司十有三事不能及蘇州者蓋四五則為治於是邦豈不難哉故夫守佐必選其才過人者然後任之至於幕僚之長主贊畫治文書亦不處以非才其慎重可知矣今太守南昌况侯所謂有過人之才者也而又得湖州王仲文氏為經歷仲文名真始以才諝入官而蘇湖又相邇其人情風俗亦無大相逺者仲文贊理有條法郡以治聞蘇人既尊仰况侯而亦誦仲文之美此豈徒然者哉豫仕京師將四十年每聞人謂蘇難治求其所以難治者則皆如前所云且曰事之有常者皆可為惟人情巧偽變態日千出至於不可勝窮於是事之有常者皆失其常此所以難也豫竊謂天下事固有至難為者然亦視其人仕以廉為本廉則公公則明又持之以誠而加以不倦其庶幾乎既而豫友工部侍郎周公往巡撫其地况侯之心與之協為幕僚又得仲文由是昔之甚難者今皆若易為周公賢且能其設施又有過人者豫嘗問其然周公不豫告也仲文今再考績來北京翰林待詔沈慶庶吉士伊侃詣豫求文贈行豫欲以豫言問之而素未識故為序以贈焉果若豫言是所謂已效之方也要在慎守不易斯善矣仲文勉之於蘇能治則天下無難治者他日名位可量哉仲文毋忽也贈栁參政序古之君子有行也其相與親厚者必有祖餞之禮贈遺之言以寫離别之情而致殷勤篤厚之意蓋氣味之相同道義之相尚故其所發如此豈偶然哉嵩髙蒸民韓奕皆祖離道别之詩尹吉甫之作也於今考之其飲餞之禮非不備矣而必形於言道其德業之盛而勸勉諷誦之深意寓乎其中孔子取之非謂人道之宜而不可廢也歟後之賢者於其朋友之去也既傾寫於杯酒之間而又必徴言以為贈蓋本諸此矣正統四年五月天子用大臣薦以栁芳為賢拔於刑部郎署之中超拜湖廣右參政其同列之賢朱勝等既相與飲餞之而復求贈言於豫夫欲贈以言而託於豫豈以豫言為可用耶今之布政司古之方伯之任而參政其佐也韓奕之所謂伯蒸民之所謂賦政嵩髙之所謂于蕃于宣栁君實與焉夫踐古人之任必當儷美於古人之道儷美於古人之道則亦古人而已矣然則仲山甫之柔嘉維則申伯之柔惠且直韓侯之夙夜匪懈虔共爾位非栁君之所宜務也歟夫敬以居內而不怠於政然後能事其君柔嘉維則則柔而能剛然後盡將明之才柔惠且直則有愛於人而無不順於理然後譽聞於四方古之人有一於己巳足以為賢况兼而有之則為大賢君子也必矣以是贈栁君亦諸君之志也歟栁君字墀茂南康都昌人為人剛介不撓端厚有為諸君之所稱也其能用豫言哉贈李孟竒序李倫孟竒瑞安之良也而以好義重鄉邑正統三年瑞安飢孟竒出榖二千石助有司賑民且為築義倉貯之官自主其出納又造舟二艘於飛雲渡以濟往來者嵗自使人操之而給其衣食縣令鍾君沔具其事以聞上嘉之遣行人賫敕旌之為義民勞以羊酒復其家孟竒來謝恩闕下瑞安之賢禮部郎中黃君養正求豫文贈其歸且告豫曰孟竒之義舉非特此而已也往年永嘉縣民許惠生等五百七十餘户詣府告飢孟竒出榖一千石白金一百三十兩賑之朱文助等訴貧匱有親喪不能舉孟竒又出榖千石布百匹以與之又開義阡使貧人無葬地者得藏焉修郡治廨舍及瑞安縣後堂儒學尊經閣及兩廊廡東安驛儀門平陽縣水利斗門及諸橋梁道路浮屠老子之殿堂門廡前後凡費榖萬餘石孟竒不自以為德而人德之此好義之至也先生樂道人善可無一言為贈邪既而孟竒過豫聼其言觀其行信可喜者則何可愛於言夫義者人心所同有之理其施之有多寡以其質之有厚薄也今天下之人以出榖賑飢而蒙旌褒者衆矣然未有如孟竒之多而又數數然者豈所謂好義如嗜欲者歟孔子觀人之法必察其所安蓋人有偶一奮而得名或有所徼求而強為之者惟無所為而屢為之然後知其樂於此而不厭孟竒非有所為而為之屢矣蓋真樂於為義者歟其受天子之寵命而有譽於後世豈不宜哉且為義者天與之孟竒今年六十九五子皆卓然有立其二子為邑庠生皆能好學不怠天之報孟竒厚其福而昌其家也必矣故為序贈之且以風夫未能然者送劉縣丞序劉鼎士器豫故人子也初與其兄渙士拯同以明經領鄉薦有名當時明年士拯取進士而士器得教官不就請歸卒業於家既而士拯為兵科給事中士器乃縻於家事不果出縣大夫賢其為人而惜其不用於世會詔下求賢凡文學才行出衆者令有司舉之於是以士器名上徴至京師試其才優等又試事於禮部能秪勤不懈皆以為宜於用遂授夀昌縣丞以去豫與其父子兄弟相善也則於其去安可無一言邪夫丞八品官耳而偕受百里之寄百里之內為之民者多矣其休與戚豈獨繫於令而已丞蓋與有其責也世之為丞而能任其責者有之矣其不能者亦有焉蓋不惟令之輔而惟已之愛於其行則諉諸令曰非丞所得為也政之不善民之不安有不暇顧為令而能均其責者有之其不能者亦不可謂無也蓋不惟丞之用而惟已之專於其行則忌夫丞曰非丞所宜侵也政之不善民之不安有不能知如是而欲其縣之治可得邪彼其所以為是者非公也私也夫以百里之地付之使安養其民豈使遂其私而已哉孟子曰君子以仁存心仁者當理而無私心之謂也令以是為政丞以是佐之廓然大公而所行必當於理則政豈有不善民豈有不安如是豈非所謂賢令丞也哉今之為令於夀昌者豫不能知而能知士器故以是告之所以重士器也夫求賢之科莫有加於文學才行卓然出衆者孟子之言非止可以為丞也士器由是科進誠無愧於孟子之言斯善矣士器勉之豫之所以相期者豈特丞而止哉贈郭司訓序萬安郭邦本初領鄉薦會試禮部得納溪訓導以外艱歸服除改保昌保昌南雄屬邑去萬安僅七八百里邦本有祖母在堂而母亦且老矣既得過家拜二親且往來甚便得通問起居致甘腝其心甚樂也將行求一言為贈豫謂人道之大忠孝而已忠則盡心於君孝則致愛於親忠孝兼備而人道立矣古之人有急於事君至委其親而去之其爵位非不顯功名非不盛也後之君子往往興嘆焉豈非天理人情有所不慊也哉然彼有不能兼盡者勢不能也則亦末之何也已茍得以兼盡焉合乎天理之正而即乎人心之安則其樂可既邪今學校之教蓋欲學者務此而已孟子曰未有仁而遺其親未有義而後其君忠孝仁義之道也人情所固有也然或不能盡者有所蔽焉耳教之何如誦聖賢之書講明其所當然者而由之也為師者端表儀於上為子弟者謹師法於下修於身行於家又推以施於國而無不盡焉雖唐虞之世不過矣邦本妙年美質且有志於古人今去為教官務勉勉以修其職而又惓惓篤於親庶幾能兼盡其道也推是以為教其為賢教官也可必矣今制郎官御史給事中有缺每每於教官取之邦本亦篤慎而不忘使名實蒸然上下則豈特為教官而已哉邦本勉之贈蔣主敬序主敬金壇人贈太醫院使恭靖蔣公之子今院判主善弟也去年來省其兄豫邂逅見焉觀其貌恭氣和而言訒心甚重之然豈獨豫重之哉凡識其兄弟者蓋莫不重也憶豫嘗事仁宗皇帝於東宫時恭靖判太醫院亦朝夕侍左右深見禮遇蓋有從容規諷之益不特醫也當是時名重諸公間可謂古之君子矣豫既獲交恭靖今又與院判君遊蓋深嘆其有恭靖之行及見主敬則又喜能似其兄其父子之見用皆非常之遇也世之仕者罕能及之然其妄子弟輒藉以自豪放蕩於繩檢之外縱肆於利欲之中卒至俱傷而兩敗者比比有之槩之主敬其賢不肖可知矣世恆言子弟之賢必本於父兄豈虛也哉主敬將歸其鄉御醫張敬曾晟何永慶施昌宗輩皆重其為人求豫言以贈其去夫贈者有所增益之謂也主敬之行成於家而何待豫言且父師嘗命之矣曰主敬云者君子修身之要也禮曰君子無不敬也敬身為大蓋能敬其身則言必循理行必由道而辱親之患無有矣然篤於自修者不以久而怠也故曰君子慎始而敬終主敬之持身既能敬其始矣尚亦慎其終也哉誠如是則無忝於賢父兄而謂之君子無愧矣豫固愛人以德者故書此為贈云贈張通判考績歸太平序張侯文瑄通判太平三年矣太平之人蒙其惠藹然名著於當時今年考績來北京豫姻家尹君自道同知太平府最與侯相愛侯之來也以尹公之故辱過豫屬豫有公事不克申欵洽接殷勤至是侯將歸其友兵部郎中潘君忠求豫文贈行豫雖不暇然念侯既厚於尹君而意亦厚豫則豫何可愛於言况又以潘君之請乎太平瀕大江昔太祖皇帝經營四方其地最先附及海宇寧一定都金陵太平又密邇畿內瞻依道德之光涵濡教養之澤至今蓋百年是以其人賢者既皆習於詩書禮義出則足以效於用處則足以為善人田里細民亦皆自力於衣食以樂生送死故最號為易治况今天子篤意養民其施於政一以仁為本則臨民者其於為治蓋尤易可知矣且今之郡守與凡為之佐者必皆擇賢而任之太平之民烏有不得其所者哉豫嘗謂君子居位雖以仁民為心然必遇其時得其地而後志可以行時之弗遇地之弗善也雖苦心殫慮以為之而有挫撓其志拂亂其所為告之而不喻令之而不從者則雖有志惡乎施張侯既以仁為本而當聖明之世其民俗之善足以如其志以治何其幸哉要在敬慎不渝而已此君子之所望也故書以為贈送張主簿序瓊州在京師之南萬餘里環以大海其中為五指諸山黎獠居之郡所有獨瀕海之地周廽幾三千里凡三州十三縣之治在焉地既負山並海故多魚鹽皮革絲布之利其田率一嵗再熟果蓏蔬茹之類家藝而户種之不丐買而有也民既足於口體故其俗朴野易與為治豫先公守瓊州十餘年體朝廷寬大之德而行夫豈弟之政去煩苛務簡易以仁義之道從容化誨之故一郡之民皆安於畎畝衣食而相忘於無事仕者既善其風土而喜其易治往往多樂居之以嘉惠其民古者嶺外之地多以處遷謫之人故皆鄙夷其民一切以茍且臨之今雖海外遐逺皆擇賢以臨之士大夫皆樂於為治其效不異於中州此可見皇仁之廣被而無逺邇之間也於戲盛哉萬安張旭寅賔其邑故家也資富而才美質偉而氣充有司承部符起用之得崖州寧逺主簿其素與厚者求豫致一言豫與寅賔交未久然知寅賔之優於為治而能惠其民矣蓋寅賔以稅富入官所謂有恆産而有恆心者也夫人無恆産斯無恆心使在人上此何異以狼將羊哉其為害也必矣寅賔推其有恆之心而施之以無害之治持之以不已之誠處以不易之操豫知寧逺之民其受惠者益厚矣是豈非其民之幸哉豫故書其民之所以易治與寅賔之所以優於為治如此以送之所以期其治效之盛也寅賔其亦自勉哉贈何僉憲序聖天子在位厲精為治海宇乂安益思所以惠養萬姓以建太平無窮之業故凡藩府州縣之吏既皆擇人而任之矣而於按察之官尤慎其選蓋耳目之寄紀綱之繫有不可輕者也夫以十數郡之地而統之布政司為之吏者多矣其人之賢否行政之得失有不能齊則夫民之休戚與其所欲而不得所惡而不能去者蓋必有焉按察之官亷其實而以聞於天子而進退之興民之所利而去其所害上之德不壅而逹於下下之情不壅而聞於上上下交而治效盛矣其任之重如此非有才德之人知大體而可敬愛者莫能任也泰寧何公道旻昔事太祖皇帝為大理評事監察御史既而出佐江西廣東按察司皆有名其在江西也一二同事之賢皆當世偉人其公平正大之體剛果易直之風足以沮惡佑善興亷律貪江西之人皆安之公嘗行部至泰和直時為邑庠諸生得進拜焉觀其風采聼其議論而知所敬愛矣其去江西凡幾年而吾邦人父老尚論當時按察之賢者猶能一二道之不忘嗚呼雖其人之好德樂義而公與諸賢實有以致之也今年公自廣東受代還北京未幾復調浙江按察司僉事浙江大藩也其吏之賢否民之休戚亦有不能齊者乎以公之賢而為之長二者又賢則所以處之不難也吾知其民有以安受上之賜矣於其將行凡知公之深者皆賦詩為贈而使直序之故本其職任之重與公之克舉其職者如此以冠其端云送尹子源詩序吾友尹子源始用薦入館閣與修永樂大典五年而書成朝廷將用之命歷試於户部又三年始授福清縣河泊官子源闓敏簡曠無茍偽之習又善與人交豫家居時遣其子璉從豫學時時載酒殽入城中邀豫飲言笑終日而後去其意氣藹然也其後豫舉進士入翰林子源來京師雖時相見而局於所事不得歡笑如曩時然其意尚在也永樂十一年車駕幸北京豫與子源皆從於時吾邑之士居行在者無幾人暇日往來劇談大笑蓋去鄉益逺而意益相親也最後子源遂主於豫適豫友中書舍人鍾君亦以考績來三人者同室居朝夕相與道舊故相得益歡甚子源能賦詩然不求甚工時自出其所作髙吟大唱以為歡或飲酒勸酬至夜分不寐豫以病不飲子源喜強豫飲豫不應頗以語侵之雖甚忤不怒也嘗曰先生獨處於此今幸有吾二人在焉不及此相樂一旦散去尚誰與為樂哉未幾子源受官且行告豫曰吾方有公事不暇與為樂矣然能以一言為贈乎豫因復飲以酒而謂之曰士之仕也不必計崇卑顧為之何如耳茍能舉其職不辱其身官雖卑人將重之而進於顯榮不然雖髙車駟馬鮮衣美食居乎廣宇豐堂之間騶呼出入於四通五逹之衢其位雖髙人固將易之何暇貴重哉故古之君子於牛羊倉廪之賤無不宜焉者以此也子源讀書知道理又練逹時事其能舉其職不辱其身可知也吾見子源之祿秩且加顯矣子其慎之子源曰諾於是書豫相好之舊與其相告語者如此以送之子源其能不忘哉送郭紹容序往年豫以翰林修撰扈從在北京縣人郭儀紹容省其父承宣歸自遼海上進拜其師翰林檢討余君一宿而遂去蓋紹容有母在堂别之久而念之深故不暇與豫接而去之亟也余君為豫言豫心獨喜因相與嘉歎之蓋京師者四方萬國之所會而當太平無事之時人物靡所不有文學名世之儒材武出羣之士醫藥卜筮方技百家之流富商巨賈之轉輸豪家大姓之蓄積錦繡珠玉聲色狗馬與夫飲食百物所以奉身者皆充牣華美隨其人之所欲無不得故來者有樂居之心而居者多不欲去况紹容奔走勞苦之人哉今紹容於此無所慕而急於其親其知所重者矣紹容歸之明年請於其母復往省焉鄉閭之人皆知紹容之能孝也夫自其鄉以至於遼陽水行陸走幾萬里有舟楫之恐鞍馬之勞風雨霜雪侵乎外飢渴食飲切乎內非可以旬日計也今乃一不顧奮然獨往如行東西家不以為難此豈非誠孝之所激哉然則紹容蓋賢於人矣雖然君子之論孝不止於定省起居而已貴乎有以成其親蓋行修於已而名顯於時使人謂為君子之子此之謂成其親紹容所過通州大邑古今名人竒節偉行固多矣茍耳目所及者皆可資於已紹容其思務其大者哉往拜膝下其所以告者蓋有同乎此者矣紹容將行其素所厚者彭士淳率能賦之士取唐人詩寧親為令子一句為韻各賦詩五首以贈之而先求豫發其端豫未交紹容而樂道其善且欲其加勉焉况取豫文者又士淳也紹容當有取於豫言矣故不辭而為之序送王瓊玉赴任序瓊玉豫友也始豫逰鄉校瓊玉已先在十餘年其為人闓爽敏逹而慱聞強記衆皆以前輩待之洪武已卯郡太守永康朱侯會九邑生羣試於府中一時英偉之士皆矜誇見所長每一相聚瓊玉議論奮發援引經史至於指題命意其成文當何如亹亹不厭常傾其座人蓋鄉先生蕭子上嘗設教其家故瓊玉之所見聞有以動衆如此當時瓊玉年壯氣鋭自謂青紫可俯拾而有也其後業成升太學又三年歸祀其先竟坐纍謫交趾間關數年然後歸又從事禮部一年今乃得司倉赴金華千户所瓊玉之仕其亦可謂難矣世之人有不及瓊玉之材議論聞見皆出其下而名位乃在其上者此豈偶然哉蓋命也瓊玉之仕其亦可謂命也然豫念同逰於今三十五年其間得朝夕聚處者僅七年而已自竊第入翰林與瓊玉别或偶一見言論未幾又東西散去蓋二十八年矣豫二人者皆蒼顔華髮始得復相聚如曩時今又别去則何能已於懷耶於是飲餞於澄清里之官舍酒半執爵而告之曰司倉官卑然君子不計也貴乎有以盡其職孔子嘗為委吏亦曰料量平而已以孔子之聖且為之况瓊玉乎茍盡其職雖卑可尊也趙文子舉管庫之士七十有餘家君子謂其近利而不濡於利足以當其舉瓊玉勉之安知今無趙文子者乎瓊玉對曰吾非敢望趙文子要當盡其職而已於是衆皆喜瓊玉之不久於卑也則相與祝願之而禮部員外郎馮敏等皆作詩以贈行豫因書豫言以為序贈鄒孟義序醫之道誠難也而小兒醫尤難蓋病者既不能言於其所患亦不自知其輕重唯以父母之仁至誠以察之然後能得其所苦而施療焉不然其不夭死者寡矣故醫小兒尤難也廬陵鄒氏世以小兒醫得名而孟義尤精於其術凡廬陵之人與豫泰和之愛其子者有病皆走孟義所求醫孟義不以風雨寒暑逺近為辭皆往視至則問其所由察其聲音顔色而投以善藥無不愈或為他醫所困纒綿危篤以為必死者孟義察之茍毫髮可回皆生之其心懇懇然未嘗少怠忽亦未嘗矜以自髙蓋所謂君子也豫家泰和距孟義之居四十里又儒者素儉薄非有重資可以致之然有疾厪孟義多矣非其心之厚於仁能若是乎豫是以深重之然以近事驗之於孟義尤切切也豫來京師有男女三人皆以疹痘失之説者謂是瘡宜紅潤其初亦莫不然至其黑而陷也然臟腑亦未甚利醫者皆進大熱之劑謂為固裏而卒皆死焉然豫觀錢仲陽方書於倒靨黑陷者或以豬心血和梅花腦子投之而潔古李東垣王海藏輩率皆用和平之劑惟陳文中或以熱劑而近世名醫亦刪去之止取其和平十餘方而已以豫男女三人觀之則宜涼劑乎宜熱劑乎其皆命也乎抑亦有非命也乎豫不得而知也孟義精此術其濟人也不少必有至當不易之説惜逺不能致之往年豫長女嘗患此黑陷臭腐不可近衆謂必死獨孟義以為不死豫之藥果得全合前後之事觀之其死其不死蓋係於孟義之遇不遇也孟義誠賢於人逺乎哉今年豫子䆅來京相與道其事而嘆孟義之難得故為序以贈之非惟以彰其美蓋使二邑之人知孟義之果可尚也贈主簿黃榮宗赴曲江序主簿所以佐令蓋一邑之政皆令主之簿與丞特助其所不及者耳令果賢矣其施於政事皆以公不以情上下皆是其所為而無侵撓之者則一縣治矣簿與丞得安於無事不勞而享其成功令或不賢凡其所施者不以公必以情上負其任下失其所望而百責萃焉簿與丞安能以獨暇哉夫令賢而欲立異以求勝則為撓權令不賢而欲茍徇以自安則為曠職斯二者皆不可也是故君子之居此任也不矯矯為異亦不翕翕為同惟事之當而已矣不當則忠告而善道焉彼為令者蓋亦好榮而惡辱也求福而避禍也夫安得不趨於善哉若其所爭者不皆出於公則事皆不可行而已亦將受其咎此君子之所甚不取也古之為簿與任於他邑者吾不能詳言之往年主吾縣簿者得一人焉蓋所謂賢主簿也然非有過人之才其所謂賢者亷公勤慎而已布衣蔬食未嘗妄取於人事無大小難易必身任之科徴調發必審其人之資力如何不茍為移易公牒出入必手自稽考獄無濫繫稅無後期民無不安其所當時姦猾皆屏縮不敢恣為令者亦能信其所為一縣稱治民到于今頌之豫嘗稱其賢於人君子皆不以為過也吾郡黃榮宗今去為曲江主簿榮宗諳練而有才其往佐一縣蓋易也刑部郎中劉伯塤等重鄉郡之誼求豫文贈之豫欲勉榮宗之為賢主簿也故以其職之所宜與吾邑為簿之賢者告之行逺自邇升髙自卑榮宗果賢則進於尊顯可冀矣吾所謂賢簿者吳其姓勝祖其名永嘉人贈户部員外郎吳伯英序國家如成周之制內設六部以總天下之政而户部為最繁蓋天下貢賦之所理也故其屬有十四司司有郎中以專其事員外佐之其下為主事皆才逹識明之士然後能其職不然則事有不治矣然今之任者必三載考績三考而後黜陟此定制也為之長者果知其人之才可以進用則雖不待九年而以言於上上是其言而進用之此蓋非常之遇不數數見也永嘉吳君傑字伯英始領鄉薦入太學久之擢户部主事能勤慎不懈以修其職同列之賢皆譽之少傅户部尚書夏公雅知其才於是言於上進為浙江清吏司員外郎伯英尚未九年而進用如此蓋所謂非常之遇也光祿卿郝公素厚伯英而喜其進求豫文贈之豫謂贈者有所增益之謂而多施於離别之際今伯英雖進用而未嘗去朝廷非有離别之逺嵗月之間也而何待於贈言哉然朋友相尚以義有不得朝夕見者則因文寓意以美其舊績而勉其新功亦理之所可也夫君子之仕以行道也位益進則道當益以行伯英之位進矣浙江之務凡屬乎已者得與郎中相可否以逹於其長而行之操縱緩急之間尚益謹於其道哉詩曰無德不報上之進用伯英可謂厚矣伯英謹於其道是所謂厚其報也道益行則功益著功益著則名益顯而爵益崇譬登萬仭之山足愈勤則身愈髙人愈仰之矣伯英勉之此固朋友之望也故豫因其意而道之贈王郎中序吕梁徐之至險也其石之錯出於江髙者踰尋丈下者猶五六尺若星羅若碁置若熊羆之奔突虎豹之馳逐其芒角峭發又若列戟之亷利嶔然相纍獰然相觗如是者蓋彌布而不可窮汶泗與濟合流而來又與黃河支流會自徐將趨於淮而為石所厄於是盡力以與石鬬疾走旁射悍怒衝激轟然如雷霆舟沂流者常以百餘人或十數牛挽之進寸而退尺不幸為水所勝即橫偃側卧漂溺不可救其自上而下者如星馳如電發不容復置力然一失毫釐即為石所戕破碎淪沒不復見蹤迹其險如此往來者常患之國家既建北京四方貢賦之輸於北京者必由乎此舳艫朝夕相銜也必有以經略之然後往來者得以安行而無害乃擇羣臣之能者任之而紹興王君處善以刑部郎中往焉處善始令江寧江寧京邑也其事之繁天下莫先焉處善為之有名由是升郎中而當其任其之吕梁也相地勢之宜而次往來者之先後度其輕重以人力濟之撫之盡其方施之得其道由是往來皆忘其險而安焉夫以治京邑之才而濟吕梁之險宜其從容而有譽也豫始知處善才能著於江寧而别去三年矣今年豫友清河知縣李信圭考績來北京為豫極言其績求文以彰之豫謝不敏而不得辭故為序吕梁之險與處善經略之宜如此以贈之使人知處善之能果足以有為也處善尚益勉於其終哉贈黃訓𨗳詩序寧越黃儀叔敬自永樂中領鄉薦得教官今為貴州宣慰司儒學訓𨗳豫未及識之然知之久矣蓋太宗皇帝在位時嘗詔天下有司悉上圖志命儒臣纂集為書以著大一統輿圖之盛及得貴州宣慰司所上視之其紀載詳實粲然有條理則叔敬所為也因相與嘆曰貴州古鬼方之地其人皆㹫獠詩書禮義之習前古未有也國朝洪武中始建學設官以教育之將革其舊俗俾同乎內地重以太宗皇帝之德設藩憲二司以臨之漸磨之久其民稍知禮義其秀者亦往往成才可以為世用充貢而來京師者前後相望也今叔敬之所述如此則其才學可知亦其教之有成哉夫人之生固靈於物也蓋無不可教者教之有不成豈特其人之過哉教者亦有咎焉古之教者以其道體諸身日與諸生講誦俾服而行之誘掖奬勸使亹亹忘倦日趍於善則其成才可冀也後之為教官者多不能此孜孜於利欲之趍而矻矻於塵俗之擾於夫所謂道者身既違之矣安能以教人而使之成哉叔敬之所教如此其能以古人之教者自處乎由是心益喜之而思與之接然而未能也今年貴州衛千户陳銑聲逺以公事來京師謁豫請曰銑與訓𨗳黃儀交最厚明年當考績而與銑别矣所以華之者莫貴於文章然作者難遇今既求京師士大夫為賦詩願請先生一言辨諸首則為幸大矣豫辭以不暇而聲逺求之不厭蓋其祖嘗官吾郡今墳墓在焉由是素厚於豫豫不得終拒又念世之為武將者多薄文士以為迂而為文士者亦詆武將以為悍孰知古之名將説禮樂而敦詩書則固儒者事也今叔敬聲逺相得如此豈非其志相合哉是可喜也而豫又素知叔敬而欲與之接者乃為序之他日倘相見尚當有以質之也贈廖訓𨗳詩序吉水廖氏故儒家其前之顯者豫莫能詳也永樂初敬先先生為翰林檢討以卒豫知其德矣後又識其子慶府紀善自勤亦以文學議論知名於世豫心慕之今亦不可作矣前年紀善弟自亷用薦舉當任有司請為教官以自效得沅江教諭以去今年紀善子歡又被薦得蕪湖訓𨗳人皆為廖氏榮之蓋檢討紀善其初皆以教官進今又得兩教官父子祖孫皆以經學為人師何其盛哉夫君子之學固欲以淑後人然得傳其子者蓋少也能傳其子者有矣能及其孫者又少也能及其孫者有矣而皆能為人師則加少也豫見廖氏之學傳三世矣而皆為學校師則教官者其殆廖氏之世職也歟然豫視之君子之論人也必論其世人之蒙責於君子也亦以世蓋祖父既賢則為子孫者不可以不賢是故其言善矣君子則必考其行其行謹矣君子猶必察其心茍或異焉則其責也滋甚蓋曰賢者之子孫宜無愧於其先此豈好異論哉相厚之道也今歡之去蕪湖蕪湖之人聞之必曰是世為教官者也宜必善於教則上下皆俟之矣歡宜以聖賢之道淑諸身而推之以淑諸人身者教之本也身有之則其人化之斯無愧於世職矣茍徒以言強聒焉人未見其能從而教事或以廢則安能免於公論哉今之教官有自放於繩檢之外而不知所以教凡其所為庸人有不為者君子蓋恥言之歡之聞於家者固有其本矣豫知其不如是也然而相與言之者非迂也亦相厚之道也故書以為贈行詩序贈鄧同知序吾邑鄧氏故儒家在宋有舉神童者其後世不失為士國朝洪武中大椿先生舉明經為彭水縣令彭水子性善先生以醫名舉為醫學官其子嘉茂遊鄉校賢而有文章業成貢入太學以病歸不及顯而卒君子惜之時舉其長子也克肖其父今年由太學生擢授潼川州同知將行其姻友兵部主事曾士𢎞屬豫贈以言時舉以豫為父友也亦欲得豫言以自朂豫迂且病不知所宜言將何以副所望哉試舉其授職之意為時舉誦焉國家混一海宇而設官以撫民民之休養生息者六七十年既庶且富矣聖天子嗣位益隆太平之業思俾萬姓皆安於田里內有父母妻子之娛外有親戚朋友之樂而無轉移失所者於是大臣建議於諸郡邑皆益官而撫之故時舉等遂受職以行夫民既安矣而視之猶若未安此天地生生不息之仁也時舉之去所以奉承而慰撫之當何如用心哉安其已安之民而益使之安者上之仁也盡已之心而又徇人之心者臣之忠也鼂錯有言民情所欲夀富安逸而已茍因所欲而與之民無不安樂之者如是則上之仁逮乎下而已之職盡矣然必公而無私然後能乎此彼其以家為纍者不能也時舉其勉之哉潼川土地肥美物産富饒聞其為守者頗盡心於民夫既有所資而又有能撫之者則民之安可知矣然則時舉之去其於成績蓋不難要在慎其身而已豫故歷序其世與夫所以授職之意以送之使之自重而求不忝焉時舉亦以為迂乎哉贈翰林林修撰詩序臨漳林震敦聲起諸生為進士第一即拜翰林修撰既三年遂蒙恩封其父母皆六品而錫之敕命敦聲復請告歸省又賜之楮幣而遣之於乎敦聲其榮也已初敦聲之來也豈有意於文冠天下而為史官之長哉雖有意於顯其親然亦安敢必哉今而皆得焉雖敦聲有以取之而聖天子逮下之仁誠可謂至矣今歸其鄉鄉人父兄子弟必將低徊羡慕而有不可及之歎則敦聲之所以震耀乎鄉里者詎可以尋常論哉豫聞之君子之仕必思盡其道其道有未能盡君子必慊然於其心况受施厚者其報深取名盛者其責厚乎今敦聲之取名不可謂不盛其受施不可謂不厚矣而人之所以責望與敦聲之所以圖報者當何如耶昔之冠天下者可數也其人之碩大其功業之𢎞偉亦可究而知之也孰謂今之人不如古之人哉要在求諸已而已仁義之道人所固有仁必篤於親義必忠於君以是存諸心而見諸行事雖古之人奚過哉宋皇祐中策進士仁宗焚香以忠孝狀元為禱既而得鄭獬今之所求亦莫切於此敦聲於忠孝既已引其緒當思益盡其道此所謂仁義也推而極之至於仁義不可勝用使天下之人仰而望之曰進士第一人固如此誠無愧於厚施無負於盛名而益低徊羡慕有不可及之歎則敦聲非但為邦家之光閭里之榮也敦聲去而速來夙夜以圖之此君子之望也將行素相厚者贈以詩而請豫序豫亦厚敦聲不自知其言之切如此敦聲其亦亮豫意否乎贈江西按察副使劉君復任詩序江西按察副使鹽城劉君彛川之在江西六年以清慎自持以方嚴臨下其用心之公行事之正士大夫談之今以考績復任皆作詩以贈行而俾豫為序豫謂按察司之設其任誠重矣然察吏治得失而激揚進退之乃其首務也至於聽訟而決其是非蓋末矣夫以數千里之地為之民者誠衆亦安能使無訟然實繫乎為縣者之賢不賢而已為縣者果賢教之有其素制之有其方強者不得肆而弱者有所立則訟何自來哉江西素稱文獻之地其人多讀書知道理又得藩憲大臣之賢者而臨之最為易化而不幸有訟之名昧者不察其本故於贈劉君試相與言之蓋嘗觀於水矣噴崖觸石洶湧而不平者激之使然也必疏鑿以平之然後安流而無害若畚土疊石而加壅遏焉則泛濫橫流為暴滋甚獄訟者不平之積也物我相形利害相感而不平生焉其始也欲求平而已為縣者公其是非而加以懲勸或付之鄉老里正使據其實而平之彼得以暢其抑鬱之懷伸其憤悶之氣則亦已矣孰肯以其身必就刑戮哉而為縣者之公且平誠鮮也或移於讒慝之口或溺於愛惡之私不然則貪惰茍且豪吏猾胥捭闔而把持之是其所非而非其所是彼不平者既不得平而又加甚焉蓋雖鄒魯之民有不能忍於是始棄其身冒國法干憲典而大獄興矣由是論之獄訟之所以繁非由為縣者之不公且平有以激之哉是故欲民安而訟簡必察夫為縣之若此者而黜罰之斯可矣不然則強者愈肆弱者無以自立獄訟無時而已也嗚呼此正其本之説而不可緩者也劉君今之賢者按察使童君與凡同列者皆賢其必有取於豫言哉故書以為贈行詩序贈錢生序錢生鳯躍吉水人今翰林侍讀學士錢先生習禮子也先生居京師久生來省侍留三年不去朝夕在親側聽誨言其質甚清而氣甚和其言動恂恂未嘗違於理京師蒙天子道德之化然繁麗之極於物無不有其中可以絢惑人之耳目而移易其心志者蓋多生未嘗一屬意居間無事輒閉門讀書間有所往非謁先生長者則過親戚故舊之家未嘗慢戲佚遊豫心重之先生修錢氏族譜命生書端重遒美既成書而以屬豫序然後知其世德之盛慶澤之長宜其子孫之多賢也豫既為序之而以仁義勉其子孫既而生以父命歸其所厚者鄉貢進士梁婺袁和等相率求豫文贈之嗟夫生之得於天者美矣且承先世之遺嚴訓之篤是得於人者又備矣豫何以增益於生其所宜言者豈有加於仁義哉仁義之道大矣而其實則在於事親從兄去夫私欲之害自末節近事而推盡其大者逺者焉又推至親親仁民愛物輕重厚薄各得其宜而後仁義之德全如是則誠為錢先生之令子也無愧於吳越國之後也生必勉之或者曰今之稱生俗以為薄也而子於鳯躍每稱生獨不慮人之駭且怒耶豫曰生非可薄者也豫之愛生蓋厚矣昔者楚有韓生漢有賈生伏生歐陽生髙堂生宋有廣文曾生是豈薄之耶豫用是期生豈不厚哉生宜以是自勉慎無惑於流俗也遂書以贈其行贈祖知縣歸嘉定序昌黎祖述尚賢之為令於嘉定也有寬惠之行通敏之才故嘉定雖劇縣而事無不理一縣之人皆安之吏部郎中宣嗣宗禮部郎中黃養正常為豫言如此而豫郡人蕭學敏為嘉定主簿與尚賢同僚今年以督運來京師豫問之亦亟稱尚賢之美豫雖未識尚賢然所以知之者不自二三子始也蓋嘗聞其為福建參政以才名振當時福建為府八為百里之縣凡五十尚賢設施措置無難者夫以治五十縣之才斂而施於一邑辟如千鈞之弩以穿魯縞也則嘉定之政烏足以盡尚賢之才哉然豫所以重之者不在是士之仕也貴乎有以及民位之崇卑不計也然而以崇卑為欣戚者常多故昔之人有自崇而卑者往往有不屑之心不然則沮且怠焉夫有不屑之心而沮且怠也則事之廢墜民之失所可知矣以已之不快而至於如此安得謂之善自處者乎安望其能終吉也乎故寵辱不驚而安於所遇君子之髙致也蓋君子求諸心而已茍無愧焉斯可矣外物何足計哉尚賢嘗尊顯矣今乃勤於為縣使民安而政舉蓋所謂寵辱不驚而安於所遇者此其所以可重也夫進退無常如晝夜寒暑之迭相代也進而復退安知退而不復進乎尚賢今雖為令後之為郡為藩憲不可知也遂進而為卿佐亦不可知也要在慎其道而已尚賢以三載考績最而歸嗣宗養正求豫文為贈故為序以贈之贈鄒知縣復任序樂安鄒良子都為邵武令有惠政凡其縣之民與武士之在邵武者皆安於其所為無不悅服既九年考績來京師衆不忍其去相與言於藩憲大臣乞留之藩憲大臣具以聞上重違衆志升秩從六品而還之邵武户部侍郎吳公璽邵武人也為豫誦其美而喜其歸得以慰人望求豫文以贈行豫謂令子民者也有父母之道焉是故寒而衣之飢而食之煩勞則安之疾痛則撫摩之至有所費則必為之擇利而思所以節之如是而又教以孝於親弟於長睦於鄉黨姻族相維相恤而各止其所焉則民生遂風俗厚矣此豈人之所難行哉特患無是心焉耳令以愛子之心施乎民則民亦以順父母之心待乎令治化之不成縣之不治蓋理所必無者也豫嘗求之天下所見能此者無幾人心甚重之及今又見子都子都之治其真有子民之心哉夫能使其民愛而留之已難矣而武辨之士亦愛而留之非其心之公化之篤恩惠之廣被有不能然者嗟夫子都豫之重子蓋有加焉者矣古之君子得志則澤加於民凡其所學與所行者皆不外乎道是以德業彰而名聞流今國家建學校以教之蓋以明是道也又設官以任之欲使行此道也下之所志與上之所期待可謂相合而不相戾矣宜乎在位之士皆能盡其道而民無不被其澤者若之何其寥寥然也以豫觀之非迂懦不立則剛愎不仁不立則媕婀以病民不仁則貪暴以虐民子民之道與民所以仰望之意豈如是哉於是有厭惡而欲其去既去而惟恐其復來者此非民之薄也宜也子都能使人慕戀如此則豫安得不深重之哉今之歸益務盡其道使在下之人益親戴之如父母斯無愧於古之君子德業名聞之著豈有窮哉豫未識子都因吳公之言而信其必然者遂為序以贈之南岡李氏族譜序泰和南岡李氏唐西平忠武王晟之裔也蓋忠武之子憲由江西觀察使節度嶺南其子遊為宜春守故憲罷鎮遂家宜春遊之弟鍇又析居分宜之白芒歷十二世至公儀為大庾簿老而歸其子禹輔奉遷於南岡遂為南岡始祖三傳至英叔元授柏興路同知亦以老不赴柏興孫如春為南安推官柏興資積纍巨萬有田園山林之富池臺館宇之華花卉竹樹之勝又有四方賔客之往來相與極觀逰之樂觴詠之娛歌舞音樂之奉蓋比之封君逮至南安子伯顒伯昂遭遇世變盡失之然當時風流勝槩人至於今能道也伯昂之子桓圭信圭又以文學才行皆出為縣令而皆有名李氏詩書簮紱相傳何其盛而且久哉蓋西平有大功德於唐足以庇賴其子孫而柏興之澤又有及乎鄉邑其大者修碉石槎灘二陂堰江水以溉田多至三十餘萬畝皆為上腴常稔之田民之賴其利者不少李氏之福當與陂水同流而陂水豈有窮哉况又承之以詩書之習是宜其久而盛也桓圭信圭家食時嘗修輯其族譜自南岡七世又上泝至忠武凡二十一世支分𣲖别粲然明甚其意豈特正倫理篤恩誼哉將以示子孫使知其本源而思繼之也易曰積善之家必有餘慶然則積善固承家者所宜務謂之積者纍而蓄之之謂也自言行之微以至人倫之大無不盡其道始於其身貽及乎子孫而皆不違焉則其積也厚矣善者天之道也人能為善則天必佑之為之者繼繼而不窮天之佑之亦繩繩而不已則家之盛雖至百世未艾也信圭弟介圭謹飭而好修其志亦欲有立於世又取是譜增續之持以求豫敘豫既與其二兄遊而又嘉介圭之志故為序之亦以勉其為子孫者贈解禎期詩序解氏在吉水以宦學為名家其顯於宋元者豫不能詳也國朝洪武初設科取士筠澗先生與豫先祖竹亭徴君同校文廣東其聲氣相似而道誼相合蓋無間然者其後先考肇慶府君又與筠澗先生之子禮部君及學士公相往來逮豫領鄉薦會試禮部學士公實典文衡及竊第入翰林為庶吉士讀書於禁中而學士公篤念世好所以示教者尤厚當是時禎期亦以善書被薦入館閣則禮部君子也太宗文皇帝鋭意文藝詔學文者必如韓栁學書者必如羲獻然後已禎期超詣精到細書黃庭誠無出其右者豫嘗相與同遊處論前人交好之故其意氣莫逆也今三十年豫猶忝侍近而禎期自中書舍人升大理評事仍執筆翰林雖各縻於職務不得從容如曩時偶一間暇輒相聚談笑移時而後去因復自歎豫二人者皆老矣而少時意氣猶在也庶幾其終不違乎今年禎期以目眚乞歸治上許之俾疾愈而復來將行凡相與厚者皆作詩送之而屬豫序嗟夫禎期果於去也哉太宗文皇帝教養之深仁宗昭皇帝與今皇帝眷念之厚皆不可忘也古之人有感人一言而許以身者况聖仁如天哉禎期尚未七十專精神謹醫藥則疾斯愈矣愈則復來庶幾尚有以報萬一乎豫既有世契又思與終好也故為序如此禎期之意必有同乎豫者矣歐陽允器慶夀詩序歐陽為吾邑巨族允器則其族之賢者也讀書學文欲有以自見既而以教其子無復用世意子湯登進士第為刑部主事以勤慎舉其職前輩皆稱譽之曰其子如此則其父可知由是允器之賢寢聞諸公間允器生於洪武乙邜至今宣德甲寅年六十矣四月初五日其生之日也湯以告於縉紳先生請為賦詩將使持歸詠歌以稱夀焉既成軸矣而以求豫序豫謂古者君子之愛敬其人也則必以眉夀祝之南山有臺之詩周人晏享通用之樂歌也其詩曰樂只君子遐不眉夀又曰樂只君子遐不黃耉蓋敬之隆愛之深則期之逺矣而况於父子之親乎夫人子之身皆本於親於其所能致者皆自親焉致之故凡所有舉不足為報也惟祝親之夀考庶幾永有所依而得效其萬一焉此所謂愛敬之至宜乎湯之惓惓然也豫聞之孔子曰仁者靜又曰仁者夀夀固靜之所養也松柏生於山林其去人也逺其植本也深據土壤之腴承雨露之潤其大百圍歷千嵗固宜也允器當太平之時處幽間之地無拂逆之患而有順適之娛則其年之永福之備誰得而及之允器其尚篤於仁矣乎仁固福之本也國朝之制仕者之賢必推本於父母而加恩焉故仕滿三年而無過舉者則封贈及其親湯既有譽於時皆庭訓使然也則允器之受恩於君蓋可以日月冀矣仁之篤則福之進將益逺大而無窮他日尚當為言啓羣公之賦詠以為夀不但已也慶夀詩序富春孫公大年以元至正乙酉嵗生至今宣德甲寅年九十矣正月二十二日其生之日也子景安景德將以是日大具酒殽盛賔客以慶之其季景名由監察御史改揚州推官考績在北京告豫曰家君荷天之福以至於此幸矣而限以官守不得從二兄奉觴稱夀於心有不能釋然者今命工繪為圖而求諸公之詩使子瑨奉歸獻於堂上而歌詩以為夀庶幾以慰悅其心願先生為之序豫謂天下之物出於人為而可以充其口華其身適其性情安其寢處者皆足以致之至於夀則出於天雖聖賢有不能必者蓋非智所能謀力所能任也是以君子之相愛也則必以夀祝之祝之者冀其有得於天然亦豈可以幸致哉洪範五福其一曰夀推其所致而本於德焉茍務乎德斯足以獲乎天然則天非不可必也彼其有不得者蓋不可以常道論矣公之獲乎天如此豈非德之所致哉公生於元之季世乃皇明當興之時辟之貞之有元冬之有春也是以溫厚純固之氣實鍾於公暨混一以來列聖在位覆載生成之德厚矣故公益享其夀考康寧之福然則公雖有得於天豈非亦遇其時哉今天下之人多矣其夀如公者蓋有焉然不能皆形於歌詠者不皆有景名為之子也公有子有孫既貴且富而又有文以為頌其福不既備矣乎抑嘗觀夫南山有臺之詩周人燕饗通用之樂歌也既皆祝其夀矣而又曰樂只君子德音不已曰樂只君子保艾爾後者何也蓋既有獲於天而又祝其勉於德以安利其子孫詩人忠厚之意愛之至而期之逺也故豫為序其詩而願有進焉則夫獲於天者將益悠逺而無窮矣贈趙典史歸豐城序典史於縣職最卑然一縣之事無所不當問蓋政教之施雖自縣令主之而贊畫其可否使不失乎中辦治其文書使不違乎理則典史職也凡藩憲二司及府若州有事臨乎縣者必先及典史典史賢於事無不治於應接無不宜則令可以囂然自得矣不然責必及之故為縣令者必樂得賢典史以自助典史果賢則當以賔友處之不以勢分相軋也而為典史者必恭於上惠於下制心以禮制事以義不矜已不競名則其位雖卑抑誰得而踰之哉故曰官無卑貴能盡其道焉耳然有勇於出位敢於侵官恃其才之可為而不識其分之不當得者至於令亦有傲然自髙悍然自用惟知固權於已而不知取善於人者彼其所處如此是豈有同寅協恭之心哉使不相遇焉猶之可也不幸而適相遇也鮮不廢事而敗名者夫治縣辟若操舟然舟師主之而衆工相焉必戮力同心斯可無患也若不相為用其不敗焉者寡矣是故若彼者皆君子之所甚惡也武城趙中克庸為豐城典史考績來北京豫未及識也而其友兵部員外郎李畛彥博因豫友曾士𢎞來求文贈之謂克庸能以勤慎舉其職則固可謂賢於人矣然其令之為人豫不能知其相得與否亦未之詳也姑言其職之所宜者如此蓋欲克庸益盡其道而已君子之仕也必自卑而升髙世之逹官顯人豈皆一蹴而至乎其極哉蓋必有漸也是故君子患不能盡其道耳茍能盡其道則升於髙位可必矣克庸勉之庶乎其進於逺大也抑菴文後集卷九
