body:
  text: 抑菴文後集卷三十明王直撰墓銘歐陽先生墓志銘永樂二十年十一月初三日國子助教歐陽先生以疾卒于官時監學之賢自司業吳公以下至於六堂之士往來問疾治醫藥者相續於其門及卒也又相與哭之哀凡所教諸生官京師者皆來會哭且相與治其喪子哲奉柩歸泰和凡祭而送者又千數百人既歸諸子將以缺年缺月缺日奉葬于其鄉馬􅀈岡之原而先以事狀來請銘豫與先生同邑且有連又同官京師二十年間暇相從講學論道相知為最深蓋先生自幼聰慧夙成讀書輒了其大義稍長懷竒負氣不肯在人下遂入鄉校為弟子員洪武庚午領鄉薦眀年會試禮部中乙科得嚴州教授益自刻厲其所以自修者必依于仁義忠信而其教人亦如之以母憂歸家父觀瀾先生為憸人所誣受役太常役滿猶當戍邊先生與兄允清謀曰父受誣而情不白今且老矣戍役可奈何即以情聞于上願以家人代戍使父得終飬上憐其孝許之一時士大夫嘖嘖稱譽服除調興化教授秩滿升國子助教時天下太平天子篤意文治永樂四年三月一日親釋奠于先聖孔子因視學祭酒胡儼司業張智以經進講畢命學官坐賜茶而退明日上表謝人賜衣一襲錫宴奉天門詔國子監官坐各官上先生在列人觀其進退容止皆以為宜受此榮也為助教九年例當升有司失奏請守舊職人皆為先生惜之而先生怡然又及九年將請告歸覲而乃以柩歸嗚呼其命也夫先生為人雍容敦厚無畛域其言恂恂未嘗忤于物然臨是非利害之際則有確乎不可奪者其與人交久而益善尤篤于倫誼從兄允堅為益都丞伯兄允清為淶水縣學訓導皆以事謫戍興州先生皆屢以俸給之其為人師善誘掖奬進講經至于精微􅈤􅈤為諸生言故承指授者皆有造就其列官中外蓋五百餘人其在太學四方充貢者皆願屬歐陽先生至有托逹官貴人請于祭酒司業而後得之其尊德善教為人所向慕如此其文思發越動蕩必以理勝有集若干卷藏于家先生諱賢字允賢世居泰和蜀江為衣冠之族高祖德高充國子學録曽祖孚先祖以定父觀瀾皆不仕而皆有德善為鄉邑所稱母王氏先生以洪武元年十月十五生享年五十有五娶劉氏贑州府學訓導一清之女有賢行子六人哲登永樂十九年進士第莆先先生卒女二人孫男三人先生兄弟五人允仁允乾皆讀書為士人允和為監察御史歐陽氏之福盛矣然其尊府年九十餘尚康強無恙而先生遽以疾終嗚呼此其可哀也已銘曰德足以潤身學足以及人既逢其辰式榮其親不及百年天道奚信歸藏斯丘後嗣彌振龔處士墓志銘處士龔氏諱賢字思齊其先汴人宋建炎間有遇仙者從高宗南渡道昆山愛其土俗卜居之插銀杏一枝於地曰生則吾居於此既而果生遂定居焉於是為昆山人高祖端甫曽祖天祐祖士斌父子瑞皆不仕而皆有隱德鄉里敬重之處士自幼端重若老成人性聰敏讀書輒了其大義甫弱冠祖父相繼沒克自樹立而喜從縉紳先生問學故識益廣行益修而家益饒事其母極孝敬處宗族鄉黨厚而和交朋友慎而信縣大夫竒之俾長其鄉賦稅竭力奉公事集而民不擾鄉人有疑事及鬬爭不求決於官而求決于處士處士旁引曲譬一折之于理無不悅從人有艱食及播種無種者處士則傾廪給之天旱不雨則多為桔橰以惠貧者使引水灌田而不取其傭故里中貧民有以為生而無鬻男女轉徙失業者凡喪有不能舉者與之棺嫁娶無資者助以財其善之及人多類此是以人多德之為縣者亦往往稱譽以勵俗尤篤意教子延良先生為之師而躬視其業加砥礪焉故皆能有立其生以洪武丙寅十二月初九日而卒於宣德癸丑五月十七日年四十八娶周氏子男三曰珩曰理曰琚琚以春秋領鄉薦會試禮部中教官選蒙恩拔擢授冠帶讀書於太學蓋以逺大期之一女子曰淑英在室孫男一曰慶同理聞訃將歸偕其兄弟奉葬於駟馬涯先塋之次而以禮部主事沈餘慶行狀來請銘豫謂先王之世以孝友睦姻任恤教其民故人人有士君子之行及乎後世教有未至人亦鮮能務此故可稱道者少矣今觀處士之行不幾備矣乎雖聖朝之化抑其天性然也是宜銘銘曰其行之淳既有及於人宜久存厥身而遽返其真維嗣之賢終以克振垂逺有文以揚其芬陳處士墓志銘處士諱頥字九齡姓陳氏世居上虞之小越歷二十一世生某某生某某生與道處士之曽大父大父父也與道娶孫氏生三子處士其季也少好學有志于當時及伯兄韶出為亷州教授仲兄睿為叔與權後處士専家政家既饒裕事亦滋出遂無復用世意曰吾能不墜先業亦可矣奚必仕哉其立心平恕而識度過人年未五十縣舉為鄉老一鄉之人有不平者不之縣庭而皆求直於處士得一言無不意滿而去縣令丞於事有疑者多詢之處士為區畫處置曲盡其道急於為義鄉之貧弱有姻喪不能舉者多賙給之其於教子孫尤篤招延名士為之師蓋自先世已然四眀孫某括蒼王某其先皆延為孰師以道義相好遂留不去至處士皆分給田廬俾為永業子孫遂連姻婭宅前有山最竒秀鄉先生徐某求為葬地術者曰是大利子孫處士曰使吾子孫能力學爵祿自至奚必是吾不可不遂徐先生志即告諸族人書劵與之不受其直其平生篤義如此嘗戒諸子孫曰為人後者當砥名礪行不愧于前人吾老矣汝曹勉之及從子羆選入邑庠為弟子員孫瑰以推擇從事憲府則又勉之曰進取之階雖不同然能敬慎自持則皆足以致顯榮吾不及見汝無忘吾言也永樂甲午正月五日以疾卒於家其生以元至元戊寅閏八月十四日享年七十有七娶顔氏有婦道克相其家三子伎侃皆先卒傪後五年亦卒女一嫁士人馬斯臧孫男五人瑰今為吳縣主簿其四曰缺孫女一曾孫男七金登宣德癸丑進士第為翰林庶吉士處士之葬以卒之缺年缺月缺日其墓在蕭灣之原葬已二十餘年而尚未有銘至是羆取進士為贑州推官與瑰各以職事來北京會於金之官舍憶處士之遺訓而傷之思眀著其德以傳於久逺於是瑰屬羆為狀而使金請銘於豫曰先祖之沒賴先生以不朽請勿辭乃按狀序次而銘之銘曰猗陳公德之良儀於家孚於鄉教子孫篤義方福則那慶彌長刻銘詩久愈光陶節婦諸氏墓志銘陶節婦諸氏蘇州昆山人曽祖挹祖勝父安之皆不仕而皆有隱德安之娶陸氏生節婦端一柔嘉間於女事習聞父母禮義之訓及古昔賢女貞婦之行心切慕之及長嫁里中陶震孝以事姑敬順以相其夫生二子琛璐而震卒節婦年才二十四父母憐其少欲嫁之節婦誓不他適苦辛劬力以事上撫下舅姑沒節婦竭其資以葬既無所依遂復依父母其父母無他子亦賴節婦以養及當徙京師亦隨之既而璐卒父母相繼沒節婦皆以禮襄事雖備極艱難而志愈明節婦厲琛受教以行誼聞節婦喻之曰汝一身而二姓之祀系焉汝其慎之琛奉命惟謹永樂十九年有司以節婦事上於朝詔旌表其門琛娶張氏繼王氏孫男二長瑛早卒次元素節婦教之有法度遣從眀師受業領鄉薦當赴春官以節婦老慕戀不欲行節婦勉之就功名曰當使吾見爾有成也又遣琛送至北京及元素成進士而節婦訃至蓋以正統元年二月三日卒於家年七十七琛父子皆不勝其哀琛即日歸治喪語元素曰葬宜有銘使託大理評事同郡張益述節婦行實而以請於豫豫觀節婦之所自立誠可謂難矣夫節義雖生於心非有待於外而處豐豫則易處困約則難然豐豫而失其守者亦多彼固不能自擇於禽獸也節婦之困約蓋甚矣而卒能卓然有立於世此易之所謂安節者也是不可不銘其墓在缺之原其葬則缺年缺月缺日也銘曰婦人貞吉唯一之從偉兹節婦困極而通煌煌髙門錫命顯隆令子賢孫以榮厥終既安既藏有鬱其封刻銘于中以耀無窮鍾處士墓志銘處士泰和荷塘里人以洪武甲子二月二日卒年五十六葬其鄉湖角塘至是孫沔為邵陽教諭官滿來北京致其父彥初之言曰先人之葬彥初尚未成童蓋不能如禮今卜者又以為不吉愚豈敢自安將以正統二年月日改葬於兆次墓宜有銘敢以請豫少時嘗讀先大父竹亭先生所作處士東遊藁序知處士以詩名縉紳間心竊慕之而恨不及見則今之請其敢辭按狀處士姓鍾諱祥字舉善曾祖闕祖景雲父靜春皆不仕處士自幼頴敏好學多讀書事父母至孝靜春府君喜藝蘭時號蘭所既沒而處士哀思不忘求宋景濓先生書蘭所二字揭府君之室旦夕瞻慕如或見之事兄舉正甚篤兄卒二子繼沒處士厚撫恤其家鍾氏故饒財元季兵亂盡失之處士不屑意惟以書畫自娛興之所至發為吟咏洪武中劉先生子高嘗客南溪蕭氏蕭氏之賢曰鵬舉雅能詩與處士為內外兄弟得相從講論詩遂大進處士家雖貧賔客相過或不能具酒食而泊然不為動唯篤意於詩皆清雅有思致劉先生序之以為窮而能工者性樂易無畛域與人交懇懇盡誠可謂君子長者矣娶羅氏繼陳氏子一人彥初女一孫男八曽孫男處士詩多至千餘篇而多忘失今存者什二三為卷藏於家銘曰維昔詩人窮而後工猗嗟處士乃與之同既昌其詩窮則奚恤視彼顯者孰得孰失矧曰孝友式獲於天有繁孫曾慶則斯延新墳峩峩是為吉宅昭德垂休納此貞刻康孔猷墓志銘泰和處士康孔猷以宣德甲寅十一月十九日卒於其子京山縣學訓𨗳韶之官舍年七十六既奉柩歸將葬其弟梁府紀善孔高之子大理評事頮詣豫泣且言曰伯父不幸已矣惟其善行有足書者蓋事繼母如所生友愛弟妹至老無間言親戚有急即赴救之病疫人不敢近獨數往視而周其所乏死者為具棺葬焉行道之人有病投止者飲食之病愈而去未嘗有德色或私用其所積榖貧不能償置不問平生喜讀書手不釋卷乳源縣學嘗欲請訓諸生謝弗就為里孰師以吟咏自娛非公事不一至官府其行之善如此娶曽氏三子豫勉早卒其一即韶也女三孫男六其葬以年月日其墓在千秋鄉末車之原敢請銘于先生豫與處士同邑居其何敢辭然嘗銘紀善君之墓而載其世系為詳此不著銘曰恬以自怡而不外馳善有諸內亦施於外逢時之隆以夀考終其安於此利爾後嗣教授黃君墓志銘黃先生諱須字用之福之永福人始逰邑庠以詩經領鄉薦及會試得蕭縣教諭以內艱去服除改番禺又改萬安秩滿升瑞州教授以舊官代還改廬州卒權厝於廬州先生為人溫厚和平其持已甚嚴而教學者甚篤故所至有成蕭俗徑悍為士者亦不樂學先生誘而進之遂有以進士顯者番禺萬安素尚文得先生為之師士益勸以眀經進者益多萬安劉哲遂為禮部第一其廟學久而敝先生次苐修之煥然華好前之自科第出者勒其名于石以風勵後學萬安人士服先生之教皆敬而愛之非若他人為師弟子者既滿不能留白于縣官奏乞留之奏至已遷瑞州瑞之士亦喜得先生而遽以代去在廬州僅三年學者知所嚮方益趍於學而先生卒矣先生之去萬安人思之不能忘及聞其卒莫不哀惜之先生亦嘗美其俗有留居之意至是故諸生擇地以居其孥相其子亦水迎先生之柩歸葬焉刑部員外郎劉廣衡諸生之傑然者適請告歸省墳墓既為經理其事又以先生歷官行事之實為狀持亦水之書謁豫銘先生孝於親親沒哀慕既久而不衰恭愛其兄兄老而子弱先生每之官必奉以行事之如事父撫姪亦信如亦水萬安訓𨗳何阜卒于官貧不能給喪事先生為具棺稅地葬之而資贍其家其子來又厚賻贐而歸之工部員外郎趙鼎卒於交址有司遞傳歸其骨至萬安失之越數年其子求之弗得訴之官無可奈何先生百方為求得之加賻遣焉平居以誠敬自持喜怒不形於色遇人無貴賤少長皆有恩意其心之厚於仁如此曽祖均夀祖提叟父則敬皆不仕娶同邑陳氏繼杜氏子一人即亦水女三人孫二人其生以洪武辛亥十一月十七日卒於宣德癸丑閏八月十二日享年六十二其葬以缺年缺月缺日其墓在萬安縣缺之原嗚呼師生之義薄久矣豈獨生之罪蓋為師者不能盡其道不足以化服之耳今於萬安觀之非先生德之至與其士習之厚惡能至是哉用是可以為勸于後世矣何可不銘銘曰嗚呼先生德周於身教孚於人是以其澤雖久而不泯峩峩髙墳松楸在原何必金支之麓玉泉之濱其安爾魂寧爾神利爾子孫彌逺彌振周振文墓銘泰和爵譽周氏為著姓蓋南唐僕射矩之後幾世至希叔始徙居其鄉之陽岡希叔生道立雖皆不仕而皆不沗其先則振文之祖父也振文幼孤其祖教育之既長哀痛以念父孝敬以事祖遭元季亂離奉祖避難未嘗以艱虞廢禮喪亂既平勤身節用以裕其家慎終追逺慕古人之行嵗時奉祀必誠必親常曰祭而豐不如飬之薄蓋未嘗不泫然也讀書知道理事無大小必盡其宜人無賢不肖皆有恩意且姿貌豐偉而言語恂恂人敬愛之縣大夫舉行鄉飲振文必與焉蓋可謂善人長者矣以永樂缺年缺月缺日卒于家得年缺娶缺氏有子曰缺於其葬也以翰林庶吉士廖謨所為狀來求銘豫嘗往來其鄉聞其行良然今已矣是可惜也乃為銘曰豐其貌行則臧刑于家孚一鄉嗟不見此其藏我為銘百世光彭孺人墓志銘孺人諱玉字玉潔姓任氏蓋保沖處士之長子而彭君學禮之賢配也兩家皆家泰和西郭室廬相望又皆以善良稱於其鄉故孺人為彭氏婦性眀敏幼讀論語孝經皆暗記而通其大義其為女也能哀痛以念母孝敬以事父撫其弟妹有加焉既歸移其事父母者事舅姑衣食湯藥必親焉柔順相夫子以主其饋祀和睦處宗族而適其戚疏教諸子以禮蓄奴婢以仁見鄉鄰之貧者必惻然思濟之淑善如此而不及中夀以卒其命也夫蓋生于洪武已酉十一月十九日而卒于永樂庚子五月二十八日享年五十二子一人曰俊讀書習舉子業女一人其葬以缺年缺月缺日其墓在缺之原豫與彭氏有世好故俊以狀來請銘豫嘗聞其行云然今按狀果然乃為銘之銘曰才淑行孚宜其室家施于父母移于舅姑克相其夫子亦惋愈惠洽童奴逮及里閭天不永年五十而殂歸藏斯丘命也嗚呼康宗性墓志銘永樂十六年八月十一日衡山縣學訓𨗳康先生卒於北京孫衡負骨歸泰和其子伯徽奉葬于其鄉而以事狀來請銘按先生名某字宗性泰和沙溪人曽祖友賢祖文瑞父景從皆不仕先生生而端確好讀書而家素貧困於無資乃去從舅氏尹務厚先生學詩經業成舉廣東乳源縣訓𨗳未幾調雲南之曲靖永樂初復還乳源秩滿遷衡山能以其學教諸生所謂堯舜禹湯文武周孔之道朝夕講説􅈤􅈤為之盡故所在皆有成其自衡山考績赴北京過直沽得疾至則不能朝求醫治療不愈且死衡與其親戚王汝霖以身後事為請先生索筆書云上天生我上天死我一任於天有何不可觀其於死生之際如此則其平生所飬可知矣既斂比舍失火焚其柩乃拾骨以歸嗚呼其可謂不幸者矣先生平生謙謹秉直不欺善𨽻書通隂陽術數又能詩有詩集闕卷藏于家其在衡山名其所居軒曰樂靜軒故門人稱為樂靜先生云其生元至正戊戌享年六十一子一人女三人孫男四人銘曰質厚而不華才美而行嘉藏于斯丘君子之嗟羅孟敬墓志銘極拙翁者姓羅氏諱存字孟敬泰和人也以永樂辛丑四月二日卒卒之後二日其子仲晦奉葬于縣北之楮原而墓未有銘今年豫以內艱起復將之京仲晦乃以其孰師康中行所為狀來求銘按羅氏始家邑之梅溪其祖均瑞乃徙居城西父仁夀皆不仕而皆饒財好施與翁有弟六人篤於孝友父早卒葬祭無違禮撫其稚弟有加應門幹蠱以身先之奉母劉尤盡其道篤意教子請蕭尚仁先生為之師先生剛嚴難事翁處之雖久無間言性不嗜酒出入閭巷恂恂然未嘗忤於物常言種德莫如醫乃學眼科人求之多竒效窶夫細人皆與善藥不責其報有司嵗行鄉飲必禮翁為賔平居無事輒焚香端坐誦佛老之言及古人竒方奧旨訓子姪必以仁義忠信與鄉人賔客談論亦如之聞人有善喜若已出雖童僕有過亦以好語訓勵未嘗加笞箠其交朋友以信處鄉里宗族皆和厚平生畏慎于機變之巧耻為之嘗别治宅於舊居之南名其堂曰極拙前靖江王府長史蕭用道為之記又因以自號曰吾無益於世宜以是表也其生以元至正丁亥八月二十六日享年七十五娶蕭氏子二人長仲勤讀書有氣節先翁五年卒次即仲晦通醫學能世其家女四人孫男七曽孫男二豫與翁同鄉里知翁之行而子又能求銘以著不朽則豫安得辭乃為序而銘之銘曰世人競巧翁以拙稱不究其行孰知其名胡不百年七十而止歸藏斯丘裕爾孫子廖先生墓志銘永樂二十年八月初八日桐城縣學教諭廖先生以疾卒于官其子儀仲祥仲奉柩歸泰和葬于缺之原惟墓宜有銘乃以鄉先生曽存禮所為狀來請豫與先生同里閈少先生二十年而辱與為友相知最深今雖以內艱起復匆迫就道其忍不銘先生墓乎按廖氏始由金陵徙泰和世以儒名家先生之祖芳所以明經教授鄉里父伯先亦舉明經為翰林編修官後終五河簿先生諱傳字季習自幼端恪凝重聰悟夙成其為學早夜不懈縣大夫舉為學官弟子業成升太學選授松溪縣學教諭其所以教諸生亦如其自為學旦暮坐堂上相與講論聖賢之道必以修諸身而見於行事於是學者皆有成其出而顯者比比也會朝廷纂修永樂大典徴天下教官萃京師者數百人能如先生者無幾館閣諸公雅愛敬之書成受優賚歸松溪考滿調桐城其所以教亦如松溪時才三年而先生有疾然每旦猶肩輿至堂進諸生問所業至疾甚乃已及卒諸生哀之如喪所親平生質直好義不喜浮華幼孤貧事母至孝年十四伯先先生卒於五河能輿櫬歸葬哀毁如禮鄉人咸稱之其教子姪處宗族交朋友皆盡其道事獨孤氏寡姊意厚甚撫其甥樂善尤有恩樂善今仕為都水郎中能舉其職蓋先生之教然也其生元至正丙申五月二十五日享年六十七娶曽氏存禮先生之妹有婦道子二人憶前七八年豫為翰林修撰在北京先生亦以考績詣行在而主於豫萬寶坊之官舍時天甚寒豫與先生及儀仲三人者每圍爐至夜分煮茗而啜之談諧笑嬉不啻如骨肉及去豫贈詩十章自此不再見然皆相憶不忘也嗚呼孰知今已矣感念疇昔豫雖欲不銘可得乎銘曰廖氏之先來自金陵纍世為儒鄉邦所稱於惟先生孝友端確揚譽邑庠馳聲館閣表表有煒作人之功胡不百年六十而終歸藏斯丘曰有令子刻銘墓中作者太史彭士鼎墓志銘士鼎諱鉉姓彭氏居泰和月池世為望族與豫家故有連蓋豫之曽祖母則士鼎之從曽祖姑也自豫祖父時數以親故相往來豫少時亦嘗至其家拜其祖香山縣丞叔介先生與其父今處士彥晦君退而與士鼎諸兄遊相好也時士鼎年才十嵗餘方從諸兄讀書於經史日記千餘言端重謹確不事遨嬉凛然異常兒其祖父皆愛之後豫取進士官京師不見士鼎者十三年及以外艱歸間往至其家士鼎出所著文章與豫講論豫不能損益也嵗丁酉士鼎以易經領鄉薦在高等眀年上春官後期而歸益沉敏務學其志不肯小成而止也未幾得痰嗽疾氣或逆上藥食且浸減其父兄求所以療之者百方終不愈勢且殆則呼天曰吾父母老矣而我早死不克終飬曷少緩我乎竟以戊戌十月日卒其祖母與其父母諸兄哭之過哀而族姻朋友之知士鼎者亦莫不哀也嗚呼士鼎姿貌豐厚其進退行步翼然處事必據於理有不可者輒正色直言不曲從茍止遇大夫君子言色溫溫未嘗有所忤奉父母盡孝敬事其諸兄蓋怡然順也其為人如此而其家又世以儒為業其祖父蓋善人君子果安所獲戾於天而士鼎以夭死嗚呼所謂佑善災惡者可信耶士鼎生洪武辛未卒時年二十七娶劉氏萬安城江劉之女子一人生始數月女一皆幼葬其所居南園豫與士鼎最厚尤不能已於哀者也故為銘其墓銘曰嗚呼士鼎質厚而不華守正而不阿才足以為時用學足以世其家而夀乃不遐嗚呼其命也耶其可哀也耶方處士墓志銘舒之懷寧有處士曰方君琮字伯玉以宣德已酉十月十日卒年八十一其子義為河南道監察御史聞訃慟絶即解官歸治喪而以同官吳邦直所狀行實來請銘曰先人不幸棄諸孤今歸將以缺年缺月缺日奉葬於缺之原義嘗辱愛於先生惟先人之墓宜有銘以昭德垂後敢以為請豫曰嘗聞子之親蓋所謂樂善君子者今按狀良然是不可不銘方氏世為懷寧儒家處士之曽大父紹祖大父昻霄有文行而不仕父桂山在元為黃州教授陳友諒兵亂棄官而歸余忠宣公守安慶引為賔客用其謀城陷家覆與公皆死焉處士因流落沔陽時雖幼然能知其家世務讀書自立久之歸懷寧理故業而家益裕與親戚朋友旦暮過從以為歡其言行皆師古蓋未嘗有違於理者鄉邑之人皆愛且敬焉嘗謂人曰丈夫志四方吾將盡天下之大觀寧能老於此乎乃遊閩浙湘楚逾淮泗入陜洛所至觀其形勝訪古人遺迹遇賢士大夫內交焉意之所適援筆紀之名曰壯逰録歸而其中蓋浩然晚愛郭西山水之勝别築一室置圖書榜曰眀善常與客論談觴酌蓋終日焉因號明善處士常戒義曰吾家世業儒而吾幼遭亂不得力學以趾美前人汝小子宜成吾志既而義取進士為御史舉其職而處士教之以道益􅋀􅋀然時既以義為賢而尤多處士之善教配畢氏有賢行子三人義禮智而禮早卒女一孫男四於乎以處士之善雖不及貴顯然既食其子之祿而又以髙夀終可謂盛福者矣况國家著令仕而賢者即以所居官贈其親而處士有賢子安知不終享其榮也哉銘曰幼而屯長乃亨樂善道焯有名遊四方際盛明子克賢教之成膺胡福享遐齡藏于斯久而寧吳處士墓志銘豐城進士吳顯試用在京師聞其父處士君之喪即解官歸治葬而以吏部員外郎丁鉉所為行狀來請銘蓋處士篤意教子嘗作重室聚書延明師以教之縉紳之士之有名德者皆禮致其中名其室曰雲津書閣顯嘗求豫記曰此吾父以教顯也不可無記以示久逺豫為記之京師能詩者又從而歌詠之由是人知處士之賢而有未及識之歎乃今已矣顯以豫為知君故復請銘焉豫安得辭處士諱平字伯衡其先居豐城之吳塘至其祖景福始析居縣城雲津坊而與其父子文皆隱不仕處士早孤諸兄教育之然亦頴然克自立性資敦朴篤於孝弟先塋之傍舊有田以供祀族人各欲私之處士不可曰此祖宗所以致其孝敬者子孫宜百世守之其可廢哉於是田以永存而祀亦不廢平居守禮而好仁足迹未嘗至官府見人有不給者即賑貸之能酬與否不屑屑校也與人處久而益敬而於士大夫尤厚蓋欲成其子也顯既取進士鄉人皆賀處士亦為之喜曰是不負吾志矣及徵用來京師惓惓教以忠孝而厚資給之常曰仕者所以喪其良心蓋以家為纍也吾何靳於吾子哉人蓋以處士為賢既老自謂身際太平約與故人親戚歲時為會飲酒以相歡鄉里敬慕焉其生以洪武壬子八月十五日卒於宣德壬子缺月缺日年六十一娶羅氏有子三人女一人孫男五人處士之葬以缺年缺月缺日其墓在缺之原銘曰雲津之陽矗髙閣經史百氏相間錯延師教子俾力學有嚴訓辭本先覺業成而升志允若玉石加礲匪徒琢行孚於鄉警涼薄晚有髙情衆所樂嗟今已矣不可作新阡盤盤此焉托我為銘詩庶無怍後百千年久彌灼御史謝良翰墓志銘君諱憲字良翰姓謝氏臨江之新淦人晉臨川內史靈運之後十世祖仲任與歐陽文忠同年取進士官至殿中侍御史至君之曽祖逺翁祖子亷父程高皆不仕然皆以忠厚聞鄉里君六嵗而孤母何氏教育之俾從良先生受業業成鄉人子弟爭師之得以其資備甘旨為飬極愛敬之情退而與其弟怡怡然樂也洪熙改元命下江南求文學之士有司薦起君至京師試事于吏部而太子少保金公幼孜雅知君延至其家教諸子朝夕授之書講説詳盡而重厚端嚴公益愛之久之除建寧府照磨建寧逺郡為吏者多怠忽案牘不能無謬誤者君至日夜磨勘皆駁而正之府中肅然敬憚焉時方擇賢為御史於是御史包德懷首薦君遂徴為御史益恭謹不懈遇事無小大必究其情而折之於理不茍止妄隨衆皆稱之以為無愧於其職甫四月以疾卒宣德七年十月二十八日也生洪武庚午七月二十四日享年四十三娶張氏有一子曰邦女二尚幼君天性孝友常篤念其親而恨不得侍左右及為御史則喜曰吾父不幸早世吾母守節以教我今蒙賴恩德至於此而當聖眀之世舉封贈之典庶或有及乎吾其慎修以成吾志時其母年幾八十矣嗚呼孰知老者存而壯者乃遽已乎推君之志其能無遺憾也乎然而命也邦從在京師至是奉柩歸將以缺年缺月缺日卜葬于缺之原而以翰林編修習嘉言所為狀來請銘豫素知君而重哀其志乃為之銘庶幾少慰焉耳銘曰嗚呼謝君遽止於斯有偉其才尚蓄未施傷哉老母失此壯子何辜于天斯乃已矣卜藏斯丘龜食其墨銘以慰之安此玄宅楊博士墓志銘博士名皓字希章姓楊氏其先居泰和縣西湖潭里曽祖某始徙南溪祖舜卿父彥通皆不仕希章自幼喜學祖與父篤意教之遣從鄉先生彭與和受業駸駸有造詣後入縣庠為弟子員讀書作文日夜勤慎於事師處友皆盡其道未嘗有過當時在學者百餘人希章年甚少前輩皆以逺大期之希章益自勉登永樂辛丑進士第歸鄉里鄉里子弟爭師之受其教者多有成久之召為太常博士凡有事于上下神祇益恭謹不懈少傅楊先生館之使教其子諄諄然為講説學者慕之多從之者受任三年上以為稱推恩贈其父為博士母與妻皆孺人將捧勑歸焚黃于墓下而病不果行逾月遂終宣德壬子十二月二日也距其生洪武戊辰四月一日享年四十五初娶劉氏先卒再娶羅氏又卒又娶廖氏凡三娶有二子砥礪三女嫁闕希章溫厚和平孝於親友於兄弟睦於姻戚故舊與人處能輔以義及在太常又善於其職自始從豫遊縣庠洎同官京師前後三十餘年見其如此意謂方進未止也而竟止於斯嗚呼其命也夫希章初病時其弟希武適來得治醫藥與其終事今將舉柩歸葬而以監察御史彭百錬所為狀來請銘豫素厚希章而重哀其死奚可以辭乃為銘之其葬以缺年缺月缺日其墓在缺山之原銘曰既學而仕宜享夀祉而遽藏于此人誰不死尚利爾後嗣羅處士墓志銘公姓羅氏諱道生字孟昭其先居泰和仁善鄉之梅山里至公高祖福始徙其鄉之拗頭以資富得名曽祖仲實遇非橫早亡喪其家祖均瑞才五嵗隨母嫁城西劉茂林遂冒其姓居城西復振起其家父仁夀凡四世皆不仕公生而秀頴父母愛之鄉先生蕭尚仁教其家子弟公獨出儕輩以推擇為郡庠生又受業於吉水顔六竒二先生皆奬譽之學有端緒以疾去又遭父喪遂不復出惟以飬母為事與兄弟相友愛公私之事皆以身任之暇則觀史書接大夫君子考論古人言行以資其身篤意教子曰吾不幸廢學吾兒可復廢耶仍延致尚仁先生教之先生卒繼以其子用道及龍仲雨皆禮之甚至既而遣長子􅋒遊鄉校受易於廬陵謝子方次子諆居家孰受詩於里儒陳公延二子皆能力學如公志皆有造就公好德樂義於事先極孝敬常曰姓氏所以别宗羅之於劉其可終冒乎乃與諸父兄弟言於官請復羅氏君子韙之家雖豐而自奉儉約然於祭祀賔客賙窮恤匱則未嘗吝也嘗以輸稅詣京師次池州遇暴風他舟多覆溺人浮沉巨浪中莫有援者公號於岸曰有能活一人者吾賞米一石活五人皆衣食而遣之後三十年過黃盆湖民家見有書公名為位祀之者蓋所活者也其待姻戚鄉黨有禮遇臧獲下人皆有恩見人之善者敬之其為不善者未嘗一與狎也治家整然有條理雖老不倦尤謹於守法其居室服用必如制戒家人勿蓄異物曰伹取充用而已毋以妖異賈禍也其善行多可紀如此娶韋氏繼胡氏二子即􅋒諆胡出也􅋒領鄉薦入太學未仕而卒諆取進士為刑部主事有能名四女長韋出其三皆胡出嫁袁仲彬胡秋輝樂象明嚴思濟孫男三鏞翀翰曽孫男一曰浚公生元至正乙未閏正月草四日沒於宣德甲寅二月草八日享年八十初疾革諆在京師鏞侍側請禱焉公曰死生有命非禱所能益也爾奚用禱為我語爾叔慎以持已忠以奉職教爾兄弟皆能有立吾志願足矣雖死奚憾言畢而逝諆聞訃慟絶即解官歸服喪卜以缺年缺月缺日奉葬于缺之原以豫為知公乃奉狀來請銘豫聞洪範所謂五福而本於好德公之德裕矣而夀考康寧以卒于正寢此好德之驗也況又有令足以顯揚于後公可謂盛福者矣於其葬也是宜銘銘曰福備諸身及其後人惟德義是遵斯有獲于天銘以昭之千載彌新陳處士墓志銘處士陳氏諱美字克良世居永豐縣遷鶯鄉之留屯里以宦學為名家曾祖闕祖闕父志德皆積忠厚而皆不仕處士生有至性幼值元季避亂無寧時能順父母不憂勞其心國朝平定有寧宇處士年才十嵗已能盡孝愛嘗之旁近親舊之家食以美味輒不食曰將歸以奉二親與二弟聞者咸嗟異之蓋其孝弟出於天性然也及長溫厚謹重事親無過舉親沒哀甚蔬食以終喪嵗時備物致享必盡誠撫二弟克俊克遜尤篤既教之學又為之娶無愧於為人兄者睦於姻族信於朋友治家以勤儉待物以平恕鄉人少長皆慕其德服其化有為非義者不敢使聞之或有爭競不平多質於處士據理折之無不悅服常曰彼是非不辨者不反諸心故也反而得之何爭之有聞者謂為名言以是尤為縣大夫所禮嵗鄉飲必置之賔位而人皆以為宜篤意教子自言吾故簮纓之家不可墜先世之聞使其次子誠逰鄉校而教之甚至及誠取進士為兵部主事益訓勵不少置誠亦能奉其教宣德九年缺月缺日缺處士以疾卒于家年七十九妻謝氏四子皆業儒遺言勉誠以竭忠守分無負於國家女一孫男闕人誠與諸兄弟以缺年缺月奉葬于其里缺之原而以翰林編修鍾復所為狀來謁銘於乎處士孝友人也有士之實者也世之名為處士者多矣未見其皆無愧也若公者庶幾無愧焉耳矣豫安得辭乃按狀序而銘之銘曰孝友之行乃仁之施休哉陳公率履不違充而達之譽望有偉惟士之名庶幾無愧鄉山之原峩峩新阡全歸于兹大耋之年夫既有年而又有子刻銘垂休何千百祀王處士墓志銘處士王氏諱忱字敬恂一字公弼梅雪其號也世家泰和之梅岡為望族曽祖臣山祖獨清父􅪥豫皆不仕􅪥豫為廬陵永和彭氏贅壻生處士於永和故遂為廬陵人自幼謙敏好學嘗從胡山立先生逰博涉書史好為唐人詩其事親極愛敬親沒葬祭無違禮二兄相繼亡事二寡嫂皆盡禮死亦以禮葬之而撫兄之子如已子嫁娶皆不失時壯逰四方遇名山勝景必形於歌詠晚年以家事付其子惟與賢士大夫觴詠以為娛從兄伯彰居梅岡亦篤誼而好吟處士時往從之極其意之所適然後歸正統丁已十一月二十二日以疾卒享年七十二娶鍾氏生子二人女一孫男一人孫女缺卜以缺年缺月缺日奉葬于缺之原而以豫舅氏歐陽先生所狀行實來求銘豫聞處士久矣生雖不及見死則奚忍不銘乃為之銘曰嗚呼處士躬孝友晚歲怡情在詩酒宜以百年為爾夀胡乃遽歸無何有我銘其藏傳不朽于先生墓志銘豫幼時嘗從舅氏歐陽先生讀書於永和時則有于公􅪥王用霖二先生與豫舅氏交最善而皆以文章翰墨見重當時數往來講論豫從傍聽之心竊慕焉公􅪥又從謝先生子方逰有決科之志其後用霖先卒公啓以疾不果出而鄉里子弟師尊之未幾豫亦歸泰和久之遂竊第入翰林每從人問于先生起居之狀而先生亦卒矣追念疇昔蓋不能不䀌然傷心也今年豫內弟歐陽士則來北京于先生之子剛之則士則姊夫也以舅氏所述于先生行實俾豫銘其墓嗚呼豫尚忍為之銘哉然亦何可不銘按狀先生諱閌字公􅪥雪巖其號也其先金華人宋時有履吉先生者典教廬陵遂家於永和曽祖拙愚清江學官祖應雲父從龍皆業儒而皆不仕先生自幼聰敏出儕輩溫然和厚而最孝友早孤善事其母撫三弟尤篤弟先卒則又撫其孤教育之平居以禮法自持其教人亦必使由於禮法襄陽府學嘗辟先生為師固辭不就一時名公如解胡二學士修撰蕭時中國子博士羅師程輩皆與先生有文字之雅欲推挽俾見用於世而惜其病也先生曠懷雅度不汲汲於名利唯以詩書自娛雖甚貧不厭君子韙之正統丙辰四月十三日卒於正寢年七十三初娶歐陽氏再娶龔氏王氏有子二人長剛之歐陽氏出次繩之龔氏出也孫男一曰善貞葬以缺年缺月缺日其墓在缺之原銘曰既善其身以淑諸人病不克振又何戚欣歸全于兹昭德有文後百千年愈逺彌新張子中墓志銘公張氏諱忠字子中松江華亭人曽祖秉彛祖仁甫父安皆不仕然世積忠厚鄉稱長者公早孤母顧氏撫育之長讀書通大義常痛不及事父故事母極愛敬備物致飬朝夕無違禮母嘗病躬侍湯藥衣不解帶時人稱其孝家雖不甚豐而樂以餘財賑貧乏與人處務掩惡揚善然於事之是非必盡道理未嘗茍異而妄隨故鄉人有不平者不求直於官而多於公取正焉平居胸次悠然不役役於物課僮僕勤樹藝客至則飲酒相歡所與厚者多一時名士言行有可法者必籍記之其取善不厭如此嘗謂其子政曰吾不幸幼孤廢學不克有所為今幸遇聖朝豈可負哉遣入郡庠受業業成領鄉薦會試禮部得分教遂安既而用薦舉拜湖廣道監察御史公喜曰成吾志矣數以書勉其忠慎政奉教以稱職聞吏部奏請推恩以政所居官封公為文林郎湖廣道監察御史既得命而公卒矣宣德八年正月十五日也距其生元至正甲午三月三日享年八十娶吳氏有二子女一孫男三曾孫男四政將以缺年缺月缺日奉葬于缺山之原而以其友江西按察僉事黃翰汝申所為狀來請銘嗚呼公可謂善人君子也既享高夀蒙寵命而子又克孝其得於天也厚矣葬奚可不銘乃為序而銘之銘曰積善於身內以事親外以及人宜有獲於天而卒返其真勒辭貞珉千古不泯楊仲穆墓志銘仲穆楊氏泰和中村里人也以永樂丙申八月十九日卒年四十九是年缺月缺日葬於里河埠先塋之次後草餘年其子德敷為大理評事始以翰林編修蕭鎡孟勤所狀行實來求銘將納之壙中泣曰生不能早有立以圖顯先德今始求於先生此生之罪也願先生賜之銘使永永不朽則為幸大矣豫雖不識仲穆然哀德敷之言乃按狀序而銘之楊氏故大家仲穆之祖晴川以上皆居縣治西廟巷元末兵亂其父與良始徙雲亭鄉之中村仲穆天性孝弟未冠已能事父兄有事必服其勞既長而益力父疾躬侍湯藥不忍去左右其事母尤極敬愛二親沒葬祭無違禮而哀戚過之嵗時祀先省墓必以身任焉於宗族尤厚訓其子姪必以義兄仲實早死人有欺其孤而侵其産業者仲穆毅然持正不可回得不侵鄉人曲直不能平質於仲穆必公其是非為平之莫不悅服間居靜處未嘗有外慕唯課僮奴治稼穯至於修陂堰以備水旱必命衆豫為之鄉里常賴以不飢其行類如此蓋可謂一鄉之善士而天不畀之年嗚呼惜哉然今有子在官位所以顯其親者未可量天蓋以是報之也娶柳溪陳氏有婦道子五人德崇女一人孫男十四人孫女五人曽孫男二銘曰善不必夀而能有後全歸于兹先祖是依既安既固以延爾祚昭德有銘百世其徴袁仲暹墓志銘泰和袁君仲暹以正統元年五月二十七日卒于家年六十四鄉閭之人無疏戚愚良皆哀惜之至為出涕豫聞則亦為之悲而歎其不可得君淳謹坦夷內外一致師古人之嘉言善行凡世俗機巧略不萌於心稍長傳家政事父母極孝敬無毫髮違忤公家百役弟妹婚嫁日用之費皆盡其力不以纍父母與諸弟相友愛至分資産皆聽其自取已之所得美惡多寡不復校家雖近市未嘗營於利若有役在官可以得志亦未嘗茍取於人惟以田園之入自給安於儉約每從容而有餘性不喜飲至奉祭祀待賔客則豐厚傾倒以盡情晚居城西别墅作惇夲之堂教諸孫為學課僮奴耕稼曰此治身治生之本也人非善類不與相往來縣大夫非鄉飲不一見市㕓喧囂非有事不投足樂於賑貸不能償者不責也嵗凶盡發倉廪倡富室以濟飢自底匱乏則糴貴而不厭所行所存如此蓋自少至老不易意則謂之善人君子奚愧哉君娶陳氏有婦道子男一曰和女二孫男五袁氏出唐尚書右丞滋滋之子邯為吉州刺史因家泰和宋嘉定中有諱士表者由進士官至建寧通判至君之曽大父以寧大父務學父克睿皆不仕然皆以德善重鄉邑而君又以篤實承之子和受教取進士有名則袁氏之世德可知矣和將以缺年缺月缺日奉葬于缺之原而痛不得早沾榮命以顯親自為行狀來求豫銘欲著其美而傳之逺然以君之行安知其不終享也哉乃序其實而系以銘銘曰有淳行宜永年遽全歸閟斯阡嗟古人已有然勒吾銘百世傳指揮使石公墓志銘正統二年八月初三日昭勇將軍安慶衛指揮使致仕石公卒于家其孤珣來北京以兄琮之命詣豫告曰先人不幸棄諸孤將以缺年缺月缺日奉葬于懷寧縣緑水鄉缺山之原惟其平生忠孝大節所以效於上而光啓其家者不可以無傳敢請銘於先生庶幾託以不朽豫謂公致位三品其勳烈多矣宜有銘且豫嘗受知於公而琮珣又以禮請其何可辭按狀公諱英字某世家山東海豐縣之慶雲鄉自少端重沈毅以材武自豪其志卓卓在人上洪武中代父為十夫長𨽻遵化衛隨王指揮征討五浪河又隨徐指揮東征至希爾哈指揮胡龍征口琨又擇公自隨所向有獲軍中皆推讓之太宗皇帝靖內難一時豪傑之士雲合景從公尤感激奮勵從指揮蔣玉攻松亭關搗雄縣莫州略真定有功而還擢長五十夫隨大軍援永平攻大寧城城小南門守最堅攻之不下主將問誰敢當先者公先登奪其旗軍聲大振賞銀碗三鈔百緡大戰鄭村􅄵公獨挺刃鬪而前多所殺傷衆乘之敵不能當遂大敗升副千户復廣昌克蔚州從征濟南略武定州皆有功升正千户又征滄州大戰于東昌師還敵以兵遮絶道路戰魏縣郤之又戰深州敗之鏖于夾河蹴于藁城公之功為多遂躐升指揮同知明年度兵肥河􅝌大店驛涉小河攻齊眉山又合于靈璧皆大戰破之遂入泗州渡淮河絶大江抵京師自興兵以來小戰不計大戰凡十數公皆在前摧鋒陷陳未嘗少挫衄每戰勝彌自修飭無矜色亦無惰容衆皆服其量而美其能人或與論古兵法公曰用兵雖有法然闔闢變化豈能盡拘於法要須智勇兼備而已人以為名言又問公所以克敵制勝之方公曰此上威靈所致吾何能然臨機應變豈可以言喻卒不以語人太宗皇帝即位録前後功升太倉衛指揮使俾子孫世襲然愛其材留環衛中不使去左右永樂六年始涖安慶安慶重地瀕大江兵民雜居易生好惡公一待以寬厚衆皆喜曰公吾父母也無彼此言者處同僚必和必敬於士大夫尤厚平居恂恂然無疾言厲色而號令條教莫敢有毫髮違者曽祖某祖某父某皆以公貴贈指揮使妣贈淑人公自以身都顯位食厚祿而不克致一日之飬於祭祀必盡其誠其教子孫必使忠以事上仁以撫下未嘗及於私宣德九年以老疾請于朝命子琮代其職公間居接賔客語道理論古人功業陶然自樂也至是卒年七十六娶張氏封淑人有賢行二子琮與珣也皆能世其家女一孫男六女六曽孫男二女三於乎自古國家之興必有傑出之材以輔成大業然或泯沒而無聞者子孫之不肖不能序而傳之逺也公以雄才逹識遭時奮興其所立有過人者而子又賢思著其美於後世惜乎竒謀偉略不盡傳於人然書其大概亦足以不朽矣銘曰桓桓石公産自海豐奮于幽薊萬夫之雄太宗龍興公樂順附荷戈與殳闞若虓虎搴旗大寧壩上鏖兵奮鬬直前人莫敢嬰龍旗四征公必在列其聲赫赫其武烈烈內難既清萬方底平錫爵酬勳三品之榮額額舒城公則專制既有威嚴亦有慈惠士伍民居不忮不求恬淡優遊惟公之庥於國克忠於家克孝式嚴武備式謹文教子孫之賢公德在焉厚祿高官有永其傳天不憗遺將星夕墜比屋連營靡不涕泗高墳峩峩公藏其中勒此銘詩垂耀無窮給事中焦君墓志銘君諱起良字明善郴州興寧人祖必正父慶華皆不仕君生而頴悟選為縣庠弟子員學成當貢念其友曹貴民之淹滯也舉以讓之永樂丁酉領鄉薦登戊戌進士第觀政于刑部甲辰拜吏科給事中能以恭慎舉其職上以為稱任封其父為給事中母妻皆孺人既而以內艱去服除改户科駙馬都尉井源持節往寧府行册禮君為之副能不愆于度王重之未幾權長其科事滿九年拜户科都給事中君感上恩常思欲有報於法當舉縣令曰薦賢所以報也吾豈可茍哉舉李寬為蕪湖令果稱職凡時事有可行者無不言嘗請考察在外文臣武將之未良者修大學以飬士興義倉以賑民大書方面大臣姓名於便殿以便覽觀察賢否外諸司有重囚疑未決者請命公廉吏往審覆從輕決遣之遷民有老疾無依者放之歸畿內飢請發廪賑貸國子生初食陳粟請易以粳米漕卒多糶所運糧而挾資來糴於北京故米翔貴請禁之所言多見聽用君之志益欲大有所為人亦以逺大期之而遽以疾卒正統辛酉二月初九日也距其生洪武乙丑得年五十七君平生孝於親事生送死能盡禮宦逰二十餘年以逺不得飬有一美饌未嘗不思親教其子必守家法於祖宗墳墓展視尤謹見凡物有罹害者必救之權量之屬必如制否者毁之其自奉儉薄而厚於撫下故人人親愛焉其所存所由蓋如此子一人從周正統已未進士女三人長適同邑李秉恭餘未行於時君之父年八十一尚無恙而君則已矣從周奉柩歸葬而以兵部侍郎鄺公所述行狀來請銘豫念嘗與君周旋惜其志不及大行以卒而父乃以耋年失令子是皆可哀也且從周又豫所取士而汲汲圖其不朽亦可謂能孝故為銘之庶幾存沒皆少慰焉耳其葬以缺年缺月缺日其墓在缺山之原銘曰仕既逢時材行具宜未竟厥施命也奚悲白髮髙堂失此令子而有孝孫亦克用繼故山之原有鬱其阡刻銘垂休百世之傳錢良玉墓志銘良玉名瑛姓錢氏其先江都人世以醫名曽祖益元常州醫學教諭因家常州兵亂徙蘇州祖原善洪武中徴入太醫院晉王子有疾奉命往治之愈王竒其術留之卒葬太原父宗道亦精於醫王奏為良醫甚見禮遇久之亦卒良玉奉葬于祖之墓次而奉母歸飬于蘇州遵治命也良玉承家學之懿又慱通諸書醫道益大顯蘇人求醫不問風雨寒暑貧富貴賤即往視與善藥無不愈名聞京師又徴入太醫院奉公有暇往赴人之急一不異蘇州時人之能報與否不計也嘗教諸子曰醫仁術也當博施濟衆而可計利哉聞者韙其言而美其德事母極孝能順適其意去年冬母病心憂之為之不遑寧處湯藥親嘗而後進母卒治喪如禮居苫塊之中哀毁踰節將奉柩歸蘇州得寒疾而終正統六年二月十七日享年五十二娶高氏子男五女二孫男二女二恆兄弟舉二喪歸欲與祖母同域葬焉乃以禮部主事顧謙所為狀來請銘豫在京師久見凡為醫者多嗜利而少見其效心切鄙之嘗問今右副都御史陳君鎰蘇醫之良者為誰得二人焉其一良玊也數欲試之幾緩急可托而卒未能遇嗚呼孰知良玉今遂死矣豈非可惜哉豫既重其人而惜其死奚可以不銘其葬以缺年缺月缺日其墓在缺之原銘曰仁於人孝於親吁奈何返其真善必報利爾昆刻銘章庶永存秦主事墓志銘禮部主事秦君初字性初越之山隂人唐詩人系之後曽大父懋德大父喜皆不仕父祐以君貴封翰林院檢討母王氏封孺人君自少喜學選為郡庠弟子嘗作樓讀書扁曰凌雲以示志永樂辛卯領鄉薦明年會試不偶遂入太學益自勵弗懈太宗皇帝在位四夷賔貢無虛日上亦欲大鎮撫之思盡通其文字命選太學生之願而敏者入翰林習之君在選習西天書然志彌厲必欲兼盡其美再試禮部凡三場文字又以西天書翻譯成篇主司嘉其能取以進及廷對亦然遂賜進士出身為翰林庶吉士未幾除檢討授從仕郎凡西天譯書皆與執筆焉久之連丁內外艱居喪盡禮鄉人稱之服闋改中書舍人秩滿升禮部祠祭主事又改精膳皆能舉其職於所當為者勇為之未嘗有辭避以是見重於僚友君資稟淳實其言呐呐似不能出口然其中固有黑白所守確然不可回若機變之巧未嘗萌於心而所行必依於仁義太學生張安以使命去京師妻死無主後君曰安吾友吾嘗兄事之其妻則吾嫂也吾不可不任其事即為具棺衾使家人殯殮而自往致祭且安厝之必盡其誠又有金某者得某衛經歷當之官貧無以治行君解衣衣之輟所乘驢資遣焉甘徒步出入或勸君市一馬乘以造朝𨽻人失之以逸告衆以為盜且疑𨽻與盜通當窮治君曰吾無負於彼彼安得為是豈可輕以盜賊汙人又安知實非逸乎命求之得之他所果逸去𨽻以不寃君雖忠厚而嫉惡尤甚居喪時鄉人有暴橫以致富者厚其金幣請為其母墓銘君曰吾雖貧且居憂然寧渴死誓不飲盜泉堅拒不納君為人如此正統六年六月草一日以疾卒于官年五十七娶蔣氏先卒繼以張氏有婦道三子君歷官二十年俸入之外不茍求妄取既卒竭其資僅足治棺以故衣衾殮焉他無餘物理將奉柩歸山隂卜以缺年缺月缺日奉葬于會稽甜水井上蔡山陽先壠之次豫在翰林已愛君及出佐禮部又見其踐履之實而與其為君子於其卒也深悲之不欲使泯泯無傳乃求君之行狀為序而銘之以授理俾納諸墓中庶後世有徴焉銘曰其言也恂恂其行也振振官雖久矣家則貧忽焉而逝返其真賦命如此奚所云上蔡之陽安爾墳後欲考德在斯文贈監察御史黃君墓碣銘黃氏戈陽潭石名家君之曽祖隱名祖謙甫皆有德善而不仕考祐忠洪武中為海寧丞蘇州延平二府經歷母郭氏君其仲子名遜字敬讓自幼喜讀書長益不倦隂陽醫卜算數靡不通善事二親極其孝敬父終于延平君奔走歸其喪哀感行路葬祭不違於禮而養母盡誠左右奉順能得其歡心母病嘗刲股和藥以進病良已人謂其孝感所致兄敬和早世與弟敬方友愛甚篤撫教諸子姪必均一昏娶則擇名家不問財賄嫁姊妹姑姪之貧者五六人則厚資給之嚴於自治由身以及家門內百口無間言財用出入一以公處之家故饒裕而樂於賑施內外戚姻有舉貸者一不計其息鄉之古塘田瘠而民貧則倣義倉之制計口嵗給焉橋梁道路之傾圮修治之不惜費人有疾病不能療者與之藥忿爭不能平者喻以義而服其心訟為之省平居言行恂恂一以理為主其心惟恐人不入於善人知其意多樂從故兄弟有相讎者化之竊牛之盜化之豪奪人之室者亦化而返焉其有不可化者聚徒黨好劫掠挾官府以朘民搆詞訟而興大獄者則言之藩憲而誅罰之鄉邑感焉佑善摧惡之見於事多此類其治居室則建祠於東以祀先作齋舍於西聚書籍以教子孫因地之宜搆臺榭蒔花卉以奉母佳時令節則率婦子奉觴稱夀致樂於其中作清興樓以延賔賢士大夫來者燕欵終日無惰容又於其居之東百步許多植松作亭松間事親之暇常與客逰焉四時朝暮寒暑晦明之變景物所遇雖不同而亦各適其宜也因號松野處士君子謂其於松比德焉生於洪武庚午六月一日正統丙辰十月君有疾彌留神色不亂其言以不得終飬母為恨戒諸子善繼志語不及他遂卒是月十八日也享年四十有七明年丁巳十二月初九日葬邑之招賢鄉弋源里大山之陽初娶陳氏有賢行先卒繼張氏側室傅氏子男七長溥字澄濟明經取進士拜監察御史善舉其職朝廷推本於親贈君文林郎廣西道監察御史次澄濬澄清澄流陳出也澄淮張出也澄徹澄演傅出也女四皆歸名族孫男二十六圭瑄瓉璲㻞琛珣瑜瑛珤珺璁璉琳珵㺬玭璟瓏琡􅀢珦瑗璡玘珙曽孫男五習旦昊旻升君之葬久矣至是漙以禮部郎中胡添麟所述行狀來請曰先考之德修於身行於家而及於鄉人溥蒙餘澤以克今日兹荷聖天子寵命而褒贈及焉為幸大矣惟墓前之石宜有銘以昭德垂逺敢請於先生余嘉其孝故不辭銘曰弋陽之黃實曰名家維君承之克振厥華孝友之隆慈愛之篤惠于鄉邦儀于姻族克用其柔克奮其剛以植善良以抑暴強詩書之訓乃有令子為賢進士為名御史慶典之貤寵贈及焉烜赫龍章式降自天佳城峩峩君安于此靈秀所鍾以利後嗣墓前有碣刻此銘詩昭德垂休百世之詒抑菴文後集卷三十
