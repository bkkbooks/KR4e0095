body:
  text: 抑菴文後集卷六明王直撰序順天府鄉試小録序天眷皇明統御萬邦以天下之才成天下之治養之於學校而以科舉出之布列庶位以興事功太祖太宗聖德如天功化之盛超越古昔育才圖治之效無以加矣仁宗皇帝以上聖之資廣至仁之澤慮科舉取士或未精也於是定解額俾精選焉務得真才實學之士皇上文武聖神德被天下而於養士尤甚惓惓以為取之既精當養之有素於是定學校弟子員而去其無良者嚴擇師儒以教天下之士蒙恩育之厚感教化之深爭自洗濯磨治奮力問學以求效用於當時帝舜之世萬邦黎獻共為帝臣惟帝時舉今復見於聖明之日猗歟盛哉宣德四年秋復當大比順天府尹臣庸以考試官為請皇上命臣直臣時勉凡諸執事之臣皆秪奉德意夙夜惟謹于時北京國子監及八郡就試之士凡千人取其中式者五十人而進之蓋遴選也小録既成衆謂宜有序直以為國家開文明之運以傳於萬世凡天地之所覆載日月之所照臨其人皆被仁義禮樂之化而有以成其德達其才矣然待士之重四聖一心擇之愈嚴養之愈厚而取之愈精誠所謂天地之大曲成萬物而不遺也士蒙幸於斯世何其榮哉直聞之古之人有感人一言而許以身者蓋以為知已之遇也諸生遭遇聖明荷生成之德而登名於此將何以為報哉其益勤於學慎於行他日進於禮部對揚於大廷由是而沾一命守一官必忠以事國廉以處已公以涖政仁以臨民敬恭朝夕而不纍於私使天下之人皆謂無負於國家則善矣直將與有榮焉也故書以為序玉峰草堂詩後序玉峰草堂詩若干首士大夫為廬陵太守蔣公作也玉峰在保寧府城之南而保寧即古閬州其地多名山而城南為勝城南之山非一而玉峰為尤勝蓋雄秀瓌麗拔起數百丈如圭植如筍立其下為三趾又如禹鼎之巋然竦立於埃壒之外而公之故居在焉公之未顯時嘗作草堂以當玉峰之勝於是山之竒詭殊傑之狀皆一覽而盡矣既而出典文學職華要七遷而至今官去玉峰草堂者幾四十年而於心未嘗忘也士大夫所以歌詠之者至矣豫謂山川之秀必鍾萃於人而人之得其秀者亦必於山為好孔子曰仁者樂山觀公之敦厚凝重有似於山豈非孔子之所謂仁者歟雖然山林者間放之士之所樂也故蔭長松藉茂草觀煙霞之變態逐雲月之去來自以為髙也而公則貴顯矣今之太守古大國諸侯之任也有地環千餘里其民蓋數十萬飢者欲食寒者欲衣勞苦者之欲休寃抑者之欲理皆於公是賴而公乃惓惓於玉峰草堂若將退託於間放之樂者何哉蓋山者出雲為雨以利澤萬物者也而草堂者身之所庇以為安者也不忘其所自安乃能安民而益尊不忘其所以澤物者乃能阜民而益榮公之志如此兹所以為仁也豈間放之樂之足慕哉而賦詩則有未盡知者故豫為序其説於後使覽者得詳焉邵處士挽詩序靜素處士邵仲文既沒之二十七年其子思廉為貴溪縣學教諭秩滿當升郡博士需次於京師始克請考功郎中章君銘其墓翰林侍讀周先生為表其行將刻之墓上於是處士之賢始表暴於當世一時士大夫憐其為善而不得永年皆為詩以哀惜之思廉又持來請豫序按處士會稽人世以詩禮承家其孝友之行廉厚之節出於其性若此者宜有得於天矣而年三十九以卒天之於處士果何如耶傳曰仁者夀夫仁者之宜夀以常理言也然自古仁人賢士之不得夀者多矣豈獨處士哉是又不可以常理論也唯不自二其心而修身以俟之則雖夭猶夀也君子之所為者如此若處士者其庶乎此也歟孔子曰君子疾沒世而名不稱焉豫未嘗不三復而嘆夫善之在人一矣而自幼至於老死其涉世也亦久矣然而不見稱於人者何哉非茍且偷惰之心勝詭欺薄惡之行成故邪然則有雖死而名彰者則其為善之實可知矣處士雖不幸乃今得載諸文字以顯聞於人而傳於後世蓋不可為不幸矣嗚呼有聞而終無聞而通君子固自有輕重哉故為序之詩凡若干首送劉員外序刑部員外郎劉君伯塤以內艱服闋當之京師吾黨之士喜其重顯於朝而復惜其去也相與會聚於城西香林僧舍酌酒而送之蓋伯塤為泰和沙溪故家自宋元以來代以詩禮聞一鄉非獨其資力勝也其遺址之存稱古所謂子男邦君之居其所與連婚託交者皆當時榮盛之族然劉氏善積於家未有大貴顯者積之之久而始於伯塤發之初伯塤入仕京師時豫與之比屋而居者二年固已慕其為人而知其必顯矣及去為刑部屬即有名自尚書侍郎以下皆知其才能而信任之及為今官聲譽益大顯然伯塤益勤於其職早夜不懈未嘗傲物取咎於是人愛之益深期之益逺今之去其領舊職審矣或遂加進焉未可知也豫嘗聞之刑非聖人之得已也蓋以誅惡而佑善使人皆為善則刑措不用矣舜命皋陶之辭曰刑期於無刑此正今天子之意也當其任者惟公與明實庶幾焉伯塤在刑部十餘年練達而勤慎其能推上德以及民而永終譽也必矣於是坐者取唐喬知之贈蘇員外詩自昔重為郎伊人練國章二句為韻各賦詩一首以贈蓋寫其殷勤願望之意而豫則為之序云送彭御史按廣東序御史之職重矣上下之所屬望者也蓋上之德不能以遍逮乎下下之情不能以悉聞乎上御史居其間決其壅塞而疏𨗳之於是上下交而治道成矣其職之重如此然昔之居是任而上下或失望者何哉蓋才有所不及學有所未充也才未及則不能制事而達於有為學未充則不能窮理而不知所為故其事上也屑屑然舉其細而已矣其臨下也赫赫然信其威而已矣彼其任之之意果屑屑然而已乎赫赫然而已乎然而如此也惡能塞上下之望哉今之任御史必舉才學充備者用之而當是舉者率皆有以稱其任其出而按事也上必親臨而遣之及其還也必備述民事以報焉上之德畢達乎下下之情畢聞乎上治道之成於是為盛矣彭君百錬為監察御史五年是所謂才學充備者也其出入中外是能宣上德而達下情者也今出按廣東廣之俗蓋異宜而弊事蓋夥矣彭君雖無不當問亦在明慎而已使下之情得聞上之德得達豫知彭君優為之也屑屑然而已矣赫赫然而已矣彭君豈為之哉彭君因便過故鄉拜其母即就道豫與其素厚者十人餞焉因取孟浩然送韋侍御詩風霜隨馬去炎暑為君寒二句為韻各賦詩一首以贈之直世有連也故為序云送彭士揚之京序彭君士揚初以吉安府學訓導舉至京試在優等人謂士揚之教行則足以成一郡之人才而加厚其風俗矣士揚滋喜會朝廷為功臣家擇師儒於是士揚遂領教英國張公之家人謂公功臣士揚誠以忠孝仁義之言進於公使公得以事上臨下則其效不既大矣乎士揚益喜在公第十五年凡公之所以敬事天子及奉命征安南叛國皆能有成功士揚之所禆益蓋多矣然士揚有母老無他兄弟為養其心蓋未嘗不在膝下也今年夏謁告歸省以慰其殷勤之望而寬其積久之思旦夕侍左右調其藥物飲食而敬進焉既兩月矣義不可久留乃復治裝就道然其心終有不釋然者豫與其素厚者十人載酒往餞之而告之曰士揚子務其大者哉子之慈訓蓋有矣不以口腹之養而廢詩書之業其志固欲子之道行也使齷齪於旦暮之間雖能備口體之奉而無學問之顯豫知母之志不樂矣今而奉天子命居功臣之家處師儒之位其所與言皆聖賢之道言行則道行矣身雖在外母之志蓋未嘗不樂也曽子之所謂養志孔子之所謂立身行道以顯父母者蓋如此子其務此也矣毋徒為是戚戚也士揚乃起謝曰子之言善矣如是足以慰吾心矣於是在座者皆喜各舉酒勸酬以為歡復取曹子建送應氏詩親昵並集送置酒此河梁二句為韻各賦詩以送之豫因書其説以為序送蕭志祥祈雨有感序永樂二十年泰和春旱至夏初雖間有霡霂之微而無益於民事陂池皆竭田野焦然農人興嗟束手無措縣大夫永嘉鄭君二令茂名吳君深憂之齋祓一心並走羣望浮屠老子之宫遍禱焉既而得小雨猶無益也二君乃謀於衆求所以致雨之術於是有以蕭先生志祥為言者曰是道立行修能興雲為雨以利萬物者也二君喜即熏沐為書命使者禮請於其廬先生曰濟物吾心也即與使者偕來二君率吏民迎之盡禮乃就延真觀設壇禱焉敬恭將事朝夕不懈先生為文書告上下神祗四月丙申登壇時天宇湛然旱勢益盛先生取水向日噀之油雲勃興日光韜晦靈風飄揚旗纛暗靄若上下神祇交集於壇者明日丁酉遂雨人以為未足越四日壬寅先生又以其法檄井井水盡黑汲而遍灑焉雨亦隨至甲辰又雨猶以為未足先生乃危坐一室錬氣養神檄召神祇使必有以副人望於是戊申大雨庚戌乃止自城邑以達於四郊歡呼之聲流聞逺邇大夫君子交口相慶於乎先生之術亦何其神哉而先生退然若不與其事者曰豫敢貪天之功以為已力乎先生泰和人自少學道遨遊五嶺數往來羅浮山中羅浮仙人之藪澤也蓋必有相遇於冥漠之表者故有得於中顯於用而又無慕乎外如此雖然縣之大夫與其屬謀曰先生固無事於名而吾徒受其惠者豈可無述哉乃使來求於豫曰子親見其事者也宜勿辭噫非獨豫見也人莫不見也乃為序之使他日傳先生者有徵焉送鄧訓導序豫友鄧云衍始舉明經為景陵縣學訓導既一年以憂去服除仍司訓於曲江鄧氏故泰和儒家宋之時有以三經中童子科者其清才奧學苦志勵行以文學鳴縉紳間及典風紀領州縣司鹽鐵職倉庾者前後相續也至今登仕版者尚四三人則其詩書之澤可知矣云衍以家學之良而當教官之選其秩雖卑然視典風紀領州縣司鹽鐵職倉庾者蓋異矣彼其職司各有所當也而教官坐一堂之上與一時之英才周旋進退其所講者堯舜禹湯文武周公孔子之道其事則修身齊家治國平天下之事也雖若甚迂然其教既行其學既成之後推而及於天下其澤之所被不既大矣乎故有志之士以斯文為任者多喜為之而凡居顯要者則往往視為迂闊彼安知其道之重哉然教官譬猶規矩也必盡夫所以為方員之則然後可以成物故曰師道立則善人多而世之為教官其不能盡是者蓋亦有矣聽其言皆聖賢之言夷考其行則異乎聖賢之道彼為弟子者不從其所令而從其所好則烏覩其學之成哉故其言必聖賢之言其行必聖賢之道然後可以示法而成化此君子所以貴乎身教也云衍之為教官蓋能盡是道而豫猶相與言者激於有感而云曲江文獻之地張文獻余忠襄之所産也二公之學皆聖賢之道其忠愛之心正直之行著稱於當時而流行於天下後世聞其風聲氣烈尚使人興起而况於其鄉邑之人乎父兄之所習知子弟之所飫聞蓋有深慕而思齊者矣云衍以聖賢之道漸摩成就之使他日出而致用其所立者可繼於二公則為不辱於聖賢之教而亦不負朝廷興學之意矣故序以送之送吳參政還廣西序廣西去北京萬數千里其所統十二府四十二州五十四縣之地其民不下百餘萬而大山長谷盤錯於其間往往與猺獠雜處風氣習俗之殊蓋自古然矣國朝混一區宇不鄙夷其民皆設官以理之故其聲教文物一切不異於中州於今蓋五六十年矣然地既險逺天子尤加念焉故於布政司必選寬厚勤慎之賢以付之而無有不堪其任者蓋亦盛矣然嘗論之布政司者五六大臣而已而以百萬之民付焉以五六大臣而當百萬之民之望可謂榮矣然布政司之於民其髙下固懸絶也民之情有不能達於縣者多矣而况於府乎况於布政司者乎由是觀之則上之德亦安能使畢達於下則為布政司者蓋亦可謂難也已故豫以為當布政司之任茍有愛民之心者在擇賢守守之不賢以告而斥之可也守既賢而又擇賢令令之不賢亦以告而斥之可也守令皆賢則為能舉其職上之德有不畢達於下下之情有不畢得聞者乎順其理而施治焉則有以享其榮而不患乎其難矣然人固未易知也昔之君子好以言觀人然賢者豈誠可以言求哉夫言其末也行者其本也蓋有有其行而無其言者矣有其言而無其行者矣孔子曰聽其言而觀其行言之不可獨信如此故必審其言之是非而察其行之當否彼行不異其所言固賢者矣言不足而行有餘亦可謂賢矣有其言而無其行君子安得而取之於乎可不慎歟湘隂吳公昌為廣西參政參政布政之二亦民望之所系其所謂寬厚勤慎之賢而能舉其職者矣今再考績來北京有司最其課使還治廣西上之人欲終其任以究其成也吳公之歸也廣西守令誠皆賢矣吳公可不勞而理矣若猶有未賢也吳公可不勞而理乎此政之所急也豫未識吳公因其布政使李公昌祺求豫文送之故為道豫意如此吳公以為何如哉美章郎中再考績詩序章君尚文之為考功郎中也士大夫嘗涖於考功者皆稱之今年春當再考績少師兼吏部尚書蹇公以為能言於上俾復其職需九年而後大用焉同列之賢喜其績之最也相率賦詩美之而屬豫為序蓋豫與尚文同年舉進士為翰林庶吉士同受太宗皇帝命進學於禁中以道義相錯切者又四五年豫為翰林修撰尚文亦去為刑部主事升郎中遂移考功大有為於時蓋其學足以明道才足以立事而守之以正行之以公明不至苛寬不至縱故其所樹立卓然如此豫嘗論天下之治必用天下之才吏部用才之地也然惟全才之君子而後用之無不宜不然則有宜於此而不宜於彼者故考功者所以察其職任而審其宜與否以進退之使官各得其人而天下之治成矣唐虞之世庶績咸熙者考績黜陟而已我國家所以與之比隆用此道也則尚文之為考功其繫於治道豈細哉今因其績之最而詩以美之固宜也昔者文王之化行南國之大夫皆節儉正直於是有羔羊之詩鄭之桓武為周司徒善於其職曹之君子均平専一於是有緇衣鳲鳩之詩皆所以美之也今諸公賦詩以美尚文者亦猶是矣豫與尚文非一日之好願推鳲鳩之意而有進焉蓋君子在位所以接乎物應乎人者雖繁然有常道而不變則可以正國人而受景福尚文之在考功其績固偉矣然願尚文益謹其常道也謹其常道則凡仕者之蒞于考功有所觀法而化治效豈不益盛乎如是則受天之祿而膺胡考之休孰能禦哉相勉以道而期於逺大者朋友之誼當然也故書以為詩序送鍾彌綸詩序彌綸鍾君永豐故家也好文而重士能琴而喜遊居其邑閬溪上有山水園池之勝賔客之過門者輒欵洽連日極遊覽之娛興有所適援琴而鼓之蓋超然萬物之表又常泛輕舟下彭蠡浮大江以觀乎京師歸而益有以自樂蓋孟子所謂囂囂者也今年觀光來北京左春坊大學士兼翰林侍讀學士曽公子啓其姻家也館之其第之南齋日為酒殺羊盛賔客以樂之既浹旬將歸永豐曽公復具酒殽飲餞於城外因取唐岑參紅亭緑酒送君還之句為韻率在座者賦詩送之而屬豫序北京古冀州堯舜之所治也然自漢末至於元其衣冠風俗往往異於古阻絶遐逺好遊之君子多病焉我太祖髙皇帝撫而正之繼以太宗仁宗之聖禮樂文章比隆古昔山川草木衣被雲漢昭回之光鍾君於此而遂一遊以觀太平之盛豈非幸哉豫聞君子之遊也以博其見聞而廓其器度者也鍾君固偉矣然今之來於水則涉淮河之深於山則見岱恆之髙至夫都邑之雄宫闕之壯人物之殷甲兵之嚴四方萬國朝貢之會同皆見之蓋所謂天下之大觀者也則今之歸其增益豈小哉山顛水涯瀟灑間曠之處豈不有好遊而未遂者鍾君與言之必將低佪羡慕有不可及之嘆矣豫與曽公仕將三十年從容兩京之間於天下所謂大觀蓋先得之今雖未老而病且衰矣國恩未報思欲自退於山窮川阻之地有不可得者於鍾君之去亦安能不為之動哉鍾君歸矣益治其所以待賔客者他日乞身南還過閬溪相與掇芳擊鮮釃酒而酌之醉飽鼓腹咏歌聖化寫髙山流水之趣而和以幽蘭白雪之曲庶幾一償願焉然而非所敢必也贈考功主事李公赴南京序宗昉豫友也自其為稽勳主事時豫以內艱去官及服除而來也宗昉乃亦以憂去道路相違不相見者四五年今年春宗昉起復來北京相接益歡甚未幾授考功主事當之南京其同門友通城教諭劉昭謁選在京師感宗昉故意之厚也特求豫文贈焉宗昉居吉水豫家泰和相距百餘里而皆為吉安屬邑郡之人士宦遊者惟吾二邑為最盛永豐廬陵次之其餘諸邑又次之故在京率嘗五六十人每營職之暇合坐而笑語必引古人嘉言善行與吾郡前輩君子之文學忠節炳然與日月爭光者相為勸勉皆期以不辱焉佳時令節樽酒相歡或相與出遊必分題賦詩以歌咏太平之盛而寫其殷勤篤厚之情其風流習尚如此故去鄉雖逺歷時雖多而未嘗有羈旅無聊之嘆蓋皆有以忘之也今宗昉之南京南京去鄉又近矣其宦遊之士所與綢繆親愛蓋不減於此然則宗昉蓋無往而不樂也則何離别之足惜哉雖然吾黨之士進而蒙簮紱之榮退而獲鄉曲之樂者皆上之賜也其安可忘耶唐之詩曰無已太康職思其居好樂無荒良士瞿瞿孔子取之而列於國風以為憂深思逺而可不至於殆也則豫與宗昉等當益思所以盡其職庶幾蟋蟀之意而免乎伐檀之譏則可以保其樂於悠久矣宗昉質美而氣和志勤而材達於從政蓋綽綽乎有餘裕矣不待豫言也獨書鄉郡相好之樂如此為文以贈之而使加勉焉蓋義之所不能已也哀蕭仲清詩序仲清廬陵故家子也早孤克自樹立事其母以孝聞兄弟三人相友愛而仲清専家政公私百為皆身任之不以纍諸弟洪熙元年長其鄉糧賦故事為糧長者必躬詣京師聽敕命受勘合以歸然後徵納焉仲清自南京歸至采石暴風覆其舟舟中之人或善遊或有所慿藉皆得不死獨仲清溺焉鄉之人士以仲清好善樂義而不幸以死皆哀惜之今年其弟季靈來北京過采石痛其兄之不作而不能已於情也於是求士大夫為詩以哀之因左春坊大學士兼翰林侍讀學士曽公子啓屬豫序嗚呼仲清誠可哀也已蓋仲清之失父也母孺人鞠之冀以善其後也孰知老者存而壯者乃死邪兄弟之情如足如手今已竒其右矣則夫所以痛恨摧裂豈獨生者哉古所謂不弔者以其狎於水而自溺也仲清豈狎於水而自溺者耶役於公困於天有不能自制者然則仲清惡乎其不可哀也秦穆公之死以三良殉詩人為賦黃鳥以哀之田橫被召至尸鄉以首見髙祖從者挽至宫而不敢哭然不勝悲皆為歌以寄其哀後世哀挽之詩蓋權輿於此也今仲清之不幸略與二子同則凡哀仲清者其可已於言哉君子之於死生惟當於義命而已仲清雖不幸然所以致此者豈非義邪亦豈非所謂命也吾聞唐李太白泛舟采石醉溺於江中説者謂其騎鯨上天非淪滯於水者而司馬子微嘗謂白有仙風道骨可與神遊八極之表然則謂其騎鯨上天蓋不可知也仲清得從之遊亦將乘雲御風超鴻濛翔寥廓有莫之測者若然是亦可以無憾矣送楊朋逺序楊氏於泰和為大家國初有一桂君者既富而有文豪傑之望臨一州朋逺其曽孫也朋逺明經欲舉進士而廬陵縣學缺訓導舉朋逺為之及來京師中其選既授職而歸几與朋逺親厚者皆賦詩贈之而徵豫序豫與楊氏世有連誠不可以無贈也夫學校者治天下之本也治天下之本在學校則為學者當何如可知矣然學之成本於師則為師者當何如又可知矣古聖賢之道載之書師之所以教學者之所以學也服而行之以自顯於世者固有矣行不如其言者蓋多置之而不言者又比比也夫行而違其言已不可况又置而不言奚可邪則其所事皆君子之所鄙者也夫豐其屋以居之厚其廪以養之復其家以優之使專為是道也然服而行之者反少或徒言之或置而不言而甘心於君子之所鄙為之師者亦相與衎衎施施優遊於杯酒之間以自媚此何説哉則夫冀以為治天下之本者豈不失望邪嗚呼此學校之通弊也廬陵文信公之所自出公學聖人之道以文章魁天下而孤忠大節師表百世今之為士者多思循是道以求無愧於公然則職教於此者因其士之志而勵夫師之道以率之其盛蓋易也使言必於是行必於是而皆為才且良無前之所云弊而有以副興學圖治者之心豈不美哉朋逺勉之此衆之所望也將亦為衎衎施施以自媚於杯酒之間則非衆之所望也送浙江按察使林君詩序浙江自昔稱大藩其所統十一府六十二縣環數千里之地其山水清秀故其人多才物産富饒故俗尚華麗衣冠文物之美登臨宴賞之勝他州縣鮮能及也故天下之言盛者必曰浙江然以今日所聞考之則習俗之移有不勝其弊者夫邪惡之人亦他處之所有也然而至於無忌憚則他處所無矣蓋恃其輕險而舞智以轥物挾利以佐姦居室輿馬衣服之用率僣非其分不仁之徒而操不仁之器橫恣於鄉邑小者攫民財甚則舉室束縛之而加無禮焉又或繼以戕害出入官府把持其隂事州縣之吏莫敢誰何私與之狎而縱其所為細民失業無所訴或至流移以避之如此者相踵也朝廷知其然為遣大臣往察治巡按御史亦盡心發擲而痛繩之使有所創艾庶善者得自存然虎狼之暴茍不至於死往往恣其反噬於是捃托告連百方沮抑之隂搆詭求以蘄必勝雖有君子能别是非亦莫如之何夫邪惡之人固他處所有也然於朝廷所命牛羊倉廪之吏尚知所敬憚况州縣之吏乎况天子所遣之臣乎不自揣度無所忌憚如此可勝嘆哉夫君子者衆人之表也浙多君子而彼猶縱其所為豈其習果不可勝耶豫嘗思之刑法所以治小人故小人必畏刑然非可一時過化也持憲者茍明法以示之正已以行之守之以信持之以久有罪者必罰不可以勢免不可以貨求小人知法之真可畏也將必有改行而趨善者今彼之惡豈在此者亦有未盡善歟三山林君碩字茂𢎞為監察御史九年聲譽動中外今去為浙江按察使天子大臣知其賢而用之也豫知其善於其職而惡者庶幾能改行矣尚寶少卿四明袁君忠徹蓋閔俗嫉邪者也於茂𢎞之行而深為之喜求學士大夫賦詩送之因豫友翰林侍讀陳君光世求為序豫因歷道其事以告之且以俟其績之成也送尹御史還南京詩序國朝設兩京以備巡幸上既在北京凡南京諸司所行事皆有成法而監察御史處於其間以刺舉激揚為職使人知所憚而不敢肆然其所施於人者輕重緩急當必盡其宜蓋既逺於天子有不能慎重則謗讟易以興亦未見其能有為也豫友尹循有規為監察御史於南京有名今年再考績來北京既復職而歸豫為詩以贈之矣而翰林編修周功敘與之有連復率諸公賦詩而請豫序之夫古之為治者本於六卿而御史則立柱下受四方之書非有他事也至秦始令監郡漢初定禮儀乃以御史執法舉不如儀者於是始任糾察之事自是而後職愈重凡官無尊卑事無大小有越禮廢法者皆得糾舉朝廷亦傾心任之以肅百僚振綱紀故曰臺綱正則朝廷正朝廷正則天下理矣其所系如此我朝尤重其選不以非才處之凡其所在足以勸懲使其君子皆安於為善而堅其所守小人則收斂畏慎而不至於越禮廢法故治道舉矣然治人莫嚴於自治傳曰有諸已而后求諸人無諸已而后非諸人此其居官之道也有規今之所謂賢者也宜諸公之詩稱美而期望之矣雖然吾觀仕者多矣其始皆奮發而有為及其久也則皆媕婀而自守積嵗月以俟遷而已此宦成而怠常人之情也有規其可以常情自處哉以常情自處非君子之道也尚益勵不懈以成其逺大之業則他日進於福祿榮名蓋未艾此衆之所望也豫與有規同郡故道其職任之重與其所已然者而期其將然者以為詩序贈蕭進士南歸詩序蕭鎡孟勤吾邑南溪故家其尊府山東鹽運副使鵬舉嘗受業於劉先生子髙能傳其所學居家以行義聞其在山東尤以清德為士大夫所推重當時求其似者不多見也孟勤受家學之懿克自樹立今年以書經取進士在髙等天子將顯用之俾需次于家將行求贈言於豫嗟乎孟勤豫言何足以增益子哉好言以悅子非所以愛子也而亦豈子之所樂聞哉子歸矣鄉人蓋為子榮之而豫則方為子懼也何也科第者士大夫所由以仕之路也雖若少有得焉然非居位以行道也亦猶夫人而已矣雖榮何加焉且君子固不以一第自足也聖如周公得位行道如周公然猶曰謙卑自牧夔夔如畏然則一第何足以動心哉故曰鄉人榮之若子之所可懼者則自是始矣吾邑之為進士者前後纍百十不皆出於故家亦不皆有若運副公者為之父也惟如是也故人之責之也輕今子故家之後而運副公之子也使其終處也人無責焉今既為進士將顯用矣則人將觀於子矣果言行有一不善焉斯咎之曰如是而為故家之後也如是而為運副公之子也豈不深可愧哉此豫所以為子懼也子欲無愧焉法乎子之親而已矣夫天下之道二義與利也喻乎義則無取乎利子之親不汨於利而能有其清德者以喻於義也今子幸猶未仕也其益謹於義哉必使言行皆合乎天理之宜始於家行於鄉充而至於義不可勝用則其仕也必不以利自溷而無愧於親若是始可以為榮而懼亦庶乎少釋矣子歸其勉之豫與子非一日之好也故其言如此子亦以為然乎哉送歐陽主事之南京考功詩序歐陽氏於吾邑為故家以儒業相上廣哲之大父蓋隱君子其尊府嘗為國子助教叔父今為雲南按察副使皆有名當時廣哲靜重而不迂寬和而有守且博學能文章今以進士擢考功主事當之南京豫與之有連故為道其職之所宜以贈之夫世之所託以為治者內外百司之執事而已以天下之才而任之其能盡當而無失也難矣於是有考績之法焉所以審其任之當否而進退之進退必皆當而無失則天下之治功盛矣繩墨誠陳不可欺以曲直權衡誠設不可罔以重輕使考功而或失度焉則賢否易位而事有不治人之蒙其害者多矣嗟夫賢不肖之進退治道之隆汚民心之休戚繫焉而考功任之則為考功者其甚重可知也夫既任天下之重則必盡其道韓子曰欲求士之賢愚在乎精鑒博采之而已精鑒者極其明博采者盡其公誠公且明則賢不肖不可掩而進退皆宜治功之不盛未之有也夫既所用者公與明也則必去夫害公與明者害之者何私而已矣私既去則公公則明考功雖重任豫見其無難為也廣哲之上猶有專其任者以是而佐之廣哲之職舉矣雖然是道也豈直為考功而已哉廣哲當有取焉工乎詩者歌以繫之周志剛髙明樓詩後序永樂十一年豫以扈從留北京志剛以客遊畿甸數往來城中時鄉郡之宦遊者無幾人見志剛從容欵洽相好也志剛因以其髙明之樓請於諸公翰林學士胡先生為記之侍讀梁公暨豫與志剛皆有連亦相與歌詠之然而未嘗登斯樓也其後豫以外艱起復始訪志剛於漆溪謁其尊府天與君問所謂髙明樓者乃遂一登焉巋然出於衆屋之上軒忩橫敞髙峻明潔軼氛埃而超混濁可以延清風招白雲倚欄而望之遐瞰百里近視一舍遊人行侣之笑歌耕夫樵子之來往風帆沙鳥煙雲竹樹隱見出沒於水光山色之中真一鄉之偉觀也夫凡陋者安淺近而卑汙暗劣者亦何有於髙明之見哉惟胸次悠然無塵俗之纍者乃能與於斯然則若志剛者豈尋常可比乎而豫與諸公昔之所賦述亦庶幾所謂稱情者矣豫嘗竊計世之人髙樓傑閣自庇而安者多矣然而其人或不足稱也幸而可稱矣而賔客之所與宴休悅樂者不足以自見也故或為賈區聚博徒雖締構之華而君子忽諸是以泯沒而世無取也惟有其居而與當世之賢者為娛見於吟咏傳之後世子孫而又相與守之而不渝若是者為不虛矣然則志剛其賢於人蓋逺哉志剛又求豫言故為序其説逺明樓詩序逺明樓者泰和周仲霄與其弟仲隆仲潔之所居也周氏故大家漆溪為最上腴原田廣衍彌望皆平疇沃壤溪水浸灌其中四山盤回環百里而逺明樓居其中巍然出埃壒而凌風雨仲霄兄弟承先世詩禮之澤以名閥自尚四方賔客往來周氏者輒延納於其家蓋有昔人之風致在焉豫昔者嘗過仲霄兄弟邀豫登斯樓而望之近而耕夫樵父之舍如鱗次如蟻集皆見於袵席之下逺而白泉髙霄玉華諸山騖而奔止而聳獻竒而競秀者皆可以一二數然後喟然嘆曰快哉斯所謂逺明者也常人之情膠於淺近而壅於見聞則志局而體疲氣悶而神昏雖欲展其逺猷不可遂矣惟縱目於遐曠之地娛神於顯敞之區則心為之益廣目為之益明超然出乎萬物之表夫豈區區常見所可同哉豫官京師二十年於宫闕之壯都邑之華人物之繁富車馬之闐咽錢榖甲兵之浩穰蓋悉見之矣然觀山水之秀亦未嘗不思往遊而未能則豫於逺明之樓而遂登覽焉其心目之豁然蓋可知矣而仲霄兄弟襟度明爽超越常情逺甚客至輒相與觴咏於斯樓蓋久而不厭士大夫之登髙能賦者皆為咏歌之既成卷矣仲霄兄弟因以求豫序豫時以內艱服闋當之京師不知登斯樓又何時也因為序之他日若以老病賜歸田里再登斯樓尚當為仲霄兄弟賦之也送蕭誠德歸泰和序北京古冀州之域唐堯畿內之地也至舜始分為幽州風化之厚非他州可比漢魏以來皆以封建諸侯自唐天寶至於元沒於藩鎮憊於兵革也久矣天眷皇明盡付所覆而幽薊實為內地今皇帝潛邸在焉德化大行一洗汙陋唐虞之盛復見於兹乃即其地建北京以為天下會同之都天發其祥地闡其珍山川草木倍增光采而四方萬國薄海內外有志之士莫不延頸跂足思欲一遊以觀聖朝之大業而依道德之末光蓋千載之良遇也豫內兄蕭誠德亦所謂有志之士而願遊者數矣今年適以事來北京乃得償所願焉蓋於夫山河之雄深土地之沃衍宫闕之巨麗賢才之魁傑謳歌朝覲之歸趨禮樂文章之宣著及夫城郭之壯府庫之殷兵甲之嚴風俗之重厚物産之繁多皆得以接乎目悅乎心退而嘆曰盛矣哉聖治之極其所謂其仁如天堯舜之主也嗟夫誠德之遊其可謂盡天下之大觀者也夫自江西而來其道里非逺矣然自天寶以後其間有志而願遊者蓋多而多以艱虞摧抑之不遂也今豫與誠德並生太平混一之時沐浴仁聖之膏澤皆得如其志以盡觀遊之美豈非幸歟大山長谷之民蓋有身受賜而欲知其盛者歸而悉以告之相與樂於田里之間必有繼康衢之謡者其謹録之使萬世有傳焉送胡知縣詩序遂安知縣胡侯子澄以被誣來北京且一年既得直將歸遂安中書舍人許君鳴鶴其戚也合交遊之士賦詩以送之而其友翰林侍讀周君崇述相與譽歎胡侯之賢而命豫序其詩蓋胡侯始以國子生為典史於某縣能潔廉以持已和惠以及人而其人愛之於是舉拔為遂安其所以治己及人者一如典史時遂安之人又愛之夫令治百里之地其民以萬計而事當有所操縱緩急其能無怨惡亦可矣非有愛民之實則安能使民愛哉故嘗論之令之於民有教養之道不以刑罰為也教養遂則民心悅刑罰勝而民心怨其理固應爾矣詩曰豈弟君子民之父母令以子視民則民亦以待父母者施於令其事蓋有不嚴而治者矣又何怨惡之有故為令而使其邑之人不愛必其所施者皆非善道也欲其事之治可得邪是故苛察以為能鞭撻以立威崇己而下人矜名而忘實者君子不貴也今胡侯為政而見愛於其人其亦有可愛之實而無不善之施故邪然則胡侯蓋賢矣雖然善始者必有其終昔之人有其始者多矣至於禍難之來非僻之干鮮不移其素失其守夫君子之所以為賢盡其在己者而已不以外物為欣戚也胡侯有其始矣其尚勉其終也哉今之著令為吏者三考而黜陟之縣令之賢往往升為郎官牧守胡侯勉焉此朋友之望也送鄭知縣之泰和序吾邑素稱文獻之邦其君子則守禮而畏法間居族坐相與講先王之道以淑諸身而刑於其家且欲以施之天下少者亦讀經史學文章以舉進士為業故絃誦之聲相接也其齊民則盡力於農畝或轉貨於江湖貿鬻於市區營什一之利以養父母育妻孥而有自得之樂是以賢者皆明於理誼果於為善其餘既安於所業而無外慕亦易與為善而難與為惡縣令之賢則敬之如神明愛之如父母凡其所令爭勸趨之惟恐後其政事之良設施之善必記憶傳誦至於久而彌新及其後也往往有廟祀之者其耳目之適則重江復洲平田沃野逶迤之岡秀拔之山綿亘乎縣之四境登髙而望之凡密林茂樹良苖嘉榖官署民居髙大之觀遊人行旅之往來風帆沙鳥之出沒耕夫樵父牧人漁子遞歌互答於煙雲杳靄空曠有無之間皆可以悅乎外樂乎中至於馬牛羊豕茶筍魚鱉果實蔬茹絺綌麻枲之類凡人所以奉口體者皆足而不待外求其風俗之美景物之勝孳産之饒如此故自昔號為易治賢令之來也莫不樂之既久而益安及其去而各相憶於無窮而其間比有不然者何也蓋有罷懦姑息煦煦然自以為惠苛刻擊斷切切然自以為才者於是人有樂其縱而賊善良苦其暴而致隕絶是所謂惠者乃所以利姦所謂才者乃所以殘民也今皆已矣縣之善良思得蹈仁服義寬嚴有體之君子而臨之庶能有立也而今得鄭侯焉侯名璘字煥文永嘉人以才能為御史出入有名聲其後以憂去今服闋而令泰和泰和之人之幸也夫嘗為御史鉏惡而佑善振寃滯恤困窮矣則於為令也何有其必寬而不縱嚴而不殘有以革前人之弊矣縣之善良有所恃而立矣不善者有所懲而改矣其政事設施後人必有以傳誦而記憶者矣侯之行縣人之官於朝者皆喜而使豫致一言故序其風俗景物與民之有以自足而易治者如此以為贈以俟侯之政成其績之美尚當為記述之使傳焉貽厥堂詩序今天子在位朝廷清明四方無虞而風雨以時年榖豐登故一時之人皆有以自樂蓋其小人則給足於田里之間而君子皆安於為善所謂六服承德之世也泰和袁君克睿乃以其間作其所居堂宇而名之曰貽厥之堂蓋以承先人之遺以克有今日而益思所以裕於後也前鄉貢進士珠林陳士瞻先生記之矣士大夫又從而歌咏之君其所謂安於為善者也觀君之處於是朝夕謹謹焉非禮之言未嘗一出諸口而其所行亦未嘗有戾於其言橫逆之來非僻之干蓋有抑志而無侈心其篤於自修者如此傳曰善積於其身而福及其子孫則君之所以善其身者乃其所以貽後者也袁氏居泰和世以善聞其傳於今蓋久矣非維持封植之厚不能也而君之所為又如此故君之孫和秀出於士林之中是又將顯其家者也夫干霄拂霓之長林滔天沃日之洪波是豈一日之積哉其本深厚則其末之盛長也果矣袁氏之先既有立於前故君得以享夫太平之澤君又克成於今而益衍盛大之休茍不替焉則袁氏之福蓋未艾而諸公之詩傳於後者豈有窮哉故為序之詩凡若干首贈髙協律序國朝於祀事為最重凡殷薦天地祖考皆有樂而作樂者必謹擇其人以學老子法者清靜淳一為可用於是慎選其徒處之神樂觀俾専事焉其敬共神明如此故自肇祀以來嵗豐人和災沴不作海宇寧謐四裔嚮風嘉祥異瑞莫不畢至雖由皇上聖德感通以致於此而執事之人相禮作樂秉德協心蓋亦有助也吾邑髙扶搖以選在神樂觀所謂清靜淳一之尤者也其於禮樂之事知之審行之熟矣歷二十餘年未嘗有毫髮過失聞於人者同列之士莫不敬愛焉朝廷知其才舉為太常寺贊禮郎而才益著既九年矣遂升為協律郎知扶搖者以為宜於此職也夫祭祀大事也而禮樂之用為急自古已然矣楚茨之所謂永錫爾極蓋本於既齊既稷既匡既敕也執競之所謂降福穰穰蓋本於鐘鼓喤喤磬管將將也由是觀之禮樂之感召豈不大哉而扶搖得以其清靜淳一之行當太平隆盛之時而從容於禮樂之事以相聖天子感神祇致福祥衍國家無窮之慶其任實榮且重矣今位益進扶搖當益思慎重以修其職溫恭朝夕執事有恪是所宜服膺而勿失焉扶搖既升擢當之南京其素所厚善者因中書舍人鍾君子勤求豫文以贈行而豫亦素與扶搖相厚者故歷序其榮重如此以送之扶搖必以豫言為善而益勉之哉郭處士挽詩序郭君彥常既沒之十年其子陜西按察僉事公緒集凡士大夫哀挽之詞為一卷求豫文序之嗚呼彥常誠可哀也己豫家泰和與郭氏居相近而有詩書仕宦之好故彥常與豫相愛為最深然則豫固知彥常其所可哀是宜見於豫文也彥常姿貌偉然慷慨有氣節然善自檢飭造次不違於理遇人不擇貴賤皆有恩意而獨喜從賢士大夫遊往來言笑歡如也間嘗及於為政彥常議論英發設施措置有過人者及論一時人物是非曲直皆有以當乎人心蓋其少遊京師入太學交天下之賢豪而親見公卿大夫之行事是以才達識明如此又持心公平於事無所茍故邑之大夫政有所未宜鄉里小民意有不能平者多咨決焉彥常皆為之盡無不愜者由是上下皆推敬以謂彥常非直百里才也彥常雖才賢然不屑於進取永樂二年朝廷下求賢之詔今春坊諭德湯先生翰林修撰梁先生皆深知彥常將奏起之以病不可薦未幾而彥常死矣嗚呼以彥常之賢才而不少見於用以沒豈非其不幸哉宜乎士大夫哀惜之不能已於言也而况於豫者乎雖然古人懷抱利器不見知於人卒無聞以沒者何限其有幸而顯矣而才不稱位至死而遂泯焉或因以著其不善而莫之掩者蓋亦有也求一言以哀惜之何可得哉彥常雖未達而世之知己者固多又有以著其賢才於逺然則彥常未為不幸也嗚呼彥常其不朽矣故為序之其操行之詳則有志其葬者此不著著其善如此非徒以泄豫哀亦因以慰夫朋友之思而已送郭僉憲詩序永樂二十年三月豫友浙江按察僉事郭公緒以內艱服闋將之京師吾黨之士敦朋友之好重離别之感者相與餞於城南濟渡庵之僧舍即物賦詩以送之而謂豫宜序憶前同遊鄉校時郭君文學議論頴然出儕輩而與豫最相好也如是者五年豫先竊第入翰林不相見者蓋久其後郭君亦領鄉薦然遂以憂去久之乃就徵入太學始得以其暇日相往來飲酒言笑以為歡蓋别去已七年矣又二年郭君取進士歷試都察院有名然勤於其職不少暇心雖相親而迹則已疏矣既而去為陕西按察僉事又調而之浙江其間不能以期月處蓋未嘗不欿然也前年乃與郭君皆以母憂歸鄉里喪事之暇時得相見慰勞苦如平生然家事亦滋出不能相聚如曩時則又未嘗不悵然以歎也夫自相好以來至於今二十五年始而少中而壯今將老矣然其間聚處而樂者能幾何今又遽去不知何時再見而樂也則豫亦安能己於言哉古者大夫君子之有行也其同列之賢賦詩以送之所以美其德勉其功而欲其毋久於外尹吉甫之詩曰仲山甫之德柔嘉維則又曰夙夜匪懈以事一人又曰柔亦不茹剛亦不吐至於篇終又以遄歸慰其心朋友之誼何其至矣千載而下因是想見其人猶足以起敬起慕今之詩猶此意也其託物比義蓋深矣郭君時取而覽觀焉則庶幾有以慰朋友之思也已送尹御史按廣西詩序豫讀皇皇者華之詩而嘆古之君臣所以憂民者何其與今相似哉蓋君人者有憂民之心而不能親接乎民於是而遣使使者宣上德而布之民𨗳民情以達於上者也故其首章曰每懷靡及而於咨謀度詢屢致意焉蓋有每懷靡及之心而勤於咨謀度詢乃能盡其職而稱上意於乎其重矣哉我國家有天下土宇之廣亘古所無既設十四布政司以治之猶慮澤不下究情不上通於是有巡按御史之出焉既親臨而遣之及其歸也又有民情之章焉由是上之德不壅而逮乎下下之情不壅而聞乎上上下交所以為泰也豫友尹崇髙為監察御史有能名今年被擇按廣西朝之士大夫知崇髙之能盡其職而喜廣西之民之遭也皆為詩以贈之而謂豫宜序豫謂崇髙立朝親見天子仁民之施其奉宣恩澤咨察民隱蓋其志也今之去雖微贈言可也而諸公不能已於言如此蓋所以致其惓惓之意而欲崇髙永其令譽於無窮也雖然豫有説焉廣西去北京萬餘里其地多猺獠而為之吏者豈皆循且良哉其間蓋有弱而受抑強而梗化者尹吉甫送仲山甫之詩曰柔亦不茹剛亦不吐不侮孤寡不畏強禦崇髙所宜務哉雖然此其行事也其詩不曰仲山甫之德柔嘉維則古訓是式威儀是力乎此又崇髙之所宜務也誠如是則將肅肅之命以明邦國之若否夙夜匪懈以事一人者與仲山甫蓋等矣崇髙勉之哉送尚寶司卿張君歸省序張君名信東萊人其以孝聞於時也久矣永樂之初君之母缺氏病且殆百方莫能愈君禱於天割肝和藥以進母食之良愈事聞太宗皇帝嘉其孝命旌表其門閭且以為尚寶司丞君在職恂恂然不少懈其心嗜學如飢渴之於飲食時豫為翰林修撰嘗以職事相往來君輒從之釋疑解惑豫亦樂為之盡其後仁宗皇帝在東宫監國君留侍左右與豫益相親而益謹於其職仁宗皇帝愛之及即位遂由少卿升今職君之母亦錫封太宜人久之君請於今皇帝得歸省又賜鈔二千貫為道里費將行其同列之賢袁君忠徹葛君貞俞君敬徵士大夫能詩者作詩送之而求豫序豫與張君交非一日其何可愛於言豫聞臣子之道忠孝而已矣張君之事親已可謂孝其所以事上亦庶幾能忠矣今之歸太宜人年八十餘尚康強無恙而君以爵秩之隆奉婉愈之樂鄉鄰父老見君之能孝而躋於顯仕又有以為親榮如此其所以起敬起慕者當何如其至哉雖然忠孝非二道也事上之忠即事親之孝之所推也而君子行之蓋終身焉慎於始而懈於終君子不為也張君益務其終也哉不以已之所能者自多而以古之人所能者自勉則是亦君子也已張君行矣其以時還朝而修職焉毋久淹於外也南徑胡氏族譜序南徑胡氏族最盛如麒蓋族之傑然者也監察御史尹崇髙薦其才擢任丘知縣將之官出其所著族譜求豫序南徑在泰和西北三十里豫嘗往母家輒過焉見其層樓豐屋參差隱映於重岡長谷之間未嘗不嘆其盛也及得譜觀之蓋居南徑始十世而子孫之存將百人後之來者猶未艾其蕃如此非積之有本故耶豫家素與嚴氏通婚姻而如麒與諸弟如龍如綍亦連姻嚴氏故如麒以序請於豫則豫雖欲已可得邪夫所謂故家大族者豈偶然之故哉必其祖宗之善充於已而及於人然後子孫有所慿藉故能悠久盛大而不墜辟江河之水浩浩湯湯踰萬里以至於海而莫之能禦此其本可知矣然世之論氏族者專以爵位之髙下而不究德義之盛衰故自慊者往往詐冒以自髙豫竊怪之豫章徐孺子終於布衣而天下後世尊仰之如泰山北斗過其鄉者尤起敬起慕則於子孫誰忍慢哉當時狐鼠之姦鬼蜮之雄非不昌然得志也然子孫有知亦且羞道之則夫所以亢宗而裕後其所重當如何可見矣是以君子篤於為善也南徑之先云析自永陽其前之顯者皆不論居南徑而顯者止於提領山長而為鄉善人今如麒寖光顯矣其尚篤於為善哉若以前人之善為可恃而忘其所以繼不可也昔欒武子為晉卿有功德於時晉人思之如草棠之思召公其子黶怙侈蔑義逮武子之施沒而黶之惡彰於是盈受其禍以僨其宗此不可不戒也詩曰毋念爾祖聿修厥德胡氏之子孫皆勉之則此譜之傳雖百世未艾也贈浙江副使江君序建安江君至堅為監察御史既九年以績最升授浙江按察副使諸公篤僚友之誼重鄉郡之好者求豫文贈之豫與至堅同年舉進士又同仕於朝相知為最久於其去也宜為文以贈之况又有求者耶故為至堅道其所欲言者夫代天以養民者天子也然不能近民而施其所以養之者故託之郡守縣令而統於布政司又設按察司以臨之其為民之意備矣故世之論養民者必曰守令民有不得其養則必咎守令之不賢此本其職而言也若君子深原其故則有未盡然者蓋守令既逺於天子非忠實不欺之士鮮不廢法以病民為按察司者能明以燭之公以行之奬是而糾非佑善而摧惡不可以毫髮私撓則賢者益勸於養民不賢者有所憚而不敢病民故為按察司守令之所由以賢民之所由以受福者也其職豈不誠重也哉憶豫就外傅時見有困於豪民黷吏者曰吾將訴於按察司彼必惴惴然懼返其所取而釋其不平或為要約以示不敢復然者彼誠有所畏而服也自省事以來所見受困者益衆有聞訴而懼者矣有聞訴而加甚者焉是豈盡其人之罪哉或臨之者亦有未盡善歟於乎按察司之賢天子所恃以養民民之所恃以為安也而或有未盡善者則民之病惡乎瘳是以君子深原其所以養民之故而歸於按察司之賢非過論也浙江自昔稱大藩今為按察使者曰林君茂𢎞豫知其賢而至堅往副之又賢凡與為僚者又纍纍皆賢明於是非善惡而皆不可以私撓有以厭服乎人心則浙之為守令者當無不賢而民當無有困者矣此非深幸歟故豫贈至堅者如此其亦以為然乎哉其亦以為迂也哉贈張御史任南京詩序張僉時薦豫泰和故家子也其祖父皆溫然恭慎有長者之風其兄坦為豫王氏壻聰敏而好學既舉於鄉未得官而卒時薦繼之尤篤意於學問人謂張氏世積善子孫必有顯者當於是見矣今時薦舉進士得監察御史足以明為善之報也時薦既受命當之南京邑之仕者皆俾豫贈以言而時薦之意似亦欲有得者嗟夫豫迂者也雖有意於古人而才不適宜其贈人以言多矣然率以為迂而不見用故往往自悔其言時薦既為御史其勢位尤非迂者所能近而何取於豫言哉雖然時薦所欲也豫何可終默邪今之御史兼古臺諫之任凡事人有不得言與不能行者御史皆得以言之皆得以行之其任之重可知也然何以能稱哉仁義而已仁足以勝私義足以制事然後身安功立而不負於所任古之君子皆然也後之人有能此是亦古人而已矣然逺者難徵而近者易信姑以鄉邑所知者為時薦誦焉洪武之初豫叔祖啓翁先生出為御史其言論侃侃而所行必由乎道是以受知於上而寵祿加焉然貧不異於布衣時其後有陳仲述先生者為御史闕年亷介之操忠謹之行始終如一日及其卒也無餘資此二先生者士大夫稱之至今夫豈愧於古人哉取法前輩而追蹤古人時薦所宜務也所貴於士者以其學聖人之道聖人之道不外乎仁義方其未用姑以是存諸心及用也乃以家自纍而棄之至於名毁而身辱則亦何貴於士哉時薦勉之豫之所贈者如此若亦以為迂則豫之悔滋甚矣時薦勉之凡為詩以贈者皆系於下方云抑菴文後集卷六
