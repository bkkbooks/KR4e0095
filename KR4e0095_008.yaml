body:
  text: 抑菴文集巻八明王直撰墓表劉君墓表君諱觚字士方泰和珠林里人世為儒家自宋以來科第顯者累數十大父快軒先生宗榮在元為本州儒學訓𨗳伯父禮部侍郎崧父豐城教諭子彦皆以雄才奥學知名君隨父官豐城時方十嵗已能作詩日誦書數千言賔客有問即應對如響當時大竒之甫弱冠遭父喪即侍母歐陽孺人奉柩歸泰和送死事生皆盡其道而益肆力於學乆之博通羣書為文思若决河夐然出儕輩再以書經進於有司不偶則嘆曰親老乃汲汲於此邪遂不復出鄉之大族争請君為師而歐陽孺人已有病君朝出暮歸徃返二十餘里藥食衣物必親視所宜孺人卒葬祭必以禮一不惑於流俗劉氏族乆且大先墓無逺近嵗時必躬徃省之有犯者必訴之官豪猾知君貧欲以乆困君而君氣益勁曰吾理祖宗墳墓可但已耶已之不孝也雖連逮數年必得直乃已由是人莫敢犯尤篤於朋友以道義相鐫切然性素剛人有不善面折之或拂衣徑去以故人多憚君然論鄉邑賢者必曰劉君劉君云君負才具嘗論及為政設施措置多出人意表然不苟求仕進縣庠訓𨗳常缺論者獨於君為宜然欲君且少貶君聞之曰訓𨗳當以道義教諸生師嚴然後道尊顧可自貶以徇人耶自貶以徇人唯餘子能之吾則否衆益憚君不敢近然君亦不以屑意予與君自少相從講學最相知而輪林侍讀梁先生用之亦雅重君之賢數欲薦之然聞君有疾不欲出故不果薦凡賔興之嵗諸藩省請考貢士皆不就以永樂已亥十一月缺日卒于家年四十五其𦵏在其里嘉湖之原娶羅氏子男五人準登宣徳二年進士第嗚呼昔者聖人之論君子也蓋曰義以為質則君子之所為視義之可否而已義所不可雖千駟萬鍾弗顧也况其下者乎然而喜事者乃或至於屈已以求之幸而得焉則侈然自以為賢孟子所謂齊人之可羞者也而世之論人者好以窮逹得失為賢愚若彼者皆其所賢者也是亦齊人之類也此亷恥之所以喪而士氣之所以不振也若劉君非篤義之君子與是足以表見於後世矣故論著以授凖使歸而鑱諸石南溪蕭處士墓表泰和南溪蕭季廣與其弟季哲季敏季運以永樂二十一年十二月二十五日改葬其父處士君於龍門口之原葬已相與謀曰吾父不幸棄諸孤今體魄既安矣惟其徳善未有文以表諸墓將何以傳示永久乃使姪釜奉書幣來北京請予文以鑱諸石蓋君嘗役予先祖竹亭先生學而編刻其詩以行於世又嘗請予教其子孫於義為最厚宜其請於予而予不得辭也君諱翬字鵬漢其先長沙人楚軍巡判官覺之裔曽祖南山祖蘭谷父北山皆不仕而皆以徳望一鄉君少端重喜學家雖富不為慢戲佚遊躬行孝弟衎衎如也父嘗病疽疽浸淫内潰勢幾殆君屢齰吮之手注善藥晝夜躬調視疾遂愈未幾母疽發亦如之君同産及従兄弟五人鵬舉鵬起鵬南鵬翔而君最少相友愛甚篤君又恭順不懈庭前生紫荆五株同本君子以為和氣所致於宗族親戚處之各適其宜交朋友重信義周人之急切於為已與人處未嘗易其言言之必當於理至於論事成敗計利害所宜必曲盡竒中人有未善輒従容開諭使為善於已有忤不校也君貌厚氣温而才行如此衆以為宜在官位永樂辛夘被薦至京師以疾辭歸卜居武陵橋挹武山之勝性不嗜酒然客至輒傾倒相歡攻於詩得唐人家法而亦不自衒時時發於咏歌以娯情寫物取自適而已永樂十七年四月十八日客于洪以疾卒年六十二娶宋氏有賢行子六人季厚季髙早卒今存者四人皆能繼君之志孫男十三人某某曽孫男三人某某予觀先王之世以徳行教天下而天下之人皆興於徳行故成周之盛比之唐虞及其後世教道廢而風俗衰至於秦極矣迨漢有石氏楊氏唐栁氏宋戚氏皆世其徳義以孝友稱至今豈非垂範取法兼盡其道歟予聞北山翁與鵬舉君嘗以賦役罹法争就逮義聲動當時至君而施於父子兄弟又篤厚如此凡人守一善有不能終其身或至於子而遂失之者多矣蕭氏已再世矣是固可法也使其子孫謹法而不渝一鄉之人皆化焉則君之善豈不益大哉予故表而出之使揭於墓上魯府紀善梁先生墓表魯府紀善梁先生本之以宣徳九年七月一日卒於官年六十五其子泰和縣學訓𨗳栗與弟樞奉𦵏於其鄉某山之原少傅兵部尚書兼華蓋殿大學士楊先生銘其墓矣栗又請予文表諸墓上蓋少傅公與予皆其姻家也義不可辭先生泰和栁溪人自少博學於經傳靡不通始為端州府學訓𨗳秩滿陞溧陽教諭以外艱去服闋改納溪蜀王聞其賢舉為紀善丁内艱既除改魯府紀善先生有英邁之氣忠厚之資其勤於教誨謹於輔𨗳言行之善者蓋多皆其職所當為不可得而備書也姑述其可以垂世勵俗者蓋先生事父畦樂母陳安人極孝敬凡所以養其口體順適其志意者事無大小必盡其道至於禄俸餘貲皆以歸於親一不為私蓄計事其兄翰林侍讀用之怡怡恭順未嘗有所忤父没家政舉歸其兄嘗自念惟一子而兄子四人田廬當均給諸子其兄則不欲有所輕重卒兄弟均分之其内皆化無彼此言者従弟泂内弟陳賞皆早孤先生皆教之有成賞一子异先生許妻以女賞出為廣西按察僉事以卒异貧無貲産或謂先生於姻事將何如先生曰异雖無地其上獨無天耶卒妻而厚撫之親戚有以田質錢者乆之不能贖而貧益甚先生還其券俾得自資先生又有地邇曽氏曽氏僦而耕者數十年累納僦直先生以其同業儒又連姻婭義不受且欲割以畀焉及曽氏孤且貧先生念欲振之曰斯地也吾心許乆矣即自書券徃授焉使食其利其在端州人有死而貧不能葬者輒出錢率衆葬之窮民無告者輒周給之與人處能輔以義有所未至輒面斥其非人或不能堪不顧也及其復於善即相接怡然人是以樂親之嗚呼先生之徳如此古所謂治教之夲也而不究於用今已矣豈非可惜哉世之號美才者多矣其於書非不讀也而行或異乎是蓋有悖其父兄簡其親戚欺人之孤遺而長人之惡視人之死喪困急而恬不知省者其於仁義何如也夫風俗之所以厚賢才之所以興起蓋由賢者表勵之也使先生老而歸鄉之良子弟有所視法而益勸於善則風俗之厚賢才之興當益盛乃今不可作矣嗚呼安得復有如先生者哉嵗月易邁流風餘韻將乆而忘之故特書其可以垂世勵俗者使歸鑱諸石以示來者王處士墓表泰和多故家南富王氏其一也其先太原人後徙廬陵之何山又徙安成之連嶺至宋諱明逺始徙居泰和以詩禮名家宋末有為學諭曰仲鴻者生興祖篤學而好義受知於信國文公公為書續槐精舍四字榜其居以勵之世亂弗克有為學諭生廷珪廷珪生處士諱天迪字功迪少讀書有大志新作一室揭信公所書朝夕勉焉欲有立於世其言必依於孝弟忠信而行亦如之值元季不果出時所在多盗起處士乃傾貲結客以保障鄉里人賴之皇明混一可以行其志而處士老矣㑹詔下覈民田或誣處士失實盡没入其貲産處士不能自白則嘆曰命也而未嘗有怨尤惟訓其子以徳義治身以勤儉治家而已乆之家復裕國初徴稅一邑擇一人有才行者摠徴以輸于府衆盡推處士任數年稅以時入無纎毫過差貴賤賢良皆譽之其治已嚴重而臨事寛平從容進退表然為鄉之望其奉祭祀待賔客必以禮人有未善則容而教之嘗與誣者相接不少見色辭人尤服其雅量洪武甲子閏十二月二十二日以疾卒距其生元大徳癸夘之嵗享年八十一娶郭氏子男二思齊思賢女一嫁缺孫男五守一守訓守貞守敬守恒曽孫男十有一純經維統繪緒紱絢纁緝緋經開封府學教授維蕪湖知縣紱萊蕪知縣處士初𦵏其里之乾溪後改葬萬安縣誠信鄉湖口之蓮花洲葬已五十年而墓石尚未有文至是維自蕪湖來北京以前國子助教歐陽先生所述處士行狀謁予曰維曽大父實有徳善鄉邑罔不聞今前輩長老凋落殆盡而知者鮮矣非為文以刻諸石恐久遂湮泯敢以請於先生予謂先王之世君子之所務者義與命而已故曰君子義以為質又曰不知命無以為君子惟其務此是以於事之當為者勇為之横逆之來苟非其所自致者受之而不報以待夫天之自定也後之君子不明乎此於其所當為者或不為有所不得則盡其智術以逞於一時卒陷於不測而不悔此孟子所謂匹夫也若處士者其可謂安於義命之君子矣子孫之福至乆而益盛者天定故也若是有不可表耶故為書之使刻諸墓上袁叔異墓表安吉縣學教諭袁君諱同字叔異洪武丙子卒於官明年二月歸葬於泰和縣西之几山不吉又以永樂缺年改葬于缺原又缺年其子範乃來求予文表之墓上按袁氏之先自金陵徙泰和世有顯人至君之曽祖惠窓祖拙餘父彦正皆不仕然皆有學行為人師君生而穎敏喜讀書日記千百言稍長従鄉先生陳心吾受易經入鄉校為弟子員凡在學者皆莫能先君為文章宏肆竒偉而言論馳騁開合不窮語嘗傾一座其事父母處親戚朋友油然愛敬之施學成貢入太學由太學出奉使浙江藩府大臣皆稱以為能嵗丁夘領應天府鄉薦明年授安吉教諭能以所學教諸生其浮詭不法者君以一語折其心皆帖帖為善良故學者多所成就君之才通練足以有為其在安吉於廟堂學舍廨宇及器用小物靡不整齊完好人謂君小試乃如此使其大用可知而不幸已矣其卒時年纔三十四嗚呼天之於君何其若是哉自古大賢君子負傑出之才而不試於用者不少若君猶得為教官以少見其才而人之能如君者又少也盖其隨俗變化夷髙以就下上無以教下無所承式然則如君者可勝惜哉使君尚在而當佐理之寄推其所施者而大施焉則人将無遺利矣而乃止於此豈非命邪雖然賢者必有後天之道然也故君之子範以才俊稱於人今又為邑庠生将復進於顯榮以食君之報而且汲汲以顯其親以予文之不美其何足以稱孝子之心哉然不可辭故論次之而使鑱諸石都察院右僉都御史凌君墓表宣徳九年八月十五日中順大夫行在都察院右僉都御史凌君晏如以疾卒於官年五十三朝廷為遣舟歸其喪于湖州歸安縣将葬于所居琅琊鄉缺山之原其㓜子啓既請右都御史熊公銘其墓矣復來請予文表諸墓上曰啓之兄敬以養祖父不克來京師今歸有期亦不能俟其來也故啓敢以請凌君嘗入翰林與予接又同朝乆且相知義不可辭君諱安然字晏如自少力學問尤工書其楷書學晉小篆則師秦相早有名鄉邑太宗皇帝銳意文藝必欲追配古人君優㳺館閣益自勵務欲稱上意仁宗皇帝在東宫雅知之常令繕書以進今藏於秘府永樂十五年擢拜吏科給事中以恭慎舉其職日侍上左右有所顧問敷奏詳明同輩皆推服焉仁宗皇帝即位陞吏科都給事中益毖懋不懈人未嘗見其過舉今天子即位三年大正庶官以脩百度以君為右僉都御史盖是時持憲者多以賄聞由是用君其間君感上知遇確然自守不為衆所惑思欲稍拯其弊事有不可即懇懇為其長言之多見聴從然猶膠箝牢宻君未及有所振舉而以内艱去盖在任不二年君去而其長及凡相託者皆得罪矣服闋仍為右僉都御史兵部以武職貼黄乆不清請㑹官清理如故事上以命君君與翰林侍讀苗君衷皆従事於此同力一心罔有漏失有顔鎮撫既卒子孫當一人繼乃復以一人冐官三十餘年無覺者君閱其實乃奏罷一人又著令凡武官有靖難功而無子者不忍遽絶其禄得以壻或義兒一人繼不再及也有張指揮者既以義兒繼矣又欲冒及其子因有所調發託統帥以疾言豫以子代亦十餘年矣君亦奏請罷之其臨事用心不苟皆此類而不能乆於世豈非可惜哉曽祖缺祖徳皆不仕父彦能歴官至應天府通判坐累罷居均州仁宗亦知其為人因君為都給事中即命冠帶造朝以都給事中致仕歸湖州今加封右僉都御史君初娶周氏早卒有一子曰敬再娶唐氏四子曰啓肇敦敷於乎自古聪明才俊之士遭時奮身皆有志於功名以顯當時傳後世然而不至於大有建立而卒如君者何限盖莫非命也使君而得永年其所立豈小哉今雖不幸而其居官行事之善不可以泯也故表諸其墓楊處士墓表泰和楊處士從進以永樂十二年缺月缺日卒于家年缺十缺年缺月缺日𦵏千秋鄉過路塘之山下後十八年其配郭氏孺人年八十亦卒祔于處士之墓又七年為正統二年其孤子珩子珹子珮相與謀曰父母之葬既有銘以納于墓矣若又表其徳於墓上豈不益明顯而延聞于世乃以書幣來北京請予文将以刻諸石子珩予女兄之夫而子珹子珮皆有連予雖不得辭然縻於職務未有以復也乆之子珮又以書來速文曰子知吾親宜無愛於言乃著其實俾揭焉楊氏故大家而族屬最繁處士世居汝南坊號上園楊宅曽祖某祖某父某雖不仕然皆富而有文有元之季盡失其故業處士恭儉勤慎務不辱其先言行必由於禮義初娶東門劉氏賢而有婦道處士思再造其家實克相之劉孺人卒處士求同徳以成其志遂以郭孺人繼焉郭氏世居縣西之大溪孺人則栁溪之曽孫景宣之孫才卿之子也資稟端重色温而氣和歸處士尤謹於内助處士孝念其親必盡誠相祀事其撫育孤姪則加之以恩親賔徃來處士欵洽於外孺人治具於内必㓗以豐嵗時饋遺輕重疏數必適其宜撫異母子如已子衣服飲食必均所以訓勵之者亦無彼此之殊處士勤於治生産業日盛而孺人樂儉素未嘗侈費一錢以故家益裕皆處士之志而孺人成之也處士既卒三子因其所遺各置别業於西鄉孺人亦厭城市喜田園板輿迎奉極甘㫖之養鄉人以孺人有福而其子能孝莫不譽歎焉處士三子子珩子珹劉孺人之子子珮郭孺人子也女八人皆有歸孫男七人維繼綸纓縝緘純繼領鄉薦為河内縣教諭今已卒孫女九人曽孫男三人憲懬懋嗚呼元季兵亂以來大家世族之淪喪者多矣髙門大宅廢而為丘墟子孫亦降為輿𨽻至或湮滅而無聞其能脩復舊觀如上園楊氏者誠少盖由處士之孝不墜其世業而又有孺人之賢以為之助也生既同勤以成其家死又同𦵏以安其魄則皆表著其行而使同不朽焉豈不宜哉故為次第書之使後之人有則也處士胡公墓表處士胡公諱環字子巖泰和社溪里人社溪之胡分自黄漕盖南城丞箋之裔宋季有文可者従文丞相勤王卒死於其事文可子南叔以平溪洞勞得巡檢南叔生建徳主簿履翁履翁生守良守良娶顔氏而生公公性孝友父母年皆八十公善事之得其懽心伯父守禮無子公事之如父父母沒葬祭無違禮而哀慕乆不衰其同産惟一姊公極愛敬至割田以奉之又待其従姊如同産事族之長者以禮而處衆人以和嵗時祭享及冠婚喪葬一皆盡其道其有不給者賙之祖業墳墓勤於展省非有故必自行於延師教子甚切毎出貲以倡族人内外屬子弟有願學者皆受之使學諸子所為稍涉非義即厲色訓戒必改乃已赴人之急不啻為已人有假貲無不應或不能償不責也待姻戚以義交朋友以信撫下人以恩接鄉黨以誠當時名士顯人有過公者公敬禮尤至諸公亦甚愛公必相與懽洽傾倒然後去晚年付家政于子而放意山水間超然自樂也宣徳乙夘十月十三日以疾卒年七十五凡知公者皆哀惜之明年十月初五日𦵏其鄉禾坑之原娶永新蕭氏有婦道先卒子四重簡重連重通重宣女三嫁嚴希齡蕭鎡蕭建亮鎡為翰林編脩孫男十人曽孫男二人編脩嘗謂予言鎡外父實有淳行而以隠終吾妻慮其善之不傳知鎡辱愛於先生属請文表其墓予未暇作今年重宣來北京申諸兄之言而泣拜以請因憶徃年過金臺訪予姻家嚴君誠仲公來顧予得拜焉觀其容貌作止而聴其議論信所謂隐君子也夫一鄉有君子則一鄉之人皆興於為善有以成賢才美風俗雖使乆生於世而不厭今公已矣豈獨一鄉之人惜之雖予亦深惜之也其為人如此豈可使無傳哉况公賢子重宣以請于予而予之姪稪又重宣壻也誼不可辭故序其實使刻諸墓上李處士墓表處士李公字又新世居泰和文溪里與予家相距不百步而長予二十年最相好其卒𦵏已乆矣今年孫誠來北京奉其父懐慶太守湘之遺命謁予曰先人疾既彌留呼誠告曰爾祖墓石未有文吾深以為歉知其善者惟侍郎王公吾嘗請表於墓上則既許諾矣我死爾以吾言為請而刻之則吾目瞑於地下今吾父雖没而言存敢以請拜且泣予為之惻然曰爾祖孝弟人也予知之不可使無傳于後世宜爾父子之請于予也公曽祖仁可祖宗明父雲龍皆不仕而皆為善人長者母蕭氏前進士子上先生之姑賢而有家法公既受教于家外則從良師由是能善其身與予㳺時年已四十餘矣而母尚在堂朝夕奉其起居承候其顔色調其衣食寒煖之宜或有不豫則惕然以憂躬治湯藥而敬進之不暫去左右勿藥而後喜可知也兄可成惇厚樂易公事之無違禮凡言動不敢先均憂樂通有無於事當圖議者則従容和順唯兄命未嘗有乖其諸所行必皆審於理不肯稍涉非義豪傑之徒相時射利舞文飾詐以陵人與凡摴蒱博奕俳諧聚醵之娯皆不與唯故人親戚有急則必赴經營佐助曲盡其方殷勤篤厚之意非衆人所能及嘗作肆居善藥戒諸子曰此非獨為利亦以市義必平價以售有急而無貲者則貸之不責其必償其所以治家訓子孫無非理者湘従予逰縣庠訓勵之尤切其事師親友皆資給之使得如志以學故能有成立其行如此非所謂一鄉之善士歟永樂癸巳正月十九日卒年五十六娶蕭氏有婦道子六人曰湘懐慶知府曰浩固安教諭孫男二十人曽孫男九人公初葬里中窑背祖墳之次以其地不吉諸子孫又将以缺年缺月缺日遷于缺之原而樹表墓上於乎人道莫大於孝弟盖所謂徳之本也世之人乃謂不足為惟逞志於所得為借耰取帚而狠戾之惡滋紾臂䦧牆而陵犯之風作如是而欲刑其家封植其子孫可得耶公敦行孝弟而又推以及人雖不至寵榮而諸子享其福此徳之應也懐慶至死猶不忘顯親之孝又有孫若誠者切切焉以成其志皆公之徳善實啓之以是而鑱諸石足以垂耀於後且不獨勉李氏之子孫使世繼其美亦欲使觀者有所興起云嚴氏兩處士墓表嚴氏兩處士泰和人伯曰元齡仲曰元晏皆質直坦夷端厚周慎非其所當言者未嘗出諸口非其所當行者未嘗發諸身凡智術機巧衆人夸詡以為能者未嘗形於念慮至於聚博醵飲慢戱佚遊之事亦未嘗厠跡其間讀書為善思不忝其世洪武初儒道浸盛元齡甫以所學施教于里中里中子弟多從之者有司聞其無害舉為吏處士曰吾士人顧可為吏邪不就強抑之遂避去有司怒其忤已置名案牘中益求之不已處士益自閟不與世相聞稍稍出遊四方乆之得免歸鄉里與親戚故人相欵洽其言行不異於曩時勤儉自足無一毫外慕意盖囂囂然樂也永樂丁亥缺月缺日卒年缺十殯所居東之魚池上元晏甫初與兄同居縣西鴈塔巷後廼徙金臺山中既攻儒書又喜治醫術以濟衆與予先公篤誼如兄弟其制行又髙而言必顧行一鄉之人服其教被其澤縣令洪俊敬信之如蓍龜屢託以事無不當於理者隣邑民嘗作亂朝廷遣襄城伯李公率兵討之公亦知處士賢用其言良民免於俘棄而全其室家者不少平居賑窮恤匱解紛釋難尤多永樂戊子十二月十七日卒年五十五葬五十一都方橋東岡之原嚴氏之先自金陵徙泰和世以宦學顯而又以貲富有名宋元之亂盡失之惟儒業不廢處士祖存忠不仕考尚徳萬安縣典史母胡氏兩處士實同産元齡甫娶王氏直之姑生二男子敬仲仁仲一女子嫁劉士髙再娶劉氏生一子晚仲孫男一元晏甫娶胡氏母黨也亦生二男子誠仲文仲二女嫁黄丕烈劉伯遡孫男六誠仲敬仲兄弟謀曰惟吾二父相友愛甚篤非他之為兄弟者比嘗恨遭變故不得與同處今不幸已矣其可使終異耶乃舉元齡甫之喪亦𦵏于方橋東岡之原同域盖欲其有以慰恱于地下則缺年缺月缺日也鄉人過者皆曰此嚴氏兩處士之墓必致禮而後去至是誠仲兄弟同以書來京俾直為文表諸墓直念㓜時常得侍左右聽其言觀其行凡所以教者必本於孝弟忠信盖用其所有者迪後輩藹然古君子之風至于今不忘以直之愚其何能光昭令徳於乆逺哉然不敢辭也姑述其槩俾揭于墓上劉氏歸仁阡表劉氏於寜都為大家其曰宗仁號靜山者則其族之傑然者也靜山之曽大父景新大父友貴父文福皆不仕而皆以忠厚聞鄉里静山生而英偉喜讀書未嘗慢戱佚遊鄉先輩皆器重之長而才識益充善剸繁治劇公私諸事皆自任不以煩其親朝夕敬養父母之心懽焉親沒祭𦵏無違禮課童奴治産業勤儉自持家日以裕性尤剛毅守禮法遇事必公其是非不曲隨苟止親賓過従論政務究物理語嘗屈其座人人亦莫有間然者兄弟相與怡愉和樂盡友恭之義自以早年廢學見幼弟本穎敏延名師教之遂以儒業聞縉紳間嘗掌其鄉粮賦及領千夫入湖湘伐大材輸京師撫下有方人人樂從故不擾而事集晚讀老子好清靜聞武當山天下竒勝神人所棲止遂徃遊焉徧歴諸岩洞兾有所得恍惚遇異人授以道要悟而歸退居西澗之阿超然有出塵之想一日㣲疾諸子侍側惟勉以孝弟不及其他語畢而終永樂廿二年五月十八日也享年五十九宣徳元年缺月缺日𦵏歸仁里髙屋上之原配孺人王氏諱珤直之従姑也盖曽叔祖用則公於洪武初為寜都訓𨗳因家焉生従祖子才娶嵇氏而生孺人柔慧淑善閑於女紅父母愛之為擇壻得静山遂以歸焉時有姑在堂老而病孺人事之小心敬慎嘗先意承志姑喜其孝稱之六親凡靜山之事親處兄弟睦宗族惠於鄉黨隣里皆能成其志王氏無主後墳墓孺人皆主之祭祀展省各以其時而哀慕加焉治家謹肅訓諸子孫女婦皆有法内外秩然静山沒後二十年素服終其身正統九年八月二十六日卒年七十八子男五讀書循理克承其家女一孫男二十二人女十一人以缺年缺月缺日祔于静山墓右於是諸子謀曰吾父母皆有令徳宜表墓以昭來世庶幾永垂不朽乃遣澄來北京以鄉先生黎逹所述行状授直属為文直嘗聞司訓公家寜都而嘆不得訪其後前四十年直濫官翰林而靜山實來京始得拜而問焉傷其再傳而遂已然猶幸有姑在且静山篤誼君子也庶幾墳墓有所託今皆不幸已矣豈特劉氏失其所以為望者而直之心亦安能不䀌然以悲而惘然自失邪為文表諸墓以彰其徳於無窮直安得辭作歸仁阡表使刻焉故禮部主事龍君墓表龍氏居泰和甘溪為大家世有顯者至君曽祖以傳祖明逺父仁安皆不仕而皆以行誼稱於鄉君貴乃得贈父為承徳郎禮部祠祭主事母湯氏封安人君諱粲字叔粲端重穎敏喜讀書為鄉校弟子員夙夜不懈凡所著述務出新意朋輩皆推其能永樂甲午以詩經領鄉薦然篤於養親不果仕所居湫隘不足容衆以父命作室先廬後日奉親娱樂其中二親沒喪𦵏皆盡禮而與諸弟友愛尤篤貲産隨所欲得皆讓之無吝意鄉族故舊有急賑之恐不至人有争辨不直者多求直於君㑹試不偶入太學甲寅有祠祭之命宣廟上賓奉行喪禮嚴慎無缺失人以為難今上初即位海外諸蕃國皆來朝事畢而歸擇廷臣知大體善撫馭者送之廣東宴餞而遣之君奉命以行宣布天子徳意人人感悅已未調儀制主事當朝廷清明稽古右文君敬恭将事衆以為善於其職禮部每㑹試天下士簾内外執事最切者必以命君壬戌試畢當出院君得風疾輿歸治療乆弗愈君嘆曰吾年已六十而病如此豈可以不去吾其歸哉即上章乞致事上許之既優㳺田里有以樂其心而無勞於其身疾稍間未嘗一出至縣城惟教子孫以讀書為善兄弟相與恭愛隆然既而二弟叔昭叔鉉相繼卒君哀傷不置疾復作以正統丁夘十一月初五日卒年六十四初娶蕭氏靖江長史用道之女封安人再娶曽氏翰林庶吉士與賢之女以子文貴封孺人皆有賢行子男二長熈次文皆蕭氏出君在祠祭時文已取進士為中書舍人日與君同朝時人榮之既滿舉為吏部驗封員外郎今熈亦舉明經得泰和縣學訓𨗳歸未至家而君卒矣女三嫁嚴晅楊𨗳者皆已卒其三適蕭恢餘未行孫男五曽孫男三文聞訃慟絶将歸治喪詣予告曰文兄弟二人而文早竊禄京師兄熈今亦忝教職當先人疾亟時皆不得奉湯藥既卒又不得視殯斂不孝之罪大矣惟其徳行之懿若不能表著於後世使永永不朽則其罪益大将無所容敢請文以表於墓上予與君婚姻家自遊鄉校時已竒君及官翰林貳禮部君之言行接於見聞無非予所愛者盖嘗以逺大期之其後予知貢舉君在試院實助予孰知由此而竟以病去嗚呼今則已矣其可復得哉然君有令子汲汲以顯揚為事此可見其徳之致故為序述而使鑱諸石百世之下欲知君之賢其尚考於斯先伯祖贑州府學教授王公墓表王氏之先居金陵晉太傅𨗳之後南唐吉州刺史崇文始留家于言其従孫宋禮部侍郎贄又徙居泰和世以宦學為名家至君髙祖虹溪先生字叔可曽祖芳洲先生字本初祖天隐先生字性夫皆不仕而皆以文學徳誼重於時考西山先生字民則元季為贑州路先賢書院山長遂家于贑州尤以博學多才顯名公其長子也諱在字子所天資粹美器宇宏深穎然出儕輩聖經賢傳諸史百氏之書靡不讀而皆能造其精微為雩都縣學教諭兵亂學廢國朝混一宇内首詔天下建學育才擇賢師儒為教官贑守鄒奕以公薦江西行省㑹諸郡邑所舉百餘人試之公為第一遣之京師吏部試在優等遂授贑州府學教授公端嚴以處已和易以接物其所為教因傳以求經由體以達用究物理之妙窮治教之源隂陽鬼神之奥禮樂制作之文博極古今議論精到學者有所據依以成其業贑之人才彬彬輩出既滿授登仕佐郎俾復任洪武甲子復開科取士公之弟子陸載許恒王本道嚴鶚皆以明經中其科明年取進士登朝籍人皆推公為善教而公老矣然猶誨人不倦士之貧者公常衣食之恩義兼盡他之為師弟子者莫及也贑大郡多才賢且交廣所由道凡仕於贑與士大夫過贑者必謁公聞公言無不意滿而去洪武庚午三月二十三日以疾卒年七十七娶周氏有賢徳子男一曰伯時女一嫁泰和彭原徳孫男一曰善學曽孫男五公卒後二年壬申𦵏贑城東望城嶺其山已丙其向戍乾嗚呼公之考直之曽祖同母弟也故直於公為従孫憶四五嵗時公奉表詣京師歸至泰和舉祀先之禮拜跽登薦極其誠敬謁天隐公墓下涕泗交頥感慕之情不能自己直雖幼已慕公之孝見内外屬子孫循循誘掖惟恐傷之教之以孝弟忠信禮義亷恥諄復之誨出於至誠復見公之慈親戚故舊老者敬以待之少者謙以撫之閭閻細人拜公者必問所業加慰勉焉人人感悅又見公之従容中禮後稍有知可以受教於左右而公不可作矣及官翰林従今少師楊先生遊先生常言公淳直無華言行一致尤恬於勢利樂與人為善凜然古君子之風昔贑郡庠有彭生者家甚貧公毎賙給之使學後為御史請歸蒐輯熊氏故士卒勢焰熏灼禍福予奪在其手一郡震動見公執禮甚謹思厚報公數請所欲為公知其必以此敗諫沮之謝不與徃來未幾果得竒禍又嘗發䇿以女媧鍊五色石補天事為問諸生不能對請於公公曰聖神之事固非後人所可知然以吾意推之天豈待補哉調和五行之氣彌綸天道之所不及使之確然有常而無間則人民育而品物蕃此易所謂裁成輔相之道也諸生何疑焉公之奥學卓識出於常情之所不及類如此直生也後竊嘗慨嘆不得聞先生長者之緒論是以寡昧闇劣無以紹前人而思公益深至是善學罷髙要丞歸田里遣子鍔來京師告直曰公之𦵏已五十餘年而墓前之石未有文此誠善學之責亦爾之責也爾其圖之嗚呼直豈能究知公之萬一哉姑取公門人興安令周永所述與直之所見聞而次第書之使歸而刻諸石母舅歐陽公墓表嗚呼是為直之母舅歐陽公之墓公生元至正丁酉七月初九日以今正統癸丑十二月廿三日卒年八十七直於是不勝其哀憶四五嵗時先妣淑人棄背未㡬先尚書公以事去當時直幾不能自立荷公之徳以克至於今思欲報公而未能如志今則已矣直之心何如其哀也直初従公時年十三公衣食而教之書常置諸左右隨事訓切之使必循禮蹈義以毋辱其先直服膺不忘後二年遂去公而歸然所以趨善背惡不陷於惡者猶公之教也公之徳施於直大矣然無以報萬一則直之慙負豈小邪歐陽氏世居泰和縣治東公之祖復之有隐徳世稱長者考日新先生為江都丞臨淄知縣其文學政事見直所為傳公諱淮字子白外大父卒時年十二従直先祖竹亭先生先考侍郎公學天資絶出時輩罕比學成去為人師時廬陵永和陳徳星為女擇賢壻得公而館之故遂家永和永和之人争禮為子師其脩於身以孝弟忠信為本而亦以此教人凡受公教者皆循循為善良其所為文清新典雅師韓栁李杜諸大家尤工書得晉人楷法隐然名動一時四方士大夫過永和者必求教于公公俊爽不羣有治才而不樂仕進泰州學嘗聘為訓𨗳不就平生交游甚多惟少師楊公士竒侍讀梁公用之最莫逆數欲薦公公力辭曰吾施教於鄉教行即道行也奚必為政哉永和鳯岡精舍中祀聖人像毎朔望公與諸儒必祇謁行禮畢進諸後輩相與講學焉至於老不衰殿堂有毁壊者脩飾之或侵廟堧地必請於官盡復焉乃已永和儒風乆而猶盛者公與諸儒之力也郡太守嵗行鄉飲必禮公為賓人皆望而敬之至是乃以疾終孺人陳氏孝敬順祥於直有母徳焉幸無恙二子儀俶皆為士女六人蕭原豫劉應魁徐榮昌于資介鍾士元蕭敏其壻也孫男三人性怡愉儀等以公卒之缺日奉葬於廬陵十一都南山之原自為誌以納諸墓而命直為文表諸墓上直既哭以受命哀傷之至言不能成章然不敢慢也昔秦康公送其舅氏晉文公至於渭陽而作詩序者謂康公之見舅氏盖如母之在焉直之心猶是也常恨相去之逺不得數見公毎一念之而思母之心益切盖不知涕泗之横流也今公已矣終不可一見矣欲報之徳亦無所自效矣則直之哀思有已耶盖抱痛以終其身而後已也用是表諸墓既以著公之徳亦以寫直之哀云耳楊處士墓表翰林編脩楊鼎既喪其父處士君𦵏于長安塔坡鄉之先塋六年矣今年來謁予告曰先人之葬少保江陵楊公銘其墓矣然未有文表諸墓上懼無以昭徳于乆逺敢請之先生予與鼎有斯文之契不得辭君諱森字徳甡其先華隂人後乃徙居長安乆之又占籍咸寜居郡城之永昌坊曽祖孝古祖伯安父惟敬皆不仕而皆以徳誼重鄉邑惟敬娶李氏實生君剛直簡静不苟合於人事父母盡孝道博觀諸書而獨邃於隂陽術數以生年月日時所值支干推衍之决休咎有竒驗然與人言必依於孝弟忠信大要欲人趍善以求福不肯徇俗好所居襍植花卉以自娯富貴利逹不一動其意休閒無事婆娑獨遊或髙視逺覽從容嘯歌翛然有塵外之趣嘗曰吾祖宗積徳累仁子孫當有興者乃遣鼎為學官弟子所以教𨗳者無不至正統已未擢進士第二遂入官翰林士大夫皆稱君之善教鼎之善學也是年十月初七日君以疾卒于家年六十六君初娶魏氏早卒無子繼室劉氏生二子長即鼎次鼒女二人嫁王楠呉英古之君子不必皆貴且顯也要亦有所自立今君雖不仕而善足以稱於世昔淮南有處士征君以孝弟恭讓聞鄉里教其子取進士甲科荆國王文公以為一鄉之善士作文以表其墓至今數百年人猶知有征君者以荆公之文在也若君之美固不讓征君而鼎之賢所以顯揚光大者盖未可量予文豈足以為君重哉姑為表其墓以俟姚氏二親墓表桐廬姚君惟善以永樂丁酉四月廿五日卒于家年四十四殯于里之文化山下宣徳巳酉二月廿五日禮𦵏其鄉寨鷄山之陽正統丙寅六月六日其配孺人申屠氏卒于北京其子吏科給事中䕫之官舍年六十七䕫兄弟奉柩歸卜以缺年缺月缺日合葬惟善君之墓而自為状來請曰惟吾二親實有令徳以保艾後人而先考乃早棄諸孤先妣劬躬盡節以教以育兹幸得禄可奉朝夕矣而弗克終養此䕫兄弟所以摧慟而不能已也今奉柩合葬庶少慰死者於地下惟其徳善恐乆遂沈冺願先生表於墓道俾永永不朽為幸大矣予嘉其孝故不辭君諱善惟善其字也曽祖定祖鼎父伯華皆有隠徳君姿貌豐偉襟度夷曠雖不拘小節而行不違道事父母以孝聞養生送死皆中禮節處兄弟極友愛伯兄嘗被役於官君請以身代雖勞不怨弟為太學生則厚資給之使學及令洛陽君逺嫌未嘗一徃視好仁急義出於天性鄉人楊甲父喪不能舉為治棺衾𦵏之外女孫柴氏親沒無所依長育之使有歸其他賑貧乏䘏患難施惠尤多與人言必依於忠信人有不平質於君則以理誨諭無不悅服皆稱為長者卒之日不間疏戚愚良哭之皆哀孺人亦桐廬故家父文齋以行誼稱而與其母缺氏皆早卒大父母以屬冢婦俾善視之察其賢且才喜曰使此為男子當大吾門而惜其女也然不宜與凡子年十五為擇壻遂以歸君事舅姑孝敬婉順能得其懽心祖母楊氏性嚴難事然獨喜孺人毎舉以勵諸女婦事君能相其志閨門之内肅如也君卒孺人纔三十六以貞靜自守而儉約持其家君初在殯未克葬毎一念之輒哀慟欲絶逮𦵏乃已嵗時奉祭祀處内外屬待鄉隣賓客皆適其宜訓諸子各務所業以不辱前人䕫最幼親教之書遣入邑庠受學脫簮珥以為禮夜則秉燭以課勵之見其與賢者逰則喜不然則咈然怒曰汝父積善以遺汝盖兾汝大有立而汝甘為不肖子邪䕫於是自勉以底于成及官近侍迎養來京師而猶子龍為刑部主事二子暮歸侍左右詢其職業隨事訓戒之皆合於理道在朝士大夫聞之莫不譽歎其賢孺人寡居三十載氷清而玉剛其善行逹識又如此不賢其能是乎五子女一孫男十三女四古之大賢君子卓然有立於世者皆本於父母之賢然使俱存則其成易矣不幸而失所怙為之母者盖有慈無威然亦能成其賢者雖母之善教實考之徳有以庇賴之也宋廬陵歐陽公是所謂大賢君子也表然為望於天下實由乎母之教而君子必歸於其考之仁今觀惟善君與孺人所以積於躬而兾望其子者不異於歐陽氏然彼之能乆而不冺以瀧岡之表在也予言何足以擬之然䕫方盛年而進用未極其勉於徳以顯揚乎親者當益大安知他日無若歐陽公者以為不朽之託哉姑論次之使刻諸墓上故鬱林州同知張君墓表張氏之先洛陽人五季之亂始徙家泰和宋熈寜中有兄弟二人同舉進士曰汝賢為江淮發運使曰汝明為湖南觀察使皆有盛名而家益大有譜牒至君之曽祖君瑞祖文良父子禮皆不仕文良長身玉立言行不妄鄉稱善人子禮則謹於事親而勤以植家自少與翰林侍讀梁先生友善及君則又與先生之子侯官令叔䝉嘗同學有麗澤之益諱鐸字振文自邑庠生充貢入太學友天下之賢而學益進謙恭自持謹於禮度歴事兵部禮部俱以謹慎得名歳丙辰有鬱林之命鬱林甌越地自昔稱僻陋之鄉其人知力田務本而秀民亦頗好讀書然風俗未盡淳君一以寛簡為治而民安之乃興學校申教條暇則躬詣明倫堂集諸生講論豐其供給蠲其徭役以課勵之由是諸生皆勉學以圖仕進民有兄弟争訟者君諭以大義使退而自思徃徃不終而罷州南有廢地弗治君教旁近民使墾耕而食之曰吾不與汝稅也人知君意在利民凡廢地皆墾耕郡中幾無遺利於諸壇壝所以事神保民者皆治祭以時由是水旱疾疫禱之輒應而民受其福田州人争地相讎殺乆不决藩省大臣知君可任乃委君及諸司所遣官屬徃平之宣布天子恩徳與不忍加兵之意按圖誌考故實俾各循其舊一毫饋賂不得行於是皆悅服而罷壬戌述職朝京師奏課在優等歸至郡得疾惟第三子志在側醫藥弗效志禱于神請以身代亦弗應疾革謂志曰爾幸領鄉薦宜益勉於學以顯親揚名毋怠言訖而逝壬戌八月十五日也距其生洪武丙寅十一月五日年五十七初娶羅氏先卒繼室曠氏子男四女四孫男八人志奉柩歸兄弟卜𦵏於龍洲之南園以羅氏祔癸亥十二月廿二日也葬已九年志自太學選為南京刑部主事當之官來求文表墓上予與君同里嘗同逰鄉校而君少予七嵗見其端重樂易毎以逺大期之及述職來朝上其課心益為喜謂其福禄榮名盖未艾孰知去不乆而君已矣志之才器又有過人者今發軔仕途而即登郎署官六品天将以君之所餘者申錫之使於揚名顯親而大發焉以成其志則君之徳善足有徴於後世矣故表諸其墓銘忠孝堂銘國家之興必有豪傑卓越之才達乎忠孝之大節者以翼昌運纉世功然後能享髙爵重禄以傳于子孫而延之乆逺若太師英國張公其人也公之尊府河間忠武王昔事太宗皇帝于潜邱掌䕶衛兵其姿度雄爽知畧超邁而武勇絶人最為上所親任及靖難兵起上毎授以成算戰勝攻取無難者諸将皆敬讓之時公亦提兵従王王嘗語公曰吾受上恩思輔成大業以報殊遇爾當戮力一心庶幾如吾志古人以事君不忠涖官不敬戰陳無勇為非孝爾能盡忠乃所以為孝也公頓首受教奨率所部摧鋒陷陣所向有功未㡬王薨太宗皇帝素竒公召而慰勉之俾以其兵自効曰爾毋忘爾父之志公感上之徳與先王之教益自奮勵卒成大勲凡上有所命南征北伐無不盡其心竒畧偉績載之信史功名富貴無出其右者迨事四聖小心寅畏前後四十年如一日公既受顯爵位師臣王亦膺隆命配享太廟此忠孝之報也暨脩先朝實録公再為監脩今上皇帝緝熈聖學公實知經筵事敬恭朝夕従容進退凛乎儒者氣象嘗謂直曰先王以忠孝為訓吾既奉以周旋不敢失墜雖幸而有立然今老矣惟列聖之大徳不敢忘於心而亦敢忘先王之舊訓乎因揭以名堂将終勉之且使吾子孫登斯堂者亦思所以繼吾志日夜勉焉盡心於其職庶無負於國而亦不辱其先子宜為我銘直聞之忠孝臣子之大節天理之當然也誠能盡其道則必享福禄之榮而子孫保之昔者召穆公能嗣其祖康公之業有功於周宣王錫之圭瓉秬鬯以祀其先祖又錫之山川土田以傳其子孫詩人歌之至今誦焉公嗣先王勲烈著於國家顯榮褒大實有累朝之錫命誠無讓於穆公而尤惓惓以忠孝自勉且以勉其後之人國家有億萬年之慶張氏之福亦豈有窮哉乃為之銘曰天生斯民賦厥衷為子必孝為臣忠惟師英公徳兼崇卓立宛有前賢風桓桓先王才且雄捧日直上扶桑東奄然馭氣超鴻濛祇率遺訓纉武功披雲巻霧開晦䝉九霄奮躍攀飛龍宣威蠻貊靡不通明明列聖眷遇隆仁漸義洽恩豐彤紀勲旂常銘鼎鐘王亦顯祀升閟宫周家召虎庶其同孜孜夙夜懐謙冲揭以銘堂圖始終朂爾後嗣躡令蹤事君奉先益敬恭國家萬年福無窮古樸子銘雲南右參政浦城陳君遜字必恭始自進士擢陜西道監察御史以績最陞今官其言行皆法乎古於世俗紛華巧偽之習皆不渉於心人皆稱其古樸必恭亦因以自號其鄉友陳先生士希為予道之予嘉其志而欲其乆而不渝也乃為之銘曰維古之人循其自然不斵不雕而淳徳以全維後之士趨於巧偽愈肆愈偷而流俗以弊繄古樸子若此之懲維先民是程維大猷是經既不詭隨亦不矯激其言其行維質維直柏臺崇崇薇垣于于政罔不成民罔不孚嗟哉若人可以勵俗敬慎不渝以終爾穀著存堂銘著存堂者少保户部尚書兼武英殿大學士永嘉黄公祀先之堂也初公之尊府少保公嘗闢所居東偏之堂以祀四代祖禰而以著存名之祭酒胡先生為之記然局於地勢祠堂之制未備其心盖慊然弗寜至是公購得鄰壤乃大作祠堂奉安神主而祀焉前後四十年父子相繼始克如其志盖可謂難也己夫君子之於其親必有追逺之道焉親也者身之所従出辟水木之本源也於此而不致其情則亦惡乎致哉是故親之葬也則必反其神既祭以安之矣然而日以逺矣逺則忘之而孝子慈孫之心則未嘗忘也時至則思思之則必有以将其誠而祭祀之禮行焉是所謂追逺之道也然古之祭者自諸侯大夫士皆有廟庶人無廟則祭於寢禮也後世以來廟非賜不得立而獲受賜無幾人故仕者雖有爵以榮其身而無廟以祀其親君子惜之新安子朱氏乃損益就中而定祠堂之制自庶人以上皆得祀其四代之祖禰其制雖異於前而禮則隆於舊厚倫美化之意於戯盛矣然非篤孝之君子則亦莫之能為也公之為此既本於朱子至其奉祭又一用朱子之書内齊其心外備其物盡其敬而敬焉盡其愛而愛焉故肅然如有見僾然如有聞聲音容色心志嗜欲不少須臾忘之恍惚神明之在其上此著存之義而詩所謂思成者也公之篤孝如此盖民之表也其俗之歸厚可知矣公既以胡先生所為記刻諸左壁而以書來命直曰子宜為我銘之直之從公舊矣誼不可辭也乃為之銘曰名家肇慶古陸終祠堂翼翼居南東前作後繼偉兩公成此締搆蔚穹崇美哉四室儼在中列祀祖考甚嚴恭秋霜春雨心為㤝籩豆簠簋㓗且饛牲既肥腯酒㫖豐孝孫祼獻肅儀容精誠昭徹相流通神靈來享陟降同懽忻醉飽靡怨恫散為和氣為祥風儲休委祉紛疊重宜爾後嗣乆愈隆我作銘詩垂無窮鐘銘鐘之作官府以謹朝夕浮屠老子之宫以嚴祠祀而近世富室多置焉何居予既作祠堂以祀祖考諸子取嚴奉之意亦請置鐘予則兼取謹朝夕之義欲以警昏惰故弗拒因推祖考示教子孫之心而為銘曰有鐘在縣聲聞于天祠事則甚䖍然惟徳是先進脩之功夙夜當惓惓若沈酣於麯蘖之毒恣肆於袵席之安雖殷殷闐闐而聴之藐然迷天理之途溺人欲之淵昏惰而弗悛既不可謂孝亦豈曰能賢則神将厭之而何福之有焉嗟爾子孫警惕弗愆勉而有成百世之傳嚴氏鐘銘嚴氏於泰和為大家其先自金陵來後有篤行君子曰𤣥晏甫又徙居金臺山中二子誠仲文仲皆能世其家乃作堂祀先而鑄鐘庭下以供祀事予與有世好故為銘之銘曰嚴氏之先來自金陵世有令徳肆乆彌興金臺之遷實𤣥晏甫孝友忠信不忝其祖二子克賢享祀益䖍乃作祠庭鑄鐘在縣苾芬以薦朝夕具敬厥聲喤喤祖考是聽祖考來格無有怨恫右我孝孫福禄來同福禄來同孝孫有子永言保之聿配其始鐘肇孔延震越山川相以銘詩百世之傳静學齋銘予友夏君仲昭早有志學問以自立於世雖居市㕓之中而益敏於學用漢諸葛武侯之語名其齋曰静學取聖賢書讀之求其脩已治人之道而服膺焉學成登進士第致通顯揚歴中外三十餘年以行其所學士大夫皆重之今進為太常少卿用其敬慎以交神明而其名益顯皆静學之效也然好學不忘故學士沈先生嘗為書静學齋三字由是揭于齋壁而日勉焉少師蕭先生為作記而予與為銘銘曰惟古之人學以為已學之有要曰静而已理原於天而賦於人惟静則専乃積諸身漢之武侯静以成學知止有定企彼先覺不邇於邪不汨於私酬酢徃來大小其宜越至于今千有餘載功業不忘徳音猶在猗與仲昭心焉靡憍人之搖搖已則囂囂濓溪有訓無欲故静豈但能賢亦可作聖始而寡欲馴至於無持敬不渝聖賢之徒抑菴文集巻八
