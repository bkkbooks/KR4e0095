body:
  text: 抑菴文後集卷三十四明王直撰傳林參政家傳林參政諱瑜字子潤漳之龍巖人自幼聰敏好學缺缺為邑庠生學成升太學洪武中選授五軍斷事司稽缺治獄號為平六年升右斷事益以明慎得名公卿間數月擢拜江西按察司僉事嘗行部至贑贑之大豪有索逋而殺人者反誣其姪有司受賂煆成之上其獄於公公察其色有寃曰是非為惡者安有殺伯母事乎為廉得其實卒坐大豪而罪有司由是所至稱神明不敢欺安福姦民數十聚為盜剽掠勢張甚郡縣不能得詔發兵捕之任事者並緣為姦利不急捕盜反以藏匿誣平民轉相牽引搒掠以取資於是盜逸而民弊矣未幾皆以罪去而公獨任其事乃一切禁止苛暴處以閒和任鄉民之有力者蹤跡之盜悉得而民不擾既三考以最升江西按察副使長沙流民作亂轉掠入袁州朝廷命豐城侯督兵討捕擇大臣為民所信慕者得公使先往招撫脅從者順服首惡就擒民以無事公之功為多王師之出絶漠也命下江西造戎衣一百萬期三月輸邉弗完者以乏軍興論公實董之如期而集又從工部尚書宋禮入巴蜀求宫殿大材公分往馬湖路極險惡衆皆難之公曰我豈擇便避事者邪卒皆辦治亦不後期蓋公持已以誠待人以恕故民歡趍之不勞而功立如此公初入蜀也江西有二十人者以魘魅就獄於法當死而無其情衆疑不能决公歸力辨出之二十人者拜呼曰我固知公能活我今果然為副使九年當考績去山谷耆民三百餘人出拜馬前曰公在江西二十年惠我民也厚矣今决去可奈何因抱公足而泣公亦為下淚至京師考最升浙江布政司參政時布政以下皆缺而浙地大人衆素號繁劇公勤而撫之民多恱服既一年吏舍失火治事之堂案牘之舍皆燬焉事聞下刑部逮問公至輒引服曰此瑜責也夫何辭獄未上而公病以永樂二十一年朔旦卒年六十八公端厚樂易寬裕儉勤嘗舉汪信民菜根之言以教子使必明善誠身而不急於文藝其子平皆能服公之教云泰和王直曰豫始逰鄉校時公為江西僉事所至廉問風俗恤孤老振寃滯興廉律貪沮惡佑善數進諸生講聖賢之道使充其德行而發於文章其言切實正大人至今頌之不衰於乎居是任者有不當如是邪然而乃有以苛察相髙以猛鷙相尚蔑忠敬之實無豈弟之心者抑又何邪然則若公之賢詎可使無傳哉故論著之吳先生傳吳先生勤字孟勤永新人也曽祖原道祖文振皆不仕考師尹元名進士為永豐縣丞先生幼聰敏好學日誦數千言逮成童四書五經皆暗記為文必根於理而氣充才贍偉然出儕輩諸老先生皆謂一第可俯拾以永豐君老不果出元季盜起先生以策干吉安守臣尼雅斯迪音冀弭盜不見用去避亂於洪僞漢圍洪行省平章多通不能守或欲薦先生先生曰吾觀此人無固志安能用吾言亟止之明旦多通果遁城遂陷先生間道歸永新國朝兵取吉安總帥搜用賢才俾綏輯諸邑淮南郭子章在幕府得先生歡甚俾之官泰和不就洪武初詔天下皆立學徴名儒為之師先生得武昌教授以聖人之道誨諸生中書參政方鼐國子祭酒吳唘皆其門人也久之去官楚昭王聘為子師先生益以道自任王敬禮加焉永樂初召修髙廟實録號良史才書成改開封教授以教武昌者教開封周定王亦敬禮之未幾卒年六十六先生之學無不究雖方外之教亦能通其義然持身端重從容矩度之中孝於親友於兄弟撫教孤姪如子謹於義利無一毫茍得之意初罷武昌教授時諸生致贐皆不受曰但勉修德業於勤有光足矣及在楚府蜀湘二王嘗致書幣願一見廣西鄉試請典文衡先生以王待已厚不欲更外交皆謝郤之湖廣參政吳雲故與先生相好雲卒於官二子貧不能歸先生維持教誨俾有立平生喜揚人之善而掩人之過至於論事則公其是非不肯俯仰以徇俗君子謂先生不特文學可敬也初號匡山樵者晚更號由翁其文章渾厚典則有集若干卷藏於家子一人善存論曰孔子嘗言君子喻於義小人喻於利蓋君子義以為質其行已及物曷嘗不以義哉小人之隳行敗名鮮不由於利然觀昔之任事者往往以利為急而於職之所宜則闕然此其故何歟先生謹於義利如此謂之古君子非邪今之任治教者皆擇謹於義利之君子而用之使皆得如先生其效之白於天下當何如盛哉故論著之使人有所興起云陳參政傳公陳氏諱雷字士啓一字震之其先自金陵徙居泰和世以科第顯曽祖文瑞瑞金訓導祖存道安逺訓導父煥章公自幼喜學十嵗攻文章十七為里孰師升堂講授屹然如巨人鄉之號為儒者多不及諸老先生皆器重之曰士啓他日逺到未可量也稍壯父坐誣謫遼左從者道亡公聞之即馳往省焉為營産業治經費備物致養父樂之忘其為謫也久之奉命歸養母益閉户讀書或勸之仕公曰孔子云不患無位患所以立吾方圖所以立者未暇用公意也永樂初詔設科取士公曰可矣遂以易經中髙第選入翰林為庶吉士與修永樂大典以精博得名書成擢為祠祭郎中敬恭祀事於緇黃少所假貸君子是之未三年升山東參政公喜曰天子用我矣宣化惠民吾職也故民有所不便及有所欲者皆奏言之事多見從及營北京公率山東役夫撫之如子民皆樂為之盡力及陶甓衛河亦然于時今刑部侍郎樊公董其事最為嚴急少許與獨愛敬公朝廷遣御史給事中理山東軍籍要公與偕行多所辨别民免於誣枉青州飢詔遣使者如所奏賑之而有司言續有飢者數加倍使者使必再請公曰此皆國家赤子飢死在旦夕能待再請耶吾以身任其事使者不得已從之全活甚衆民知公之厚也皆愛戴如父母蓋公仁恕出於天性而潔廉自持故所立如此宣德六年八月四日以疾終於位年六十六子一人曰祚初豫與公同領鄉薦上春官凡八人公最長衆皆兄事之數叩以難事公立為剖决曲盡其道及觀指揮羣下難易緩急無不適其宜當是時固知公之善為政矣及自山東考績來京豫謂之曰聞山東之人無貴賤愚良皆德公其善之可書者多矣公蹴然曰吾備員參政奉行天子德意而已何善之敢言且吾日夕勉之恐不及安事紀載為他日名乎豫於是愧其言古之君子貴務實而恥為名蓋虛譽之隆實德之病也後之君子實則未善而急於取譽承以嚚子憸孫又好托拾以自誣此流俗之通患也若公之所存豈不誠君子哉豫知公舊矣不欲其無傳也乃記所聞者數事著以為傳善觀人者觀此亦可以得之矣林母盧安人家傳安人盧氏文昌人元稅務都監仁夀之女自幼貞警靜淑習嫻女工年二十歸林氏是為文昌縣令德隆之配林氏故莆田人其先世宦遊愛文昌山水之勝遂居之世為奉化奕屯田千户貴盛矣安人歸林氏其舅姑尚無恙安人於衣服飲食必親調視而奉祭祀供賔客接族姻皆適其宜舅姑嘗稱之六親曰新婦如此足昌吾家德隆尹鄉邑有遺愛及人人無非間之者安人之助也當元季世陳子湖倡亂海南迫逐元帥陳乾富德隆以義兵赴之屯萬安軍而賊囚其家屬安人謀於姑曰賊勢如此蓋利吾家也盍輸財以緩禍乎從之乃得免林氏資産素饒其鄧氏姑竊取銅鼓莊田五頃契劵鬻之德隆父子訟於官乃得贖費鈔三千餘錠其後族屬欲脅而有之德隆弗與安人曰與之不然禍自此始且分田以厚宗族於義大矣卒與之而宗族以和德隆有庶子通安人撫之如已子人莫識其異母也其他賙給鄰里惠恤臧獲尤多蓋其細故也安人貌修長兩耳垂肩其律身端恪勤慎宗族化之今年過九十有子四人長曰廣為廬陵教諭次曰寬次曰密舉進士為刑部主事先卒又次曰寰孫男女三十人曽孫男女九人嵗時伏臘奉觴上夀怡怡然皆中禮節鄉人榮之而安人教諸子孫必曰修身謹行蓋善教也泰和王直曰豫先公治瓊州時嘗識廣于士林中知其母之賢也亦嘗於直道之自古國家所以廢興皆由女德之隆汙若盧氏之仁智如此其可多得哉其可多得哉葉秀實傳葉氏崑山士族而秀實尤樂善急義雖泊然布素於義所當為與惡之當去毅然自任而不回蓋有古豪傑之遺風元之末世方國珍亂海上小人乘時相挺而起善良被禍崑山福巖寺僧有提㸃與其徒昌都寺等亦聚無賴殺人肆焚劫略財物子女敢拒者驅而錮之舟中焚于嚴沙溝以威脅其人有司不知所為賊勢漸張禍及秀實秀實姻家金某刺知之賂以重資乃得免秀實憤曰鼠輩敢爾今吾雖幸免忍視鄉人罹其毒不剪除之又一國珍也隂募勇敢士得徐辛一等若干人經略已定乃以賊焚劫之跡繪為圖上之路率衆掩捕盡得之無脫者官為窮詰皆伏辜而有提㸃實先瘐死秀實聞之曰佛法重闍維戲作舉火文以著其惡鄉里稱快至今多能誦之者焚劫圖有副藏於家秀實孫茂以授孫春曰爾髙祖備衆善此其一也而鄉里實賴之不可以無傳春使其子兵科給事中盛請於豫豫觀自古禍亂之興必由小人竊發於下世無豪傑掃除之遂浸成亂階秀實之功偉矣豈非豪傑之士哉當其舉事時志在除惡激於義而已傳不傳非所計也而春父子汲汲以圖不朽記曰先祖有善而弗知不明也知而弗傳不仁也春父子可謂明而仁也已故論著之彭母傳彭母者泰和彭詡母也母劉氏諱靈萬安東溪處士本直之女嫁為月池彭原復之妻生二男三女詡其長也年草六而寡居母幼涉書記能知古者女婦賢行誓死不嫁勤女事以自給當是時宗族有困辱其孤欲撓屈其節而利其所有者母自守益堅終不以是改行教詡力攻儒術隨事訓切之不少懈嘗指其父所藏書告曰此爾素業也能讀書為善吾志樂矣詡亦自感勵學遂有成東溪處士既老病無子母慨然謂詡曰吾父惟吾一女今兒幸有婦主饋祀吾歸養矣遂歸東溪養處士衣食藥物必親自調治凡七八年處士卒終喪乃歸平居端靜淑慎不妄言笑其處姻族恤鄰里馭臧獲各盡其道年六十八而終鄉人之為女為婦為母者皆以彭母為法云史官王直曰豫聞前元時東平李如忠為山隂令其妻䝉古氏早死繼室馮氏有二子仕伏如忠卒于官李氏及䝉古之族相率至山隂困辱馮氏取其資以去馮不與校以節義自守廬如忠墓下二十年教二子讀書為善卒奉如忠骨歸其鄉葬焉二子亦卒為名士李氏及䝉古之族皆愧之至不敢見馮氏年七十餘而後卒當是時吳文正公虞文靖公及諸名賢皆紀載其事至於今馮氏猶生也而李氏及䝉古之族亦播其惡於逺嗚呼可鑒矣今彭母之困於宗族不幸頗相類而其苦節孝行則過之其善如此豈非詩人之所謂女士者歟豫文雖不及二公然不可使無傳也故論著於篇使傳焉王處士小傳王處士名守訓泰和南富里人也王氏自廬陵再遷泰和世積忠厚至處士直諒謹畏不妄言動居家善事其父母而友于兄弟洪武初核民田仇人以不實誣其父官盡沒入之家素富而驟貧然所以事親奉祭待賔客不失其故者以處士為之子也兄守益早卒處士善承其家幹父之蠱雖劬力殫財未嘗望諸弟嵗時伏臘備物以養親兄弟奉觴上夀必謹儀度其進退蓋怡怡然父母沒葬祭無違禮其析資産與諸弟多寡必均未嘗私一錢諸弟妹未婚嫁者備禮婚嫁之人人得其所與朋友交久而不怠平居簡靜如不能言者及臨是非曲直之際其辨論堅確如黑白東西不可眩惑故鄉人有不得其平者多取質焉子弟有過失輒毅然衆辱之必愧悟請改乃已教其子經舉進士得太康縣學教諭處士嘗就養之太康其與諸生言者必據於理諸生多化服焉豫居泰和城中去南富不二十里然未嘗相往還而豫友浙江僉憲郭公緒處士姻家也嘗再於郭君所見之蓋恂恂然可謂一鄉之善士者矣夫人之所以為貴者以其循天理之正盡人倫之常也然而有不踐此者何哉欲勝而已矣故親老而不致其養親沒而不謹其終侮其弱兄欺其稚弟凌虐其幼孤者比比也是失其所以可貴者矣失其所以可貴者則惡得謂之人哉而乃騁其私智鼓其邪佞以自蓋其行而矜肆於一時其可乎故豫以謂為人者惟無愧於天理人倫斯善矣豈須為詭異邪若處士者蓋不失其可貴而君子之所尚者也故論著之使鄉人子弟有則焉胡母段氏傳段氏番昜人世居碩輔里其父則榮甫也自少柔惠淑慎善女工事父母盡孝敬父母愛之既長嫁同邑胡以寧移其所以事父母者事舅姑舅姑又愛之姑先卒哀念不置有遺女生甫七月教育如其所生女及笄出資裝嫁之如姑未亡也舅為兩淮鹽運使與以寧相繼沒有後姑多病以寧二子秉彞秉恆皆幼家政母獨任之仰事俯育奉祭祀待姻族皆中禮法後姑安焉而二子皆受教有成立寡居凡幾年終始一意未嘗少有玷缺今年已七十七矣豫聞婦人主內事凡閨門之內所以事上撫下與凡所當為者皆婦道之常至於夫死不嫁而安於節義亦其常分所當盡此所謂民彞也天地之道亦貴於有常然則非常之事蓋可謂不幸矣牝雞之鳴有狐之歎此婦人之非常也君子奚取哉而世之妄子孫務托竒以動俗嗚呼亦謬矣秉恆之母盡其常道如此可以垂訓於後世為婦人者能此亦足矣奚以異為哉奚以異為哉贊曰昔者君子之論有家也未嘗不致意於女德焉蓋女德者家之所由興替也然女德之修豈有他道哉幽閒貞靜孝敬勤儉而已此其常也觀於關雎葛覃鵲巢采蘩諸詩可見矣及鄘之柏舟則因其不幸而節義著焉此其變者也聖人皆取而列之經所以為法於萬世然則後之女婦有能處變而不失其常者固君子之所取也作胡母段氏傳周公明傳先生周氏諱啓字公明吳周瑜子都鄉侯允之裔其先自廬陵之烏東徙今吉水之泥田世以宦學顯聞而先生之祖學顔父孟泰皆不仕然皆以學行重鄉里先生聰悟絶人經史百家靡不通為文章必據於理下筆千數百言可立待皆偉麗不凡前輩大竒之天性至孝事父母盡其道有疾必躬侍湯藥衣不解帶食不甘味及卒葬祭無違禮先生幼時母多病祖母龍撫育之先生事之甚篤龍卒躬負土成墳修祀先塋惇序宗族皆不失舊規叔父仲芳久仕於外先生為訓其子慧榮皆使之有室其教子弟與鄉人之子弟必以孝弟忠信於義之所當為者為之恐不及自廬陵縣學訓導典教黃岡長洲三邑之士䝉指授者皆成名嘗考福建浙江廣東湖廣鄉試最為得士當時號良有司以永樂癸卯十二月四日卒於長洲之官舍年六十六初娶曽氏生子曰道再娶藍氏生子曰迪今為翰林修撰次曰選曰達曰進孫男七人長曰源為武陵教諭次曰沂浙湘澄洪漢先生邃於春秋所著有春秋望洋策學舉要及詩文若干卷藏於家太宗皇帝時纂修永樂大典徴天下名儒先生前後居館閣者凡六年其所撰述少有能及者嘗有詔試大一統賦獨先生最優當時皆謂先生宜在侍近備顧問而竟止於教官豈天固以先生師後進邪抑豈其命也邪泰和王直曰周先生在館閣時常得從之遊其持已正大而接物和易人無賢愚少長待之皆歡然有恩然至為非義則誚讓不少貸性嗜酒雖多不亂茍非其人不處也世之為士能和以接物者多俯仰隨俗而失之通其正以持已者又矯亢絶俗而失之隘先生可謂豫而介隨而不失其正之君子矣又况立其大者邪故論著之使傳焉劉子潨傳子潨劉氏名㑹吉水人也自少嚴重不凡鋭於為學從胡時中受業講性命道德之奧最喜為詩清逺有思致其事親敬長皆循循有禮法先墓在南山子潨增修祠宇謹於祀事嵗時未嘗廢父天性早卒子潨哀念不置每一語及輒涕淚滂然洪武中從弟子淇以縣丞奉命使山東得疾子潨往視醫不能起遂歸其喪葬焉撫諸姪底于成立而後已篤意教子遣鐔從胡敬方受春秋業成領鄉薦及㑹試得教官且戒勵尤篤嘗曰賢才為治之本教官為成賢才之本可不慎乎其襟度夷曠超然不纍於物足跡未嘗至官府翰林學士解公胡公侍講鄒公家居時皆相與為莫逆惟喜交遊樂賔客晚與黃叔昭諸公遊每偕造南山祠下樂花木泉石之勝觴詠終日誦淵明詩悠然見南山恍忽若神交焉衆因以悠然為其號至老鬚髮郁然無一莖白者此非有所自得而能然哉四子長曰鐔次鏞銓鐄皆能承其家年六十九而卒泰和王直曰劉氏之先仕南唐其居吉水巽湖者蓋自金陵徙也子潨曽祖明翁為郡教授祖信卿與歐陽師尹通家相往來父天性號東山靜隱東閣大學士吳澄為之記至子潨益自立其所交又一時名儒皆有著述豈非所謂文獻足徴者歟孔子曰魯無君子者斯焉取斯然則子潨之所以能賢於人者有以哉廖節婦傳節婦廖氏泰和人松溪教諭廖季習先生之子嫁為刑部主事楊君相之妻淑慎勤儉間於女事閨門之內肅如也主事君篤志學問日夜不懈永樂甲申㑹試禮部第一遂取進士詔選入翰林為庶吉士學古為文辭而其志彌厲及為主事雖勤於職務而猶不廢書節婦綜理家政一不以煩君故君得如其志遂以文章名天下未幾卒於官節婦年才草二扶櫬歸葬每號慟輒欲絶鄰里不忍聞子奕奐皆在襁褓節婦保抱擕持未嘗去左右曰此吾夫所遺未亡人所恃以終者也主事君初妻曽氏有女撫育之如所生謹於禮法不妄言笑足跡未嘗出外庭事舅姑極孝敬舅姑有疾即籲天以禱乞延其夀以長孤幼舅姑沒居喪皆盡禮待諸妯娌亦仁而有恩二子一女既長皆教之學業而使有室家曰吾可以見吾夫矣縣之人士皆嘉其行相與言於縣大夫而以聞于朝詔旌表其門景泰元年節婦年六十三守節踰四十年貞潔之操至老不渝易曰婦人貞吉從一而終蓋庶幾矣二子求豫言以傳信後世豫於主事君友也常念其不幸早卒而嘉節婦之能賢故論著之亦以為世勸也劉憲副傳公名祿字子敏泰和劉岡里人也父夀叔早卒母蕭氏治家有法以嚴訓諸子公善承其意前監察御史王公罷官歸為縣學師見而愛之舉為弟子員業成入太學選為山東道監察御史時朝廷清明慎於刑獄任事者一不當即受其辜公斷獄百數無毫髮違理者由是知名山東道兼治遼東人有告遼之戍卒蕭茂德䦨入官府治文書前之犯此者皆死公獨察其誣曰茂德所治文書當有據不然人可妄殺乎力為辨之茂德得不死三十三年以言事忤權貴黜為福州侯官令侯官久不治官吏無廨舍案牘版籍無所考公奏言之前之權貴滋不恱公所為又降為侯官典史公笑曰是豈不可為治乎令尹子文三黜不愠於我何有哉於是實户口核賦稅鈎考簿書發摘欺隱豪民猾胥不敢搖手公堂吏舍以次繕完然後申教條布忠信事有便不便者皆次第罷行凡上之所施下之所訟皆聽於公無不恱服縣以大治永樂初徴拜河南道監察御史尋升山東按察副使上賜之錦衣綺帛楮幣乘傳之官蓋特恩也公嘗曰山東之民素淳朴宜待之以誠當自無訟沂州民以竊盜當殺者九人公曰以竊盜殺人出一時非定令盍緩之既而遇恩皆免死以內艱歸葬祭盡禮服除改湖廣副使鄉民有戴計元者客湖廣時禁以銀為市犯者皆死計元被誣不能辨自引服公至訴之公為逮其舍主與嘗共為市者辨之乃以銀為酒器非市也訟者疑而誣焉卒得白以舊官復職調廣東其辨姦雪枉剗弊興利一如前既而考滿以疾告歸所居有溪山之勝田園池沼之娛而忠君愛國之心惓惓不忘也其處兄弟以和交朋友以信訓子弟以忠孝常積榖以濟貧乏不能償者不責也其有不平者皆求直於公得一言無不意滿而去其德誼之信於人如此娶蕭氏子公平公正公濟論曰豫官京師二十年見子敏之故人多矣皆能道其昔時事如此偉然可尚也閩之人士言其侯官之績尤卓卓及其去皆歌詠之於戲何其澤之入人者深也士君子讀書學道固將有為也官秩之崇卑何暇計哉觀於子敏可知矣故論著於篇南園翁傳南園翁蕭氏字仲齡世家泰和縣城西翁兄弟少從陳心吾蕭尚仁先生學欲有以自見於世其兄伯齡為金華教授以薦起為寧波同知卒弟季齡繼之翁獨養父母盡孝撫二室之孤如已子凡祭祀賔客公私百為翁皆任之由是無四方志延明師以教諸子訓厲之不少懈鄉閭之貧窘者多仰給於翁事有不平亦於翁講决焉子進取進士厯知兩縣有能名翁喜曰吾子能為縣吾可以自樂矣有田在雲亭鄉南園皆上腴作屋臨溪滸課童奴勤稼穡一鄉之人賴之嵗時豐成各持所有獻庭下翁亦烹肥擊鮮以勞農歌呼笑謔醉飽而後罷蓋囂囂然樂也往年豫以憂家居過雲亭鄉因訪翁南園而翁適入城不及見為名所居曰南園别墅而歸明日遇諸市翁大詫曰吾南園之樂惜君不得與也鄉之人士遂稱為南園翁而歌詠之其後豫起復來京師聞翁在鄉邑間益以齒德而為縣大夫所尊每鄉飲即以賔位處之豫益歎翁之清髙閒放其福不可及也去之二十年翁年七十四而卒又十餘年豫在吏部而翁之孫彞為考功主事以學士陳公所作翁墓表來見求為之傳豫既衰病將歸老于武山之陽思得如翁者數人相與婆娑嬉逰從容酣適於社神田祖之間以極太平之樂而不可得也故托其事以為之傳云夏友諒傳友諒夏氏蘇之崑山人大父貴一父公逹皆讀書有隱德友諒生而岐嶷七嵗即喜學言論如老成人馬鞍山寺僧某戒行為吳人所敬見友諒愛之摩其頂曰他日為吾弟子友諒咈然曰異端之學我不為拂其手去之嘗隨父至郡城從者擕鏹市器物友諒曰置器不如置書父異其言從之既歸即遣入崑山縣學受書於陳潜夫潜夫深喜得之剖析奧義穎悟絶人時年十二下筆為文章頃刻立就夏夜置燈帳中讀書不輟大父念其過勤起視之促使就睡見几間有絶詩曰更殘燭短可微吟周孔遺書似海深感慨聖賢無復見只存糟粕在吾心明日語潜夫潜夫歎曰此子天分甚髙蓋將咀其英華以自足豈但味糟粕而已益以逺大期之而友諒志益篤然未底於成以卒卒時才十又九君子皆痛惜焉娶鄭氏遺腹子一人善長母守節教育之既長刻苦自礪能以其學為人師生四子佑輔顯遂而卒年缺佑以文學舉為臨海丞遷禮部鑄印大使遂舉進士為禮部主事兄弟過豫道其父祖事而悲欲託豫以不朽天之生人既賦以過人之才若將使之有為也然不底於成以卒此其意何哉豈非誠有命焉也豫觀漢賈生年十八以能誦詩屬書受知於吳公及薦之文帝召為博士年才二十耳雖卒以齟齬窮亦不可謂不遇也友諒負竒才自幼已知絶異端崇正學讀書晝夜不厭觀其所作詩殆有志於上逹者邪然前不遇吳公後不遇文帝而賫志以卒卒而有子幸矣亦不遇而早世其命如此若之何不悲然賈生之後嘉在武帝時任太守至九卿豈天以其欲命生者命之邪語云用不極者有後福生之謂乎友諒雖早死而不遇今二孫仕於朝駸駸通顯矣殆將與賈氏等邪豫為傳載其事友諒聞之其亦可以無憾哉字說張博克溫字說㑹稽張友讓名其仲子曰博博之師金某字之曰克溫博從父來京師而請其說於豫豫謂男子之生父名之既冠賔字之為之辭以致其祝頌戒勉之意宜也豫非賔也何可僣一辭哉而博之請益勤乃試為之說豫聞友讓名其三子取三才之義焉博者地之質也溫者其發生之氣也地之體誠博矣然非氣之溫亦何以能生物哉自冬至一陽來復藴於地中未發也積之之久則其氣溫然逹矣於是土膏發泉脉動而物莫不生焉故地之能生物者以其氣之溫也聖賢之道具於書欲其博而又貴於溫讀書誠博矣非時而溫之抑何以能求道哉自聖經賢傳以至諸史百家之言呻吟讀誦有未洽則溫之溫之熟其學充然進矣於是明體以達用而道無不盡故讀書所以能盡道者以其學之能溫也使溫習之功不息於博學之餘如元氣之溫無間於廣生之際則豈有不成也哉博而字之曰克溫其亦顧諟而思勉也乎夫寡者博之反也寒者溫之對也博學而篤志溫故而知新是所望於子也寡聞而淺窺一暴而十寒非所望於子矣勉哉博也毋負父師所以命名與字之意也邵志和宗禮字說嘉定邵志和宗禮始為監察御史以憂去服除改贑州推官其在贑也與豫兄善學相交故來京師亦厚豫間告豫曰吾幼而先人以志和名之既冠而師以宗禮字焉惟吾父師所命不敢忘願先生釋其義庶終身誦之豫謂人性之禮即天道之亨具於心而見於君臣父子夫婦長幼朋友之間動靜云為之際皆有自然之節秩然之分不可以毫髮僣差其體至嚴也夫既嚴矣而加以操切刻厲則將至於離而難合故其用貴於和和者從容不迫之意蓋於至嚴之中而以舒徐行之使粲然有儀歡然有恩則禮斯盡矣然知貴於和不復節之以禮而或過焉則將流蕩忘返而禮終不可行矣名子曰志和者欲子以和為貴也字子曰宗禮者欲子以禮為之主而不過於和也名字之意蓋如此夫世之善其名字者皆是也而能充其名字之實者未必皆是也宗禮佩父師之訓不敢忘是將充其名字之實視彼假借以稱道者有間矣君子之自修無已時不以老而倦也衛武公年過九十猶勤於自修宗禮幸未老也孟子曰君子所以異於人者以仁存心以禮存心而朱子謂禮者仁之著也宗禮其尚謹於禮致嚴於三千三百之間修於身施於人推之家國天下從容以行之而不過其則焉則無愧於父師之所命而庶乎古之君子矣梁相叔修字說豫壻梁相初名橫字叔修修之為言長也蓋以梁木必橫著柱端以負棟承檁而堂構乃成然非長材不能勝其任故以是命之也及入邑庠為弟子員其師以橫字與豪橫之橫同乃改名相仍以叔修字之既而相以內艱家居思大父母父母之墓未有銘以昭其德慮自陷於不孝乃來北京請銘於諸公將歸以字說請於豫曰願有教也豫謂橫者梁之任而修者其材欲子思其任之重而自勉以成其長才此爾父意也師以橫字為嫌而易曰相非以棟梁之任辟國家輔相之職也與相而仍字叔修蓋修又以飭治為義輔相之道必治身以為本也且相非但輔國家凡居副二之位以佐助其長皆是已先自治而後治人其道一也道莫大於堯舜而孟子謂堯舜之道孝弟而已孝弟者仁之始澤民育物皆自此而推也叔修惓惓於親可謂能孝矣由是而敬其身使言行皆君子則足以成其親兄弟者親之一體而分也推孝親之心以敬愛兄弟則道立而身修他日推之以及於民物而無所不宜輔相之道得矣豫願子以孝弟為務也世之人孰不本於親然能篤念不忘而思著其德於永逺又推以厚於兄弟而不忍侵害之者甚少也棄之如芻狗不知其善之可傳侵害之如冦讎不自知其惡之可恥此禽獸異類之所為何益於家國也哉其能存也幸矣勉哉叔修必敏於自治以求稱夫命名與字之意無曰輔相之任非小子所敢望也守性說毗陵胡克寧今大宗伯芝軒公之弟也以守性自號公俾豫致一言夫性者人所受於天之理也其目有五曰仁義禮知信施於人倫事理而各有當行之道斯理也與心俱生心存則理存是故父子君臣夫婦長幼朋友而各盡其道之常至於應事接物作止語默好惡取舍應對周旋之間亦無不當於理者此聖人之盡其性也若衆人之生局於氣禀蔽於物欲由是性不能全嵗改月化則氣日昏欲日盛而所謂性蕩然無復存者於是遺親後君瀆夫婦紊尊卑失信於朋友言非其所當言為非其所當為好惡謬而舉措乖凡其所存所由者皆出於私欲不復計理之如何然求夫害性之源莫切於貨色莫甚於酒尤莫急於氣性之所以漸瀆淪溺而蕩然無復存者未有不由於此夫既蕩然無復存者矣則亦何所不至哉惟好學君子知欲之不可縱性之不可失加存養之功致執守之力於夫人倫之大日用事物之細必欲踐其道之當然而不肯少悖焉者此所以為賢也克寧有公為之兄其才可以有為而循循雅飭謹於自修言行之發惟懼弗當於理惴惴焉不敢少自放蓋知欲不可縱性不可失以古之君子為法而以衆人之顛倒迷謬者為戒雖其生質之美而公之教於家者可知矣昔者子思作中庸首言性以見道之本言道之不可離必戒謹於所不覩恐懼於所不聞宋之大儒則以敬為學之要戒謹恐懼是即所謂敬也持敬之功無間則人欲消不離於道不失其性而何愧於古君子哉豫嘉克寧之志而欲勉其進作守性說貽之且求教於公以為何如也說旅卦示穆豫子穆來侍既一年而其兄䆅秬皆當來北京獨稹留治家事因命穆歸為稹助方治任適有感於豫中而歎旅行之難也乃本易卦作旅說以戒之旅之為卦內艮止而外離明止則安於義禮之正明則察於事物之微安於正而不為內欲所遷察於物而不為外物所陷是以能亨且吉也旅之道貴柔而忌剛然初六以柔而居下卑汚猥瑣而災咎及之此柔過之弊也九三居艮之上上九處離之上皆過剛而自髙羈旅而過剛自髙則誰能與之故至焚灼而喪敗此剛過之弊也九四用柔而能下六五柔順而得中皆善矣然處不當位故四雖得資斧而不快於心五雖有譽命而不免亡失皆未盡其善盡旅之善者其惟六二乎六二柔順而中正柔順則不失於剛强而人無不從中正則不徇於偏私而事無不當故能安其居保其財童僕亦貞信以事之此旅最吉者也穆其可不知所務哉勿違乎天理而暗於事幾過柔取辱過剛取禍與處非其正皆不可柔順中正以避凶趨吉此豫所望於穆也然柔順而不中正則柔順將失之過而委靡不立亦不可也必全盡是道斯善矣穆也其尚留意於此哉夫出門庭去閭巷以達於鄉黨州閭皆為旅不必適千萬里之逺而後然也究而論之人之有生亦寄寓而已蓋無往而非旅則無往而不用是道能盡其道則無往而不獲吉奚可有逺近始終之異哉穆服膺豫言而終善且吉焉則豫之志得矣王稌希薦字說稌稻也用以飯者其性宜下濕雖處處有之而江南為最宜族叔伯昭翁名其長孫曰稌而稌之同輩命字皆以希為號希望也有冀幸之意焉鄉人因以希稌字之古之立名字者皆有義非茍焉而已孔門弟子冉耕字伯牛耕者牛之事也仲由字子路路人之所必由者也近世大儒考亭朱子名熹而字仲晦晦者不欲眩其明也許文正公名衡而字仲平衡所以取平也其義如此稌而字曰希稌何居去年希稌以事來北京不以其字為是請豫更焉豫讀豐年詩多黍多稌則為酒醴以蒸祖妣洽百禮而神降之福因字之曰希薦薦進也蓋稌之豐必以薦於親薦於神明然後能致福於其躬若徒積之使陳腐焉而享祀之禮廢則必有怨且恫者福惡乎來哉此豫所以命字之意也嗟夫希薦爾知所以薦之之道乎事親主於孝而事神貴於有德孔子曰孝弟之至通於神明則孝弟者享祀之本也勉於其道則禮洽而福至矣且孝者仁之實弟者義之實也希薦勤於學求其所當為者而日勉焉充而至於仁義不可勝用大人之事備矣豈特足以享祀而已哉豫王氏之先既盛矣今之子孫大不足以繼前人豫凛焉以衰微為懼因希薦之質美且有志於學庶乎其可望也故於其歸作字說以勉之文示秬子文豫來北京十五年仲子秬來侍亦三年今將歸自念已及六十而衰病相尋若七八十者其能久生與否不可必也有所欲言其尚可忍邪故為爾秬言之始豫四嵗已失恃年才八嵗則父以事去所倚賴者祖母耳當時非無內外親其教育我使不失詩書故業則舅氏歐陽先生之德豫不敢忘也今幸居官食祿然才薄能鮮無以報上恩恆懼福過災生貽辱父母且纍爾兄弟故謹守禮法不敢放肆爾兄弟亦當勉於為善庶相資以久凡人之所以異於禽獸者以其有人倫也君臣父子夫婦長幼朋友當各盡其道而每加厚焉然夫婦乃人倫之首其尤厚可知若事官府而恭謹處族姻而敬愛待鄉黨而和睦皆人道之宜爾能盡其道則無愧於為人而欲盡其道則當以讀書為本也兄弟者同氣至親如手如足華鄂之詩反覆乎天理人情之極爾輩蓋嘗誦之而世之人多以妻子之私財利之末失兄弟之義忘恭愛之心遂至相視如塗人爾兄弟當師古聖賢勿以流俗小人自待也豫少甚貧備嘗艱苦以今視昔所勝多矣恆産雖不可無然須得之以義毋虛價毋抑求毋妄取則人不怨吾亦可以長守而其所最急者在親君子逺小人蓋親君子則能進於善逺小人則不流於惡以勤儉治生以忠厚養德守祖宗墳墓食田園薄利勿怠惰以廢業勿酣酗以生禍文章書法以秦漢魏晉唐人為師學行有成能自立於士大夫之間鄉黨以善人目之斯足以無忝於前人豫若即死無憾矣爾歸與爾兄弟觀之而共勉焉而又以教爾子若以豫言為迂而棄之則爾兄弟之孝道虧矣其勉之哉慎之哉哀辭少保黃公哀辭正統五年正月少保户部尚書東萊黃公終於位年七十八事聞上惻然遣官賜祭命有司治葬事公始自卑官纍升至極品歷事五朝寵眷如一其德業顯於天下而又以髙夀終可以無憾矣而士大夫尤哀惜之不置蓋公端厚坦亮君子也忠於事上篤於愛民范文正所謂先憂後樂者公其人矣平生所為蓋無愧於天而為上為德為下為民之心至老猶不懈聖天子委之以南京其所託重矣然大臣如公者無幾人使得在侍近入則獻嘉猷於君出而宣聖澤於民以畢其所志豈不尤愈乎此士大夫所以哀公也衛武公之入相年九十五矣而進德不倦公之年尚足以有為乃遽止於斯於乎其不可哀也夫古之君子有益於國家者必欲其久生於世南山有臺之詩是已則於公之終雖欲弗哀可得邪直嘗忝同僚辱交好尤不能已於哀者作哀辭偉夫子之好修兮服仁義以自臧心怦怦其諒直兮行弗戾於周行遭聖明而奮興兮庸一言以悟主始低徊於下位兮遂卿佐其焉處勤朝夕以修職兮曰庶幾乎藎臣進專專以奉君兮退懇懇於惠民彼蠻蛋之凶悖兮曾何識乎上下遇夫子而愛敬兮若赤子於父母荷列聖之隆寵兮耿精誠其未衰獻忠謀之亹亹兮冀永世其賴之繄根本之攸託兮有嘉靖之丕績何天之不憗遺兮奄一去而不可得惟夫子之洵美兮顧在列其幾人嗟弼亮與宏化兮胡緬邈其未申昔衛武之佐周兮踰九十猶未怠兹黃髮之是詢兮悲夫子之不能待周詩之詠臺萊兮祝遐夀於無疆夫豈私於君子兮延邦國之休光慨音容之日逺兮徒興念於疇昔寫豫情於斯文兮涕浪浪而沾臆蕭先生哀辭蕭先生名用道字坦行以名著當世居泰和之栗園里蓋齊西昌侯叔誄之後世以儒名家先生父尚仁邃於經術為鄉邑之望先生得其傳尤剛毅自守不茍合篤於事親無用世之意親沒郡守朱仲智婺源令鄒以信皆以經明行修薦之徴拜靖江王府直史又改咨議未幾升長史以選入館閣校理髙廟實録既畢䝉厚賜從王之國先生以輔導為職每因言納忠欲王惇德謹度以保國裕後又上章言八事而惓惓於敬身勤學嚴祀事恤下人凡諸細務知無不言又因王府門作體仁遵義端禮廣智四針以獻王皆納焉久之得風疾手皆顫掉詣闕乞歸治吏部以擅去職為言左遷鷂兒嶺巡檢卒於官先生之學博而明其文雅而贍其心眀白正大動以古人為師故其所立如此視漢之江都相可以無愧矣泰和文獻之地也數十年前儒先君子凋謝已盡獨先生父子巋然為學者師死生契闊於是遂無所受業及先生以病告歸豫時濫官翰林私竊自喜以為先生雖不終輔相之業而鄉人子弟得有所依歸進學以為世用其幸亦大矣而終不遂則又有兩失之歎孰知先生之一往不復哉嗚呼可哀也已今三十年先生之子吏部主事烜以先生所自作墓志示豫豫不能已於言也作哀辭繄先生兮超等夷偉學行兮卓然竒懷仁義兮敦書詩鏘琳琅兮放厥辭篤事親兮愛敬施上山巔兮下水涯摘芳杜兮采華芝蹇徘徊兮憺遨嬉隨薦剡兮上京圻服王官兮慎自持校史册兮抉隱微闢彤邸兮廣之西曵長裾兮儼逶迤相古人兮以為期謹獻替兮納針規言之發兮罔不宜嗟何為兮疾以罹懇欲歸兮乃去之曀風埃兮氣慘悽悵獨往兮歸何時國之悼兮失倚毗鄉之歎兮無所師遣巫陽兮屑瓊爢號日月兮攀虹霓招不來兮我心悲嵗年逝兮不可羈功業在兮名不隳矢豫詞兮當永垂陳智仲哀辭嗟夫子兮邦之良其貌既偉兮其氣則昌仁義以為服兮忠信以為纕廉且厚兮直而剛才足有為兮志亦甚揚遭世弗淑兮閫命是將乘一障兮為寇防撫善柔兮戢暴强其職修舉兮厥績用彰馳吾車兮乃括其囊力稼穡以自足兮樂泉石以徜徉孝於父母兮友於弟兄睦姻族兮和一鄉燠寒以衣兮飯飢以糧貧女有歸兮窮死有藏周急恤匱兮行之常匪用沽名兮孰計其償奮餘力兮驅虎狼民利出入兮不病于行遭嵗大旱兮煽禍殃卒牲幣兮暴巫尫精誠獨格兮天鑒孔明沛澤下澍兮反災為祥嗟夫子兮德愈光不究於用兮命之弗臧楩楠之生兮為棟為梁中獨棄兮委山岡材之不遇兮庸何傷豈天之意兮豈人之望偉令子兮鏘琳琅遇明聖兮髙騰翔金為門兮玉為堂朝並升而夕歸兮穆欣欣而樂康食舊德兮襲餘芳夫子雖沒兮其存者長水洋洋兮山蒼蒼矢吾辭以寓哀兮耿千嵗而不亡余生哀辭余生鶴年字應臯南康星子人翰林侍講余君正安之子也侍講君與豫同取進士同官京師比屋而居且十年兩家相好不啻兄弟則豫之哀生可知也生自幼莊重不類常兒稍長喜讀書善承其父教又使從黃重美先生習舉子業學為唐人詩日有進益事祖母髙夫人與繼母陳宜人皆得其歡心宜人有子山年生愛之如同産飲食坐卧必偕人莫知其異母也及侍講君以髙夫人憂去生隨侍歸南康豫則扈從來北京及生隨父起復而豫亦以外艱去道路往來不相遇者五六年然聞生學益進行益修事父母益盡其道居京授徒能以師道自任人稱之豫心益為喜以為侍講君世積忠厚宜有子如此也及豫服闋來京師則知生哭弟山年悒悒成疾已死矣年才二十有七豫與侍講君相弔哭甚哀其後每語及未嘗不哽咽流涕也嗚呼以生之才而承纍世詩書之澤宜享有遐福而竟不永其年天之於生何如也豈所謂福善禍淫者非邪豫痛悼生之不幸又悲侍講君既老而孤故為辭以哀之亦因以慰夫存者耳詞曰吁嗟余生才之良兮簮纓華胄煒煌煌兮讀書問學攻文章兮佩服荃蕙襲芬芳兮孝于其親謹溫涼兮進退周旋婉而莊兮撫愛稚弟善為兄兮開門授徒師道光兮我昔比居綿十霜兮朝夕見聞喜氣揚兮謂子世澤沛汪洋兮致兹才賢宜永昌兮嗚呼奈何夀弗長兮孰司豫奪俾早喪兮福善禍淫天所降兮顛倒謬亂豈其常兮騏驥奮迅蹶康莊兮駑馬踉䠙乃軒昻兮鳯凰于飛于朝陽兮鎩羽霄漢梟則翔兮吁嗟余生心孔傷兮視天瞢瞢莫致詳兮髙堂有親老而康兮婉若婺孤膺福祥兮松柏鬱茂蘭芷芳兮彼蒼悠悠庶其償兮猗人之生順則臧兮孰為夀考孰夭傷兮顔回盜跖亦俱亡兮惟德惟善久彌彰兮吁嗟余生安其藏兮我心不忘淚浪浪兮湯君如川哀辭余友湯君如川以明正之學英敏之才與豫同登甲申進士第入翰林為庶吉士而遭聖天子興文隆治之日方將大其所學以文國家太平之休不幸以四十之年未及一大用以卒卒又不克以棺斂歸葬故鄉而竟燬于火焉嗚呼湯君其可哀也已語曰天道福善而禍淫湯君孝友忠信循循雅飭其立身行已蓋有善而無惡又承其先世積纍之餘以至於此天之於湯君宜何如報耶今既奪之年而又逢酷罰若此天道果可信乎哉或者天其偶未定邪是未可知也憶豫與湯君同領鄉薦上京師湯君每日引領南望以泣問之則曰始吾就試江西時吾親垂涕曰汝誠宜出身報國然盡節之日長我老矣汝未可遽去也今不幸而違其志使之忽忽不能自樂此吾之所以泣也嗟乎湯君之舉進士可以得祿以為榮不過相違期月之間而可以復見矣尚不忍相舍去如此孰知今遂死而不可復見也則夫湯君之孝慕其親與其親之慈愛於君者其心又當何如邪豈不大可哀也哉豫與君相知為最深方資君以為學今已矣豫既哀無以自輔又哀君之志不獲伸與其親之思弗能已也故為辭一通以紓豫哀以慰君之心而泄其父母之思云辭曰心懭恨而不懌兮慘鬱鬱而內傷哀夫人而不見兮魂冉冉而外揚數茂行之信修兮又申之以多才判獨妖而莫施兮孰有情而不悲思昔日之遭選兮揚厥美於學宫余既升而肩迫兮誠矩矱之所同範先聖之遺則兮率中道而不頗援道德以為美兮服仁義以為華衆歡欣其既就兮遂超舉而進之忽同登以容與兮聽鹿鳴之呦呦倏翺翔於春宫兮又乘風而捫天閽砉其開關兮望帝居而上遷跪陳辭而敷袵兮中和暢而能祇攄朝霞之炫耀兮攬星辰之陸離耿皇鑒之昭明兮曰學可進而不可止歷美質之尤粹兮履前哲之餘軌謂班馬之不羣兮紛馳騁之先路尚專專以追逐兮罔儃佪而窘步嗟豫生之怐愗兮亦先後以逍遙亶惟蓀之可恃兮獲棄穢而寡郵蓀既與豫之不偷兮曰呻吟以相羊謂年嵗之不可留兮而渥洽之不可忘彼力穡之不匱兮乃豐豐而有獲彼涉逺而自畫兮終蹇蹇而莫逹驟騏驥以沛徂兮䇿黃棘而疾施望前轍之超逺兮誓奔屬以為期執鞿羈而不替兮汨皇皇以追求刈芳菲於蘭皋兮掇芳馨於椒丘吸沆瀣之泠泠兮餐瓊靡之穰穰繚蕙纕之郁郁兮佩寶璐之琅琅信有美而莫癰兮雖居蔽而日蒸固大人之所好兮豈流俗之所晟願遙奔以極至兮掬芳華以逺聞昭先功而顯榮兮報大德之無垠曰皇天之降命兮章白黑而不昧善瀏瀏其綏祉兮惡昏昏而致殆何斯言之不諒兮荃信美以離災夏烟液以為丘兮又遇罰而增哀心煩寃以絓結兮氣沈菀而不信涕潢洋而日隕兮中侘傺而忳忳計維蓀之秉志兮豈維是而舍也羌中路而顛越兮何若是之遽也親嬋媛而既邁兮其何以為此度也相大猷之漠漠兮余何以為之輔也渺余憂之芒芒兮糾余情之悒悒思荃美之汋約兮雖欲見而可載天既降之以純美兮適奮勵乎嘉時溘厭按之泯泯兮又何善之可為惟善而昌被兮余莫察其何故惟惡而康娛兮違衆兆之所惡欲曽舉以叩天兮天髙髙而無階欲幽默以隱閔兮又􅍵􅍵而不能曩伯夷之廉潔兮反貿貿以流亡何陽虎之貪婪兮終衍溢而自强跖何服於姱節兮竟夀考以淫逰淵何偭於規矩兮中遘凶而折之蓋天之未定兮故緯繣而顛隮茍端操而弗疚兮雖欿傺其何尤嗟古人之既然兮遺芳澤而彌章荃其援以為類兮然何哀之可忘陳德興哀辭嗚呼豫於陳德興之亡而歎賢令之難得也夫德興之治其聲威非有烈烈動人也然而謂之難得者何也非特行政而已矣有教焉課其農桑時其租賦均其徭役審其獄訟政之施然也導之以詩書禮樂之習勉之以孝弟忠信之行以成其人才以厚其風俗教之道然也政以治其外教以治其內二者烏可偏廢哉然政有未備則得罪於有司猶之可也教之道不行則人將陷於邪僻而無以為善治之本教之不可以已如此也世之為令能舉其政者多矣其能興善教民行古之道者不多見焉蓋以是為迂緩而非有司之所急也至其甚者政且不能恤於教乎何有其又甚則疾禮法之士撓學校之政使不得教焉為令如此豈其職哉故吾於陳公之亡而歎以為難得也公之治德興首新學校與諸生講學乎其中又率其耆老以勸邑人之子弟使皆興為善其為政寬平仁恕約已愛人去其所害而興其所利不急淺效近名行之三年而人歌頌之非所謂豈弟君子者歟公卒已三十年猶稱道之不置豈但其政之良有以致之誠可以見善教之得民心也彼聲威烈烈以取譽於一時者吾不知其得乎人能如公否耶使公久於職而迄其教之成又推而極於逺大不亦美乎嗚呼公遂亡矣非其人之不幸乎初公居四明山中閉門講學不求仕進郡縣再三迫起之既出而所為如此則其學問之懿操履之篤可知矣豫是以知夫自重難合之士之必能有為也公之仲子敬宗以公墓志示豫豫慕公之賢而哀其不及髙夀以卒不得大施其所藴且又歎為令之能如公者少也故為詞以哀之公字孟藻寧波慈溪人以考績赴吏部最其課將復職而病卒卒時年五十一詞曰學宫之隳兮公則治之教之弗純兮公則勵之政之良兮俗以熙胡不眉夀兮弗究其施公不來兮民心悲廬山髙髙兮湖水瀰瀰嗚呼哀哉兮百世之思曽用楫哀辭用楫諱濟姓曽氏世為泰和北門人祖克仁有隱德鄉稱長者父子省謹厚好學以推擇為邑庠生不試而卒用楫姿貌魁碩而頴悟過人嘗受業於尚仁蕭先生先生學徒數十人獨稱用楫先生死用楫無所於歸則與其舅羅君仲深其友陳君孟京及豫共學於其旁空舍中四人者自相師用楫母在堂喜用楫能力於學使僮奴給茗飲燈燭之類晝夜不厭用楫通書經及羣書秦漢以下諸史皆暗記而能舉其事之詳下筆為文輒衮衮數百言方是時用楫年少氣鋭其意蓋欲幾於昔人而止也嘗從豫求司馬史記及昌黎韓子之文讀之曰吾有志於是矣其後豫三人相繼入縣庠用楫慨然歎曰吾聞司馬子長周逰半天下故其文有竒氣後世無及者吾安能止於此乎即告其親度庾嶺涉蒼梧下湞陽之瀧以至於南海上覽山川之竒訪古聖賢遺跡以自壯不幸遇病客死於廣州年二十六時洪武三十五年缺月缺日也豫三人聞之哀用楫賫志以沒相與哭之慟用楫事親孝奉諸父有禮撫二弟有恩於朋友也義而信與人言必依於道理又承其先世忠厚之澤而卒不獲底于成求其所以致此者而不可得則付之無可奈何曰命也後豫三人又相繼竊第入翰林每論舊故未嘗不哀用楫也既而二人又卒獨豫在焉則豫哀又甚矣去年豫以事還故鄉過其家用楫之母且老矣其子則既冠而有室矣計其舊逰則於今七閏矣而鄉閭之幼者壯壯者老其意氣之合蓋鮮有如吾用楫也則豫何能自己於哀耶用楫弟用礪與豫善悼其兄不置復告豫曰哀哉吾母之念吾兄也又因子有感矣子何以塞其哀乎故為之詞曰吁嗟用楫兮曷為而死耶生于令門兮其慶則遐質既美兮敏以和親戚是宜兮朋友是嘉稽經考史兮含英咀華志則甚逺兮夀胡不多渺芒芒兮南海涯去鄉遼邈兮嵗月云賖母夀而安兮子有室家魂其歸來兮靡適乎他魂不來兮涕滂沱嗚呼哀哉兮其將奈何裴侍郎哀辭公裴氏諱璉字汝器監利人初遊學郡庠年甚少已嶷然如巨人長者久之升太學擢知劍州三年升浙江按察僉事改江西坐纍謫興州太宗在位召為北京道監察御史升河南按察副使又以纍謫武清復被薦為廣東道御史仁宗在東宫雅知之擢春坊中允改大理評事又改刑部主事坐事降易州同知洪熙初圖任舊臣升工部侍郎改北京行部又坐事去知涪州子綸為翰林編修得推恩及其親公遂棄知州就封以翰林編修文林郎致仕宣德十年三月十三日以疾卒於家年七十二公天資俊爽負竒氣眉目明秀議論英發率嘗傾一座其才敏過人當義而行無顧忌初在劍州州産茶民衣食之而為有勢者所擾公奏請禁止至今民賴其利為僉事在江西鉏惡佑善所至吏畏而民愛之其於賢者維持成就如所親及為御史彈劾不避權勢河南皂軍山寇發公奉命往察之還上討捕方略寇遂平階州賊王金剛努等僣名號聚衆八千餘人勢悍甚又命公往公得其巢穴以計擒之而請釋其餘上初遣公謂還當大用而用事者嫉公絀其謀間疏之不召見而罷其為侍郎尤侃侃自信敬恭朝夕有大臣之體在劍易時興學養士至親為講說賞勤而勸惰諸生多賴以成流風餘澤今尚有存者蓋公之志敻然出儕輩故所至有立豫之知者如此豫所未知者訃亦偉特猶是也平生清約自持不茍取妄求仕四十餘年如一日雖纍遭譴謫皆非以私過得之故每斥輒復晚節優遊以榮名終享有盛福此好德之驗也豫為諸生時已獲瞻風采其後同朝又克深知公嗚呼今不復見矣則安能已於情哉作哀辭繄公之生兮秀所鍾儼玉立兮偉儀容才既美兮學則通氣浩然兮縮以充懷竒寶兮慶遭逢有民社兮奮厥庸興惠利兮蘇困窮建學校兮師文翁持憲紀兮揚清風矯一鶚兮橫太空植善柔兮除姦凶履巉巗兮窺崆巄殄寇難兮銷兵戎陪鶴駕兮熙事功搖玉珮兮鏘玲瓏副六卿兮位愈隆勤夙夜兮甚嚴恭涪之治兮安蠶農嬉白叟兮歌黃童詞林清秩兮恩所封煥敕命兮廽鸞龍優遊以老兮當時雍頌詩作兮聲渢渢奄一去兮白雲中混希夷兮超鴻濛望不及兮心冲冲惟疇昔兮抗髙蹤事聖主兮暨三宗柔清德兮將無同善其始兮慎其終宜夀考兮齊喬松胡不憗遺兮天夢夢彼􅀈狪兮愚且䝉乃悠久兮昌而丰欲往問兮安所從蹇徘徊兮發哀恫思公不見兮奈何乎公陳德遜哀辭德遜豫友也其家泰和縣東與豫家相距僅三里豫昔家居時數過德遜德遜有靜室置書其中日端坐展玩客來亦相與坐其中談論甚樂也於一切世利略不經意義所當得者人或見負亦不問有弟德遵自幼教育之及德遵顯於朝茍憑藉以逞足以遂志德遜意亦淡然出入閭巷中如平時人皆敬禮之德遵在位久不得顧其私為之經理産業治居第忘其身之老也德遵嘗病走六七千里至北京視之既愈然後歸其篤於友愛如此方歸時謂豫言有地在舊城上俯江山之勝當結茅為亭以待子共樂於此孰知歸不二年而德遜卒矣年才六十嗚呼惜哉豫嘗自念鄉邑故舊多凋謝而豫亦老且病矣一旦幸得賜歸可與燕遊者惟德遜今德遜又往則豫之歸將誰與處而樂邪為之低佪傷歎者纍日乃作辭以哀之太邱之𦙍兮西昌之良其行既馴兮其心則臧詩書以為恱兮孝友以為常善靜修兮方自强縣之東兮百貨場驟車馬兮隘康莊此恬淡兮彼劻勷子之樂兮孰可與方有弟顯兮名孔彰被天澤兮承寵光在他人兮藉以狂子獨安處兮聊消搖以相羊篤友愛兮老不忘於家汲汲兮於疾皇皇昔與子兮相頡頏久不見兮限兩鄉忽見子兮來北京意甚適兮德不爽子遽歸兮分鴈行云有地兮俯大江千山環合兮蛟龍翔將誅茅兮結為堂待我歸兮同一觴嗚呼子去兮何云亡有志不遂兮攪我腸天杳杳兮地茫茫炙雞絮酒兮空相望豫哀子兮成此章夀雖不永兮其存者長子之逝兮庸何傷錢處士誄辭松江處士錢公汝明以正統辛酉七月六日卒于家年七十豫與其子溥有斯文之契由是知公之善惜不得久生於世乃述其行作誄辭錢氏之先實居于杭武肅奮興八州自王既歸有宋世載宦譜偉兹將仕維公髙祖在元之初金玉其躬徙淞南梁遂以隱終曽祖繼之延于大父暨公之考三世不遇公始七嵗失怙而孤嶷如成人哀戚有餘恭愛其兄兄亦愛弟輸賦後期爭就逮繫篤義之志至老不渝晉覽魏津異世同符哭母而哀既封既樹悠悠孝心曷已其慕豐姿雅度勇於振施周匱恤窮不計其資才達識明遇事能斷抉幽發䝉霧卷氷渙守禮畏法不罹于辜待物之誠逺邇俱孚非橫侵加忍而不校乘人之危亦匪其好有子克賢翰飛刺天維忠與孝公訓實然公德之茂宜介眉夀淞城之東其樂靡究昊天則奚而不憗遺松摧柏萎君子之悲我昔聞公嗟未及見今其已矣觴豆莫薦述此誄辭用顯其光後百千年庶幾不亡抑菴文後集卷三十四
