body:
  text: 抑菴文後集卷八明王直撰序郊居八詠總序海虞陳原鍚居其邑東之沙溪距邑蓋百餘里喧囂塵雜所不至原鍚襟度明爽雅志不羣喜其地之幽勝治居室藝草木以備燕嬉而皆命以名堂曰心逺之堂以遐曠言也亭曰適趣之亭以心之所樂者言也耕雲亭者閲稼之所寓映雪齋者讀書之所處也植桃李之妍麗則曰藏春之園列桂菊之清貞則曰宜秋之徑竹坡而曰萬玉者貴其德梅塢而曰寒香者志其時為目凡八原鍚有甥俞景明别館於其居之南而志尚皆不異朝夕相與樂於其間凡侈靡紛華之習一不以動意吳中士大夫嘗與其樂者皆為賦詩合而名之曰郊居八詠因豫友大理寺正凌士昌求豫序其端嗟乎原鍚甥舅可謂善於取樂者矣夫名勝之地蓋無處無之茍非其人則亦不知其可樂而樂也然雖有其人而不遇天可樂之時征輸徭役迫乎外飢寒疾痛之交切乎中雖遇可樂安得而樂哉今聖明在上仁育萬方嵗豐時和兆民安業蓋太平極盛之時也故原鍚甥舅得以樂其樂而吟咏興焉豈獨人之幸而亦其地之幸也雖然景物之娛非惟處者得之仕者亦得焉豫嘗愛王維輞川諸作劉給事虢州二十一詠文與可洋州三十詠心切慕之然間曠之地不可得而有也故未之能遂今於原鍚之所樂者安得不概於豫心幸他日請老而歸當一過沙溪而覽勝焉亦足以樂也昔蘇子由作栖賢堂記東坡先生為書之曰以此與廬山結緣庶他日入山不為生客今豫於此序亦云送袁太尹致仕序士之仕也得百里之地而治之可以行其志矣然老至而病加焉雖欲勉於為治而力行有不能逮者若猶貪位不去君子恥之果去之則其志有所不遂此進退之所以難也惟能達於義命而不為身謀然後能決於去而無所繫吝蓋亦鮮矣豫邑袁仲愚真能決於去者其可謂達於義命者乎仲愚自太學生得富陽知縣其才足以施諸事而其志亦欲以惠民為政三年民安之而乃以憂去及服闋來京師吏部將復用之自謂年既六十五矣而聰明日衰凡諸政事有不能如志以治實恐負朝廷任使而孤一邑之望以其情白於吏部乞致仕吏部初不許而請益堅乃以聞於朝許之嗟夫仲愚其賢於人矣哉豫在京師久見凡仕於州縣者有老病癯然而猶不欲去或見黜於吏郡非獨君子恥之人莫不以為恥也仲愚之志如此不謂之賢於人其可乎昔陳希夷欲使錢若水學仙而麻衣道者謂其急流勇退人也其後若水仕於朝年四十餘即致仕然則急流勇退固神仙之流亞也仲愚其亦斯人之徒歟憶豫與仲愚嘗同學仲愚長一歲而豫之仕幸先得今忝竊四十年亦老且病矣然無所立於世顧國恩未報欲去不可視仲愚蓋有愧焉不知君子亦恥之否乎雖然禮人之大防也其何敢踰制仲愚歸哉相從於金華武姥之間當必有日矣贈宋少卿序天下之所以治者必得天下之賢才用之而後能修庶事廣衆功然人固未易知也非養之豫察之深何以能知其實哉故侍從之職乃人君賢才之儲也蓋其朝夕在左右凡措於身見於事言行之發進退周旋之際皆可以觀其德之如何彼誠有諸中形諸外上下之間曉然皆知其為賢一旦舉而用之人心素孚譽望素定而謂職不修功業不立理之必無者也今之給事中皆非常之選也必有當時之賢名然後得至焉其才良其行修見知於天子見重於公卿大夫則進於顯位誰得而禦哉兵科給事中宋君傑字廷英世之所謂賢者也受任七年未嘗有過舉亦未嘗有廢事其才行之美自天子至於公卿大夫皆知之人之期之也亦久矣會光祿少卿缺大臣舉之天子是而用焉其職之修功業之立將必有表然而不可掩者矣君子之仕也固欲有以見於世然古之賢者蓋有其道者矣而卒沉困於下僚低徊於散地不能少自見焉者何也時之不遇也廷英遇聖明之時踐樞機之地今陟佐九卿又進而列於大臣之位可冀也君子不務乎其外惟務乎其內德愈進而不已則名爵之加豈有已也哉韓奕之詩曰夙夜匪懈虔共爾位此其進為之方也兵科都給事中王君永和與諸同列之賢喜廷英之升屬豫贈以言豫知諸君之期望於廷英者逺且大故推原夫朝廷用賢之慎與夫君子逄時之難為言以贈之亦豫相期於逺大之意也送周憲副序周君錢塘人纍官至刑部郎中大臣薦其賢升山東按察副使以溢員還京師會江西憲副石君璞超拜山西右布政使遂以君代其任凡刑部舊與為同僚者周南巽輩多江西人喜江西之得君以豫亦江西産也屬豫贈以言豫官京師久矣頗為知君君靜重而有守明慎而能斷在刑部幾二十年未嘗有闕失凡所決獄人皆自謂不寃觀其所行信其所存由是以得君為喜也夫人有欲則爭爭而不能平則訟聽訟者所以平其不平而使之平也雖夏殷周之世豐鎬魯鄒之地其民不能無訟惟聽之有其道耳彼以訟咎民者蓋不能平人之不平而惡其求平於已也夫既有不平官不能為平之而反惡焉使積其不平小則鬬大則至相賊害非民之過為之長者使致是獨得無咎哉今州縣之吏若此者蓋多矣大要有三焉以姑息為寬仁以弛縱為安靜以貪黷成偏私豈惟貧而弱者之積不平哉官亦有受其弊者蓋德不足懷威不足畏亦何怪其然也州縣之吏如是故訟每萃於按察司以州縣之多而萃於一焉秪見其可惡也然豈民之得已哉豫聞州縣得良吏則民各安其分而獄訟不興按察司之職以進賢退不肖為先務若欲使無訟盍亦以得良吏為本乎進厥良而退其無良者使州縣誠得良吏焉是非豫奪一以公不以情則誰不服而亦何有不平訟惡乎來哉按察司亦將無訟益得以觀其人之善惡而進退之憲臣之體豈不嚴且重哉憶豫少時在閭巷見憲臣之臨吾邑者凛凛乎風裁之可畏而仰也姦豪之徒聞之鼠竄蝟縮歸貨求成以冀免者比比皆是及其至也亦取其尤無良者加罰焉於是善者有所恃而立惡者有所憚而改訟亦為之衰兹或不察訟之源而以好訟咎之謂之得其平亦難矣今江西憲臣皆賢而周君又賢故相與言之正其本清其源使江西以無訟聞天下此其時矣故書以為贈行序周君名安循理其字也贈吳郎中歸省序人之夀至歷年八十固難也夀而有子之賢能榮其身以及其親又難也蓋夀出於天非有德者不足以得之若其子之賢雖本於教然教之而能成其賢亦非人所可必皆天也夫既有夀而又有子其得於天者誠厚矣此豈可易致哉天既與之然奉順有未至不謂之違天不可也惟知得於天者之難而後能樂乎天非不賢者所能也新喻吳方大以明經取進士為刑部主事升郎中名聞於人久矣而其尊府在堂年八十尚康強無恙方大念去之遠弗得以致養也乃上章乞歸省天子嘉其孝許焉豫嘗聞方大之賢意謂必有所本乃今聞其尊府之夀而信其有以得於天矣方大不忘乎親將以受於君者為親榮蓋所謂樂天者也世固有有其父而無其子者有能得之而不知所以樂之者非天也人也今吳氏父子俱得之其誠賢於人矣哉然君子之所以為樂者亦必本諸天其言謹於理其行審於誼敬其所敬愛其所愛凡奉其身恱其心者必皆盡其道而親歡樂之此君子所務也若夫車馬之華被服之光意氣之赫奕侈然傲放於鄉里使鄉之耄稚奔走避匿有不可及之嘆而欲以榮其親乃庸人鄙夫之所快意而自得者謂之樂天蓋相去遠矣並其得於天者其誠能以久乎所務如此君子弗取也以方大之賢其能為君子之所樂者可知矣凡其同僚求豫言為贈豫猶為此言者蓋亦有慨焉爾也方大以為何如哉全椒陳氏宗譜序全椒陳氏宗譜貴州前衛千户陳侯銑之所修也陳氏之先居渭南蓋漢户牖侯平之裔宋理宗時有光者為城門郎生元吉水知州敏仲敏仲生全椒令源厚三世皆以進士入官源厚生興材始家全椒以武勇聞從太祖皇帝取天下多著勞績纍官至貴州前衛千户卒子彥圭繼之卒而侯又繼之常嘆故譜燬於兵而上世不可考乃自其可知者著為譜其不可知者則闕焉蓋自城門至於今才六世夫譜所以明其所自出使後人知本源之盛而思不辱焉故著其所可知而闕其不可知所以傳信也眉山蘇氏出於唐眉州刺史味道然皆失其世老泉為譜斷自其所知者而録之不敢加一辭懼不信也此作譜之法也陳侯為此譜本於蘇氏異乎人之牽合附會亂其所自出以取譏於君子者賢矣哉其用心也譜所著者六世而文武之才備它姓所罕及也要在子孫善繼而已矣陳侯為武將而好讀書明理恂恂然若儒生昔之謀帥者以禮樂詩書為重陳侯其志於此也乎陳侯果志於此後世子孫亦如之則陳氏之德為有繼而此譜之傳載益光逺而無窮矣敏仲卒於官葬吉水侯以其先墓所在也遇吉人為厚因及於豫求為序此譜故序之送陶學正歸省墓序洪熙之初今皇帝正位東宫妙東宫僚職輔𨗳不足則於教官焉取之於是義烏陶君永成以贑縣學訓導選為司經局正字永成風儀秀偉而言行必謹禮法衆皆以為宜於是官豫時為翰林侍讀學士亦備員右庶子旦暮與永成同出入殿廬皇上天性髙明緝熙聖學命諸宫臣日講經史永成進退周旋於其間秩秩乎可愛也未幾皇上嗣大寶位凡宫臣皆進一等永成去為北京國子監學正衆又謂永成非但優於文學其才蓋無不可為者是宜在侍近而使呻吟於占畢之間不亦左乎然永成乃以傳道授業為事無少概於其心庶乎所謂樂天知命之君子哉夫天下之治以賢才為本而才之所以成由於師師之所以教者聖人之道也朝夕相與講聖人之道使皆有以成其才而致治之本具焉比之矻矻於事為之細者其相去遠哉永成蓋知所自重矣今謁告歸義烏祀其先相知者皆有惜别之意焉豫謂此追逺之道也曾子曰慎終追逺民德歸厚矣永成之身學者之所視效也其殆以身為教哉然永成之為教猶不止此也今之謁告而去者往往溺於私忘其所事故不免於吏議然太學諸生為多永成今去而即來使凡學者皆知奉朝廷之法令而不危其身是亦所以為教也豫於永成素相厚故於其行序以送之永成以為然乎哉贈郭仲舉歸省序太學生郭翔仲舉豫泰和大岡里人也大岡之郭於南鄉為巨族其所與連婚姻為朋友者大抵皆衣冠之家也方豫遊鄉校時仲舉從豫後其尊府玉成翁資而教之甚至越五六年豫遂竊第官京師又二十五年仲舉乃充貢入太學時時至豫第道舊故相好也既一年仲舉以才選從監察御史巡按廣東用勤慎得名凡二年乃歸歸則念親之老而别之久也即謁告歸省焉將行偕太常博士楊皓希章過豫而告曰家君常辱愛於先公貺之文字雖老猶能識之不忘也今翔之去先生復賜一言翔持歸以為親夀不亦重有耀乎豫念初識翁時豫甚少見翁氣貌雄傑而言論英發固知翁非常人也今豫且老而翁幾八十矣鄉之耆夀如翁者甚少而又有子方嚮用於世則翁之福信非常人可及也矧於仲舉有同遊之雅乎於是為之言曰君子之教子也必務成其才而為子者亦務自勉以成父之志子之親所以教子者至矣其志豈止貢入太學而已哉蓋欲子立身行道以為已榮也身者親之枝孝者道之本也士莫大於敬身莫先於致孝能孝則一言一行恐辱其親而不敢違於理推之於朝廷為忠於兄弟為友於族姻為睦於鄉黨州閭為惠而無怨且惡者如是則能敬其身而有以榮其親祿養之厚封爵之崇由是而致矣子益勉之子之親見子之能是也則其心之樂可量邪持此以為親夀視世之務外而矜衒以駭俗者相去逺矣子以為何如仲舉喜且拜曰先生之教是也遂書以贈其行送趙縣丞歸南城序宣德五年春正月天下有司各以其職朝京師南城丞趙志亦在列既畢事將歸南城之仕者監察御史伍瑺等嘉志善於其職也命畫者繪為圖求諸公題詩其上以送之而請豫序憶豫初與南康余鼎正安盧翰邦臣同為翰林庶吉士且比屋而居相得也時朝廷方修永樂大典凡有文學者皆得薦舉志時在星子縣幕被薦入館閣與編摩能勤於其事正安邦臣極稱道因常往來其家遂復與豫相接謙和周慎藹然可愛也書成受賞賚升撫之宜黃令宜黃號繁劇最為難治志為治有名未幾坐纍謫戍涿鹿知之者皆惜之宣德改元之初求賢詔下右春坊大學士兼翰林侍講學士臨川王先生即上章薦之遂擢南城南城去宜黃甚邇縣人素知其能皆喜得之而南城之難治猶有甚於宜黃者然南城之政平信乎志之善於其職也夫丞以佐令而為之實難蓋一縣之政皆令主之令之喜於自用者率不用丞言然令果賢而事果當丞不言可也設有不然丞能不與其責邪欲有以釐正之必動之以誠而處之以公則庶乎有濟矣以今觀之南城之治雖豫不知其令而志之能相與有濟可知矣今蒙天子仁厚之澤事有未至皆寬以待其成志歸其益務自勉哉毋負於朝廷毋負於士大夫之知與縣人之所仰望則善矣遂書以為之序吉水泥田周氏族譜序古之所以安輯其民人者蓋有道矣既建國立君以統之而又為之宗君統於上宗統於下然後其民相親相比而不至於離析孝弟之行興雍睦之俗成矣後世宗法既廢雖公卿之貴亦皆無廟以祀其祖考而序其族姓子孫數傳之後浸以疏闊吉凶慶吊或不相往來甚者至相視如路人如是而欲興孝弟成雍睦豈不難哉昔之君子嘗慨念乎此以為正人心厚風俗莫善於立宗宗法既立則人知尊祖重本而朝廷之勢自尊由是觀之周詩所謂君之宗之者豈無意哉今宗法既難復矣士大夫家猶幸有譜牒可以正其本而聨其支雖宗族繁盛勢不得不分然至於久猶能知其所自出與其所當親則譜牒維持之力也故君子尚之吉水泥田周氏吳將周瑜子都鄉侯胤之裔其始居廬陵烏東自沂濵徙居泥田至今二十四世越六百年子孫最為蕃昌其間又自泥田徙之廬陵永新安福新淦新喻凡十八𣲖而居泥田者猶千餘人其能重所本而尊卑不相踰踈戚不相亂篤於恩誼隆於禮節者以譜牒存焉耳蓋始作者以孝弟之心啓之而繼者猶是心也何周氏之多賢哉豫始識武平教諭仲容長洲教諭公明台州府同知仲方今職方員外郎岐鳯繼又識大理少卿彥竒刑部主事南巽監察御史純熙而長洲之子時簡職方之子功敘今為翰林修撰與豫為同僚皆傑然可敬者然其仕者猶不止談詩書習禮義者尚多有之本固則末茂源深則流逺君子於此可以觀其世德矣泥田之譜每一二十年而一修永樂丁酉其族人宗坦等修之豫為序其後矣今時簡功敘再加輯録復以序屬豫豫深嘉其意且慨宗法之不可復而推言譜牒之不可無如此所以示其族人使知慎重而善繼之也曾子啓挽詩序烏呼豫於曾公之亡其心有不能已於哀者其故何也斯文之中如公者無幾而今已矣况復有鄉郡之好友朋之誼而欲已於哀可得邪初豫從公取進士入翰林凡上之所命與身之所處大要皆同其所不同者獨以憂去五六年之間耳及其後也公與臨川王君及豫三人者其官同其所任事同飲食起居無不同者凡十年常自謂三人之契合如此宜相與保其終孰知公乃先棄之則豫之哀其可已邪公之質端厚凝重其存心也仁其處友也周其待物也寬而惠其學於書無所不讀至其為文則思發如湧泉大篇短章各極其趣詩詞尤雄放清麗出入盛唐諸大家精於草書筆勢縱逸若秋隼奮揚天驥決驟不可追躡四方之人愛之若拱璧則今之有慕於公而不可得者其誰不悼嘆矧同氣之求受麗澤之益若豫者其何能不哀邪初公之訃聞天子為之惻然贈公禮部左侍郎令有司致祭歸其喪永豐為治墳葬焉可謂恩榮始終矣然士大夫惜公不久存而䀌傷於懷者不以是而衰於是皆為挽詩使執紼者歌以送公而寓其哀嗚呼於此亦可以觀公之德矣豫固不能已於哀者故書其所可哀以為挽詩序使觀者得詳焉贈太學生孔希經序希經孔氏曲阜之裔也其十世祖傳與兄子端友從宋髙宗南渡家於衢端友襲封衍聖公傳知撫州端友後四世至洙遂讓於曲阜而傳之子孫纍世皆貴顯希經之父克凖始由國子生為工部主事受知於仁宗擢太常丞太常既卒希經念先人之遭遇方竭力以圖報而不幸已矣乃請入國學受業庶幾以畢先志上許之閣門使郭文通等素從太常遊而嘉希經之意求豫文贈之夫贈者欲有所增益之謂也希經以孔子之後學孔子之道蓋所謂世其業者當勉勉以極於成而何待於他人之言哉然誘掖奬勸以成人之美固君子事也則贈言其可以已邪夫孔子之道堯舜禹湯文武周公之道也其原出於天而具於人心前之聖人既以行之矣至孔子不得行乃明道以教萬世使人窮其理之當然復其性之本然而已其言載於書者至今家傳人誦莫之敢違也而况其子孫乎且孔子之教子者希經宜聞之矣學詩學禮是也學而至於能言能立則事理通逹德性堅定可知矣然詩禮之要誠與敬而已誠與敬為學始終之事也始以誠敬之心求之終而至於至誠無息不動而敬然後為學之成希經所宜務也世之學者鮮能知此以其荒惑謬妄之心而馳騁於利欲之途由是去孔子之道逺矣希經不成而亦陷於是焉則人將指而議之曰如是而為孔子之孫也豈不可愧哉豫昔在南京與太常比屋居希經年尚幼豫心已竒之矣今卓勵如此固宜望其至於逺大也希經可以豫言為迂哉贈陳良醫序今年七月豫有疾不能朝其氣促其神昏身翕翕熱而頭則岑岑然痛也亟求陳先生林南視之曰疾勢雖劇然與脈相當無足慮者飲豫以藥凡六日而解然尚不能飲食形頗羸憊若沉綿二三月者凡好豫者見容色有異頗憂之先生則曰吾察脈皆無恙獨脾胃弱耳今當理脾胃脾胃勝則食進而容澤矣又飲藥半月而全安自始有疾先生必間日一來視與善藥至則笑談如平時豫感其意謝弗能報先生曰吾豈重利者公但飲藥毋論資公雖與資吾不受也蓋自有當受者君子之與處義而已奚以利哉豫於是愧其言及疾愈往謝則又曰吾尚為公制藥既食則投之使無宿滯則胃氣清而食美矣先生之厚於豫如此先生姑蘇人始與豫友周君崇述遊豫嘗問周君緩急誰可託者得先生因內交焉今六七年豈有毫末加益於先生哉而應豫求不厭也其存心之厚可知矣夫醫者仁術也上古聖人慮人有不遂其生故為是以濟其夭死昔之君子業是術者亦皆師聖人之心近世若是者蓋有矣其不然者加多焉誦其言而不師其心飾其名而不修其實凡有所治往往視利之多寡而髙下其施甚者騁其辨説以閉絶他人而巧為機變以釣利於其人生死不復顧此蓋所謂仁之賊也嗚呼聖人之仁術而使此輩焉賊之豈非不幸哉視陳先生其深可愧焉矣豫故序其説以贈之使人知陳先生之非茍然者也贈兵部員外郎陳君復職序昔先君子之守瓊州也豫兄行敏侍行往來番禺城中其為士者皆得與之遊有顧存信先生者隱於醫其尊府蔗境翁常為泰和知州先君子尚少特辱愛焉思翁之德而厚於先生先生亦以是相厚焉契誼之篤非常人所能及陳君亢宗先生之壻也賢而有文章與豫兄相好尤深豫知之久矣其後君被薦出為刑部主事時方營北京君往董役於蘇州凡數年以豫之相知而不得一見以申慕戀之情而致綢繆之意未嘗不嘆夫會合之難也及蘇州之役罷君亦秩滿謁選來北京乃始得定交焉聽其言觀其行不見其非豫愛也既而得兵部員外郎去之南京豫因自歎以為相慕於纍年始相歡於一旦即匆匆散去何其會之難而别之易也復自解曰君子之仕以行道也固當各修其職以自立於當時使陳君之道行其所立者足以不朽則豫輩有榮矣何必以朝夕相從為樂哉今年陳君之政成上其績於行在豫與相見於廷中其意氣藹然而皆老矣然豫方有公事不得從容相往來而君又以復職去别離之遽其何能不欿然邪雖然豫知君之不久於别也聖天子勵精圖治宵旰求賢以備卿佐藩憲之用君之才行今所謂傑然者也臺憲大臣蓋首薦之矣君去而即來受寵命之隆而進於大臣之列以圖其不朽者不逺矣區區離别何足計哉將行其鄉郡之仕者監察御史羅亨信等屬豫言為贈豫因道其相與之義相期之切如此以送之贈陳嗣初謝病歸姑蘇序昔仁宗皇帝在位時鋭意文學之事特置𢎞文閣擇天下之名能文章者處之朝夕備顧問典著述最為華近他人莫得至焉於時太常卿兼翰林學士江陵楊公實居首選其次則翰林侍講王進汝嘉五經博士陳繼嗣初編修楊敬行簡給事中何澄之五人者蓋天下之選也士之承下風而望餘光以為昌黎韓子廬陵歐陽子不過矣未幾仁宗皇帝賔天諸公亦罷其髙文大册所謂渾渾灝灝者未傳於天下君子蓋深惜之時方修兩朝實録楊公遂與總裁之任諸公皆執筆其間嗣初以目眚勉修其職而不能盡如其志書成有白金文綺襲衣之賜進秩為檢討君子亦以為宜然嗣初常語人曰吾受國厚恩當盡心以圖報而目日加劇不能復有所為吾其歸哉與田夫野叟擊壤鼓腹詠歌聖化不亦可乎今年遂上章請焉天子許之夫君子之仕所以行君臣之義當其無恙而奮力於有為以成尺寸之功義也及其老而病矣則乞身而歸以自逺於曠官之譏竊祿之嫌亦義也君子之進退一於義而已嗣初其好義之君子歟然豫聞之古之仕者既老而歸也則以其道教鄉人子弟蓋朝夕坐里門教之以孝弟忠信禮義亷恥故能成人才厚風俗今嗣初歸矣其亦務乎此則一鄉之風俗淳賢才盛是亦所以為報也重嗣初之還者皆為詩以送之而豫為之序贈孫太守詩序聖天子篤意養民留心理道思民之休戚繫郡守郡守賢則能得賢令以惠民乃詔大臣舉堪為守者皆褒諭而遣之於是吏部尤慎其選惟才行素備功業素著者乃奏用之不然不用也宣德七年九月己巳豐成孫君曰良奉命守重慶一時士大夫莫不以為宜孫君始以明經取進士為名御史既滿而升遂出守交州時交址𨽻職方未久也朝廷輟股肱大臣以寵綏之故孫君在簡畀之列交州藩憲治所又當用兵之際勞於供輸急於撫字君為之不難其才行蓋素備功業蓋素著矣宜乎今受是命也豫嘗竊嘆世之為守者有地千餘里其民蓋數千萬皆願得其所欲而去其所惡雖切望於令然非賢守去令之不賢而任夫賢者則民之願亦惡能遂哉其任之重如此而授之匪人其可乎彼行不素修則貪暴苛刻而亷厚惻怛之意微才不素具則委靡頺墮而勞來振德之務廢其為民病一也何功業之足論哉然則今之慎擇乎守者蓋堯舜之心也為守者皆思若堯舜之臣則天下之民皆堯舜之民矣重慶蜀之大郡也其民之夥事之繁衆皆以為難治然安於富庶習於禮義非交州比也君宜於彼有不宜於此乎慎其所守而審其所施察於縣令而皆得賢焉與民之所欲而去其所惡則重慶之民皆鼓舞而歡樂之其何難治之有豫知君優為之矣豫嘗見其尊府博士先生而又交於君君之弟曰恭又同在翰林父子兄弟皆賢皆豫之所重也則君之去豫何愛於言哉故於諸公贈行之詩而為序如此他日政成尚當有紀也贈陳教授謝官南歸詩序孟浩新淦人以明經登永樂戊戌進士第當得官自云有足疾願授教職以自效於是得長沙教授未幾以憂去服除改蘇州今年秩滿來京師吏部課其績當得升則又以足疾求歸田里不許懇請至再三乃許之言於上俾歸老焉將行士大夫皆作詩送之吏部主事王一寧持以求豫序嗟夫孟浩其可謂審於義者哉夫富貴者人之所欲也其資不足以得之斯亦已矣茍能得之則亦孰肯自退於卑散之地哉况進士見重於隋唐以至於今此富貴之所逼迫而不舍者也而為進士者尤往往厭卑散喜華要蓋欲奮發而有為以自快於當時州縣之職誠有所不慊至若呻吟占畢之間其為不屑可知矣孟浩既為進士於華要可得也顧乃以疾而安於學校此固異於常情今年六十五未老也而又因疾以求去其度越常情不益逺乎哉孔子曰君子之於天下也無適也無莫也義之與比仕而有適莫之心則必有違於義者君子惟無適莫也然後能度義而從之孟浩之仕與止亦何容心哉顧吾有疾宜於此而已然則孟浩非由義之君子與世之仕者蓋有疾甚於孟浩者矣然猶毅然自任而不回考其所立卒亦未見焉其出處去就未知果能合於義否乎由是觀之孟浩其真可可重哉故為序其詩以贈行禮部侍郎吾公叔縉挽詩序嗚呼豫於叔縉之卒蓋有不能已於哀者矣永樂甲申太宗皇帝復開科取士天下之士獲奉大對成進士者四百七十人皆以為非常之遇也而豫二十九人者又蒙選拔入中祕専學古為文章其恩寵之盛又非他之為進士者所及則非常之遇之中又所謂莫大之幸者也當是時叔縉年甚少德甚進其氣甚鋭其志甚髙而才誠足以有為且豁逹明爽不拘小節與人交洞然出肺腑無一毫隱情遇所欲言雖逆人不顧然未嘗有違於理者人亦識其意反愛重之士大夫於叔縉莫不屬心以為可當大用其後去為主事又入翰林預纂述又去為郎中文學政事赫然大有譽於時由是為侍郎為參政復入佐刑部改禮部人謂叔縉用無不宜者由其中無不有也太宗皇帝自喜其收教養之效而士君子亦謂可以無負矣初豫與叔縉同被選又同里而居同出入館閣情好莫逆也其後叔縉揚歷中外迹雖踈而心益相親每一相遇輒相與罄竭底藴適意杯酒之間豪吟縱謔以為歡其曠懷雅度髙談雄辨尤足以屈其坐人蓋少時意氣猶在也前年來北京相見益歡甚自謂向之二十九人今止存六七死生契闊有足深慨者求如曩時之樂不可得也相與傷悼久之孰知去才二年而叔縉亦卒矣豈不哀哉叔縉少豫三嵗亨年才六十臨别之際精明壯盛如常時豫謂其進於福祿榮名當未艾而豫則已衰不能久於世矣孰知衰者茍存而壯盛者反先沒其何能不哀叔縉晚而有子大者方七齡幼者才四五嵗雖其平生寬厚有隂德在人可恃以昌其後又有賢配與令兄弟足以庇賴而維持之然叔縉不克見其成此又可哀之尤者豫既悲叔縉不可見而興念及此則豫之哀其可以已邪諸公皆為賦哀挽之詩而豫為序之亦以抒豫之哀云耳救荒活民補遺書序救荒活民補遺書者江隂朱維吉氏所輯也宋嘉泰中從政郎董煟有志於惠民慮夫凶嵗或有不遂其生者乃取歷代救荒之政賢士大夫議論施設之方為書三卷上之朝廷而頒於中外其用心仁矣有元張光大又取當時救災恤民之事編萃而附益之其心猶煟之心也至今二百餘年矣維吉得而觀之曰是書也民命之所系也其可以弗傳乃為正其訛補其缺而去其繁文又以本朝列聖所下詔敕有關於荒政者及採為善隂隲所載前代救荒獲吉之人續之間以已意為之論斷名曰救荒活民補遺書請於父善慶甫鋟梓以傳四方欲使天下長民之吏仁民之君子一遇凶年得舉而行之庶幾斯民無一不得其所維吉之心何其厚於仁如此哉朱氏江隂故家而維吉性最孝再刲股肉以愈母疾士大夫歌詠之聖天子篤意養民慮有水旱之災詔諸有司預為備維吉念父有德善而未沾一命即出榖四千石以歸有司助賑貸冀假寵以為親榮朝廷降敕旌其孝義復其家維吉初以孝聞而繼以義顯豫嘉其能進於善嘗為文以張之今觀是書而又知其仁維吉之善果能進進不已哉豫聞之君子之於仁也施必自近始然於逺者或遺焉其心非不欲及逺也勢有所不逮也故必思所以繼之茍有以繼之則仁之施溥矣維吉之惠施於鄉而未能及於天下故繼之以是書使是書也傳之於無窮則維吉之惠之及於人者豈有窮哉故為序之使傳焉送姪鍔歸贑序豫從兄髙要丞善學欲樹表於其祖教授公之墓使子鍔來北京取豫文刻焉豫既為文授之鍔將歸拜日鍔由贑而來凡七八千里至兹得一見叔父幸矣今即歸故鄉思復受教於左右未可以嵗月計也願賜一言以自朂嗟夫鍔也子之父兄以詩書為業而亦以此道教人子歸而求之有餘師而何取於豫言哉然豫亦何可愛於子豫聞聖人之所以教學者之所以學必以孝為本孝善事父母之謂也謂之善者豈徒飲食衣服之奉而已哉身也者親之枝也傷其支則傷其本故尤以愛身為大愛其身則又自言行始焉言必謹於禮行必謹於義非法不言非道不行然後不辱其身而可以悅其親由是推之弟於長睦於宗族厚於姻戚朋友泛愛衆人以及於庶物蓋無所不通故曰孝德之本也世之妄子弟多昧於此言非其所當言行非其所當行輕用其身以陷於刑辟使為親者至於辱且殆焉則惡在其為孝也而又有甚者拂逆其親之心使得以凶暴加焉上失其慈下失其孝君子皆無取也子歸思所謂善事之義而勉盡其心豫之告子止於此矣若漢馬援告其兄子嚴敦宋范質之告從子杲其言具在晦菴先生載之小學之書以教天下後世熟讀深思而力行之人將謂子君子之子是與其親為君子也此之謂成親孝之大者也子其勉之送學士藺先生致政歸磁州序永樂中宣宗皇帝為皇太孫篤意堯舜之道太宗皇帝為擇天下名儒俾職輔𨗳熙聖功而藺先生從善以揚州教授選為翰林編修與焉先生心淳而氣平學博而行端凡其講説皆二帝三王之道非是不以陳上甚重之凡十數年未嘗去左右及正位東宫先生由侍講升洗馬豫自侍讀學士進右春坊右庶子得與先生朝夕偕侍從聆先生之言而觀其所行蓋嘗深嘆其為君子也無幾上嗣寶位臨萬邦當時同事者十四五人皆升職或分教太學佐外郡或遂去為侍郎為尚書先生與豫輩三數人以兼職翰林皆如舊其去而顯融者志得氣滿位髙勢重鮮有不移其素失其守者先生日相與坐館閣紬金匱石室所藏纘述以傳萬世暇則從容談笑或載酒出遊擇名勝地以為樂形於詠歌其意自若也又後數年向之顯者皆相繼淪謝而先生屹然安重齒德俱髙遂進為翰林學士其言行亦不異舊時豫又竊嘆夫人之無常而嘉先生之有常也今皇帝緝熙聖學圖任舊人先生數以經進講深見禮遇然既老且倦矣方其七十時即上章乞致仕豫輩皆勉留之上重惜其去不許先生不敢復言留四年則歎曰吾實老病齒髮日衰落雖欲自勉而力不如志上之恩誠不可負然義豈可復留再上章力辭上察其意許焉凡諸僚友皆惘然不忍舍去於是會於公署飲酒賦詩以送之詩既成學士錢公習禮持以授豫曰子最故宜為序嗟夫豫從先生久矣先生長豫十年而辱與豫處其受益也多矣今豈忍違先生哉然老者安之不復煩以政此皇上之至仁僚友之所幸見也則雖不欲其去亦惡能尼其去哉豫聞之古之人於其所敬愛者則必以夀祝之不以去留為異也南山有臺之詩既以無期無強祝君子之夀矣則又曰德音不已德音是茂而終之以保艾爾後焉蓋愈進而愈盛之謂也請以是為先生祝先生之福如是足以慰僚友之思區區離别其可以汨先生意邪置之勿復道也詩凡若干首送侍郎鄭公歸衢州序正統癸亥秋兵部左侍郎三衢鄭公文樞感風疾不能朝上聞之命太醫院遣醫往視豫善藥冀速愈踰數月疾稍間公不能自安曰為臣之義當勉勉不怠果疾妨動止則末如之何今幸可矣而猶弛然自安豈義也哉即黽勉造朝是日早西北風驟起公不虞其然退坐廨署即疏解不自勝歸至家疾復作勢日加劇則嘆曰吾受國厚恩思竭力以報萬一今疾如此非旦夕可瘳而久辱君命勤太醫且曠職廢務於義不可乃上章乞歸其鄉就醫藥上深惜其去命疾已當復來以居位任事而公之意則亦眷眷於朝廷凡諸同列與公之僚屬皆有不能釋然於懷者於是尚書徐公屬豫文為贈豫與公交好三十餘年其相知為深蓋公自為進士已用趙清獻為師及為御史為按察使皆凛凛有大臣節其存心仁厚而處事平恕凡所決斷人人各當其情故所至感悅至於奏疏乞留及徴為侍郎歷工兵二部位髙而心愈下任重而力愈強敬恭夙夜政無不舉翕然有譽於當時士大夫論卿佐之賢必曰鄭公謂其福祿榮名當進而益盛夫人之所與天亦與之然則今之去也其來蓋可冀矣豫聞之莊子大鵬之升摶扶搖而上者九萬里然至於六月亦一息焉息也者將以復升也氣完力餘則其奮愈逺矣公歸慎自愛霄漢之間顒然而望者非一人也豫與公年相若愛之至而望之深故為序以贈行贈通判佘侯序吉安府通判莆田佘侯耀之掌豫泰和也以潔亷持己以勤慎為政以慈惠撫民至於今六年矣其所守既不變而所行益以愛民為務民益得以安其生皆誦侯之德不能忘今年豫承乏吏部而侯來獻功數以老疾求去豫為細民勉留之而侍郎郎中亦曰世之宦成而怠者比比也其能慎終如始蓋少斯人也可謂今之良吏矣豈可茍徇其情而聽其去哉言於上俾復職豫既為泰和細民喜而亦有私願焉雖然非私也亦天下之公言也夫令於民最親所謂民之父母也侯於泰和有父母之道焉民雖有大小視之猶子也林林之中其才者固多其不才者亦有也才者以禮法自治誠善矣不才而違禮干法為父母者忍棄之於敗亡之地哉豫讀易之家人而得父母斯民之道矣其彖傳曰家人有嚴君焉父母之謂也蓋父母尊嚴然後人有所畏由是尊卑疏戚各安其分而家道正治民之道豈有外於此又讀唐史而知夫用嚴者之得也唐自天寶以後河北大亂士大夫卒於南者多留家淮南子弟豪縱以病民李長源為觀察副使遣吏收之而施以教刑曰吾非以官法治汝乃代汝父兄教汝也教之不改當以官法治汝矣由是皆改行為善良嚴之不可以已也如是夫天之於物必加以嚴沍之氣然後材之脆者堅實之成者益固而生意不窮蓋嚴肅之中有仁愛存焉斯理也侯所深知也而豫以為贈者蓋豫諸子蒙侯之治其才不才亦既知之矣請必致其嚴使才者益勸不才者畏法而改行或能善其身保其家不辱乎前人則豫受侯之賜大矣此豫之至願也言之切者愛之深侯其亮之贈曾太守序今之太守有地千餘里其民多至十餘萬少亦不下數萬朝廷以是付之者豈茍為太守榮哉蓋以為民也恤其飢寒均其勞役而拯其顛危抑其過引其不及使皆適乎道之中仰事俯育樂生送死而無不遂者此其大略也民者邦之本本固而後邦寧太守之加惠斯民所以固邦本也夫繫於其身者如此可謂重矣故今之郡守必命大臣舉賢而用之不賢不用也然則當是舉而受是任者豈非難哉豫邑曾士𢎞始取進士入翰林又去為兵部主事既滿升郎中其為人忠厚坦亮於事之是非曲直必循天理之公不茍為異同在朝三十餘年知士𢎞者莫不譽歎以為賢會命下舉郡守大臣皆集東閣下兵部尚書徐公晞首舉士𢎞衆皆謂宜於其職遂以聞上命為泉州太守士𢎞踧踖不自安曰太守上倚之惠民民所望為已惠也必大賢然後能勝我則奚敢於是衆益稱之曰賢哉士𢎞也世之鄙人不自知哆然自謂足以當大任君子莫之與也士𢎞謙退不居人亦安得而踰焉其能勝任可知矣泉州閩粵富庶之邦昔之為守者嘗稱其民淳訟簡喜習詩書今詩書之習固在也而嚚訟則加於昔然以豫觀之天下無不可化之民化之在太守身耳士𢎞忠厚則無刻薄之政坦則平亮則明兼是四者而行之以公其誰不化服既有以自養而又能化於善則泉之風俗將不為鄒魯矣乎士𢎞將行刑部員外郎梁叔車與凡同邑之士求豫文贈之豫與士𢎞叔車皆陳氏之彌甥而望其政化之成也故不辭營建紀成詩序太宗皇帝肇造北京以為天下會同之都蓋天地之氣和星辰之位正華夏率從四裔順服誠足以統萬邦傳萬世而致太平悠久之福然營建之功尚未備也皇上纘承列聖丕闡大猷嵗豐時和民物康阜仰惟祖宗𢎞謨偉烈經營締搆已見端緒繼志述事之孝未嘗忘於心乃斷自宸𠂻用熙鴻業知太監阮公某忠誠不懈足以勝其任也特以命之凡材物取諸官府之積者不科買於人工匠取諸循次之來者不徴召於外其諸雜作則取諸在官之人役之不以妨農功給之糗糧視他役加倍且使更休以節其力又屢出布帛諸物以賜之上之德洽於下下之情孚於上程功有道課績有方不亟不苛人心競勸亹亹忘勞蓋感恩於滂沛之餘而效力於從容之際歡呼之聲洋溢道路雖古所謂庶民子來不是過也於是期嵗而宫殿成都城之樓觀次之內府之庫藏百司之廨署以至觀象之臺禮賔之館橋梁之圯壞未修河道之決溢未塞凡都邑之中有當繕治者皆次苐成功惟廟學以祀孔子育賢才雖未至弊陋而上以為弗稱特命改作制度𢎞偉有加於前是以內而殿廷既尊大嚴整足以受朝貢撫華夷外而官署皆髙明深廣足以決政務示等威謹於天時適於人事禮樂教化之施聲明文物之美郁郁乎其盛矣逺近來者皆瞻望駭愕以為自天而降蓋不知役之作而忽睹其成耳目所接煥然一新此可見聖明之君德澤之入人也深而又有賢智之臣盡心奉國故成此不難也昔商髙宗奠都於亳周武王作京於鎬詩人皆作詩美之孔子取而列諸經歷世既久猶得以考見當時之事者以此詩在也今之百僚於營建之興愧無能為役而得廣居以即安然則播之歌詠傳之方來使千萬年有以知今日之盛美如此是亦所以自效也詩既成衆謂直宜序乃序諸其卷端王侍郎挽詩序正統甲子九月日户部侍郎王公夢瑾以疾卒於杭州事聞上為之嗟悼命有司歸其喪治墳葬之且遣官賜祭初言者數云閩浙銀冶久閉姦民竊礦相賊殺請復置冶烹煉絶其姦上慮或為民病命廷臣議之羣臣請遣公亷大臣往與浙閩三司審度其宜以聞上以命公公行次蘇州得疾取藥以行至杭州疾加劇官為求醫藥百方治療竟不起非特朝廷惜之士大夫知公者蓋不莫哀也公始以科目進得教官擢為監察御史升參政又升左布政使徴拜户部侍郎升刑部尚書復還之户部所至皆宜於其職蓋公勤學問明理義亷厚周慎而持之以誠行之以恭故能當衆望副上心今則已矣安得復有如公者哉直承乏吏部日與公周旋蓋知公為深公嘗以聞過軒求豫銘曰質賦性少容見人言行有違於義者好攻訐其過至或不能堪不為止雖欲相輔以義然考之聖人之訓則過矣朋友常以是相規雖不憚改久之則復然是質終不能無過而望於朋友者益深故以是名軒庶幾獲規切之益也先生宜無愛於言直與公年相若而學問不及公逺甚未有以復也然念古之君子有衛武公者進德不倦至老猶求針警於國是以德益進夀益髙而祿位益隆公之自修無愧於武公其德之進未已而福祿榮名當久而益盛孰知公遽止於斯豈所謂天道佑善者非邪則大夫君子雖欲已於哀可得哉公之葬也皆為作哀挽之詩使執紼者歌以送公既類次成帙屬直序之直為序不辭亦欲以抒其哀云耳贈順天府尹王君序正統九年冬十一月二十日詔問吏部有可為布政使者以名聞時光祿少卿王君賢以外艱服闋謁選在吏部豫念無以易君者即具其名應詔明日有旨擢賢為順天尹蓋前尹以滿去故命為之代夫以方伯求之而以京尹命焉蓋所謂其難其慎之意亦以京尹者方伯之比求之如此其至所以示重也順天古北平郡今北京在焉蓋天下會同之地也為之尹者得依輦轂之下日近天子之清光凡政令之發禮樂教化之施鴻恩霈澤之所沾被皆先及焉士大夫官至於此亦榮矣然人民之衆或不能過外之大府而賦稅力役征輸發召必先諸郡雖其人皆樂於趨事然非長民者啓其尊君親上之心使之亹亹忘倦而欲如志以成厥功亦難矣然嘗思之朝廷之所以命尹者豈茍為之榮哉固欲使任其難也能任其難而後可以享其榮然所以任其難者豈有異道哉體皇上愛民之仁而施其養民之政本之以亷厚加之以平恕持之以誠行之以公使閭閻畎畝之間皆有以樂其樂而利其利感荷於上親戴於下惟其所欲為而丕應徯志則為尹者有其榮而不見其難矣王君字惟善寧陽人學道君子也凡其所歷皆有譽於時今之為尹能如豫之所云足以副上下之望也必矣有其榮而無其難也審矣尹初為鄢陵教官今吏科給事中張君睿蓋嘗受教以有成者也喜師之進而其德業將益顯且大屬為文贈之豫不得辭故為贈言如此亦因以勉其德業之進於顯且大也祿岡八景詩序祿岡在泰和西北三十里豫母家居焉環其地溪山景物皆清勝舅氏存道先生好遊而喜吟取其尤者以命題曰祿岡樵隱螺浦鷗盟鄭洲雪釣董里雲耕徑山曉色武姥秋聲梅溪月霽篁嶺風清謂之祿岡八景往來嘯詠其間欲求能賦者賦之未就而先生卒子孚德如其志今年持所圖八景來北京中書舍人龍士郁為言於士大夫得其詩而屬豫序豫昔常謁舅氏以貧賤多故不得陪杖屨之後從容遊觀而形諸賦詠及竊位於時則相去逺矣未嘗不慨然以思今觀是圖則又喜孚德之能踵前迹也夫祿岡之有八景自古昔然矣不遇其人則委棄於荒遐僻絶之處莫之能貴也一遇蕭氏父子而其美遂彰豈非其地之幸哉然豫聞之地以人而勝人以才行而顯祿岡八景孚德既表其勝矣尚益圖其所以顯者哉豫老且病思乞身而歸倘遂獲一遊而為之賦則孚德之美將不亦顯著矣乎姑為序其詩以俟南富王氏族譜序泰和南富王氏系出太原蓋唐之季王該避亂來江南始居廬陵何山篤厚好施周窮恤匱意無倦鄉稱長者所居田間有龍見之異遂舉以施佛而徙居安城之連嶺族日以蕃其後有諱扆字明逺者始來居南富益以詩書禮義昌其家明逺生師儒師儒生明道美道樂道樂道之後蓋無傳而明道美道子孫皆蕃衍明道之後曰存德者居南塘為一族美道生元功元承子孫之多故址不足容乃柝異而居勢也此譜之作著美道之所出所以合異而為同也故特致詳焉蓋元功子經之居棗園為棗園族其後四世孫曰敬翁居池頭為池頭族五世孫曰用中居石灘為石灘族經之弟建之居槐下為槐族元承子益之好樓居則為樓下族孫庭冕析居下塘又為下塘族自美道一人之身而分為六族繩繩蟄蟄皆有恆産有恆心閥閲之華文物之懿他族罕能及之數十年來豫所與遊者慶府紀善倬昭太康教諭用常巴陵令用持鄆城令用彰萊蕪令用儀行人司副儼皆以通經學古入官其才行俱有可稱者於乎何其盛哉然嘗聞之世家大族固以祿仕為榮要必有所樹立晉范丐言其保姓受氏歷虞夏商周之世自以為盛矣而魯叔孫豹乃謂不若立德立功立言之可以不朽蓋貴顯者美之見於外三者實之本乎中也自王氏何山之祖而觀之該非有異道也篤厚好施而已篤厚好施仁之德也視夫刻薄貪鄙者異矣而該能之庶幾德之立者乎昔學士解公序此譜謂廬陵諸王皆該之裔南富其一也其盛如此豈非行仁之應邪世之刻薄貪鄙者多矣聚斂積實如餓豺狼然肆其欲以為民病不少槩于心是故忽焉而赫奕俄焉而消歇者亦多矣欲其碩大悠久不可得也今王氏六族可謂盛矣尚視乃祖攸行而勉於所立則祿仕有繼而益能亢其宗雖至於百世未艾也用持重修此譜而求豫序之故為之言以告其為子孫者贈稽勳員外郎柴庭芳序柴蘭庭芳餘姚故家也永樂甲申豫與其叔父廣敬同登進士第同被選擇入翰林廣敬清淳簡重文行之美衆皆推讓之而又通古文字其學得於趙撝謙先生論議精博尤非他所能及當時謂可以當上意者廣敬在甲乙之數而與豫四五人者同選入內閣廣敬乃以病告未幾而廣敬卒矣豫輩皆深惜之以為不可得後若干年庭芳又以家學取進士豫與相見於京師聽其言察其行蓋誠能謹於禮義者豫愛之思廣敬而不見見庭芳則猶廣敬也由是與之相往來庭芳為中書舍人滿九年遷稽勳主事皆蔚然有賢名豫觀其所以舉職者循天理之自然盡人道之當然持之以誠行之以不怠而已彼挾智術矜才能以譁世取寵庭芳不為也久之稽勳員外闕尚書侍郎請俾署其事上從之今乃真拜員外郎食正五品祿蓋虞書所謂試可乃已也郎官自古為榮選號大臣之副人皆為庭芳喜而庭芳不異於前時孜孜然惟恐有弗逮嗟夫此庭芳所以為賢也夫仕者之進退雖出於人而實天之所定也何用置欣戚於其間惟循天理之自然盡人道之當然持之以誠行之以不怠此其所宜務也豈惟郎官為然哉進而列於大臣之位亦若是而已矣柴氏詩書相承善慶之積益久且盛而乃嗇於廣敬天將於庭芳加厚焉理之可必也庭芳尚慎而不變哉郎中蘇鎰良金主事薑濬士澄篤同僚之誼求豫言為贈豫素重庭芳者故書以贈之贈工部侍郎王君序正統七年秋工部右侍郎闕上特以命兵科都給事中王永和蓋當是時方營建諸司廨署役繁事殷宜得勤厚平恕知大體能撫治者任之而王君嘗以明經為教官簡任在兵科十餘年日侍天子左右其才行之美見重於士大夫而受知於上是以特命而無疑王君既受任衆皆以得人為喜加焉初禮部右侍郎武城王公致仕虛其位尚書毗陵胡公與豫私計可以代之者皆屬意於君而歎不可得至是而君受特命之榮豫雖以不得從君為慊然亦自喜其計之不謬也而其同郡仕者張穆輩尤為之喜相率求豫言張之嗟夫王君之美豈待豫言而後張哉然豫知君所以致是者有其本是宜見於豫言也君嘗以重恩名其堂蓋感大父母父母生成之德與皇上寵任之恩而思所以報由是知君之所存夫忠孝者人道之大端而孝乃其本忠者孝之推也曾子以事君不忠為非孝蓋忠於上所以孝於親人惟其不知此是故或者有忘其親忘其親則不知愛其身又安能忠於上哉今君惓惓焉思盡忠孝之道是宜有以立於世而受此榮也張仲君陳皆周之賢臣其德業非不盛也詩書所稱乃獨以孝為首則大賢君子所當務者可知王君務此而其本立矣尚亦進而不已焉本之立者益隆則福祿榮名之又有大於今者後人彰之豈不益盛矣乎用是為贈其亦王君之所樂聞也歟抑菴文後集卷八
