body:
  text: 抑菴文後集卷二十八明王直撰墓表彭先生墓表泰和月池彭氏自宋以來為名家仕之顯者雖未至公卿而詩書德義蔚然為望於鄉邑蓋數百年前輩長者相繼淪謝惟先生獨存孝弟忠信樂善不倦鄉之後進得以考聞前人之德之懿而師其遺風自先生發之今復已矣蓋君子之不幸也然則表而著之以儀來世其可已邪先生諱啓字彥晦其先徙自長沙曽祖順軒祖德聲皆不仕父叔介香山縣丞先生自幼喜學手不釋卷香山公嘗從安成劉雲章受易通性命之奧先生能傳其學而於書亦無不觀精研其義窮深極微然未嘗自矜衒為文質直典雅足以達意而已不務竒詭以駭俗其教人亦如之香山公初分教萬安縣庠委以家政綜理微密義所當行不復顧計從伯與誠無後人竊除其墓事覺厚賂先生先生不許卒復其故地仍以禮葬焉伯父與仁及諸子先後皆卒先生皆卜地葬之及香山公久在廣先生往省焉衝冒瘴毒歸而疾大作時或譫語人以為神請禱之先生曰神佑善災惡吾省父不為不義神非所獲罪也奚用禱不聽而疾以安時外國貢方物有自香山入京典其事者失封緘朝廷遣御史按問事連香山公或謂當有重罰先生曰吾父老矣吾願以身代隨至京師擬上表自陳會赦而免及香山公再考績乞致仕卒於旅舍先生奉柩歸治喪悉依朱子家禮不用浮屠重作祠堂以祀先嵗時行事必誠必敬八世祖俊夫嘗鑄鐘以嚴祀事經亂亡失者六十年先生詢察得之贖以歸先世墳塋封植尤謹母蕭氏賢而知書幼時嘗口授孝經論語甫十嵗母卒先生痛不及養每念之輒悲哀奉繼母王氏時氏如所生待內外姻族禮意甚篤言必循道行必由義名所居堂曰敬齋居常無事則端坐其中訓子孫以學非善類不交非親戚禮義之家不肯一往來非上丁鄉飲不往見縣大夫而縣大夫見先生者亦無不盡禮人有不平得先生一言無不意滿而罷正統丁卯三月十八日終于正寢年九十一娶楊氏有賢行先先生九月卒子男四幹耒皆為士人皓吳縣教諭鉉鄉貢進士亦先卒女二孫男十五人曽孫男十九人是年十二月十五日葬于五十八都橫山之原葬已而幹兄弟屬直為文表於墓直以世好在子姪之列嘗獲陪左右聽誨言見香山公每燕坐堂上先生立侍柱下終日不少倚飲食起居進退應對奉順唯謹雖鬚髮蒼然猶執禮不變於諸父兄亦未嘗愆于度蓋自幼至老無不然由是而質其平生可謂篤行君子者也孟子曰堯舜之道孝弟而已矣又曰人人親其親長其長而天下平誠使天下之人皆躬行孝弟則世之治將不與唐虞三代等乎然能如是蓋寡矣借耰取帚鬩墻紾臂者比比也若先生之行宜表示於世好修願學之士有所視效而興起則於世教豈小補哉故用是揭諸墓上贈順天府丞王公墓表王氏之先居徽州之祁門蓋唐金紫光祿大夫禮部尚書璧之裔宋初有諱居正者知饒州遂家番昜子孫於是為番昜人公之髙祖仲仁宋咸淳中領浙江漕貢曽祖震甫元衢州録事祖義昭父禮和皆讀書厲行不嗜榮進公諱輅字道升自少聰敏喜學而資質竒偉表然出儕輩誦聖賢之微言必求其旨歸而不溺於凡近服仁蹈義事親敬長盡孝友之道鄉黨姻戚老者則尊而禮之幼者則撫而教之其有貧乏者則出資粟賑貸恐不及是以無少長愚良皆謂公有德於已洪武中縣大夫知其才行可用將薦起之力辭不就髙蹈逺引以自放扁舟江湖厯吳楚淮汴齊魯之邦通都大邑名山勝境靡不至覽古人遺迹而挹其餘風一時所與遊者皆馴雅之士莫不稱公為君子長者而言行取則焉生於吳元年丁未六月初十日而以永樂己亥十二月十七日卒享年五十三娶阮氏先卒繼程氏子男五長曰敏先卒阮出也次曰弼癸丑進士厯官至順天府丞女三孫男六景泰元年上嘉弼有勞績賜之誥命而推恩其親贈公中憲大夫順天府丞母程氏封太恭人初公卒之明年庚子十一月二十日葬于里之小渡山先塋之次至是三十餘年弼悲公生既不逮養而幸蒙褒寵以為千古之榮此其令德所致也乃自為行狀來請文表於墓庶永永不朽君子之德修於身而及其子孫則天必報之以福雖不及其生前而必顯於身後此理之不易者也而孝子慈孫欲顯其親者亦必承休趾美日篤不忘斯能有獲於天而垂耀於無窮此所謂孝也今觀公之德而有子之孝如此則豫何愛不美之辭不以表公墓乎故序次其説而使刻諸石王處士墓表處士王氏諱穎字仲敏萬安著姓居北郭之鴈塔里曽祖茂寧祖貴祥父菊隱皆好善樂義而不仕菊隱娶黃氏生五子處士其季也資質豐美儀觀偉然喜讀書好文藝尤明於法律交遊之士相與論道理議政務語嘗傾一座聞古人竒節偉行心切慕之遇前代器物多購藏人皆稱為好古處士亦因以自號初二親在堂處士與諸兄朝夕奉養極孝敬親沒葬祭皆以禮怡怡恭讓未嘗有間言既而諸兄各出營第宅相環列以居悉以舊業讓處士處士則修飾之遇吉凶行禮仍聚處如一家作好古齋作西軒翰林學士錢習禮侍講余學夔為之記聚圗書玩好其中以怡神養性賢士大夫及門者輒傾倒相歡至旬月不厭逺近親故有喪必躬往弔而為之助不以風雨寒暑廢禮人或有爭則委曲開導俾各得其宜而後已凡事之合於義者必勇為不計利惜費縣學頽壞教諭黃須欲新之處士首捐重資為之倡而學以成邑中多士充貢舉上京師餽餞必加厚橋梁道路當修治者多賴焉緇黃之輩及貧窮患難之人有所求者無不應其重義輕財多此類愛其子與羣子弟作槐隂書屋延明師教之禮之惟恐不至德安同知郭仕美衢州教授劉池藴皆師也其待人一以誠無少長愚良皆得其歡心人亦莫不敬愛之者縣大夫行鄉飲請為賔以年德未及辭太守陳侯本深聞其才行可用欲薦之亦力辭其自重不妄又如此洪熙乙巳九月夢有紫衣人請觀夀榜者處士往視之見其名下有六十三字曰如是亦足矣逮周六十今少保戶部尚書陳公河南布政使致仕李公皆為文以頌其德祝其夀少師蕭公則為贊其像以美之處士當國家熙洽之時建殷盛繁富之業而享安靜和平之祉善及於鄉邦譽流於遐邇非太史公所謂好行其德之君子與正統己巳除夕忽得疾子孫親舊更進藥且請灼艾處士曰死生命也昔者之夢既告矣惟當俟命而已醫何能為遂以庚午正月十八日卒生於洪武丁卯四月十七日享年六十三果協其所夢云娶廖氏有賢行子男一曰錢女四孫男四孫女一尚幼錢既卜葬于闕之原而以邑之君子右副都御史致仕朱公與言所為狀介今左副都御史劉公廣衡求豫文表其墓豫與處士比邑居然去鄉久矣處士之行雖有聞而不及見君子謂未知其人視其友其所與者既賢則其人可知處士雖隱而未仕而當世之名公顯人或與之遊或得其文詞以播厥美其賢於人蓋逺哉今又有取於豫豈亦以豫言為可傳信耶昔柳宗元作先友記刻于先君之墓欲取徵於來世由是其先君之美益顯錢之意殆亦若是耶故托其狀所載兼取所聞者書以授之俾刻焉嗚呼處士可以不朽矣王功迪墓表吾泰和多故家南富王氏其一也其先自太原徙廬陵之何山又徙安成之連嶺至宋諱明逺者始徙泰和以詩禮名家宋末有為學諭曰仲鴻者生興祖篤學而好義受知於信國文公公為書續槐精舍四字榜其居以勵之世亂弗克有為學諭生廷圭廷圭生處士諱天迪字功迪少讀書有大志新作一室揭信公所書朝夕勉焉欲有立於世其言必依於孝弟忠信而行亦如之值元季不果出時所在多盜處士傾資倡義以保障鄉里人賴之皇明混一可以行其志而處士老矣會詔下核民田或誣處士以失實盡沒入其資産處士不能自白則嘆曰命也未嘗有所怨尤惟訓其子以德義治身以勤儉治家而已久之家復裕國初徵稅一邑擇一人有才行者總徵以輸于府衆盡推處士處士任之數年稅以時入無纎毫過差貴賤賢愚皆譽之其持已嚴重而臨事寬平從容進退表然為鄉之望其奉祭祀待賔客必以禮人有未善則容而教之於嘗造誣者終身怡然相接不少見色辭人尤服其雅量洪武甲子閏十二月二十三日卒距其生元大德癸卯之嵗享年八十一娶郭氏子男二思賢思齊女一孫男五曽孫男十一經開封府學教授維蕪湖知縣紱萊蕪知縣處士初葬其里之乾溪後改葬萬安縣誠信鄉湖口之蓮花洲葬四十餘年而墓石尚未有文至是維自蕪湖來北京以前國子助教歐陽先生所述處士行狀謁豫曰維曽大父實有德善鄉邑罔不聞今前輩老長凋落殆盡而知者鮮矣不為文以刻諸石恐久遂沉泯敢以請於先生豫謂古之君子之所務者義與命而已故曰君子義以為質又曰不知命無以為君子惟其務此是以於事之當為者勇為之橫逆之來茍非其所自致則受之而不報以待夫天之自定也後之君子不明乎此於其所當為者或不為有所不慊則呌號憤怒盡其智力以逞於一時卒陷於不測而不悔此孟子所謂匹夫也若處士者其可謂安於義命之君子矣子孫之福至於久而益盛者天定故也若是有不可表耶故為書之使刻于墓上謝推官墓表君謝氏諱琚字德潤山西蒲州淘邑鄉清渠里人也曽大父天佑大父仕廉皆隱德弗耀父光祖以才薦為白水丞娶王氏有賢行生君自幼端重喜學語孟諸書經口授即成誦選為郡庠生朋輩皆自謂莫及時澠池曹端與教蒲州以性理之學淑諸生君得聞其教盡棄常所業者而學焉於聖賢之訓必求其藴身體而力行曹先生深期其逺到藩憲諸公以勸學為務者羣而試之君必在甲乙之選永樂癸卯以春秋領山西鄉薦第二然不屑於小成不果出丁未會試中教官選授西安府學訓導曹先生喜其教之行於西也取程伯子道南之嘆以自况君至官益勉於學凡燕居遊息之處門屏之間悉書聖賢格言大訓日與衆講論諸生翕然宗之出其門者多有成今戶部侍郎楊君鼎輩其人也關中旱羅侍郎巡撫憂之擇敬慎之士往禱焉君禱西嶽竭誠將事不旋踵雨大注人皆謂君誠意所感君於修已治人尤嚴厲嘗采法令之切於時政者十八條為修治繩墨亦以聞于尊府白水見而韙之多採納焉曹先生終于霍州君不忘其教既表著其行又為祠以祀之每過祠下必奠焉君性沖淡不事華靡而喜賙困貧傾囊解衣無吝色官滿惟載書以歸升南京國子學正作春秋講議凡所著述必以理為主士君子推重焉丁父憂哀毁骨立葬祭不用浮屠鄉人化之服闋改北京國子學正朝廷重刑獄詔選羣臣有才行者往理刑君與焉踰月績大著真拜河南道監察御史適敵入冦君奉敕督軍往為備敵退而歸又命往畿內捕盜至涿州上言城池不完民無所恃以安遂命君董其役竣事以稱職聞又建言修德弭災訓將練兵旌别淑慝開設武舉崇儒重道考試吏役武職蔭襲恤民救荒凡八事名曰景泰政要上優詔慰答之時有言吉安獄事不治而君又進言抵臺憲遂以君為能命改授吉安府推官景泰庚午缺月也君之為推官會太守缺君獨治政務闐委且又修學校理獄詞雖甚叢脞而毫分縷析益若簡而有餘小大之民無不悅服又明年壬申五月初六日以疾終年五十一配房氏繼郝氏賈氏胡氏皆名家子克內助子男三皆殤亡女二猶子山西解元庭桂葬君於清渠里先塋之次君清德懿行直道正言不妄交不茍取臨卒之日廪無儲粟囊無餘錢棺斂皆僚屬為之平生著述頗多有襁褓法言謹思録忠孝録太極體物論春秋講章東山詩文總若干卷藏于家庭桂既葬君而哀其無後恐久遂沉泯無傳走數千里來吉安奉太守張公所述行狀屬豫文以表諸墓古之大賢君子所以名世而長存者未必皆其子孫之傳也其功德名譽足以垂於永久君之所立如此而又有庭桂之賢汲汲以圗其存雖百世不朽矣故為書其實而使刻于墓上王用持墓表君泰和南富里人也南富之王初自太原徙安成之連嶺再徙而居南富代有聞人君曽大父功迪大父思賢父守訓雖不仕而皆以德誼稱君諱維字用持兄弟三人君居次初以父命為叔父守敬後事二父盡孝敬而於兄弟尤篤聰敏喜學雖嘗得喘疾發輒連日乃愈然未嘗廢書以選為邑庠生學成入太學永樂癸卯領順天府鄉薦明年不偶於禮部會朝廷擇賢為縣令君在選出知蕪湖以母憂去官服闋改巴陵令正統甲子朝京師以老疾乞歸明年乙丑十一月草七日以疾卒距其生洪武丁卯享年五十九初君令蕪湖地濵大江為畿內近縣達官要人往來無虛日而寬鄙細粗不同且於諸事多趣辦逢迎應對之間易以致毁辱君廉慎自持孜孜奉職無所取於人亦不輕有豫人人知其操履有常也反譽之巴陵楚大縣繇稅數倍蕪湖而人多朴野君則勤以集事而待之以誠視其緩急操縱之於是民皆樂從而邑無滯事乃修學宫葺宫署治街衢巷道以便行者民養馬于山西所司計丁役之君奏請寬其丁力以裕民有爭鬪致死者官司坐以故殺當死君為辨其實誤得不死其善行多此類及歸榮故鄉享天倫之樂與宗戚賔客杖屨從容於溪山之間乃不虞有子孫之悲而疾病加焉雖知天命之無常而樂非其樂矣大夫君子所以為君惜也君娶盧源溫氏有賢行子男六女一孫男闕諸子以是年十二月辛酉葬于同鄉之金星岡至是其甥歐陽熙為進士在京師以致仕御史任公敬敏所為行狀來請文表諸墓上豫先世丘壠在其鄉於諸大家最相善若南富王氏若歐陽氏則又有仕宦婚姻之好為之銘墓亦多矣則於表君之墓可已邪况其德行政事有足以表於後世者故為書之俾刻於其墓之原太常寺丞李先生墓表先生李氏諱東字方曙其先南陽新野人後徙漢上髙祖諱文亮元纍贈中奉大夫太常禮儀院使追封楚郡公配張氏纍贈楚郡夫人曽祖諱夀椿字子春纍贈榮祿大夫河南省平章政事追封楚國公配鄭氏纍贈楚國夫人祖諱士瞻字彥聞元翰林學士承旨封楚國公至正末言事切直有傳在國史配何氏纍封楚國夫人考諱守成字繼本至正丁酉進士官翰林檢討兼奉禮先生其子也國朝洪武初因家順天之東安而教授於雄邑時有親在堂先生力貧以為養而篤學不懈遂以明經舉為新城訓導厯教平定江浦江浦有司以事纍先生時都御史雄邑劉觀為刑部尚書自謂先生父乃其父門生欲貸之以為德先生不義其所為曰吾以誣至此而誣終不白寧坐誣去不願茍免也懇自誣服徙雅州逺惡地凡歷四學而處之泰然日進諸生講聖賢之道使知孝弟忠信禮義廉恥言行而身化之諸生多有從者仁宗皇帝在東宫念先生父嘗侍經幄謂侍臣曰李東吾師之子也召見文華殿命講大學稱旨擢拜左春坊清紀郎又以其純誠可用升行人司左司副尋出判泰州未幾復召還欲用之使俟命會有國哀竟不果洪熙改元詔下舉賢羣才彚進劉公典憲勢尤盛力欲援先生進取且求昏於其孫先生語人曰彼大非吾偶也薛御史亦欲以先生薦先生薄其為人皆力辭及劉公事敗謫遼陽凡與親厚者皆避匿獨先生仍往來其家為治行且命子伸奉白金為贐君子謂先生有常德不以用舍貴賤易意真古之人哉先生自幼寡欲有清操嘗與同輩遊得遺金環於路讓不取竟棄之去又嘗於容城道中得遺劵直白金十餘兩坐待遺者還之乃去在行人司時同列有使外國歸者遺以犀象珠璣等物皆郤之為檢討時劉公自謂親愛每遺以絨縑錦綺一不受灤州一𨽻獻鶉數百先生惟取其一而𨽻以為榮人用擬諸劉寬先生為檢討秩滿即欲去戶部尚書郭公資雅重其為人留之曰先生家學承上睿眷久纍欲進用而未果今考滿當升盍少留以俟恩命乎先生曰吾老病當去敢貪祿邪時仲子伸為容城教諭季子侃由進士拜戶科都給事中太常寺丞先生於例當得封即以侃貴棄職就封往容城就養天順元年正月六日以夀終于侃之官舍距其生前元至正庚子缺月缺日夀八十八先生早喪父而哀慕終身奉母陳夫人尤極敬愛未嘗違於禮而儉薄自守確然有古人之行鄉之人士謂先生持已清奉親孝私諡曰清孝配陳氏有淑德封孺人子男三長傼次教諭伸太常丞侃也伸娶宣聖裔孫曲阜孔氏侃娶江浦張氏乃德清令張侯之女今吉郡守瑄之女兄與傼之婦王氏咸執婦道孫男十曰官早卒孫婦任少無子截耳誓不再嫁次皆讀書為士人永樂之初豫竊第來京師得陪縉紳君子餘論而知李氏文學之盛遭遇之久仁皇帝眷待先生之隆而惜其用不極其效不大顯於世兹福澤之及後嗣者皆其所積之餘也先生往矣既葬于容城之原孝子令孫尤欲表著其德以示永久而以兵部左侍郎固城王公所述先生行實因豫郡守江浦張公求豫文表諸墓上豫不得辭乃序次其事使刻諸石庶百世有考焉太守王侯妻盧氏合葬墓表王侯名升字日初昔與豫同取進士纍官至撫州知府其持已端潔而臨事明斷曄然有聲於當時然尤好學不倦嘗自謂其質雖不敏而專確有常曽子吾師也號其菴曰魯菴以自勵而文學政事日顯赫有名士大夫歌詠之滿九年人慕其德不忍聽其去請於朝升秩正三品食其祿以治民又三年以老辭歸年七十一而卒凡所履厯皆有遺愛在人人思之不忘妻恭人盧氏龍岩大族自少讀女訓知禮義婦道母儀為宗族楷法常戒其子彞勤讀書謹規矩茍得祿仕尤須清慎以繼美前人孫弼為縣學弟子員尤懇懇教訓當效爾祖以振家聲待衆子孫仁愛均一處姊姒尤和厚內外親戚尊卑貴賤雍睦無間年七十七而終缺年缺月缺日諸子彞等以禮合葬於某之原以豫與侯有同年之誼而二親之德未有文以傳信後世乃具其事實以請於豫豫與侯交處數十年然出入中外未得盡其好而亦不可謂非知已者今求於豫豈可辭君子觀人當務其大者侯之學以曽子為師而盡心焉其學不既大矣乎恭人之教於家切切以讀書嗣先業為訓而他之卑冗不與焉其教不亦美矣乎以是二者刻於墓前之石子孫能繼而充之雖百世有耀矣是為表贈同知任君墓表永樂戊子廣西開科取士龍泉訓導任君典文衡得士為多歸次英德之波羅港得疾醫弗效士大夫皆惜其才行端潔而年不永君亦自謂非不能謹疾而止於此命也使其僕歸告母云已不能報恩而以兒女為纍言訖大慟而卒是年十月初五日也君名敬立泰和人世以儒醫著稱五世祖顯叔仕宋為文丞相兵馬醫録曽祖迪吉以經學有名祖光德父保宜皆不仕君保宜弟保沖子也生始七月光德命為已孫故遂為其後自幼警敏才氣不凡從鄉先生蕭尚仁父子學深有造詣聖經賢傳靡不通貫至於醫書尤精究博覽得其旨趣年十七部符下舉堪任醫職者縣大夫廉得君進之吏部以為能授泰和醫學訓科其所治多竒效洪武末頗厭雜煩曰名教中自有樂地何必爾乃援例求退蓋七年而後罷益肆力於文學而德業益進洪武己卯以書經試有司不偶江西藩憲大臣有嘗竒其文而惜其去者命學校教職有缺保任之於是南康贛州龍泉聘幣交至君以龍泉便養乃就職其諸弟子受君之教日就月將心悅誠服六七年間業成而領薦者十餘人所著有易經解題日新堂集諸生傳誦之母夫人嘗躬紡織以衣君蓋欲勵其所業君輒以易書遺諸弟用廣母之意鄉邑稱君為賢師而尤稱君之母為善教至是君卒而母存聞者莫不哀惜之君生於洪武癸丑七月十九日享年三十六娶韋氏子二能讓能恭能讓由太學顯今為直𨽻太平府同知有最績朝廷推本於其親追贈君奉政大夫直𨽻太平府同知豫少君七嵗昔嘗從君遊見君之學問文章所以應人之求者其才思敏捷如水湧山出至其應事接物髙下緩急先後豫奪投機應變其智不可窮而亦莫有忤於物當時君子以為君若得顯位其德必有大及於人者乃止於小試而略見其端豈不誠可惜哉能讓以君卒之年十一月十二日奉葬于視岡髙祖兆次今年豫以致仕歸故鄉能讓見豫於太平以君之墓文來請曰先君之葬五十一年矣墓前之石尚未有文以昭德垂逺非敢緩也蓋有待也今幸蒙朝廷大恩追封第五品赫然驚人其功業雖未盡施於生前而德善猶可表著於身後先生嘗辱眷知敢請一言表于墓百世之下先君雖沒而猶存者先生之賜也豫聞之記曰先祖有美而不知不明也知而不傳不仁也能讓可謂明而仁者矣為人子孫承先世之美而益充之則其顯榮光大豈止百世而已哉故表諸其墓毛處士墓表豫以老病乞歸多閉門謝容知已者罷往來甚適也一日忽家人報曰豐城毛御史以憂歸來見豫念不可以慢致咎力疾出見之雍容有禮相勞苦如平生豫敬之明日又來請曰先考孝弟忠信好善樂義所以賴庇其子孫而施及於鄉之人多矣今既不幸將葬于某原得南京國子祭酒吳先生為銘納諸壙然其善行可紀者若又表之墓上豈不益彰徹顯聞此不肖孤之志也敢請於先生豫辭不敏至三四不獲辭按狀處士諱缺豐城故家居其邑之孝弟坊髙祖某曽祖某祖某父某皆不仕而皆以德義聞於人其祖考嘗置南園草堂及橘林書屋大作宅宇闢田園延明師以教子孫未就而去世處士繼之愈於前嵗甲寅大飢處士發廪賑濟自近始人或謂其要譽處士曰吾豈好名者哉蓋所謂篤近而舉逺耳凡其鄉里皆周施無弗及雖大寒風雪餓者過其門必躬視給食無倦意死無以葬施之棺與地俾藏焉於是人信其仁處士生有美質英偉異常流好馳射以為樂弱冠始折節讀書從撫進士黃紹烈學未成乃遣倫遊郡庠遂取進士致通顯先是處士弟鍾靈官四川長子縉幼不能隨以往處士教育俾有立外弟黃節早喪親扶擕成就俾力學取進士入官有盛名在郎曹其能成人之美如此人皆稱譽焉配茫湖李氏子二人長曰倫即御史也次曰儉庶出也孫男一其修身正家厚姻戚睦閭里內外相成之道備矣不悉書書其大者焉昔者聖人之教孝也蓋以立身行道揚名於後世以顯父母為孝之終人皆知而行之毛氏子孫篤不忘既勉諸身而又以諗諸人蓋欲致其孝於逺大而後已此聖天子之志也今命官錫誥以寵臣下必曰勸忠與孝此其志可知矣上之勵下下之事上其志同則治道盛矣豫既嘉其志而欲勉其大則安可不為書故序次成文使表於墓上以俟旌義楊君墓表楊君諱旦字廷暹别號暉菴泰和之義人也景泰中嵗飢上聞以為憂詔巡撫大臣民有出榖二千石以助賑濟者旌其義於是廷暹首應詔而敕書冠帶餼牽酒醴之賜併及之鄉邑以為榮而他鮮有及焉蓋楊氏自宋以來好仁篤義讀書力學以取進士有名于當時至今而家益盛豫初聞理定而知其世又嘗識君大父世忠而與其考南軒君遊最莫逆永樂中簡閭右民實北京有司以君大父名往南軒代之凡其大父所事皆付之南軒而南軒之事則盡以付君二父得從容佚樂而無憂者以君之善繼述也久之縣大夫選為萬石長君洗手奉公事以辦治凡上之欲濟民與民之求濟於上者必自富室近民者始君嘗曰上好仁則下必好義上以仁感則下必以義應故凡發廪以佐官而楊氏必先焉凶年飢嵗細民無失所者賴其濟為多南軒嘗以濟衆受賞矣而繼之以君積善好施豈一世一人之美哉且其言行尤為人所敬信人有不平質於君得一言無不悅服蓋行義取重於人如此天順辛巳正月四日以疾卒年六十一鄉邑之人哀惜之初娶金洞廖氏早卒而以白沙蕭氏繼有賢行子一人曰徵慎重好禮君子謂能世其家徵將以缺年缺月缺日葬君於某原合族之長者與羣從兄弟謀曰吾父承世德而行誼罔不聞人之敬愛者舊矣今乃不幸其哀誄加焉貴州憲副樂公既為之狀前戶部尚書翰林學士蕭公銘其墓矣若復表于墓上豈不益彰徹顯聞衆皆曰然於是相率請於豫豫老且病不得辭然聞之禮曰先祖有美而不知不明也知而不傳不仁也徵於先德可謂能知之矣而欲托豫文以垂不朽豈以豫言之訒而可信於後世哉故為序次其事俾揭于其墓之原旌義郭君墓表郭君字東維泰和薦溪名族也其先之長厚君子曰學孔九章仲端者豫皆未之識惟識東維於北京蓋是時太宗皇帝徵天下閭右民實北京必豐財而淳行者乃在選泰和令丞謂君纍世為豐家且急於義而恤民隱是足以應詔即以君父仲端甫名上君聞之奮然曰吾為子可佚居間處而以逺役勞父乎即束裝就道至北京著籍宛平宛平畿內縣賦繁役重始蒞籍者多難之君從容辦治才優識敏事雖叢脞而應之乃若簡而有餘鄉之賢士大夫官于朝者間暇過從又能欵洽以為樂而君之稱譽日起二親聞之歡焉以君之能共子職也久之君念去親逺無他兄弟備養且朝夕奉公者一人之力足矣乃厚資其家人俾代役而歸省焉仲端甫喜萬安蘇溪山水之勝徙居之君歸而相其志資産益饒正統庚申朝廷修養民之政慮水旱之不時令富家巨室有能出榖二千石以佐官備賑濟者賜敕旌之為義民君欣然奉令而享其榮矣景泰癸酉大臣巡撫江西而民事尤急奏請仍行是令能奉令者錫冠帶以寵之而君又蒙其賜人謂郭氏謙約節儉興其家而寬厚恭慎以奉上宜其積慶長而延譽逺也君孝於親厚於宗族鄉黨周窮恤匱不間疏戚智略過人而退讓不伐廣薦溪舊業以奉先建蘇溪新孰以教子而諸子祥臻等聰敏好學篤志勵行以順適其意皆君之德善所致惜未見其成而遽以夀終豈天姑畜之而將大啓其後邪君生於洪武缺年缺月缺日而以天順戊寅十二月二十八日終年六十七娶鍾氏國子學録啓晦之女有賢行子三女二孫男六祥初等將葬君于某處既得吉矣復相與謀曰先考之葬憲副歐陽公述其行前戶部尚書蕭公銘其墓矣若復表著其德于墓上則傳之耳目豈不益彰徹不朽衆皆曰然乃來求豫文刻焉豫聞君子之所立當務其大者其細不論也彼憚涉厯登降之勞而遺其親於劬悴煩擾之地惜簞食豆羮之費而視窮餓困苦者不一動其心皆鄙人也君不逺萬里以逸代勞務使其親安於鄉里熙然自得而無憂又纍發千鍾之粟以施賑濟利貧民使皆有養而無失所者其德善之巨細可知矣夫安親者厚於仁利衆者和於義仁義立而褒賞行恩命之隆冠服之美所以榮今而耀後者有窮哉魯叔孫穆子所謂立德可以不朽君幾是矣故為撰次其行使揭于墓之原彭教諭墓表先生名皓字士淳泰和月池里故家世以儒顯曽祖德聲祖叔介父彥晦皆以行誼為望於鄉邑叔介嘗丞香山尤髙潔不羣人稱之先生受其教能刻苦自勵既習易書二經又與從叔伯鍊講春秋通其旨要四書百氏皆深究密微而尤注意於性命道德之藴為文章汪洋演迤理達而辭順學者爭師尊之永樂庚子領鄉薦不偶於有司久之得巴東教諭巴東僻陋士不知學學幾廢先生乃出已財為倡拓基址興學校嚴立教條不避寒暑日夜訓勵諸生使學而諸生始知有科目之榮向意進取而先生不及見其成滿九年調吳縣教諭縣附郡多達官往來諸生率以迎送廢業先生毅然以師道自任專務講學罷迎送衆知其嚴於繩檢也皆是其所為諸生從教而有成者亦加於昔凡厯兩縣廟學之所宜務者無不治嘗校文四川河南有得士之譽蓋人無不稱其公者先生孝友忠信恭已愛人繼祖母父母皆夀九十事之皆得其歡心處兄弟宗戚盡其道其教學者必以誠而人之於先生無不篤於義者先生於洪武缺年缺月缺日仕二十年以老告歸又缺年卒於天順戊寅閏二月十三日享年七十二配孺人南溪蕭氏贈戶部尚書養心先生之女有子四人銓寬粟相相早卒銓粟皆以儒被薦受官孫男五諸子既葬先生於所居之南園孺人之弟前戶部尚書翰林學士孟勤銘其墓矣又俾豫為文表于墓上豫聞之朝廷建學育才以興道致治而師為之本達官要人往來者又有以警其惰課其功則教成可兾也然為師弟子者多樂弛縱好佚遊典教者以其適已而不知檢達官往來者以能佞已而任其意肆然自放不至於廢學者蓋鮮有如先生之篤於教以舉其職非守道不回之君子哉是可表也豫與先生有世好豈可辭乃書其事而使鑱諸石以勵來者贈御史楊君墓表君諱熙字舜民别號水南居士其先汴人從宋南渡家餘姚大父世延父子昭皆有隱德而不仕君天性孝友持身謹飭與人處循循恭讓人無不敬愛君者永樂中有司推長其鄉糧賦君所施最有法洗手奉公無一毫橫取人亦感君之惠而事乃先集縣令佐稱賢焉性尤剛毅人有過面斥之諸子或有闕誤請改輒從寬懷坦亮愛人容衆常曰改過君子之道也君子不貴無過而貴能改過平居一言一行必以聖賢為師法切於教子延福州府學居憂訓導諸均輔為之師缺年缺月缺日君有疾飲藥而加劇召諸先生及所親愛入卧內告曰死生常理耳棺斂之用備足矣吾慮諸子輩為異端邪説所惑而得罪名教請必以禮正之又顧諸先生及諸子曰先生服闋當入京此子頗可教願以從行得徼終惠生死不敢忘言訖悲噎不勝左右皆泣下良久而卒無一語及他君子謂君達於道君生於洪武壬戌十二月十二日卒於正統丁巳五月二十五日享年五十六葬于黃山岡之原無違禮初娶本隅朱氏有賢行先卒繼室以祝氏生五子長文璧次文圭其三文琳戊辰進士拜雲南河南兩道御史升江西右參政其四文奎由懷才抱德授河南封邱丞其五文球浙江憲司承差既滿而未任人謂楊氏世澤厚故其子多才而亦善教所致也參政君既取進士兩拜御史有盛名而江西實大藩聲名文物蔚然當衆望君又為賢佐今聖天子在位求賢圗治有才者必用有功者必賞榮其身顯其親而至乎其極蓋纍纍有也君初為御史已蒙榮寵贈父為御史矣兹升佐大藩職三品篤於忠誠以大其功業則恩命之隆又可計日待也君以豫為相知求文以表親之墓豫嘉其舊績欲勉其新功而進修不已焉故為表於墓上蕭氏合葬墓表永樂十年泰和南溪蕭鵬翔與弟鵬漢以其曾伯祖德軒君其祖立齋君之墓皆嵗久且圯大懼不足以妥靈於逺乃以是年十二月初十日即其鄉沓壠之原啓德軒君之墓繕治之易棺衾葬焉且以其配劉氏祔于左又自其里兩口塘遷立齋君之骨以祔于其右既卒事則相與謀曰惟吾蕭氏自長沙再徙至于南溪其蓄德儲祉以敷遺其子孫者既勤厚矣惟是二祖實有德善義烈趾美前聞人而加植于我後嗣今合葬于兹雖納志於幽堂若又以其行著為文章以揭于墓上豈不益顯白於禮宜可衆皆曰然乃來求文而刻之按德軒君字子道祖曰舜卿父曰祥甫君姿貌魁偉而襟度豁然自其祖父時久以多資雄鄉里至君而益盛然終不以此驕人平居篤於為善如飢渴之於飲食孝弟之行充於家而達於其鄉成人之善惟恐不至周人之急亦惟恐不及嵗嘗大旱鄉黨幾散亡君發盡所有全活之然卒未嘗責償也故當時無少長愚良皆謂君有德以至治癸亥三月初十日卒年七十君一子信可早卒乃以其季弟德濟為後時俗然耳德濟一子即立齋君也立齋字志立益闓爽不羣其修於已而見於事者蓋不異德軒君見義勇為不擇利害為趍舍尤多智策欲有以自見嘗讀光武諸將傳慨然嘆曰使吾從事其間功名豈少哉壬辰兵亂傍近縣皆冦壘數侵犯泰和監州達公最知君檄君以鄉兵守北門君以恩信結衆心人人為盡力未幾吉安失守守臣來奔扣北門君以大義詰之拒不納及監州傳言納之君乃納於是監州益知君果可用也當是時泰和城獨完以忠義著稱者君與有力焉監州沒而君亦老矣以至正丁酉三月草三日卒年七十三有子三人自新自明自成皆已卒孫男五人鵬舉為蘇州府同知山東鹽運副使鵬南鵬起亦已卒其存者鵬翔鵬漢曽孫男二十人源本輝金潭基􅘏派堅堅鑰幹壑鎡塈堡墅煒㷆焜而本輝潭基派堅鑰墅皆早卒嗟乎二君之行美矣使其顯於時推其所有而大施之豈不益可稱道哉而不幸卒于幽隱君子蓋多惜之然自其沒至于今百有餘年鄉人父老聞其名者猶為之低佪感慕而君之子孫被其遺澤亦皆習於詩書禮義之訓足以世其家而益大其門古所謂位不稱德者必有後福其是之謂乎故為書之以表于暮使人知蕭氏如此其盛者有以也處士羅宗汾墓表處士羅氏諱濟字宗汾其先金陵人四遷乃居泰和仙槎鄉處士曾大父達可又徙雲亭之夏徑今為雲亭望族大父夀逺父仲贊皆不仕而皆有隱德其資産甲一鄉處士幼聰敏喜學有志於用會其兄卒而父且老公私諸務日滋不克展其志孝事二親祗勤不懈晨昏奉養能得其歡心至於奉先尤極誠敬嵗時祭祀必中禮節遭親之喪哀毁如制鄉黨有故極力振助常長其鄉糧賦一以寬厚為本他人或計贏利而已則損以裕人貧者遂以代輸與朋友交篤於信義親戚之間亦極仁愛凶歉之嵗人有假貸者賑之不責償或榖粟已乏則與白金官雖命償然處士終不取如是者二十四家兄宗齊及子京早卒處士厚撫其孤煢俾全其節義諸孫針箎樂學者皆資給使學俱有成士大夫過從相與欵洽連日無厭倦皆見於吟詠承先貽後之計秩然有條理年老倦勤乃以家事付諸子孫而從容燕樂悠然自得也天順己卯六月二十五日以疾終距其生洪武丁卯七月七日享年七十三而有子京廣序孫纂籍針管曾孫賞貯賑貢配蕭氏有賢行父母舅姑內外姻戚莫不讓賢焉先處士九年卒年六十三至是子序以江隂致仕知縣曾貫所述行狀詣豫泣曰先考妣實同有令德以興其家不幸而母先逝不獲同享其福於悠久心實痛之葬于里中天井坑之原久矣今先考以庚辰正月初四日葬于井塘之原欲啓天井坑之封奉先妣之殯往合葬焉神靈有知宜必安於此願賜一言表諸墓豫聞羅氏之先皆惇本尚實恂恂然有淳行其前之往者皆不及識若處士之父仲贊甫與其兄宗齊豫嘗與之接而知其為人蓋無愧於好善樂義之君子其儀於家孚於鄉閭里巷非一日矣年九十而終曾玄之孫繩繩蟄蟄豈但為士而好善之效天所以報之也閨門內外亦有好德勵行而成其美者積善餘慶將益盛故為序述而使刻之俾永有聞於後世澗泉蕭先生墓表南溪蕭徵士士敏既以永樂戊戌之冬改葬其祖澗泉先生於五十一都池下矣後三十年為正統丁卯而士敏之子瑱仲等復相與謀曰曾祖之葬既有銘以納諸墓若又表其德於墓上豈不益明顯而延聞於世乃以書來北京請豫文以刻諸石豫生也後不及識先生永樂初入翰林始得與士敏相接觀其孫之賢固已知先生之善矣則今日表墓之請可辭邪先生字叔明澗泉其别號國子學録蕭先生子所嘗作詩歌詠之其先世出湖南祖覺仕楚為軍巡判官避馬氏之亂初徙泰和之早禾渡四徙而後定居於南溪傳至先生已九世曰漢卿仲寬德英其曾大父大父父也皆以隱德弗耀先生為人簡重好學素負剛毅直氣有志於時用適元季兵亂奔走避難無寧嵗逮國朝混一海宇平靖而先人之田宅皆已廢燬先生乃力謀於恢復及家道振而先生老矣遂無意於出縣大夫知其賢舉為耆宿而咨政焉鄉人德之者衆一時士大夫多敬禮之是宜久生而不厭乃以洪武辛未五月十三日卒距其生元祐庚申九月十八日享年七十二配曾氏繼梁氏子五人南亨道亨曾出利亨文質文美梁出女一人嫁詹宗繼孫男八人士敏其一也曾孫男缺人嗟夫江河之流不已者以其源之深也蕭氏自軍巡判官之後至德英十一世皆以隱終其積之甚久而源固深矣宜其於先生發之乃遭時不偶抱才以卒及士敏始以善書徵而見用於世亦顯矣今其子若孫又相繼以文學出為教官方興而未艾其傳果有已邪然則蕭氏之盛固其纍世之積要亦先生有以培植之矣是宜表之以示其後人且使之勉於善繼云行狀故香山縣丞彭公行狀公諱豫字與智别字叔介其先由長沙徙居泰和世以詩書顯名六世祖惟孝君博學有文宋光宗時詣闕論時政獻賦一篇以諷光宗大竒之友人周文忠公必大楊文節公萬里謝諫議諤交薦其材可用有詔特補一官君不受而歸自惟孝君至公之曾大父景望皆以學行有名位于時大父順翁父德聲府君始隱居不仕以行誼稱元季之亂冦逼州城民大恟府君以鄉兵助州守破走之鄉人賴焉娶瀘源蕭氏女而生公公少好學問勇於自進嘗受易於安成劉雲章先生究隂陽消長之理性命道德之源慷慨自負意不至於大成不止也金州守嘗以才行薦公公不為起與其徒日講論磨勵以成其學而名聲益彰徹不可掩南雄守辟公為教官公又辭不就而萬安縣學復以幣走館下聘公為師公念不可終拒也故公遂為萬安縣學訓導日進諸生講説周公孔子之訓言喻而身化之在學六年諸生皆用有成以言事擢授廣州府香山縣丞香山海邦也素號難治前為縣者率以重法繩之卒亦未臻理也公至寬其教條省其刑罰廢弊具舉流亡四歸其俗以男女質錢久則沒為奴婢民多所不欲者而莫與直焉公為復之者二十餘家民有腴田若干頃軍帥利之誣為間田以給軍府檄縣割畀焉公曰帥欲病吾民乎吾在此田不可得也帥不敢逼邑南際大海倭奴往來為民害出沒海中飄忽若風雨民無兵備且不虞其至莫有能禦者公教民樹柵積石以待又以䇿獲其舟於是始有所憚不敢近俗善蠱人被毒者輒死公廉得之徙其家後莫有犯者大猾陳甲李乙嘗持吏短長搖撼以為已利因得肆其姦莫敢誰何公獨發之乃又以語言撼公公不為動卒置於法退而伺候公所為將中傷焉久無所得乃大服不敢復有意干公嵗大旱祈禱皆莫應公曰吾無以文為也乃謝去里巫躬率父老百拜籲天以與民請命不二日雨大注嵗得上熟明年旱復如之邑中災且及廨舍公叩頭言曰廨舍者錢榖甲兵之籍皆在焉有不幸不惟吏得罪將大擾於民俄而風返火滅得不焚凡在香山九年洗手奉職信心以行不視難易為避就抑強暴植柔良平征徭興水利公無負租民無遺便邑人皆稱誦之又以其暇日教諸生諸生服公訓遂有以科目顯者公之所為類如此可謂豈弟君子者矣永樂六年以老病告于朝乞致其仕天子憐而從之將歸而疾大作醫不可愈遂以十一月二十二日卒于贊善梁君之官舍獨有孫幹與其從孫詡况在側焉嗚呼痛哉公生至元戊寅九月二十七日享年七十有一初公處而未仕也執親之喪不酒肉嬉笑者三年人以為有子羔之行其於宗族尤有恩意嫁孤女之無歸而賑其貧不能存者平居教子弟與鄉人之子弟必依於忠孝義所當為雖犯危難不顧也其為里中長復民之冒姓者以教其孝戒民之誣善者以教其誠征稅於民不過取以自利民貧不能輸者以已資代焉不足則破産不自悔人皆以為矯而君子以為仁其面目嚴冷望之凛凛可畏然能别善惡以為好惡故君子咸敬愛公而小人或忌焉蓋公以聖賢之道存於心而以剛介潔廉行之故其窮達之所施有以大過於人也平生工為詩才力豪富而意氣奔放不可禦憂悲愈樂皆於詩發之有集若干卷藏于家初娶蕭氏處士蕭宏亮女得婦道甚克成公之志再娶王氏時氏有一子曰啓蕭出也孫男四人幹耒皓鉉皆讀書有士行幹號哭奉公之喪以歸卜葬焉以直嘗辱教於公知公德為詳且世有連也故授公行事俾述焉將求銘於立言君子誼不得辭故述其梗槩如右云張宗震行狀公諱震字宗震姓張氏其先有諱煥者自廬陵徙居泰和二子長曰槱次曰槐應宋季時槐應以進士釋褐第一槱入元為江西醫學提舉是生才甫才甫生文仲為醫學正文仲生德翁則公之曾祖祖父也公自幼力學為儒於諸書皆務熟讀暗記而又習於醫年十四喪其父獨與母居遭元季兵亂故業蕩無存者公劬力經營復作堂以事母朝夕承候起居奉順顔色而親調其衣食寒暖之宜務以悅親之心退則以所學教鄉人子弟怡然自樂也國朝平一天下詔舉賢良方正之士縣令丞以公應詔而非其志懇以親老辭不獲又辭於府亦不聽至江西行省日伏庭下乞歸養許之公歸益自晦不求聞於人而所以自修者益篤嵗辛酉邑中大疫兄宗益病且殆而沴氣愈盛家人莫能興歡言有嘯於室者他子弟稍避去平生親友莫敢過其門公獨留事之不去或勸公少避公曰此吾兄也使果有鬼神吾終不以愛兄死矣卒不去宗益死公以禮治喪哀哭且扶持其家人卒皆愈公亦皆無恙以此益見重于時公既失其兄其屬人皆倚公公亦懇懇為之盡嵗甲子鄰邑冦犯泰和公亟擕其兄之孥與妻子族屬倉皇出走不能顧其資至於貧甚然公意恬然獨以得安全為喜賙之盡其方妻子皆化公所為無彼此言者卒撫育其孤姪使皆有成今教諭休寧日孜者其長也公事父母極孝敬嘗侍疾晝夜不解帶湯藥必親嘗而進治喪奉祭皆盡禮然尤恨不得久於養每念之輒悲痛至於老而猶然所謂孝弟忠信之道既以修於已而又常以勉鄉人鄉人素慕公之行而皆服其言莫不以公為善人長者其於朋友重信義不矯矯為異亦不翕翕為同平居寬和簡靜未嘗以言忤物以色拒人家雖不甚豐而樂以餘財振人急雖負之不責也初公之得勉而歸也惟以醫術濟鄉里既老而術益精而應人愈不倦不以寒暑蚤暮貧富逺近疏數為辭或以公汲汲為勞公笑曰吾豈為利哉醫者仁道也仁豈有間乎人以死生託我汲汲猶恐不逮况不汲汲乎蓋公之存心如此故一時危急賴公而全活者為多永樂丁酉五月十八日以疾卒其生元至正戊寅十月初六日享年八十娶彭氏邑中望族有婦道甚子三人日昭日省日敬女一人嫁曽勉早寡孫男缺孫女曽孫男女缺日昭兄弟卜以缺年缺月缺日葬缺鄉缺原命缺狀公之行將求銘于今之有道而善文者以託不朽焉嗚呼若公者誠不可使無傳也而直之先大父竹亭先生於公配為內外兄弟直視公蓋大父行也知公德不誣故撰次如此云先公行述先公諱缺字缺姓王氏晉司徒導之後其先自金陵徙居泰和世為衣冠之族代有聞人髙祖芳洲府君妣曾氏夫人曾祖天隱府君妣劉氏夫人祖臣則府君妣彭氏夫人考竹亭府君元季授福建行省照磨改吉安路治中俱不受以經學教授鄉里妣陳氏夫人繼李氏夫人先公生而秀偉穎悟絶人幼受學于家日記數千言甫弱冠於四書五經諸史悉通其大義下筆為文思若決河既長聞安成劉雲章先生嘗從虞邵庵先生講學得圖書太極之藴遂往從之盡傳其所學雲章先生亟稱之以為不可及及壯浩然有四方志時先叔祖啓翁先生由監察御史僉憲廣西先公遂往省焉度庾嶺過蒼梧憩桂林久之啓翁先生改知崇慶州事先公乃復下湘水泛大江入三峽遨遊成都覽觀山水之壯已而復還京師友天下之賢既歸而學益超詣文益閎肆鄉先生陳心吾見之歎曰此漢唐之文也為序之洪武十五年朝廷聘求賢才與論治道邑大夫時習首舉先公應詔既至京太祖皇帝親見延問又與論太極皆稱旨時天下賢士至者凡一百餘人上御奉天門試其經學及時務之要以先公為第一且命公次第其餘以進上益以為可用既而授廣東按察司分巡雷州府海康縣試僉事先公慨然思有以報上知遇始至問民疾苦與凡利之所當興者即建言振寃滯恤孤寡防海冦與海北鹽法之弊凡五事又言宋冦凖在雷州嘗開渠徑城中引特吕塘之水以灌東洋田萬頃在元時海北元帥府以兵守水閘而海北廉訪司掌其扄鑰以時閉泄嵗獲大穰今塘淤渠廢而東洋之田多旱民病之請開浚以利民會罷分巡僉事例召還京然其所言皆次第行之吏部將改授官上曰江西秀才王某頗讀書以為工部主事使時與趙尚書論學而先公不知也既至工部趙尚書始諭上旨先公益加感激其於職事早夜盡心無有曠缺未幾以先祖竹亭府君憂去官歸明年先夫人卒又明年先叔祖啓翁先生卒既連遭家難遂坐起復後期謫居安慶者十年先公安於所遇進退恬然其所處者雖有文武精粗不同然皆謂公有德無不敬愛之者洪武三十二年復用薦舉起先公知瓊州府時瓊守以曠職罷去民皆瘁然思治其長老聞先公來喜曰是嘗分巡雷州王公邪能興利以便其人必能利吾民矣先公至官布仁厚之德恢含𢎞之量施平易之政民皆安之先是崖州黎民相讐殺府衛皆以反叛聞于朝言黎冦結寨凡百餘勢張甚請發兵勦之兾有所漁取任事者以為然命亟發兵衛既受符而先公適至因逼遣吏為鄉道且以危言撼公先公執不可曰審如所言則既數月矣當連陷數城而鄰境尚得晏然耶此必黎人相讐吾自以身任之時府僚皆缺先公知寧逺丞黃童素廉平可屬事命往察之童歸報如先公言且致其首事者數人以復朝命衛不得發兵崖州人遂無事相與感泣曰微我公吾妻子為僇矣先公初至山洞之民雖嘗聞公名而未熟公之化及聞崖州事皆信曰真我公也由是凡令下皆奔走歡趍無有後者先公在位清靜以自守日求其民之蠧弊而疏剔之瓊之田素薄收而嵗常三穫賦其租以給軍軍中不以時受俟民用乏然後急斂焉常以此困民規利先公曰吾在此尚爾邪命民三獲三輸之軍不得為害凡軍中一切干託有司者皆沮格之其豪橫吏不悅公所為朝夕使人伺候其短隂欲把持之久之無所得衆皆大敬服曰不復敢有意干公嵗甲申大旱種不得入土父老巫覡禱之百方終不雨先公曰此吾責也乃設壇齋戒暴露烈日中以身禱焉明日大雨獨城南十五里江之外尚焦然是夜先公復焚香籲天曰彼民亦天民也惟天其哀憐之明日先公往清瀾浦視蕃舶既渡江登岸雨隨注盡夜乃止人號為太守雨是嵗大熟初海南之民以健訟聞爭利害如毛髮輒告連數十百人吏因得按舉為姦及民病有司苛刻者輒廢業入生黎洞中吏莫敢誰何自先公至民皆化服無敢以非理相告言者其亡逃而歸者凡萬三千餘口郡中熙然無事先公乃一意學校視廟宇講堂補其缺漏撤其弊者而新之課勵諸生季考月試由是賢才輩出視昔為盛佐吏有新至者怪公無赫赫之威而視三州十三縣之民皆樂生興業無失所者蓋先公於其屬吏嘉善而進不逮故皆有所勸而致然矣先公在郡凡十五年以事朝京師及病不視事者幾半之而教化之效如此此無他先公之德積於已者厚而所以待人者誠故也嵗癸巳丁李夫人憂東歸瓊之士民爭來送公皆拜且泣曰公歸矣如吾民何願公復來安我自城中至海口十里之間不絶于路先公天性至孝事父母必盡其道初家居時祖母陳夫人病先公晝夜不解衣帶湯藥飲食必躬調而敬進之及先祖竹亭府君繼祖母李夫人有疾皆限以官守不得親侍左右則慟曰此吾終身憾也其居喪葬祭皆以禮不為世俗之行先叔祖啓翁先生既罷歸老而無子先公敬事之如父既喪亦盡禮葬祭而撫育其孤女使有歸先公姿貌魁傑而襟度豁然遇事無所留礙接人無賢愚貴賤皆有恩意於宗族親戚尤克盡其情未嘗言人過失事平生無所不學自經史之外以至隂陽地理醫學卜筮方外雜家之書皆能悉其旨趣至於字書之妙尤得晉人家法故所至之處不特士大夫尊之其自奉儉約雖貴未嘗擇衣食常曰鮮衣美食貪者得之然貪者禍之媒也吾所守者三言循天理而已永樂十四年五月以李夫人服除謁選詣行在而兄信侍行時直亦以扈從留北京蓋違五年而始得拜膝下六月初七日改授廣東肇慶府知府屬先有脾胃之疾乃以聞于吏部請得醫治而後行而不肖孤兄弟不能具醫藥時飲食遂遘大禍以七月初九日辰時終于萬寶坊之官舍嗚呼痛哉先公生元至正壬午十月一日享年七十有五先夫人歐陽氏前進士臨淄知縣日新先生之女婦道母儀為宗族表法生不肖孤二人女一人適楊子行先先公三十二年卒繼母蕭氏夫人在堂孫男八人䆅穟䅘种秬稹稚穆孫女三人皆幼先公所為詩文千餘篇藏于家嗚呼不肖孤兄弟不孝不天不即隕滅將奉先公之喪歸葬于泰和千秋鄉辛山之原痛惟先公盛德懿行存諸身以及於人者有不可泯若不能顯白以告來世則不肖罪惡益大將無所容故敢述其大略丐為銘文以著不朽荒迷不次伏惟垂仁采録焉不肖孤直泣血謹述彭先生行狀先生諱羣字與和姓彭氏世為泰和人曾祖吕濂溪書院教諭祖方拙號月溪處士父文政皆不仕然皆以學行見重於人而亦以資富甲一鄉元季兵亂州守達侯結義兵為守備月溪與州之豪傑傾資以應之是時傍近皆冦壘惟泰和獨完以忠義稱者實侯之功諸公資助之力也及侯卒月溪父子相繼沒而州亦陷于冦倉猝之際骨肉離散先生走贑州龍泉以避難亂定而歸親屬無幾室廬皆焚蕩先生為之號慟及聞女兄被掠往衡州即徒往購贖以歸又往安成求得兄子某歸而卒於途先生負其尸行哭求地以葬見者哀焉既而自念曰以百口之家而存吾一人不力學何以昌吾宗乃從直先祖竹亭先生學大肆力於六經子史百家之言為文清婉而有法安成劉雲章先生見之曰彭某所造他日未易量也洪武中詔求賢才與論治道有司舉先生應詔後又以應懷材抱德之徵辭弗就避居廬陵永水之陽鄉人子弟從之者甚衆先生日為講説聖賢之道所以修已及人者學者化之郡縣學校聘為弟子師先生皆力辭謂人曰吾豈能舍先人墳墓而從宦乎嵗時祭享與論及祖父盛時未嘗不泣下沾襟也居永陽二十餘年乃歸居于南溪之上其從兄叔介先生剛嚴有禮不以言笑假人先生事之如同産怡然道義之樂其於宗族恩意尤厚伯父文明夫婦既沒久未葬先生以其骨往葬瀘源山中夜宿道傍神祠無扄鑰虎闖祠而號先生曰吾所為非不義鬼神有知吾終不死於虎卒安坐不動虎亦不敢近至旦乃去族弟可永死其妻子貧無依先生分所有濟之曰此其初一人之身也濟之不猶愈於他人乎其家不甚豐然樂以餘財振人急酬與否不校也與人言色溫氣和未嘗有所忤故無賢愚少長皆稱和林先生而不名晚有二子長百鍊次百鈞皆使力學曰爾祖多振施於人有隂德其在爾乎爾其勉之先生生元至正癸未十二月初九日以永樂丁亥五月十一日卒年六十五當先生疾甚時命取平日鄉人假貸劵約盡焚之左右勸留以資二子先生曰吾觀二子必能讀書以自立不必留此纍其進卒之後七年百鍊取進士為監察御史後三年百鈞學成將貢於有司未試而卒女三人孫男二人先生初娶楊氏早卒再娶永陽胡氏男女皆其出也先生葬南溪已十六年而墓未有文百錬痛之使直狀其事將求銘納于墓直之曾祖母乃先生之從姑故先生於先祖竹亭為內外兄弟蓋直之大父行也幼時常謁拜先生先生以所聞於先祖者教直藹然仁者之言嗚呼若先生者是豈可無傳者故述其大槩如此其所著詩文若干卷藏於家云抑菴文後集卷二十八
