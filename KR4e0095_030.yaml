body:
  text: 抑菴文後集卷十七明王直撰序萬安倉前周氏族譜序倉前周氏萬安故家也其地在今縣治北倉之廢置不詳自何時周氏居此亦不詳自何代今其家有唐天寶中買田劵官司印識載倉前周氏買者姓名由是觀之則周氏世澤之長可知歷歲既久譜牒亡失至今刑部主事鐸凡幾世尊祖敬宗之心蓋未嘗忘也鐸之曽祖同忩嘗念本源之盛子孫之衆譜不可不作乃搜閲遺文得其可知者而録之以為譜其用心勤矣蓋在宋時有諱禎者嘗從濂溪先生遊而聞明善誠身之要故其教於家以忠信仁義為本後有子實號朴庵朴庵三子昻甫榮甫南甫昻甫一子景山景山之孫尚桓以資産雄鄉里榮甫三子景月景炎景舜景月之子寧壽愛陵陂山水之勝徙居之榮甫曽孫尚益博學多聞仕元至道州同知南甫一子曰景德景德五子仁壽榮壽均壽春壽同壽即同忩也同忩三子尚義尚禮尚信尚義嘗為萬石長有善及人人德之亦徙居陵陂而陵陂益盛尚禮子存與四嵗而孤母李才二十四後五月遺腹又生子存忠李誓死不嫁撫育二孤皆有立尚信端厚誠篤鐸之祖也生鐸父存敏存敏三嵗而孤母陳守節撫育之長為娶溫氏生子藻一嵗而溫卒陳為祖母自鞠之存敏繼室以劉氏未幾而存敏卒卒之後三月鐸始生劉有疾陳又鞠之鐸方七齡劉亦卒陳已年六十六矣而家益落辛勤以育二孤稍長則教之書而惓惓欲其成其心之厚於仁如此鐸今取進士官刑部有名於時周氏之衰而盛久而不替雖其族之賢者有所樹立要亦婦德之美有以維持之也景山曽孫存敬景德曽孫存善慨譜牒之無述欲取同忩所録而增修之未果至是子與謙及存忠次子秉章又加考訂而屬鐸成之鐸編輯成書詳其可知而闕其不可知欲以傳信也將鋟諸梓求豫為之序夫故家大族之所以能久者必其祖宗有立於前而子孫克繼於後也周氏之傳久矣惜舊譜不存無以取徴然自天寶以後八百餘年民事之遷易不常其中勃然而赫奕俄然而消歇者何可勝數而周氏猶不失前時之望謂非積善之致其可邪昔范宣子謂其世祿之長自陶唐以至于晉可謂盛矣魯叔孫穆子乃謂在於立德立功立言則可以不朽豈非是三者又所以為世祿之本歟周氏之子孫尚鑒于兹則此譜之傳不亦光逺有耀哉送鮑進士序豫昔家居時則聞武昌有鮑先生者以春秋教授于瑞州豫邑陳賞公延往學焉嘗從公延得鮑先生之所教蓋于夫王道之盛衰伯者之功罪誠有味其言也豫心慕之其後鮑先生又典教贑州與吾郡遂家于安成而豫乃竊第官京師不得見鮑先生而求益焉蓋未嘗不往來于懷也如是者二十年矣今年春天子親䇿士於廷鮑先生之子時溥乃以家學奉清問得賜進士出身豫聞之滋為喜然恨不得一見而時溥乃辱顧豫觀其言談舉止蓋稱其為先生之子也時溥將歸豫同官安成李君時勉刑部主事王君行修中書舍人彭君麟應求文贈之豫謂時溥以明經取進士其道宜講之精矣豫不必言也然進士之榮於已與人之責望於進士者皆不可以不知試相與言焉夫自貢於鄉會試於禮部賜對於大廷其榮幸至也及授以官則往往為郎官御史當藩臬之寄領郡邑之專其任用重也由是而上下皆俟之矣其言合乎道行中乎理則曰彼為進士宜如是有一不然者則指目而誚讓之不貸也夫仕者豈獨進士哉而上下致嚴也如此豈非享其名者人固當求其實耶是蓋可懼也夫天下之理無窮而君子之學亦貴於不已持之以積久之功而益造乎廣大精微之極則所以體於身與見於事者將無往而不宜矣果孰得而誚讓之哉此正天子期待之意也時溥歸因其已至而加勉焉他日出而致用毋愧於家學毋負於朝廷則於進士為有耀矣故豫之贈言如此歸而以質於先生當亦以豫言為然矣工乎詩者申以系之李氏牧牛圖序牧牛圖一幅京口張永所畫刑部郎中李君文定所藏也牛涉者一卧者三顧其子若相語者一齕者二俯首而受跨者一喜而相嗅嗅而仰視者二大小凡一十頭其色同其自適之性亦同牧有行而牽者有立牛背而涉者有荷笠而跨者有跨而吹笛者有藉蓑棄笠相與博戲者有籠禽者有據牛首而欲升其脊者凡八人其衣服不同而其悠然自得之趣蓋無不同也甚矣哉其善畫也夫當風日和煦之時而自放於山澤之間睹花卉之芬芳逐魚鳥之翔泳人與畜皆樂也非萬物各得其所之謂哉然從而思之凡為守令牧民者有不當如是乎因其所利而利之使自力於畎畝而保其妻子飢而食寒而衣出入作息順其自然之節而無有戕害者焉則為之牧者亦各從容以嬉而相安於無事如此圖之所畫者豈不善哉奈何善牧者之不多見也李君之蓄此周其將玩物以適情也乎其亦興念而至於此也乎若將玩物以適情也則世之所畫竒物異卉可以娛悅耳目蕩惑心志者尚多奚必此哉若其興念而至此則他日典大藩守名郡民庶乎其有賴矣故豫序其上而致豫意焉送李在修序國朝設進士之科以選天下之賢才所以臻道德之隆成仁義之化自科興以來吾郡多士之試於有司者非他郡之所能及自吾郡論之而泰和吉水又非他邑之所能先也今天子在位益重進士之選至是蓋八舉矣而在修亦以明經中其科既榮且幸也又詔使歸廣其學以待用其榮幸加焉在修之來京師主於編修周功敘與豫家對門故數得與在修接於是將行而功敘徴言贈之豫謂進士雖以文章發身非特賴文章以顯也蓋有司以文取之而亦觀其實行焉孝弟忠信恭儉節義斯所謂行也行之不修而徒以文學自足者蓋末矣豫之舉進士不幸而早得蓋未嘗不凛然於此也然嘗思之吾郡之所以重於天下者以前之修此者衆也歐陽文忠公楊忠襄公胡忠簡公楊文節公與夫信國文公其孤忠大節雄文奧學皆天下後世之所仰慕而師法者是皆由科目以進也吾黨小子幸生於是鄉而玷科目之榮可不思繼其萬一者乎今去其居甚邇也考其時亦未逺也風聲氣烈之在於鄉邦者足以感發而興起豫輩當皆勉於是而已矣此亦朝廷所以期待在修輩之意也故因功敘之求而為贈言如此在修其亦有以處我乎哉龍仁安挽詩序仁安豫友也姓龍氏居縣此甘溪少遊鄉校從蕭子所先生受詩經既而以病去及豫來鄉校乃與其妻兄湯君如川遊時見仁安於如川所又豫家墳墓邇其居因數得過仁安家仁安意氣軒豁襟度恬曠言論傾竭無隱情杯酒相對歡如也如是處者殆十年而豫與如川皆舉進士官京師仁安則徜徉里中有良田沃壤課僮奴致力其間客至則釃酒擊鮮歌呼以為娛或登山臨水賦詩吟笑傲然自足也豫與如川聞之常有不可及之歎及如川卒豫再以憂居家嵗時省墓復過仁安道舊故握手歔欷哀如川之不幸又幸豫二人者久而存存而能復合也前年冬豫起復將之京因辭墓過仁安仁安與其子鄉貢進士粲邀豫坐新居飲酒大醉而後别既去而思其髙情雅度常往來不忘也今年粲會試禮部從而問其父之所處又未嘗不羡其優遊之日長而歎豫奔走之易老也孰知粲去未幾而仁安死矣仁安惠足以及物知足以應事才足以有為而潛深伏隩不及顯於用粲方以其家學進將顯矣而仁安乃不及見之豈非其命也夫朝之士大夫多如川故人而知仁安者相與哀惜而形於言粲類次以求豫序夫士之隱處而卒者不少矣率多泯沒而無聞蓋以其人不足以感動於世而又無賢子孫之能彰顯也今仁安才行有以使人哀悼之不已而粲之立身揚名以顯其親於後者蓋未可量也則仁安可謂不朽矣豫素厚仁安而重哀之則安得已於言哉故為序其詩使藏焉王家園王氏家譜序距泰和縣南四十里有地曰王家園王氏世居之以其族之盛也故因以名其地其先云自南富徙來然譜牒喪於兵燹不知其所以徙而豫觀南富之譜亦簡略失詳不知其所以分然王氏之族所與連姻締交者皆鄉里大家則其盛自可見矣豫初識友諒友諒之子遜為邑庠生聰敏而好學與今翰林修撰陳循德遵最相好前輩君子皆以逺大期之及豫舉進士官京師意謂遜且繼顯矣而遜乃以事困卒不得志以死豫深為王氏惜之及來北京又得與富峪衛百户汝霖遊蓋豫連姻尹氏而汝霖尹氏壻也多才有行誼豫是以重之汝霖乃奉其叔父有常命以家譜屬豫序豫重汝霖不能辭夫所謂世族故家者非以其文獻之足徴也乎文獻不足則雖夏殷之盛其禮尤難言之此孔子所以致歎於杞宋也况下于杞宋者乎是以世族故家不可無紀述也王氏之居此二百年其文獻可知矣而汝霖又惓惓於譜牒豈非王氏之賢子孫乎豫聞之古之君子保姓受氏而能不朽者乃在立德立功立言而非詭欺薄惡之可能也詭欺薄惡之習勝而立德立功立言之意泯則難乎其能繼矣豫與為同姓誠願其為子孫皆篤於仁義勉於勳伐勤於文章以繼承其先世之盛則王氏之福未艾矣故書以為王家園王氏家譜序送鄭同知之官序鄭君仲徽紹興諸暨人始由國子生擢饒州通判能廉以律已勤以濟事一州之人皆稱之既滿九年饒人請於有司願得留鄭君有司以法當升卻其請於是饒人皆失望而鄭君遂升懷慶府同知以去翰林修撰王君鈺其同門友也求諸君子賦詩以送之又請豫為序豫未識鄭君而王君為豫誦其在饒事又言其莊重篤實有可稱者誠如王君言則鄭君固君子矣豫何可愛一言夫通判同知所以佐太守者也於一府之事無所不當問然豈獨治事哉化民成俗其本也莊重則足以矯其輕篤實則足以銷其偽矯其輕則歸於厚銷其偽則至於誠既厚且誠則其本立矣事容有不治邪夫今天下之為府者蓋多當其任者豫不得而知也然嘗觀於古矣古之人有以篤厚化穎川惇厚治北海者穎川北海皆大治天下至今稱賢焉蓋誠信既孚則人知親上樂義其效固應爾也然則為郡者豈輕躁殘忍者之所能哉彼輕躁殘忍雖若得志於一時然人之所以應之者亦茍且誕謾而已矣茍且誕謾之習勝則郡安能治事安能立哉宜古之傳循吏者以仁信篤誠使人不欺為貴也鄭君莊重篤實既試於饒而有其效矣今之懷慶其所以為治亦若此而已宜於彼有不宜於此耶豫知懷慶之人蒙其惠必矣豫重王君之言而嘉鄭君之為人故為序以送之鄭君其尚慎其終也哉贈黃汝申歸省序汝申名翰華亭人以明經登永樂十年進士第為江西按察僉事滿九年吏部以其績最升秩第四品需次留北京念其父母相去之久也乃謁告歸省焉其友户科給事中薑士儀屬豫言以贈行昔仲山甫之徂齊也尹吉甫作詩送之褒述其已至而勉進之意寓焉孔子取而列之經今蒸民之詩是也然則贈人以言者固當如是矣且汝申初上春官時豫實與考天下士則固有斯文之契而又江西人庶乎為知汝申者則豫之贈言其可辭乎汝申闓敏而有為強毅而能斷其心之所存蓋以摧惡佑善為務凛然名震當時凡其所臨凶狡猾賊之徒望風震懾及其至也談笑而取之皆不得以幸免至於巨姦宿蠧則必窮其窟穴蹶其根株而後已故為善者有所恃而立為惡者有所畏而改非詩所謂不茹柔吐剛者乎豫嘗聞之鄉人長老言前乎汝申而能此者鮮矣及汝申之去也惡者肆善者浸無以自立大夫君子有不能已於思者以豫廬陵觀之則凡他郡可知也抑嘗考之詩而知仲山甫之所以賢蓋曰柔嘉維則謂柔而適乎中也柔而適乎中則固勝於剛而過乎中者矣又曰古訓是式威儀是力謂其有是德而又勤於學問篤於進修如此此其所以當大任也汝申之仕其效已著於江西今位既進則於當大任也有日矣其尚以詩人之所謂者而加之意焉何古人之不可及哉故為序如此以贈之使歸壽其親亦足以為親榮而又勉進焉則所以榮其親者又有大於此矣此豫相厚之意也贈盧太守省墓序盧君字玉潤臨江新淦人始為文選郎中豫與之相好其廉慎詳敏非獨豫知而重之士大夫皆然也及豫以憂去而復來盧君已升為杭州知府益有譽於世士大夫皆以為盧君嘗處銓曹之重已如此其於為郡蓋宜其然矣今年以考績來北京於例當得升而以去墳墓之久也乃謁告歸省焉其嘗與同列之賢鄭君文實畢君昌求豫言以華其行夫天下之布政司十有四而浙為稱首浙之大郡凡十而杭為第一蓋民物之富庶莫如杭而事之繁劇亦莫有過於杭者豫嘗訪夫昔之為治者矣蓋慎於行者往往患夫事之不治事之不治則有以辱其身才足以趣辦於一時者則又病夫行之不立行之不立則不徒為民患而辱身又甚焉是以其治之可數者不能多滿九年而去者尤不數數見也以富庶之地有繁劇之政而罕遇夫才行之全者而治之則杭之民欲常如其志以自遂於仰事俯育之間可得哉盧君之治杭也先慎其行而盡心于所當為蓋以其為郎時所自處者而施之既不辱其身而事亦無不治則盧君之才行其賢於人逺矣是蓋杭人之幸也昔者君子之仕也以其道而措之天下及其功成名立則人稱頌之曰此邦家之光閭里之榮也盧君既為賢太守而歸人固莫不以為榮而親戚之歡慶祖宗之慰悅又可知矣鄉人子弟將必有歆慕而興起者然則盧君豈特為閭里之榮而已哉故為序其所以賢者如此以贈之不獨以示其鄉人使人人知所慕也贈劉縣丞赴任詩序尚坦吉水南嶺人世以儒名家在元世桂隱先生髙尚不仕而以文學德行名於世一時賢士大夫如虞文靖公輩皆推重之國朝以來仲瑜先生為國子學録其文亦有名皆尚坦之從祖也尚坦之父子長洪武中以才舉授滎陽知縣甚有恩惠及民後卒於官民至于今思之其先世如此故尚坦能自重以恭慎自持以名節自勵事有悖於禮義者尚坦不為也今年由國子生擢授桃源縣丞人為尚坦卑之尚坦聞之曰官無卑惟以稱為難况丞與有民社之寄果得賢令而佐之使其民皆安於畎畝以樂生送死庶幾乎父母斯民之意則善矣吾方以修職為懼而敢有嘆卑之心哉士君子皆喜其言以為尚坦必能盡其職以惠利其人皆作詩送之其友中書舍人胡淨持以求豫序豫嘗怪夫世之仕者多不樂為州縣而喜為要官是豈有濟物之志哉茍欲馳騁自便而已然所以自便者或反以自禍豫數見之矣州縣之職雖逺於朝廷而親於民民者邦之本也雖事不免於勞費然吾撫之以仁行之以誠就夫事之中而為之擇利焉使不至於大費與大勞而有以自養則民安而本固矣其所建立與夫馳騁自便者可同日語乎尚坦能安於為丞而思盡其心其真可尚哉循良之業豫期於尚坦見矣尚坦勉之贈吕主事序仲賢名獻丹徒人自太學生擢授户部主事當之南京太醫何彥澄仲賢女兄之夫也與豫最相愛求豫言以贈之初仲賢來北京主於彥澄豫數與相見其言談舉止皆循循守禮法豫心重之蓋其父某嘗事太祖皇帝為光祿署正能謹於其職仲賢所以慎於言行非皆傳於師蓋其得於家者然也夫世之任職者惟其才而已矣不必皆仕者之子孫也然為仕者之子孫知其先人嘗貴顯矣則能自愛重其身而思所以不辱焉若是而職有不修者鮮矣故君子尤重之國家求賢任官以興太平之治其立法制設禁防非一日矣為仕者蒙教養之深而膺爵祿之隆當何如用心哉敬恭朝夕盡其職之所當為而措其身於禮法之中斯可矣此固士之所宜務也不務乎此而欲榮且安可得耶今之南京其去此蓋逺矣人之俟之者加察焉以逺故也顔子之嘗飯曽子之殺人蓋自古然矣然則恭敬以盡職禮法以飭身其可不加勉也哉仲賢之先人嘗貴矣宜益自愛重而謹於所務則上有以報國下有以榮身而不愧於為士矣豫素欲成人之美而重彥澄之請故序以贈之仲賢宜勿以為迂也贈張知縣歸丹陽序張君友齡豫同郡友也其始為大理評事以端厚詳慎舉其官久之坐纍謫居隆慶州士大夫皆惜之今天子即位之初下詔求賢左春坊大學士兼翰林侍讀學士曾公子棨即上章薦君授丹陽知縣未幾命下凡以賢舉者必會六部都察院翰林近侍之臣嚴試而後官之其已授官者需其來則試焉而黜其不然者今年張君朝覲來京師吏部舉前令試在優等將復歸丹陽其素與厚者皆贈以詩而俾豫序嗟夫張君其知所以嚴試之意乎夫上之愛民也深故擇夫牧民者嚴嚴試之者慎之也士君子抱才具固將有以自顯而亦恥混於衆人今幸遇夫嚴慎之選此其酬知竭誠之秋也則所以施於民當何如其至邪民者邦之本本固則邦寧令所以養民而固邦本也夫民衣食足然後習於禮義而忠君親上故雖或有勞費於民令必為之委曲區畫擇所以利之者使雖費且勞然猶足以自養而不至於甚病則善矣聖天子在位惓惓愛民慮夫部使者之病民也命六部罷不遣又已逋負停科買凡勞費於民者革去殆盡甚矣仁愛斯民也為令者深體而篤行之則民之受福也多矣張君素端厚詳慎君子之道也端厚詳慎兹又當嚴慎之選而奉行仁愛之施使民利其利而足於衣食民將鼓舞而歌頌之豫與諸公尚傾耳以俟焉故因序其詩而相與道之前賢墨迹序直先考瓊州公最好書得晉人書法臨池揮灑竒逸絶塵於前賢墨迹尤極寶愛及壯遊四方用意尋購於唐得歐陽率更書虞恭公碑內四十一字顔魯公書東方生像贊小字百餘又得遺教經十七行於宋得東坡先生書洞庭春色賦於元得趙松雪簡帖五紙康里子山二紙皆珍藏之間遇知者則出玩焉其後以多故失之今所存者松雪子山各一紙而已永樂丙申先公以內艱起復來北京每言及之則屢嘆以為不可復得洪熙元年乃取於家令蘇州沈毅裝潢成卷而先後失倫毅之能蓋出同輩右而竟以此得官為錦衣衛鎮撫欲令移置聞其頗自重因不復言乃序而歸之家以遺子孫使知前人得之之難今所存者什二庶幾能愛惜也東坡先生常言君子不可留意於物留意於物則若鍾繇王僧虔輩皆足以自禍此言是已然有之而不能存亦不可也尚慎惜之贈曾僉憲詩序復鉉名鼎永豐故家永樂十年以禮經擢進士第太宗皇帝慎於刑罰詔諸進士皆理刑務體有虞欽恤之意於時天下無濫刑而諸進士亦以明慎得名於世久之凡賜進士出身者皆除按察司僉事復鉉之陜西又改四川所至人稱之在四川缺年以憂去官服除改廣東將行其從兄子棨與豫為同官俾贈一言夫以復鉉之賢揚歷之久其於任職蓋如王良造父駕輕車䇿駿馬以騁於九軌之途不足以喻其快且易也而何待於愚者之言哉雖然愚者之慮反復而不已未必無一得也試相與言之夫按察司甚重矣非止於理刑也然人率以理刑視之豫惑焉古之為賢守令者奉法循理以臨民其化行其俗美則囹圄為之空由是論之為守令者果得其人則民皆遷善逺罪雖府縣可使無訟况按察司乎然則為按察司者莫亟於察吏之賢否而進退之也今天下之為布政司十有四而皆有按察司以臨之為府縣庶僚纍百十其賢者固有矣未必多於不賢者也中人之性可與為善可與為惡者相半焉茍勸懲黜陟之典行則中人皆勉而為賢不賢者憚而不敢肆其政平其教施民庶乎化矣不然則相觀而流於惡雖有賢者一二人其所及有限無怪乎爭訟之繁而事愈不治矣豫故謂亟於察吏之賢否而進退之此愚之所得也復鉉之廣東廣東之為府縣者皆賢則復鉉可以無事矣若猶有未賢則於勸懲黜陟之典似不可緩也以復鉉之賢而徒矻矻於聽訟之末以取快一時則愚之惑也滋甚矣豫於復鉉誼不薄故為贈言如此凡賦詩為贈者皆列於下方云宋氏世譜序宋以國為氏周武王滅商而封微子啓於宋宋亡子孫散徙他國因以為氏歷漢多有顯人至宋而真定之族為盛開寶中有景陽者以軍功纍官至節度使平定西南夷詔就大萬谷樂開總管府以景陽為總管鎮撫焉夷人安之遂世有其爵與地歷十世曰賀寶始仕元為軍民宣撫使開治于貴州又三世曰欽以功升昭勇大將軍順元等處都元帥國朝兵入貴州欽遂內附以為貴州宣慰使世守焉蓋自景陽至今尚德十八世矣尚德思前人樹立之不易而冀傳之逺乃作世譜圖又載其德以示後使善繼而永保之此仁人孝子之用心也易師之上六曰開國承家蓋師之終功之成大者開國小者承家所以報之也景陽之受爵土有家于貴州蓋以武德自奮者非幸而致也其延于後世宜矣哉我國家受天命一海宇凡郡縣皆置守令惟西南夷則因其帥長以撫焉以其先世常有德於斯人而人從之庶幾其得所也當時奉命守土若宋氏者非一姓然四五十年之間敗亡相繼子孫之不肖不思前人樹立之難而縱欲以逞安得不及於禍哉自古有家者皆欲相承於無窮然其傳世之久近必視其德之有繼與否宋氏傳十八世幾五百年而猶盛其世德之積可知矣豫聞尚德忠敬以事上寬惠以撫下其言動必以禮其教諸子亦如之宋氏之德又有繼矣慶澤其可窮也哉後之人觀是編者益思繼續而引長之雖百世可也尚德因豫友貴州按察僉事郭公緒以首簡屬豫豫深嘉其意而序之送劉憲副南歸序正統十年六月四川按察副使劉君鼎貫考績來京師言於吏部曰鼎貫由御史為副使又九年荷朝廷之恩厚矣愧不能報萬一今年六十二精神日衰齒牙脫落鬚髮無一莖黑者且耳目聰明十已減六七心復多忘足不任勞欲勉強從事則揣力難堪將竊祿曠官則於義不可按令凡年未七十而病不能勝任者皆得致事敢以請吏部以其方面大臣且課績當升不之許鼎貫遂請於上詔吏部驗之吏部察實以聞乃令致其事而去夫君子之仕也必思盡其職之所當為而不顧其身是故夙興夜寐勉焉忘其力之勞而不使有毫髮之不盡為臣之義當然也不幸而衰且病欲亹亹以圖厥功而力不如志進不能自效以有補於時退不能自安而有忝于位然猶眷眷不去揆之以義其得為當否乎聖人在位而知其然矣於是有休致之令使年雖未至而病及之者皆得以遂其安適其情此如天之仁曲成萬物而不遺者也臣行義君行仁上下交盡其道雖唐虞三代不過也於乎何其盛哉劉君以詩書之胄取進士任風紀揚歷中外三十年其譽望之重功業之著固已表表動人矣庶幾義之盡者乎今非茍圖自安迫於衰病而然也皇上深仁厚澤沾被若此則衰病之軀辟之嵗寒松柏風霜凌厲之餘而獲承雨露之潤將欣然勃然而復於榮茂未可知也與君厚者皆喜君之歸作詩送之從弟儼以進士第一為翰林修撰持以屬豫序豫與君最故而年加長疾加劇然無以報上恩不可以遽去曠官竊祿蓋不勝其愧也故因序其詩而自訟焉天台齊氏族譜序天台齊氏族譜兵部主事汪之所輯也齊氏本汴人從宋南渡遂家于杭州其後又徙台州兵燹相仍譜牒亡失先世之閥閲名績無所考見其後有八十宣義者喜天台山水之勝始定居焉今譜遂以八十宣義為始祖其前之不可考者皆闕之所以傳信也宣義生千六府君仕元為寧海副尉生二子仲華仲傑國朝洪武中仲傑子莊卿以耆儒徴為房縣令孫彥德舉明經為安慶府學訓導而仲華之孫執中亦起為刑科給事中汪則房縣之曽孫正統丙辰取進士官兵部有名于時自宣義至于今蓋九世矣其初一人之身歷三四傳子孫浸盛以文學躋顯庸者愈久而彌昌非祖宗積德之厚豈能致哉譜之作所以著其本聯其支尊祖敬宗之道存焉詳其所可知而闕其不可知此作譜之法也然世之作譜者多喜泝流尋源以極於受姓命氏之初祖自謂能詳矣而牽合傅會以自誣惡在其為尊祖敬宗也哉齊氏之先有譜牒遭亂失之今始於宣義而録其所可知不強引旁援以自誣是所謂尊祖敬宗者也其用心賢矣哉故家大族必由祖宗德善以啓之子孫務善以繼之是以能久而盛也二百年來齊氏日以顯大則啓於前與繼於後者其善可知矣孔子曰積善之家必有餘慶積之云者纍進而加厚之謂也父子祖孫相繼無窮詩書禮義之習仁義忠信之行亦相續而無間則足以亢其宗而光榮碩大有已哉雖至百世未艾也齊氏子孫宜益勉之故書以為之族譜序菊窗十景詩序草木之類皆稟天地之氣以生而其質不同君子好之豈曰耳目細娛而已哉蓋以適夫性情之真云耳晉陶淵明獨好菊而濂溪周子則愛蓮花此其中蓋有契焉也後之人而同其好其亦庶乎古之人也哉永新尹祥兆吉以明經取進士為行人既滿超拜兵部職方員外郎政事之暇以植物自娛公署窗前有隙地取菊數十本種之名曰菊窗菊蓋其所最好者也然以為未足又取玉簮芙蕖諸物凡八九種列蒔焉舒翹揚英各以其時兆吉稍間即與賔客觴酌乎其中因景物之勝命為十題曰金菊凝霜玉簮映月枇杷晚翠芍藥春紅細栁垂絲踈篁戛玉紅蓮擢秀翠柏連隂石笋蒼蒲盆池赤鯉酒酣興作賔主各賦一章間歌以相侑悠然甚樂也及來北京請於名卿大夫曰古之人有云物不自美因人而彰祥願假寵於下執事諸公皆欣然為賦之詩既完持以屬序夫君子之於物豈徒悅乎外欲有以資乎內者進德之助也茍有以資乎內斯得以悅乎外矣古之君子有屈原者以衆善治其身而每託喻於芳草其詞有曰合百草兮實庭建芳馨兮廡門言衆善積於中而美見於外也兆吉之所植者衆矣幽貞芳潔足以擬德者其取以自資荏苒柔弱而不能久者則否焉夫如是兆吉之進於德可量哉不然則彼之可悅者物而已於人何與焉書此以為詩序其亦有足取也夫楊氏族譜序昔者少師楊公之修族譜也最為詳慎因族父與芳甫所輯之舊而補其闕遺有未能詳者仍闕之示不茍也譜成以授族子德敷而告之曰楊氏自宋以來積德數百年子孫蕃衍支分𣲖别至不相往來故譜所載有上失系屬下失其所繼者吾未能盡詳也且詩書之澤未艾後嗣當益蕃續而書之皆爾所宜留意德敷奉命唯謹積草年參互考訂增補其未備凡族屬子孫皆取而録之其闕而未能詳者仍闕焉猶公之志也書既成而少師公捐館已二年惜其不及見之乃持來北京屬豫序楊氏自南唐虞部侍郎輅始家廬陵郡中四世延安又徙居上徑延安孫允素乃徙泰和世以宦學顯聞後十七世有三人者聯貢于漕同授登仕郎聲稱赫奕楊氏之一盛也繼而吟窗先生纍官至翰林待制有傳在國史又歷三世而至少師公其爵位之尊德望之重文章之妙誠所謂邦家之光豈特楊氏之盛美哉而猶惓惓於譜牒以著其本聯其支此仁人君子尊祖敬宗之道也夫故家令族之所以光明碩大而不至於泯沒無聞者以譜牒傳焉耳然所以光明碩大而不泯蓋有在於譜牒之外者昔晉范丐自以保姓受氏而世守其祿足以不朽矣魯叔孫穆子乃謂在於立德立功立言而世祿不與焉蓋德充於已功施於民而言可以為法戒人將百世仰之斯足以亢其宗楊氏之子孫尚勉之如是則光明碩大有已哉德敷明經取進士今為大理評事續著此譜以成公之志其賢可知矣豫是以重之故為序而不辭南溪蕭氏房譜序南溪蕭氏楚軍巡判官覺之裔軍巡避難自長沙來奔居泰和之早禾渡子清卿徙瀘源清卿後三世曰演生四子其長曰大承事始徙居南溪大承事三世曰濟行生三子堯卿舜卿漢卿舜卿生祥甫祥甫又生五子德髙德明德仁德美南山德明子信可早卒而以弟南山為子從元俗也嗚呼兄弟之倫天序也曰弟而子之不謂之瀆倫可乎復而正之禮之善者也正之而或有違言則將遂已乎已之非禮也於是而各尊其尊此房譜之所以作也作者皆南山之後故於南山不書名與其子蘭谷皆以號書所以示尊也尊祖敬宗亦禮之宜也蘭谷生三子自新自明自成自新生鵬起鵬舉自成生鵬南鵬翔鵬漢自明繼信可無子而復以鵬起繼之於斯之時蕭氏為最盛蓋仁聲義聞表然為望於鄉邑非但資産之富也歷三四傳子孫日益蕃昌皆具載此譜而他沠不與焉永樂初豫在翰林鵬舉先生以山東運副考績來京師豫始克識之蓋淳然古君子也及歸而從鵬翔鵬漢甫遊皆藹然孝友之行而房譜實自鵬翔甫作之超然逺識不泥於常見而得以伸其尊祖敬宗之心可不謂賢矣乎今鵬舉先生之子孟勤入翰林為侍讀孫彥清為國子助教鵬翔甫之子叔章鵬漢甫之孫銓皆以明經為縣學訓𨗳衣冠文物之盛他族罕比不特蕭氏之異派也黃太史謂沖和之氣在此一枝是固然矣然非詩書之澤浸灌涵養之深亦未之能也蕭氏之子孫尚勉之庶乎百世有耀矣今侍讀之兄孟廉命其子彥澄增修此譜而以求豫序孟廉忠厚君子也其可辭故為序之以勸來者友竹軒序并詩廬陵周仁俊豫友工部侍郎周公長子也仁俊最好竹所居山前有地皆種之蓋左右前後無非竹起居食息亦無往而不見竹者仁俊喜曰此吾友也因以友竹名其軒或者曰人之與人類也君子以友輔仁仁俊不取之人而乃取於竹豈以人為不足友邪其亦異乎古之君子也矣豫曰仁俊蓋所謂善於取友者也廬陵文獻之邦習詩書談道義者所在皆是仁俊出而求之直諒多聞者皆仁俊友也所得不既多乎然猶以為未足而於竹友焉其意以為交於外者固多矣退而休於家則豈能無少間哉竹朝夕所與處者也師其心之虛足以納善而不違師其節之徑足以臨事而不撓貫四時傲霜雪而柯葉不改色不變又足以勵其德之常便佞善柔之輩豈足為損哉出而友當世之善士歸而友於此君仁俊非善於取友者邪仁俊父母皆壽考光榮兄弟盡友恭之道一門之內食者常五百餘指小大雍睦無間言又非唐之所謂義竹者比邪以是而觀仁俊之友竹蓋詩人託物自况之謂君子之所與也然則仁俊蓋賢矣奚名為異哉仁俊侍父來京師善畫者倪端為圖其景而以求豫言乃為序次其説而系以詩青山盤回氣清淑山下髙門圍大屋中有幽人好隱居種得篔簹美如玉繞屋翛翛清絶塵間居無事長相親虛心徑節可比德古來三益皆其倫人生結交端有道薄俗紛紜豈堪保東風桃李競芳華頃刻飄零在泥潦此君挺挺千萬竿霜雪那知有嵗寒長梢密葉青滿眼莫惜焚蘭朝暮看倪端作畫衆所欲喜向髙堂見橫幅愛爾存心似古人為作長歌擬淇澳安成路氏族譜序譜之作所以著其所自出而詳其所由分使為子孫者知本源之盛而思善繼於無窮乃尊祖敬宗之道也有唐以來故家大族莫不以譜牒為重蓋文獻之傳有徴於此其可不重乎安成多故家湖溪路氏則漢臨淮守溫舒之裔溫舒家巨鹿至唐冀國公嗣恭始家平陽冀公之孫隋以太子賔客分司東都又徙汴梁在元之初文林受命為安福知州有惠愛及民卒於官子仲明因家安福之東門四世至英叔值元季之亂避兵廬陵亂定子文明歸安成寓居邑東之梅林再徙井溪三遷湖溪遂為湖溪路氏至于今九世詩書行誼猶不失前時之望初英叔嘆舊譜燬于兵而幸存文林所録世次命子誠明纘輯成書自安成泝汴梁以及平陽巨鹿皆通録之明誠孫世昻與從弟世清又增修之而自為之序循源泝流粲然明甚世清子璧字裴資為工科給事中復以父命求豫序惟路之受氏蓋有國者之子孫其先既盛矣至臨淮而顯於漢冀公父子祖孫又大顯於唐自州守至今給事則又一盛也非本源深厚豈能是哉然豫聞之晉范宣子自謂陶唐之後歷虞夏啇周千數百年而世祿不絶魯叔孫穆子乃謂可恃以久存者在於立德立功立言而世祿不與焉自路氏論之臨淮尚德緩刑之書蓋久而不泯冀公初宰邑當時謂可以嗣魯恭庶幾言立功立者矣若又充而大之始於孝弟而至於仁義不可勝用卓然為望於天下可傳於百世載之譜牒豈不光逺有耀哉故為之序而舉以告其子孫是亦愛厚之意也慈溪王氏族譜序慈溪王氏族譜始作於伯輝先生蓋舊譜亡失不知其所以徙其居慈溪者則自萬五府君始也由府君至伯輝僅六世而已失其名諱伯輝之髙曽雖近其名諱亦無所考譜牒之亡失甚矣其可嘆也伯輝作此譜雖未能詳於其先然自此而録之至於數十世蕃衍碩大足以考世德之盛則此譜蓋權輿也世之作譜者多好強附他族之顯者以為榮是乃所以自誣不足傳信於後世君子恥之伯輝作譜録其可知而缺其不可知不肯妄引以自誣其用心厚矣哉伯輝字尹實親從兄弟十九人而伯輝為中書舍人以善篆𨽻名天下弟尹和為金溪令尹哲為石城令皆有名績尹和子來字原之始為監察御史升山西參政改廣東弟復為刑部主事鼎為慈溪訓𨗳文學政事表表皆在人耳目何王氏之多賢哉自古受姓命氏其始皆一人之身至其子孫愈久而愈盛蓋有德以啓之而又有善繼之者也王氏自萬五府君以來子孫之多且賢又貴顯光榮如此非其德之盛豈能致哉豫與原之相好久矣知其才行之美足以亢其宗王氏之盛未已也要在後之子孫善繼之而已原之持此求豫言故為題其後以致期望之意云龕溪劉氏族譜序龕溪劉氏漢長沙定王發之裔其後有世隆者徙居安成之章湖至孫成髙又徙白下之淇泮塘宋乾道辛卯天祚乃徙今龕溪為望族歷三四傳子孫彌盛而華翁最富饒自縣郭以西至其鄉良田深池大抵多翁之業也翁性仁厚樂振施鄉人之貧者皆賴焉就其居以安仰其衣食以自給者又三百餘家凶年飢嵗有告糴者翁必減價與之自逺來者則又給道里費作梅陂以灌田逺近受其利皆歌頌焉治園於宅之東雜植花卉居間無事日與族人賔客觴詠其中甚樂也至子夀可而益盛壽可二子長子堅力學喜吟嘗有志於用弗果出而好仁急義出於天性萬安梅田嘗有寇竊發朝廷用兵勦之子堅曰地與吾境接不可使蔓延汙吾縣即自詣主帥申國公閫下辨之公韙其言縣人得不受汙弟仲堅亦端重果決似其兄而凡羣從兄弟亦皆能自立異常人則其世德之積可知矣子堅三子彥威彥忠彥明今皆居蜀之鹽亭仲堅二子彥桓彥湘又龕溪之傑也彥湘重修族譜自天祚而下凡幾世支分𣲖别粲然明甚尊祖敬宗之心厚矣豫生也晚不及見其前輩長者風流文物之美而幸獲交彥桓繼而與彥湘通婚姻二君皆謹厚君子也今彥桓不可作矣而彥湘以譜序屬豫豫安得辭豫聞昔之受姓命氏皆有爵者之子孫前有德以啓之而後能有繼則久且盛可必也陶唐氏之後封於劉劉纍事夏孔甲為御龍氏在商為豕韋氏在周為唐杜氏其仕晉者為范氏然皆纍之後也范宣子自謂世祿之盛可以不朽矣魯叔孫穆子乃謂不朽在於立德立功立言則劉氏之子孫欲繼前人之盛者可不思卓然自立乎孝弟忠信其本也德立矣而又有功以及人有言可以為世法則其族之光明碩大可以世計哉彼勃然而興忽然而泯沒與草木同腐者不知所以自立也豫序此譜而舉宣子叔孫之言蓋劉氏之故實而為子孫者所宜勉之故云耳贈都指揮僉事陳侯序國朝既建北京以為萬方會同之都而通州實邇京邑為重地蓋舟車之會水陸之交天下之人不間華夏蠻貊凡東南數千萬里有事而來者必由乎此若貢獻之轉輸漕運之委積居民卒伍之櫛比賈區商舶之鱗次不可以數計其物盛人衆如此故常置兵衛於其地擇武臣之有才智知大體而善撫馭者總焉必使人得其所而不失宜定邊衛在通州開封陳侯信為指揮使久以才名聞于時監察御史髙峻以為可用薦之上從其言特敕以總督之任侯殫心盡力祗慎不懈事治而人安之既三年御史張鑑復言其處心正直涖事克勤上命署都指揮僉事未幾太監李公及户部工部皆言其任總督有餘暇若委以他役可不勞而辦於是命同修永通橋造通州諸城樓治通濟河諸斷岸皆克成功開平忠武王故有廟在通州久而頽敝至是亦以委焉不數月而訖工上念其勞真拜都指揮僉事所以報舊績而勉新功也天之生才蓋以資用而治天下者亦必用天下之才而後能成厥功然所以使之趨事赴功而亹亹忘倦蓋有其道矣賞罰者天子御世之大權也有功必賞則誰不競勸以效其績使人皆競勸以效其績則天下豈有廢事哉夫賞以勸功者明天子之事受賞而益圖其功者大臣之忠也今陳侯之功美矣其才智之過人亦可以見矣然為臣之所務不止此也敬恭朝夕視其職之當為者而盡其心功愈髙則上之所以報之者愈厚爵祿之來其孰能禦之此在陳侯勉之而已陳侯來謝恩闕下凡與之善者皆深以為榮而思所以華其歸工部侍郎王君庭佐求贈言於豫故為序以送之贈少卿鄭君序正統十二年八月南京太常寺少卿鄭雍言釐務巳六載而以考績來朝直待罪吏部言於上曰諸卿考績序進惟明天子所裁非有司當議今其秩未滿應俾任職如故上從其言鄭君將南還豫同僚趙公曹公相篤交好求豫言以贈行豫於鄭君亦不薄昔永樂十三年太宗皇帝臨軒䇿士而鄭君奉大對豫忝讀卷得鄭君䇿以為竒奏之鄭君在進士優等遂入翰林為庶吉士由是連歷清貴擢中書舍人行人司副升河南按察僉事當之官近臣有言其文學可用宣宗皇帝留不遣俾與尚書陳山等日在殿廬備顧問久之乃得赴河南秩滿於是有少卿之命夫自鄭君取進士歷官至今三十餘年而同朝者二十餘年斯文契誼不可謂不久矣今之去可無一言為贈邪况重以趙曹二公之命乎夫贈之為言有所增益之謂也鄭君之學既足以成美名至顯位矣豫言何能以加毫末哉然觀蒸民韓奕之詩皆尹吉甫作以送樊侯韓侯者其曰小心翼翼古訓是式曰夙夜匪懈虔共爾位蓋美其已能而勸勉之意寓焉古之君子贈人以言而不外乎敬非以臣道止於是歟太常典祀之職也鄭君之行可以交神明則其能敬可知矣要在恆久不渝而已傳曰敬德之聚也能敬必有德書曰德懋懋官鄭君益勉之其進於福祿榮名可量哉彼宦成而怠者君子不貴也用是以贈行其亦古之道也歟送郭珦訓導序泰和北門郭氏詩書之家也豫生也後不及見其前輩文物之盛洪武初有慶守先生者以文學德行為人師官至登州府學教授弟慶宜先生與豫先考尚書公同聘起論治道為湖州經歷經歷子彥鉉為縣學訓導豫所從遊者亦纍官至順德教授先公守瓊州時順德弟西字彥遷任推官為同僚而登州之子彥常英偉豪邁有才識逹政務故少師楊先生嘗欲薦之以病不果其子公緒取進士為按察僉事歷陜西浙江貴州皆有盛名其他為教官者亦纍纍相繼珦則公緒子也又以明經舉得衡州府學訓導將之官請豫一言以自勗念豫父子交郭氏數世不可謂不舊矣而公緒昔與豫同遊縣庠最相好豫視珦猶子姪也不求豫言且將進而告之况其請之煩邪夫治天下者必用天下之賢才學校養賢才之地教官成賢才之本也其所以成之者豈止文藝之末而已哉讀書以求道明道以飭身孝弟忠信禮義廉恥皆深體而力踐焉如是則言非空言行皆實行任之以政而治道盛矣然非教官身有之而欲為弟子者效焉亦難矣故曰以身教者從珦之去也可不思所務哉今天下賢才升於大學而用於吏部誠才且賢者固有矣其不然者不可謂無也蓋於其末且未至况欲求其本邪用人之難教道之不立未嘗不愧且嘆也故凡為教官者必相與切言之况珦也哉讀書以求道明道以飭身修其本以率之本立而效見矣珦毋以已能而自足也言之切者愛之深珦其勉之甘溪龍氏族譜序泰和甘溪龍氏為大家其先金陵人唐末有判吉州曰淵者始家永新後若干世曰訥又自永新徙泰和縣城六世至時升始定居甘溪然尚有居縣城者時升後二世曰某生五子登騰際某澄登舉進士為廉州推官通判衡州騰亦舉進士授修職郎仕至南安知録際為臨江教授某與澄皆未仕龍氏於此為最盛然某及三世則闕焉今溪山之間室居相雄髙衣冠相照映詩書之聲相聞於旦暮田園池沼彌布於逺邇皆四子之後之業也其居縣城者則際之後徐溝教諭仲章豫不及見其人而嘗過其舊宅廣宇豐堂長軒嶢榭可比子男邦君之居又觀虞邵菴所為謹敕堂記及諸老先生與徐溝往還之什未嘗不嘆其盛也既而與樂山君遊其子禮部主事叔粲孫吏部員外郎士郁相與連姻且同朝員外之兄士熙亦以明經任訓導仕者既有爵祿光榮之美其未仕者亦享豐亨和平之福此又能氏之一盛也夫人事之盛衰不常要之以有德維持之則衰可盛盛可久孔子曰積善之家必有餘慶龍氏之慶澤如此非積善豈能致哉族之有譜所以著其所自出而正倫理篤恩誼倫理正恩誼篤仁義之道行焉由是推之以及於民物仁義不可勝用也德莫大於是龍氏子孫世篤而不忘則蕃衍盛大有已哉士郁重修此譜而以求豫序故為序以道之送陳太守致仕序陳侯本深之治吾郡十八年矣其始為刑部員外郎以賢舉陟為郡其心之公政之平斷獄之明恕待人接物之仁而有禮他之為郡者鮮及也是以名實蒸然於上下既九年郡人不忍其去相率乞留藩憲大臣及御史具以聞上從之增其祿秩俾復任而侯之所存所行率如舊不變一郡之人益安於其治今年朝京師懇以老疾乞致仕蓋侯素有目眚至是頗甚且年六十有餘矣而其身癯然若耄及焉者豫重惜其去勉留之而語益切衆察其實老病不可強乃列言於上俾致事吾郡仕者皆不能釋然于懷曰侯之去於私計便矣如吾郡何侯在位久於民之情偽靡不知事之難易緩急靡不熟故言出而民信小大之務皆有條理爭訟者折以一言多心悅誠服而罷今侯去矣後之繼者雖聰明才智不一二年豈能諳練而為民所信服如此則人之安否郡之治與不治未可知也然既末如之何則皆賦詩餞行以道意而謂豫宜序豫亦不能釋然于懷者念古之君子壯而仕老而歸乃人情之常公義之所與也况又加以病乎豫豈可私吾郡而違人情廢公義哉今之為吏據偏州下邑得終三年幸矣歷九年而無慊又幸也陳侯治郡十有八年譽望如一日才行之美足以為之也而昧者乃以吾郡為難治不自計其如何於乎豈真難治哉觀於陳侯可知矣故又因序而道之非獨以示其鄉人且欲傳諸逺使知陳侯之賢而信吾郡之易治也貽安堂詩序貽安堂詩若干首士大夫為吾邑蕭公北作也蕭氏昔居江南市以寫真得名久之生齒日繁而地不加闢公北父于淵慮後之人益衆而勢益疏利害相刑愛惡相攻將不能無彼此言者如是而欲安得乎乃作室於泉谷而徙居焉距舊居蓋二里許曰使吾子孫安於此而親屬之往來亦不廢豈不皆安且樂哉因名其堂曰貽安之堂公北挾其藝遊京師名公貴人多命寫真而皆得其形似京師畫者莫不讓其能諸公亦無不愛公北者故皆樂為賦詩而貽安之堂寖聞於天下豫同邑人交其父祖數世矣於是公北遂以求豫序豫觀古人之營居室皆欲燕及其子孫斯干之詩可考也然其所以安則於首章見之安與否未有不由於兄弟相好而不相謀此致安之道也不然則同氣之親且不保况羣從兄弟乎然則于淵名堂之意其示訓深逺矣公北兄弟顧名思義而篤於相好羣從兄弟又相與惇睦而無間則外侮敢及哉子孫世篤而不忘則其安居樂業有已哉豫亦愛公北而欲其安且久也故為序其詩而道之陳都御史壽詩序國子助教姑蘇李先生言於豫曰右都御史陳公有戒以洪武已巳三月初十日生至今正統戊辰年巳六十矣在朝之賢若毗陵胡公海豐王公宜章鄺公山陽金公輩皆與公相厚喜其甲子一周而願其壽之永也相與賦詩以致祝望之意繼公鄉人也謹類次成軸求先生一言辨其端夫古之君子於其所親厚者則必以壽祝之壽五福之首也有壽然後能享諸福祝之以壽則福之萃於已者斯悠久而無窮此蓋親厚之至也然人之壽考系乎天非可以茍得也必有世德之積而又修德以繼之然後能得其壽此天所以彰有德也豫聞陳公之尊府昔以軒岐之道鳴於世鄉郡之人皆賴之慶澤之積也深而公能承之以德遭遇聖明恩寵優渥由監察御史三遷至今官出入中外宣布天子仁義之德威行惠施近悅逺懷表然為當世大臣宜其得壽於天諸公願望而形於言豫為序而傳之皆宜也抑嘗觀夫南山有臺之詩宴享通用之樂歌也於其心之所敬愛者既以無疆無期祝其壽矣而又願其德音不已德音是茂至於保艾爾後乃已焉蓋德者壽之本夫既得其壽矣然進德之功不已而益盛則足以保養其子孫而後為福之全周之詩人善於頌禱如此諸公之意蓋亦猶是也今天下太平民物阜安列聖休養生息之恩一切不異於周之盛世耄期之老所在有之然樂其壽康而形於歌頌以鳴國家太平之治以繼成周小雅之什蓋不可無也然則諸公之詩豈可以不傳故樂為之使傳焉泰和彭氏族譜序吉安之彭為大姓蓋出吉州刺史玕子孫之多散處者數邑凡十餘族雖隱顯不同然皆係前人之望而皆能有所立豈非其世德之盛歟泰和彭貴和修其族譜逺泝于玕而近考諸族蓋一本而分者也今年來北京求豫為序而其所為譜不以自隨豫不能見然嘗思之古者受姓命氏皆有爵者之子孫自商大夫以來蕃衍盛大散布於天下蓋以一人之身而為千萬人之身究其始而論之玕亦其所自出也自玕以至貴和未久也其傳序可知矣惜豫生也後不得聞其世之詳嘗從今少師楊先生而聞其略矣洪武中貴和之祖雲祥質厚簡靜而其父學孔頴敏負才具足以有為於世嘗禮致東里先生于家使貴和與兄貴雅弟貴肅貴彥皆受學其所以事師甚厚而教子孫甚勤故貴雅貴和貴彥皆才智偉然逹於物情而明於事幾頴然見重於鄉里貴肅尤好學其學可以及人嘗有薦為學校師者貴肅不就也沉靜以自處不求聞於當世其祖考兄弟如此斯其為宗族之重歟譜之作所以收族也而仁義之道行焉蓋正倫理而尊卑之分明篤恩誼而彼此之愛洽是所謂仁義也仁義行而宗族和宗族和而福澤增則安得不昌且大乎然所以明於仁義而不悖者學問之力也貴和子孫尚勉於學問而篤於仁義則刺史之榮將必有繼而為此譜之光華也有窮哉抑菴文後集卷十七
