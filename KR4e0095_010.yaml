body:
  text: 抑菴文集卷十明王直撰墓銘户部右侍郎吳公墓志銘吳氏世家邵武之隆賢坊其先多不仕公之祖均用父仲政皆有德誼以公貴皆贈嘉議大夫户部右侍郎公諱璽字信玉生有美質自幼端厚不與羣兒戲屹然如老成人鄉先達皆器重之甫弱冠逰郡庠受春秋於方先生嵩先生嘉其頴敏盡以所學授焉永樂戊子試藝鄉闈在髙等明年會試不偶於有司遂入太學太學諸生有文行者皆樂與為交其學益進歷試於兵部又以精於吏事得名擢為武選主事時錢塘方公賓為尚書最嚴察難事而獨竒公公丁外艱去方公以公才行言於太宗皇帝詔奪情起任事或謂公如何及觀其所行與他人所行有疑者咨於公公裁決無留滯而皆慊於人心莫不帖服甲辰升武選郎中兵部惟武選最難治公初為主事同列已推讓其能至是而能益顯士大夫論可大用者皆屬意於公宣宗皇帝知之宣德庚戌升行在户部右侍郎公感上知遇祗慎不懈於夫所以足國裕民者蓋無不用其心正統已未徙內庫勑都知監大監洪保魏國公徐顯宗與公理其事庫物以巨萬計二公重臣多憚煩一惟公是賴公亦以身任之纎芥弗遺人尤服其能壬戌之秋外夷來獻馬邉將請增騎士以示威上臨朝問户部馬之來幾何邉將所乘幾何日用芻豆當幾何今邉兵所積總為數幾何果能不窘於用否尚書侍郎倉猝未能對上以為不恤國事謫威逺蓋欲磨厲以進之也公感恩念咎惴惴不自容曰臣實負國罪當死荷聖德如天曲容之敢不圖自新冀少報萬一士大夫惜公之才者亦冀公且復用謫二年而以疾不起豈非命哉公生於洪武戊辰十二月戊申而以正統甲子二月乙已卒享年五十七初娶黃氏先十有七年卒贈淑人再娶王氏封淑人生男皆不育有女一曰宜弟尚幼豫與公同朝且久實相知而公亦辱愛豫今王淑人以公之柩歸卜以某年某月某日葬於其鄉某山之原鄉友監察御史曺泰狀其行大宗伯胡公嘗兼理户部厚於公謂豫宜為銘嗚呼豫豈忍銘之而亦奚可不銘乃為銘曰文場髙薦要塗闢優遊郎署煒厥績超佐司徒聲孔碩今其逝矣吁可惜作銘垂休示亡極黃公有恆墓志銘公黃氏諱常字有恆其先居豫章祖均恕為瑞州高安縣典史因家焉考夀卿洪武初知厯城真寧二縣升松江府推官以親喪起復違期謫安慶公從之故遂為安慶人松江既去位即戎公朝夕左右順適其意衣服飲食之奉賔客往來應對酬酢皆中節故其心歡焉不以謫居為戚者以公之能為子也安慶古重鎮兵民雜揉四方大夫士及商旅貿遷多留寓其處城南門外瀕江為市上下十數里最號繁富而石灘當其要公作樓居之前臨大江後背城市閉門靜處喧囂之聲不聞窗户玲瓏几案淨潔置書數十卷暇則啓而讀之考古今窮義理其性淡然一不為侈靡傲放事接親戚以禮交朋友以信平居教子孫必使讀書為善與人言亦必以孝弟忠敬為本人無少長愚良見公者皆稱為先生而不名生於元至正己亥四月草八日而以今正統癸亥四月初四日卒年八十五娶鄉邑劉員外之女有賢行先卒子男一曰紹宗亦先卒女一嫁張如海孫男一曰瑒女二昔豫先公侍郎亦嘗居安慶公從逰且久豫以其故知公往年丁內艱服闋朝京師訪公於石灘公請豫坐樓上舉酒觴客憑檻而觀之大江西來羣山東下數百里間景物之勝一舉目而盡得焉因名曰勝景樓及豫至京求諸賢為賦詩以寄公公大喜曰吾樓有名於世矣相去草餘年每念及公未嘗不為慨嘆抑豈知公遂為千古之别哉瑒將以某年某月某日葬公於懷寧縣淥水鄉陶家沖先塋之次自安慶暑行月餘至京師謁豫拜曰瑒黃有恆孫也先祖病時遺言屬瑒曰吾辱愛於王公大人其為人銘墓多矣葬我而不得公銘猶不葬也汝以吾言往請焉宜必與瑒是以來惟大人憐而賜之銘則死者有以慰悅於地下矣豫既悲公之亡而又喜瑒之孝則奚可辭乃為之銘曰篤於親謹於身善以及人而樂其真歸安于兹利爾孝孫昭德有文百世其存都指揮僉事陳公墓志銘公諱儀字叔度姓陳氏廬州合肥人故奉天翊運推誠宣力武臣特進榮祿大夫柱國平江伯追封平江侯諡忠襄諱宣之子也母夫人湯氏曽祖諱重一不仕祖諱聞官至成都右衛指揮同知以忠襄功皆贈榮祿大夫柱國平江伯妣皆贈夫人公自少端重謙和無綺紈之習好文章喜韜略務窮其所至欲以自立於世當時論勳臣子弟有文武才具者必稱公永樂中宣宗皇帝為皇太孫詔選良家子入侍公與焉上雅知其才特見親任有所顧問必盡誠以對漢王蓄異謀公亦數言其姦狀上臨御之初果反凡其所言皆有驗及事定以俘獲賜羣臣公得與公伯等蓋異恩也車駕巡邉出喜峯口公以驍勇選在前適敵人犯邉摧敗之多所殺獲其後屢出巡邉公皆扈從有勞績今上嗣大寶位求文武才賢將用之成國公朱勇等交薦公詔大臣試所業公言出竒制勝之道皆傅以古兵法及觀其騎射從容上馬引弓連發中之諸軍皆大呼稱快同就試者皆自以為不可及遂擢為勳衛日帶刀侍從益以忠謹見稱衛拉特使來朝貢將歸豐城侯李賢受命率兵送之言於上曰今兵逺出慮或有緩急願得勳衛陳儀者偕往可計事上即命與之俱出塞二千餘里而還塞北多爾濟巴勒擾西鄙公上言請於寧夏甘肅簡精鋭俟春暖俱發諸道並進且先約衛拉特相特角殘冦破敗之餘必就擒戮此萬全計也上然之正統五年麓川叛上命定西伯蔣公貴兵部尚書王公驥往討之公亦在行明年抵其境蒲羅諸蠻作亂道梗不通公率衆直搗巢穴擒其首惡殺數十百人諸蠻遁走師遂進招降鎮康州陶孟刀門捧殺敗賊黨刀賴燕刀門顛等功居最升錦衣衛指揮同知其冬攻克戛邦永怕孟雷諸寨斬二千餘級又領軍獨進抵南甸所向摧靡駐營馬鞍山下為大軍後援遂以成功師還永昌蔣公王公命為文勒諸石以彰聖德還朝論功升指揮使賞賚甚厚明年復往征師踰貢章功多升都指揮僉事留守雲南積糧治兵為後圖而公乃以疾終正統乙丑四月二十八日也生於洪武甲戌四月初九日享年五十二娶劉氏左軍都督真之女有賢行側室艾氏吳氏子一人祼艾出也女三長適武功右衛指揮使歐陽昭餘在室櫬之還也祼將以某日葬應天府江寧縣大山之原祔於先塋之次其兄子平江伯豫以翰林修撰許彬所述行狀來求銘天之生才固將以為世用安國家撫四夷而興太平悠久之業若公者其人也然而年不永用不極功名不大顯於天下天既生之而乃又嗇之此其意何哉是宜有銘俾永永不朽銘曰平江勳伐偉赫奕篤生令子才孔碩恥學儒迂奮武力思蹂北庭奠西極南征桓桓懋乃績蠻煙瘴霧頓然息亨衢萬里始發迹云何長往吁可惜大山之原開兆域我為銘詩勒貞石揚休述美永無斁吏部右侍郎洪君墓志銘淳安洪氏為大家蓋東晉門下侍郎紹之裔世有聞人宋紹興以來由科第入官者猶纍纍相繼而君之大父文鋭乃不仕父源為教官以君貴贈工部主事母許氏封安人君自少英敏喜學於書無不讀而尤深於春秋從父典教閩中永樂庚子領福建鄉薦辛丑取進士有名當時宣德初授北京行部刑曹主事凡請讞議必盡其心事由君決者人皆謂不寃丁外艱去治喪不用浮屠葬祭一以禮而哀戚過之其事母尤篤愛敬備至服除授工部主事工部造作諸物徵於江西者以萬計多後期命君往督之遍歷郡縣洗手奉公不擾而事集時陕西多逋稅其在倉庾者多蠧弊諸軍屯田凡上腴者見奪於權豪灌溉之利不及於寡弱公私病焉朝廷命工部羅侍郎往究其事擇才力有為者得君與偕行治豪奪均水利理積逋剔蠧弊於是豪橫斂戢儲偫充羡下人無失所者君之績為多今上即位開經筵修宣廟實録擇文學之臣被薦入翰林書成授侍講食五品祿凡所著述必據於理典實而不華嘗考京闈鄉試其去取亦如之由是譽望益隆會吏部侍郎缺少師楊公士竒力薦君可用上遂以命之君慨然有志於天下進退人才必求其實不苟為異同嘗曰天官用人當如天之育物小大之質各因其自然吾何用心哉識者偉其言久之得風疾治稍愈以內艱歸營葬於貴溪居喪三年無違禮釋服將來朝而疾未盡去衆謂宜且止治疾君弗聽曰吾私事既畢當盡瘁以事朝廷尚可求自安乎囊藥以行抵通州疾復作舁至京不能朝事聞許就第治疾疾愈入朝然疾日加劇以正統十年十一月某日卒年五十二娶徐氏封安人子一曰鳯翔又娶汪氏生子一人曰鳯鳴女二人孫一人豫在翰林時與君相好及承乏吏部而君為同僚方倚君為助甫兩月而君去矣豫深惜之及今之來豫喜可知也安知其遂永别哉則雖欲已於哀可得耶君遺言歸葬淳安二子卜地於某山之原將以某年某月某日襄事豫為墓銘以著君之美亦足寫豫情焉耳銘曰名家舊學春秋繼遂掇巍科躋膴仕郎曹再遷熙庶事經幄詞林更清祕天官掄材本德藝權衡輕重孰敢易協恭同寅豫所冀五十之年才過二胡為一旦奄然逝吁嗟天乎此何意鄉山盤盤蓄靈氣歸藏于兹利爾嗣勒銘垂休傳百世襄城伯李公墓志銘正統十二年十月草五日襄城伯李公薨於位年五十五上聞震悼為罷朝一日命禮部致祭工部為治墳塋供葬事公侯卿大夫士皆奔走弔哭凡諸將士嘗𨽻麾下者皆相與會哭盡哀蓋公喜讀書明道理文謨武略靡不究知其事君也忠其待下也仁其制事也義其存心也恕是以上下痛惜之如此公諱隆字彥平其先和州人祖旺生有竒材太祖皇帝龍興之日常從征伐立戰功纍官至燕山左衛副千户父濬又以軍功纍至都指揮同知從太宗皇帝靖難功多授奉天翊衛宣力武臣特進榮祿大夫柱國襄城伯食祿一千碩又以其爵封三代祖考妣及配皆夫人公其長子也年十五襲爵雖甚少而負英偉之資雄傑之材上深器重之永樂庚寅以來每六師北伐輒命公領兵從其應機發䇿出竒取勝雖老於行陳者亦多讓其能上益竒之以為可大用丙申車駕留北京顧南京根本地擇可任留守者莫如公遂命焉甲辰仁宗皇帝即位重北邉守備暫輟公南京命總兵鎮山海凡東北邉關皆節制蓋隱若一長城敵為之震懾未幾復還公南京洪熙乙巳宣宗皇帝即位眷念公甚厚而倚賴益隆有白金文綺之賜公祗敬將事夙夜盡心蓋未嘗有間今上在東宫時知公忠勤宣德乙卯嗣大位又賜公白金文綺而眷注尤篤正統庚申上念禁衛重兵及諸司將士更畨來京以備征調者雖有大臣總之而才智明決如公者不可不在其位乃命豐城侯代公還為之副公在南京十八年荷列聖知遇以為股肱心膂褒嘉寵待之意具見所賜勑前後幾二百道自古大臣得君之深而始終無間亦稍有如公者公行不違道而持之以誠小大之務必盡其公威行惠施近恱逺懷是以其人雖有貴賤愚良寬鄙細粗不同皆敬愛公如父母召還之日莫不願留而不可皆曰公去矣吾何恃自都城至江上泣而送者相屬於路公得人如此是豈以偽為哉公之在朝雖總理軍政然謙己下賢務循大體不苟為異同嘗有詔舉將校之可任者公必慎擇以進使必當其用有司點民丁𨽻府軍皆公與兵部再閲不中者例有罰公曰彼出自田里非素習然方壯顧教練何如教練有法則怯可勇勇可使為精兵由是鮮有罰者丙寅命率師巡邉賜之鈔幣及寶刀一公曰軍事貴嚴寶刀之賜意其在此吾豈敢不力然公威令素著及臨邉嚴飭守備內外整肅訖還不戮一人上閲武近郊公等各嚴兵以待戎陳整肅號令明審坐作進退皆中度上喜各賜金織蟒龍紵絲二有副公受賜惕然不自寧益思所以修其職朝廷或有政刑疑未決命文武大臣廷辨之公在其中侃侃正言犂然當於人心士大夫益重之以為非獨將帥才也間居手不釋卷古聖賢之言行皆服行不忘祿賜之外不妄取一錢嘗刻漢疏廣及唐盧坦之言以貽世訓諸子曰吾襲父爵四十年幽逺之情固多未達所行之事寧免過差然兢兢惕厲悔往修來不敢欺公貪墨以負朝廷付託之重爾等宜益勉諸公娶費氏崇信伯缺之女封夫人無子女一嫁武安侯鄭宏側室子五人珍璉珝瑞瑾珍田氏出也女四人長未行次適興武衛指揮同知張鑑府寧衛指揮僉事胡全珍兄弟卜於是年十二月某日葬公於某山之原太師英國公知公為最深為述其行珍奉狀謁豫求為銘豫亦荷公之知而慕公之德且悲公之不可復見也奚可辭嘗觀晉之郤縠以詩書禮樂將中軍晉是以大漢諸葛武侯不使有餘財以負昭烈君子謂為大丈夫公庶乎是矣公自號湛然道人人亦以是稱之於乎兹其所以為湛然者歟公庸行之美見諸事者尚多不可以遍書姑序次其大者而系以銘銘曰天佑聖明賢俊挺生偉兹襄城邦家之楨維公額額厥有世澤既世其功亦世其德圭璋之望熊虎之姿有武有文施無不宜出則征行入則居守天子曰來汝豫左右公之在朝維一其忠不矯而異不翕而同正直之言廉厚之行衆人所思君子所敬天不憗遺隕星其堂夀不百年人奚不傷高墳峩峩公安于此刻銘垂休焜耀無已故翰林檢討翁先生墓志銘翰林檢討掌國子助教事翁先生以正統己巳正月六日卒于官距其生洪武甲子正月十六日享年六十六子世資取進士為户部主事哀苦不能勝將奉柩歸莆田以某月某日葬先塋之次國子助教鄭君孟良與先生生同鄉同遊縣庠同領鄊薦同官于太學相知為最深世資請述先生行狀而持來謁豫銘豫知先生舊矣且嘉世資之能孝乃為序而銘之先生諱瑛字缺自幼聰敏喜學甫四嵗大父教以古詩即成誦不忘大父喜曰是必能光吾門先生時雖幼聞之益自喜益嚮意於書大父卒哭踊如成人十三受業郡庠日夜不懈未幾父坐事逮詣福州先生憂之請從教授不可先生懷不能已竟侍行維持調護得無恙而歸教授終謂其忤已坐以違學規黜之先生乃之京以其情訴於上得復就學志益勵學益進為文亦益有名丁酉以詩經薦于鄉明年入太學六館之士讓其能洪熙乙巳以天下教官多缺選諸生之有學行者補之先生得仁化教諭仁化僻小邑學久廢先生以興起自任廟像廊廡講堂齋舍庖廩器用以次繕完日進諸生講學其中而以身先之諸生亦日就規矩厥績用著丁未鄰家失火勢將及學舍時東北風急先生稽顙籲天俄風返火熄得不焚戊申遭外艱哀毁逾禮歸治葬于石廊山山多虎且隂雨浹旬人無所用力先生患之號泣禱于天明日雨止虎亦斂迹人以為孝感所致壬子典教桐鄉桐鄉新置縣未有廟學先生度地鳩材始作之其經營規畫如仁化而𢎞麗加焉癸丑以內艱歸葬祭一以禮而哀戚之情不異於前喪正統丙辰升國子助教循循善誘得師之道甲子上視學謁先聖退坐彛倫堂祭酒司業各以經進講博士助教以下皆侍上喜加奬勵明日入謝各賜衣一襲錫宴于奉天門先生在其中雍容進退動中禮度人皆以為宜受此榮也四月升翰林檢討仍掌助教事諸生素聞先生之教益以得卒業為幸先生亦樂教焉至是乃無疾而終太學師生莫不哀惜之翁氏之先元城人有諱何者仕缺官至散騎常侍始遷於莆在唐之世郜檢校工部尚書承贊為諌議大夫廷皞為補闕郎中生六子皆取宋進士其孫景先仕至朝奉大夫世以宦學顯聞至先生之曽大父志大父道源父士能皆不仕而皆以德誼重一鄉母楊氏有賢行生二子先生其次也天性和厚謹於自持未嘗與人校曲直事親奉祭必誠必敬待姻族以禮交朋友以信賔客過從必傾倒相歡盡醉而後已家之有無不計也嘗自號醉菴有醉菴稿若干卷藏于家娶同里周氏處士周孔榮之女有婦道先卒繼室以王氏亦先卒子男四長世用戊辰進士次即世資次世貴世振孫男五瀛湖海澐潭嗚呼先生荷恩寵以光顯于世有子克賢又足以昌大其後君子於此觀德矣葬奚可不銘銘曰學優行崇人所師文章炳蔚聲四馳有偉令子福愈滋歸安于此永不隳後欲考德徴吾詩故户部貟外郎羅公墓志銘公羅氏諱貴字三錫都察院右副都御史羅君通考也以正統九年九月草八日卒於家年缺十明年八月十九日葬於其里東池髙峰山之原君除服來京師朝廷急於用賢遂纍進至今官間以翰林修撰劉儼所述公行狀謁豫曰先考之葬久矣而墓未有銘敢以請豫與君素厚且嘗聞公為人徵諸修撰君之言而尤信故不辭公之先由錢塘徙分宜又徙廬陵之印岡為名家宋時有宏正者為吉水主簿卒葬邑之東池子孫因家焉墓近澄溪上至公又徙居里之周橋曽祖用誠祖以明皆不仕父仲淵樂善好義倜儻負竒氣以資富徙實南京居江東門外時郡中之賢仕於朝者若解公大紳胡公光大金公幼孜楊公士竒輩皆往來相好四方名士有過從者亦必歡洽終日而後去名重一時餘見豫所為傳公其長子也于時實専家政凡奉祭祀供賔客睦姻族弟妹之教養婚嫁官府之徴求鄉黨鄰里之賑贍餽送公私百需皆取給於公公應之無難色親戚厚薄輕重隆殺無不適宜其事親懇懇致孝數稛載來京師所以奉其口體娛恱其志意者極其至親之心歡焉應天府盜官錢事覺府丞張執中誣其受寄一百五十千時坐此逮繫久不能釋者非一人公聞之曰豈可使吾父受逮乎即如所誣輸之官父得免人皆稱公能孝家雖饒財而亦由公能勤儉以豐其家書言孝養有取於服賈賈所以備物致養非賤事也屢挾重資遊閩越荆襄海岱燕薊度居庸鴈門至上谷雲中觀其山川而友其賢豪凡可以奉親之物必力致之歸而充然大有得也晚年以通貴封奉直大夫户部雲南清吏司員外郎然曠懷雅度不以富貴自足遇人則和氣藹然性好山水於隂陽家書尤所深究佳時暇日與故舊子弟擕酒殽以往歷莽蒼俯清泠意有所適則徜徉忘歸不知者以為仙也娶李氏有賢行子男四長即通次遵次達次道達先公缺年卒女三嫁劉嘉言曽志定王常皆士族孫男十三人濂甲子鄉貢士今為太學生餘皆為士人銘曰羅氏之先實為名家惟公繼之大振厥華孝敬惠和表于邑里恩封顯榮曰有令子晚嵗優遊山水之間與仙為徒風休雲間歸藏斯丘既安既密利爾後人百世其吉封翰林院檢討曽公墓志銘曽氏漢都鄉侯之裔有曰宗者始徙居吉水之住岐世以儒為業公髙祖少暉元興元路教授生以禮以禮生庭蘭徙居匡山庭蘭生龍升又徙盧溪則公之曾大父大父父也公諱稔字秩東東山耕雲其别號也生有美質聰敏不羣喜讀書未嘗釋卷於聖經賢傳皆能通其意而尤深究隂陽五行之説恬於聲利不樂仕進嘗曰讀書明理以治心修身若忘已為人豈吾所樂哉然雅好山水及觀古人之竒事偉迹慨然有志於四方父母憐其志資給之乃涉閩廣湘漢雍豫齊魯之墟凡通都巨邑山川名勝之處可以登臨觀覽以興其遐思而發於吟咏者無不逰搢紳之士多與公相好而託意於文字之間久之公歸張缺為書東山耕雲四字劉嘉會序其意以贈行曰持此以為親娛親之心樂焉公奉事極誠敬田園池沼所以備物致養者皆躬理之朝夕率婦子祗順左右不少違嵗時供祭祀待賔客畢弟妹婚嫁恤鄉黨貧匱凡親之所欲者無不如其志公性疏達而是非白黑無隱情事之緩急有謀於公者公處之盡其方始終成敗若素計不爽毫髮耕于東山之陽課僮奴致力其中出入作息常與雲為伍佳時暇日親賔往來必置酒相歡歌耕雲之詩和以康衢之謡其樂蓋囂囂然而忘其身之老也愛諸子皆使讀書勿以怠廢業暹遂以文學顯於時而公勉之尤篤景泰癸酉冬暹官近侍有賢名朝廷推本於親封公為翰林院檢討兼右春坊右司諌鄊邑榮之明年甲戌三月初六日以疾終于家距其生洪武辛亥二月享年八十四娶劉氏有賢行先公四十餘年卒子五人暹暐晧曦昱暹今為國子司業餘皆先卒女二嫁陽春育陳雅懷孫男四曽孫男缺司業聞訃解官歸治喪卜以某年某月某日葬於某地之原而具公行實來請銘豫交司業久且聞公之德舊矣不可辭銘曰有崔東山油雲冒之公耕其中常與雲期雲則何心維公是似公亦無我維時焉視今公往矣雲復疇依悠悠故山歸來何時公兹受封公克有子龍章粲然荷帝之制我作銘詩刻之幽宫述美揚休以告無窮故山東左布政使萬公墓志銘公諱觀字經訓姓萬氏世為南昌人南昌之族萬為盛自五代以來多顯者公之曽祖德逺祖漢雄父偉皆不仕而皆以行誼重當時公自幼聰頴異常選為邑庠生以詩經登永樂辛丑進士第太宗文皇帝欲老其才而用之俾歸進學尋召為福建道監察御史克謹憲度凡所治諸事無不當於理愜於人心翕然稱為賢御史朝廷嘉之以所居官贈其父而封母李為太孺人且榮及其妻未幾升嚴州知府嚴之民雖稱易治而亦有弗馴者七里瀧聚漁舟數百艘晝則漁夜則肆剽竊行旅患之公曰吾先教化而後刑罰乃下令凡十艘為一甲各限以地使自相守有所鼠竊者必連坐能改過者俾安業如故不期月皆化為良善水行露宿無復有驚郡中多大山田少民貧公巡行勸課山有可耕者聽貧民耕鑿而俾富者助之民食以足郡學傾圯首出俸資率富民新作焉諸縣學舍有弊者亦修葺之增廣生員躬自課勵學者亦爭奮以承公意由是舉於鄉會試於禮部對䇿於大廷中魁選者相繼而出為顯官嚴先生祠久廢公復作之置像其中求其後人居守以奉祀事表節義恤孤寡嵗造假匹多于他郡則請計民力為準而減之遞運船多而過使少嵗治船為民病則請減其半地少蠶桑而絲稅多民弗便請以銀代輸猛虎為害禱于神而虎斃居三載除弊興利無遺者及考績來京師吏部以聞詔賜誥命以寵之時天下郡守拜賜者僅三人公為首母太孺人無恙迎至郡朝夕率婦子備物敬養焉後以憂去郡人奔詣上司乞留不果度公服除豫上章闕下願復得公為父母衢婺之民慕公者亦上章請之適有言平陽要劇郡非萬某不可詔遂以公知平陽會連嵗歉公私皆匱公篤於事神恤民嵗屢有穫流亡來歸先是百工赴役京師者皆後期工部下有司遣人送之械繫如罪人有死於道者公憫焉後再遣時召而諭之曰爾以匠藝當赴役而自取譴纍身人以惡人待爾故械繫以苦之今我以善人待爾去爾杻械令自往爾能誠信奉令乎衆皆歡曰謹如父教無一人敢後者堯祠廢公奏請修之芝生于棟或歸美于公公曰吾知修祠而已芝非吾事也滿九年考績公卿交薦升山東右布政使下車七日即出視民瘼野有蝗督有司捕之且虔禱于神蝗遂息齊民素健訟牒訴填委公閲其尤者自治之餘以委理問計日疏決獄為之清升左布政使山東地連北京會有冦警民大恐公拊循慰諭日夜勞悴使且耕且守民賴以安然軍國百需皆趣辦其應務尤難未幾公遘疾猶勤事不懈踰兩月疾益甚貽書都御史洪公及諸同列曰觀不幸不得相與僇力報國家諸公慎自愛洪公等聞之皆傷悼奔視問其所欲言公惟拱手曰永訣矣遂卒無一語及私景泰元年十月二十五日也享年六十四娶范氏封孺人子男一曰熙女二長嫁四川按察使龔鐩之孫其次尚幼孫男二熙將以某年某月某日葬公於某鄉安仁祖塋之右公之從子某在太學熙遣人來告曰先考之葬宜有銘今翰林檢討李先生於先考最厚凡居官臨政知之為尤詳先生仁厚君子也宜無不可于是先生乃以其行實為狀而又以某詣豫請為銘豫亦知公乃略其細行取其事之大者書之而系以銘銘曰於惟萬公逢時之隆發迹賢科厥聲渢渢歷職憲臺為名御史剛柔得中寬嚴有體皂蓋彤襜往臨大邦父母斯民如龔如黃遂殿雄藩繼古方伯棠隂蔚然公則奚適聖哲有云事君以忠繄公實然匪私其躬歸藏兹丘刻銘貞石昭德垂光用示無極太安人許氏墓志銘許氏于廣信貴溪為大家世以多資雄鄉里太安人之祖源清父德誠皆循循謹禮法故太安人之生有至性淳行父母愛之為擇壻時淳安洪君子泉為安仁教諭未有室聞其賢以禮求之德誠亦慕教諭君之賢遂以歸君先夫人在堂太安人善事之朝夕侍堂上承候顔色奉起居飲食衣服必躬調而敬進之嵗時祀先備其品物治其籩豆必豐潔而美好先夫人喜其孝敬稱之六親先夫人既沒治喪奉祭尤盡禮勤于女工紡績織絍往往過夜半服用取給焉教諭君調官邵武邵武婦人多不事杼軸聞太安人之行稍稍化之平生自奉儉薄非親戚賔客未嘗設珍饌所食取具而已晚年教諭君官福州太安人率諸子家貴溪及教諭君卒遂于貴溪葬焉貴溪之有洪氏自此始太安人五子璵珦頊碔琦璵今為吏部侍郎碔亦讀書為士珦頊琦早卒侍郎初為士為進士為都水主事以薦入史館預經筵由翰林侍講升侍郎太安人隨所職業教督之務盡其道故侍郎大有譽於世侍郎在都水時朝廷嘉其績推本於父母之賢贈教諭君為都水主事太安人亦受封且得饗其䘵正統壬戌十二月草七日卒距其生洪武甲寅九月二十日享年六十九卜於某年某月某日奉葬于貴溪某地之原而屬豫為銘豫同僚也母賢而子克孝奚可以不銘銘曰孝敬儉勤克備諸已既大其家亦成其子兹雖亡矣而存者長昭德有銘彌久彌光先妣歐陽氏太夫人改葬志嗚呼先太夫人歐陽氏既沒于洪武甲子七月十一日權厝千秋鄉竹篠巷之園以嵗之不易不克如禮厯三十四年而子信直始克改祔于其鄉之石坳曾祖妣彭氏夫人墓中之左藏焉太夫人沒時信始六嵗直四嵗于太夫人之德不能悉知兹獨以其聞於家者銜哀茹痛志諸石以傳焉蓋嘗聞之祖母李夫人曰爾祖早失陳夫人而以吾繼自吾來爾家以吾所見而驗諸族人即知爾母之為賢婦也爾家素貧而以文學宦業顯四方四方之士與郡邑之賢者往來無虛日爾母能淡薄自足備酒漿魚肉果核以養舅姑供賔客雖儉而必精其于女紅皆盡善紡績織絍剪制縷結所以奉上給下者皆出其手衣無故新必潔以完其待宗族親戚有禮慶弔問遺輕重必適其宜撫奴婢幼賤有恩衣服飲食多寡必均其施嵗時助祭祖廟尤盡誠器用儀物必整齊而豐美曰此婦職也我豈敢怠哉平居謹飭不妄言笑貧而能安勞而不怨使爾父不以家為纍而専意學業者爾母之助也其後爾父仕于時爾祖老無他子爾母尤極孝養使老者不以其子之去左右為戚其心安焉其事吾克盡愛敬從容承順未嘗有毫髮之失于吾如此則其孝於陳夫人可知矣此內外族人所以稱歎而取法也後爾祖卒爾父官京師未歸爾母賣叉釧衣服以供喪事曰不可以簡略羞吾夫明年爾母病卒使吾失養而爾失恃此吾所為痛心也爾叔祖御史公最剛嚴難事於爾母獨加哀憐曰豫族惟此婦賢今已矣天豈不欲昌王氏乎觀此可以驗其德矣爾宜知之其他細行之美吾不能詳也信兄弟泣而識之不敢忘又嘗聞之先考中憲公如祖母之言且曰爾母明而知書孝經論語女誡皆熟讀暗記而斟酌行之凡豫所與往還者聽其言輒了其為人果賢士則喜曰以君所處不宜有不善也其所以克盡婦道雖其天性之懿亦能學以成之蓋太夫人實有全德為九族楷法宜乎享隆大悠久之福而竟止于斯嗚呼哀哉太夫人世居縣東門外犬父曰日新先生前進士臨淄知縣太夫人之生以至正戊子七月二十二日及卒之日享年才三十六天胡厚其德而嗇其夀耶豈天之不仁將其子有惡德為太夫人纍也嗚呼痛哉今惡子既長有甔石之儲升斗之祿可以備一日之養而志不獲伸劈踊號咷五內崩裂劬勞鞠育罔極之恩既不能報又不能早以禮妥安太安人體魄於吉土曠延嵗月始克就事不孝之罪彰徹神明局天蹐地無所容措顧猶靦然以其鄙詞稱述大德蓋不敢以其惡而廢太夫人之善使不傳也嗚呼太夫人之德不可得而盡矣太夫人之恩不可得而報矣志之堅石措之幽堂終天之痛蓋無時而窮矣子二人信與直也直為翰林修撰今以父喪居家女一人曰貢娘適楊子行孫男九人孫女三人尚幼葬之日是為永樂十五年十二月十五日也夏氏孺人墓志銘孺人夏氏諱叔貞上虞夏克義之女嫁為同邑張士倫之妻二家皆右族世有德義故孺人在家為賢女父母愛之為擇賢壻得士倫孺人歸張氏事舅姑以孝處姻族以和主饋祀必誠必敬而撫臧獲必以仁見飢寒困苦者恤之各有恩士倫豪邁喜賔客孺人婉順皆如其志後從士倫謫阜城安于卑約未嘗有戚容且出簮珥治絲枲相士倫教二子讀書二子相繼取鄉貢進士長居傑由章丘訓導選授吏科給事中以才行知名朝廷推恩以其官封士倫而孺人亦受封次居彥為綘縣訓導孺人既貴食其子之祿未嘗有矜色惟戒二子忠孝既而從士倫歸上虞理先業復其舊觀孺人內助功為多宣德庚戌二月丁酉以疾卒生于洪武癸丑四月丁酉得年五十八三子居傑居彥其季居俊早卒女一人嫁杜伯齡孫男七居傑將以某年某月某日奉葬某鄉某山之原而請銘于豫孺人之行賢矣蓋自少至于老為婦為母之道無失其宜者且又不以窮通賤貴易意而能安于理之常此其尤難者也銘以著之宜矣銘曰婉婉孺人閨閫之華有行有能式宜其家窮不嚬呻貴不泆奢命書之榮五色其葩歸藏斯丘命也奈何銘以昭之百世之遐樊孺人陶氏墓志銘孺人陶氏進賢北山樊徴士用節妻也陶世居南昌瑶溪曽大父缺大父缺父缺皆不仕而皆以行誼重一鄉孺人為女子有德有能大父父愛之為擇配見徴士豐偉不凡且進賢尹明仲子遂歸之進賢死王事而母萬夫人猶在堂萬夫人命徴士為從父益仲後孺人相徵士事萬夫人與益仲母塗夫人皆盡孝敬二夫人皆歡樂之愛之異諸婦祝曰願新婦子孫皆孝敬如此嘗歸寧母適鄰寡婦尹以白金來託母而之郡城母命藏之不數月母暴卒尹意金之亡也來哭甚哀孺人盡歸其金又盡以母所藏白金與弟二人大喜過望願奉其半孺人曰我不盡有之而乃用半邪卒不受其弟早卒又撫育其孤子使克治其家徴士兄弟三人相友愛嘗任鐵冶鼓鑄事使傭者輸之京師而虧其數當時若此者皆論死及逮問兄弟爭欲赴之徴士歎曰吾兄冡嗣吾弟未有子皆不可死可死者獨我孺人贊曰君家世篤忠義今君若此不愧於先人且事或得白可以不死徴士即潛往就獄孺人旦則奉太夫人盡其歡夜則焚香祝天曰吾夫分死於義然願天相之俾事得白得終養太夫人吾即死不憾既而卒坐傭徴士得不死士大夫皆重徴士之義而歎孺人之賢徴士尊儒重道篤於教子其所禮為師若包魯伯傅拱辰王景符熊伯機四先生孺人克承其志四先生卒猶禮遇其家且愛撫其孫不衰徴士喜賑窮恤孤周人之急孺人皆傾帑樂從無所吝其立家規以養教諸子無分財異居孺人商確禆益為多治家嚴而有法內外幾二千指肅然雍穆無間言其奉祭祀以誠待宗族以和處親舊以禮而于先世姻戚加厚焉鄉族婦人有能守節義者尤所愛厚數問遺奬掖之其善行多類此有子五人皆為善克樹立伯靜甲申進士為梁山知縣伯冏乙未進士為户科給事中女二皆歸仕族孫男草二女草人曾孫男三女四永樂壬寅九月十四日以夀終年七十八徴士先十五年卒葬邑之學堂山至是啓其封合窆焉則甲辰十月初七日也伯靜之進與豫同年伯冏又最相知乃以右都御史向公所述孺人行狀來徴銘嗚呼以孺人之賢順其夫成其子隆其家而夀考令終克備五福如此是宜銘銘曰懿彼女士既多受祉歸從夫子既安于此利爾後嗣劉孺人墓志銘孺人劉氏魯府紀善梁先生本之之妻世家泰和魚池里祖民則父嘉善母曽氏孺人幼聰慧善女工而和柔恭慎不妄言笑及歸本之善事舅姑姑陳安人嚴而有家法惟孺人能得其歡心本之初為瑞州府學訓導秩滿升溧陽教諭皆迎父母就養孺人尤克順承祿養餘資皆以歸於姑未嘗私一錢本之倜儻重義厚撫愛諸姪內外親有孤子不能立者教之女不能嫁者嫁之其在瑞州時郡中士人有死而不能葬者亦率衆葬之凡其資費皆取給于家孺人相之無吝色舅畦樂先生卒本之葬祭無違禮皆孺人助也及本之調官納溪以母老欲留養孺人勉以義曰君委身于國豈能復顧其親養姑婦職也妾敢不勉君勿以為憂本之之納溪蜀王聞其賢舉為紀善由是不見母者十五年而本之兄翰林侍讀用之與其配相繼卒獨孺人侍養極孝敬而安人安焉嘗謂人曰吾有二子而死生契濶如此賴吾有孝婦在側得以終餘年焉內外姻族莫不譽歎以為罕能及平生清苦勤儉衣食僅取足不務華美而奉祭祀給賔親馭奴婢下人皆適其宜其治家事秩然有條理至老猶精神不衰宣德七年四月十三日以疾卒距其生洪武己酉三月十三日享年六十四子二人長曰栗為本縣儒學訓導孺人出也其次曰樞女四長嫁豫子䅘早寡其三嫁楊持陳異楊稷孫男四恩憲懋忠栗以某年某月某日奉葬於某地之原而葬未有銘以豫婚姻家知孺人為詳乃來請銘納諸墓於乎孺人之德善著于家而儀于族姻久矣豈獨豫知之人莫不知也是宜銘銘曰女婦之行孝敬為先加以勤儉內助之賢是謂德備人罕能至孺人則然式於內外歸安於斯卜者曰宜銘以昭之百世之貽故山東鹽運副使蕭公妻郭氏墓志銘孺人郭氏字淑瓊泰和篠溪故家元萬安縣主簿與恭之子與恭娶同邑南溪蕭氏生孺人篤世婚之義故孺人歸于舅家為山東鹽運副使鵬舉之配郭氏故饒財而孺人謹慤柔順不事華靡幼讀書知道理工于女事既歸運副公不及事舅姑以孝敬相其祭祀勤儉治其家禮以事長仁以撫下蕭氏大家內外屬最多孺人處之無不當者公既失父母處弟妹甚篤孺人極意順承婚姻所需有不備出資裝為助公初同知蘇州以事謫役河南大丘驛備傳馬過使客時一馬直白金百兩而馬數斃遂破其産孺人艱難營助未嘗怨望綜理家事益周密務大體公同産弟有出為人後者孺人嘗與公書云君素愛弟資業當與者與之惟君命無以逺而忽忘也人有密啓觀之傳聞鄉里薄于義者為感動公在大丘十八年凡男女嫁娶皆孺人理之先舅姑之葬不吉孺人就外家山地卜吉兆改葬焉孺人女弟妻劉氏者夫婦皆早亡有二孤孺人長育之俾有室鄉閭之貧窘者德孺人尤多公起復官山東孺人已老乃以家事付其子曰吾可以無事矣郭氏無後孺人于蕭氏郭氏祖考忌日皆識之遇其日輒不茹葷躬視祭物必豐腆精潔嵗時祭祀亦如之二家墳墓亦懇懇課子孫祭掃未嘗忘雖老不廢其所行合道理多類此生於元至正甲申十二月十三日卒於宣德六年七月初八日年八十八孺人子一人曰金字孟廉好德尚義以承其家庶子鎡字孟勤孺人視如已出撫字周而惠豫均故孟勤之敬事孺人亦如實生已女三人孫男六長曰灓領鄉薦次準囦江渭溫曽孫四孺人既卒孟勤以進士待選在京師聞訃慟絶既而奉狀來求銘泣曰母之德厚矣且其素知文章為可貴先生幸賜之銘庶幾乎永永不朽豫家與蕭氏有世好知孺人德為詳雖葛覃鳲鳩所咏可無愧然則豫何可不銘其葬以某年某月某日其墓在某山之原銘曰豐於德美於才治其家罔不宜今則亡歸於斯刻銘詩庶永垂進士王忠母李氏墓志銘台州進士王忠觀政于兵部聞其嫡母李氏之訃泣而告豫曰母世家海寧外大父缺討方國珍有軍功為隊長遂居台州而母生焉洪武初取丁多者補戎行先大父思誠在籍中吾父昶實代亦自錢唐徙台州先母宋氏卒而以母繼相吾父治家有條法以逺去墳墓嵗時祀家廟必備物盡誠又以不得事舅姑時物有可致者不先奉不敢嘗同産弟夭無嗣母善事外大父母三十年如一日女弟死撫其幼女如已生既長出資裝嫁之吾父善醫術人或暮夜求醫母不間寒暑佐治藥或親操碾臼曰人死生繫乎此可怠耶有求藥不能償者焚其券或納榖求故券則已焚之矣仙居人王某坐事繫郡獄其妻從給食有孕當産主人逐之泣而過門母憐之留置于後園舍中日與飲食且為食其夫未幾夫死婦人抱子辭去復資給遣焉越十數年所産子長來謝曰蒙賴恩德有今日當沒世不忘母性仁厚不忮忌自以無子朝夕禱于祖考曰願宗祀有繼及忠兄弟生母撫育如已出忠長受業郡庠母教誨甚至禮待師友尤厚撫馭下人周窮恤匱皆有恩吾父卒于宣德癸丑母哀慟幾絶每自稱未亡人正統五年庚申十二月二十一日卒年六十七子四長即忠次􅀈瑛洪所生女一曰圓適同郡顔敏孫男二忠歸以某年某月某日奉葬于天台某山之原惟昭德垂後宜有銘敢以請豫嘗讀詩至葛覃樛木采蘩采蘋而嘆夫女德之盛誠家國之所由興雖本乎上之化而天性之美豈可蔽也哉今聞忠之言而知其母之賢蓋幾於是矣母既賢而子克孝奚可以不銘銘曰孝敬仁慈女德之華既善其身亦植其家歸藏斯丘尚利爾後刻銘墓中庶幾不朽太宜人潘氏墓志銘太宜人潘氏湖州烏程人潘故大家其諱仁者娶沈氏實生太宜人宅前桑上有野蠶成繭之異故名曰惟祥自幼勤女事能通孝經論語女訓諸書事父母極孝敬父母愛之為擇壻得同郡陸士𢎞陸亦大家而士𢎞尤俊爽故以妻之時舅姑在堂太宜人事之如父母有疾則躬調湯藥及卒葬祭皆盡禮而哀戚加焉以義事夫而勤儉以治其家郡太守知士𢎞可用迫為掾非其志未幾坐纍謫阜城太宜人竭資裝送之而獨居撫其子治生業維持門户動以禮自防人莫之能及也居數嵗以士𢎞命來阜城僦屋以居雖甚貧約而能安之課臧獲下人早夜力作內外之事秩然有條理不三四年家遂富乃新其居室為閭里之望士𢎞喜賔客有過從者太宜人察其賢即盛酒饌俾盡歡而去凡士𢎞所欲為皆能相成之愛其子遣從名師受學夜則焚膏油治針縷又命從旁肄所業勞以果茗舉時人之學而顯不學而僨者訓勵之二子皆從其教仁厚愛人施之惟恐不及工有錢寧者自京歸及阜城疽發背危甚同輩皆棄去太宜人聞之使處之外舍召醫治之愈寧願傭作以報不聽資遣之又嘗命傭治地得枯骸即命掩之戒勿發且樂推餘財以賑人之急凶年飢嵗人之仰給者尤多未嘗責其報阜城之人欲得賢婦賢母者必舉以為訓正統乙丑正月十九日以疾卒距其生洪武庚申五月草四日享年六十六子男三人長眺早卒次矩登進士第歷官至刑部郎中次平亦領甲子鄉薦人皆以為善教所及也孫男七女三長適邑庠生沈餘未行矩既聞訃即解官歸服喪將以某月某日權厝阜城之東原俟他日歸葬湖州先塋之次以江西參政張居傑所為行狀來求銘豫嘉太宜人之德有諸身宜于家成其子之才而又有以及物是可謂賢也乃不辭而為之銘銘曰孝敬仁柔女德之懿於惟宜人式備乎是子也克賢慈訓則然諸孫繩繩善慶在焉權厝於斯歸窆有日勒銘垂休太史所述胡母假儒人墓志銘孺人假氏鄱陽碩輔里人其曰九思曰榮輔者則其大父父也榮輔娶醴陵知州黃仲章之女實生孺人自幼端靜淑慎勤於女工事父母盡孝敬父母愛之為擇壻以歸同邑胡以寧移其所以事父母者事舅姑舅姑嘉其孝稱之六親姑郭氏先卒遺一女生甫七月孺人乳育之既長教以女事備資裝嫁焉舅出為兩淮鹽運使與以寧相繼卒孺人専理其家貞節自持而勤儉以自足後姑在堂素有疾四子皆幼孺人仰事俯育奉祭祀待姻戚遇下人舉不失其宜一言一動皆中禮度內外親屬未嘗輕與相接寡居四十七年制行完潔鄉邑無間言訓其子俾讀父書為儒醫務不愧前人秉常遂以家學顯于時擢為御醫日侍上左右蒙寵遇而孺人猶以恭勤為訓當時皆稱孺人善教其子而秉常之能成其志也暮年雖微恙猶勤于內事不廢性不喜佛見佞佛者輒規之宗族里閭婚喪有不能給者皆資助焉其賢行如此生元至正己亥二月十八日而以正統甲子十月草九日卒年八十六四子長秉彛次即秉常次靜觀早卒次秉德女一人嫁士人范萬田孫男五幼度幼直為國子生幼問幼學幼勤女一曽孫男一女一秉常聞訃請于朝乞歸喪次不許俾乘傳歸治喪事畢即來朝于是秉常來謁豫告曰吾母劬勞守節以植家秉常受教幸粗有成立獨縻於職業不得奉朝夕視藥食而至於大故其何痛如之先生實知吾母嘗為作傳可以不朽矣今將以某年某月某日奉柩合葬於東湖鄭公亭先人之墓葬宜有銘敢復以為請豫與秉常厚且既聞母之賢而為之傳矣則於銘墓奚可辭銘曰孝敬順祥女德之常貞一靜莊處變之方婉彼孺人式備諸已亦有慈訓以成厥子夀考令終盛福在焉尚克從夫何愧于天昭德有銘作者太史刻于墓中以告來世安人葉氏墓志銘正統十年驗封主事李賢官滿考其績最奏之上以為能升賢考功郎中而推本於父母之教封其父升為驗封主事母葉氏為安人錫之敕命是年七月草三日安人以疾卒于家年六十五賢聞訃慟絶即解官歸治葬而以户部侍郎南陽焦公所述安人行狀來求銘按狀安人諱淑瑜鄧州守禦百户清之女也母丁氏安人自少聰慧秀整勤于女事父母最鍾愛為擇壻得升遂以歸之逮事舅姑執禮謹慎親操井臼不憚勤勞衣服飲食以事尊上者必精潔旨豐而自奉儉薄處內外屬雍睦無間言自舅姑以下皆愛重之姑桑氏嘗病劇思鮮鯉瀹湯求之不可得安人出汲臨水默禱焉投汲具忽得一鯉持歸瀹湯以進姑食之病由是愈人以為孝誠所致愛其子不使佚遊賢八嵗時即教之誦詩從里孰師受學稍長又遣為學官弟子家雖不甚豐凡賢之隆師取友當以財為禮必力營辦資給之賢得如其志以學遂取進士入官有名於世姪孟芳亦受業縣庠而逺去其親朝夕之計有弗便安人使依已撫育之如所生孟芳亦學成充貢入太學皆安人力也安人同産惟一兄早夭及父母沒安人為治喪皆如禮而哀戚過之曰吾父母不幸無嗣吾當奉祀終吾身即别治一龕於李氏祠堂之右以嵗時行禮焉每遇祭掃親負土培墳上劬勞殫力號哭如初喪親戚有助之者莫不感泣生男三長即賢次謙次讓七女子其五已嫁二在室以某年某月某日葬于某山之原豫觀安人之為婦為母既盡其道矣而所以致孝於父母者又當天理愜人心非賢能如是乎葬奚可不銘銘曰婦道母儀閨閫之師致孝於親揆禮實宜寵命自天曰有令子我為銘詩以彰厥美太淑人周氏墓志銘景泰四年十月十五日都察院左都御史蕭君維禎喪其母太淑人周氏事聞上命奔喪即起復視事蓋以國家事重方急於用人而不欲其去也君亟上章乞終制上曰移孝為忠爾當用朕命毋再辭君不敢復請即治歸將以某年某月某日奉葬于某地之原而自述其行來請曰維禎不孝母病不能奉湯藥又不得以禮守墳墓其罪大矣若又不能明著其德以圖不朽則罪益大敢請銘以納諸壙豫託交於君而知母之德奚可辭周氏故泰和望族以宦學顯聞尚志處士娶康氏實生太淑人幼而敏慧端一誠莊凡諸女事不待教而能處士以詩書訓子弟則從旁諦聽皆曉解其言而見諸行事父母愛之為擇壻年十六歸蕭氏是為不敏君之妻善事舅姑愛敬盡禮能得其歡心叔時中以父命受業縣庠家事悉付不敏君而太淑人以勤儉周密相之凡祭祀賔客事上撫下與姻親之家慶弔問遺皆適其宜不敏君一不以纍心而得肆力於學問蔚然有盛名者太淑人之助也及不敏君領鄉貢以親老不復仕四方學者多集其門皆館榖而教之太淑人主其饋食無厭倦學者皆受益而去時中夫婦相繼卒則撫育其遺孤而教諸子尤篤維禎兄弟就學時朝夕訓勵之不少懈聞交遊往來論學則喜為之具若語涉非義必切責之曰汝家世業儒今乃與若人友耶皆惴栗請改乃已及為刑部副郎嘗一來就養見其淡泊甚喜曰吾素儉約爾如是吾安之若欲求豐美非所以養志也既歸尤數以忠勤廉慎為戒其教他子孫皆如此門內之治秩然有條理無貴賤親疏小大皆有恩其生以洪武已未某月某日至是卒享年七十有五子男三長即維禎次經以懷才抱德舉未任次綸女三嫁義烏知縣劉同甘竹龍琰安溪吳環皆士族孫男五訓詁諏謨誥女七嗚呼太淑人之德備於身行於家而又施及於人可謂賢矣豫序而銘之非徒以慰其子孫之思亦使凡為女婦者有所觀法而興起豈非鄉人之所欲哉銘曰孝敬勤儉女德之華既宜其室亦宜其家慶典屢施曰有令子象服煒煌云何其已寵終之榮恩禮具焉德之所致式降自天我作銘詩勒此貞石示則後來百世無斁故德清令張君墓碣銘張氏之先句容人君曽大父文忠資富甲一鄉大父日宣有文學行誼為教官於滁遂家滁州後又徙江浦故今為江浦人父克遜隱德弗耀配徐氏有賢行君其第四子也諱俊字俊眀自幼聰敏好學弱冠為縣庠生讀書作文名出儕輩上會朝廷修永樂大典徵羣儒集館閣君以能書與焉書成入太學擢為左軍都督府都事剛毅嫉惡不可以勢撓都督薛祿有嬖吏王羅者母喪匿不發而歌呼飲酒自如君曰違天逆理莫有甚於此具以聞羅由是得罪然君亦不為有勢者所容未幾誣以事謫保安十年恬然自處未嘗有幾微不足之意久之祿以功封陽武侯總兵鎮北邉人皆疑其將何如君曰王羅獲罪於天天道所不容薛公國之大臣豈以私嬖讎天乎吾無患也既而薛公乃遣人邀君計事語皆合意即留置幕府將奏用之適詔下求賢御史李驥薦君授德清知縣德清縣大人衆君一邑士民皆能記其姓名人謂君聰察若神不敢欺縣積逋稅纍數萬凡十餘年不能足君設方略不期年皆辦完當是時使者假公事行縣以苛酷取財民不勝其擾令以下聞風多避匿而擾愈甚君聞其且至曰民恃我以安我先避匿民將何恃獨治事如故使者亦聞其名不復肆縣人賴以安皆德君藩憲大臣亦每稱君以勵諸邑令德清民富而不喜學君知富民子姚朝宗質頗秀欲遣入縣庠其家夜懷金賂君求免君曰吾欲得人教之以備朝廷任使豈假此求賂乎聖人在天吾不如是也卒以補學官弟子民有許三者嘗隂伺官府動靜為姦利恣暴橫昔為縣者不敢校君廉得其實奏之流徙逺方一邑稱快君輕財重義急人之急有貧不自振者雖倒囊與之不少靳故人李東素廉介欲為子侃娶婦而無資君即以女妻侃且教女孝敬盡婦道其於諸子尤篤意教之不使佚遊慢戲擇名師使學晝出理政事夕歸課其學業以為常正統丙辰罷歸優遊自適者凡十三年戊辰七月十九日以疾卒距其生洪武壬戌享年六十七娶鄭氏繼朱氏子男六瑄瓉瓘玠珂璪瑄取進士為刑部主事女六長嫁李侃侃與瑄同年登第為户科給事中即行人司副東之子也次適陳經餘幼未行孫男一繡虎瑄既聞訃將歸奉柩合葬於某山之原而以員外郎程式所為狀託豫僚友侍郎曹公來屬文以刻之墓碣瑄之心蓋汲汲以顯親為事思著其美於不朽可謂能孝矣豫安可辭乃按狀序而銘之曰材足以為抑又逢時功立名存邑人之思騫于郎曹有偉令子刻辭墓前焜耀無已故翰林院檢討許公墓碣銘許氏之先居徐州碭山麻城村公之曽祖仙又徙豐縣之釣臺仙生信信生成則公大父父也成娶夏邑張氏生公甫二歲值元季兵亂置公荆筐中肩任之以走播遷者五六年亂定假寓寧陽東莊村公既壯乃謀於父始定居村南里許南河之涯買地築室而耕鑿其間家日以裕其事親盡孝有疾躬侍湯藥親沒治喪一以禮而哀戚過之友愛二弟甚篤弟仲賢卒撫其二女如已女皆嫁為士人妻嵗時奉祭尤盡誠言及二親肩任避亂事輒悲哀不自勝先塋在釣臺者嵗一往省未嘗廢與人交重信義不以貧富易意人有不給則賙之性不嗜酒賔客過從輒傾倒相歡其意豁如也未嘗以言忤物然人皆敬愛公亦未嘗有忤之者以子彬貴封翰林檢討徵仕郎配張氏封孺人孺人有賢行相夫教子皆不失宜而奉姑極孝敬姑年八十餘患軟腳疾孺人背負出入者十餘年衣服飲食必親侍至矢溲亦躬盥濯除治姑年九十六而終鄉里稱其孝以崔山南祖母唐夫人比之及偕受封秩人雖謂能教子所致而亦以為孝德所報也公生元至正癸卯七月七日卒於正統戊辰七月草三日享年八十六孺人先公八年卒年七十七子男四長即彬取進士初為翰林檢討再升至修撰次清次致中次秉中早卒女三嫁左四傅長王罍孫男十三人超鄉貢進士早卒孫女四人前副都御史賈諒之子俊虎賁左衛指揮張勝濟州衛指揮申廣曲阜孔公玘孔諳其壻也初孺人卒彬卜葬於今所居邑城東之杏林岡去東莊南河涯百里公嘗泣謂彬曰改卜雖善然去汝祖逺矣感念疇昔襁負之恩豈忍違哉汝後併遷于兹以遂吾志彬泣以受命其終慕之孝蓋如此至是彬奉公合葬于孺人之墓而以墓碣銘為請豫素厚彬故不辭銘曰東魯淳風本先覺維公守道素謹慤孝親友弟志彌確閨門淑善行尤卓有偉令子勉於學褒封錫命荷寵渥玄堂暫開瘞此珏墓前有石巧礱琢載德揚輝示悠邈贈兵科給事中吳君墓碣銘君諱好字仲吉姓吳氏其先台州人八世祖瑞登宋隆興元年進士第官至宣教郎浙東提舉常平司幹辦公事始遷居東陽之南嶺故今遂為東陽人曾祖崇祖清之父鑑皆不仕母陳氏君天資穎敏勤於學問其學以明理為本嘗曰明理固足以應事亦必明法然後能周於用遂以餘力究法律而深通其意若欲有為於世以事親故不果出君之父喜賓客賓客日造其門必命酒饌相燕樂君善承其志每先為具以待父之心歡焉父卒哀毁逾禮其治喪必誠必盡不為家以儉其親君子稱之兄仲紹以推擇為邑掾理刑獄君實告之曰刑者侀也侀者成也一成而不可變故君子盡心焉仲紹感其言每與計議當時折獄號為平弟仲美慕道術數欲棄家君諭之曰爾祖清一府君每見人修齋醮輒鄙之謂其不明於理弟奈何欲從其教仲美遂絶不復言亦如君志惟以儒業訓諸子君之子澤好學遣受業邑庠勉以隆師親友有過其家與澤講學君必厚待之窮日夜不厭家故饒財樂以其餘賑鄉里嵗凶有乏食者君出榖平糶以濟之人懷其德暮年悉以舊居讓兄弟别搆宅於南嶺之外以居日與故舊往來言笑意囂囂然也永樂己丑春疾作一日召諸子語之曰吾家世業儒我死治喪一用文公家禮勿事緇黃以取笑當世言訖而逝三月十四日也距其生元至元庚辰之嵗享年七十娶吕氏同邑瑞山鄉處士若翁之女有婦道生三男長即澤永樂乙未進士官至兵科給事中以勤慎得名天子推恩以其官贈君而贈吕氏為孺人次溱能世其家次沐早卒女二嫁同邑俞啓義烏傳積華孫男三君以卒之年十二月初八日葬於西部鄉西峴山之麓吕氏後十三年卒亦與君合葬焉君葬已二十餘年而墓石未有文至是澤請告歸展墓大懼親之德不傳於後世乃以兩淮鹽運使何士英所著行狀謁豫文以刻諸石豫考君之行蓋孝友端厚之士也奚可以不傳乃為序次而系以銘銘曰東陽名家世儒學慶澤相傳久逾邈維君襲美事追琢讀書明理慕先覺孝友之行炯超卓持心平恕慎刑剭毅然守正志彌慤教子一經蒙顯擢霄漢騰騫謝紛濁天書褒贈垂寵渥西峴幽深埋此珏龍光煜煜照崖嶨勒銘墓碣石堅確後千百年愈昭晫贈翰林修撰王君墓碣銘君諱堂字維政姓王氏越之諸暨人曽祖理元纍贈朝列大夫祕書少監騎都尉追封太原郡伯妣祝氏方氏皆封郡君厲氏封宜人祖良仕元至淮東宣慰副使有惠政事載元史良吏傳妣劉氏封太原郡太君父仲廬元紹興路總管府經歷妣徐氏封宜人君生而頴悟七嵗能詩稍長益肆力學問逹於為政其志欲大有立於世元運既去國朝混一經歷君以故官謫濠上君侍行篤於孝養久乃歸屬緣海建城堡擇君主築三江費省而事集人皆德君君秉剛正篤信義會詔下徵賢良有司舉君嘗奉使巴蜀洗手奉公政修民悅聲譽赫著既還以疾告歸鄉里久之疾稍間太康王公鋭為浙江布政使聞君賢強辟為掾君不能拒浙之豪傑知君者皆惜君謂公枉其才而小用之也嘗督賦嘉興嘉興推官治府事因以怠事讓之推官不説後坐賄敗遂誣君君受逮白其事于朝得釋以疾卒于京師之寓舍洪武二十四年十月十九日也享年四十二其年十二月草九日葬于其鄉陽塢之原洪熙元年以子鈺貴贈君翰林修撰君妻史氏封太安人史氏宋丞相浩之後父本以孫翼貴贈河南右參政妣吳氏贈淑人太安人幼而警慧長而孝敬吳淑人早卒事二繼母甚敬繼母髙患瘵事之者多傳其疾太安人侍湯藥至死卒無恙人謂其孝有相之者及笄擇配以歸君值變故之餘家落甚太安人勤儉自足未嘗資外家君初被舉時無以治行欲詭辭自免太安人勉以義出資裝給之君歸鄉人有效義門鄭氏合已分之族而同財共食者君之族亦慕之太安人以為不可曰義者宜也彼嘗自長其家今復有長之者使俯就繩檢勢必不堪謂適於宜可乎其乖離不久矣莫若順其自然之宜君亦悟後他族強合者皆如所言其治家事待姻戚鄉黨皆有禮節人皆服其賢智取法焉及鈺以進士及第為翰林編修修撰迎太安人就養其訓鈺必以忠清勤慎為言既而鈺以疾歸得奉養於家太安人享其樂者又缺年宣德八年九月二十九日卒年八十五十年十一月三十日合葬于君之兆子男二長鍾先卒次即鈺女一適樓璉孫男六女二曽孫男六女四於乎自古賢人君子莫不欲其道大行以利澤當世然而不遇者命焉而已矣若君之賢稍出其緒餘人已蒙惠利使其道行將復為良吏可幾矣而不大施以卒知君者徒嘆惜於無窮天之於君果何如哉然有賢配能成君之子以續聞承德後之繼者又滋盛天蓋以是禆君也鈺今用薦起為江西按察僉事求豫文刻之墓道以昭德垂逺豫誼不得辭乃按狀序次而銘之銘曰維天生賢有志於民俾宏其施功立名存賢孰如君其緒已見施之弗宏君子所嘆有淑者媛克治其家秉德作逑受祉則遐既有賢配復有賢子天之禆君庶其在此陽塢之原君墓在焉刻文垂休何千百年贈刑部郎中周公墓碣銘刑部郎中錢塘周安聞其母太宜人之訃即解官歸服喪謁豫告曰先人以永樂庚寅八月十三日棄諸孤是年九月初七日葬於錢塘玊泉先塋之次迄今正統己未二月十九日不幸又喪吾母卜以四月某日奉柩合葬焉惟吾二親實有德善以庇佑我後人故安得至今日蒙朝廷推恩褒贈先人自主事至郎中吾母始封太安人又進封太宜人可以為榮矣顧其德善非文無以傳逺墓宜有碣敢請銘於先生願勿辭按狀周氏先為汴人有敏德者仕宋為顯官從髙宗南渡遂家錢塘故今為錢塘人曾祖民則祖淵澄皆業儒考諱福字廷端尤深於易母胡氏以洪武辛丑正月初五日生公公諱權字可與少受業於西湖書院山長章先生長從郡庠徐大章何彥恭二先生學學大進而易尤精然篤於事親以孝聞鄉里不願出仕當路者每欲薦之輒以親老辭曰吾可舍親而逐祿邪時人賢之性恬淡不事表襮人知公之精於易也有疑請決焉公隨事酬答必依於孝弟忠信暇則以詩酒自娛雅好蘭因號蘭圃曰屈平吾師也今其遺詩名曰蘭圃遺藁卒時年五十太宜人鄭氏諱淑寧亦錢塘人世為儒家專靜間雅讀書知理凡公之奉祭祀接賔客睦姻族待鄉黨輕重隆殺無不合於禮皆宜人助也公既卒教其子尤嚴安自邑庠生領鄉薦入太學為刑部主事升郎中教之必以敬慎務不愧其先受祿養者二十年君子謂天以是報其德也生於洪武戊申正月十九日享年七十二四子長曰夀次即安又次曰雨曰霽夀與霽皆先卒女三人長嫁宿松教諭沈玘次適吳善宋隆皆士人孫男四人銘曰於惟郎中令德在躬致謹弗渝一其初終婉婉宜人匹休儷美既善其身亦成其子命書煌煌寵降自天五品之榮人罕與肩同藏斯丘卜者曰吉後百千年敬之無斁漢濵先生錢公墓碣銘錢氏居吉水之圓塘蓋吳越武肅王鏐之裔有惟濟者為吉州防禦使子孫因家廬陵三滚源再遷吉水之諸源公之曽祖萬敵乃徙居圓塘祖明則父嶽皆不仕公諱鍈字立志自少聰明好學而資稟不凡初就外傳父命之曰讀書當見之行事無以虗言為也因讀小學書即思躬行實踐為古人之事於經史百氏靡不究聲名動場屋而連不得志於有司慨然嘆曰科第者利祿之階也吾豈以是自纍哉盡棄所業益篤志勵行事父母極孝敬生則致其養死則致其哀而莫有違於禮者兄弟宗族故舊戚姻處之盡其道然而往往厚於仁元季之亂寇賊蜂起日攻剽劫殺有欲犯公境者公曰吾文昌鄉禮義之區也而可汚於盜乎即佐前趙州守劉震以監郡尼雅斯迪音檄集民丁扞盜保鄉里公豪邁有氣節而識度過人日夜治財賦理器械部分整齊寇聞不敢犯衆賴以安親舊有避寇者多依焉公皆能館榖之會連嵗飢饉民益困而寇盜益盛環四境皆陷文昌亦不能守公即挈家往富田避之寇得逞其志焚室廬掠財資皆盡公艱難旅寓者數年未嘗戚戚喪其守惟以書史自娛嘗曰吾賴先人遺澤得盡室生全幸矣外物奚足計哉國朝受命海宇寧一始得還鄉理故業經營締搆居處服用次第皆復舊觀延明師以教子孫顔其堂曰肯構旁築四齋東曰務勤致謹西曰三益九思使顧名思義而皆踐其實所居之東有陂曰漢陂汪洋渟蓄可以澄心而澤物公每徜徉陂上而樂之自號曰漢濵鄉人稱為漢濵先生其所交遊皆賢士大夫間暇往來留連觴詠纍日不厭贑守許莘嘗以明經薦公引疾辭鄉人慕公之德亦樂公家居得有所資賴公天性正直不吐剛茹柔人有不平來求直者公必據禮折之使心服而去然人或有過未嘗靣斥其非徐諭之以道無不恱從公之德善備於身行於家而及於人者如此故卒之日無少長愚良哭之皆哀洪武己巳五月草二日也享年七十初娶廬陵鄒氏生男一曰溥女一嫁同邑劉璉鄉先生桂隱之孫也繼室劉氏里中進士劉鐔之子生男三渙濬濟女一嫁永豐劉昌裔元廣東廉訪副使鶚之孫也公篤於義凡其內姪與其外孫皆撫而教之俾有立孫男十四人幹字習禮纍官至禮部侍郎述纍任按察僉事女四人曽孫男缺人女缺人某年某月某日葬於廬陵淳化鄉龍窟之原至是習禮謂公墓碣未有文無以昭德垂後以鄉先輩陳原德甫所述行狀求為銘直聞古之善觀人者欲知其先德之厚薄必驗諸其子孫子孫蕃衍碩大則先德之厚可知矣公十四孫而侍郎之賢聞天下其未顯者猶多與後之來者當益盛此天與之也非厚德豈能致哉豫文何足以著其美然與侍郎善不可辭也乃為書其事而系之銘銘曰惟公世祚自武肅詩書禮樂謹紹續逺迹科場恥利祿履正踐實志彌篤睦親愛衆庇鄉曲仁聲義聞藹曄郁再振厥家踵前躅子孫多賢美如玉德厚所致始必復漢濵優遊享諸福歸藏斯丘占清淑刻銘垂輝賁林麓傳百千年猗可卜抑菴文集卷十
