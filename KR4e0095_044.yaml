body:
  text: 抑菴文後集卷三十一明王直撰墓銘知府李君墓志銘君李氏諱湘字允淮泰和文溪里人髙祖仁可曾祖宗明祖雲龍父又新皆不仕然世以忠厚聞鄉里又新甫冠循循雅飭躬孝友之行配蕭氏有賢德故君之生亦端重謹靜好讀書不喜佚游遨戲豫兩家相近數往來甚愛之及游縣庠遂援引以入啓處必偕又新甫篤意教之而深以屬豫朝夕相與講學不厭豫先仕入翰林久之君亦充貢升太學初厯事都察院以勤慎得名遂知東平州前之守東平者以不職逮去君至務廉公為治去民之所患而求其所以惠民者築大村壩捍水患化沮洳廢壤為上腴民肆耕其中資用給足視州學敝甚圖新之以教學者以舊守代還時朝廷遣重臣巡撫山東州民數百人列言君治狀願得君事聞上還之東平而君之所以惠其民者益有加於昔開市區以通商賈節婚禮以便嫁娶於是民益親愛如父母凡所當為皆勸趍之無不如志太宗皇帝北征饋運失期者以軍法從事君總督兖州車千輛撫綏有道無一夫後者君之才既足以有為值嵗豐民和乃大修學宫捐已資以為倡衆僚和之其民之好義者爭來助學遂以成凡諸壇壝及州治廨宇皆次第修葺事神治民各有其所人不知勞初馬驛夫長有巨姦久衣食其中君黜之日夜伺便欲去君乃誣君修學隂有所漁取州民大以為恨詣闕訟寃者千餘人刑部亦知君賢曰不可使無辜受垢為窮治得姦狀君遂復官而其志彌厲不少變民心既孚績用大著滿九年上其狀㑹朝廷擇郡守禮部尚書胡公亟薦君授懷慶知府東平之民數百伏闕借留不能得皆怏怏而去君既受命河南方伯李公昌祺適在京師謂豫曰懷慶衛卒最喜生事擾府縣又嘗有惡婦人與其子壻皆工為誣詞以搆害善良故有一虎三彪母大蟲之諺今其風猶在李知府能懾服其心斯可矣君聞之曰吾知其衛卒多揚州人向之薛守以鄉郡之故與之狎是以敗今吾以正道馭之彼當自戢不然吾知有法而已吾何憚既至文武之吏及軍民無賴者聞君之言與東平之治皆曰是不可欺也皆帖服無敢譁而君亦以治東平者治其民民大悅郡以治稱然君已得風疾初則手顫不能書久而加劇或不能坐聽事然人猶敬憚不敢撓其政兵部侍郎于公巡撫河南山西還為豫道其善不置口曰今惜其病矣相與慨嘆者久之而竟以正統己未七月初十日卒于官年五十七懷慶之人無少長愚良哭之皆哀子誠奉柩歸過東平東平之人亦奔走㑹哭賻祭如所親嗚呼是可以觀其德矣君孝於親友於兄弟其季浩為固安教諭得痞疾君求醫藥百方治之不能愈既卒為歸其喪葬焉娶朱氏有三子長即誠次讃次惠側室子一人女三人孫男三誠兄弟以是年十二月丁酉奉葬于縣之千秋鄉四十都羅團之原葬已乃來北京請豫銘其墓曰先人實受知於先生葬而得先生銘以昭德垂後雖死而不朽矣豫念朝廷重養民慎擇賢守令而任之君之所存與其所行表然有名於世使得永年而究其所至將不與龔遂黃霸等乎而不至中夀以卒此人所以哀惜而不已也況豫知之久愛之深而欲已於哀可得耶則墓非豫誰宜銘銘曰求世之治莫重良吏吏而循理其民乃喜東平覃懷衆庶允諧績則多有胡不眉夀命也奈何而譽則遐欲知其德視此銘刻千嵗不泐紀文逺墓志銘山陽紀文逺以正統六年二月十四日卒于家年七十三子昶善醫有名在太醫院告歸以闕年闕月闕日奉葬于其邑鉢池山之原思顯其德於不朽乃求翰林修撰張益士謙為行狀因豫友番陽胡秉常來請銘納諸墓中豫辭以不暇㑹豫子有疾數求治於秉常秉常亦數以銘為請曰紀公重厚坦亮雖若少文然言行恂恂無悖於理者且不茍取不吝施有古長者之風公宜為之銘乃按狀序而銘之文逺諱明其先鳳陽定逺人祖元潔仕元為萬戶父士和元季避兵居山陽故今為山陽人文逺躬孝友惇信義常挾資遊四方貿遷廢貯故其家益裕然樂推其餘以周人之急貸而不能償者因以與之洪武中傍郡連嵗饑民流至山陽鬻男女自給文逺多出錢留十數人育之後皆遣還其家揚州教授欲修孔子廟與楊運使謀俾商人助費人不能過二百貫文逺獨助三千貫它食物稱是嘗早過市就浴堂得倉鈔於地計其直巨萬萬洛陽周晟所遺也晟失之欲自絶乃訪晟還之晟感其德篤念不忘外祖死無嗣文逺葬之祖塋之右令子孫亦以嵗時祀之又鑿井得髑髏其大異甚為具函祭而瘞之其夕夢有來謝者鄉人有親喪不能舉輒往遺之資使葬焉其篤於義如此娶陳氏戶部主事陳仲祥之女有婦道子一人昶也孫男二豫嘗觀夫世之善自營者往往極其才力之所至茍可得矣不復計義之如何若義所當為者則又寧死而不肯費一錢所以見薄於君子若紀公者賢於斯人蓋逺矣是宜有銘以葬銘曰不徇乎利必放於義不遺其親亦厚於人全歸于此宜爾子孫我為銘章百世之光處士歐陽允乾墓志銘歐陽氏於泰和為大家衣冠文物自唐宋來為甚盛至君之曾大父孚先大父以定父觀民皆不仕而皆以德誼重鄉里至君諱允乾尤莊重喜讀書嘗曰吾於書通其大義不悖聖訓而已吾豈切切為章句儒哉君兄弟五人相敬愛學而仕者有循良明哲之稱隱而處者有孝弟恭愛之行二親在堂皆九十有餘而君以踰七十之年致其養此天之厚於君也且不汲汲於財利貸而不償償而不備者皆不問人至有求福於神以報君者性坦厚有容人之量而好善惡惡為尤至未嘗茍徇時有言郡守以誣枉殺其子至起大獄以取償守皆就逮當過君地以驗尸彼積憤聚徒伺守至將逞惡焉人皆危之君獨奮曰孰敢肆惡於吾土即呼鄉人為之衛加嚴焉彼不得間以逞乃免事訖而散當時人謂非君莫能禦至今服其勇且仁君家縣城上游蜀江章水之間往年豫竊祿京師假寓於君之弟御史君永和因得聞君之善其修身愛物濟人和衆囂囂然有樂於心而無用世之意豫謂此馬少游之髙也久之乃搆宅先作祠堂以祀先其藏書之齊待賔之位燕遊之居棲息之舍次第皆作而花卉竹樹蔚然秀發在山水之外而可樂者尤多及豫老而歸方欲與之久處而不厭而君已矣蓋有足悲者君娶萬安曾氏繼娶泰和曾氏皆有賢行子男四溥濠沔漵女三康汝宣王用莊賴仲暘其壻也孫男十二斆遷用璉曼彞仰兆傑錫登頌而君以景泰庚午十二月初十日卒諸子奉葬于沙壠之原而墓未有銘至是乃以屬豫將以納諸壙豫蓋慕君之行而不得者奚可辭銘曰猗歐陽君卓爾不羣既孝于親亦厚族姻惠利之施逮及賤貧士論失常天奚不聞君子之心既勇且仁彼區區者曽何足云沙壠之原君墓所存源逺流長百世之芬盛德不忘視此刻文湯處士墓志銘處士諱鉉字文恂姓湯氏其先豫章人宋時有曰珩者為廬陵尉因家廬陵後又徙吉水之大洲故今為吉水人尉之孫從志與益國周文忠公為布衣交嘗見於吟咏孫念吾為大理評事其後纍世皆未顯處士曾祖雲瑞祖惟信元至順領江西鄉薦未及仕而卒父韶翁妣鄧氏處士自幼不事遨戲端重如成人比長好學多讀書達於物理服勤家事不以纍父母而致養必盡誠撫愛弟妹尤篤宗族有貧者必濟之出入鄉閭恂恂恭讓橫逆之來不校也由是人皆稱為長者莫不敬愛焉其襟度灑然喜賔客相與久而不厭延師教子務厚待之兾得盡其心平生治貨産不汲汲於求但取適而已嘗游淮楚交四方賔客茍意氣相得雖捐重資不吝也一時豪俊皆願與之交而於士大夫尤極向慕禮之惟恐不至嘗取周益公詩及先進士髙若鳳國朝吏部侍郎顔秋宇諸公往來之作類成卷學士解胡二公及諸名賢皆為之題咏處士最珍惜之嘗語諸子弟曰吾家世積德雖未大顯然不失為士若等不可不勵志以光前裕後及季弟文禮為宣城訓導處士喜益勉之以學曰惜吾病恐不見汝大有立也永樂癸已六月初九日卒距其生元至正辛丑九月七日享年五十三娶夏氏二子琰頊皆讀書三女孫男四闕年闕月闕日葬其里黃洲之原而墓未有銘至是文禮以閩縣教諭考績來北京得潮州府學教授則自念曰吾幸過家得拜吾兄之墓而惜其不吾見也乃述處士行實謁豫銘豫觀世之為兄弟者以利欲之私移天性之貞生而不相好者蓋多矣能念其死而思其善以圗其不朽者十不一二見也若處士兄弟交相愛而互相成非詩所謂令兄弟者乎豫為銘之亦以愧夫未能然者銘曰繄處士鍾厥美宜遐夀胡遽止昭德垂休偉令弟刻此銘章示無已其不然者宜有泚許處士墓志銘處士姓許氏諱觀祐濟川其號也以宣德壬子十一月七日卒距其生元至正辛卯十二月六日享年八十二闕年闕月闕日葬于其里藕塘山之原而墓未有銘至是其子誠為武昌令述職來京師乃以中書舍人宋懷所為行狀謁豫曰先人實有德善而未獲顯聞於世願先生賜之銘庶幾託以不朽豫哀其志故不辭按狀許氏之先某處人曰元冲者宋嘉祐八年進士子份崇寧中擢甲科知鄧州家于鄧咸淳間有諱銘者為廬陵尉卒于官二子湘湜因家廬陵之塢園以資産雄一鄉湘生復安復安生明通又徙居吉水中鵠鄉之青山明通生宗逺則處士之考也處士早失怙事母盡孝有美味不先奉母不敢嘗撫一弟二妹尤篤婚嫁皆以禮勤於治家嘗挾資遊四方覽竒勝友名士遇人無賢愚皆有恩義人亦皆敬愛之雖童稚亦知其名性質厚耻浮薄鄉里歸其德服其教俯接後輩色溫氣和使勉於善見貧者則賑貸之不計其償平居無事遇天朗氣清與故人賔客逍遙於閒曠之中談論故實及治生諸事聽者忘倦常曰為人當安分而已何用外慕哉尤篤意教子務不忝其先故長子誠遂取進士厯宰三縣皆有名處士娶廬陵村前李氏有賢行子男三人長即誠字正非次去非早卒又次曰戒非女一人孫男七人銘曰於惟處士德藴諸身教行於家亦以及人福慶綿綿厥有賢子納銘墓中以告來世任母蕭氏墓志銘吾邑任信㑹試於禮部中教官選聞其母孺人之喪詣豫泣且告曰生之充貢而來圗進用於世以為父母榮也今幸取於有司當得教官祿足以奉朝夕而吾母不待矣此生所以抱痛於無窮也母蕭氏世居泰和城東大父某父某家故饒財而吾母最勤儉精女事幽閒靜專無傲惰之習既歸吾父善事大父母而宗族稱其孝處妯娌及內外屬一主於禮施之必適其宜恩及下人衣食必均一見鄉鄰有不給者必賙之假貸不償不問也吾父以醫名鄉邑求治者足相躡於門其能濟人之急而不以家為纍者吾母之助也生兄弟就學時日諄諄誨諭隆事師之道必欲使底於成今生未能有所立而吾母棄之其何以報大德哉且於其終生獨在逺外不得奉湯藥視殯殮於孝已闕矣若葬又不能乞銘以昭德垂後則不名為人子敢請於先生豫嘗與生之父敬說公遊而豫家人又數以病厪君由是聞孺人之德而知生之言為然則安可不銘其生以洪武甲寅十二月二十六日卒於正統辛酉十月缺日享年六十八子四人長曰遜次即信又次曰宏曰靜皆為士人女一孫男五其葬以闕年闕月闕日其墓闕之原銘曰早為賢婦終為賢母葬此原阜既安且久尚利爾後曹處士墓志銘曹氏於歙為儒家在元有觀國者為某官實生從善永樂中為遼府審理則處士之大父父也處士以正統戊午八月五日卒年六十四闕年闕月闕日葬于其邑水西花塢岡之原後四年壬戌之十二月十四日其配陳氏亦卒年六十七某年闕月闕日祔葬處士之墓次葬已子睿明相與謀曰惟吾二親實有令德今不幸已矣若刻石墓道以揭德振華使永永不朽於禮亦可衆皆曰然於是睿來京師以行人葉春蓁所述處士行狀又自録其母之德為書因刑部侍郎楊君屬豫銘豫重楊君之言而嘉睿兄弟之孝故不辭按狀處士諱韋字子寬自少懷竒負氣力於學問事其親懇懇致孝審理君素髙邁喜賔客其在京師及從王之國江陵賔客過從無虛日處士輒治酒殽供宴樂務以悅乎親家之有無不計也親疾憂形於色朝夕不去左右湯藥必嘗而後進審理君卒以喪歸舟遇大風前後多覆溺處士哀號籲天風為止其於葬祭必以禮時物未薦者不先食治家有法教諸子則以勤儉為修齊之本鄉人子弟有為不善者必勉使為善閭里多化之平居必整冠服未嘗有惰容喜屬文賦詩攻行草書所著有夢草藁嘗自號存耕人稱為存耕先生性不嗜飲然遇知已雖觴詠終日不厭丙辰秋遘疾治久弗效臨終之日語子孫務勉於學行必不辱前人言訖而逝陳氏為歙之故家皆篤於為善由是産賢淑以配處士孝敬順祥姻族取法處士之行成於家及於人與凡事物之酬酢皆能相其志門內之治肅然自子婦至於臧獲無不秉禮法而雍睦之風藹如也處士有疾雖老猶躬自扶持三年不少懈處士卒哭泣過哀因以成疾疾且革戒子以勤慎友愛不及其他二子睿與明也女二孫男三銘曰有蔚曹宗世業以儒簮紱相承珮玉長裾篤生處士式克用繼其繼者何維德之似婉婉令人來歸自陳淑善之孚始于閨門宜大宜久而不眉夀孝子順孫以昌厥後其安其藏花塢之岡銘以昭之愈逺彌光孺人夏氏墓志銘孺人夏氏吏部司務程羽之母以正統癸亥十月十一日卒于家夏故旴江大族曰仲祥均迪者孺人之祖與父也孺人生而柔順善女工母陶氏甚愛之訓教尤篤既長擇壻以歸程孟麟甫孟麟守儒素淡泊自足孺人克執婦道以孝敬事舅姑而勤儉以治其家紡績織絍旦暮無廢業門內之事井井有條孟麟始雖貧繼而日以饒裕孺人相之也有二子孟麟皆課督使學孺人則循循誨導俾勿怠長子光卒於永樂甲午孫杜始二嵗孺人躬撫育之次子羽由邑庠生充貢入太學留婦章事孺人未幾章亦卒所遺子女皆孺人撫之教養備至故皆有成立羽嘗謁告歸省孺人勉以忠孝大節及為司務欲迎養不果請分祿為養孺人喜遣書戒羽曰吾與汝父得食汝之祿幸也汝尚慎以守身敬以事君則可以長保此祿矣聞者皆稱其善教嵗壬戌遣杜來北京視羽歸次池口溺焉孺人聞之傷痛由是得疾遂不起年七十六二子光羽二孫桓杜光杜先皆已卒惟羽桓在而曾孫男乃六人後來之盛蓋未艾天之厚程氏其在此歟羽卜以闕年闕月闕日奉葬于某山之原而請豫銘豫嘉孺人之賢而羽又克孝乃為銘之銘曰德有諸內而形諸外既宜其家益蕃以大孰不有子而子克賢祿養之榮惟教則然既多受祉歸安于此我為銘詩以著厥美方處士墓志銘方氏之居歙者由漢丹陽令紘始初居歙之東鄉再遷蘇坡之陽為大家處士大父宏仲篤學醇行而未顯實生德潤處士父也有大志雅度樂磻溪山水之勝遂徙居之是生處士諱榕字以茂少聰敏喜學而不求仕進事父母以孝聞父知其才委以家事綜理皆盡其道父之心歡焉父沒葬祭盡禮既久而哀慕不衰勤於治生課子弟僮奴戮力樹藝家日以饒里中地疏燥嵗多旱處士乃相地宜治為堨以畜水溉田田更為上腴無旱灾一鄉賴焉初鄉人有重利者為私量加公量十二以公量出而以私量收其權衡亦然細民苦之而無所取正處士以為不義乃多致衡量於市區小大均一人得以為凖欺弊遂息嘗長其鄉糧賦徵輸必以公民有患難庇護貧不能輸者代之輸人皆歸德焉其性端重不嗜酒不樂華侈與人交必以誠不能强笑語為容悅亦未嘗矜已之長人或假貸而無以償者不校也常延名師教諸子及族人子弟必以孝弟忠信為本藹然有仁厚之風尤善治居室經營規畫往往出人意表作成性之堂讀書之樓攬秀之閣禮賔之館庫廄庖湢下至僮僕之所居門墻巷道制度嚴整他自以為莫及也晚年又治别業鑿池塘種花果以為燕嬉之所暇則往遊焉蓋囂囂然樂也正統己未忽得疾醫弗愈語諸子曰吾殆不起矣汝曹幸知學吾無憾然勤以立事儉以治家者先人之訓也汝尚勉之以二月草九日卒年七十娶唐氏有賢行子男三人長熙唐出也次輝次炳側室余氏出也女五人孫男五人孫女二人是年十月甲申葬於其邑楚山之原而未有銘至是熙以其親戚吳恭所述行狀託刑部侍郎楊公求豫銘豫觀處士之才行誠有過於人其惠利之在物亦有沒而不忘者而熙猶汲汲以圗不朽此孝子之心也豫其可辭乃按狀序而銘之銘曰惟歙之方自漢徙子孫綿延濟厥美處士繼之乃愈偉德孚於鄉本諸己惠澤之流如彼水謹權審量納諸軌嗚呼休哉此君子宋子琳墓志銘子琳宋氏諱珏子琳其字也曾大父彬之大父成章父若璟皆有德誼而不仕其先居吉水之洪同為望族再徙廬陵城西又徙吉水之田心至若璟乃買宅郡城南之龍舟街居焉宋氏素尚文學而亦以多資聞鄉里若璟有四方志屢挾資往遊必極其趣乃已子琳能如父志嘗遨遊兩京觀都邑之雄宫闕之壯禮樂制度之盛四方萬國之㑹同又徘徊齊魯荆梁秦隴之間見山之髙川之深民物之繁富聲教之洋溢流風習俗之淳美皆發舒其志意以見於詠歌歸而其心益有以自樂其行於家施於宗族鄉黨姻戚友朋務各盡其道吉凶慶弔祭祀賔客酬酢往來輕重疏數必皆適其宜表然有譽於鄉里而士大夫尤以孝友重之蓋子琳初生才五月喪母孺人張氏鞠於大母大父尤憐之常置諸懷抱大父卒子琳甫四嵗知其母亡而悲且念大父之德哭泣之哀如成人食輒舍肉父病子琳色憂躬侍湯藥未嘗去左右其執父喪慟絶復蘇者再居廬毁悴杖而後能起凡所行一遵朱子家禮不用浮奢嵗時奉祀及遇忌日哀戚如初喪事繼母孫孺人生致其養死致其哀亦不異於父初其父每出遊必委以家政子琳厚於諸弟數延明師以教之暇則至孰中相與講論經藝提掖奬勸友愛篤至諸弟亦善承其教敬恭朝夕怡怡和悅上下惇睦無間言由是多以學行顯者豫與其弟子環同年取進士同官京師嘗一歸故里訪子琳子琳設宴於堂中諸弟侍左右唯兄命是聽周旋進退無不中禮藹然和氣可挹也豫於是敬之深而知士大夫之重子琳者信可徵不誣晚年優游林下與故人親戚觴咏以為樂守令行鄉飲必以賔位處之曰此孝友君子也鄉人無少長愚良亦以孝友稱之嗚呼子琳其賢哉生於洪武乙卯正月十八日而以正統癸亥正月卒年六十九娶田氏張氏有婦道子男四怡悌恆憚皆能成其家而悌先卒孫男七女六諸子卜以闕年闕月闕日奉葬於闕山之原而以劉先生子欽所為行狀命子環之子中書舍人懷詣豫請銘以納諸墓豫固知子琳者奚可辭銘曰惟孝友德之基有諸身隆厥施令譽藹蔚紛四馳今其已矣吁可悲我為銘詩宜永垂曾本清墓志銘本清諱泉姓曾氏泰和人蓋唐檢校司空洪立之後曾祖觀玉祖克復父子敏皆不仕本清自幼聰敏喜讀書豫遊鄉校時本清來從豫遊親賢取友其學大進永樂辛卯領鄉薦明年㑹試下第入太學戊戌遂取進士入翰林為庶吉士未幾擢拜監察御史有志於事功坐纍出為汜水縣典史朋輩皆惜其去本清曰是亦足以為政何必御史邪汜水地瘠民貧而性椎魯不善治生以故積逋賦多逃亡本清乃教民入山採藥伐材木治薪炭為網罟漁於河又召工為造舟俾往來汴泗易貨於是民皆能自給流亡四歸田野盡治官無負租民有餘力凡諸繇賦必以公民無不信從擇其子弟之俊秀者入學讀書習禮義民俗婚娶必論財男女有失時者命其耆老轉相誨諭俗為之變民既有所養又有所教皆安於無事嚴保伍之法治他縣人之入其境為盜者有發即得之縣以治聞兵部侍郎于謙巡撫河南大竒之俾往山西撫逃民民亦樂從其令宣德乙卯考績來北京得疾卒十二月初九日也享年五十汜水人有在京者皆哀惜之娶王氏有子六人䝉豫震升謙巽女一人尚幼孫男十二人明年丙辰䝉來迎柩歸將以某月日葬于其鄉之某原以事狀來請銘豫與本清處既四十年聞其治縣如此心甚喜之常謂本清之治庶幾有循吏之風今聖天子篤意養民慎擇賢守令若本清者使專郡縣之寄其功業當益顯衆皆以為然將薦起之而本清卒矣豈非命也乃為銘之俾有傳于後銘曰有偉其才而不大施遺惠在人後世之思噫吳處士墓志銘吳氏居廬陵郡城北其先有諱盛者仕宋官至殿中侍御史世有聞人曰某曰迪初曰九成者處士之曾大父大父父也吳氏既大家名公偉人多相與往來處士方幼而岐嶷如成人應對進退能以禮諸公皆器重之讀書了其大義即止曰吾取適於用而已何暇為章句儒哉及長卓然自立於事之當為者必身任之不肯碌碌在人後洪武中擇資産富者長其鄉糧稅處士兄弟為之能不擾而事集鄉人安焉邑有劇賊為民患衆莫能禦處士設方略縳其渠三人送京師餘賊皆遁走太祖皇帝嘉之勞以酒饌給道里費遣還處士謙退不伐未嘗言所為於人郡縣守令有重務或急需上官督責衆莫知所為即以委處士處士為計畫處置每如期而辦雖甚勞費不惜也由是聲譽益聞于上下嵗辛已令下徵民兵入衛郡守朱仲智雅知處士强起為百戶非其志卒免去平生事親孝友兄弟好善急義直道自信不以利害為趍舍蓋其親在時處士奉養敬愛備至能得其歡心親沒奉葬尤盡誠不使少有遺憾嵗時享祀既久而哀慕不衰兄立極早卒從仲兄遵極理家政事必咨而後行遵極嘗為小人所誣搆法司逮問禍叵測處士力為辨明雖被煆錬詞氣不少挫慷慨激烈有足動人者竟得直而歸及遵極亦卒處士斂葬如禮二兄有遺孤三人皆幼弱處士躬撫教之俾皆有成內奉二姊外睦一族恩禮勤至劉武信先生其師也罷廣西訓導歸家甚貧處士迎至西孰敬養之死則為治喪事鄉民有某甲嘗誣乙為盜處士憐乙懦慮不能自明即詣官言其非盜與其所以受誣狀有司知處士長者信其言抵甲罪嵗甲寅廬陵大饑處士發廪賑濟所活不可勝計又令子昊出榖數千石以歸有司助賑貸事聞朝廷旌之為義民其善行不可以遍書其大者如此處士諱奭字民極竹雪其號也生於洪武乙卯四月初六日而以正統己未五月初六日卒年六十五娶王氏有賢行先十年卒子三人昊練績女三人皆嫁為士人妻孫男一人昊等卜以闕年闕月闕日奉葬闕山之原乃請河南左布政使致仕李公昌祺為行狀因工部侍郎周公恂如屬豫為銘以納諸墓二公皆其親戚言足以信於世豫亦嘗與之接而知其才行則奚可辭乃按狀而銘之曰廬陵名家顯自昔偉哉處士紹厥蹟德義有聞聲孔碩夀不百年吁可惜𤣥堂一閉杳莫覿我為銘章刻貞石揚休述美永無斁郭處士墓志銘吉水同江郭氏蓋汾陽王子儀之裔南唐時有在徽者為鴻臚卿以言事謫廬陵子暉因家廬陵之麻岡六世孫詠又徙今同江其後有季真者生喜叔為新淦蔣沙毛氏贅壻生務逺因冒姓毛處士之曾大父大父父也雖皆不仕而皆以忠厚聞鄉里務逺娶髙氏生處士諱望字子瞻其曰瞻雲處士者里人之所稱也性最淳篤其治身治家必循理義不為侈靡傲放既壯有四方志嘗挾資出遊覽江湖之勝及倦而歸理田園齊家衆一以勤儉為之本友愛三弟人無間言季弟子南早卒撫育其子女俾皆有室家尤號鯁直是非邪正不茍為異同人或有爭訟不白之官而質之處士輒據理論斷無不悅服而去愛其子擇師教之仲子俊取進士為行人奉使四方常乘傳過家捧觴稱夀處士為之喜人亦莫不以為榮藩憲大臣及諸郎官御史與俊善而慕處士之德者有事過其鄉必往拜焉處士輒置酒欵洽終日雖老未嘗有惰容諸公貴人益敬愛之後升為兵部員外郎處士數以忠勤為訓癸亥秋俊謁告歸省賔客之來者益衆處士日坐堂上俾得盡其情歡欣交通和氣充溢天下之樂莫加焉如是者蓋嵗餘甲子八月俊還朝處士復申前訓而益以廉慎且曰吾先人冒毛氏今三世矣人各有本不可以不復爾往請于朝而復之俊如其志得請復姓郭以告處士而處士以俊行之月草四日無疾而終享年八十娶蕭氏先卒子三人長璉次即俊次珵再娶袁氏亦先卒子一人曰賔又娶邵氏孫男十三人女五人曾孫男十人女闕人俊歸治喪將以闕年闕月闕日葬于里郭公山先塋之次自為行狀謁豫銘豫與俊善何可辭銘曰郭居同江汾陽之裔處士承之善聲世繼有偉令子訓以義方翔於郎曹為親之光水木本源篤念弗替克復其初祖考用慰歸藏兹山既固且安昭德有銘終古弗刋侍讀陳君墓志銘君陳氏諱棖字叔剛閩縣人曾祖壵祖鈺考仲昌以君貴封監察御史母林氏封孺人君自幼喜學端重異常兒稍長作詩有竒句先生長者皆愛重之從劉九疇受春秋選為鄉校弟子永樂甲午領鄉薦明年上春官不偶而歸益肆力於學辛丑登進士第時上重進士欲老其才而用之皆使歸積學以待君復從鄉先進學古為文辭深有造詣宣德丙午徵為監察御史嚴重不苛預修兩朝實録書成受重賞升修撰時他官預史者數人皆不留獨君在翰林而人皆以為宜未幾以內艱去廬於墓側哀毁逾禮服除領舊職修宣廟實録上御經筵充講官實録成升侍讀賜賚尤厚聞父病疽乞歸省歸而得疾頗狂惑失常父卒疾愈加亦卒正統五年二月二十三日也享年四十七君操履潔白謹於言行其事親孝家居極婉愈之樂其在京師凡物可以奉親者必致之左右不使乏絶於其弟杪桭友愛尤篤與人交必以忠信務相輔以道掩惡而揚善有客死無歸者則為經畫歸其喪居官勤於職業未嘗以私廢公退則閉門讀書非其人不與接事非其所當為者不敢為休暇無事喜與故人賔客飲酒賦詩其襟度灑如也娶林氏浙江參議季之女封孺人生子皆不育而能娶妾以事君生二子煒爟皆幼女一嫁士人周材林出也陳氏之先光州固始人也唐末有諱檄者從王審知入閩官至太尉太尉二子令圖令鎔宋之時令鎔之後有諱塏者仕至顯謨閣待制至君之曾大父大父父雖皆不仕而善慶實鍾於君故君遂超取顯美為當時偉人惜其年不永用不極功業不大見於世然即其所立者而觀之可以知其賢矣君以卒之明年二月甲申葬於其鄉蔡莊山之原至是弟叔紹取進士官京師以侍講劉求樂所為行狀詣豫告曰兄之葬少保江陵楊公為文表諸墓矣而墓未有銘惟兄嘗辱愛於先生願賜一言俾託以不朽豫在翰林時實厚於君今不幸已矣心切傷之奚可以不銘乃按狀序次其事而系以銘銘曰其行有常其言有章宜及百年士林之光而夀乃弗長刻銘幽堂久愈彰雖死不亡庸何傷劉君宗平墓志銘永樂二年豫取進士入翰林時初至京師四方之士相與遊者蓋甚寡惟翰林有學士解公侍讀胡公侍講楊公直以世契得從容其間而君亦先自大寧教諭與修髙廟實録升翰林待詔又自待詔升檢討一時同郡進者凡數人皆篤於鄉誼往來相善也太宗皇帝徵天下名儒集館閣修永樂大典翰林之賢則命為副總裁而君在焉豫限以職業不得數從君聽議論其後扈從留北京跡日益疏久之聞君坐罪在謫籍則為之悵然不懌既而聞以代還有司復舉為教官送之京師意謂君且復顯而竟以疾卒於天長之旅邸年五十七嗚呼其命也夫劉氏之先自金陵徙居吉水之金灘再徙居學宫之旁世以詩書顯聞君之曾祖闕祖道章父子同皆不仕而皆以學行有名然君實道山之孫子溫之子以子同無後故命君為子道章先生嘗受易於解先生伯中得吳文正公之傳至是竒君淳謹盡以所學授焉故君早有譽於世由學宫弟子領鄉薦㑹試禮部得典教大寧大寧俗陋不知學君循循誨誘日以經傳為諸生講說俾致力於修已治人之道諸生知所嚮方皆樂從由是寖有顯者其在翰林與纂述早暮盡心考據精切不取快一時嘗迎其尊府就養來京師備物盡禮懇懇致孝諸公皆稱道之君襟度坦夷不為崖異斬絶之行與人交色溫氣和未嘗有所忤性尤篤誼親舊有罹患者賙恤之恐不至故學士解公檢討王孟暘君尤所加意者也若他人有急求於君君視其力可為即為之規畫處置於身之利害不暇計以故人多德君及其謫也人亦皆深惜之君諱均宗平其字拙暗其號也生於洪武辛亥五月十九日而以宣德丁未三月草三日卒於天長惟季子觀在側力不能歸其喪僦地葬焉後九年為宣德乙卯是冬諸子始克奉柩歸葬於故里雙坑祖塋之側君娶里東門解氏華容丞元復之女有賢行子男三皆服君之教長晉能治其家次益次觀皆取進士第益今為兵科給事中觀未仕女三孫男五平生所著詩文有金陵稿仕優集拙暗稿若干卷藏于家君歸葬十年而墓尚未有銘至是益狀君之行詣豫曰先人之交今惟先生在墓宜有銘敢以請先生不棄舊好而賜之言豈惟先人幸託以不朽子孫實嘉賴之願勿辭嗚呼豫尚忍銘君墓哉然不可辭也乃為銘銘曰君家文江富儒術典教大寧俊茂出躋于館閣勤纂述發為文章何炳蔚翺翔禁署領清秩排風徑翮上雲日回溪澠池奮已疾悲哉天長人所恤歸安于斯卜曰吉勒銘垂休靡終卒誰其作者太史筆嚴處士敬仲墓銘豫先祖竹亭公有子二人長即先考肇慶公次則嚴氏姑也姑歸元齡甫生二子曰敬仲仁仲而豫兄弟亦二人各長一嵗以齒為序則豫兄行敏最居上次敬仲次豫仁仲則少豫數嵗惟豫三人者實相親雖同姓兄弟不過也二家皆以儒為業無厚産以自資而遭家難亦相似於是豫三人各奔走自營不得相比如曩時間或一見傾寫未及終復東西散去其意雖親而跡則已疏未嘗不慨然興歎也既而仁仲卒君則就甥館祿岡以醫術濟人藥大效乃因其舊業而充廣之為富家豫兄行敏亦治别墅於蘭塘課童奴耕稼其中囂然皆有以自樂顧豫碌碌進無補於時退無益於家每念二兄欲相從以娛老而未能遂其慨嘆加焉前八九年豫兄行敏卒豫哭之慟蓋傷兄弟之益少也然猶幸有君焉今復已矣則豫之哀可止耶君闓爽不羣攻儒書識聖賢微言奧㫖又旁通道家之說通於文事凡人情物理靡不究知處之各當其宜人咸謂其才可用以有足疾不果薦君亦樂於自便得優游治其家作讀書堂以教子孫嘗語人曰吾先世以宦學顯聞自教諭天澤府君以來三世皆不仕先祖尚德府君僅為萬安縣典史而吾父復以隱終積之之久子孫其必有興者乎性喜賔客往來欵洽無虛日且樂以餘財振人急人多德之君諱璞敬仲字也生於洪武戊午二月闕日而以正統乙丑闕月闕日卒享年六十八娶劉氏早卒再娶胡氏有婦道生四子所儉所仁所闕皆先卒今存者惟所義女二人長壻胡叔寓亦先卒次適蕭粲孫男闕人女闕人長嫁闕次則許妻豫孫重母黨也所義卜以是年闕月闕日奉葬於闕處之原而君之從兄誠仲甫以書來京師屬豫為墓銘嗚呼君豫外兄豫深願其生而遽哭其死尚何忍銘其墓然誠仲甫豫姻家其命不可辭乃述豫之情與君之行而系以銘言之復者哀之深也銘曰少日兮相親既長兮離分老可樂兮意空勤忽死别兮返其真嗚呼哀哉兮涕淚沄沄述懿行兮勒堅珉耀百世兮永長存檢討何先生墓志銘餘姚何先生諱鼐字玉鉉以子瑄貴封翰林檢討階徵仕郎享其祿養者七年以正統十年四月闕日得風疾卒于家年七十九瑄歸治喪以吏部員外郎柴蘭所述行狀來求銘豫素與瑄厚不得辭何氏故汴人宋南渡時有諱曼者為宣威將軍居餘姚蘭風鄉之八字橋由是世為餘姚人其曰原祿子秀德義者先生之曾大父大父父也先生端重警敏少從金華戴叔能學詩深有造詣戴公甚推許焉然篤於事親不欲仕郡大夫再以隱逸薦皆力辭父得心恙醫弗愈先生乃治居室植花卉置琴書圗畫其中日為具以娛樂之隨所意欲皆適其可如是者二十年而以疾卒母倪氏目眚餘十載而性嚴難事先生躬扶持得其歡心親沒葬祭無違禮每遇忌日哀慟如初喪雖老不變又本朱子為冠婚喪祭禮三十餘條名曰家範俾宗族行之知禮者取焉明於義理不茍愛一錢少與伯兄同治産新增有倍於舊及分異先生止取舊産而以新增者讓其兄從兄季章為古田丞被逮至南京年老子幼無從者先生赴其難未至二十里聞疾亟倉皇疾行雖遺金不顧至則兄已絶矣乃為扶柩歸葬焉其於宗族皆有恩意親厚無間言性愛梅羅置階下花時徜徉其中扁曰萬玉築墻以蔽其外役夫發地得錢數斛歸之先生先生曰此天濟汝也吾何與卒不受鄞人姓潘者鬻農具經其鄉值風雪寒饑垂盡先生衣食之得不死嘗夜歸過余支湖忽寒風颯然有異狀先生心動曰顧安所得燭乎俄有火自山際來視之無人也先生曰爾來為我當送我過湖火遂前導及家忽不見是夜夢有告者曰我湖山主人也知君將及難故來救明旦聞有數虎共啖牛湖上先生非隂佑殆不免其行孚於鬼神蓋如此晚年作小軒號拙逸人稱為拙逸先生及受封鄉人皆以為榮而先生不自矜大非公事不一至縣門人以是益髙之娶蔣氏士族女相敬如賔閨門雍肅未嘗妄言笑婦道母儀皆可師法先十有九年卒贈孺人繼室陳氏子男二長琮讀書為士次即瑄女二皆蔣出也孫男闕先生姿貌魁偉美鬚髯慷慨尚氣節篤於教子每延名儒為之師而厚禮焉暮夜則躬課二子所受書必成誦乃已初遣瑄為邑庠生訓勵之甚至及取進士官翰林則以書戒之曰爾所師友者皆今世巨公偉人當修身慎行毋忝於親無負於君臨終勉琮以睦兄弟教子孫且令諭瑄益以忠謹為務喪禮悉依家範言訖而終二子卜以闕年闕月闕日葬先生於其鄉觀音峰之原而以蔣孺人祔禮也於乎君子之道以孝弟為本善以及物者皆孝弟之推也若先生者非孝弟之君子哉葬其可不銘銘曰孝弟之道始於其親推以及人而感乎神有子克賢顯榮其身昭德垂休百世不泯主事郭公墓志銘正統十年四月刑部郎中廬陵郭循以翰林編修陳文所述其父主事君行狀詣豫曰先人生於洪武壬子六月十九日宣德庚戌循備員刑部主事承朝廷褒封以循所居官享其福祿榮名者五年而以甲寅二月草六日卒年六十三是年十二月葬里之同井師姑山今十二年而墓尚未有銘懼無以昭德垂後敢請於先生豫以鄉郡之好不得辭然靡於職務未暇作也十月上命舉賢臣可以當方面者刑部尚書金公以循薦即命為廣東參政將行復申前請曰循之獲備任使皆先人之教今得拜墓下徒抱痛於無窮先生幸賜之銘以納諸墓隧俾永承不朽則為惠大矣豫重哀其志乃按狀序而銘之君諱勉字景敏竹林先生其别號也曾大父仕先大父有道父桂芳皆不仕母羅氏君自幼頴拔喜讀書既長益肆力於學學成故家右族爭迎致以教子弟篤於事親養生送死無違禮二兄逺客君皆獨任之居家惟以詩書自娛兄子賔初亦好學君日與講論扁其所居曰竹林清隱鄉人因以為號焉其教子姪皆令通一經嘗曰吾家不能以財産勝人惟讀書則不可後人子循有美質遣為邑庠弟子所以訓勵之者甚至逮取進士為刑部主事則數以書戒之曰刑獄重事也宜廉公平恕毋負天子欽恤之意循嘗上書言事有所忤人皆危之君聞之曰出位而言固當死然聖明在上必不以言罪人未幾果得釋則又以書戒之曰君子思不出其位治獄爾職也慎修爾職斯可矣及循出録囚便道過家旦日即遣去曰爾有公事毋久留纍纍以敬慎為勉公忠厚端重其言行皆淳正不矯飾以徇流俗於夫治生産為異日計者皆略不經意而樂以餘財周貧乏嘗客遊桂林盜夜竊其資以出或促君追之卧不應徐曰彼以貧至此吾幸有餘積因而與之可也奚用追人皆稱君長者君既受封鄉人莫不羡其榮以為有德之報郡縣長吏行鄉飲必請置賔位進退有禮人不見其惰容閒居無事親戚故舊相過從者觴飲無虛日然未嘗亂襟度豁如也娶孫氏封安人有賢行先四年卒再娶劉氏後四年亦卒子男二長即循次通女五皆適士族孫出也孫男六人郭氏蓋汾陽王之後王七世孫在徽唐末為鴻臚卿以言事謫守廬陵因家城北之麻岡今居炯溪者又自麻岡徙焉君之族也嗚呼自唐肅代以來至于今七百餘年其間世臣大家盛衰興滅者何限而汾陽王之子孫愈久而彌昌豈非功德之大而天報之宜爾其厚邪而君父子所以承先而裕後者又表表如此郭氏之盛其有已也哉銘曰鴻臚南遷忠武裔廬陵再振篤文藝維公蓄德子能繼顯身榮親䝉帝制夀考康寧福斯備云胡一旦奄然逝髙墳峩峩永潜翳作銘者誰太史氏發聞垂休綿百世龍叔昭墓志銘龍氏居泰和甘溪為大家宋淳祐中有曰登者取進士為廉州推官弟際為臨江教授世以詩禮顯聞不特資産之富也其後有曰以傳曰明逺曰贈禮部主事仁安者則叔昭之曾大父大父父也叔昭闓爽不羣讀書能通其大義即止曰吾豈為章句儒哉然於人情物理靡不周知其事父母盡孝敬處兄弟極友愛於宗族朋友必循其道好仁篤義出於天性從叔升云早死叔昭撫其遺孤俾有立見人之貧困者或與之財或給與衣食無吝色鄉黨資賴焉平生侃侃負直氣人之是非事之可否不茍為異同惟一斷於理凡有忿爭搆禍難他人不能平者得叔昭居中無不帖然順從蓋其言公且信有以服人也叔昭兄叔粲為禮部主事叔昭數來省視諸公貴人聞其行者多敬禮之少師楊公尤加奬重每見於文字而叔昭亦承之以謙作屋聚書使子都等勤讀誦其中名曰甘溪書屋又為亭曰凝春雜植花卉客至即從容延欵翻閲經史談道義退而觴詠於亭中超然甚適也又遣都為邑庠弟子資而教之者甚至期必底于成叔粲致事歸兄弟相與盡天倫之樂而叔昭得疾以正統十年五月草三日終于家年五十六娶蕭氏子男四長都女四皆嫁士人幼在室孫男二儀佐子都等卜以是年闕月闕日葬於闕原於是叔粲之子中書舍人文述其行實詣豫泣請曰叔父嘗辱愛于先生其德善之詳先生實知之葬宜有銘願求一言俾託以不朽嗚呼豫與叔昭父兄相好四十年而交叔昭亦二十年矣其知之蓋深則叔昭之墓非豫誰宜銘銘曰克善其身克篤其親義洽鄉人惠周困貧天胡不仁而不俾長存杳一去兮隔九原我為銘章納墓門垂耀百世在斯文侍郎李公墓志銘正統十年九月二十三日正議大夫資治尹戶部左侍郎李公終于位初上以陜西災慮儲峙或不充欲遣大臣往按視河南地近關中積粟可移者有幾關右河西諸郡邑能免於災有粟可糴者凡幾即以內帑所出金帛收市之務使倉廩實而人不告病衆謂莫如公公亦以身任之將行疽發右脅而氣不少衰曰是豈能為吾害哉奏請緩數日即行上壯之積十餘日疾浸甚猶强起戒行李及大漸不能興時猶咄咄以整理糧草為言無一語及家事而卒事聞上為之嗟悼遣官賜祭命有司治墳塋子升等奉柩歸長安以闕年闕月闕日祔葬終南山北祖塋之次而以翰林編修楊鼎所述行狀來求銘豫嘉其有體國之心而深惜其死奚可以不敏辭公諱暹字賔暘系本出隴西今家長安不知其所以徙髙祖忠信曾祖茂叔祖彥均父才甫皆不仕及公貴祖父皆贈通政使妣皆淑人公以洪武丙辰三月三日生自幼屹然如成人稍長喜學為邑庠弟子員領鄉薦入太學永樂初擢為北京行部戶曹主事調行在戶部於錢榖出入靡不盡心毫髮無所失坐纍左遷清河監副清河不利孳牧公力請移房山馬大蕃息太宗皇帝在位德化大行四夷嚮風西域諸國數遣使貢馬及諸水土物詔擇羣臣忠厚知大體有綏靖才者往撫之公在選與吏部主事陳誠偕行踰數萬里至賽瑪爾堪公姿貌英偉言辭辨正宣布天子仁厚之意其君長聞之皆悅服稽首南向尊朝廷宴享有禮所過部落遞送迎遍厯諸國皆得其歡心公之名亦遍滿西域使還各遣人隨入朝貢獻稱謝凡五往返不替益䖍上嘉之賜賚稠疊復命為户部主事升郎中宣宗即位以京庾儲積多不能無蠧弊詔舉廉公有為一人理之大臣咸薦公公既受命謹防範夙夜勤勩震之以威處之以公典守者畏戢不敢復怠肆宿弊盡革升右通政再升通政使仍理其事久之上以通政司出納政令而使為之長不可久曠其職乃令公歸署未幾丁母淑人憂去官治喪以禮未嘗用浮屠喪三年不離墓側服除入朝仍命至京庾兼理積芻遷戶部左侍郎京師芻粟以億萬計皆委公事既繁重公不以為勞惟日夜憂慮或有闕失今年才七十欲上章乞致事㑹命下不果而竟以疾終公性剛嚴守禮法仕宦四十年治官事如家事人不可干以私事母極孝敬嘗以使命過家升堂上夀盡婉愈之樂母賢而子克孝鄉里榮之處兄弟相友愛篤於朋友非其人不交茍賢雖少必加禮教諸子以忠孝勤儉諸子亦克承其教先娶吕氏早卒贈淑人繼張氏封淑人六子升頤吕出也復益臨大有張出也女一孫男二銘曰侃侃李公植德自躬遭遇聖明克致其忠翔于大廷騫于絶域既宏厥聲亦丕乃績寵與位升遂佐司徒體國之心終老不渝噫嗟若人惟時之傑我作此詩以告來哲太淑人郭氏墓志銘太淑人郭氏諱妙明鳳陽洪塘湖人也父祥母熊氏以忠厚勤儉聞鄉里生太淑人端重柔惠間於禮則衣服飲食之事不待教而能父母愛之為擇壻以劉清才武遂歸之清九江德化人起自戎行擢為十夫長方奮志取功名不暇顧其家太淑人理之家日以裕年草六而夫亡太淑人益勤苦自勵躬女事以養舅姑教育諸子俾各務樹立長子源代父領其衆屢從征伐太淑人必勉以忠義報朝廷源能奉其教功業日盛遂自百戶纍升至懷逺將軍錦衣衛指揮同知在侍近者數十年家事猶太淑人主之小大之務咨而後行具有條理凡內外屬無間貴賤戚疏人人皆謂有德於已源之得盡心所事荷列聖寵遇之隆有勞績而無過舉太淑人之教也子孫女婦朝夕受訓言皆克興其家正統十二年三月初一日以疾卒於北京明時坊之官舍距其生元至正癸卯七月草六日享年八十五三子長即源次政次全早卒孫男十五人女八人曾孫男四女四源典親軍嚴侍衛例不得以親解遣潮等奉柩歸南京是年闕月闕日葬于江寧縣趙家村新豐山之原而以錢塘王謙所為行狀來求銘豫觀太淑人之德備于身儀于家受封秩之榮享祿養之厚有子有孫蕃衍碩大而又以髙夀終其得於天者厚矣葬奚可不銘銘曰孝敬順祥女德之良猗嗟淑人實踐其常既興其家亦成其子桓桓懷逺功業焯煒錦誥煌煌三品之封富貴夀考孰比其隆新豐之阡卜者曰吉昭德有銘太史所述處士魏仲英墓志銘正統七年十二月甲子餘姚處士魏默仲英以疾卒於家年六十五其子瀧水丞瑶歸服喪屬吏部員外郎柴蘭庭芳狀其行來請於豫曰瑶之奉葬事有日矣葬而不得先生銘將何以昭德垂後敢以請豫念初因吏部侍郎魏公得識瑶由是而知處士及處士得虞邵菴所注杜詩欲刋布以惠學者求豫序其所以刻之意豫之知處士舊矣則於銘墓奚可辭魏氏唐鄭國文貞公之裔始家巨鹿其後纍因事而遷故今為餘姚人曾大父福賜建昌路學正大父谷仁父子祥皆不仕處士幼不好弄喜讀書嶷然如成人早失怙恃居喪無違禮而哀戚過之伯兄仲遜早亡事寡嫂尤謹與仲兄仲厚弟仲述相友愛甚篤治家整齊內外斬斬聚書以教諸子及鄉人之子弟必使勉於為善雖號能飲然未嘗獨醉賔至則傾倒盡歡或雅歌投壺吟詠以為樂雖終日不厭嘗踰江淮涉濟鄆以至京師覽山川之雄深人物之繁富都邑之巨麗四方萬國之㑹同禮樂文章之昭著其意氣超然往往於詩見之與鄉人處一以義不以貧富貴賤易意其有不平來求正者則以理喻之無不悅服樂善泛愛待人不疑人有貧者處士嘗召與同處周給之乃竊取槖中金處士恐其不自安卒不問工人有受處士金為製器者因事盡費不能償每見必慚恧處士憐其貧亦不取見人貧窘或貸以金或濟以粟帛有負官租者代之輸以田土質錢者久不能贖焚其劵鄉黨宗族賴其賑贍者蓋多其心之厚於仁如此性好菊植數百本充其庭號曰菊莊花時日觴詠其中京師士大夫聞之亦有為之賦者娶曹氏有賢行子一人即瑶以賢舉為丞能於其職孫男四其葬以卒之明年十二月癸已其墓在邑西豐山之原銘曰篤於親惠及人薄於利厚於仁從容觴詠樂其真於乎逝矣名則振百世考德在斯文侍讀尹公妻羅氏墓志銘孺人羅氏吉水人考宏達妣周氏孺人為幼女最鍾愛既長為擇配得今翰林侍讀尹公鳳岐而妻之年七十而卒子昭㑹試在京師聞訃哀不自勝以其從兄建陽令載魯所述行狀來請豫銘將歸納諸墓而鳳岐亦致書於豫以墓銘為屬豫觀其意皆哀念篤至而欲託諸文字以傳不朽則孺人之婦道母儀可知矣故為序次其事而系以銘孺人聰慧夙成讀孝經女教能通其大義精勤女事每過夜分雖寒暑不廢足跡未嘗出外庭躬烹飪以事父母有疾尤謹視藥食不少懈年十七歸尹氏不及事舅而有大父母及姑在堂姑慮其出富家未能甘淡泊以意諭之孺人即減去服飾奉所有以歸于姑從姑事大父母極孝敬退而事姑尤恭順婉愈大父母沒相夫盡喪葬之禮姑嘗病卧床褥者數月醫禱皆弗效夫婦色憂夜泣籲天願減已年以益親夀及終治喪無違禮而哀戚過之鳳岐學日有名郡邑諸大家爭迎致為子師而孺人專家政鳳岐益得以肆力於學江西按察僉事黃翰汝申行縣聞其名籍甚舉為郡庠弟子其所以資給之者多出孺人機杼中取進士官翰林遣人迎孺人孺人以幼稚為纍不果行乃為娶側室益勤儉治其家男女婚嫁皆盡禮洪熙改元封孺人衆皆稱慶孺人念姑不及見為之戚戚以悲及鳳岐歸焚黃欲以孺人行慮諸子廢學復不果久之鳳岐喪側室遺諸子女皆幼乃迎孺人來京師撫育之恩同已出僅三年見二女已長惟務刺繡歎曰吾聞古人謂錦繡纂組害女紅此何益於實用乃擕之歸教以紡績織絍凡女婦所當務者卒皆稱賢焉孺人忠厚慈惠而謹禮義家庭之訓秩然有條理嵗時奉祭祀給賔客睦姻族鄉黨撫臧獲下人皆適其宜凶年饑嵗不吝施豫其所周給全活者蓋多孺人子男二長哲先卒次昭鄉貢進士女四側室子三貞泰來泰同泰皆習舉子業女二孫男五孫女五孺人之生以洪武戊午闕月闕日而卒於正統丁卯十一月初九日其葬以闕年闕月闕日其墓在之原銘曰孝敬惠慈實宜乎其家勤儉自持淳質而不華歸藏于兹孰不悼嗟銘以昭之百世之遐抑菴文後集卷三十一
