body:
  text: 抑菴文後集卷三十五明王直撰賦瑞應麒麟賦繄皇明之統天而開業也惟聖主實隆道德巍然南面以治之於是恢四𬈑包八紘廓蔽翳開太平仁聲洋溢而天運武誼燀赫而雷轟扇淳風之沕穆兮熙皇道之大成故天以之清而地以之寧自唐虞之所不庭商周之所未臣遐陬異俗詭服而殊形者莫不稟朔納賮奔走而來賔湛恩布濩於一視和氣坱圠而無垠由是叶休徴暢洪鈞嘉應集靈物臻彼草木鳥獸之為瑞兮蓋不可以殫陳然至德之感日進而不已兮故又産夫麒麟者也爾乃格柔祇降圓靈絪緼翕合胚凝乎五行元枵宣其精蓐收賁其英繄靈氛之暗靄兮倐天開而日晶至其略西極逰海隅協帝文應瑞圖首四靈以表異兮百獸從而雲趨榮光煥耀乎廣漠異景旁燭於昆墟必擇地而後處兮豈罝羅之足虞山祇蔽視而閃爍海若縮栗而睢盱曰中國之聖瑞兮匪下邑之能居爾乃抃夷長歡庶氓格上下告神明祝史正其辭庶官致其誠紛寶玉以為侑兮羾翼翼之天京䕃景雲之霏霏挾祥風之泠泠飄飄萬里超乎其逺至兮實感德而承慶馮夷按節以翼衛陽侯先路而迅征豐隆飛廉紛紜揮霍以儐相兮走蛟鰐而讋鯨鯤背蠻方之卑陋兮造瑶臺之峥嶸瞻繡户而望金鋪兮餐瓊芝與玉英固在物之為美信皇仁之攸徴觀其容止安循進退暇豫撫之而不驚逼之而不懼匝日域以規翔歷天庭而矩步圓蹄跱而玉潔竒文粲以雲布忽引脰以長鳴兮合自然之鍾吕不抵觸以為剛兮不輕踶以為武含淳和之資蹈仁義之素恐一物之或傷故每行而曲顧雖毛鬛之同羣乃殊情而異趣振振仁厚信若此兮非他物之可同日而語也羣臣乃欵閶闔朝明堂徴往牒啓靈章跪敷袵以昌言兮近穆穆之清光曰希世之竒祥兮冠神龍與鳯凰昔帝軒之在位兮遵靈囿以翺翔繼周南之歌詠兮徒託意而相方俟有道而後顯兮甘逺跡以自藏惟聖德之盛大兮超千古而式彰宜兹瑞之來效兮昭皇祚之隆長然聖主謙以自居勤而愈勵嚴敬恭申法制校德三皇程功五帝並明乎日月侔大乎天地戒百工警多士宣鴻猷熙庶事敦無外之仁衍無窮之利必統和乎三才陶甄乎萬世豈特鳥獸草木之多瑞而已哉於是羣臣欣躍俯伏就位敬佩德音咸稱萬嵗頌瑞應𤣥兔頌有序宣德四年春𤣥兔見于寧夏守將太保寧陽侯陳懋得之以獻既至京師詔以示百官其色黝然安馴不驚􅀈若油雲潤若𤣥璧文武之臣欣抃贊歎咸以為千載非常之瑞蓋兔者月之精其色褐若質之敻出常品者皆瑞也在昔常有白兔呈祥形於頌稱傳記所載亦不多見至於𤣥兔自昔未有實為大瑞始見於今蓋天以彰陛下仁聖超越古昔而為國家萬萬年太平之徴應也臣切思之天之降祥必以類應瑞麥嘉禾所以表陛下養民之德騶虞所以昭陛下仁民之化𤣥兔之來必不虛應蓋𤣥者天之正色而亦北方之色也今陛下端拱北京南面而治聖德如天覃被萬國民物熙熙莫不生遂𤣥兔兆祥蓋以此也所謂非常之瑞是宜有頌歌以傳示萬世臣謹拜手稽首而獻頌曰有𤣥者兔實自天成厥生伊何維月之精匪赤匪蒼黝然其色潔之潤之𤣥冥之澤何以比兹𤣥玉其溫又若𤣥雲凝彩絪緼聖眀之世育此竒質夫豈偶然維天申錫桓桓武臣作鎮邊疆得而獻之天子之祥金門洞開萬里而致鮮颷翼櫺白日垂麗厥性安馴不怖不驚重瞳屢顧榮光滿庭百僚歡欣昔未有此始應於今維聖天子維聖天子聖德如天湛恩汪洋萬方被焉凡厥庶民昆蟲草木以恬以嬉以生以肓𤣥兔之來協於瑞圖麒麟騶虞厥應同符臣作頌詩傳示永久瑞應麒麟頌有序臣聞靈物有四麒麟為首是曰仁獸惟聖仁在位而後見非偶然也天也軒轅在世麟育於囿其後雖或見之然亦少矣惟我太宗皇帝德同天地而天兩生麒麟以應之今皇帝陛下以大聖之德居至尊之位仁恩義澤漸被萬邦民物恬熙逺邇無間蓋與前聖比隆並美宣德八年八月海外諸蕃國以麒麟來獻生質之美性資之純考之瑞圖實與協合從以金獅紫象𤣥虎福祿諸獸皆容止安馴文彩煥耀進趨有儀率舞中節此誠聖德格天是以天心恱鍳産此大瑞實彰皇仁之大篤近而逮逺也聖子神孫仁厚之應於此見矣臣忝職詞林以文字為業覩兹瑞應無任欣抃宜有頌歌以傳永久謹拜手稽首而獻頌曰四靈孰先惟此祥麟聖感則生實由天乎五行之精儲和凝粹厥性孔純服仁合義其尾維牛其身維麕專居特逰不旅不羣有圎其蹄維馬是似有觩其角亦不以抵擇地而行蹈矩中規鳴聲以時律吕實諧凡物之生避而弗踐治化昭明其跡乃見維南諸蕃粵在窮荒海波際天融此渺茫四聖一心日臨天覆滂霈大恩沾洽逺夷蘇枯濡槁融為春熙至和絪緼遂産靈物夫豈偶然時應而出島嶼之間榮光燭宵徐而視之其靈昭昭蕃酋愕眙曰天所貺豈為鄙䝉天子在上其容舒舒其來于于誠以將之皇德之符德符維何帝命用告式彰聖仁柔逺之效陽侯率職微瀾不興十餘萬里貢之天京山川邈悠皎日垂絢載道歡呼麒麟來獻鮮颷廓清有雲而卿百辟謳歌麒麟來廷從以金獅紫象元虎亦有福祿昻昻噳噳簉跡彤墀率舞有儀仰瞻六龍樂遂其依於維嘉生世不常見考牒稽圖亶天之眷昔黃帝時育於囿中後有明哲亦罕其逢逮我太祖聖神文武萬邦咸和各得其所祥麟之來聿昭時雍頌聲載揚穆如清風維聖天子道德全備髙明配天博厚配地惠於下民克篤其施草木鳥獸亦罔不宜天監孔明用顯厥應嫓美前聖以昌景命國家太平悠久之徴聖子神孫振振繩繩華夏蠻貊安此盛治聖夀萬年寶祚萬世瑞應景星頌有序宣德八年閏八月戊午之夕景星見於天門其色赤黃明潤融朗欽天監以聞在廷羣臣莫不贊慶謹稽載藉有曰天子至孝任賢使能海內歡恱制作合天法令清眀則景星見又曰人主德至於天則景星見於天門恭惟皇上嗣位以來繼志述事率由舊章誠以奉宗廟敬以事聖母屢詔舉賢以任庶官禮樂修明法度昭著深仁厚澤涵被天下至和之氣充塞宇內聖德之盛感通於天故天發祥以著明應此誠國家大瑞萬萬年太平之慶實兆於此無任歡欣拜表稱賀皇上謙抑弗居降敕戒勉聖意若曰朕承天位統治天下惟天與祖宗付畀之重夙夜兢兢弗遑寧處所以孝事宗廟敬養聖母圖任賢才以綏靖兆民懷輯萬邦者實切於朕心而惟恐未至今天發祥如此豈朕之所克堪朕惟益務敬慎爾羣臣亦思勉勵以左右不逮毋負天與祖宗之意則朕以嘉羣臣稽首受命而有以知皇上之德即堯舜之德也臣切思之天之與人若甚相逺也然天之視聽接於人實未嘗相逺是故聖人與天地合其德則天應之猶影響然天人感通之妙豈有間哉昔者帝堯在位克明峻德以親九族和萬邦孔子贊之曰惟天為大惟堯則之舜之德則合乎堯合乎堯者合乎天也是以當時皆有景星之瑞百工相和而歌之今皇上大德比隆堯舜而與天合故景星之顯於今者無異於唐虞之世臣雖不足以擬唐虞之臣然豈可無詩歌以贊揚盛美不揣庸愚謹撰景星頌一篇百拜上進頌曰明明上天有赫其神雖髙以遐實邇而親孰當天心維聖天子其德克明其應有暐維時仲秋金颷徐興隂氛斂藏天宇廓清仰瞻穹窿湛澄一碧靈氣翕張禎符乃錫西北之區是曰天門有星而景既赤而􅀈粲然朗潤炯其融輝如珠之華如玉之爍其始維三合而一之相比相含以揚其輝如月之半與月為助神光燭天流於下土太微霦霦北極焞焞萬象璘璘萬物欣欣垂彩耀芒顯天之應天應斯何維天子聖在昔陶唐暨乎有虞獲此明徴維德之符世逺道悠逮于今日皇有聖德嘉應斯出維皇至孝實與天通致養聖母敬愛兼隆宗廟之祀誠意孚暢祖考洋洋來格來饗維皇至仁與天運行惠澤滂流時和嵗登率土之濵均浹咸被熙然同春無間逺邇維皇聰明神武聖文既憲于天亦用良臣小大之才靡有遺棄治化宣昭禮樂明備維皇中正剛健粹精惠綏撫摩民物用寧華夏蠻貊薄海內外奔走率職以熙帝載恭惟皇帝堯舜是同維天發祥式表天衷天錫皇帝聖夀萬嵗福祿隆長永安大位天錫皇帝聖子神孫萬世相傳萬國之尊小臣蕪陋文字是職作此頌歌播之金石詩騶虞詩有序臣聞聖人有大德以居天位治化之美格于上下則天不愛道地不愛寶發其禎祥以彰靈應河出龍馬洛出神龜實所以彰伏羲大禹之德而文教以興載之簡册昭昭然也恭惟皇帝陛下以至聖之德嗣登大寶之位敬天勤民必誠必信仁厚之德浹於萬方昆蟲草木皆遂繁殖上天彰應嘉祥屢臻而騶虞二復出於滁州來安縣石固山夫騶虞仁獸也不踐生草不食生物王者有至德而仁洽于天下然後出誠非常之瑞物也昔太宗皇帝在位時嘗兩見焉天下臣民歌頌至今陛下聖德同符太宗治道之隆儷美前古故騶虞復出為瑞此天所以示嘉應也昔周文王仁及庶類品物繁昌當時有騶虞之詩以贊美其仁今騶虞實獻于庭天下臣民莫不欣抃是宜播之聲詩薦之郊廟以與永樂頌歌同傳使萬世之下有以知聖上功德格天巍巍煌煌如此其盛也臣謹拜手稽首而獻詩曰有靈者獸是曰騶虞環滁之山以潜以居其靈維何莫之與匹既𤣥其文而白其質猊首虎軀尾參於身一日千里孰知其神振振仁厚不踐生草彼物之生亦不以飽維天生之亦自天成聖明之世為祥為禎維今天子道德純至肫肫皇仁逺邇一視昭事上帝曰敬曰誠孚於下民皆樂其生皇天惟親兆民胥恱神祇效靈騶虞乃出石固之山榮光燭天百獸從之其形躚躚彤軒文檻帖然自致翼以祥颷獻於天子天開日晶慶雲垂英百僚歡趨騶虞在廷騶虞在廷實為大瑞龍馬神龜乃同其類昔在太祖文德武功騶虞之來頌聲渢渢維今天子祖武是繼騶虞復來以昭盛治穆穆聖明天眷滋彰萬世之隆萬世之光小臣作詩以歌盛美播之韶鈞垂示無已瑞星詩有序宣德五年十二月二十四日庚寅欽天監奏言丁亥之夕含譽星見於東南其色黃白其光煜然越兹兩夕愈益明潤謹按占書云天子施孝德興禮樂人民和恱中外奉化小國來朝則含譽星見誠為國家萬年太平之徴敢以聞在朝羣臣鼓舞稱賀臣恭惟皇帝陛下尊臨大寶撫育萬方聖德神功光于祖考躬事聖母皇太后孝敬備至天下莫不承式禮備樂和神人胥恱東西南朔無間逺邇奔走奉貢稽首闕下治化隆盛天心恱鍳瑞星之見厥有明徴不偶然也昔帝舜在位景星見于房百工相和而歌之陛下德侔虞舜超越百王今兹瑞應實與同符宜有詩歌傳示無極臣謹拜手稽首而獻詩曰季冬之月北風凉浮雲夜卷天蒼蒼含譽髙出東南方仰視其色白且黃金丸玉爍耀精芒紫微之垣近相望瑞彩燭照明煒煌列宿回環紛在旁匿影不敢同輝光吁嗟此星安可常自古罕見今發祥明明天子奮乾剛德紹祖考登虞唐祇奉聖母長樂康禮樂明備煥文章湛恩厚澤雨露滂兆姓和協歌豐穰蠢兹蠻蛋與氐羌遐陬外國皆服降俯伏闕下貢篚筐至治優洽騰馨香天心恱鑒亦已詳嘉禎垂示誠昭彰小臣濫厠文翰場歌頌盛美職所當鴻圖寶厯萬世昌陛下聖夀如天長退思齊詩有序退思齊者少師吏部尚書蹇公燕休之居也公以碩德重望歷事四朝毅然以天下之重自任凡其佐天子理百官均萬民者既已施之事矣退而又思於此一無悖於道然後即安不然則必復自道乃已焉公之存心如此所以荷天子之寵任而有譽於天下也士大夫樂道公之志而見於文字多矣公不鄙豫使賦之故為之詩曰奕奕新堂有矗其隅曷棲於中有琴有書誰其居之少師冢宰是究是圖以熙帝載公事太祖太宗仁宗暨於聖皇克奮其庸進思盡忠退惟其道出入敬恭逺猷辰告百官惟人百度惟貞匪究于懷曷贊國成皇帝曰都汝豫良弼公曰懋哉臣敢不力在昔大禹思日孜孜偉兹臯陶贊襄是思伊念民艱若撻于市周公其勤篤施四事惟公堂堂千載相望繹思不忘邦家之光任重道悠不徐不亟我作此詩以告無斁具慶堂詩有序具慶堂者府軍前衛指揮孫繼宗兄弟奉親之堂也孫氏鄒平大族世有德善其尊府推誠宣忠翊運武臣特進榮祿大夫柱國㑹昌伯母夫人董氏實國家貴戚今年皆七十餘矣繼宗與弟紹宗顯宗續宗純宗喜父母之康寧而䝉朝廷爵位之隆祿賜之厚乃特作一堂以娛親朝夕侍其起居承候其顔色備物敬養焉二親皆為之喜京師士大夫歌詠之而亦以屬余孟子曰父母俱存兄弟無故一樂也世之人有父母存者矣而或無爵祿之榮有爵祿矣而或無夀考之福有夀考矣而或無子孫之賢有子孫矣而或非戚里之貴是其樂有所未至今公備享諸福天下之樂莫有加焉者也此無他蓋由列聖躬帝堯之德以親九族和萬邦而公克篤忠敬之心履謙順之行其諸子孫又能循禮義守法度是以福慶萃於一門由此而加慎焉則富貴尊榮長逺而有耀矣故樂為賦之詩曰翼翼髙堂都城之東誰其居之戚里之崇疏封㑹昌寵澤優渥皇仁如天以親九族皇有顯命諸子與焉將軍之榮孰之與肩乃豐堂宇乃篤孝養華彩煥然衆之所望番番二親有偉其儀尊居在中錦幄繡帷子孫滿前鵷雛驥子再拜稱夀奉酒孔㫖伯仲之間有塤有篪綵服斕斑屢舞逶迤都人歡嗟是謂具慶嘉樂雖多莫此為盛皇德之大亶惟聖明美兹㑹昌克謹其承福慶之來既積既備子孫保之忠孝仁義層構巍巍碩大且堅篤慎弗忘奕世其傳承恩堂詩有序宣德八年二月少師吏部尚書蹇公新賜居第成詔公移入居之大官供具教坊設樂公卿大臣往落焉公感上恩德而思圖報于無窮乃名其堂曰承恩之堂示不忘也初公侍仁宗皇帝來北京居吏部廨署東湫隘囂塵無髙明之觀而處之裕如至是上聞之乃命作而賜焉髙大華煥稱所以體貌大臣之意公重慶人洪武中以科第起家祇事四聖今五十年夙夜盡心以修其職忠貞坦厚終始不渝上知之深信之篤任之專唐虞君臣志同道合而謨明弼諧蓋不是過也然當時優賜加禮不可得而考矣唐之魏徴忠純體國知無不言勸太宗力行仁義追踪堯舜其家無正堂太宗輟殿材往營之其後李晟有大功於德宗朝而尤希慕魏徴每有獻替蹇蹇盡大臣節其賜第於永崇里也京兆供帳教坊鼓吹而將相送之公遭遇聖明存心古道其寵榮亦若此於乎盛哉直聞之有非常之功則必受非常之賜公冠冕百僚經綸治具直愚不足以知之不足以言之蓋書所謂嘉謨嘉猷入告于內而順之于外者觀公之受賜則所以獲乎上者可知矣公年七十而以是名堂蓋亹亹之意寓焉京師士大夫多形於歌詠公亦俾直繼之夫堂之作蓋上之德也詠歌者豈獨詠歌斯堂之美哉昔仲山甫徂齊尹吉甫作詩送之而稱道其德業之盛序者以為美宣王蓋任賢使能宣王之美著矣故云然今之賜第所以優大臣旌賢德非過也然則今之歌詠雖亦謂之美朝廷可也作詩曰昔在太祖式是萬邦克生衆材以資臣工公初受命載筆在列升遷少宰允矣其傑太宗明明冢宰是升簡賢任官用贊厥成於穆仁宗公實元輔師臣之榮以貞百度維今天子其仁如天篤眷在公政達用宣天子曰嘻人惟求舊祇事四朝孰出公右乃相厥居弗稱具瞻乃命作之有翼有嚴言言渠渠式完且美詔公來居乃賜燕喜公卿大臣同往落之樂奏在廷百用具宜公拜稽首皇有大造沛澤駢蕃臣則奚報鞠躬殫慮以訖臣身臣子臣孫亦敢弗勤思昔名臣曰徴曰晟惟忠之竭而言之盡賜以居第榮觀備焉兹殆千年惟公則然無施不酬酬則必厚君子所存君子所有髙堂巍巍華榜在中皇德之隆以逮公躬皇德斯大公心則肅天子萬年永錫爾祿歌瑞雪歌有序臣聞聖人與天地合其德則天必發祥呈瑞以應之黃帝之甘露虞舜之景星慶雲是也當此之時天下和平隂陽順序五穀熟而人民育至于今頌之恭惟皇帝陛下以至聖之德撫盈成之運四方萬國悉庭悉臣年穀屢登民庶安業誠太平極盛之時而猶惓惓以養民為務此天地之心也宣德四年冬久未雪上念無以作豐稔弭災癘為民憂之十有一月乙卯大雪上用恱怡文武羣臣拜稽稱賀以為聖德格天所致聖心謙抑歸功於天地宗廟宸章垂示昭若日星且命錫宴於廷俾各霑醉而罷陛下之德比隆前聖而與天地同其盛矣易稱天道益謙書稱謙受益陛下聖德廣大天心協應而猶撝謙如此蓋受天之福而敷錫于庶民者愈隆而愈大矣臣備官翰林職在文字謹作為詩歌庶幾與虞舜景星慶雲之章共傳於悠逺歌曰聖皇大德侔天地心有所欲天應之今年仲冬久未雪當寧興歎憂羣黎于時葭管才欲動隂氣栗冽凝氷澌巍巍上蒼若咫尺一念感格回恩施浮雲萬里無異色羲和匿景西南馳雪花呈祥忽飄灑輕風旋薄縱橫吹落梅飛絮乃倣佛窺窗入户穿簾帷素姿玲瓏匪雕刻成此六出亦已竒湛然炫晃奪人目頃刻道路迷崇卑悠揚委積隨處滿造化覆育寧容私九重宫闕半天起仰視瑞彩明參差春芳先發上林內千樹萬樹瓊瑶枝西山漫漫灝氣接玉立下瞰東海涯川原廣衍望不極但見皓旰深含滋閭閻歡欣田里恱鼓舞頌詠騰京師蝗蟊殄絶疪癘息安居飽食端可期千官晨趨朝黼扆環珮照映光陸離肜墀拜賀祝萬夀太平珍貺實在兹明明聖德邁前古至誠孚洽猶謙撝歸功上帝及宗廟宸章炳煥星日垂玳筵大開錫宴樂玉酒瀲灔黃金巵在廷文武悉醉飽不數湛露兼鳬鷖小臣才薄忝侍近紀述盛美職所宜申歌天保答惠澤稽首願續豐年詩講義直既備員講官輪次進講以班列在東故常講四書每觀前賢文集有講義皆收録因閲家中所藏書得存藁數篇遂録之使後人知今日制作如此其副在官者尚多與非已作者皆不載大學之道在明明德在新民在止於至善大學是孔聖人教人的書這幾句是大學為頭切要的言語都是教人修自身的德行與齊家治國平天下的道理如何說在明明德大凡人心一箇箇都稟受得天地的正理也有慈憫的心也有羞惡的心也有謙讓的心也有分别是非的心隨所遇著便發見出來比如為子的孝於父母做官的忠於朝廷這箇道理在心上本來明明白白比如鏡子一般光明這便是明德人只為那私意牽引昧了這心便似鏡子被塵土暗了一般因此聖人說大學的道理先當整治的自己心上明白不教那私意昏蔽了才是明明德如何說在新民民是說以下的人新是改舊為新的意思在上的人把自家的心既整治的明白了方才教得下面人下面人若舊時有沾染得不好的都教他改了從新做好人如治一家教一家的人都好治一國教一國的人都好治天下教天下的人都好這便是新民如何是在止於至善這止字便如行到那去處住定一般至善是道理至當至極處如在上的人自明其德須要十分用心行好勾當到那道理至當至極處教下靣的人從新做好人也要十分用心到那道理至當至極處便是在止於至善這三句是大學一部書的綱領明明德一句又是新民的根本比先堯舜禹湯文武幾箇聖人都在明明德上做工夫起所以致得天下太平萬世瞻仰為法伏惟皇上留意詩云穆穆文王於緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信這是曽子解孔聖人所說大學止於至善的道理前兩句是引詩經文王篇裏說聖人止於至善的事穆穆是深逺的意思於是贊歎的言語是說周文王德行深逺不比那淺近的却又贊歎說文王明德的工夫不曽間斷所以他的德常常光明他一片敬心不曽一些怠慢曽子因敬止二字又推廣說文王凡事據道理行都處置得極停當且如為君呵心全在仁愛上撫恤百姓十分寬厚為臣呵心全在恭敬上服事人君十分小心謹慎為子呵奉事父母十分孝順為父呵教養子孫十分慈愛有事使用百姓每及與百姓每說的言語都出於誠心不曽一些失信曽子說文王這五件大事見得聖人所行都有箇極停當處若人因此推究將去每事都這等處得停當呵才是止於至善文王是聖人他全在敬止用功能敬便整齊嚴肅心上不昏昧了所行的事自然停當這敬字是一心的主宰萬事的根本尚書裏說堯的德欽為第一欽便是敬自古聖人德行只在敬上用功伏惟皇上以堯與文王為法生財有大道生之者衆食之者寡為之者疾用之者舒則財恆足矣這是大學傳第十章曽子解說治國平天下的事治國平天下怎麼說生財財是國家不可無的如奉養祭祀備燕享廪祿百官供給軍旅都要財用若不依著道理整治只管分外科征取怨於百姓這等呵如何平治得國家天下曽子先說一句生財有大道下面說生之者衆食之者寡為之者疾用之者舒這四句便是生財的道理能行這四件國家的財用自然生息這四件是萬世可通行的所以說是生財的大道如何是生之者衆財是百姓每用力做出來的若是用力的少逰食的多怎麼生得財國家的百姓不許他懶惰喫閒飯一箇箇都要他著實務生理這便是生之者衆如何是食之者寡國家用的官員一箇箇選好的著實與朝廷整理政事無一箇不好的又無額外濫設虗費了俸糧這便是食之者寡如何是為之者疾百姓每當耕種時著他耕種當收成時著他收成不輕易差使誤了他時候都得盡力做生理只便是為之者疾如何是用之者舒百姓每貢賦都有常數朝廷用度時須要撙節約量每嵗民間進來多少朝廷用出去的也不可過多常存得有餘這便是用之者舒則財恆足矣是說朝廷能行得這四件倉裏必有餘糧庫裏必有餘帛不必分外科斂百姓國家財用如常充足這等看來生之者衆食之者寡為之者疾用之者舒這四件豈不是生財的大道理萬世通行的良法臣謹按洪範八政食貨為先周官太宰以九賦斂財賄以九式均節財用莫不以財為言誠以財者國用所不可無但能務本節用百姓既足則朝廷自足唐虞三代行此道所以天下安寧治化隆盛然國家理財必用君子乃能行此道君子以厚民之生為心所以能致治平之效後世如漢武帝用桑宏羊唐德宗用裴延齡宋神宗用王安石吕惠卿皆行剝削之政以求富國家卒致百姓疲敝禍亂以興由其不用君子不明聖賢生財之道所致也大學這幾句有補於國家萬世在君上所不可忽者伏惟聖明留意天命之謂性率性之謂道修道之謂教這是中庸第一章中庸是孔子之孫子思作的書孔子之道傳之曽子曽子傳之子思子思憂道學失其傳所以作此書為頭說天命之謂性率性之謂道修道之謂教見得性本於天道原於性所以使人盡其道則在於聖人之教如何是天命之謂性命猶令也如分付的意思天以隂陽五行之氣化生萬物氣以成形而理亦賦焉於是人物之生因各得其所賦之理以為健順五常之德這理與心俱生所以名之曰性如何是率性之謂道率循也是隨順的意思言循其性則日用事物皆有當然之理如循性之仁則自父子之親以至於仁民愛物循性之義則自君臣之分以至於敬長尊賢循性之禮則有恭敬辭讓之節文循性之智則有是非邪正之分别這便是道道即是人當行的路一般所以名之曰道如何是修道之謂教修是品節分等第的意思道原於性固是人心所有的然其氣禀有清濁厚薄之不同是以於這道理上所知所行有過有不及的聖人因人物之當行者而品節之以為法於天下如禮樂刑政之類皆是化導人抑其過引其不及使歸於中道所以名之曰教大抵中庸為傳道之書堯舜禹相傳之心法在焉臣因子思之言而考之堯舜禹曰執中湯曰建中武王曰建極即此理也聖人存心出治以無過無不及為至所以謂之中孔子祖述堯舜之道以傳後世而子思此三言者又以明道之大原出於天而不可易而贊成天地之化者則在聖人也帝王出治之本聖賢傳心之要實不外乎此伏惟聖明體念子思之言以求堯舜禹湯文武之道斯道幸甚斯民幸甚博學之審問之慎思之明辨之篤行之這是中庸第二十章子思引孔子的言語意思說有志於聖賢之學在於明善誠身這兩事若不能擇善則天理人欲體認不真無以明善不能固執則天理為人欲所奪無以誠身所以人必學然後能擇善然後能固執這博學審問慎思明辨篤行五者是說擇善固執的工夫如何是博學博是廣博君子之於天下必欲無一理之不通無一事之不能故於詩書六藝無所不講古今事變無所不通然後有以聚天下之聞見而周知事物之理這便是博學如何是審問審是詳審人的學問既博中間或有時殊世異權變不同有所疑惑處不可不請問於人請問於人必須詳細然後所疑惑者皆得釋然這便是審問如何是慎思慎是謹慎學能審問於人無所疑惑必須反求於心研精至理不騖於虛逺不流於泛濫然後有得於已這便是慎思如何是明辨天下之事有義利之分是非之别辨之不眀則義利混淆是非顛倒學者必須於義利是非之間審察明白不可有毫髮之差這便是明辨如何是篤行篤是篤實用力行是行其所知夫既學之博問之審思之慎辨之明必須身體力行不使所知者為空言然後為實學這便是篤行大抵學問思辨所以擇善篤行所以固執非擇善無以明固執之理非固執無以成擇善之功所以宋儒程子曰五者廢其一非學也臣謹按此章孔子答魯哀公問政之言子思引之以明中庸之道其間所言達道達德九經行之皆本於誠然非生知安行之資必由學問之功所以申言為學的工夫有這五件學者於此實用其力則達道達德九經皆可體而行之天下國家無有不治者矣伏惟聖明緝熙聖學以為出治之本躬行仁政以致雍熙之效天下䝉福斯道幸甚斯民幸甚子曰道之以政齊之以刑民免而無恥道之以德齊之以禮有恥且格這是論語第二篇孔子說人君治天下的事其所行有不同則功效也不同道是率先引導的意思政是法度號令齊是整治他教截然歸一的意思刑便是刑罰德是本心所得於天的道理禮是制度品節尊卑髙下都有箇定分如何是道之以政齊之以刑民免而無恥這說人君治天下只要使人為善禁人為惡若先把法度號令去開導百姓百姓有不從的便把刑罰去整治他要他截然歸一這等呵只是禁制得人不敢為惡不足以感發人的善心百姓每一時畏懼聽從但要茍免刑罰却沒羞愧雖是不敢為惡而為惡的心還在這功效却淺如何是道之以德齊之以禮有恥且格這說人君當以心上所得的道理躬行實踐去化導百姓且如要百姓每事父母先自孝於親以率之要百姓每事兄長先自弟於長以率之這道理都是百姓心上同有的他見人君是這等行呵他心裏都感發從化怎麼肯違了但是百姓的資質有髙下他從化有淺深却把那禮使他行教他都知上下尊卑的分限要截然齊一不可過不可不及似這等化導防範他呵百姓都恥於不善而皆歸於善比之茍免刑罰而無羞愧功效却深了大抵政是為治之具刑是輔治之法德禮是出治之本德又是禮之本從古聖人治天下何曽不用政刑但當以德禮為先孔子見周末為治的專用政刑不用德禮所以有此言臣考之大學堯舜帥天下以仁而民從之這便是道之以德禹湯文武有天下都是這等所以治隆於上俗美於下至秦始皇全無德以及民只用苛政虐刑苦害天下所以不能長久後來漢唐宋間有有德之君治號小康然皆不及堯舜堯之德如天舜之德如堯皆萬世所尊仰伏惟皇上留意孔子之言而以堯舜為法則天下幸甚子曰知者不惑仁者不憂勇者不懼這是論語第九篇孔子教人為學的次第如何是知者不惑知者心無所蔽能明察道理惑是疑惑大凡一事有一事的理一物有一物的理人於理上見得未明便自有疑惑惟心無昏蔽則物無不格理無不明如為父當慈為子當孝為君當仁為臣當敬凡天下道理都眀白透徹怎麼得有疑這便是知者不惑如何是仁者不憂仁者心無所私能全這天理憂是憂患大凡人心都有天理人欲若人欲勝了天理便一向循著人欲上去目視非禮之色耳聽非禮之聲口道非禮之言身行非禮之事便自有憂患若見道理明白每事都依著道理行不被私欲勝了視聽言動皆合於禮則心廣體胖自然安樂怎麼得有憂這便是仁者不憂如何是勇者不懼勇者奮决果敢足以有為懼是恐懼大凡人生受天地之氣以成形得天地之理以為性若氣失其養則體有未充便不能無畏懼而理有不行勇者能養此正氣至大至剛足以配道義天下的事但理上當為的便為有始有終不肯逡巡畏縮這便是勇者不懼此一章大意說學者於這道理知以知之仁以行之若無這勇不免半途而廢然必先知得分曉無疑惑然後行得停當無憂患又加以勇則能浩然直前而無所懼學豈有不成臣謹按知與仁是人性分所有的能力行將去便是勇這雖說為學之序然推而極之堯舜之治亦不過此皋陶謨曰在知人在安民知人是知之事安民是仁之事蓋心無所蔽而能察乎理然後有知人之明心無所私而能純乎理然後有安民之惠知仁兩盡始終如一則德化隆盛萬邦䝉福伏惟皇上留意於孔子臯陶之言則天下幸甚顔淵問仁子曰克已復禮為仁一日克已復禮天下歸仁焉為仁由已而由人乎哉顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰回雖不敏請事斯語矣這是論語第十二篇裏孔夫子答顔淵問仁的事顔淵是孔子弟子他以為仁之道問夫子夫子答他說克已復禮為仁一日克己復禮天下歸仁焉為仁由已而由人乎哉如何是克已復禮為仁克字解做勝字已是私欲復字解做還字禮是天理仁是本心全德凡仁義禮智都是心之德人有這仁便有那義禮智所以為心之全德人心都有這全德只為私欲昏蔽了若能克去私欲復還天理則本心之德復全於我這是說為仁的工夫如何是一日克已復禮天下歸仁焉一日言其日至近天下言其地至大歸字解做許字夫子說人能一日之間克去已私復還天理則天下的人都許其仁蓋天下人都有這箇仁我能全得這仁便合得天下人的心天下的人怎麼不以仁稱許我這是說為仁的效驗甚速而至大如何是為人由己而由人乎哉夫子又說這仁本是自巳有的為仁的工夫全在自已他人著不得氣力這是說為仁的機括在我而無難顔淵聞夫子這說話見得天理人欲分明便請問克已復禮的條目夫子答他說非禮勿視非禮勿聽非禮勿言非禮勿動非禮便是私欲勿是禁止的詞夫子說克已復禮的工夫全在禁止這視聽言動非禮處人有目不能不視非禮幼顔色禁止了不看人有耳不能不聽非禮的聲音禁止了不聽人有口不能不言非禮的言語禁止了不說人有四體不能不動非禮處禁止了不動這等呵則視聽言動不徇已私日用之間莫非天理為仁的功效豈有不至顔淵深達夫子這意思又自知他的氣力可以擔當說道回雖不敏請事斯語矣斯語是指非禮勿視聽言動這四句顔淵謙詞說我雖不聰敏請服行夫子所教的這言語先儒說這一章是孔門傳授心法切要的說話不是至明不能察其幾不是至健不能致其决所以孔門弟子只有顔子得聞這道理臣謹考論語一書顔淵所問有二一問仁一問為邦此章問仁是也其問為邦孔子曰行夏之時乘殷之輅服周之冕樂則韶舞是舉四代禮樂告之夫禮樂待人而後行人道惟仁為大自古君臣興禮樂教化之治亦惟仁德為之主本孔子嘗曰為政在人取人以身修身以道修道以仁伏惟聖明留意上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情這是論語第十三篇孔子告弟子樊遲的言語樊遲初間請問孔子種五榖菜蔬的事孔子說這是小百姓的事學者當為大人的事所以把這三件告他如何是上好禮則民莫敢不敬上是居百姓上面的人禮是天理節文見於威儀動作之間的道理為人上者非禮不視非禮不聽非禮不言非禮不動正其衣冠尊其瞻視有威可畏有儀可象這便是好禮百姓每見了自然起敬不敢有傲慢的心如何是上好義則民莫敢不服義是心上的裁制行事得當的道理為人上的凡事以義裁度必本乎天理順乎人情合乎時宜然後為之不本乎天理人情之正不合乎時宜則必不為這便是好義百姓每見上所為都是道理合當為的自然心恱誠服不敢有不順的心如何是上好信則民莫敢不用情信是真實不欺詐的道理為人上的以真實為心所行的如其所言所令的如其所好凡立法度施號令必詳必審以求至當然後宣布不以私意輕易更改失信於民這便是好信這等呵百姓每都以真實相從遵行教令不為虛詐趨事赴工不失期㑹無有不誠實的心孔子說與樊遲這三件上行下效便是大人所行的事臣謹按禮義信三者是人道的大經為人上者合當行的不是要人敬要人服要人用情而後為的蓋為上者是下民的表率上不敬則下慢上不義則下畔上不信則下疑所以為人上的必實有其善然後能感人孟子曰未有誠而不動者也大易有曰聖人感人心而天下和平為人君者以真實存心以禮義為教則足以感人心興治化伏惟聖明留意天下幸甚孔子曰君子有三戒少之時血氣未定戒之在色及其壯也血氣方剛戒之在鬬及其老也血氣既衰戒之在得這是論語第十六篇孔子說君子有這三戒戒是警省畏懼的意思凡人少而好色壯而好鬬老而貪得皆是血氣所使人有血氣才能生這三者之欲是人生所有的但當隨時戒慎以理勝之君子知戒所以為君子如何是少之時血氣未定戒之在色蓋人當少年血氣動蕩不定不免好色若放縱不止便生疾病所以當戒如何是及其壯也血氣方剛戒之在鬬蓋人當壯年血氣强盛恃勇好勝喜於爭鬬若馳騁不已便生禍患所以當戒如何是及其老也血氣既衰戒之在得蓋人至老年血氣銷耗不能勝人惟思利已若貪多務得肆欲無厭便壞了德行所以當戒大抵少未定壯而剛老而衰者血氣也戒於色戒於鬬戒於得者志氣也君子養其志氣不為血氣所動所以年彌髙而德彌邵也這一章雖是孔子教學者之言然通上下皆有益蓋學者不知戒不能為君子若有天下國家者不用這言語則關繫又大漢成帝自少好色其後寵嬖非人蠱惑其心至於傷絶子息漢業由此而衰漢武帝壯盛之時好大喜功窮兵黷武國家疲弊民力凋耗盜賊蜂起後乃悔過息民才免於亂唐明皇早年勤於為治至其晚年唯務聚斂任用小人刻害天下百姓愁怨明皇恃其富貴窮奢極欲大盜窺覦而起至於播遷由此言之豈可以不戒臣謹按洪範五福其一曰夀而必本於攸好德人君好德則自無三者之患而足斂福於已錫福於民伏惟聖明留意孔子曰君子有三畏畏天命畏大人畏聖人之言這是論語第十六篇記孔子說君子所當畏懼的事君子是曉道理有德行的人畏是恐懼敬慎的意思三畏是下文所說畏天命畏大人畏聖人之言這三件如何是畏天命天命是上天與人做好人的道理天生萬物獨厚於人都與他仁義禮智之性都有君臣父子夫婦長幼朋友之倫比萬物不同君子知這道理是天與我的心裏常常存著眼裏常常看著發言行事出入起居戒謹恐懼不敢違了這道理這便是畏天命如何是畏大人大人是有爵位有年齒有德行的人這等人爵位可尊年德可尚君子常以謙卑遜順為心安分守禮不敢以卑忽尊不敢以賤踰貴不敢以少陵長不敢以已之才知輕視有德這便是畏大人如何是畏聖人之言聖人之言是合道理的說話如堯舜禹湯文武周公孔子的言語載之經書以教天下後世都是修身齊家治國平天下的大道理君子講明其理而力行之為人君盡君的道理為人父盡父的道理為人臣為人子盡臣子的道理至於聖人所言天道人事吉凶禍福凛凛然常存敬戒不敢有違這便是畏聖人之言孔子說君子所畏的是這三件事若求其要只在畏天命一句蓋天命是天理大人與聖人之言皆是天理所當畏的人於天理知所敬畏則必能畏大人畏聖人之言然求君子所以畏天命的心又在知字上來人若不見得這道理明白怎麼有著實畏懼的心所以下文孔子又說小人不知天命而不畏也狎大人侮聖人之言由此言之學者欲知天命必先格物以致知欲畏天命則當誠意以正心大學曰物格而後知至知至而后意誠意誠而后心正心正而后身修身修而后家齊家齊而后國治國治而后天下平君子之學帝王之道一理而已伏惟聖明留意老吾老以及人之老幼吾幼以及人之幼天下可運於掌這是孟子首篇第七章孟子告齊宣王平天下的道理只在推廣自已仁愛的心以及百姓如何是老吾老以及人之老上面老字是尊敬奉養的意思吾老是自已的父兄人之老是百姓每的父兄孟子說為人君的把自已的父兄尊敬奉養必要他安樂也當念天下百姓每愛父兄的心與我一般都著他得尊敬奉養父兄不至於飢寒困苦這便是老吾老以及人之老如何是幼吾幼以及人之幼上面幼字是愛護教養的意思吾幼是自已的兒女人之幼是百姓每的兒女孟子說人君於自已的兒女愛護教養必要使他成人也當念天下百姓每愛兒女的心與我一般都著他得愛護教養他的兒女不至於流離失所這便是幼吾幼以及人之幼若天下為子弟的都得奉養父兄為父母的都得保愛兒女這等呵天下豈有不太平的所以說治天下可運於掌可運於掌是不難的意思大抵人君推廣自已的仁心以及百姓呵天下不難治所以孟子於下文引詩經說周文王的德行先行於一家妻子兄弟又行於一國也只是把這仁愛的心推廣將去人君若能推廣這仁心呵四海雖大也保守得若不能推廣這仁心呵妻子雖至親近也不能保孟子又說自古聖帝明王治天下國家也無别的道理只是能推廣仁愛的心以及百姓臣謹按孟子此言所重在推恩二字恩是人心上發出來的仁心便是天地生物的心聖人以天地的心為心親親而仁民仁民而愛物所以仁恩遍於天下齊宣王不忍一牛之死可謂有仁心而功不至於百姓者蓋是私欲蔽了自已的良心所以不能推廣孟子言人君當黜霸功行王道王道切要處不過推廣不忍之心以行不忍之政此萬世帝王所當體者伏惟聖眀留意道在邇而求諸逺事在易而求諸難人人親其親長其長而天下平這是孟子離婁篇孟子說人君平治天下的道理不必他求只在愛親敬長這兩件推行將去如何是道在邇而求諸逺事在易而求諸難道是自然的道理事是人所當為的事人都有父母有尊長在人為甚近父母是人當孝的尊長是人當敬的是自然的道理人以這道理為心孝於父母敬於尊長這便是當為的事人所容易行的若不在這兩件上用心却求於髙逺難行的事便不是自然道理便不是所當為的事這是孟子教人只當以孝親敬長為務如何是人人親其親長其長而天下平這是承上文說孝親敬長的功效人人是說天下的百姓天下的百姓都有父母都有尊長人君躬行孝敬親吾親以及人之親長吾長以及人之長使天下人都興起孝親敬長的心輕徭薄賦使他各得養父母奉尊長這等呵天下的人一個個能存孝弟的心都無爭鬬悖逆的事豈不是太平這是孟子說平天下的功效都在人君躬行孝弟上來可見道在邇不必求諸逺事在易不必求諸難臣謹按古昔帝王致治之效莫盛於堯舜求其本原堯克明峻德以親九族舜處父母兄弟之間克諧以孝推之天下黎民於變萬國咸和所以孟子說堯舜之道孝弟而已矣伏惟聖明留意擴充孝友之德以致太平之治天下幸甚斯民幸甚事孰為大事親為大守孰為大守身為大這是孟子離婁篇記孟子教人的言語事是奉事守是持守孟子意思說人之事君事長都是事而惟事親為事之大蓋事親者事之本也人能盡孝敬以事親則以之事君必忠以之事長必順所以說事孰為大事親為大人之守家守官都是守而惟守身為守之大蓋守身者守之本也人能循禮法以守身則以之守家而家道成以之守官而官事治所以說守孰為大守身為大然孟子雖以事親守身對說下文却說不失其身而能事其親則又重在守身上蓋能持守其身不陷於不義然後可以事親若所言所行一陷於不義便為失其身則不足以事親這又是教人以守身為事親之本臣謹按孟子此言蓋為學者而發故止於事親若就君道言之所繫為尤大蓋人君之身乃天下國家之本而事親其首也所以中庸說為天下國家有九經必始於修身大學言齊家治國平天下亦必本於修身古之人君有盛德大業者莫如堯書言其克明峻德者修身之事也下文以親九族平章百姓協和萬邦者齊家治國平天下之事也極而至於位天地育萬物一皆本於人君之身伏惟聖眀留意於聖賢之言以紹帝堯之治天下幸甚辨夷齊十辨一辨夷齊不死于首陽山二辨首陽所以有夷齊之跡三辨山中乏食之故四辨夫子用齊景公對說之由五辨武王之世恐無夷齊六辨史記本傳不當削海濱辟紂之事七辨道遇武王與周紀書來歸之年不合八辨父死不葬與周紀書祭文王墓而后行者不同九辨太史之誤原於輕信逸詩十辨左氏春秋傳所載武王遷鼎義士非之說亦誤謹按論語第七篇冉有曰夫子為衛君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也第十六篇齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓于首陽之下民到于今稱之其斯之謂與此二章孔子所以稱夷齊者事無始末莫知其何所指雖有大儒先生亦不得不取證於史記蓋孔子之後尚論古人無如孟子孟子止言伯夷不及叔齊其於伯夷也大槩稱其制行之清而於孔子此二章之意亦未有所發惟史記後孔孟而作成書備而記事富時有以補前聞之缺遺如子貢夷齊何人之問孔子求仁得仁之對倘不得史記以知二子嘗有遜國俱逃之事則夫子不為衛君之微意子貢雖知之後世學者何從而知之也此史遷多見先秦古書所以為有功於世也然遷好竒而輕信上世之事經孔孟去取權度一定不可復易者史記反從而變亂之以滋來者無窮之惑則遷之功罪豈相掩哉蓋夷齊不食周粟之類是已史記既載此事於傳又於周紀齊世家諸篇歷言文王武王志在傾商纍年伺間備極形容文字既工蕩人耳目學古之士無所折衷則或兩是之曰武王之事不可以已而夷齊則為萬世立君臣之大義也昌黎韓公之論是巳其偏信者則曰夷齊於武王謂之弒君孔子取之蓋深罪武王也眉山蘇公之論是已嗚呼此事孔孟未嘗言而史遷安得此歟或聞豫言而愕然曰謂孟子未嘗言則可首陽之事孔子章章言之子既知有論語而又疑此則是不信孔子也豫應之曰豫惟深信孔子是以不信史遷也且謂論語本文何以言之夫齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓于首陽之下民到于今稱之論語未嘗言其以餓而死也而史遷何自知之餓者豈必皆至於死乎夫首陽之隱未見其必在武王之世而二子昔嘗逃其國而不立證諸孔子對子貢之意則可信矣安知其不以逃國之時至首陽也孤竹小國莫知的在何所傳者謂齊威北伐山戎嘗過焉山戎與燕晉為鄰則孤竹可知而首陽在河東之蒲坂詩之唐風曰采苓采苓首陽之顛采苦采苦首陽之下或者即此首陽蓋晉地也若夷齊果孤竹君之子則逃國以來諒亦非逺何必曰不食周粟而後隱此耶今且以意度之國謀立君而已逃去則必於山谷無人不可物色之所然後能絶國人之思首陽固其所也蓋倉卒而行掩人之所不知固宜無所得食又方君父大故顛沛隕越之際食亦何心其所以兄弟俱在此者一先一後勢或相因而今不可知耳然亦不必久居於此踰月移時國人立君既定則可以出矣惟其遜國俱逃事大卓絶故後人稱之指其所嘗棲止之地曰此仁賢之迹也夫是以首陽之傳久而不泯何必曰死於此山而後見稱邪豫所以意其如此者無他蓋論語此章本自明白於景公言死而於首陽不言死後人誤讀遂謂夫子各以死之日評之耳此大不然也夫孔子以景公與夷齊對言大意主於有國無國尤為可見問國君之富數馬以對諸侯曰千乘所謂有馬千駟者蓋斥言其有國也夷齊可以有國而辭國者也崔子弒景公之兄莊公而景公得立崔子猶為政景公安為之上莫之問也享國日久奉已而已觀其一再與晏子感慨悲傷眷戀富貴直欲無死以長有之其死也泯然一無聞之人耳孔子歎之曰嗟哉斯人彼有內求其心棄國不顧如夷齊者獨何人哉彼所以千古不泯者豈以富貴哉由此論之則孔子所以深取夷齊但指其辭國一節而意自足若曰夫子取其不食周粟以餓而死則此章本文之所無也夫今去夫子又逺矣餓于首陽一語之外前不言所始後不言所終豫疑其在遜國俱逃之時而不死者蓋意之然豫之意之也蓋猶近似而無害於義理若遷之意之也略無近似而害於義理特甚焉大槩遷也専指文武為强大諸侯窺伺殷室以得天下故於世家則首吳泰伯於列傳則首伯夷遷之說出而孔孟所以言文武盛德至仁者皆變亂矣此事若不見取於大儒先生猶可姑存以俟來哲今亦不幸君子可欺斷然按之以釋論語則武王萬世當為夷齊之罪人夷齊借之以徇使萬世亂臣賊子知畏清議如此也而武王何罪哉豫言更僕未終亦不得已也然實欲反覆究竟折服史遷使不可再措一辭者吾徒之學誦詩讀書論世知人不當草草幸毋倦聽夫夷齊孔子之言略孟子雖不言叔齊而言伯夷甚詳若并取證於孟子則史遷所載諫伐以下曉然知其决無也孟子言伯夷之歸周也曰伯夷辟紂居北海之濵聞文王作興曰盍歸乎來史記本傳則不然削其海濵辟紂之事但於遜國俱逃之下即書曰於是往歸西伯及至西伯卒此下遂書叩馬諫武王之語數其父死不葬以臣弒君蓋以為遇武王於道也所謂於是云者如春秋之書遂事才逃其國遂不復反而歸周也則不知此行也二子亦已免喪否歟厄於勢而不返容或有之然逃彼歸此如同時然身喪父死自不得與於哭泣之哀也而忍以父死不葬責他人歟嗚呼此必無之事也夫遷所以削其海濵辟紂者何哉謂遷為未嘗見孟子歟則遷知其有書七篇其作孟子傳自言嘗讀之而屢歎矣然而如此書伯夷者其意可想也遷以不食周粟為竒節故欲見夷齊處心後來全不直武王而其初本無惡於紂也夫事不惟其實所不合已意則削之千載而下讀於是一語尚可想其遷就增損之情態而何以傳信乎故曰當一以孟子為斷夫伯夷太公兩不相謀而俱歸文王孟子稱為天下之大老太公之老古今所共傳則伯夷之年當亦不相上下孟子必不虛加之也然伯夷德齒昔縱與太公同而後來年齡豈必與太公等吾意武王之時未必猶有所謂伯夷也而遷所作周紀又自與傳不同何以言之伯夷以大老而歸文王文王享國凡五十年吾不知其始至也在文王初年歟中年歟末年歟不可考也而遷於周紀則嘗以為初年矣其言曰文王繼公季而立敬老慈幼禮賢待士士以此多歸之夷齊在孤竹聞西伯善養老往歸之然後曰太顛閎天散宜生鬻子辛申太公之徒皆往歸之然後曰崇侯譛西伯于紂囚于羑里然後曰紂釋文王賜弓矢鈇鉞得專征伐又數年而書聽虞芮訟又眀年而書伐犬戎自此每年書一事而各以明年二字冠於其上如是者凡七上去夷齊來歸之年不知其幾矣大槩書文王五十年之事稍稍排布嵗年而夷齊之歸為首其他未之先也以天下之大老其來在文王即位未久之年若謂其人猶及武王已平殷亂天下宗周之後姑少計之亦當百有餘嵗矣恐不必不食周粟隱于首陽山而考終已久矣遷既書于周紀如此及作伯夷傳乃言夷齊方至文王已卒道遇武王以木主為文王伐紂叩馬而諫不知此當為兩夷齊乎抑即周紀所書之夷齊乎若即周紀所書之夷齊則歸周已數十年非今日甫達岐豐之境也諫武王當於未舉事之初不當俟其戎車既駕而後出竒駭衆於道路也太公與已均為大老出處素與之同不於今日白首如新方勞其匆匆扶去於鋒刃將及之中也嗚呼紀傳一人作也乃自相抵牾如此尚有一語之可信乎觀其摸寫二子冒昧至前左右愕眙欲殺武王無語太公營救之狀殆如狂夫出鬬羣小號呶而迂怪儒生姓名莫辨攘臂其間陳說勸止嗟乎殆哉其得免於死傷也不亦幸哉武王方為天下去賊虐諫臣毒痡四海之紂而行師無紀左右遽欲害敢諫之士戕天下之父死生之命在左右與太公而武王若罔聞知萬一扶去之手緩不及用則是彼殺比干此殺夷齊其何以有辭於紂也武王順天應人之舉後世敢造此以誣之噫甚矣傳曰父死不葬紀則曰武王祭于畢東觀兵至于孟津載木主車中畢也者文王葬地也古無墓祭祭畢之說亦妄然一曰祭于畢一曰父死不葬又何也故凡遷書諫伐以下大率不可信使其有之孔子不言孟子言之矣豫若以孔孟之說折遷遷未必屈服惟傳自言之紀自破之其他卷猶曰破碎不全不盡出於遷之手而此紀此傳皆遷全文讀者知其非遷莫能作又不得疑其補綴於後人也曰然則紀與傳孰愈曰紀書文王其妄居半及書武王則妄極矣若其書夷齊一節猶略優於傳也蓋紀言其歸周及文王之生而傳言其至值文王之死也及文王之生者與孟子同而值文王之死者無稽之言也曰然則首陽之事其究如何曰豫前固言之果有夷齊暫隱之迹而不在武王克商之時武王克商之時恐已無所謂夷齊而孟子又不言叔齊歸周惟後之讀論語者惑於遷史增加孔子本文執所謂餓者為夷齊蓋棺之終事是以展轉附㑹爾夫理至于一是而止豫生百世之後安敢臆度輕破古今共信之說蓋見遷於論語才有一字之增而遂與孟子略無一字之合又紀傳色色不同徒以無稽之言貽惑後世是以詳為之辨庶幾自此觀夷齊者惟當學其求仁得仁與夫制行之清廉頑立懦之類而不必惑其叩馬恥粟以至於死然後語孟稱道之意可眀也夫讀論孟則見二子可師乃志士仁人甚自貴重其身抗志甚髙觀理甚眀俯仰浩然清風可仰而不可及孔孟之所謂賢由之則俱入堯舜之道也讀史記則見二子可怪乃羈旅妄人暗於是非進退輕發嘗試不近人情悻悻然以去終與自經於溝瀆而莫之知者比史遷之所謂賢由之則不過於陵仲子之操也學者於此從語孟乎從史記乎曰如此則遷無所據而容心為此何也曰遷自言之矣所謂豫悲伯夷之志睹逸詩可異焉者此遷之所據乃一傳之病源也逸詩者西山采薇之章也三百篇詩經夫子所删尚莫知各篇為何人作遷偶得一逸詩而妄意之曰此必夷齊也夷齊嘗餓于首陽今言采薇西山是不食周粟故也夫古詩稱采草木蔬茹于山者甚多豈皆有所感憤而不食人粟者乎粟生於地人人食之已獨不食則食之者人人皆非也異哉恥一武王而天下皆無與已同類之人然則試使夷齊之教行一世之人無一人肯食周地之粟而後可乎夷齊之風百世聞之而興起何當時此事無一人見之而聽從乎夫天下所謂西山不知其幾自東觀之皆西也詩言西山不言首陽不當以附㑹論語之所云也末句曰吁嗟徂兮命之衰矣遷以為夷齊死矣悲哉此臨絶之音也夫徂者往也安知作歌者之意不思有所往上言我安適歸則無所辟地辟世矣下又言吁嗟徂兮則於不可中求可猶思有所往焉既而遂自决曰命之衰矣歸之於天而終無可奈何之辭也豈必為殂卒之殂乎神農虞夏固不可見而以暴易暴何可以指武王武王非暴君也必欲求其稱此語者則自春秋戰國至於秦項滅國滅社何處不有乎然則世必有遭罹荼毒而作此詩者非夷齊也此詩誤遷而遷誤後世也或曰然則春秋之初魯臧哀伯曰武王克商遷九鼎於洛邑義士猶或非之杜元凱以為伯夷之屬也此在孔孟之間豈亦非歟曰非也武成之後武王嵗月無幾發財發粟釋囚封墓列爵分土崇德報功亟為有益之事則吾聞之遷鼎恐非急務也滅人之國毁人宗廟遷其重器强暴者之所為誰謂武王為之使果有所謂鼎則天下一家無非周地在彼猶在此矣豈必皇皇汲汲負之以去而後為快乎况罪止紂身為商立後宗廟不毁而重器何必遷乎書稱營洛乃成王周公時事在武王無之義士所非亦不審事實矣而義士又不知為何人自克商至於周衰然後左氏載此語蓋已四五百年四五百年之間豈無一士心非武王者得稱為義亦各有見也而何必以夷齊實之乎况左氏近誣未必斯言果出於哀伯乎嗚呼此武王夷齊終古曖昧俱受厚誣之事與咸丘蒙之徒妄言堯舜者頗同惜其出於孟子之後無一人識其為齊東野人之語故使流傳至今幸而竊讀論語偶思首陽之章未嘗言死遂得以盡推其不然惟此章之疑既釋則史遷失其所以憑藉附㑹之地豈非古今之一快哉然此愚見也不知來哲又以為然否續說豫既辨夷齊無不食周粟餓死首陽之事或曰子以為韓公兩是蘇公偏信之說皆非也二公蓋為君臣大義計縱不盡然要為有關於世教史遷雖誤而人不致疑固以此也今决破籓籬以為其事無有則孰愈傳疑之猶愈乎豫曰不然立世教必師聖賢師聖賢必稽事實事實所無而託聖賢以為重則是世教可以僞立也孔孟豈有此乎孔子稱殷有三仁而夷齊不與夫夷齊豈非仁人哉惟於紂與武王之際無其事故不系於殷也春秋貴死節賤事讎誅首惡罪逆黨君臣之義嚴矣孟子一言蔽之曰春秋作而亂臣賊子懼此孔孟所為立世教也夷齊無是事孔孟不言春秋為懲亂賊作則孔孟明著之世教自有在而焉用以所無者傳疑也若夫太史公之失有不止此者矣衛武公東遷以前賢侯也而誣以篡弒共伯宰我孔門髙弟也而誣以從畔田常彼豈知為世教計也哉後乎春秋如豫子為智伯仇趙襄子而必報之自謂將以愧天下後世為人臣而懷二心者其志發乎大義可以立世教者也遷置之曹沫専諸荆軻聶政之間總五人名之曰刺客其一切好竒而不明義如此彼豈知為世教者哉故欲知君臣大義莫尚乎春秋後世張子房諸葛武侯以至歷代忠義死得其所之臣則有合乎此矣無用史記虛託夷齊之事抑菴文後集卷三十五
