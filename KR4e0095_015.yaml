body:
  text: 抑菴文後集卷二明王直撰記金齒軍民指揮使司新建學記天之生人既以陰陽五行之氣成其形矣亦皆賦之以同然之理焉於是有仁義禮智之性以施之君臣父子夫婦長幼朋友之倫日用事物之間不以地之逺近或異也然氣稟有清濁厚薄於是理有不能全此教之所以不可無也金齒古哀牢夷之地漢始闢為永昌郡後世或因或革然皆羈縻而已至元以為永昌府建學以教其人後燬於兵國朝洪武壬戌取永昌置軍衛鎮之既而以民少罷府改衛為金齒軍民指揮使司以統之歲甲戌乃命秀才余子僖往教焉始立孔子廟於中正坊之西軍民子弟皆來學子僖卒指揮使胡侯琛廷貢車侯琳文玉等言於朝請以其子穀仍領教事未幾詔凡軍衛皆立學胡侯車侯復與同列協謀充拓廟左右地以為學舍堂齊門廡及諸器用靡不畢具仍請以穀為訓導既受職而歸則來告豫曰學校之建使其人皆入於善上之德大矣二侯祇奉上命以成就其事用心亦勤矣願為之記庶有考於永久且於學者進德之方亦願因之以示教焉豫謂聖人立教使人變化氣質而全性之善其說皆具於書讀其書究其言以明諸心措諸行自倫誼之大至於應事接物之常無不盡其道焉而又持之以誠加之以勇則安有不成者哉金齒入職方六十年其沐浴聖化久矣今又比之內郡立學校以教之此天子一視同仁之心也要在為之師與董其事者深體而躬率之耳穀字止善祇慎好學有志於古人而胡侯車侯等皆寬厚有智略亦孜孜學術庶幾古人所謂說禮樂而敦詩書者其能成賢才而美風俗可必矣故為之記以俟且使後之人有考而善繼之也謹菴記永樂二十年冬豫友曽公恪以其藏修之所曰謹菴者求豫記豫時以內艱服闋將之京師不果為而公恪求之不厭然終未有以應也及至京賔客往來之暇乃思公恪之所以自名與其所以名菴之義而為之記曰夫天之所以賦此理者蓋人人所同也然既得之又或失之者何哉欲勝而已矣然君子欲去私欲而全天理無他焉持敬而已矣孔子曰修已以敬敬者古先聖王之所行非孔子之自言也詩曰自古在昔先民有作溫恭朝夕執事有恪恪者敬之謂也堯舜之所謂欽湯文之所謂敬一也然豈學者之所可遽能哉黃直卿嘗曰敬者聖學之始終而謹為近欲為敬者先自謹入焉斯言也其亦子思之意也歟常因是而思之凡人之所以害夫天理者為其所不當為也其所不當為者非人欲之私乎誠於所不當為者知所謹而不為則亦豈有害理之患哉私意一萌內外紛擾其所不當為者皆為之於是天理蕩然矣夫安得不為小人之歸哉中庸之所謂戒懼者靜而謹也其所謂慎獨者動而謹也動靜皆謹則私欲不萌私欲不萌則其心一而不他純而不雜其所行者皆天理之正矣習之久養之熟則古先聖王之所行者可庶幾焉公恪之所以名菴者其意蓋若是歟菴在所居之何山林壑幽勝竹樹茂美而又有田園池沼之富閥閲聲望之華足以逞其欲為而無不可者顧乃退然一菴之中而謹於自修如此可謂有志者矣則其為君子孰禦哉豫與公恪遊且久故因其求而述豫之所聞者以為記公恪其有取於豫言也夫槐陰書屋記槐陰書屋者五雲王鑑讀書所也王氏居縣北之鴈塔里世敦德義為大家鑑之父仲敏雅志經史遣鑑受學邑庠蓋欲其有立於世也未幾父卒母段氏欲成其志家有槐樹鬱而茂乃就陰作屋四楹俾鑑力學其中又延名師以教焉鑑亦晝夜盡心不少懈然屢不偶於有司嘗自念曰期我於成者父母之志也我豈敢怠哉因名為槐陰書屋而請記於豫曰願有勗焉庶幾成吾親之志於乎鑑可為能子矣夫書以載道也栖之於屋而讀焉所以求道也聖人之道自君臣父子夫婦長幼朋友之倫以至於灑掃應對作止語默周旋曲折之間莫不有焉明於心見於行而皆不悖乎道之常則可謂聖人之徒矣君子之讀書為是而已子之親所以待子者豈不以是歟然則子之承其親當何如本於孝弟推之萬事萬物而各當其理由是宜於家孚於邦達於天下則親之志得矣是以志養者也孰謂子非君子哉抑子之所以名其居者其有取於晉公之事乎晉公不誣人以求達故其子文正為賢相顯名於天下論者以為仁厚之報非槐之為祥蘇子所謂德之符是也然文正之業盛矣當時謂其深沉有德望深者淺之對沉者浮之反也深則包涵渟蓄而邃於理沉則淵潛靜密而審於事此其所以為賢子之先世振施於鄉里不少矣而皆以隱終其鑑鍧振耀必在於子子之承其親亦法乎文正而已矣夫大有立於天下非浮躁淺露者所能也窮理而極於深微制事而安於沉靜學問之成功業之建夫何文正之不可及哉然則槐隂書屋將不與三槐等乎子必勉之此父母之志也豫亦有望焉故記之以俟四老堂記四老堂者嘉興城南趙氏所居之堂也趙氏之秀曰智以明經登第入翰林為庶吉士具其所以名堂之意謁豫告曰嘉興城南多湖水湖之南有大溪二一名秦溪一名長水南行未十里有鄉曰白紵橋曰秀水富家大族多居焉其好善務本有趙徐朱盛四姓趙則智族也智之父質直明達儉約簡靜凡其所行足為宗族楷法其論事必據於理而能旁引曲譬以警發愚䝉其訓子弟諄諄無懈怠之意而徐氏存正朱氏謙光盛氏德材相好為莫逆存正外朴內敏於事無不通有功不誇有善不矜然他無所營躬率子弟耕稼以自樂謙光性敏喜讀書至老不倦怠於經史悉究大義而深於四書喜為人講說其書翰算法尤精德材溫恭謹厚教行於家閨門之內懿德淳備鄉人有富而驕者則必勉以善曰富不足恃也此四老者今皆七十餘矣居閒無事燕坐於此堂蕭散簡逺之趣敦厚和平之風表然為望於鄉里智之受益多矣因名所居堂曰四老堂敢請記於先生豫未暇作今智將歸省其親而速文不已豫聞古之君子以年德相髙而遂其樂者有之矣香山睢陽之徒是也雖或隱顯之不同要之皆當時所敬者宋至道中李相昉輩慨然欲繼之而終不能遂則知一時燕閒之樂亦非人所能必乃天也今天下太平時和嵗豐而四老者得以從容而樂於此堂其得於天也厚矣鄉人子弟聽其言師其行豈不足為一鄉之善士哉故為序次其說使揭於堂上以為記筆妙軒記吳興張子良居京師以善製筆得名豫始未識也永樂中豫鄉友劉選預修大典在館閣每求筆於子良豫得用之甚適意因是亦往往求之遂與相識豫性拙不善書而人事酬酢有不能已者賴子良之筆稍有可觀然豫之拙亦終不能精也其後豫居北京而子良亦來北京北京之製筆者亦皆讓其能然豫不見者久矣今年忽造豫以其筆妙卷求題豫不及見豫子秬為受之乃作七言近體詩題其上踰數日子良復來見豫曰幸有名在官府當朝夕供事不得數拜庭下今以疾代將還吳興筆妙軒者衆人之所命也昨辱為賦詩然鄙意以為未足敢求公序其端以啓士大夫之歌詠辱見知之久請無愛於言庶光逺有耀也豫謂筆之用大矣觀夫韓文公所作毛頴傳可考也則製筆者之有功於世豈他藝可及哉宜其見重於士大夫子良製筆之妙固已久知於世士大夫得其助者非獨豫也則豫題是軒豈能愛於言哉昔羅隱喜筆工萇鳳謂之曰吾當助子取髙價乃以鴈頭箋百幅贈之由是價益增而筆大售豫謂隱之計踈矣奚必論價哉名者實之賔也修其實以成其名則自無不利今諸公為賦詩則過於隱之贈矣子良之筆益精則名益著人之求筆者孰能舍是而他適哉筆妙之軒將益有聞於天下矣若有其名而怠其事則是軒也將不晦矣乎故為序如此既以勉子良亦以發諸公之興云大原别墅記大原别墅者今瀧水令龍泉袁銘用警家食時所營也袁氏世居長􅀈為故家至用警喜山水之勝習隂陽向背之說嘗往來大原坪見其四向皆沃壤而溪水當於前其地隱起若龜昻首曳尾以趍于溪心獨愛之乃就作田屋以居凡若干楹環而望之有八景焉五華山在其南雙江合流乎其西其東北則有武陵之瀑布西南有螺灘於晚照為最宜北有長橋銀山尤宜於雪月之觀而席帽之晴嵐玉泉之古寺在東皆可以供燕遊娛眺望其心又以為可喜今年來北京為豫道之曰豈獨銘樂乎此將使子孫居之而長有此樂也欲求諸公賦八景之詩而道其所以樂敢請先生為記之刻石以示久逺豫謂人之所居必占地之竒勝而當山水之㑹然後足以樂乎已而燕及其子孫故君子慎之然求之在人而遂其求則在天故又有不能必得天蓋不可以智力勝也今用警求而得之豈非天之所厚哉雖然地之美者必因人而彰觀於古可見矣今大原之坪與夫所謂八景者非得用警則棄之荒遐寂寞之濱抑孰知其為勝哉且豫聞之昔者海陵許子春治其居之南園亭榭之華卉木之盛賓客遊觀之樂蓋擅于一時然許氏不以是傳也其所以傳者三世孝弟而已蓋地以人而彰人以德而顯也袁氏之别墅固勝矣為之子孫者皆興於孝弟而世篤不忘則將與許氏之園等矣豫欲成人之美者也故記如此使刻焉二老堂記漣水王經舉賢良得陕西布政司檢校因豫姻友梁叔䝉詣豫請曰經之父世業醫今為醫學官年已七十四矣而經之外舅劉公德懋洪武中為監察御史纍官至雲南右參議謝事歸其年七十有五然皆康強無恙齒德之尊鄉人皆敬禮焉曰二老者吾邑之望也經家故有堂歲時閒暇二老相與燕嬉於此經得以奉順其起居承候其顔色備物而致享焉其心甚樂也因名之曰二老之堂今受官以去然豈能忘斯堂哉敢請文為記俾持歸揭之堂上經録而時覽焉亦足以慰其遐思願先生不辭豫謂此太平之美觀也洪範所謂五福其一曰壽故人之生莫不欲老且壽焉然而至七十者蓋少年七十者有矣未必皆有子之賢有子賢矣而罕遇夫太平之世觀詩之陟岵鴇羽其親非不存其子亦非不賢也然苦於行役而老者不得以自遂則雖壽奚樂哉今二老好德而皆至於髙壽且遭值太平雍容逸豫有若經者得致樂於平時又將以其祿養於今日豈非其身之幸乎抑考之二老之生當有元覆敗之際我太祖髙皇帝龍興之日譬諸嚴冬盛寒草木零落而天地發生之仁已寓乎其中故二老皆禀溫厚淳固之氣而又䝉列聖覆幬涵育之德是以克享悠久和平之福夫豈偶然哉謂非太平之美觀其可乎故豫為之記使百世之下有以知我朝仁育之盛如此也貞節堂記吉水李直孚作堂以事其母孺人而名之曰貞節之堂孺人邑中沙上酆巽亨之女年十九歸金灘李允臧直孚之父也歸之又明年丁未國朝將經略中原先取糧江西允臧主饋運舟次安慶溺焉時直孚生始數月孺人年二十一矣即以守節自誓而允臧家素貧孺人勤於女事以自給上奉舅姑下育幼稚敗幃瓦燈一室蕭然人不堪其憂而孺人安之又五年舅沒葬祭一如禮兄憐其少欲嫁之孺人哭曰吾聞之婦人以夫為天天一而已豈有二乎故夫死不嫁天地之大義也惟禽獸則異乎此且夫去時以老親幼兒屬我今舅沒而姑尚存幼者日以長矣而乃以禽獸待我我有死而已兄知其志不可奪不復言又三年姑沒治喪一如其舅直孚長勉使勤學曰爾父惟爾一息不勤學何以立身直孚感其言不敢怠學以有成孺人乃喜曰吾殫心劬力以仰事俯育今幸無負於吾夫可以見於地下矣直孚事孺人甚謹而名堂若此蓋著其德也夫貞者知正而固守之之謂節者事有其制而不過之謂也在易恆六五之象曰從一而終此婦人之貞守之堅確而不越乎理之常此節之六四所謂安節者也聖人垂世立教皆本于天理民彛之正人孰無是心顧有不能然者欲纍之也欲動情勝則陷于邪僻放蕩而不知檢其于禽獸奚逺哉孺人之德無愧於聖人之訓非賢能如是乎孺人年八十一乃卒守節者六十年而堂未有記卒之後十年直孚子同仁取進士在北京始以父命請於豫思著其德於久逺記曰先祖有美而不知不明也知而不傳不仁也直孚庶幾免矣故豫為之記孺人之善所以儀於家施於鄉里者蓋多此不著著其所以名堂者云耳進德齊記余榖止善其先臨川儒家洪武中其尊府子僖奉命往教金齒而止善生焉因遂為金齒人子僖卒止善仍領教事及金齒建儒學舉止善為訓導既受職而歸詣豫請曰榖嘗以進德名齊蓋有志於是也今幸為教官然僻居窮徼去京師萬餘里他無所受益願先生賜之言榖得朝夕覽之以自朂其為惠大矣夫進德者立教之本也德者何仁義禮智之性人之所得乎天者施之君臣父子夫婦長幼朋友之間莫不有當然之則焉其所以不能至者欲纍之也小之為衣食聲色大之為榮辱得喪蔽錮而拘繫之雖欲盡其道不可得也進之云者制其纍而已矣如是則人倫事物之理馴致其極可必也然進德之功豈可以僞為哉孔子曰忠信所以進德也忠信誠也蓋必實用其力斯可矣實用其力而不進者未之有也金齒古荒服之外朝廷不鄙夷其民而立學校以教之正欲使知君臣之義父子之親夫婦之别長幼之序朋友之信而止善為之師以其所進者而施之其人啓其蔽袪其所為纍者俾亦能進其德焉此大學明德新民之事也要亦用其誠而已矣世之為教官而知以進德為務者甚鮮也不務其德而惟欲之從則何以成已成物哉此君子所以嘆也故豫為言如此使揭於齊之壁以為記且俟他日考其成也挹秀樓記桑園周氏故大家其族屬蕃衍比屋而居簷宇相次如魚鱗雖有山水之秀而為髙閎峻墉之所隔閡喬木茂樹之所蔽翳不得以盡見其美師與周氏之傑也乃治地作樓若干楹其髙若干尺巋然出於衆屋之上既成與宗族賔客之賢者登而周覽焉山水之秀可挹也其前白富一峯雄峙如卓筆拔出霄漢間南有南峰北有北華諸山磅礴離立若虎豹踞而蛟龍翔溪水自永豐來徑其中紆餘曲折可百餘里以達於大江蓋扶輿清淑之氣之所㑹也而斯樓盡得之因名之曰挹秀之樓今年遣子時霽來北京因族父庶子君崇述屬豫為之記豫謂山水隱者之所好也彼其抗志於埃壒之外寓跡於閒曠之中一切紛華世利皆不以纍心其所以寓目適情者固於山水有得也然亦有不好者何也蓋身在是而心不在是循乎物之纍而易其情之真則何山水之能好哉師與以詩禮之華而篤山水之好至作樓以挹其秀此誠不纍於物而善於取適者歟雖然天地之秀鍾而為人而又鍾於山川夫固相為流通也則人之好之蓋自有合哉孔子曰智者樂水仁者樂山以其體相似也相似故好之矣然豈徒好哉因山之厚重而以益吾仁因水之周流而以益吾智則山水之接乎目者皆進德之地也豈止於適情而已君子之自修雖無慕乎外而亦有資於外者此之謂也師與之志果若出於此則其進德可量邪他日倘出而用之則雖違乎山水之觀而所得於山水者豈不有及於物矣乎故為之記而併道吾意云靜學齊記天之賦是理於人不偶然也自君臣父子夫婦長幼朋友之倫以至冠婚喪祭軍賓搜獵仕止久速飲食起居日用之常莫不有焉知之明行之當則無愧於為人而亦為無負於天然人之氣質不能齊於是知有未至而行有不逮此學問之功所以不可緩也夫欲窮理以見於行事使精粗本末無所遺則於聖賢之書吟誦思繹當無不至庶乎其有得矣若耳目之間喧囂混雜冠蓋車馬之往來聲色貨利之紛擾中才之士鮮不移其素失其守安能一志於學哉此學所以貴乎靜也漢諸葛孔明嘗言非靜無以成學意蓋謂是矣然君子之學豈以地之喧寂為進退哉由乎心焉耳心苟靜矣雖喧猶寂也不然則山林之深隱亦若市朝之奔趍蓋身在而心往矣如是而欲窮物理之微踐道德之實以求無負於天無愧於為人奚可得耶彼其所以不能靜者何也欲纍之也欲纍之而不知返則豈特負於天而愧於人其於禽獸奚擇哉孟子曰養心莫善於寡欲蓋寡欲則心鮮有不靜靜斯能察天理之本然盡人事之當然君子之所務也故豫以為君子之學不以地而由乎心錢塘吳生震隨父官京師雅有志於讀書作新室以居而喜其邃也名之曰靜學齊因其執友潘勤進學求豫記豫故為言人不可以不學而學必貴乎靜而又必求諸心蓋慮生之心或不能靜則無以成其學也於乎豫之所望於生者蓋厚矣生其勉之忠義堂記忠義堂者萬全都指揮使楊公之堂也楊公名洪字宗道揚州六合人其祖與父皆以軍功為漢中衛百户及公襲職調開平開平在北邊最荒遠屹然孤城控制萬里外天威所加無思不服而旃裘之衆猶或乘暇以撓邊公提兵逐捕能與衆同甘苦推誠撫馭故上下一心所向克捷前後斬獲功居多敵人畏之遂自千户纍進至今官為鎮朔參將常曰吾自禆校䝉朝廷奬拔至此將何以報上恩唯勉於忠義庶幾不負任使之意於是揭以名堂將朝夕覽之不忘也因翰林侍讀周君功叙求豫記夫義者臣之所以事君而忠者則無所不盡其心之謂也為臣之義莫大於竭忠凡職之所當為者必無一毫之不盡則臣道得矣是故受命則忘其家臨事則忘其身死生禍福一不以屑意而惟職之盡古之君子固皆如是矣彼計利害之私而以得失為慮者乃孔子所謂鄙夫也惡足以為臣哉今朝廷之於公厚矣知之明信之篤任之專蓋非常之遇也以忠義自勉而不顧其私公之志其以古之君子自待歟是足以報上矣豫聞郭汾陽之事唐也操徇國之心持匪躬之節除凶靖亂不避艱險外戢逺人內安華夏忠義之誠天地鬼神實臨之是以享福祿於當時垂功名於後世至今六七百年猶使人起敬起慕而無間然者為臣如此亦可矣豈非公之所當法者歟故為之記而因以告焉瑞竹軒記㑹稽魏仲厚與其弟仲英仲實最相好兄既篤愛其弟弟亦深敬其兄內外之間無彼此言者嘗作小軒而種竹其前閒居無事兄弟相與燕休於此其心同其德同飲食起居無不同者蓋怡怡然樂也宣德辛亥春竹有萌旬日成竿其圍六寸自九節而上為兩岐各長二丈抽梢布業清潤秀美蒼然如一鄉人皆曰此魏氏之瑞兄弟和氣所感也因名其軒曰瑞竹今年仲厚之子瑶舉賢良在北京謁豫道其事而請文為記豫謂瑞者非常之應也竹特生之物其常也今岐而二焉則非常矣其下一本者兄弟同乎所生之象也中岐而二者兄弟之親分形連氣之義也枝葉同榮則羣從子弟愈分而愈繁之徴也和氣所感物有先幾而兆祥者矣昔者詩人以特生之棠自况其無兄弟而踽踽然獨行者唐風杕杜之篇是也則竹之分岐並秀其為魏氏兄弟之瑞無疑彼之可傷則此詎非可慶歟然豫聞之誠則動動則著感應之妙惟誠者能之蓋天地之道誠而已人能盡其誠則形和氣和而天地委和以應之同頴之禾分岐之麥連理之木並蒂之花皆其類也然惟誠之至感之深則其應之也常仲厚兄弟既有所感而致是矣使其德之誠於中者能久而不渝則祥應之來豈特如蕭雲華孟恭武而已將見禽鳥之集於林中者亦能交護其巢而更哺其子也仲厚兄弟尚亦勉乎其終哉故為之記而使揭於軒之壁一樂堂記臨川艾旭由國子生為丞於陽曲以其父母之俱存而兄弟之具翕也取孟子之言以名其堂曰一樂侍講王君時彥旭之郡人相好也求豫為之記夫天下之事之可樂者多矣志於富貴者喜爵祿之隆志於功名者喜事業之著市井之細民田野之農夫則財利之盈稼穡之登乃所以足乎欲而樂乎心若君子之所深樂者則在乎父母兄弟之安全而已然此系於天成於人天有不能得乎人而人有不能得於天者何也蓋天或命之而責善以相離䦧墻以相賊此天之所以難得乎人者也或人能修之而父母有不能全兄弟有不能安此人之所以難得乎天者也於天所難得於人者能修之於人所難得於天者而能全之若旭者豈不樂哉宜其詫以名堂而欲記之也豫嘗觀之古之人有能全此者矣然或不能有其樂蓋行役之艱難農事之廢棄故雖能得之不樂也此陟岵鴇羽之詩之所由作也今天下太平聖德逺被無發召之勞饑饉之憂飽榖粟而安室居而旭又有名爵之榮廪祿之資進得以備甘㫖之娛退而得與兄弟怡然以相處則其樂又可勝言也哉雖然旭既能有其樂矣其尚思所以充之哉蓋義理實於中而行必自是則無愧於天無怍於人既得以樂其樂而亦能久於樂矣此在旭勉之而已是為記順安堂記古者男子之生則以桑弧蓬矢射上下四方以示其所有事也夫生於斯長於斯可矣而何上下四方之有哉蓋人生天地之中將窮天下之見聞以充其器識而卓然自立於世非徒然也天下之事物多矣若山嶽之崇髙江河之流衍湖海之宏深名都大邑之巨麗與夫四方物産之所宜古昔聖賢政化之施豪傑智能之士之所經營規畫以見於事功者不可以坐而詳也茍耳目有未及則器識有未充矣是其志於上下四方也固宜豫友劉宗順蓋所謂有志者也嘗曰君子盡天下之大觀不幸而遇艱難斯亦已矣今天下清明無桴鼓之警發召之虞茍有志焉東西南北無不可者吾將遂吾志而安於所適何能局促以自限哉故下豫章泛彭蠡浮大江以至於京師極觀遊之美歸而欣然如有得矣而志未已也今天子肇建北京以為萬方㑹同之都宗順又喜自謂千載之良遇於是復治裝以來太平文物之盛皆得接乎目而悅乎心退而詫曰凡天下之所謂山川城郭宮室府庫甲兵物産無有過於兩京者而所謂政化之施與夫經營規畫以見於事功者又豈有過於今日哉吾皆見之足以盈吾志矣他亦不足遊也又曰詩云邦畿千里維民所止吾幸優遊無所事於世曷居此以近道德之光乎於是擇永清之勝而居之凡所服用一切不異於故鄉時時入城中與朋友相往來歸而與同志之人婆娑嬉逰囂然自得乃名其堂曰順安之堂蓋喜順其志而能自安也屬豫為之記豫昔家居時嘗與宗順相愛今竊官翰林留北京而宗順亦居於此皆安於無事嘗得與道故舊相歡洽夫人無所逆於心則無往而非適又何必故鄉而後樂耶昔李太白周遊天下見司馬子微以為可與神逰八極之表故作大鵬賦以鵬之摩蒼天薄四海自况而以斥鷃比夫世之齷齪者豫嘗嘉其志夫世之所謂斥鷃亦多矣安知鵬之為樂哉故豫為記斯堂如此且以示夫人使之自廣也北堂記余友曽用礪治其所居北向之堂以事其母而名之曰北堂用礪居太和北門世以積善重於鄉蓋其為父母者率能以禮義訓其子而為子者亦能以禮事其親豫得於耳目者舊矣用礪兄弟三人而素與豫善蓋嘗同學於其旁近空舍中用礪母羅氏文昌主簿尚文先生之子喜其兄弟之能學也使童奴給茗飲燈燭晝夜不厭而用礪兄弟亦以時歸視其起居飲食既畢而復學如初當是時豫固賢其母之能教而其兄弟之能事也於今二十餘年矣及豫去官京師既久而其兄弟獨用礪存所以撫諸孤而事其母者益謹此堂之所以治而來求記於豫也詩曰焉得萱草言樹之背釋之者曰萱草令人忘憂背北堂也而世之事毋者取之嗟乎用礪誠能免其親之憂哉夫飾堂宇樹草木謂足以事其親而無憂此孝之小者也不以不善處其身而憂其親此孝之大者也用礪之善聞於人矣蓋方其讀書時其母固甚悅之欲勉之以聖賢之道也夫古之聖人有大舜者善事其親而有以悅其親然舜不以是為足而慕之終身古之賢人有曽子者亦能事其親而有以順其意然曽子亦不以是為足而保其身至於終彼一聖一賢其心曷嘗有須臾忘孝哉故曰堯舜之道孝弟而已又曰事親若曽子者可矣夫為人而思幾於大舜曽子誠可以無愧矣今其道載於書用礪素所讀誦而其母素所喜悅者用礪其益勉於是哉將為善思貽父母令名必果將為不善思貽父母羞辱必不果夫果於為善而怵於為惡此所以免其親之憂而可入於聖賢之道者也堂足以安其身而已矣古所謂一鄉之善士其善行必有以蓋於一鄉用礪勉之雖然用礪豈以豫言而後達哉而豫既相與莫逆則不敢以不勉也故為記其說而使書於壁璽書閣記璽書閣者吉水李維霖所建也閣而名曰璽書者何蓋上所賜敕藏焉藏於閣者尊之也其所以致此者何義也何謂義凶年飢歲民食有不給維霖出榖四千餘斛以歸有司助賑濟斯所謂義也義非有為而為也而取以為名者何蓋朝廷降敕旌之為義民民亦莫不稱其義有其實者名必歸之也於乎義者人性之所同有也而於利物見焉然人能行者蓋鮮各據其有而篤於自私視其親戚之危亡而不肯施一錢者有矣况衆人乎况千鍾之粟之施者乎孔子曰利物足以和義夫服食者人之所利也彼不能得之而已乃獨專焉謂不逆於義可乎不可也因其所宜施而施之使人各得其所利則乖爭之風弭而義無不和矣維霖之所施得於聖人者如此以義名之斯不亦稱情也哉李氏系出唐西平王晟之子憲觀察江西孫唐為宜春令因家宜春其後子孫蓋屢徙今居吉水縣同水鄉之嶺口里族屬最蕃詩書相承至於今不衰鄉邑之人固已重其世而推其盛矣維霖又以急義䝉天子之寵命而建閣寶藏之遊人行旅過其地者瞻棟宇之巋然想朝廷之恩典而嘉維霖之義莫不低回羡慕有不可及之嘆則兹閣者豈獨鄉里之榮觀哉風聲氣烈播於遠而傳於後者無已也西平之於唐有再造之功其忠義之性天與之人歸之子孫之傳至六七百年而猶盛此忠義之報也今維霖以義繼之雖所施有大小然能嗣其先德之美而衍其世德之長則西平之後將不愈久而愈盛乎豫聞維霖弟維謙有子庸修力於學問嘗試藝江西第一蓋駸駸乎顯矣茍篤念前人而益思所以繼則他日之建立安知不有與兹閣並美者乎維霖因翰林侍讀周功叙以閣記屬豫故為之記而併書之既以重維霖亦以為庸修勉也敕書閣記聖天子以仁育萬民恆慮有水旱之灾而思豫為備好義之士往往出榖以佐官事聞朝廷下璽書旌其義而天下莫不丕應於是倉廩之積所在充牣雖有水旱而民不病飢上以仁感下以義應未有上好仁而下不好義者也安成張濟巨川蓋今之好義者也聞豫備之令下即出榖二千石以歸有司天子降敕旌之為義民勞以羊酒復其家巨川既拜賜喜曰救灾恤患濟志也奚足以辱大賜而寵賁若此濟其敢辭雖然君命猶天命不可䙝也特建一閣而寶藏焉今年夏巨川來謝恩闕下因謁豫求文為記曰張氏居安成梅溪實唐文獻公九齡之孫安成府君紹之後府君仕南唐為光州刺史周世宗南伐李氏盡獻江北地以和府君不屈而歸六世祖遵獻仕宋守重慶元師攻城城陷不服而死其後有相繼取進士並登童子科者皆至顯官濟之髙祖桂芳曽祖宏道祖又新父尚修皆不仕而皆以德義重鄉邑濟兄弟及諸子仰前人之休烈守禮義之訓惴惴然惟不肖是懼今年䝉褒賜假寵榮豈濟之所能致皆世澤之餘也願為之記以示後人俾日篤不忘而思所以繼嗟夫巨川可為賢矣哉豫聞世族大家必以德義相承然後能愈久而益盛曲江公之德前史書之天下後世仰之足以啓佑其後人蓋不待贅也若光州之不屈於勢重慶之不愛其死非所謂篤義之君子哉傳至於今巨川又以義顯命書煌煌輝映前後又非張氏之賢子孫哉故為之記而備書之使人知巨川之義皆前人有以啓之後之來者又思善繼於無窮則張氏之盛有已哉嘉定縣大場鎮重修義孰記大場鎮在嘉定縣東南六十里元有義孰邑士沈文輝所建中為殿以祀先聖四配十哲侍焉其諸賢像則圖於兩廡之壁有堂有室以為師弟子講肄之所其制一倣縣庠而差小割田千畝收其租以供祭祀飲膳之費謂之義孰蓋當時所賜名而趙文敏公題其榜揭文安公為文勒之碑入國朝來田歸於有司師生無所仰給講肄遂廢迄今七十餘年殿堂門廡日入於壞㑹朝命下興社學民居有遠於郡縣學子弟無所受業者俾學於其中而大場鎮當有所建置於是里之士人沈軒以故義孰白於縣丞張鑑欲修葺之以教里中子弟而力有不逮時工部侍郎廬陵周公巡撫諸郡毅然以興學教人為務鑑乃為書請於公公為屬之邑令扆昭及丞俞觀等俾協力治之昭嘗為監察御史亦篤意教事經營規畫市材命工修大成殿三間明倫堂五間兩廡各十二間儀門如堂之數以正統八年八月興工越月而落成壯麗宏偉煥然一新里中子弟得受教於此而頌周公之德與賢令丞之功不置鑑復與衆謀曰是役也非巡撫大人之力不至是其嘉惠學者厚矣不可無記以示久逺乃因長洲縣學教諭蕭彥清求豫為記古者二十五家為里里必有門門之左右堂為孰里之仕而歸者大夫為父師士為少師主其教嵗功方興凡弟子皆出學傳農事則父師少師旦暮坐孰中教之以孝弟忠信恭敬遜讓歲事既畢則皆入學年十五入小學見小節踐小義焉十八入大學見大節踐大義焉其秀異者則以次而進用之今家於是鎮者纍百計非止於二十五為弟子者衆矣且其人多秀而喜文皆不以農為業頗得專志以讀書則學乎此者其成功當易於古人然豫聞之師者教之本也孰既新矣將欲成賢才美風俗以稱修孰之意於師可不慎哉今縱不得致仕之老者亦必求夫德成行修之士為之師使凡學者自灑掃應對進退之節禮樂射御書數之文以至修身齊家治國平天下之道皆深究而力行積中而發外蔚乎其有文卓乎其有立始而為閭里之榮終而為邦家之光則於斯孰可無負矣初沈文輝之為此凡教養之資皆其所自出此義舉也故名曰義孰今猶為此名者周公以為興學以教人與人之勉於學皆理之所宜為不可緩也故云然然則為師弟子者其可佚居慢逰而已哉桞氏旌義敕書碑隂記皇帝承列聖之統所以治萬邦和兆民不用他道唯仁而已詔書屢下寬租賦省力役振寃滯恤困窮凡事有緩急民有便不便者皆次第罷行之而天下大安然猶以為粒食民所賴以生而水旱之災不可不豫為備復詔有司出府庫所藏以易榖粟實倉庾使雖有災而民可以不飢富家巨室有能發廪以佐官當旌其義復其家詔令至平陽有司誕告於衆富民桞靖一字忠立聞之欣然喜曰吾民所以安生樂業而幸有餘積者上之賜也今聖心惓惓思患而豫防之將使斯民無不得其所此天地之心也其可負哉即出榖一千二百五十石以歸有司作屋三間貯焉官自為出納縣令滁陽章惠以聞上命降敕旌之為義民賜以羊酒復其家而其義聞遂大著於時忠立録敕文刻諸石特為一亭奉置於其中以傳示久逺今年來謝恩闕下因豫友禮部郎中黃養正求豫記其事豫謂水旱之災雖堯湯之世不能免惟有其備斯不至於病民聖人不以無災必於天恃吾有備災之道耳然則皇上之仁所以輔天地之所不及而為民立命者也好義之士安得不作而應之昔隋開皇間關中饑文帝不許賑貸躬率羸民往東都就食區區小惠至使避道給扶此何足以為仁當是時倉廪非不充也閭右富民豈無厚積而莫之救者由上不好仁故下亦不好義也今忠立之義雖本於皇仁然其恭敬順從慷慨奮發而無一毫顧計之私賢於人逺哉豫又聞其先世多以文學孝行著稱至於忠立常發廩以賑貧乏又作大舟於新渡以濟往來而民不病涉其好義蓋出於天性是皆可書也故為牽聯書之使刻於碑隂後之觀者當必有所興起云繼述堂記繼述堂者豫友工部侍郎致仕羅公汝敬所作也公既謝事歸故鄉視其子孫衆多而舊居不足容乃斥俸賜之餘以作此堂使其子揚等居之而命之曰羅氏世以儒名家案上之書里中之田皆先人之遺也吾雖忝祿仕未嘗有所增益今以付汝汝善致力焉能無愧於祖考斯可矣公既即世朝廷念其有勞績遣官賜祭於是揚謝恩來京師過豫道其事泣曰吾父不幸棄諸孤其遺訓尚在今名此堂曰繼述之堂而圖所以副是名者敢請記於先生幸賜一言以教之為惠大矣豫與其父交好四十年奚可辭乃為之言曰昔者孔子稱武王周公之孝謂其善繼志述事聖人之所為固非衆人可得同然不忘其親而思紹續於久大此則衆人所可同也子之親治此田以盡夫仰事俯育之道而夙夜讀書以求古人之所以善其身而及夫人者既以充於已施於天下矣而田與書固在也子之兄弟受之當何如深耕易耨而灌溉是勤去夫所以害苗者使其利足以養老字幼呻吟於占畢之間咀其華而踐其實慈孝之行修仁義之德立使人謂之君子之子則子不獨能嗣其親而亦能成其親矣孝道豈有踰於此哉世之貪夫鄙人與諸妄子弟昧詩書之舊而惟資産是營怙其勢力蔑親愛欺寡弱轥轢鄉里攘他人之有而有之而無所忌憚此豈知有天道哉天定勝人將併其所自有者而失之豫願子不為是也子誠勉之使後可以繼則羅氏之福澤有窮哉揚拜曰先生之教是也生敢不勉遂書之以為記雲章樓記君命猶天命也故昔之人於夫璽書宸翰皆取喻於天而以奎壁之文雲漢之章擬之所以示尊也然奎壁雲漢之在天其光彩被於人未之或間也若璽書宸翰惟有德善勞烈者而後能得之以振前而裕後奎壁雲漢之光所被者廣而無外璽書宸翰之榮所及者逺而莫窮以是而方之不亦善於取喻哉豫友福建按察僉事髙公超字伯琴初為監察御史時以亷厚勤慎得名天子謂宜於其職揆厥所由而加之以恩於是贈其父存信先生為福建道監察御史母吳氏妻艾氏皆贈孺人錫之敕命伯琴既拜賜曰君命不可䙝也作樓以寶藏焉名曰雲章之樓而屬豫為記豫謂朝廷之待士者厚矣果能其官則必賜之誥敕而封贈其親此虞書天命有德之意也職曰天職位曰天位無非天者則於命書而以奎壁雲漢擬之豈過哉伯琴寶之以示子孫豈惟使之知上之錫命以寵賁乎前人如此亦欲歆動其心庶幾有以繼之歟孟子曰古之人修其天爵而人爵從之天爵者何仁義忠信樂善不倦之謂也以此自修是謂能全其天公卿大夫之貴雖由乎人而實本於天天之所付於已者既能全則天之所貴豈能外於已哉伯琴以此得之而又及其親矣後之子孫登斯樓者瞻命書之光華思天澤之滂沛益勉於孟子之言而圖所以繼則雲章之樓珍襲而寶藏焉者亦將繼繼而無已也敇書閣記永豐湖西羅氏以宦學著聞久矣不特資産之富也至今修齡而好義尤篤鄉邑之民有貧匱不給者多賴焉前年朝廷修養民之政詔有司發庫財糴榖以備水旱施賑濟富民有能捐廩佐官者具實以聞修齡出榖二千餘石以歸有司事聞上遣使持敇旌之為義民勞以羊酒復其家修齡既拜賜喜曰吾能有餘積皆太平休養之澤也歸之官以惠民亦吾心之所願者而璽書寵賁之若此其何幸如之乃建閣寶藏焉將以貽後之子孫俾勿忘聖德之大而思所以繼及來京師介其姻戚禮部員外郎李宜春求豫文為記豫觀自古閒暇之時上之人能以養民為心而有先事之慮者少矣富家巨室擁重資挾厚利視細民之饑餓不肯捐半菽濟之反乘其急以規取所有者比比是也今天子篤意斯民思患而豫防之而修齡輩又能發粟以為助豈非上好仁而下好義歟然則修齡之稱義民斯不亦稱情也哉豫聞之君子之以德善世其家者必祖宗有以啓之而後子孫有所視法也宋之末世文丞相舉兵勤王修齡之祖開禮先生傾家養士以赴之聲震江右師敗被執卒罵敵而死事載丞相傳中其義聞之烜赫固已暴白於天下後世自是以來羅氏益表然為鄉邑之望宣德十年鄰邑賊起據大盤山藩憲大臣亟召兵討之修齡集丁夫三百餽給之使盡力相犄角賊平與有勞效人皆謂修齡篤義無忝於其先今又以發粟被褒賞而再以義著修齡可謂能世其家者矣易曰積善之家必有餘慶積之云者非一世之謂蓋纍纍而積之至於久而益盛則其家之福豈有窮哉豫為記斯閣而牽聨書之以勉羅氏之為子孫者忠信堂記永豐社洲蕭氏為其鄉之望煥圭則其族之賢者也嘗出榖二千餘石以佐有司備賑濟朝廷降敇旌之為義民勞以羊酒復其家至是來謝恩闕下介其姻戚禮部員外郎李宜春求豫記其忠信之堂豫聞而心為喜世之人固有名其堂者矣不誇張以示美則退約以示謙其能篤於自修者誠少也夫人性所有仁義禮智四者而萬善出焉蓋無所謂忠信忠信者乃自修之實也昔者孔子之教人有四學以窮其理而必躬行之且又以忠信為本忠信之不立則所學皆虛文而所行非實行矣他日之語弟子亦曰主忠信蓋以忠信主於中而後事皆有實然財好修之士可不以此為務哉河南程夫子嘗訓釋其義矣伯子曰發已自盡為忠循物無違為信言發於心者無一毫之不盡循夫物之實而是非無所違是之謂忠信其言既明暢矣而叔子又曰盡已之謂忠以實之謂信其意雖同然言簡要確實而不可移易學者觀之其亦知所用力矣煥圭以是名堂所以勉於身而教於家者豈常情可及哉抑又聞之曽子於大學之末章言君子有大道必忠信以得之道者修已治人之術即章首所謂潔矩之道也忠信存於心然後能得此理而推以及人使之各得其所而無不遂焉凶年饑嵗鄉人之食不足而已獨有餘據其有餘而視人之不足不少慨於其心是非君子潔矩之道也焕圭發粟以賑飢此潔矩之施而忠信之所得歟豫為記斯堂而推言之蓋欲勉其盡而大有及也亦焕圭之志乎宜興縣重修廟學記宜興之建廟學久矣六七十年來未有能修飭之者由是日入於敝宣德中縣令張惟澄以大成殿之將壓也乃謀新之材始搆而以事去正統之初上饒蔣侯義自桃源簿以賢舉來為令始至謁先聖而周覽學舍慨然嘆曰朝廷鋭意教養斯人而義適當其任今廟學不治將何以奉順德意夙夜祗懼思竭力圖之㑹監察御史廬陵彭君朂受命董教事至宜興知侯之志而奬勵焉侯重於勞民即盡發已資以為倡邑人許信等相與謀曰吾邑得賢令欲新廟學以教吾縣人子弟使皆為才且良此甚盛事也吾徒其可不勉於是富者出財貧者出力以佐官乃市材命工完殿之未備者塗塈而蓋覆之兩廡兩齊㦸門靈星門㑹饌之堂諸生燕息之舍悉次第改作施以粉堊丹漆塑聖賢像皆如制經始於年月日以年月日訖工侯既告成於廟而進諸生使學焉教諭邱純諗於衆曰吾侯用意於學校至矣然其為功也實難宜刻石以告後人使維持之且使學於是者亦勉勉以副侯意衆皆曰然遂因豫友清河令李侯信圭求豫記學校之教所以明道也道原於天而具於人心循天命之本然施於人事之當然而皆有其則是所謂道也然或蔽於氣質惑於物欲有不能知不能行者是以聖人在位必立學校以教之其入道之方則必以讀書為務窮其㫖趣發其所蔽祛其所惑知之至行之力斯能有以成其才三代以來皆然也我朝列聖尤以教學為重於五經四書皆有纂述以發其藴奧慎擇俊秀俾業於是而訓以良師且專置風憲官往督勵焉蓋欲明道以興治其所望於學校如此今蔣侯之為是也凡來學者進而謁於廟仰先聖之德容而知夫道之有統退而習於學誦經傳之微言而明夫道之有常居則行於父子夫婦長幼朋友之間出而用之君臣上下應事接物之際而無不盡其宜然後為道之成則無負朝廷教學與蔣侯興學之意矣世之為令者莫不有學校之責然卑忽而沮抑之者蓋多能如蔣侯甚少也然則蔣侯果賢於人哉豫故為之記以勉夫學者且示後之人俾善繼之永勿壞復本堂記復本堂者池陽韓君伯恭所搆之堂也韓氏於池為大家其先居接石之上東瞻九華南望六峯齊山在其西清溪繞其北豐堂廣宇長軒嶢榭瓌傑之觀臨一鄉元季兵亂燬焉國朝受命海宇寧謐乃即其舊百步而居之未之能復也頽垣廢址殘甓斷礎散棄於荆榛草莽之間而為鄙夫野人之所盜竊過者惜之洪熙元年伯恭自廬陵教官歸家慨然嘆曰吾祖宗之居於此其經營締搆亦勞矣今一燬而不復焉豈得謂之賢子孫哉乃盡發其資市衆材作堂於其上堂成而溪山之勝若加於昔時名之曰復本堂今年謁選來京師得臨湘教諭乃以堂記屬豫豫謂古之君子之營居室也豈特快意於一時也哉將以遺後之子孫斯干之詩所以頌禱其生男而永其室家者此也為子孫者亦思前人創業之艱而圖所以繼使之久長而不壞此詩所謂似續妣祖築室百堵而於此居處笑語者也前有以遺而後有以繼豈非人情之所願哉至於寇難洊臻而兵燹及焉使鳥革翬飛之盛一旦化而為灰燼廢而為丘墟此則人事之不常者也然豫觀之凡故家大族皆有以遺其後而罹此者不少也子孫不賢鬻以充口腹與夫流離轉徙浸失其故者比比有矣其能興復舊觀不愧於前人如伯恭者誠少也非所謂賢子孫者耶雖然抑有由矣仁義忠信所以承休而裕後者也彼浡然而興泯然無復存者不知務此故也伯恭之曽祖仕元典黃山驛傳有惠於人其大父父雖不仕而皆讀書為長者其所務如此宜伯恭之能賢而堂之復初也伯恭又以學行為人師恂恂恭讓有名縉紳間誠足以裕其後豫知斯堂灑掃有繼矣故記之雙桂堂記雙桂堂者張士倫甫所居之堂也士倫世家上虞今徙居河間之阜城有二子長居傑字翰英永樂甲午鄉貢進士分教於章丘次居彥字翰華復以庚子鄉貢進士為絳縣訓導阜城之大夫與鄉之賢者喜其二子皆以科舉入官因名其堂曰雙桂之堂翰英自章丘考滿擢為吏科給事中以才行見知於天子推恩封其二親縣大夫老長復置酒相慶於斯堂曰此科舉入官所致也而堂尚未有記將何以示諸永久於是翰英遂以屬豫豫謂科舉者之取喻於桂其來逺矣晉郤詵舉賢良對武帝曰臣對䇿為天下第一猶桂林一枝崑山片玊後之繼者莫不取焉燕山竇禹鈞五子皆登科當時賦詠者有曰丹桂五枝芳君子不以為異也其他以表其宅里者不少則張氏雙桂以名堂豈非宜哉夫科舉之設所以求天下之才而興太平之治故英偉豪傑之士率由是出焉然而不偶然也士大夫家代有一人名薦書以趾美前人已足以見其世澤矣况若兄弟連進於有司如張氏者則其世澤之盛可知也豫聞張氏世業儒士倫之先君子九臯德立而未施於用而從父九容纍官至山東參政九功亦纍為學官則翰英兄弟相繼而起者固有以啓之矣然則雙桂之堂蓋有光於前人也已抑嘗考之桂者芳烈恆久之物也古之君子有屈原者嘗取以喻德焉首之以三后而曰雜申椒與菌桂者言禹湯文武得衆賢以自輔也首之以余而曰矯菌桂以紉蘭者言其以衆善自修也君子之仕也惟善有諸已然後能輔君善之不修而能有益於上者未之有也翰英今得聖天子而事之矣翰華亦豈終為教官哉其尚加勉於善焉易曰學以聚之問以辨之寬以居之仁以行之此君子之道也如是則其德業之久而存者亦若桂之芬芳逺聞而榮茂不衰矣斯堂也豈不愈逺而有耀哉故書以為記訥齊記豫讀抑詩之四章而知君子所當謹者莫切於言何也蓋言行皆德之符然行形於身不若言出諸口為易失故其詩既曰慎爾出話敬爾威儀而即舉白圭之可磨以深明斯言之失不可救衛武公之自警如此則其意可見也當武公之仕周其年九十五矣而好學之功老而不倦况年與位不若者耶年與位不若能以武公之學自為而不肯易其言則不謂之君子其可耶吉水周仲升名其齊曰訥齊蓋知務乎此者矣仲升吳大將軍瑜之裔世以儒名家其以此自為蓋欲不忝其世也夫言之所係大矣君子於此觀德焉因其言之發知其中之所存吉人之辭寡躁人之辭多德厚者其言溫德薄者其言戻其實有不容掩而榮辱加焉昔之人寡言而躬行以孝友聞於郡國身被其榮子孫受其福者有矣知言之逆人然卒吐之禍及其身而迫於危亡者亦有矣是以君子欲訥於言而敏於行蓋此之謂也然則仲升所以名齊而自警者豈非君子之道哉抑豫聞之訥與訒同難也所謂近仁之質求仁之方也夫仁具於心心存斯仁存矣訥則無巧言訒則無易言其心之不外馳可知故於仁為近而可以求也仲升由是而進使心常存而仁加熟其言之發皆純乎天理之公人將求以為則此之謂學之成訥云乎哉豫嘉仲升之能用抑戒也因其求豫記故記之御賜謝庭循圖書記永嘉謝環庭循既讀儒書而尤精繪事其言行不愆於禮義溫然有君子之風永樂中有薦於上者徴至京師校藝在髙等遂䝉寵用隱然名動四方宣宗皇帝嗣大寶位講道論治之暇頗以書畫自娛庭循得日侍左右凡所進御莫不稱旨遂擢為錦衣衛百户未幾升千户恩遇之隆鮮有比者宣德元年十月一日上御文華殿賜白金圖書二皆塗以黃金嵌以青玻瓈其文一曰筆精入神一曰謝氏廷循八年七月一日御齊宮賜象牙圖書一文曰清泉白石前後凡三皆鏤大明宣德御賜六字於其鈕而飾以金使凡作畫則用此為識庭循既拜賜寶而藏之若拱璧宣德皇帝上升乃出示直曰是賜也欲以傳逺也然筆精入神四字豈環所敢當而褒借之如此上之恩天地之恩也顧環之藝薄何能少報萬一乎今鼎湖之駕逺矣雖欲自效不可得此環所以拊心號痛而不能已也願為之記以示後人使不忘大賜嗟夫古今之精於藝者豈一人哉然而有遇有不遇焉故精於藝而不得名者蓋多矣庭循有其實有其名君上之褒其稱情也審矣而乃慊然不自足兹可見其為賢也昔元之時永嘉有王振鵬者亦以善畫得幸於仁宗官亦至千户賜之號曰孤雲處士嘗畫上都大安閣圖以進深見奬譽閣世祖建也君子謂其有堂構之諷今庭循之官不減振鵬而寵賜過之其所畫人物皆臻妙意必有感動上心而篤於仁民愛物之施者矣此其所以致是也直與庭循交久故為記其受賜之故以示子孫使篤承其志云抑菴文後集卷二
