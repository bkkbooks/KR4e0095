body:
  text: 抑菴文後集巻三明王直撰記常州府重建黄田閘記水之有閘所以時啓閉謹蓄泄通舟楫之去來資田疇之灌漑其為利大矣然惟仁民愛物之君子斯能因其利而利之不然則怠惰縱弛茍目前之安忽經久之利其為民病豈小哉予於黃田閘之重建而知其用心之厚也常州江隂城北黃田港引江潮貫城中而出於南門凡二十里㑹夏港之蔡涇以達於運河實舟楫走集之地附郭良田數千頃皆頼其灌漑港因潮之消長為淺深長則溢消則涸溢則舟通而足以漑田涸則田不得受利而舟膠且敗者有矣唐長慶中李德裕觀察浙西始建閘於城北潮長即啓以行舟消即閉以蓄水人賴其利歴歲滋久繕治不繼日就頽毁自洪武丙子以來人失利也久矣前之為郡縣者數十人莫有少慨於心者宣德中工部郎中桂林莫侯愚被簡㧞來為郡上賜璽書俾興利除害侯詢知其事歎曰此亦利害之大者也今田利漕舟皆頼此其可後乎然以始至不暇為久之政通民和即具奏其事上命巡撫侍郎周忱經度之周公盧陵人忠以奉國仁以恵民而侯與之恊議重建於舊址南五丈許以避水之衝念役重費殷不忍賦於下公常廣儲蓄以備災度可支數十年欲稍發所儲米市材僦工一切不以煩民計其費以聞詔可之乃命通判邵武張侯齡董其役然諸調度皆出周公買石洞庭山礱琢而後致之凡用石工五十人木工十人金工五人土工十人役夫二千五百人石四萬五千尺木二萬一千一百根磚三十萬一千箇石灰四千石鐡一萬一千斤食米二千九百石經始於正綂元年八月而以其年十月成自是歲獲大穰舟行無害耕夫楫徒啇人估客鼓舞而賛誦焉郡中父老皆大喜曰兹閘之建吾郡襟抱嚴固風氣完復吾民其永有利哉此廵撫大人之徳與郡侯之功也請刻石以示久遠於是張侯來北京求予為之記夫興天下之利必用天下之才然非天子信之篤任之專則亦不能有成功莫侯以賢選任養民之職且得張侯以助之而周公之廵撫諸郡也實能體上之德意凡可以利民者莫不盡其誠民親戴之其恵信有大者焉是役蓋其細也而猶用心勤厚如此朝廷任人之效可見矣於乎使臨民者皆如之則天下豈有遺利哉而多不能然者此君子之所歎也故為之記以示後人使知是役之本末而善繼之亦因以寄予之所感者焉琴趣軒記彭水張克明有幽雅之志不汲汲於世俗所好而獨好琴其為通判同知歴四郡皆以琴自隨開一軒置琴其中公事之暇即焚香静坐援琴而鼓之其心蓋囂囂然也克明既以自樂又使其二子學之庶亦能同其樂乃名軒曰琴趣軒今年來北京因予故人何彦澂請文為記古之君子各以適意為樂凡物之可以適吾意者則好之不置蓋以其樂在是也若劉備之於結髦鍾繇之於書嵇康之於鍜桓元之於畫劉伶阮籍之於酒皆好之終身彼蓋有以自適而謂天下之樂無以易此然其所樂者外也若夫好學之君子篤於自修則琴乃其所好是以無故琴未嘗去也琴者聖人之所作以象天地四時五行而合君臣之義也其制如此而其用則可以禁人之邪心成其中和之性而不乖於德焉此其所養者内也養於内斯亦達於外矣宓子賤彈琴不下堂而單父治趙清獻以琴入蜀而蜀安豈非用此自養而清静之化有以宜民也歟然則琴者固君子之所宜好也予未識克明而於名軒之意有不能知其然者夫趣者意之所向也克明父子之於琴其趣果何如也欲如前之所云則學必至於義精仁熟而和順於道德如後之所云則治化之美必優㳺夷愉熈然淳古之風然後為至也不然則審其趣向之正而必求其至焉斯可矣毋曰吾取適意而已也夫君子之自處必以其至而於夫人亦必以其至予為記此軒而推言及此者庶幾君子之道也豈敢以為藝事而小之耶竹莊記竹之為物有清虛剛直之德焉至其叢生根聨枝附宻比而不違則又有親愛輔益之義是以君子尚之昔唐元宗與兄弟諸王逰苑中見叢竹之生萃於内無逸出於外者顧語之曰凡兄弟當如是也因號為義竹夫天之生物各正其性命惟人得性之全是故兄弟之相親自孩提已然矣此豈強為之哉天性之真非自外至也竹之叢生如此豈有意於比附者亦因其性之自然而已矣唐之詩人傷已之無兄弟而託興於特生之棠以求助則夫以竹之茂宻自比兄弟之相親而思篤於義焉豈非善取諸物也哉安城劉求璉居其邑之上源而與兄求矩弟求樂求思求錫最相好居有叢竹鬱然而並秀森然而駢滋雖霜雪之嚴風雨之暴不能改其德求璉兄弟常燕休於此其心相孚其意相合其言語相契均有無同休戚未嘗毫髪爽焉他之為兄弟者莫及也因號其居曰竹莊蓋取義竹之意云嗟夫兄弟之義原於天然而有不義者豈盡由異性之聚哉私欲賊之也利害之相形愛惡之相攻得失之相感不能剛以制之而鬬䦧悖亂興矣惡知夫所謂義哉其視斯竹誠可愧也已求璉兄弟之篤於義如此不以欲害其性可知也淇澳之詩衛人美武公之德而皆以竹起興自夫始生至於如簀之宻比言其道學自脩以極其德之成至從容中禮而後已焉今竹莊之竹既宻比矣求璉兄弟其尚取於衛武公由義德之脩切磋琢磨以充之而至動容周旋皆中於禮其德豈不盛矣乎則人之形於賛詠亦豈獨淇澳哉予於劉氏兄弟有望也求樂為翰林侍講謁予道其事且求文為記故書其説使揭於其軒之壁楊氏襍畫記淮安楊熈節兄弟有瀟洒之趣而最好畫京師善畫之士多作圖遺之以足其所好熈節取其襍碎者編之册而請予記畫凡十又七幅山水十一花木六其中峯巒之秀烟雲之變川陸之縈逥深林茂樹之暎帶穹櫚華屋浮屠老子之宫參差而隠見逸人畸客之間放漁舟估舶之去來禽鳥之翔集幽叢絶豔㳺蜂戯蝶之相尋皆各極其趣誠可謂妙矣淮安天下重地蓋南北之衝舟車冠蓋之㑹也環而望之逺及千里圖中之景物莫不有焉熈節兄弟不寓目於其真而留意於其似何哉古之君子蓋有不出戸庭而周知萬物者以圖籍在也目擊而心存心存而道施是故於人則思適其性於山川則思奠其位於草木昆蟲則思俾各遂其生窮則小施之逹即大行焉何待歴覽而後及哉熈節兄弟之好畫如此亦豈欲不出戸庭而周知萬物者耶其觸乎目而亦有動乎心者耶予聞其兄弟嘗出榖以賑饑淮安人多德之朝廷旌之為義民其惠固已及物矣居閒無事展此册觀之使身在户庭之間如親與物接視其所得為者即為之而恵無不及焉不亦古君子之道哉熈節兄弟勉之毋徒以其充玩好而已也是為記雙壽堂記龍泉縣令陳侯士宜以考績來北京而謁予告曰義世家宜賓父母在堂其年皆八十今幸得禄而不能致一日之養雖有兄弟足以為親懽然義之心豈能須臾忘哉顧嘗名所居堂曰雙壽凡子孫之承候顔色奉順起居與夫物之適口體悦耳目而娯心意者皆在是庶幾二親之樂而安也然未有文為記敢請於先生俾揭之堂上以致慶幸之意願先生不辭嗟夫予於此有以知其親之德矣洪範五福其一曰壽而必本於攸好德蓋壽者德之效也壽出於天而德則在人脩其在人者而後能得之於天然古人之能七十者已少矣今而至八十焉豈非幸歟至於八十固幸矣而五子皆才且又有禄位豈非幸之大者歟南山有臺之詩其後三章有曰德音不已曰遐不眉壽曰保艾爾後言有德者必得其壽而又能保養其子孫君子之德脩於已而得於天者如此則士宜之親豈凉德者可比哉雖然親之德固有得於天而所以成其親則有待於子今士宜兄弟出處雖不同而親之志必皆欲其篤於善夫孝非止於甘㫖之養當以志為養也言必當於理行必由於義仕者有循良之稱處者有孝弟之譽則人將謂之君子之子是所以成其親也則親之心豈不樂哉樂則其氣和其體舒以是而承天之休則至於上壽可必也夫豈特士宜兄弟之慶哉鄉之父子兄弟必有薰其徳化其善而同其慶者矣予家泰和於龍泉為鄰邑聞士宜之治行蓋可敬者也故為記之壺隱記永和蕭氏世以醫名家至原豫益善其術凡有病者皆走原豫所求藥無不愈然非醫亦罕與人接蓋超然有絶俗之意鄉人比之壺公因號為壺隠原豫不為喜而亦不辭客或告予曰異哉所謂壺隠也彼壺公蓋仙之謫者且誠無求於人故能爾原豫有妻子之累口體之欲何可自同於壺公且其肆未能有而安有所謂壺既無所謂壺則惡乎隠哉予聞之笑曰固哉客之言也壺公之壺蓋變幻而為之若原豫則亦假寓而已耳嘗聞壺公處壺中樓閣花木飲食姬侍無不有則壺公固亦原豫也抱朴子曰為仙道者先立功而以䕶人疾病令不枉死為上原豫之活人多矣安知其非壺公哉壺公無求於人原豫蓋亦應人之求者求而應之已則退然不自衒真與壺公同也然壺公之壺懸肆頭所得至者費長房而已原豫之壺似若大於是蓋凡問藥以求活者皆出入其中而不自知其兼容廣納殆勝於壺公也哉今以是而觀原豫蓋非知原豫者而亦安能知壺公固矣哉客之言也然予有求焉昔壺公以竹杖授長房曰騎此任所之已而投葛陂化為龍泳去予為客久不得歸其鄉且鄉邑常旱思所以濟之者倘得一杖使予免離索之憂而嵗獲豐穰之慶則為幸大矣原豫其有以應予之求哉因書予言以諗之且以為壺隠記葵軒記錢唐蔣沚以帥閫從事得官俾歴試於禮部沚頗能書又予友祭酒陳公其姊壻也故予使之執筆在左右欲觀其為人而策勵之幾或能有立沚朝夕勤慎未嘗慢戯佚㳺凡有所為必盡其心予愛之而策勵加焉一日沚來告曰先人嘗受民社之寄今沚又幸在官使孔子曰臣事君以忠沚願以是自勉乃託物取義而以葵名軒蓋寓傾嚮之誠而欲致其尊事之意願公一言發其義沚得服膺焉為幸大矣按許氏説文葵有紫莖白莖二種常傾葉向日蓋盡心於君而不敢悖焉者似之然葵豈故為是哉因其性之自然而已君臣之分以義合而皆天理之當然彼物之㣲猶能不失其性况具是理於心而靈於物者乎是故委質為臣則不復顧其私自牛羊倉廩之賤以至公卿大夫之貴必盡其道之所宜不以難易為避就利害為趨舍夫職之能盡由心之不忘君也忠臣之義盖如此由是論之彼狥一已之私而背公上者誠㣲物之不若而謂其靈於物可乎又按爾雅翼葵為百菜之主味尤甘滑然則葵之性非但能向日而又有益於人昔吳隠之為天下亷吏以毎食有菜為茹也後之為吏而能甘於菜茹者少矣侈然思食天下之珍竒思食天下之珍竒則必得天下之財然後可資之不足未有不悖乎君以求濟其欲而禍其身者今沚將受職於天子以自效其忠於葵之向日庶幾能服其義矣尚當學古之亷吏而不厭葵之食即所謂一飯不忘君也如是則沚之德業將不為大賢君子矣乎沚尚勉之是為記永思堂記永春顔侯隆之為吾郡推官三年矣郡人之有事來京師者往往能道侯之徳謂其持已正用罰平小大之獄無不盡其心予重之今年侯以考績來北京間過予曰隆世爲儒家先人均泰秉禮尚義而不樂仕進惟教子孫以學吾母張氏實同德故能成其志隆之粗有立者父母之教也不幸而乆即世今雖忝禄食然不能致一日之養此隆所以哀思無窮也其墓在鄉邑之始安今限以官守又不得嵗時脩祀焉則隆之心豈能朝夕忘哉因名堂曰永思而未有記敢請文於先生予讀蓼莪之四章而嘆父母之德之大有不可得而報者未嘗不衋然以傷泫然以泣也夫生鞠拊畜長育顧復其劬勞也至矣辟乾坤之易簡有難以並言者豈奉養祀享之足以報哉奉養祀享不足以爲報而又不得以奉養祀享焉則惡乎其不思思也者思夫生鞠拊畜長育顧復之施於已者也思之至則僾然而有見肅然如有聞猗那所謂思成者如此侯之永思其意猶是也予嘗計之人能思其親固可謂孝矣然逺而思之不若近而思之之愈也夫身者親之遺體也於身而思敬愛焉即所以敬愛其親矣而古之君子尤貴於成親成其親亦必本於善其身蓋居處而思莊事君而思忠臨民而思恵見利而思義與人處而思信言則思不違於禮動則思不離於道如是則人皆謂之君子之子使人謂為君子之子是使其親為君子也夫是之謂成其親人而能成其親其孝亦可謂至矣校之徒思豈不誠愈乎予為記永思之堂而推言至此者所以廣侯之志焉耳侯其勉之慈訓堂記予邑曽兆詡予故人曽公與賢子也曽公與予同逰鄉校同登永樂甲申進士第時方脩永樂大典公被選為翰林庶吉士預執筆其間為人温厚典重學明而行端縉紳君子莫不以遠大期之書未成以疾卒於京師兆詡方㷀㷀幼稚母孺人蕭氏教育之至是孺人老矣兆詡亦克自樹立乃作堂以奉燕處凡所以適其口體娛悦其志意者蓋無不盡其心而孺人懽焉今年來北京謁予告曰先人之不幸也生年纔十歲懵於諸事豈敢兾能有立哉賴吾母隨事訓諭自衣食之所以然與夫脩身接物之當然者日言之諄切不厭故生熟於耳而存於心所以得有今日者實母之教也豈敢須㬰忘哉今名所居堂曰慈訓之堂所以表其德也且欲使生之子孫皆不忘則非文無以傳逺敢請記於先生予聞之父之於子也尊而不親母親而不尊尊也者嚴重以臨之示之以禮義之制法度之防而約之於中教之道然也親也者慈恵以撫之調其飢飽寒煖之宜起居出入之節而惟恐失之愛之道然也父母之施各盡其道之常而子無有不立者不幸而失父之教為之母者益篤於慈愛因循將就鮮有不敗其子予見亦多矣兆詡之母孺人於慈愛之中而教道行焉卒能成其子之才以封殖厥家豈非今之賢母哉名堂以彰其徳而世篤不忘非過也雖然君子之顕其親盖有大者焉身也者親之枝也愛敬其身所以敬愛其親也敬愛者何慎其言行之發而已非理不言非道不行則人誰不敬愛之曰此其父母之德致然也使父母之徳顯聞於當時視表著於一家其美之大小可知矣兆詡尚務其大者哉故為之記使揭諸堂上而日覽焉以自勵也恒德堂記恒德堂者兵科都給事中姑蘇王君永和名其縣人董綱叔維之堂也叔維世以醫名家其祖伯儒父士源皆有聞於時叔維克紹先業於醫書無不讀而能造乎理之㣲其濟物之心不異前人而勤厚加焉王與董有姻好故叔維於王君為甥屬王君之母孺人或有疾叔維旦暮謹視候進良劑輙収竒效一家之人凡有疾求視者叔維不以小大貴賤易意必來視飲之藥無不愈以貲謝則讓不受如此者非一也王君深德之間過予道其善曰永和去親遠不得躬視起居承顔色顧常以疾為憂而幸有叔維使吾母得享和平之福吾亦得以紓其憂而能盡心於所事者叔維之力也且非特施於吾親為然也自吾親以下皆然姑蘇之人有求者叔維視之亦莫不然終始一心無幾㣲厭倦意非所謂有恒德者乎故用恒德名其堂既以彰厥善而亦期其久也願先生為之記夫醫者仁道也天地能生人而不能使之遂其生故聖人為醫藥以濟其夭死所以成天地之仁也彼生生之心未嘗有間也故曰天地之道恒久而不已醫所以成其仁而可不恒其德哉勤始而怠終重此而忽彼切切焉惟利是殉而不顧其人之死生如是而可謂之有恒也乎如是而能成天地之仁也乎不謂之仁之賊不可也文王於恒之彖曰恒亨謂久於其道則必亨恒其本亨其效也叔維有恒德而篤於施恵其及人當不窮則富之及其身當亦有加而無已惡在切切於利哉夫所謂仁之賊豈足以語此予為記斯堂而推言及此者庶幾王君彰厥善而期其久之意也重慶堂記鄞人楊實以明經領鄉薦㑹試禮部不偶而歸衆皆惜其去而實則欣然喜曰實之大父母父母皆在堂方其來也固將得禄以為榮然離别之感慕戀之私誠有不能釋然者今不偶而歸復得致養於朝夕而用其餘力勉學以俟時實之心樂也而何戚戚於去哉翰林編脩髙先生遷嘗使日本道鄞知其然至是為求善書者書重慶堂三字遺之俾掲於楣間其鄉友周濂為禮部屬實乃因濂來求記濂之言曰楊氏盖慈湖先生之後由慈谿徙鄞實之祖孟輝祖母方皆年七十餘父灝母張亦既五十有餘矣而皆康强無恙實與弟寅日率婦子奉起居承顔色調其衣食寒暖之宜而親之心懽焉一門四世萃於一堂盡人道之常而享天倫之樂此豈偶然者哉盖自慈湖詩書之澤至於今而其祖若父又能脩徳樂義以繼之鄉邑之人皆稱為長者是以其盛如此予謂父母俱存人之所欲也然能得之者盖少故孟子以是為樂之最况大父母之偕在者乎則其樂可知矣天之於人也惟善則佑之身其康强子孫其逢吉非不善者可能也若實之祖與父謂非為善之應其可乎孔子曰積善之家必有餘慶積之云者非偶一為之而止而善亦非一行之可名也人於為善累累而不已則天之錫慶亦源源而不窮實之祖父既積之於前而實又善繼於後則福禄之來名爵之加將愈久而愈盛矣故為之記以俟畊樂亭記吾邑劉子恵既没之十年其弟廣東按察副使子敏來京師求予記其所為畔樂之亭其言曰邑之西十五里曰劉岡者吾先人之所居也居之前後岡巒衍迤溪水亘其中溪之上皆平疇沃壤此吾先人所遺之田也吾先人既即世而母夫人故在堂吾時以推擇為學官弟子而吾伯兄子恵與吾仲兄子和弟子淵方力田以致養乃闢地為亭以為休息之所而名之曰畊樂之亭且因以自號毎旦子恵督家人僮僕出就田及其倦且閒矣則兄弟相與笑樂於此亭極友愛之情而盡恭順之意於是時外無科繇調發之撓内無飢寒窘迫之憂有以悦乎上有以足乎下子恵之心何如其樂哉自吾為御史於朝為縣於福建得間而歸進拜吾親於堂上退而與兄弟相聚於此適稼穡之豐成而喜骨肉之和豫盖自以為天下之樂也及為山東按察副使逺於吾親與吾兄吾心慼焉而子惠乃死矣未㡬而吾母亦以疾終此吾與仲兄季弟所以慟恨於無窮也今之廣東於家為便矣然登此亭而思吾伯兄所以奉順吾親而友愛吾諸弟者皆不可復得則吾之哀慼於心豈有已乎而又安能須臾忘情於斯亭哉子幸為我記之又曰吾兄之所以名亭者豈直畊稼之樂哉盖樂乎兄弟之義而寄於此也今不幸巳矣而吾仲兄亦將老焉所以望於吾子姪者猶吾兄弟故吾願有記也予嘗聞子惠而未之識然觀於此則子惠盖亦樂善好義之士哉嗚呼孝弟非一人之德也然而兄弟或有至如塗人者何也利而已利心生而孝弟之道冺矣則有如劉氏兄弟豈不誠可尚哉雖然君子之立其家固難矣而後能繼之尤難也使劉氏之子姪善承諸父之志而愈篤不忘則其家之福未艾矣故予為記其説使書於亭上非徒以慰其兄弟之思且以勉其後人焉思學齋記思學齋者泰和李仲貴延師之所也仲貴愛其子數延明師以教之閭里有志之士皆來學焉予始以内艱歸故鄉罕與人事接仲貴輙因予親友以范文正公為説請予至齋中教諸生予不能辭也齋始為一間於是増闢之廣加倍予坐東向諸生環列左右相從講學者二年隨其才質而告語之矣今年冬予以服闋當之京仲貴惘然來告曰先生去矣諸生將何所卒業哉願留一言寘齋中使有所承式而日進焉則先生雖去猶如見先生也予既以思學名齋乃進諸生而告之曰夫君子之所以學者盖欲真知此理而力行之也天生斯民莫不皆具焉自夫君臣父子夫婦長幼朋友之倫以至於洒掃應對動静語黙萬物萬事之作止皆是也由其粗淺者而窮之以至於深㣲而皆知其所以然之故則知之至矣隨其事之大小而由之而皆盡其所當然之道則行之盡矣行之而弗知則為㝠行知之而弗由則亦豈能自安也哉孔子曰學而不思則罔思而不學則殆者此也吾邑素稱文獻之邦其真知而力行者盖多矣然人性不能皆善也四境之内蓋有知為孝而不順於父母者矣知為弟而不友於兄者矣此鄉邑之患而諸生之所宜惡也惡之而不反諸身則亦豈所謂善學者哉孟子曰堯舜之道孝弟而已夫堯舜之道大矣而乃在於事親從兄之間盖事親為仁之實從兄為義之實也然則諸生之所學者豈有過於此乎誠能明夫孝弟之道而躬行實踐焉充而極之以至於仁義不可勝用然後為學之成若徒從事於語言文字之間而傲然自足曰我知學吁亦末矣其尚勉之哉既以告諸生遂書以為思學齋記使寘諸壁間而日覽觀焉俟他日考其成也菊莊記菊莊者泰和蕭所芳之居因以為號者也所芳種菊盈其庭然非以供玩好而已蓋所芳未生時其先君子嘗夢菊焉既而生所芳遂以名之曰是其生之祥也庶能保晚節者乎所芳承世澤之遺表然為鄉里所重然於其所以命名之意盖未嘗忘也於是而種藝焉曰見此猶吾先人之見庶幾顧名思義敬恭朝夕以不墜其訓㑹予以内艱歸伏田里所芳延予教其子相處者二年今年予起復將之京師所芳乃以菊莊求予記予謂菊者幽貞芳潔之物故君子好之而其堅久之性又足以資人壽者是以南陽甘谷人飲菊潭之水皆百數十歲而康生者又以服菊仙去是豈尋常卉木可比哉然君子所以好之者不在此也蓋於是而比德焉夫善之在人而日彰猶菊之芳香襲人而遠聞也故屈原之賦以飲木蘭之墜露飡秋菊之落英自比焉原豈慕仙道者哉盖以忠信樂善而不見知於人故言其自脩者如此予於是而知所芳先人所以命名之意矣夫愛其子者必祝之以壽而洪範所謂壽則又本之徳焉其命名之意盖亦有取於南陽之服食屈原之賦詠者矣善者天理之總名而㪚見於君臣父子夫婦朋友長幼之間所芳體之於身而見之於事則善有諸已矣善立而名隨之雖至於千百歲之遠盖愈久而愈有聞也豈若百數十歲之壽而已哉若是者則不負其所以命名之意而夢寐之祥為有徴矣故書以為菊莊記曽先生壽藏記泰和曽先生既營壽藏於縣城西北之髙温巷占原田之腴㨿阡陌之㑹城池縈帶山水廻合隠然奥區也然先生尚無恙歲時閑暇杖屨逍遥與客往觀之曰此吾歸處也客或難焉先生曰子何見之不廣耶夫盈虛消息進退存亡之理天地且不能違而况於人乎吾寄於世久矣得全歸於此幸也又何慊乎哉先生字存禮栁溪人祖父皆不仕而皆以忠厚世其家先生尤謙謹和易襟度恬曠超然不累於物其所言行必依於孝弟忠信其教子弟亦如之世以醫活人求治療者日往來其門先生未嘗以風雨寒暑貴賤貧富易意輙往視予善藥無不愈性嗜酒客至未嘗不飲飲則必醉醉則頽然而睡客主兩忘焉然非其人未嘗與接也其為人如此一邑之人無少長愚良皆知愛先生而士大夫尤加親重焉初娶胡氏繼尹氏長子質中其學行如先生次子文中早卒皆胡出孫良讀書為士人隠亦聰慧尚幼先生生丙申年幾七十矣見其子若孫朝夕愉愉侍左右益自樂曰吾無恨矣予少先生二十年而辱與為友今年予以内艱服闋將之京師先生數謂予曰子爲我銘墓幸及我之見也我將命工刻石以待焉他日葬子不吾見矣嗟夫死生之故亦大矣非知命樂天之君子其孰能無介然於懷哉若先生者其知命樂天之君子歟故為銘之其卒葬之年月則有待後之執筆者此不著銘曰髙􅀈奥區實附於墉有隆者封先生之宮原田畮畮邑居崇崇山水縈廻和氣所鍾更百斯年歸處於中以安厥躬以昌其宗知命樂天異此瞽矇我為銘之永垂無窮南園别墅記去泰和縣南二十里有地曰南園林木茂美田疇衍沃山自閬川馮嶺而出者夾而馳東西相距可七八里有小江自興國界中發源東北流以㑹於贑水經其地益清澈可愛其山水之勝既如此而園上居民又敦朴少盜争故予友蕭仲齡之别墅在焉環左右彌望良田深池皆其所有仲齡課僮奴耕植其中秔稻菽麥蔬茹魚鼈之類随所取而各足又其子進為藤縣令有俸資故賓客之來仲齡輙相與酣暢留連以共樂於此仰而觀於山䕃松栢之蕭森逐麋鹿之上下俯而觀於水随舟楫之浮㳺玩魚鳥之翔泳樵人漁父之嘯歌耕夫牧子之徃來凡接乎耳交乎目者皆其所取樂也予嘗有事於山田獲過之僕夫指以告予曰此蕭氏别墅也將徃訪焉適仲齡他出遂不果為之徘徊瞻望盖乆而後去予家居五六年思營耕鑿之地以為歸老之計未得也蓋有田園之利者或不足於江流之勝智者弗樂也有江流之勝或不足於山林之雅仁者弗好也兼而有之如南園别墅者其可多得哉宜其樂之弗去而欲予記也雖然南園之勝不特此而已引而望之其南則三顧之山駢立千仭傑出雲表鄉先生蕭子荆讀書之臺在焉其東則王山磅礴雄秀如龍騰虎卧晉仙人王子瑶飛舉之地也其髙標絶俗清節超世蓋有不恃形而存不隨死而亡者矣仲齡朝夕之暇髙視遠覽超然自樂必有在山水之外者非他人所能知也予生也陋無適用之才年及五十而鬚髪蒼然氣血衰耗耳目手足諸疾交作尚久叨禄食慚負國家他時若得賜歸田里則當扁舟過南園擷芳擊鮮醉飽之餘續康衢之謡以歌咏聖徳然後泝而上之陟三顧登王山挹前賢之髙風訪仙人之遺蹟以極其餘樂然而非所敢必也姑為之記以俟南樓記余友吳世美作樓於其居之南而名之曰南樓因予舅氏歐陽先生來取文為記吳氏世家永和永和於廬陵為近屬其地濱大江有街衢巷道四方之人相易徃來市列百貨之饒而其人皆樂生興事務本而節用詩書文字相慕悦禮讓相後先縉紳大夫居於是及東西行過永和者則皆樂從之㳺雖久而不厭故永和雖名市鎮而人物風俗之美實非偏州下邑所能及也然岡嶺迴合數十里皆可喜可樂而以民居宻比多為髙閎之所蔽虧茂樹之所掩翳不得盡其美於耳目之間君子病之憶予為童子時從舅氏讀書於永和與世美兄弟相好也暇則㳺王仙廟登通仙閣四出而望之凡山水之明秀原田之衍沃浮屠老子之宮長汀宻林風㠶沙鳥漁夫樵父之舎一舉目而盡予心樂之意謂若得隙地作重屋數十尺以超然逺覽而自足於山水之餘豈非幸哉然予以客寄之一身有不能為此而為之者惟吳氏兄弟其可乎既三年予輟學而歸歸又十年而竊第入翰林不至永和者盖久前年予丁外艱歸故鄉往拜舅氏訪昔所與㳺則多無在者幸而尚在則壯者已老幼者亦壯矣周尋舊蹟盖有隐於予心獨吳氏兄弟家益饒譽益振懽然相得之情盖不減於昔而世美之南樓乃獨巋然㨿髙獨出遺喧濁軼氛埃凡山水之竒觀皆在几席之下世美與客登覽觴咏酹明月而招清風於乎亦何其樂哉予與世美既有交㳺之好又重以予舅氏之命則於為記其可以已乎又念予去永和盖十閠始復與世美接今又將去京師不知再至永和復幾閠則予亦安能忘情於斯樓哉故歴記其事以置於樓上俟他日歸榮故鄉與世美登斯樓覽景物之勝引滿而酌之酒酣興作尚當為世美賦之也楮軒記袁生宗範作小軒於其居之東偏既杇鏝矣復加飾以紙焉日光月色輝映乎其中盖炯然而明皓然而潔也宗範有母在堂又為學官弟子事親從師之暇則學於是軒有以悦乎心而忘其倦也因名之曰楮軒而求記於予夫軒者燕休之居若曰於此而軒豁其心云耳夫心者主乎身而攻之者衆故心為物欲所蔽則不足以具衆理此君子所以欲明其心也心爲私欲所溷則不足以應萬事此君子所以欲潔其慮也明而無蔽潔而不撓則全體具而大用行矣君子之學蓋如是故古之人有因物以致戒假彼以喻此如湯武盤盂之銘與夫鶴鳴之詩之類是已後之君子所以名其居室欲常接乎目而警乎心者盖凡以為學也君子之學豈有須臾而忘乎心哉今宗範之軒誠足悦矣然以其飾於外而爲可悦乎抑以人莫知爲此而爲之者獨我爲可樂乎由前之謂則世之廣宇豐堂雕刻藻繪者固多奚取此也由後之謂則其志亦小矣宗範豈爲是哉盖因其明而思所以明其心因其潔而思所以潔其慮以進夫君子之學如古人之所謂者飾乎外以悦乎内非宗範之志而亦豈士君子所望於宗範哉嗟夫士之務内者鮮矣宗範可謂有志之士也然吾聞之君子無先人之心惟於學則否也故曰當仁不讓於師蓋仁者吾心之德而為之在我奚讓焉宗範於此而不懈於用力則進於仁矣所謂居天下之廣居豈曰低徊此軒而已也姑以是記諸壁間宗範朝夕覽焉而自勉於成君子豈以夫輕且約者自處其身哉止善堂記君子之所以植其家者止於善而已矣至其後世欲昌大而引長之非有他道也亦止於善而已矣善者理之出於天而賦於人者也於父則為慈於子則為孝於臣則為忠於夫為正於婦為順於賓客為敬至於兄之友弟之恭長㓜之序朋友之信與夫迨下之惠臨財之㢘飲食言語之不失其時皆理之當然也君子必務乎此而不悖焉然後德成於已而能植其家蓋身者家之本也孔子曰積善之家必有餘慶積之云者事皆由理非可一二計之之謂也其前人既皆止於善矣後之繼者亦若是然後足以昌其家而慶澤有餘矣江河合衆水之流故能逺海納百川之㑹故能深且廣焉其理固皆爾也然則爲君子者其可不務於善哉泰和之有嚴氏盖四五百年其先有父子相霸國者及徙居泰和累以詩書科第顯名衣冠之望至於今不替其所以傳之逺者豈非爲善有繼哉予少時以姻家子常得拜元晏先生端確周慎其言行無違於理者蓋孝於親友愛於兄弟厚於姻族故舊而慈恵於鄉之人其有事於公家尤謹禮而畏法其處人是非曲直必公其臨財㢘非分所當得者不取也自少至老未嘗變節易意可謂止善之君子矣能再植其家蓋宜也先生卒子誠仲文仲又能昌大之豈非善慶之及哉先生與家君逰如兄弟而誠仲於予爲姻家故誠仲大作新堂而問名於家君家君名之曰止善且爲題其榜姻親之誼蓋欲厚其本而及之逺也今二十年又以記屬予故爲道君子之所當務者如此而以先生之事實之詩曰伐柯伐柯其則不遠先生之善非獨一家之則也嚴氏之子孫世法之則家之昌大有已哉是為記讀書堂記予外兄嚴君敬仲名其所居之堂曰讀書而以書來京師告予曰吾嚴氏居泰和累有文學顯者今不嗣久矣然吾已老思俾子孫學於是庶幾有成以不墜先業子宜為我記之予縻於職務不暇作而君數以命予又使予子䆅來速文一歲之間書五六至君之志可謂篤矣予尚敢後乎自聖人之道不行而後有書書者所以載道也君臣父子夫婦長幼朋友之倫以至萬事之理莫不具焉後世欲學聖人者必讀書以明道深體而力行之然後可兾也書至秦而焚滅盡矣漢興購求遺書而老師宿儒亦出其記憶以授學者其後書稍稍備然皆傳冩以誦焉唐之末世始有刋印而傳者宋諸大儒闡明聖道至於今書益盛矣當書之未盛行也學者之道徳文章足以紹前人而儀後世者蓋多矣至於盛而反不若焉豈非讀與不讀之異哉然讀者所以致其知也致知而不力行則猶不讀也昔之人有能記而言之者自謂足矣徐而視之其於五者之倫與夫萬事之理多悖焉其所讀者徒以餙乎外而已則亦奚貴於讀哉此君子之大患也嚴氏之子孫讀書於斯堂者明聖人之道以善其身行於家達於其鄉則德立而文著矣豈特能嗣其先世而已哉若猶夫人也人將指而尤焉曰讀書者固如此則聖道之賊也予既於君為内弟視其子孫猶予子孫也故切言之而以復於君俾書於堂壁間以為記抗雲樓記胡氏居泰和南徑者十餘世子孫最為繁盛聯比而居故址殆不足容乃多為重屋以庥如龍則其族之傑然者作新樓若干楹其髙若干尺巋然出於群屋之上軼埃壒而凌風雨諸山之環其居者可一覽而盡因名曰抗雲之樓既請予先君子大書三字揭於楣矣久之尚未有記今年來京師請於予予謂抗之為言敵也雲者山川之氣觸石而起隨風而行披冐乎林木綿羃乎巗壑悠揚衍迤於太虛之中樓惡乎抗哉盖謂其髙與之敵可以攬而有也然則如龍之樓信非衆之可及耶夫厭汙下而樂髙明者人之情也卑卑而居昧昧而㳺其耳目所見聞不越乎藩籬之外則其規模狭隘志識凡陋真若斥鷃之㣲惡足以語鵾鵬之大哉惟居髙明遐視而廣覽則其胸次悠然曠然逈出於塵俗之表此則達人之髙致也如龍之志其出於此也乎雖然如龍以抗雲名樓豈特並其髙而已哉當於是取益焉君子之自脩凡物之接乎已者皆進德之資雲變化之物也其色不同則人之好惡亦異周禮保章氏以五雲辨吉㓙蓋於分至焉觀之黄為豐青白黑赤者䖝喪水旱之兆也然則雲之黄者人情之所喜君子之愛人澤物者似之其餘則否如龍承先人之慶世有貲業能恵利於其鄉一鄉之人望而愛之乆矣今居新樓之髙廣耳目之及益思與雲之黄者抗其美此則君子之德也如是則人望而愛之者豈有已乎若論語所謂上達而進於髙明乃學問之極功如龍倘有志乎此俟他日登斯樓而相與講焉懸壺處記廬陵鄒氏世業醫而尤精於醫小児菊晩盡傳其術以治人無不愈凡其所至求藥者争趍之因名其寓曰懸壺處前十餘年菊晩嘗因梁叔䝉求予記予未暇作今年予子䆅來北京復以爲言予嘗讀神仙傳見壺公者賣藥汝南市中人服之有竒效懸一壺肆頭市罷則躍入壺中市掾費長房異而徃拜之因得随入壺後乃亦傳其術神矣哉其言也菊晚之懸壺其真若此也歟假託以自况也然予觀之醫之道皆自上古神聖爲之其後若扁鵲兄弟倉公華佗之輩或視色或視毫毛或察聲音即能知人之所苦飲之藥皆竒中至於解顱理腦刳腹澣胃俾死者生危者安其術蓋神矣菊晚誠能乎此則亦壺公也而何假託云哉菊晩嘗至予泰和予家之子孫有疾者皆求菊晚則泰和亦菊晚之懸壺處而予諸子孫皆飲壺中之藥者也其惠不既溥矣乎抱朴子嘗謂學仙者固以金丹為本然尤積衆善則其成之也易而欲積善莫如醫則醫固為仙之資也壺公之賣藥汝南亦云謫仙而思復者菊晚精於醫其惠之及人益廣則善之積愈多將不違世絶俗超然而乆存者乎予蓋不得而知也然嘗聞之壺公昔以一杖授長房曰騎此任所之而其藥多有能引年者予慕之久矣今既老且病而去鄉益逺倘菊晩壺中有焉則幸以遺我使神全體輕將騎此杖與菊晩翺翔上下於鴻濛汗漫之中豈不快然自得哉菊晚果有以遺我乎姑為之記以俟雙桂堂記雙桂堂者泰和張君日省之堂也日省好善樂義有二子珪球皆教之明經以舉進士為業宣德二年皆就試江西在髙等鄉人榮之明年㑹試禮部皆得為教官鄉人又以為榮盖泰和之舉進士者固多不能二人出於一家二人出於一家者有矣不能同出於一時同出於一時者有矣不能皆同氣之親今於珪球見之於是舉酒相慶於日省之堂而以雙桂名焉今年予子䆅來北京日省以予戚也使屬為記昔者晉武帝開東堂策士郄詵射策中第一武帝問之對曰臣對策如桂林一枝崐山片玉由是以科舉發身者皆取喻於折桂唐人載於歌詠多矣今日省二子皆自科舉得官則雙桂之名宜乎其揭於堂也昔者君子之教其子也皆欲成其才然能必其成蓋難矣成才而得名薦書受官使固足以為鄉里之榮然而愛其子者必使德崇業廣而大有譽於世然後已予知鄉人老長所以名日省之堂如此者非特榮之盖亦期之也夫桂者後凋之物當霜雪嚴沍之時凡植於土者莫不枯槁憔悴獨桂樹蒼然立於霄漢之表其貞心勁氣與其用之益於人皆非其他草木所能及而君子之飽於仁義不為世俗之所移利欲之所揺奪沛然有以澤乎天下者似之然則日省之教珪球與珪球之所宜務者固當不止於此也茍德業益進而及於遠大焉則將為邦家之光非止為閭里之榮也此鄉人老長名堂之意予故推言之以為雙桂堂記讀書堂記讀書堂者蕭朋漢甫所作之堂也蕭氏世居南溪以詩禮著聞朋漢復自南溪徙居武陵橋既作新堂聚經史百氏之書使其子朝夕讀之以求聖人之道且曰吾非以遺一世也求予為記以告其後人於乎朋漢之志偉矣夫古之聖人所以教人者必求諸其身自聖人之道不行而後載於書故欲求道者必始於讀書書者道之所由以明者也聖人之道莫盛於堯舜湯武周孔皆學焉而聖者也然則非湯武周孔者何可以不學而學何可以不讀書哉知之既至而行之又力則幾於道矣堯舜之道與天地凖而孟子以為孝弟而已盖孝弟之行根於人性故孩提之童皆知愛其親及其長也皆知敬其兄此豈偽為哉其得於天者盖如此此所謂仁義之道也仁之至而萬物遂其性義之極而萬事得其宜盖有不可勝用者矣故堯舜之道至大必本於孝弟然則讀書以求道者其必自孝弟始乎體於身行於家而逹於天下則為學之功至矣泰和文學之邑也讀書以求道者多矣其困於無資疲於力役而不暇學者不少然能奮發以進於道者亦有矣今蕭氏之子孫承前人積累之餘而當太平無事之日得優㳺以學於此堂亦何其幸哉誠從事於事親敬長之間求其不可勝用者而畫心焉則足以立身而顯其親此則朋漢甫之意也若飽食逸居交非其徒獵陳言之餘悖仁義之趨以譁世取譽而自以為能讀書者則非朋漢甫之意矣故為之記以勉其後人焉一經堂記徃年泰和蕭尚仁先生以書經教授鄉里一時從㳺者多英俊之士而韋存方與焉存方尤聰敏好學早夜不懈盖欲有以自見於時蕭先生最愛之存方學日進而家事益滋出不得如其志久之徙居南昌而吾邑士大夫往來南昌者多與存方㳺亦時時道其所學皆有以當於人心前監察御史宋琮萬鍾翰林侍讀梁潛用之刑部主事楊相之宜初就試於有司退而存方閲其藁曰三君子皆當升而宋公居上已而如存方言宋公乃居第二為易經之冠於是人皆知存方之學之識而惜其不遂顯也未幾存方卒其子建勳欲承其父志買地東湖之上而作髙堂焉以其父所讀之經置其中取韋賢父子事而名之曰一經之堂且曰吾世澤不冺後之子孫將有能讀此書而興起者其舅氏蕭宗勉為予道建勳之事而求文為記憶予前至南昌時不及見存方而識建勳雖甚少然已闓爽異常人又二十年乃聞建勳瓌偉豐碩謙恭執禮善事其母而尊敬士大夫且其心汲汲於承先志啓後人如此是皆可嘉也夫經所以載道也讀經者豈徒誦其言固將行其道也道莫盛於堯舜而孟子曰堯舜之道孝弟而已蓋孝者仁之實弟者義之實始於事親敬長之間而終於黎民於變之盛仁義盖有不可勝用者焉然則讀經者亦修其孝弟而已矣建勳事母而能盡婉媮愛敬之心事長而能致恭謹順從之節則身雖未顯而政固行於家矣善積之久而天佑之子孫之興有必然者昔漢韋氏自孟以經學相傳者非一世至賢父子始大顯建勳其世保之毋自怠以止也則嫓美前人不難矣故為之記且以勉建勲而又以告其後人焉積善堂記泰和城西曽氏自成都提舉安強兄弟以文學著至寳慶通判如驥又以節義顯故曽氏遂為望族通判孫國定國定子俊甫俊甫之子叔仁叔仁生賢可徳可再傳至自省自清皆世積忠厚不沗其先人予幼時識自省自清寛裕篤實恭儉簡静未嘗有非禮之言不正之行田園池沼滿近郭諸老朝夕杖屨往來不在西陌在東阡人咸尊重之又嘗讀智林塔記及仰山祠碑而知修塔建祠及甃登科之路七八里以達於祠者皆叔仁所為叔仁尤好善孜孜不已此特其一端耳然後信夫曽氏所以悠久者雖提舉通判之澤而後人承藉封植之厚亦不可誣也叔仁嘗作堂而以積善名之蓋欲紹其先以裕乎後今其曽孫保正世守焉懼其先人之意不白也來求予文以為記嗟夫保正之志誠可尚也已昔之人氣勢熏灼於一時以擴大其基業者皆欲傳之百世而不窮也然而勃焉以興忽焉而仆名田甲第不能終其身而有之或一再傳而影没跡絶無遺餘者有矣其所積者不足以善後故也其有行仁義法先聖守詩書之㣲言伸吟於朝夕之間或遂顯且貴矣乃益以法度自守不敢一置身於不善之地其强且大雖不能赫奕以動人然而一畆之居百畆之田傳之愈久而猶存者豈獨子孫之能善繼哉所積者不同故也易曰積善之家必有餘慶積不善之家必有餘殃此之謂也夫善者天理之摠名而積非一事之謂也蓋自洒掃應對起居飲食之微以至於事親從兄忠君親上隆師取友仁民愛物之實皆是也惟皆循其理而無違則德成於身而澤垂於後矣子不見夫陂澤乎是水之所鍾也深則其流也逺雖有旱暵不為憂也若洞庭彭蠡則所積者愈廣而所出者愈無窮子慎積之哉毋縱怠以止也則可以不愧乎祖宗而有裕於子孫矣是為記思成堂記泰和朱漢雲名其堂曰思成之堂因予執友陳先生仲亨来請予文為記其言曰漢雲二嵗而喪其父又四年而失其母今年已五十矣其所以能自立不墜者皆先人之蓄德儲祉然而不獲申一日之養焉此其所以哀思無窮也又曰堂之作先人之遺業也因先人之業而迹其故蓋目擊而親在焉豈能須臾而忘乎心哉願因子為著之嗟夫此孝子之心也於是而可書矣夫人子之道莫大於事親是故時其起居候其顔色調其飲食寒暖之宜油油翼翼不忍去左右然於其没也而猶有風木之悲故内盡其心外盡其物春秋之祀不敢怠焉然猶以為祭而豐不若養之薄也於是而有終身之慕於乎此所謂孝也漢雲不幸而早失其親於養有不逮矣則漢雲之孝思豈以老而有窮哉此思成之堂之所以作也啇詩曰綏我思成盖親之没久矣因吾之思而有接焉是故思其居處思其笑語與志意樂嗜及其至也則肅然而若有見僾然而若有聞此於其奉祀之時然也若漢雲則無時而不思思之則無時而不見漢雲之孝於親其賢於人盖遠哉雖然君子之孝不止於思也蓋言有不信非孝也故言則思誠行有不敬非孝也故行則思敬所謂一出言而不敢忘父母也一舉足而不敢忘父母也夫如是則能敬其身而有以成其親矣豈非孝之大者哉朱氏家古平在縣東南六十里以殷盛稱一鄉而漢雲則其族之賢者也故予為記斯堂而廣其志如此云光遠堂記泰和嚴士臧治堂於其居之西而問名於家君家君名之曰光遠之堂且為題其榜盖二十年矣今年士臧來北京告予曰惟吾二氏世有連名吾堂者尊府君也今尚未有記敢以累子盖嚴氏之先可求相吳子續又相南唐既尊顯矣金陵之亂孫美南奔始家泰和在宋震為常州推官執衡同知臨安師愈教授福州朴山先生著易説徴授祕書省校勘子驤父任節幹用父仕元為髙安縣尹國朝則從禮先生為國子學正士臧之祖也自吳至今四五百年衣冠之望未嘗替其光耀悠遠可知矣家君以是名堂盖宜也予竊思之光以所發言也遠以所至言也語曰膏沃者其光華源深者其流遠然則所以光且遠者盖有其本矣詩書之訓其嚴氏光遠之由也詩書以載聖人之道聖人之道莫大於為仁始於事親終於事君推之以仁民愛物而至於不可勝用然後為仁之德成仁固天之所佑也故仁者必有後又繼續而引長之則光輝發越豈一二世而已嚴氏居泰和若干世其光遠如此者信有以致之矣名堂之意欲因其末而推及其本也於乎士臧其念之哉世之所謂豪傑多矣其始非不赫然盛也有及其身而冺者矣有一再傳而冺冺者矣茍或延其世然晦而不彰昒而若亡者有矣其如嚴氏者可數也豈非詩書之習繼與不繼之驗歟士臧宜益務此加其膏浚其源則光且遠有窮哉叔孫豹嘗謂立德立功立言雖久不廢此之謂不朽朴山先生之書盖庶幾所謂立言者又勉於功德以啓佑其子若孫子若孫敬承而加厚焉則斯堂也雖百世有耀矣故特記之以告其為子孫者修静軒記江隂多大家其貲富甲於鄉里者有之貲富而能自修以有及人之善蓋少矣予姻友嚴士正為其邑訓導為予言陳孟時與其弟孟寛蓋所謂好修之士也陳氏之貲産在江隂為盛而孟時兄弟不以是自髙退然以脩身為務取諸葛武侯静以脩身之語而以修静名其軒於人倫事物之所當為者皆盡心焉退則兄弟處於是讀聖賢之書考其所以修身治家者深體而力行之凡世俗之所馳騁炫燿未嘗萌於心其賢於時人遠矣願為記之士正端人也其取友必端則予於是軒可嘿邪天之生斯人也有物必有則故君臣父子夫婦長幼朋友之間莫不有理焉斯理也必沉潜以察之而從容以行之不可以躁且率也是以君子之務自修者必貴乎静外物不交於其前則此心恬然乎其中於夫事物之理得以䆒觀而順應焉如是而失之者鮮矣此章甫逄掖之流之所勉而能也而孟時兄弟能之豈非誠賢於人遠哉予嘗觀之世之貲富者往往用以自豪蔑禮而棄義肆慝而作非極其才力之所能以兼并傾奪盖擾擾焉不置也及乎天之定也卒舉其所自有者而盡失之使能静觀夫理之所宜而自修焉則其盛也有已乎由是觀之孟時兄弟所以安其身保其家可以久而盛者蓋静以自脩之效也士正又謂孟時兄弟輕財而好施凡貧無食者與之粟有貸而不能償者焚其劵死而無以𦵏者遺之棺置義塾以教里之子弟造橋梁以濟不通若此者非一也蓋静而有以見夫仁道之當然者故能爾是皆可尚也故為之記使觀者有所興起云積善堂記任城蕭氏在邑南鄉為大家韶美則其家之傑然者也蕭氏自唐大順間由金陵徙居任城世以能積善為名其初有克俊者大其室居而名其堂曰積善之堂髙樓廣宇輝映閭里之間元季兵亂傍近屋皆燬焉而兹堂獨存鄉人皆指目嘆曰此誠積善之所致也於今已十餘世矣韶美以其久而弊也乃撤而新之其制度宏壯不减於昔既求予先考中憲公為書積善堂三大字揭諸楣間復來請予文為記予於此益知夫為善之不可以已也夫天之所以賦畀於人者蓋有善而無惡而人之所以脩於已者亦當為善而不可為惡知善之當為而為之不厭是之謂順天知其不善而力為之以自陷於邪僻是之謂逆天天之道佑善而灾惡故惡者之困乏其身而遏絶其後人宜不如善者之昌而久也易曰積善之家必有餘慶積不善之家必有餘殃此之謂也予嘗過南鄉道溪口入鳯岡遥望任城雞犬之聲相聞其原田衍美室屋鱗次固知其非衰家也而鄉人又為予道韶美之好賢樂善非庸人可及其可謂善繼其先者歟泰和之故家大族多矣今之久而存者皆昔時之勉於為善者也其間以豪侠財力臨一鄉而以為善為迂者其後之興廢存亡可知已於乎韶美之居斯堂而思前人之所行其益勉於為善哉傳曰善於其身而福及其子孫韶美勉之而其後人又加勉焉則斯堂之傳豈有窮哉故為之記堂成之日則年月日也抑菴文後集巻三
