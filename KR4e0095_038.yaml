body:
  text: 抑菴文後集卷二十五明王直撰墓表主事歐陽君墓表君歐陽氏諱俊字允俊泰和蜀江里人也祖以忠惇厚長者父子詹叔父子宗皆善士而皆早亡叔父無子君以祖命為之子而善承其教日夜自勵於學所以事祖及其母皆盡孝敬與兄弟處則恭而和待鄉人婚友皆中禮節以故人盡愛之永樂甲申以詩經中進士選為翰林庶吉士㑹纂修永樂大典天下名儒碩士往往多在君執筆編校精審無缺失由此益知名書成擢禮部主事於是六卿之屬多缺而在館閣者皆賢才故為之長者多思得其人以自助及禮部得君皆為喜當天下無事歲豐人和四裔來朝兵革不用天子篤意儒術興教化而修典禮儀文之盛君從事其中從容詳雅援古据今克盡其道事有難易緩急必身任之未嘗茍有避就同列之士莫不譽歎其賢在位二年以祖喪去官得疾卒于家永樂丙申正月初五日也享年三十九卒後二月葬于馬􅀈岡以其地不吉也又以永樂缺年缺月缺日改葬其里下村之原豫始與君同遊鄉校君長豫一歲豫嘗以兄禮之而君不以弟視豫也及同領鄊薦上春官又與君暨湯君流曽君與賢同載以往四人者莫逆也既同登第入翰林又同官京師相得益歡甚其所與言者必依於孝弟忠信而其相責望者蓋逺也孰知君與二人皆不及中壽而相繼先逝顧其所存無以致此者而卒皆如此豈非其命也悲夫君娶凃氏子二人曰沛曰瀚能繼其家沛既改葬君乃來北京泣請於豫曰先人不幸已矣惟其德善先生實知之敢請表於墓嗚呼豫與君厚矣實惟知君其忍使無聞于世哉况君之子又以請也故論著其實使歸鑱諸墓上羅景泰墓表永樂十四年十一月十四日山陽處士羅景泰卒年五十九葬于淮隂鄉之青墩而未有表其墓者後十年為宣德元年六月七日其配范氏年七十而終子鎮銓奉柩合葬焉乃來請豫文表諸墓上處士之先本撫州宜黃人其後有為吉水州學録者因家吉水之進善坊傳幾世至處士之祖右軒父維道皆不仕處士讀書負材器倜儻而好遊往來山陽最久喜其為南北之衝可以交四方之賢豪留居山陽西義橋輕財重義樂於賑施周人之急惟恐不及縉紳士大夫過山陽者必殷勤欵洽既久而敬不衰性尤寬厚與物無忤人犯之不校也愛其子擇師以教之期不墜世德范氏定海人范文正公十一世孫啓元先生之子能以孝敬事其上勤儉治其家凡處士所以奉祭祀給賓客待姻族周窮恤匱延師教子皆能成其志處士亦自喜曰吾之克樹立者吾妻實有助焉二子鎮與銓也夫士之處者皆未試於用其德不大顯於世而婦人教令不出於閨門雖有德善尤不可得而見惟善觀人者觀於其子孫則其父母之善可知處士雖老於山陽未嘗沾一命以卒而二子皆能世其家銓遂舉進士官御史是豈無自哉夫善之能及人者或可勉於一時至於成其子之才以膺爵祿之重非善之積有以獲乎天者不能嗚呼是可以表見於後世矣故為文授之而使劖諸石梁孺人墓表孺人陳氏諱順止元贛州路推官學禮之曾孫潮州教授以道之孫處士友慶之子嫁為梁先生不移之妻生有淑質間於女事梁陳皆泰和大家而教授娶清溪楊氏最有禮法其教孺人尤謹於規矩故孺人以德行功能為二族所譽歎元季兵亂大家皆燔劫無遺仍歲饑饉幾無以自存先生奉母楊氏撫其弟妹三人至傭書以贍給孺人則躬紡績縫製竭力助之脫簪珥以婚嫁其弟妹無少吝國朝承平日久家道稍裕孺人相先生教二子以學常誨之曰士不明經不足為士於是二子皆明經為名儒致位通顯孺人享其祿養三十年然所以教之者始終無違理孺人之弟仲述洪武中為御史有清德既沒家無餘資其男女二人皆孺人教育使男有立女有歸男即賞舉進士為廣西僉事以卒而孺人又撫其遺孤其於諸孫亦訓之以義於內外姻戚處之有其節至於奴婢下人皆待之有恩平生清苦勤儉衣食不務豐竒適於可而已其綜理家務至老不衰蓋天性然也生於元至正甲申四月二十一日卒於今宣德丙午八月十二日享年八十三二子長曰潛字用之纍官至翰林侍讀兼右春坊右贊善先九年卒次曰混字本之官至蜀府紀善皆以文學重當時孫男六果楘皆鄉貢進士栗泰和訓導楫榆樞皆為士人孫女六曾孫男十六人女八人𤣥孫男闕人本之以宣德戊申十二月十三日奉孺人之柩葬其鄉盤古山之原既得少傅楊先生銘其墓復俾直為文表於墓上嗚呼直自少時嘗聞孺人為婦為母之道而歎其德之全及以親故常得進拜於堂上而聽其誨論皆存順勤儉忠厚之言可以垂範勵俗因竊自歎女德之盛衰家之興替繫焉其或未能盡善者無所視效故也兹幸有孺人庶幾內外親戚之為女婦者有所觀法而興起乃今已矣嗚呼其何可復得哉故述其梗概與直之所感者表諸其墓教諭解君墓表君解氏諱繪字朝夫吉水人曰成我原昌者君之大父父也君幼孤大父教之君亦穎敏好學既長益自奮從父原震先生授以易經能造其深微於諸書無所不讀前翰林學士兼右春坊大學士縉紳公君之從兄文淵閣大學士兼左春坊大學士胡公光大與君生同年二公家居時君日與講論切磋有麗澤之益學遂大進其行篤於孝悌為文章必據於理考論古昔人物是非得失皆當乎人心永樂四年舉進士奉敕歸待用于家明年徴拜廣西道監察御史君歎曰御史天子耳目當巡省四方以鋤姦植善然吾親老不可去左右官雖貴非所便也力請為教官以便養乃改授廬陵縣學教諭奉母劉夫人懇懇盡孝諸生化之九年考試于河南而君之家以縉紳公纍盡室謫戍邊母與妻皆卒于京師君自河南還聞之不勝哀即走京師奉其骨歸葬而亦往就役十年缺月缺日至揚州以疾終年四十三權厝揚州城外後三年子親德還自戍所乃奉君之喪歸葬于槎路口先塋之次君配徐氏有婦道子三人長親德次親禮次徵生早卒女一人葉登崇其壻也孫男四人解氏故鴈門人自唐安吉令尹禹始來居吉水傳至于今世以宦學顯聞為大家至君之祖父皆慱學有文而皆不及貴慶澤之積故君能世其家負其才行足以大顯於當時而止於一教官又陷於竒禍以卒此知君者所以為痛惜也雖然君子之觀人也觀其本孝德之本也君駸駸乎顯矣乃求便養弗就比之叨富貴而忘其親者賢不肖可知也用此可以表著於世矣則君雖不幸不至於通顯何憾哉故表諸其墓庶百世之下有考焉吳處士墓表君諱昭字道彰姓吳氏其先錢塘人宋紹興間有曰琰者為興國令子子新娶廬陵東固李氏因家東固其後世再徙遂居廬陵之城北自子新至君大父文琦父仲和皆不仕而皆以行誼稱於鄉君姿貌豐偉尚氣節而其心寬厚和平言動必循禮自以早孤不及養二親歲時祭祀或言及之未嘗不悲愴與從兄道淵道宏同居相友愛內外無間言於宗族親戚朋友處之盡其道至於貧而願學與介而能守者則資之使成名死者厚賻贈以葬而周給其家其他賑窮恤匱赴人之急尤夥家既豐饒有廣宇豐堂魁傑之觀佳花美木幽閒之適客至輒觴詠終日常慕陶元亮為人自號菊隱士大夫多為賦詩宣德丙午七月十四日以疾卒于家距其生洪武壬戌九月十三日得年四十五娶金灘劉氏有子八人肅為邑庠生某某皆知學君常延名師篤意教子多市書使讀期必能世其家孫男一人復孫肅與諸弟既葬君於其里望城岡先塋之次後三年己酉來北京因其姻家長史周君請文表于墓嗚呼吳君其可謂君子也哉古者以三物教萬民二曰六行孝友睦姻任恤皆人道之當然也教既成則人皆為君子而俗化之美比之唐虞何其盛哉後世豪傑乃或以為不足為往往務為新竒殊越之事以動人耳目取名當世或逞聰明辨給之才窮其力所可至利之所在浩然直前於夫六者之行皆棄而不顧卒至於辱其身其效之不同如此則何可以求異哉今觀吳君之存於心施於家逹於鄉黨州閭皆不悖古之道而以和平寬厚之意行之異乎世之所謂豪傑者則謂之君子奚愧哉用此可以表見於後世矣故為之辭使刻之墓上彭孺人墓表泰和進士張僉喪其母孺人彭氏既葬於其里􅀈湖塘之原乃來京師求豫文表其墓彭氏家桃源世有德義孺人曾祖君遇祖直方父伯讓皆以惇厚謙謹重于鄉故孺人居家為賢女孝順勤儉服間女工既笄以歸于張子廉之子善則甫張氏亦邑大家遭亂中衰孺人善事舅姑善則循循雅飭以儒道自持孺人相之克再興其家其待內外族姻皆有禮而仁以字其幼孤又能推其餘以賙貧乏有子二人長曰坦次即僉孺人皆勉以學問二子亦善成其志坦以永樂乙酉領鄉薦㑹試不第卒于國子監僉登永樂壬辰進士第觀政于都察院奉詔使交址孺人居家疾甚方篤念其子而僉適使還過家得躬侍湯藥以致其孝孺人亦為少慰然終不起洪熙元年九月二十日也享年六十卒之後五日遂以禮葬焉女三人嫁闕皆士族孫男五人曽孫男一人豫觀周之公侯大夫士所以克興其家而王道賴以成者蓋其身篤於行而其妃夫人有以助之也後世士大夫之能善其身者鮮矣為之女婦不見其可法而不能興於行故始而貴富終而貧賤者蓋多焉女德之系乎盛衰可知矣若孺人之賢所以修其身昌其家而成其子如此豈非有所本也哉故表諸其墓曾存禮墓表曾先生存禮豫泰和之善人君子也豫初友其子質中先生不以豫少特加愛焉由是與其父子遊先生世業醫其心則篤於仁赴人之急雖風雨寒暑不廢視彼有疾猶在已既與善藥又數數臨視而斟酌之惟恐有一之不得其安者若報與否不計也性質直坦亮內外一致處兄弟訓子孫待姻戚皆溫然和厚於鄉閭之人恂恂恭讓不茍忤其意人亦無不敬愛先生者喜飲酒雖多不亂知己者過其門輒留飲蔬果魚肉隨所有不求甚豐至賓主皆醉然後罷若無賓客則父祖子孫相勸酬愈愈然樂也平生不喜為機變不茍營貨利惟以淡泊自適非公事不至縣庭凡里中豪傑之所得意以逞者先生皆斂避不敢知人非端重不相與往還自豫與之處四十年未嘗見其有失言於人失色於人者性尤曠達不以死生介意嘗營壽藏於髙􅀈巷而請銘於豫曰使我見之死亦足矣豫遂為之銘先生以缺年缺月缺日卒葬髙􅀈巷而納豫銘墓中後缺年卜者謂其不吉質中乃奉遷於龍洲之原實缺年缺月缺日也先生初有二子長即質中次先卒孫男三良隱祥至是良為訓導來京師以父命謁豫請曰昔者先生嘗銘先人之墓矣今既改葬思表之墓上以著不朽願先生終惠之豫謂人皆有善善之不存者欲害之也於是聖人有教教之不改於是而又有刑蓋使之節其欲而率於善也使人皆節其欲而率於善則治教之具可以不作矣然而汨於欲者比比也乖戾鄙薄之行興和平廉厚之意靡此教之所以不勝而訟之所以繁也若曾先生之處已接物蓋能節其欲而率於善者為人如此則亦何藉於有司謂之善人君子奚愧哉故表諸其墓處士蕭公墓表公蕭氏諱恪字存道泰和祿岡故家曾祖宗輝父以吾皆隱德弗耀公少端謹好學多讀書尤用心於易䆒性命之奧然止用以自足不求人知其事父母極愛敬處宗族敦睦有禮法於鄉黨循循豈弟不茍止妄隨遇事無大小必揆於義衆皆取正焉公孤立無同産兄弟與從弟子元子凱相愛甚篤二弟死撫其孤尤有恩至於窶夫細人無不䝉其惠者所居多良田而山水皆秀好公日徜徉其間興之所至發於吟咏大篇短章皆有法度亦未嘗輕以示人曰吾取適意而已豈夸衒以求售邪直之繼母夫人公之姊公實為舅氏少時常辱愛於公真若所自出者忠厚之至也永樂辛卯客遊廣東年缺月缺日以疾卒于番禺之寓舍距其生元至正戊戌三月十五日得年五十五娶南徑胡氏生三子成德魯德孚德皆能承公之教以世其家女二再娶沈氏生子惠德早夭孫男八成德以壬辰之歲自番禺奉公之喪歸缺年缺月缺日葬于甘溪土坎上之原葬後十七年而成德亦卒魯德孚德俾直述公之善以表諸墓嗚呼孟子所謂一鄉之善士其善行必有以蓋於一鄉然後鄉之人有所觀感而興起若公者是也今不幸已矣則夫鄉人之欲勉於善者將何所視法哉表而著之庶幾有聞而興者故次第其說而使鑱諸石彭氏直方墓表泰和城西桃源里有質行君子曰彭公直方年缺十以缺年缺月缺日卒葬沓隴之龍家原鄉之君子與夫小夫婦人過其墓皆欷歔歎惜有泣下者蓋公以忠厚存心其出於口皆禮義之言其見於事未嘗有險薄違道者君子以德而相愛小夫婦人蓋嘗振其窮恤其患而贍其不足是以至於久而不忘也洪武中直之先君子自工部主事以憂居家常舉公以教直曰吾彭氏之彌甥也觀公之德蓋所謂古之君子者當國家興運之初賢者則出為世用鄉之豪傑亦各奮其才力以自雄聲勢赫奕而細民受其弊公獨退然其間課率僮奴以耕稼自足於人道所宜者必躬履實踐不外飭以為名不茍異以為髙其待鄉黨意誠厚於親戚加厚焉於宗族則又加厚焉當時皆卑其所為其後細民多反噬過公門則指而歎曰此善人君子也使人皆如是吾屬寧有害哉而向之豪傑皆波頽澌盡然後見公之德焉此汝曹所當法者歲時常從先君子拜公於牀下瞻其德容而聽其誨論蓋煦然如春之著物也心誠慕之又嘗聞之前輩老長曰國初之度民田也從事者皆視利為輕重公獨介然以實聞江隂徐侯為縣求耆德自助唯公與歐陽以忠特為所尊禮民多隂受其賜及長其鄉糧賦不妄取一錢而事以辦治此皆人所不能忘者於乎若公者非誠所謂君子者哉公娶闕氏有子四人伯讓仲恭叔溫子善其淳謹皆如公孫男闕曽孫男闕皆讀書厲行為士人於此尤可以見公之德矣嗟夫泰和文獻之邦也故家大族讀書以相尚禮義以相先而其間淳德古道又有如公者故能保其家而益昌數十年來凋謝殆盡聰明踔厲之士不復見前輩髙風雅度往往極其才力之所至則鄉之君子與夫小夫婦人安得不慨想於公哉公之曽孫俊為太學生在北京相與道之如此乃序次其大節俾歸刻于墓上庶幾覽者有所興起云曾處士墓表吉水曾惟珍以明經取進士擢官行人與子偕在京師謁豫告曰先人之卒久矣尚未有文表其墓非敢後也惟其平生大德以教以育至于今而不克一日享其祿猶冀或者假寵於朝廷可以為親榮而竟未能遂若今不圖所以顯揚其德恐久而沉泯則不孝之罪大矣敢請一言以表于墓上豫哀其志不克辭按狀曽氏本郕國宗聖公之裔漢都鄉侯之子據義不仕新莽舉族南遷有家于贑之崇賢者後析居吉水之瀘江今居石壁又自瀘江析焉則公族也大父仲賢父存逺皆不仕而皆服詩書之教元末大亂盜賊蜂起故僕有不義者覆其家公時方髫齔與兄仕吉弟仕寬奔走避難顛沛之際而奉養其母不少衰國朝受命海宇寧謐公卓然自立修復故業不失其舊觀而事母益謹處兄弟益恭以愛待宗族和而有禮接鄉黨義而有恩晚年大新居第廣田園課僮奴治稼穡其中嘗自喜曰吾為太平幸民得享夫耕稼之樂者皆上賜也因以耕樂自號賓客過從則欵洽終日杯酒相對歡如也遣惟珍受學邑庠誨之曰大學一書治已治人之道備矣爾能服膺不忘則庶幾不忝其世公諱塢字仕勉卒于永樂辛卯十一月二十日距其生元至正辛巳之歲享年七十一娶髙氏子二人長即惟珍服公之教有名位於時次曰鼎珍亦能世其家女三人劉孟良曠緝徵劉宣光其壻也孫六人女五人公之葬以卒之月闕日其墓在闕之原於乎自郕國至於今其傳世逺矣其變故亦多矣曾氏子孫雖散處而能久且盛者豈非道德之懿足以昌其世邪故公能再立於覆敗之餘而又有子以浸大其家雖顯揚光寵遽未能及安知其不終享也哉故表其墓以俟楊處士墓表山陽有篤行之士曰楊公從義以永樂庚子九月十七日卒于家年七十二其孤文行忠敔斆奉葬郡城西北鉢池山之原既二十年矣今年敔來北京以浙江布政使孫士英所述行狀請於豫曰先人之葬既有銘以納諸墓惟其平生厚於仁振患難周困窮甚於為已常語諸孤曰仁者愛人若視其危殆而不恤此孟子所謂無惻隱之心非人也吾所以施之不吝者推是心焉耳敔兄弟熟於耳而著於心今奉承遺訓捐廩以賑飢豈敢徼惠於朝廷而乃䝉寵褒之命實先人之德教然也敢請文表於墓上使人知今之䝉幸蓋有自豫在翰林嘗聞山陽楊熙傑能出穀以濟貧人上嘉之遣使持敕旌之為義民勞以羊酒豫固善之熙傑忠字也又觀士人石宇所為楊熙武墓志銘云熙武嘗以吳郡朱璣質直多聞與之友館於家璣死為具殯殮又周給其妻孥庶幾漢范巨卿豫又善之熙武文字熙傑兄也及今聞處士之賢然後知其所以能成厥子者由德有諸其身是宜表之以傳於久逺按狀處士諱宜從義其字也世家山陽之新城大父世昌父繼逺皆不仕母阮氏處士沉毅清介務修身齊家奉親盡孝每事必稟命而後行其父先卒獨養母於兵戈之際未嘗廢子職母病侍湯藥纍日衣不解帶嘗籲天請以身代及卒哀毁踰制葬祭皆盡其道處宗族以禮待鄉黨以和見貧乏者汲汲賑之因其心之自然亦未嘗有德色平居整肅不妄言笑人有不平者皆來質其平至老而操行愈謹自郡守以下皆敬禮之嗚呼豈非篤行之士哉娶薛氏賢而有婦道五子文行皆先卒今存者忠字熙傑敔字熙節斆字熙學女二人皆有歸孫男九人曾孫男一人豫聞仁者天德之首人道之大也君子以仁存心行合乎天而及乎人則天祐之人與之處士之心厚於仁其子之賢而能奉其教篤其施如此豈偶然哉江河之流不窮者其源深也處士既深其源諸子又疏其流其果有已邪楊氏之福能久而盛者蓋自處士始故表其墓以示後人俾善繼之且使凡觀者有所興起云夫人陳氏墓表刑部尚書建昌魏公以其祖母陳夫人行狀授豫曰吾祖母之卒葬里中烏龍觜今四十年䝉天子非常之恩纍贈至夫人誠可謂榮矣惟其德善宜表於墓上以示久逺敢請文於子豫不得辭按狀夫人諱寧字淑靜奉新東山望族元兵部主事陳某之孫某之女也自幼貞靜善女工不妄越户限既長歸魏公庭郁相夫以義事舅姑以禮處姻族以和撫羣下則以恩其治家則勤且儉未嘗以富驕人元季避亂家建昌之溫湯庭郁公或有居室不如舊之歎夫人慰之曰居不在大幸身安足矣益勤於內助家復以興然自奉淡泊而樂於賑施鄰有貧婦老而獨夫人衣食之死則備棺葬焉有以貧鬻兒女者夫人為贖還之鄉族歸德焉平居恂恂寡言而應事接物皆中節綜理嚴密庭戶肅然僮僕非有命不得至中門內嘗戒女婦曰婦人必謹守禮法少有不謹則辱舅姑玷父母貽笑後世又曰事夫當助其為善而沮其為不善庶可無後憂又曰婦人好畜私財此分門割戶之端也不可以不戒夫人言行之可法者如此初尚書自河南入為刑部侍郎䝉追贈淑人及為尚書加贈夫人命書具在足以昭其德矣其生以元天歷戊辰四月初七日國朝洪武戊寅十一月初一日其卒之日也享年七十一子三人伯泰伯永伯顒孫男七人長曰源即尚書次溥濟文忠文華文義文熙豫觀自古諸侯卿大夫所以興其國家而昌其子孫者雖本諸其身而亦有女德之助焉二南之詩可見已夫人之德亦何愧於是宜其子孫之賢有若尚書之獲乎上而成其親豈不盛哉用是可以表著於後世而勸天下之為女婦者故次第書之而使刻諸石庶吉士王欽正墓表正統三年六月十三日翰林庶吉士王鑑欽正以疾卒于京師士大夫皆哀痛之妻周氏携三子琮珙珣奉柩歸葬於吉水少師西昌楊公憐而為之銘而其友中書舍人龍文等又求豫文將以表諸墓豫諾之而病未能作也然痛念之不忘欽正吉水金塘人曾大父所安大父子完父嘉績皆不仕然世忠厚秉禮義欽正淳謹好學嘗從劉子欽先生受書經奮勵不懈選為邑庠弟子員宣德壬子江西鄉試第一明年㑹試禮部中校官選宣宗皇帝命擇其優者錫之冠帶俾食教官祿讀書于國子監翰林每三月一試品第而奬勵之務底于成欽正必在甲乙之數丙辰遂取進士為第二甲第一人上方稽古右文命選進士最優者以為翰林庶吉士俾讀書文淵閣學古為文章期至于古人而後已大官供膳月賜膏油費俸祿輿𨽻居室皆命所司給之欽正感上恩益自淬礪早夜孜孜以圖報其文學日進朋輩罕有及者且言動必循於理未嘗有過差元老大臣及諸縉紳先生莫不愛重之以為足以稱上意蓋駸駸顯矣而遽以疾終嗚呼可惜也豫嘗自謂欽正之先積德纍善始發於欽正豈不欲亢其宗欽正躬孝友之行亦思有以顯其父母而國家之成賢才將以資用於他日今皆不遂焉此豈獨為欽正惜哉語曰天道佑善欽正宜得佑於天而反若此豈將大發於其後邪是未可知也故寫豫哀惜之意俾揭於墓上亦因以慰其存亡者耳曾質中墓表質中曾氏名輅質中其字也世家泰和栁溪以醫名家大父以實父存禮皆忠厚樂易而深於其道質中盡傳家學其德又似之且篤孝弟執謙恭嘗從鄉先生蕭尚仁受書經舉為學官弟子以親辭又舉善醫徵詣太醫院亦以親老無侍子得免歸其事親極孝愛惋愈承順二親歡樂焉且以儒學教鄉里子弟于時邑之老醫宿學凋謝已盡能繼者惟質中一二輩於是縣人有疾皆奔走其門質中不避寒暑風雨赴之性嗜飲有急不暇坐惟立進一二杯即他往視疾自朝至夕未嘗有厭倦意經其診視豫藥無不愈報與否不計也其不能報者再有求應之如初不少吝以是人無賢愚少長皆服其仁初給事中章某巡撫自贑來患瘴癘疾甚精神煩亂發狂言若有所見衆醫走避質中曰吾知之矣投以藥一飲而定三飲而遂愈江西黃僉事巡歷至泰和患傷寒寒熱交作質中投藥一服而安與藥金辭不受黃君感其意曰是必有後進其子良於邑庠里中楊氏子病危篤衆醫失措父母懼甚請質中質中視之曰我任之毋自苦與之藥若以水沃火頓覺蘇更十餘服遂愈楊氏以再生之德歸焉道士黃仲真有疾日就殆自分必死戒其徒治後事衆醫無可奈何質中取藥視之曰藥良是為沉吟久之加減三四物與之服疾為減不二日遂失此苦更無藥調理旬日而復故其門人福建按察僉事廖謨述其行事云三四十年間邑中䝉活者以數百計殆信然矣憶初質中授徒里中時豫同廖謨尊府潜仲先生遊縣庠皆與質中交最厚間相從為樂或有一味之甘輒縱飲否則與質中自舉罾取魚以歸存禮先生迎門笑語邀客坐樓上傾榼而飲之賓主各醉而後罷其後豫官京師久之乃一歸存禮先生已老而父子交情彌篤豫與先生為壽藏銘後數歲又表其墓豫固悲其不可得而幸有質中在孰知去十餘年而質中亦已矣嗚呼其又可再得邪邑之人倘有疾苦其何所告語而求活邪則豫之所悲者非一人之私也質中生洪武丙辰二月初九日卒於宣德乙卯十二月十八日享年六十葬龍洲上龍門院前娶任氏有子三人良隱祥良以壽張訓導歸服喪既除來北京相與論舊事不勝悲而請豫文表其墓嗚呼豫尚忍為文邪然質中之德不可以泯也故表諸其墓僉事郭君墓表泰和北門郭氏初徙自臨湘世服儒業洪武中慶守先生慱學淳行有名位於時先生無子以其兄慶宗子彥常為後彥常倜儻有才略未仕而卒此君之祖與父也君諱統字公緒自幼喜學彥常甫篤意教之遣從蕭尚仁先生受書經英敏絶出同輩多推讓焉選為學官弟子後二年豫與為同列君少豫一歲而最厚豫朝夕相與講學不厭縣大夫每試諸生君常在甲乙之選因益自喜志彌厲其詞氣之髙豫不能及也永樂甲申豫竊第官京師未幾君亦領薦書而以憂去壬辰遂取進士時太宗皇帝慎刑獄命進士皆理刑君在都察院最以清謹得名擢拜陜西按察僉事改浙江廣西貴州皆能舉其職浙江雖內地而外臨大海陜西廣西貴州地皆與夷獠接多列兵戍守為吏卒者文武愚良粗細不同必賴憲臣廉察而整齊之乃能守禮畏法以保境息民然非明潔公平之君子則不能服其心君之才氣足以有為而其身則常置於禮法之內故凡所至強者以戢弱者以立法度張功業著當時論憲臣之賢者必稱君正統二年在貴州得風疾言動皆廢子珦往迎歸就醫藥不能愈三年十月二十八日卒于家年五十九娶胡氏繼呂氏子六人琪珦琰珩瑜琛孫一曰㸃其葬以四年正月初五日其墓在縣東北龍門山岡背之原嗚呼豫與君相好四十餘年志同道合而君之賢真足以任大事成偉功豫之期君者不止此乃今已矣豈非可惜哉雖然君年及六十官五品受方面之寄其所樹立表表在人耳目可以無憾惟知君之賢而惜其遽止若豫者不能無憾也故書君平生大概以授珦使表諸墓上亦因以塞豫之哀思焉耳主事王公墓表公王氏諱實字好信吉水富溪人曾祖德翁祖逺林父仲泰皆不仕仲泰君娶許氏生四子公第二子也天性淳謹無外慕事父母極敬愛始終無違禮於諸兄弟尤篤兄好學父子三人客死武寧不能歸公歸葬其骨而贍其家叔父思輯商于外子幼公命僕為之耕以給之比歸乃已其於宗族雖疏戚不同皆和而有恩待賓客故人雖豐儉不同而莫不中節處鄉黨鄰里一以仁值水旱歲飢必盡發所有以貸之貸而不能償者焚其劵鄉人袁時則鬻地於公請自耕而納租又私以質錢於髙氏遂逃髙氏掩而有之公不問鄰人王存習誣公弟好古之牛為已牛其姻家為縣吏與丞狎白於丞丞最嚴酷人莫能自明者公謂弟與之勿自陷于非辜丞敗其人愧謝乃歸牛公亷厚不爭有古長者之風多類此自少力學通諸書開門授徒弟子多從之者中歲喜遊嘗踰五嶺涉湖湘歷淮海覽勝而歸既老不復出每自誦曰吾尊德樂道無所慕於世卑室廬菲衣食矻矻然畎畝之間不幾於太古之民是亦朴者之為也因自號朴叟作世德堂教諸孫使毋忘先德子佐取進士為刑部主事有勞績朝廷封公為承德郎刑部主事公居寵思畏所以訓佐者惓惓於忠敬仁義他不之及也正統五年正月不豫且三日謝醫却藥曰吾何疾殆命也夫忽取水盥濯更衣端坐而逝是月二十五日也年七十二娶羅氏有賢行子一人即佐女一人嫁同邑劉庭茂孫男五其葬以闕年闕月闕日其墓在闕之原富溪之王蓋出羲之其六世孫洪守南康子孫因家雩都木瓜園八世至朝散大夫允章子文庭始居吉水之盧兜文庭仕唐為御史大夫十七世至槐軒府君乃徙富溪德翁其子也在元以髙年再受帛而逺林最有德於人亂世人爭衛之以免禍仲泰在洪武中嘗舉賢良不肯就蓋世積德誼而公繼之又施及子孫使日篤不忘王氏之福將不由公而益大矣乎故表著之使刻于墓石以俟郭處士墓表處士諱恢字景𢎞姓郭氏萬安東湖里人也東湖之郭始自邑之符竹而分在元有諱載者以詩經取進士大有聲於時處士曾祖懋德祖彥皋父孟暘皆不仕處士生而俊爽聰敏過人年十二能暗誦大誥三編就試禮部受賞而歸既長益讀書能通其大義然是時家事亦滋出不克大如其志篤於事親朝夕敬奉無違禮其奉宗祀尤極其誠與兄弟處盡恭愛之道同爨而食未嘗蓄私財內外千指相與無間言一門和氣藹如也性惇厚質直言行必循乎理好善嫉惡出於自然家雖豐而自奉儉薄樂以餘財振人急鄉邑士大夫禮之惟恐不至而士大夫亦無不敬愛處士者有子三人延明師教之常諭之曰讀書立身之本惟勤然後有成若慢戲佚游未有能自立者汝曹勉之既又遣其長子邦本游邑庠厚資之使學宣德己酉遂領鄉薦後四年㑹試禮部得納溪訓導君子謂處士能教子矣宣德甲寅三月十一日以疾終于家年五十娶蕭氏有男三人長即邦本次邦固早卒又次邦榮女二人尚幼處士之卒也權殯于其閭之左至是葬于闕之原而以前澧州太守鄒進所為狀來請文表其墓豫觀先王之所以教人者曰孝友睦姻任恤人而能此可無愧於為人矣然世有不能者而其子孫反務為竒詭以欺世盜名君子不取也今處士之行蓋無愧先王之教是可以表見於後世矣知縣俞公墓表宣德十年十一月三十日潜山知縣臨安俞公以疾卒于官年六十潜山之人哀思之如父母嗣子般等奉柩歸臨安以正統元年十一月十日葬于縣之靈鳳莊上山之原葬已般來北京泣請於豫曰先人與先生同年取進士又嘗同考京闈鄉試自謂受知於先生今既不幸已葬矣惟墓上之石當有文以昭德垂後非先生莫宜為先生哀而賜之言俾託以不朽為幸大矣豫既悲公之亡而重哀般之志奚可辭公諱益字友謙别號鈍菴其先本河間人以宋外戚從髙宗南渡始家杭之臨安集賢里公天性孝友八歲喪其母日夜哀慕不置父筠軒最鍾愛然教之必謹於禮義既長遣受業邑庠通春秋遂取永樂甲申進士選為翰林庶吉士預修永樂大典書成授靖安知縣靖安南昌屬邑邇藩憲治所公善治其身必循理而遵法務有以惠利其民民德之聲譽日起藩憲知其賢事之難治者多委任之無不治於時事有當言者亦懇懇盡其誠嘗言尊崇制書慶賀禮儀裁革冗吏諸事朝廷從之著之令久之以外艱去服除知潜山其惠民一不異靖安治化既孚乃大新學校以教民民尤德之賓興之歲公屢典文衡號為得士滿九年當去縣民羣告于郡守與御史曰令誠吾父母也今舍我而去當何恃請必留以惠民太守御史言於上得復知潜山民素服公之化於是相安於無事而公乃已矣宜其民之哀思也蓋公亷慎平恕治心修身始終如一故得民如此娶同邑上羅沈氏有婦道二子長􅀈公兄某之子公未有子時以為子次即般女五孫一公平居教子弟必使勤慎清約不侈靡傲放蓋以身為教云豫嘗謂君子之仕必先謹其身能謹其身而行之以公天下豈有難事哉公之美衆矣豫特書其一事之尤可為法者公在靖安時姦黨之獄滋盛凡有名者皆沒入至空其族乃已他邑憸民好以此誣人人亦反以誣之蔓延不已當沒入者殆百家且其俗嚚訟人望風畏之藩憲大臣當往涖亦憚行以委公公曰吾無私所恃者天而已吾何憚即往按其名盡沒入之威刑之中仁厚加焉吏卒皆化於公無毫髮過失畢事而名愈振豫益以信天下之事無難治要在謹其身而公道行焉彼其事僨而身辱者皆私欲之害也公所行如此非仕者之所可法哉况其美衆邪故為書之俾歸鑱諸石御史姚君墓表君姚氏諱善字兼善其先家于干越之姚原五世祖洪仕宋理宗朝為戶部尚書四世祖戊徙家番昜之珠湖祖逺升國朝洪武中復徙邑東之後山父漢中皆不仕君幼喜學穎悟出儕輩既長選為邑庠弟子員學成貢入太學隆師取友勤勵不懈四明陳先生時為司業特器重之六館之士亦多讓其賢宣德癸丑擢拜山東道監察御史敬恭夙夜以修其職凡諸讞議及有所糾舉皆必當其情嘗奉命巡按直𨽻及廣西寬而不縱嚴而不殘吏畏而民愛之宣宗皇帝嘗欲新天下之治分遣大臣察諸吏賢否命必與御史偕兵部侍郎徐公當南直𨽻與君偕君嘗歷諸郡縣備知吏治得失與其行之邪正才之髙下其言大契於徐公凡去留最稱允徐邳以上至濟寧漕河淺澀公私舟楫皆不便以委君君往來計度疏治人賴以濟異時舟上下諸閘有力者爭推挽勢悍甚善柔被捶擊至旬餘不得度君下令必循次以進母敢譁人甚便之多頌之者朝廷嘉其績賜之敕命且以所居官贈其父母邱氏妻某氏皆封孺人當時以為榮而君子尚以逺大期之正統辛酉二月二十六日以疾卒年六十四臨終歎曰天乎吾受上恩不能報而又先吾母以卒吾豈能無遺憾聞者悲其言子四人驥􅍡驛騏􅍡在京師奉柩歸葬于其鄉闕之原介其親戚胡秉常來請豫文表諸墓豫嘗聞君而恨未之識於今固已哀之况聞其母年九十四尚無恙念其既老而孤則其哀有已耶然古之孝者貴能立身行道以顯其親雖養之不終是固有命也若徒能養而習於不善足以貽親羞雖使久生於世亦奚足道哉觀君所立如是則為母者可無悲而君亦可以無憾矣用此以表其墓庶幾少慰夫存亡者耳員外郎謝君墓表正統六年五月二十三日奉訓大夫兵部武庫員外郎謝君以疾卒于官年五十九子琳奉柩歸揚州卜以缺年缺月缺日葬于江都縣善應鄉先塋之次謀於衆曰先人之葬既得學士藺公述其行髙公銘其墓矣若又刻表于墓石豈不益彰徹顯著而永永不朽衆皆曰然乃因郎中曾公士宏請於豫豫不得辭為取藺髙二公之說益以豫所見者而論著之君諱涇字彥清其先世本溧陽史氏曾大父純始徙居江都元季兵亂家覆子恭幼稚無所依里中謝萬六者養為子謝無後因從姓謝氏恭生起皆不仕而皆為善人則君之大父父也君幼有至性得果實之屬不敢嘗必先以奉父母稍長尤聰敏喜學為郡庠弟子員永樂乙酉領鄉薦明年中副榜選入四譯館習譯書戊戌取進士為翰林庶吉士遭外艱去治喪能盡禮母嘗得危疾刲股肉作湯進之疾遂瘳其後母以髙壽終葬祭亦如禮而哀戚加焉伯父寧卒無子君服喪主其後事宣德二年授行人奉使于四方未嘗辱命所過必詢訪民情吏治有當者必以聞詔諭安南及其境迓者至陳兵導從頗不肅君呼其長立庭下責之曰我奉天子命以寵綏一方使各有寧宇下之事上當敬恭朝夕爾何敢不肅尚不知有天討邪衆皆拜伏莫敢譁詰旦至富良江國主率其下迎導甚恭既就館敬禮尤厚君初過龍州憑祥其人有訴安南為冦害者君從容為言且喻以逆順禍福國主愧謝即遣人戒邊吏謹約束使還厚以金帛奉君君拒不受既歸而有武庫之拜武庫號繁劇凡兵部文符下四方皆從武庫君居其間未嘗有過舉上嘉之追封其父為武庫員外郎母董氏贈宜人皆賜之誥命又嘗再往荆湘兩浙選材武士撫諸夷獠能敷上德盡下情事舉而名益振士大夫皆以逺大期之初娶李氏先卒再娶陳氏皆有婦道皆封贈為宜人子男一即琳也孫男女各一人憶永樂初見君被選入翰林天子方嚮意文事所以期待成就者甚至君亦意氣英發慨然思有以自見蓋在翰林草年始去為行人為郎官以其才行之美而究其所至豈止於斯而已哉而乃止於斯非命也夫然其所至如此是可謂能賢况又有子汲汲焉以圖其不朽亦可謂能孝用此足以垂美於後世矣故表諸其墓處士劉公墓表公劉氏名璜字伯堅漢中山王之裔五代時有諱仁晦者纍官至金紫光祿大夫家淮南子翊仕宋為祕書省校書郎出守鄞因家慈溪故今為慈溪人公之大父文鶚父侃皆樂善而不仕公生有至性五歲喪父哀慕如成人又喪其母陳氏哀益甚閭里皆稱其孝比長勵志學問窮日夜不休學遂有成間發為詩歌以娛情寫物率清婉有思致前輩皆推重之然尤以謹厚延譽於鄉邑嘗為里中長里人有坐事連逮勢叵測懼以誣受禍不能自明計惟公言可信於縣官願納女以請公曰爾毋自苦法雖嚴終不及非辜我豈乘人急而利人女子者公雖拒之然隂為申雪卒得免內兄孫某被纍當輸作京師公念其無助曰恤患義也與皆行未幾孫卒公為歸其喪公兄玘為杞令卒二子杭棻皆幼公教育之如已子棻遂取進士為御史為按察副使有名慈溪縣學弊縣令長沙張志善規治之而以事去詢于衆以屬公逾年而學成無絲毫闕失平生行義多類此縣令丞每欲薦之自念早失父母不得養不忍棄祀事而去每力辭以免晚益恬退治軒曰養素與文士倘佯其中人稱為養素先生娶同邑陳氏台州教諭陳某之子有婦道子男三人長梁永樂庚子貢士次渠次栴閩清教諭孫男六人女六人栴迎公就養閩清宣德己酉十一月二日以疾卒于閩清之學舍距其生甲辰四月一日享年六十六栴奉柩歸以明年庚戌十月五日葬于其鄉之上午嶴五世祖朝請大夫厚南墓側配陳氏祔焉至是栴以廣宗教諭秩滿來京師得邵武教授以公行狀謁豫曰先人歸葬久矣而墓上之石未有文敢以請豫觀公之德既孝於親又篤念其兄撫其孤姪使有立免人之禍而不失其正周人之死而必踐其義且能修學校為縣官之所不及為至其死也又以不用浮屠教其子可謂始終不悖於道者其行如此是宜表著於後世故序其說而使劖諸石羅教授墓表先生羅氏諱仁字汝寬吉水桃林里人曾祖仲哲元鄉貢進士祖時中父養䝉皆贈通議大夫工部右侍郎先生自幼聰敏嗜學與兄工部侍郎汝敬皆授業於家通書經然於諸書亦無不讀攻為文章喜吟詩操筆立就其才思涌溢奔放逈出儕輩上弱冠已能為人師久之學益進名益顯武昌新喻二學皆請為訓導用親老辭永樂己丑臨江府學又薦之始以父命行既受職嚴師弟子之禮於夫所以修已治人者之言蓋惓惓然未幾以外艱去居喪盡禮服除改邵武又以其教臨江者教諸生學圮於水先生奏言府學費巨非一縣所能為請均之諸縣從之學遂以成秩滿績最升常熟教諭其為教益力修琴川志以備考覽歲丙午廣東鄉試請典文衡其去取必公常熟學舍久弊乃捐資為倡殿堂門廡皆修治煥然華好滿九年又績最升溫州教授始至即以十事告郡侯申明教條以作興士類時已有疾飲藥猶日坐堂上進諸生講聖賢之道而疾益甚一日晨興謂其子恆曰吾大期至矣然自顧無所恨汝曹勉之勿墜先業治喪用家禮足矣復召諸生與訣别翛然而逝正統丙辰十二月癸酉也年六十二平生事親孝奉先敬於宗族義而慈於鄉黨鄰里和而惠其撫孤恤貧周人之急不可一二計其所為詩文曰在泮集者若干卷藏于家娶同邑劉氏有婦道又娶周氏子七人文惠類恆載嗣俊女二嫁某某孫男八人恆奉柩歸與諸兄弟以己未十二月初十日葬于其里之殊坑少保永嘉黃公銘其墓矣又來北京請豫文表諸墓上羅氏故儒家代有聞人豫與工部同年取進士又同官翰林因得拜其尊府君既而又得與先生遊父子兄弟皆豫所敬禮者其尊府既以德行重鄉邑而工部之才望滿朝廷功業滿邊隅先生又表然為名師所以成賢才禆政治者蓋不少今皆不可作矣則豫之哀思可已邪文兄弟致孝於親切切焉圖其不朽而以屬於豫故備書之豈徒以見先生之賢有所本亦使世之為父子兄弟者觀之或有所興起云屈氏二親墓表正統己未十二月二日刑科給事中屈公以疾卒于家年六十九其配夏孺人哭之過哀戒諸子曰我未亡人也義必與汝父同穴姑緩葬以俟我明年庚申九月十八日孺人亦卒年七十一時子伸為貴州按察僉事聞父之喪即棄官歸中道又聞母訃哀慟摧裂幾不能生既歸襄事貴州文武諸司交奏乞留而奪情起復之命下不敢少延以盡其禮乃卜里中小雷洲南原祖墳之左治葬地且自為志以葬事屬諸弟而銜哀就道遵上命也是歲閏十二月草二日乃奉二柩合葬焉今年伸以事來京師介其親戚胡秉常奉二親之行狀謁豫請曰伸於二親生不得致養病不得調湯藥死又不得躬斂含奉葬祭其痛何如之惟墓前之石宜有文以昭德垂後若於今弗圖恐久遂沉泯而不孝之罪大矣敢以為請豫哀其志故不辭按狀屈氏之先咸陽人至宋南渡有曰栗者為倅于饒始家鄱陽世為衣冠之族公髙祖殷仕元為信州路總管府知事曾祖清卿信州文學祖齊民元末倡義保一鄉父宗文母孫氏公其第三子也諱理字公道自幼天資髙爽勤學問研究經史既冠父母以家政付之公殫心劬力理田園治生産家日益裕事親極其孝敬左右順承無違禮飲食之珍衣服之美不先以奉親不敢用其所嬴財必以告於親而歸諸藏未嘗私一毫親沒治喪一依朱子家禮事二兄尤篤隆然恭愛之施著家規草餘條以整齊其家奉祭祀教子孫撫下人悉有法度門內凡千餘指皆服公之化無彼此言者郡太守寧善縣令任勉嘉其孝弟欲薦之公以親辭乃遣子伸入鄉校學成取進士拜刑科給事中敬恭夙夜以克有成績朝廷嘉之推本於父母封公為刑科給事中配夏氏封孺人夏氏亦鄱陽人世貴顯元江州鹽運司經歷元卿宣徽院判官亨父國初江浙行中書省椽仲臣則其曾大父大父也母王氏生孺人為中女諱玖貞實有容德父母愛之擇壻於屈氏得公遂歸焉孝以事舅姑禮以睦娣姒凡公之慎終追逺惇本厚族與夫賓客之往來公私之酬酢親疏貴賤輕重厚薄無不適其宜者孺人之助也其於諸子諸婦未嘗厲聲色從容化誨使皆入於善及以子貴受封秩偕顯榮人既推給事公之教而尤重孺人之賢子男六長即伸次惠儀康驥年女一嫁徐箎孫男十五人曾孫男二人惟屈夏居鄱陽以名閥相髙先世德誼足以啓迪其後人觀公與孺人之善所以形於內外者可知矣嘗聞伸初為刑科公訓之曰爾居清要當清爾心上以報朝廷下以慰吾意則吾樂矣及僉憲貴州公教以柔逺之道當以土俗順人情而以禮義擾馴之則無不治伸服膺不忘是以當世稱賢焉伸之所立即公之所存也夫君子之教子必以道道行而人宜之則必有以獲乎天公之與孺人享其福祿榮名而善始令終非天其孰能使之用是可以勸夫天下後世之為人親者矣故表而出之俾刻於石定安令吳君墓表定安令吳君實以宣德三年七月二十二日終于家其子忠以是年十二月二十日奉葬于其鄉陳橋之森山服除來京師奉君之行狀謁豫告曰先人之葬湖廣參政吳公存實銘之惟墓前之石未有文敢以請蓋豫先考嘗知瓊州定安其屬邑而君為令故豫嘗與之接忠以是來請於豫然豫惡能知君之悉哉按狀吳氏居南昌石馬為著姓蓋宋開府玠之後然不知所以徙而君之大父德茂父永安皆不仕至君以推擇從事藩省能謹飭自持既滿升永嘉典史又調泉之灌陽松江之上海皆以善贊畫得名而上海最劇其名尤盛久之松江府同知呂敏以君屈在下僚上章薦之於是有定安之命定安在南海中與生黎接前之為令者多不善故民多逃徙生黎亦數出為盜君至亦以誠待之均其徭賦省其刑罰繩其豪橫而佑其善柔凡前政之不便者皆罷去而行其便民者民大化服逋逃自歸者三百五十餘戶生黎順從願為編戶者一千一百三十四君擾而馴之俾皆樂善作興學校毁撤淫祠孜孜以禮義為教治績大著縣以無事日彈琴賦詩以自娛九載考績赴吏部民皆不忍其去耆老七十人詣京師乞留朝廷從之又三年乃以外艱歸既免喪謁選吏部得風疾告歸治于家而竟不起距其生丙午九月初五日得年六十三娶袁氏有二子長曰綱早卒次即忠為京山縣學訓導女一人嫁徐用文繼萬氏生五女皆幼嗚呼縣令民之父母也必有至誠惻怛之心以行慈良豈弟之政然後民受其惠彼厲威嚴任智術務姑息肆貪穢民之失所或陷於不善皆此之由也故西漢以來重循吏觀吳君之政如此蓋可以無愧矣國家務養民詔書數下擇守令安得如君者布滿天下諸邑哉豫是以惜之特論著其事以表于墓上孺人曾氏墓表上海教諭致仕尹先生之配孺人曾氏泰和城西檀樹巷之故家曾祖叔仁祖賢可父自誠皆不仕孺人孝敬儉勤柔惠淑慎既歸尹氏不及事舅姑而於奉祭祀必盡誠推於夫之黨蓋無不禮焉元末大饑人恟恟不自保孺人躬啜薄粥而具飯以食長者如平時喪亂既寧先生歲授徒于外孺人理家政躬操井臼夜則焫松明治女事均視骨肉一味之甘必周家園果核亦均給有餘則以惠姻戚鄰里不茍易一錢致禮於其子之師及親賓往來待之皆中儀法撫下人尤有恩非但衣食以時至於蚊蚋亦給與帷帳用人之力雖暫必酬嘗治絹欲嫁其女㑹族人謀娶婦而貧無聘幣即輟以與之其他賙窮恤匱尤多先生質直好義親戚有託以避難及諸生貧而願學者輒館穀之孺人能相其志先生或責人以義至使之無所容既退孺人則以忠告善道為勸先生為少逭故終無所忤於世其賢如此生元至正辛巳七月十五日而以今永樂壬寅八月二十一日卒年八十二二子長復道由南雄訓導三遷得京山教諭以卒次自道今為太平府同知四女適交州衛經歷蕭信立順德教授郭彥鉉曾伯和歐陽允仁孫男九長倚為三河訓導亦卒次任何儼儉侃保偉修曾孫男六人孺人之葬在其鄉紫芋東山之陽葬十四年自道來北京告豫曰憬以父命為伯父後故於母之卒不得躬服喪若又不能顯揚其德則不孝之罪益大矣先生幸見憐願為表諸其墓豫謂先王之教必始於閨門蓋女德之所系重也至論其職之常不越乎養舅姑相夫子治衣服飲食助賓祭諧戚姻而已考於二南所載可見矣後世教道不明為女子者往往任其才之所至而罕見其德之修家之不振子孫之不能皆賢蓋此之由也若孺人之德既備而又盡其職之常宜乎昌大其家而福及其子孫其賢如此有不可表邪故托實以表于墓使凡為女婦者取則焉同知尹君墓表尹氏於泰和為儒家蓋宋進士絳之後代有聞人至上海教諭子厚先生尤以質直好義為學者師先生娶曾氏生二子其次則君也自幼端重不與羣兒戲而聰敏喜學夙夜不懈諸公長者皆愛之先生初為邑庠訓導君日侍左右見諸生雍容揖讓心切慕焉諸生亦喜得君為友遂援君入邑庠讀書作文每屈其儕輩業成充貢入太學未幾太宗皇帝詔修五經四書大全徴天下名儒又擇太學師生之賢者入館閣任其事君與焉書成受賞賚擢拜雲南澄江府同知澄江去京師萬里夷性獷悍號難治君蕩佚簡易一以至誠待之夷大化服名著雲南黔國沐公總兵鎮雲南凡諸夷有爭訟多委君往決之夷亦熟君名知君平恕莫不聽命諸府官有闕公每命君權署君不以權署有所茍必為民興利去害故人皆悅其來而唯恐其去澄江之人則以不得專惠於已為戚也滿九年以績最加食四品祿俾同知徽州代還改太平其為守者執偏見好以嚴馭下君從容贊襄必使事集而人不怨於農桑學校尤加意所至勸勵有方人樂為之盡舉賢才表貞節歲凶則發廩以賑民民或有獄必反復究其實不使陷于非辜在太平六年太平之人服其化惜其位不稱德至欲請于朝朝之顯者亦多知君數欲薦進之局於例不果君獨恬然自得曰是亦足以為政矣他何暇計哉正統五年二月六日以疾卒年六十一平生質直好義蓋與上海先生同凡先生興水利置義田義倉以濟衆皆能相其志篤於祀先燕器或不備必先治祭器積俸入之餘買田以供祀事先塋恐歲久蕪沒皆立石識之內外屬有貧者無不賙焉兄京山教諭復道與其姪三河訓導倚相繼先卒君撫愛其所生如已之子若孫娶康氏生五男子任侃份偉修三女子嫁歐陽浩白彥章鄭仲廉孫男四人經繼紹綝曾孫男一人任兄弟以缺年缺月缺日奉君柩葬于闕之原思表其德以傳於後世書來北京請豫文刻石豫縻於職務不暇作則又因君之妻姪石阡推官頮來速文曰非公之言無以託不朽願勿辭於乎豫與君相好最久實相知君一出而躋正五品位大夫其才行又有如前所云者然二十年不改官其不如君者反過之或有未然則奔走號籲以求售君獨素位而行未嘗有慕外之心豈非安於義命之君子哉君子民之表也學者所當視效也故為書之使表諸墓上抑菴文後集卷二十五
