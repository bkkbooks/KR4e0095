body:
  text: 抑菴文後集卷二十九銘禮部侍郎陳公墓志銘陳氏之先汴梁人宋建炎間有諱譽者為嶺南清海軍節度使終于官子晏蔭東莞令因家邑之延福鄉由是為東莞人公高祖祖舜曽祖誠子祖用廣父宗彛皆不仕宗彛娶翟氏生四子公其長也自幼聰敏喜學從邑庠訓導黃先生受書經學成領鄉薦會試不偶入太學選為桂林府學教授嚴條約以身先之時有詔武臣子弟皆受學公日進諸生講聖賢之道所謂忠孝仁義之説必使身體而力行之諸生雖文武不同莫不皆有所得都督韓觀總兵鎮廣西猛悍不下士聞公之教心恱誠服每以儒師加禮焉秩滿升國子助教永樂初近臣言公有治才不宜置之散地詔試在優等擢知許州始至人以儒者易之公少有警發衆為悚懼乃更以寬厚寧民未幾代還改滁州均徭役時征斂禁姦戢暴民用大和太宗皇帝巡幸北京所過先遣廷臣察吏治問民隱治有異效者加升擢焉衆皆言公績最滁人恐失之詣闕乞留遂升揚州知府掌滁州事賜綺衣一襲鈔五百貫禮部宴餞給驛遣還在滁又九年升四川按察使四川去京逺民不畏法豪吏黠胥姦弊百出公至一治以法不少貸軍中暴橫有號彪虎太嵗者人莫敢犯犯輒受竒禍公亷得實為設方略密遣人捕之皆置之重典而人以寧乃建言修武備慎刑罰眀禮制復義倉正風俗等九事上嘉納之召還改南京通政使掌國子監事公既樂於教諸生亦樂於學而以內艱去服除復為南京通政使出納命令罔不眀允上喜其盡職賜之誥命以示褒而曽大父大父父皆贈通政使妣與妻皆淑人正統初升調南京禮部左侍郎於稽古禮文之事尤拳拳不少懈又五年以年踰七十乞致事上許焉公德行淳懿文辭典重人愛之若拱璧其所進於上有巡狩頌平夷頌鐃歌鼓吹天下傳誦之搢紳士大夫求碑銘序記詩賦諸作以發德述懷娛情寫物者足相躡於門公應之如響故所作最多今傳者有琴軒集歸田藁若干卷尤好著書凡所臨郡邑必采其山川人事風俗物産所以供賦稅之正而適上下之宜者為書以傳若頴川永陽羅浮成都等志皆具存其識鑒精眀取舍不妄賓興之嵗公必在主司之列而收得人之譽及致仕而歸鄉之學者有所請益郡縣守令政有未逹者得咨度於公黃蕭養作亂其所以制禦綏靖卒保無恙者公之策為多公生於洪武庚戌五月初七日而以景泰甲戌十月十六日終享年八十五配淑人袁氏有婦道先卒葬縣南三十里竹溪之原又娶侯氏子男二亦先卒女四孫男二將以年月日奉公之柩與淑人合葬焉墓宜有銘鎧以公之友左副都御史致仕羅公亨信所為行狀來請豫嘗託交於公知公文行政事之善且與羅公同年又知其言足以取信于後世誼不可辭乃為序次而銘之銘曰東莞陳宗來自汴梁武德桓桓奠此一方傳至于公益篤文藝奮迹泮宮遂領民事今之太守乃古諸侯千里滁陽賦政優優繼登外臺克謹邦憲政肅刑清俗為之變典教成均學者有師執事之樞出納具宜維少春官禮樂是輔帝實用公公乃求去白髮蒼顔老于故鄉賢哉二疏千古相望山川出雲雨彼黍稷功成來歸孰知其力公今逝矣與汗漫期有美在人百世之思王思賢墓志銘泰和南富處士王公思賢以洪武壬午七月一日卒年七十七其子若孫奉葬於其鄉賽口山既又以地不吉也乃以永樂二年缺月缺曰改葬其鄉之甘溪葬十八年而未有銘其墓者其子守訓大懼無以昭德示永久使子維以鄉先生歐陽永清所為狀來求銘按王氏其先自廬陵何山徙居安城之連嶺後有諱扆者始為泰和人其曰興祖廷圭功迪者則公之曾祖祖父也雖皆不仕而皆以詩禮世其家公少而能學長而有為事親治家必盡其道平居孝謹恭儉不妄言笑家故饒財然不以自纍洪武初核民田人有以不實誣公官沒入其資衆皆謂公宜如何公處之泰然未嘗怨誣者於是其父老矣而公之所以奉養不異於盛時官私百需皆自公出上下給足而家復以興蓋其素所服行者有以致然矣性方潔和易口不言人過而樂教其所不及待其子弟則甚嚴不肯一縱之於不善之地凡言事必據於理與人交終始如一不以勢利為親疏素不嗜酒然未嘗以已律人長筵廣座公居上必從容笑樂使飲者各盡其歡嘗曰醒醉各有趣夫何異因自號獨醒老人前翰林學士解公為之傳南富去縣西十五里其地多大家而如公者無幾人故鄉人子弟服公之德有失其平者得一言無不意滿而去初娶羅氏再娶蕭氏子男五人守一守約先公卒守敬守行後公卒今存者守訓公第二子也女一人孫男八人維今貢為太學生經太康縣學教諭曽孫男闕公卒之日遺言其子必以詩禮教人而以勤儉裕其家於乎賢哉豫雖不識公然觀公之子孫服公之訓而知公之德則惡可不銘乃為序而銘之銘曰王自廬陵徙于安成再遷泰和其家以興公德之茂不失其恆雖未顯榮有蔚厥聲衣冠儼然雍容降升皆醉者人惟已獨醒甘溪之原和氣所凝子子孫孫百世其承歐陽公觀民墓志銘泰和蜀江歐陽氏始自萬安常溪而分蓋唐吉州刺史琮之後元國學録德高德高生孚先孚先生以定則公之曽大父大父父也公諱琳字觀民嘗以父命為伯父以信後自少疏通有幹局所遇無難事官私諸務公皆任之不以煩父兄元季盜起鄉民有欲為應者公捕送之官且欲舉義以保鄉里而賊勢日甚不可支乃奉親出避艱難之際極力營養務慰恱其心親殁殯葬無違禮國朝定江西吉安內附始克有寧宇大將常遇春取贑州令泰和諸縣以民丁從擇公領之軍中指顧皆如令主者愛其才師還欲挾如京師用之公懇求歸田里始誅蓬藋治耕稼然官府初立法制未定征賦以田為凖公兄俊民素不任事事至無奈何悉以田歸公曰吾無用此也公為治辦而復歸其田承平日久合族而居長幼殆數百人公與叔以忠兄性民性翁俊民四公者為鄉族儀表隆然敬愛之施公嘗舉祖宗德義之實以教諸子姪延明師於家孰訓切之務趾美前人其後纍纍以經學顯者公端莊厚重惇夲尚質家雖豐而自奉儉約待親姻必盡禮而視宗族一以仁從兄逸民早卒公長育其子允恭分資産與之允恭又卒公又撫其子浤濟浤濟又相繼卒公又厚撫其孤間居無事子孫宗族見公者必從容與語勉以孝弟忠信禮義廉恥嘗曰往年鄉邑之豪多怙侈蔑義自謂人莫我何今皆澌盡無復存者惟讀書循理之家猶不失其故則天之佑善可知也且富貴貧賤各有分不可以幸致亦不可以幸免惟當安於義而已其教鄉人子弟亦如之平生未嘗以言忤物以色陵人人或有違負公者公處之無少異衆為公不平欲與校公曰吾求天知而已何暇與彼校得失哉人往往自化服公於經史皆通其大義尤熟于文選及陳夀三國志多能暗誦至議論當時事與人之賢否犂然當於人心凡隂陽醫學山經地志諸書皆所深究遇有善者必手録之至老不倦喜蓄善藥以濟人嘗有贑卒艤舟河下同輩二人病且死莫知所措公往視與之藥留十餘日病可乃令去後以事至贑二人者遇公率其同伍羅拜曰公吾父也嘗活我然公亦不能記憶徒唯唯而已其他賙窮恤匱尤多生於元元統甲戌八月十七日以宣德丁未二月初九日終年九十四是年三月十七日葬縣西郭石獅嶺下公所自卜也公再娶皆南富王氏後娶龍丘曽氏子男五人長允清淶水縣學訓導次允賢國子助教次允仁屢聘為儒官不就次允乾次允和雲南按察副使女六人皆適士族孫男十九人廣湘廣漴廣泳永貢廣哲廣莆廣淶廣浯廣濬廣灤廣澗廣沐廣德廣澧廣灞廣沔廣濠廣洧廣淳廣溆曽孫男闕人時峻珽顯泰勉華瓌光熙效蕳欣祐綱闕玄孫十人直與公之季子允和通婚姻嘗得拜公館下時歐陽氏之長者惟公一人接其詞氣溫然盛德君子也竊謂子賤之賢孔子歸於魯之君子今鄉邑有公在焉後生小子得以瞻望其儀型而興於德義庶幾善類之多也而今已矣其可復得哉公葬已十八年而墓未有銘允乾數以命直直縻於職務未暇也至是廣哲為浙江按察司僉事來京師復以銘為請嗚呼公之德自足以不朽直何以副賢子孫之意哉其尚敢緩耶乃按狀序而銘之銘曰曄曄名宗盛德在公于家于鄉孰比其隆壽考百年公又多子多子多孫公既受祉維老成人衆之所望天不愸遺人胡不傷石獅之岡公所卜吉歸安于兹過者必式夫人蕭氏墓志銘代郭公緒作夫人蕭氏諱夀泰和祿岡處士蕭以吾之子而歸我肇慶太守王公為繼室慈儉順祥以克有其家處士君素富既歸王公又貴顯而夫人樂居田里淡泊自足浣濯之衣菲薄之食處之不厭未嘗矜飾以自大猝然見之不知其貴且富也家雖豐裕未嘗妄費一錢而所以經營綜理者益密蓋忘其身之老也王公初娶歐陽夫人有二子夫人能撫愛之逮事姑李夫人李夫人者公之繼母有德有能當王氏中衰李夫人嶷然自守撫育其後嗣以再造其家鄉里敬服焉夫人事之無違禮其待宗族鄉黨不問疏戚愚良皆有恩意其生以至正戊子五月十九日而以永樂庚子正月二十日終享年七十三夫人有二女長嫁周仲威者早寡次適嚴敬仲其二子長曰信字行敏次曰直字行儉今為翰林侍讀孫男七人女三人其葬以是年十二月某日其墓在祿岡南升仙嶺之麓葬既有日使來求豫銘嗚呼豫文何足以彰夫人之德哉然不可辭也乃序次而銘之銘曰於惟夫人慈順儉勤克有其家而約其身仙嶺之原有崔者墳昭德垂休述此墓文劉宗慶墓志銘永樂十八年庚子二月二十四日前完縣丞劉宗慶卒于河西務時豫在北京與其平生故舊聞之皆傷嗟出涕五月豫以內艱歸過河西務往哭之十一月其姪渙與其子完州等奉喪歸至泰和姪同文來泣告豫曰吾叔不幸以喪歸卜以是月初一日葬縣南門外龍洲上先生嘗辱與處則墓非先生莫宜銘敢以為請嗚呼豫與宗慶相好十五年今雖哀苦不文其忍不銘吾友耶宗慶居泰和縣東祖某父某皆不仕至宗慶乃以邑庠弟子歷試於吏部擢丞完縣方盛年有才局遇事果敢其令與簿皆聽其所為縣有逋租積三年弗完者宗慶首出俸資倡僚吏代輸其他事皆辦集一縣稱治今皇帝以舊藩為北京完縣在畿內于事尤劇宗慶理之無不宜者時方調郡縣出薪炭以給用所與處者皆中官要人其下怙勢干求有弗得即媒孽其間故司出納者多敗去行部以宗慶為能使典其事宗慶洗手奉公夙夜勤慎請託雖不行而亦無所忤既歷三年未嘗有違言者宗慶歸後來者又相繼敗而宗慶之能益顯其後縣人有應從戍者逃去宗慶以其族人代之用事者以為罪乃落職居河西務宗慶處之恬然賓客往來輒置酒相樂終日忘倦曰如是足矣嵗己亥豫以外艱服闋赴北京宗慶聞豫來俟于河上相見甚歡則告豫曰吾近得痰疾氣逆上幾死今再見幸也嗚呼孰知去一年而宗慶竟死矣則知人之處于世者其可自恃以久乎其生以丁未月日享年五十三妻鍾氏同邑某之女有女四人又娶慶都某之女生四子完州北京復任重關也宗慶雖不幸客死於外然既知義命而能安之則亦何憾之有豫與為銘亦以慰宗慶也銘曰材足有為而又逢時退而就卑益恬以嬉知命不違死則奚悲我銘用昭永永弗隳羅先生墓志銘先生羅氏諱河字德崇一字象賢西樵其號也世家廬陵之清湖自幼讀書穎悟異常人嘗逰吉安路儒學從勤窗王先生受詩經日有造詣元季兵亂乃歸學于家與其諸兄自相師友經史百氏靡不窮究暨天下大亂鄰境多冦壘先生相其兄自持倡義保一鄉人德之國朝受命儒道復興先生遂以學行師後進文章翰墨往往爭為人所傳洪武辛未用薦舉為武昌訓導日與諸生講聖賢之説凡經指授者多克底于成久之歸老于鄉鄉人學者復相踵于門先生誨之不倦其教宗族子弟必使守禮而蹈義與他人言亦依于孝弟忠信蓋本諸其身云其祀先祠掃墳墓嵗時必謹至於先世遺文法書名帖皆手自校録以遺子孫雖老不衰羅氏故望族先生五世祖妣蕭氏在宋時以上夀錫封孺人文信公以親故嘗拜跽稱夀于堂上既貴猶然髙祖融齋景定元年以明堂恩贈承務郎妣蕭氏封孺人曽祖濬祖則揚父求過皆不仕先生生元至順辛未十一月某日沒於永樂癸未某月某日年闕娶同鄉江隂劉氏子二人孫男四人曾孫男三人葬其鄉某山之原而墓未有銘至是適均卜改葬于某山之原乃自為狀使子彬來北京請直銘之直少嘗從舅氏歐陽先生學以故人子得拜先生於永和先生風儀秀整語言切實所以垂訓者甚至今四十年每思之不能忘其何敢愛不腆之辭不以銘先生墓乎乃序次其大槩而系以銘銘曰清湖之宗來自金陵世有德義藹然聲稱先生承之學博以宏人所儀刑而已不矜越七十年不爽于恆荃蘭杜蘅有苾其馨峩峩新阡子孫是營載德垂輝刻此墓銘封御史宋公墓志銘監察御史宋原端既聞其父一聰公之訃當歸治喪事乃來北京請命而後行奉其友右春坊諭德黎君恬所為狀謁豫告曰生之父實有奧學淳行生忝以科第成名者皆庭訓致然也及濫官雲南道其所以教者尤篤凡敬慎潔亷蓋諄諄命之生得服膺焉幸歷三年無過舉吏部以為稱言于上推恩封文林郎雲南道監察御史敕且下而訃至矣嗚呼痛哉今歸奉葬而墓宜有銘庶幾託以不朽敢請于先生豫與原端居同郡誼不得辭按狀公諱敏一聰其字世居永豐遷鶯鄉之白水里為名族高祖邦達元信陽州判官曽祖貴忠祖夀考父永泰皆不仕然詩禮相承為鄉邑所推重公秀穎純茂篤志於學凡經史百氏之書靡不研究工于詞翰與弟一誠皆有志科第而不遂乃出以教學者學者爭師之孝于親睦于宗族鄉黨其持已待物一以誠信非義不為非禮不行藹然君子長者之風生元至正癸卯十月初十日而卒于今宣德癸丑正月日享年七十一娶黃氏有淑德二子長即原端次行端孫男三豫聞人之有德善者必獲佑于天生雖未食其報而卒享其榮若公者非天之所佑哉是宜銘以昭德垂後葬以某年某月某日其墓在同里帶源之西巖銘曰遷鶯名宗藹文學衣冠相繼儼蔚若有美夫子玉在璞惇德勵行志愈確賢嗣承之奮寥廓推恩褒封荷優渥龍光下賁洞玄漠吁嗟天道信可託辟之稼穡種必穫我為銘詩警涼薄更百千年久彌灼太宜人楊氏墓志銘太宜人楊氏諱觀豐城人曽祖祖父皆有善行而皆不仕太宜人自幼端重寡言笑工於女事父母愛之為擇壻得同邑丁公尚文既歸善事其舅姑飲食衣服必躬治以進朝夕勤甚舅沒年七十二而老姑獨在堂太宜人奉事尤謹其心歡焉年九十而終丁氏素饒財遭亂失之公乃有四方志挾其資旅逰於外者二十年太宜人治家事于祭祀賓客吉凶慶弔凡諸所行皆中節由是公得如志卒能再豐其家平居教子必使讀書為善於諸女婦必戒以貞靜謹嚴其言鑿鑿乎不少貶至待妯娌則藹然其和遇窮困撫幼賤皆有恩初命子鉉赴南京受學於丁季恆先生所以訓勵資給者甚備學成以進士入官太宜人得食其祿而教戒尤至鉉初任太常寺博士得封孺人及為刑部員外郎遂加封太宜人今進位刑部侍郎於法當封淑人而乃不能待以正統六年二月初一日卒於家距其生丙午之嵗享年七十六子男五女一孫男八曽孫男五侍郎君聞訃解官歸將以年月日奉葬于闕之原以行狀授豫請為銘納諸墓中豫受而讀之知其婦道母儀皆可為師法於葬宜有銘况侍郎之孝而豫沗交好奚可辭銘曰孝事舅姑順相夫端厚淑慎厥家宜善既積纍慶有餘令子顯赫升天衢恩封屢進禮秩殊髙堂鼎食旨且腴忽焉而逝良可吁我為銘詩賁玄廬後百千年永弗渝尚寶卿張公墓志銘尚寶卿張公諱信字彥實以正統七年二月初三日卒於闕年六十以年月日葬江寧鳳棲鄉先塋之次其子昱昂以尚寶卿朱君用和所述公行狀來謁銘公東萊掖人曾大父諱某大父諱興考諱五以公貴贈尚寶卿母某氏封太宜人公天性至孝自幼已能奉父母飲食不敢先居父喪哀毁幾滅性而事母尤篤母嘗病醫弗能愈公焚香籲天刲肝和湯以進母病遂愈事聞太宗皇帝嘉之詔旌表其孝行而召為尚寶丞能以勤慎舉其職秩滿升少卿仁宗即位升尚寶卿而封贈其父母賜之誥命又滿九年於例當升正四品徙他署上以其先朝舊臣不欲使去左右命復為卿而食正四品祿至是乃以疾終永樂之初朝廷有所纂述既成書當用寶識之豫時在翰林與公同事者幾二年每朝罷輒相與任其事然公必以書自隨稍倦更休則退坐屏處出書相講論務窮極旨趣當時皆深美公以將家子而篤學如此其賢於人逺矣及同事仁宗皇帝於東宫旦莫同出入者又二年公忠勤切至臨事儼恪其與人處則雍容謙退未嘗有所忤人亦莫不敬愛之在位三十餘年未嘗易所守可謂篤實君子矣勤於治生有别業在都城東暇則課僮僕力樹藝衣食之餘以待賔客賑窮乏不少吝事其兄義極恭愛義為旗手衛正千户無子公奉太宜人命以次子昻為之子兄卒昻襲其官公教之忠孝必無墮前人功而思保其祿位正統六年朝廷出師征麓川昻在行見公有疾欲求免公戒之曰爾年少當捐軀徇國毋以我為念昻遂行以破賊功升指揮同知獻捷至京師而公疾甚昻不敢留復奉敕詣軍中而麓川平即馳歸闕下冀得一侍疾而公已捐館矣嗚呼公之教子有成績而不及與其榮人皆為公惜之娶楊氏封宜人生二子昱昂也女一孫男二豫既悲公不復見而公之子乃能求銘以葬思著其德于久逺其何可辭銘曰東萊之濵生此令人既孝乎親亦忠於君寶璽是司小心慎密逾三十年所履如一鳯棲之鄉其安其藏昭德有銘愈久彌光孺人費氏墓志銘孺人費氏諱妙清以正統七年五月日卒于家年七十子敬為監察御史在京師聞訃慟絶即解官歸治喪以翰林修撰張益士謙所為行狀謁豫告曰敬不幸失慈母罔極之恩不能報其痛甚矣若葬而不得銘以昭德垂後則何名為人子敢請於先生豫與敬素厚且哀其意不得辭按狀孺人世居歸安之淩波里父原達母吳氏皆有善行故孺人之生亦端重柔淑間於姆教凡諸女事不程勸而能父母愛之為擇壻得同邑處士嚴士毅遂以歸焉處士孝弟忠信雅有志於四方常挾資以逰家事悉孺人主之以勤儉自足處姻族撫下人待鄰里鄉黨皆盡其道見貧乏者賙之橋梁道路有欲修而弗給者亦助焉居常蔬食曰吾非他有慕也不欲以嗜味傷物耳敬早有志於學孺人相處士日夜奬勵之學成取進士為縣令御史又每以忠孝為訓故敬大有譽於時而孺人夫婦得偕享其祿恩封之典將及之而孺人不待矣此敬所以慟而不能已也孺人一子即敬孫男四女一其葬以某月某日墓在闕之原於乎孺人之德善如此而子又克孝是不可不銘銘曰婦道之良母德之光胡不百年而忽云亡藏于斯丘龜卜所定利爾子孫以鴻厥慶中書舍人周君墓志銘永樂中太宗皇帝嚮意文藝既以經術求賢矣而攻書之士學有師法者亦徴詣京師有所纂述使執筆其間姑蘇周君璿用珍與焉其書宗虞永興在朋輩中最有名久之得官為營膳所丞然未嘗去館閣與人交謙慎有禮士大夫雖前輩名德多愛之而用珍久益敬不見有闕失遷中書舍人益謹飭不懈而書亦益有名秩滿得推恩封父母而二親皆得食其祿鄉邦榮之母沒治喪如禮起復未幾復以父喪去官既即吉將朝京師有疾遂弗起臨終自以不克報君恩為慊而勉其弟與子以忠孝正統辛酉九月七日也年五十七其天資明敏多讀書又通醫術喜吟詩於晉唐名帖所積尤多其畫師董源作古松法畢宏韋偃揮毫灑墨變化不窮京師人多好之用珍亦不厭其求其為人如此周氏之先居鄢陵宋南渡時有諱闕兵馬鈐轄守平江之嘉定州因家焉曽大父繼善元平江路醫學提舉大父自牧為鄉校師父仲立封從仕郎中書舍人母陸氏封太孺人妻張氏贈孺人繼室施氏封孺人子男一曰浩女二以卒之明年葬長洲縣彭華鄉金盆塢之原而墓未有銘其弟寧波府學教授璣貽書翰林徐編修良玉請為行狀託中書舍人凌尚義持來謁豫銘豫於用珍亦素厚嘗念其以憂去而冀其速來不知其遂死矣惜哉銘曰楚楚兮令儀渺渺兮豫思悵一去兮不復來金盆之原兮此焉歸於呼奈何兮胡寧不悲張君墓志銘張君諱缺字彥彰别號耕逸其先清河人唐末有諱容者為吉州刺史因家于吉宋建隆初孫渥乃徙居吉水縣文昌鄉之西圑里世以儒術顯聞君之曽大父尚友大父心顔父允仁皆不仕而皆有學行母顔氏以至正壬寅十月初十日生君君自幼穎敏闓悟博覽經史一見能了其大義座客嘗有言周勃呼軍門令左右袒以為逹權變君曰斯時唯當喻以義豈當問其從不從邪其意與先儒合前輩長者大竒之及長學益進智識亦超邁宗族有事皆取決於君然君未嘗有矜色居常默默似不能言者至論事之是非析理之同異衆言紛紜莫有適當者君徐一語折之無不恱服君雖負竒氣然所行必由道早失父事母顔夫人極愛敬伯父晚年喪子諸孫幼君養之如父厚于兄弟先廬悉推讓之從兄死君教其子宗璉尤嚴見其能學則心為之喜諸子弟有悅學者皆奬勵以成之族有遺孤女從其母適人而許與非類取而育之擇名族歸焉從兄弟某遭疫舉家莫能興衆亦莫敢過其門君獨日往視豫湯藥死則殮葬焉緦親有中嵗猶鰥者君出財為禮俾之娶謹於取友非其人則深絶之性不喜飲遇賢士大夫相過從輒傾倒為歡至竟日不亂尤倜儻有才略好古人竒節偉行非常之功嵗壬午永豐吟田羅坊人作亂聚衆萬餘殺人掠財焚廬舍故家大族皆栗栗危懼務奔走以圖存君獨思保障一鄉傾家養士召鄉人子弟喻以逆順禍福部署為扞賊計衆樂為之用逺近來依君者君皆能館榖之賊素聞君名亦畏君君覘知之率敢死士夜出旦乘大霧搗賊巢賊倉卒不知所為殺戮無算餘衆各鳥獸散比官軍至聞賊平止不進縣令丞欲上其功君力止之曰吾為家族計耳何功之有君子謂魯連不過也甲申嵗歉君推其餘積以濟飢所活甚衆永樂丙戌十月二十四日以疾卒年四十五聞者莫不哀之娶劉氏有賢行五子長容重後君十四年卒次容端次容肅次習早卒次容靜君嘗欲各教以一經今皆能為士人女二孫男闕以某年某月某日葬君於里之故寺祔大父母之兆然墓尚未有銘至是容端以君兄子宗璉舊所為狀來求銘豫觀君之才行信所謂竒偉不常之士稍振其端而所立已有過人者使效用於當時得盡出所有其功業豈少哉而惜止於斯宗璉故大理丞嘗官春坊與豫為同僚豫知其言信故不辭而為銘銘曰嗚呼張君承閥閲之華服禮義之腴才足以奮厥謨行足以世其家而不永年命也奚辜銘以昭之千載弗渝都事熊公墓志銘熊氏居南昌之盧觀為右族在宋有仕至補闕曰雲卿者公之五世祖也曽祖叔美祖敬升父中立皆不仕中立娶劉氏生公于元至正丁酉十月十六日今正統壬戌十一月日以疾卒于家年八十六公諱紀字景方松節其號也自少端重喜學多讀書孝弟之行成於家孚於鄉里其與人處寬和而有恩嵗飢常發粟以賑貸貧不能償者焚其劵鄉人有受傭於家必豐其飲食常直之外又厚資給之曰吾于鄉曲當如是豈惟酬其力哉家雖豐自奉甚約其教家人亦如之至待賔客則甚厚性坦亮剛毅好古人竒節偉行洪武壬午有司以才武薦公用事者便宜授公六品公知不可為竟謝去會造船海運費繁役重守令屬公董之部使者苛急衆不勝其嚴貸白金六百兩以就事弗克償公曰吾觀役夫多貧若責之急必有損産業鬻兒女者獨取於家償之衆皆誦德焉子尚初以才舉當得官需次于家公教之勤慎平恕而以不欺為本前都御史顧公佐舉尚初為都察院都事用公之教有能名於是朝廷推恩封公為都事鄉人皆以為有德之報公饗其榮養將二十年而所以教子孫者尤篤至是雖以高夀終而大夫君子猶惜之娶徐氏有賢行子二長尚初今為都察院經歷次尚爵女二孫男六曾孫男闕尚初卜以某年某月某日葬公闕之原以國子助教李洪所為行狀來請銘嗚呼公之德宜有銘而子又克孝豫奚可不銘銘曰熊於南昌蔚為故家而公承之亦孔之嘉其福則那其夀則遐昭德有銘百世之華王處士墓志銘泰和王君伯彰以永樂二十二年二月十四日終于家年六十九其子若孫將以某年某月某日葬於缺原而以狀來請豫銘豫與君交也後而相知為深其何敢以不敏辭乃按狀序而銘之君諱環伯彰其字世家邑之梅岡自少力學通諸書慨然有志於用而諸兄弟多喪亡惟君在父母老矣因自嘆曰親老乃欲仕耶遂隱居榮養朝夕左右能得其歡心父母疾奉侍尤謹湯藥必親嘗親沒葬祭無違禮寢苫枕塊三年然後復既久而哀慕不衰好善急義出於天性親族有幼孤者長育婚嫁之死不能葬者為具棺葬焉嵗歉則出榖以賑貧乏貸而不能償者不切切計也故鄉稱為有德嵗辛未里中大旱巫尫百方禱之不雨禾則盡病君歎曰若是民其殍矣乃自作壇以籲天誠意懇至越三日大雨人又以為有德之應皆歌詠焉嘗一至京師今少傳楊公故翰林侍讀梁公皆相推重梁公後以憂歸君遂禮而館之使諸孫受學焉益相與為莫逆性尤髙簡間曠喜賦詩得唐人家法吾邑故族富而有文如君者甚少君亦以此自豪遇大夫君子相從講論連日夜不厭長筵廣席高吟大唱以為歡他莫之顧也由是為不能者所忌而尤以門第自重鄙夫窶人一旦勃然起者未嘗比數收拾故素出其下者尤忌之然君一不以屑意自號樵雪人異之曰君非樵者也君曰吾豈欲為會稽守邪清苦自勵吾志也與其從兄子朋相友愛一味之甘不聚不食故宗族子弟皆化之王氏夲長沙人南唐時有為吉州法曹者因家廬陵之甲村今居梅岡則自甲村徙也六世祖約齋宋咸淳間與弟某皆以易經舉進士而約齋與文信公最相愛然至君之祖則堂父道濟纍世皆不仕而皆稱為善人長者君娶清湖羅氏之子婦道母儀克刑其家子二人長某先五年卒次某孫男七人曽孫男二人憶永樂草年豫以內艱起復赴北京君因邀豫過其家相與觴詠至夜分不寐既旦遂别去未半年而君已矣此豫所以深惜者也故既為詩以哀之又因其請而為之銘亦情之不能已也銘曰嗚呼王君有行有文不詭而羣世嗣其芬蒼山鬱盤有崔者墳慶澤斯存利爾後昆范仲彰墓志銘仲彰姓范氏諱文煥上虞人也忠厚坦亮厭世之為機械者因號守拙子人信其行因亦以是稱之好學能文博覽強記少從四明桂彥良先生受詩經欲有為於世值元季衰亂不遂也嘗一逰齊魯燕趙之郊訪古人遺迹登覽吟嘯慨然歎息人莫之測也其事親能飬志有疾則躬調湯藥衣不解帶母嘗冬月患熱疾幾殆思食瓜不得仲彰冒風雨走百二十里得之會稽市中及暮而歸以啖母疾遂瘳葬其父時積雨泥淖仲彰禱于天得稍霽葬畢復然人咸以為孝誠所致事伯父仲父皆盡禮病則為治湯藥死則具棺衾殯斂焉撫其遺孤尤厚好義樂施賙窮恤匱人有假貸不能償者折其劵洪武乙亥有詔舉賢才左軍都督府經歷俞均息薦仲彰仲彰以疾辭而縣令李惟中強舉為耆老嘗與論賢才將薦舉焉仲彰以葉砥履道對惟中薦之起自戎伍為考功郎中而人以為當永樂元年縣南黃路溪蝗生縣令丞令民捕之而浙江按察僉事林公亦以蝗故至上虞責縣令丞曰蝗生由爾曹失政也捕之而用非其人益為害林公知仲彰亷謹乃専委用焉仲彰念非人力所能盡於是齋沐禱于社不數日蝗無遺類鄉人歸德於仲彰皆歌頌之永樂六年又用薦者徴至京以年老辭歸縣官每行鄉飲輒以大賓之位處焉永樂二十年某月某日卒年七十九以某年葬城南工黃山先塋之次范氏本宋石湖先生之後石湖之孫禮始家上虞禮之孫生無咎無咎生德甫德甫生均與仲彰之曾祖祖父也娶盧氏有子一人曰侃先卒孫二人曰缺曾孫二人平生所為文有北逰集二卷和陶詩二卷歸田藁二卷藏于家仲彰葬已二年其姪監察御史宗淵始因其同僚歐陽御史求豫銘將以納諸墓豫重其意不能辭也乃為序而銘之曰嗚呼仲彰學博行淳玉韞珠淪不顯其珍孝以事親誠以感神明以逹賢惠以賑貧其善不忘其嗣彌振我銘用昭千載猶新劉仲良墓志銘君劉氏諱懿字仲良世居泰和東陽門柳州判官况之後也曽祖中祖仲源父存善皆不仕君少英敏尚氣誼從陳心吾先生學涉知書史用其道於父子兄弟之間亦稍振厲見才能視鄉里齷齪者無足當其意人謂君宜在官使將薦之洪武十九年被誣謫遼東安於義命時以吟咏自娛無怨懟不平之語當時重之居十餘年乃歸益篤意事親與季弟相友愛待諸子姪恩意尤厚於得失利害不校也久之徙居江南下村課僮奴力耕以自足子咸舉進士為按察僉事自四川改河南迎君就飬不行而數寄詩以忠謹潔亷為勉咸分祿以飬於家君既不為時俗傲放事而事亦無干君者乃陶然於詩酒之樂號醉吟翁嘗以其族分而慮其疏也既為譜牒以聨屬之復欲以已分地建祠堂於故居以奉祖考嵗時祭祀使子孫得序昭穆於其中庶幾不至為塗人其用心厚矣今年咸自僉事秩滿升廣東按察副使君於例當得封有司以前被謫不許君子皆惜之蓋君性伉直非其人不交遇事必盡道理人有為非義即正言面折之以此見重於君子而亦取惡於人君生元壬寅正月十日而卒於今宣德己酉四月十四日年七十八娶廖氏有婦道子三人震坤咸側室子六人女一孫男十人曽孫一人其所著詩和平婉麗有壯逰集醉吟翁稿藏于家古者君子之仕也其父兄所以相告語者必以道其居官臨民其處鄉䣊州閭蓋未有違道者是以德立而名顯今仕者之父兄能如古人者蓋少矣反道悖德慿籍以自逞者蓋有焉仕者既無所取式不知道之當行卒有陷於邪僻有識者蓋深鄙之君之子咸貴為大夫處方靣之重而君若無與者從容田里之中飲酒賦詩足迹罕或至城邑而所以教其子皆道義之言此君子所以多君也今不幸已矣咸兄弟將以某年卜葬君于闕原而以狀來請銘豫知君者其何可不銘乃為銘之曰嗚呼劉君行淑才優于家于邦不競不絿善教其子以克顯仕在人則驕而已一致田里之間優遊咏歌今則已矣命也奈何日月其良歸于窀穸發聞垂休視此貞石李伯昻墓志銘伯昻李氏世居泰和之南岡有元盛時其曽大父英叔以財雄鄉里居室之華資産之盛園池逰觀之美能過之者鮮矣英叔為柏興路同知生子皆春皆春生如春為南安推官則伯昂之大父父也元季之亂豪傑蜂起推官既即世伯昻年始十四主其家資猶以萬計江西行省參政全普庵薩里受命復袁州憚不敢行走保贑猶以軍興括民財豪橫之徒依以用事伯昂始破其家盡失其資産于時袁冦數侵掠泰和居室皆焚蕩伯昻奔走避亂無寧時國朝受命海宇寧謐乃歸葺弊廬以學鄉閭子弟爭師之尤喜交逰敬禮賢士大夫遇故人賔客相與道盛時事或因覽其遺趾而想其故處則嘆曰物盛而衰固其理也吾何欣戚於其間哉伯昂孝於先仁於宗族既為族譜以聨屬之嵗時有事於祠墳則躬率子姪以致其禮待姻戚鄉黨亦皆歡然有恩篤於教子嘗語之曰吾少遭亂晚而始學不能有為於世汝曹勉之毋亦有後時之悔也故其子桓圭信圭之學皆足以成名嘗闢一軒種菊其中而扁曰愛菊鄉人因以號焉以永樂丙戌正月十七日卒距其生至正己丑六月二十九日得年六十八初娶趙氏漢中教授伯洙之女再娶胡氏皆有婦道子男六人惟高堅節桓圭信圭介圭躬圭惟高早卒堅節為浮屠師桓圭信圭相繼舉眀經桓圭由蒲縣典史擢南陽知縣信圭為清河知縣並見稱於時女四人皆有歸孫男十四人曾孫男闕人伯昂之卒也權厝於其居之東偏至是始得吉地于闕之原卜以某年某月某日改葬焉信圭考績來北京奉國子助教宋先生琮所為狀請銘豫觀自古冨貴之家其子孫安於豢飬而無卓厲之志一遇變故往往不能以自存或遂泯焉蓋有也伯昂之家嘗盛矣而淪於喪亂乃復能自立如此非其中固有卓然不可易者乎况其子之才安知李氏將不盛於昔也哉乃為之銘曰李氏之先大顯於唐析自分宜居邑南岡南岡之盛遭亂不競惟伯昂甫克紹厥慶其行孔嘉其福則那有子承之益大以遐歸藏斯丘卜者曰吉刻此銘詩百世有繹蕭叔仲墓志銘公蕭氏諱鉉字叔仲泰和螺溪人曽祖容安祖厚溪父端仁皆不仕而世以資雄鄉里端仁號草堂尤急於賑施用其所有供佛僧修橋道為利益事者甚衆至今人知蕭草堂公生而端厚喜讀書於世俗侈靡傲放事及一切鈎距機械傷人害物者未嘗存諸心惟思廣其先人之惠以周窮振乏元之季世用薦授江州德化縣尹非其所好不果赴天下大亂豪傑四起螺溪之居皆焚蕩公奔走避難無寧時國朝受命始歸理故業課僮奴耕種以自足而放懷於山水之間會故人賓客則相與飲酒談笑終日於諸利害不計也洪武乙丑五月初八日以疾卒于家享年七十有三娶吉水坪溪李氏先卒二子孫男三人曽孫七人公卒之年二子奉葬于里之石陂越三十三年為宣德三年諸孫以其地之沮洳也擇某年某月某日改葬公於其里石洲之原而墓未有銘既而棟梓來北京請於豫蓋先考瓊州公嘗與公相好而豫又與其諸孫逰是所謂有世契者而公之為人又長厚如此其何可不銘乃為銘之銘曰蕭氏之先實出於梁綿綿慶源積久彌昌螺溪之居徙自廬陵好善急義藹然聲稱惟公承之亦篤于施有蘊弗彰仕不逢時遭遇聖明業底于成以善其身以厚其慶石洲之原公墓在焉刻此銘詩百世之傳孔君墓志銘永樂己丑仁宗皇帝在東宫監國實尊信孔子之道而篤行之思用其後之賢者時君由太學生為工部主事近臣為言上曰聖人之後而使在劇司將不為纍乎即以君為太常博士食六品祿君與豫比屋居而母夫人在堂旦則出營職及暇而歸即率婦子侍左右備物敬飬焉夫人樂之退則與豫言笑相好也嵗癸巳豫别君詣行在後三年丙申君來奏事詔升君太常丞留北京復得相與歡笑如曩時明年君以大祀天地乘傳還南京又明年丁母夫人憂去官服闋調祠祭主事豫亦連丁內外艱相去六七年始復見於北京而故意猶藹然也仁宗即位復太常寺丞祀神南海上今天子即位改元復奉命告祭帝王陵寢就祠闕里因得與宗族歡聚踰月而歸君謙慎和厚秉禮而蹈義其奉職尤盡誠與人交久而敬人亦無不愛敬君者宣德己酉六月二十七以疾卒年五十七相知者莫不哀之娶龔氏封安人賢而謹禮法君之所以事親處友睦姻戚和鄉黨克適其宜者安人相之也先是有羸疾因哭君遂劇是年十一月初四日亦卒年五十二三子皆為士人二女孫男三君宣聖五十五世孫其先居曲阜九世祖傳與兄子端友從高宗南渡端友襲封衍聖公傳官撫州因家于衢卒贈中奉大夫開國男端友傳爵五世至洙始讓於曲阜宗弟曰治者傳生奉議郎端已端已生南嶽奉祠行可皆贈少保行可生贈少師文介公元龍元龍生右諌議大夫資政殿大學士僉書樞密院事應得應得生奉議大夫汴梁等處納綽提舉福孫福孫生新會尹維敬維敬生道君父也以君貴贈太常寺丞母班氏封安人君卒之明年希綱兄弟奉君與安人之喪歸以某年某月某日合葬於缺原而以衛府左長史金先生用誠所為狀來求銘豫念與君交好草年當鄰居時兩家婦子亦未嘗有違言者今君夫婦俱不幸豫雖不忍銘亦安可不銘乃為序而銘之曰聖澤之長君行之良宜夀宜昌而忽己忘納銘其藏後世之光蕭母胡氏墓志銘宣德五年二月工部營繕郎中泰和蕭飬高喪其母太宜人胡氏將奉葬於其里陽坑而以翰林侍講陳循所為狀來乞銘蕭氏居螺溪里為大家豫繼母蓋其族因嘗得拜飬高之尊府贈工部營繕郎中世榮先生與太宜人而飬高以端重勤慎有名與豫相處為莫逆豫雖不敏其可辭而不銘胡氏之先始居廬陵永陽里後析居邑之岐步岡世為右族太宜人早慧知理義喜女紅父母為之擇配以歸世榮事姑盡孝姑嘗疾篤夜禱於北辰請以身代姑疾尋愈世榮業儒嗜經史於家事一不以介意太宜人治之悉有法待宗族姻戚鄉黨皆得其宜嘗以學問勉其子曰必無愧前人故飬高遂顯于朝而封贈之典及焉其生元至正戊子九月九日卒於今宣德己酉十一月四日享年八十三男一人飬高是也女三人孫男二曽孫一嗚呼太宜人之生與豫母恭人歐陽氏及豫繼母蕭氏皆同年而皆不幸久矣獨太宜人得享其子孫之祿飬至于高夀而終豈非福也哉豫於此有不勝其哀者矣銘曰早為賢女壯為賢婦晚為賢母藏于斯墓子孫之祜管氏孺人墓志銘孺人管氏諱靜字淑惠寧都管仁傑之子嫁為同邑黎大成之妻二家皆大姓世有德義孺人早慧習姆教間女紅年十九歸大成相夫以順事舅姑以禮凡賔祭冠婚長幼之衣食內外戚之往來供餽皆孺人主之尤明於事機而造次必守禮義大成嘗受誣被逮赴臬司有為異論搖撼之者孺人曰黎氏世為善善者天必祐之吾何懼大成竟得白而歸大成嘗遘危疾孺人籲天請以身代未幾疾愈其後大成客閩浙家事一委孺人處之盡其力誨子使學曰爾家世以讀書為顯官爾必無愧前人凡士大夫有過寧都者必為之盡禮俾子從之逰或招延以教之大成女兄適溫氏者夫婦皆早亡有遺女孺人飬之如已出及長備禮嫁之黎氏家素饒中而困晚而益裕孺人之力也故鄉人論婦道母德之善者必歸孺人宣德丁未二月某日以疾卒距其生之嵗得年六十一二子淳為邑庠生諒以易經領癸卯鄉薦孫男六人孫女五人淳諒以缺年缺月缺日葬孺人于邑東山之原而墓未有銘今年諒會試于北京乃以前進士張純所為狀來求銘自古女德之著于閨門者不少非孝子順孫表而揚之其湮滅無聞者多矣今孺人既賢而子又克孝豫何可以不銘乃為之銘曰德之盛才之良宜于家聞于邦藏斯丘綿厥慶刻此銘百世光龍彥鶚墓志銘永樂甲辰月日泰和甘溪處士龍彥鶚以疾卒于家其子崇安遞運大使公常以月日奉葬于雲亭鄉乕岡中洲之原而未有銘及起復來京師得清逺驛丞乃以請於豫將歸而納諸墓龍氏世居甘溪為大家宋咸淳進士連州推官登其顯者也至處士曽大父盤居始遷縣城西豐堂廣宇蓋窮州下邑公署所不如大父善翁父成章皆好德樂義不求仕進處士少嗜讀書存心以不欺為主孝於親友於兄弟忠於親戚朋友凡其所行必法古人與人言必依于孝弟忠信衆皆以為善人長者其後厭城市徙居乕岡之下以詩書山水自娛家雖不甚豐而極好賔客延師教子尤盡其道及公常以薦得官教之以忠孝大節必勤必慎晚年復歸甘溪理故業與宗族鄉黨遨娛往來方將享其子之祿于永久而竟以夀終其生元至正戊戌十二月十九日得年六十七娶羅氏繼康氏二子長即公常次日辨女三人皆有歸孫男一龍氏與豫家相好豫生也後嘗從處士遊察其言行心切重之而公常又厚于豫則今之銘墓其敢已乎銘曰善有諸己以淑其子宜多受祉而終於此銘告來世作者太史鄭先生墓志銘錢唐進士鄭垕述其父完齋先生之行謁豫拜且泣曰先人不幸棄世而垕留京師不得盡為子之道其罪大矣若葬又不銘以著其德于不朽則不孝之罪益大將無以自容敢以為請豫哀其志不可辭乃按狀序而銘之先生諱壁字伯規自幼頴異過人在祖父側日聞君子長者之訓與其所為詩退而即能成誦前輩皆竒之長從鄉先生周某學通書經其為文章力追古作者雅有志於當世弟仲舉卒乃一意事親不復求進有薦之仕者皆弗應二親老先生侍左右能得其歡心父卒既斂比舍失火延其廬先生痛哭籲天俄而風反火暫息得舁櫬以避及母沒皆不飲酒食肉者三年晝夜悲號鬚髮為白鄉里皆稱其孝其與人處則恂恂恭讓未嘗昜其言言之必如所行家故有池池上種竹因作軒曰水竹軒日觀書其中客至必置酒吟咏以為樂晚自號完齋蓋寓全歸之意所著有完齋集宣德戊申十一月草八日以疾卒距其生洪武丙辰六月十六日得年六十三娶陳氏一子即垕也恭而有禮蓋能昌其家者女二孫男一鄭故汴人其六世祖筠孫仕宋至中大夫判揚州從思陵南渡始居山隂大父俊德在元時從江浙儒學提舉陳衆仲學因復徙居錢唐父敬常皆不仕先生初有志于用而以事親不果于是力教垕使必如其志及垕領永樂癸卯鄉薦自以無他兄弟侍飬不忍去左右先生勉以移孝為忠及取甲辰進士歸五載復被召尤不忍去乃復以顯親揚名為勉先生雖未仕然觀其善教與其子之才安知不終享其榮也哉其葬以宣德己酉四月某日墓在錢唐縣石壁之碧梧原銘曰孝以事親善以植身雖未榮顯亦足自見夀六十年克全其天銘著不朽以耀爾後王敬先墓志銘今上改元之三年詔修永樂大典徴天下學官及嘗考貢士者皆使執筆焉敬先為郴州宜章縣學訓𨗳嘗考試于廣西由是預徴入館閣來者蓋纍百人然如敬先者不多也於時吾邑之士若今左春坊大學士楊先生士竒與其姪刑部主事之宜山東參政陳公士啓及豫輩凡草餘人皆在京師敬先朝入坐館中編摩讎校其所去取皆當乎人心同列敬服之暮出則過諸公談論笑謔或飲酒或圍碁譁然不知夜之久也如是者纍年當天下太平沐浴膏澤禎祥協應嘉禾瑞麥之類交獻於朝敬先皆得親見而形于頌歌士大夫韙之書畢受賞而歸既三考升嶽池教諭慨然欲成就後學孜孜講道晝夜不厭然未及五年而敬先卒矣敬先少從鄉先生陳心吾國子學録蕭先生子所遊故學有造詣而從之遊者亦皆得成其才質厚氣和坦然無畛域人犯之不校也然事有不可亦未嘗詭隨其為人類如此而竟不及中夀以卒是可惜也其家在泰和縣北之灉江祖眀德父古平皆不仕而皆有隱德其生以乙巳年六月十七日而以永樂十八年六月初二日卒于官年五十六娶胡氏再娶彭氏子二人固聰聰為伯父象山教諭效先後皆讀書習舉子業女一人皆胡出也孫男五人固自嶽池奉柩歸泰和以永樂十九年十二月初八日葬于廬陵二十八都馬嶺之原而求豫銘其墓豫重朋友之誼而哀之乃為銘曰灉江奮身勵文學璞玉堅渾藉雕琢宜章嶽池繼鳴鐸校文廣西聲蔚若持筆編摩居館閣渢渢雅頌中矩矱平生交好恣為樂怡然色笑相唯諾奈何一去反玄漠九亰冥冥不可作我為銘詩賁泉壑陳處士墓志銘監察御史陳訥汝常既葬其父默齋處士六年矣乃以九江太守吳致文所述事狀因中書舍人黃蒙飬正請豫銘其墓曰先人以行誼聞于鄉而不及大顯于時今不幸已矣若又不得銘以著之恐久而浸泯敢以請於先生豫辭不獲乃按狀序而銘之處士諱升字子讓其先頴州人唐宰相夷行之裔夷行後三世曰檄者始居閩之長溪又二世居善復居溫州平陽上莆里故今為平陽人高祖彥慱宋南康軍教授曽祖銘道祖雲翼皆不仕父國光仕元為閩清縣尉處士敦厚好學受業林栖澤先生之門於經史子集隂陽醫卜諸書無不究尤精秦漢篆𨽻嘗逰閩浙覽觀山川竒勝及古人遺迹然不求仕進既歸益以耕學教子為事奉飬二親極其至侍縣尉君疾藥必親嘗衣不解帶及沒哀毁幾絶水漿不入口者纍日葬祭一遵家禮及母薛氏病沒亦如之鄉里稱其孝其待內外屬及閭里鄉黨皆盡其道尤慎語言嘗曰惟口起羞古人所戒因名其室曰默齋以自警故號默齋處士邑宰羅敏學高其行每舉行鄉飲必請居賔介之列人無非間之者永樂辛丑二月初五日有疾且亟召諸子孫戒之曰吾家素以耕學為業爾等善繼之無忘也言畢而逝距其生至正癸未得年七十有九以是冬十二月初七日葬里中上莆祖墳之次娶同里吳氏子男四南伯訥推訥即來請銘者女一孫男七曽孫一豫嘗謂君子之行其顯者易見而隱者難知若處士之修身慎行非其子汲汲顯揚之亦何能自白於後世哉然則處士可謂有子矣銘以昭之固宜也銘曰其行淳其志壯孝於親信一鄉樞機之發慎有常生雖自晦沒愈彰我銘斯丘昭弗亡王主簿墓志銘遂安縣丞王開所瞻以其尊府遂昌主簿之官世行治為書謁豫拜且泣曰先人之沒久矣沒之日開始四嵗於其德有所未知長而聞諸母夫人然弗能詳也雖得翰林編修周先生述為文表於墓然尚未有銘無以光幽潛示久逺敢請於先生先生幸哀而賜之銘豈惟開之不肖得以逭罪而先人實蒙賴焉豫辭不獲乃按狀序而銘之君諱道字魯方居吉水縣仁夀鄉之高唐里世以儒為業年十九即能為人師事二親盡孝承候顔色奉甘旨得其歡心父沒哀毁骨立葬祭如禮嘗從元進士歐陽莘耕受書經有志於科第洪武中縣大夫舉以應求賢之詔其母勉之問所宜施則跪而對曰道聞事君不忠非孝也茍受一命當盡心所事庶幾不辱吾親既而有遂昌之命時令丞皆罷懦事一委君君夙夜不懈悉以辦治尤慎於刑獄民有忿爭即諭以義多化服罷去嵗大飢有莩死者君蹙然曰吾為民父母可弗救耶即躬白于府發粟千餘斛以濟之民賴以活一邑稱其仁而僚吏無不恱服甫三年以疾卒于官年三十七曽祖誠可祖恱中父以順皆不仕娶郭氏一子即所瞻女二孫男五曽孫男三嗚呼君以方壯之年抱有為之志始見用于世已足以成功名而不幸不至於大用然幸有子能彰君之德以光顯于後天蓋以此報君其亦可以無憾矣墓在里中涌泉岡石陂山葬以某年某月某日求豫銘則宣德九年二月也銘曰孝以事親仁以及民而不永年何辜於天餘慶所鍾俾有令子謂天孔神庶其在此隆隆髙墳石陂之山昭德有文百世不刋抑菴文後集卷二十九
