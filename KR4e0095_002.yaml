body:
  text: 抑菴文集卷二明王直撰記順德堂記嘉禾曹鏞字汝器世居林溪之上其祖若父皆以行誼聞鄉邑汝器尤讀書循理懇懇致其孝士大夫皆樂與之處遂以名聞縉紳間嘗名其堂曰順德而未有為記之者乃因翰林檢討錢原溥而以請於豫豫謂堂之有名蓋古人銘器自警之遺意觀汝器之所以名堂豈他之事娛嬉燕樂者之比歟蓋凡可以動心役志之物皆不在其中其勉焉而不敢怠者一於德而已德者天之所賦於人而人所得于天之理也理具於心而施之父子君臣夫婦長幼朋友之間其事有小大其行有緩急莫不有當然之理焉順而行之以修其身齊其家充之以治國平天下明而化乎人微而及乎物幽而有以動天地感鬼神皆順此理而已矣故曰人之生也直直順理之謂也古之所以為聖為賢為名公才大夫豈逆德者所能哉後世以來其能不逆者固多咈焉而逆者不可謂無也生於利害之私而起於忽微漸而積之至於賊仁害義蔑禮棄信顛倒於日用之常反戾乎倫誼之大其禍有不可勝言者書曰惠迪吉從逆凶此之謂也汝器謹於自修如此非所謂有志者耶則豫於順德之堂安得不深嘉其意哉豫聞汝器好琴而喜吟琴者禁也所以禁邪而制放養德之具也且君子之發德詠仁皆於詩見之汝器之所好與其所務可謂協矣尤在加勉之云耳勉而不已亦將何所不至哉是為訖終慕堂記東平張琛廷玉名其堂曰終慕之堂示不忘也廷玉自少善事父母盡愛敬之誠極婉愈之樂名聞於士大夫久矣母李氏早卒廷玉執喪以禮而哀戚過焉不飲酒食肉不處內者三年於繼母袁亦如之及仕為衢州府同知奉其父往就䘵所以適其口體而娛悅其心意者無不至久之父卒哀號孺慕幾不能生奉柩歸葬東平結廬墓下旦暮哭人不忍聞有司上其事詔旌表門閭由是逺近皆知其孝服闋朝京師吏部擢為文選郎中重其孝也未幾豫待罪吏部與廷玉接聽其言觀其行益重其為人間語及輒泫然曰此琛之愚何足為大人君子道哉至是外執政有缺舉賢任之廷玉名在選中上亦聞其行擢為福建左布政使將行數過豫求一言以自勗乃因其所以名堂者而相與誦焉夫君子之喪親豈以三年之孝為足以盡情哉身者親之遺體也顧其身則思其親身存則親存矣蓋至於殁而後已焉故曰大孝終身慕父母然徒慕無益也要必有所務立身行道揚名於後世以顯父母此其所當務者也終身慕父母而立身行道以終之斯其所以為大孝也歟忠者孝之推也孝於親則必忠於君充而極之將無所不至也廷玉之孝顯矣今去為方伯推其孝於親者施之政使其人皆尊君親上養老慈幼又推之以厚民生育物類閩粵之間熙然太和則人將歸美於方伯推本其父母之賢此所謂成其親豈非孝之大者哉豫重廷玉故為言如此俾書于堂之壁以為記而勉焉以究其成也諸葛武侯祠記南陽郡城西有阜隆然而起曰卧龍岡漢諸葛武侯嘗居於此舊即其地建祠以祀焉元至大中河南行省平章政事何瑋行部謁祠下病其庫乃下有司充廣之又即祠之東建書院以設官養士事聞朝廷名書院曰諸葛書院祠曰武侯之祠世移嵗久書院蕪廢祠雖幸存然亦日就頽毁前之為郡者莫克任之洪熙元年五月太守陳君正倫始至往謁焉周視祠宇蕭然破壞采椽敗席不除風雨退而歎曰侯之德業在天下當百世祀之况其所居之地乎今祠如此何足以揭䖍妥靈乃於農隙伐材命工撤而新之冬十月成正堂四楹其餘方次第營之未就而當朝賀來京師明年春二月還郡適同知張永推官司憲南陽縣令李桓圭後先繼至相與協力圗其事未幾兩廡皆成繚以周垣前為大門以時唘閉而祠堂之制始克大備堂之中塑武侯像凡其器用則南陽衛南陽中護衛具焉正倫既告祀以落其成又嵗以八月二十八日率郡縣􅒼屬奉少牢致祭拜跽有位薦奠有所進退周旋克中儀度郡之人士皆欣然稱嘆曰陳公為此其可謂尚德之君子矣然不為之記則何以示後人俾維持之永勿壞於是桓圭以書來京師請豫記豫謂先王之道以明倫為本周衰王者之迹熄至於秦極矣漢興學者乃復得聞先王之說至於光武明帝其道庶幾明矣士之出於其時者秉禮義循名節綱常之際截乎不可紊也降及靈獻大盜繼起建安以來曹氏最為雄盛逞其詐力以誘脅天下豪傑之士莫不折而從之其所圖為者無非僣竊暴悖之事豈復知有綱常之道哉逮華歆之計遂李伏之說行而三綱絶矣當是時莫有非之者雖吳國多賢亦委曲順從之不暇是天下之人皆淪於逆理亂常之歸獨武侯奮起圖復漢室毅然以誅曺為心出師二表正名定分凛凛乎王者之師使天下之人曉然知曹氏為賊綱常之道賴以不泯後之君子因是而正誼明道以扶世立教則侯之功大矣豈特與勞定國死勤事禦大灾捍大患者比歟雖百世祀之可也且嘗遊處乎此神之所顧懷民之所向慕焄蒿悽愴如或見之則嚴祀之以示教焉蓋宜矣然今之為郡縣者於有司之事部使者之所督責尚勉勉焉有未至若先聖之祀學校之政亦有怠而廢者其能崇先賢以儀後進如此誠鮮矣而正倫能之非誠所謂尚德者哉則凡政教之所當務者其從容優裕可知矣正倫廬陵人由進士為監察御史以恭儉慎靜知名宜其所立有過人者故為文俾刻諸石使後之人有考而繼之也潜山縣修學記潜山縣治舊安慶府治也宋慶元初移府於盛唐灣而以地屬懷寧縣元延祐間為縣者以為僻逺請即其地增置潜山縣而學校備焉其始建學蓋以茍且就事規模庳狹無髙大之觀國朝洪武初詔郡縣皆置學然亦因陋就簡未遑改作今既久且弊矣宣德七年主簿陳大用周覽而病焉謀於知縣俞友謙縣丞王彥良曰朝廷興學育才其意厚矣董而勵之俾有成功者有司事也今弊陋若此宜撤而廣之庶有以稱上意大用請身任焉議以協合邑人之好事者聞大用之謀皆喜曰此所以教吾邑之子弟也而敢以煩公富者獻資貧者效勞不勸督而集乃市材命工並手交作七月癸亥㦸門成十月乙未大成殿成而大用當述職來京師乃告于令丞曰兩廡未成請成之於是友謙挈其綱彥良董其事典史周升亦往來效其勤甫踰月兩廡成明年夏大用歸顧而樂之曰學制不可以不備復鳩工度材以卒其事而講堂饌堂齊舍廨庾次第皆成外繞以垣凡二百五十餘丈以缺年缺月訖工教諭彭子斐諗於衆曰廟學之成二三君子之力然始而終之者陳公也是宜有記以示久逺且使學者知修學之勞而勉學以副其意乃疏其事因今監利縣學訓導錢儒來北京請豫文刻之石豫謂學校教之地也然必有廟以祀先聖所以明夫道之有統也聖人之道豈有他哉因人之所固有者而道之耳仁義禮智人之所固有者也然而或失之故於人倫日用之常有不得其宜者是以聖人著於書學校之教蓋使讀其書以明夫理之本然推其用之當然而已矣教之既成然後出而用之財百執事之臣無不宜於其職學校蓋為治之本也然則修舉而程督之奚可以緩耶今潜山之學既新矣二三君子體上德而敦教事亦可謂至矣遊于是者當何如用心哉讀書以明道深體力行而推致其極使德成行修舉而措之真足以成天下之治斯可以無負矣若舍本循末淪於流俗之卑而無與於道德政治之實則誠有愧焉也矣故為之記以勉學者且使後之人有考焉蘇州濟農倉記君子之為政也既有以養其民矣則必思建長久之利使得其養於無窮蓋仁之所施不可以有間也蘇州濟農倉所謂建長久之利而思養其民於無窮者也蘇之田稅視天下諸郡為最重而松江常州次焉然豈獨地之腴哉要皆以農力致之其賦既重而又困於有力之豪於是農始弊矣蓋其用力勞而家則貧耕耘之際非有養不能也故必舉債于富家而倍納其息幸而有收私債先迫取足而後及官租農之得食者蓋鮮則又假貸以為生卒至於傾産業鬻男女由是往往棄耒耜為遊手末作田利減租賦虧矣宣德五年太守况侯始至問民疾苦而深以為憂㑹行在工部侍郎周公奉命巡撫至蘇州况侯白其事周公惻然思有以濟之而公廪無厚儲志勿克就七年秋蘇州松江常州皆稔周公方謀預為備適朝廷命下許以官鈔平糴且勸借儲偫以待賑恤乃與况侯及松江太守趙侯豫常州太守莫侯愚協謀而力行之蘇州得米三十萬石分貯於六縣名其倉曰濟農倉蓋日農者天下之本是倉專為賑農設也明年江南夏旱米價翔貴有詔令賑恤而蘇州飢民凡三百餘萬口盡發所儲不足贍田里多飢殍者周公復思廣為之備先是各府秋糧當輸者糧長里胥多厚取於民而不即輸官逋負者纍嵗公欲盡革其弊以惠民是年立法於水次置場擇人總收而發運焉細民任自送場不入里胥之手視舊所减三之一而三府當運糧一百萬石貯南京倉以為北京軍職月俸計其耗費每用六斗致一石公曰彼能於南京受俸獨不可於此受乎若於此給之既免勞民且省費六十萬石以入濟農倉農無患矣衆皆難之而况侯以為善力贊其决請於朝從之而蘇州得米四十餘萬石益以各場儲積之嬴及前所儲凡六十餘萬石有竒公曰是不獨濟農凡糧之逺運有所失及缺負者亦於此給借陪納秋成止如數還官若民夫修墟岸浚河道有乏食者皆計口給之如是則免舉債以利兼并之豪農民無失所者田畝治賦稅足矣是冬朝京師以其事咨户部具以聞上然其計於是下蘇州充廣六縣之倉以貯焉擇縣之廉公有威與民之賢者掌其籍司其出納每以春夏之交散之先下户次中户斂則必於冬而足凡其條約皆公親為規畫俾之遵守又令各倉皆置城隍神祠以警其人之怠且偷者宣德九年江南又大旱蘇州大發濟農之米以賑貸而民不知飢皆大喜相與詣况侯請曰朝廷矜念我民輟左右大臣以撫我思凡所以安養之術蓋用心至矣而又得我公協力以成之往者嵗豐民猶有窘於衣食迫於債負不能保其妻子者今遇嵗歉乃得安生業完骨肉此天子之仁巡撫大臣之惠我公贊襄之力也今濟農倉誠善矣然巡撫大臣有時而還朝我公亦有時而去良法美意懼其久而壞也則民何賴焉願刻石以示後人俾善繼之永勿壞况侯然之屬前史官郡人張洪疏其始末因醫學官盛文剛以書來北京請豫記豫觀成周之制縣都皆有委積以備凶年隋唐社倉蓋本諸此我太祖髙皇帝嘗出楮幣屬天下耆老俾積榖于諸縣以濟民亦成周聖人之意也厯嵗浸久其弊滋甚至於無所質究有司亦不之問而豪右兼并之家蓋無處無之則天下之民受其弊多矣豈獨蘇州哉今蘇人得吾周公以沈毅𢎞達之資推行天子恤下之仁况侯以闓敏勤慎佐之收其枉費以施實惠而民免於飢殍之患豈非幸哉後之君子因其舊而維持之使上之仁被於無窮而是邦永有賴焉則豈特民之幸乃二君子之欲也故為之記使刻置六縣之倉以告來者若其為屋若干楹所儲者若干石典守者名氏與其條約之詳則列之碑隂而諸縣皆載焉使互有考也獨崇明縣在海中未及建置遇歉嵗則於長洲縣載米一萬石往濟焉其為惠亦遍矣周公名忱字恂如吉安吉水人况侯名鍾字子律南昌靖安人其厯官行事之善當别有紀載之者此不著蘭所記泰和鍾沔㑹試來京師得邵陽教諭而以其父彥初之書來請曰復之先祖靜春惇厚樂善於物無所好而獨好蘭所居種蘭幾百本而日處其中襲芬芳而挹清潤囂然自得也當時以蘭所稱之逮先考舉善篤於孝行惟前人之美是繼是承乃請於故翰林學士金華宋先生得大書蘭所二字揭於向所居之室而增蒔焉曰見此猶吾先人之見也今不幸巳矣然故榜猶存乃作新室以揭之而種蒔加焉以復之愚何能奉承祖考之遺懿蓋以寄其遐思庶幾無忝焉可也願先生為之記嗟夫彥初其可謂能孝者矣古者孝子之於親思其居處志意樂嗜儼然如或見之彥初之所存其猶是也歟雖然昔之好蘭者豈獨以其花葉之芳潤也哉蓋以喻善也屈原之賦曰紉秋蘭以為佩曰滋蘭之九畹曰馳馬於蘭皋曰飲木蘭之墜露皆言其以善自修也彥初之祖考其意非以是耶夫謂之蘭所者猶云善之所在也則彥初之所當繼者可知矣思夫祖考所以修於已行於家者而勉之置身於善之中使言行無不善焉斯可以無負矣若止於好蘭則是能繼其迹而不能繼其心非孝之大者也嗟夫世之人有以善為不足為者矣有棄其善而入於不善者矣此原所嘆謂幽蘭其不可佩與夫蘭芷變而不芳者若是者蓋將危其身以辱其親烏足以繼承不匱耶彥初誠勉於善以趾美前人則慶澤之鍾於後者豈有窮哉故書其說以授沔使歸告于親以為蘭所記西軒記永樂十六年十月泰和南溪蕭孟廉作室於其居之東偏以為燕休之所既成盛賔客以落之而問名於豫豫取其所向而名之曰西軒客或疑之曰軒之所以西向者蓋局於地勢而然其所固在東也夫東與西有隂陽之别東陽也其氣溫物之所以生也西隂也其氣肅物之所以成也今子之名是軒不以其所在而以其所向不取其溫然者而取其肅然者不亦異乎豫曰豫之以西名軒者非無取乎東也蓋開門而望惟西之是見又安得取乎所背者而名之哉且西者東之對也氣之肅然者乃其溫然者之變物之成者所以為生之本也而又何異乎以人道論之仁即地之東時之春天之元也義即地之西時之秋天之利也君子之德仁為大然非義以制其宜則不為墨與韓者少矣故又曰君子義以為質今孟廉處而未仕也其施於家行於鄉泛愛如墨不可也少恩如韓亦不可也夫親疏貴賤輕重隆殺一以義制之然後其行無不宜豫之名軒豈獨取其向哉蓋欲孟廉之篤於義也孟廉制事盡其宜而藹然忠厚之意行乎其間則義而仁矣且義者其先君子之所服行者也今駢義傳在焉豫欲孟廉之篤於義以繼承其親孝也仁之行也茍義且仁則孟廉之德將不幾於全矣乎名軒之意如此果足異歟其亦不足異歟客無以詰孟廉曰善哉子之言也余請得服膺焉未幾豫復官翰林不至西軒者久矣今年孟廉之子欒㑹試來京師且使告豫曰西軒未有記請記之庶以成吾義也豫思之無以異乎昔之所言者乃追録之以為西軒記逰武山記武山為泰和之望其髙可六七里其趾環三十餘里扶輿清淑之氣磅礴鬱積乃蜿蜒東走為金華諸山始降為平地寬厚衍迤幾二十里而縣治在焉凡縣之所以産竒才珍物者皆兹山之秀也自縣城西北望之如龍躍如虎蹲方者如屏曲者如扆其隆然而起者如髙人正士端冕而立於朝尊嚴重厚之勢魁傑雄峙之狀環縣諸山無有也其中勝景十有四前代諸賢皆遊覽而歌咏之矣先四五年豫以外艱歸館於南溪蕭氏往來食息無不見山者屢欲往逰焉不果永樂二十年又以內艱服闋將之京㑹監察御史彭君百鍊出按廣東便道過故鄉其姪士揚典教英國張公之家亦謁告歸省三人私相謂曰吾儕非久處者也今皆欲省墓山下盍乘閒遂一逰乎邑中人士素願遊而未得者曾用勵袁叔景梁叔䝉叔車叔莊叔濟士揚之弟士淳士英楊希章蕭鈺劉舉善李浩劉鼎聞之皆奮欲往時九月七日也先戒秀才鍾沔歸南溪報蕭氏兄弟以明日㑹山中詰旦豫蓐食從百鍊士揚跨馬出門冒大霧以往士淳士英皆步趨二童子載酒以從出西郭舊城逶迤行田野間霧氣既斂衣髮如沐回視東方日已出數丈諸山在前雜卉滿目紅如丹渥碧如凝黛日光照映爛然綺錯引領望之蓋身後而心先往矣及金華皆騎而登二君又下南麓省墳墓豫則捨騎趨山下憩田家候二君不至乃先從士淳士英涉荒草披叢薄登天柱岡岡勢雄拔秀整彭氏祖教諭君之墓在其下祔葬者蓋纍纍然豫周覽行禮畢則循左山而下顧望二君始及山麓相與遙呼諸谷皆應又相期於沓壠豫復上馬先行至沓壠二里餘拜豫曾祖妣彭孺人先妣歐陽恭人之墓雨露之感實愴于心孺人則教諭君之姪女御史君之祖姑也良久二君從山脊下亦至塋域拜焉乃䕃長松藉茂草取酒而酌之酒三行望見同逰諸君騎者步者載酒殽者凡三十餘人如蟻附如魚貫出沒隱見林木間豫三人因不復騎從石坳循山半度荒崦至武山之麓二君從他道竟後豫諸君見豫來皆大喜舉善以馬相讓又上數百步勢頗斗絶豫乃下馬攝衣先登諸君繼之皆謂宿願得償焉攀陟至佑仙觀門外而南溪蕭暨鍾沔已先在聞人聲與道士三四人具衣冠出迎道士黃與元年八十餘紅顔白髮肅豫坐堂上飲茶畢笑謂曰相公貴人也乃亦好山水耶與之語皆厯厯可聽蓋與元嘗𨽻京師神樂觀習樂舞以祀上下神祇既老而歸故習見如此察其心亦淡然不茍為同異誠方外人也少頃二君至道士迎肅益恭乃𨗳入殿上謁浮邱王郭三仙觀壁上劉槎翁先生所畫竹豫先祖竹亭徴君國子學録蕭先生子所題詩具在題殿榜者則豫先考瓊州府君也殿前階下有大石二根據地中南北相距如熊虎突怒欲相摶然者退坐其上道士復取茶為獻乃循簷過集仙樓下側出觀東松樹間各就䕃班荆雜坐同逰最少者取酒殽遞進諸道士皆飲食之然逰山之興勃勃然不可緩矣既罷欲行蕭氏兄弟仲潔孟廉伯繁季廣季哲率童僕具牢醴自山後適至復取酒飲畢遂行道人蕭鼎仲前𨗳出觀門稍西去二百餘步大石側立道傍若偃半匏深廣可尋丈而髙如之曰此南巖石也由草徑低出崖下髙四五丈土正白泉水伏出草莽間散灑而下浮水面纚纚然明瑩如隋侯夜光久之乃滅曰此真珠泉也又下百步為龍王洞相傳有龍蟄焉視之杳然深黑水㳙㳙鳴石間下灌稻田冬夏不竭復循故道西行至雲峯寺故址敗垣亂石野鼠穴其中灌莽深叢麋鹿家其內寺始建於唐重修於宋殿堂門廡因山勢為髙卑煥然華盛而今廢矣寺後崖上巨石竦立幾百尺有片石偃覆其顛道人曰此飛來石也以足撼之有聲如鼓叔䝉士英循崖而升撼之良然復攀緣而上折而南登虎鼻峯巨石嶄嶄相倚蓋自下望之如圭植如笋立屹然在天半及臨其上亦不見其甚峻絶也自虎鼻峯北旋至武婆岡下西向有石甃深數尺蓋陶皮二仙煉丹井也舊云天欲雨有龜出逰井中禱者以為驗今水竭而龜不見云又西下為梵雲庵庵廢獨孤塔尚存最西為風門石是為西巖道人言勢險絶難陟降石嚙人足棘鈎人耳且常為虎穴因不復往時秋氣尚熱百鍊煩倦徑歸卧觀中豫與衆升武婆岡遇峻處輒相推挽至其頂皆黃茆弱篠無大樹四望清明極目力之所至凡數百里村落竹樹煙雲景物之態皆在舄履之下縣南境諸大山隱然如一玦贑江西來繞縣前東下而縣東諸小山相掩蔽不復見其去縣城內外官署民居浮屠老子之宫櫛比鱗次皆可指數因相與嘆曰真所謂壯哉縣也不為茲遊亦何能盡茲勝乎岡之北有石橫出崖上八九尺闊不踰尋仞其下嵌空峭拔數百丈不可注視使人心目眩掉道人曰此陶皮禮斗石也稍下百步有二仙石室禱祈者常至其處叔䝉叔景三四人即側足循躡下求之豫憚不往遂東下觀望陽石石髙丈餘正東向相傳陶皮二仙昔修煉於此每旦坐其上視日景行吐納之術故成仙飛去然不能知其果然否也頃之叔景等至告豫曰石室中寬可坐二十人此有蛇行小徑可往保無他豫終憚不能往孟廉弟孟勤亦好吟而喜逰是日迫暮始能至深以不得偕行為恨乃列坐石傍厯道其所逰處惜猶有未盡而皆以事不可留士揚以下稍稍引去留者獨豫與百鍊四五人仲潔喟然嘆曰前三十年吾家尚無恙諸父自運副公而下及鍾沔之大父舉善皆以文藝相髙於時先生之祖竹亭徴君叔祖御史公劉槎翁先生與其弟東原公杭州通判楊公暨學録君皆篤誼而好逰諸父皆尊禮焉幸一顧吾家即欵洽連日具酒殽設樂請逰山中遇興所適即留止舉酒作樂簫鼓之聲出雲端不知者以為仙也時佑仙雲峯皆盛爭迎致之觴咏必旬日乃已當時逰山諸作皆在而先生長者不可見今吾兄弟復得相從為此逰既不能無盛衰之感而諸公亦不能從容如曩時可慨也須㬰月出蟲唧唧鳴草間蕭氏僕告饌具乃請入宴集仙樓下百鍊問道士劉後峯昔所謂天燈果有乎對曰嘗間師云有之蓋冉冉自天而下赤而明既墜迹得之乃紅葉也豈神仙變幻而為此乎今無之久矣豫時甚困不欲飲仲潔孟廉數舉酒相勸酬又使伯繁季廣季哲孟勤夾豫二人强飲之暨與沔以嘗從逰不敢逼但迭斟酌以進孟廉謂豫二人曰幸與君有世好惜不能長與為樂也奈何深拒乃數為舉釂歡動一座後峯亦使行童胡碧虛輩唱青天歌奏仙樂以侑歡然豫醉不能詳也觀踞武婆岡下若負扆然惟南向空濶其三面皆深松密林夜分酒罷忽有風颯然殿堂鈴鐸皆振響羣鳥亦驚號林中客悚息而坐疑有異久之乃定遂解衣卧殿上戒僮僕五鼓當發後峯私謂蕭氏兄弟曰山中無此客久矣今幸有之道士獨不能具一食乎必留之乃恐諸僕曰比虎多每日髙乃可出僕以為信然不敢夙興豫亦昏睡不復省憶及覺日已上道士具盥櫛請坐堂中酒六七行既飯而後去仲潔兄弟暨諸道士相送出觀門曰先生茲逰蓋久而始遂當為之記使山中有考也豫應曰諾既下山豫與百錬皆有不忍别之意而僮僕欣欣若有得道路觀者皆歎羡知其為逰山歸也是冬豫起復赴北京縻於職務數欲記之不暇然常往來於懷今年百錬出按淮上士揚除國子監典籍暇日道及之以為不可復得豫笑曰山水之樂固非奔走市朝者之所能兼也然豫輩亦老且病矣他日倘得乞身而歸則斯逰庶可再乎因追記之以俟且以寄同逰諸公而傳諸觀中使知豫之不忘茲山也惇本堂記吾邑袁氏故仕族世居城西之汝南坊至叔景始營别墅於西郭故城下土地夷曠竹樹茂美田園池沼四望連屬迎其父仲先甫居之仲先甫端厚謹靜凡世俗紛華之事皆不足動其心惟篤好樹藝課僮奴日致力其中而杖屨從容閲視焉甚樂也歸則坐堂上訓諸孫使學曰學立身之本耕養生之本其何可怠哉因名堂曰惇本之堂今年叔景㑹試來北京為豫道之而以記為請古者無無田之家亦無不耕之人父師少師坐於里孰而教之夫既有所養且有所教是以浮薄之風弭而孝弟之行成自秦以來兼并日甚貧者無一壠之田則僦耕於富者而嵗入其利富人不親稼穡而衣食以饒田制既廢里孰亦弛逸居無教故日入於弊守禮服義之意少詭欺薄惡之習勝矣漢興有孝弟力田之科以崇本抑末我朝因之益重遊惰之禁蓋矯積習之弊而復之於古數十年來日趨於盛以豫泰和視之惰民廢田無有也則他州縣可知矣治化之美何其至哉然人有由之而不知知之而不能兼備者則仲先甫之達識篤志其可多得耶抑嘗觀夫世之人其家之所以興與其子孫之所以賢皆祖宗示法于前然後子孫繼之無乎前而能善其後者不多有也然則仲先甫之勤身殫慮如此豈直為一日計哉為其後者升斯堂思其名踐其實服田力穡讀書勵行以自立於太平之世使人皆稱善人君子則為袁氏之賢子孫而仲先甫之志得矣豫家相距為最近數畝之田相接先人之遺書具在也方戒諸子亦致力於斯而豫竊䘵而仕不得以考其成然今老且病矣他日倘乞身而歸當從仲先甫往來於阡陌之間樂嵗事之豐成觀少者之有立相與鼓腹咏歌聖化以繼康衢之謡而傳於久逺豈不美哉姑為之記以俟順庵記豫友郭公承名其藏修之室曰順庵及來北京求豫為之記㑹豫有史事不果為久之公承得番禺教諭當之官乃復以記為請豫因為之言曰天下之道大自父子君臣夫婦長幼朋友以至作止語默進退周旋之微莫不有理焉人之所以為人而無愧于上下者順是理也夫理出於天具於人心而散諸事物非若聲色臭味之有以動人而人必由之而不逆者蓋為人之道當如是也然則人倫日用之間有拂乎理者則非所以為人矣孔子曰人之生也直蓋謂此也雖然人皆有是理而或不能由者氣質之蔽物欲之害也故聖人有教焉教也者裁其過引其不及使皆順乎理之正而無悖者也則夫教者其任豈細哉譬若為器然器之大小美惡視其範故欲化民成俗之君子必責成於教官而任夫教之責者必當先有諸已人之可使順夫理由吾之不悖以表率之也五常之道萬物之宜有一未順焉而欲學者之不悖不可得矣然世之倒行逆施者常比比也若豫公承之所以名庵而自勉者其知所謂立本者乎勉哉公承必期無愧于上下而有以化民成俗然後為師道之成若衎衎施施順乎流俗之所喜而拂於理焉吾知公承不為也故為著其說使揭於庵之壁以為記榮養堂記河南按察僉事劉咸士皆豫同邑人也其父仲良甫與其母皆幾七十矣士皆數欲迎致河南以其䘵敬養焉輒報之曰吾老不能逺涉以就養爾善事國家使吾得安於田里醉飽咏歌以自樂賢於日食三牲逺矣士皆謹奉教不能忘然終以不得致養為慊㑹朝廷詔下凡親老不克就養許分䘵奉於家士皆大喜即分其䘵之半使諸兄弟請於鄉邑以備養邑中長老皆為仲良甫榮之乃相與名其堂曰榮養之堂士皆來京師道其事求豫文為記豫惟古者人有常業皆足以事父母然猶貴於䘵養者蓋欲以得於君者為親榮毛義府檄攝令耳非朝廷之命䘵厚位尊也然其喜可見者蓋為此况受天子之命居顯位食厚䘵如士皆者乎則其榮可知矣雖然欲養者人之同心也然而有得不得此則繫乎天豫邑仕者殆數十䘵皆足以及親而多不待養能如士皆無幾人蓋人之所欲與天之所與者適相值則斯堂之榮豈偶然哉昔者先王之勞使臣也以其勤於王事不得養父母探其情而歌咏之此所以感人深也四牡之詩是已今士皆當風紀之任為天子按察一道吏之賢否民情之休戚皆得上聞而進退罷行之雖不得躬事其親而得分䘵為養曲盡其情如此國家仁厚之澤逺過於成周豈非遭逢之幸哉則士皆所以圖報者當何如其至也亦曰盡其職而已矣盡其職者莫嚴於自治蓋其身正斯可以正人使一道之吏治皆宜其民皆安且樂則職斯盡矣忠孝兼備此固仲良甫之志若然則士皆不獨以䘵為養以志為養也豈不益榮矣哉今制藩憲大臣滿九年無玷缺者皆封贈其親士皆有名於河南今亦將九年仲良甫之進於榮顯可冀也故為之記以俟審幾齊記月池彭原宏先生與豫先公為內外兄弟相好也嘗請名其齊居先公名之曰審幾且為書二大字使揭於楣而未有為之記者先生不鄙豫使記之豫辭不獲則使豫子䆅以書速文甚勤先生行尊而德修顧豫小子何足以辱命然不敢終默也乃强為之言曰人之所以貴者以具是性也性無不善然既寓於氣則有時而不善矣是以君子致察焉致察者何審其幾而已幾者何事之始萌意之方動善惡之所由分也於此而審之其果善乎果不善乎善者行不善者止則事皆天理而不失其可貴者矣此曾子子思之所謂慎獨周子所謂幾善惡者也君子上達小人下達蓋决於此嘗究而論之性之所有者仁義也仁義之實事親從兄是已孩提之童無不知也及其血氣既勝私意一萌不知審察而防範之肆其惡之所至父子相夷兄弟相賊其禍有不可勝言者推而至於萬事莫不皆然其始也一念之失而已燎原之火起於螢爝之微决堤之水始於蟻穴之漏嗚呼可不慎哉此君子所以盡其心也先生溫厚和平言動必以禮其在宗族鄉黨未嘗以非道加諸人故人亦無怨惡之者其能審於善惡之幾而無失也可知矣今年已六十九而惓惓以記為屬必使豫致一言非好修不倦之君子歟惜豫不足以言之也姑以是復先生以為記且與鄉族之為士者共講焉奉親堂記楊氏於泰和為大家自宋以來已有名衣冠文物之懿他族罕比其始居縣治之東西至元季乃散處焉其居髙壠者猶以聲望臨一鄉髙壠之裔有曰敏德知讀書為善而篤於事親治所居堂而名之曰奉親之堂所以侍其起居承順其顔色調適其飲食衣服之宜者無不盡心焉今年春以父命輸稅來北京既畢事矣乃以堂記請於豫豫家縣城西去髙壠四十里而與其父彥實君相好見敏德之孝如此則豫心安得不為之喜乎憶豫嘗過髙壠而觀其所居之勝羣山蔓延繡列綺錯環之以喬木帶之以長溪腴田深池彌亘乎四望大抵多楊氏之業也則敏德所以奉其親之口體而娛悅其耳目者蓋有其具矣然養其身固難也能不違其心又難矣孔門弟子之能孝者衆而莫有過於曾子則孝其親誠有大於口體之奉者是故敬其所敬愛其所愛述其所為之事而繼其欲為之志君子宜務此矣雖然身者其本也父母愛子之心豈有窮哉癢痾疾痛舉切其身吉凶榮辱休戚系焉不能愛身而自陷於淫僻以憂其心而隳其令名則何奉養之足樂哉是故一出言而不敢忘父母則必無非道之言一舉足而不敢忘父母則必無非理之行善積於身行於家而達於鄉黨州閭身享其安父母受其榮充而行之而益盡其大者焉則雖啜菽飲水其親樂矣况肥甘輕暖之充備者乎豫誠愛敏德故願以是為記古之君子亦人也在乎勉之而已敏德其勉乎哉惠宣堂記雲南去京師萬餘里蓋古荒服之地也我太祖皇帝既平天下不鄙棄其民命將出師往撫定之因其舊設府縣以化誨焉而臨安實為大府其所統四州五縣九長官司有地千餘里古公侯之封不過也而昔之為守者率因陋就簡廨宇庫敝不足以稱一郡之望洪武十八年通判許君始來是邦乃撤而新之門堂廊廡庫廏庖湢燕嬉之居寢息之舍靡不畢備蔚然改觀逺邇歡慶厯三十餘年而莫有繕治者於是稍稍頽敝永樂二十年知府陳侯自思南改臨安始至問俗之不便與事之不治者次第罷行以利民周視廨宇大懼益廢壞不可治乃修其敝漏補其缺敗擇其腐者而易之然材取於山力取於凡役之在官者而郡人不知擾既繕完矣名其公堂為惠宣之堂蓋曰天子之恩惠由是而宣布之云耳今年春以述職來京師因請豫文為記將刻之石以貽久逺豫謂陳侯可謂知本者矣夫天子有惠下之仁而不得親布於民故擇守令而任之是豈私於守令哉凡寒欲衣飢欲食幼者欲長老者欲安寃抑者之欲得其平勞苦疲頓之欲得其休息者皆於守令乎望矣此設守令之本意也然令有不職守得以劾去之無難也是一郡之休戚係乎守也明矣然則為守而能布惠以逮下非其職之宜也哉厥今為府百數十為守而皆能盡職以惠下豫不得而知也獨推陳侯之心如此則臨安之民受其惠可知矣夫既能盡職以惠下而又昭揭以貽後後之登斯堂者而視之不惟知前人興作之功思葺治於無窮而皆思盡職以惠下則臨安之人受惠於久逺者皆陳侯啓之也故豫樂為之記陳侯名禮字正言豫同邑人以進士發身許君先為贑州知府左遷為通判于臨安皆有文學才行聞于世云耕讀堂記入泰和北門市中百餘步曰具慶坊從其下折而東幾五十步有堂焉豫友蕭所耕之居也所耕有二子長曰鈺為鄉貢進士次曰琚亦讀書為學所耕勤治其家無世俗之好有田若干畝在北門城外皆上腴躬率二子課僮奴耕植其中稍暇坐堂上二子展卷吟誦所耕憑几而聽之其意蓋甚樂也因名之曰耕讀堂堂在居室之右賔客往來者皆止前堂獨文學之士得至焉豫家居時常過其父子即請豫坐其中講論之暇輒出酒獻酬又使其孫翰捐拜擎跽以勸客必盡歡乃已勤厚之意真實之情藹然可尚也間嘗以堂記屬豫豫未暇作及來京師思所耕父子而未能忘也乃為之記曰古者無無田之家亦無不耕之人而閭師孰師之教相習也彼既安于農畝而不昵于市習故能養其德性而成其美才是以俊髦之士多有焉此邦家之基而比屋之所以可封也及秦用商鞅廢井田之制富者連阡陌貧者無一壠之植故人無常業而喪其良心及蘇秦輩出鼓其邪說以攻戰諸侯荼毒海內其禍皆本於此也至於後世以四業限民曰士農工商於是為士者賤耕稼為農者廢學問賤耕稼故不通衣食之源率虛浮而無實廢學問故不知禮義之方率粗鄙而無用無實者多近利以敗名而不知自守無用者多降志以屈已而不知自立其所由來也逺矣故君子論王政而必本於孟子之言蓋確論也所耕父子既勤於耕稼而又力於學問其亦古人之用心也歟其所以養其德性而成其美才者豈常人可比哉雖然泰和之秀民蓋多矣其勤於耕稼者亦不少也使人人而力於學焉則仕者皆知小人之依益有以厚國家處者皆篤於君子之道益有以隆風俗其美又非他邑之可比矣故為記耕讀之堂而併致其意焉亦豫為鄉人者之所願也繡峯書閣記王生禎者金溪人豫同年王公時彥子也生以父命治屋於繡峯之下以便學而學宫縣治夾焉峯之勢髙圓秀整岌然如端人正士冠冕而立於朝每春氣既至花卉繁盛日光照映五色明絢扶輿清㳤之氣蓋萃於此生既作重屋以聚書日吟誦其間期至於學成而後止今年省覲來北京其兄監察御史裕名之曰繡峯書閣生以豫為父執也來求文為記嗟夫生之志誠可尚也哉書者道之所寓也聖人之道不行于是載之書故學者欲求道必本於讀書然必有以庇其身而快於其心乃能究聖賢之微言以探道德之至奧不然而能篤志於學者蓋鮮矣宜乎生之為此也然豫嘗觀之書之所載其為言也博矣生之求之亦知所務乎君子之學莫急於為仁聖人之道莫有大於仁者而行之有本焉本者何孝弟是也生之所務宜莫切于此始于事親敬兄推之以忠君悌長又推以仁民愛物而至於不可勝用則讀書求道之功至矣讀書而不至是奚貴於讀哉雖然君子之藏修逰息皆學也生不見繡峯乎其安重不遷者仁之體生物悅茂者仁之發也學宫則教之所出縣治則政之所由行也教也者欲人之事親敬兄忠君悌長仁民愛物而政者所以正人之不能是者也皆仁也生之接乎目者皆足以資于學而持之以必為之志加之以不已之誠則其成也可必矣生之父置生于此誠可謂善教也哉世之讀書而不務此者有矣欲纍之也君子之所病也生之質願恪簡靜庶幾不逐逐於外者故豫以是望焉生必勉之母亦為君子之所病也是為記篤愛堂記長沙令廖子謨豫故人潜作先生子也始取進士入翰林為庶吉士以聰敏能文章得名既而願宰邑以自效乃授頴上令改之長沙長沙大縣民罷而事殷其弊之積久矣子謨疏煩抉滯一以恩惠撫民民皆說從凡其所令無不如志績用有成藩憲二司及朝廷之達官顯人有事於長沙者莫不譽之㑹命下審核守令之賢否於是巡按御史藩憲大臣列言子謨能愛民有清正之行其治績出儕輩士大夫聞之皆以為宜去年冬子謨述職來北京豫與語及之子謨謝曰清正愛民令職也生勉焉恐未至何敢以纍稱數豫韙其言而嘉其志將歸則來告曰退休有堂而未名敢以為請願先生示教焉豫名之曰篤愛之堂夫令有地方百里百里之民辟若其子也雖有愚良之不同然以父母之心視之一於愛而已愛之則必思所以惠養之是故清其心正其誼而去其為民害者皆原於愛也古之循吏蓋如此彼殘害其體膚困苦其心志勞弊其力而殫極其資病之不恤而惟欲是從無愛民之心者也此尹賞劉澡之徒所以見譏於後世夫愛者仁之施君子固厚於仁矣孟子所謂天爵莫先于此子謨以能愛民馳譽于上下既有仁聞矣宜益加厚於仁愛之入人愈深民之被其澤愈博則天爵益修天爵益修則人爵之顯者舍子謨奚適哉豫故以是名堂而又為之記庶幾進德之勵云耳畫苑記豫泰和山水縣也縣北皆坡陀小山秀列而內向若扆然小山之外稍逺則山頗髙勢益雄秀城南為龍洲贑江走其下江之隂長洲橫亘洲外為小江江之外亦多平岡曲阜南盡縣境則多大山聮絡乎東西登快閣望之周回三四百里隱然如大環其中皆平田沃壤民間錯以居修竹茂樹列植交䕃遊人之往來耕夫樵子之作止風帆浪舶估客漁父之上下牛羊之散牧汀蕪沙草之映帶禽鳥之戾于天泳于川者皆回翔而自得四時朝暮雨暘明晦其景物蓋無窮而皆豫之畫笥也其接于目者豈不快然足樂哉及來京師居禁近職華要昔人所謂如在天上豫得濫處焉信莫大之恩非常之遇也間嘗思之人之出處有不同而其所樂亦不可得而兼有然鄉邑之舊雖欲忘之亦安得而忘之哉故人張子俊知豫意曰是不難當使公兼得也乃時時為寫之山川景物大小畢具東甌謝庭循又為作仙人二皆浮遊汗漫中曰是蓋逍遙于塵俗之表者積十餘年得四十幅乃命工裝潢成帙公退無事時一玩之昔之所見倣佛在目超然而神㑹怡然而心暢於是使豫得山林之樂於京邑之內而遂其所樂者非此畫也耶然復念之吾邑之山川景物自昔視之有足樂者今去之久矣其盛衰榮悴有不可得而知矣夫固繫于為縣者何如也果得賢者而臨之其政之仁足以得民和致天澤草木昆蟲當益暢遂山益秀而水益清其可樂加焉而今之所聞異于是則凡昔之可樂者將不為憂傷慨歎之資乎邑之人將不有羡夫逍遙之遊者乎故因記斯畫而併著之亦以見吾意之惓惓於吾鄉也孝義堂記孝義堂者江隂朱熊維吉所居之堂也堂而名之以孝義者何所以著其善也何謂孝蓋其母嘗病篤醫弗能愈維吉籲天請以身代再刲股內和藥以進疾乃愈兹其所謂孝也何謂義嵗嘗荒歉維吉念民食之艱而親之心弗樂也出粟四千石以歸有司賑給之民用不饑而其親歡焉茲其所謂義也朝廷既寵褒之江隂士大夫於是取以名其堂維吉來謝恩闕下因謁豫告曰熊之所以為此者誠為親發也豈欲以自表哉而吾邑士大夫乃用以為名熊不得辭則願學以副其意先生幸賜一言熊得服膺焉為惠大矣嗟夫維吉子知天之所賦於人者乎天之所以賦于人者莫大于仁義仁故能孝於親義故能急於民皆天理自然之施也天下之人莫不有是心宜天下之為親者無不樂而為民者無不遂矣然而親有不樂民有不遂者私昵之情勝愛吝之意篤也率是而不顧則仁義之受于天者安得不為所賊哉今子於親而能盡其情於民而能厚其施天之所賦者可謂不悖矣以是名堂不亦稱情也哉然嘗聞之君子之道當充類以極其餘不以所至者為足也是故孝雖始于事親充之以敬身而成親然後為孝之至義雖急于賑民推之以制事而宜民然後為義之盡子欲有以副名堂之意其尚加勉於是哉曩豫聞子之孝而見於吟咏矣今七八年而子又以義聞是子之進善不已也進而不已則他日之見當又有加于是者矣姑為記斯堂以俟素軒記江隂陳安孟寬名所居軒曰素軒因其友禮部主事顧謙來求豫記曰孟寬為其邑富家然性淳質躬節儉資雖饒裕未嘗用以自豪今之所居其棟宇户牖非有丹碧藻繪之觀凡几案諸物之陳于中者亦非有雕鏤靡麗之飾至於飲食衣服非必天下之珍竒然後能適于口而宜于身蓋取足焉耳任其天性之真而不汨於佻巧之習其為人如此于是取以名軒名之者何蓋湯盤周鼎之義庶幾久而不變也嗟夫孟寬誠所謂好修之士哉夫好修者恆重乎內而輕乎外重乎內者不以已性之善而為外所移也輕乎外者不使物之在外得以動乎吾中也彼居處服用誠何足計哉而人不為所纍者或寡矣孟寬泊然安其分之正淡然率其履之常而不遷於外物謂非好修之士其可耶周易之賁其文可謂盛矣六五之所以終吉者以其惇本尚實得賁之道也惇本尚實而終吉則逐末浮誕之不能保其吉可知矣豫於是豈獨嘉孟寬之好修而已哉知天之佑之可必也抑嘗觀於古人矣穴居而野處簣桴而土鼓燔黍而炙豚其至德純行誠有不可及者至于後世居室之壯器用之周服食之備皆已過於古然侈心日滋而德則未至無怪乎其終吉者之少也孟寬名軒以此不亦古之心哉勉而不已其獲吉有已耶今以發粟賑飢特勑寵褒為義民皆履素之餘也豫為之記而牽聮書之亦以風夫未能然者孝義堂記正統六年上在位七年矣四方無虞萬物咸遂尚慮有水旱之灾詔有司積穀以為備閭右之民感天子之仁皆爭出粟以佐官有至二千石以上者朝廷降勑旌之為義民勞以羊酒而給復焉江隂周圭孟敬與兄孟德謀曰先祖有美而弗知不明也知而弗傳不仁也昔吾祖伯源公惇德樂義以大其家敷施於人博矣吾父繼之而弗克永世今吾兄弟幸而有餘積皆祖考之遺也生既未嘗沾一命之榮死又無以垂不朽豈非為子孫者之過哉即白於巡撫侍郎周公願出粟六千石以歸有司俾自為斂散庶幾斯民永有利焉以是為先祖請命使得假寵於地下子孫實嘉賴之周公重其孝義具以聞天子為遣使持勑追號伯源為義民而旌賞孟敬亦如令江隂士大夫遂取孝義名其堂孟敬來京師謝恩闕下退而告豫以名堂之意且以記為請憶前刑部侍郎段公時舉為豫言周氏有詩禮之訓家雖富未嘗用以自豪振人之急甚于為已豈惟細民恃之以不飢凡官府有所趣辦而未之能得者多資仰焉豫識之今識孟敬而觀其所為與其祖之德信夫善無不報而仁者必有後也抑聞之孝為行仁之本孟敬之義乃所以為孝孝莫大於成身與成其親成身成親豈有外于仁義之道哉孟敬于是二者既知所務矣尚益充之使仁義不可勝用然後為至易曰積善之家必有餘慶積之不已則福之萃於家亦豈有已哉孟敬勉之抑菴文集卷二
