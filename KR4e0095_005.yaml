body:
  text: 抑菴文集卷五明王直撰序贈御史彭君歸侍親序君字百鍊彭氏世居泰和月池為大家直之曾祖妣則君之從祖姑也二家皆以德義相上而姻睦之行尤篤直少時嘗獲拜君伯父介翁先生與君之尊府和林先生二先生皆直大父行博學淳行表然為望於鄉邑其所以教愛者甚至先生既沒而諸叔兄弟尤相厚不啻如同姓其篤誼如此若君與今國子典籍士揚則又有學問相長仕宦相規之益不特世好也君為監察御史以祗慎直諒見重於世凡其所至吏畏而民愛之既九年當大用乃以母老乞歸養而朝廷許焉若君者可不謂賢矣乎夫仕至九年有成績而無過舉可謂難矣其進髙位享厚祿人之所欲也於是遂有忘其親者惟君子審於義利知事國之日長而事親之日短也然後能適進退之宜而全忠孝之道君誠能乎此異乎貪榮而忘親者矣獨私念之君子之相為益也蓋未嘗相逺也直之受益於君久矣今一旦去之其能釋然於懷耶雖然猶有望焉古之君子既仕而歸則以其道教鄉人子弟使事親必孝事長必敬處兄弟必和待朋友必以信持身必守禮而畏法治家必儉以勤凡一言一行必夲於道斯一鄉之風俗淳賢才盛矣是以孔子貴乎魯有君子也昔者直之叔祖啓翁先生嘗為御史老而歸其身未嘗違道其待人甚嚴而教學者甚篤後生小子望而畏之銷其非僻之心而由於禮義之途也不少繼前修以儀後輩非君其誰望而直之諸子亦以纍君使必如前之所云者則直雖逺其受賜多矣若猶為非道而有愧於前人直雖不敢怨然於君之義何如哉以世好之篤相知之深故切言之而謹書以贈焉若夫事親之樂與鄉里之榮則諸公之贈言備矣此不著贈康評事赴任序康頮宜清以永樂辛丑進士得大理評事當之南京豫與之同邑且與其尊府紀善君游相好也故於其行而其表叔尹先生復道求豫文贈之豫謂評事七品官耳而以詳刑為職其上有卿有少卿有丞有左右寺又有正有副而評事次焉然審獄之當否而尼行之則自評事始其任甚重也凡獄之麗於刑部都察院者其情之枉直與其罪之所當皆熟究而詳議之矣然不自以為定也必取覆於大理若自評事而上皆以為是焉則獄成矣刑之重輕莫得而易也然而當也人不曰大理寺而曰刑部都察院及其枉濫也則不曰都察院刑部而曰大理寺蓋以其經大理而定也夫以七品之官而與責望之重如此可不懼哉然天下之事莫不有理焉彼入於刑者皆拂於理者也理散於萬事而皆具於吾心茍正其心而不以物自纍則萬理明備雖治天下不難矣而獨難於治獄哉是以君子貴窮理也今大理評事漢之廷尉平也宣帝置廷尉平以讞議而當時决獄號為平然而君子已有招權召亂之慮何也蓋詳刑其職也非欲茍為異同也惟其是而已矣若亂其是非以招權利使刑罰失中民無所措手足則愁怨生而禍亂滋矣故君子尤慎之宜清明聖賢之道蓋將以行之也豫知其能善其職也審矣然猶言之如此者蓋愛厚之至云耳宜清其然豫言也夫其亦以為厲已也夫曾子貫挽詩序曾公子貫以洪熙元年五月卒於家既葬士大夫皆為詩以挽之今五六年尚繼有作者其子兵部主事士宏持以求豫序嗚呼公之得此於人不茍然也宜豫文以發之蓋公敦德樂善行成於身儀於家而重於鄉閭平居閉門娛意書史與世俗絶往來非婚姻家弔祭之禮未嘗一出里巷意有所詣則褒衣危冠徑往而遽返足迹不一至公門凡賔客雜坐侈放以為樂公不與機變之巧不萌諸心士宏既貴公處之恬然不變節易意平生言行蓋無違於理逺於義者若公可謂篤實君子矣宜乎諸公哀惜之不已也仁宗皇帝即位之初詔廷臣任職者皆封贈其親公得封承德郎兵部武庫清吏司主事配楊氏封安人皆賜敕命於時吾邑仕者十數人然父母身受其榮唯公而已皆交口譽歎以為宜士宏將奉勑歸拜於堂上而公不待矣此亦其可哀者也雖然豫之哀公者蓋尤有意焉古之君子所以重者慎修其身而已矣不以馳騁豪放為愈也身修則化行於內而達之於外雖不馳騁豪放人固重之矣然而世俗之所謂君子者率略乎此而馳騁豪放則加焉至於有所挾則又加焉彼夫慎以修身者往往笑以為迂於乎自化民成俗者視之其在此乎在彼乎使人人皆如公則鄉邑之淳風美俗豈讓於古哉如公者既不能多而又卒矣此豫所以哀公也故歷道豫之意以為挽詩序觀者其亦有感也夫劉仲髙挽詩序豫友劉仲髙既沒葬於龍州之南園其子渙服闋來京師以當時士大夫所作哀挽之詞求豫序蓋仲髙居泰和縣城東門而豫家城西相距僅五里豫未仕時已與相往還仲髙讀書有材藝其襟度夷曠而神氣充恱於人間可喜可樂之事大略備之邑中之人鮮有能及之者暨豫竊官京師仲髙又治别業於江南有田園池沼竹樹之勝其下小江東流與贑水合重洲復渚綿亘乎其西仲髙時時與客往遊擷芳擊鮮釃酒而酌之醉則依密林藉茂草以自適凡逰人行侣之去來耕夫牧子之作止風帆浪舶淵魚水鳥之出沒隱見皆在乎目睫之間其心蓋超然樂也豫聞之有不可及之歎其後連丁內外艱家居仲髙數過豫相慰藉意甚厚及服除則又數來與豫逰或邀止其家彈琴奕碁飲酒歌詩相得益歡甚豫或以病止酒仲髙則喜強豫飲豫難之則連引滿以導豫因笑曰先生將去矣他日思與吾飲不可得也豫感其意數為舉釂至大醉而罷及來京師居閒無事追思昔逰未嘗不慨然念之及朝廷有賜告之令極欲一歸掃先塋逆計故人之能相樂者則屬意仲髙豫謀至今未遂而仲髙則棄豫死矣豈不深可惜哉嗚呼安得復有曠懷雅度如仲髙者則豫之序此詩其可已耶天下之人多矣有生而人惡之有死而人莫之恤者仲髙生則見重於人死則見憶於人又形於言詞以惋惜之如此則賢不肖可知矣仲髙有孝友之行已具於銘其墓者此不著惟書豫之意以為序以見豫之不能忘情也贈陳照磨序陳植公培豫戚也家世業儒公培亦以其學教鄉人子弟縣大夫以為儒者則賢也薦於朝諸大臣以吏牘試之衆皆曰非其所長公培援筆成章命意正大而行文暢達其纎微委曲雖未盡合於吏之所為然亦非吏之所能為也衆皆以為難擢置優等既而授福建按察司照磨將行吾邑仕者皆屬豫贈以言曰此公培意也於乎豫天下之迂者也學不及於古人才不適於時用故當時達者無取焉公培今駸駸然達矣而何取於豫言又時俗多好諛諛非豫所能也以迂闊之性為抗直之言而欲告夫達者所謂方枘圎鑿惡乎能入哉然念公培世業與豫同則其迂未必不同古所云同氣相求蓋以類合也公培或者誠有取乎試相與言之君子之學以明理也理者制事之夲天下之事無窮而皆有理焉君子豈能事事而習之亦觀其理而已孔子嘗為乘田委吏矣豈嘗習夫乘田委吏之事哉然而畜牧蕃㑹計當者何也論夫理之當然者耳公培今去為照磨照磨以閲案牘察謬悮為職其事非一也然非有主乎中則亦豈能不眩亂哉徐徐閲之而灼之於理理有所不通則事之謬悮可知非徒閲案牘為然也若事有專制者亦如是焉已矣故君子不患事之不立而患理之不明理果明矣則何事不可為世之達者類以儒為迂此豈知儒者哉然天下之理無窮君子之學亦貴於無已照磨之職非甚繁且劇也公培以其餘力而又加學焉必理無不明事無不當使人皆知儒者之可用則夫以迂為病者或庶幾少瘳乎豫於公培誼不薄願相與勉之公培其以為然哉送王御史還南京詩序士之於世能知道者固難矣其能體而行之又難也夫所謂道者仁義而已盡理之純之謂仁適事之宜之謂義為士者明乎此體之於身施之於事使所存所由皆當理而無私適宜而不謬則謂之士無愧矣而世之為士呻吟於占嗶之間以求知此者皆然矣其體而行之則未皆然也故有始承一命之榮而竊可行之勢於心已傲然矣其發於事矯然矣夫傲然者惡能以當於理而矯然者亦豈能宜於事哉彼始命既如此若至於公卿大夫之位其傲然矯然將益甚則於仁義如何哉故豫深嘆其難也雖然仁義者非特見於顯蓋無往而非是也於夫閒居獨處之時而盡致知力行之實持養之久出於自然一旦顯而用之則豈有如前之所云者哉此士之所以貴乎豫養也孟子之論尚志是已豫友王鉉彥鼒其始家居時已有志於是矣及為御史七八年其志蓋未嘗不在是也故事經其决者人皆謂不寃而與之處者莫不敬且愛焉非其所存所由之當於理宜於事者何能致此哉充而極之則至於顯位其道可知也今年秋來京師將歸凡知已者皆惜其遽去而不可留也於是左春坊大學士楊先生率同郡之士十人取唐人詩離心何以贈自有玉壷氷之句為韻賦詩以贈之觀其所取之句則其善彥鼒之意又可知也詩既成命豫為序故書豫意如此以冠篇首既以美彥鼒又將有所勉也安成彭氏族譜序安成故文獻邦士大夫以詩禮名家者蓋多彭氏其一也彭氏始家番昜在宋之時有汝礪者擢進士第一官至尚書其德望顯於天下尚書之後有忠泰者仕安成施德在民子孫因家焉安成之人以城南髙街里讓之號髙街彭氏族日以蕃傳九世乃析居梅樹下又七世則復徙中溪其居白石簮石智溪蒼山上湖者皆髙街裔也至今蓋二十世衣冠而仕前後相望誦詩讀書惇本尚實比比皆是其始一人之身厯世之久子孫至於纍百十此豈無自而然哉豫聞之魯叔孫穆子曰太上有立德其次有立功其次有立言雖久不廢然則故家大族之所以久而盛者可知矣德蓋其夲也德莫大於仁義祖宗以是啓之子孫以是繼之推而為功業發而為文章卓然表見於天下則足以亢其宗而垂裕於後矣彭之受姓命氏厯世至尚書好學樂善忠敬孝友以聖賢之重自任繇安成以來領使職典方州為丞佐教庠序者相繼而不絶今育敬進唯為廣東浙江按察僉事皆有名其所以啓之與所以繼之者如是其偉矣安得不久且盛哉育敬初用薦入翰林為編修與豫處者數年久之進唯又入刑部為主事遂拜僉憲則正統丙辰豫㑹試禮部時所取士也故其兄弟皆厚於豫豫亦深愛重之今皆當盛年其所自立將不愧古人而足以亢其宗要在後之人善繼之耳善繼而不窮則彭氏之盛亦無窮矣育敬修輯此譜而以求豫序故豫序之以致豫期望之意是亦相厚之道也桃源蕭氏族譜序泰和桃源蕭氏系出梁國子祭酒子雲子雲齊宗室仕梁久之棄官至臨江之玉笥山十七世至伯原知泰和縣喜桃源山水之勝因家焉四世至漢卿父子以科目興自是而後子孫益蕃詩書之業資産之富縣之東南莫有先焉者也豫生也後不及見其前輩長者之髙風雅度數十年來始與德通遊德通才器偉然嘗以縣諸生試用於刑部有能名由是相往還不厭因獲見其諸父安正翁翁時年已七十而言動未嘗愆於禮退而與其兄弟德嘉德䕫德郁德贊德鄰諸君逰皆雍容和厚而其諸子姪亦聰明秀傑足以世其家後數年德郁子璁叔誨子鈞德鄰子穰相繼應賢科璁取進士為主事二人亦典教州縣說者謂蕭氏子孫皆讀書務善有志於樹立後之顯者蓋未艾於乎何其多賢也哉自古受姓命氏皆有爵者之子孫然所以亢其宗者德為之本也蕭之為齊盛極矣子雲亦一盛也世逺而分有不能盡然者自伯原府君居泰和其初一人之身至于今若干世子孫至多千餘指夫豈偶然哉昔者周人之美君子也言其保艾爾後必本於德音不已德音是茂則蕭氏之所以久且盛者其先德可知矣後之子孫而欲紹續於無窮其惟勉於德也哉德莫重於尊祖尊祖故敬宗敬宗故收族自宗法廢祭法不明故家大族而以榮其本聫其支而親親之道行者譜牒存焉耳是故倫理正恩誼篤油然仁愛之施充之以及於民物皆吾親親之餘也則其德豈不亦盛哉為子孫者世勉之其盛豈有已耶璁字孟奎才名重當時是將復亢其宗者續修此譜而以屬豫言故為序其首簡竹山陳氏宗譜序泰和陳氏族最大繇都幹君至干今幾世矣始家城西栁溪上其後乃散處焉族既散而貧富强弱有不能相通者矣豫先祖竹亭徵君則保翁處士之壻先考瓊州公實陳氏之甥豫妻則存翁處士之曾孫以正先生之孫良輔君之女也二翁實同産兄弟其故居在今仲亭居之後其出入所由道則自古井巷中别為小巷西入叢竹中鄉邑之俗凡竹林茂美者率呼為竹山故陳氏之屬呼二翁為伯叔兄弟者皆以竹山表之喪亂以來竹廢屋毁前輩諸老凋落殆盡以正先生乃以所學授徒縣西鄙遂居棠梨山下而家甚貧獨陳氏族譜珍襲猶在也後其族有孔碩君者欲修譜而失其詳時豫先考為工部主事以外艱家居孔碩君乃從之以求於以正先生其後譜未成而先考服闋去矣數寓書索故譜以歸舅氏於是以正先生既老其孫桂芳梅芳與豫兄弟皆幼而孔碩君亦繼亡不能得也後之修譜者乃忘其故而於竹山之𣲖特略焉嗚呼此豈有他哉以貧而弱故也夫譜所以明昭穆辨尊卑使親睦而無間惇序而不紊也何貧富强弱之有異哉自始祖之一身以至於子孫之無窮雖貧且弱皆吾祖之所自出而安可薄邪收而録之乃尊祖敬宗之道也厚之至也古之人蓋如此而今乃以貧弱而略之異哉其所用心矣其故址雖存而其族人從先鑿池於其下日朘月削半已入於池中又溝其故所由道將掩有焉亦以弱其孫故也永樂二十年春豫以內艱居鄉里桂芳兄弟乃請其族兄仲亨伯度從先之外舅曾存禮亦陳氏之甥及陳氏外孫梁叔䝉暨豫與從先面質而歸之桂芳其故跡猶宛然也獨陷於池者未復耳豫又閲家藏舊書淂其宗譜一幅自始祖至良輔君之𣲖特詳焉乃以授桂芳兄弟使藏之而别録為譜他日陳氏或有仁厚君子釐正舊譜而修之庶可參入也不然則自為宗亦可也夫人患不才不患無族茍才矣族由我立焉讀書慎行乃所以為才也且盛衰相承天道也自以正先生至桂芳兄弟其不競也久矣然皆質實務本勤生而節用有子五六人曰興宗顯宗成宗亢宗者皆豫先考之所命也蓋期之矣天其將昌之也乎哉桂芳尚居棠梨山下豫與為此譜而名之曰竹山陳氏宗譜者亦兾其能復也其尚勉哉毋猶為鄙者之所薄也送余侍講歸廬山序洪熙元年二月翰林侍講余君正安以老疾得告歸廬山同僚之士念交逰之情而重離别之感相與具酒殽飲餞於其居之南坡各賦詩以送之而命豫為序蓋君與豫同舉進士入翰林同受先皇帝命讀書于禁中凡二十有八人出則連騎坐則聮床豫又與君比屋而居從容旦暮之間探聖賢之微言窺道德之至奧發為文章以歌頌太平之治暇則尊酒相對歡如也雖一時遭逄之盛而諸君道同志合他自以為莫及也今二十餘年存者僅十八人而曾君子棨王君時彥為左右春坊大學士周君崇述為諭德羅君汝敬陳君光世余君學䕫為翰林侍講李君時勉為侍讀周君孟簡周君恂如為王府長史章君尚文為考功郎中袁君添祿為主事豫為庶子與君皆在京師而楊君宗朂假君時舉吾君叔􅀈皆出為恭政沈君志行為參議洪君遵道為僉憲盧君邦臣則以吏部主事常董役蜀中而光世復以憂去其在京師者十二人然亦將老矣而皆奔走營職以自效欲求相樂如曩日蓋不可得也死生契闊固已有感于中而君又遽去則安能為之釋然邪雖然昔之仕者有欲去而不能得去者矣盡瘁以仕寧莫我有小雅之所刺也今君雖老病而當聖天子臨御之時深仁大德浹于臣庶因得遂其歸休之志而自足於山水之樂以怡神飬性豈非至幸者乎顧豫寡昧齒髮日衰而志意荒落君又舍之而去將無所資賴以自立徒竊廩祿縻歲月以取譏當時蓋重愧且歎也豫既自為詩以送君矣而諸君之命不可辭故序其所感者如此以辨諸首云泰和羅氏族譜序古者公侯有國卿大夫有家而蕃衍盛大則必立宗以統之大宗一小宗四嫡庶之分明尊卑之位定由是倫理正恩誼篤維持輯睦愈久而愈昌其後宗法廢而族無所統子孫雖衆源逺而末益分厯世浸久至不復往來而相視如塗人者亦其勢之必然也是以君子病之隋唐之際最尚氏族族必有譜所以著其本而聫其支自祖宗以來至於子孫傳次之逺得以考其源流而不至迷謬此尊祖敬宗之道也自是而後至于今故家令族鮮有不務此者泰和城西羅氏其一也羅氏本周世宗殿前都指揮使彥瓌之後宋既受命彥瓌子珫避難居廬陵仲子延復徙泰和仁夀鄉之中團里九世至元逹又徙居坳頭生子仲實仲實子宏祖宏祖子均瑞早孤隨母適城西劉茂林遂冒劉氏均瑞之子仁夀文夀良夀仁夀嘗曰吾祖羅氏不幸而冒劉水源木本吾豈敢忘哉欲復羅氏而未果子孟昭兄弟乃克如其志時有令𨽻戎籍者不得易姓而二叔文夀良夀實𨽻焉孟昭列言於朝乞有所别白從之遂得復羅氏兹譜所載仁夀子孫皆羅氏凡劉氏者二叔之子孫也然皆好德樂義老者有慈良豈弟之風少者亦克盡恭順之節怡怡然相親也尚論其始蓋原於一人之身至繩繩蟄蟄辟諸支體雖異狀而精氣脉絡之流通無間也姓氏之復與未復何足異哉豫嘗辱愛於孟昭甫既又交其二子崇辨崇夲皆英偉過人而進學不倦惜崇辨早世獨崇本成進士官刑部有才名朝廷推恩贈孟昭甫為郎中配胡氏封太宜人今崇本升廣東參政顯榮當日盛其族之子孫以文學入仕如宏如季禎者六七人表然傑出足以有為如崇辨之子大鏞讀書以取進士為業如崇本之子缺又相繼而出則所以光前而裕後者其可量哉今年奏禮部㑹試天下士崇本預典文衡來京師持此譜求豫言故為序之清溪陳氏宗譜序清溪陳氏宗譜載陳氏之居清溪者也清溪之陳云分自栁溪然莫究其所以分此譜斷自泰和醫學教諭叔賢始叔賢曾孫為邦彥邦寧邦彥子仲仁邦寧子仲旦同領鄉薦為教官慮世逺而愈分將愈失其傳故為此譜録其所知者以示後世其所不知者則缺焉去年仲仁自松江訓導考績來京師得山陽教諭將之官出此譜求豫序豫未暇作至是仲旦自晋寧學正來考績詣豫申仲仁之言而以序為請曰榖之先世皆力於善四傳而至榖兄弟凡六人二父篤意教之蓋兾其大有立也而榖與仲仁及弟登僅得為所謂教官者無以大光顯前人以稱二父志今仲仁又死矣先生不愛一言以訓勵其子孫俾皆勉於學以善繼前人而卓然有立於世則榖之兄弟受賜豈有窮哉豫與陳氏同邑居惜豫之生也後而又多去其鄉不得從先生長者究知邑中世族之詳往年見仲仁兄弟列名薦書心甚喜之謂非其祖宗積善安能致此乃今而知叔賢焉叔賢以醫為職德之及人也必多故大發於仲仁兄弟孰謂非積善之致哉今譜圗首之誠足以啓後世矣夫譜之所以著所自出而使人善繼於無窮譜其所知而缺其不可知此作譜之法也眉山蘇氏出於眉州刺史味道然自味道之後失其世老泉先生作譜亦自其所可知者而録之蓋意計以失真不若缺之為愈仲仁兄弟之為此譜本蘇氏意也嘗觀世之作譜者自受姓命氏以來皆能詳其世次然豈真能詳哉牽合附㑹以自矜眩而已耳使其祖宗妄冒所自出其為不孝孰甚焉則豫於此譜安得不深嘉其意哉且世家大族所以能久且盛者祖宗以善啓之子孫以善繼之也讀書以明善而身體力行始於家達於鄉黨州閭天爵既修人爵從之又推而達之天下為之益篤而所及者益逺則其得於天者豈有已哉陳氏之子孫勿忘前人之言而勉於善以繼之則久且盛可必矣故為序之以勉其為子孫者送賈知府還吉安序吉安治九縣其民蓋四五十萬然多讀書知道理不可欺以非義為守者茍以理撫之則欣然從化凡有所令無不如志其不然則否故不知者以為難治往年平陽藺侯金華朱侯相繼守吉安皆能潔廉以持已公平以臨民其行事必據於理一郡之人皆恱從及其去也郡人稱頌之不忘二公亦以吾郡之人之知理易治也皆深念不置雖相去而猶如父子之相愛此豈徒然者哉然則謂吾郡為難治蓋過論矣鳳陽賈侯為監察御史九年有名於時以課最擢知九江未幾以憂去服除改知吉安郡人於其始至也皆仰望之曰是必能以理撫我也而侯之守已也廉其行事也公能以理撫民而民亦服從其教吾黨之仕於朝者聞之亦皆為喜而兾其績之成今年以述職朝京師䝉天子仁厚之澤既燕享之而復申以丁寧之訓矣侯既佩訓而歸將若有以大惠於其民吾邑仕者相率賦詩送之而屬豫序於乎吉安吾鄉郡也吾徒之望治猶吾郡人之意也今侯既有志於民而又重以天子之訓則郡有不治人有不受其澤者乎夫理者萬事之本人惟其不知理故往往昧其是非恩有所不懷威有所不懼是以難治吾郡之人既異此而侯以理撫之不易其初志以終惠其民其治績之成蓋甚易也侯之德及人益深則後之稱頌侯者豈止若前守而已哉侯治郡將三年其必知郡之易治而吾復道其所以易治者如此蓋以解不知者之惑而深兾其治績之成也送河南李布政赴任詩序洪熙元年五月廣西右布政使李公昌祺以外艱服闋朝京師見上于奉天門上顧左右曰是嘗官禮部者其才可用也明日即拜河南左布政使蓋上在東宫監國時李公為主客郎中凡四方萬里外國慕義來朝與蠻夷內屬諸國以歲時入貢者皆李公主之其宴賞勞來輕重隆殺無失禮上以是知其才故去已七八年而猶眷之不衰夫羣臣之任職者茍有材具莫不奮勵以自見於當時其受知於上誠非臣所能必在昔矢匪躬之節卒不護主知何可勝數如李公者受知於上至於久而不忘豈偶然哉非誠千載一時明良相遇甚盛事乎古之論治者蓋曰在知人在安民知人則明於其才行而用之無不宜斯能安天下之人而無失所者史稱帝堯其仁如天其智如神萬世之治莫有過焉者也今聖上聖德同乎帝堯而於知人安民二者蓋惓惓然也故即位以來凡英偉豪傑之才皆用之不遺其所以安民和衆之道皆咨諏而盡行之治化之盛蓋將與帝堯等矣今李公又以知遇之舊當藩翰之寄其所以上禆聖治者豈不亦盛矣乎孔子曰不獲乎上民不可得而治矣蓋上不見知則所言有不信所行有不從雖有過人之才宜民之道而能如志以治者蓋少也李公既受知於上將言信而行從河南之人之愈益受惠也審矣豫聞昔之人有感一朝之遇而為之盡者况君臣乎况李君之賢者乎豫知其必能有以報主上之知遇而非茍焉者也李公將行士大夫知已者相率賦詩送之而以序屬豫豫與李公居同郡出同年又嘗同官京師亦可謂知李公者故為序而不辭贈劉貟外序士之於仕非才之難而行之難也行既修矣而才不足君子重之若徒逞其才而行不檢焉君子不以為善也由是觀之才達行修之士宜為君子所重可知矣故為士者必以砥行為先務而世之命爵祿者亦於是取决焉有其行而又有其才則進於榮顯可必也優於行而劣於才者次之非是而亦進焉者有矣然未見其能終也萬安劉廣衡為刑部主事豫知其為人矣蓋萬安與豫泰和為鄰邑二邑之人多通婚姻相往來廣衡為其邑故家其先皆習詩書循禮義故廣衡自幼已蹈繩檢不蹈於邪僻及取進士入官清約以自守而勤慎以臨事在刑部五六載其所决獄號為平允為其長與為同列者莫不愛且重之然豫察其舉動辭氣衣服飲食蓋恬然不異於往時庶所謂才達行修者今年尚書魏公舉于朝擢以為貟外郎此其進於榮顯之時也夫仕者患乎才行之不偹無患爵祿之不加豫嘗辟之物焉物之盛衰視其地肥美則物盛不然必衰春氣既至生意已達若加糞溉焉其生也將日盛又纍纍而糞溉之則其暢茂碩大莫之能禦矣以磽瘠之地無糞溉之功雖未必不生而欲其長且大焉蓋難也廣衡今進矣慎無變乎其初益修其行而輔以美才何患不至於逺大也大理評事康宜清刑部主事歐陽廣湯監察御史歐陽廣洙皆廣衡之至親愛者喜廣衡之進而求豫文為贈豫亦素重廣衡故書豫意如此以勉之贈李太守赴清河序豫友李信圭之令清河也視其民如子凡有饑饉疾苦勞役舉切於其身則必為經畫處置使之各得所欲事或不如其心則亦為之審緩急擇便宜使不困至於農事尤必使及時勸課訓督具有成法貧者資用不充則假於富民以給之由是小大皆得盡力於畎畝地無遺利官無負租民有餘食皆歡喜愛戴曰公撫我如是真吾父也一縣稱之無間言今年詔大臣舉賢為州守禮部章侍郎首舉信圭衆莫不以為宜上命知蘄州遣使徴之縣人無少長皆泣下曰奪吾父使惠他人我則奚仰於是有力者即走北京訴于通政司弱者訴于府訴于捴兵官訴于巡撫侍郎乞留之事相繼以聞上重違民意俾為知州仍掌清河縣事而其民之在京者始大喜曰公若不歸吾輩遇不恤已者死與徙而已今得免矣士大夫知信圭之賢惜其澤不之施而喜清河之民之受終惠也皆作詩贈行其姻家翰林侍講學士陳德遵持以屬豫序豫與信圭同邑少相善皆業儒皆有志斯民顧豫獨老於筆硯無以報上無以惠下信圭所立何愧於漢循吏則豫能不慊然耶嘗竊念之聖朝鋭意養民而親民者莫如令蓋所謂民父母也有志之士當洗濯磨治以求稱答上意何其如信圭者甚少也其罷劣不職者不論以豫所見假詩書以文奸言任詐術以逞貪欲肆威虐以快私心者蓋多惡在其為民父母哉雖謂之民賊可矣則如信圭宜其民之不舍也抑又聞之君子行道以惠民不以宦成而怠不以老而倦也信圭尚篤於其道以安養斯民豈惟不負令之寵任與其慕戀之意德業之成亦將永有耀也是為序贈李知府赴任詩序豫友李湘允淮之守東平九年矣其愛養州民而為之興利除害蓋有父母之道焉是以州民恱而戴之亦如子之於父母也其奏留者數矣今年秩滿當詣京師而朝廷已用禮部尚書胡公薦以為懷慶知府使者往徴焉州民皆不忍舍之隨而來者幾三百人請于朝乞留不得皆怏怏而去於是允淮遂之懷慶豫嘗謂天生斯民而不能使之遂其生是以付之天子天子不能以獨治是以付之守令然則守令之愛養斯民非特上承天子之意亦所以奉順乎天也然而欲舉其職豈有他道哉惟仁而已仁者無私心之謂其心無私則好惡與民同民之所好者衣食足而力役均其所惡者飢寒之不勝勞苦之不釋也因民之所好惡而使之莫不遂焉父母之道然也是則無負於天子而亦可無愧於天今之賢守雖多而不賢者不可謂無也其所以不賢私意蔽之而已私意蔽之則惡其所好好其所惡失父母之道而民有不遂矣民有不遂則負天子而愧於天民之疾之有欲其速去去而恐其復來者安能眷眷而不舍哉此無他理之在人無貴賤之殊上以此施則下以此應其效固應爾也懷慶之於東平其土地無大相逺而民俗有不同然其心獨無是理哉允淮以其施於東平者而施之篤於仁敏於事本之以誠持之以敬而濟之以和則民之恱戴宜無以異也誠無負於天子亦無愧於天福祿之來將又有大於此者允淮勉之翰林諸公素相厚者皆有詩贈行豫最故故序其首云贈歐陽僉事赴任序國家建學育才至于今七十年賢才之出以輔興運贊治功者不可一二數其教養之法蓋善矣然積久則弊生於是其所成就大有異乎昔者何也聖人之道載於書讀其書明其道優遊㴠泳以淑於身行於家施於鄉黨州閭然後發而為文詞以進於有司逹於朝廷得列於庶位而行其道於天下所學有本末所造有後先立法之善蓋如此及其久也為師者昧於教為弟子者荒於學不復以讀書明道為事而專意於文章記誦他人之陳言以僥幸於一得幸而得之內無所守外無所施者亦多矣蓋不務其本而徒事其末而末又非其所自為者無怪乎其弊至於此也學校政化之本也其所成就乃如此聖明在上安淂不加之意哉是故定解額限弟子之貟皆所以致嚴重之意蓋欲萃英才務實學慎選而篤任之相與隆太平之業然又以為教之至則其成才也易於是增置按察官一貟俾專領焉詔諸大臣察舉有學行者而任之璽書奬勵給驛而遣焉吾邑歐陽哲以吏部主事當其選哲字廣哲其先君子允賢先生嘗助教國子叔父允和為監察御史雲南按察副使皆有名當時廣哲受教於其家其學行誠無愧於是選然豫願有進焉賢才治化之本教官成賢才之本董教事者又所以為之本也今之去使為師者篤於教為弟子者勤於學先本後末兼舉而不遺復乎前之所謂善而去夫後之所云弊者要在廣哲端其本以表勵之而已矣廣哲尚慎之哉翰林編修蕭鎡進士梁楘袁和龍文皆相與厚者謂豫與廣哲有連宜以言為贈故為序贈曹貟外序曹義子宜句容人始取進士入翰林為編修再升禮部主事今年用薦起超拜吏部貟外郎子宜溫厚周慎達於為政在翰林者皆愛之豫嘗自念使子宜居顯曺為要官則其所立不在人下而可置於閒處邪及是舉也衆皆為之喜其友潘勤進學輩思有以增益之乃求言於豫嗟夫豫愚者也言不適於用今老而益愚其言益無可取將何以增益子宜哉雖然子宜豫所重者也其可終默邪郎官自漢以來為清選號大臣之副今之大臣皆於是取之子宜居是任不可以衆職比也况銓衡之任為治之本乎古之論為治者曰知人安民而已蓋知之明而用之當則惠有以及民而天下治矣今朝廷以是付吏部是以治天下之本付之尚書侍郎捴其綱所以任其詳者則郎官職也外之治民自布政司以至於縣其職衆矣臨乎上者固難居下而親民者尤難上下皆賢斯美矣茍或不然則民有受其害者然何以知其賢哉精鑒慱采而已精鑒於已而又博采於人將無有不當者用以治民則民亦無不安者此子宜輩所宜用心也使今日之治可比隆於堯舜之世論其所致人將曰自吏部功施當時名流後世豈不美哉子宜與豫逰將二十年其相好加焉今之贈言固望子宜功成名立而進於逺大也果然人將論其所出曰自翰林則豫雖老而愚亦與有榮耀矣是為序送何侍郎養病歸建昌序正統六年十一月刑部侍郎何公文淵以病乞歸建昌上知其實病不可留詔許暫閒就醫藥庶淂速愈既愈則任職如故蓋公之病久矣常黽勉任事不少懈至是有難復强者故上矜而許之而眷注之意不衰命既下士大夫莫不惜其去相與嘆曰何公初為御史已有賢名聞天下及舉為溫州其愛民如子為之興利去害民亦愛敬之如所生逮入佐秋官尤盡心於其職小大之獄必以情誠清慎仁恕之君子也今之賢如公者無幾人使若汲黯治淮陽將不猶若愈乎既又嘆曰何公豈茍欲自便者哉揆於義而已君子之行道繫乎身身果病矣猶以難强之筋力而貪無窮之榮利自謂足以任職而不至於怠且廢者庸可信其必然也何公之去誠賢逺於人矣哉上之眷注不衰兾其病愈而復來蓋好賢之心篤知之深故期之逺也而於公見之宜矣豫聞而是其言吾郡之士之為刑部屬者梁楘等則過豫告曰楘輩之從公舊矣荷公之教亦多矣裁其過勵其所未及使得免於殆且辱者皆公之德也公之歸善矣楘輩將何恃而立哉且非特楘輩然也凡為屬者蓋莫不然願求一言以寫慕戀之私請勿辭嗟夫豫與公同仕於朝蓋三四十年而豫所業者文藝之末而已達於為政莫有過於公者也今老而學焉方資公以自益而公乃以病去豫固不能釋然於懷者豈但楘輩而已邪豫聞洪範之福蓋以德為本公之德有諸身而及於人天報以福蓋未艾勿藥之喜當即見之况上之所眷注者乎愈而來來而久於其位以興道致治豫與諸公之所望也因書以為贈行序贈訓𨗳李卓序李氏居泰和前程里為故家豫嘗識子能敦厚周慎蓋其族之表然者心固重之永樂丁酉豫以外艱家居南溪蕭鵬漢甫請豫為子師子能之孫卓蕭氏出也時年尚幼亦從館下聽誨言應對進退率有可觀者豫心又喜以為子能有孫如此蓋可兾其成矣去之將二十年而卓果以明經應訓𨗳之舉來京師試在優等既受職將之寶慶謁豫拜曰生嘗受教於館下矣今幸得教官懼無以當衆望願先生終教之豫聞而心益喜蓋喜其能進而不已也天下之理無窮君子之學豈有止足之限哉聖如孔子猶曰我學不厭况其下者卓之志如此宜豫益為喜也夫仕者之任職多矣茍有才藝皆足以辦之惟教官以成賢才為職而本諸其身必其學之在已者沛然而有餘然後所以應人者亦浩浩其不窮孔子曰溫故而知新可以為師矣卓宜務此而已師者弟子之所取法也惟以身率之則不令而從然今之弟子蓋有率之而不從者况不以身率邪卓宜慎修其身哉夫賢才者治天下之本也而託之教官其職之重可知矣然其位則卑也凡昧於大體者往往怙勢力以臨之惟有道自重之君子一不以屑意不然鮮不隨俗變化而輕棄其身卓宜以道自重哉豫之告子止於此矣今邵陽教諭鍾沔尚清亦嘗從豫逰能以所學教諸生今之所謂賢師而子之戚也又有徐訓𨗳明善者亦篤學而善教子之去尚相與切磋而勉進焉則賢師之譽子安能避哉由此而進將不止於是而已矣子必勉之贈蕭教諭赴長洲序蕭氏吾邑故家詩書相傳也久矣而尤以篤義重鄉邑洪武中鵬舉先生舉賢良太祖皇帝命賦指佞草應口成詩上大喜授蘇州府同知以寬厚清慎得名再仕山東鹽運副使潔廉之􅍾老而彌勵至今人能道之彥清其孫也彥清名灓以書經領薦今年㑹試禮部中教官選得長洲教諭彥清勤學攻文足以得志於有司其試禮部豫實典文衡局以科額於是失彥清豫與蕭氏有世好意甚惜之而彥清不以望豫雖然豫固惜失之而喜長洲之得也夫英偉之才所在有之而不能不賴於師師弟子之所由成也辟若制器然以良才遇良工加之以規矩凖繩而後方圎平直規矩凖繩之不加欲器之方圎平直蓋難矣故雖有材而不得成器以適於用者不遇故也今之為士孰無用世之心哉其材有大小不同而無不可用然所以成之皆於師乎望也因其才而篤焉匡直輔翼而振德之則才既成矣以是而為世用此治功之所以盛也然而遇良師者固有矣其不遇者蓋多焉不遇則無以成其才猶未為病也茍遇而弗良帥之以不正之習而加之以非道之施中才之士隨而變焉豈非學校之不幸哉長洲蘇之望縣其地多良才今其未仕泯然日望於成者不少其前之所遇幸不幸豫不能知今而得彥清豫知其為幸也彥清之學得於家講於師友皆聖賢之法言仁義之達道率是而教之為弟子者勉而學焉其才將無不成豫故為長洲喜也彥清克篤於是邦人父老必推本於同知公之賢而誦公之德不衰是彥清能成其祖之名亦所以為教也彥清勉之因書以贈其行送禮科給事中石信之歸應州省墓序古之君子最重其墳墓未嘗舍而之他也若有故不得已而去則必哭墓而後行於其歸也亦必展而後入其慎重如此蓋謂親之體魄所藏也然古之為君者各有其地各子其民賢者之仕不出其國中故能不逺於墳墓後世天下一君四海一國士之有志於行道者豈能終老墓下哉茍有為之主則去之而其心固未能忘也彼必去之者盡其道於君心之不能忘者致其孝於親不遺其親不後其君此所謂仁義之道也然嘗讀四牡之詩而嘆周之君臣皆可謂厚矣下勤於事不暇顧其親上知其情而代之言以慰撫之上下之道豈不兼盡哉然將母來諗但見於其言而於墳墓則未之及也由是而知我朝列聖之待羣臣可謂其仁如天矣既著之令使得省其親親沒亦得以省墳墓且皆賜之鈔而遣焉周之盛王所無也非天其孰可擬之禮科給事中石瑁信之應州人宣德癸丑以明經取進士擢今官日侍上左右敬恭修職者凡六年其名既著於中外矣獨傷二親之早沒不克食其祿又念其去墳墓之久也請於上得歸省焉應州地直雲中去北京蓋千數百里信之之展墓可計日得也州人老長知信之之賢既能盡臣職而又能盡子道足以為邦家之光閭里之榮矣至其䝉天子之仁德澤之施其美蓋出於數千載之上則未必盡知也信之將行同列之賢屬豫文為贈故樂為道之贈王主事序國朝明刑慎罰凡當其任者必選通經學古之士為之非是不與也銅梁王儉用節以進士得刑部主事同郡仕者行人潘洪輩為之喜請於豫曰用節之㑹試禮部也先生實司去取得其文而進之用節由是取進士常自以為遇知於先生今列官刑部猶願受教於下執事先生幸賜之言俾得服膺焉為惠大矣嗟夫豫言何足以資用節哉用節學春秋春秋聖人之刑書也百王之法度萬世之凖繩繫焉以之處大事决大疑無不當理者而何待於他求哉先儒嘗言五經之有春秋猶法律之有斷例也豫於是竊有慨焉聖人之心至公如天地至明如日月故能得是非之正而盡誅賞之宜茍非聖人而欲無少悖焉蓋難矣天下之理無窮而事變亦無窮必有以明天下之理然後能應天下之事彼變態千出日交乎吾前惟以理燭之榮辱豫奪一觀理之如何不自為輕重則於春秋之㫖其不合者蓋鮮矣抑又聞之春秋與禮相為用謹嚴者禮之體亦春秋之法也衰周之世上下怠放不能循夫禮之常故聖人作春秋繩以先王之法制凡春秋之所誅皆禮之所貶者也君子之治身或不能謹嚴則違於禮而入於春秋故欲用春秋之法者必先謹乎禮未有怠於自治而能治人者也用節以是經進方將施於事廓而充之觸類而長之蓋有不可勝用者矣豫故就其所學者以告之而願望之意寓焉用節毋以為迂也贈孫參政序布政司之設古方伯之任也其長為布政使其次為參政恭議其所統郡縣多者至百餘少者亦不下六七十為官屬也多矣而皆禀命於布政司故為布政司者其尊榮嚴重可知也朝廷篤意養民小大之事有不便於民者一切罷之而惟施其利民者然謂親民莫如縣縣令佐之賢否惟為郡者能審察而進退之使為郡者皆賢為縣者亦無不賢則民得其所矣故布政司郡縣之所望生民休戚所係也是以選授為甚嚴然使之位尊當不違所治參政參議則或以事臨郡縣於其守令而下之賢否察之為尤詳得與其長商確而進退之其勢尤易也故君子有志於為民者尤宜於其職今年河南缺恭政吏部以聞詔大臣察舉得儀制郎中番昜孫君字原貞其始取進士為禮部儀制主事已用清慎得名及升主客為郎中益有名既而以病告歸尚書毗陵胡公知其賢復奏起為儀制郎中凡大典禮大設施孫君稽古考文勤於其事表然為當時所重及是舉也衆莫不以為宜而孫君亦慨然思欲舉其職於乎此君子之志也君子之志固欲澤施於民不以能效一官為足也况乎為上之所選任下之所倚望者哉然孫君必欲使民䝉其澤則必始於郡縣吏使皆得賢而後可不然民有不被其澤者矣河南布政使李公昌祺豫友也其德望之孚於人久矣為之佐者亦一時之俊於澤民必有其道今又以孫君之賢往焉同寅協恭得如其志以治可必矣豈非河南之民之幸哉孫君將行其同列之賢主客郎中王君濬等求豫言為贈故為序如此以贈之贈邵都御史赴南京詩序宣德三年聖天子在位既四年矣海宇清寧要荒順服然猶慮百職有不修思欲更進賢才以隆化理乃詔六卿大臣慎舉藩憲之臣之賢者得福建按察使金華邵公玘等八人命有司徴用之既又以為御史受耳目之寄當激揚之任不可雜以匪人親擢通政使大梁顧公佐以為右都御史俾澄汰諸道之在職者顧公既别白以聞其不善者謫為吏逺方或降黜為下僚於是任職之賢皆自喜其志之得白於上益相歡於為善而憲紀肅然既數月邵公至拜右副都御史往蒞南京邵公初由進士為御史升江西按察使又改福建正直之操久而益勵所至皆赫然有聲譽及拜是官士大夫皆為喜曰是誠能有為者也豫嘗究夫設官之意內而六部外而布政司府州縣足以為治矣而又置御史按察司者蓋以內外之職不能皆才事不能皆理故俾之鋤姦去邪剗弊剔蠧是御史按察司者百職之所由舉政治之所由成也其任蓋重矣夫既為朝廷所託重而可自棄其身於禮法之外哉自棄其身於禮法之外而與貪濁無耻者同科則人何所畏憚百職曠庶事廢此之由也然則謫役於逺方沉屈於下僚豈非宜哉顧公既振舉於此而邵公復當是任由兩京而施之以及於外使小大之臣皆為才且良而興起於事功非聖天子與一時士大夫屬望之意哉豫知其無負也審矣邵公將行其鄉友驗封郎中胡文善求諸公作詩送之屬豫序故推原其意而序之大理少卿呂先生贈行詩序大理少卿呂先生之省墓於紹興也少傅二楊公皆為詩贈之二公皆天下之望其言足以為輕重人之欲得一言蓋難矣先生之去不求言於公而公自為言以贈非清德懿行有足重者不能然也蓋先生初起自教官為江西按察僉事其後改福建江西福建二公桑梓在焉故於先生知之深而重之確孔子曰如有所譽者其有所試矣二公豈無所自而然哉直家泰和亦可謂知先生者憶初逰鄉校時於學未通也先生行部至泰和視學宫望廟門而步謁先聖畢登明倫堂進諸生講聖賢之道而懇懇於治心修身其容莊其言切有足起發人者至於吏治之得失民事之利病尤惓惓焉所以誨諭而振德之者蓋有古君子之遺風時直雖少心竊慕之後之來者求如先生加少矣蓋有騎過廟門而不顧於學政之弛與吏民之弊不少概於心視逄迎應對以為褒貶抑揚者比比是也夫如是則安能忘情於先生哉直嘗自念今之諸生束書不觀者蓋多也昧於治心修身者又多也誠得如先生十數人專領而課勵之庶幾有益乎今先生老而歸諸公賦詩贈行而俾直序之故序其前之所知者為之引使人知先生之誠可重如此若其他之所行暴於人之耳目與其歸為鄉里之榮者皆不道雖然觀直之所著亦可以見其餘矣贈歐陽士則南歸序豫內弟歐陽士則以明經見重於士大夫久矣今年鎮江缺訓𨗳舉至京師先是凡舉任訓𨗳者皆嚴試於翰林宣德初慮吏之入官與求賢舉之濫也詔諸大臣學士羣試於廷中而訓𨗳亦與焉加嚴矣至是有言舉任訓𨗳宜先試於在外有司及提調學校風憲官然後送之吏部又羣試而用之吏部請從其說而士則適遇焉乃告别於常所往來者束書南還無不豫之色或者曰教官之任誠重矣然在外之試未必愈於在廷之嚴也使未至京師則宜矣既至而必歸試試之而使復來僕僕走萬餘里非有重資將何以自給士則素清貧無乃不便於是行邪士則曰儀之進退蓋自有命焉家貧親老誠願得祿以為養然吾父年八十二母亦七十七矣以情而言其可暫去左右哉今别去半年起居飲食不能須㬰忘於心幸而得歸且少舒其惓惓之思而自快於目前祿雖未之及其所樂多矣而何不便於是行哉豫聞而心善之曰賢哉士則也天下之樂莫大於事親親也者不可以長存亦不可以再得也因其力而致養焉極愛敬之誠盡惋愈之奉使憂患不知勞苦不聞熙然自適於太平之世其樂可勝道邪古之人雖以祿養為榮然豈能必哉如必得祿然後養則昔之大賢君子蓋有不沾一命者將不得為孝子乎士則之親老矣楊子所謂愛日士則之志也豫䝉舅氏恩不薄恆慮士則以祿養未遂為慊而愧無以助之及聞其語而信其賢故書以為贈行序且使人知士則之非茍然者也抑菴文集卷五
