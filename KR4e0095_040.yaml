body:
  text: 抑庵文後集卷二十七明王直撰墓表贈主事尹君墓表景泰元年三月天子嘉念任職之臣思所以寵褒之以率勵有位俾興於事功詔凡有勞績者皆賜之誥敕而封贈其親於是文選員外郎尹弼得贈其父時中為承德郎文選清吏司主事母吳氏贈安人弼既拜賜録副以焚告墓下則來告豫曰先人不幸棄諸孤今三十年矣惟其平生實有令德而未獲沾一命以卒茲荷朝廷嘉恩羣臣得贈官第六品榮幸大矣惟先生賜之文以表于墓以彰上之賜而昭先人之德永永不朽此不肖孤之願也敢以請豫嘉其孝故不辭按狀君諱庸字時中世家宜興之亳溪其曰亳溪處士者君之號也祖俊卿父伯敏皆有隱德而不仕以資富臨一鄉君年十二已屹然異常人父為萬石長嵗當詣闕聽命而病不能行或議以家人代君曰幹父之蠱子道也且有子而以家人代不幾於罔上乎不可我其行矣有司善其言許之比入覲力弱不能前衆抱負以入聞者壯之卒成事以歸其於忠孝之道蓋出於天性人謂尹氏有子也既長事二親盡孝左右順承務得其歡心居間讀書窮理攻於詩娛意翰墨以古人為法不求仕進人或勉之曰吾門户事殷而親多疾朝夕奉侍且不暇何暇於仕馬少遊吾師也親沒葬祭以禮而哀戚過之益絶意於仕居傍别搆一堂扁曰清趣軒甃石鑿池雜植花卉極溪山之興客至相與閲圗書雅歌投壺賦詩飲酒歡洽終日嵗時宴宗族長幼必以祖宗積德垂慶之事相勉勵而期紹續於無窮鄉人之貧乏者周之有不能平者必喻以義使各適其平無不悅服皆以王彥方竇禹鈞比之嘗從儲思順先生學思順老無子失所依復迎致師事之死則具衣棺葬焉其善行多此類鄉人歌詠之生於洪武甲子二月初八日而以永樂癸卯十一月十九日卒享年四十妻吳氏安人有淑德後君四年卒子男三孫男六其葬以次年十二月二十一日墓在其鄉演西之原於戲天之於人既賦以過人之資則必與之以出衆之才而俾之立絶俗之行此天之所以成賢者也君自幼已知君臣父子之誼而力行之至於孝敬惇睦慈惠振施凡有所為必本於仁義表然為鄉里之望其聰悟夙成可謂偉矣惜未至髙夀其所樹立未大顯於世然有子之才而獲乎上者如此是亦可以不朽矣故表諸其墓郭公子齊墓表公姓郭氏諱肅字子齊吉水之富口人也幼聰敏喜學而端重簡默寬厚平恕自念世為簮纓家欲有所立於世從前進士歐陽師尹受詩經習舉子業業成以教于鄉未暇仕也會弟子淳卒而老母在堂凡諸薦辟皆不就惟以養親為事極其愛敬而親之心樂焉撫弟之女如已女備資裝嫁之嘗一出遊厯吳楚巴蜀覽其山川之勝而見之歌詠既歸益自得勢利紛華不以動其心理田園創室廬課僮奴事耕稼延明師以教子孫賔客至者則相與觴詠終日言動威儀皆中禮節藹然有古君子之風縣大夫敦迫為耆老每有所訪問公必具利害之實盡誠以告之事多聽從而民隂受其賜人有不平質於公公決之以理莫不意滿而去既老謝事以家政付其子杖屨逍遙閭巷間怡怡然樂也性好竹環其廬皆種之元進士艾元暉嘗以筠隂名其堂且為之記公亦曰竹吾友也吾樂與之處雖老不厭自號筠隂老人鄉人知公之比德於竹也尊之曰筠隂先生京師士大夫亦有為賦之者公既與竹為伍因杜門不復出郡縣行鄉飲禮為大賔則往焉平生重義輕財洪武中有姓陳姓毛者舉貸於公往中鹽約倍償公後二人得罪沒入之公曰吾不用索也即焚其劵里有劉澗二客四川不歸妻亡遺一子在襁褓公收養之劉歸即遣還永豐錢以文家貧無以養親鬻其弟於公以文死母訴無他子承祀公惻然還其母鄉人有嘗受傭者至老無依行過公門憐而飲食之留三日而卒為具棺葬焉凶嵗發廪平糶給米與貧人煮粥以食餓者其所活尤多公之素行類如此郭氏系出唐汾陽忠武王後唐有在徽者為鴻臚卿以直言忤主謫廬陵其子因居邑麻江代有顯者後又遷吉水之桐江至縉夫始徙今富口縉夫子幼安為里孔氏贅壻生子季誠季誠生祥叔祥叔生士賢公之曽大父大父父也皆有隱德然皆冒姓孔至公復姓公生於元至正丁亥四月草八日以宣德乙卯七月草七日卒享年八十九是年缺月缺日葬於其里之樟坑公所自營也配廬陵毛氏有賢行白首偕老相敬如賔年九十八而終二子長惟寅能世其家次惟聰先卒孫男四女三曾孫男十三人玄孫男四人古之君子有其德則必受福於天洪範所謂福夀康寧考終命而皆以德為本然子孫之衆不與焉南山有臺之詩人以無疆無期言君子之夀矣然亦推本於德故又曰德音不已德音是茂至於保艾爾後而止焉夫既有其夀而又裕及其子孫此可見福之備而德之至也公孝於親友於兄弟而惠及其鄉之人天既以眉夀報之而子孫之多且賢又足以充大其後詩書所載蓋兼而有之於此可以觀公之德矣用是表於墓上過者其必式諸徐深之墓表宣德辛亥九月三日黃巖徐深之以疾卒於家年四十四明年十一月四日葬其邑靖化鄉豐嶺之原葬十三年子簡為禮科給事中乃來求豫文表諸墓徐世為儒家深之曾祖谷祖祐皆不仕父新取進士為監察御史南康令有譽於時深之少喜學於經史無不讀而尤篤志於圗書窮性命之源探隂陽造化之妙以無他兄弟不復求仕進惟肆力於文章一時學者皆自以為莫及也方八嵗時喪其母痛不及致養嵗時奉祀悲泣不自勝父厯官中外深之未嘗廢覲省當其倦而欲歸也即豫營别業極景物之勝既歸朝夕左右致其樂父之心歡焉族母陳氏老而獨深之養之如母既卒以禮葬之從姊歸李氏困於役至骨肉離散深之為完其母子且割田食之鄉閭之貧者皆周給焉凡所交逰多賢士非其人絶不與往來治生不用他道理田園之入而加以節儉故能裕於已而有以及人娶包氏蘄水令彛古之女子男四長即簡深之志慮深沉言行純篤足以得其夀而乃止於斯此君子所以歎夫天之不可必也雖然世之人至於老而死者蓋多矣似若過於深之也然修於已者不能如深之又不能皆有賢子孫故卒與草木同腐而無所聞於人深之文行表然見重於士大夫而又有簡者為之子汲汲以顯親為事播之文字刻之貞石傳之天下後世則深之為不亡矣是以君子貴能善其身而尤貴乎有後也豫既重深之而又嘉簡之孝故為文如此使刻於墓上太孺人謝氏墓表謝故歙人居邑之黃山宋諫議泌之裔有曰子敬者博學勵行娶羅氏生太孺人端靜淑善間於女工年十六歸同邑方永進甫時舅姑在堂太孺人執婦道謹甚舅姑皆稱其孝宗族無間言躬勤內事儉約以自足晝夜紡績織絍以資其家永進甫充拓舊業田廬有加於昔時太孺人之助也永進甫好與賢士大夫逰太孺人能成其志為具酒饌諧宴樂雖纍日不厭待姒氏如姊視諸姪諸婦不異其所生茍有未至徐徐訓誡之不厲色疾言撫其下人衣食必均一於親戚鄰里皆有恩篤意教子每夜誦書輒賜飲食賞其勤季勉取進士選入翰林為庶吉士謁告歸省太孺人喜動顔色勉欲求教官以便養太孺人訓之曰吾聞為忠臣者不暇顧私親爾當盡心以事上勿以我老為念也及勉除太常博士能舉其職朝廷推本於父母之賢贈永進甫為太常博士階文林郎與太孺人俱受敕命人皆以為善教所致也宣德六年正月缺日以疾卒距其生元至正戊戌十一月缺日享年七十四子男三曰宗仁勉以卒之年二月七日葬于邑之白楊山勉後為監察御史升湖廣按察僉事至是考績來京師自述太孺人之行為書謁豫告曰惟先妣實有懿德今葬已十六年而未有文表于墓上無以示久逺則勉為不能顯其親將何名為人子幸嘗辱知於先生敢請一言以託不朽願勿辭豫觀經傳所載諸侯卿大夫夫人以至士庶人之妻所以稱賢於當時可述於後世者孝敬以事長禮義以相夫仁以逮下恭儉以治其家寬裕慈惠以訓成其子非有甚髙難行之事也然人之能者鮮矣今觀所述太孺人之行蓋無愧於昔人誠可謂賢也以是而表諸墓豈不亦永有耀哉故次第書之而使鑱諸石華林胡處士墓表華林在南昌奉新宋左衛將軍胡侯藩始居之其子孫最盛多散徙唐侍御史􅀈生南唐膳部員外郎璫則仍居華林後有邦本者又自華林徙南康之建昌其曰均用才卿用成者則處士之曾大父大父父也蓋居建昌幾世矣而處士猶以華林自號不忘本也處士諱原字文端自幼謹敏喜讀書選為郡博士弟子以心疾辭間居博覽載籍讀郭璞葬書有感於乘生氣之説歎曰凡人居宅亦猶是也豈獨死者所藏哉求之篤造之深然不喜自衒嘗出遊見道傍敝舍主人窮瘁不自聊憐而視之曰地雖善而弗能乘生氣無怪其若是也為辨方正位令改作不通姓名而去後數年遇其人於途拜曰公為我相宅令改造之由是家益裕思欲報公而未能今遇於此幸也因邀至其家處士固拒不往曰吾豈為利哉又能以人生年月日時考星辰所值而論其吉凶有竒驗然與人言必依於理以其從逆為禍福之應其言引物連類善開喻人意雖暴悍者皆服從愛人惜物本乎天性故人有張姓者負鹽糧官責償甚急處士貸以資貨直萬緡張得釋而卒其子貧甚處士遂焚劵不復言嘗出市物遇貧不能存者悉以所持鏹與之徒手而歸其他解衣推食以濟寒飢施藥物以救疾苦見有鬻生魚鳥者買縱之此類尤多然嫉惡殊甚必去之乃已嘗經武昌見有惡少年數輩在市攫人財衆莫敢誰何心憤切焉明日使奴持槖裝往為市處士迤而從之少年出竊其槖執一人送官窮治皆伏法衆莫不稱快其行若是非所謂好仁急義者邪兄孟端為蜀府廣備倉副使處士往從之時某為紀善有女方擇壻愛處士賢遂妻之處士因留蜀中獻王聞之屢召見與語輒竟日賜豫甚厚欲舉用之復以心疾辭蓋處士之疾久矣每發則痛楚數日不能食竟以是終洪熙元年九月草四也享年五十六是年十月初一日葬錦城北黃泥溝之原妻馬氏有賢行生子男二長曰鼎次早夭女三人孫男二女一處士葬已二十年鼎以才德被薦為都察院檢校至是持處士行狀來請曰先人之葬宗丈禮部公銘其墓矣而未有文表于墓上惟先叔父僉憲君實與先生同年鼎嘗辱教焉先生幸哀先人之不遇而賜之言得表見於後世則死而不朽矣豫惟古之君子之有善也雖不遇於其身則必有遇於後若處士之行應仁義而不得一命之榮以博其施慶澤之流至於鼎而始顯鼎又能以善自治則其進也將益大處士之德豈不於是而可徵哉故表諸其墓義民胡有初墓表燕山胡氏分自奉新之華林蓋宋太子左衛率藩之後藩有子六十人多散徙而華林之族為最盛其後有諱雅者官吉水因家邑之燕山則公之族也公曾祖正可祖發父謙中皆不仕謙中娶劉氏生二子其次則公也自幼喜學屹然如成人受業於解先生原恢張先生伯穎又從其叔富順丞某逰學日益有聞達於義利之辨未嘗茍取早失二親痛不得致養嵗時祭祀必誠必敬兄秉初亦早喪長育其孤女而嫁之一不異已女事從兄重初極愛敬教諸子弟必勉以經術取科第里人有不平者質於公公為辨别是非不曲隨茍止見有違於義者必陳義面折之雖始不堪終皆愧服家多積榖有稱貸者視他人減息之半凶年則免償嵗甲寅大飢飢民至操兵為盜柯暹理縣事以為憂公曰勿憂也此但求食耳賑之當自定首出榖一千石佐縣官柯喜稱公為大丈夫作詩美之諸富民稍稍皆出榖以助賑施吏部侍郎趙公巡撫至縣又於公勸分公又出五百石趙公大悅上其事天子嘉之降敕旌為義民勞以羊酒復其家於是公之義聲聞天下天下富民皆化公所為爭出榖以濟飢而義民之旌亦滿天下晚年營别業以佚老名曰貧莊謂其子若孫曰吾非貧者慮爾曹為富而害義此所以訓也昔洪武初法制未備公兄弟早孤豪橫多侵奪其産及稍長智略過人奮然欲有所為諸豪知不便於已出力沮抑之公謂兄秉初曰必去是吾乃有寧宇秉初竒之縛其渠訴之京皆得罪而胡氏遂復舊觀由是人皆憚公至老而篤於義厚於施而人復愛且重焉公非殊於昔也皆義之所當然也以正統癸亥十月草四日卒享年七十有五兩娶龍潭曾氏皆早世繼以雙溪劉氏有賢行子男四其葬以甲子正月四日其墓在里中大木坑之原子昕來京師求豫文表諸墓嗚呼義者天之所賦人之所同得者也推而行之豈以為名哉然而名必歸之者上之人所以勸天下之為義者也由是人皆賴之而適自公始公之惠利其大小可知矣孔子曰君子喻於義又曰君子義以為質然則謂公為君子豈不稱情也哉故表諸其墓周功懋墓表功懋諱勉姓周氏吉水泥田人正統乙丑六月二十五日卒于南京之寓舍年五十七從子謙奉柩歸以缺年缺月缺日葬于某鄉某山之原弟翰林侍讀功敘既銘其墓矣復求豫文刻于墓上以表著其德俾永永不朽豫嘉其意故不辭周氏世儒家功懋曽祖聞孫元貞文書院山長祖觀贈奉直大夫兵部職方司員外郎父岐鳳纍官至兵部職方員外郎母彭氏贈宜人繼母王氏封宜人功懋少喜學以舉進士為業弱冠父命理家政凡四十年一門之聚常百二十餘口公私百需皆功懋主之蓋自山長以來不異爨至職方尤篤義不倦二弟早亡皆撫育其孤功懋克承厥志內外雍睦無間言孝於二親職方在逺外間嵗必往省有疾躬侍湯藥事生送死極其誠敬無違禮而哀戚之情過之友于諸弟本乎天性其言煦煦未嘗有所忤功敘在北京數有詩相往來愛厚之意溢於言外宗族有祠以祀先則力相其成鄉里有爭辨則為之處其平賙窮恤患扶弱抑強事有關于紀綱風化者毅然自任而不回愛其子復巽遣為學官弟子員所以課勵者甚至嘗曰吾早任家政不及仕爾勉以成吾志其風度凝重善談論所謂詩清婉有思致以雪坡自號有雪坡集藏于家娶王氏濟陽教諭子職之孫生子三人長渙早卒次復與巽也女二人繼室劉氏側室子一人曰益孫男二人功懋來北京視功敘因過南京得疾卒功敘感兄之為已來也而不得一遂焉哭之過時而猶悲於是以墓表屬豫豫謂功懋孝友人也孝友之行施於家而推及鄉之人孔子所謂是亦為政也仕不仕奚足校哉仕而無所立於世孰若不仕而有立之為賢也功懋是已用表諸其墓刻石以示來者石可泐也名不可滅也於戲王彥瑞墓表彥瑞王氏蓋王長者之裔其先自廬陵何山徙安成之連嶺又徙泰和之南富為望族彥瑞曾祖敬翁為池頭郭氏甥遂家池頭祖復初父麟昭皆不仕彥瑞幼聰敏喜學才智過人弱冠即能幹父蠱公私之事皆任之父之心安焉永樂中縣官命麟昭領千夫往永州萬陽山伐宫殿大材輸京師彥瑞不欲勞其親請於官曰吾方壯足以任此願代父往縣官竒之遂行彥瑞能撫馭人人樂從然入山多病死者什七八而彥瑞無恙人以為天祐云母溫氏早亡能盡孝道事繼母韋亦盡禮韋有子辱愛於父資産隂厚與之彥瑞克如其志父卒待之不衰嘗出遊湖湘淮濟倦而歸曰讀書力田吾樂也早暮肆力其間闢一軒環植以菊號菊軒花時與客觴詠雖連日不厭喜閲諸史究前言往行用以為法戒篤於教子曰吾所置腴田若干畝勤學有成者吾盡以畀之既而仲子儼取進士即授以田儼力辭不受曰願與兄弟共之人皆稱其父子之賢儼為行人司副所以教之者尤篤謹於祀先祖考忌日哀感如初喪不飲酒食肉與人交有信義樂道人之善人有不平求正者必折之以理無不悅服其善行類如此正統乙丑十一月初九日以疾卒于家年六十八初娶郎湖趙氏生子文震早卒不復育乃娶郭氏曽祖母黨也生三子長倫次儼次儀女二嫁歐陽淘曽鑑孫男四女二池頭在縣西十五里其地之良田深池多王氏業也豫少時嘗再三過之然未識彥瑞二十年前聞豫兄治别業在蘭塘開軒閲稼名曰稼軒與彥瑞菊軒最相近二軒皆景物殊勝可以杖屨相往來而豫且老矣思從豫兄學稼以自足暇日過菊軒掇英泛酒而酌之三人者皆庶幾康生得不死孰知豫兄先往而彥瑞繼之嗚呼豈非命邪儼歸治喪求豫文表諸墓上豫既為著其美而感慨繫焉使歸以鑱之石封編修劉公墓表公劉氏諱髦字孟恂永新人以子定之貴封翰林編修文林郎正統乙丑十月九日以疾終于家年七十三劉氏之先居安福荆山世以宦學顯聞後乃徙居永新之藥湖其曰才卿溪所元傑三世皆不仕則公之曾大父大父父也元傑為永新城北歐陽氏贅壻遂家城北而生公早從鄉先生劉逸安吳孟勤謝子方學頴悟絶人經史淹貫鄉之學者又多集其門公事親孝始冠即能幹父蠱公私之事皆身任之不以勞其親母性最嚴公夫婦奉事甚謹若意有未慊即惴惴引咎立階下不敢退或俟命寢門外至夜分必意解乃已母嘗病痢勢危殆則晝夜扶持至手掬其矢溲二親沒治喪一用古禮而哀戚過焉永樂戊子領鄉薦為易經冠然以多病不欲出退居石潭上課童奴治耕稼講學以為樂弟子從之者彌衆稱為石潭先生而不名有姊早寡從兄四人皆無後公篤於愛敬生則迎養死則殯葬焉鄉人有急周之恐不至時諸縣丁夫伐材萬羊山道出永新適嵗飢疫死者盈道上公率家人荷鍤往上下三十里間掩藏者凡百餘有鄉人李自逺歸病且死同舟者懼貽纍及公里中舉置河上神祠而去公知之與湯藥不能救瘞之祠下録其槖榜祠庭數日李兄至悉以歸之兄與鄰人曹有怨誣曹殺其弟訴之官曹引公為證憲臺遣人逮公索重貨遂傾其家或笑公行仁乃得禍公怡然不為變篤意教子以通經博古為務定之受公教會試禮部亦以易經冠多士遂入翰林為編修而褒封及公矣然公所以教戒者尤切初娶楊氏無子又娶留氏生四子定之寅之安之宜之其葬以缺年缺月缺日其墓在某之原平生所著有覆瓿集若干卷示兒偶録若干卷易經撮要四卷藏于家於戲公之學以聖賢為師而其道必本於仁義行於家施於鄉黨州閭門人弟子之所講説與夫應事接物酬酢進退之間未嘗違乎此至於權謀術數常情用以自豪而無復顧忌公往往陳義訓切之不改則與之絶猝然遇即退避引郤若將凂已然其為人如此蓋所謂篤行君子也一鄉一邑而有一人焉則好修之士有所師法而興起若公者雖久生於世而不厭乃今已矣豈不可惜哉定之來求豫文表諸墓乃為著其美且附以豫之意而使歸刻焉丁氏阡表聖天子嘉念羣臣茍有勞效於國者則必寵榮其身以及其親所以褒善而勸功也正統十一年用兵于麓川都察院右僉都御史上元丁公璿與有平冦功既進為右副都御史矣復推恩於所自出追贈其祖友輔考子玉皆為通議大夫都察院右副都御史妣皆贈淑人錫之誥命龍光赫奕輝映於其家公既拜賜然以官守不得躬致命墓下至是遣壻李祥奉誥歸上元以屬其二兄俾率諸子舉焚黃之禮而過豫告曰惟吾丁氏居上元之崇禮鄉世有隱德而恬於世利至璿祖考益以忠厚昌其家教子孫勤學問日課僮奴以耕桑為務供祭祀睦姻族尤謹禮蹈義與人言必依於孝弟忠信考其行不異其言一鄉之人尊禮之祖考蓋同德也先祖妣闕氏孝敬順祥以治其家先妣闕氏朝夕奉事必誠必敬婦道母儀為宗族楷法先祖以闕年闕月闕日卒年闕葬于鄉之石馬衝西山觜長子子賢生二子闕次即先考也享年闕卒於闕年闕月闕日祔葬于先祖之墓次有子三人長璵次琚其三即璿也祖考妣之卒則又各祔於域中獨先妣卒時璿蓋在襁褓罔極之恩愧弗能報此璿之所深痛者也惟我祖考積善纍慶百餘年而璿乃克承之遭遇盛時薦登顯仕先考初贈山西道監察御史妣贈孺人今聖明在上天威逺暢蠻夷悖叛自底敗亡璿實何功而冒膺寵祿且追榮及於二代皆進秩三品赫然驚人天地之仁雨露之施滂沛洋溢皆吾祖考之德之所致豈偶然哉語曰為善無不報而遲速有時信不誣也宜揭表於其阡以昭示後世敢以纍子豫與公同年取進士同朝蓋四十三年相好為最深且聞其先德舊矣義不可辭乃次第其説而使刻諸石用告其子若孫尚慎繼之永勿怠太僕寺少卿沈公墓表永樂二年太宗皇帝復以科舉取士天下之會試于禮部者凡數千拔其尤者得四百七十人海寧沈公志行初以易經中浙江鄉試第二至是會試在十七及奉大對占第二甲前列名動京師既而有旨又拔其尤者二十八人入翰林績學為文務追古作者而沈公與焉當是時四方獻祥瑞貢水土物不間逺邇足相躡于京師文人才士歌詠聖德以彰太平之盛者渢渢乎盈耳沈公之作諸公莫不以為賢會朝廷有大著述包羅古今揆敘萬類以為永樂大典又命取前後聖哲及名公巨儒之微言奧論足以發明斯道者以為四書五經性理大全諸書時公皆在其中最號能事名益顯於天下初授刑部主事升員外郎其所讞議號為平升四川布政司參議伐宫殿大材躬履巖險而人皆樂從其所取者皆中度連丁父母憂葬祭皆克盡禮服除調除河南參議時薊州永平宿重兵防邊都督陳敬統之簡文臣往參軍事公奉敕以行監軍貴人蕃種也蕃來朝者道其地則隂與之狎凡其類在軍中則縱使為惡公私苦之乃以嚴刑馭下使不敢有言言者或抵死私造兵器詐張敵聲息擅調益官軍人皆謂其志叵測然難於發言會有國哀人言益藉藉公曰吾奉命在此當知無不言若復顧忌不為朝廷言之一旦竊發死有餘罪即密疏其事以聞曰願早發宸斷庶消患於未萌疏奏即有旨召還邊境帖息今上嘉其勤誠賜白金二十兩綵幣二有副未幾召為太僕少卿公曰馬政國家重務而吾輩主之何可以不慎魯頌之無邪衛風之塞淵此其道也使任其事者皆篤誠無怠馬安有不蕃者乎凡公之所巡厯考閲者皆以是為訓馬大蕃息纍進階至中議大夫勳為贊治尹且贈其父明逺亦太僕少卿母葛氏繼母錢氏妻胡氏皆贈恭人公賦性溫厚耻言人過自奉儉約而樂周人急臨政一以愛人為本好學之心老而不倦正統丙寅二月庚戌以疾終于位年七十一上聞之遣官賜祭在朝士大夫莫不傷悼致賻奠公初娶胡恭人生一男早卒女二繼室張氏生男昶又娶解氏生一女尚幼至是昶來京師奉柩歸葬其里之某山從先公墓次國子祭酒李先生為之銘又奉公之宗弟教授寧所為狀來求豫文表諸墓道憶豫與公同年取進士同選入翰林同仕於朝四十有三年今之存者豫與李公輩四五人而已常謂公之才行豈止於九卿副進而佐六卿無愧也屬意於公者不獨豫一人而卒不如志豈非命邪然公之所樹立自足以表著於後世而不系乎位之何如也故為書之俾刻於其墓之原西軒蕭先生墓表西軒先生姓蕭氏名金字孟廉西軒其别號也蕭氏為泰和南溪望族其先世篤義有傳在家譜君慕其髙風雅度思紹續不忘嘗作屋以居而問名於豫豫取其所向名曰西軒且為之記因天之利時之秋人之義而言其理甚悉君日坐軒中讀書明義將充乎其極至於不可勝用士君子因稱為西軒先生君之曾祖蘭谷祖自新皆不仕父鵬舉以賢良薦為蘇州府同知未幾罷去久乃復起為山東鹽運副使寬厚廉慎尤以詩名搢紳間君其長子也母郭氏有賢行甚宜其家運副公早從仕君受慈訓為多讀書勵行懇懇致孝左右奉順無違禮其宗族最蕃而外姻戚亦夥君承上撫下制事度物公私酬應輕重緩急無不適其宜嘗請於母夫人往省父運副公甫至京訛傳公病君亟擕一僕渡江冒暑雨走千數百里至山東而公無恙忽聞君來驚且喜曰吾早違汝不意汝之成立如此也朝夕奉養恩禮隆至復隨考績之京師凡遇景物必命題使賦而公自和之因以啓其興發其才由是君之學識日進其省覲凡再而所益多焉君與弟鎡孟勤尤篤而教其子與弟之子及內外屬之子弟必由於義依於仁忠厚樂易而負直氣不隨俗俯仰人有不善則折之以義然能改即止復歡好如初長身玉立襟懷曠如人見其瓌竒磊落謂功名可立致皆勉使從政君曰吾姑施之家可矣及孟勤取進士官翰林子灓亦以明經為教官則嘆曰吾老矣吾弟與子能效用以報國家吾其休哉不復有仕進意盡以家事付諸子營别業於其鄉履塘居之以泉石自娛足迹不一至官府縣大夫髙其行鄉飲以賔禮之亦不赴視當時豪傑以勢利自雄者蔑然若浮雲之過眼一不以屑意蓋囂囂自得也君生於洪武戊午闕月闕日而以景泰癸酉九月十八日卒享年七十六娶樂氏為婦為母皆盡其道子男三長即灓由鄉貢進士為長洲教諭國子助教今通判順天府豫嘗從君遊而孟勤相好尤深今為太子少師戶部侍郎翰林學士朝廷推本於運副公而以其官贈焉君篤念少師思復得怡怡之樂少師亦深念君而冀一遂焉而君不待矣乃自為狀寫其哀戚之情而灓持來求豫文以表諸墓豫與君再世為婚姻豈可辭且今之鄉邑有令德懿行如君者蓋少而君視之蔑然者蓋多表而著之足以為世勸也故次第其説使刻焉楊從晉墓表泰和楊處士從晉以永樂十二年正月草二日卒于家年七十二是年闕月闕日葬千秋鄉過路塘之山下後十八年其配郭氏孺人年八十亦卒祔于處士之墓又七年為正統二年其孤子珩子珹子珮相與謀曰父母之葬既有銘以納于墓矣若又表其德于墓上豈不益明顯而延聞于世乃以書幣來北京請豫文將以刻諸石子珩豫女兄之夫而子珹子珮皆有連雖不得辭然縻於職務未有以復也久之子珮又以書來速文曰子知吾親宜無愛於言乃著其實俾揭焉楊氏故大家而族屬最蕃世居汝南坊號上園楊氏曽祖述叟祖宗哲父憲恭雖不仕然皆富而有文有元之季盡失其故業處士恭儉勤慎務不辱其先言行必由於禮義卓然出儕輩初娶東門劉氏賢而有婦道處士再造其家實克相之劉孺人卒處士求同德以成其志遂以郭孺人繼焉郭氏世居縣西之大溪孺人則柳溪之曾孫景宣之孫才卿之子也資稟端重色溫而氣和既歸處士尤謹於內助處士孝念其親必盡誠相祀事其撫育孤姪則加之以恩親賔往來處士欵洽於外孺人治具於內必潔以豐歲時饋遺輕重疏數必適其宜撫異母子如已子衣服飲食必均所以訓勵之者亦無彼此之殊處士勤於治生資産日盛而孺人樂儉素未嘗侈費一錢以故家益裕皆處士之志孺人成之也處士既卒三子因其所遺各置别業於西鄉孺人亦厭城市喜田園板輿迎奉極甘旨之養鄉人以孺人有福而其子能孝莫不譽歎焉處士三子子珩子珹劉孺人子也子珮郭孺人子也女八人皆有歸孫男八人維繼綸纓鎮緘純緒繼領鄉薦為河內教諭今已卒孫女九人曽孫男三人憲廣懋嗚呼元季兵亂以來大家世族之淪喪者多矣髙門大宅廢而為邱墟子孫亦降為輿𨽻或湮沒而無聞其能修復舊觀如上園楊氏者甚少蓋由處士之孝不墜其世業而又有孺人之賢以為之助也生既同勤以成其家死又同葬以妥其魄則皆表著其行而使同不朽焉豈不宜哉故為次第書之使後之人有則也同知郭君墓表景泰二年辛未闕月闕日德安府同知郭君以疾終于位距其生洪武戊寅闕月闕日享年五十四闕年闕月闕日子公榮等奉葬于闕之原而以書來京師告豫曰先人不幸棄諸孤於其葬也得舅氏憲長劉公銘其墓矣而墓上之石未有文以昭德垂逺幸嘗辱知於公今又託姻好敢請一言表諸墓庶永永不朽豫嘉其孝而諾焉郭氏居萬安下驛為名家曰某曰昭明曰文仲者君之曾大父大父父也世有德義而不仕文仲甫娶劉氏生君自幼而孤母辛勤教育之君雖幼已能知愛重思讀書自立及就外傅益勤篤不懈母嘗語其先世詩書之訓則服膺不忘母益喜知其能有立遣入縣庠為弟子員事師處友皆厚資給之君夙夜孳孳聖經賢傳務深窮其奧凡所以修於身行於家與夫治人接物者皆師諸古言行恂恂必盡其道學既成充貢入太學彌自飭勵不隨俗俯仰六館之士皆英才端表儀者皆天下名儒碩師而皆稱君為賢久之厯事都察院憲長江陵張公喜曰以子之才於吏事有餘暇宜以所學教諸生使其子受學凡諸御史有子願學者皆來從然君於治獄亦不廢公平廉慎凡遇君論斷者皆悅服及謁選吏部考第髙下諸生百餘人君第一遂授德安府同知既至廉察民隱興其所利而去其所害應城民徐綱事母孝母沒廬墓三年君奏請旌其閭孝感人周鼎搆誣詞起大獄親識劉源邱元皆當死不能辨君曰誣人以死如天道何反復窮詰之得其誣二人皆不死隨州舊有銀冶久廢姦民妄言銀大發欲告之官冀復開冶以規利君聞之亟呼至諭之曰此以無礦故廢朝廷不欲以微利病民莫大之恩也今爾欲復之若所得不足償所費則爾之禍一縣有已乎衆皆咎其妄言事遂已荆州守臣奏欲倣山東設譏察以捕盜事下湖廣按察司俾勘驗其可否按察司以屬君君所至諭其人曰譏察雖能捕盜而亦能害民爾知之乎禁戢盜賊之利未及爾而搜索連逮之害先及爾矣增一譏察是增一巡司也設否孰便衆皆歡曰不設便願堅持此議以惠民君具以聞荆州遂無譏察人至今德之其心之厚於民而所行之善多類此景泰元年述職朝京師天下守臣以稱職聞者蓋無幾而君表然有賢名既歸乃嬰疾不起德安之人無問少長愚良文武細粗皆哭之哀君之德善在人可知也君配劉氏有賢行三子公榮公績公熹女一嫁蕭彞下驛於泰和為鄰境豫嘗識君之從父工部主事原琳於文貞楊公所魁然偉人也既又得識君而知其才行之美政事之優自謂名家生賢如此誠足以亢其宗不幸而主事君卒猶幸有君在焉今而又遽去豈不深可惜哉天道佑善其報君者詎止是君有子有孫安知其不益昌大也哉故為表諸其墓鍾處士墓表鍾故宋微子之後其受姓命氏之詳有譜牒今居溫州瑞安之鹿岩者蓋處士八世祖成德自霅川徙焉又三世曰某仕元為國子學録學録孫廷俊廷俊生士皆博學能文章士皆生應時娶沈氏則處士之考妣也處士諱音字玉和自少端重不妄言笑喜讀書手未嘗釋卷不肯慢戲佚遊事父母極孝敬左右承順務得其歡心服食起居亦躬視其所宜雖祁寒盛暑不少懈若有疾飲藥夙夜奉侍尤謹親沒治喪以禮而哀戚過之嵗時奉祭猶感泣如初喪事兄玉振則雍穆盡誠恭愛之意無間朝夕飲食遊從必與偕怡怡然相得也家故饒財而樂振貸宗族之貧者賙給之孤遺男女則教養之婚嫁焉鄉閭之人有困乏者每濟之無吝色凶嵗則大發粟施豫雖傾囊倒廪不之惜其心之厚於仁如此平居言行恂恂凡發諸口行諸身者必本於聖賢之訓其為詩若文必據於理非端人正士不與遊一切勢利紛華不入於念慮郡邑大夫行鄉飲必以賔位處之非公事不一至城府是以人無少長愚良皆尊禮焉生於洪武戊申六月草一日而以正統辛酉二月十七日卒享年七十四葬邑周奧先隴之次元配李氏繼室董氏相繼先卒皆無子而皆祔於處士之兆側室二皆李氏其一生三子侃仁侔其一生四子偉停清偶處士皆使之學嘗自念曰吾家素積善子孫當有興者遣清受學縣庠而督勵加焉清學成取進士為稽勳主事人皆謂積善之報亦處士善教所致也景泰五年闕月闕日清母卒即解官歸將奉葬處士墓側謁豫請曰先人葬已十四年而墓上之石未有文以昭德垂逺敢以考功郎中黃采所述行狀來請願先生賜之言俾托以不朽為幸大矣豫聞魯叔孫穆子言人之能不朽者在立德立功立言鍾氏之先之久而盛者其所立可知矣而處士之德之孚于家儀于鄉又如此豈可無文以傳不朽顯親揚名孝之大者宜清之欲有述也國朝之制仕者有所立則推恩及其親今清列官于朝遵處士之教而有立焉則褒贈及之錫命之華赫然照映於其後豈不百世有耀哉故為表於其墓以俟知縣項君墓表景泰二年天子嘉念羣臣之有勞績者皆本於父母之教詔有司褒寵之曰朕以勸忠與孝也有司言工部主事項備為縣令滿九年以績最得升今幸有榮命宜在褒顯之列上命以備前所居官贈其父惇為文林郎安仁縣知縣妣鄭氏為孺人皆賜之敕命備既拜賜録其副焚告于墓下至是謁豫言曰先考實有令德孚聞縉紳間不幸奄棄諸孤既葬而有銘納之墓矣今二十九年墓上之石未有文以表著于永久備蓋有待也兹蒙天子之寵命褒贈至七品顯榮光大蓋非常之幸也敢請先生為文刻諸石庶託以不朽豫嘉其孝而諾焉按狀君諱惇字士溫世為溫之瑞安名族髙祖公徹汀州通判曾祖光祖長樂主簿祖諱師之父諱誾皆有德善而不仕君受教於家以孝友稱父嘗被薦上京師君甫冠侍行雖居旅次左右奉順不異家居時父既引年而歸君與仲兄愈綜理家務一不以嬰其心父得享其樂而以夀考終君治喪奉祭悉依家禮絶緇黃不用時節薦享哀慕如初喪伯兄愷雖異産友愛無間言從弟怡坐纍役石城事嚴役徒稍緩輒至斃君與仲兄更往調護之怡得全歸方是時法令更新事多趣辦為縣者審所宜訪諸故老率依違其間獨君侃侃為折中事以辦治民亦隂受其賜里閈忿爭親朋有闕失多咨決於君蓋君循循樂善謹禮而蹈義事非其所當為者未嘗加之意唯以慎終追逺為務修譜牒理祭田葺祠堂正塋域課子孫力學思不忝厥祖會鈎黨之禍起憸人欲中傷項氏君能豫防於事之未形輒先杜其機姦不得發而族賴以完君子謂君之智足以亢其宗晚年家居與親戚故舊徜徉泉石間觴飲既酣道古人竒節偉行髙談劇論以為歡蓋忘其身之老也初娶董氏先卒繼鄭氏元順德路同知津之女亦先卒二子長曰儉董出也次曰備鄭出也女一嫁同邑金子厚孫男四宣德元年三月君有疾呼二子儉備語之曰居者以勤儉守業仕者以廉恕處心吾目瞑矣以是月戊午卒距其生元至正十六年八月丁卯享年七十又一其年八月已酉葬邑之帆遊鄉白門山與鄭氏同兆豫聞項氏之先有仕至祕書以文學顯者汀州長樂皆受子民之寄君之祖考雖未見諸用而善之積於躬以及於人者蓋多故備超取顯美以名聞當時而褒贈之典及君由是而升祗服天子之詔而篤念考之遺訓忠孝之道兼盡而益隆則君之顯榮光大有已哉故表諸其墓以俟段處士墓表處士段氏諱鳳字若用夀寧翁别號也其先淄川人唐時有成式者為吉州刺史子孫因家吉之禾川後又徙廬陵至處士曾大父正允始徙居泰和城西大父道源不仕以儒術教鄉里父繼道字益謙娶鄢氏生子五人而處士居長美容質喜讀書同學皆推讓之而尤以才敏有時譽益謙以事赴京師卒於途處士年財十四即奔走歸其喪葬祭以禮哀感行路事母極孝敬而撫諸弟尤篤弟若麒若金卒與若龍若麟雍睦無間資産益饒會徙閭右民實京師處士在行時有以計免者或亦勸處士處士不從曰吾不履險以速禍既而幸免者皆得罪處士居京師數嵗得代還衆皆服其智識過人每事咨決焉縣令丞欲舉用之以母老辭母卒弟若龍亦卒處士治喪皆以禮若龍無後婦陳守節不嫁處士命子京為之子以養焉後京又卒乃盡以先廬處其嫠俾各有寧宇而别搆厦于里巷之西居焉建祠以祀先作齋舍聚書史延名師以教子孫日與士大夫語道理論古今觴詠以為娛且樂耕稼築髙洲别墅課僮奴致力其中杖屨逍遙以觀嵗事之成囂然自得也鄉邑姻舊有窮匱者輒賙之凶嵗即發廪以賑貧乏凡假貸不能償者折其劵嘗為萬石長治賦稅有惠愛不怙勢厲民民德之部使者行縣察民病他以事受逮者比比獨處士無間言人皆謂忠厚之報處士二子素京皆嗜學礪行有志於當世及京亡素理家政學遂廢長孫纘頴然出儕輩遣從曽先生鶴齡受書經所以成就之者甚至取鄉貢進士為阿彌州學正處士尤以逺大期之曰教官致治之本當以道自重毋以卑冗為戚也正統辛酉六月得疾且革遺言子孫當務忠孝以光前裕後言訖而終是月十五日也生元至正乙已九月十六日享年七十七妻劉氏有賢行先處士五年卒子即素京女一嫁康叔緒孫男三纘今為國子助教綸綰皆為士人孫女一適髙要令蕭薦之子􅀈今以舉義得官曾孫男八玄孫男二處士卒之又明年闕月闕日葬邑千秋鄉吳潭山之原素自為志以納諸壙尚慮其德未盡顯於後命纘屬處士內姪河南參議劉渙為狀來謁豫文表諸墓豫與處士居同里知其德為詳且嘗為贊其像矣至是復求表於豫豈以豫文為足以傳信哉君子之德有諸身固足以儀世而範俗然非有賢子孫則鬱而不章者蓋多矣是以君子貴有後也今處士之子孫汲汲以顯揚為事所謂先祖有美而能知而傳之庶幾乎明且仁者矣則豫豈可愛其不腆之辭不使著于後世哉故表諸其墓太孺人陳氏墓表陳氏泰和故家蓋太丘之後世有德義多顯人萬安縣尹贛州路推官缺新淦州判以新則太孺人之髙曾祖考也父有開不仕而以儒業教鄉里太孺人諱貴自幼聰慧端重寡言笑讀論語孝經女教諸書皆能通其意而見於行事衣服飲食凡女子所宜務者皆不待教而能父母最鍾愛為擇壻於楊氏得仲穆遂歸焉楊氏亦泰和故家動有禮法太孺人之為婦也移其所以事父母者事舅姑祭祀賔客必適其宜內外姻族尊卑踈戚不可一二計而嵗時往來慶吊問遺無不當於理者仲穆忠厚簡默然與人處好盡言以規其過太孺人每約於中道故人人稱其賢永樂丙申仲穆卒太孺人篤志自守撫育其遺孤常舉先人所以訓勵子孫者語之使學焉於是五子皆卓然有立其季德敷遂取進士為大理評事有名上嘉之而推本於父母贈仲穆大理評事而封母為太孺人無幾德敷升太僕丞又升漢陽知府而才行益著太孺人得食其祿君子謂天以是報賢母也景泰壬申五月二十二日卒於家距其生洪武戊申十月十八日享年八十五子五人德崇德純德修德淵德敷女一人嫁謝士方孫男十三峕寶玄桓恪皓升晉通濟威菽蔣菽為邑庠生女六曾孫男十一長琚舉進士次璣為邑庠生次珖琉珝璃珀琅女四玄孫男一女二諸子既葬太孺人於其里梧岡之隂而德敷服闋來京師請於豫曰惟我先妣實有德善以儀于家而聞于姻威先生既知之矣其褒顯於朝廷而受七品之寵命亦可謂榮矣子孫之多足以娛其老而又以髙夀終非盛德安能致是哉願蘄一言以表諸墓上豫謂昔之君子之克顯於世雖繫其身之所立未有不本於父母之教故國家之褒重臣下亦必推本於其親蓋以勸天下之為父母者太孺人之德厚矣其獲福於天如此其偹表而著之豈徒信其善於後世使永永不朽觀乎是者亦必有所興起矣尚寶少卿楊君墓表景泰六年六月壬辰尚寶少卿楊君以疾卒于京師京師士大夫知君者莫不哀惜之蓋君先以繼母太夫人劉氏憂歸建寧朝廷授恩例遣官賜祭且為治墳塋以葬既襄事君亟率諸弟來謝恩矻矻然盡其禮君質厚氣充時方盛暑不得少自暇越二日甲午疾大作醫藥罔效乙未病益甚諭諸子曰吾年六十不為夭持身保家爾曹勉之忠孝勤儉以不墜先德吾死無憾矣言訖而逝君之弟與子晝夜哭盡哀以禮殯斂歸其鄉卜缺年缺月缺日葬于某山之原而以訓導馮鋋所為行狀來求豫文表諸墓楊氏建寧大家世有令德君髙祖伯遜曾祖達卿祖伯成皆不仕而君尊府字某諱榮乃以文學掇髙科官侍近事太宗仁宗宣宗纍進至少師工部尚書兼謹身殿大學士於是三代祖考皆贈以其官妣皆夫人少師公薨贈特進光祿大夫左柱國太師諡文敏君其長子也公初在翰林最承眷遇豫亦幸從公遊因得識君聰明俊偉端重喜學君子謂必亢其宗早喪母劉夫人公復以劉夫人繼君哀死事生克盡子道人稱其孝無間言且器量𢎞雅不妄動嘗侍公北上涉大江風濤暴作檣傾楫摧舟幾覆者屢矣衆皆失措唯君神色不動卒無恙又嘗過德州舟為漕船壓溺同舟五人沉沒者四君獨倚敗舟無懼色衆皆異之君曰吾豈不有命哉人以此益重君文敏公忠於事上不暇顧其家家事悉以委君俾處之盡其道凡祭祀賔客惇宗族教子孫仁於鄉黨州閭立義孰以訓願學者置義倉振貧匱舉貸者不取息爭訟者斷以理人雖德公之教而尤稱君之善承其教也公薨朝廷遣中使護喪歸葬寵終之禮有加焉君入謝特拜尚寶司丞君乞歸終制乃為人所搆陷君處之泰然久之上知其無罪且念公勞績驛召君復其官沙尤冦亂人罔不受害獨以楊氏能施惠及人遇所積蓄戒勿犯君亦遣書與弟讓子泰各輸粟千石助軍餉人尤以義許焉尚寶職最親凡所領事皆要重君小心慎密由司丞升少卿凡五六年無闕失亦為上所眷知將進用焉而竟以內艱去嗚呼今已矣豈非可惜哉君諱恭字允寬生於洪武丙子二月十二日至是年財六十娶建陽黃氏有賢行封安人子男十泰以軍功今為建寧右衛指揮同知俊中書寫誥闕偉補邑庠生女四皆適宦族孫男三孫女七豫聞之君子之興其家不偶然也必有德為之本初楊氏之貸粟與民而俾種木也豈必木之植哉蓋聊以為名而已樹成亦惟德之用不及其他由是積之久而大發於公今復於君見之而君之子則又以武功奮豫見楊氏之顯三世矣甚矣其德之繁昌也君之子若孫又纍纍而積之則楊氏之繁衍碩大可以數計哉豫為表其墓而必及此所以著其本焉耳觀乎是者其亦可以興起矣指揮同知陳公墓表公陳氏諱啓方其先應天六合人世有隱德太祖皇帝受命而興公之考晟以智勇自奮從征伐立戰功纍官至袁州指揮同知坐事免而卒公援例請襲不許謫戍大寧大寧臨邉重地而逺去其鄉公有役在官勤事不懈而力穡以養母人稱其孝及大寧兵起殺掠無寧居乃奉母奔竄以圗全有六嵗子號泣不能行母盧淑人命捨已而抱之行公曰母豈可棄今不能兩全則寧棄我子急負母逸出亂兵間得免於禍太宗皇帝靖內難豪傑之士雲合景從公在其中以勇略著聞攻城野戰摧鋒陷陳功居多事平授忠義左衛指揮同知公喜曰吾父以功得此官不幸失之今吾遭聖明而官亦至此豈非天所定耶吾何以報國家惟勉於忠義而已久之上以遵化亦近邉要地命公往守之公鎮之以靜不急近功小利兵民安焉以城守勞績進階懷逺將軍得世襲俾息勞歸京師永樂十九年二月七日卒于家年五十二配淑人張氏袁之宜春人嶽州衛指揮廷秀之子端重柔惠事舅姑克孝敬左右奉順務得其歡心大寧之禍劇矣能相其夫捨其愛子而奉母俱免禍其篤於孝義而見幾明決如此豈淺薄者可比哉公卒後二十六年是謂正統十一年二月二十七日以疾卒年七十三子男二長即大寧所棄者次曰逵字宏道復以功進位都指揮僉事有盛名女三肅州衛千戶胡勝之弟海常山中護衛指揮同知錢輔富峪衛指揮使石堅其壻也孫男二珦琇女二宏道既奉先考妣合葬于宛平縣京西鄉之原前國子祭酒李先生為志以納諸壙至是又思表其德以示于永久乃來請豫文刻於墓上夫君子之欲顯其親必論撰其德善列於天下後世所以崇孝而垂教也若公之德有於身而能立功名取爵位其所以獲乎上者又足以承休儷美而不失前時之聞此豈偶然之故哉今其賢子又克效忠勤受寵命而進於顯榮孔子曰積善之家必有餘慶陳氏之盛有已哉故為表於其墓百世之下有考焉給事中李公墓表公李氏諱諒字益友永新錢溪人兵科給事中鈞之考也聖天子嘉念羣臣之有勞績者推本於父母之賢而以其子之官寵之於是鈞考績以最聞得封公為徵事郎兵科給事中逮命下而公卒矣鈞哀公不得久存以享榮命攀號哭踊幾欲無生即解官歸治喪乃自述其世系善行來請曰先考承先世之遺實有令德以啓迪後人宜受福於悠久而不幸已矣今將奉葬於某之原墓前之石當有文以昭德垂逺非先生莫宜為敢以請豫嘉其意而諾之按狀李氏蓋唐西平忠武王晟之後晟子憲觀察江西孫遊刺袁州遊子丕令宜春因家焉後又徙吉水之谷村永新之浣溪代有聞人至公曽祖道節祖貫章父天祐皆不仕天祐為錢溪劉氏甥因家錢溪而公生焉天性和厚而操行甚謹不輕舉妄隨其治家嚴而有法稱易所謂嚴君者家人少長有小拂其意即堅卧不食公率妻子泣拜床下請改過乃解而公夫婦終怡然侍左右無毫髮厭倦意其事妣劉孺人皆極孝敬始終無違禮人稱其孝叔父天福居浣溪貧而無子其沒也公以禮葬焉迎養叔母左氏於家終其身長兄晉賢先卒公哀思不忘事仲兄斯友如事父後客死襄陽公念之輒流涕事寡嫂吳氏盡禮而撫育其遺孤吳氏兄弟相繼卒其外父母貧無依公以兄故亦迎至家養生送死皆賴焉人稱其弟尊儒好學本於天性從叔李伯尚母舅劉逸如妻兄鄺彥琳皆一時賢者公禮為孰師訓子弟而敬事不懈尤慕石潭劉先生學行而以不得親炙為慊乃為鈞請婚因遣就學而締交焉公喜從數君子遊自謂有得於已曰是與吾名字協矣扁其齋曰三益晚益嗜書手不釋卷雅愛歐陽公文常取其所作諷誦之而深有味乎其言性恬淡靜重家事不以纍心故人賔客相過從樂宴處無間言縣大夫髙其誼嵗時鄉飲以賔席處之然有不可於意則辭不赴教諸子必以道鈞取進士官近侍訓之尤切屢書古人忠孝大節以勵之鈞奉命惟謹至是以賢名於時而公亦受褒寵此天所以報公之德也公生於洪武辛酉二月十一日而以景泰乙亥五月二十六日卒享年七十五配鄺氏有賢行子男四女三孫男十四女九人曽孫男六人公既承世澤之長以昌大其家而其所以成於身者尤篤於詩書之訓孝弟忠信之行是以有子有孫以克受天子之寵命以是而表諸墓斯可以不朽矣故次第其説而使刻諸石贈侍讀劉公墓表吉水夏朗劉氏始自泰和珠林而分宋元盛時以經學顯公曽祖益厚祖維德父永寧皆有學行公穎敏不凡父竒之使從劉文同先生學深有造詣父卒公獨任家事不以纍兄弟然學亦未嘗廢訓勵諸弟養性庸性俾博學不倦姪鼎貫幼公為綜理其家使專意讀書其後庸性舉于鄉鼎貫取進士任臺憲有名公之教也劉氏族大凡三百餘家公日往來相教語為士者篤於學為農者勤於耕孝敬以事長和惠以字幼而惇厚以睦其鄉人尤以端本收族為重修譜牒作祠堂嵗時祀先畢則族之人合宴于祠下俾各出其譜以防妄冒而以蘇氏族譜亭記為説相戒勉由是鄉族之名為有禮法而能繼承不墜者莫過劉氏晚嵗作室於所居之西號曰退菴自為贊以示志君子韙之公年德俱尊養性庸性皆厖眉皓首鼎貫亦致仕而歸衣冠儼雅容止可法四方賢士過其鄉者必造焉相與講學問業久之然後去巍然老成之望公坦易直亮行必由義不為利害所移妻之家嘗得罪當沒入公為收養二孫女嫁之且為佃其居事平以歸所親曰此為楊氏計耳居存則楊氏猶存也與人交必以信其待下雖嚴而恩不衰人德之宣德丁未年七十二八月十六日以疾卒逺近之人哀惜之娶楊氏宋屯田員外郎丕之後有賢行子男三長爽次幹次儼爽先公二十四年卒儼正統七年進士第一官至太常少卿兼翰林侍讀女二孫男七以缺年缺月缺日葬公里龍下庵前之原至是公以儼貴贈官至太常少卿兼翰林侍讀卜者以葬為未利子孫將改葬于闕山之原以前翰林編修王先生雅所述行狀屬豫文表諸墓豫聞君子之欲世其家者必以詩書仁義為本詩書仁義之習勝然後家之道成此君子所以貴有立也夏朗之劉盛於宋元當時以經學名者多出自劉氏至公又能成族屬之賢而家益盛公之子乃以文章魁天下而公遂食其報褒贈之華自天而下又何其盛哉用此以表諸墓可以百世不朽矣故次第其説使刻于墓上楊子珹墓表公楊氏諱玉字子珹其先居吉水再徙泰和為上園楊氏曽大父宗哲大父憲恭父從晉皆不仕而皆惇德蹈道以豐其家母劉氏公其第二子也方在娠母已有疾既娩而母亡衆以為禍其母欲棄之伯母李心切哀焉曰母既不幸當存其子匿不與然絶乳哺數日矣視其息尚存衆以為異曰此天也亟求乳活之鄉之姻戚郭忠禮與其內黃氏嘗受惠於劉孺人願抱歸撫育以報德在郭氏七年視遇如所生稍長問知本末常號哭以念母悲戚以思父而父與繼母郭氏皆憐之俾之歸公性至孝日侍左右聽誨言務順適其意及年益壯才智益充孝親敬兄事慈母與寡姊皆盡其道而終始不變至於公私上下應事接物其言有則而行有常君子莫不愛敬之永樂中北京營建鄉人餽運以供公上因憚險逺多避逃公則曰吾弟幼吾豈可纍父兄耶凡有事即請行洗手奉公毫髮無漏失官稱其能人亦樂其簡易不擾事畢功成則怡然自得曰吾亦可以休矣遂卜築於長溪課僮奴力耕將終老焉未幾兄子珩卜居上鄉弟子珮遷大陂相去不二里許佳時令節親賔過從徜徉溪山之間觀稼穡之豐成而逐魚鳥之翔泳樽酒相對歡如也一鄉之人莫不羡楊氏之盛兄弟並受其福於悠久而公之報德酬恩於死生之際尤惓惓然則其獲於天者有已哉公質直嚴重好善樂義周人之急規人之過行有未善者即靣責之能改則止故欲寡過而喜聞善者多親就焉古所謂一鄉之善士公之謂也公早有二子維縝好學而立家不幸相繼卒季子緒孫懋等尚未冠公日夜課之而試以事見其卓然有立志喜曰吾家事有托矣天順戊寅冬公有疾時方理上園故宅未畢工而醫亦罔效一日呼緒懋等語曰吾疾革矣然年幾八十死無憾惟上園舊業未克如吾志汝曹當協力成之則吾見祖宗於地下無愧矣言訖而逝十二月二十五日也其生以洪武辛酉十二月十七日享年七十八娶康氏子男二先卒繼室李氏子一人曰緒女三人孫男五曾孫二人緒等將以是年缺月缺日奉葬于缺之原既請前戶部尚書翰林學士蕭公銘其墓復求豫文表墓上楊氏泰和大家詩書之澤相承已久不特資産之富也善積於家施於人既食其報矣而施報相續於無窮則其盛可量哉况有賢子孫又能昭德著美於不朽豫豈可辭乃為之書使刻于墓上百世之下有考焉抑庵文後集卷二十七
