body:
  text: 抑菴文集卷十二明王直撰哀辭蔣良夫哀辭良夫蔣氏諱驥世家錢塘有秀偉之質有通敏之才有恭慎之心有溫厚之德始以明經取進士為行人太宗皇帝入正大統詔修髙廟實録良夫預執筆其間書成大賚升翰林檢討後修列女傳敕良夫與書之稱㫖復加賚及修永樂大典良夫為副總裁凡所折衷取舍皆適當勤於其職早夜不懈與人處言語恂恂未嘗忤於物人無不愛敬之者其後坐纍罷廢十餘年仁宗即位始復為檢討今上正位東宫妙簡宫臣以良夫為司直而推恩封其親及上登大寶擢良夫侍講翰林預修太宗仁宗實録既成賜賚有加進侍講學士不三月擢拜禮部右侍郎良夫先豫一年入翰林又長豫一嵗前後相好者二十年自同為宫僚以來其相好加焉蓋坐則連席飲食則連案有所往則連轡如此者無一日相違也及佐禮部慨然欲有以自立而豫輩皆甚期之先是有風疾治之而愈在禮部逾半月一日奏事廷中豫怪其跪起失常既退疾大作掖而歸已不能言矣衆醫環之莫能治須臾卒宣德五年七月缺日也豫聞即往哭之哀自斂及祭蓋屢哀之而凡厚良夫者亦莫不哀也嗚呼安得復見吾良夫也哉良夫所最厚者吾與曽公子啓輩七八人凡有著述及言語議論交相告而互相發皆欣欣然相愛莫逆也乃今已矣嗚呼安得復見吾良夫也哉良夫年逾五十官三品雖不得久於其職然其卒也天子為之惻然遣官賜祭且給其葬事又有子有孫於已可謂足矣獨父母年八十皆在堂而失壯子良夫何能瞑目耶天之於此其果何意邪當良夫無恙時常歎父母年老矣恐不得復見因切切欲歸省而事劫而留之於今竟不得一見而卒嗚呼其可哀也乎其不可哀也乎作哀辭曰嗟良夫兮德之良才既美兮學正以昌偉容止兮善文章遭遇聖神兮奮周行乘四牡兮歌皇皇從太史兮秉筆如杠儼司直兮躋桂坊侍經幄兮講甚詳三朝實録兮煒煌煌秩愈崇兮名愈彰黃金為闕兮白玉為堂朝夕出入兮承寵光宗伯所主兮禮明樂張進厥二兮福未央粲九苞兮孤鳯凰起千仭兮增翺翔何天之不淑兮遽降喪志未遂兮忽已亡繄二親兮夀且康容雖渥丹兮髮已黃壯子早逝兮能不䀌傷嗟良夫兮恨豈忘山與為崇兮川與為長豫託交兮二十霜聨朝位兮接鳴璫食必連案兮坐必連床年相若兮兹尚强恃子輔德兮庶永臧今則云逝兮毒我腸天蒼蒼兮地茫茫魂一去兮渺何方酹桂酒兮奠椒漿歌巫咸兮舞巫陽魂招不來兮我涕滂少保金公哀辭太子少保禮部尚書兼武英殿大學士金公以宣德六年十二月十六日終于位上聞之震悼加贈榮祿大夫少保諡文靖命有司歸其喪葬事皆官給名公巨卿及諸大夫士皆奔走弔哭曰公端厚君子也而今亡矣蓋公事太宗仁宗暨今上皇帝勤勞中外顯有成績春坊庶子周君崇述具著于狀可傳信不誣嗚呼公以文學致大官至于終又承恩寵如此長子以明經取進士其諸子皆能成其家天之於公厚矣可無憾也然直獨念初入翰林時公與同輩六七君子表然以名德相髙直時最少而最辱愛焉今三十年獨公與二楊公在位而直亦老矣猶資公以成德而公乃棄之此其可哀也公年六十四於夀亦不為少然善人君子得久生於世俾後生小子有所觀法而為善如孔子之於子賤云者此衆之所望而今不可得矣此又可哀也作哀辭惟少昊之淳懿兮開𦙍嗣之淑靈後百世而猶顯兮肆夫子之挺生抱忠信之美質兮服仁義以自潔既閎覽又博知兮紛獨有此姱節擷芹茅以徜徉兮曰俟時吾將行忽翺翔于天路兮遭永樂之盛明鳯翩翩而髙翥兮炳文章之五色引醴泉以為漿兮精瓊靡而為食驂玉虬以上下兮俯凌睨乎大荒贊神謨之燀赫兮夫豈昔日之子房痛橋山之弓劍兮仰重明之兩作人文粲而宣朗兮復修備於禮樂偉夫子之左右兮曰圖任乎老成朝吾遊夫玉堂兮夕吾息於承明非堯舜不以陳兮蹈先哲之遺則步金馬於椒丘兮紉蘭茝以為服彼疾騁而競趨兮榝既充夫佩幃循素履其坦坦兮指洙泗以為期嗟天道之孔神兮實謙好而順助羌獨戾於夫子兮傷抑鬱而奚訴荷便蕃之渥惠兮悼天之不憖也生既榮而死又哀兮乃夫子之幸也竊獨懷夫疇昔兮儼三四之俊傑曽日月之幾何兮乃一二之在列豫猶以為依兮冀示豫以不恌何夫子之復逝兮悵巫陽之能招年雖耆而未老兮天奚奪之亟也彼衛武之永年兮此何乖而弗之及也造天關而問兮天瞢瞢而不聞幸芳烈之有聞兮庶不朽而彌存蹇徘徊於故武兮心憯裂其若焚攬荃蕙以抆涕兮聊抒意於斯文封黃少保誄辭宣德六年十一月封榮祿大夫少保户部尚書兼武英殿大學士黃公思恭以疾終於家年九十三事聞朝廷遣官葬祭皆如禮公之福祿榮名既已稱其德矣然善人君子足以儀世範俗當久存於世使後生小子得有所觀法乃今已矣此士大夫所以痛惜也直嘗拜公而知公之德故昭述遺懿以示久逺作誄辭維公受姓實自軒轅德巨慶長繩繩子孫江漢之國著在周紀運移祚遷因以為氏宋有天下盛於永嘉詩書之懿閥閲之華曰衮最良䇿名進士御史檢法有譽於世世歷三傳修職復騫秩雖未崇行乃不愆嗣曰南一山長是職典教松陽爰發有奕維通承之世德用昌爰篤生公以紹其光公早失怙克奮於學有作自幼衆已大愕元季盜興竊據海隅人皆趍利公獨不汙嵗凶財匱而志彌厲事親奉先益謹於禮皇明混一公家復振推其嬴餘以周困貧寒者為衣死者為斂維義是急何有怠厭其心休休不競不絿橫逆之來弗督其郵中遭外纍資産盡入惟天佑善沛澤斯及有子克賢翰飛戾天蔚為名臣垂訓則然寵命再加躋于顯位三孤之尊六卿之貴命服煒煌鄉里之榮謙撝而光不失其恆晚嵗優游圖書是悅安樂之歌尚友康節謂逾百年福祉永綏悠悠蒼天胡不憖遺嗚呼哀哉惟公之德實備諸已孝友忠信匪言伊履在昔永樂初錫褒封公來京師謁謝九重因得進拜識公顔色其言恂恂其儀翼翼自公之歸將三十年引睇東南邈彼山川嘗竊自言天有顯道將善其俗使公夀考後生小子觀法在兹善人之多自公儀之胡為一旦遽受飯含哀榮終始公則何憾嗟嗟其鄉逺邇式瞻失此儀刑云何其沾嗚呼哀哉維古有諡易名節惠是告是舉有司之事爰述遺懿不顯益彰後百千年庶幾不亡贈翰林侍讀學士錢公誄辭吉水錢公好德以洪武乙亥正月十一日卒葬其里漢陂中引塘之原以子習禮貴纍贈官至翰林侍讀學士奉直大夫公有孝友之行負英偉豪傑之才元季盜起逺近騷動其鄉之人洶洶不自寧公之父立志甫倡義集民丁保鄉里公盡力佐之㑹嵗凶民困寇張甚度不能支乃擕家走他所凶渠憤之窮索其父子將甘心焉事急公謀於父曰我往以大義折之幸而聽大人可免禍若徒竄伏彼將以為怯必窮索不已脫有不幸吾族將奈何遂行渠得公不受其言而日肆搒掠體無完膚必得立志甫乃已公以死拒詞氣不少挫或有以利害諷其渠渠意解得遂免率親屬奔走避匿而善事二親親之心安焉亂定而歸理故業官府徴徭皆躬任其事雖遇憂患不以讓諸弟既而新第宅廣園地孝友之行彌篤寬厚和易未嘗以非禮加諸人見有為不義者必面斥其非一鄉之人敬禮之寡弱者得以立豪橫者有所畏而改所居之前有溪水縈帶因以南溪自號娶陳氏有賢行子四人習容習靜習禮習傳至是習禮為禮部侍郎而與豫莫逆知公之賢而歎其不至於髙夀是可哀也作誄辭在唐之季浙土繹騷武肅奮興克殄其豪奄有大邦子孫世繼家于員塘防禦之裔繼以吉甫立志嗣之實公祖考皆出等夷公生四齡早失所恃朝夕號慕天性篤至慈闈有繼以善事稱庭訓弗違孝行蒸蒸元季之亂寇盜蜂起操兵趍譁無間逺邇仗義集衆攘外安內父子一心鄉里是賴天胡不常植姦仆良彼凶慿陵欲肆翦戕公不自愛委身虎口以庇宗族以全父母天亦悔禍公則來歸骨肉聚歡不異平時世方底寧公私多故竭力殫財以給稅賦艱難勞瘁公皆任之有弟三人克遂愈怡經營締搆遂復舊觀園田豐腴居室華煥公之懿行寬厚和平大猷是經先民是程有肆于人公則沮尼或柔而顛乃輔乃翼確然自信守道不回縉紳攸慕鄉邑咸推衆之所希宜福宜夀才五十五胡不多又嗚呼哀哉積善有報實降自天天維命之子也克賢茂實英聲超取顯美推厥本源公斯受祉命書下臨為龍為光公方寵榮公豈其亡嗟我後生徒仰公德今既逺而使我心惻南溪沄沄達於漢陂百世之存百世之思嗚呼哀哉冰雪軒辭右春坊右諭德兼翰林侍講金公幼孜以冰雪名其軒君子有以知其素矣而惑者弗察也故豫為賦焉余既好此竒服兮爰昭昭以自持厲潔清之端操兮將古人以為期廓壅蔽之黤黯兮披汙穢而去之嵗冉冉而易遒兮唯昭質其未虧際嘉時之晟明兮乘青雲而上征凌天路以翺翔兮軼埃壒而抗旌朝吾遊夫清都兮夕余憩乎扶桑鑿瓊枝以為食兮吸沆瀣以為漿秉余心之貞慤兮肆忞忞其曷已雖所處之固然兮亦率余之素履匪善吾弗好兮匪德吾弗庸保厥美以上下兮暨豫心之所同何時俗之多偭兮紛馳騁以自强汨汶汶而莫知止兮乃謂豫為匪臧曰悶悶與昏昏兮孰萬物之我先斯伯陽之為道兮夫子乃歎其賢何明哲以多智兮亦營營於土田後千祀而猶顯兮羌孰得而舍旃磽磽易缺兮皎皎易汙塊獨守以為姱兮何不改乎此度衆欣欣以周容兮何吾與之寡也中怦怦以自信兮豈若是而舍也猗前聖之遐逺兮渺茫茫其何之余將就而問之兮質豫行之所宜精専専而內凝兮神剡剡而外揚俄惝恍以流從兮忽超乎余有行駟玉虬以前𨗳兮彼白虎為後驅邅吾道夫不周兮造顓頊之所居飄風蕩而吹衣兮𤣥雲翳其承宇冰峩峩以凝沍兮雪紛紛而交下炯皓曜以相射兮清氣迫而襲余晃然令豫開朗兮神蕭爽而情舒命𤣥冥以𨗳豫兮謂余言之纚纚曰太素之淳懿兮斯為物之所始嗟人之生兮亶其淑靈理粹而純兮氣厚而清湛申旦而弗亡兮豈庶類之可羣彼其謂子之不然兮夫豈守𤣥之子雲殷湯之博大兮乃銘器而諄諄去舊染之垢汚兮圖皎然而日新孔聖之大成兮曰吾涅而不淄皓皓其不可尚兮赫秋陽而暴之相矩矱之在兹兮信舍是其焉求俗幽昧以眩惑兮吾於彼其何郵駕余輈以回轉兮倐臨睨夫舊居謹余轡而正策兮意揚揚以自虞積雪以為墠兮斫冰以為宇余固處此而不遷兮庶有勺於此世重曰結豫心之耿耿兮增豫思之悠悠清白以為服兮慿往則而信修道曼曼其超逺兮豫曷日而忘之賦萬木圖賦建安有篤厚君子曰楊公達卿樂善好施賑人之乏而不有其名其龍津之木皆鄉人之所自植以識公德也公不以自利而材之所惠及者益廣而無窮誠可謂仁人者哉公之孫今右春坊右庶子兼翰林侍講勉仁以學士胡先生所為記示直直嘉其可以為鄙薄者之勸因為之賦余嘉夫子之茂行兮歷往跡以為虞曰龍津之奧區兮實惟子之所居山峻髙以造天兮疏靈美於荆梁谷威夷而修通兮屬迤邐之連岡渺茫茫而無極兮森鬱鬱其嘉植挺松柏與沙棠兮雜櫲樟與椅㮨梢青雲而布濩兮拂日月之精光風飄飄而輕揚兮紛發越乎衆芳猗斯植之為美兮薆鄧林之蔽滋惟夫子之好施兮昭令德其在兹伊昔日之荐飢兮哀民生之多艱忳貿貿而無所之兮情紆軫而浩歎囂自樂而忘人兮隱吾心而不能安欲捐糜而博施兮慮為名而致然曰孰為吾植兮惟粟之為歸衆纚纚而競進兮咸既飽而遨嬉亶惟匱之恤兮亦何心於所植也衆怦怦以自效兮植之周而不可計也偉夫子之髙節兮曰何有於此欷吾名之弗好兮矧惟利而顧懷願峻茂以致用兮飭學宫與杠梁貧者以為室兮死者以為藏専惟衆而不私兮吾之所豫也詒吾後以一志兮固不改此度也嗟夫子之孔仁兮配往哲為庶幾嵗忽忽其易更兮眷夫子其何之衆慿心以鬱陶兮激往日之悠思徘徊山下欲去而未忍兮悵離慜其疇依相枝葉之層敷兮惟渥洽之所在願結之以為佩兮服吾身而不可離熙愁約為舒泰兮惟夫子之故也思亹亹而莫之達兮願封植此樹也嗟人之生也服仁義而不偏相周以為安兮在夫人為固然何時俗之貪昧兮偭聖賢之遺則顧顛沛而莫之救兮申敓攘以為得覽夫人之齷齪兮誠有慨於豫心相嘉植之蕃育兮超獨於此而沉吟孰鄙薄而能亨兮孰廉厚而不昌貽孫子以顯隆兮信天道之有常雨露之所濡兮日夜之所息木欣欣其長茂兮澤洋洋其焉極薦瓊枝與玉英兮耿豫懷其未申披繪圖以泛覽兮聊抒意於斯文雪中散牧圖賦應制繄乾坤之育物實五緯之降精紛牛羊之異類均委命而賦形彼蠢蠢其何知豈智力之足營惟順時以惠養庶飲齕而全生爾乃嵗律窮時序更北風厲𤣥雲興綿萬里其暗曖同一氣之嚴凝俄淅瀝而霰集委珠㻗之先零已而密雪飛繁霙墜瑞葉布瓊花綴粲六出以呈巧彌九霄而表瑞增鳯閣之精明炯龍樓之妍麗於斯時也羣山失容百谷改觀猿鳥噤聲草木凍斷嗟柔毛與大武一圈局而拘絆幸晨光之熹微得從容以舒散於是離䦨牢出閭閈入凌兢涉皓􅀈肆羣行而侣逐碎連璐與叢瓘依長林之蕭蕭度平川之漫漫原物性之能遂非得主其疇依荷軫愛之不忘斯縱適而靡違蹲蓑笠之在背淡容與而自怡雖掩口而冒寒終有慈而無威是以性情協諧小大和輯其角濈濈其耳濕濕既安閒而自得故肥腯而博碩是知物之蕃盛信有賴於人力今聖天子受明命總乾綱義聲赫奕仁恩汪洋得萬國之歡心揚列聖之耿光使林林之生息皆欣欣而樂康然猶勞睿恩及田野命縑素俾繪畫將以置左右適清暇眷民物之同情普施澤於天下伊昔帝舜之命十二牧也曰食哉惟時柔逺能邇慮億兆之寒飢恐撫循之未至由是九功叙百志遂庶績咸熙是謂極治兹聖德之統御欲追配於有虞既擇賢以牧民復省役以寬租當凛冽之暮景穆遐觀而逺圖意使窮閻之輩陋巷之徒盡飽暖而安逸無凍餒而愁吁果民安兮物阜登治效於華胥然後告成功於天地豈樂此耳目之娛而已哉頌瑞應麒麟頌有序恭惟皇帝陛下備聖神文武之德受天明命統御萬方無間逺邇熙然泰和天心昭貺靈應迭至乃永樂十三年九月八日麻林國王復以麒麟來獻數萬里至於闕下臣謹按瑞應記曰麒麟仁獸也必中國有聖人則出皇上仁育宇內諸福之物所以昭德效祥者不可殫紀而麒麟則兩見於期嵗之間天之所以彰應於皇上者豈偶然哉羣臣百工稽首稱賀皇上謙敬自持讓而弗有惟太祖髙皇帝創業艱難兢兢業業日慎一日益思所以祗順天心安養黎庶又舉前代之君矜恃祥應不能正身修德自致敗亂者以為鑒戒玉音宣布昭如日月在廷之臣祗服贊誦皇上敬天勤民不矜不伐雖堯舜禹湯文武不能過也臣聞天道無息聖人之德亦至誠無息故足以參天地育萬物皇上之德至矣而猶敬慎如此是即天地之德天地之心也明明上帝所以眷佑於皇上者蓋愈隆愈盛矣國家有萬萬年太平之慶羣臣兆民亦永有賴焉臣忝職文字覩兹盛美歡戴之情倍萬常品謹撰頌詩一首上進頌曰赫赫明明上帝之命命于天子萬邦是理維此萬邦靡不來王無有逺邇維皇之治皇有大德肫肫其仁惠養下民以對上天下民有言曰我父母育我童幼暨于黃耉我寒我飢衣之食之嗟我民庶樂此熙熙上帝鑒觀皇德之厚爰發其祥顯天之佑其祥伊何是生麒麟昭昭維靈式安且馴凡物有生弗踐弗履既合於仁亦協於義有隆其聲黃鍾大吕麒麟在原民歌且舞天開日月來獻于京鼓舞歡呼麒麟在廷羣臣上言嘉祥來格維物之祥實昭皇德皇帝曰嘻維命靡常維敬厥祥天是用昌昔我太祖靈承于旅既艱既勤闢此土宇傳祚在豫豫敬用承維祥之來豈敢或矜在昔之君有土有人恃祥弗敬用墜厥命凡爾百僚維德是輔以事上帝紹我太祖臣拜稽首大哉皇仁如天之行如日之升臣拜稽首一哉皇心上帝是歆太祖是臨天命純固皇帝在御彌億萬年永作民主敬事于天皇子皇孫萬世其傳瑞應白烏頌有序臣維聖人有大德克享天心則天必發祥效禎以彰厥美古昔帝王為治諸福之物畢至於前者天所以彰之也載諸簡冊昭昭可見恭惟皇帝陛下統承大寶聖德之盛格于皇天天之降祥如嘉禾瑞麥騶虞𤣥兔之類蓋屢見矣然猶以為未足而白烏二復見於海陽海陽之民獻之闕下毛色純素皎如玉雪真希有之瑞物也臣嘗聞之天子孝於親敬於宗廟則白烏至陛下仰祀宗廟極其嚴恭奉養長樂極其誠敬明明上天實鑒于此白烏之來蓋天彰陛下之德而為國家萬萬年太平之徵宜有頌詩以垂示永久臣謹拜手稽首而獻頌曰有靈者烏生于海陽厥生伊何維天降祥竒質匪𤣥皎然純白少皥之精實皎其色何以比之冰玉其凝又如雪霜流彩含英皓鶴奪鮮白鷴失素夫豈偶然上天眷顧邈彼嶺南來獻于京天髙日晶祥光滿廷金門洞開六龍在御百僚歡呼曰此竒遇維聖天子聖德如天長樂是愈宗廟用䖍祖考在天來格來享以天下養莫不怡懌維皇大德克享天心白烏之來天命是臨天命是臨太平悠久皇圖萬年天子萬夀臣拜稽首獻此頌言薦之清廟萬世其傳芝頌有序禮部尚書毗陵胡公於廨署之南作小軒以為思政之所凡公之佐天子舉禮樂以施政教則必思其宜於此而後行之天下公忠信明達君子也其精神感而和氣應之蓋有不期然而然者宣德八年九月軒之中甃甓隱起發而視之有芝生焉其色純白如刻玉如截肪輪囷敷暢鮮潤華好公卿大夫來觀皆以為瑞而贊詠之夫芝之瑞始於漢重於唐至宋而極盛蓋謂和氣薰蒸之所成非人力能為也然彼宫殿門廡之所産者國之瑞也生於士大夫家倚廬齊閣之中者家之瑞也今皆不然惟於公思政之所見之蓋公盡心於其職故天以是彰厥美則兹瑞為公精誠之應無疑也然竊思之公之所任大矣其應亦有大者焉此特其兆也禮曰樂者天地之和禮者天地之序又曰禮樂極乎天蟠乎地行乎隂陽通乎鬼神此豈細務哉今上有聖明之君而下得公之賢以為臣厚禮樂之本逹禮樂之用及其至也天地安其位日月著其明四時寒暑順其序明而為人幽而為鬼神流而為川峙而為山精而為百榖粗而為草木鳥獸一皆遂其性無毫髮爽焉至和之氣充周于六合之間則草露醴泉器車馬圖龜龍麟鳯諸福之物靡不畢至而國之大瑞備矣故曰此特其兆也有其兆而贊詠之思迓續其大者云耳蒸民之詩尹吉甫送仲山甫也而序者以為美宣王蓋能任賢使修其職宣王之美見矣今公之有此皆上委任之所致則諸公之贊詠雖以美公而亦以美朝廷也作芝頌春官名卿禮樂宗兹誰任者毗陵公美哉新署鬱穹崇華軒結搆居南東聖明在上眷遇隆懷清履直持敬恭孜孜夙夜亮天工施諸政教審厥衷精神孚暢靡不通靈芝煌煌産其中至和絪緼之所鍾殊姿密理鮮且重刻脂鏤玉紛璁瓏參成樊桃差可從瑶英紫脫徒芃芃嘉生本自造化功滋殖豈與凡卉同知公秉德久愈充輔翼帝道宣皇風上追䕫夷躡髙蹤體信達順更豐融四靈畢至百福隆君明臣良格昊穹頌歌繼作聲渢渢鴻名赫奕垂無窮表賀夀星表伏以聖主臨北京大德普沾於率土夀星現南極嘉祥式應於昌時逺邇具瞻臣民交慶恭惟皇帝陛下剛健中正文武聖神同日月之明凡物畢歸於臨照如天地之大有生悉賴於甄陶純然羲黃堯舜之仁允矣雍熙泰和之治故靈物屢臻於顯應而上帝猶切於眷懷星象垂禎粲珠躔而在丙天心悅鑒昭寶命以常新榮光朗耀於九霄瑞彩增華於萬象赤黃而大煥玉燭以流輝明潤有融炯金精而洞映當恭已正南之位彰聖躬在上之祥萬年福夀之隆長萬世基圖之鞏固賢才效用仰鳶飛魚躍之天耆庶樂康囿春育海涵之內太平悠久宗社奠安臣等叨沐恩榮恭逢上瑞瞻龍顔而俯地同殫葵藿之誠頌聖夀以齊天長作神人之主敬伸三祝永肩一心賀麒麟表伏以聖人在位開一統太平之基大德奉天致諸福禎祥之獻煥榮光於海嶽溢喜氣於臣工欽惟皇帝陛下聰明睿智文武聖神光被八紘如日月之臨照仁加庶類同天地之生成禮備樂和家給人足治道超越於隆古天心悅鑒於當今故於北京宫殿之興已有上瑞頻繁之應式表萬年之景運爰昭百世之宏圖然至和尤積於兩間故靈物又呈於九譯麒麟仁厚超百獸而首四靈天驥健行能一日而致千里昭然麕身馬蹄之異美哉龍文虎脊之良黑質白章挺嘉生之福祿雄姿徑氣偉問出之狻猊重以駝雞兼致文豹逺踰鯨海見蕃國之歸心逈立龍墀藹卿雲之垂彩凡此嘉祥之畢集實由仁化之𢎞孚衍宗社鴻慶於無窮錫仁庶湛恩而有永臣等恭瞻盛事深切歡心敬俯地而三呼莫盡贊揚之悃祝齊天之萬夀同殫葵藿之誠進實録表臣聞自昔帝王有大德以及於萬民則必有信史以傳於千古是故堯舜之道載諸典謨文武之政布在方冊漢唐而下皆有成書欽惟宣宗尊諡章皇帝剛健中正廣大髙明纘祖宗之鴻圖隆慈聖之至養修六府而備三事親九族以和萬邦好生之德允洽於民心存物之仁實協乎天道有戡暴除亂之武有經天緯地之文聲教宣昭禮樂明備華夏蠻貊罔不率俾山川鬼神莫不底寧大略雄才豐功偉烈輝映前代儀範後來奄龍御之上升切臣民之哀慕恭惟皇帝陛下聰明睿智文武聖神尊祖敬宗繼志述事上念先皇之德業必著簡冊以流傳爰敕儒臣纂修實録啓蘭臺之所載紬金匱之所藏徵諸官府之文書參以耳目之聞見大經大法備究於精微善政善教致詳於本末言足為訓雖簡必書事之可師雖繁必録造化生成之妙固莫罄於名言日月照臨之明亦豈容於繪畫至若臣下之附載勉盡是非之至公恭成宣宗章皇帝實録一百十五卷寶訓十二卷及目録凡例合一百二十九冊謹繕寫上進臣等愧膚淺之無庸屬編摩之甫就傳于來世丕昭道德之光率是嘉猷茂衍太平之慶賀新殿成表伏以北京建極開萬方㑹同之都南靣嚮明受一統華夷之貢宜規模之𢎞逺聳遐邇之觀瞻率土騰歡普天稱慶恭惟皇帝陛下剛健中正睿智聰明丕承列聖熙景運於太平茂育羣生暢淳風之清穆惟尊祖敬宗之大在繼志述事之能顧朝廷當備於崇嚴而宫殿必資於營搆祗循舊典式闡鴻猷兆姓子來咸自樂以效其用庶邦星拱皆不勞而觀厥成巍巍麗紫微之髙翼翼表宸居之壯續靈臺之贊詠誠儷美於周文紹總章之達聰實比隆於虞舜仁恩溥博德化宣昭廣宅中圖治之模恢保大定功之備本支繁衍宗社奠安臣等欣遇盛時恭陳善頌仰皇明於八表如日之升祝聖夀於萬年與天同久詩瑞應甘露詩有序臣聞聖人之德配天地則天地之心欣合無間故必凝英萃和以昭其盛若黃帝之甘露虞舜之卿雲是也恭惟皇帝陛下以至誠之德統承太祖髙皇帝基緒繼述之孝不忘乎心遵用舊章未嘗改作德化所及罔不愛戴故自天地之所覆載日月之所照臨無有逺邇熙然泰和動植之物亦各生遂而太祖髙皇帝之盛德大業愈益光明是以天發其祥地闡其珍景星慶雲醴泉甘露嘉禾瑞麥麒麟騶虞諸福之物駢臻沓至此臣等之所親見天下之所共知也而聖心惓惓益勤不懈乃永樂十七年十一月缺日甘露復降於孝陵凡四日松柏之上凝為玉脂融為瓊液粲若垂珠聨若編貝臣民聚觀鼓舞歡抃咸以為甘露之降不于其他而于孝陵者蓋聖孝所致也於是皇太子命採取馳獻于北京皇上祗薦宗廟頒賜百官芳香之氣旁逹左右甘美之味莫可擬倫誠天地之精英聖明之上瑞所以彰皇上之大德為天地之所悅鑒景命之隆長太平之悠久歷千萬世而益盛也昔虞舜有卿雲之祥百工相和而歌之萬世之下因是想見帝舜之德使人起敬起慕今聖德之大實同天地甘露之瑞不減慶雲是宜有紀也臣愚不自揆輒形之聲詩以繼虞廷之歌垂之萬世使知聖德格天之盛巍然煥然如此臣等誠歡誠忭稽首拜手謹言甘露昭聖孝也有瑞甘露其集瀼瀼被于長松孝陵之岡如珠之英如瓊之漿於粲其光承彼朝陽有瑞甘露其融湜湜亦被于柏孝陵之側如肪斯白如玉斯潔其馨有烈敷暢旁達維彼露兮天乳之滋維此受兮上帝之貽皇有大德神人具依集此大瑞福祿攸宜皇德之大實配于天永言孝思太祖是憲懿彼舊章于嗣于宣夙夜敬恭穆穆乾乾維太祖肇邦皇以廣之維太祖受命皇以康之顯顯大猷萬方仰之巍巍成功無以尚之上帝太祖樂此德馨屢開厥祥甘露斯零甘露斯零維帝命是膺維太祖是承皇祚以攸寧乃取乃獻皇太子之恭乃賜乃頒以洽于臣工匪飴匪酮既甘既融靈液攸降物莫與同臣拜稽首天子萬年以臨下民以對上天維禎維祥繼繼綿綿聖子神孫萬世之傳後樂堂詩有序古之君子得志則澤加於民不以位為已樂也蓋天之生斯民也寒者欲衣飢者欲食勞苦者欲得其安抑鬱者欲得其平不有以任之則民惡能遂哉於是有大賢生乎其間而君人者因得與之共天位治天民而民之欲遂矣夫大賢者固與斯民同類也天特賦之以出類之資俾人君用之以治夫同類之民推是心也則民之戚憂其有不關於已者乎是故居其位則與斯民同其憂民皆樂也然後與之同其樂非已之樂也蓋樂民之樂焉耳夫如是則不違夫天而亦不負乎君矣然則有視民之戚憂若不與於已而肆然自樂乎其位者不謂之違天負君其可乎伊尹相湯以王天下視天下之人有一不得其所其心愧耻若撻于市尹之於民如此曷嘗以位為樂哉必天下之人舉無失所然後其心樂焉不然則終不樂也不違乎天不負乎君非居位之賢之所當法歟宋范文正公嘗言士當先天下之憂而憂後天下之樂而樂誠能先其憂而憂以圖之則民將無所憂民無所憂而樂矣然後已亦樂其樂蓋樂民之樂也今户部尚書兼詹事府詹事東萊黃公祗事列聖五十年許國之心老而彌篤其志蓋與文正同取其語名堂曰後樂之堂當天下太平兆民樂業而聖仁在上尤惓惓以安民為心公之所謂後樂者蓋欲體上之仁而措之天下使天下之人皆大享其樂而後已亦樂焉此其志無愧於文正無愧於伊尹而亦不違乎天不負乎君矣直備員少列得從公之後嘉公之志而樂為公賦之公之德業在朝廷而尤著於南鄙蓋表然在人耳目當自有史書之此不著詩曰惟天生民有欲在衷欲而不遂其心忡忡乃生大賢實與同類受任乎君寒衣飢食勞者使安鬱者使舒熙然其間其樂于于民既樂矣已亦克樂於君不違於天亦若昔有伊尹篤志于民一夫不獲愧集其身逮宋文正惟尹之似先憂後樂不忝其位後纍百年天復生公克秉忠誠一其初終祗事三聖暨今天子兆民既安無間逺邇惟皇聖仁視民如傷惠綏撫摩其澤汪洋公曰地官實惟臣職以安以養臣敢不飭夙夜敬恭以暢皇仁敷而逹之其心肫肫富貴崇髙公則兼有公不自樂惟民是阜民生孔阜悉恬以嬉惟公之心庶亦用怡嗟嗟上天生此兆庶惟君主之惟賢是輔樂先乎民而後其躬惟天惟君福祿來降公之德業有偉其傑國則有史兹匪克列公志所存既篤既淳黃髮番番為國元臣我作此詩亦非用說尚究厥成以嫓往哲引賜遊西苑詩引西苑之遊上賜也同遊者凡十五人賦者七人而已所以頌上之德而鳴國家之盛也其初皆有序然大意皆同而莫詳於少傅西昌楊公之作故特録之而略其餘夫君子之仕莫難於逢時尤莫難於得君諸公備文武之才而當太平盛際明良相得治具畢張䝉恩禮之厚鍚燕遊之樂宜也臣直何人亦忝與焉信所謂非常之幸矣臣嘗讀周詩而考其盛衰之故蓋在乎上下之交與否也是故君以鹿鳴諸詩燕其臣臣受賜者則歌天保以答其君豈徒然燕樂云乎哉蓋期望頌禱之意寓焉上下之情通而政教成此武王之所以盛也及其後也至於盡瘁以仕寧莫我有下之情不能通乎上上之澤不能及乎下上下不交則安得不衰且亂邪今聖仁逮下如此不異於周之盛世而諸公之報上者將日進月盛顧臣之愚誠不免於伐檀之譏然豈敢忘大賜哉詩曰天子萬夀此臣之拜稽而祝也又曰夙夜匪懈以事一人臣尤當勉焉庶幾少報萬一云耳公事之暇盡録諸詩而謹藏之非為誇也所以示不忘也且為之引以發其意使覽者得詳焉詩之進獻則遊之明日録以成卷乃明年之五月五日也陳氏孝思圖引陳氏世以儒為業其學優而仕者前後相望表然衣冠之族也洪武中仲述先生為名御史自言少時嘗見先世遺像皆朝衣朝冠兵亂失之乃命弟仲亨求善畫者以髙曽祖考繪為圖嵗時行禮得瞻仰而興慕焉因名曰孝思圖二先生之心豈徒以著前人之美哉亦將以勉後繼也自古受姓命氏皆有爵者之子孫祖宗之德非不盛矣而其後浸微者蓋由不接於見聞而不知所以繼也欒郤胥原皆晉卿之家其先之功烈固已赫然顯矣然當晉之猶競也而其子孫以降在皂𨽻豈非忘其先人之善而輕用其身是以至於此也乎夫爵之在人者固可貴要必以得於天者為之本修其得於天者然後能有得於人陳氏在元以前多顯者世久而益盛自兹圖視之又已四代矣數十年來御史公之子仲亨先生之子若孫州判公之曽孫相繼而仕者又六七人其所事者詩書而已詩書者世業也世業不廢則世德不墜而世祿有已哉陳氏子孫觀是圖者油然興其孝敬之心而益思所以繼使後之繪者纍纍至十百而未已焉豈惟陳氏之美觀哉亦鄉邑之榮也直陳氏之彌甥也相愛之至而相期之逺故題其說以致意云東里先生翰墨卷引楊氏與豫王氏世有連不特斯文之契也豫竊祿翰林從先生者三十七年䝉教益多矣豫之事先生負恃親愛於凡所當言者盡言不諱則有之非理而誶語則奚敢後豫去翰林或謂出先生意蓋言語以為階豈旁觀側聽者固能知其情邪而豫實不自知也今以先生平日所與書翰裝潢成卷其出院後凡所委令皆有手簡亦以類相從觀者於此可以知其愛厚之意往事之然否不足計也惟賀皇上御新殿冊中宫二表皆有手簡命豫屬草藁今檢尋未獲俟他日得之續附焉題跋題雪崖金先生墓文後君子之於道貴乎有諸已而已有諸已而以及於人此其所樂也豫觀雪崖金先生其所謂有諸已者歟先生學聖賢之道守之固而行之篤其於文章必據於理與人交必盡其誠善惡好惡如黑白東西無所茍至於為義尤奮然勇決有無難易不顧也蓋其平生以古人自期殆信然也哉其為臨江府學訓𨗳也樂以聖賢之學為諸生講說孝弟忠信禮義亷耻未嘗一日去於口忘於心嘗曰人之有文藻者不足貴惟行不愧於古人乃可貴其為言如此則其所存所教者可徵矣惜乎先生未及髙夀而沒其所教者不能逺也雖然先行而後文者聖門教人之法而先生所依以為教者也先文後行且不可況徒以文詞為事者乎又況文詞之不務者乎豫於此而深歎夫學者之能如先生少也又因以悲夫願學者之不幸也先生沒後二十四年其令子幼孜為右春坊右諭德兼翰林侍講以其家學受知聖天子推恩贈先生為右春坊右諭德古所謂位不稱德者必有後福先生之謂也翰林學士胡公為其墓文以昭寵榮表懿行豫讀之竊仰慕焉然而不可見也故題其後以致豫私云題顔氏三節婦傳後右顔氏三節婦傳翰林檢討張先生伯頴撰載節婦死事甚詳嗚呼誠可謂偉烈者矣豫於此而有感也古之王者其德積於身充於家而達於邦國故當時被其化者雖婦人女子皆明義守節卓然有不可奪之志觀於詩之二南可見矣後世風俗之厚薄亦視其教化之淺深非可以茍焉者也夫婦之義天地造端茍禮法不修則彛倫攸斁上之所施下之所效其平居逸處不知有别者多矣況於喪亂之際乎或當時士大夫家詩書傳習之久確然不為所易然亦鮮矣有如顔氏三節婦者豈不誠可尚哉嗚呼天下之人固有道之以正而不從者矣況可以淫僻道之哉此豫所以有感也善化教諭敬守節婦蕭之子也示豫以此傳故題豫之所感者如此以深見節婦之賢也題文信國公墨蹟後右信國文公墨蹟二紙其族孫紹節所藏也當公至汀時閩地多陷宋運已去公死國之心已定矣故其與制使書有與老母相見即從先帝游之語及繫燕獄可謂窮矣而從容以文章自娛略無慘怛悔懼之意故其詩有黃土一丘隨處是故鄉歸骨任蹉跎之句誠所謂處困而亨致命遂志之君子也而郡人王鼎翁乃為文生祭之惟恐其不死鼎翁蓋欲成人之美惜其不見此也使得見此則其文不作矣而惑者謂公之死節乃鼎翁成之是豈為知公者哉因觀此表而書焉以解愚者之惑恭題少師蹇公所藏仁宗皇帝御製詩後永樂之初仁宗皇帝在東宫今少師吏部尚書蹇公兼詹事府詹事職輔𨗳公宏才碩德夙夜盡心知無不言言無不用及太宗皇帝幸北京仁宗皇帝監國當時受寄而託重者非一人公實為之首聖德之進修善政之逮下匡弼贊助之功為多古所謂鹽梅麯蘖舟楫霖雨之喻不是過矣及先尚書卒公以憂去詔不許俾奔喪而即來誠以公不可一日去左右也是詩蓋仁宗皇帝贈行之作言詞溫厚恩意篤至君臣上下一心一德於斯可見豈特奎畫之精妙而已哉今鼎湖之駕逺矣而詩獨存仰而望之天容日華煥然在目所以寄千載之哀思而啓其報德之心於無窮寧不在兹乎是蓋公惓惓之意也為公之子孫其尚敬念之哉題楊少傅陳情副本後初太宗皇帝巡幸北京仁宗皇帝為皇太子監國慎簡忠賢以職輔𨗳今少傅兵部尚書兼華蓋殿大學士楊士竒時為左春坊左諭德兼翰林侍講其一也臣士竒秉心誠篤操行淳正其孜孜缺者為上為德為下為民未嘗有毫髮私二聖深加眷倚其所陳情蓋以親故而為是不得已之舉仁宗皇帝憫焉親灑宸翰免京為民併永昌戍役皆免之永昌戍役非臣士竒所敢言蓋上之特恩此所謂天地之大曲成萬物者也京既得守墳墓安於田里而完其骨肉思之惓惓不敢忘今年來省士竒於北京求録當時陳情副本及仁宗皇帝御批將子孫寶之以寄其遐思既而以示臣直俾識一言臣觀自古君臣相得如仁宗皇帝於臣士竒所謂千載之遇也然所以得者誠篤淳正而已皆學以致之臣士竒以此事上而報知遇之厚故京得以䝉其休由是而思則京之子孫將欲圖報於上其惟勉於學哉凡今𨽻戎伍者必與其子孫相為無窮京之子孫既䝉無窮之休其所以為報者尚亦勉繼於無窮可也臣直之先臣嘗仕于朝以微譴謫舒州其後起謫籍為郡守而終仁宗皇帝即位詔有司凡若此者皆除其籍臣之䝉幸蓋與京同臣既以勉京之子孫而亦以自勉者勉臣子若孫使皆敬念之勿忘也題赤壁圖後東坡先生謫黃州以李定輩之譛也赤壁二賦其用意邃矣當曹操欲東下時視吳已若無有而卒僨於赤壁今江山猶在而操已影滅跡絶然則英雄如操者果何足道況李定輩邪先生雖為所困然胸次悠然無適而非樂其缺直節自足以照映千古不特文章之美也而定輩皆已潰敗臭腐而無餘矣先生嘗憤操害孔北海謂北海如龍而操如鬼豫於定輩亦云題惟孝先生所刻踐祚篇後右武王踐祚篇黃太史書吾邑彭惟孝先生刻置求志堂中經亂石廢摹本亦不可得三百年來先生諸孫監察御史百鍊始得此本而寶之昔蘇文忠公嘗謂典謨訓誥以後惟有此書而歎莫有傳者由是太史書之而先生刻焉先生豈偶然哉孔子曰君子修已以敬以至於安人安百姓皆敬之效也丹書之戒豈特可以告武王而已凡士君子皆當勉焉器物有銘其用心也密矣以武王之聖尚如此則其下可知嗚呼豫於此有以見先生所求之志矣而先生終不遇也惜哉題少傅楊公贈善學兄五言詩後善學先生直之從兄也舉賢良得髙要縣丞少傅兵部尚書兼華蓋殿大學士楊公作五言詩一首以贈行先生既裝潢成軸而俾直識一言蓋楊王二氏有婚姻之好不特斯文之誼觀詩所叙已三世矣自公而上不論也故其情意藹然見於言辭之表其篇末所謂安嫠惸保忠貞則公所望於先生者夫朝廷之命有司以安民而已嫠惸民之至窮仕者所易忽也故君子為政必先於此世之為有司而能知此者鮮矣質之强者往往急於欲視民如狼將羊於其安否不計也弱者則望塵而拜伏順風而奔趨惟有勢者之從而撓乎民茍不盡如其志則笞箠隨之其身且不能保何能為民計哉惟學道之君子忠以治國正以持已乃能酌其本末而施其所宜然亦難矣今公以此期望於先生此公之盛心而先生之所宜務也祖宗以來讀書而仕自侍從以至於府州縣無不有也其持已之正體國之忠皆家教所素聞者惟先生加意焉則不負於國家不忝於祖宗不辱於公之贈言而直有榮耀矣故書此於下方云恭題梁氏所藏仁宗皇帝賜詩後右重陽久至日二詩賜翰林侍讀梁潜者皆仁宗皇帝御製永樂十五年太宗皇帝復巡幸北京仁宗皇帝在東宫監國今少傅兵部尚書兼華蓋殿大學士臣楊士竒時為翰林學士兼左春坊左諭德臣潜亦兼右春坊贊善皆留輔𨗳仁宗皇帝緝熙聖學道德日新而又篤意文事臣潜忠亮清謹學問該博而文詞雅正其言多契於上心上深重焉二詩蓋是年所賜者皆上所自書觀詩之所謂則知潜之所以受賜者非茍然也其後臣潜坐纍赴北京以卒而諸子不在側於是二詩皆失之雲漢之章奎璧之文必有所麗終不淪晦然梁氏之子孫與凡知梁氏者皆深惜焉今年臣潜之子楘㑹試來北京記憶聖製求吏部郎中程雲南繕寫成卷俾直識一言臣聞孔子作春秋以寓王法百世之下不必親見其書凡經之所豫者莫不以為榮今宸翰雖逸而睿詞具在所以寵榮梁氏而賁飾之者豈有窮哉梁氏之子孫尚永保之題衛生易簡方後醫者仁道也蓋始於神農黃帝其後扁鵲華他之流皆神於其術然世之君子欲博施濟衆者未嘗不用心焉故以伊尹之聖而論湯液陸宣公許學士皆著方書以傳若此者非一也其仁之及於人可以數計哉天地之生人仁也然不能使之全其生故聖賢為醫學以濟夭死所以成天地之仁而為人司命也此其心蓋與天地流通矣而可以為藝小之邪禮部尚書毗陵胡公初使於四方公事之暇輯諸醫方之有驗者凡十二卷名之曰衛生易簡方既表獻於太宗皇帝將復鋟梓以惠天下公之心蓋伊尹陸宣公許學士之心也昔之君子有自明其志者曰達則為良相不達則為良醫二者皆得以施其博濟之仁今公有是書傳於人人之受惠多矣而又佐天子任禮樂之事推以節民心和民聲充而至於贊天地育萬物然後為功之成此仁者之所能而達者之所為也豈特醫乎哉故因觀是書而識於後云題汪景房沈籍事後豫讀元翰林修撰張子長所書汪君景房事又識景房之裔孫秉心而信仁人之澤之逺也蓋仁者天之道也君子以仁存心斯無愧於天則天之佑之有窮哉當錢氏納土時為其臣者孰無去就利害之思得早入朝以自託幸矣況奉圖籍納土之臣其階於榮顯可必也景房獨存愛人之心不忍其復困於重賦遂去其籍寧自棄於貧賤而使十二州之人得輕稅之利其心之仁如此豈非天之所佑哉宜子孫之久而盛也古者十一而稅軍國之用量入為出而上下皆足後世費用無經故往往加稅加稅而又不足則暴征橫斂以繼之民困無聊於是卒亂以亡書曰民為邦本本固邦寧果能節用而愛人則豈有亂與亡哉錢氏賦重民困有亡之道雖不納土勢亦不長其自歸於宋也乃天哀其人不使重困於兵革而錢氏因以成歸德之名蓋幸也浙之輕稅雖成於王方贄然使其故籍尚存方贄亦莫如之何自是以來民享其樂利百三四十年髙宗立國於此民心戴之又百五十年而後亡蓋由祖宗德澤在人而此乃其大者也推本而論之景房之功豈細哉子孫之久而盛蓋宜也於戲後之仕者有欲為宇文融皇甫鏄之徒其尚監於兹哉題方御史所藏顔魯公坐右帖真蹟禮國之大防也國家不振則禮必先壞然下陵上替而至於大亂唐室當亂之後而猶僣踰如此魯公之書所以扶世道也豈為區區坐次哉況其書法謹嚴固當百世寶之也抑菴文集卷十二
