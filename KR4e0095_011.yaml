body:
  text: 抑菴文集卷十一明王直撰傳少師建安楊公傳公姓楊氏初名子榮字勉仁太祖皇帝更名榮遂以聞於天下漢太尉震之後唐末有仕於閩者因家浦城三遷遂為建安望族祖達卿父士美皆不仕而皆為善人長者以公貴纍贈至榮祿大夫少傅工部尚書兼謹身殿大學士公幼聰悟絶倫喜讀書善講說當時大竒之事大父母父母盡孝敬處內外屬皆有禮弱冠已有濟物之施公輔之志朝之公卿大臣道建安者皆重之由邑庠生領鄉薦第一遂取進士入翰林為編修太宗即位選儒臣六七人置內閣典詞命而公在焉升修撰尋升侍講修古今列女傳仁宗皇帝正儲位以公為諭德兼侍講太宗嘉其勤謂曰卿朝夕左右敬慎不懈恆情保初易保終難朕常思保全之道卿亦宜謹厥終賜之二品服上恢宏逺略經營四方公獨以警敏勤於外嘗命往甘肅視師及還規畫皆稱㫖且言其山川形勢軍民休戚城堡虛實上悅升右庶子侍講如故父卒賜鈔三千貫俾馳傳歸葬詔奪情起復皇長孫英睿夙成篤志學問命公兼職輔𨗳永樂七年當從幸北京適聞母喪又奪情以行時何福守甘肅言部長布哈等率衆來歸詔公與福議所以處之者既還又命持節至額齊訥封福為寧逺侯且命過寧夏與寧陽侯陳懋飭邉務歸奏便宜十事上嘉納之從征北邊師至驢駒河而還軍士乏食公以為言上命供御之贏盡給之令軍中有餘者貸不足歸而倍償衆賴以全公在軍事既繁劇以親喪不飲酒食肉時哭泣不自勝因以羸悴上憐之車駕還南京公乞歸終制不許許奔喪遣中官宋成護往來既而仁宗令與諸皇孫講學學益進深見奬重甘肅守將西寧侯宋琥言叛冦婁達衮等依赤斤塔爾尼將為邉患敕豐城侯李彬討之命公往經略時草枯水凍士馬不可動公歸奏小醜無能為不足以勤大軍遂止而叛者亦復歸附師征衛拉持皇太孫侍行上既訓以武事命學士胡廣及公稍間即以經史進講又嘗問足食足兵之要公曰慎擇將帥力屯田訓練有方耕耨以時食足而兵精矣及還上以五經四書傳注之外先儒多所發明且性理書及諸議論皆未有統㑹詔集儒臣類次成編又命廣與公總其事書成賜名五經四書性理大全升翰林學士兼庶子益見親任朝臣有傾巧迎合為公所抑者議欲間之㑹北京缺祭酒衆請以公任焉上不許公又指言五府六部三法司積弊有十上命以授御史揚言于廷中衆皆請罪詔原之而使釐正升文淵閣學士兼翰林學士寧夏報敵入冦上以問公公對曰寧夏士勇邉實冦不能持久今去矣已而果然浙之麗水閩之政和有冦二千餘兵部請發兵𠞰之公奏曰愚民窘於衣食剽掠求活耳急之則益生變臣以為莫若招撫便從之果順服太宗屢北征公必在行軍中密務多命公掌之決機發䇿亦使參預眷待與公侯等上嘗語公曰東宫歷事久嫺於政務朕歸悉以軍國事委之如何公對曰殿下孝友仁厚天下屬心允稱皇上付託車駕還至榆木川疾甚召公等受遺命傳位皇太子上崩公與左右中貴人奉斂如禮以去京尚逺戒勿發喪整軍旅嚴號令而與中官海壽馳還報仁宗致大行遺命仁宗即位禮儀詔赦公與二三大臣計議條奏行之賜公白金二百兩鈔二萬貫綵幣二十表裏升嘉議大夫太常卿仍兼前二職尋升資善大夫太子少傅兼謹身殿大學士賜銀印一文曰繩愆糾繆且諭公曰朕於政務有缺則用此印密疏以聞至于再三慎勿憚煩公奉命唯謹又慮法司濫刑凡重罪者命公與諸大臣同審録獄以不寃上嘗閲翰林所作楊士竒及公等誥辭謂曰朕以卿自輔卿等知有未善皆當盡言親御翰墨增二語云勿謂崇髙而難入勿以有所從違而或怠曰此朕實心公拜曰陛下聖德之至臣豈敢不勉既而有言太宗升遐時事多公為主之上嘉歎降敕奬諭加賜白金綵幣等物特升工部尚書前官如故三俸俱支公辭尚書不允仁宗崩宣宗為皇太子在南京遺命徴還嗣位公往迎於德州由是益任公公亦益盡力髙煦反公力贊親征及纍出巡邉公皆從久之念公等大臣且老不欲煩以事命輟翰林之務惟朝夕在左右討論至理共寧邦家升少傅階榮祿大夫又階少師勳柱國階光祿大夫今上即位待公益重而公謀國益盡心有大事衆取決焉纍朝眷遇恩賜之隆前後不可計雖元勳世戚不過也然以久去墳墓常欲一歸省而縻於職務㑹有事西陲及西南夷不敢求去至是西師解嚴西南夷亦納貢公乃請行上命中官與偕往且命公速來事畢戒行已有疾或勸其且止公曰君命不可緩也挾醫而行至杭州卒年七十事聞上嗟悼罷朝贈太師諡文敏又命中官往護喪歸建安葬事皆官給之夫人劉氏先卒以其弟繼亦封夫人子恭讓錫賜貴芳通上念公不已命恭為尚寶司丞公祇事列聖凡四十年未嘗去禁近每四鼓起俟朝雖風雨寒暑不變日親所事至或廢飱嘗迫暮而後返初修髙廟實録其後三朝史事皆公與總裁紀載詳備實而不華京闈鄉試典文衡者一廷試讀卷者九其文施於國家與凡碑銘序記之散於天下者人皆傳誦之其於武事尤諳練將士之勇怯饋運之難易邉鄙之利害道里之迂直靡不知故凡承顧問與籌算皆能適事宜體國之心老而彌篤嘉謀至計造膝而言所以裨益於上惠利於下者蓋多矣直從公在翰林亦三十七年知公平生為詳故托其事有關於天下國家者為公傳俾後有考焉若其德義之施於親族朋友以及鄉黨州閭則有公之行述與墓銘在此不著論曰古之君子之事上也必委身於國而不顧其私故能視官事如家事知無不為為無不力公受恩四朝竭心殫慮不以險易禍福易意况經綸於外弼亮於內又有衆人所不能知者豈非古之君子與昔仲山甫事周出入中外所任者衆矣而皆能善其職詩曰肅肅王命仲山甫將之邦國若否仲山甫明之既明且哲以保其身夙夜匪懈以事一人今以公比之何有異哉何有異哉少師泰和楊公傳公楊氏字士竒其先華隂人南唐虞部府君輅始居廬陵再世徙吉水後至允素乃徙居泰和曽祖景行仕元纍官以翰林待制致仕有傳在史祖公榮父子將皆不仕而以文學行誼重於時公早孤母夫人陳氏教育之甫六七嵗告以世德之詳公即感奮力學雖甚貧親執勞事然未嘗廢卷時喪亂雖平而苦無書四書五經皆抄以讀海桑陳先生夫人世父也甚愛公早夜訓勵使必由道年十五褎然為人師學行日益有聞縉紳君子禮重焉郡縣交舉為學官皆不就久之朝廷以博學徴入翰林任編纂共事者皆天下宿儒獨推公精博未幾命吏部考第其文授以官又以公為第一授親王府審理然猶執筆在翰林太宗皇帝即位遂擢為編修時方開內閣於東角門內命解縉黃淮胡廣胡儼楊榮金幼孜及公七人處其中典機密尋升侍講上嘗諭公曰朕知爾文學親擢置此爾但盡心勿自疑畏公感上知遇忠勤不懈早夜孜孜以修其職仁宗皇帝為皇太子又兼左春坊左中允益見寵任文華殿當講大學公呈講義於上前覽畢上曰先儒謂堯典克明俊德章一部大學皆具公因奏曰二帝三王所以修諸身施之家國天下皆大學之道上復曰孟子道性善言必稱堯舜講說之際必以前古為證庶幾易入侍講學士王達講乾之九四舉儲二為說皇太子疑其言問公公曰此宋儒胡瑗說也曰與常人言亦舉此說乎公曰程子常言卦中六爻人人有用聖賢有聖賢用衆人有衆人用君有君用臣有臣用無所不通王昭素嘗為宋太祖言之矣講臣非有所據豈敢妄出意見哉皇太子嘗閲真德秀所輯文章正宗喜其有益於學者公曰德秀道學之儒志識甚正其著大學衍義尤有益於朝廷君臣皆不可不知皇太子即取視且令翻刻以賜諸子亦以賜公曰豫倚卿為輔卿亦當留意也饒州朱季友獻所著書斥濂洛關閩之說上覽之怒曰此儒之賊也時禮部尚書李至剛翰林學士解縉侍讀胡廣及公侍側上示以其書縉曰惑世誣民莫甚於此至剛曰不罪之無以示警宜杖之擯之四夷公曰當盡燬所著書庶幾不誤後人廣曰聞其人已七十燬書示警足矣上曰謗先賢毁正道治之可拘常例耶遣行人押季友還饒州㑹布政司及府縣官與其鄉士人明諭其罪而笞以示罰悉索其所著書焚之上復諭羣臣曰除惡不可不盡悉燬其所著書最是廣東布政使徐竒朝京師載嶺南藤簟諸物將以遺廷臣或得其單目以進上閲視無公名乃獨召公問故將以私交罪之公曰竒自都給事中受命赴廣時衆皆作詩文贈之故有此餽臣不與名者以當時病未有作不然亦必不免今衆名雖具然受否未可知且物微甚當無他上意解命中官燬其目一無所問升左春坊左諭德兼侍講禮部尚書鄭賜為侍郎趙羾所間憂鬱感疾勉强奉職如平時忽以卒告上疑其自盡召翰林諸臣問之衆未及對公進曰臣觀賜病已數日但未敢即安昨晚同立右順門下賜忽仆地旁人怪賜無人氣臣遽命其屬官掖出午門外上聞公言曰微汝言幾誤疑賜賜本君子顧才不足耳命工部與棺禮部往祭之六年冬以巡狩北京詔天下命公視草上稱善又命與諸尚書觀之兵部尚書劉雋私與公曰請以有字易自字公善之衆謂二義不相逺且上既稱善不必易公奏曰國家大體當用雋言上喜公能服善曰樂從善言則何有敗事由是益屬意於公明年車駕巡狩北京皇太子監國上命蹇義金忠黃淮與公職輔𨗳義於事多疑少斷常持兩端曰事當熟慮不然必有後憂公曰事豈得不思但多思則惑惟當據理而行皇太子聞而笑曰此須兼智仁勇自今議事擇當理者從之不必多思致惑也然皇太子知公誠篤惟公言是從或初若有疑而終必見用由是少有闕失而上下安春坊贊善王汝玉每以詩法進皇太子以問公公曰詩以言志明良喜起之歌南薰之詩可見舜之志漢髙祖大風歌唐太宗雪恥酬百王除凶報千古之作所尚者霸力非王道漢武秋風之詞志氣已衰若隋煬帝陳後主皆淫靡不足道殿下明經講道之暇娛意文事兩漢詔令最可觀非但文辭髙古亦可以禆益治道詩非所急也皇太子曰儒者亦作詩否公曰儒者固皆作詩然儒之品有髙下有道德之儒有經濟之儒專意詞章君子謂之俗儒人主尤當辨於此皇太子喜讀易凡決疑必用蓍而以易斷命公取朱子本義纂其要以進名周易直指公因進曰易固為卜筮作然文王周孔所繫辭凡修齊治平之道悉具請編輯以備觀覽書成以進名曰周易大義九年上還南京一日退朝召公問曰爾輔東宫久其所行果何如公以孝敬對上使言其實對曰凡有事宗廟祭物祭器皆親閲去年將時享頭風作醫言當汗殿下曰汗即不敢蒞祭左右請遣人代斥之曰上以命我我又可遣人代乎遂親祭祭畢汗遍體勿藥病自愈每進御用物皆躬閲封識遣行不輕信下人車駕北征殿下不敢寧居恆日中昃始食駕還而後能安上曰此子道當然公曰古聖賢亦皆盡其當然者且殿下天資髙或有過未嘗不知知之未嘗不速改又其存心以愛人為本將來必不負陛下付託之重上恱十二年正旦日食先數日上問禮部及翰林諸臣正旦日食百官行賀禮乎尚書吕震曰日食與朝賀不同時當賀侍郎儀智曰終然同日宜免賀公對曰日食天變之大者宋仁宗時元正日食富弼請罷宴徹樂宰相吕夷簡不從弼曰萬一契丹行之為中國羞後有人自契丹來言其國是日罷宴仁宗深悔今誠宜免賀上曰君子愛人以德士竒與智言是也遂免賀及宴十四年上在北京聞髙煦有異志還京師欲發其事疑未決獨召公問曰昨問蹇義漢府事對曰不知若朕未有知爾輩慮有離間不敢言今朕既知矣爾言之何害公對曰臣與義事東宫外人無敢與臣等言者但漢王始封國雲南不肯行改青州又不行今知將徙都北京惟欲留守南京天下皆疑其心惟陛下善處之使早有定所全父子之恩為永世之利上默然起還宫後數日悉得其反狀及所為戰具大怒褫其冠帶縶之西華門內東宫力救解乃免遂命削其兩護衛處之樂安州曰此去北京甚邇即其作禍可朝發而夕擒也是冬周王楚王來朝謁孝陵上命東宫皇太孫及諸皇孫陪謁問翰林諸臣拜位當如何衆疑未有言公對曰二王尊屬當分列在前東宫稍後居中皇太孫又後亦居中諸皇孫與太孫同班而分列兩傍上出片楮所書位次與公言合然下有六字未書授筆命公足之遣鴻臚丞周升持赴陵俾率行之少頃升復命以宸翰進上遂以與公公寶藏之至今存焉皇太孫勤於學問上命吏部翰林舉老成正大儒者侍講讀公與蹇義舉儀智衆以為老公曰儀智道理明執守正精神不衰老成正大廷臣未見其比上聞之喜曰智雖老識朝廷大體能直言不阿向言元正日食宜免賀朕知之可謂得人矣二十二年八月太宗皇帝北征上賓學士楊榮歸自行在以聞仁宗皇帝即遣皇太孫往迎梓宫時京兵皆隨征在外城中空虛浮議籍籍慮趙府兵為變因祕未發喪皇太孫辭行啓曰出外有封章白事非印識無以防僞上然之顧急未有所與以問公公言上所用東宫圖書今閒請暫假之行此一時之權歸即進納上即取付太孫曰有啓事以此封識此物久當歸汝汝就留之既而謂公曰卿言誠是昔大行臨御儲位久未定浮議喧騰吾今就以付之浮議何由興且曰朝廷事卿與蹇義當究心吾當重用卿二人也公曰殿下嗣位事無大小皆當盡公此收人心之機也恩之所及必先扈從征行之臣漢文即位首進京昌史書以為貶臣兩人不應先及上初即位有詔減冗費而惜薪司准常例賦北京山東棗八十萬斤為香炭之用公入奏曰詔下甫二日而即有此雖云嵗用得無過多上曰數日事叢脞此蓋急遽中答之不暇致審耳即命減其半九月癸未禮部尚書吕震言於上曰今喪服已踰二十七日請如太祖倣漢制易吉服上時未有答震退遍語羣臣明旦釋從吉公謂震曰今未可比此例蓋洪武中有遺詔且仁孝皇后崩太宗皇帝縗服後仍服素衣冠絰帶者數月今上於皇考可遽即吉乎震厲聲曰朝廷事爾每執異尚書蹇義兼取二說明旦君臣皆素衣冠黑角帶遂以聞上亦未答明旦上素冠麻衣麻絰出視朝文臣惟學士武臣惟英國公如上所服罷朝上諭左右大臣曰吕震昨奏當易服朕聽臣下易之梓宫在殯吾豈忍易士竒所執是也公自左春坊大學士進禮部侍郎兼華蓋殿大學士尋升少保翰林以公等所授誥草進呈上取筆親增二語曰勿謂崇髙而難入勿以有所從違而或怠顧謂公等曰此朕實心卿其勉之公對曰聖德能容臣等敢不勉昔富弼有言願不以同異為喜怒不以喜怒為用舍成湯改過不吝所以為聖人願陛下常以古人為法升少傅階榮祿大夫時天下方面大臣及羣有司皆朝京師兵部尚書李慶言於上曰民間畜馬蕃已散之軍伍尚餘數千請令朝覲官領之少蘇民力正官領牡馬佐二官領牝馬太僕苑馬寺嵗課其息有虧罰與民同公謂慶不可慶忿不納公獨奏曰朝廷求賢任官今乃使養馬而課責與民同豈貴賢賤畜之意乎明日復奏曰必行此令天下賢者誰復肯仕蓋虧損一馬必責賠償破家産纍子孫朝廷何為負此名于天下後世乎上許出內批罷其事不報明日公又言兵部已督朝覲官領馬所領多生駒南人脆弱不能控制立視其奔逸號泣於道路臣恐將來逺慮者非但不願仕亦無志學問此令之失非小上曰偶忘之當即批出不爽也午刻上御思善門召公諭曰內批豈真忘之朕聞李慶吕震輩皆忿卿朕念卿孤立恐為衆所傷不欲因卿言而罷今有名矣出示一章乃陜西按察使陳智言畜馬不便命公據此草敕止散馬公頓首言陛下知臣臣不孤矣但馬已領者當何如上曰已領者惟洪武中官員乘馬例不責生息虧損不責償未領者止勿給復謂公曰繼今令有不便惟密與朕言李慶輩不識大體不足語也上以梓宫在殯命禮部尚書吕震新正朝儀不用樂及鴻臚習儀仍用蓋吕震主之公與黃淮等入疏言前已議不用樂今仍用不可乞敕禮部設而不作未報乃復進奏待廷中至夜漏下十刻遂有㫖如公言越三日上召公等諭之曰吕震每事誤朕卿等所奏停樂是臣以能直言為賢如用震言今悔何及洪熙元年正月命公兼兵部尚書公辭曰臣為少傅大學士已踰涯分尚書一職更不敢當上厲色曰黃淮楊榮金幼孜皆三職卿獨二職人將謂何卿勿辭公請辭俸上曰卿於朕勤勞二十年故酬以是祿何用辭公曰尚書月俸六十石可養壯士六十人臣受二俸已過分安敢復加尚書蹇義言宜聽辭學士俸公言辭祿當辭厚何用取虛名上曰朕成卿志乃聽辭顧義曰廉介之風士竒有焉於是黃淮亦辭户部尚書俸上監國時御史舒仲成嘗以事忤㫖後已升為湖廣按察副使矣及即位尚書蹇義因以他事奏仲成即命都察院逮治之公上疏曰向來小人得罪者多陛下即位皆宥之今追理仲成即詔書不信漢景帝為太子召衛綰不赴即位進用綰前史韙之上喜即罷治仲成賜公米及鈔幣且降敕奬諭曰卿𨗳朕以仁助朕以德欲朕為唐虞之君誠忠良股肱之臣也有卿如此朕復何憂洪熙元年二月上以田二頃賜公時蹇義先已受賜公懇辭上曰卿事朕表裏一誠資益良多朕心不忘卿前辭祿今又辭田何執之固也公曰臣起自寒微今受恩踰分豈可不知止足幸少延殘喘得更事陛下三二年獲全歸山林受賜厚矣上曰汝勿憂終身吾送汝入土身後事皆勿憂公曰聖仁在上臣復何憂遂聽辭明日諭蹇義曰士竒真能廉使仕者皆如此世豈有贓吏乎四月人有上書頌太平者上以示公及蹇義夏原吉楊榮義等曰陛下即位所行皆仁政百姓無科斂徭役可謂治世矣公對曰陛下恩澤已敷但流徙尚有未歸瘡痍尚有未復逺近猶有艱食之人須再休息二三年庶幾人皆得所上笑曰朕與卿輩相與出自誠心去年各與繩愆糾繆圖書切望匡輔惟士竒曽上五章朕皆從所言卿三人未有一言豈朝政果無闕生民果皆安乎卿輩吾所倚任事有未當皆須直言勿有所隱大理少卿戈謙數言事過於矯激尚書吕震吳中都御史劉觀侍郎吳廷用等交奏其賣直沽名上頗厭之公進曰謙雖昧於大體蓋亦感恩圖報耳古人有言主聖則臣直惟陛下容之上以衆言猶不懌因免謙朝而使視事如故公又進言曰陛下有詔求言言不當者不之罪今謙因言取咎朝臣皆以言為戒且四方朝覲之臣咸在豈能盡知謙過失若傳之於逺人將謂朝廷不能容直言上惕然曰朕非惡謙言事其言自有過實者卿可以朕心諭衆人公曰此非臣言所能諭當以璽書開諭可也上遂命公書敕引過而待謙如初令百官言事毋以謙為戒由是天下曉然知聖德之實上念公匡輔之力賜公璽書其略曰朕膺監國之命而卿侍左右同心合德徇國忘身屢歷艱虞曽不易志及朕嗣位以來嘉謨嘉猷入告于內期豫于治以惠黎元正固無二簡在朕心兹以已意創製楊貞一印一枚賜卿用藏于家傳之後世惟卿子孫由是知卿克致顯榮不易維艱思保守之惟朕子孫亦由是知卿弼朕之功以保全爾子孫與國咸休永世無斁上嘗論科舉之弊公曰科舉須兼取南北士上曰北人學問不逮南人公曰長才大器多出北方豈但南人有文可用也上曰然則將如何公曰試卷例緘其姓名請於外書南北二字如當取百人則南六十北四十南北人才皆入於用矣上曰北士得進則北方學者亦感發興起往年北士少以科目進者故怠惰成風卿言良是往與禮部計議以聞議定未上而宫車晏駕宣宗即位遂行之宣德元年髙煦反車駕親征罪人既得師還尚書陳山來迎見上請乘勢移師彰德襲執趙王則朝廷永無憂矣上疑之以問楊榮榮力贊其決又語蹇義夏原吉二人依違其間榮遂傳㫖令公草敕詰趙王公曰事當有實天地鬼神其可欺哉今當以何為詞榮曰令逆黨言實與趙謀即是矣何患無詞公曰如此能服人心否乎往見蹇夏反復言不可狀蹇夏曰即如公言當若何公曰朝廷重尊屬厚待之有疑則嚴防之當必無虞而於國體正矣二人曰上今特信榮言不係吾輩可否也公復見榮曰太宗皇帝惟三子今上惟二叔其有罪者不可恕無罪者當加厚庶幾仰慰皇祖之靈榮意未解曰汝不草敕則吾當以聞時惟楊溥與公意合溥曰吾二人俱請入見明其大義榮先趨入公二人繼之門者不內俄復召蹇夏蹇夏以公言白之上不懌而止車駕還京師意大悟不復論彰德事然言者猶喋喋上皆不聽特召公曰論趙王者日益多當如何公對曰今日宗室惟趙於陛下為最親當思保全之豈可惑羣言上曰吾亦思之皇考於趙最友愛且吾惟此一叔奈何不愛今思所以保全之道欲封羣言示之俾自處公曰更得一璽書諭之尤好遂遣廣平侯袁容都御史劉觀持敕書往諭且示以衆言趙王得書喜曰吾生矣即獻護衛上表謝恩而言者頓息上待趙王日親厚而薄陳山竟疏斥之既久召公諭曰吾待趙叔不失親親之禮爾有力焉賜公白金文綺楮幣二年十月黎利遣人進前安南陳王嫡孫皓表乞立為陳氏後詞甚懇切上亦厭兵欲從之大臣有言此黎利之譎當益發兵誅之或以為與之無名徒示弱於天下上召公與楊榮謀之榮曰永樂中費數萬人命得此至今勞者未息困者未蘇因其請而與之便公曰榮言當從初求立陳氏後者太宗皇帝之心求之未得乃郡縣其地十數年來兵民困於交址極矣此皆祖宗之赤子體祖宗之初心保祖宗之赤子正陛下盛德何謂無名漢棄珠崖前史以為美何謂示弱臣侍仁宗皇帝久聖心每憾此事有意外之慮願陛下勿疑上意遂決五年二月上以四方屢有水旱欲下寬恤之令獨召公議之上曰被灾之處稅糧首當免民間有缺孳畜馬騾官責償甚急民苦之亦所當恤凡爾所知者當悉為朕言公曰百姓積缺薪芻及採買諸物官府但知督責而民不能輸官糧額重民困無聊多有委棄逃徙者當量與減除部符坐徴買辦諸物不問其地有無一槩促辦民費價十倍不能完唯當於産有處取之無者勿强也年來刑獄不清旱潦恐由於此宜戒飭法司敦用平恕務求實情四方工匠丁男皆徴集京師役於公者無幾受私役者十六七身既勞困而妻孥莫顧未免怨歎當命官察治丁多者免其半單力者皆免老病無丁者除其籍其本非匠誣引為匠者察實除之今軍民苦漕運而倉庾無關防姦盜相繼恬不畏法宜命風憲官巡察上稱善命即書敕明旦行之民大感恱七年二月上諭公曰憶前下令恤民今已再朞民事不又有可恤者乎公曰官田減租民間皆感聖恩而户部格不行追徴如舊此循習之弊上艴然曰今欲再下敕寬恤必舉此為首如再格不行朕必罪之因問事之當寬恤者公曰逃移之民朝廷既赦使復業而家業盡喪又有公逋私債之擾所在官司不能恤則必逃聚山林相結為非請下有司凡逃民願歸者郡縣善撫恤免其征徭不願歸者聽於所在附籍給以閒田為經營居處免徭役三年庶使得安上曰在彼在此皆吾民但得人安足矣公又言各處課程先因鈔法不行加倍徴納蓋一時權宜今鈔法頗通宜減倍徴之額又天下課程皆納鈔惟湖廣廣西浙江商稅魚課舊皆納銀請裁為一例上命納銀一兩者折鈔百貫又言小民之不安皆原有司貪暴請令風憲考察上曰然若有廉能者亦令以名聞奬用之公又言方面及郡守請令京官三品以上及布政按察薦舉務取亷公端厚能為國為民者吏部審其可用奏授以官後犯贓罪併坐舉者凡因保舉授官而有指告其罪者先逮問餘人有驗然後及之庶不為小人所誣年來吏員太冗多有昏愚不通請令六部都察院翰林院同考試選擇而用之軍民中有文學才行卓然出衆智謀材勇精於武略者亦宜察舉唐虞之世罰弗及嗣今極刑之家有賢子弟例不許進用上曰舜殛鯀用禹聖人至公之心也今除謀反大逆外其餘犯者子弟有文學才行並聽舉用公又奏臣見聞不廣願命大臣謹厚者一人共議之得推廣仁恩以遍及天下上以胡濙謹厚命與公密議凡可行者悉以進事皆施行今上即位之初公惓惓以天下為心率其同列首言當整肅軍政飭邉防以奠安內外南京根本之地雖有襄城伯李隆守備其老成忠直如尚書黃福宜令參贊軍務有事同議而後行庶幾無闕湖廣河南山東江西去年旱灾人民艱食慮有嘯聚為非者宜委文武大臣各一人往鎮之事定而歸緣邉將士所以警備非常其無馬者宜令於行太僕寺苑馬寺關用西番諸處貢馬有可充邉用者亦聽留官員冗濫宜從吏部及內外風憲官考察近詔寬恤軍民內外諸司當體朝廷之意凡事務從簡省宜令條奏事有應省者取自上裁詔皆如公等言公等又上疏曰皇上肇登寶位上繼列聖下統萬邦必明堯舜禹湯文武之道以興唐虞三代之治去年十月宣宗皇帝諭臣士竒曰明年春暖東宫出文華殿讀書凡內外侍從俱用慎擇賢良廉謹之人臣謂此第一事望皇上留心不幸大行上賓臣未敢遽言然此事至重伏望山陵畢日早開經筵以進聖學其所條奏唯在慎擇儒臣及左右侍御之臣其學術不正立心行已頗僻者皆宜屏逺使不得上惑聰明宗社生民之福實關於此疏奏上與太皇太后皆嘉納焉太皇太后遂誥諭公等専以擇講臣為務尋升少師特進光祿大夫柱國同知經筵事公又念今遣御史清軍有以陜西山西山東河南北直𨽻之人往南方極邉補伍者兩廣四川貴州雲南江西福建湖廣浙江南直𨽻之人往北邉補伍者其水土不相習南人死於寒凍北人死於瘴癘且去鄉或萬里或七八千里道路既逺困於無資多致死亡深為可憫在祖宗時已有除逃軍仍舊其餘軍丁南北各就近衛服役之令兵部以文移繁勞憚於改發不念下人之艱苦不思兵備之無實遂與少保楊溥商確計議具疏而率同列上之且曰臣愚欲以今後清出山東山西河南陜西北直𨽻軍丁皆發甘肅寧夏延安大同宣府永平遼東諸處雲南兩廣貴州四川湖廣江西福建浙江南直𨽻軍丁皆發四川雲南貴州兩廣及邉海衛所待補足其缺又以填腹裏之空則兵備有實下人不困上命公侯大臣議行之天下便焉又言堯湯之世不免水旱而堯湯之民不至甚病者有備故也我太祖皇帝篤意養民其於備荒皆有定制天下郡縣悉出官鈔糴穀各於四鄉置倉貯之以時斂散又相其地宜開浚陂塘修築墟岸閘埧以備水旱小大之民各安其業此萬世之利也歷嵗既久姦弊日滋豪猾侵漁穀盡倉毁凡諸水利亦多湮廢或被占奪稍遇凶灾民無所賴風憲不舉守令漫不究心事雖若緩所繫甚切請令户部擇遣京官亷幹者往督有司凡豐稔州縣各出庫物平糴儲以備荒陂塘閘埧皆令修復具實奏聞若有灾之處則俟稔嵗而後行郡縣官滿兼以此之廢舉為殿最風憲官巡歷各務稽考仍有欺弊怠廢者具奏罪之若巡歷所至不復問理聽其堂上官糾治庶幾官有實積荒嵗人民不至狼狽耕農無旱潦之虞仁政所施無切於此上曰此祖宗之良法美意也命户部亟行之時有言方面官及府州正官專用保舉即是恩出於下欲如洪武永樂故事皆令吏部選除上命公與楊溥議之公等上疏曰宣德七年以前藩憲二司及府州正官多不得人百姓受害是以宣宗皇帝敕令大臣舉保自兹以後多得其人間有一二非人蓋緣舉主審察不至亦或實是徇私所司不行糾舉以致如此大抵宣宗皇帝求賢養民之心皆上體祖宗之心非是有所更改昔堯舜禹湯文武及我朝祖宗相承為政皆有因時損益之宜宣宗皇帝臨御之時體祖宗之心以行仁民之政者尚多保官乃第一事當時不聞人有異言多以得人為喜唐太宗力行仁義命在京三品以上官舉郡守縣令後來致天下斗米三錢之效明監在前可無疑也聖㫖所諭保官則恩出於下切緣衆臣舉保吏部審擇具名奏請聖意俞允然後授官不允即不得除授恩實非出於下也近年有等京官無人舉保造為謗語專欲隳壞先帝良法則小人皆得升用小人日進則君子日退天下何由治平伏望聖斷只依先皇帝敕㫖而行但所舉之人後有犯贓必須明正舉主之罪則人知謹畏不敢濫舉官必得人臣受四朝大恩慚無寸補惟念用人賢否生民休戚國家治忽所關是以竭誠盡言惟聖明裁擇詔如公議五年公聞四方雨澤不足率其列上疏曰皇帝臨御以來凡百科徴一切停罷官府逋缺悉皆宥免民生既安天休當應然今猶有旱灾者豈刑獄或未清歟聖心惓切惟在施仁慮恐理官奉行未至乞令三法司精選其屬清廉仁厚公正無私者數人賜之以敕分行天下審録重囚親詣州縣召集里老親鄰審問實情具奏處置不令有寃其輕罪有疑者即與決斷不得淹禁致傷人命兩京法司悉與疏理庶幾可以回天意從之公久在朝廷處宥密之地言動以理不茍為異同亦不惑於利害惟以忠誠結主知而仁宗皇帝知公尤深由是太皇太后亦知公為人宣宗皇帝嘗奉太皇太后往謁二陵公與蹇義楊榮等皆從上傳太皇太后㫖命公等進見勞問慰勉加以厚賜既數日上諭公曰太皇太后為朕言皇考往年在宫中談卿等姓名及行事甚熟太后悉能記憶其間才學孰優孰劣孰肯任事不任事皆有譏評言蹇義重厚小心但多思少斷卿能持正言不避忤意議事之際先帝數不樂卿然能從卿言以不敗事嘗有小失甚悔不從卿言太后又謂朕曰凡正直之言爾不可以為忤而不從謹之謹之公對曰太皇太后之盛德仁宗皇帝之盛德也願陛下常奉聖訓公處心公正論事必當大體常扶君子而抑小人羣臣有罹譖毁而非辜者必盡誠為之伸解有恣貪邪不悛者必正言其不可用三朝史事皆公總裁是是非非悉徴諸實每語同列曰天下萬世之事當以天下萬世之心處之如有一毫出於私意不論厚薄皆當獲罪神明所舉賢才列於中外者五十餘人皆能正已恤民蓋公取人必先德行而後才能無問識與不識博詢於衆而信乃舉以此不得於公者怨誹忿興不恤也直道而行不為阿徇永樂宣德中同列有譖公於上者皆賴上明不聽公聞之亦不為憾待其人如初篤故舊解縉尹昌隆之死言於仁皇皆與存後公秉謙執虛未嘗自滿薄利篤義壯老一心直嘗觀之宋歐陽文忠公以道德文章名天下其功業之盛亦既顯於當時若君臣相得內外無間享其福祿榮名而久於其位蓋未之能也今公德行文學表然為四方之望議論政事施用於朝廷者四十餘年君明臣良志同道合軍國之務知無不言而言無不盡典冊制命皆出公手在位之臣事有可疑者一於公決焉若公者非書所謂商耉成人詩所謂王之藎臣也歟公嘗以其進於上上之命於公者備録成書曰此列聖大德所寓也何可忘哉直從公久其受教為多而知公亦深公之細行皆可書當别有備載之者姑取其事有關於天下國家之大者為之傳使後之史氏有考焉貧堅子傳貧堅子廬陵忠節坊人也自其祖父時以資聞鄉里其後亦以多故失之至貧堅子有宅一區圃數畦薄田幾百畝在泰和山中賴其利以自給無所求於人而其所居當郡城南門之衝凡仕者冠蓋騶從呵擁出入相屬於其門而貴游子弟豪俠之徒負其所有遨嬉上下裘服相炫耀輿馬相雄髙亦不絶於路花時月夕長筵廣座笑歌而管絃不在東鄰在西肆貧堅子處乎其中自謂漠然無所慕其於朋友雖泛愛而獨喜從賢士大夫遊唯恐不得當其意與之文則謹藏之自謂金玉不過也豫嘗與處而别去者久矣去年豫從京師還故鄉貧堅子數訪豫不獲見今年七月索租來泰和布袍草帽徒步將入山忽遇之於途遽前執豫手曰子豈忘我邪視之乃豫貧堅子也相慰勞久之問其年與其家事對曰吾年則長矣而貧猶在也前四五年有子足任事今已死矣豫貧其有已乎邀豫坐其故人家相與道舊故忽記豫所為文朗誦而起曰此非子所作邪憶豫年十五六時浪遊郡城中方以跅弛自竒貧堅子請止其家簞食豆羮相對不厭也一日大雪貧堅子沽酒飲豫歌呼大笑以為歡時其弟方結姻醉求豫作書豫援筆立就貧堅子驚喜絶倒以為竒至今能道之然豫亦不自知也方是時心壯氣鋭視諸事皆若不足為惟酷好遊覽浮屠老子之宫及青原螺子諸山無不到遇清泉白石長林茂樹輒終日忘歸貧堅子在焉亦有自得之色蓋忘其貧而與豫樂也於今二十餘年貧堅子將老矣而豫齒益壯視前所為蓋已悔之貧堅子猶念之不忘則其意氣之盛可知矣此豈以貧而纍其心哉既又曰吾堅守吾貧而貧亦不吾棄庶幾有終始者子能不棄我為我傳之庶幾後世知有貧堅子也昔太原王霸貧居以自樂不求人知有故人子擁騎造其門霸之子見客沮怍不能前而霸亦甚慙之霸之節幾變矣所以克終者其妻之助也士大夫晚節保守之難如此貧堅子其慎之歟貧堅子劉其姓士宏其名羅仲淵傳公諱源字仲淵姓羅氏其先自錢塘徙豫章又以宦遊徙居分宜之白芒有宏正者為吉水主簿卒葬其邑之東池子孫因家吉水澄溪上於是為吉水人公自少闓爽不凡喜讀書善事父母及長浩然有四方志挾其資以遊足跡幾周天下所至覽山川之竒友當時之才傑而訪古人之遺跡及歸器益充智識益廣凡其所行磊落有大節姻族鄉黨之貧者賙之有急則赴焉二親沒葬祭無違禮哭之過時而哀所居溪南最勝又徙居之名其山曰羅浮自號羅浮山人治齊置書延名師以教子孫課僮奴事耕稼日婆娑嬉遊其間洪武中以閭右徙江寧時年才五十以剛直為縣大夫所禮嵗鄉飲必置之賓位閭里有不平者多求直於公縣賴以少訟永樂甲申上疏論便宜十事一以厚民生為本太宗皇帝善其言江寧令王凱上元令魏鑑坐纍繫御史獄公謂二縣之老者曰二公皆賢能今以纍去如民何請與公等白其事於朝皆應曰諾已而憚不果從時仁宗皇帝在東宫公獨往白之章下御史御史以公一人舉為私公曰顧所言何如耳果公雖一人何害若以一人舉為私安知纍百人不為私邪反復數四不能難則折之曰爾謂其賢能何故有罪公曰人孰能無過所望者赦小過耳仁宗聞而是之即還其官然公無事足跡未嘗至縣庭居京師江東門外有隙地皆種菊花時數與賢士大夫觴詠以為樂或斸去不吝也年七十得謝歸故鄉而所樂加焉孫通舉進士為御史每以亷勤寬恕為訓及其巡按四川則又諭以寬猛相濟毋負朝廷柔逺之意通能遵其言當時號為良御史平居教子孫懇懇於詩書禮義之訓君子謂公有家法云年七十三卒於家泰和王直曰豫少官京師嘗識公見公論事侃侃負直氣及廷論王魏事尤剴切壯哉乎其言卒能啓上聽釋疑纍由上好直故下能盡言仁宗皇帝之德所以廣大如天也然如公者亦奚可多得哉非古之遺直者歟豫是以録之故臨淄知縣歐陽府君傳公歐陽氏諱銘字日新一字仲元泰和人也自少家貧力學嘗游清節書院受業於戴養髙繼登陳心吾康宗武之門而老師碩儒如楊公望兄弟尤愛重之日相與講論切磋由是博通經史為文清麗典贍思若決河元至正丙申以詩經中江西第十名而兵亂道阻不果北上教授里中學者爭師之我太祖皇帝定鼎金陵江西內附嵗乙已詔求賢才江西行省首薦公明年徴赴京授江都縣丞兵荒之餘民死徙十七八閭井蕭然公至即移文旁近凡江都民轉徙者皆還本土勞來安定出於至誠其貧不能耕者勸富人假種糧貸牛具使力耕公家徭賦處之各盡其道必使事集而民不擾於是流移四歸邑稍完復民有繼母告不孝者公察其貧不能養委曲開諭母子泣謝而去卒為慈孝之行嘗治廨後隙地得白金百兩役夫以歸公公曰此天欲以紓民力也㑹部符徴漆使者督責甚急時黟歙商旅未通斂於民不能得他縣皆大擾公命以所得白金俾民市諸京師而納焉居官有暇即進諸生講先王之道或行田間視耕穫賞勤而戒惰一縣戴之如父母甫二嵗升臨淄知縣去江都江都人皆大感相與扶攜送至境上涕泣不忍其去時臨淄亦新附荒殘疲瘵公勞來安輯之如江都勸課農桑寬省徭役既一年稍給足公曰兵荒所以相仍者由民不知教神無所祀也今幸稍定二者其可已乎即興學校築山川社稷壇與民從事於詩書俎豆之間民知公為已也皆欣然從之初公來臨淄時副將軍常遇春方略定郡縣之未附者過臨淄兵士十餘人入民家取酒不得相毆擊譁動一市公出遇呵止之不服因笞遣焉且往見將軍白之軍校先走告軍門曰知縣毆卒幾死且罵將軍不戢士常公命捽公至詬之曰汝何敢爾公曰軍固王師民亦王民也民被毆擊幾死軍士顧不可笞邪此軍士之過也知縣雖不賢其敢他有詈言常公意解乃獨責軍士而釋公由是申嚴約束無敢譁者後信國徐公往征沙漠道臨淄軍校有知公者曰是敢抗常公健吏也因相戒勿犯公亦迎送有禮自信國以下皆賢公所為臨淄古大縣俗喜夸詐經亂益難治公廉靜平恕上下化服縣以無事洪武四年朝京師卒焉六月草四日也年缺十缺公丰儀秀整氷清而玉潔其天性寬厚樂易有古仁人長者之風平生不妄交游非儒紳君子不接也其仕與處言行多可紀者今沒已五十年一時老長凋落已盡知之者鮮矣直公之外孫嘗讀陶淵明所作外祖孟嘉傳而悲之欲記公行事而恨不能詳維揚張彥剛豪俠人也謫居安慶從先公瓊州府君游而直又與揚州進士趙禮為同年吾泰和之賢歐陽允堅嘗官青州故從二二子得公在官時所行數事如此謹述為傳使後之人得以考覽焉贊曰孔子曰君子學道則愛人故漢之董仲舒公孫𢎞兒寬皆以經術飾吏事治效有足稱者其不然者苛刻擊斷為能媕婀姑息為髙而治道微矣觀公之為縣力農桑興教化去貪以利物禁暴以庇民卒能反惡為善易弊為强非孔子所謂學道愛人之君子歟然則雖以方漢之諸公何過哉說四子字說豫四子名之曰䆅秬稹穆字皆從禾以為禾者養生之物莫加也及冠則字䆅曰希稷秬曰希德稹曰希誠穆曰希敬而深有願望之意焉然慮其不思也故又為之說以告之䆅者積禾也百穀之所聚也而月令章句謂稷種於秋斂於夏歷四時備隂陽穀之貴者天之四時即人之四德隂陽以氣言剛柔其成質者也字䆅曰希稷者欲其全仁義禮知之德施於人倫日用之間而適夫剛柔緩急之宜庶盡人道而可貴也秬黑黍也可以為酒先王於有功德之臣則賜之秬鬯以祭其先祖蓋非德不足以受賜亦不足以奉祭字秬曰希德者欲其修德庶可以受賜而奉祭既祭而飲亦有以將之不至於生禍也稹緻也密也齊也物之生遂者所謂元亨誠之通也及其斂藏也所謂利貞誠之復也誠者物之終始不誠無物是故君子誠之為貴字稹曰希誠者欲其存是實理庶能有是物也穆亦禾也又有深逺之義焉凡人居深逺之地鮮不縱恣以敗德然其惡終不可掩字穆曰希敬者欲其敬以自持而無愧於屋漏也稷也德也誠也敬也當各思其義也然誠者敬者進德之本進而不已則能有其德之全茍於言動一有不誠不敬則放僻邪侈之心生詭欺惡薄之行成而懿德蕩然又何望至於全乎不能誠敬以進德而至於全而欲飽於饘粥安其身保其家奉先人之祭祀免於殆且辱焉其可得哉稷也德也誠也敬也當兼盡其道也豫家世業儒蓋數百年盛而衰衰而復振者無他守聖賢之訓而已古之學者必以聖賢為準而欲至焉茍遜其極而處其次則謂之自暴自棄四子勉之母曰誠敬以進德而至於全非小子之所能也王秱希善字說豫五子其長四皆命名與字而申其義矣其季名秱以去豫逺而教戒疏遂闕於自治今年已十七不可謂小也自治其可緩邪夫名於文從禾禾嘉穀也人之所恃以為命也秱者盛也名爾曰秱期爾之學行純備而足以致用若禾之長茂豐碩而足以恃也然禾資於田以生治田之功至則禾美而利博矣甫田之詩曰禾易長畝終善且有此豫取以命爾之意也詩又有之曰攸介攸止蒸我髦士蓋畎畝之中賢俊出焉豫家世業儒今雖學稼而儒業不廢爾欲為賢俊是宜兼盡其力也昔者記禮之君子譬人情為田而論其治之之道修禮以耕之陳義以種之講學以耨之本仁以聚之播樂以安之始終弗怠而功效成然後食之則四體正膚革充盈而身肥父子篤兄弟睦夫婦和而家肥用之於國於天下蓋無不足者此經之所載爾不可不加之意也且善云者豈獨禾之多有也哉天所賦之性嚮所謂治人情之田者皆是也苟弗篤於是與惰農居與小人遊禾之葳敗不知行之邪僻不恤而期肥其身肥其家效用於國於天下而不為世所棄蓋難矣父子至親言之切者愛之深也故書以為字說爾能無忘豫言哉家人卦說示子禎豫之有家誠難矣而治家尤難今爾禎任之故舉易卦家人之義略為爾誦焉家人之卦巽上離下為風自火出蓋風化形於外必自內始彖曰利女貞欲先正乎內也其象則曰君子以言有物而行有恆言慎行修正家之本立矣卦之六位有父子兄弟夫婦之象而自初至五隂陽各當其位上雖隂位而陽居之然陽宜在上不可謂不當也六位皆當是父子兄弟夫婦之位定父子兄弟夫婦之位定而家道正矣治家不可以不嚴故以陽爻為治家之主六二柔中而居正位為主饋之婦六四巽順而在髙位為主家之母九五雖陽剛然王者之事其餘三爻足以為法矣初九曰間有家悔亡蓋治家之初當立法以防間之不失尊卑之序不亂男女之别則其悔乃亡九三曰家人嗃嗃悔厲吉婦子嘻嘻終吝三居內卦之上為治內之主過剛不中其治家過嚴雖或有悔然家道肅而人心畏猶為一家之吉若婦子嘻戲無節必至於敗家而可羞矣上九曰有孚威如終吉蓋家道既成而欲保之於久逺必有恩信然後能相孚必有威嚴然後不相瀆相孚則心親不相瀆則分明如是則終獲其吉矣然不嚴治其身而獨加嚴於人未有能服人者故小象曰威如之吉反身之謂也觀於此治家之道得矣禎宜恪盡其心哉然始不能防間而中加嚴切無益也加嚴切矣而恩信不足以結其心且不自治其身則亦安能獲夫保家之吉哉禎必兼盡其道可也抑豈獨禎諸子將更治其事當互講豫言而交致其勉庶幾有克家之譽而爾子孫亦將有賴焉抑菴文集卷十一
