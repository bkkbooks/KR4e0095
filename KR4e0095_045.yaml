body:
  text: 抑庵文後集卷三十二明王直撰墓銘侍郎金公墓志銘公金氏諱問字公素其先杞人世有顯者從宋南渡家于吳故今為吳縣人公曾祖德久樂善好施有惠及人嘗自郡之許墅抵楓橋鑿七井以資行旅人德之因號金井祖國用元河渠提舉父仲旻以公貴纍贈至中憲大夫太常寺少卿兼翰林院侍讀學士妣顧氏纍贈至恭人公自幼頴敏莊重喜讀書日記千言悉了其大義弱冠從俞先生受易聞講姤復二卦曰勿謂隂微當存抑遏之戒勿謂陽微當加擴充之功凡所聽聞深悟默契諸老先生愛重皆折輩行與交兄聲亦好古嗜學有麗澤之益家貧無書嘗從人假借疾讀暗記無所不達其或損壞必為完整永樂初被薦為司經局正字仁宗皇帝在東宫雅知之丁內外艱皆賜楮幣俾乘驛歸葬即奪情起任事雖不獲終制然喪禮未嘗廢久之坐纍訟繫者十年資用或不繼然餽之不以義亦不受時學士永嘉黃公洗馬江陵楊公皆以事在繫三人者甚相得省躬念咎之暇各持一經相與講論曰此吾處憂患之道也仁宗皇帝即位升翰林修撰備顧問論時政得失上褒納之賜鈔二千貫衣一襲米十斛宣德乙卯擢太常寺少卿兼翰林院侍讀學士正統癸亥調南京太常寺乙丑冬升禮部右侍郎戊辰春正月二十七日以疾卒年七十九事聞上為之嗟悼命禮部致祭工部為治墳塋公天性孝友事父母極力營養不以貧故儉其親兄嘗病熱劇醫云必得螺可治方盛寒公解衣循河覔之股皆赤腫得百枚以進病良已其治家以禮內外秩然里有喪不能舉貧不能自給者每伺夜投錢與之曰吾非為名也娶謝氏封安人加贈恭人生子男二長汝進中書舍人次汝遜女三孫男三平生所為詩文甚富必根於理而達於性情有青楊集桂坊集耻菴集若干卷藏于家耻菴其别號也最善書得魏晉人書法於星厯之學尤精然未嘗語人汝進在北京聞訃而歸以缺年缺月缺日葬公于邑之太平鄉薦福山白雲塢先塋之次而以墓銘屬豫豫蓋知公者不可辭銘曰有行有文亦克有子光榮始終既多受祉白雲之原公墓在焉刻銘垂休百世之傳太宜人楊氏墓志銘太宜人楊氏諱觀豐城人曾祖缺祖缺父缺皆有善行而皆不仕太宜人自幼端重寡言笑工於女事父母愛之為擇壻得同邑丁公尚文既歸善事舅姑飲食衣服必躬治以進朝夕勤甚舅年七十二而沒惟老姑在堂太宜人奉事尤謹其心歡焉年九十而終丁氏素饒財遭亂失之公乃有四方志挾其資旅遊於外者二十年太宜人治家事於祭祀賔客吉凶慶弔凡諸所行皆中節由是公得如志卒能再豐其家平居教子必使讀書為善於諸女婦必戒以貞靜謹嚴其言鑿鑿乎不少貶至待妯娌則藹然其和遇困窮撫幼賤皆有恩初命子鉉赴南京受學於丁季恆先生所以訓勵資給者甚備學成以進士入官太宜人得食其祿而教戒尤至初任太常寺博士得封孺人及為刑部員外郎遂加封太宜人今進為刑部侍郎於法當封淑人而乃不能待以正統六年二月初一日卒于家距其生丙午之嵗享年七十六子男五鎔銑鉉鉉鎮女一嫁曾默孫男八曾孫男五侍郎君聞訃解官歸以缺年缺月缺日奉葬于缺之原以行狀授直請為銘納諸墓中直受而讀之知其婦道母儀皆可師法於葬宜有銘况侍郎君之孝而直忝交好奚可辭銘曰孝事舅姑順相夫端厚淑慎宜厥家善既積兮慶有餘令子顯赫升天衢恩封屢進禮秩殊髙堂鼎食㫖且腴忽焉而逝良可吁我為銘詩賁𤣥廬後百千年永弗渝處士尹君墓志銘君尹氏諱齊字子齊永新之南里人曽大父祖興大父佑卿父慶宗皆不仕妣歐陽氏君生質英邁然自幼與羣兒處獨安徐莊重如成人衆皆竒之既長通詩書大義慷慨自持不肯碌碌在人後長身玉立美髯而廣顙其意氣昻然若不可狎近及得而親之蓋溫然和也有司以其饒産稅俾永充糧長君戒諸子姪輩曰産稅祖父所致今以此受役若等必務公蔑私毋貽辱前人由是為之十年無絲毫闕失鄉人有欲誣取人業者訟於官官不能决知君剛直不阿以委君其人夜懷金賂君求助君曰拂天理以徇人欲吾不為也即白於官以業歸被誣者好仁篤義出於天性其事親盡孝生養死哀無違禮事長兄如事父撫異母弟尤有恩與人交懇懇盡誠過失則規之貧匱則賙之急難則赴救惟恐後里中嘗大疫親戚有陳某者盡室莫能興癘氣甚盛人不敢往來某死亦莫之顧君喟然曰親戚死喪義當恤使鬼神有知必當佑行義者即備棺衾躬率僕從往殯斂安厝之卒無恙尹氏之先居永寧大礱而永寧與永新舊同邑君四世祖層仲自大礱為南里蕭氏甥因從其姓至君乃嘆曰水有源木有本吾可昧所自出乎遂復姓尹凡蕭之業皆歸之作復本堂以示子孫士大夫益髙其行皆歌詠焉愛其子延名師教之諸弟姪願學者皆資之使學而旦暮訓勵尤切故益能昌大其家君之德善大率多此類正統戊辰四月一日以疾卒于家距其生洪武庚申六月六日享年六十八娶園湖吳氏有賢行子男六長義為蜀府教授次禮取進士為監察御史善於其職次智信忠和皆士人女一嫁賀循轍孫男六人女缺人以卒之明年葬于缺原於是禮以監察御史劉克彥所為行狀來求銘豫與禮善而信其父之賢觀克彥之言尤信乃不辭而為之銘銘曰尹顯南里厥聲世繼逮君承之維德維義既儀其家亦孚于鄉振後光前為衆之望有偉令子教授御史其諸繩繩亦克為士兹雖云亡流慶則長何以昭之刻此銘章醫學正科朱君墓碣銘故將仕佐郎延平府醫學正科朱君彥永與其配黃氏合葬南平縣長沙三門祖塋之次葬三十餘年而墓未有文其孫經為德安縣學訓導大懼無以昭懿德示久逺及來京師乃以前金州守石夀所為狀來求豫文刻諸墓石豫哀其志不能辭也按朱氏本光州固始人其先有諱缺者治延平軍事子孫遂家延平城南其曰友玉以儒行聞曰仲疇元時為本路醫學録者彥永之祖考也母林氏彥永幼失二親即能哀毁如禮事諸兄如事父及長諸兄卒撫諸姪如所生敏於學間未嘗以貧故廢習尤攻醫術於其書無不讀洪武甲子設醫學舉善其術者授以官於是郡舉彥永遂為醫學正科能以所學濟人明年乙丑攝西平河泊所事勘核流亡奏免其逋稅三之一丙寅尤溪人弗靖藩府檄彥永招諭之彥永反復開譬人用安業得免於禍藩府竒其能命攝髙才板巡檢適尤溪縣官皆以事逮去民請於郡得彥永攝縣事敦本厲俗月朔召諸父老使勸諭其鄉人必愛親敬長趍事赴功人大化服訟理政平明年當述職彥永當攝以行時庶務修舉者例受賞彥永預焉後有以賢良文學薦者徵書下而彥永卒矣時戊辰八月初一日也年六十一性和平無畛域不喜言人過其教人必依於孝弟忠信晚年以碁酒吟咏自娛然必謹禮度常曰士貴有恆故自號恆軒學者因稱為恆軒先生娶黃氏缺之女淑善勤慎歸彥永不及事舅姑每以為憾故嵗時助祭必誠必恭治家嚴而有法為女事每至夜分子婦有怠者必切責之加訓勉焉相彥永睦宗族處姻戚待賔客賙鄉黨皆適其宜教諸子讀書為學不使涉於非理以洪武癸亥九月十五日卒年五十五先葬于三門及彥永卒乃以辛未缺月缺日合葬焉子缺孫五人添經濟泰信經即來請文者女三人皆嫁為士人妻曾孫男六人女三人嗚呼以彥永之才行足以有為而止於小試以其配之賢足以正家而亦不獲永年是皆可惜也序而銘之非徒以慰經之心亦將以儀後世云爾銘曰朱本光州仕于延平初以武貴後乃儒稱醫術濟人亦已再世有煒正科不止于藝有行有文厥聲彰馳小試理民慶典所施惟以攝終其用弗竟亦有賢淑主其內政教行閨門宜室宜家胡福不延內外哀嗟歸藏斯丘刻銘貞石儀爾子孫傳示無極縣丞何先生墓碣銘昔我太祖皇帝既受天命統萬邦乃偃武修文恢𢎞治道洪武庚戌之嵗實即位之三年也詔天下設科取士于時廣東行省參知政事周天祥周禎奉命惟謹聘禮名儒以典文衡豫先祖子與公實與焉合諸郡之士羣試之而先生以春秋中第二明年登進士第授將仕郎睢寧縣丞睢寧當兵革之後凋瘵未蘇廨宇學校皆頽敝先生一意養民惠綏撫摩使盡力於田畝作文以勸諭之民既安業有所養乃稍治廨宇修學校公事之暇即至學宫與師生講論修已治人之道而以孝弟忠信為本由是强暴化服柔良者益趍於善衣食足而禮義興縣以大治秩滿升登仕郎改永康縣丞永康之俗文勝而質少先生一待以至誠所以治教之者皆不異睢寧永康亦治洪武已未六月二十六日以疾卒年五十三先生諱慶宗字子海伯川先生其號也世家番禺之沙灣為望族曾祖君澤宋南恩州判官祖汝楫元廣州德慶二郡教授父光衍元靜江縣主簿母黎氏以元泰定丁卯七月草九日生先生天資明敏敻出儕輩少治尚書後更通春秋其餘諸書皆博覽文詞瑰竒浩瀚至正丁亥領鄉薦第四人以元季隱居不出國朝更化乃成名當時賢達如翰林編修宋濂典籍孫蕡湖廣行省參知政事陶凱皆推重之有文字之好初娶馮氏無子繼室蘇氏生祖鳳洗氏生祖驥祖澤女一人孫男十二人公惠文生其葬以洪武辛酉正月十一日其墓在青螺嶂大坑山之原至是文生以撫州府學訓導秩滿來北京謁豫告曰先祖之名薦書也實先生之尊大父進之今卒葬久矣而墓石未有文先生幸賜之銘以託不朽其為幸大矣禮曰先祖有美而不知不明也知而不傳不仁也文生知其祖之德而思傳之逺可謂明且仁矣豫豈可辭乃為之銘銘曰其學之充其行之隆以治則有庸以教則有功庶幾古良吏之風青山崇崇靈秀所鍾刻銘其中以告無窮處士項公墓碣銘月湖處士項公士毅溫之瑞安人以永樂甲午三月二十二日卒年六十一後草七日其妻孔氏亦卒年五十九是嵗十月癸酉合葬其邑帆遊鄉大山之原葬二十八年子伾為無錫令述職朝京師乃以徽州孫太守所為行狀介禮部司務陳圭來謁豫曰先人不幸以隱終其德善之形於家孚於鄉而啓佑我後人者不獲大顯聞於世失今不圖恐後遂沉泯則為罪大矣敢請銘刻諸墓碣庶幾託以不朽豫嘉其孝故不辭按狀公諱愈士毅其字也自幼卓然有立志國朝初下方氏藉其遺糧運之括公之父以糧長當行然儒者不堪逺役公年始踰紀請代行又輸稅于武陵于龍江皆身任之父喜曰吾有子矣凡公私百役皆委焉公內盡孝弟外應事變罔不中節凡內外屬有事必咨而後行洪武中從弟僅坐纍之京師公慮其不得白與之偕卒周旋以免永樂初姦黨之獄起小人相搆結誣良善多沒入公從容其間而宗族賴以全蓋智足以謀義足以制而和厚周慎又足以感物而逺害平居教子讀書課僮僕治耕稼皆亹亹忘倦至於修治先隴葺祠堂以奉祭祀意尤篤暇則日記所見聞及所為諸事嵗終通類成書以備觀考其精勤尤如此所居傍月湖以月湖漁隱自號不事表襮不慕聲利不用浮屠雖儉於自奉然佳時令節朋舊過從必相與酣暢意氣軒豁常語諸子俾明理治心善繼先業以成吾之志諸子皆敬承不敢怠孔氏系出闕里元進士同知平陽州事孔公暘之孫女克有令德孝於舅姑睦於姻族仁於其子與側室之子教養必均一凡公所行皆能相其志公有子五人長曰傳次曰紹早卒又次則伾曰偃曰仇女二孫男七人女四人項氏先居霅川五季時始徙瑞安之南隄有道生者德積而家益大宋季祕書著作郎知常德府贈通議大夫爵瑞安縣開國男食邑三百戶諱模者生公徹為公之髙祖通判汀州長子從政郎長樂主簿諱光祖早卒無子以弟通仕郎則祖之次子師之字容卿為後容卿生誾字仲敬則公之曾大父大父父也夫世有貴顯者則必有善及人雖公之祖考及公皆不仕然其修於身者必無愧於天是以子伾受民社之寄將又大顯其門則公之德可見矣銘曰霅川之宗振于瑞安襲慶綿綿遂有顯官至公三世恬不喜仕而公之德式克用繼婉婉令人平陽之孫宜室宜家婦道是敦干將莫邪終合于一偕沒同藏卜云其吉惟公有子實克孝思刻銘垂休百世之貽處士羅公墓碣銘監察御史羅俊承彥以翰林檢討宋先生所述其曾祖行狀來請曰俊之曾祖實有令德以啓後人於其卒也葬於里中吹塘之原二十年矣而未有文刻諸墓碣以昭德垂逺此子孫之責也敢以為請願勿辭豫家與處士居相邇處士之年與先考尚書公蓋相若而情好最深處士姿貌豐偉言辭確訒閒暇相過從論詩書語道理莫逆也則豫不可謂不知處士者於銘其墓奚可辭處士字安道一字安浩世居城西秀溪坊曰友山與成仲仁者處士之曾大父大父父也皆有行誼而不仕處士早孤嶷然思樹立文溪蕭文恭甫為女擇壻得處士甚重之而欲以自近於是亦徙居文溪惇本尚實務勤儉以興其家痛二親之弗逮養也嵗時奉祀惟謹而悲不自勝方幼孤時舊業在楮源諸從父多隂據之及處士有知皆弗問而益篤於義終不以産業侵奪易其心先世墳塋則率諸弟以時展省不少怠常長其鄉糧賦未嘗妄取人一錢細民有不能輸者則為之盡其方必使公賦足而下不告病凶年饑嵗常發廪賑人急橋梁道路有當治者必出資以倡其成人或為不善則委曲勸戒使復於善鄰有李姓兄弟䦧於墻將訴官處士急遣人羅致諭以古人兄弟相好之義深切懇至皆悔服感謝而去自是有不平者不質之官但求質於處士平生言行必謹於禮度名所居堂曰尊禮人亦以此尊之縣大夫舉行鄉飲必賔禮處士朝廷下詔養老必受酒肉綿帛之賜其生於元至正丙戌十月初五日卒於今宣德丙午七月二十七日年八十一配蕭氏有淑行先卒子男五長子榖先二十年卒次子烜子㫛子曜子暉女一嫁蕭子善孫男十三斐琰玥璟􅀈圭瑢遜讓珣璣儉源女六曾孫男三十俊缺女十六𤣥孫男女各七豫聞羅氏之先嘗盛矣至元季而弱處士以一人之身而孳孳為善子孫多至五百餘指女子不論也天之昌其後如此蓋以彰為善之應今俊為御史又有名勉而繼之顯榮光大有已哉豫為之銘以勉其子孫而凡為善者觀於處士可以無怠矣銘曰處士之先居縣城西文溪再遷家益用肥孝友忠信率禮由義人服其公亦懷其惠善之所施厥應伊何子孫之多其福則那八十而終安此𤣥宅墓碣有銘用示彞則劉叔魚墓志銘叔魚諱鯉字叔魚别號拙軒其先居邑之珠林後乃徙今大原三岡里宋季曰榮甫者典教潮陽庭桂分教蘄州洪武中大父仲啓判陜州有治聲父仕堅好學能文不肯仕叔魚聰敏喜讀書日記千百言不忘先生長者校其業無能出其右者台州教授周以巽翰林侍講余學䕫皆以逺大期之戊子舉于鄉擢教寧逺邑庠寧逺僻在萬山中其人素不喜學叔魚循循善誘言行而身化之學者多克有成殿堂門廡久被焚叔魚首出資倡義復新之煥然有加於舊邑東南百餘里有洞曰長橋羣冦所聚多脅民為從出抄掠縣官請發兵勦之而民益受害弗能禁叔魚毅然以義白主帥兵稍戢軍中所獲脅從者甚多將盡戮以逞叔魚乃從容言曰將軍之來正以除盜安民民之被脅從者非所欲今不察而輒殺之豈上意哉主帥悟盡釋之民感更生之德歸而為位祀焉未幾以憂去改教長汀縣學其教不異寧逺時㑹府遣奉表詣京師或諷曰暑行不易若以事辭可免叔魚謂非誠以事上之道不用其言冒暑往得疾至延平驛卒焉庚戌七月草八日也距其生洪武戊辰九月草一日年四十六娶袁氏有婦道子男三世興世傑世殷世傑肇慶府學訓導世殷韶州府學訓導女一嫁鄭宗倫孫男九叔魚長身玉立美鬚髯孝友和睦治官治家必循禮法導人為善周人之急其教子弟及誨人子弟必以讀書明理為務凡求文者即與之無吝意有寧逺集長汀集藏于家缺年缺月缺日葬于里之黃岡而墓未有銘其諸子孫慮無以昭德垂逺以世殷所自為狀來求銘豫嘉其孝乃為銘之銘曰其生也逢時其才也有為其學足以端表儀誠以奉公乃止於斯嗚呼若人其誰不悲郭氏孺人墓志銘孺人郭氏諱琉世家萬安縣城之南祖德夀父明道皆有善行明道娶街下蕭氏生孺人四嵗而明道卒無他子蕭孺人守節躬教之養其德性之美於衣服飲食之事不課勵而能孝經小學諸書皆能成誦以古之賢女婦為師又攻筆札然不以施於外凡家事有當記注者皆任之蕭孺人愛之深不使去左右為擇賢壻得劉君孟淵而館焉於是遂專家政時舅已卒乃迎姑就養致其愛敬與母齊等所以奉其口體而順適其志意者人不見其有異也姑與母皆以夀終相孟淵葬祭如禮處妯娌以和撫子姪有恩待內外親屬禮義皆隆至臧獲下人衣食必均一課其治生處置皆不失宜篤意教子使隆師親友務古人之道鄉人有窮匱者必賙給之未嘗責報其善多類此嵗甲寅里中大疫孺人病亦危殆夢有告者曰汝多隂德夀見牛而止今無恙既而果愈益精明不衰治麻枲益勤子曦領鄉薦上春官孺人勉之曰爾當以逺大自期勿以我老為慮曦既取進士分俸之半以資養及授行人司正俸益增孺人用為酒食以祀祖考而及於姻族里鄰人皆以為榮生於洪武丁未八月二十日而以正統乙丑正月二十三日卒果符向所夢云享年七十有九一子即曦女一嫁藍田蕭卓車孫男五公碩公著公槩公理公宜以缺年缺月缺日奉柩葬于缺之原而以狀來請銘曰母嘗讀書知文字為貴葬而得先生銘以昭德垂逺庶幾慰悅於地下矣敢以請豫既嘉母之賢又重曦之能孝思託文字以慰其親不可以不銘銘曰惟此賢母德則多有藏于斯丘尚利爾後我作銘詩俾永不朽處士蕭公墓志銘蕭故長沙人避馬氏亂徙泰和之早禾市後又徙沙湖里為大家世有科第顯者至公之曾祖晉玉祖均祥父天與皆不仕而皆以行誼重一鄉公早失母周氏賴繼母撫育之既長聰敏喜學事父母以孝聞父母益愛之遣從鄉先生陳心吾學陳先生樂於教凡孝弟忠信仁義道德所以修已治人之說靡不為之盡而公之學有成或勸之仕公曰吾父老弟幼仕非吾志也吾為政於家而孝弟之道行焉亦可矣父竒其志悉委以家事公私百為無不當其意朝夕奉養惟謹親之心歡焉親卒葬祭無違禮而哀戚過之撫異母弟子巽尤篤同居處飲食未嘗有間言子巽嘗得危疾公醫禱百方獲愈後數年卒公長育其二女逾已女厚資裝嫁之學士解公嘉其行名其堂曰孝友而為之記公天性端重言動不妄待姻族以仁遇朋友以謙接鄉黨里閭則和而厚無貴賤愚良皆有恩未嘗有疾詞盛氣加諸人雖倉猝急遽之間藹如也族有遺孤子公嘗給以田而俾之有立後乃反噬或謂宜收其田公曰吾為祖宗之故豈以是不義而易吾心哉卒善遇之人亦以此益髙其行公生於洪武缺年缺月缺日永樂二十一年五月十八日以疾終年六十八娶王氏直之族姑能以德義相君子生五男子九淵九德九思九臯九齡孫男二十人裕旭昱昭禧旻曼禎晉昕暉祉鼎升時㫛昌曖炅晧女二嫁錢慎儀劉伯髙曾孫男十五人修倫儼儉倣伯佐休倚僎傑信伋傳儒某年缺月缺日諸子葬公於鐵溪岡之原而墓未有銘今年孫曼㑹試禮部乃以九淵之言來請銘嗚呼公篤厚君子也葬豈可不銘直為外姪實知公奚敢以不敏辭銘曰蕭氏之先式居長沙沙湖再遷大振厥華公德之茂本於孝友克儀于人亦昌厥後何天弗遺七十而終鐵溪之原隆隆新封山髙水清公安于此靈秀所鍾利爾孫子黃主事妻楊氏合葬墓志銘景泰五年五月朝廷推恩任職之臣而褒寵其親於是考功主事黃德溫得封父信初為承德郎吏部考功清吏司主事母楊氏封安人錫以敕命人皆為德溫喜德溫益自喜思奉敕以歸為父母榮也踰月訃至則相繼卒矣德溫悲二親之不能待哀慟之至幾欲無生即解官歸治喪將以缺年缺月缺日合葬於某處先塋之側而詣豫請銘黃氏世家信豐其先皆惇本尚實為善人承德公之父彥清篤於倫誼赴其兄之難死焉公早孤踰數嵗母袁氏亦卒煢煢孑立而奮然思振起以不辱前人辛勤綜理充廣其田業而修治其室廬凡故所有者悉以讓羣從兄弟而家日以殷雖未暇學然於孝弟忠信禮義廉讓尊賢事長愛人和衆凡行於家施於姻族鄉黨無不合乎道嘗曰觀書不必多吾於明心寶鑑有取焉果能是亦足以修身齊家矣常舉以訓諸子其學于里孰者日課其勤惰皆有法子孫遵教故多成其能鄉人或為不善則勸諭使為善有貧乏者則賙之人人謂公有德於已安人鄉邑楊仲賢之子母梁氏梁氏舊以資望甲一鄉愛其女為擇壻以歸信初端重慈慧孝敬儉勤門內之治肅如也其事長上尤盡誠伯祖母曹氏嘗病痢穢惡狼籍諸婦婢妾畏避不敢近安人曰長者病篤而可玩視乎自以艾煮湯熏浴之躬侍藥食由是稍有來視者曹氏病愈祝曰我病得安爾之力願爾多子孫又得賢婦皆如爾孝敬也其奉祭祀待賔客和妯娌撫家衆皆適宜人稱善者無間疏戚黃氏再興其家雖本於公之才亦安人之助也公生於洪武辛酉缺月缺日而以景泰甲戌正月十八日卒年七十四安人則生於戊午缺月缺日亦以是年三月十二日卒年七十七子男六德寬德裕早世德溫以進士入官即為主事者德柔德良亦早夭又一庶出尚未晬孫男七霽習舉子業孫女九德溫在考功勤於職務豫固惜其去而又聞其父母之善如此故勉而為之銘銘曰猗歟黃公世居信豐其艱其勤而家以隆淑媛來嬪天作之配令德孔宜協于內外有子克賢列官在朝恩寵所加其聲昭昭犬耋而終同歸于此考德有銘焜耀無已員外郎沈君墓志銘君沈氏字思義世家湖州武康之相溪大父政父士升皆不仕而惇本務實為善人君喜讀書明理道力行孝弟父早世治喪無違禮事母丁氏尤篤撫育弟妹皆使有室家母之心安焉以才能推擇從事於浙藩尤惓惓守禮法藩憲大臣皆重之既滿為丞於鄭州管城驛馳傳往來者日相繼而文武貴賤寬鄙細粗不同君夙夜不懈處之曲盡其道無不意滿而去最喜接士大夫過者尤樂為之盡嘗有暑困於圃田者恐不能生急投君求濟君延置小㕔善視之命巫醫為治竟不起君聞于州具棺斂㑹僚友殯于東郊馳告其家歸葬焉後有讒者誣君為如何以理正詞直不可枉惟坐誣以罪因以纍君謫役于房山人或憐君謂此好客之過君曰是所謂無妄之灾也未嘗有毫髮怨懟意久之得復職念久貽親憂即迎親就養滿九年當去時欲為子彬娶婦已有日㑹聞國哀即告止於女氏或勸君可無止君曰吾為臣子豈可自同庶民必過其期然猶罷燕止樂升南海縣都寧巡檢其地在海島中蠻蛋常出劫為民害君廉得其實屢率兵捕之前後獲六十餘人悉送有司置之法蠻始畏伏民得免冦害又秩滿當升遭母憂遂以老疾乞致仕歸家居二十四年年八十二其生於缺年缺月缺日而以景泰甲戌六月十二日終于正寢君天性嚴厲謹於自治常未明而起家人未嘗見惰容其居官時或造朝或公㑹必宿齊戒各服其服行禮不茍且失儀及老病歸每遇正旦冬至諸令節雖不能拜慶如禮猶北向稽首然後謁家廟於事先奉祭待賔客必盡誠教子孫接內外屬各以其道雖篤於慈愛然有過失不少恕鄰里有急必赴救勤儉急誼老而彌切娶馮氏同縣封山馮承賜之女孝敬以事姑恭順以相其夫門內之治皆中禮節凡君之所欲為者皆能如其志飲食衣服必以時莫不精潔完好雖或處窮約而賔敬不失常先君六年卒於正統己巳五月一日距其生洪武丙寅十二月十七日享年六十四子一人即彬女一人君誠愛彬自謂父子享祿位無以報國家而訓彬甚至所謂仁義忠孝敬讓廉慎寬厚平恕凡修已而及人者未嘗忘於心彬由是取進士官刑部以賢聞當時而朝廷之褒寵及君始封承德郎刑部王事妻贈安人今又進封奉直大夫刑部員外郎妻亦加贈宜人然命下而君已矣此君子所以深惜也初宜人之喪以景泰庚午二月壬寅葬邑秀巘山之原君命虛其右方以俟至是彬歸將奉柩合葬焉而自狀其行來請銘豫觀君之德善有足以垂世勵俗而子又克孝奚可不銘乃為序而銘之銘曰才舉其官行儀其家祿養恩封受福則那髙墳峩峩歸窆于此刻銘垂休宜爾孫子遼府長史楊君墓碑銘君楊氏諱述字宗道世為嘉興桐鄉人髙祖茂曾祖懋誠祖德順父希孟母姜氏君其仲子也生而警敏天資絶人祖與父極愛之遣入郡庠為弟子員君亦奮勵思有以稱其意學日益進同輩皆讓其能郡守齊政教授陳立尤奬重甫弱冠宣德癸卯以書經領浙江鄉試第一明年試禮部中教官選不就入太學庚戌㑹試復不偶於有司乃嘆曰仕以行道今吾以道教人教行道亦行也奚不可哉乃去為宜興訓導宜興學政弛君嚴立教條務窮經明理而發於文章諸生始知務本士習丕變由科目顯者相望以績最升監利教諭其教亦如宜興荆州守劉永喜君善教擇郡諸生好學者致書幣遣就學後果有登巍科者正統甲子鄉試四川請君典文衡君謝絶私謁以興賢自任閲卷畢求可當首選者衆皆難其人君獨取一卷曰此竒士他日必成大名視之乃周洪謨也明年果廷對第二丁卯與考福建鄉試君初閲視即取一卷曰解元在是矣及閲卷畢卒無以易君者當時士大夫知君典教之善又見君簡閲之精翕然皆推重之景泰辛未又以考績謁選吏部吏部知君學行奏以為遼府右長史階奉議大夫君曰長史以輔導為職當先其大者不汲汲於細故事有當言必委曲諷諭不肯茍止妄隨且謂世子當以務學讀書為要王好賢樂善自以為得良輔所言皆敬納焉嘗手書公正二字以賜蓋喜君蹇蹇自持而兾其盡職也及感疾王躬臨問命醫藥兾速愈君卒為惻然傷悼賻禮有加君於書無不讀達乎性命道德之奧為文章必據於理尤涵肆於唐宋諸大家其事親孝敬君之尊府八十餘常迎致不可君每分祿以資養數求便歸省極怡愈之樂然後去兄著無子君奉順其意生事死葬無違禮教諸子為學務循聖賢之道以修已治人自以少䝉訓於陳先生感念不忘凡過儀真輒往拜其門而周給其家與人交懇懇盡誠好善嫉惡皆出至公周窮恤匱甚於為已其存心之厚多此類以永樂甲申八月十二日生景泰甲戌九月草四日卒于官享年五十一配宜人蘇氏亦桐鄉人本姓張中山太守某之曾孫徽州太守某之孫即墨教諭志學之次女初志學女兄嫁蘇景賢無後而志學生宜人因以為已女遂姓蘇教愛之至四德克備為擇賢壻以歸君景泰辛酉卒于監利之官舍而以江隂潘氏為繼室子男四長曰青取進士為禮科給事中有名於時而君訓勵之益至次曰表善承其家女二皆蘇出潘二子曰素曰泰女一孫男一君詩文甚富有蘭谷集藏于家又嘗訂正潘迪所注庸學序解行於世至是青等卜以缺年缺月缺日奉葬于邑之某鄉梧桐里先塋之次與宜人蘇氏合葬焉乃以太子少傅兼吏部左侍郎俞公所述行狀來請豫文以刻之碑公與君嘗同學知其行為詳且又與豫同僚而知其言果可信况復有令子之請邪乃為序而銘之使刻焉銘曰維君早嵗負竒質素向儒宫究經術業就功成推第一遂擁臯比領清秩秋闈取士最嚴密公道昭明皎如日趙璧隋珠靡遺失曳裾王門為良弼從容論道謹操率鄒陽枚乘乃儔匹胡為知命遽終􅀈德誼文章照簡帙梧桐髙原勢回鬱𤣥堂新營龜筮吉欲播英聲騰茂實誰為碑銘太史筆給事中劉君墓志銘公劉氏諱忠字仕達世家山陽曽大父宗逺精於厯學仕元為司天監官大父德銘隱居行義鄉稱長者父均義通經博古當元季不仕徙居滁州從學者甚衆一時名卿大夫多敬禮焉尤邃於醫藥以其道濟人娶莊氏生公天性剛毅言行皆據於理不茍止妄隨事父母盡孝敬處宗族姻戚厚於仁遇朋友一以誠信事所當為者不以難易為趍舍必勇往力行鄉人有緩急多賴焉勤於子史論前言往行而究其得失語嘗屈其坐人雅有志於仕矣父以無他子謂醫亦足濟世何必仕命輟舉業益攻醫盡以軒岐以來諸名家書授之精研其義用以濟危急多竒驗漢庶人知之奏取𨽻所部公察其有異志深自晦匿及當遷臨棠以二親在滁遣妻歸養而稱疾杜門不復出庶人欲任使之亦以疾免事敗凡受任者皆得竒禍公亦謫戍遼東人服公先見而嘉其能明哲保身如此及老而歸以醫術付二子安道守道命季子清受學郡庠而訓勵尤篤曰吾世業有所付吾無事矣植橘家園結菴其間因自號橘菴鄉之耆耋張思忠輩九老者日來㑹彈琴奕棋飲酒賦詩囂囂然樂也清學成領鄉薦公益以進德修業用光前人為勉清益思有以成公志而公於正統七年四月十三日以疾終于家距其生缺年缺月缺日年八十二初娶李氏韓國公李善長姪女先卒生四子女二繼室郭氏生一子即清也孫男六人女十一人公以卒之年八月十五日葬滁州北原先塋之兆正統戊辰清取進士為翰林庶吉士授兵科給事中以才猷致通顯北伐南征皆有勞績遂升刑部右侍郎而以前所居官贈公為從仕郎兵科給事中母郭氏封太孺人太孺人得食其子之祿而君子以公不待養為慊景泰五年缺月缺日太孺人終於侍郎之官舍將奉柩歸滁與公合葬焉而自為狀來請銘嗚呼公有令德懿行儀于家惠于鄉之人而又以髙夀終有子克孝以致顯榮是謂全福宜有銘以葬奚可辭銘曰山陽故家代著厥聲既通厯書亦克醫經公纘其先身隱道泰學以勤至業以久大逢時之屯用智自防優游海邦乃還故鄉鄉之九老容服靜好樽俎燕遊樂此夀考子也克賢庭訓則然帝命煌煌寵贈自天猗太孺人比德儷美同藏于斯利爾孫子山川盤回靈秀萃焉刻銘墓中永永其傳布政使戴公墓志銘戴氏之先顯于晉從晉南渡因家金陵又遷于歙于婺源而以文學武功享祿位宋之世公九世祖士先取進士令錢塘樂浮梁風土之勝遂家焉由是子孫為浮梁人髙祖可翁曾祖德誠祖璹皆有文學德誼而不仕父嗣安尤稱長厚以公貴贈陜西右參議母徐封恭人公諱辨字士章早負才望鋭志於學選為邑庠生恭勤夙夜不少懈為文章頃刻數百言同列皆推讓之遂領鄉薦為崇陽訓導諸生素不樂學公以身率之績用有成及考廣西鄉試人服其公崇陽令缺藩省俾公攝焉政興務舉民德之秩滿以績最升兵科給事中恪舉其職然務大體略細故時有言應天諸郡工匠當赴役者多避匿詔公往理之公處置有方而物無遁情又命行邊察漁陽盧龍諸戍屯守所宜人䝉其利上尤以西北邊備為憂詔大臣舉能任之者得公賜敕奬諭宴賚而遣之凡諸邊務得便宜從事於是師律嚴明士氣奮勵軍實完整察指揮楊洪朱謙可大任薦之朝上以為能亦屬意用公未幾擢陜西右參議築城堡於臯蘭東北三百里曰達喇蘇以遏冦衝城成而人不知勞肅州苦餉運公為畫屯守方略通商旅往來而儲蓄常有餘諸軍伍有闕以屬公公按籍補完而去其蠧弊不四三年士勇邊實西畨部落為冦患事聞命擇方面能臣往視之衆皆憚行公毅然請往或勸以兵從公曰邉夷反側加之以威不若撫之以德撫之不從用兵未晚公往臨其境集諸酋豪諭以天子威德而曉之以利害之故衆歡然聽順邊境以寧上嘉公勞績升湖廣右參政以外艱去服除調廣東廉雷諸郡猺獞作亂公出視撫捕之至肇慶羚羊峽猝與賊遇賊稍向公公登岸據胡床不動使人諭之曰我戴參政也義不可茍辱其酋聞之遽麾衆使退曰果我公也邪公與楊公信民皆清廉愛民民亦愛公不忘今遇於此何敢怖左右皆羅拜稽首而去黃蕭養反圍廣東勢張甚城中乏食公百方賑給之賊攻圍益急公備禦盡其方捐已資懸賞以募士遣間使導援兵入城守以固而公當捧表北行文武吏士懼公去或有變懇留之公留與參將武公駐軍金利㑹都督董公偕以兵進戰獲其渠賊次第皆平賜公織金衣寶鈔羊酒升右布政使以內艱去詔奪情任事逾年升左布政使然公有疾不克究於用矣公天性孝友事父母極敬愛父嘗患瘡在左股醫十餘年不痊而益甚公為給事中歸省親䑛之去其腐敗傅以善藥瘡遂愈又以去親逺不克侍朝夕請分俸為養詔許之自初洎終奉事無違禮兄弟七人公為長雖雍睦有常然言行尤謹於所發使得以視效不輕舉而妄隨其官京師嘗作屋以待鄉里之無依者鄭常崔逺死於其家具棺殮返葬之至於清慎勤儉正直謙和君子無間然也公自教官厯給事中參議參政纍升至左布政凡四十餘年其功名事業之可紀者如此而詩文之見於世者亦多正統末年數以疾乞歸不許景泰甲戌來朝懇以請許之歸浮梁養疾日課子孫以守官持身之法保家睦親之方絶口不言勢利疾少間復作諄諄然語以禮戒勿用浮屠姻族來問疾舉手謝之倐然而逝冬十二月十三日也距其生洪武庚午正月草六日享年六十五先娶同邑閔氏贈恭人三子珹瑄玘玘鄉貢進士女二孫男六女四繼娶合肥李氏無所出明年乙亥冬缺月缺日葬于缺山之原玘奉公之弟嘉興教授冔所述公行狀來請銘豫與公交久相知為深且公之墓宜有銘奚可辭銘曰在昔成周方伯是崇維今承之有偉戴公戴公俁俁克似厥祖既闡乃文亦究其武帝曰休哉汝維近臣于旬于宣惠此下人崇德報功二品之貴慶澤滂流子孫世繼髙墳峩峩公居其中刻我銘詩垂耀無窮編修陳君墓志銘正統四年已未廬陵陳君大訓以其子文貴䝉恩封翰林院編修階文林郎癸亥三月草一日以疾卒于家年六十一蓋食其子之祿者八年士大夫初以為榮既又以為戚蓋君有德善而能成其子之賢宜享福於悠久而不克髙夀豈非其不幸哉文聞訃不勝哀即解官歸治喪而以刑部郎中郭循所為行狀來請銘豫與文素厚安得辭按狀君諱寶大訓其字也自幼端重頴敏讀書即了其深趣弱冠父委以家政克自樹立不以煩二親朝夕奉養極其敬愛左右順承務悅之以道而親之心歡焉於財利不茍取惟義是視遇所當用雖重費不吝也故能厚於宗族鄉䣊而恩禮不廢也有遺孤子無依者君長育之俾有室又買田宅居之人皆謂君厚於仁陳氏先居江南後徙居里之大櫟江南舊居堂廡門孰凡再經亂盡焚燬君慨念先業興復之不失舊觀居傍有池池上種竹復搆亭池中盛夏之月君與客觴詠亭上薰風徐來凉滿襟袖清言雅詠出於水光篁影中而游鱗翔羽皆有自得之意灑然不知塵埃之擾炎暑之酷也其風致如此人因以竹薰號焉君內貞外和既不忤於物而亦不隨俗俯仰平生好文章於古今人制作能評品髙下勤於教子嘗禮循為之師訓勵篤至文丙辰進士及第授翰林編修貽書戒勉之尤切踰三載以稱職聞上推本於親由是君得受封文捧敕歸省拜堂下歡動一邑未幾居母彭氏喪哀毁逾禮遂嬰疾不能支後雖稍間然哀思不忘終不愈竟以是疾終焉君曾大父顯忠以學行名當世大父子時父宏德皆不仕然皆為鄉長者初娶髙氏先卒有子三人長安節次安簡即文也又次安止女一人繼室朱氏女一人側室子一人曰定孫男六人其葬以缺年缺月缺日其墓在缺之原銘曰詩書傳家起自昔孝敬仁義紹厥迹教子一經領清職恩封煌煌美祿食家居雍容荷帝力薰風池亭湛深碧超然煩襟為之釋意與羣物各有適吁嗟此樂豈終極云何遽去不可即髙丘冥冥就窀穸惟其德善人所惜勒銘垂休永無斁封監察御史孫公墓志銘景泰六年四月吏部課功舉朝臣之績最者以聞上命皆賜之誥敕而封贈其親曰朕以勸忠與孝也於是髙郵孫公銘字克新以子謙為監察御史有勞績得推恩封為四川道監察御史命既下而公以五月初十日卒于家謙聞訃慟絶即解官歸治喪以公嘗為淳安令今兵部侍郎翰林學士兼左春坊大學士商公淳安人實知公請為公行狀持來謁豫銘以葬按狀公髙郵望族曾祖士信祖思誠父文禮俱有隱德而不仕公自幼端重喜學游郡庠通詩經欲以取進士連不得志於有司遂充貢入太學太學之士千餘人亦樂與公為友厯試諸事皆有名嘗言為政當以德為本德孚而人自化事豈有不治彼區區以刑罰毒民而欲求治不可得也宣德甲寅擢為淳安令淳安善地公亦喜於有為務以至誠接物而所行必以義留意學校盡其所當為邑人多安於其治而不悅者相與滕口當路者納浮言亦或沮抑之公不顧曰吾求無愧於心焉耳窮達非所計也得返初服亦足矣遂歸髙郵與故人賔客日觴詠為樂曰此孟子所謂人知之亦囂囂人不知亦囂囂也公襟度夷曠而姿貌偉傑美鬚髯望之如神仙然雖寬厚無忤而簡靜自持衆方譁笑傾一座公獨默不為變人莫測其意如何也天性孝友事父母極敬愛始終無違禮弟鈺早世尤善撫其孤姻戚貧乏賙之不少吝佛老之徒有求者錙銖弗豫也退居十餘年唯以教子孫為事不汲汲於勢利郡邑大夫有所咨度則必為之盡人亦隂受其賜公去淳安久淳安之人思之不能忘過髙郵者必拜公而後去公亦撫之如所親及有子為御史人益為公喜曰公之善未盡施之政此天所以報也至是而終距其生洪武丁卯十月草三日享年六十九配張氏封孺人子男四長誼次讓早卒次讃次謙謙取進士為御史女二長適廣東布政使經厯王珏次適翰林修撰董某之子僎孫男五曾孫男一其葬以缺年缺月缺日墓在某之原銘曰髙郵故家世業之盛公奮于學遂起為令善政善教未究厥功天錫祚𦙍克纘其隆制命煒煌荷此寵錫生榮死哀曷其有極髙墳峩峩公安于兹昭德有銘永永弗隳定襄伯夫人髙氏墓志銘夫人髙氏追封定襄伯郭公景南之妻今征西將軍定襄伯登之母也髙氏世居髙郵以武略立功夫人伯父實官至後軍都督僉事父宣為散騎舍人諸兄亦纍纍至通顯夫人家雖貴富而不溺其習貞靜自持言行不妄而於女事尤精年二十歸于公蓋營國威襄公第八子也威襄開國元勳位列侯子尚貴主所與通婚姻者皆世祿大家赫然隆盛夫人來歸動中矩度尤篤於孝敬事上撫下皆盡其道執舅姑喪無違禮親姑戚氏病夫人躬侍藥食七旬不解帶姑卒未兩月而夫亡夫人才二十六連遭二喪哀苦益甚毁瘁幾不能生然志節愈厲常衣粗食淡遇忌日悲慟如初喪姑戚有遺女夫人躬撫育之長為擇配分已奩具嫁焉三子方幼即令讀書循理勿讕語妄動及就外傅夜則躬課其學業曰我寡汝弱當務為好人常舉其父之嘉言善行以朂之尤戒以誠信為本性極仁厚視人猶已嘗有賈嫗為人持物求售厯數家過夫人所遺一小囊而去嫗耄弗記也夫人為藏之以俟踰旬嫗貿貿來泣以告夫人舉囊示之嫗驚喜發視皆重貨厚致餽謝夫人峻卻之遣去他日復有所遺求弗得物主索之急室人亦遍謫之嫗無以償欲就死復來見夫人哭曰仁如夫人不可復得吾死矣夫人憐其窮慰解之輟所用銀器俾償焉嫗叩頭出血曰夫人活我我不能報願夫人福夀無量子孫榮貴以此為祝耳其心之篤於仁多此類及夫人守節氷清而玉剛仁宗皇帝念郭氏勳戚哀死厚生擢其子武為尚寶丞遣登之南京迎母來就養以武貴封太安人正統丙辰十月初八日卒距其生洪武戊午十月草六日享年五十九以武病不克歸葬權厝宛平之玉河鄉登以才略為時用纍建勳績進封定襄伯佩征西前將軍印鎮大同父加贈定襄伯母贈定襄伯夫人而武終於尚寶丞理未仕而卒孫男二桂孫早卒嵩散騎舍人帶刀侍從至是征西欲歸葬夫人于南京請于上許焉命禮部賜祭兵部以舟送之工部為治墳塋以缺年缺月缺日祔于南京上元縣聚寶山先塋之次而請豫銘其墓豫嘗為作傳矣因復序次其事俾納之壙而系以銘銘曰其節堅其志專依所天珏乃全勒此銘垂千年處士蕭公墓志銘公蕭氏諱翪字鵬翔其先居長沙有曰覺者為馬氏軍巡判官避亂徙泰和禾溪又徙瀘源三遷遂為南溪人公曾祖德濟以行誼重鄉里德濟生志立號蘭谷尤以才略聞于時元季大亂冦盜蜂起州守達侯正道倡義保泰和而以北門委蘭谷北門當冦衝蘭谷日夜嚴警備聲振他邑冦來輒敗去泰和以完蘭谷生自成號此山尤卓犖有為而家益大生三子公其仲也端厚勤慎才望蔚然事父母極孝敬與母兄鵬南弟鵬漢恭愛篤至從兄鵬舉鵬起亦怡然雍睦內外無間言庭下紫荆有一本五株之異人謂其兄弟和氣所致皆歌詠之且謂其才良而冀稍出為用當是時吏部尚書劉先生子髙方休致以經學教蕭氏子弟鵬舉學成出為蘇州府同知而諸兄弟家事亦滋出蓋惟公與鵬漢在焉所以承祖考睦宗族接姻親恤鄉䣊教子孫撫幼賤公私百為無不咨於公然賔客往來欵洽之禮未嘗廢嵗時餽遺輕重疏數亦必適所宜凡其言行一鄉之人敬信之事有不平公為處其中皆帖然服有貧乏者周給之貸而不能償者不校也其襟度坦夷不為畛域故人無不相親愛者憶豫初游縣庠時與公善公常來齊舍相與談諧久之而後去及竊官翰林而鵬漢處士來京師向慕之意尤厚及以憂歸乃請豫為子師又得交公從子今太子少師孟勤公見其綢繆相好心益喜從容閒暇極燕游之樂意氣蓋豁如也不二三年則東西散去尤謂可以復聚處為樂孰知既去而公死矣豈不可哀也哉公生元至正癸已以今永樂庚子四月草七日卒享年六十八葬于其里柞樹陂之原初娶郭氏生子闕先卒再娶鍾氏生子煒㷆焜女六孫男三曽孫男闕公卒後三十三年為景泰壬申六月十八日配鍾氏亦卒年六十九而㷆為保昌縣學訓導奉母葬公墓右哀公之墓未有銘既免喪謁選來京師得國子學録知豫與公善也以國子學録梁先生栗所為狀來請銘將納于公墓以昭德垂逺豫念舊好不可辭乃為銘之銘曰才足有為行罔不宜既睦于族姻而兄弟怡怡君子慕其和厚小人喜其振施何七十之不延奄一去而莫能追柞樹之陂公安于兹後欲知公考此銘詩侍郎王公墓志銘王氏先居永清後乃居武城而忘其所以徙大父勝剛父成皆有德善而不仕至公乃以儒入官纍進至禮部右侍郎階通議大夫而大父父皆得贈通議大夫禮部右侍郎妣皆贈淑人公諱士嘉字道亨五嵗而孤母淑人教育之然聰敏喜學遂為邑庠生年十二已能賦詠作古塔詩云浮屠何代建峭拔入雲端絶頂登臨處摩挲星斗寒鄉先生劉中行見而竒之以擬冦萊公年十八充貢入太學太學諸生讓其能擢為大同山隂令山隂民獷悍公教之以禮義均其徭賦躬厯畎畝視勤惰而課勵之人知公之愛已也莫不化服性明達善聽斷有瞽者賫鈔百緡醉卧城南荆樹下覺而失之訴於公公揚言此荆樹為孽當出城按問民大駭從之公令人密捕不往者得一人倉惶失措訊之果服還其鈔而罷代府內藏失綵幣而戶牖封識宛然莫知其所自王知公有智略召問之公察視氣樓似有物嘗往來而非人跡疑為狙所竊乃以幣列庭中伺羣狙過而觀焉一狙果玃取之因詰其主皆欵服盡還之官人以為神自是鄰邑有疑獄皆請决於公母淑人年逾七十迎養來山隂有疾公朝夕侍湯藥惟謹而疾弥甚忽氣絶不可救公哀號不止聲徹天地久之淑人復蘇人以為誠孝所感云公忠厚愛人上每欲用之而下不忍捨永樂初擢為陜西按察僉事所至無寃民以西域貢使失供應三司皆坐免未幾公復起監饒州陶器凡三十餘萬皆如期而辦授都水員外郎以母憂去服除改虞衡時宫殿大材皆積紫荆關山西軍民防守慮有失以公臨之令嚴而事妥興濟河决妨漕運俾公涖屯田往塞之不勞而成功升北京行部工曹郎中而臨清舟楫往來帶磚者皆頌公之德尋升陜西右參政敕專理司事他不得擅遣正統初以少傅楊先生士竒薦升禮部右侍郎勤於稽古禮文之事兩知貢舉皆以公得譽關中大旱命公往禱之輒應凡其所行莫不盡誠已未秋京師多雨公之居壓焉上知其貧命有司賜地東安門外給以材俾自營其素行見知於上如此既三年以七十乞致事不許又三年再請乃許焉陛辭之日上賜之酒給以道里費慰諭而遣之公歸怡神養性手不釋卷汲引後輩尤惓惓其質幹魁偉言動不妄人皆望而敬之厯事五朝享有厚祿然居處服食如寒士見人之貧窮無告孤而不能婚嫁者輒周給而相成之若此類蓋多生於洪武已酉九月七日以景泰乙亥五月十二日得疾卻藥謂子孫曰吾年已至此死生命也何以藥為惜未有報於君親其神志不亂如平時越六日乃終享年八十七訃聞上悼惜之命禮部賜祭工部為治墳塋於其邑城南先塋之次公初娶魏氏繼桑氏俱早卒皆封淑人側室張氏子男三人長玉取進士纍官至河南按察副使先公五年卒次璽通春秋中山東鄉試第一以公老未仕皆桑出次瑄張出也女四人嫁劉子俊宋鐸右通政殷謙士人李謙孫男十一人夢熊景泰庚午貢士先卒夢庚闕孫女二人璽將以缺年缺月缺日葬公謂豫嘗官禮部與公為同僚今銘公墓以昭德垂逺非豫則誰宜乃屬太常卿許君彬述公行狀俾公壻殷通政來請豫實同官奚可辭乃序次其事而銘之銘曰生既逢時出也有為其德則優其才具宜故功業日彰而譽望四馳歸老於家不見闕虧大耋而終一往莫追昭德有銘百世之思陳母蕭氏墓志銘蕭氏為泰和秋嶺故家文隆則其里之傑然者也而與柳溪陳氏以正先生最相好文隆娶爵譽周氏生一女柔順而能勤與先生之孫桂芳年相若因許為婚姻既長歸陳氏不及事舅獨有姑在堂而家甚貧孺人紡績織維以供衣食晝夜無寧時善事姑養生送死盡其道然多遇凶嵗家事復滋出科需力役奪其時幾無所仰給孺人相夫備嘗艱苦忍貧如鐵石而一歸於命未嘗怨天尤人及時和嵗豐人安於畎畝得從容自適孺人猶不忘其故日夜訓諸子興宗等俾讀書務孝弟之行敦本而力作戒諸女婦治女功一如其少時一家長幼爭自激昻無有閒曠廢事者而家日以興皆孺人相助之益也桂芳年六十以病卒孺人念與同勤於昔時今稍暇豫而先逝朝夕哀慟幾欲無生居喪三年無違禮而治家益勤奉祭祀睦姻族待賔客撫鄰里臧獲下人皆有恩天順二年五月得疾子孫日奉醫藥不效至七月初五日以天年終其生以洪武已未十月十六日享年八十子男四興宗成宗昌宗榮宗而成宗昌宗皆先卒孫男十二紳經綸純纓纊緩緯纎縑紡縉興宗等以是年十二月十八日奉葬于龍洲上先塋之次以豫為陳氏壻且與桂芳為內外兄弟知其母之德為詳請豫銘其墓豫安可辭銘曰孝順勤儉既備諸身其艱且貧乃不尤人故天錫之以福而家道復振八十而終慶及子孫昭德有文彌久彌新抑庵文後集卷三十二
