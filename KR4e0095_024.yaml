body:
  text: 抑菴文後集巻十一明王直撰序正統丙辰㑹試録序臣聞天之愛人君莫大於以賢才遺之蓋賢才者致治之本君必用賢以興治平故天為生賢使得如志以治此所謂愛君也恭惟皇帝陛下嗣位之初寔當興賢之歲天下賢才欣逢明聖莫不奮勵以求用科舉所出蓋彬彬然矣今年㑹試禮部者凡千人尚書臣濙侍郎臣敞臣士嘉以考試官為請上命臣直臣循其同考官則臣驥臣恬臣鈺臣叙臣叔剛臣曰恭臣愉臣璲監試則御史臣裕臣啓其諸執事皆一時之選祗承徳意㒺敢或怠㧞其尤者百人而進之臣嘗伏思國家一統天下列聖大德克享天心天為生賢以充任使聖仁涵育之深皆得有所成就蓋自洪武庚戌至今將二十舉矣小大之才竭忠盡節治效之盛比隆唐虞此皆天之所佑豈偶然哉兹當太平之世而百人者復䝉簡㧞得詣大廷奉清問盖非常之幸也自古有志之士不為少矣孰不欲其道之行哉然而遭遇為難盖必大有為之君然後能急於求賢篤於圖治皇上以天徳居天位其所以安養下民之心即祖宗之心而大有為者也諸生由是而進膺一命之榮列庶官之職必當思夫天之生賢所以佑國家國家設科出而用之者盖欲成治功隆熙運夙興夜寐盡臣職所當為而無曠官竊禄之譏使天下皆曰科舉真足以得賢才斯善矣小録既成因書以為序送劉少卿序古之君子之仕也既盡其職矣則不暇顧私親盖君臣父子之道有不能兼盡者則因其所居之位而盡心焉此義之當然也然或䝉君之惠以及於親既享其榮而又得食其禄則雖殫力於朝而不及致樂於家亦庶乎兼盡其道矣此人之所欲而不可必得者幸而得之誠可謂難矣至於老而歸也既無愧於君臣之義而又有父子之娛此非常之福莫大之幸也若是者盖千萬而一二見焉北京行太僕寺少卿劉公安道其人也安道洪武中為刑部主事以清慎受知髙廟有文綺之賜自是敡歴中外凡四十餘年既請恩封其父為太僕少卿而致養之榮士大夫皆嘆羡以為難今七十得致事以歸而其父九十餘尚康强如少者安道進而盡君臣之義退而盡父子之娛非常之福莫大之幸萃於其一身今之士大夫得此者誠少而安道獨得之則豈獨安道自喜哉今之士大夫莫不喜也彼前之所云難者已不能必得則於後之所云誠少者而安道獨得之惡乎其能已於情哉雖然此天也非人之所能為也安道之得於天如此豈本於其身抑亦其親有以致之也不然天於其父子何其獨厚之至哉有唐之世香山九老之㑹當時榮之至於繪圖以誇示後人然豈有盡天倫之樂如安道父子者則安道之歸侍其父於堂上衣冠之華子孫之盛將必有繪為圖以誇示後世者此太平之美觀也予固歆羡有不能已於情者因諸公求文以贈行故為序述如此富溪八景詩序吉水富溪王氏其先自縣之盧溪徙焉居富溪者七世矣其地多佳山水而王氏世業儒攻文章有逺林者其秀也四時朝暮撫景物之清華發詞藻於吟詠録其尤者為八景一時名士皆為賦詩元季兵亂燬焉國朝承平將百年山川草木莫不寜殖而風日雲月之發於聲麗於色者益可樂而玩也於是逺林之孫好直好信好古乃因舊題定為八景曰南山春霽西符夕照元潭秋月劍石朝雲三峰秀色五嶺松聲滄江春漲墨沼晴波命工繪圖以請賦於士大夫好信之子佐為進士在京師俾求予序予家泰和在吉水上流甞浮大江泊舟𤣥壇觀下登雪浪閣讀吕岩所留詩觀許旌陽斬蛟劍既而上山頂撫試劍石以臨符山其飛符斬蛟之迹盖宛然可想也遙望長溪隠隠如白虹以入於江而室屋鱗次在其上父老告予曰此富溪王氏也居之東曰三峰山東南曰南山東北曰五龍嶺鬱然深秀雄㧞皆在目睫間獨其宅前所謂墨沼者以遠莫之見然則富溪之八景予固彷彿得之盖信乎其可樂也嗟夫山川景物天下之所常有也然而有顯晦者遇與不遇焉耳茍遇其人則遐陬僻壤雖小而必彰不然則名川大邑雖盛而不傳是故栁州蠻夷之域也其山水之勝以栁子而顯賛皇之平泉淮南之菱谿皆將相所營其初亦赫然盛矣而遽至於冺沒而無聞豈非誠繋乎人哉富溪雖吉水奥區然非一邑之大觀也而王氏子孫之賢世濟其美故所謂八景者著於昔而顯於今亦可謂遇矣傳曰言之無文行而不逺若此者豈非以文乎哉憶前廿年甞從翰林諸公取北京八景而賦之制作之盛至今在人耳目其後祭酒胡公又出豫章十景屬諸公賦焉今而又有富溪八景雖其美巨細不同然使天下後世因是以知聖朝文明之運士君子得以其暇日娛意山水之間而形於歌詠豈非太平之盛觀哉故不辭而為之序他日乞身南還當相與徘徊溪上周覽而賡歌尚未晚也贈僉事鄭君赴任序雍言予友也盖自其初取進士即入翰林為庶吉士與予接其後去為中書舍人行人司副又與同朝相愛厚雍言恭謹遜讓其言語恂恂舉動必以禮人亦以禮接之無不相敬愛者其為文章必師法古人而於篆書尤工盖今之傑然者也為司副滿九年陞河南按察僉事然終惜其去詔留京師與諸儒日趨文華殿與文藝之事如是者又五年人莫不榮之今年始受命赴河南而人猶惜其去謂雍言不貴顯於内者何耶予謂此所以重雍言也世之用人多取諸學校今布列䑓省者比比皆是其所出同所業同然而有職文翰者則人皆以迂闊視之謂不足與立事故凡任此者則老於此而已雖或懷竒負氣卒摧沮消磨無以見於世今雍言之去是不以迂儒視雍言也將觀其事功而進於用也按察司之設以繩紏為職吏之賢不肖民之休戚繋焉今天子布寛仁之政去民之所病而興其所利奉而行之使無不得其所則在賢守令守令不賢上之德有不及乎下者雍言愼察諸此而已矣勸沮激揚必以公不以情使長民之吏皆賢則民安有不受其利者此任雍言之意也蒸民之詩送仲山甫而作既曰仲山甫之德柔嘉維則小心翼翼古訓是式又曰維仲山甫柔亦不茹剛亦不吐此亦雍言所當務也誠如是則賢無有能過者而誰敢以迂儒目之哉予與雍言同業儒而迂為甚況又老且病矣超然奮勵使儒者之效赫著於天下後世而予與有耀焉是所望於雍言也禮部主事宋琰吏部主事李源姻戚也求予文以贈行故為之序而道予意如此贈布政使李公復任詩序李公字昌祺廬陵人始受知於太宗皇帝自禮部郎中超拜廣西布政使以憂去服闋來朝仁宗皇帝知其賢深加褒賞即命之河南未幾復以憂去㑹河南歲凶民多失所宣宗皇帝雅知公愛民詔即起公馳傳徃撫之而河南之民安盖公以忠厚敬慎之心而施寛惠和平之政所以受知於上而孚悦於下也今年考績來北京以足疾求歸吏部惜不許言於上俾復任鄕郡仕者禮部郎中劉君孟鐸等相與飲餞於所居之官舍且賦詩以贈行而屬予序予謂昔周盛世仲山甫之有行也尹吉甫作詩送之道其德業之盛而殷勤屬望之意寓焉孔子取之百世之下讀其詩者有以知其賢詩豈徒作哉以予觀之仲山甫之賦政於外是亦李公之為政也肅肅王命仲山甫將之邦國若否仲山甫明之李公之奉上命以布於下察有司之臧否而進退之是亦仲山甫之職也李公在河南其愛民也至矣然愛民之政李公不能自下於民必得有司之賢者順而行之然後民被其惠若有不賢李公雖切於愛民終無益於民病然則察有司之臧否而進退之是固愛民之政也李公有仲山甫將明之才與其柔嘉之德故為上下所屬望士大夫歌詠於其去盖亦有尹吉甫之意焉不然諸公之餞也豈無清酒百壺魚鼈筍蒲足以將其意如顯父之餞韓侯者而何以詩為哉故予為之序而道其意云贈蔣郎中致仕序永樂初太宗皇帝鋭意文藝之事詔求天下善書者得朱暉等若干人闢文淵閣處之盡出法書名帖俾增益所未至盖欲追古人而過之也暉字庭暉後復姓蔣氏即郎中也其書法率更清勁温潤衆皆讓其能上常取諸人書親閲而次第之庭暉必在甲乙之選每䝉稱奬受賜賚遂選入内閣凡制誥典冊及諸宻務皆命之書庭暉勤愼端確未甞有漏言亦未甞有矜色先生長者莫不愛重之予時為翰林庶吉士讀書禁中得與庭暉相徃來其意甚相厚也今三十餘年矣庭暉自中書舍人三遷至禮部郎中兼翰林侍書食正四品禄然專執筆在翰林職親地禁其勢亦可以有為若在他人鮮不移其素易其守者而庭暉謙順恬澹終始若一君子哉庭暉也去年以年滿七十請致仕三楊先生皆惜其去庭暉意甚堅予甞謂之曰今天子嗣位信任舊人而子欲求去雖得就閑無乃未可乎庭暉曰吾年老有疾奚可尚貪禄耶遂上章乞歸鄕里上憐而許之庭暉家錢唐富饒之地而有山水之娛其歸善矣獨念予交庭暉乆今亦老且病况錢唐之遊常所冀願而未得者於庭暉之歸其能不欿然耶顧予少庭暉十二歲欲相從而不可迨予年至庭暉已八十餘矣然予聞静者壽庭暉静以自養其壽盖未可量他日倘得從遊湖山之間盡登臨覽觀之樂豈非幸哉庭暉所厚者潘勤進學軰求予作文以贈行故道予意如此贈方布政序貴州古蠻夷之地不領於職方我太祖髙皇帝既官其酋豪以統治其民惟置軍以鎭焉其民既不知禮義皆鳥語狙詐好利而輕身喜相攻剽賊殺其所居皆大山深谷巉巖斗絶之地而履石鋩冐棘刺徒歩出入如飛猱不可追躡其習險如此故徃徃竊發然撫之以仁亦未甞不帖伏也永樂中酋豪田氏虐其民民苦之太宗皇帝治之以法為除其害本於是民皆請内屬俾得沾教化乃析置八府而立布政司總之寛其教條一以仁為治山谷之民安於衣食以樂生送死者將三十年其秀民亦稍出為時用衣冠文物不異於中州此足以見天下之人無不可化者而仁之為用大矣今天子在位尤軫念其民盖慮其逺而或有失所者命諸大臣擇布政使徃撫之得工部郎中方君庭玉庭玉巴陵人以進士入官為工部主事陞郎中簡重勤愼譽望之著乆矣及是舉也人莫不以為宜然則庭玉其可謂之賢方伯矣哉予甞讀召南之詩而知文王之化召公之功也盖公未臨南國之時其風俗未至若是之美也及其循行以布文王之政於是諸侯大夫皆能修身正家其妻亦能謹於祭祀而無妬忌之心在位者皆節儉正直之士其賤妾女子皆安於命而以貞潔自守至於騶虞則仁之所及者深矣二南之化本於文王而亦豈非召公之功哉宜乎人之愛其棠而不忍伐也今庭玉之貴州而能繼召公之蹟安知無歌咏於其後也因其僚友求贈言故為言如此以致期望之意云贈曾學正序治天下以賢才為本學校育賢之地也是故愼擇俊秀簡任師儒而教之相與誦聖賢之言求所以修身齊家治國平天下之道身體而力行焉一旦出而用之以其得於心者而措之於事則天下治矣盖賢才為致治之本而師儒者又成賢才之本也我國家養賢致治非一日矣其加厚於學校盖前代所無也賢才彚進以隆治功以收作人之效盖彬彬然盛矣然常人之情不能乆而無弊也為師者昧其所以教為弟子者棄其所以學非肆情於惰遊則役志於貨利留連樽爼之娛沈溺耳目之玩在位之賢以課勵學校為事者又多好立聲威喜䛕佞送迎承順有未至則挫辱隨之惟其勢之所得為而不知以禮義相勸勉積習之乆靡然成風士氣之不振學政之所弛雖其夲之不立而亦豈非斯人者之過哉朝廷知其然數下詔敦諭所以匡直輔翼而振德之者盖帝堯之心也然猶以為未足於是各道專置風憲官一員以任之俾革宿弊而勉成功凡禮之所宜厚政之所宜施盖視舊有加焉於乎上之於學校如此則為師弟子者當何如用心哉曾儀士表予故人子也由太學生被簡擇得興國州學正士表勤於學而愼於行今去為教官無前之所云弊可必也而於前之所云教者亦庶乎可望矣故於其行為言所繋之重以勉之雖然予言有激也惟學道之君子欲興起斯文者可以聞乎此士表宜存諸心求無愧於其職斯善矣勿輕以示人而為不好者之所病也愼獨齋詩序君子之學其於窮理固難矣致謹於隱微使心不違乎理尤難也天下之事自君臣父子夫婦長幼朋友之倫至於日用之間言語飲食進退作止凡一切與世酬酢莫不有理焉而欲窮其至使無不知豈非難哉然事幾之初動事迹之未形人不能知己所獨知之地最為切要而不可忽者盖天理人欲之所由分善惡之所以背而馳者也於此而致謹焉杜人欲之萌而必由天理之正凡所以施於事者一皆適其宜豈非尤難也哉夫能窮理矣乃忽於動作之際而不能由之則亦何貴於能知此曾子子思之所謂愼獨學者之所宜用力也自大學中庸之教行人之知此多矣能實用其力而必為君子者或少何也非以為人既不知而可以少縱耶由是人欲肆天理㣲雖欲為君子不可得矣燎原之烈熖起於一爝之燃决隄之横流始於一綫之漏嗚呼可不愼哉姑蘇俞景暉以愼獨名齋大理評事張益士謙為之記又因其親戚殷志學請予一言以啓士大夫之歌詠予辭以不知其人又縻於職事不暇作而志學請不已徐而思之成人之美固君子事也景暉知務此盖有志於君子之歸不可以不與又志學予鄰也予於文藝之事多有賴焉故不拒而為之序庶幾以成其美景暉勉之若徒矜衒以為名則非予之意矣雙松齋詩序雙松齋者丹陽教諭黄中通理所居之齋也通理禾川人其學以聖賢為師及為教官日進諸生於堂上相與講明其道使脩於身發於言而措之事業及其倦且煩矣則退休於此䕃日下之繁隂聆風中之清韻其心盖囂囂然樂也客或謂予曰天之生物固有幽澹穠郁之殊而人也亦有隱顯之異若王猷之竹林逋之梅陶淵明之菊皆幽澹之物故為静逸者之所好彼其中誠有契焉也至於洛陽之牡丹維揚之芍藥竒色異態郁然出於羣卉之上故昔之名卿賢相學士大夫皆好之誠富貴者之所樂也通理今用於時駸駸且顯矣不此之樂而自託於静退之流亦何異哉予應之曰君子之於物有資之以自娛假之以自勵者若前之云予不得而知通理之志盖假借以自勵者也夫松有堅剛之性幽澹之姿雨露潤澤而不驕風雪凌厲而不懾故其材之成可以棟明堂柱清廟古之君子居仁由義不移於貧賤不滛於富貴不屈於威武者似之故窮足以善其身達足以善天下通理盖以仁義為務而思為古君子者也以仁義為務則於成已及物之效其可量也哉今年通理來京師謁予告曰中以雙松名齋因其地之産而已若於古君子盖竊有志焉而非敢謂能也先生之言所以教中也至矣中敢不勉士大夫多為中賦詩請書以為序遂書之贈黄主事序宣宗皇帝在位時篤意於養賢甞選禮部㑹試士之得為教官者二十四人加以冠帶俾食其禄讀書於太學必成進士而用之命翰林每三月一考以勵其進富順黄平衡夫與焉年甚少質甚美而志甚鋭學甚勤予每試而閲之未甞不嘆且羨也正統元年禮部又㑹試天下士予實司去取㧞其尤者而進之衡夫由是遂登進士第於時其父公瑾為户部郎中有名而衡夫又嚮用士大夫莫不以為榮既而授吏部文選主事夙夜不懈以脩厥職自尚書侍郎而下皆喜其愼勤既三年課最言於上俾復任凡為僚友者相率求予文贈之贈之云者豈徒美其有成績盖加勉之意在焉此君子之道也然衡夫父子皆為名進士且以才行著稱公瑾守開封甞考績京師予有文贈其歸矣今又欲贈衡夫予言何足以增益其父子哉辭之不可得念古之君子以世濟其美為貴開封之孝士夫歌咏之衡夫事親亦能致謹於孝矣孝者德之本孝於親必能忠於君然孝非止於朝夕奉養而已也謹言愼行不使貽辱於父母充而極之至於致君澤民而兼利萬物猶不敢以為足而懇懇以終其身然後為孝之大張仲君陳周之大賢君子也其功業非不盛矣而詩書重其孝則凡功業之盛皆孝之推可知爵禄之隆其效也予因開封之行而為衡夫誦之其愛之意不薄也開封聞之當以予言為然也贈盛知縣歸光澤序君子欲施其惠民之心則莫樂於為令盖令於民為最親民之貧富强弱饑飽勞逸與其所好惡者令皆得接於見聞事之所及可以視其緩急之宜而制其操縱之節必使功立而民不擾若遠於民未見能為也故君子之欲惠民者必樂為令非以其位可樂也樂其惠之及人也彼為郡為藩憲者孰無惠民之心哉然其勢相懸不能親布於民必得令之賢者而任之然後能如志以治故夫縣令郡守藩憲之所甚重者也而人之才性不同不能無過不及為郡為藩憲者既倚之以惠民則必有以維持之制其過引其不及使其惠足以及民而不至於病民則吾民遂矣其所以維持成就之者豈專為令哉為民故也而令之所望乎上者盖亦如此使為郡為藩憲者不以情恕乎令有善不見知而微惡必聞維持之不加徒威暴行焉如是予見令之難為也豈惟令不安於位哉民之欲實受其惠盖難矣是故為令者必以仁加乎民為郡為藩憲者必以仁施乎令上下一於仁而治功成矣予為此言而世之為賢守為方面大臣之賢者莫不以為然而予亦自以為可也錢唐盛塤字彦和為光澤令三年考績來京師其友禮部郎中潘勤軰為予言其為治盖有志於惠民者求予言以贈其歸予嘉其志而以賢令期之故以予意告焉亦欲使為上者維持而成就之庶不悖於仁而治功盛矣虞邵菴註杜工部律詩序詩之變屢矣三百篇之後而五七言繼作至於有唐沈宋之流又作為律詩詩變至是極矣開元天寳以來作者日盛其中有奥博之學雄傑之才忠君愛國之誠閔時恤物之志者莫如杜公子美其出處勞佚憂悲愉樂感憤激烈皆於詩見之粹然出於性情之正而足以繼風雅之什至其觸事興懷率然有作亦皆興寄深逺曲盡物情非他之所能及元微之甞謂詩人未有如子美者信哉斯言也惜為之註者雖多然不失之泛則失之鑿又或簡畧不足以盡發其意讀者病焉虞邵菴先生獨取其七言律詩一百五十餘首而注釋之本朱子詩傳之作䟽其事實述其㫖趣而公所以作詩之意瞭然明白其有益於學者不少餘姚魏仲厚與弟仲英最好讀杜詩得公所註刻之梓以傳使天下作者皆有所悟入而得以臻其妙厚矣哉用心也詩者志之所發也方其動於中而形於言雖各有自然之機然非取法於前人而欲從容中度不失其正亦難矣杜詩天下後世之所取法也而邵菴先生之註未盛傳聞者盖有願見而不可得之嘆漢蔡伯喈得王充論衡而秘玩以自資今仲厚兄弟得此書不私於為已而公以及人其賢可知矣刻既完仲英之子瑶為瀧水丞述職來京師請予序其首予謂詩不待序而傳仲厚兄弟嘉惠學者之心不可不白也故為序之歸田詩序翰林侍講安成劉求樂遣其子中書舍人銊來告予曰吾邑楊季安懷忠甞從學於今國子祭酒李先生業成入太學選為景陵知縣以清愼自持一毫無所取於民而亦無以與人人以冷水楊稱之其為民興利去弊如饑渴之於飲食愛恤民力甚於為已惟務築堤以防澇勸貸以賑饑發剔奸蠧以除民害邑之舊俗婚娶必論財故男女多失時則為定禮幣之數而諄諄勸諭之配合者以千計由是民愛之如父母向之流徙者皆來歸在縣六載而疾病加焉上疏乞還鄕里朝廷下藩憲騐其實民争徃乞留不得遂去年述職來京師復申前請許焉士君子為賦歸田之詩詩宜有序敢請於先生予謂懷忠能子惠其民民之愛懷忠又如此乃忽舍之而去已雖安於田里獨不念邑民將有不得其安者乎何去之果也銊曰楊侯非忍於去也顧其身有病不得以終惠其民若茍安不去則將有曠官竊禄之嫌既宜去矣何暇為民計哉此其所以去之果也予聞而心善之世之仕州縣者多矣年至而病及之者亦不少然皆衣食於民貪戀而不去跡其所為未有可稱者是以民厭苦之今之來朝卒不得以免免君子恥焉懷忠再以病告而决於去識進退之宜知止足之分其賢於人逺矣哉然予聞今之制以疾去者疾愈當復來懷忠歸矣有田園池沼之奉山林泉石之娛親戚賔客可以談笑而徃來病有時而瘳矣予懼不可以終留也歸田之詩聊以資一時之噱而已姑為序之寧菴詩序寧菴詩若干首士大夫為渝川彭光緝熈作寧庵者其母墓傍之室也緝熈初舉明經得榮縣訓導而母鄒氏卒於家緝熈棄官歸奉葬於其邑玉界金橋之原既作室墓傍以為祀享之所而夙夜哀念不置曰吾親庶其寧於此乎因遂以寧名菴予友曾公子啓為之記諸公之詩所由作也至是緝熈以賢舉為臨淮令述職來京師因其友刑科給事中張君固持以求予序予聞之孝子之於親無所不用其情生而養焉務有以安其躬死而藏焉則欲其永安於地下是故必誠必信不使少有悔焉者所以求其安也緝熈之葬其親凡附於身附於棺者盖無不備而山川之清淑風氣之完固封樹之嚴宻必可以乆而不壞親之體魄其安可知矣然猶惓惓然存於念慮此孝子之心無已也雖然孝子莫不欲其親之安然而既葬矣不可以復加矣安親有道將不在其身乎身也者親之枝也枝有震撼則本根為之動搖雖欲安得乎故予謂緝熈之安其親要必本於安其身安身有道居仁由義而已仁義廣居大道也居廣居行大道而其身安矣如是人將推夲於父母之賢而起敬起慕焉則體魄之藏豈獨百世保之而其神之託乎兹庵者亦將永寧於此矣緝熈讀書學道必有見乎此故為序其詩而道之胡氏家乘序胡氏家乘蘄水令胡侯奎之所輯録也胡氏之先光州人五代時從王潮入閩遂家建州宋紹興間有諱昉者為江淮都統子正益得饒州司理叅軍故遂為番易人訖宋至元代有仕者元季盗起胡侯之髙祖振卿與其配趙氏以忠節著入國朝來其祖叔儀又以宦績顯考匯東亦以能詩有聲於當時胡氏世濟其美如此家乘所以載其實而傳諸逺也首之以譜圖繼之以先代墓文傳賛記序題詠哀挽諸作而匯東之詩終焉夫故家大族所以能乆而盛者皆其祖宗積徳以啓之子孫務學以繼之也然載籍不足以傳則後之人無所考而知數世之下必將冺没而無聞其子若孫亦不知前人樹立之難而昧其所以繼必至輕用其身以陷於邪僻而君子無取焉杞宋夏殷之後也文獻不足孔子嘆之况下於杞宋者乎然則故家大族之所當務可知胡侯家乘之作可謂知所務者世徳之傳其有已也哉予甞讀振卿傳觀其以布衣倡忠義遂攘宼盗復郡城及盜大至官軍退走猶力戰殺賊終不屈而死趙夫人以盛年遭亂世卒完大節保遺孤以再造胡氏皆可謂偉特不常者矣叔儀為令勸農桑崇學校斥滛祠表貞節而匪東尤惓惓於考友凡所為詩以娛情冩物皆清婉有思致其先之逺者弗暇論一門三世德善文藝有若而人豈他族所可及哉記曰先祖有美而弗知不明也知而弗傳不仁也今胡侯知而傳之不可謂不明不仁矣為子孫者尚思善繼於無窮哉贈龍孔目序孔目翰林幕職也凡翰林諸事無所不當理惟大詔令上所特勅者不與其制誥冊命議禮考文與夫述作小大之務稍渉乎有司者雖元老大臣及諸學士主之然必自孔目行焉故孔目雖幕僚非有文學通政治達於大體亷厚清愼之士莫能稱他之為幕職者其勢力雖不同然汨汨於簿書期㑹之間米鹽細碎之末視清華禁宻之地從容進退與有其榮者不相侔遠矣故吏部於是職不輕以畀人必自教官焉取之宜春龍駿字執毅以明經領鄕薦得河源訓導以憂去服闋來京師選為翰林院孔目時詹事府無主簿吏部併以主簿印付之執毅兼理其事有餘力遂以才名聞於人既三年考績以為稱俾復職其鄕友刑科都給事郭君邦噐求予言贈之予甞以少詹事兼職翰林既知執毅而愛之及出佐禮部而尚書昆陵胡公實兼治詹事府執毅常徃來計事公亦愛其為人予既克相知則何可靳於言況又有郭君之請乎君子之仕未甞計崇卑要以樹德為上德茍立矣則卑可尊也不然雖尊奚取哉今制賢而在下位者皆得薦舉而凡顯官有缺必舉賢任之執毅在翰林三年已見知於人如此果進德不已而日益有名則雖欲辭尊可得耶譬若登山然行愈力則身愈髙雖薄雲漢近日月不難矣予於執毅乎望也故為序以贈之贈右副都御史朱公南歸省墓序正統七年三月南京都察院右副都御史朱公與言考績來北京公亷厚清愼仕宦將四十年至是年六十八矣慨然有鄕土之思即上章曰臣以菲才叨任使而以儆官邪貞百度為職今老矣不能有為誠恐負陛下乞致事歸故郷上素聞其賢以年未至不之許詔吏部俾復任公既頓首謝復上章曰陛下聖德如天所以眷念臣者甚厚顧臣去墳墓乆矣願乞一歸省上重違其意許焉都察院右都御史王公某僉都御史曹公某皆喜公之志得遂也謂予曰吾與朱公雖不同署而職任則同僚友之誼可無一言贈其去耶願以屬之子予謂朱公今之賢人君子也其存於心施於人者固已表然重當世何待於予言且今之歸昔人比之衣錦之榮然乃庸庸之流之所矜誇而稱道者朱公盖厭之非予所宜言也抑聞崧髙蒸民尹吉甫之贈申伯仲山甫者述其德業之盛而勸勉之意寓焉朱公盡心於所事而又不忘乎親此所謂忠與孝也忠孝人道之大而德之本也由舉職之常充之以致其君由追逺之誠推之以成其親而無毫髪之不盡焉然後為忠孝之至而皇上眷注之厚可以無負矣此非公所素藴者與君子之修德行道蓋亹亹以終其身不以老而怠也故曰德音不已又曰德音是荗此所以為邦家之光非獨閭里之榮也以是贈朱公庶幾古人之道而亦二公之意也歟送河南左布政使饒公歸治所序正統七年四月河南左布政使饒公在任三年上其績於吏部吏部以聞天子以為稱其任復還之河南公名禮字景節旴江人先為御史滿九年陞浙江叅政蔚然有賢名於時㑹河南布政使缺上命大臣舉賢而任焉衆謂莫如饒某同署名薦之於是遂陞秩河南而其譽績益大顯於天下河南古豫州之域今之布政使即古之牧也昔舜所命其人不可知然其所以命之之意莫切於養民而尤莫重於農時然逺者有未懷近者有未治人之有德而待之未能厚任人而用之未能信姦邪凶惡之徒或有未能盡拒之者而欲使耕不失時民不失養盖難矣故命之曰食哉惟時柔遠能邇惇德允元而難任人此其惓惓之意也去之三千餘年而虞書具在凡居牧之任未有舍是而能治者我朝列聖仁育兆民盖不異於舜其求賢任官而諄諄命之皆與舜同也然則當是任者可不以虞廷之賢自處乎饒公在河南既盡夫為牧之職矣然河南郡縣累百十其所與養民者守與令也逺者其盡懷近者其盡治於有德無不厚於任人無不信姦邪凶惡之人無有能干政而撓法者則農時遂民食足矣虞廷之臣可以無愧也其或有未然饒公豈宜釋慮於心哉古之君子志於德業者未甞有怠心禹曰予思日孜孜此虞廷之臣所以有聞於永世也則下於禹者可知矣饒公將行在朝之賢素與之厚者屬予言贈之予亦欲饒公之以虞臣自處也故為序如此王氏自序題辭廣東布政司左叅議蒲圻王公時舉自序一通載其世徳之實與其學之所由身之所歴其心之忠於上仁於下守禮義之防謹法度之施亦既備矣然非欲自為名也將以示其子孫而使之善繼古之人有為之者矣太史公則託於史以傳其後若晉陶淵明宋蘇黄門皆自為傳而人不以為嫌盖君子之身道之所寓也使其所行皆不離乎道之正則雖出處異宜天下後世想望其風采惟恐莫得聞而亦何嫌之有且人之子孫必將效法乎前人茍無以示之則不知其所立之難而昧其所以繼必至辱其先而累乎後然則序而傳之者所以為善後之道也時舉其知務者哉予與時舉生同年同取永樂甲申進士第其令江寧遷春坊予又與之同朝而見其行事及僉憲廣西叅議廣東其所行之善卓卓在人耳目盖所謂不離乎道者豈特可示子孫而使之善繼哉時舉官四十年致位第四品為藩憲大臣百歲之後秉史筆者欲為當世賢臣立傳不於此有徴乎昔唐甄濟篤於忠義不為安禄山所汚子逢能刻身立行以顯其父父子皆見取於史官為時舉子孫者又可不知所務哉予與時舉雖同年然予實衰且病而時舉尚康强其進於德業當益盛後之人將大書特書屢書不一書而已也奚獨此哉時舉之子奭持以示予故為題辭如此覽者當必有取焉送顧訓導序顧瓊宗善蘇之長洲人以明經領鄕薦㑹試禮部中教官選得龍陽訓導以去其素與厚者禮部郎中潘勤進學謁予告曰勤與宗善處乆矣今其去為教官教官成賢才之本也宗善於是固不敢不勉而勤亦欲有以相其志敢請贈言於先生予辭以未識宗善又縻於公務不暇作進學數來請予言不厭予念朋友之不相輔者多矣而進學於宗善獨惓惓焉可謂之益友無愧也且進學從予在翰林亦乆矣其可以終拒哉乃為之言曰君子之仕自郡守縣令以上皆得位以行道其秩既崇矣學校之職惟教授僅得九品至於訓導則已卑然自郡守縣令以至公鄕大夫莫不加禮焉者豈以其位哉以其道也道非其所自為也堯舜禹湯文武周公孔子之所傳者也以堯舜禹湯文武周公孔子之道修於身而又以淑諸人則繋重矣奈何其不加禮哉然則為教官者固當以道自任使言行而皆由乎道則教之夲立矣朝夕進諸生相與講明而服行者亦惟道是從則其身亦無不修齊家治國平天下舉而措之不難也教官如是則臨乎上者豈徒加禮而已哉不此之務而惟以卑為戚不汲汲以求則兀兀以休或齪齪以自謀而不以離道為憂則將承之羞而何加禮之有宗善志於道者也而進學又欲輔以義予可徒以言相悦哉故以是為贈宗善勉之贈髙要令蕭薦之南歸序薦之名進予友也有秀偉之質有卓越之志有英鋭之氣有通敏之才其始為進士在京師歴試諸事既以名知於人矣乆之授藤縣令以憂去官服除改髙要髙要肇慶治所頗以富庶聞於外徃來者多嚮意焉以故事益繁薦之承上撫下其綜理周宻而應接愼勤事皆辦治而民受其惠由是聲譽益振京師諸公知薦之者皆曰以薦之為人宜為郎官御史庶得以效其能顧乃使為縣於嶺南萬里外雖有民社之寄然亦遠矣或者又曰君子之仕貴乎有以自見不然則亦衆人而已虞詡為朝歌長以銛利之器用於盤根錯節之間人稱之至今髙要雖繁乃薦之自見之地也使庶務畢舉而恩惠及民則雖不為郎官御史其所以自見亦偉矣薦之述職來京師予為誦其言薦之曰厚哉諸公之意何相愛之至也進安敢不勉嗟乎薦之其賢於人矣哉古之君子各因其位而為所當為孔子之為乘田則乘田而已矣其為委吏也則委吏而已矣及乎為司㓂攝相事則慶賞刑威之道行焉故曰君子素其位而行薦之今為令人所以期之者不止是薦之聞之自若也豈非誠賢於人矣哉夫學與仕辟若登山然勉而不已則至其極矣薦之誠勉之其顯榮光大何所不至哉予尤厚薦之而愛之尤深故於其歸遂書以贈行而予兄善學為髙要丞與薦之同僚幸因以予言諗之送陳太守還建昌序宣徳六年春聖天子留神萬幾恭思治本以為民休戚繋郡守詔大臣舉堪其任者得九人監察御史陳君鼎與焉以為建昌太守璽書褒勵而遣之君天性剛毅而操守亷潔其為御史既以不茹柔吐剛得名矣及之建昌抑大豪之為民病者一以恩惠撫民凡民素所欲而未得所惡而未去者皆次第罷行之一郡以治建昌之人翕然稱頌以為前之為郡者莫能及夫千里之郡為之民也多矣然皆有以自業其所以不能安者姦豪之徒為之也辟之嘉榖得土壤之肥承雨露之潤非不勃然生矣然而稂莠侵之蟊賊害之惡乎其能成也故欲安民者必去其所病趙廣漢威制豪强小民得職其稱譽至今陳君克繼之然予甞思之千里之治守為之主也其縣之屬者凡有幾守之治必下之令令果不賢則民之病自若也守雖欲治其可得哉故為守者莫急於擇令令皆賢則民安於田里而無擾之者守之治績不勞而成矣陳君識達治體其才足以有為其能以此為務可知也予在京師乆聞君之名及考京闈所貢士而君實監臨塲屋中相親者幾一月觀其言行心固重之洎守建昌而所立又卓然如此其愛重加焉今述職來京師既受恩而歸郡之仕者鍾旭子旦軰皆作詩為贈而以序屬予予素知君故不辭而序之贈馮太守序聖天子篤意養民謂守令者養民之職也詔吏部愼擇令至於郡守則命三品以上大臣察舉而禮部員外郎馮敏欽訓與焉以為紹興太守欽訓永豐人始取進士為兵部主事改禮部皆以愼重得名未幾尚書胡公嘉其才行舉以為儀制員外郎至於今未乆也而即當一郡之寄蓋其名實烝然於上下故宜爵位之進如此也予甞思之天子以一郡之民付之守欲使之各遂其生而無失所者然守不能以親接乎民而又託之令令賢則守得如志以治不然守雖欲惠民民惡得以受其惠哉夫令之不賢大率有二媕婀茍且志弱而才下雖不足以惠民而亦不至於病民惟有小人之才而無君子之心者則為害大矣蓋無君子之心則寛裕慈愛之意冺有小人之才則姦詭猾賊之機熟由是君子退小人進舞文以飾詐假公以濟私逞其貪暴而或至戕民民或有言則彼小人羽翼而維持之卒至於無可奈何為守者或不察其心而茍惜其才不知其才乃所以為民病也於是遂失之縱民者邦之本本固而後邦寧守令所以培其本而使之固也惡可使若人戕賊之哉然則為守而務養民莫急於擇令可知矣紹興浙大郡其所統八縣其為民者多矣凡其休戚則一繋乎令今欽訓徃臨之民又於欽訓乎望也欽訓於令宜精察令皆賢則於養民之政雖不親布之民而民受其惠矣不幸而有若前所云者欽訓宜有以處之毋苛也毋縱也惟其公而已茍忽乎是則雖弊精神廢寢食以圖之而欲民無失所不可得也欽訓其加念之哉漢劉寵守㑹稽簡除煩苛以清静為治民大化服其後累至九卿登三事欽訓繼寵者也誠盡其道則何患乎不至此將行其鄕友兵部主事陳誠等求予文贈之予素重欽訓故不辭而為之序贈王訓導序王祐昌信今詹事府少詹事兼翰林侍講學士王公時彦子監察御史昌問弟也王氏故金谿儒家其尊府以學行聞天下乆矣昌信承家學之懿早有譽縉紳間於是撫州儒學缺訓導以幣走其門請焉既至京師試在髙等遂授職以去初昌信之來也予與之别僅三年見其頴然秀出心固喜之察其言行皆謹禮而蹈義則滋為喜及是去為教官而予喜加焉蓋既與其父游而又見其子之能立也則安得不喜然豈以一教官為榮哉喜其道之及人也夫聖人之道仁義而已仁則不遺其親義則必急於君此人道之大端也是故教者教此者也學者學此者也使今之學者而皆由於此則治天下之本立矣治天下之夲而皆繋於教官其任豈不重乎然必身有之而後其下化之不然未見教之能行也則教官者豈不難為也哉然以予觀之在昌信則尤難蓋君子之觀人論其世而責人之備亦以世重其父兄以及其子弟固厚之道也昌信則世儒家也而又吾王公之子昌問之弟也人固以賢教官待之矣昌信茍或違於道則人將指而議之曰如是而為儒家之後乎如是而為詹事公之子御史之弟乎然此豈輕之也哉重之至者責之備也然則昌信之道必有諸其身行於家推而至於仁義不可勝用則其教之行盖有不勞而成者矣昌信静重而警敏其言行又若予前所云者其為賢教官可必也而予猶切言之如此固亦厚之道也昌信必以予言為然矣將行翰林庶吉士尹昌等皆贈以詩而請予序乃書以畀之贈王知縣赴蕪湖序予友王維用持由太學生擢蕪湖知縣王氏居泰和南富以詩禮為名家衣冠而仕者不乏也用持蓋其族之賢者今又專一縣之政雖其才學足以致之而世德之積亦可見矣將行刑部主事歐陽湯大理評事康頮皆相與有連求予言贈之予與用持交最乆其贈言也固宜况又有求者則何可愛於言顧予之所言必本於聖人之教而皆用持之所知也豈有異説哉然治民而不本於聖人則皆茍而已亦何貴於異耶孔子曰君子學道則愛人小人學道則易使也道者何仁義是已仁所以撫下義所以事上而皆根於人心是故令之於民惠綏撫摩使得休養生息而無失所者仁之施民之從令奔走順服供其賦税力役而無後時者義之發然為民者固望令之施仁於已也豈敢自後於義哉用持讀書學道其於仁蓋素講矣而蕪湖之民畿民也亦豈有不知義者故予喜蕪湖之得良令而亦喜用持之為令於此也雖然令主於仁民主於義而一皆繋乎令蓋未有令好仁而民不好義者茍有薄於義則亦教之而已矣教之而能從是亦仁之及也用持其惟篤於仁也哉予之為此説乆矣或者以為迂彼蓋有所未思也兒寛漢之良吏不忍急民賦乃以負租當黜民聞而争赴之反以最聞此豈非仁感而義應者乎彼兇暴譎詐雖或取辦於一時要之皆茍而已聖人之言萬世之法也用持惟篤於仁而已矣仁者天之尊爵也天爵修則人爵自至用持誠篤於是則禄位之進可量哉故書以贈其行贈戸科給事中焦君序焦君起良郴人也始以明經取進士擢拜行在吏科給事中未幾以外艱去服除改戸科夙夜祗勤以修其職蔚然有譽於當時今年八月上以給事中當樞機之地既皆擇賢而任之然掌其事者尤不可不擇於是命起良掌户科起良感上之知也益祗勤不懈同列之士亦以為宜其任思見其德業之盛而益進於顯榮然無以冩其殷勤篤厚之意相率求予文贈之予嘗讀韓奕之詩而嘆古之君子之所以待人者信可謂厚矣當韓侯之受命其宴享贈遺則既有飲食之豐車馬之華矣而猶必贈以言然言豈徒為悦哉勵其德而勉其功也故其詩曰夙夜匪懈䖍共爾位有味乎其言也為臣之道以敬為主敬以存心則必勤以趨事既敬且勤德立而功懋矣宜其於首言之也後之君子則或異乎是懷􅎱嫉之心肆險陂之行慮人之進而惡其軋已望其勵翼以有成可得耶今同列之於起良既喜其進而尢欲有增益焉者不亦古君子之道哉聖天子仁育萬方其愛民也真如父母之於子戸科之所掌天下之徭賦也輕徭薄賦使民無不得其所上之心固如是矣起良因其職事之當然茍可以禆乎上益乎下者宜無不盡其心德業之盛於此焉見矣顯榮光大其孰能禦哉予固本詩人之義而為贈言如此若夫宴享贈遺則諸君備之矣此不復道送曾縣丞序曾氏於吾泰和為故家自宋以來讀書而仕者常不乏近三數年翬又以明經取髙第為刑部主事而宗昂舉文學才行繼之得淄陽縣丞以去淄陽魯地聖人之故邦也宗昂學聖人之道今而仕於其邦予固為邦人喜之而亦有慮焉夫天下之人所以安於倫誼之常而遂其養生送死之欲者聖人之道使然也昔者嘗告子游矣曰君子學道則愛人道莫大於仁愛人者仁之施君子以仁存心而施愛人之政則夫所以訓教輔翼惠綏撫摩者當無不至茍無不至則民有拂其性違其養而失其安者乎無也道啓於聖人魯人蓋嘗自説曰此吾聖人而天下賴之者也則臨乎其上可不以聖人之道施之耶今之為令於淄陽者予不能知若宗昻固學道者也淄陽之人聞之必曰是吾聖人之徒也其能以聖人之道撫我哉宗昻輔其長以惠其下而篤於仁愛之施使無拂其性違其養而失其安者則斯民之欲遂矣必將躍然喜曰是能以聖人之道撫我是真吾聖人之徒也世之為吏蓋有任智術肆威暴樂誅求而不知惠下者皆民之賊君子之所惡也若稍渉於是焉則民鮮不失其所者必將蹙然以憂曰吾聖人之道不如是也奈何居聖人之邦而以蹠之道厲其民哉宗昻學聖人之道宜必能擇於是然予猶以為言蓋以今之求賢莫有重於文學才行卓然出衆者宗昻由是科進則所以立乎其位豈可茍同衆人而已哉亦必卓然出衆然後無負於天子之意與斯民之所望也故書其説以贈焉送楊教諭赴任序楊繼克述今少傅兵部尚書兼華蓋殿大學士楊先生之從孫而予之戚也蓋其父兄弟三人伯氏則予女兄之夫仲氏之子又與予子為姻婭而予則與其父自㓜相善至於今其先世在宋有官至登仕郎者元時家業最盛有名郡邑間喪亂以後其祖能敦本務實以昌之故今猶不失舊望克述承富足之餘而能晝夜勤學不少懈遂領鄕薦又㑹試中教官選赴吏部請歸卒業以俟再舉不聽授温縣教諭予與少傅公喜其年少有遠志而不克遂相與深惜之將行則飲之酒而告之曰克述爾知教官之重乎夫治天下者以得賢才為本而教官者賢才之所由成也則是治天下之本實係於教官其任蓋甚重矣爾以甚少之年而當甚重之任其可不思自勉哉聖人之道載於書故欲求道者必始於讀書師之教弟子之所學舍是無以為業矣讀書以明道體諸身施諸事親親敬長充而至於仁義不可勝用則賢才之本立矣由是而發為文章則皆有德者之言也舉而用之治功其有不盛乎孟子曰大匠誨人必以規矩學者亦必以規矩規矩之方員有未至豈能成物而不謬哉爾之為教勿徒示以言而必率之以身夫好逸而惡勞樂弛縱而憚繩檢者人之常情也誠能以身為教則安有不從也哉爾其勉之克述謝曰先生之教是也繼請得服膺焉刑部主事劉廣衡其從母之夫也屬予書以畀之乃書以為贈行序贈鍾太守赴揚州序建昌鍾君旭字子旦與予同登永樂甲申進士第拜監察御史滿九年擢興化太守以憂去今年起復來北京改知揚州予嘗謂御史七品官而職最重當其在内也事之接於見聞而有未宜者皆得以言而行之及其出按一道則凡軍民之利病賦稅之徴輸刑獄之讞議徭役之緩急輕重文武精粗米鹽細碎之可疑者皆質於御史而後行御史必酌於理審於義適於事情而當於人心然後有以慰衆望是故能為御史則於衆職蓋無不可為者矣子旦之為御史已有名及守興化而又有名則其行之美可知矣今知揚州揚州天子畿内郡其地大其人衆而當南北徃來之衝其事繁且劇也然以子旦為之辟若王良造父駕輕車策駿馬以騁於四通五逹之衢有不知其難矣抑予聞之今之太守蓋古諸侯也有地千餘里上之所託以惠乎下下之所望以遂其生者太守也詩云樂只君子民之父母釋之者曰民之所好好之民之所惡惡之此之謂民之父母夫足於衣食安於田里而遂其天倫之樂者民之所甚好反於是者皆其所惡也好惡而志不遂蓋必有由矣為守者當求賢令丞相與圖其所好而去其所惡雖或未能盡如其志然亦使之不失望焉則父母之道庶乎其得矣子旦温厚簡重逹於為政有愛民之心今之揚州揚州之民之幸也其鄕友禮部主事黄振宗徴予言以贈行子旦豈有待於予言哉而予以是為贈者蓋以古之君子期之舍是則為諛悦者矣非朋友之所宜也贈劉教諭赴任序劉諭體信故吉水儒家自宋以來世有科第顯者今四川按察副使鼎貫則其從兄也體信以明經領江西鄕薦㑹試禮部得樂安教諭素與吾邑梁楘叔車游叔車數與予道其賢予心重之然未暇接也及其有樂安之命乃亟辱過予聽其言謹於禮察其行謹於義由是益信叔車之言而喜樂安之士之遇也乃告之曰夫世之為教官者豈徒以位加於人上哉蓋欲教之以道也人道之大莫切於禮義禮以制心義以度事内外之道備矣師以是為教弟子以是為學則賢才成風俗美此國家興學之意也昔之君子譬之制器焉始之以攻治之勤加之以規矩之正則未有不底於成者予在京師三十年所見學者多矣有能不愆於禮義者必其師之賢也今予視體信如此安得不為樂安喜乎抑聞之書者道之所寓也讀書以求道而體之於身此學者之所務也然而務此者盖鮮悖先聖之明訓誦後學之陳言思以僥倖於一切故侈其言行而不知檢違於禮義而不知由之者多矣此雖為弟子者之過亦豈非師道之謬哉天之生才無間於其地聰明英偉淳良篤實之士樂安未必無也若或有如予前之所云者體信奚可不加意哉端表儀以率之勤誨諭以勵之則體信之門固賢才之所出也予既重體信而其友行人曾惟珍又求予言為贈乃書予所與言者以贈之贈王訓導詩序廬陵王志浩以明經領庚子鄉薦今年㑹試禮部中教官選得東筦訓導以去知志浩者皆曰志浩勤敏而闓通其才可以有為使得一第而試於郎官御史之列則於立功立事無難者今乃去京師萬餘里低徊嶺海之間而為所謂訓導者豈不可惜哉志浩聞之曰彼登髙第為要官者命也今吾所得亦命也顧惟訓導為人師所以成人才使之取髙第為要官者而俾吾為之方勉勉營職之不暇而暇有慮哉大夫君子聞其言而是之曰偉哉志浩其可謂能安於命者矣夫命出於天非可以智力得也任其自然而已是以君子居易以俟命而無慕乎外世之知此者鮮矣勞身焦思乘危冐險以徼倖而終不可得或遂辱且殆焉者有矣君子之所嘆也志浩之言不亦君子也乎哉且教官者賢才之本賢才治天下之本也其任固重矣聖賢之道體之身而發於文辭為弟子者則而效之乆則化之矣故師道立則賢才盛賢才盛則治道隆而風俗美志浩能安於命而思勉勉以營職豈不賢於人遠哉且今之教官固有入居近侍職風憲由是而當方面位六卿者比比彼其呻吟於佔畢之際初未嘗計此也亦命之自然而已矣志浩年方壯安知其不若是居易以俟其至可也於是皆為詩以贈行翰林編修尹鳳岐持以求予序故次第其説而序之抑菴文後集巻十一
