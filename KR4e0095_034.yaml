body:
  text: 抑菴文後集卷二十一明王直撰序三臺八景詩序三臺山在樂平南郭中去縣八十里今義烏丞劉仁傑世家焉劉氏先居西溪上距三臺十里許其六世祖清喜三臺竒秀徙居之作屋山下棗林中聚書以教子孫旁有阜巋然修竹蔽翳作祠竹間以祀其先祖既已擅幽勝矣而諸山水之環列乎逺近者皆三臺偉觀也若五老峯錯出而晴雲冒之雖廬阜之雄峙不得以專其姸雙峯駢立而曉月照焉雖前賢之挺生未能以盡其清至夫崇仙之丹井漢天師靈跡寓焉興福之竒茗唐玉川風致在焉其南巨石屹立於原田之間者印墩也其西長溪奔流源源而不竭劉氏故居在其上所以狀其世澤之長也於是皆命為題曰棗林書舍竹阜祠堂五老晴雲雙峯曉月崇仙丹井興福茶烟南坂印墩西溪流水合而名之曰三臺八景士大夫多為賦詩昔之作者既多而仁傑亦求之不厭且請豫為序豫為山水之勝蓋無處無之然而不皆顯者不遇其人故也孔子曰智者樂水仁者樂山以其質之似也果似矣則推而求之凡景物之美之接乎目而觸乎心者皆可樂也由是而歌詠之俾顯聞於世豈非一時之幸遇哉三臺之景既與劉氏之先遇矣今仁傑以卓然才行方進用山川之秀鍾於人而亦以人勝由是山若益髙水若益清景物亦為之增華則其相遇豈非尤幸也哉然豫觀其命題之意非止於山川景物之愛喜其子孫致孝其祖考此其先務也人道之大豈有過於此世之人知務此者鮮矣耽耳目之娛狃宴安之樂無以承先而裕後卒併其所以娛樂者而皆失之君子所深慨也若劉氏者其誠賢於人逺哉書曰詩言志為仁傑賦者當深明其志後之人得而誦之亦將有所感也贈歐陽湯歸省詩序豫邑歐陽湯為刑部主事五六年端厚勤慎蔚然有名縉紳間尚書魏公重之㑹廣東清吏司闕員外郎奏請以命湯上即命湯署其事而所存所行益祗勵不懈於是名益有聞豫嘗識其尊府允器君讀書有才行表然為鄉邑所敬以湯貴䝉恩封主事配亦封為安人其年皆六十餘矣湯念之不置乃援例乞歸省翰林諸公重湯者多作詩送之同僚劉廣衡篤姻戚之誼持以求豫序豫與歐陽氏聫婚姻者三世於湯之行宜有言况重以廣衡之請邪君子之學非止欲榮其身固將有以顯其親身榮矣而親或不待焉其心不樂也豫邑之仕者多矣父母俱在而皆得與其榮惟於湯見之他未有比也豈偶然之故哉蓋其父子皆能修諸已是以能得之於天湯之歸拜父母於堂上而備物敬享焉命服輝映煌煌如也其心固樂矣故舊親戚安得不同其樂哉雖然豫於是而有慨焉君子之行道蓋無時而巳也身不離道天亦將申祐之謹於始而怠於終則其所以為顯榮者亦但有其初而已惡能長保其樂哉豫見若此者亦多矣非由夫仕者之過必為其親者有以纍之然則言行之發果可少違於道也乎又果可以在朝在野之不同而自異其心也乎允器君雖老尤嚴於自修而湯之為人蓋知謹其身者不以逺近內外或間也必能長保此樂矣又進而盛焉可兾也然豫序其詩而猶為是言者蓋愛厚之意亦兾得同其樂於久也湯歸而誦之允器君將必以為然他日還朝宜有以告我也贈僉事楊君序楊君名春字子元雲南人為監察御史有名於時少保楊公薦其賢上以為江西按察僉事將之官都察院經厯熊尚初與凡素相厚者求豫文贈行夫贈言古道也所以寫離別之情而致願望之意諸君不自言而以屬豫豈以豫言為可取也乎楊君以明經取進士為御史久矣經之所言治已治人之道能知而行之亦已見其美矣今去為按察僉事辟之乘堅良以馳周道挽強徑以穿魯縞不足以喻其易也况於江西其易又有甚者江西統郡十又三縣六十有九其為民衆矣而皆以詩書為務雖大山長谷之間耕田鑿井之民亦喜教其子則髙門大族可知也故其君子皆服仁蹈義細民亦知守理而畏法其或有事涉官府上之人以理而折之則帖然服訟有不終朝而决者視他處之民頑獷強悍理不能喻法不能威斷斷然與官府爭勝負者其相去逺矣故昔之藩憲大臣皆以江西為易治而江西之人誦其德亦往往不忘其或昧於理則不足以服其心於是以為難治今得賢如楊君豫知其治之尤易也雖然按察司重矣民之望之逺矣寒鄉下邑柔良之民豈無困於非理而莫有能以理折之者楊君分巡而廣察之事之是非一視理之可否理之所不可者則必以法加焉不茹柔不吐剛使民益安於理之正而不陷於非理焉是即所以為教也則江西之人之誦楊君豈有已哉故以是為贈楊君其以為可取也乎贈朱參政之山東序南昌朱君永字叔久官刑部有年矣質直坦厚遇事能斷而言行不愆於禮義人皆知其為君子也大臣薦之天子用為山東左參政同列之賢求豫文贈行今之布政司蓋古牧伯之任布政有使而參政佐之政者何所以惠養斯民者也天下之民多矣而使之得其養則皆繫於布政司上以是任之而下以是望焉其職之重可知也故布政司之長二有缺必命大臣察舉而任之非賢不用也今得叔久而人皆以為宜此豈不試之譽哉蓋觀於其行而知之夫當大任者非矯飾險薄違禮悖義者之所能也叔久之行如前所云者士大夫信之久矣且其於事無小大必皆盡其心故無毫髮失當者推是心也宜於此有不宜於彼者乎今之山東其能副上下之望也審矣然嘗思夫所以養民者布政司非能有所錫與也使之安於農桑而已其良法美意非能自致之民也亦付之郡縣而已郡縣之吏或非其人而害於政布政司雖賢何能使民自養哉昔者帝舜之命牧也曰食哉惟時曰惇德允元而難任人此其道也叔久佐其長察郡縣之吏孰為君子則親而任之小人則斥而去之果在位皆君子則能不奪農時而民之衣食足矣今上之心帝舜之心也叔久其當以是為務哉如是則叔久將不為古之君子矣乎故書以為贈云贈陳太守赴成都序陳君名榖字世用南昌人有譽望於世久矣蓋自永樂辛丑進士擢拜監察御史凡一言一行必循禮蹈義其處乎朝廷或以事臨郡邑肅然惟其職之修而所立有過人者當時論賢御史陳君必在甲乙之數求可以當大任者亦必曰陳君云正統四年五月上以郡守有缺命諸大臣舉賢而任之衆謂莫宜陳君遂上其名詔以為成都知府知陳君者皆喜其道之及民而或者謂陳君嘗職風憲任激揚若居外臺猶足以懾姦警惰顧使當一郡之寄無乃非其志乎豫曰君子之學道也惟所用而已矣詩不云乎左之左之君子宜之右之右之君子有之夫豈膠於一哉今天子仁愛兆民必欲使得其所思夫與之相親而教養之易莫切於守令是以不輕畀人必付之賢者學道君子有志於斯民之所樂也臺憲之任非無志於民然其去民逺矣教養之事必託之守令誠能如其志矣乎故不若近而施之之愈也陳君學聖人之道必有志於是果何為而不可哉况成都去京師萬里天子尤矜念其民陳君當簡畀之重固宜以分憂為心他非所計也古之教養其民者若李氷文翁其功德偉矣自是而後若張堪亷范李膺髙士廉張詠田况輩皆所謂賢者也陳君能善繼之非詩人所謂惟其有之是以似之者乎陳君聞豫言而喜曰王公之言乃榖之志也其何敢不勉陳君將行同列之賢求贈言於豫因書以贈之贈楊太守序登州在海濵其地多瘠薄故其民少富而多貧為之守者非有父母之心以均惠之而能使無貧苦之歎亦難矣楊侯守登州蓋有父母之心以均惠其民者也豫嘗見登州人皆能道侯之善及見其藩省大臣問郡守孰賢則必稱楊侯至於按察之官與朝廷重臣之巡撫山東者亦莫不譽嘆其美然則楊侯信可謂之賢者矣往年楊侯為刑部郎中嘗以祗慎得名豫知之及今而美益著譽益顯侯其有常之君子哉豫嘗自念天生兆民不能使之遂其生是以付之人君人君不能以獨治是以又付之臣郡守近民者也上有仁民之心必欲使之休養生息而無失所者非得賢守推而行之安得受其惠哉今聖天子在位大新庶政一以養民為務郡守缺則命大臣舉賢而任之至於縣令亦不輕以授人其愛民也至矣使他之為郡守者皆如楊侯有父母斯民之心而又得賢令承之則太平之治與三代之盛等矣今年楊侯再考績來北京吏部最其課言於上俾復職此登州之民之幸也然豫觀之今六卿之佐有缺往往取之賢守而世之以舉賢為任者亦往往知侯之賢然則侯豈能久於為郡哉侯將行登州之賢之仕者因豫友尚寶卿張君信求豫文贈之豫既為登州之民喜而又慮其不能終惠也故為言如此侯名頥字漢昭廣東慱羅故家也贈江西僉憲張君序張君華亭人名政字彥公嘗為遂安學官秩滿來京師簡任監察御史有譽望於時既九年超拜江西按察僉事同列之賢顧君理等相率求贈言於豫豫江西人也於藩憲大臣固望其惠養斯民使小大得職而無失所者然今舉用皆賢才其於養民之道知之明行之熟矣非豫愚者所能窺也故未嘗敢贈一言况張君嘗以斯道教人而又以施諸治既皆有成績矣此又愚者之所畏而仰之也何言之可贈哉今天子在位聖德之純與天為一其所得者皆仁愛之施知民之所好而必豫之知其所惡而必去之雖堯舜之心不過也田里細民固當樂生興事以養父母育妻子熙皥自得如唐虞之世矣而有未盡然者此其故何哉豈近民者行之有未至而民未見德與朝廷以民事付之布政司使下於郡縣而達之民其制備矣按察司則受耳目之寄審其過與不及而用法整齊之以觀其功之成其任尤重也今民有不能自得者則牧養之功惡乎成明視聽廣見聞以求其故而治之此誠有賴於任風憲者也書曰德惟善政政在養民而繼以戒之用休董之用威由是而知勸懲之術聖人所不廢也耳目明懲勸公善者益有以惠民不善者亦思勉於善而不敢厲民養民之效庶可兾其有成也風憲之重如此在乎慎重以舉之請以是贈張君蓋千慮之一得也贈袁少卿致仕序袁君忠徹四明人洪武中其尊府桞莊先生以髙見絶識得侍太宗皇帝於潜邸而忠徹亦被知遇由是浸以顯榮為鴻臚屬為中書舍人為尚寶丞遂升少卿侍從三十餘年寵眷如一日太宗皇帝巡狩征伐忠徹必從行其勤勞多矣風雨燥濕之不時而疾生焉於是足不任步趍且痛日加劇嘗謂人曰吾受國恩最深當鞠躬盡瘁以圖報而乃為疾所困恐曠職廢事失人臣之義今年疏其情以聞乞歸就醫藥守先臣墳墓上憐而許之或曰忠徹未宜去以舊臣職符璽當重任一也其年財六十五於禮未協二也有二未宜去而何去之果豫謂古者七十致仕禮也年未至而病及之如是而求去義也禮處其常而義處其變夫既病矣猶以難強之筋骸而叨無窮之榮利而謂之義其可邪忠徹酌其宜而汲汲以求去其殆知義之君子哉宋之時有錢若水者陳希夷欲援使學仙麻衣道者視其貌以為不可曰急流勇退人也其後若水官至樞密未老而致仕然則急流勇退亦仙之次者也其忠徹之謂歟豫聞四明山凡二百八十峯深洞周回一百八十里是謂丹山赤水之天其中有隱君子仙人道士超然物外者尚多有之豫亦老且病嘗思一遊庶幾有得焉而忠徹乃先往矣倘遇其人延年已疾之方必有以相告者他日乞身南還尚當從忠徹問之忠徹將歸户科都給事中焦起良輩求豫文贈行乃為序如此贈夏主事序仲昭夏氏名昶崑山人永樂乙未以明經取進士入翰林為庶吉士而尤善於書選授中書舍人既九年升考功主事然未嘗去翰林凡有大辭命及修先朝實録仲昭皆執筆其間史成䝉厚賞加五品祿而猶在翰林豫與之處蓋二十餘年其溫恭詳雅非獨豫重之自師保而下莫不重也其母嘗䝉恩封孺人今年八十餘猶康強無恙仲昭念違離之久也乃謁告歸省焉吏部郎中吳孟寅與諸僚友求豫文贈行古之君子喜於得祿者貴乎有以奉其親茍弗及焉雖千鍾之富弗樂也今仲昭之祿足以養矣而母孺人既老不能就養來北京此仲昭之心所以惓惓不忘也兹得請而歸奉其祿賜之積以為孺人夀其何樂如之况仲昭之兄昺亦嘗以善書得官而歸老于家母孺人尊榮於上兄弟和恱於下備海陸之珍極奉養之美愛敬之誠祝頌之意藹然見於朝夕之間天下之樂豈有過於此崑山之人之為父母者必以仲昭兄弟願其子而為子者亦必以仲昭之母願其親莫不歆動而興起焉則其為勸於鄉邑豈小哉抑豫聞之為子之職莫切於事親雖仕者不敢顧私然幸有著令茍得一日伸其情不猶愈於已乎而世之人有親年八九十不肯暫去其位顧使老者冒風濤犯寒暑以就區區之養萬有一不虞則將如之何哉故豫於仲昭之歸嘉其得安親之義而歎斯人之忍也因為序以送之使若而人者觀焉庶乎其有警也夫贈主事黃振宗序振宗南城故家以宦業著名洪武中其先君子嘗舉孝廉為㑹同臨海二縣丞有治聲而其叔父原為中書舍人在朝士大夫皆稱其翰墨之妙豫聞之故少師蹇公云振宗在永樂中又以能書徴拜中書舍人而常在翰林凡有制敕皆得書及修三朝實録亦與執筆其間振宗少學鍾元常筆法遒徑而謙和勤慎未嘗矜已傲物由是見重於諸公為中書舍人九年升吏部主事史事既畢又䝉嘉賚俾食五品祿而還之吏部益治事不懈然年已幾七十矣嘗曰吾受朝廷厚恩如此當勉圖報稱而聰明日衰筋力不足有為矣即上章乞致事上憐而許之郎中吳敬孟寅輩皆惜其去欲留之不可乃求豫文以贈行豫與振宗交好二十餘年心實重之今於其去不能已於言况重以諸公之請耶夫士君子壯而仕老而求去義也天子亦憫其老不欲煩以政使得優遊於田里仁也下能率義而上能盡仁此太平之盛觀而於今見之南城在江西上遊其地多佳山水而麻姑山為最勝有古仙人遺跡宋謝靈運唐顔真卿白居易劉禹錫鮑溶宋曽子固兄弟黃庭堅輩皆有詩文留山中而魯公書法妙天下豫嘗欲一逰遍覽竒勝盡觀先賢制作以自快而竊位茍祿不能少報萬一故不果然今老且病矣而振宗先豫以去倘得乞身南還當從振宗以償宿願焉故書以贈之贈張參政序今之布政司十有三而浙為稱首其地之大民之衆物産之饒城池之髙深街衢巷道之整飭里居之密比商賈之輻輳浮屠老子之宫聮亘而焜耀湖山之秀潮汐之壯所以具服食而備觀遊者誠非他所及而布政司獨當其勝官於是者處則據地位之崇髙堂宇之巨麗重門纍級之嚴峻出則有冠蓋之華輿馬之盛騶奴從𨽻呵衛於前後為其屬者仰而望之若神明巍巍乎堂堂乎大丈夫受命於天子而當是任者信可謂榮矣夫豈徒然者哉以其德也郡縣之吏師之以善其政小大之民賴之以遂其養以如是之賢當如是之地而享其榮也固宜稽勳郎中建安張君珂字鳴玉今之所謂賢者也仕宦三十年而在朝為最久其才行見重於士大夫今年天子聞浙江參政饒禮之賢超拜河南布政使而命大臣舉賢繼之衆謂莫宜於君於是遂拜命以行夫布政使古牧伯之任而參政佐之政之善參政同其譽其他亦無不同者是宜與同其道也舜之命牧曰食哉惟時蓋以養民為首務也務於養民則戒於厲民可知繼之以惇德允元而難任人蓋欲親君子逺小人則當自厚其德而篤於仁可知今天子命官之意亦舜之意也如是則政無不善民無不遂賢益著榮益盛而浙為天下稱首無負矣張君學古道師古人於此蓋易能也將不至於使之位而已邪張君將行同僚吳敬孟寅輩相率求豫文贈行故書以贈之贈尹訓導序江西按察僉事諸暨王君董郡縣教事鋭意於養賢以為教官者賢才之本教官缺則學者無所師法將何以成賢才若不得人則猶夫缺也然可察舉者唯訓導乃訪諸郡縣求學行兼備可為訓導者得六七人上其名吏部豫泰和尹儼克思其一也吏部以王君所舉必賢然必試而後命之乃羣試于廷中七人者皆在髙等於是克思得龍泉訓導龍泉亦吉安屬縣距泰和不三四百里其山水清秀土壤肥沃而物産富饒是以其人皆給足故家巨室以文物相先詩書禮義之習有纍世不墜者愛其子必為擇師敬禮之甚至賢才之成仕至郎官御史者前後相望其盛如此故豫為克思喜之喜者何喜其教之得行也夫人無所養則不暇學有所養矣而不知學之為貴則亦豈樂於學哉教官不幸而遇此率之而不從語之而不受上下之意不相入而欲教之成其可得耶今克思去龍泉因其善而教之如水之流濕火之就燥功成之易可知矣要在慎其所以為教也古之立教者本諸身身不離道則行孚而言從學者觀感之深積習之久成其德達其才出而用之其功效豈小哉克思惟慎其身而已矣尹氏自宋進士絳以來經術相傳至於今則儒固世業也其前顯者不暇論自克思之祖上海教諭務厚先生而下惟自道再同知府事加食四品祿克思尊府京山教諭復道及諸子姪教郡縣學者七八人則教官又其世職也以世業之重承世職之榮奚可以不慎不慎則忝其世克思勉之豫子穆克思女兄之夫也豫既喜其教之行重以親戚之誼故為序以送之贈朱太守序正統五年正月吏部以缺官事聞請㑹三品以上大臣舉賢而任之上是其言於是武昌闕知府尚書郭公言於衆曰武昌大郡也非其人不可以吾計之莫宜於刑部郎中朱勝衆皆曰然遂奏其名上即以勝為武昌知府勝字仲髙金華人以科目入官其在郎署久矣亷慎平恕蔚然有名於當時凡以舉賢為務者惟恐或失之今之武昌君子蓋喜其道之行而幸其民之遇也夫為天子牧小民而致治平之效者郡守縣令也藩憲雖尊其去民也逺矣茍去民也逺而欲行道以及民順其情而施之使皆安且樂焉非得賢守令不能也蓋其職近民凡民之利病與其饑飽勞佚俗習好惡皆接於見聞於夫教養之方勸懲之術賦稅力役之供徴輸發召之節悉得以審其當制其平小大之民庶幾䝉其惠而無失所者茍蒙其惠而無失所者不謂之治平可乎故為賢守令者上之所託下之所倚藩憲大臣之所禮貌而愛惜者其重可知也然今之賢守多矣而令不能以皆賢令果不賢守雖欲施惠於民而民有不被其惠者仲髙欲道之行可不加意於令哉正其身以率之率之不從則威之威之猶不改則黜之別求賢者而任焉是則道之行民之受惠可必也今守之賢者則進而任方嶽佐六卿仲髙誠勉之安知不至於是哉其僚友劉廣衡等求豫文以贈行故為序以贈之送吳侍郎致仕序正統五年二月禮部左侍郎政和吳公廷用以外艱服闕朝北京一時士大夫皆喜曰公在永樂中為給事中以清謹端厚得名仁宗皇帝在東宫雅知之深見寵任及即位超拜刑部侍郎宣德中改禮部二部之屬亦無不愛且思者今朝廷眷用老成以圖大政公宜在其位而公乃浩然有歸休之志謂人曰吾年至一宜去吾耳失聰多闕於聽聞二宜去且足不任趍走氣復喘急行百許步輒欲少休如此其可以忝官位哉即上章乞致事天子憫其老許焉公既拜謝而過豫道別曰吾歸矣子能無言以相贈邪憶永樂之初太宗皇帝仍用科目取士明年甲申㑹試禮部者數千人中者凡四百七十二人公在髙選而豫亦幸得焉其後公拜給事中遂佐六卿豫亦濫厠翰林同朝者三十七年公之德業著聞於中外豫以寡學菲材陪從諸公間其負愧多矣兹亦忝繼公後方栗栗危懼不知其所措幸公之來兾得以承教焉今乃倀然有失望之歎而何言可贈哉豫聞之古之君子致仕而歸則以其道教鄉人子弟使知孝弟忠信禮義亷恥由是賢才成風俗美則公雖去其位而所以稗益於治化豈小哉然朋友之誼亦君子之所重也以豫之鄙而望公之深兾時一惠教焉使或能自立以不辱同年亦公之德之所宜及也此回路相請贈之意也遂書以為送行序贈尚寶朱少卿序永樂中太宗皇帝思得才學之士而用之命近臣察舉尚寶少卿袁忠徹以海寧朱祚應詔驛召至京師奏對稱旨用為中書舍人既而又以能賦受知於仁宗皇帝時宣宗皇帝在侍心亦竒之及即位擢置左右數進其所為詩大見稱賞超授翰林修撰今又厯九載進拜尚寶少卿祇事四聖在禁近者二十年聲譽聞中外朱君字永年豫與之逰久矣其為人謙恭直亮言動必依於理盡心其職周慎不懈於故舊朋友能相輔以義由是士大夫莫不敬愛君及少卿之命下衆皆為之喜喜而形於言以致其慶幸之意者蓋多矣而兵科給事中王君永和輩又以屬豫豈以豫能知朱君而言為可取也哉夫中書翰林在昔稱兩制尊重幾與宰相等而符璽之任自秦漢以來為最親後之仕者幸得其一已榮矣今朱君厯踐要塗纍事明主當太平之世而䝉此非常之遇此豈偶然之故哉嘗觀之宋自建隆開寶至于嘉祐治平之際賢人君子萃於朝其間更踐臺省厯職華要享其福祿夀考者比比皆是故張士遜有詩曰青雲岐路逰將遍蓋自喜其遇也我朝列聖德隆化洽者六七十年氣運之盛人材之多仕者揚厯之久莫踰於此時亦何其幸也朱君尚未老青雲岐路安知其不遍厯也哉今日之美後將於其詩見也書以贈之使人知朱君非徒然者且以致期望之私云耳贈黎諭德詩序清江黎君怙字潜輝始為御史已有名太宗時以敢言受知遇擢守南靈州既罷少傅西昌楊公知其賢以為宜在侍近言於宣宗詔用為右春坊右諭德豫與之處者四年其學問通博而文辭典雅其於言行尤恂恂恭順非獨豫重之凡識潜輝者蓋莫不重也今天子即位詔修先朝實録潜輝被簡拔執筆其間及上御經筵慎擇文儒侍講論而潜輝又在選其學遂大用於時今年䝉恩錫誥命追贈其尊府為右春坊右諭德母氏贈宜人潜輝感上之賜而痛二親之不待也即請告歸焚黃於墓下上許之翰林諸公皆作詩贈行而謂豫冝序嗟夫潜輝學聖人之道者也學聖人之道固知所務矣君子莫大於成親成親者敬以立身使人名為君子之子是成其親為君子也潜輝之賢朝廷推本於親追錫之爵第五品其為成親也大矣豫與潜輝偕為近臣先帝之德與今上之仁未之有報也鋪張天地之閎休敷闡堯舜之大道庶幾少效萬一焉而豫寡昧不足以及此方資賴於潜輝今輟於有事之時俾遂其所志上之恩益厚矣潜輝當知所務也從容留滯而忘其所有事焉非所謂知務矣詩曰跂豫望之潜輝其速有以副豫之望哉贈鍾教諭詩序吾邑鍾沔尚清為邵陽教諭既滿來北京念二親在堂將歸省焉或謂尚清曰子之親遣爾仕也固欲子顯矣今既課最旦夕當得升子若遂階顯庸而持以為親榮此昔人所謂以志養者也而何汲汲於歸哉尚清曰沔之親老矣而沔違養已十年恨不能以朝夕見計吾親之心亦若是也沔其可貪位而後於親哉即請于朝許之嗟夫尚清可謂能孝矣孝德之本也譬木之幹枝葉所附而生者人惟能孝於親則推而為事君之忠為事長之弟為撫幼之慈又推而仁民愛物皆是也兹其所以為德之本也夫既根於心宜無有違其親者然或蔽於欲而遂遺之是以成周有教而民風淳治化盛矣國朝興道以教民一切不異於文武之世若多士之𨽻於學百僚之在任使者皆得以省其親著為令仕而稱職則又有封贈之典焉蓋以教孝而敦其本也本立而道生則為忠為孝為慈與夫厚於民物者一皆兾其成盛矣哉上之待下也尚清修仁義之行其事親能孝舊矣兹復後於祿位而急於親其本不既立矣乎孔子曰天下有道則行有枝葉今聖明在上德隆化洽誠所謂有道之世也以尚清才質之美進而顯其親有日矣行之枝葉若為忠為弟為慈與夫厚於民物者舉將見之尚清其尚篤於自立矣士大夫之相厚者各賦其詩贈行其姻家歐陽御史洙持以求豫序豫尤厚於尚清故為序而勉之吉水瀧江彭氏族譜序吉水瀧江彭氏吳吉州刺史玕之裔也玕後歸楚馬氏官至太尉其子彥昭亦纍官至太保始居永豐之沙溪彥昭子師旦又徙瀧江自宋以來子孫由科第入官者相繼而不絶衣冠文物至于今稱之今年句容訓導汝弼來京師持族譜求豫序按太尉子十一人太保子十五人多散徙他處瀧江其一也子孫之盛鄉族罕有比者則合諸子之傳其盛又可見矣此豈無自而然哉五代之亂豪傑並起而爭於此之時有能撫定一方俾斯民免於禍則其德立矣况有以詩書為世業者乎太尉子孫之能久而盛者蓋以此也譜之作所以著其本而聮其支使凡子孫知祖宗之立乎其前者如此而善繼之所繫蓋重也瀧江自師旦而下傳世厯年多矣譜自叔慶至汝弼凡五修支分𣲖別昭然甚明其尊卑疏戚皆有倫而不紊厚矣哉其用心也亦將承藉維持使愈久而愈盛也與豫嘗謂故家大族皆由祖宗立德以啓之然不可恃以久也要在以德繼之德莫大於仁義而孝弟其本也彭氏子孫果世篤於孝弟而加之以文足以光前而裕後矣雖百世有窮哉故為序之以勉其子孫者贈訓導湯君序一元豫故人湯君如川子也湯君氣豪而行端學博而才贍與豫同登永樂甲申進士第同入翰林為庶吉士其後有司請以為吏科給事中太宗皇帝欲其學至古人不欲小用之留不遣未幾以疾卒至今同輩之士與凡大夫君子論當時人物之偉然者未嘗不思湯君而不可見則見一元猶見湯君也一元舉明經去為安慶府學訓導凡與湯君友者皆以逺大期之矧豫鄉邑之舊哉故於其去不能已於言也我國家興學育才其用心至矣遴選弟子員慎擇師儒以教之又專置風憲官以督勵之此其意何也蓋天下之治本於賢才賢才之成則由乎教官茍不加之意惡望其能有成哉是以若是其嚴也然教官之成賢才必本諸其身誦聖賢之言循聖賢之行使為弟子者有所觀法而化則賢才成賢才成而治道盛矣教官之所繫如此豈不重哉然而能自重者鮮矣其言未必皆聖賢之言而行或違乎聖賢之行淪於貨利溺於宴樂而不知所以為教是故下無所取法臨乎上者亦不見其可重而慢易之由是往往不安於其位欲其成賢才以興治道可得邪此君子之所深歎也一元端謹而好學有志於古人不肯一涉非義豫知其為賢教官可必矣然尤相與論其不能然者庶乎加慎焉耳此豫相厚之意也怡怡堂詩序怡怡堂者吉水曽希恭之堂也曽氏家蘭溪自宋以來為名族政事文學之賢豪傑英偉之士載於國史紀於郡乘而著於鄉評者不乏也希恭承世澤之厚與弟希固最相愛念前人立德之難而思善繼之兄友其弟弟亦甚敬其兄內外雍睦無間言至和之氣藹然充于一家鄉邑之士因以是名其堂而相與詠歌之希恭兄弟嘗出穀賑饑朝廷有旌褒之命希恭謁謝來京師京師士大夫嘉其行亦多為賦詩乃來求豫序其首豫嘗讀周雅其言兄弟之恩委曲詳盡莫過於棠棣至於所以保其恩則莫若斯干之首章蓋兄弟之親異形同氣其初未有不相好者至或有失則相合而求似焉由是恩不能終相好云者即孔子所謂怡怡也誠能怡怡以相處則必不至於相學相踈而和且樂矣希恭兄弟有其行而稱其名則諸公之形於言豈不冝哉古詩三百篇上自朝廷公卿大夫下至閭巷田里小夫婦人皆有焉孔子列之於經百世之下得以知當時政化之盛衰風俗之厚薄然則是詩也豈徒以知曽氏之美而朝廷德化之盛亦於是見矣雖然孝友之德根於天性非一人所獨有也凡得此而誦之者必將低佪羡慕而興起其良心况曽氏之子孫哉故為序之使傳焉送蕭訓導序學校育才之地治天下之本在焉朝廷注意也久矣限弟子員嚴科舉之額蓋欲所教者皆真才而所用者皆實學此豈輕視而按抑之哉今又置風憲官一員課勵之必使讀書明理求其所以修已治人者而躬踐焉然後發之於文辭措之於事業待之愈嚴責之愈備欲使其人皆可以為公卿大夫則治天下之本立矣此明天子之意也然又以為弟子必有師師者弟子之模範也模範不正而欲其器之良蓋難矣是以師儒之選加嚴焉六卿近臣憲臺之長相與羣試於禁中其不能者往往斥去必文學之優然後得之其嚴如是非以其為成賢才之本歟吾邑蕭士髙以教官舉至京師羣而試之在優等遂授贑榆訓導以去贑榆南京畿內地而僻在海濵其人之素習豫不得而知也然天之生人其所受氣雖有清濁厚薄之殊而賦性則同因其所明者而導之馴習之久磨治浸灌之深蓋無有不善者此誠繫於師士髙之去宜謹其所以為教之道哉語曰以身教者從以言教者訟蓋身有之則其下化之茍身不行道而徒以言強聒焉未見其能從矣誦聖賢之言行聖賢之道士髙之所以為教也持之以誠而待之以久贑榆學者將不可備公卿大夫之選乎在士髙勉之而已故書以贈其去且使其人得豫言而觀之亦當有所感發矣夀胥經厯母詩序臨川胥允銘由國子監生為蔚州衛經厯其母孺人年七十八尚康健如少者允銘迎至京師以其祿敬養焉衣服必佳甘㫖之奉必充起居動作必親視其宜孝愛之心婉愈之色藹然可尚也今年十月初十日是為母初度之辰允銘將以是日大具酒殽㑹親客以慶之而謀於其友翰林侍講王君時彥檢討錢君習禮曰不肖之至此皆母之教然也今得夀且康而食其祿幸矣惟其素知文字之足貴若得諸公之詩不肖歌詠以樂之其心加樂焉然而不敢請也二君乃與嘗知允銘者分題賦詩以為夀而屬豫序之豫未識允銘然聞其居官能以禮自守又重氣誼赴人之急不啻為已其為人如此則母之賢可知又况於能孝乎况又有二君之命乎則豫雖欲無言其可已耶夫人子之孝於親因其心之自然也然得盡其道與否豈獨在為子者哉蓋有所遇焉矣周之盛世以仁逮下而達臣子之情故四牡之詩得以伸其將母之志而盡其奉養之宜及其後也困人於憂恤之地而不得為養使其母勞苦以自給此祈父之所以興嘆也孔子刪詩而録之百世之下有以知政化之盛衰人事之得失故曰詩可以觀允銘遭遇聖朝獲祿仕雖典戎幕之政而無行役之勞其母孺人隆然多福因得以盡其奉養之厚蒼顔白髮綵衣象服輝映一堂之間何其榮幸也哉皇仁如天所以體羣臣者於此蓋可見矣雖然是詩也豈獨為胥氏之慶千百嵗而後因是而知今日太平之盛斯人夀考康寧之福必有低佪羡慕於無窮者若夫引翼將奉愈老而不衰立身行道以為顯揚之大者則諸公之詩見之豫故為序使傳焉送縣丞邱侯序邱侯方姑蘇人舉賢良方正得為丞泰和泰和直父母邦侯有潔亷之操有慈愛之心一縣之人敬禮之思見其政教之成也侯亦勉勉不怠務欲自樹立其奉已甚約有人所不能堪者侯處之裕如去年冬江西布政司遣奉表來京師當氷雪嚴沍之時孑孑走道路與輿𨽻同辛苦未嘗少有不平之色豫重之既畢事將歸過豫言曰方幸佐名邑大懼弗稱願求一言以自勗豫既重其人則安可愛於言夫賢良方正之科始於漢後世因之大賢君子多此焉出究其所以名之意蓋以德舉也使誠能副其名則何官不可况於丞邪彼由是而進而有所不可者欲厚其身而豐其家故也欲厚其身豐其家則必棄禮義冒法度肆志於貨利之求由是天厭之人苦之而欲安於其位難矣是故仕者必以潔亷為本然後心無所係纍而惟德之行侯既有其本矣善政善教孚洽乎民心而民歸德焉則福祿之來豈有窮也哉泰和素稱文憲之邦其人多讀書服聖賢之道田里細民亦知以禮義為尚而能安其分之常有賢令佐以臨之其教易行而政易成也今臨其上者得通判佘公而侯佐之皆有亷潔之操而務施德焉此一縣之民之幸也而直則有願焉蓋去家竊祿久矣然諸子則皆縣民也其心不能無欲有欲則不能無過過而不已則灾已辱親抑其過禁其邪乃所以保全之也毋矯也毋徇也一惟公而已矣此直之所深願也故併書之以贈行歸而質諸佘公兾垂情采納焉贈郭太守歸鎮江序鎮江於南京為最邇聲教之所漸被為最先其田多上腴而又濵大江四方之人相易而往來是以其君子則秉禮蹈義而好文細民亦各安於其業而無失所者故俗號易治為長吏者茍安靜平恕以臨之治效不難致也今之北京相去蓋逺矣然其化既成其俗既定雖或有供億之勞而人皆以為當然莫敢有慢者安靜平恕之治蓋至今宜之由是以知漢之循良無施而不可苛刻擊斷豈誠足以為治哉鎮江太守開封郭侯濟字澤民豫知其為人蓋所謂安靜平恕者也其在鎮江六年人皆安之而事亦無不理雖其俗號易治亦侯之德有以致之也天下之府凡百餘其地有逺近事有劇易要之得人則治不得人則廢而人之才性不能同強者則失之過而或至於病民弱者則失之不及而不足以庇民惟君子為能審夫理之正以制夫事之宜不疾也不徐也必使行無不當而民無不愜然後為得中君子之治豈欲強以為厲弱以為愚亦曰中而已若夫安靜則不擾平則不陂恕則不妄加於人如是而失中蓋鮮矣故豫於郭侯之治有取也侯再考績來京師既書最而歸郡之仕者禮科都給事中胡君輩喜郡人之得䝉終惠也屬豫文贈其去豫素重侯之賢故不辭而為序云送訓導歐陽時峻序時峻歐陽氏之秀也往年舉于鄉不幸而見絀於有司㑹監察御史許勝巡江西惜其才曰是可以為人師矣乃舉赴吏部吏部以屬翰林試在優等遂授武清縣學訓導歐陽氏故儒家宋兖國文忠公之裔代有聞人自洪武以來由科舉入官者又十數人時峻之大父嘗任淶水縣學教官其為國子助教曰賢由監察御史今為雲南按察副使曰和者皆其叔祖為吏部考功主事曰哲者其叔也今時峻又出為教官何歐陽氏之多賢哉或者曰時峻英年美質學問蓋已素具方其舉於鄉欲試於用以行其學也今去為訓導猶從事於占畢之間毋乃非其樂乎豫謂治天下者政與教而已學校之教行而人得以成其才然後能修政而立事是教者政治之本也使時峻得如其志而位于有司汲汲於簿書期㑹之末以效其尺寸一有不至則譴纍隨之其視正冠巍坐與一時之英才讀聖人之書而講明其道以為政治之本其相去何如可知也則時峻豈不深可樂乎武清去京師僅百里其人習見聲明文物之盛非窮鄉下邑可比其為教固易行然教人者必以身不以言果道弸於中而彪於外則學者有所觀法而化亦皆篤於道德而發為文章則他日用以興治不難矣在時峻勉之而已豫與歐陽氏再世有連於時峻不薄也故為贈言如此贈稽勳郎中蘇良金序良金蘇氏名鎰建安人故翰林編修伯厚先生子也永樂中先生在近侍以文翰知名良金受教于家學既成以教官舉至京師留為中書舍人而執筆在翰林者凡十年升吏部驗封主事宣德中修兩朝實録良金仍與其間書成升驗封員外郎又修宣廟實録升祿正五品而還之吏部蓋在翰林二十年始得往任吏事然計所厯又九年矣於著令當升從四品適稽勳缺郎中衆謂莫宜於良金乃奏為稽勳郎中而以從四品祿給焉良金既受命早夜孜孜以修其職不少懈或者曰郎中雖貴然視良金所當得者秩少卑常人之情孰肯以卑為樂哉今不得於彼而反樂於此何邪豫曰此良金之所以賢於人也君子之仕其進退髙下聽之天而已不與焉惟思盡其職而已夫謂良金宜為郎中者衆人也衆人之所與而天亦與之良金豈得違天哉其孜孜修職者乃求無愧於天也誠無愧於天則天必祐之夫豈止於是哉世之人固有厭卑而求髙者然而有得有不得繫乎天之定與不定也天果與之雖不求而自得之不然雖求無益也良金安於其職如此謂非賢於人其可乎夫天與人不逺也人事盡則天意得矣良金早夜不懈而必盡其道雖欲辭尊又可得耶其同列之賢吳敬孟寅輩聞豫言而善之請書以為贈於是乎書贈副都御史吳公致仕序聖天子厲精圖治眷用舊臣其有年雖七十而精力尚强者則皆留以自助若年已至而病及之然後聽其去使得優遊以自樂義之至仁之盡也豫嘗竊嘆古之君子幼學壯行既榮且顯矣及其老而休則又有尊養之禮焉如是其待之厚也及周之衰仕者或鞠躬盡瘁而上莫之省小雅四月之刺可見已及乎後世或有年至而未及請者御史則擊而去之雖欲以勵亷恥然於長者亦薄矣於乎可嘆也今之士大夫皆知止足之分有恬退之節而上之意殷勤篤厚如此豈非仁義之兼盡哉海虞吳公敏德以清才奧學遭遇聖明三遷而至都察院左副都御史其正直之操剛毅之氣足以振憲紀肅庶僚隱然名重於當世今年踰七十而聰明日衰遂上章乞致事上察其實許焉在朝士大夫喜吳公之得於上而吳公亦自喜其遂也告別於所往來者擇日就道或曰姑蘇天下奧區而太湖又其勝也范蠡相越功成而歸扁舟適意於其間當時髙之吳公足以為繼矣豫曰不然蠡蓋有所避而圖自全者吳公不如是也君子之道進則行於天下退則施於一鄉是故昔之仕者歸老于家大夫為父師士為少師朝夕坐里孰以教鄉人子弟使之孝弟忠信禮義亷恥令吳公雖老倦於為政若以其道教人宜無不可者成賢才美風俗君子之所樂也蠡惡足取哉監察御史袁海輩聞豫言而喜曰此公之志也請書以為贈故書之吳公果以為然否乎贈都給事胡君序丹徒胡君清字士澄為行在禮科給事中滿九年上即用為禮科都給事中時人榮之蓋都給事中缺久矣胡君常被推擇總其事敬恭夙夜不懈而益勤上之知遇與下之屬望亦久矣乃今而進用焉宜乎其以為榮也夫君子之修德明道未嘗無進用之志然而或不用焉其善不見知於世而人與之者少也果不見知於世而莫有與之者雖欲求分寸之進以成功名可得邪是故君子不求聞於人而人知之不求助於人而人與之必其善有諸已而莫之能為也此豈偶然之故哉胡君在禁近執事樞而能獲於上下其善蓋有諸已矣名位之隆福祿之加雖欲辭讓其又可得耶然豫聞之屈子曰善不由外來名不可以虛作蓋善者人之所得於天之理而名者善之致也人之進善豈有已也哉善日進則名與之俱進矣今胡君名位之進而其善之驗也進而益盛將不在於他日乎昔周之時衛武公固有爵者而為王卿士則又加進矣詩人美之淇澳三章皆以竹起興自竹始生而至於極盛以言其德之進至於動容周旋無不中禮而後已焉武公之進於名位蓋有是為本也若夫抑詩則公所自作其年既九十五矣而求進於善猶不已於乎此其所以為賢也胡君幸未老修於已者尚以武公為師其進不至於極盛豫不信也凡喜其進者屬豫言以美之故緣詩人之義而為言如此其亦以為然也歟贈劉給事中序吉水劉益字崇益為兵科給事中滿三年天子命復其職而僚友皆為喜思勉其德業以報朝廷委任之意乃率求言於豫今之能言者所在皆是况為給事中又皆一時之賢才諸君不取之他人又不自為言而以屬豫豈老謬者所克堪顧豫與崇益居同郡且嘗與其尊府檢討君為同僚崇益之仕又豫主試天下貢士時所進也則豫與崇益庶所謂有世契者其何可愛於言邪給事中七品官耳而職為最重蓋所謂樞機之任也凡政令施於四方四方有所奏請者必歸於給事中然後五府六部受而行之事有是非可否與夫稽遲缺謬者小則駁正大則廷論之而人無敢不服官雖不甚髙然勢足以有為慮其任勢之失也是以必求學道之賢者而用之道者何仁義是已仁則踐夫理之正義則審夫事之宜然後能舉其職而當天子之寵任於乎亦難矣今之選用大臣必先於給事中是給事者大臣之儲也果仁義之道弸於中而著於外何大臣之不可為哉崇益讀書明道既能舉職而有令譽矣上之久其任者欲充其器而大其受也崇益益謹於言行必循其理必適其宜則德進業修爵祿之來可禦哉反是皆非崇益所宜務也朋友之義薄久矣不娟嫉以相惡則便佞以相恱其能相勉於逺大者蓋鮮也諸君厚於崇益如此非誠所謂賢者乎而豫意亦然故為序以贈之贈蔡同知赴任序蔡希仁名夀其先廬陵故家有元之時希仁之大父為惠州通判遂家惠州希仁之父最能醫有惠於廣人藩憲大臣雅愛之舉為廣州醫學正科於是又為廣州人希仁由學官弟子升太學選入中書書武臣誥命滿三年當授官適有言諸郡縣小民往年有轉徙他處今猶未歸既脫其舊籍而又無所附屬請專設官撫定之果無以為歸則隨所寓占籍受田俾得以安其生而不至失所上從之詔吏部擇可任者而希仁得同知黃州黃州淮楚之交其地多良田有陂澤之利故民足於漁稻寡求而不爭蓋自古然矣是宜無他徙者然居民鮮少而賦役繁重昔之為有司者或不能平於是民始轉徙而田多閒廢他邑之民或有所避往往衣食其間然皆棄其世業雖可以茍活一時而豈能安於久哉此上之心所以欲還定而安集之也今之守令皆舉賢而任之非昔之為有司者比矣詔書近下凡逋逃者赦其罪且皆有以處之希仁與今在任之賢同寅協恭推行天子之德意去其所以病民而興其利民者民將戴之如父母皆奔走來歸孰肯舍而去哉豫聞唐有左震者為黃州刺史有惠政黃人歌之曰我欲逃鄉里我欲去墳墓左公今既來誰忍舍之去事見元次山集中此豫所望於希仁與今之為守令者誠能勉之安知後無元子之文足以傳信後世哉蔡世既為廬陵人往年豫先公守瓊常往來廣州希仁父子篤鄉郡之誼最相愛及今又辱愛豫故於其行雖縻於職務不遑暇而亦為序以贈之亦以見豫愛厚之意也希仁勉之贈嚴憲副序嚴君孟衡分冝人永樂中為監察御史有名于時御史雖多論其才行之賢如孟衡者蓋少也分宜邇吾郡故在京師每以契誼相往來為御史滿九年升浙江按察副使益有名其後連以憂去服除改四川四川地闊逺其民讀書知禮法者雖多然大山長谷幽遐僻絶之地往往昧於此故號為難治且地與蕃夷接其俗好攻剽賊殺雖臨之以兵若稍失控馭則反生事開邊患故必任法以制之是以風憲之職之在四川者其治之難蓋與中州異矣往年蕃夷擾松潘屯邊將士多畏難養寇遂至於用大衆孟衡時在其間以天子之法警其惰懲其不恪又得邊校之生事召禍者以聞按法誅之然後衆始用命事既平孟衡有勞績豫因是知四川任風憲者其治甚難於中州蓋以禮法之正而治禮法之民可不勞而治惟若前所云者則安得不勞且勩哉四川之地與夷接不特松潘也幽遐僻絶之處之昧於禮法者亦多有之然則孟衡之舉其職其可以自少暇邪蒸民之詩曰肅肅王命仲山甫將之邦國若否仲山甫明之孟衡之職猶是也下文又曰夙夜匪懈亦豈非孟衡所宜務哉孟衡有將明之才而勤於夙夜其施於治盡乎是非之公不吐剛不茹柔使善者有所恃而立不善者有所畏而改其人皆知禮秉法而後為治功成則孟衡之賢將與仲山甫等矣今年考績來北京既課最而歸其鄉友刑科給事中郭君邦器求豫文贈行豫故為序如此宦成而怠豫知其不如是也亦以致豫願望之意云耳贈洪知縣序新喻知縣洪侯鈞字維衡嘗以持敬名齊而求豫言豫嘉其志為作詩以勉之至是刑科給事中張君固謁豫曰洪侯治吾新喻久矣志足以有立才足以有為凡設施舉措無不當於理政修事治而民愛之頃以詿誤來當路者必欲別其是非無使受垢為下有司勘其實今皆得白遂䝉恩以歸固既為侯喜而亦為吾邑之民喜也請一言贈之夫令於民為最親所謂民之父母也民情莫不有所好有所惡令既近民知其好在是則與之其所惡者則勿以施焉此父母愛子之道也令以愛子之道施於民使皆得其所好而去其所惡則民之愛之有不如子之愛其父母者乎今皇仁如天篤意養民凡所以興利去害而布之政教者既詳且備為令者推而行之父母之道盡矣然或非其才於是有壅而不行或顛倒以病民者是故有如維衡宜為人之所惜也然則維衡之歸寧可不知所自惜哉夫天降才於人使之能行其道行而得其宜有以愜於上惠於下是之謂善用其才而亦為無負於天維衡其能無負於天可必也新喻臨江屬邑其君子尚禮教而務名檢故易孚小人則勤力而知分故易化維衡以父母之道施之而其人皆愛戴如父母則豈惟無負於天而亦無負於上之所任矣今之縣令最所慎重不輕畀人者蓋以民命所繫也能為令將無不可為者維衡勉之贈易通判序往年豫姻家梁先生本之分教瑞州時易輗仲載實從受業與先生之子叔莊相好先生學徒衆命髙弟子轉相受授仲載則受於先生內弟陳賞公延勤勵不懈先生與陳君皆器重之其後先生秩滿去公延亦歸泰和仲載之尊府以其子之學未成也躬走數百里迎公延於泰和且挈其家以往敬禮之俾仲載卒業焉公延感其意之厚也盡以所聞於先生者告之仲載業成取進士擢拜雲南和曲州同知既滿升杭州通判皆能其官有名聲於時今年考績來北京叔莊時為北京國子監學録與仲載別久矣喜得相見道舊故而先生為王府紀善公延為廣西僉憲皆已卒仲載感父之教已而二師之善教也痛念之不置故於叔莊意彌厚豫聞而心善之蓋其父可謂賢父師可謂賢師仲載感德不忘而厚於叔莊可不謂賢矣乎欒共子曰民生於三事之如一其於父師如此則今之仕肯負國家而厲民哉其賢可知矣未幾吏部最其課俾復任叔莊求豫言贈行嗟夫豫之所言豈有外乎其師之教哉梁先生與陳君皆深於詩詩之言曰樂只君子民之父母曽子釋之曰民之所好好之民之所惡惡之此之謂民之父母仲載佐太守治一郡之民皆有父母之責於凡政令必施其所好而去其所惡視民如子俾各遂其生而無失所者則父母之道盡而師之教行矣仲載不亦古之君子矣乎杭州太守錢君亦嘗受教於梁先生仲載試以豫言諗之當必以為然也抑菴文後集卷二十一
